        body: '{"total": 1, "page": 1, "pageSize": 1, "timestamp": "2026-04-26T18:29:34.365800Z", "query": "\"10.9767/bcrec.16.3.10313.588-600\"", "results": [{"last_updated": "2025-08-19T20:21:17Z", "bibjson": {"identifier": [{"id": "1978-2993", "type": "eissn"}, {"id": "10.9767/bcrec.16.3.10313.588-600", "type": "doi"}], "journal": {"volume": "16", "number": "3", "country": "ID", "issns": ["1978-2993"], "publisher": "Masyarakat Katalis Indonesia - Indonesian Catalyst Society (MKICS)", "language": ["EN", "ID"], "title": "Bulletin of Chemical Reaction Engineering & Catalysis"}, "month": "9", "end_page": "600", "keywords": ["oil palm shell", "bio-oil", "pyrolysis", "catalyst", "zeolite", "bayah natural zeolite"], "year": "2021", "start_page": "588", "subject": [{"code": "TP155-156", "scheme": "LCC", "term": "Chemical engineering"}], "author": [{"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Endang Suhendi"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Teguh Kurniawan"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Adian Yoga Pradana"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Vicky Zayan Giffari"}], "link": [{"content_type": "html", "type": "fulltext", "url": "https://journal.bcrec.id/index.php/bcrec/article/view/10313"}], "abstract": "Oil palm shell (OPS) constitutes 60% of the waste generated during the processing of palm oil. However, OPS can potentially be converted into energy and chemicals through pyrolysis. The purpose of this study is to determine and analyse the effect of acid treatment time on the characteristics of natural zeolites, which were then applied to oil palm shell pyrolysis. The effect of the acid treatment time on the products of the pyrolysis was also studied. The acid treatment time was varied: 1, 3, and 5 hours. The crystallinity of the natural zeolites was determined by\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 X-ray diffraction (XRD). Solid, liquid and gaseous pyrolysis products were observed. Proximate, ultimate, and heat analysis were performed on the solid product. The liquid product was characterised using gas chromatography-mass spectrometry (GC-MS). Gas Chromatography (GC) was performed to analyse the composition of the gases produced. The results obtained from this study indicate that longer reflux times reduced the crystallinity of the zeolites. The addition of the zeolite catalysts increased the liquid products of pyrolysis from 24.5 wt% over the parent to 24.6\u201337.1 wt% over the acid-treated natural zeolites. The reduction of oxygenated compounds in bio-oil was observed in the amount of acetic acid and acetone produced. Copyright \u00a9 2021 by Authors, Published by BCREC Group. This is an open access article under the CC BY-SA\u00a0\u00a0 License (https://creativecommons.org/licenses/by-sa/4.0).", "title": "The Effect of Time on the Activation of Bayah Natural Zeolite for Application of Palm Oil Shell Pyrolysis"}, "created_date": "2021-07-23T08:41:12Z", "id": "0000e76ec76943239986f80d4fa437ec"}], "last": "https://doaj.org/api/v4/search/articles/%2210.9767/bcrec.16.3.10313.588-600%22?page=1&pageSize=1"}'
