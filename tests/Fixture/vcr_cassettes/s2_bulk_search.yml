        body: "{\"total\": 28059, \"token\": \"PCOKWVSKJJGM4TWNJNI3EUSQJIWVNUSRKBFEYK2JFUBHFI4VBQWEYTINRUJ42UYMRXGBEDONRXJFEDAMBQWM2EYTKMWSYLETKLGJFTCNKMWQZDMTSRRGWAPECYKAA\", \"data\": [{\"paperId\": \"0001bbceae2a5b45925abd7c02831f8f8799e592\", \"externalIds\": {\"MAG\": \"3001732108\", \"DOI\": \"10.5812/ans.90394\", \"CorpusId\": 213539349}, \"title\": \"Role of Modern Technologies in Tissue Engineering\", \"venue\": \"Archives of Neuroscience\", \"year\": 2020, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://brieflands.com/articles/ans-90394.pdf\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.5812/ans.90394?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.5812/ans.90394, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2751843\", \"name\": \"Q. Ali\"}, {\"authorId\": \"152485769\", \"name\": \"S. Malik\"}, {\"authorId\": \"144855472\", \"name\": \"Arif Malik\"}, {\"authorId\": \"40614215\", \"name\": \"M. Hafeez\"}, {\"authorId\": \"84489805\", \"name\": \"Said Salman\"}], \"abstract\": \"Nanotechnology is a rapidly developing field with numerous applications spread in different fields, especially medicine. It plays a role in tissue engineering, tissue regeneration, drug delivery, and regenerative medicine. The present brief review summarizes the role of nanotechnology in tissue engineering and tissue regeneration. The CRISPR/Cas9 system in tissue engineering is playing an important role, as CRISPR is a revolutionary genome-editing technology that is being used for tissue engineering where it emphasizes to address tissue architecture formation, immune response circumvention, cell differentiation, and disease model development. Moreover, the development and research expenses for tissue engineering and regenerative medicine are too high and there is a need for making these systems cost-effective. Thus, the advanced approach of applications of nanotechnology to regenerative medicine and CRISPR will definitely revolutionize the basis of treatment, prevention, and diagnosis of various diseases.\"}, {\"paperId\": \"0001cbe679a22a5685b48d6de9a70b54af230495\", \"externalIds\": {\"MAG\": \"3044950254\", \"DOI\": \"10.1007/s12015-020-09990-9\", \"CorpusId\": 220797686, \"PubMed\": \"32712868\"}, \"title\": \"Human Leukocyte Antigen Class I Pseudo-Homozygous Mesenchymal Stem Cells Derived from Human Induced Pluripotent Stem Cells\", \"venue\": \"Stem Cell Reviews and Reports\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12015-020-09990-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12015-020-09990-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49289261\", \"name\": \"Daekee Kwon\"}, {\"authorId\": \"35373103\", \"name\": \"Hee-Jin Ahn\"}, {\"authorId\": \"5742517\", \"name\": \"Miaojun Han\"}, {\"authorId\": \"2055622191\", \"name\": \"Minjun Ji\"}, {\"authorId\": \"50069431\", \"name\": \"Jongchan Ahn\"}, {\"authorId\": \"71829803\", \"name\": \"K. Seo\"}, {\"authorId\": \"94945778\", \"name\": \"K. Kang\"}], \"abstract\": null}, {\"paperId\": \"00024d934a54b63b2d7e7db23d9dd43c81ece816\", \"externalIds\": {\"PubMedCentral\": \"8546148\", \"DOI\": \"10.1038/s41419-021-04288-1\", \"CorpusId\": 239889146, \"PubMed\": \"34697301\"}, \"title\": \"Lnc-DC promotes estrogen independent growth and tamoxifen resistance in breast cancer\", \"venue\": \"Cell Death and Disease\", \"year\": 2021, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41419-021-04288-1.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8546148, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4686189\", \"name\": \"Wan-Xin Peng\"}, {\"authorId\": \"34665985\", \"name\": \"Pratirodh Koirala\"}, {\"authorId\": \"40758169\", \"name\": \"Huaixiang Zhou\"}, {\"authorId\": \"51174439\", \"name\": \"Jiahong Jiang\"}, {\"authorId\": \"2422545202\", \"name\": \"Ziqiang Zhang\"}, {\"authorId\": \"2108753763\", \"name\": \"Liu Yang\"}, {\"authorId\": \"1938100\", \"name\": \"Y. Mo\"}], \"abstract\": \"Selective estrogen receptor modulators (SERMs) such as tamoxifen have proven to be effective in the treatment of estrogen receptor (ER) positive breast cancer. However, a major obstacle for such endocrine therapy is estrogen independent growth, leading to resistance, and the underlying mechanism is not fully understood. The purpose of this study was to determine whether long non-coding RNAs (lncRNAs) are involved in regulation of estrogen independent growth and tamoxifen resistance in ER positive breast cancer. Using a CRISPR/Cas9-based SAM (synergistic activation mediator) library against a focus group of lncRNAs, we identify Lnc-DC as a candidate lncRNA. Further analysis suggests that Lnc-DC is able to reduce tamoxifen-induced apoptosis by upregulation of anti-apoptotic genes such as Bcl2 and Bcl-xL. Furthermore, Lnc-DC activates STAT3 by phosphorylation (pSTAT3Y705), and the activated STAT3 subsequently induces expression of cytokines which in turn activate STAT3, forming an autocrine loop. Clinically, upregulation of Lnc-DC is associated with poor prognosis. In particular, analysis of a tamoxifen-treated patient cohort indicates that Lnc-DC expression can predict the response to tamoxifen. Together, this study demonstrates a previously uncharacterized function of Lnc-DC/STAT3/cytokine axis in estrogen independent growth and tamoxifen resistance, and Lnc-DC may serve as a potential predictor for tamoxifen response.\"}, {\"paperId\": \"0003310a32016c63e413ff8b72e9461d6c6620bd\", \"externalIds\": {\"PubMedCentral\": \"10729469\", \"DOI\": \"10.1186/s13024-023-00692-7\", \"CorpusId\": 266349812, \"PubMed\": \"38111016\"}, \"title\": \"Amyloid-\\u03b2 specific regulatory T cells attenuate Alzheimer\\u2019s disease pathobiology in APP/PS1 mice\", \"venue\": \"Molecular Neurodegeneration\", \"year\": 2023, \"citationCount\": 48, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://molecularneurodegeneration.biomedcentral.com/counter/pdf/10.1186/s13024-023-00692-7\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10729469, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11488565\", \"name\": \"Pravin Yeapuri\"}, {\"authorId\": \"48303975\", \"name\": \"Jatin Machhi\"}, {\"authorId\": \"3655335\", \"name\": \"Yaman Lu\"}, {\"authorId\": \"14294010\", \"name\": \"M. M. Abdelmoaty\"}, {\"authorId\": \"2266411996\", \"name\": \"Rana Kadry\"}, {\"authorId\": \"1825722886\", \"name\": \"Milankumar Patel\"}, {\"authorId\": \"2077560271\", \"name\": \"Shaurav Bhattarai\"}, {\"authorId\": \"2266411525\", \"name\": \"Eugene Lu\"}, {\"authorId\": \"40830853\", \"name\": \"Krista L. Namminga\"}, {\"authorId\": \"2242286\", \"name\": \"K. E. Olson\"}, {\"authorId\": \"2195514632\", \"name\": \"Emma G Foster\"}, {\"authorId\": \"143813795\", \"name\": \"R. Mosley\"}, {\"authorId\": \"2812331\", \"name\": \"H. Gendelman\"}], \"abstract\": \"Background Regulatory T cells (Tregs) maintain immune tolerance. While Treg-mediated neuroprotective activities are now well-accepted, the lack of defined antigen specificity limits their therapeutic potential. This is notable for neurodegenerative diseases where cell access to injured brain regions is required for disease-specific therapeutic targeting and improved outcomes. To address this need, amyloid-beta (A\\u03b2) antigen specificity was conferred to Treg responses by engineering the T cell receptor (TCR) specific for A\\u03b2 (TCR_A_\\u03b2). The TCR_Ab were developed from disease-specific T cell effector (Teff) clones. The ability of Tregs expressing a transgenic TCR_A\\u03b2 (TCR_A\\u03b2 -Tregs) to reduce A\\u03b2 burden, transform effector to regulatory cells, and reverse disease-associated neurotoxicity proved beneficial in an animal model of Alzheimer\\u2019s disease. Methods TCR_A_\\u03b2 -Tregs were generated by CRISPR-Cas9 knockout of endogenous TCR and consequent incorporation of the transgenic TCR_Ab identified from A\\u03b2 reactive Teff monoclones. Antigen specificity was confirmed by MHC-A\\u03b2-tetramer staining. Adoptive transfer of TCR_A\\u03b2-Tregs to mice expressing a chimeric mouse-human amyloid precursor protein and a mutant human presenilin-1 followed measured behavior, immune, and immunohistochemical outcomes. Results TCR_A\\u03b2-Tregs expressed an A\\u03b2-specific TCR. Adoptive transfer of TCR_A\\u03b2-Tregs led to sustained immune suppression, reduced microglial reaction, and amyloid loads. ^18F-fluorodeoxyglucose radiolabeled TCR_A\\u03b2-Treg homed to the brain facilitating antigen specificity. Reduction in amyloid load was associated with improved cognitive functions. Conclusions TCR_A\\u03b2-Tregs reduced amyloid burden, restored brain homeostasis, and improved learning and memory, supporting the increased therapeutic benefit of antigen specific Treg immunotherapy for AD. Graphical Abstract\"}, {\"paperId\": \"0005676685d64e4f5b0e4e068b5eeabe3295ab53\", \"externalIds\": {\"PubMedCentral\": \"8969578\", \"DOI\": \"10.3389/fpls.2022.847169\", \"CorpusId\": 247478498, \"PubMed\": \"35371136\"}, \"title\": \"Modified Gene Editing Systems: Diverse Bioengineering Tools and Crop Improvement\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.847169/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8969578, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"26935586\", \"name\": \"Guoning Zhu\"}, {\"authorId\": \"3182094\", \"name\": \"Hongliang Zhu\"}], \"abstract\": \"Gene-editing systems have emerged as bioengineering tools in recent years. Classical gene-editing systems include zinc-finger nucleases (ZFNs), transcription activator-like effector nucleases (TALENs), and clustered regularly interspaced short palindromic repeats (CRISPR) with CRISPR-associated protein 9 (Cas9) (CRISPR/Cas9), and these tools allow specific sequences to be targeted and edited. Various modified gene-editing systems have been established based on classical gene-editing systems. Base editors (BEs) can accurately carry out base substitution on target sequences, while prime editors (PEs) can replace or insert sequences. CRISPR systems targeting mitochondrial genomes and RNA have also been explored and established. Multiple gene-editing techniques based on CRISPR/Cas9 have been established and applied to genome engineering. Modified gene-editing systems also make transgene-free plants more readily available. In this review, we discuss the modifications made to gene-editing systems in recent years and summarize the capabilities, deficiencies, and applications of these modified gene-editing systems. Finally, we discuss the future developmental direction and challenges of modified gene-editing systems.\"}, {\"paperId\": \"00058b40d5ce52b74215a2cf1a44f24c402354c4\", \"externalIds\": {\"PubMedCentral\": \"8622832\", \"DOI\": \"10.3390/plants10112542\", \"CorpusId\": 244683955, \"PubMed\": \"34834905\"}, \"title\": \"Construction of Multiple Guide RNAs in CRISPR/Cas9 Vector Using Stepwise or Simultaneous Golden Gate Cloning: Case Study for Targeting the FAD2 and FATB Multigene in Soybean\", \"venue\": \"Plants\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2223-7747/10/11/2542/pdf?version=1637659918\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8622832, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2045747153\", \"name\": \"W. Kim\"}, {\"authorId\": \"2109578783\", \"name\": \"H. Kim\"}, {\"authorId\": \"1897384\", \"name\": \"Y. Chung\"}, {\"authorId\": \"89390870\", \"name\": \"Hyun-Uk Kim\"}], \"abstract\": \"CRISPR/Cas9 is a commonly used technique in reverse-genetics research to knock out a gene of interest. However, when targeting a multigene family or multiple genes, it is necessary to construct a vector with multiple single guide RNAs (sgRNAs) that can navigate the Cas9 protein to the target site. In this protocol, the Golden Gate cloning method was used to generate multiple sgRNAs in the Cas9 vector. The vectors used were pHEE401E_UBQ_Bar and pBAtC_tRNA, which employ a one-promoter/one-sgRNA and a polycistronic-tRNA-gRNA strategy, respectively. Golden Gate cloning was performed with type IIS restriction enzymes to generate gRNA polymers for vector inserts. Four sgRNAs containing the pHEE401E_UBQ_Bar vector and four to six sgRNAs containing the pBAtC_tRNA vector were constructed. In practice, we constructed multiple sgRNAs targeting multiple genes of FAD2 and FATB in soybean using this protocol. These three vectors were transformed into soybeans using the Agrobacterium-mediated method. Using deep sequencing, we confirmed that the T0 generation transgenic soybean was edited at various indel ratios in the predicted target regions of the FAD2 and FATB multigenes. This protocol is a specific guide that allows researchers to easily follow the cloning of multiple sgRNAs into commonly used CRISPR/Cas9 vectors for plants.\"}, {\"paperId\": \"00068a97d4cb6ed2b4d5b59e405a71e10decba3a\", \"externalIds\": {\"DOI\": \"10.3791/61618\", \"CorpusId\": 235492710, \"PubMed\": \"34152311\"}, \"title\": \"Investigating Target Gene Function in a CD40 Agonistic Antibody-induced Colitis Model using CRISPR/Cas9-based Technologies.\", \"venue\": \"Journal of Visualized Experiments\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3791/61618?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3791/61618, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144276689\", \"name\": \"Sean M. Graham\"}, {\"authorId\": \"2112351655\", \"name\": \"Lei Gao\"}, {\"authorId\": \"2151036005\", \"name\": \"Rui Wang\"}], \"abstract\": \"The immune system functions to defend humans against foreign invaders such as bacteria and viruses. However, disorders of the immune system may lead to autoimmunity, inflammatory disease, and cancer. The inflammatory bowel diseases (IBD)-Crohn's disease (CD) and ulcerative colitis (UC)-are chronic diseases marked by relapsing intestinal inflammation. Although IBD is most prevalent in Western countries (1 in 1,000), incident rates are increasing around the world. Through association studies, researchers have linked hundreds of genes to the pathology of IBD. However, the elaborate pathology behind IBD and the high number of potential genes pose significant challenges in finding the best therapeutic targets. Additionally, the tools needed to functionally characterize each genetic association introduce many rate-limiting factors such as the generation of genetically modified mice for each gene. To investigate the therapeutic potential of target genes, a model system has been developed using clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated endonuclease (Cas9)-based technologies and a cluster of differentiation 40 (CD40) agonistic antibody. The present study shows that CRISPR/Cas9-mediated editing in the immune system can be used to investigate the impact of genes in vivo. Limited to the hematopoietic compartment, this approach reliably edits the resulting reconstituted immune system. CRISPR/Cas9-edited mice are generated faster and are far less expensive than traditional genetically modified mice. Furthermore, CRISPR/Cas9 editing of mice has significant scientific advantages compared to generating and breeding genetically modified mice such as the ability to evaluate targets that are embryonic lethal. Using CD40 as a model target in the CD40 agonistic antibody-induced colitis model, this study demonstrates the feasibility of this approach.\"}, {\"paperId\": \"00080b4e8c4488a8dc4c410b3cf57c6a00d523f9\", \"externalIds\": {\"DOI\": \"10.1016/j.jhazmat.2024.137060\", \"CorpusId\": 275192451, \"PubMed\": \"39756324\"}, \"title\": \"Galactinol synthase 4 requires sulfur assimilation pathway to provide tolerance towards arsenic stress under limiting sulphur condition in Arabidopsis.\", \"venue\": \"Journal of Hazardous Materials\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jhazmat.2024.137060?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jhazmat.2024.137060, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2336861328\", \"name\": \"Gurpreet Sandhu\"}, {\"authorId\": \"2149074249\", \"name\": \"Aruba Khan\"}, {\"authorId\": \"2317933928\", \"name\": \"Ria Khare\"}, {\"authorId\": \"1657835562\", \"name\": \"Pranshu Kumar Pathak\"}, {\"authorId\": \"2266515354\", \"name\": \"P.K. Trivedi\"}], \"abstract\": \"Heavy metalloid stress such as arsenic (As) toxicity and nutrient imbalance constitute a significant threat to plant productivity and development. Plants produce sulfur (S)-rich molecules like glutathione (GSH) to detoxify arsenic, but sulfur deficiency worsens its impact. Previous research identified Arabidopsis thaliana ecotypes Koz2-2 (tolerant) and Ri-0 (sensitive) under low-sulfur (LS) and As(III) stress. Transcriptomic analysis of the contrasting ecotypes revealed that AtGolS4 was highly induced in Koz2-2, suggesting its possible role in LS+As(III) stress response. In this study, AtGolS4 overexpressing lines (AtGolS4OX) in Col-0, AtGolS4 mutant (atgols4), and Ri-0 backgrounds showed lesser root growth reduction under LS+As(III) stress, with lower free sulfate accumulation and higher GSH levels, indicating the possible role of AtGolS4 in regulating antioxidant production to reduce oxidative stress generated due to As(III) stress. Overexpression of AtGolS4 in the AtSULTR1;1 mutant (atsultr1:1CR, developed through CRISPR/Cas9 approach) background resulted in a sensitive phenotype, suggesting sulfate availability limits sulfur compound production. AtGolS4 promoter analysis revealed absence of sulfur-responsive elements (SURE) but identified MYC2 binding sites, and experiments showed that AtMYC2 likely regulates AtGolS4. Overall, this study highlights AtGolS4 as a key gene for enhancing tolerance to LS and As(III) stress, by increasing the antioxidant capability and sulphate assimilation.\"}, {\"paperId\": \"0008598f639643c17c5597bd7d65bdc1f0c23918\", \"externalIds\": {\"DOI\": \"10.1007/s00299-021-02816-z\", \"CorpusId\": 244800371, \"PubMed\": \"34854968\"}, \"title\": \"Endogenous U6 promoters improve CRISPR/Cas9 editing efficiencies in Sorghum bicolor and show potential for applications in other cereals\", \"venue\": \"Plant Cell Reports\", \"year\": 2021, \"citationCount\": 32, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00299-021-02816-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00299-021-02816-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7511624\", \"name\": \"K. Massel\"}, {\"authorId\": \"2046360525\", \"name\": \"Yasmine Lam\"}, {\"authorId\": \"2142835061\", \"name\": \"Jessica Hintzsche\"}, {\"authorId\": \"2142849675\", \"name\": \"Nicholas Lester\"}, {\"authorId\": \"40610588\", \"name\": \"J. Botella\"}, {\"authorId\": \"5760389\", \"name\": \"I. Godwin\"}], \"abstract\": null}, {\"paperId\": \"0008f17b5ef0b5d368c22830aa88c91943e68f25\", \"externalIds\": {\"MAG\": \"3034939753\", \"DOI\": \"10.1007/978-3-030-21657-3_16\", \"CorpusId\": 226572049}, \"title\": \"Pain Analgesic Developments in the Genomic Era\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-3-030-21657-3_16?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-3-030-21657-3_16, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2406970064\", \"name\": \"Aaron Jesuthasan\"}, {\"authorId\": \"145218384\", \"name\": \"D. Bullock\"}, {\"authorId\": \"1401872218\", \"name\": \"R. Gonz\\u00e1lez-Cano\"}, {\"authorId\": \"5479349\", \"name\": \"M. Costigan\"}], \"abstract\": null}, {\"paperId\": \"000ba919c53bb5ab96ce9dd9132fcb4182f0f9ed\", \"externalIds\": {\"PubMedCentral\": \"9421400\", \"DOI\": \"10.1016/j.isci.2022.104905\", \"CorpusId\": 251535156, \"PubMed\": \"36046192\"}, \"title\": \"Differential regulation of alternate promoter regions in Sox17 during endodermal and vascular endothelial development\", \"venue\": \"iScience\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2589004222011774/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9421400, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"37823286\", \"name\": \"Linh T Trinh\"}, {\"authorId\": \"5998281\", \"name\": \"Anna B. Osipovich\"}, {\"authorId\": \"35689586\", \"name\": \"Leesa L. Sampson\"}, {\"authorId\": \"39515169\", \"name\": \"Jonathan Wong\"}, {\"authorId\": \"2166525344\", \"name\": \"Christopher V. Wright\"}, {\"authorId\": \"6145516\", \"name\": \"M. Magnuson\"}], \"abstract\": \"Summary Sox17 gene expression is essential for both endothelial and endodermal cell differentiation. To better understand the genetic basis for the expression of multiple Sox17 mRNA forms, we identified and performed CRISPR/Cas9 mutagenesis of two evolutionarily conserved promoter regions (CRs). The deletion of the upstream and endothelial cell-specific CR1 caused only a modest increase in lympho-vasculogenesis likely via reduced Notch signaling downstream of SOX17. In contrast, the deletion of the downstream CR2 region, which functions in both endothelial and endodermal cells, impairs both vascular and endodermal development causing death by embryonic day 12.5. Analyses of 3D chromatin looping, transcription factor binding, histone modification, and chromatin accessibility data at the Sox17 locus and surrounding region further support differential regulation of the two promoters during the development.\"}, {\"paperId\": \"000d6143b21c80192b96b5f7b8633dea2a000bdf\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-1131\", \"CorpusId\": 249729090}, \"title\": \"Abstract 1131: Pharmacogenomic insight into targetable vulnerabilities and modifiers of response to MRTX1133 in KRASG12D-mutant models\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-1131?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-1131, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1390120763\", \"name\": \"Vickie Bowcut\"}, {\"authorId\": \"84355838\", \"name\": \"Andrew Calinisan\"}, {\"authorId\": \"40557266\", \"name\": \"David M Briere\"}, {\"authorId\": \"90881207\", \"name\": \"Lauren N. Hargis\"}, {\"authorId\": \"40341521\", \"name\": \"Lars D. Engstrom\"}, {\"authorId\": \"3916518\", \"name\": \"Jade Laguer\"}, {\"authorId\": \"20692202\", \"name\": \"Darin Vanderpool\"}, {\"authorId\": \"2145747536\", \"name\": \"Xiaolun Wang\"}, {\"authorId\": \"50681110\", \"name\": \"J. Lawson\"}, {\"authorId\": \"13943631\", \"name\": \"N. Thomas\"}, {\"authorId\": \"2129136491\", \"name\": \"Robin J. Gunn\"}, {\"authorId\": \"2116353383\", \"name\": \"Christopher R. Smith\"}, {\"authorId\": \"1390120746\", \"name\": \"J. Fernandez-Banet\"}, {\"authorId\": \"90825720\", \"name\": \"Leo He\"}, {\"authorId\": \"1851300\", \"name\": \"A. Pavl\\u00edcek\"}, {\"authorId\": \"13623350\", \"name\": \"Lisa Rahbaek\"}, {\"authorId\": \"34191205\", \"name\": \"M. Marx\"}, {\"authorId\": \"46679980\", \"name\": \"P. Olson\"}, {\"authorId\": \"144222599\", \"name\": \"J. Christensen\"}, {\"authorId\": \"46345871\", \"name\": \"Jill Hallin\"}], \"abstract\": \"\\n The ability to effectively target mutated KRAS has remained elusive despite decades of research. Recently, the identification of selective KRASG12C inhibitors has provided an effective treatment option for patients harboring this particular mutation and has also provided insight toward targeting other KRAS mutants, including KRASG12D. MRTX1133 was identified via a structure-based drug design strategy as a potent, selective, and non-covalent KRASG12D inhibitor directed at the switch II binding pocket. MRTX1133 exhibited dose dependent KRAS pathway and tumor growth inhibition and demonstrated marked anti-tumor activity across a panel of models in vivo, including tumor regression >30% in 8 out of 11 pancreatic ductal adenocarcinoma (PDAC) models. While evaluation of MRTX1133 across a panel of cell and patient-derived xenograft models demonstrated strong single agent activity in the majority of models tested, a subset of models were less responsive. Focused sgRNA libraries targeting ~5,000 genes were tested in MRTX1133-anchored CRISPR/Cas9 screens in vitro and in vivo in PDAC and colorectal KRASG12D-mutant cell lines. Similar to what was seen in a targeted genetic screen with our selective KRASG12C inhibitor MRTX849, several genes that act either upstream or downstream of KRAS were depleted with MRTX1133 treatment which illuminate specific targetable vulnerabilities in the context of KRASG12D inhibition. sgRNAs targeting EGFR, PIK3CA, PTPN11, mTOR, and CDK2/4/6 were depleted in MRTX1133-treated (or vehicle-treated) cell lines or xenograft models, while hallmark tumor suppressor genes RB1, KEAP1, NF1 and PTEN were enriched. The enrichment of KEAP1 sgRNAs in PDAC models parallels findings with MRTX849 in preclinical models and is in line with emerging clinical data suggesting increased capacity to scavenge reactive oxygen species (ROS) may represent a mechanism of partial resistance to a non-covalent, non-electrophilic warhead-containing KRASG12D-selective inhibitor in PDAC. Treatment using small molecules targeting selected vulnerabilities in vitro and in vivo confirmed these genetic findings. Further evaluation of dependencies utilizing an integrated analysis of RNAseq data also revealed KRAS regulates and is critically dependent on pro-survival and cell cycle genes for cancer cell viability. These data lend further insight into tumor response to KRASG12D inhibition and provide key insight into the genes that mediate the mechanism of action of, as well as confer partial resistance to MRTX1133, and identify combination targets that can augment the anti-tumor effect of MRTX1133.\\n Citation Format: Vickie Bowcut, Andrew Calinisan, David M. Briere, Lauren Hargis, Lars D. Engstrom, Jade Laguer, Darin Vanderpool, Xiaolun Wang, J David Lawson, Nicole Thomas, Robin Gunn, Christopher R. Smith, Julio Fernandez-Banet, Leo He, Adam Pavlicek, Lisa Rahbaek, Matthew A. Marx, Peter Olson, James G. Christensen, Jill Hallin. Pharmacogenomic insight into targetable vulnerabilities and modifiers of response to MRTX1133 in KRASG12D-mutant models [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 1131.\"}, {\"paperId\": \"000daccb7b8c0efa97c42cea48fe1d7028f3ab20\", \"externalIds\": {\"DOI\": \"10.1038/s41467-020-15951-0\", \"CorpusId\": 256638224}, \"title\": \"Non-coding somatic mutations converge on the PAX8 pathway in ovarian cancer\", \"venue\": \"Nature Communications\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-020-15951-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41467-020-15951-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41467-020-15951-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46555876\", \"name\": \"R. Corona\"}, {\"authorId\": \"46844928\", \"name\": \"Ji-Heui Seo\"}, {\"authorId\": \"49541304\", \"name\": \"Xianzhi Lin\"}, {\"authorId\": \"1818443\", \"name\": \"Dennis J. Hazelett\"}, {\"authorId\": \"46291633\", \"name\": \"J. Reddy\"}, {\"authorId\": \"66061445\", \"name\": \"M. A. Fonseca\"}, {\"authorId\": \"66017761\", \"name\": \"Forough Abassi\"}, {\"authorId\": \"2108703056\", \"name\": \"Yvonne G Lin\"}, {\"authorId\": \"1388244312\", \"name\": \"P. Mhawech-Fauceglia\"}, {\"authorId\": \"2222550405\", \"name\": \"Sohrab P. Shah\"}, {\"authorId\": \"1801407\", \"name\": \"D. Huntsman\"}, {\"authorId\": \"2090575596\", \"name\": \"A. Gusev\"}, {\"authorId\": \"2616122\", \"name\": \"B. Karlan\"}, {\"authorId\": \"33887249\", \"name\": \"B. Berman\"}, {\"authorId\": \"143826018\", \"name\": \"M. Freedman\"}, {\"authorId\": \"2475419\", \"name\": \"S. Gayther\"}, {\"authorId\": \"3755480\", \"name\": \"K. Lawrenson\"}], \"abstract\": \"The functional consequences of somatic non-coding mutations in ovarian cancer (OC) are unknown. To identify regulatory elements (RE) and genes perturbed by acquired non-coding variants, here we establish epigenomic and transcriptomic landscapes of primary OCs using H3K27ac ChIP-seq and RNA-seq, and then integrate these with whole genome sequencing data from 232 OCs. We identify 25 frequently mutated regulatory elements, including an enhancer at 6p22.1 which associates with differential expression of ZSCAN16 (P\\u2009=\\u20096.6\\u2009\\u00d7\\u200910-4) and ZSCAN12 (P\\u2009=\\u20090.02). CRISPR/Cas9 knockout of this enhancer induces downregulation of both genes. Globally, there is an enrichment of single nucleotide variants in active binding sites for TEAD4 (P\\u2009=\\u20096\\u2009\\u00d7\\u200910-11) and its binding partner PAX8 (P\\u2009=\\u20092\\u00d710-10), a known lineage-specific transcription factor in OC. In addition, the collection of cis REs associated with PAX8 comprise the most frequently mutated set of enhancers in OC (P\\u2009=\\u20090.003). These data indicate that non-coding somatic mutations disrupt the PAX8 transcriptional network during OC development. The role of non-coding somatic mutations in ovarian cancer is unclear. Here, the authors integrate genomic and epigenomic data from patient samples to show that these mutations frequently converge on the PAX8 transcriptional network.\"}, {\"paperId\": \"000f60dacd9cf74c591fa1fc649c46afde974689\", \"externalIds\": {\"DOI\": \"10.1101/2022.01.21.477265\", \"CorpusId\": 246219473}, \"title\": \"CRISPR-Cas systems in Fusobacterium: An untapped genetic frontier\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/01/21/2022.01.21.477265.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.01.21.477265?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.01.21.477265, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51227223\", \"name\": \"Ariana Uma\\u00f1a\"}, {\"authorId\": \"6283776\", \"name\": \"D. J. Slade\"}], \"abstract\": \"Fusobacterium nucleatum has recently received significant attention for its strong connection with the acceleration and gravity of multiple cancers (e.g., colorectal, pancreatic, esophageal). However, our understanding of the molecular mechanisms that drive infection by this \\u2018oncomicrobe\\u2019 have been hindered by a lack of universal genetic tools. Herein we report a global bioinformatic identification and characterization of multiple Fusobacterium CRISPR-Cas adaptive immune systems including Cas13c, and detailed report of the proteins, spacer/repeat loci, trans- activating CRISPR RNA (tracrRNA), and CRISPR RNA (cRNA) from a Type II-A CRISPR-Cas9 system. Since most Fusobacterium are currently genetically intractable, this CRISPR-Cas bioinformatic roadmap could be used to build new genome editing and transcriptional tuning tools to characterize an increasingly important genus of human opportunistic-pathogens connected to the onset, progression, and severity of cancer.\"}, {\"paperId\": \"0013535079cd42ee6e2b8791e8c17f6dc7ef0f3e\", \"externalIds\": {\"DOI\": \"10.1101/2024.02.29.582732\", \"CorpusId\": 268201968, \"PubMed\": \"40023418\"}, \"title\": \"Enzymatic Assembly for CRISPR Split-Cas9 System: The Emergence of a Sortase-based Split-Cas9 Technology\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/02/29/2024.02.29.582732.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.02.29.582732?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.02.29.582732, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"78609702\", \"name\": \"S. H. Helalat\"}, {\"authorId\": \"2289614779\", \"name\": \"Helga Thora Kristinsd\\u00f3ttir\"}, {\"authorId\": \"2289615333\", \"name\": \"Astrid Dolinger Petersen\"}, {\"authorId\": \"2233781721\", \"name\": \"R. C. T\\u00e9llez\"}, {\"authorId\": \"2383196999\", \"name\": \"Mads Boye\"}, {\"authorId\": \"2289752381\", \"name\": \"Yi Sun\"}], \"abstract\": \"CRISPR-Cas9 has been widely used in scientific research and medical investigations as a pioneering technology. However, challenges such as the large size of the Cas9 sequence and potential off-target effects have impeded its widespread adoption. In response, various alternatives, such as split-Cas9 technology, have emerged. Split-Cas9 systems allow the large Cas9 sequence to be divided into two segments to aid in the delivery of the enzyme. Nevertheless, challenges persist in achieving precise control over the timing and location of Cas9 reassembly and activity to minimize off-target effects. This study presents an enzymatic-based split-Cas9 system, introducing a new approach utilizing the Sortase enzyme for the reconstitution of the full Cas9 protein. The developed method eliminates the need for chemical or physical induction and allows for precise genome editing in specific cells through the utilization of various specific promoters or targeted drug delivery. Experimental validation of the enzymatic system was conducted in E. coli, HEK cells, and Jurkat cells, demonstrating successful assembly and activity of the assembled Cas9 enzyme. In addition, this study explored the incorporation of nuclear localization signals, the evaluation of inducible promoters, and the delivery of the system\\u2019s components in mRNA or protein form. Furthermore, we investigated the potential of S/MAR minicircle technology instead of viral vectors within the system. Overall, we highlighted the feasibility and utility of the Sortase-based split-Cas9 system to enhance control and efficiency compared to traditional CRISPR-Cas9 approaches. Additionally, this study revealed the potential of using the Sortase enzyme for posttranslational modifications and protein assembly in human cells.\"}, {\"paperId\": \"00153e3790a3f06cc7eac479dd84e1836d2bef0f\", \"externalIds\": {\"DOI\": \"10.1096/fasebj.2022.36.s1.r2243\", \"CorpusId\": 248636992, \"PubMed\": \"35553490\"}, \"title\": \"Using De Novo Designed Protein Switches in C. elegans\", \"venue\": \"The FASEB Journal\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fasebj.2022.36.s1.r2243?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fasebj.2022.36.s1.r2243, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2170730945\", \"name\": \"Adam P. Berg\"}, {\"authorId\": \"2170724939\", \"name\": \"Joseph H. Kaefer\"}, {\"authorId\": \"2170728049\", \"name\": \"Connor M. Wakefield\"}, {\"authorId\": \"2305898895\", \"name\": \"Jakob Faber\"}, {\"authorId\": \"47547397\", \"name\": \"W. Novak\"}, {\"authorId\": \"38093749\", \"name\": \"E. B. Sorensen\"}], \"abstract\": \"The \\u2018Latching Orthogonal Cage/Key pRoteins\\u2019 (LOCKR) system is a de novo designed protein Switch and Key. The Switch functions to cage a functional protein sequence, such as a degron, in the off or \\u201clocked\\u201d state. Upon Key addition, the Switch is turned on or \\u201cunlocked,\\u201d which exposes the degron, simultaneously degrading the Switch and any proteins fused to the Switch via the proteasome. Key expression can be tailored for tissue\\u2010specific expression, which gives LOCKR exquisite spatial protein control. LOCKR provides novel post\\u2010translational control over a protein of interest but has not yet been applied to a multicellular organism. We are developing the LOCKR technology for conditional protein depletion in the model organism C. elegans. Although genetic RNAi and similar gene editing techniques benefit from ease of delivery and can target essentially any gene, they have various limitations, including 1) slow protein turnover can prohibit use of RNAi; 2) genetic perturbation of essential genes via genetic deletion prevents characterization of later functions. The degronLOCKR system requires two parts: 1) a gene fused to the \\u2018degronSwitch\\u2019 and 2) an inducer peptide (the Key). The Switch can be fused to any gene of interest using CRISPR\\u2010Cas9 gene editing. We fused degronSwitch to dhc\\u20101 (dynein heavy chain), an essential cytoplasmic motor protein along with mScarlet and a 3xFLAG tag to aid in protein quantitation via microscopic and Western analysis. We also cloned a negative control, which lacks degronSwitch, to analyze the effect of inserting the Switch in vivo. To complement the degronSwitch, we designed six tissue\\u2010specific Keys for Mos\\u2010Single Copy Insertion (MosSCI), which allows for spatial control of degronSwitch protein degradation. We predict that ubiquitous expression of Key with the degronSwitch fused to dhc\\u20101 will result in embryonic lethality, whereas germline\\u2010specific Key will permit viability but result in meiotic defects. These phenotypes are easily identifiable and serve as effective proof of concept. Future work includes expanding the LOCKR system to incorporate temporal control of the degronSwitch fusion protein by toggling the Key on and off using heat\\u2010shock promoters and RNAi against the Key. This work establishes a novel and tissue\\u2010specific method for regulating protein function in an animal model.\"}, {\"paperId\": \"001af637b2cd479689a1667426d8a750c072c548\", \"externalIds\": {\"MAG\": \"3134435160\", \"DOI\": \"10.21203/rs.2.20227/v1\", \"CorpusId\": 235904932}, \"title\": \"Increasing lipid productivity in Chlamydomonas by engineering lipid catabolism using the CRISPR-Cas9 system\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.21203/rs.2.20227/v1\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21203/rs.2.20227/v1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21203/rs.2.20227/v1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145628463\", \"name\": \"Thu Ha Thi Nguyen\"}, {\"authorId\": \"7882746\", \"name\": \"Seunghye Park\"}, {\"authorId\": \"3875698\", \"name\": \"Jooyeon Jeong\"}, {\"authorId\": \"15177376\", \"name\": \"Y. Shin\"}, {\"authorId\": \"88061934\", \"name\": \"S. Sim\"}, {\"authorId\": \"2539146\", \"name\": \"E. Jin\"}], \"abstract\": \"\\n Background Currently, most of the attention in renewable energy industry is focused on the development of alternative, sustainable energy sources. Microalgae are a promising feedstock for biofuel production in response to the energy crisis. The use of metabolic engineering to improve yields of biofuel-related lipid components in microalgae, without affecting cell growth, is now a promising approach to develop more sustainable energy sources and to make this approach more economically feasible. Results The CRISPR-Cas9 system was successfully applied to generate a target-speci\\ufb01c knockout of the ELT gene in Chlamydomonas reinhardtii . The target gene encodes an enzyme involved in lipid catabolism, in which the knockout phenotype impacts fatty acid degradation. As a result, the knockout mutants show up to 28.52% increased total lipid accumulation in comparison with the wild-type strain. This is also accompanied by a shift in the fatty acid composition with an increase of up to 27.2% in the C18:1 proportion. These changes do not signi\\ufb01cantly impact cell growth. Conclusion This study provides useful insights for the improvement of the oleaginous microalgae strain for biodiesel production. The acquired elt mutants showed improved lipid accumulation and productivity without compromising the growth rate.\"}, {\"paperId\": \"001b5122cf22c3bf5d458f0d216310029d0c8554\", \"externalIds\": {\"MAG\": \"3008387462\", \"DOI\": \"10.1016/j.jad.2020.02.041\", \"CorpusId\": 212667645, \"PubMed\": \"32158004\"}, \"title\": \"Type 3 adenylyl cyclase in the main olfactory epithelium participates in depression-like and anxiety-like behaviours.\", \"venue\": \"Journal of Affective Disorders\", \"year\": 2020, \"citationCount\": 17, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jad.2020.02.041?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jad.2020.02.041, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108998121\", \"name\": \"Xinxia Liu\"}, {\"authorId\": \"47943467\", \"name\": \"Yanfen Zhou\"}, {\"authorId\": \"2116573476\", \"name\": \"Shujuan Li\"}, {\"authorId\": \"47751098\", \"name\": \"Dong Yang\"}, {\"authorId\": \"1560362984\", \"name\": \"Mingming Jiao\"}, {\"authorId\": \"2108861152\", \"name\": \"Xiaodong Liu\"}, {\"authorId\": \"6328778\", \"name\": \"Zhenshan Wang\"}], \"abstract\": \"BACKGROUND\\nDeficiency of olfaction is thought to be associated with depression, and type 3 adenylyl cyclase (AC3) genetic knockout and forebrain knockout mice show depression-like behaviours. AC3 is expressed in the main olfactory epithelium (MOE) and hippocampus, which plays an important role in olfactory signal transduction. However, it is unclear whether AC3 in the MOE also plays a role in the pathogenesis of depression. Thus, we aimed to study the relationship between AC3 in the MOE and the pathogenesis of depression.\\n\\n\\nMETHODS\\nWe obtained anosmic mice by intranasal perfusion of zinc sulphate (ZnSO4) (ZnSO4 mice), and distinctively knocked down AC3 in the MOE (AC3KD/MOE mice) by CRISPR/cas9 technology. Behavioural tests related to depression and anxiety were employed to evaluate the depression- and anxiety-like behaviours of mice. The mRNA and protein expressions of tyrosine hydroxylase (TH), dopamine receptors (Drds), and N-Methyl D-aspartate receptor subunit 2B (GluN2B) in the hippocampus of mice were investigated by qPCR and western blotting to explore the mechanism of depression and anxiety caused by AC3 in the MOE, preliminarily.\\n\\n\\nRESULTS\\nCompared with NaCl mice, ZnSO4 mice exhibited depression-like behaviours in tail suspension tests (TST), forced swimming tests, and social (FST) interaction tests (SIT), but showed no anxiety-like behaviours in anxiety-related behavioural tests. The mRNA and protein expressions of Drd3 and GluN2B in the hippocampus of ZnSO4 mice were significantly downregulated. Compared with the negative control mice (NC mice), AC3KD / MOE mice showed depression-like behaviours in TST, FST, and SIT tests, anxiety-like behaviours in light/dark transition test, elevated-plus maze test, and novelty-suppressed feeding test. The protein expressions of Drd3, TH, and GluN2B were significantly downregulated in the hippocampus.\\n\\n\\nLIMITATIONS\\nWe did not further demonstrate that AC3 in the MOE causes depression through the dopaminergic nervous system with dopamine or dopamine receptor agonists.\\n\\n\\nCONCLUSIONS\\nOur data demonstrate that intranasal infusion of ZnSO4 can cause depression-like behaviours and has no effect on anxiety-like behaviours. Specific knockdown of AC3 in the MOE can cause depression-like and anxiety-like behaviours. The behavioural changes caused by intranasal ZnSO4 and specific knockdown of AC3 in the MOE can be related to the significant downregulation of dopaminergic system and GluN2B expressions in the hippocampus of mice.\"}, {\"paperId\": \"00204365a852c123cfbff85363782b9bd8791857\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-1882\", \"CorpusId\": 249727867}, \"title\": \"Abstract 1882: Passenger gene co-amplification leads to collateral vulnerabilities in cancer\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-1882?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-1882, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"66469595\", \"name\": \"Yi Bei\"}, {\"authorId\": \"40183210\", \"name\": \"Marieluise Kirchner\"}, {\"authorId\": \"2139900222\", \"name\": \"Luca Bram\\u00e8\"}, {\"authorId\": \"1401400421\", \"name\": \"R. Fritsche-Guenther\"}, {\"authorId\": \"2170615492\", \"name\": \"Julia Koeppke\"}, {\"authorId\": \"1435297910\", \"name\": \"A. Heeren-Hagemann\"}, {\"authorId\": \"2269639384\", \"name\": \"Philipp Mertins\"}, {\"authorId\": \"2086275720\", \"name\": \"Jan D\\u00f6rr\"}, {\"authorId\": \"5875242\", \"name\": \"A. Henssen\"}], \"abstract\": \"\\n The activation of oncogenes via genomic amplification is a hallmark of the cancer genomes, yet such amplifications frequently also encompass neighboring genes. Such passenger genes are involved in essential cellular activities. We hypothesized that co-amplification of passenger genes create cancer-specific collateral therapeutic vulnerabilities. To test this, we analyzed one of the most commonly amplified gene locus near MYCN, which is amplified in nearly 25% of neuroblastoma and around 5% of all cancers. We observed that DDX1, a DEAD-Box helicase, is the most frequently co-amplified passenger gene in MYCN-amplified cancers. Using CRISPR/Cas9 loss-of-function screen results from the Cancer Dependency Map across 739 human cancer cell lines, we reveal that cells with DDX1 co-amplification are highly dependent on the mTOR complex 1(mTORC1). Mechanistically, western blot and immunoprecipitation analyses shows that DDX1 expression leads to higher mTORC1 pathway activity through the interaction between DDX1 and alpha-ketoglutarate dehydrogenase(alpha-KGDH) in mitochondria. DDX1 hijacks alpha-KGDH complex, thereby impairing the function of the Krebs cycle by interfering with the conversion of alpha-ketoglutarate to succinyl-coA. Live cell metabolomics shows accumulated alpha-ketoglutarate in turn activates mTORC1 pathway to promote the ATP production via oxidative phosphorylation(OXPHOS) to maintain cell survival. Consequently, interference with mTORC1 function reduced ATP production and led to accumulated alpha-KG leading to cell death, specifically in DDX1 expressing cells. This suggests that co-amplification of a passenger gene can result in collateral vulnerabilities in cancers, which has the potential to transform future therapeutic target discovery in oncology.\\n Citation Format: Yi Bei, Marieluise Kirchner, Luca Brame, Raphaela Fritsche-Guenther, Julia Koeppke, Anja Heeren-Hagemann, Philipp Mertins, Jan D\\u00f6rr, Anton George Henssen. Passenger gene co-amplification leads to collateral vulnerabilities in cancer [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 1882.\"}, {\"paperId\": \"0022d5a1dcbe7db7f0bd9b012fe358d45973badd\", \"externalIds\": {\"DOI\": \"10.60087/jklst.v3.n4.p11\", \"CorpusId\": 271535595}, \"title\": \"Precision Gene Editing Strategies with CRISPR-Cas9 for Advancing Cancer Immunotherapy and Alzheimer's Disease\", \"venue\": \"Online (Weston, Conn.)\", \"year\": 2024, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jklst.org/index.php/home/article/download/225/195\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.60087/jklst.v3.n4.p11?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.60087/jklst.v3.n4.p11, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2313656724\", \"name\": \"Priyanka Gupte\"}, {\"authorId\": \"2311270769\", \"name\": \"Karan Dhingra\"}, {\"authorId\": \"2346868285\", \"name\": \"Saloni\"}], \"abstract\": \"Precision medicine approaches such as gene editing via clustered regularly interspaced short palindromic repeat (CRISPR) and their associated protein (Cas-9) are revolutionizing treatment strategies for complex diseases such as Alzheimer and cancer. In this review, we explore the application of CRISPR-Cas9 in advancing therapies for these conditions, as well as its potential in targeting senescent cells. Since the risk of Alzheimer\\u2019s disease is strongly associated with genetic mutations and variations, the use of gene editing technologies to rectify these genetic errors by modifying disease-associated proteins becomes relevant. For cancer, to enhance immunotherapy approaches, modification of immune cells have been utilized to improve their anti-tumor efficacy. Additionally, the review also investigates the role of CRISPR-Cas9 in targeting senescent cells, which are implicated in both aging-related disorders and cancer progression. While challenges remain in introducing delivery methods and specificity, CRISPR-Cas9 represents a significant advancement in developing targeted, personalized treatments for these challenging health issues.\"}, {\"paperId\": \"0026789e1be7d1c8ace9a9f336b818e0490024e1\", \"externalIds\": {\"DOI\": \"10.54097/ns9kpx27\", \"CorpusId\": 271474788}, \"title\": \"Application of CRISPR Technology in the Treatment of Phenylketonuria\", \"venue\": \"Highlights in Science Engineering and Technology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.54097/ns9kpx27?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.54097/ns9kpx27, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2266223688\", \"name\": \"Bin Liu\"}], \"abstract\": \"Phenylketonuria (PKU) is an autosomal recessive disorder caused by a pathogenic variant of the phenylalanine hydroxylase (PAH) gene. The pathogenic mechanism involves mutations in the PAH gene leading to the accumulation of phenylalanine (Phe) in the blood to neurotoxic levels, preventing patients from metabolizing phenylalanine normally and thereby affecting the development of the nervous system. Traditional treatment methods primarily consist of adhering to a strict low-phenylalanine diet to reduce the intake of phenylalanine from food, or employing gene therapy techniques to repair or replace the defective PAH gene. The emergence of CRISPR technology in recent years has opened new possibilities for treating genetic diseases, including PKU, especially in gene correction and disease model creation. Gene editing techniques, exemplified by CRISPR-Cas9, theoretically enable the direct modification or repair of defective PAH genes at the DNA level, and this approach holds promise for achieving more precise and permanent genetic repairs. This research begins by introducing the pathogenic mechanism of PKU from a genetic perspective, from the structure to the function of the PAH gene, analyzing the defects caused by its mutations, then discusses the potential of gene therapy using CRISPR technology to correct PAH gene mutations, highlighting new techniques such as prime editing and base editing. This research aims to summarize the current state of CRISPR technology applications in treating PKU, cataloging and evaluating various methods. It introduces new considerations based on existing research and looks forward to future research directions, thereby offering new potential treatments for PKU.\"}, {\"paperId\": \"002804cb480fde12e52d74512a5207e2cf8b89d6\", \"externalIds\": {\"MAG\": \"3092407864\", \"DOI\": \"10.1101/2020.10.09.334060\", \"CorpusId\": 222349197}, \"title\": \"Bio-Orthogonal Chemistry Enables Solid Phase Synthesis of Long RNA Oligonucleotides\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/10/10/2020.10.09.334060.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.10.09.334060?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.10.09.334060, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"16144500\", \"name\": \"M. He\"}, {\"authorId\": \"12177232\", \"name\": \"Xunshen Wu\"}, {\"authorId\": \"8879487\", \"name\": \"P. Haruehanroengra\"}, {\"authorId\": \"144758126\", \"name\": \"I. Khan\"}, {\"authorId\": \"1834117\", \"name\": \"J. Sheng\"}, {\"authorId\": \"4318299\", \"name\": \"M. Royzen\"}], \"abstract\": \"Solid phase synthesis of RNA oligonucleotides which are over 100-nt in length remains to be challenging due to the complexity of purification of the target strands from the failure sequences. This work describes a non-chromatographic strategy that will enable routine solid phase synthesis of long RNA strands. The optimized five-step process is based on bio-orthogonal inverse electron demand Diels-Alder chemistry between trans-cyclooctene (TCO) and tetrazine (Tz) and entails solid phase synthesis of RNA on a photo-labile support. The target oligonucleotide strands are selectively tagged with Tz. After photocleavage from the solid support, the target oligonucleotide strands can be captured and purified from the failure sequences using immobilized TCO. The approach was optimized using a model 20-mer DNA strand and was successfully applied towards synthesis of 76-nt long tRNA and 101-nt long sgRNA. Purity of the isolated oligonucleotides was evaluated using gel electrophoresis and mass spectrometry, while functional fidelity of the sgRNA was confirmed using CRISPR-Cas9 experiments and flow cytometry.\"}, {\"paperId\": \"002b3551d3a38fa0f3a1a5d73b9d36328c0d5acb\", \"externalIds\": {\"MAG\": \"3003767218\", \"DOI\": \"10.1007/978-1-0716-0290-4_26\", \"CorpusId\": 210998648, \"PubMed\": \"32006417\"}, \"title\": \"Gene Knockout in Hematopoietic Stem and Progenitor Cells Followed by Granulocytic Differentiation.\", \"venue\": \"Methods in molecular biology\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-0290-4_26?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-0290-4_26, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35090625\", \"name\": \"P. Mir\"}, {\"authorId\": \"152432599\", \"name\": \"M. Ritter\"}, {\"authorId\": \"144353201\", \"name\": \"K. Welte\"}, {\"authorId\": \"3781002\", \"name\": \"J. Skokowa\"}, {\"authorId\": \"10673152\", \"name\": \"M. Klimiankou\"}], \"abstract\": null}, {\"paperId\": \"002bb1ee072180c9c5b6f4950fef71dc4f75a460\", \"externalIds\": {\"DOI\": \"10.1038/s41684-023-01150-z\", \"CorpusId\": 210954459, \"PubMed\": \"33911251\"}, \"title\": \"A new software for USV analysis\", \"venue\": \"Lab animal\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41684-023-01150-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41684-023-01150-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51076346\", \"name\": \"Alexandra Le Bras\"}], \"abstract\": null}, {\"paperId\": \"0032d677f1057ca65685c2bf56cf15ee96b4f0fa\", \"externalIds\": {\"DOI\": \"10.1101/2024.01.31.578273\", \"CorpusId\": 267407009, \"PubMed\": \"38352594\"}, \"title\": \"Sexually Dimorphic Influence of Circadian Pacemaker Neurons on Behavioral Rhythms\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10862788\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.01.31.578273?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.01.31.578273, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2189531145\", \"name\": \"A. Iyer\"}, {\"authorId\": \"2282475345\", \"name\": \"Eva Scholz-Carlson\"}, {\"authorId\": \"2047569169\", \"name\": \"E. Bell\"}, {\"authorId\": \"2264984141\", \"name\": \"Grace Biondi\"}, {\"authorId\": \"4064640\", \"name\": \"Shlesha Richhariya\"}, {\"authorId\": \"2282500981\", \"name\": \"Maria P. Fernandez\"}], \"abstract\": null}, {\"paperId\": \"00369832e235452e7d558f52332403f4abaea269\", \"externalIds\": {\"PubMedCentral\": \"11091208\", \"DOI\": \"10.1038/s41598-024-61430-7\", \"CorpusId\": 266873765, \"PubMed\": \"38740871\"}, \"title\": \"Cell type specific long non-coding RNA targets identified by integrative analysis of single-cell and bulk colorectal cancer transcriptomes\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-024-61430-7.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11091208, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2238202641\", \"name\": \"Ante Mihaljevic\"}, {\"authorId\": \"2162349453\", \"name\": \"Philip D Rubin\"}, {\"authorId\": \"8612760\", \"name\": \"P. Chouvardas\"}, {\"authorId\": \"2218936898\", \"name\": \"Roberta Esposito\"}], \"abstract\": \"Long non-coding RNAs (lncRNAs) represent an emerging class of genes which play significant and diverse roles in human cancers. Nevertheless, the functional repertoires of lncRNAs in cancer cell subtypes remains unknown since most studies are focused on protein coding genes. Here, we explored the contribution of lncRNAs in Colorectal Cancer (CRC) heterogeneity. We analyzed 49,436 single-cells from 29 CRC patients and showed that lncRNAs are significantly more cell type specific compared to protein-coding genes. We identified 996 lncRNAs strongly enriched in epithelial cells. Among these, 98 were found to be differentially expressed in tumor samples compared to normal controls, when integrating 270 bulk CRC profiles. We validated the upregulation of two of them (CASC19 and LINC00460) in CRC cell lines and showed their involvement in CRC proliferation by CRISPR-Cas9 knock down experiments. This study highlights a list of novel RNA targets for potential CRC therapeutics, substantiated through experimental validation.\"}, {\"paperId\": \"0036d4cbfac9c1c837872b887b3e7349149831f2\", \"externalIds\": {\"DOI\": \"10.1007/s13258-021-01091-2\", \"CorpusId\": 233279455, \"PubMed\": \"33864616\"}, \"title\": \"Drosophila NSD deletion induces developmental anomalies similar to those seen in Sotos syndrome 1 patients\", \"venue\": \"Genes & Genomics\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s13258-021-01091-2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s13258-021-01091-2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35690821\", \"name\": \"Saeyan Choi\"}, {\"authorId\": \"115054025\", \"name\": \"Bokyeong Song\"}, {\"authorId\": \"6115432\", \"name\": \"Hyewon Shin\"}, {\"authorId\": \"1748840693\", \"name\": \"Chihyun Won\"}, {\"authorId\": \"2135397652\", \"name\": \"Taejoon Kim\"}, {\"authorId\": \"50668036\", \"name\": \"H. Yoshida\"}, {\"authorId\": \"2115417800\", \"name\": \"Daewon Lee\"}, {\"authorId\": \"2234666829\", \"name\": \"Jongkyeong Chung\"}, {\"authorId\": \"2642206\", \"name\": \"K. Cho\"}, {\"authorId\": \"4478354\", \"name\": \"Im-Soon Lee\"}], \"abstract\": null}, {\"paperId\": \"0036ffe7dc0674bc6d2521b745f740f59ab9276f\", \"externalIds\": {\"MAG\": \"3165361940\", \"PubMedCentral\": \"8550517\", \"DOI\": \"10.1007/s11240-021-02103-5\", \"CorpusId\": 236379794, \"PubMed\": \"34776565\"}, \"title\": \"First genome edited poinsettias: targeted mutagenesis of flavonoid 3\\u2032-hydroxylase using CRISPR/Cas9 results in a colour shift\", \"venue\": \"Plant Cell Tissue and Organ Culture\", \"year\": 2021, \"citationCount\": 36, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s11240-021-02103-5.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8550517, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35567533\", \"name\": \"Daria Nitarska\"}, {\"authorId\": \"48697579\", \"name\": \"R. Boehm\"}, {\"authorId\": \"3564302\", \"name\": \"T. Debener\"}, {\"authorId\": \"35588951\", \"name\": \"Rares Lucaciu\"}, {\"authorId\": \"6436234\", \"name\": \"H. Halbwirth\"}], \"abstract\": \"The CRISPR/Cas9 system is a remarkably promising tool for targeted gene mutagenesis, and becoming ever more popular for modification of ornamental plants. In this study we performed the knockout of flavonoid 3\\u2032-hydroxylase (F3\\u2032H) with application of CRISPR/Cas9 in the red flowering poinsettia (Euphorbia pulcherrima) cultivar \\u2018Christmas Eve\\u2019, in order to obtain plants with orange bract colour, which accumulate prevalently pelargonidin. F3\\u2032H is an enzyme that is necessary for formation of cyanidin type anthocyanins, which are responsible for the red colour of poinsettia bracts. Even though F3\\u2032H was not completely inactivated, the bract colour of transgenic plants changed from vivid red (RHS 45B) to vivid reddish orange (RHS 33A), and cyanidin levels decreased significantly compared with the wild type. In the genetically modified plants, an increased ratio of pelargonidin to cyanidin was observed. By cloning and expression of mutated proteins, the lack of F3\\u2032H activity was confirmed. This confirms that a loss of function mutation in the poinsettia F3\\u2032H gene is sufficient for obtaining poinsettia with orange bract colour. This is the first report of successful use of CRISPR/Cas9 for genome editing in poinsettia. Genome edited poinsettia plants show loss-of-function mutations in the F3\\u2019H gene introduced by CRISPR/Cas9. This is sufficient to change the bract colour from red to reddish orange.\"}, {\"paperId\": \"003747fa69d3b926ed443b0ea5742ff25cdb2b8c\", \"externalIds\": {\"MAG\": \"3084428262\", \"DOI\": \"10.1161/hyp.76.suppl_1.p122\", \"CorpusId\": 225327110}, \"title\": \"Abstract P122: Lanosterol Synthase (LSS) Gene As Predictor Of Kidney Dysfunction In Hypertensive Patients\", \"venue\": \"HYPERTENSION\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/hyp.76.suppl_1.p122?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/hyp.76.suppl_1.p122, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5386648\", \"name\": \"M. Simonini\"}, {\"authorId\": \"89841832\", \"name\": \"Sipontina Faienza\"}, {\"authorId\": \"32107666\", \"name\": \"C. Maggioni\"}, {\"authorId\": \"5076047\", \"name\": \"L. Citterio\"}, {\"authorId\": \"3240860\", \"name\": \"E. Salvi\"}, {\"authorId\": \"5524479\", \"name\": \"C. Lanzani\"}, {\"authorId\": \"5177849\", \"name\": \"E. Messaggio\"}, {\"authorId\": \"66969933\", \"name\": \"S. Fontana\"}, {\"authorId\": \"49256585\", \"name\": \"D. Cusi\"}, {\"authorId\": \"2742713\", \"name\": \"P. Manunta\"}], \"abstract\": \"Recently we have proposed LSS as genotype-based risk stratification to predict accelerated eGFR decay in a prospective cohort study of essential HYP patients. We extract clinical data of a general population from HYPERGENES consortium. We also collect genetic data for LSS polymorphism that was already demonstrated as involved in kidney damage. A cohort of 3137 patients were selected. At different age, as expected, HYP status have a deep impact on eGFR. Indeed in young (age < 50ys) eGFR is higher in HYP vs control (86.2 \\u00b1 19.3 vs 82.7 \\u00b1 16.3 ml/min; p=0.04); vice-versa in elder (age > 65ys) HYP have a reduction in eGFR (55.7 \\u00b1 12.9 vs 71.0 \\u00b1 12.9 ml/min; p<0.001) and higher incidence of severe CKD (2.7% vs 0.1%; p=0.001). We do not observe a direct influence of LSS polymorphism of eGFR. When LSS is considered according to HYP status and age class it is possible to observe a preservation of age-associated eGFR reduction in normotensive patients (eGFR 91.4 vs 90.1 vs 81.8 at age classes for LSS risk allele); on the other side, LSS seems to enhance eGFR reduction associate to HYP status (eGFR 84.6 vs 75.6 vs 48.0 for LSS risk allele; p=0.032 after correction for covariates; see table for details and figure 1). Furthermore, our genomics lab just developed a LSS V642L Knock-in mouse model by CRISPR-Cas9 technique. The sequencing analysis confirmed the correct insertion of 643L mutation for both alleles in mice gene. The 642L LSS Knock-in mice at 1 month of age were viable, healthy and indistinguishable from the WT counterpart\\n \\n Conclusion:\\n Patients caring the risk allele of this specific LSS polymorphism seems to express hyper-filtration if compared to their counterparts.\\n \\n \\n \\n\"}, {\"paperId\": \"0038f8d5f6cd2cb21635678d8d5256e4618ea8ab\", \"externalIds\": {\"DOI\": \"10.1016/j.ijbiomac.2024.138904\", \"CorpusId\": 274863180, \"PubMed\": \"39706434\"}, \"title\": \"Efficient promoter editing of the SBEIIb gene enables fine-tuning of the resistant starch content in rice.\", \"venue\": \"International Journal of Biological Macromolecules\", \"year\": 2024, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijbiomac.2024.138904?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijbiomac.2024.138904, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2256755664\", \"name\": \"Shifei Sang\"}, {\"authorId\": \"2292217580\", \"name\": \"Xiaohan Sun\"}, {\"authorId\": \"2292152504\", \"name\": \"Tengyun Ma\"}, {\"authorId\": \"2292208605\", \"name\": \"Yijing Zhang\"}, {\"authorId\": \"2292104763\", \"name\": \"Guoqin Yao\"}, {\"authorId\": \"2390341135\", \"name\": \"Xinyu Wang\"}, {\"authorId\": \"2292340236\", \"name\": \"Xiaoyu Tan\"}, {\"authorId\": \"2278678313\", \"name\": \"Liuchun Feng\"}, {\"authorId\": \"2274814053\", \"name\": \"Junhua Li\"}, {\"authorId\": \"2256755356\", \"name\": \"Shengdong Ji\"}, {\"authorId\": \"2336256580\", \"name\": \"Hongtao Cheng\"}], \"abstract\": \"Rice, a staple in diets, undergoes digestion post-consumption, often triggering a swift surge in blood sugar among diabetics, intensifying their health burden. Notably, resistant starch (RS) emerges as a potent ally in fostering satiety and mitigating metabolic syndrome in diabetes. The SBEIIb gene, a key orchestrator of starch branching enzymes, plays a pivotal role in starch synthesis, and its genetic alteration can dramatically boost RS content in rice. Cultivating RS-rich functional germplasms is of great significance for improving human nutrition and health. In this study, the application of CRISPR/Cas9 technology was investigated for precise multi-target editing within the SBEIIb promoter, aiming to generate valuable germplasm resources enriched with RS. The results revealed extensive mutations in the SBEIIb promoter region, resulting in a varied reduction in SBEIIb expression levels. Remarkably, the grains from the homozygous T1 mutant lines displayed a substantial elevation in RS content, ranging from 3 to 12 times greater than that of the wild-type, accompanied by notable alterations in the starch granule morphology of these grains. This study presents an effective breeding strategy for the precise enhancement of RS content and establishes a foundation for further insights into the molecular mechanisms governing cis-element regulation of RS synthesis.\"}, {\"paperId\": \"003ee8f5a6e2f8c601f0965546d97da15c13b096\", \"externalIds\": {\"PubMedCentral\": \"11129639\", \"DOI\": \"10.3389/fbioe.2024.1396405\", \"CorpusId\": 269811527, \"PubMed\": \"38803845\"}, \"title\": \"Designing molecules: directing stem cell differentiation\", \"venue\": \"Frontiers in Bioengineering and Biotechnology\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fbioe.2024.1396405/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11129639, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2189451106\", \"name\": \"Kalaiselvaan Thanaskody\"}, {\"authorId\": \"2301666195\", \"name\": \"Fajriyah Nur Natashah\"}, {\"authorId\": \"40657516\", \"name\": \"F. Nordin\"}, {\"authorId\": \"2301663655\", \"name\": \"Wan Safwani Wan Kamarul Zaman\"}, {\"authorId\": \"5331097\", \"name\": \"G. Tye\"}], \"abstract\": \"Stem cells have been widely applied in regenerative and therapeutic medicine for their unique regenerative properties. Although much research has shown their potential, it remains tricky in directing stem cell differentiation. The advancement of genetic and therapeutic technologies, however, has facilitated this issue through development of design molecules. These molecules are designed to overcome the drawbacks previously faced, such as unexpected differentiation outcomes and insufficient migration of endogenous or exogenous MSCs. Here, we introduced aptamer, bacteriophage, and biological vectors as design molecules and described their characteristics. The methods of designing/developing discussed include various Systematic Evolution of Ligands by Exponential Enrichment (SELEX) procedures, in silico approaches, and non-SELEX methods for aptamers, and genetic engineering methods such as homologous recombination, Bacteriophage Recombineering of Electroporated DNA (BRED), Bacteriophage Recombineering with Infectious Particles (BRIP), and genome rebooting for bacteriophage. For biological vectors, methods such as alternate splicing, multiple promoters, internal ribosomal entry site, CRISPR-Cas9 system and Cre recombinase mediated recombination were used to design viral vectors, while non-viral vectors like exosomes are generated through parental cell-based direct engineering. Besides that, we also discussed the pros and cons, and applications of each design molecule in directing stem cell differentiation to illustrate their great potential in stem cells research. Finally, we highlighted some safety and efficacy concerns to be considered for future studies.\"}, {\"paperId\": \"003f2ff3cf452b90e6d3efe396e8fac77a724fed\", \"externalIds\": {\"DOI\": \"10.1007/s10725-022-00869-y\", \"CorpusId\": 250392386}, \"title\": \"CRISPR/Cas9 knock-out of SlPHD_MS1 (Solyc04g008420) gene results in complete male sterility in tomato\", \"venue\": \"Plant growth regulation (Print)\", \"year\": 2022, \"citationCount\": 14, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10725-022-00869-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10725-022-00869-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40277054\", \"name\": \"G\\u00f6khan G\\u00f6kdemir\"}, {\"authorId\": \"88906605\", \"name\": \"Zafer Se\\u00e7gin\"}, {\"authorId\": \"50844410\", \"name\": \"S. Uluisik\"}, {\"authorId\": \"3789805\", \"name\": \"M. Kavas\"}], \"abstract\": null}, {\"paperId\": \"003f363105ba8f1e607bbcc1db3ca28372601441\", \"externalIds\": {\"PubMedCentral\": \"8946017\", \"DOI\": \"10.3390/cells11060951\", \"CorpusId\": 247400263, \"PubMed\": \"35326403\"}, \"title\": \"Optogenetic Control of Engrafted Human Induced Pluripotent Stem Cell-Derived Cardiomyocytes in Live Mice: A Proof-of-Concept Study\", \"venue\": \"Cells\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/11/6/951/pdf?version=1646914520\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8946017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39437415\", \"name\": \"Jyotsna Joshi\"}, {\"authorId\": \"2135845214\", \"name\": \"B. Xu\"}, {\"authorId\": \"4829918\", \"name\": \"M. Rubart\"}, {\"authorId\": \"152449099\", \"name\": \"Yun Chang\"}, {\"authorId\": \"89920462\", \"name\": \"Xiaoping Bao\"}, {\"authorId\": \"6302606\", \"name\": \"H. Chaliki\"}, {\"authorId\": \"2377996972\", \"name\": \"Luis Scott\"}, {\"authorId\": \"40392219\", \"name\": \"Wuqiang Zhu\"}], \"abstract\": \"Background: Cellular transplantation has emerged as promising approach for treating cardiac diseases. However, a poor engraftment rate limits our understanding on how transplanted cardiomyocytes contribute to cardiac function in the recipient\\u2019s heart. Methods: The CRISPR/Cas9 technique was employed for stable and constitutive gene expression in human-induced pluripotent stem-cell-derived cardiomyocytes (hiPSC-CMs). Myocardial infarction was induced in adult immunodeficient mice, followed by intramyocardial injection of hiPSC-CMs expressing either CCND2/channelrhodopsin 2 (hiPSC-CCND2OE/ChR2OECMs) or CCND2/luciferase (hiPSC-CCND2OE/LuciOECMs). Six months later, hemodynamics and intramural electrocardiogram were recorded upon blue light illuminations in anesthetized, open-chest mice. Results: Blue light resets automaticity of spontaneously beating hiPSC-CCND2OE/ChR2OECMs in culture, but not that of hiPSC-CCND2OE/LuciOECMs. Response to blue light was also observed in mice carrying large (>106 cells) intracardiac grafts of hiPSC-CCND2OE/ChR2OECM but not in mice carrying hiPSC-CCND2OE/LuciOECMs. The former exhibited single premature ventricular contractions upon light illumination or ventricular quadrigeminy upon second-long illuminations. At the onset of premature ventricular contractions, maximal systolic ventricular pressure decreased while ventricular volume rose concomitantly. Light-induced changes reversed upon resumption of sinus rhythm. Conclusions: We established an in vivo model for optogenetic-based modulation of the excitability of donor cardiomyocytes in a functional, reversible, and localized manner. This approach holds unique value for studying electromechanical coupling and molecular interactions between donor cardiomyocytes and recipient hearts in live animals.\"}, {\"paperId\": \"0040cd0a1010ad9f2809f38bfc31b18188d99f36\", \"externalIds\": {\"PubMedCentral\": \"9977466\", \"DOI\": \"10.1016/j.trac.2023.117000\", \"CorpusId\": 257258308, \"PubMed\": \"36937152\"}, \"title\": \"CRISPR techniques and potential for the detection and discrimination of SARS-CoV-2 variants of concern\", \"venue\": \"Trends in analytical chemistry : TRAC\", \"year\": 2023, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.trac.2023.117000\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9977466, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1893431811\", \"name\": \"Huyan Xiao\"}, {\"authorId\": \"2152179588\", \"name\": \"Jianyu Hu\"}, {\"authorId\": \"2210306920\", \"name\": \"Camille Huang\"}, {\"authorId\": \"2028903954\", \"name\": \"Wei Feng\"}, {\"authorId\": \"145494778\", \"name\": \"Yanming Liu\"}, {\"authorId\": \"2006782423\", \"name\": \"Teresa Kumblathan\"}, {\"authorId\": \"21657985\", \"name\": \"Jeffrey Tao\"}, {\"authorId\": \"46372233\", \"name\": \"Jingyang Xu\"}, {\"authorId\": \"30679433\", \"name\": \"X. Le\"}, {\"authorId\": \"2108819333\", \"name\": \"Hongquan Zhang\"}], \"abstract\": \"The continuing evolution of the SARS-CoV-2 virus has led to the emergence of many variants, including variants of concern (VOCs). CRISPR-Cas systems have been used to develop techniques for the detection of variants. These techniques have focused on the detection of variant-specific mutations in the spike protein gene of SARS-CoV-2. These sequences mostly carry single-nucleotide mutations and are difficult to differentiate using a single CRISPR-based assay. Here we discuss the specificity of the Cas9, Cas12, and Cas13 systems, important considerations of mutation sites, design of guide RNA, and recent progress in CRISPR-based assays for SARS-CoV-2 variants. Strategies for discriminating single-nucleotide mutations include optimizing the position of mismatches, modifying nucleotides in the guide RNA, and using two guide RNAs to recognize the specific mutation sequence and a conservative sequence. Further research is needed to confront challenges in the detection and differentiation of variants and sublineages of SARS-CoV-2 in clinical diagnostic and point-of-care applications.\"}, {\"paperId\": \"004155ad227d7fca86164df695a57ba0e596fad3\", \"externalIds\": {\"PubMedCentral\": \"11593773\", \"DOI\": \"10.3390/genes15111492\", \"CorpusId\": 274194207, \"PubMed\": \"39596692\"}, \"title\": \"Application of CRISPR/Cas9 Technology in Rice Germplasm Innovation and Genetic Improvement\", \"venue\": \"Genes\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4425/15/11/1492/pdf?version=1732120853\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11593773, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2332058273\", \"name\": \"Jijin Chen\"}, {\"authorId\": \"2331881255\", \"name\": \"Zhening Miao\"}, {\"authorId\": \"50371969\", \"name\": \"Deyan Kong\"}, {\"authorId\": \"49425416\", \"name\": \"A. Zhang\"}, {\"authorId\": \"49451362\", \"name\": \"Feiming Wang\"}, {\"authorId\": \"12078347\", \"name\": \"Guolan Liu\"}, {\"authorId\": \"47166271\", \"name\": \"Xinqiao Yu\"}, {\"authorId\": \"2259683862\", \"name\": \"Lijun Luo\"}, {\"authorId\": \"2153629572\", \"name\": \"Yi Liu\"}], \"abstract\": \"Improving the efficiency of germplasm innovation has always been the aim of rice breeders. Traditional hybrid breeding methods for variety selection rarely meet the practical needs of rice production. The emergence of genome-editing technologies, such as CRISPR/Cas9, provides a new approach to the genetic improvement of crops such as rice. The number of published scientific papers related to \\u201cgene editing\\u201d and \\u201cCRISPR/Cas9\\u201d retrievable on websites both from China and other countries exhibited an increasing trend, year by year, from 2014 to 2023. Research related to gene editing in rice accounts for 33.4% and 12.3% of all the literature on gene editing published in China and other countries, respectively, much higher than that on maize and wheat. This article reviews recent research on CRISPR/Cas9 gene-editing technology in rice, especially germplasm innovation and genetic improvement of commercially promoted varieties with improved traits such as disease, insect, and herbicide resistance, salt tolerance, quality, nutrition, and safety. The aim is to provide a reference for the precise and efficient development of new rice cultivars that meet market demand.\"}, {\"paperId\": \"00426a264f1be6b643dc213a2d88df0245b270d3\", \"externalIds\": {\"MAG\": \"2991493373\", \"PubMedCentral\": \"7040357\", \"DOI\": \"10.3389/fneur.2019.01311\", \"CorpusId\": 211133510, \"PubMed\": \"32132961\"}, \"title\": \"CRISPR/Cas9-Induced Loss of Keap1 Enhances Anti-oxidation in Rat Adipose-Derived Mesenchymal Stem Cells\", \"venue\": \"Frontiers in Neurology\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fneur.2019.01311/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7040357, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49994564\", \"name\": \"Yiling Hu\"}, {\"authorId\": \"2108215956\", \"name\": \"Shu-bao Liu\"}, {\"authorId\": \"144946440\", \"name\": \"B. Zhu\"}], \"abstract\": \"Stem cells have become a powerful tool in the treatment of many diseases owing to their regenerative ability and rapid promotion of development in regenerative medicine such as in traumatic brain injury. However, the high level of oxidant micro-environment in lesion region leads to more than 99% cells into death. In this study, we used genetic methods to edit Keap1 gene in mesenchymal stem cells, we and observed their antioxidative ability. First, we disturbed the start codon and the 376th amino acid codon of Keap1 in adipose-derived mesenchymal stem cells (Ad-MSCs) with CRISPR/Cas9, respectively, to release Nrf2 from the binding of Keap1. As a result, Nrf2 was activated and localized into nuclei and regulated cellular anti-oxidation. We observed that the cells lacking Keap1 ATG codon showed obvious nuclear localization of Nrf2. Besides lower expression of Bax-1 and lower content of malondialdehyde (MDA) were detected after H2O2 treatment, we also found higher expression of Bcl-2 in Keap1 ATG codon knock-out cells, whereas a higher expression of PCNA was observed only in the Keap1 376th codon-edited cells, whose Bax-1 expression was lower than that in the control cells. Our study revealed that loss of Keap1 resulted in anti-oxidative ability in Ad-MSCs, suggesting that our strategy can hopefully increase the viability of mesenchymal stem cells after grafting. This study is also a frontier exploration to the application of CRISPR/Cas9 in Ad-MSCs.\"}, {\"paperId\": \"00470a07c67dd954e678d79d1cebfc66f906e052\", \"externalIds\": {\"MAG\": \"2997970661\", \"DOI\": \"10.1101/2020.01.01.892521\", \"CorpusId\": 214156122, \"PubMed\": \"32843575\"}, \"title\": \"ACSL3 is a novel GABARAPL2 interactor that links ufmylation and lipid droplet biogenesis\", \"venue\": \"Journal of Cell Science\", \"year\": 2020, \"citationCount\": 24, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jcs.biologists.org/content/joces/133/18/jcs243477.full.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.01.01.892521?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.01.01.892521, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1909690797\", \"name\": \"Franziska Eck\"}, {\"authorId\": \"10729113\", \"name\": \"Santosh Phuyal\"}, {\"authorId\": \"144161868\", \"name\": \"Matthew D. Smith\"}, {\"authorId\": \"47324889\", \"name\": \"M. Kaulich\"}, {\"authorId\": \"143885885\", \"name\": \"S. Wilkinson\"}, {\"authorId\": \"46776008\", \"name\": \"H. Farhan\"}, {\"authorId\": \"6394460\", \"name\": \"C. Behrends\"}], \"abstract\": \"ABSTRACT While studies of the autophagy-related (ATG) genes in knockout models have led to an explosion of knowledge about the functions of autophagy components, the exact roles of LC3 and GABARAP family proteins (human ATG8 equivalents) are still poorly understood. A major drawback in understanding their roles is that the available interactome data has largely been acquired using overexpression systems. To overcome these limitations, we employed CRISPR/Cas9-based genome-editing to generate a panel of cells in which human ATG8 genes were tagged at their natural chromosomal locations with an N-terminal affinity epitope. This cellular resource was employed to map endogenous GABARAPL2 protein complexes using interaction proteomics. This approach identified the ER-associated protein and lipid droplet (LD) biogenesis factor ACSL3 as a stabilizing GABARAPL2-binding partner. GABARAPL2 bound ACSL3 in a manner dependent on its LC3-interacting regions, whose binding site in GABARAPL2 was required to recruit the latter to the ER. Through this interaction, the UFM1-activating enzyme UBA5 became anchored at the ER. Furthermore, ACSL3 depletion and LD induction affected the abundance of several ufmylation components and ER-phagy. Together these data allow us to define ACSL3 as a novel regulator of the enigmatic UFM1 conjugation pathway. Highlighted Article: Using endogenous tagging and interaction proteomics, we identified the ER-associated lipid droplet biogenesis factor ACSL3 as a GABARAPL2-binding partner that serves as novel regulator of the enigmatic UFM1 conjugation pathway.\"}, {\"paperId\": \"004bc1251a2e642ec5d00bbc9ab43dda709a6a45\", \"externalIds\": {\"DOI\": \"10.11648/j.ijgg.20241203.11\", \"CorpusId\": 271371228}, \"title\": \"CRISPR-Cas9 Gene Editing Therapy, a Curative Hope for Sickle Cell in Nigeria, West Africa\", \"venue\": \"International Journal of Genetics and Genomics\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://article.sciencepg.com/pdf/j.ijgg.20241203.11\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.11648/j.ijgg.20241203.11?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.11648/j.ijgg.20241203.11, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2312610986\", \"name\": \"B. Olowu\"}, {\"authorId\": \"2312608868\", \"name\": \"Ahmed Olaide\"}, {\"authorId\": \"2312608597\", \"name\": \"Oluwaloni Tinubu\"}], \"abstract\": \"Sickle cell anaemia is one of the haemoglobin abnormalities resulting from a genetic mutation\\u2014 it is caused by inheriting two faulty genes that result in an abnormal substitution of glutamate for valine on the beta chain of haemoglobin, which causes haemoglobin molecules to stick together. According to a World Health Organization (WHO) report, 20 out of every 1,000 births suffer from sickle-cell anaemia, and 24% of Nigerians are carriers of this mutant gene. Scientists have suggested several solutions, including stem cell transplantation and gene therapies, but these have faced opposition due to ethical beliefs, high cost, and the ensuing immune issues. Research is now centered on advancing genome editing techniques for gene therapy. Ongoing studies have proven that genetic differences can be corrected methodically by modifying the genome at specific sites instead of introducing a new copy of the affected gene into the cells; due to the effectiveness of this method, scientists are testing its applications in manipulating genes in various systems. This review correlates a few studies that used the recently developed technique\\u2014CRISPR-Cas9\\u2014as a novel approach to gene therapy, dissecting the different clinical studies about sickle cell origin to point out many of its ethical and medical limitations, the consequences of these limitations, and the advancements this technology has made possible.\\n\"}, {\"paperId\": \"0052eacde8d8aa5c6547bdb97feca91e0bfbbf0e\", \"externalIds\": {\"MAG\": \"3033006672\", \"DOI\": \"10.1016/j.ccell.2020.05.004\", \"CorpusId\": 219562658, \"PubMed\": \"32516591\"}, \"title\": \"Multi-phenotype CRISPR-Cas9 Screen Identifies p38 Kinase as a Target for Adoptive Immunotherapies.\", \"venue\": \"Cancer Cell\", \"year\": 2020, \"citationCount\": 139, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10323690\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ccell.2020.05.004?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ccell.2020.05.004, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5046417\", \"name\": \"Devikala Gurusamy\"}, {\"authorId\": \"4867894\", \"name\": \"A. Henning\"}, {\"authorId\": \"1662811159\", \"name\": \"Tori N. Yamamoto\"}, {\"authorId\": \"6837967\", \"name\": \"Zhiya Yu\"}, {\"authorId\": \"6061487\", \"name\": \"Nikolaos Zacharakis\"}, {\"authorId\": \"46903110\", \"name\": \"S. Krishna\"}, {\"authorId\": \"5801912\", \"name\": \"Rigel J. Kishton\"}, {\"authorId\": \"4045574\", \"name\": \"S. Vodnala\"}, {\"authorId\": \"22278759\", \"name\": \"A. Eidizadeh\"}, {\"authorId\": \"50493049\", \"name\": \"Li Jia\"}, {\"authorId\": \"51184797\", \"name\": \"C. Kariya\"}, {\"authorId\": \"8634522\", \"name\": \"Mary A. Black\"}, {\"authorId\": \"6982686\", \"name\": \"R. Eil\"}, {\"authorId\": \"2125089\", \"name\": \"D. Palmer\"}, {\"authorId\": \"7589180\", \"name\": \"J. Pan\"}, {\"authorId\": \"34878631\", \"name\": \"Madhusudhanan Sukumar\"}, {\"authorId\": \"5052367\", \"name\": \"Shashank J. Patel\"}, {\"authorId\": \"1925918\", \"name\": \"N. Restifo\"}], \"abstract\": \"T cells are central to all currently effective cancer immunotherapies, but the characteristics defining therapeutically effective anti-tumor T\\u00a0cells have not been comprehensively elucidated. Here, we delineate four phenotypic qualities of effective anti-tumor T\\u00a0cells: cell expansion, differentiation, oxidative stress, and genomic stress. Using a CRISPR-Cas9-based genetic screen of primary T\\u00a0cells we measured the multi-phenotypic impact of disrupting 25 T\\u00a0cell receptor-driven kinases. We identified p38 kinase as a central regulator of all four phenotypes and uncovered transcriptional and antioxidant pathways regulated by p38 in T\\u00a0cells. Pharmacological inhibition of p38 improved the efficacy of mouse anti-tumor T\\u00a0cells and enhanced the functionalities of human tumor-reactive and gene-engineered T\\u00a0cells, paving the way for clinically relevant interventions.\"}, {\"paperId\": \"005601620ab687095a17af7b99352d92e671b1b1\", \"externalIds\": {\"MAG\": \"3041289578\", \"PubMedCentral\": \"7397404\", \"DOI\": \"10.1016/j.omtm.2020.07.006\", \"CorpusId\": 221033924, \"PubMed\": \"32775497\"}, \"title\": \"Design and Testing of Vector-Producing HEK293T Cells Bearing a Genomic Deletion of the SV40 T Antigen Coding Region\", \"venue\": \"Molecular Therapy: Methods & Clinical Development\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2329050120301558/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7397404, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2366750756\", \"name\": \"D. H. Bae\"}, {\"authorId\": \"31956158\", \"name\": \"M. Marino\"}, {\"authorId\": \"8870884\", \"name\": \"B. Iaffaldano\"}, {\"authorId\": \"1860464139\", \"name\": \"Sydney Fenstermaker\"}, {\"authorId\": \"4385508\", \"name\": \"S. Afione\"}, {\"authorId\": \"6140085\", \"name\": \"Takele Argaw\"}, {\"authorId\": \"2141903802\", \"name\": \"Jacob McCright\"}, {\"authorId\": \"5032783\", \"name\": \"Anna R. Kwilas\"}, {\"authorId\": \"4860759\", \"name\": \"J. Chiorini\"}, {\"authorId\": \"150034780\", \"name\": \"Andrew E Timmons\"}, {\"authorId\": \"46560765\", \"name\": \"J. Reiser\"}], \"abstract\": \"The use of the human embryonic kidney (HEK) 293T cell line to manufacture vectors for in vivo applications raises safety concerns due to the presence of SV40 T antigen-encoding sequences. We used CRISPR-Cas9 genome editing to remove the SV40 T antigen-encoding sequences from HEK293T cells by transfecting them with a recombinant plasmid expressing Cas9 and two distinct single guide RNAs (sgRNAs) corresponding to the beginning and end of the T antigen coding region. Cell clones lacking T antigen-encoding sequences were identified using PCR. Whole-genome (WG) and targeted locus amplification (TLA) sequencing of the parental HEK293T cell line revealed multiple SV40 T antigen-encoding sequences replacing cellular sequences on chromosome 3. The putative T antigen null clones demonstrated a loss of sequence reads mapping to T antigen-encoding sequences. Western blot analysis of cell extracts prepared from the T antigen null clones confirmed that the SV40 large and small T antigen proteins were absent. Lentiviral vectors produced using the T antigen null clones exhibited titers up to 1.5 \\u00d7 107 transducing units (TU)/mL, while the titers obtained from the parent HEK293T cell line were up to 4 \\u00d7 107 TU/mL. The capacity of the T antigen-negative cells to produce high titer adeno-associated virus (AAV) vectors was also evaluated. The results obtained revealed that the lack of T antigen sequences did not impact AAV vector titers.\"}, {\"paperId\": \"0056ea1b369f6c1296566f3637dbf088c4895152\", \"externalIds\": {\"MAG\": \"3162161702\", \"DOI\": \"10.37506/MLU.V21I2.2878\", \"CorpusId\": 236754910}, \"title\": \"Contemporary Evolution in CRISPR\\u2013CAS9 System Technology and their Uses in Treatment of Human Common Diseases: A Review\", \"venue\": \"Medico-Legal Update\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ijop.net/index.php/mlu/article/download/2878/2505\", \"status\": \"HYBRID\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.37506/MLU.V21I2.2878?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.37506/MLU.V21I2.2878, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2404340433\", \"name\": \"Z. Mohammed\"}, {\"authorId\": \"1415360156\", \"name\": \"Wijdan Rajh Hamza Al-Kraity\"}], \"abstract\": \"Gene therapy has proven its potential in treatment of several human diseases. Most recent method in a longline of the genome-editing-techniques is called \\u201cA Clustered-Regularly-Interspaced-Short-PalindromicRepeat-associated-protein9\\u201d abbreviated as CRISPR-Cas9. The scientists and researcher have long soughtto the control, and modification the DNA that consider \\u201cthe code of life\\u201d. The CRISPR-Cas9technology isoffer very important improvements that differ about other gene-editing.technologies, it\\u2019s uncomplicated toapply & low-cost, also have comparatively high degree of the efficiency and precision . This technologyuses a \\u201c.ribonucleic acid.(RNA)-guided. Deoxyribonucleic. acid-DNA-endonuclease.\\u201d, Cas9, whichinduces double-strand breaks (DSBs) in the target site, the DSBs was repaired by the use of a variety ofcellular DNA-repair systems leading to changes in target sites, that technology have proven to be effectiveto investigation, prevention, and treatment of diseases.This review summarizes contemporary evolution in CRISPR \\u2013Cas9 system technology and their uses intreatment of common diseases.\"}, {\"paperId\": \"0057dc6ba5ceed01f87e432af9eab140ce4279aa\", \"externalIds\": {\"PubMedCentral\": \"9326220\", \"DOI\": \"10.3389/fnmol.2022.901682\", \"CorpusId\": 250459758, \"PubMed\": \"35909444\"}, \"title\": \"Autism-Risk Gene necab2 Regulates Psychomotor and Social Behavior as a Neuronal Modulator of mGluR1 Signaling\", \"venue\": \"Frontiers in Molecular Neuroscience\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fnmol.2022.901682/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9326220, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51061185\", \"name\": \"Zexu Chen\"}, {\"authorId\": \"6166096\", \"name\": \"Han Long\"}, {\"authorId\": \"2324496046\", \"name\": \"Jianhua Guo\"}, {\"authorId\": \"2143398266\", \"name\": \"Yiran Wang\"}, {\"authorId\": \"2175833385\", \"name\": \"Kezhe He\"}, {\"authorId\": \"2168192042\", \"name\": \"Chenchen Tao\"}, {\"authorId\": \"2155325453\", \"name\": \"Xiong Li\"}, {\"authorId\": \"4019019\", \"name\": \"K. Jiang\"}, {\"authorId\": \"3118605\", \"name\": \"Su Guo\"}, {\"authorId\": \"9872970\", \"name\": \"Y. Pi\"}], \"abstract\": \"Background De novo deletion of the neuronal calcium-binding protein 2 (NECAB2) locus is associated with idiopathic autism spectrum disorders (ASDs). The in vivo function of NECAB2 in the brain remains largely elusive. Methods We investigated the morphological and behavioral profiles of both necab2 knock-out and overexpression zebrafish models. The expression pattern and molecular role of necab2 were probed through a combination of in vitro and in vivo assays. Results We show that Necab2 is a neuronal specific, cytoplasmic, and membrane-associated protein, abundantly expressed in the telencephalon, habenula, and cerebellum. Necab2 is distributed peri-synaptically in subsets of glutamatergic and GABAergic neurons. CRISPR/Cas9-generated necab2 knock-out zebrafish display normal morphology but exhibit a decrease in locomotor activity and thigmotaxis with impaired social interaction only in males. Conversely, necab2 overexpression yields behavioral phenotypes opposite to the loss-of-function. Proteomic profiling uncovers a role of Necab2 in modulating signal transduction of G-protein coupled receptors. Specifically, co-immunoprecipitation, immunofluorescence, and confocal live-cell imaging suggest a complex containing NECAB2 and the metabotropic glutamate receptor 1 (mGluR1). In vivo measurement of phosphatidylinositol 4,5-bisphosphate further substantiates that Necab2 promotes mGluR1 signaling. Conclusions Necab2 regulates psychomotor and social behavior via modulating a signaling cascade downstream of mGluR1.\"}, {\"paperId\": \"0058609944e2e0bda4da0429737dc9b6869542f7\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2023.103202\", \"CorpusId\": 261675503, \"PubMed\": \"37708613\"}, \"title\": \"Generation of a TRPV1 knockout human pluripotent stem cell line (WAe009-A-U) using CRISPR/Cas9.\", \"venue\": \"Stem Cell Research\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2023.103202\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2023.103202?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2023.103202, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2238815425\", \"name\": \"Yuhong Cao\"}, {\"authorId\": \"2238908094\", \"name\": \"Ling Tang\"}, {\"authorId\": \"2116958427\", \"name\": \"Jun Su\"}, {\"authorId\": \"2144219812\", \"name\": \"Hao Wang\"}, {\"authorId\": \"47363645\", \"name\": \"Ping Liang\"}, {\"authorId\": \"2053627877\", \"name\": \"Kuang Rong\"}, {\"authorId\": \"40256994\", \"name\": \"Tingyu Gong\"}], \"abstract\": \"The transient receptor potential vanilloid subfamily 1 (TRPV1) is a polymodal nociceptor that is highly expressed in sensory nerves. Activation of TRPV1 receptors excites primary afferent nociceptors by opening cation channels, allowing the influx of Na+ and Ca2+ ions into the cytoplasm. Here, a TRPV1 knockout human embryonic stem cell line was generated using the CRISPR/Cas9 genome-editing technology\\u00a0to further study the function of TRPV1. The cell line confirmed with normal pluripotency and karyotype.\"}, {\"paperId\": \"0058cd793bdfd8c9d0efdc15ebc4f72e03ebc023\", \"externalIds\": {\"DOI\": \"10.1016/j.cj.2023.02.005\", \"CorpusId\": 257290023}, \"title\": \"Development of sorghum mutants with improved in vitro protein digestibility by CRISPR/Cas9 editing of kafirin genes\", \"venue\": \"Crop Journal\", \"year\": 2023, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.cj.2023.02.005\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.cj.2023.02.005?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.cj.2023.02.005, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3592116\", \"name\": \"L. Elkonin\"}, {\"authorId\": \"2135158058\", \"name\": \"G. A. Gerashchenkov\"}, {\"authorId\": \"2210408853\", \"name\": \"N. V. Borisenko\"}, {\"authorId\": \"2210402964\", \"name\": \"O. A. Kenzhegulov\"}, {\"authorId\": \"2210408910\", \"name\": \"Saule Kh. Sarsenova\"}, {\"authorId\": \"2210415379\", \"name\": \"Natalya A. Rozhnova\"}, {\"authorId\": \"90222826\", \"name\": \"V. M. Panin\"}], \"abstract\": null}, {\"paperId\": \"005a88377077a9ab88d807b6bf23aaa93754a7ad\", \"externalIds\": {\"PubMedCentral\": \"10366678\", \"DOI\": \"10.17912/micropub.biology.000872\", \"CorpusId\": 259952915, \"PubMed\": \"37497183\"}, \"title\": \"A missense mutation in the C. elegans src-2 tyrosine-protein kinase reduces brood size and enhances embryonic morphogenesis defects in src-1(RNAi) conditions\", \"venue\": \"microPublication Biology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10366678, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50078012\", \"name\": \"X. Bai\"}, {\"authorId\": \"49414115\", \"name\": \"R. Green\"}, {\"authorId\": \"145092048\", \"name\": \"T. Cai\"}, {\"authorId\": \"4169435\", \"name\": \"K. Oegema\"}, {\"authorId\": \"2071264\", \"name\": \"A. Golden\"}], \"abstract\": \"Goldenhar Syndrome is a rare congenital disorder characterized by hemifacial microsomia. Although select mutations have been mapped for this disorder, the genetic etiologies in the majority of cases remain unknown. A recent clinical report of a Goldenhar Syndrome patient identified a homozygous missense mutation in FRK , a gene associated with various types of cancer. In this work, we precisely modeled the disease-associated missense mutation in the C. elegans FRK ortholog src-2 , using CRISPR/Cas9 gene editing, and investigated the physiological role of this mutation and the src-2 gene. In addition, we generated a conserved variant in src-1 ( FYN ortholog) to assess the functional redundancy of the conserved variant. The putative pathogenic variants src-1 (Val190Ile) or src-2 (Val170Ile) caused only subtle phenotypes, suggesting that these mutations alone are not sufficient to explain the facial deformities observed in the Goldenhar Syndrome patient. However, the src-2 (Val170Ile) mutant exhibited reduced brood size and moderately enhanced embryonic developmental phenotypes, including epidermal and neuronal patterning defects, in the src-1 (RNAi) condition, indicating that the src-2 (Val170Ile) locus could play a supportive role during developmental processes. Overall, however, these studies showed that src-1 /FYN is essential for regulating embryogenesis and morphogenesis, while src-2 /FRK is largely dispensable for normal embryonic development, suggesting FYN , not FRK , is the dominant non-receptor protein kinase during embryonic development in C. elegans .\"}, {\"paperId\": \"005b970a7bde6852ceda13acadcd000414c6185d\", \"externalIds\": {\"DOI\": \"10.1101/2024.07.23.604778\", \"CorpusId\": 271461305, \"PubMed\": \"39211105\"}, \"title\": \"A common CTRB misfolding variant associated with pancreatic cancer risk causes ER stress and inflammation in mice\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11361044\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.07.23.604778?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.07.23.604778, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2220492748\", \"name\": \"Cristina Bodas\"}, {\"authorId\": \"35552550\", \"name\": \"Irene Felipe\"}, {\"authorId\": \"2313094496\", \"name\": \"Brice Chanez\"}, {\"authorId\": \"2299032881\", \"name\": \"Miguel Lafarga\"}, {\"authorId\": \"5270977\", \"name\": \"E. L\\u00f3pez de Maturana\"}, {\"authorId\": \"2284068469\", \"name\": \"Jaime Mart\\u00ednez-de-Villarreal\"}, {\"authorId\": \"8019346\", \"name\": \"Natalia Del Pozo\"}, {\"authorId\": \"1412352878\", \"name\": \"Marina Malumbres\"}, {\"authorId\": \"2825082\", \"name\": \"P. Vargiu\"}, {\"authorId\": \"2313094490\", \"name\": \"Ana Cayuela\"}, {\"authorId\": \"2313094471\", \"name\": \"Isabel Peset\"}, {\"authorId\": \"2313094903\", \"name\": \"K. Connelly\"}, {\"authorId\": \"2242332689\", \"name\": \"J. Hoskins\"}, {\"authorId\": \"2313094963\", \"name\": \"Ra\\u00fal M\\u00e9ndez\"}, {\"authorId\": \"4188480\", \"name\": \"L. Amundadottir\"}, {\"authorId\": \"2240540524\", \"name\": \"N. Malats\"}, {\"authorId\": \"2274222732\", \"name\": \"Sagrario Ortega\"}, {\"authorId\": \"2262912045\", \"name\": \"Francisco X. Real\"}], \"abstract\": null}, {\"paperId\": \"00611a01a03e38da017f3540406398cced2109b3\", \"externalIds\": {\"PubMedCentral\": \"10106857\", \"DOI\": \"10.1111/pbi.14004\", \"CorpusId\": 255501376, \"PubMed\": \"36610008\"}, \"title\": \"The MYB transcription factor Seed Shattering 11 controls seed shattering by repressing lignin synthesis in African rice\", \"venue\": \"Plant Biotechnology Journal\", \"year\": 2023, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/pbi.14004\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10106857, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2056973623\", \"name\": \"Jing Ning\"}, {\"authorId\": \"48692318\", \"name\": \"W. He\"}, {\"authorId\": \"2199602720\", \"name\": \"Linhua Wu\"}, {\"authorId\": \"24600972\", \"name\": \"Leqin Chang\"}, {\"authorId\": \"2145919794\", \"name\": \"Min Hu\"}, {\"authorId\": \"6710774\", \"name\": \"Yongcai Fu\"}, {\"authorId\": \"48697302\", \"name\": \"Fengxia Liu\"}, {\"authorId\": \"2152993661\", \"name\": \"Hongying Sun\"}, {\"authorId\": \"145854209\", \"name\": \"Ping Gu\"}, {\"authorId\": \"39109976\", \"name\": \"M. Ndjiondjop\"}, {\"authorId\": \"6086289\", \"name\": \"Chuanqing Sun\"}, {\"authorId\": \"6651398\", \"name\": \"Zuofeng Zhu\"}], \"abstract\": \"Summary African cultivated rice (Oryza glaberrima Steud.) was domesticated from its wild progenitor species (Oryza barthii) about 3000\\u2009years ago. Seed shattering is one of the main constraints on grain production in African cultivated rice, which causes severe grain losses during harvest. By contrast, Asian cultivated rice (Oryza sativa) displays greater resistance to seed shattering, allowing higher grain production. A better understanding in regulation of seed shattering would help to improve harvesting efficiency in African cultivated rice. Here, we report the map\\u2010based cloning and characterization of OgSH11, a MYB transcription factor controlling seed shattering in O. glaberrima. OgSH11 represses the expression of lignin biosynthesis genes and lignin deposition by binding to the promoter of GH2. We successfully developed a new O. glaberrima material showing significantly reduced seed shattering by knockout of SH11 in O. glaberrima using CRISPR\\u2010Cas9 mediated approach. Identification of SH11 not only supplies a new target for seed shattering improvement in African cultivated rice, but also provides new insights into the molecular mechanism of abscission layer development.\"}, {\"paperId\": \"006808c77bd8c7c09d34da0a99e8be45f8ba27ee\", \"externalIds\": {\"PubMedCentral\": \"8505425\", \"DOI\": \"10.1038/s41421-021-00304-y\", \"CorpusId\": 238587394, \"PubMed\": \"34635647\"}, \"title\": \"Generation of permanent neonatal diabetes mellitus dogs with glucokinase point mutations through base editing\", \"venue\": \"Cell Discovery\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41421-021-00304-y.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8505425, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108684658\", \"name\": \"Xiaomin Wang\"}, {\"authorId\": \"2107984700\", \"name\": \"Yanhui Liang\"}, {\"authorId\": \"2146413091\", \"name\": \"Jianping Zhao\"}, {\"authorId\": \"2145596845\", \"name\": \"Yuan Li\"}, {\"authorId\": \"148051679\", \"name\": \"Shixue Gou\"}, {\"authorId\": \"2114136856\", \"name\": \"Min Zheng\"}, {\"authorId\": \"2151551970\", \"name\": \"Juanjuan Zhou\"}, {\"authorId\": \"6713255\", \"name\": \"Quanjun Zhang\"}, {\"authorId\": \"35577387\", \"name\": \"Jidong Mi\"}, {\"authorId\": \"38165908\", \"name\": \"L. Lai\"}], \"abstract\": \"Dear Editor, Permanent neonatal diabetes mellitus (PNDM) in humans can be caused by the homozygous nullification of glucokinase (GCK), which is a key rate-limiting enzyme in glucose metabolism in pancreatic \\u03b2 cells and hepatocytes and is considered as the \\u201cglucose sensor\\u201d for the regulation of insulin secretion. Various mouse models have been generated through global, isoform-specific, or tissuespecific GCK gene knockout to help understand the role of GCK in glucose homeostasis. Mice with global homozygous GCK knockout or pancreatic \\u03b2-cell specific GCK knockout presented severe hyperglycemia and died within a few days of birth, even treated with insulin or glibenclamide. However, patients with GCK-PNDM could live to adulthood when treated with insulin. Suitable PNDM models with homozygous GCK mutations for mimicking the symptoms of human patients with GCKPNDM authentically are currently unavailable. Dogs, which are omnivorous animals like humans, are considered as a highly valuable large animal model for human metabolic diseases, such as diabetes. Point mutation is the most frequent mutation pattern associated with the deficient expression of a gene. Previously, gene-edited dogs with random indels at the targeted site had been generated by using the CRISPR/Cas9 system, which was unsuitable for generating models of genetic disease caused by single-nucleotide mutations. However, approaches for generating point mutations in dogs have not been reported. Here, for the first time, by utilizing newly developing base-editing technology named BE3 system, we attempted to generate a dog model of PNDM that contained homozygous GCK point mutations. We first validated the base editing efficiency of the BE3 system in canine embryonic fibroblasts (CEFs) with 5 different genes (GCK, MSTN, IL2RG, RAG1, and RAG2) and 4 different sites (GCK-1, GCK-2, GCK-3, and GCK-4) of the same gene. BE3 system was able to mediate C-to-T conversion within different genes and sites of CEFs efficiently varying from 22.2%\\u201356.3% (Supplementary Fig. S1a). Both monoallelic and biallelic mutants of C-to-T conversion were found in all the targeted sites except for GCK-1 and GCK-3 (Supplementary Fig. S1a\\u2013c). The base editing efficiency of a combination of 2 genes (RAG1 and RAG2), 3 genes (RAG1, RAG2, and IL2RG), and 2 sites within the same gene (GCK-2 and GCK-3) was 37.5%, 15.0%, and 45.5% respectively (Supplementary Fig. S2a\\u2013c). A total of 56 zygotes were collected and injected with a mixture of BE3 mRNA and GCK-4 sgRNA, which was located in exon 2 of the GCK gene (Fig. 1a). Seventeen puppies were obtained, and four (190619, 190627, 190628, and 190761) of them exhibited C-to-T conversion within GCK-4 target site (Supplementary Fig. S3a). PCR amplification and sequencing results showed that the 4 positive dogs were homozygotes with C-to-T mutation at the target site (Supplementary Fig. S3b, c). Tissues of heart, liver, lung, kidney, pancreas, brain, and muscle were collected from 2 (190619 and 190761) dead and 1 (190627) sacrificed PNDM dogs for further genotyping tests. The results also showed that the biallelic mutant with C-to-T\"}, {\"paperId\": \"0074599aac85dd8a4500a7de058f029fd341f337\", \"externalIds\": {\"DOI\": \"10.1111/jipb.13381\", \"CorpusId\": 252817524, \"PubMed\": \"36218268\"}, \"title\": \"High-throughput genome editing in rice with a virus-based surrogate system.\", \"venue\": \"Journal of Integrative Plant Biology\", \"year\": 2022, \"citationCount\": 16, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/jipb.13381?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/jipb.13381, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1796282843\", \"name\": \"Yifu Tian\"}, {\"authorId\": \"1423778326\", \"name\": \"Dating Zhong\"}, {\"authorId\": \"50078985\", \"name\": \"X (inbo) Li\"}, {\"authorId\": \"1797981214\", \"name\": \"Rundong Shen\"}, {\"authorId\": \"2164869477\", \"name\": \"Han Han\"}, {\"authorId\": \"2048069701\", \"name\": \"Yuqin Dai\"}, {\"authorId\": \"2053124606\", \"name\": \"Qi Yao\"}, {\"authorId\": \"2108060666\", \"name\": \"Xuening Zhang\"}, {\"authorId\": \"2187439535\", \"name\": \"Qi Deng\"}, {\"authorId\": \"2118457963\", \"name\": \"Xue-cheng Cao\"}, {\"authorId\": \"2141497556\", \"name\": \"Jian\\u2010Kang Zhu\"}, {\"authorId\": \"5843813\", \"name\": \"Yuming Lu\"}], \"abstract\": \"With the widespread use of CRISPR/Cas technologies in plants, large-scale genome editing is increasingly needed. Here, we developed a geminivirus-mediated surrogate system, called WDV-Gate (Wheat Dwarf Virus-surrogate), to facilitate high-throughput genome editing. WDV-Gate has two parts: one is the recipient callus from a transgenic rice line expressing Cas9 and a mutated hygromycin-resistant gene (HygM) for surrogate selection; the other is a WDV-based construct expressing two sgRNAs targeting HygM and a gene of interest, respectively. We evaluated WDV-Gate on six rice loci by producing a total of 874 T0 plants. Compared with the conventional method, the WDV-Gate system, which was characterized by a transient and high level of sgRNA expression, significantly increased editing frequency (66.8% vs. 90.1%), plantlet regeneration efficiency (2.31-fold increase), and numbers of homozygous-edited plants (36.3% vs. 70.7%). Large-scale editing using pooled sgRNAs targeting the SLR1 gene resulted in a high editing frequency of 94.4%, further demonstrating its feasibility. We also tested WDV-Gate on sequence knock-in for protein tagging. By co-delivering a chemically modified donor DNA with the WDV-Gate plasmid, 3xFLAG peptides were successfully fused to three loci with an efficiency of up to 13%. Thus, by combining transiently expressed sgRNAs and a surrogate selection system, WDV-Gate could be useful for high-throughput gene knock-out and sequence knock-in. This article is protected by copyright. All rights reserved.\"}, {\"paperId\": \"00747190f861730bed15eee20c095478196e928e\", \"externalIds\": {\"DOI\": \"10.1016/j.tube.2023.102391\", \"CorpusId\": 260401985, \"PubMed\": \"37574397\"}, \"title\": \"Phylactic role of anti-lipoarabinomannan IgM directed against mannan core during mycobacterial infection in macrophages.\", \"venue\": \"Tuberculosis\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.tube.2023.102391\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.tube.2023.102391?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.tube.2023.102391, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2052052448\", \"name\": \"H. Nakayama\"}, {\"authorId\": \"14235157\", \"name\": \"K. Hanafusa\"}, {\"authorId\": \"35135693\", \"name\": \"T. Yamaji\"}, {\"authorId\": \"48968928\", \"name\": \"E. Oshima\"}, {\"authorId\": \"89077881\", \"name\": \"Tomomi Hotta\"}, {\"authorId\": \"144275590\", \"name\": \"K. Takamori\"}, {\"authorId\": \"2170364020\", \"name\": \"H. Ogawa\"}, {\"authorId\": \"6645758\", \"name\": \"K. Iwabuchi\"}], \"abstract\": \"Mycobacteria enter host phagocytes, such as macrophages by binding to several receptors on phagocytes. Several mycobacterial species, including Mycobacterium tuberculosis have evolved systems to evade host bactericidal pathways. Lipoarabinomannan (LAM) is an essential mycobacterial molecule for both binding to phagocytes and escaping from bactericidal pathways. Integrin CD11b plays critical roles as a phagocytic receptor and contributes to host defense by mediating both nonopsonic and opsonic phagocytosis. However, the mechanisms by which CD11b-mediated phagocytosis associates with LAM and drives the phagocytic process of mycobacteria remain to be fully elucidated. We recently identified TMDU3 as anti-LAM IgM antibody against the mannan core of LAM. The present study investigated the roles of CD11b and TMDU3 in macrophage phagocytosis of mycobacteria and subsequent bactericidal lysosomal fusion to phagosomes. CD11b knockout cells generated by a CRISPR/Cas9 system showed significant attenuation of the ability to phagocytose non-opsonized mycobacteria and LAM-conjugated beads. Moreover, recombinant human CD11b protein was found to bind to LAM. TMDU3 markedly inhibited macrophage phagocytosis of non-opsonized mycobacteria. This antibody slightly increased the phagocytosis of mycobacteria under opsonized conditions, whereas it significantly enhanced CD11b-mediated bactericidal functions. Taken together, these results show a novel phylactic role of anti-LAM IgM during mycobacterial infection in macrophages.\"}, {\"paperId\": \"00780240eb2a8bc9699c07381f624cb874faeb5b\", \"externalIds\": {\"PubMedCentral\": \"8189279\", \"DOI\": \"10.1186/s13195-021-00850-3\", \"CorpusId\": 235384909, \"PubMed\": \"34108016\"}, \"title\": \"Network medicine links SARS-CoV-2/COVID-19 infection to brain microvascular injury and neuroinflammation in dementia-like cognitive impairment\", \"venue\": \"Alzheimer's Research & Therapy\", \"year\": 2021, \"citationCount\": 47, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://alzres.biomedcentral.com/counter/pdf/10.1186/s13195-021-00850-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8189279, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2197311\", \"name\": \"Yadi Zhou\"}, {\"authorId\": \"46372375\", \"name\": \"Jielin Xu\"}, {\"authorId\": \"98162734\", \"name\": \"Yuan Hou\"}, {\"authorId\": \"2094027\", \"name\": \"J. Leverenz\"}, {\"authorId\": \"143678989\", \"name\": \"A. Kallianpur\"}, {\"authorId\": \"50208639\", \"name\": \"R. Mehra\"}, {\"authorId\": \"46399976\", \"name\": \"Yunlong Liu\"}, {\"authorId\": \"145339878\", \"name\": \"Haiyuan Yu\"}, {\"authorId\": \"8377501\", \"name\": \"A. Pieper\"}, {\"authorId\": \"5312700\", \"name\": \"L. Jehi\"}, {\"authorId\": \"13041059\", \"name\": \"F. Cheng\"}], \"abstract\": \"Background Dementia-like cognitive impairment is an increasingly reported complication of SARS-CoV-2 infection. However, the underlying mechanisms responsible for this complication remain unclear. A better understanding of causative processes by which COVID-19 may lead to cognitive impairment is essential for developing preventive and therapeutic\\u00a0interventions. Methods In this study, we conducted a network-based, multimodal omics comparison of COVID-19 and neurologic complications. We constructed the SARS-CoV-2 virus-host interactome from protein-protein interaction assay and CRISPR-Cas9-based genetic assay results and compared network-based relationships therein with those of known neurological manifestations using network proximity measures. We also investigated the transcriptomic profiles (including single-cell/nuclei RNA-sequencing) of Alzheimer\\u2019s disease (AD) marker genes from patients infected with COVID-19, as well as the prevalence of SARS-CoV-2 entry factors in the brains of AD patients not infected with SARS-CoV-2. Results We found significant network-based relationships between COVID-19 and neuroinflammation and brain microvascular injury pathways and processes which are implicated in AD. We also detected aberrant expression of AD biomarkers in the cerebrospinal fluid and blood of patients with COVID-19. While transcriptomic analyses showed relatively low expression of SARS-CoV-2 entry factors in human brain, neuroinflammatory changes were pronounced. In addition, single-nucleus transcriptomic analyses showed that expression of SARS-CoV-2 host factors ( BSG and FURIN ) and antiviral defense genes ( LY6E , IFITM2 , IFITM3 , and IFNAR1 ) was elevated in brain endothelial cells of AD patients and healthy controls relative to neurons and other cell types, suggesting a possible role for brain microvascular injury in COVID-19-mediated cognitive impairment. Overall, individuals with the AD risk allele APOE E4/E4 displayed reduced expression of antiviral defense genes compared to APOE E3/E3 individuals. Conclusion Our results suggest significant mechanistic overlap between AD and COVID-19, centered on neuroinflammation and microvascular injury. These results help improve our understanding of COVID-19-associated neurological manifestations and provide guidance for future development of preventive or treatment interventions, although causal relationship and mechanistic pathways between COVID-19 and AD need future investigations.\"}, {\"paperId\": \"007ac79d412535404400b1af62eb7a7c3d315e26\", \"externalIds\": {\"MAG\": \"3023598854\", \"PubMedCentral\": \"7210806\", \"DOI\": \"10.7717/peerj.9046\", \"CorpusId\": 218630736, \"PubMed\": \"32411526\"}, \"title\": \"CRISPR screening identifies M1AP as a new MYC regulator with a promoter-reporter system\", \"venue\": \"PeerJ\", \"year\": 2020, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://peerj.com/articles/9046.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7210806, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2114707247\", \"name\": \"Akiko Yamamoto\"}, {\"authorId\": \"34972432\", \"name\": \"M. Kurata\"}, {\"authorId\": \"6165842\", \"name\": \"Iichiroh Onishi\"}, {\"authorId\": \"87731064\", \"name\": \"Keisuke Sugita\"}, {\"authorId\": \"1697710279\", \"name\": \"Miwa Matsumura\"}, {\"authorId\": \"10348067\", \"name\": \"S. Ishibashi\"}, {\"authorId\": \"27431693\", \"name\": \"Masumi Ikeda\"}, {\"authorId\": \"4439303\", \"name\": \"Kouhei Yamamoto\"}, {\"authorId\": \"35184665\", \"name\": \"M. Kitagawa\"}], \"abstract\": \"Background MYC is one of the proto-oncogenes contributing to tumorigenesis in many human cancers. Although the mechanism of MYC regulation is still not fully understood, learning about the comprehensive mechanism controlling the transcriptional activity of MYC will lead to therapeutic targets. The CRISPR/Cas9 library system is a simple and powerful screening technique. This study aims to identify new transcriptional upstream activators of MYC using the CRISPR activation library with new promoter-reporter systems. Methods and Results The MYC promoter-reporter system was developed with a photoconvertible fluorescent protein, Dendra2, and named \\u201cpMYC-promoter-Dendra2.\\u201d This MYC promoter-reporter system was designed to harbor a proximal MYC promoter at (3.1 kb). Both the CRISPR activation library and pMYC-promoter-Dendra2 were induced to HEK 293T cells, and Dendra2-positive cells, that are supposed that MYC should be upregulated, were collected individually by a cell sorter. Among the 169 cells collected, 12 clones were successfully established. Then, pMYC-promoter-Dendra2 was transfected again into these 12 clones, and two of 12 clones showed Dendra2 positivity. In this procedure, the cells with non-specific autofluorescence were correctly distinguished by utilizing the photoswitchable character of Dendra2. Using extracted genomic DNA of these two Dendra2 positive clones, polymerase chain reaction (PCR) was performed to amplify the guide RNA (gRNA) containing region, which was introduced by the CRISPR activation library. Eventually, PLEKHO2, MICU, MBTPS1, and M1AP were identified, and these gRNAs were transfected individually into HEK 293T cells again using the CRISPR activation system. Only M1AP gRNA transfected cells showed Dendra2-positive fluorescence. Then, the overexpression vector for M1AP with a doxycycline-inducible vector confirmed that M1AP induced high MYC expression by real-time quantitative PCR and western blot. Furthermore, the dual-luciferase assay showed a significant increase of promoter activity, and MYC mRNA was higher in M1AP- overexpressing cells. M1AP is highly expressed in several cancers, though, a positive correlation between M1AP and MYC was observed only in human acute myeloid leukemia. Conclusion The present study confirmed that the experimental method using the CRISPR library technology functions effectively for the identification of molecules that activate endogenous MYC. This method will help elucidate the regulatory mechanism of MYC expression, as well as supporting further drug research against malignant tumors.\"}, {\"paperId\": \"007b2abff58ad3704430d60062d115f94d422de5\", \"externalIds\": {\"PubMedCentral\": \"10955421\", \"DOI\": \"10.1016/j.ymgmr.2024.101069\", \"CorpusId\": 268492854, \"PubMed\": \"38516405\"}, \"title\": \"Induced pluripotent stem cell (iPSC) modeling validates reduced GBE1 enzyme activity due to a novel variant, p.Ile694Asn, found in a patient with suspected glycogen storage disease IV\", \"venue\": \"Molecular Genetics and Metabolism Reports\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.ymgmr.2024.101069\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10955421, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2291834656\", \"name\": \"Chie Naito\"}, {\"authorId\": \"47616335\", \"name\": \"Karis Kosar\"}, {\"authorId\": \"2046973919\", \"name\": \"Eriko Kishimoto\"}, {\"authorId\": \"2291836637\", \"name\": \"Loren Pena\"}, {\"authorId\": \"2330977287\", \"name\": \"Yilun Huang\"}, {\"authorId\": \"2346372842\", \"name\": \"Kaili Hao\"}, {\"authorId\": \"2277939110\", \"name\": \"Anas Bernieh\"}, {\"authorId\": \"2260490991\", \"name\": \"J. Kasten\"}, {\"authorId\": \"2265749845\", \"name\": \"Chet R Villa\"}, {\"authorId\": \"2271549131\", \"name\": \"Priya S. Kishnani\"}, {\"authorId\": \"2291831084\", \"name\": \"Bali Deeksha\"}, {\"authorId\": \"2269191791\", \"name\": \"Mingxia Gu\"}, {\"authorId\": \"2273088175\", \"name\": \"Akihiro Asai\"}], \"abstract\": \"Background Glycogen Storage disease type 4 (GSD4), a rare disease caused by glycogen branching enzyme 1 (GBE1) deficiency, affects multiple organ systems including the muscles, liver, heart, and central nervous system. Here we report a GSD4 patient, who presented with severe hepatosplenomegaly and cardiac ventricular hypertrophy. GBE1 sequencing identified two variants: a known pathogenic missense variant, c.1544G>A (p.Arg515His), and a missense variant of unknown significance (VUS), c.2081T>A (p. Ile694Asn). As a liver transplant alone can exacerbate heart dysfunction in GSD4 patients, a precise diagnosis is essential for liver transplant indication. To characterize the disease-causing variant, we modeled patient-specific GBE1 deficiency using CRISPR/Cas9 genome-edited induced pluripotent stem cells (iPSCs). Methods iPSCs from a healthy donor (iPSC-WT) were genome-edited by CRISPR/Cas9 to induce homozygous p.Ile694Asn in GBE1 (iPSC-GBE1-I694N) and differentiated into hepatocytes (iHep) or cardiomyocytes (iCM). GBE1 enzyme activity was measured, and PAS-D staining was performed to analyze polyglucosan deposition in these cells. Results iPSCGBE1-I694N differentiated into iHep and iCM exhibited reduced GBE1 protein level and enzyme activity in both cell types compared to iPSCwt. Both iHepGBE1-I694N and iCMGBE1-I694N showed polyglucosan deposits correlating to the histologic patterns of the patient's biopsies. Conclusions iPSC-based disease modeling supported a loss of function effect of p.Ile694Asn in GBE1. The modeling of GBE1 enzyme deficiency in iHep and iCM cell lines had multi-organ findings, demonstrating iPSC-based modeling usefulness in elucidating the effects of novel VUS in ultra-rare diseases.\"}, {\"paperId\": \"00836e484dda4fef4cdb9880831a4b5a79b7b9ab\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-4684\", \"CorpusId\": 268641548}, \"title\": \"Abstract 4684: A comprehensive platform for identification of KRAS-specific synthetic lethal targets using patient-derived cells\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-4684?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-4684, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269301195\", \"name\": \"M. Dul\\u0119ba\"}, {\"authorId\": \"2269293543\", \"name\": \"E. Zimol\\u0105g\"}, {\"authorId\": \"2269291250\", \"name\": \"J. Szuszkiewicz\"}, {\"authorId\": \"2269297803\", \"name\": \"M. Serocki\"}, {\"authorId\": \"2269298403\", \"name\": \"Joanna Szklarczyk\"}, {\"authorId\": \"2269299132\", \"name\": \"Olga Dracz\"}, {\"authorId\": \"2293010376\", \"name\": \"Zuzanna Kurzejamska\"}, {\"authorId\": \"2293008223\", \"name\": \"Diego Coelho\"}, {\"authorId\": \"11302499\", \"name\": \"M. Combik\"}, {\"authorId\": \"2269299130\", \"name\": \"O. Bryzghalov\"}, {\"authorId\": \"2293002750\", \"name\": \"Joanna Krawczyk\"}, {\"authorId\": \"51469296\", \"name\": \"A. Stachowicz\"}, {\"authorId\": \"2269293885\", \"name\": \"M. Mikula\"}, {\"authorId\": \"46366278\", \"name\": \"K. Brzo\\u0301zka\"}, {\"authorId\": \"2253785357\", \"name\": \"Rafal Dziadziuszko\"}, {\"authorId\": \"13050612\", \"name\": \"T. Rzymski\"}, {\"authorId\": \"2269297933\", \"name\": \"Andrzej Mazan\"}], \"abstract\": \"\\n Colorectal cancer (CRC) remains a global health concern, constituting a large portion of cancer incidence and mortality. Despite advances in comprehending the genetic and epigenetic landscape of CRC and progress achieved in developing KRAS-specific inhibitors poised for clinical evaluation, a significant unmet medical need persists. This underscores the necessity for innovative therapeutic interventions in this field, as effective therapeutic strategies targeting specific molecular vulnerabilities are currently lacking. Our study aims to address this gap by focusing on the identification of synthetic lethal (SL) inhibitors specific to the KRAS pathway. We have established a platform utilizing human intestinal stem cell (hISC)-derived CRC model cells, patient-derived xenografts (PDXs), and clinical samples for genomic and functional analyses. Employing CRISPR/Cas9 technology, we introduced common CRC mutations into hISCs, generating isogenic CRC model cells with diverse mutational backgrounds including KRAS G12D. Additionally, we developed PDXs from CRC patients and collected biopsy samples from primary and metastatic tumors. Through RNA-seq and whole-exome sequencing (WES), we identified molecular signatures and pathways associated with different mutational variants. Our innovative platform enables high-throughput screening, incorporating both small molecule screening and CRISPR/Cas9 dropout screening with a genome-wide library on CRC model cells. Notably, our focus on KRAS-specific SL inhibitors distinguishes our approach, aiming for targeted therapies tailored to specific CRC subtypes. Validation of driver mutations, such as APC, KRAS, and TP53, in patient-derived material showcased the relevance of our model. High-quality screening results, meeting industry-standard QC criteria, allowed us to identify essential and tumor suppressor genes critical for CRC. Importantly, the use of normal hISCs enabled the identification of genes crucial only for transformed cells. The platform serves as a powerful tool for target discovery and validation in CRC, emphasizing the significance of primary material-derived cells. Beyond CRC, our findings have broader implications for other cancer types and personalized medicine approaches. By focusing on the identification of KRAS-specific SL inhibitors, our research contributes to the development of novel therapies for CRC, addressing the urgent need for targeted interventions in this heterogeneous malignancy.\\n Citation Format: Marcin Dul\\u0119ba, Eliza Zimol\\u0105g, Joanna Szuszkiewicz, Marcin Serocki, Joanna Szklarczyk, Olga Dracz, Zuzanna Kurzejamska, Diego Coelho, Micha\\u0142 Combik, Oleksii Bryzghalov, Joanna Krawczyk, Agata Stachowicz, Micha\\u0142 Mikula, Krzysztof Brz\\u00f3zka, Rafa\\u0142 Dziadziuszko, Tomasz Rzymski, Andrzej Mazan. A comprehensive platform for identification of KRAS-specific synthetic lethal targets using patient-derived cells [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 4684.\"}, {\"paperId\": \"00872d4aa9e61d4d33de1ac48028142caa4c1f71\", \"externalIds\": {\"DOI\": \"10.1016/j.ijbiomac.2024.137511\", \"CorpusId\": 274076547, \"PubMed\": \"39547602\"}, \"title\": \"An anti-sense lncRNA of the A-FABP gene regulates the proliferation of hair follicle stem cells via the chi-miR-335-5p/DKK1/\\u03b2-catenin axis.\", \"venue\": \"International Journal of Biological Macromolecules\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijbiomac.2024.137511?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijbiomac.2024.137511, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146325178\", \"name\": \"Tongtong Zhang\"}, {\"authorId\": \"48379836\", \"name\": \"Yuelang Zhang\"}, {\"authorId\": \"2266532558\", \"name\": \"Xiang Li\"}, {\"authorId\": \"2307188050\", \"name\": \"Fang Zhang\"}, {\"authorId\": \"2329137153\", \"name\": \"Zixi Cheng\"}, {\"authorId\": \"2176507500\", \"name\": \"Yujie Shi\"}, {\"authorId\": \"2266421943\", \"name\": \"Xiongbo Zhou\"}, {\"authorId\": \"2259008866\", \"name\": \"Xin Wang\"}], \"abstract\": \"Hair follicle development relies on both the epithelial-mesenchymal interaction (EMI) and the proliferation of hair follicle stem cells (HFSCs). This intricate process involves numerous regulatory molecules. Increasing evidence suggests that long non-coding RNAs (lncRNAs) play a crucial role in hair follicle development. However, the functions and molecular mechanisms of many lncRNAs in hair follicle development of cashmere goats remain unclear. Based on our previous lncRNA sequencing results in cashmere goats, an unannotated lncRNA differentially expressed at various stages of hair follicle development, named FABP_AS, was detected. Consequently, we aimed at exploring the function and molecular mechanisms of FABP_AS. We constructed a CRISPR/Cas9 knockout system to specifically knock down FABP_AS, providing a reference model for target lncRNA knockout in animal primary cells. Functional experiment results demonstrated that FABP_AS significantly inhibited HFSCs proliferation. Mechanism experiment results revealed that FABP_AS competitively bond to chi-miR-335-5p, promoted DKK1 gene expression, and reduced Wnt/\\u03b2-catenin signaling pathway activity. In summary, our findings indicated that FABP_AS acted as a miRNA sponge, sequestering chi-miR-335-5p away from the DKK1 gene, thereby suppressing HFSCs proliferation, which would lay the groundwork for a better understanding of the molecular mechanisms of hair follicle development and provide therapeutic targets for hair loss.\"}, {\"paperId\": \"0087d7e4f796512e70d31829452cefac7f09c64d\", \"externalIds\": {\"DOI\": \"10.1101/2023.09.17.558168\", \"CorpusId\": 262087465}, \"title\": \"casmini-tool: a comprehensive database for efficient and specific guide RNA design using dCasMINI\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/09/18/2023.09.17.558168.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.09.17.558168?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.09.17.558168, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2243378622\", \"name\": \"Spencer Lopp\"}, {\"authorId\": \"2308278517\", \"name\": \"Tyler Borrman\"}, {\"authorId\": \"2243377809\", \"name\": \"Nishant Jha\"}, {\"authorId\": \"48077009\", \"name\": \"M. Silvis\"}, {\"authorId\": \"49291539\", \"name\": \"R. Swan\"}, {\"authorId\": \"2218996023\", \"name\": \"Xiao Yang\"}, {\"authorId\": \"2084050517\", \"name\": \"Gabriella Alvarez\"}, {\"authorId\": \"2243377150\", \"name\": \"Courtney Klappenbach\"}, {\"authorId\": \"2362987448\", \"name\": \"Yanxia Liu\"}, {\"authorId\": \"2218276706\", \"name\": \"Daniel O. Hart\"}, {\"authorId\": \"2243381997\", \"name\": \"Lei S. Qi\"}, {\"authorId\": \"39097884\", \"name\": \"Timothy P. Daley\"}, {\"authorId\": \"29398105\", \"name\": \"Robin W. Yeo\"}], \"abstract\": \"The dCasMINI protein is a hypercompact, nuclease-inactivated CRISPR-Cas system engineered for transcriptional modulation and epigenetic editing [Xu et al., 2021]. The small size of dCas-MINI (529 amino acids), less than half the size of comparable Cas9 molecules, makes it ideal for AAV-based therapies which are frequently limited by AAV\\u2019s small cargo capacity. Unlike Cas9 or Cas12a, there are no available computational tools for designing dCasMINI guides. To facilitate and accelerate the development of dCasMINI-based applications, we synthesized knowledge regarding dCasMINI guide design and built a website to assist researchers in designing optimal guides for dCasMINI-based experiments for transcriptional inhibition (CRISPRi) and activation (CRISPRa); to ensure that our tool would be useful for therapeutic guide design, in which a guide\\u2019s off-target safety profile is of paramount importance, we specifically optimized alignment parameters for high-sensitivity to comprehensively report genome-wide off-targets. To investigate dCasMINI\\u2019s full protospacer adjacent motif (PAM) profile, we engineered libraries of PAMs and exhaustively characterized dCasMINI\\u2019s ability to activate a locus with different PAMs. We also experimentally investigated the importance of each nucleotide position on the guide RNA\\u2019s ability to activate its target, and characterized a 6bp high-fidelity seed region at the 5\\u2019 end of the protospacer sequence which we identified to be intolerant to mismatches and deletions, and thus critical for true binding events. Taken together, our tool offers CRISPRi/a guide design for every protein-coding gene in the human genome along with comprehensive off-target prediction, incorporating the most up-to-date information about dCasMINI\\u2019s full PAM and protospacer design rules. The tool is freely available to use at www.casmini-tool.com.\"}, {\"paperId\": \"008a38fecb2add5ace2d5978122bcfb698222d7a\", \"externalIds\": {\"DOI\": \"10.47611/jsrhs.v12i3.4806\", \"CorpusId\": 267645911}, \"title\": \"Treating Alzheimer\\u2019s and ATTR using CRISPR-Cas9 to target amyloidosis\", \"venue\": \"Journal of student-scientists' research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.jsr.org/hs/index.php/path/article/download/4806/2183\", \"status\": \"GOLD\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.47611/jsrhs.v12i3.4806?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.47611/jsrhs.v12i3.4806, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50092787\", \"name\": \"Pranav Joshi\"}, {\"authorId\": \"2238963127\", \"name\": \"Nicole Guilz\"}, {\"authorId\": \"2244075534\", \"name\": \"M. Amendola\"}], \"abstract\": \"Approximately 50 million people live with Alzheimer\\u2019s (Alz) and 50,000 people are living with Transthyretin Amyloidosis (ATTR) worldwide. Both Alz and ATTR are types of amyloidosis, a disease where amyloid protein builds up in the body\\u2019s organs. Alz and ATTR are conditions with no known cures and similar etiologies but different manifestations in the brain and heart, respectively. Alzheimer\\u2019s disease is irreversible, which causes lifelong suffering for patients and their families. ATTR is a potentially fatal disease that causes heart problems for patients. Amyloidosis arises due to genetic mutations in the amyloid precursor protein (APP) or proteins involved in the generation of APP such as BACE1, PSEN1, PSEN2, APOE and transthyretin (TTR) genes, which result in the overexpression and accumulation of amyloid protein.\\u00a0 CRISPR-Cas9 is a breakthrough gene editing technology that is capable of editing mutations in multiple genes with high specificity. This technology has the capability of treating both Alz and ATTR through targeted gene editing of the mutations that contribute to these diseases. This review will focus on BACE1, PSEN1, PSEN2, and APOE as targets for Alz and TTR as a treatment for ATTR through the use of CRISPR-Cas9. Various delivery mechanisms and current clinical trials will be discussed to identify the best delivery route of these treatments for the respective disease . A CRISPR-Cas9 derived treatment would bring new hope for patients with these diseases and could propel cures for other types of amyloidosis.\"}, {\"paperId\": \"008a39bd87fc70132bc4a74a9e15763fd1c318cc\", \"externalIds\": {\"PubMedCentral\": \"11600394\", \"DOI\": \"10.1002/cpz1.70056\", \"CorpusId\": 274303296, \"PubMed\": \"39601181\"}, \"title\": \"CRISPR/Cas9 Ribonucleoprotein Nucleofection for Genome Editing in Primary Human Keratinocytes: Knockouts, Deletions, and Homology\\u2010Directed Repair Mutagenesis\", \"venue\": \"Current Protocols\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1002/cpz1.70056\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11600394, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2332507422\", \"name\": \"Martina Bamundo\"}, {\"authorId\": \"2332507136\", \"name\": \"S. Palumbo\"}, {\"authorId\": \"2214753016\", \"name\": \"Ludovica D\\u2019Auria\"}, {\"authorId\": \"5065746\", \"name\": \"C. Missero\"}, {\"authorId\": \"2301997467\", \"name\": \"D. Di Girolamo\"}], \"abstract\": \"Keratinocytes are the most abundant cell type in the human epidermis, the outermost layer of the skin. For years, primary human keratinocytes (HKs) have been used as a crucial tool for studying the pathogenesis of a wide range of skin\\u2010related diseases. To mimic the physiological and pathological behavior of human skin, organotypic 3D skin models can be generated by in vitro differentiation of HKs. However, manipulation of HKs is notoriously difficult. Liposome\\u2010mediated gene delivery often results in low transfection rates, and conventional electroporation results in high mortality, is difficult to optimize, and requires high cell numbers without necessarily achieving maximum efficiency. Additionally, HKs have a short lifespan in vitro, with a limited number of cell divisions before senescence, even when cultured on a feeder layer. Therefore, the possibility to use an efficient CRISPR/Cas9 system in HKs is not without challenge in terms of transfection technology and clonal selection. In this article, we provide detailed protocols to perform efficient gene knock\\u2010out (KO) or genomic deletion in a small number of HKs without clonal selection of edited cells. By nucleofecting ribonucleoprotein complexes, we efficiently generate KO cells as well as deletion of specific genomic regions. Moreover, we describe an optimized protocol for generating site\\u2010specific mutations in immortalized keratinocytes (N/TERT2G) by exploiting the homology\\u2010directed repair system combined with rapid single\\u2010clone screening. These methods can also be applied to other immortalized cells and tumoral cells of epithelial origin. Together, these protocols provide a comprehensive and powerful tool that can be used to better understand the molecular mechanisms underlying different skin diseases. \\u00a9 2024 The Author(s). Current Protocols published by Wiley Periodicals LLC.\"}, {\"paperId\": \"008b516307498c36b7df1115a11ae78a0af478a2\", \"externalIds\": {\"DOI\": \"10.1016/j.ejcb.2023.151328\", \"CorpusId\": 259059410, \"PubMed\": \"37321037\"}, \"title\": \"Lipocalin-2 regulates the expression of interferon-stimulated genes and the susceptibility of prostate cancer cells to oncolytic virus infection.\", \"venue\": \"European Journal of Cell Biology\", \"year\": 2023, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.ejcb.2023.151328\", \"status\": \"CLOSED\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ejcb.2023.151328?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ejcb.2023.151328, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2219533704\", \"name\": \"Lilach Barer\"}, {\"authorId\": \"1835168622\", \"name\": \"Sarah K Schr\\u00f6der\"}, {\"authorId\": \"2963099\", \"name\": \"R. Weiskirchen\"}, {\"authorId\": \"3009743\", \"name\": \"E. Bacharach\"}, {\"authorId\": \"51026488\", \"name\": \"M. Ehrlich\"}], \"abstract\": \"Lipocalin-2 (LCN2) performs pleiotropic and tumor context-dependent functions in cancers of diverse etiologies. In prostate cancer (PCa) cells, LCN2 regulates distinct phenotypic features, including cytoskeleton organization and expression of inflammation mediators. Oncolytic virotherapy uses oncolytic viruses (OVs) to kill cancer cells and induce anti-tumor immunity. A main source of specificity of OVs towards tumor cells stems from cancer-induced defects in interferon (IFN)-based cell autonomous immune responses. However, the molecular underpinnings of such defects in PCa cells are only partially understood. Moreover, LCN2 effects on IFN responses of PCa cells and their susceptibility to OVs are unknown. To examine these issues, we queried gene expression databases for genes coexpressed with LCN2, revealing co-expression of IFN-stimulated genes (ISGs) and LCN2. Analysis of human PCa cells revealed correlated expression of LCN2 and subsets of IFNs and ISGs. CRISPR/Cas9-mediated stable knockout of LCN2 in PC3 cells or transient overexpression of LCN2 in LNCaP cells revealed LCN2-mediated regulation of IFNE (and IFNL1) expression, activation of JAK/STAT pathway, and expression of selected ISGs. Accordingly, and dependent on a functional JAK/STAT pathway, LCN2 reduced the susceptibility of PCa cells to infection with the IFN-sensitive OV, EHDV-TAU. In PC3 cells, LCN2 knockout increased phosphorylation of eukaryotic initiation factor 2\\u03b1 (p-eIF2\\u03b1). Inhibition of PKR-like ER kinase (PERK) in PC3-LCN2-KO cells reduced p-eIF2\\u03b1 while increasing constitutive IFNE expression, phosphorylation of STAT1, and ISG expression; and decreasing EHDV-TAU infection. Together, these data propose that LCN2 regulates PCa susceptibility to OVs through attenuation of PERK activity and increased IFN and ISG expression.\"}, {\"paperId\": \"008bd718483541569c57868bc7b3767056e104fa\", \"externalIds\": {\"MAG\": \"3172984603\", \"DOI\": \"10.1096/FASEBJ.2021.35.S1.02559\", \"CorpusId\": 236545206}, \"title\": \"Defining the Role of MEMO1 in Craniodental Mineralization\", \"venue\": \"The FASEB Journal\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/FASEBJ.2021.35.S1.02559?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/FASEBJ.2021.35.S1.02559, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79535865\", \"name\": \"Michaela Schotanus\"}, {\"authorId\": \"5401555\", \"name\": \"Eric Van Otterloo\"}], \"abstract\": \"Defects in the mineralization of craniofacial tissues are an underlying pathology in a variety of human congenital disorders. Our understanding of these developmental processes is confounded by the complex intertwinement of different tissue types (e.g. ectoderm, neural crest and mesoderm) and mineralization methods (e.g. endochondral and intramembranous ossification). Understanding the unique cellular and molecular mechanisms driving the development and mineralization of craniodental tissues (e.g. bone and teeth) is critical to explain, prevent, and treat associated genetic disorders. Our lab has identified the protein Mediator of Cell Motility 1 (MEMO1)\\u2014initially found to associate with breast cancer metastasis\\u2014is critical for bone and enamel mineralization. However, MEMO1\\u2019s biological and molecular function in these processes is unknown.We are using in vivo mouse\\u2010based and in vitro cell culture\\u2010based models to address this knowledge gap. With our in vivo models, we have utilized immunofluorescence, scanning electron microscopy, \\u00b5CT, single cell RNA\\u2010sequencing, and basic histological examination to define the craniodental defects upon loss of Memo1 in the ectoderm or oral epithelium. With our in vitro models, we have utilized an oral epithelial cell line, along with CRISPR/Cas9 genome editing, Western Blot analysis, bulk RNA\\u2010sequencing and immunofluorescence to gain insight into the cellular and molecular function of MEMO1 within oral epithelial cells. Analyses of the in vivo Memo1 ectoderm or oral epithelial mutants, relative to controls, identifies an important role for MEMO1 in enamel development. Conditional mutants display chalky enamel associated with a significant decrease in enamel density (p\\u2010value < 0.03). Compromised enamel in conditional mutants is further supported by alterations in gene and protein expression within ameloblasts and may include defects in the cytoskeleton. Supporting this observation, our oral epithelial in vitro Memo1 loss\\u2010of\\u2010function model displays changes in cytoskeletal dynamics, including increased cellular contractility.These findings provide novel insight into how MEMO1 contributes to mineralization, potentially deploying its breast cancer metastatic function (i.e., cytoskeletal regulation), within a novel biological setting\\u2014amelogenesis. The oral epithelial specific role of MEMO1 expands our understanding of craniodental mineralization and MEMO1\\u2019s molecular control of these processes. Furthermore, this provides novel insight into genetic diseases of mineralization, including those impacting the craniodental complex. Additional investigation into our Memo1 loss\\u2010of\\u2010function models will progress both the specific and general knowledge of tissue mineralization\\u2014providing novel opportunities to exploit this protein, or its interacting partners, in a clinical or therapeutic setting.\"}, {\"paperId\": \"008c23e89c464ff2406e8f2d7a700dd2de690aba\", \"externalIds\": {\"MAG\": \"3006502419\", \"DOI\": \"10.1021/cen-09806-feature8\", \"CorpusId\": 214339972}, \"title\": \"How we\\u2019ll reengineeer crops for a changing climate\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/cen-09806-feature8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/cen-09806-feature8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"100721527\", \"name\": \"Laura Howes\"}], \"abstract\": \"Efforts to improve the genetics of food crops are as old as agriculture. Crossbreeding plants to select for traits is nothing new, but synthetic biology techniques, including CRISPR-Cas9 and other gene-editing systems, have sped up the process and made new approaches possible. As climate change threatens the world\\u2019s food-growing systems, plant scientists, industry, and governments hope to use these powerful methods to make plants hardier and land more productive. Here are some of their targets. Resisting disease Researchers say it is not always clear how rising CO2 levels will affect the relationship between crops and disease, but changes in temperature and water availability can make plants more susceptible to disease. The genomes of many bananas and plantains share a dangerous secret that illustrates this: a virus that can cause farmers to lose their harvests. The banana streak disease, which primarily affects the leaves, is activated under stress conditions such as\"}, {\"paperId\": \"008ef67b3956f55f7ce51159deec5b4eac18426c\", \"externalIds\": {\"DOI\": \"10.1016/j.bbadis.2023.166872\", \"CorpusId\": 261526135, \"PubMed\": \"37666438\"}, \"title\": \"CRISPR based therapeutic targeting of signaling pathways in breast cancer.\", \"venue\": \"Biochimica et Biophysica Acta - Molecular Basis of Disease\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bbadis.2023.166872?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bbadis.2023.166872, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2237754641\", \"name\": \"Gauri Misra\"}, {\"authorId\": \"2237754746\", \"name\": \"Sidra Qaisar\"}, {\"authorId\": \"2237951928\", \"name\": \"Priyanshi Singh\"}], \"abstract\": \"Breast cancer represents the prevailing malignancy in females and contributing towards mortality on a global scale. There are innumerable anomalous genes that are responsible in the multi factorial carcinogenesis pathway. Although several disease-causing mutations have been detected, therapy frequently focuses on attenuating the manifestation of the disease rather than harmonizing the mutation in the target area. However, the emergence of the CRISPR-Cas system as a DNA modifying tool has proved to be a promising gene editing tool for breast cancer therapeutics. Henceforth, in this review, we have discussed different signaling pathways that have been targeted by the CRISPR-Cas system and explored their role in breast cancer therapies. We have also tried to comprehensively cover CRISPR-Cas9 mediated gene knockout in breast cancer. In this review many alterations in breast cancer cells that affect cell signaling pathways have also been described. This review will be a valuable addition to providing comprehensive knowledge of CRISPR-Cas mediated therapeutic targeting in breast cancer.\"}, {\"paperId\": \"008f27b432d6f0f759ef071f6a76981353e9e37c\", \"externalIds\": {\"DOI\": \"10.1101/2021.05.03.442446\", \"CorpusId\": 234349677}, \"title\": \"Generation of SIV resistant T cells and Macrophages from Nonhuman Primate Induced Pluripotent Stem Cells with Edited CCR5 locus\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2213671122001369/pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.05.03.442446?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.05.03.442446, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1410383286\", \"name\": \"Saritha S. D\\u2019souza\"}, {\"authorId\": \"50333199\", \"name\": \"Akhilesh Kumar\"}, {\"authorId\": \"4720285\", \"name\": \"J. Weinfurter\"}, {\"authorId\": \"9640238\", \"name\": \"M. Park\"}, {\"authorId\": \"5284008\", \"name\": \"John P. Maufort\"}, {\"authorId\": \"35478419\", \"name\": \"Lihong Tao\"}, {\"authorId\": \"2115456192\", \"name\": \"HyunJun Kang\"}, {\"authorId\": \"3502625\", \"name\": \"T. Golos\"}, {\"authorId\": \"47163318\", \"name\": \"J. Thomson\"}, {\"authorId\": \"40203543\", \"name\": \"MR Reynolds\"}, {\"authorId\": \"4144611\", \"name\": \"I. Slukvin\"}], \"abstract\": \"Adoptive therapies with genetically modified somatic T cells rendered HIV resistant have shown promise for AIDS therapy. A renewable source of HIV resistant human T cells from induced pluripotent stem cells (iPSCs) would further facilitate and broaden the applicability of these therapies. Here, we report successful targeting of the CCR5 locus in iPSCs generated from peripheral blood T cells (T-iPSCs) or fibroblasts (fib-iPSCs) from Mauritian Cynomolgus macaques (MCM), using CRISPR/Cas9 technology. We found that CCR5 editing does not affect pluripotency or hematopoietic and T cell differentiation potentials of fib-iPSCs. However, deletion of CCR5 in T-iPSCs leads to selective loss of their T cell redifferentiation potential without affecting myeloid development. T cells and macrophages produced from CCR5-edited MCM- iPSCs did not support replication of the CCR5-tropic simian immunodeficiency viruses SIVmac239 (T-cell tropic) and SIVmac316 (macrophage-tropic). Overall, these studies provide a platform for further exploration of AIDS therapies based on gene-edited iPSCs in a nonhuman primate preclinical model.\"}, {\"paperId\": \"008f89029db17e842c536bbf474d6f44226ca937\", \"externalIds\": {\"PubMedCentral\": \"10149819\", \"DOI\": \"10.3389/fpls.2023.1159615\", \"CorpusId\": 258171992, \"PubMed\": \"37139106\"}, \"title\": \"CRISPR-mediated genome editing in poplar issued by efficient transformation\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2023.1159615/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10149819, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3528309\", \"name\": \"A. Movahedi\"}, {\"authorId\": \"2115438116\", \"name\": \"Hui Wei\"}, {\"authorId\": \"3435223\", \"name\": \"S. Kadkhodaei\"}, {\"authorId\": \"3640088\", \"name\": \"Weibo Sun\"}, {\"authorId\": \"6764261\", \"name\": \"Q. Zhuge\"}, {\"authorId\": \"2124529915\", \"name\": \"Liming Yang\"}, {\"authorId\": \"2153079652\", \"name\": \"Chen Xu\"}], \"abstract\": \"Background CRISPR has been increasingly used for plant genetic improvements because of its high efficiency and precision. Recently, the authors have reported the possibility of homology-directed repair (HDR) using CRISPR/Cas9 through woody plants such as poplar. HDR often replaces nucleotides with one donor DNA template (DDT), including homologous sequences. Methods CRISPR\\u2013Cas9 was recruited, and three variables, Agrobacteria inoculator concentration, pDDT/pgRNA ratio, and homologous arm length, were designed to integrate nptII and 2XCamV 35S into the MKK2 promoter zone. Results Here, we showed that recovered poplars on kanamycin-supplemented media exhibited enhanced expression of MKK2 affected by the precise integration of 2XcamV 35S and nptII, improving biochemical and phenotypic properties. Our findings confirmed that Agrobacterium inoculator OD600 = 2.5, increased DDT numbers during cell division to 4:1 pDDT/pgRNA, and optimized homologous arms 700 bp caused efficient HDR and increased MKK2 expression. Conclusion Efficient transformations resulted from optimized variables, directly affecting the HDR efficiency through woody plants such as poplar.\"}, {\"paperId\": \"0097da72fc6417712be5aeaab2872ebf75c61ee4\", \"externalIds\": {\"CorpusId\": 251733508}, \"title\": \"Cytochrome P450 reaction phenotyping of hydroxyitraconazole metabolism in canine liver\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://vetmed.illinois.edu/wp-content/uploads/2022/07/2021-Research-Projects-Abstracts.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49059797\", \"name\": \"Jennifer W. Applebaum\"}, {\"authorId\": \"2145422901\", \"name\": \"Zhong Li\"}, {\"authorId\": \"3077342\", \"name\": \"J. M. Reinhart\"}], \"abstract\": null}, {\"paperId\": \"00a26646a03ff0998dab59e2f6aa713e92f98d17\", \"externalIds\": {\"DOI\": \"10.1096/fasebj.2022.36.s1.r3965\", \"CorpusId\": 248591507, \"PubMed\": \"35553765\"}, \"title\": \"Na/K\\u2010ATPase Alpha1 Isoform Signaling in Cardiac Metabolism\", \"venue\": \"The FASEB Journal\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fasebj.2022.36.s1.r3965?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fasebj.2022.36.s1.r3965, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39385113\", \"name\": \"M. Pessoa\"}, {\"authorId\": \"2063240298\", \"name\": \"Dominic M Collins\"}, {\"authorId\": \"48748171\", \"name\": \"Liquan Cai\"}, {\"authorId\": \"40097595\", \"name\": \"S. Pierre\"}], \"abstract\": \"Understanding cardiac metabolic signaling and its relation to pathological hypertrophy is critical to develop new therapeutic intervention in heart failure (HF). Decreased Na/K\\u2010ATPase (NKA) activity and expression have long been associated with HF in experimental models and in patients. Classically known for its crucial role in transmembrane ion transport, electrical excitability, and contractility, NKA also supports non\\u2010enzymatic receptor functions that differ among major cardiac isoforms (\\u03b11 and \\u03b12 in rodents). Studies from our group and others have suggested a role of these receptor functions in cardiac myocyte hypertrophy. Using epithelial (LLC\\u2010PK1)\\u2010derived cell lines, we have previously observed a NKA \\u03b11\\u2010specific ability to modulate metabolic reserve and capacity. Mechanistically, this property is highly dependent upon NKA \\u03b11 ability to regulate the signaling partner Src kinase and is not supported by NKA \\u03b12, which lacks the Src binding domain. In this work, our goal was to assess the impact of NKA \\u03b11 ablation in the heart and demonstrate the importance of NKA \\u03b11 signaling function for proper cardiomyocyte metabolic function. We used a Myh6\\u2010Cre/Lox approach to delete NKA \\u03b11 in the mouse heart (cardio \\u03b11\\u2010/\\u2010). These animals (3\\u2010month\\u2010old male mice) presented a normal cardiac structure, reduced NKA \\u03b11 expression (more than 100\\u2010fold; n = 6\\u20107; p < 0.01) and increased NKA \\u03b12 expression (10\\u2010fold; n = 6\\u20107; p < 0.01) by Western blot. RNA sequencing followed by gene set enrichment analysis revealed that cardio \\u03b11\\u2010/\\u2010 hearts have downregulated pathways related to mitochondrial metabolism, such as cytochrome complex, NADH dehydrogenase complex, respiratory chain, and mitochondrial fatty acid \\u03b2\\u2010oxidation (n = 3; FDR < 0.05). We next generated human induced pluripotent stem cells (hiPSCs) with a mutant form of the NKA \\u03b11 isoform that can pump ions but have blunted Src signaling (A420P mutant) using a CRISPR/Cas9\\u2010mediated knock\\u2010in approach. Genotyping and sequencing confirmed the substitution of alanine to proline in the NaKtide sequence to generate the desired mutation. These cells were differentiated into cardiomyocytes, as confirmed by overexpression of the cardiac markers myosin heavy chain 6 (MYH6) and cardiac muscle troponin T (TNNT2) (more than 10\\u2010fold; n = 3; p < 0.05). Metabolic phenotyping using the Agilent Seahorse Extracellular Flux technology suggested that the A420P mutant hiPSC\\u2010derived cardiomyocytes (A420P iCM) have decreased basal respiration, maximal respiration, spare respiratory capacity, and ATP production compared to the controls (WT iCM) based on changes in oxygen consumption rate (OCR) using the Agilent Seahorse XF Cell Mito Stress Test Kit. In addition, A420P iCM have reduced glycolytic capacity and reserve, based on changes in extracellular acidification rate (ECAR) using the Agilent Seahorse XF Glycolysis Stress Test Kit. Taken together, these results suggest that NKA \\u03b11 isoform signaling modulates the cardiomyocyte metabolism. Further studies may reveal a link between NKA/Src signaling, metabolic flexibility, and structural cardiac remodeling in the context of HF and cardiac hypertrophy.\"}, {\"paperId\": \"00a48cb6efafe48829f357f43615910edecb0de3\", \"externalIds\": {\"PubMedCentral\": \"10903178\", \"DOI\": \"10.1093/braincomms/fcad283\", \"CorpusId\": 264388884, \"PubMed\": \"38425576\"}, \"title\": \"Epilepsy and sudden unexpected death in epilepsy in a mouse model of human SCN1B-linked developmental and epileptic encephalopathy\", \"venue\": \"Brain Communications\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/braincomms/advance-article-pdf/doi/10.1093/braincomms/fcad283/52283641/fcad283.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10903178, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"80042554\", \"name\": \"Chunling Chen\"}, {\"authorId\": \"2260964567\", \"name\": \"Julie Ziobro\"}, {\"authorId\": \"2260964578\", \"name\": \"Larissa Robinson-Cooper\"}, {\"authorId\": \"2256764146\", \"name\": \"Samantha L. Hodges\"}, {\"authorId\": \"2261252935\", \"name\": \"Yan Chen\"}, {\"authorId\": \"1742024611\", \"name\": \"Nnamdi Edokobi\"}, {\"authorId\": \"1398934837\", \"name\": \"L. Lopez-Santiago\"}, {\"authorId\": \"2260968559\", \"name\": \"Karl Habig\"}, {\"authorId\": \"2260955059\", \"name\": \"Chloe Moore\"}, {\"authorId\": \"2260964700\", \"name\": \"Joe Minton\"}, {\"authorId\": \"2260964574\", \"name\": \"Sabrina Bramson\"}, {\"authorId\": \"2166053538\", \"name\": \"Caroline Scheuing\"}, {\"authorId\": \"2260968468\", \"name\": \"Noor Daddo\"}, {\"authorId\": \"1399681599\", \"name\": \"K. Sterbova\"}, {\"authorId\": \"2247300340\", \"name\": \"S. Weckhuysen\"}, {\"authorId\": \"2256333152\", \"name\": \"Jack M. Parent\"}, {\"authorId\": \"2267989247\", \"name\": \"Lori L. Isom\"}], \"abstract\": \"Abstract Voltage-gated sodium channel \\u03b21 subunits are essential proteins that regulate excitability. They modulate sodium and potassium currents, function as cell adhesion molecules and regulate gene transcription following regulated intramembrane proteolysis. Biallelic pathogenic variants in SCN1B, encoding \\u03b21, are linked to developmental and epileptic encephalopathy 52, with clinical features overlapping Dravet syndrome. A recessive variant, SCN1B-c.265C>T, predicting SCN1B-p.R89C, was homozygous in two children of a non-consanguineous family. One child was diagnosed with Dravet syndrome, while the other had a milder phenotype. We identified an unrelated biallelic SCN1B-c.265C>T patient with a clinically more severe phenotype than Dravet syndrome. We used CRISPR/Cas9 to knock-in SCN1B-p.R89C to the mouse Scn1b locus (Scn1bR89/C89). We then rederived the line on the C57BL/6J background to allow comparisons between Scn1bR89/R89 and Scn1bC89/C89 littermates with Scn1b+/+ and Scn1b\\u2212/\\u2212 mice, which are congenic on C57BL/6J, to determine whether the SCN1B-c.265C>T variant results in loss-of-function. Scn1bC89/C89 mice have normal body weights and \\u223c20% premature mortality, compared with severely reduced body weight and 100% mortality in Scn1b\\u2212/\\u2212 mice. \\u03b21-p.R89C polypeptides are expressed in brain at comparable levels to wild type. In heterologous cells, \\u03b21-p.R89C localizes to the plasma membrane and undergoes regulated intramembrane proteolysis similar to wild type. Heterologous expression of \\u03b21-p.R89C results in sodium channel \\u03b1 subunit subtype specific effects on sodium current. mRNA abundance of Scn2a, Scn3a, Scn5a and Scn1b was increased in Scn1bC89/C89 somatosensory cortex, with no changes in Scn1a. In contrast, Scn1b\\u2212/\\u2212 mouse somatosensory cortex is haploinsufficient for Scn1a, suggesting an additive mechanism for the severity of the null model via disrupted regulation of another Dravet syndrome gene. Scn1bC89/C89 mice are more susceptible to hyperthermia-induced seizures at post-natal Day 15 compared with Scn1bR89/R89 littermates. EEG recordings detected epileptic discharges in young adult Scn1bC89/C89 mice that coincided with convulsive seizures and myoclonic jerks. We compared seizure frequency and duration in a subset of adult Scn1bC89/C89 mice that had been exposed to hyperthermia at post-natal Day 15 versus a subset that were not hyperthermia exposed. No differences in spontaneous seizures were detected between groups. For both groups, the spontaneous seizure pattern was diurnal, occurring with higher frequency during the dark cycle. This work suggests that the SCN1B-c.265C>T variant does not result in complete loss-of-function. Scn1bC89/C89 mice more accurately model SCN1B-linked variants with incomplete loss-of-function compared with Scn1b\\u2212/\\u2212 mice, which model complete loss-of-function, and thus add to our understanding of disease mechanisms as well as our ability to develop new therapeutic strategies.\"}, {\"paperId\": \"00acc6edce42dda67358f01734855a9ed67fbcab\", \"externalIds\": {\"MAG\": \"3104455432\", \"PubMedCentral\": \"7654055\", \"DOI\": \"10.1186/s13024-020-00410-7\", \"CorpusId\": 226290526, \"PubMed\": \"33168053\"}, \"title\": \"Tauopathy-associated tau modifications selectively impact neurodegeneration and mitophagy in a novel C. elegans single-copy transgenic model\", \"venue\": \"Molecular Neurodegeneration\", \"year\": 2020, \"citationCount\": 48, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://molecularneurodegeneration.biomedcentral.com/track/pdf/10.1186/s13024-020-00410-7\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7654055, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1905551301\", \"name\": \"Sanjib Guha\"}, {\"authorId\": \"1943761791\", \"name\": \"Sarah Fischer\"}, {\"authorId\": \"145852234\", \"name\": \"G. Johnson\"}, {\"authorId\": \"152380438\", \"name\": \"K. Nehrke\"}], \"abstract\": \"Background A defining pathological hallmark of the progressive neurodegenerative disorder Alzheimer\\u2019s disease (AD) is the accumulation of misfolded tau with abnormal post-translational modifications (PTMs). These include phosphorylation at Threonine 231 (T231) and acetylation at Lysine 274 (K274) and at Lysine 281 (K281). Although tau is recognized to play a central role in pathogenesis of AD, the precise mechanisms by which these abnormal PTMs contribute to the neural toxicity of tau is unclear. Methods Human 0N4R tau (wild type) was expressed in touch receptor neurons of the genetic model organism C. elegans through single-copy gene insertion. Defined mutations were then introduced into the single-copy tau transgene through CRISPR-Cas9 genome editing. These mutations included T231E, to mimic phosphorylation of a commonly observed pathological epitope, and K274/281Q, to mimic disease-associated lysine acetylation \\u2013 collectively referred as \\u201cPTM-mimetics\\u201d \\u2013 as well as a T231A phosphoablation mutant. Stereotypical touch response assays were used to assess behavioral defects in the transgenic strains as a function of age. Genetically-encoded fluorescent biosensors were expressed in touch neurons and used to measure neuronal morphology, mitochondrial morphology, mitophagy, and macro autophagy. Results Unlike existing tau overexpression models, C. elegans single-copy expression of tau did not elicit overt pathological phenotypes at baseline. However, strains expressing disease associated PTM-mimetics (T231E and K274/281Q) exhibited reduced touch sensation and neuronal morphological abnormalities that increased with age. In addition, the PTM-mimetic mutants lacked the ability to engage neuronal mitophagy in response to mitochondrial stress. Conclusions Limiting the expression of tau results in a genetic model where modifications that mimic pathologic tauopathy-associated PTMs contribute to cryptic, stress-inducible phenotypes that evolve with age. These findings and their relationship to mitochondrial stress provides a new perspective into the pathogenic mechanisms underlying AD.\"}, {\"paperId\": \"00af9d2863f895f66ec5fefb17b3be2523e67d54\", \"externalIds\": {\"CorpusId\": 261464963}, \"title\": \"Digital Commons @ Connecticut College Digital Commons @ Connecticut College Winning entry for 2022 Winning entry for 2022\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://digitalcommons.conncoll.edu/cgi/viewcontent.cgi?article=1013&context=libprize, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2263000261\", \"name\": \"Binh Vo\"}, {\"authorId\": \"145883024\", \"name\": \"E. Charpentier\"}], \"abstract\": null}, {\"paperId\": \"00b46bd1ccd7c3f0054e099b940f2fa49d2339c7\", \"externalIds\": {\"DOI\": \"10.1016/j.bpj.2021.11.687\", \"CorpusId\": 246778833}, \"title\": \"Raman spectro-microscopy to improve gene therapy vehicle design for CRISPR/cas9 delivery\", \"venue\": \"Biophysical Journal\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.bpj.2021.11.687\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bpj.2021.11.687?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bpj.2021.11.687, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4515523\", \"name\": \"Ariel M. Alperstein\"}, {\"authorId\": \"51461966\", \"name\": \"Craig Van Bruggen\"}, {\"authorId\": \"35544187\", \"name\": \"Punarbasu Roy\"}, {\"authorId\": \"4116542\", \"name\": \"T. Reineke\"}, {\"authorId\": \"8142099\", \"name\": \"R. Frontiera\"}], \"abstract\": null}, {\"paperId\": \"00b6b88006cc2c6438c157b5aa41a5fbb43686d9\", \"externalIds\": {\"DOI\": \"10.1200/jco.2024.42.16_suppl.10038\", \"CorpusId\": 270232677}, \"title\": \"Revealing and targeting metabolic drivers contributing to treatment escape in diffuse midline glioma.\", \"venue\": \"Journal of Clinical Oncology\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1200/jco.2024.42.16_suppl.10038?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1200/jco.2024.42.16_suppl.10038, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2041994593\", \"name\": \"S. Frederico\"}, {\"authorId\": \"2363603532\", \"name\": \"Sina Neyazi\"}, {\"authorId\": \"2269030865\", \"name\": \"Pruthvi Gowda\"}, {\"authorId\": \"2304902092\", \"name\": \"Cuong M. Nguyen\"}, {\"authorId\": \"5217862\", \"name\": \"Maria C Trissal\"}, {\"authorId\": \"12219742\", \"name\": \"Erika P. Portero\"}, {\"authorId\": \"2219978490\", \"name\": \"John-Paul Haley-Read\"}, {\"authorId\": \"2304576591\", \"name\": \"Emily P. Anderson\"}, {\"authorId\": \"2269453309\", \"name\": \"Craig J. Thomas\"}, {\"authorId\": \"5520654\", \"name\": \"N. Danial\"}, {\"authorId\": \"39376363\", \"name\": \"M. Filbin\"}], \"abstract\": \"10038 Background: Diffuse midline glioma (DMG) is an aggressive pediatric brain tumor that predominately affects children, with a median survival of 9-11 months. DMGs are driven by self-renewing, stem-like glioma cells that have been stalled in an oligodendrocyte precursor cell (OPC)-like state and that highly express PDGFRA. This overexpression of PDGFRA has been shown to be pivotal in DMG development. Thus, targeting PDGFRA may serve as a viable treatment approach for DMG. In our previous studies, we revealed that avapritinib, a next generation tyrosine kinase inhibitor of PDGFRA, is highly effective in DMG cells. While a subset of patients receiving treatment with avapritinib experienced a promising clinical response, all patients eventually experienced tumor progression due to treatment escape. In this study, we investigated which mechanisms DMG cells use to escape avapritinib treatment, and how we can therapeutically exploit these resistance mechanisms. Methods: Transcriptomic profiling and functional assays were performed on patient-derived DMG cell lines. A combinatorial drug screening identified drug candidates evaluated in this study. Results: Bulk RNA sequencing analysis of two patient derived DMG cell lines revealed an upregulation of genes associated with both fatty acid metabolism and oxidative phosphorylation (OXPHOS) following avapritinib treatment. Functional assays confirmed elevated OXPHOS in avapritinib-treated cells with significant increases in mitochondrial energy transduction, palmitate- (a product of fatty acid metabolism) driven oxygen consumption rates, and incorporation of palmitate-derived carbons into the tricarboxylic acid (TCA) cycle. CRISPR-Cas9-mediated knockout of PDGFRAin one DMG cell line confirmed the metabolic changes observed following avapritinib treatment. Analysis of bulk RNA sequencing data revealed an upregulation of key fatty acid- related transcription factors in avapritinib-treated DMG cells. Specifically, Peroxisome Proliferator-Activated Receptor alpha (PPAR-alpha), Sterol Regulatory Binding Element Binding Transcription Factors 1 and 2, and Fatty Acid Synthase (FASN) were most prominently upregulated. To determine which therapies could target the dependency of avapritinib-treated cells on fatty acid metabolism, we performed a combinatorial drug screening and found three lipid pathway inhibitors that have synergistic cytotoxic effects with avapritinib. Specifically, a FASN inhibitor, cholesterol pathway inhibitor, and PPAR-alpha inhibitor. Conclusions: In this study, we revealed metabolic drivers that may contribute to avapritinib resistance in DMG cells, and identified compounds capable of inhibiting these drivers that demonstrate synergy with avapritinib. We now intend on testing these combination therapies in vivo as we aim to provide a long-term clinical benefit to DMG patients receiving avapritinib.\"}, {\"paperId\": \"00bb7b7bf907b66428957c6bdd4bf83073ccf8fb\", \"externalIds\": {\"PubMedCentral\": \"11082681\", \"DOI\": \"10.21037/tcr-24-434\", \"CorpusId\": 269452091, \"PubMed\": \"38737690\"}, \"title\": \"Pan-cancer prognostic model and immune microenvironment analysis of natural killer cell-related genes\", \"venue\": \"Translational Cancer Research\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.21037/tcr-24-434\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11082681, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2309659730\", \"name\": \"Caihong Li\"}, {\"authorId\": \"2238151597\", \"name\": \"Yuxing Huang\"}, {\"authorId\": \"2330088498\", \"name\": \"X. Yi\"}, {\"authorId\": \"2298929317\", \"name\": \"Youpan Tang\"}, {\"authorId\": \"4814392\", \"name\": \"R. Okita\"}, {\"authorId\": \"2314160194\", \"name\": \"Jun He\"}], \"abstract\": \"Background Natural killer (NK) cells play a significant role in antitumor immunity and are closely related to tumor prognosis and recurrence. NK cell-based tumor immunotherapy, including immune checkpoint inhibition and CAR-engineered NK cells, is a promising area of research. However, there is a need for better NK cell-related models and associated biomarkers. Methods The sequences of NK cell-related genes were obtained from the published NK cell CRISPR/Cas9 library data, and the common genes were selected as NK cell-related genes. The RNA sequencing (RNA-seq) and clinical data of 32 solid tumors from The Cancer Genome Atlas (TCGA) were downloaded from the UCSC Xena database, and the RNA-seq data of normal samples were downloaded from the Genotype-Tissue Expression (GTEx) database. The differentially expressed NK cell-related genes (DENKGs) between the tumor and normal samples were analyzed. The DENKGs related to the prognosis of solid tumors were selected via univariate Cox analysis, and 32 kinds of solid tumor prognostic models were constructed using least absolute shrinkage and selection operator (LASSO) and multivariate Cox analysis. Survival, receiver operating characteristic (ROC), and independent prognostic analyses were employed to test the effectiveness of the model, along with a nomogram model and prediction curve. Differences in the immune pathways and microenvironment cells were analyzed between the high- and low-risk groups identified by the model. Results We constructed a pan-cancer prognostic model with 63 NK cell-related genes and further identified DEPDC1 and ASPM as potentially offering new directions in tumor research by literature screening. Conclusions In this study, 63 prognostic solid tumor markers were investigated using NK cell-related genes, and for the first time, a pan-cancer prognostic model was constructed to analyze their role in the immune microenvironment, which may contribute new insights into tumor research.\"}, {\"paperId\": \"00bd9a2e3aec31f3cd6acfb8fc45b3c6b10d7ced\", \"externalIds\": {\"DOI\": \"10.4049/jimmunol.210.supp.243.01\", \"CorpusId\": 260823823}, \"title\": \"Blimp-1 is a negative regulator of IL-2 signaling in T cells\", \"venue\": \"Journal of Immunology\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.aai.org/jimmunol/article-pdf/210/1_Supplement/243.01/1630796/243_01.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4049/jimmunol.210.supp.243.01?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4049/jimmunol.210.supp.243.01, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"66619552\", \"name\": \"Suyasha Roy\"}, {\"authorId\": \"2073748497\", \"name\": \"Min Ren\"}, {\"authorId\": \"2191740416\", \"name\": \"Stephen M. Christensen\"}, {\"authorId\": \"2152926293\", \"name\": \"Peng Li\"}, {\"authorId\": \"2077372507\", \"name\": \"Rosanne Spolski\"}, {\"authorId\": \"2633093\", \"name\": \"J. Phelan\"}, {\"authorId\": \"5378372\", \"name\": \"L. Staudt\"}, {\"authorId\": \"28398252\", \"name\": \"W. Leonard\"}], \"abstract\": \"\\n Interleukin-2 (IL-2) is a T cell growth factor with immunomodulatory effects and pleiotropic actions on T cells. IL-2 signaling occurs via the intermediate IL-2Rb and IL-2Rg and high-affinity IL-2Ra receptors, fine-tuning tolerance and effector functions. To investigate key regulators of the IL-2 signaling pathway, we performed genome-wide CRISPR-Cas9 screening in IL-2-dependent ED40515(+) cells, which were derived from a patient with HTLV-I associated Adult T Cell Leukemia. We found a significant dropout of sgRNAs for genes known to be important in IL-2 signaling, whereas sgRNAs targeting Prdm1 were highly enriched, with its being the top enriched hit in the screen. Prdm1 encodes Blimp-1, which is known to inhibit IL-2 production in T cells; however, its precise role in IL-2 signaling pathway remains elusive. Overexpression of Prdm1 resulted in lower expression of IL-2R subunits (CD25, CD122, CD132) and decreased IL-2-induced phosphorylation of STAT5, AKT, ERK in mouse CD4 +T cells. Correspondingly, conditional knockout (CKO) of Prdm1 in mouse CD4 +T cells and Tregs led to enhanced expression of IL-2R subunits, pSTAT5, pAKT and pERK. In an influenza infection mouse model, CD122 expression and pSTAT5 levels were higher in T follicular helper (T FH) cells from Prdm1 CKO mice as compared to WT T FHcells. Further, adoptive transfer of Prdm1 CKO Tregs into Rag1 \\u2212/\\u2212mice resulted in augmented IL-2 signaling and ameliorated inflammation in colitis. Concordantly, CRISPR/Cas9-mediated deletion of Prdm1 in human CD4 +T cells and Tregs resulted in increased expression of IL-2R subunits and IL-2-induced phosphorylation of STAT5, AKT and ERK. These results suggest that Blimp-1 is a negative regulator of IL-2 signaling in mouse and human T cells.\\n Supported by intramural funding from NIH\"}, {\"paperId\": \"00c12f3fe25d99e5903f5192d95bcf5e52780bc5\", \"externalIds\": {\"DOI\": \"10.1016/j.jksus.2023.103063\", \"CorpusId\": 266216247}, \"title\": \"CRISPR/Cas9 mediated TaRPK1 root architecture gene mutagenesis confers enhanced wheat yield\", \"venue\": \"Journal of King Saud University - Science\", \"year\": 2023, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.jksus.2023.103063\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jksus.2023.103063?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jksus.2023.103063, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2133656882\", \"name\": \"A. A. Abdul Rahim\"}, {\"authorId\": \"2133364998\", \"name\": \"Muhammad Uzair\"}, {\"authorId\": \"40560720\", \"name\": \"N. Rehman\"}, {\"authorId\": \"81092861\", \"name\": \"S. Fiaz\"}, {\"authorId\": \"2246698172\", \"name\": \"Kotb A. Attia\"}, {\"authorId\": \"8115284\", \"name\": \"A. Abushady\"}, {\"authorId\": \"2274162743\", \"name\": \"Seung Hwan Yang\"}, {\"authorId\": \"147577149\", \"name\": \"Muhammad Ramzan Khan\"}], \"abstract\": null}, {\"paperId\": \"00c29eb9a78565a7e8d2924a8d5d2144521381b8\", \"externalIds\": {\"MAG\": \"3096800089\", \"DOI\": \"10.1101/2020.04.06.028597\", \"CorpusId\": 215731507, \"PubMed\": \"33158842\"}, \"title\": \"Genetically Defined, Syngeneic Organoid Platform for Developing Combination Therapies for Ovarian Cancer\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 74, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://cancerdiscovery.aacrjournals.org/content/candisc/11/2/362.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.04.06.028597?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.04.06.028597, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2140178184\", \"name\": \"Shuang Zhang\"}, {\"authorId\": \"9846577\", \"name\": \"S. Iyer\"}, {\"authorId\": \"48325791\", \"name\": \"H. Ran\"}, {\"authorId\": \"6337929\", \"name\": \"Igor Dolgalev\"}, {\"authorId\": \"5500551\", \"name\": \"Shengqing Gu\"}, {\"authorId\": \"145509487\", \"name\": \"Wei Wei\"}, {\"authorId\": \"2064608936\", \"name\": \"C. Foster\"}, {\"authorId\": \"2254127967\", \"name\": \"Cynthia A. Loomis\"}, {\"authorId\": \"46600093\", \"name\": \"Narciso Olvera\"}, {\"authorId\": \"4703818\", \"name\": \"F. Dao\"}, {\"authorId\": \"2057195328\", \"name\": \"Douglas A Levine\"}, {\"authorId\": \"2411266135\", \"name\": \"R. Weinberg\"}, {\"authorId\": \"2291271\", \"name\": \"B. Neel\"}], \"abstract\": \"The paucity of genetically informed, immune-competent tumor models impedes evaluation of conventional, targeted, and immune therapies. By engineering mouse fallopian tube (FT) organoids using lentiviral gene transduction and/or CRISPR/Cas9 mutagenesis, we generated multiple high grade serous ovarian carcinoma (HGSOC) models exhibiting mutational combinations seen in patients. Detailed analysis of homologous recombination (HR)-proficient (Tp53-/-;Ccne1OE;Akt2OE; KrasOE), HR-deficient (Tp53-/-;Brca1-/-;MycOE) and unclassified (Tp53-/-;Pten-/-;Nf1-/-) organoids revealed differences in in vitro properties and tumorigenicity. Tumorigenic organoids had variable sensitivity to HGSOC chemotherapeutics and evoked distinct immune microenvironments. These findings enabled development of a chemotherapy/immunotherapy regimen that yielded durable, T-cell dependent responses in Tp53-/-;Ccne1OE;Akt2OE;Kras HGSOC; by contrast, Tp53-/-;Pten-/-;Nf1-/- tumors failed to respond. Genotype-informed, syngeneic organoid models could provide an improved platform for rapid evaluation of tumor biology and therapeutics. HIGHLIGHTS Orthotopic injection of genetically defined fallopian tube organoids yield HGSOC. Ovarian tumors with different genotypes evoke distinct immune microenvironments Combining Gemcitabine, anti-PD-L1, and anti-CTLA-4 result in complete responses in Tp53-/-;Ccne1OE;Akt2OE;KrasOE organoid-derived HGSOC Therapeutic response is tumor genotype-specific\"}, {\"paperId\": \"00c38131bc43d2a821ecb74b0441ca93ff003b1b\", \"externalIds\": {\"PubMedCentral\": \"10201440\", \"DOI\": \"10.1093/nar/gkad172\", \"CorpusId\": 257580787, \"PubMed\": \"36928661\"}, \"title\": \"Excessive transcription-replication conflicts are a vulnerability of BRCA1-mutant cancers\", \"venue\": \"Nucleic Acids Research\", \"year\": 2023, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/nar/advance-article-pdf/doi/10.1093/nar/gkad172/49550159/gkad172.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10201440, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4847969\", \"name\": \"Parasvi S Patel\"}, {\"authorId\": \"1818243686\", \"name\": \"Arash Algouneh\"}, {\"authorId\": \"34280849\", \"name\": \"R. Krishnan\"}, {\"authorId\": \"145408039\", \"name\": \"J. Reynolds\"}, {\"authorId\": \"34795099\", \"name\": \"K. Nixon\"}, {\"authorId\": \"2097713313\", \"name\": \"Junsheng Hao\"}, {\"authorId\": \"2345653109\", \"name\": \"Jihoon Lee\"}, {\"authorId\": \"2150670242\", \"name\": \"Yue Feng\"}, {\"authorId\": \"2211918506\", \"name\": \"Chehronai Fozil\"}, {\"authorId\": \"2144583156\", \"name\": \"Mia Stanic\"}, {\"authorId\": \"2211928753\", \"name\": \"Talya Yerlici\"}, {\"authorId\": \"67074099\", \"name\": \"Peiran Su\"}, {\"authorId\": \"40044856\", \"name\": \"F. Soares\"}, {\"authorId\": \"30495990\", \"name\": \"Elisabeth Liedtke\"}, {\"authorId\": \"3952444\", \"name\": \"G. Priv\\u00e9\"}, {\"authorId\": \"2211918542\", \"name\": \"Gary D Baider\"}, {\"authorId\": \"1399642535\", \"name\": \"M. Pujana\"}, {\"authorId\": \"4342368\", \"name\": \"Karim Mekhail\"}, {\"authorId\": \"32283845\", \"name\": \"H. He\"}, {\"authorId\": \"5420878\", \"name\": \"A. Hakem\"}, {\"authorId\": \"10361149\", \"name\": \"G. Stewart\"}, {\"authorId\": \"4105834\", \"name\": \"R. Hakem\"}], \"abstract\": \"Abstract BRCA1 mutations are associated with increased breast and ovarian cancer risk. BRCA1-mutant tumors are high-grade, recurrent, and often become resistant to standard therapies. Herein, we performed a targeted CRISPR-Cas9 screen and identified MEPCE, a methylphosphate capping enzyme, as a synthetic lethal interactor of BRCA1. Mechanistically, we demonstrate that depletion of MEPCE in a BRCA1-deficient setting led to dysregulated RNA polymerase II (RNAPII) promoter-proximal pausing, R-loop accumulation, and replication stress, contributing to transcription-replication collisions. These collisions compromise genomic integrity resulting in loss of viability of BRCA1-deficient cells. We also extend these findings to another RNAPII-regulating factor, PAF1. This study identifies a new class of synthetic lethal partners of BRCA1 that exploit the RNAPII pausing regulation and highlight the untapped potential of transcription-replication collision-inducing factors as unique potential therapeutic targets for treating cancers associated with BRCA1 mutations.\"}, {\"paperId\": \"00c4b173e748d0ee22c3af15a521eb8d306ff75e\", \"externalIds\": {\"MAG\": \"3095556947\", \"CorpusId\": 229248322}, \"title\": \"\\u57fa\\u56e0\\u7f16\\u8f91\\u6280\\u672f\\u5e94\\u7528\\u7684\\u6cd5\\u5f8b\\u53ca\\u4f26\\u7406\\u89c4\\u5236\\u63a2\\u6790--\\u4ee5CRISPR/Cas9\\u6280\\u672f\\u4e3a\\u4f8b\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2037921919\", \"name\": \"\\u59da\\u5c71\\u6625\"}], \"abstract\": null}, {\"paperId\": \"00c7bfdd6daf68070fa43f7e0a04782a00cc2e76\", \"externalIds\": {\"DOI\": \"10.4049/jimmunol.208.supp.173.11\", \"CorpusId\": 255658866}, \"title\": \"Cell-interaction based CRISPR screening using intercellular barcode transfer\", \"venue\": \"Journal of Immunology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4049/jimmunol.208.supp.173.11?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4049/jimmunol.208.supp.173.11, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"27840781\", \"name\": \"Neil Tay\"}, {\"authorId\": \"2076048807\", \"name\": \"Michael Mcmanus\"}], \"abstract\": \"\\n Cell to cell interaction is one of the fundamental paradigms in cell biology and it is central to immune processes. While recent advances have allowed us to monitor cell interactions both in vitro and in vivo, doing so at large scales with complex interactions remain challenging. We have developed Relay, a scalable technology by which cellular interactions can be tracked via molecular barcoding and intercellular transfer of barcodes. We employed our system to perform a novel cell interaction-based CRISPR screen that was not possible with conventional CRISPR screening strategies. In our screen, we investigated factors that are involved in antigen processing, presentation, and transfer in myeloid cells using a myeloid-T cell co-culture system. By utilizing CRISPR/Cas9 together with Relay, we were able to perform genome-wide perturbations in myeloid cells and concurrently track myeloid-T cell interactions, allowing us to directly associate antigen sampling by T cells to genetic perturbations affecting antigen processing in the myeloid cells.\\n Supported by grant from NIH (U01 CA217882).\"}, {\"paperId\": \"00ca453ee325a30350c769fe1546335d00f7d44f\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2022.102677\", \"CorpusId\": 246412074, \"PubMed\": \"35092938\"}, \"title\": \"Generation of homozygous Nav1.8 knock-out iPSC lines by CRISPR Cas9 genome editing to investigate a potential new antiarrhythmic strategy.\", \"venue\": \"Stem Cell Research\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2022.102677\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2022.102677?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2022.102677, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1382106680\", \"name\": \"W. Maurer\"}, {\"authorId\": \"24274656\", \"name\": \"N. Hartmann\"}, {\"authorId\": \"21201770\", \"name\": \"L. Argyriou\"}, {\"authorId\": \"6296134\", \"name\": \"S. Sossalla\"}, {\"authorId\": \"1401588719\", \"name\": \"K. Streckfuss-B\\u00f6meke\"}], \"abstract\": \"The sodium channel Nav1.8, encoded by SCN10A, is reported to contribute to arrhythmogenesis by inducing the late INa and thereby enhanced persistent Na+ current. However, its exact electrophysiological role in cardiomyocytes remains unclear. Here, we generated induced pluripotent stem cells (iPSCs) with a homozygous SCN10A knock-out from a healthy iPSC line by CRISPR Cas9 genome editing. The edited iPSCs maintained full pluripotency, genomic integrity, and spontaneous in vitro differentiation capacity. The iPSCs are able to differentiate into iPSC-cardiomyocytes, hence making it possible to investigate the role of Nav1.8 in the heart.\"}, {\"paperId\": \"00ca99f70a5d37c3949efaddb7c05726fdb8b49b\", \"externalIds\": {\"PubMedCentral\": \"8192901\", \"DOI\": \"10.1038/s41598-021-90452-8\", \"CorpusId\": 235402720, \"PubMed\": \"34112814\"}, \"title\": \"Age-dependent transition from islet insulin hypersecretion to hyposecretion in mice with the long QT-syndrome loss-of-function mutation Kcnq1-A340V\", \"venue\": \"Scientific Reports\", \"year\": 2021, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-021-90452-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8192901, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"10688832\", \"name\": \"A. Lubberding\"}, {\"authorId\": \"2144135678\", \"name\": \"Jinyi Zhang\"}, {\"authorId\": \"1954907\", \"name\": \"M. Lundh\"}, {\"authorId\": \"4833432\", \"name\": \"T. Nielsen\"}, {\"authorId\": \"2339570357\", \"name\": \"M. S. S\\u00f8ndergaard\"}, {\"authorId\": \"103515149\", \"name\": \"Mary Villadsen\"}, {\"authorId\": \"2111388907\", \"name\": \"E. Z. Skovh\\u00f8j\"}, {\"authorId\": \"6110632\", \"name\": \"G. A. Boer\"}, {\"authorId\": \"2237203554\", \"name\": \"J. B. Hansen\"}, {\"authorId\": \"145956223\", \"name\": \"M. Thomsen\"}, {\"authorId\": \"6423086\", \"name\": \"J. T. Treebak\"}, {\"authorId\": \"143895715\", \"name\": \"J. Holst\"}, {\"authorId\": \"122932765\", \"name\": \"J. Kanters\"}, {\"authorId\": \"1400639039\", \"name\": \"T. Mandrup-Poulsen\"}, {\"authorId\": \"50376080\", \"name\": \"T. Jespersen\"}, {\"authorId\": \"50810830\", \"name\": \"Brice Emanuelli\"}, {\"authorId\": \"4451487\", \"name\": \"S. Torekov\"}], \"abstract\": \"Loss-of-function (LoF) mutations in KCNQ1, encoding the voltage-gated K+ channel Kv7.1, lead to long QT syndrome 1 (LQT1). LQT1 patients also present with post-prandial hyperinsulinemia and hypoglycaemia. In contrast, KCNQ1 polymorphisms are associated with diabetes, and LQTS patients have a higher prevalence of diabetes. We developed a mouse model with a LoF Kcnq1 mutation using CRISPR-Cas9 and hypothesized that this mouse model would display QT prolongation, increased glucose-stimulated insulin secretion and allow for interrogation of Kv7.1 function in islets. Mice were characterized by electrocardiography and oral glucose tolerance tests. Ex vivo, islet glucose-induced insulin release was measured, and beta-cell area quantified by immunohistochemistry. Homozygous mice had QT prolongation. Ex vivo, glucose-stimulated insulin release was increased in islets from homozygous mice at 12\\u201314 weeks, while beta-cell area was reduced. Non-fasting blood glucose levels were decreased at this age. In follow-up studies 8\\u201310 weeks later, beta-cell area was similar in all groups, while glucose-stimulated insulin secretion was now reduced in islets from hetero- and homozygous mice. Non-fasting blood glucose levels had normalized. These data suggest that Kv7.1 dysfunction is involved in a transition from hyper- to hyposecretion of insulin, potentially explaining the association with both hypoglycemia and hyperglycemia in LQT1 patients.\"}, {\"paperId\": \"00cb9e62b4ff8b34fad8927c1680ed291e89f73c\", \"externalIds\": {\"DBLP\": \"conf/icbbb/Qu23\", \"DOI\": \"10.1145/3586139.3586154\", \"CorpusId\": 260736617}, \"title\": \"Investigating Conventional and Novel Methods for Treatment of Cancer\", \"venue\": \"International Conference Bioscience, Biochemistry and Bioinformatics\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://dl.acm.org/doi/pdf/10.1145/3586139.3586154\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1145/3586139.3586154?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1145/3586139.3586154, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"121669519\", \"name\": \"Zhi-Gang Qu\"}], \"abstract\": \"Cancer is one of the most challenging health problems facing humankind. Conventional treatments such as surgery, chemotherapy and radiotherapy can usually have a positive patient outcome in the early-stage tumours without metastasis. However, late-stage cancers can have high mortality; therefore, urging scientists and clinicians to investigate novel treatment approaches. Novel cancer treatment methods provide specific treatment for patients with different cancer types and substantially elevate the survival rate, prognosis, and quality of life, commonly with a much lower immune-related side effect. Monoclonal antibodies are one of the fastest growing novel treatments with high target specificity and high therapeutic selectivity, enabling the treatment of advanced cancers with a low autoimmune inflammatory reaction. Chimeric antigen receptor (CAR)-T is another novel treatment which edits target T lymphocytes for high target specificity and high therapeutic selectivity. However, challenges exist, such as cytokine release syndrome resulting in immunotoxicity problems, including neurotoxicity and brain oedema. Cancer is a genetic disease, and gene-editing technologies, such as CRISPR/Cas9, enable gene modification to cure the disease completely in gene therapy. Although limitations, such as off-target effect and DNA-damaged toxicity can cause immunotoxicity problems, multiple derivatives of the CRISPR system can provide long-term cancer treatment. This review discusses conventional and novel cancer treatment methods and explains challenges which need to be addressed before such treatments are widely available in cancer treatment.\"}, {\"paperId\": \"00cc3138bbb97a4243113b83d551a83dd96f6a20\", \"externalIds\": {\"PubMedCentral\": \"9366062\", \"DOI\": \"10.1111/mpp.13227\", \"CorpusId\": 249710593, \"PubMed\": \"35706371\"}, \"title\": \"Knockout of SlTOM1 and SlTOM3 results in differential resistance to tobamovirus in tomato\", \"venue\": \"Molecular plant pathology\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/mpp.13227\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9366062, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5035790\", \"name\": \"M. Kravchik\"}, {\"authorId\": \"51115739\", \"name\": \"Y. Shnaider\"}, {\"authorId\": \"13714666\", \"name\": \"B. Abebie\"}, {\"authorId\": \"2170527172\", \"name\": \"Meital Shtarkman\"}, {\"authorId\": \"36832169\", \"name\": \"R. Kumari\"}, {\"authorId\": \"49596319\", \"name\": \"Surender Kumar\"}, {\"authorId\": \"6924487\", \"name\": \"D. Leibman\"}, {\"authorId\": \"10998860\", \"name\": \"Ziv Spiegelman\"}, {\"authorId\": \"102059211\", \"name\": \"A. Gal\\u2010On\"}], \"abstract\": \"Abstract During tobamovirus\\u2013host coevolution, tobamoviruses developed numerous interactions with host susceptibility factors and exploited these interactions for replication and movement. The plant\\u2010encoded TOBAMOVIRUS MULTIPLICATION (TOM) susceptibility proteins interact with the tobamovirus replicase proteins and allow the formation of the viral replication complex. Here CRISPR/Cas9\\u2010mediated mutagenesis allowed the exploration of the roles of SlTOM1a, SlTOM1b, and SlTOM3 in systemic tobamovirus infection of tomato. Knockouts of both SlTOM1a and SlTOM3 in sltom1a/sltom3 plants resulted in an asymptomatic response to the infection with recently emerged tomato brown rugose fruit virus (ToBRFV). In addition, an accumulation of ToBRFV RNA and coat protein (CP) in sltom1a/sltom3 mutant plants was 516\\u2010 and 25\\u2010fold lower, respectively, than in wild\\u2010type (WT) plants at 12 days postinoculation. In marked contrast, sltom1a/sltom3 plants were susceptible to previously known tomato viruses, tobacco mosaic virus (TMV) and tomato mosaic virus (ToMV), indicating that SlTOM1a and SlTOM3 are not essential for systemic infection of TMV and ToMV in tomato plants. Knockout of SlTOM1b alone did not contribute to ToBRFV and ToMV resistance. However, in triple mutants sltom1a/sltom3/sltom1b, ToMV accumulation was three\\u2010fold lower than in WT plants, with no reduction in symptoms. These results indicate that SlTOM1a and SlTOM3 are essential for the replication of ToBRFV, but not for ToMV and TMV, which are associated with additional susceptibility proteins. Additionally, we showed that SlTOM1a and SlTOM3 positively regulate the tobamovirus susceptibility gene SlARL8a3. Moreover, we found that the SlTOM family is involved in the regulation of plant development.\"}, {\"paperId\": \"00cc36c838f37db67e8b3231fef7e30ddf7ca22a\", \"externalIds\": {\"DOI\": \"10.1093/stmcls/sxac068\", \"CorpusId\": 252381584, \"PubMed\": \"36124999\"}, \"title\": \"Inhibition of O-GlcNAcase inhibits hematopoietic and leukemic stem cell self-renewal and drives dendritic cell differentiation via STAT3/5 signaling.\", \"venue\": \"Stem Cells\", \"year\": 2022, \"citationCount\": 12, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1093/stmcls/sxac068?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/stmcls/sxac068, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5262058\", \"name\": \"Sudjit Luanpitpong\"}, {\"authorId\": \"6031783\", \"name\": \"Napachai Rodboon\"}, {\"authorId\": \"24345691\", \"name\": \"P. Samart\"}, {\"authorId\": \"13484259\", \"name\": \"Montira Janan\"}, {\"authorId\": \"15123202\", \"name\": \"P. Klaihmon\"}, {\"authorId\": \"3792522\", \"name\": \"C. Lorthongpanich\"}, {\"authorId\": \"1390125006\", \"name\": \"Y. U-pratya\"}, {\"authorId\": \"5306084\", \"name\": \"S. Issaragrisil\"}], \"abstract\": null}, {\"paperId\": \"00d1dd106e099671092ea94bad4dd12d232de194\", \"externalIds\": {\"PubMedCentral\": \"8573191\", \"DOI\": \"10.1093/emph/eoab026\", \"CorpusId\": 239439332, \"PubMed\": \"34754452\"}, \"title\": \"Evolutionary selection of alleles in the melanophilin gene that impacts on prostate organ function and cancer risk\", \"venue\": \"Evolution, Medicine and Public Health\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/emph/eoab026\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8573191, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3944375\", \"name\": \"L. Ermini\"}, {\"authorId\": \"145887020\", \"name\": \"Jeffrey C. Francis\"}, {\"authorId\": \"113239364\", \"name\": \"G. Rosa\"}, {\"authorId\": \"2147401650\", \"name\": \"Alexandra J Rose\"}, {\"authorId\": \"50496422\", \"name\": \"J. Ning\"}, {\"authorId\": \"2327144\", \"name\": \"M. Greaves\"}, {\"authorId\": \"8898242\", \"name\": \"A. Swain\"}], \"abstract\": \"Abstract Background and objectives Several hundred inherited genetic variants or SNPs that alter the risk of cancer have been identified through genome-wide association studies. In populations of European ancestry, these variants are mostly present at relatively high frequencies. To gain insight into evolutionary origins, we screened a series of genes and SNPs linked to breast or prostate cancer for signatures of historical positive selection. Methodology We took advantage of the availability of the 1000 genome data and we performed genomic scans for positive selection in five different Caucasian populations as well as one African reference population. We then used prostate organoid cultures to provide a possible functional explanation for the interplay between the action of evolutionary forces and the disease risk association. Results Variants in only one gene showed genomic signatures of positive, evolutionary selection within Caucasian populations melanophilin (MLPH). Functional depletion of MLPH in prostate organoids, by CRISPR/Cas9 mutation, impacted lineage commitment of progenitor cells promoting luminal versus basal cell differentiation and on resistance to androgen deprivation. Conclusions and implications The MLPH variants influencing prostate cancer risk may have been historically selected for their adaptive benefit on skin pigmentation but MLPH is highly expressed in the prostate and the derivative, positively selected, alleles decrease the risk of prostate cancer. Our study suggests a potential functional mechanism via which MLPH and its genetic variants could influence risk of prostate cancer, as a serendipitous consequence of prior evolutionary benefits to another tissue. Lay Summary We screened a limited series of genomic variants associated with breast and prostate cancer risk for signatures of historical positive selection. Variants within the melanophilin (MLPH) gene fell into this category. Depletion of MLPH in prostate organoid cultures, suggested a potential functional mechanism for impacting on cancer risk, as a serendipitous consequence of prior evolutionary benefits to another tissue.\"}, {\"paperId\": \"00d60d12104a0e340910a87aba3a0494166bcc1b\", \"externalIds\": {\"DOI\": \"10.1158/1538-8514.synthleth24-pr009\", \"CorpusId\": 270382633}, \"title\": \"Abstract PR009: Cytidine diphosphate diacylglycerol synthase 2 is a synthetic lethal target in mesenchymal cancers\", \"venue\": \"Molecular Cancer Therapeutics\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-8514.synthleth24-pr009?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-8514.synthleth24-pr009, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2305708765\", \"name\": \"Tim Arnoldus\"}, {\"authorId\": \"2161871654\", \"name\": \"Alex van Vliet\"}, {\"authorId\": \"2305702384\", \"name\": \"A. F. de Groot\"}, {\"authorId\": \"2058780890\", \"name\": \"N. Blomberg\"}, {\"authorId\": \"5325349\", \"name\": \"Onno B. Bleijerveld\"}, {\"authorId\": \"1403606744\", \"name\": \"Susan E van Hal-van Veen\"}, {\"authorId\": \"6246758\", \"name\": \"A. Grootemaat\"}, {\"authorId\": \"2305706659\", \"name\": \"Rolf Harkes\"}, {\"authorId\": \"8252140\", \"name\": \"N. N. van der Wel\"}, {\"authorId\": \"2305708942\", \"name\": \"Maarten Altelaar\"}, {\"authorId\": \"3756767\", \"name\": \"M. Giera\"}, {\"authorId\": \"4470463\", \"name\": \"D. Peeper\"}], \"abstract\": \"\\n Synthetic lethal interactions (SLIs) can provide a therapeutic index, as illustrated by PARP inhibition of BRCA-deficient cancers. This clinical success, and other examples, have spurred efforts to identify additional cancer-associated SLIs. Whereas additional SLIs based on genomic alterations in cancer have been identified, we set out to explore the SLI space as a function of differential RNA expression profiles in cancer and normal tissue, covering all \\u223c3.4e8 gene pairs. In our bioinformatic pipeline, synthetic lethality is scored by correlating DepMap dependency and expression data (n = 913 cancer cell lines), while cancer specificity is scored by comparing TCGA expression data for 9264 tumors and 741 healthy samples. Cancer specificity is confirmed by comparing also calibrated GTEx data for 17382 healthy tissue samples with calibrated DepMap expression data. With this pipeline we uncovered a frequent cancer-specific SLI between the paralogs cytidine diphosphate diacylglycerol synthase 1 (CDS1) and CDS2 (p<0.001 in all three analyses). Essentiality of CDS2 is observed in one third of cultured cancers (DepMap). Using CRISPR-Cas9 we confirm the CDS1-dependency for CDS2 essentiality in a panel of 12 cultured cancer cell lines, with lethality by CDS2 ablation reaching up to 98% in CDS1-negative cell lines. We also confirm the SLI using admixing experiments in tumor-bearing mice for two cell lines (6 mice per group, up to 95% synthetic lethality, p<0.001). The essentiality of CDS2 for cell survival is observed for mesenchymal-like cancers, which commonly express low levels of CDS1. To biochemically define the effects of CDS2 perturbation in CDS1-negative cancer cells, we performed multi-omic analyses in a panel of CDS1-negative cancer cell lines. The results show that mechanistically, the CDS1-2 SLI is accompanied by disruption of lipid homeostasis, including extensive accumulation of cholesterol esters and triglycerides. Additionally, quantitative western blotting for cleaved caspase-3 showed induction of apoptotic cell death (p<0.001 in 2 cell lines). To challenge the robustness of the SLI, we performed genome-wide CRISPR-Cas9 knockout screens in a panel of four CDS1-negative cancer cell lines. This failed to identify a common escape mechanism of death caused by CDS2 ablation. These findings suggest that no common escape to the combined loss of CDS1 and CDS2 is possible through loss-of-function. In conclusion, by computational, genetic, biochemical and functional analyses we demonstrate that CDS2 may serve as a target in mesenchymal cancers, meriting therapeutic exploration.\\n Citation Format: Tim Arnoldus, Alex van Vliet, Adriaan F.H. de Groot, Niek Blomberg, Onno B. Bleijerveld, Susan E. van Hal-van Veen, Anita E. Grootemaat, Rolf Harkes, Nicole N. van der Wel, Maarten Altelaar, Martin Giera, Daniel S. Peeper. Cytidine diphosphate diacylglycerol synthase 2 is a synthetic lethal target in mesenchymal cancers [abstract]. In: Proceedings of the AACR Special Conference in Cancer Research: Expanding and Translating Cancer Synthetic Vulnerabilities; 2024 Jun 10-13; Montreal, Quebec, Canada. Philadelphia (PA): AACR; Mol Cancer Ther 2024;23(6 Suppl):Abstract nr PR009.\"}, {\"paperId\": \"00dc58dadffad88b71250672c62fb1abb4a7e84f\", \"externalIds\": {\"PubMedCentral\": \"8346106\", \"DOI\": \"10.3390/ijms22157766\", \"CorpusId\": 236944524, \"PubMed\": \"34360533\"}, \"title\": \"Molecular Characterization of Carbonic Anhydrase Genes in Lotus japonicus and Their Potential Roles in Symbiotic Nitrogen Fixation\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/15/7766/pdf?version=1626846844\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8346106, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144178147\", \"name\": \"Longlong Wang\"}, {\"authorId\": \"47662905\", \"name\": \"Jianjun Liang\"}, {\"authorId\": \"2110633024\", \"name\": \"Yu Zhou\"}, {\"authorId\": \"2144012621\", \"name\": \"Tao Tian\"}, {\"authorId\": \"50998410\", \"name\": \"Bao-Cheng Zhang\"}, {\"authorId\": \"4751920\", \"name\": \"Deqiang Duanmu\"}], \"abstract\": \"Carbonic anhydrase (CA) plays a vital role in photosynthetic tissues of higher plants, whereas its non-photosynthetic role in the symbiotic root nodule was rarely characterized. In this study, 13 CA genes were identified in the model legume Lotus japonicus by comparison with Arabidopsis CA genes. Using qPCR and promoter-reporter fusion methods, three previously identified nodule-enhanced CA genes (Lj\\u03b1CA2, Lj\\u03b1CA6, and Lj\\u03b2CA1) have been further characterized, which exhibit different spatiotemporal expression patterns during nodule development. Lj\\u03b1CA2 was expressed in the central infection zone of the mature nodule, including both infected and uninfected cells. Lj\\u03b1CA6 was restricted to the vascular bundle of the root and nodule. As for Lj\\u03b2CA1, it was expressed in most cell types of nodule primordia but only in peripheral cortical cells and uninfected cells of the mature nodule. Using CRISPR/Cas9 technology, the knockout of Lj\\u03b2CA1 or both Lj\\u03b1CA2 and its homolog, Lj\\u03b1CA1, did not result in abnormal symbiotic phenotype compared with the wild-type plants, suggesting that Lj\\u03b2CA1 or Lj\\u03b1CA1/2 are not essential for the nitrogen fixation under normal symbiotic conditions. Nevertheless, the nodule-enhanced expression patterns and the diverse distributions in different types of cells imply their potential functions during root nodule symbiosis, such as CO2 fixation, N assimilation, and pH regulation, which await further investigations.\"}, {\"paperId\": \"00dd78d9e5d03eb8b8a39e06fd10d96bbcab51d9\", \"externalIds\": {\"DOI\": \"10.1158/1535-7163.targ-23-a158\", \"CorpusId\": 265599298}, \"title\": \"Abstract A158: Rational development of synergistic therapies alongside BMI1 Inhibition for group 3 medulloblastoma\", \"venue\": \"Molecular Cancer Therapeutics\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1535-7163.targ-23-a158?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1535-7163.targ-23-a158, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5811900\", \"name\": \"D. Bakhshinyan\"}, {\"authorId\": \"3116806\", \"name\": \"S. Custers\"}, {\"authorId\": \"26613509\", \"name\": \"A. Adile\"}, {\"authorId\": \"2147248750\", \"name\": \"K. Brown\"}, {\"authorId\": \"40233730\", \"name\": \"M. Qazi\"}, {\"authorId\": \"8031824\", \"name\": \"C. Chokshi\"}, {\"authorId\": \"2269318737\", \"name\": \"Laura Escudero\"}, {\"authorId\": \"2068176274\", \"name\": \"Yujin Suk\"}, {\"authorId\": \"50440488\", \"name\": \"C. Venugopal\"}, {\"authorId\": \"2265740902\", \"name\": \"Jason Moffat\"}, {\"authorId\": \"2269749827\", \"name\": \"Sheila K. Singh\"}], \"abstract\": \"\\n Medulloblastoma (MB) is the most common malignant pediatric brain tumor. Of its four distinct molecular subgroups, Group 3 MBs are associated with increased risk of recurrence, metastasis and overall poor patient outcome. In recent years, small molecule inhibitors that decrease BMI1 expression have shown to be efficacious against several types of malignant tumors including pediatric MB. Although in vivo studies provide a promising proof-of-concept for the therapeutic targeting of BMI1 in Group 3 MB, mice that receive treatment eventually succumb to their disease. These results suggest that additional mechanisms may underlie the maintenance of MB and underscore the main obstacle in treating a constantly evolving tumor. After initial preclinical validation of BMI1 inhibitor PTC-596, DNA barcoding clonal tracking technology was leveraged to profile in vivo clonal dynamics of Group 3 MB in response to the established chemoradiotherapy regimen alone and in combination with PTC-596. Comparison of clonal composition of tumors extracted from brains and spines post-treatment revealed the persistence of a small number of clones with the ability to escape therapy and drive subsequent tumor expansion. In order to better understand molecular susceptibilities of MB cells post-BMI1 inhibition, we undertook an in vitro genome-wide CRISPR/Cas9 screening to identify context-specific MB regulatory pathways that could be synergistically targeted along with BMI1. By comparing the results of the in vitro genome wide CRISPR/Cas9 screen to the essential genes in human neural stem cells (hNSCs), we identified several context specific regulators of mTOR, AKT and PLK1 pathways. Combination treatment alongside PTC-596 has demonstrated synergistic efficacy against MB cells with minimal toxicity to hNSCs in vitro and in preclinical in vivo studies. This study provides the foundation for clinical validation of small-molecule inhibitors synergistic with PTC-596 to improve the durability of remissions and extend survival of patients with treatment-refractory Group 3 MB.\\n Citation Format: David Bakhshinyan, Stefan Custers, Ashley Adile, Kevin Brown, Maleeha Qazi, Chirayu Chokshi, Laura Escudero, Yujin Suk, Chitra Venugopal, Jason Moffat, Sheila Singh. Rational development of synergistic therapies alongside BMI1 Inhibition for group 3 medulloblastoma [abstract]. In: Proceedings of the AACR-NCI-EORTC Virtual International Conference on Molecular Targets and Cancer Therapeutics; 2023 Oct 11-15; Boston, MA. Philadelphia (PA): AACR; Mol Cancer Ther 2023;22(12 Suppl):Abstract nr A158.\"}, {\"paperId\": \"00deda3dab5ecb175bf2f2d5d0d25418dc2ffc44\", \"externalIds\": {\"DOI\": \"10.1038/s41598-022-07158-8\", \"CorpusId\": 257091931}, \"title\": \"Transposase-CRISPR mediated targeted integration (TransCRISTI) in the human genome\", \"venue\": \"Scientific Reports\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-022-07158-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41598-022-07158-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41598-022-07158-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7604481\", \"name\": \"Mahere Rezazade Bazaz\"}, {\"authorId\": \"4676744\", \"name\": \"M. M. Ghahramani Seno\"}, {\"authorId\": \"145594658\", \"name\": \"Hesam Dehghani\"}], \"abstract\": \"Various methods have been used in targeted gene knock-in applications. CRISPR-based knock-in strategies based on homology-independent repair pathways such as CRISPR HITI have been shown to possess the best efficiency for gene knock-in in mammalian cells. However, these methods suffer from the probability of plasmid backbone insertion at the target site. On the other hand, studies trying to combine the targeting ability of the Cas9 molecule and the excision/integration capacity of the PB transposase have shown random integrations. In this study, we introduce a new homology-independent knock-in strategy, Transposase-CRISPR mediated Targeted Integration (TransCRISTI), that exploits a fusion of Cas9 nuclease and a double mutant piggyBac transposase. In isogenic mammalian cell lines, we show that the TransCRISTI method demonstrates higher efficiency (72%) for site-specific insertions than the CRISPR HITI (44%) strategy. Application of the TransCRISTI method resulted in site-directed integration in 4.13% and 3.69% of the initially transfected population in the human AAVS1and PML loci, respectively, while the CRISPR HITI strategy resulted in site-directed integration in the PML locus in only 0.6% of cells. We also observed lower off-target and random insertions in the TransCRISTI group than the CRISPR HITI group. The TransCRISTI technology represents a great potential for the accurate and high-efficiency knock-in of the desired transposable elements into the predetermined genomic locations.\"}, {\"paperId\": \"00df7b2ca203bad551e1537d10100ff8b4c03e00\", \"externalIds\": {\"PubMedCentral\": \"9940691\", \"DOI\": \"10.1134/S0006297923140080\", \"CorpusId\": 257024082, \"PubMed\": \"37069118\"}, \"title\": \"Visualizing the Nucleome Using the CRISPR\\u2013Cas9 System: From in vitro to in vivo\", \"venue\": \"Biochemistry (Moscow)\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1134/s0006297923140080\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9940691, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12074063\", \"name\": \"L. Maloshenok\"}, {\"authorId\": \"2203674594\", \"name\": \"Gerel A. Abushinova\"}, {\"authorId\": \"145820863\", \"name\": \"A. Ryazanova\"}, {\"authorId\": \"3044380\", \"name\": \"S. Bruskin\"}, {\"authorId\": \"2347597535\", \"name\": \"V. Zherdeva\"}], \"abstract\": \"Abstract One of the latest methods in modern molecular biology is labeling genomic loci in living cells using fluorescently labeled Cas protein. The NIH Foundation has made the mapping of the 4D nucleome (the three-dimensional nucleome on a timescale) a priority in the studies aimed to improve our understanding of chromatin organization. Fluorescent methods based on CRISPR\\u2013Cas are a significant step forward in visualization of genomic loci in living cells. This approach can be used for studying epigenetics, cell cycle, cellular response to external stimuli, rearrangements during malignant cell transformation, such as chromosomal translocations or damage, as well as for genome editing. In this review, we focused on the application of CRISPR\\u2013Cas fluorescence technologies as components of multimodal imaging methods for in vivo mapping of chromosomal loci, in particular, attribution of fluorescence signal to morphological and anatomical structures in a living organism. The review discusses the approaches to the highly sensitive, high-precision labeling of CRISPR\\u2013Cas components, delivery of genetically engineered constructs into cells and tissues, and promising methods for molecular imaging.\"}, {\"paperId\": \"00e4db8fb0275be6fbb4560d8b44bfe609c1b3c1\", \"externalIds\": {\"DOI\": \"10.1158/1535-7163.targ-23-lb_b02\", \"CorpusId\": 265568334}, \"title\": \"Abstract LB_B02: Novel PAMs from somatic mutations produce numerous pancreatic cancer-specific CRISPR-Cas9 targets for selective cell elimination: A novel gene therapy approach for cancer\", \"venue\": \"Molecular Cancer Therapeutics\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1535-7163.targ-23-lb_b02?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1535-7163.targ-23-lb_b02, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40952309\", \"name\": \"S. Teh\"}, {\"authorId\": \"2167328783\", \"name\": \"Kirsten Bowland\"}, {\"authorId\": \"2213451088\", \"name\": \"Alexis Bennett\"}, {\"authorId\": \"1398426473\", \"name\": \"Eitan Halper-Stromberg\"}, {\"authorId\": \"6390061\", \"name\": \"A. Skaist\"}, {\"authorId\": \"7766633\", \"name\": \"Aparna Pallavajjala\"}, {\"authorId\": \"2214853769\", \"name\": \"Jacqueline Tang\"}, {\"authorId\": \"2213881635\", \"name\": \"F. Cai\"}, {\"authorId\": \"2261373826\", \"name\": \"Hong Liang\"}, {\"authorId\": \"2269265144\", \"name\": \"Sarah Wheelan\"}, {\"authorId\": \"2250305248\", \"name\": \"Robert B. Scharpf\"}, {\"authorId\": \"2269267569\", \"name\": \"N. J. Roberts\"}, {\"authorId\": \"4102045\", \"name\": \"J. Eshleman\"}], \"abstract\": \"\\n Somatic mutations accumulate as we age and are mostly found within the noncoding regions which make up of 98% of the human genome. CRISPR-Cas9, on the other hand, can be designed to induce double strand breaks (DSBs) at specific locations in the genome, and DSBs are known to be cytotoxic. CRISPR-Cas9 requires the presence of a 3-5 nucleotide protospacer adjacent motif (PAM) to serve as a binding signal for Cas9, in which Cas9 would not bind nor cut the target in its absence. We hypothesized that we could identify a large number of somatic 5\\u2019-NGG-3\\u2019 PAMs that arise from single base substitutions (SBSs) in pancreatic cancers (PCs; e.g. NCG -> NGG), and these novel PAMs could serve as cancer-specific CRISPR-Cas9 targets for selective cell elimination. First, we performed whole genome sequencing (WGS) of three PC cell lines and their corresponding normal cell lines followed by tumor-normal (T-N) subtraction to identify somatic SBSs. PAMfinder, a software designed for somatic PAM discovery, was executed to identify somatic PAMs in each case. On average, 4548 somatic SBSs were found per PC case, in which 417 of them produced somatic PAMs (9.2% of total SBSs). PAMs with >95% variant allele frequency (VAF) and that produced sgRNAs with minimal off-target activity (based on CRISPOR) were further validated through Sanger sequencing, which resulted in an average of 32/33 confirmed targets per cell line. Mutational signature analyses also revealed that clock-like signatures were predominant, suggesting that aging itself could give rise to novel PAMs. We subsequently tested the specificity and selectivity of our patient-specific sgRNAs derived from two PC cases and showed that on-target mutations were only detected in the target cell lines and not in the corresponding normal or other PC cell lines lacking the targets. This result was further substantiated by comprehensive WGS analyses in a negative control cell line which demonstrated no off-target activity. Then, two PC cell lines were co-cultured and transduced with patient-specific sgRNAs identified from one of the PC cell lines, and showed >75% selective cell killing via flow cytometry. Finally, to examine the prevalence of somatic PAMs in different tumor types, we obtained 591 T-N subtracted variant call files from ICGC and performed tumor purity correction and PAMfinder analyses for each sample. We found that in two separate PC projects (APGI-AU and PACA-CA), the number of novel PAMs were 703 (N=44) and 863 (N=130), respectively, on average; in the lung cancer (LUCA-KR) and esophageal cancer (OCCAMS-GB) projects, an average of 3319 (N=29) and 4739 (N=388) novel PAMs were discovered, respectively. Overall, our results showed that adult solid tumors harbor hundreds, if not thousands, of somatic PAMs, and these PAMs could serve as novel CRISPR-Cas9 targets to selectively kill cancer cells.\\n Citation Format: Selina Shiqing K Teh, Kirsten Bowland, Alexis Bennett, Eitan Halper-Stromberg, Alyza Skaist, Aparna Pallavajjala, Jacqueline Tang, Fidel Cai, Hong Liang, Sarah Wheelan, Robert B Scharpf, Nicholas J Roberts, James R Eshleman. Novel PAMs from somatic mutations produce numerous pancreatic cancer-specific CRISPR-Cas9 targets for selective cell elimination: A novel gene therapy approach for cancer [abstract]. In: Proceedings of the AACR-NCI-EORTC Virtual International Conference on Molecular Targets and Cancer Therapeutics; 2023 Oct 11-15; Boston, MA. Philadelphia (PA): AACR; Mol Cancer Ther 2023;22(12 Suppl):Abstract nr LB_B02.\"}, {\"paperId\": \"00e5589497dbf75d915f21efe2179a6ec2c929fa\", \"externalIds\": {\"PubMedCentral\": \"7576598\", \"MAG\": \"3094421202\", \"DOI\": \"10.1038/s41467-020-18949-w\", \"CorpusId\": 224824636, \"PubMed\": \"33082323\"}, \"title\": \"Selective neuronal degeneration in MATR3 S85C knock-in mouse model of early-stage ALS\", \"venue\": \"Nature Communications\", \"year\": 2020, \"citationCount\": 37, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-020-18949-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7576598, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1739704704\", \"name\": \"Ching Serena Kao\"}, {\"authorId\": \"48498743\", \"name\": \"Rebekah van Bruggen\"}, {\"authorId\": \"2117129671\", \"name\": \"Jihye Kim\"}, {\"authorId\": \"2117026156\", \"name\": \"Xiao Xiao Lily Chen\"}, {\"authorId\": \"25578620\", \"name\": \"Cadia Chan\"}, {\"authorId\": \"1739666731\", \"name\": \"Jooyun Lee\"}, {\"authorId\": \"2070950604\", \"name\": \"W. Cho\"}, {\"authorId\": \"4162778\", \"name\": \"Melody Zhao\"}, {\"authorId\": \"1742060534\", \"name\": \"Claudia Arndt\"}, {\"authorId\": \"2099298878\", \"name\": \"Katarina Maksimovi\\u0107\"}, {\"authorId\": \"1739178900\", \"name\": \"Mashiat Khan\"}, {\"authorId\": \"50739297\", \"name\": \"Qiumin Tan\"}, {\"authorId\": \"144118259\", \"name\": \"M. Wilson\"}, {\"authorId\": \"121638822\", \"name\": \"Jeehye Park\"}], \"abstract\": \"A missense mutation, S85C, in the MATR3 gene is a genetic cause for amyotrophic lateral sclerosis (ALS). It is unclear how the S85C mutation affects MATR3 function and contributes to disease. Here, we develop a mouse model that harbors the S85C mutation in the endogenous Matr3 locus using the CRISPR/Cas9 system. MATR3 S85C knock-in mice recapitulate behavioral and neuropathological features of early-stage ALS including motor impairment, muscle atrophy, neuromuscular junction defects, Purkinje cell degeneration and neuroinflammation in the cerebellum and spinal cord. Our neuropathology data reveals a loss of MATR3 S85C protein in the cell bodies of Purkinje cells and motor neurons, suggesting that a decrease in functional MATR3 levels or loss of MATR3 function contributes to neuronal defects. Our findings demonstrate that the MATR3 S85C mouse model mimics aspects of early-stage ALS and would be a promising tool for future basic and preclinical research. MATR3 is an ALS-linked gene. Here the authors describe a mutant MATR3 knockin mouse, which mimics some aspects of early-stage ALS.\"}, {\"paperId\": \"00e638d033a8d1c1087109d38c60090f1284ad04\", \"externalIds\": {\"MAG\": \"3043942372\", \"DOI\": \"10.1111/hae.14104\", \"CorpusId\": 220718274, \"PubMed\": \"32700411\"}, \"title\": \"Successful correction of factor V deficiency of patient\\u2010derived iPSCs by CRISPR/Cas9\\u2010mediated gene editing\", \"venue\": \"Haemophilia\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/hae.14104?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/hae.14104, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49691330\", \"name\": \"Takayuki Nakamura\"}, {\"authorId\": \"4923243\", \"name\": \"Satoshi Morishige\"}, {\"authorId\": \"153837380\", \"name\": \"Hidetoshi Ozawa\"}, {\"authorId\": \"3482747\", \"name\": \"K. Kuboyama\"}, {\"authorId\": \"145362811\", \"name\": \"Yoshitaka Yamasaki\"}, {\"authorId\": \"50841623\", \"name\": \"Shuki Oya\"}, {\"authorId\": \"2117165823\", \"name\": \"Maki Yamaguchi\"}, {\"authorId\": \"22082218\", \"name\": \"K. Aoyama\"}, {\"authorId\": \"10767892\", \"name\": \"R. Seki\"}, {\"authorId\": \"4760859\", \"name\": \"Fumihiko Mouri\"}, {\"authorId\": \"1708349\", \"name\": \"Koichi Osaki\"}, {\"authorId\": \"50084714\", \"name\": \"T. Okamura\"}, {\"authorId\": \"50782668\", \"name\": \"S. Mizuno\"}, {\"authorId\": \"3537587\", \"name\": \"K. Nagafuji\"}], \"abstract\": \"Factor V (FV) deficiency is a monogenic inherited coagulation disorder considered to be an ideal indication for gene therapy. To investigate the possibility of therapeutic application of genome editing, we generated induced pluripotent stem cells (iPSCs) from a FV\\u2010deficient patient and repaired the mutation of factor V gene (F5) using a clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR\\u2010associated 9 (Cas9).\"}, {\"paperId\": \"00eeeb7fe9544a86f271b4c9099c47b45135f326\", \"externalIds\": {\"PubMedCentral\": \"8440673\", \"MAG\": \"3127052082\", \"DOI\": \"10.1038/s41598-021-97730-5\", \"CorpusId\": 231716618, \"PubMed\": \"34521928\"}, \"title\": \"Duchenne muscular dystrophy cell culture models created by CRISPR/Cas9 gene editing and their application in drug screening\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-021-97730-5.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8440673, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404522842\", \"name\": \"Patricia Soblechero-Mart\\u00edn\"}, {\"authorId\": \"1404522821\", \"name\": \"E. Albiasu-Arteta\"}, {\"authorId\": \"1572097514\", \"name\": \"A. Anton-Martinez\"}, {\"authorId\": \"2047393216\", \"name\": \"Laura de la Puente-Ovejero\"}, {\"authorId\": \"2085661394\", \"name\": \"I. Garcia-Jimenez\"}, {\"authorId\": \"1413003584\", \"name\": \"G. Gonz\\u00e1lez-Iglesias\"}, {\"authorId\": \"1572105193\", \"name\": \"Irene Larra\\u00f1aga-Aiestaran\"}, {\"authorId\": \"1572097004\", \"name\": \"A. L\\u00f3pez-Mart\\u00ednez\"}, {\"authorId\": \"1404522834\", \"name\": \"Javier Poyatos-Garc\\u00eda\"}, {\"authorId\": \"2209042711\", \"name\": \"E. Ruiz-Del-Yerro\"}, {\"authorId\": \"2209126420\", \"name\": \"Federico Gonz\\u00e1lez\"}, {\"authorId\": \"1404462115\", \"name\": \"V. Arechavala-Gomeza\"}], \"abstract\": \"Gene editing methods are an attractive therapeutic option for Duchenne muscular dystrophy, and they have an immediate application in the generation of research models. To generate myoblast cultures that could be useful in in vitro drug screening, we have optimised a CRISPR/Cas9 gene edition protocol. We have successfully used it in wild type immortalised myoblasts to delete exon 52 of the dystrophin gene, modelling a common Duchenne muscular dystrophy mutation; and in patient\\u2019s immortalised cultures we have deleted an inhibitory microRNA target region of the utrophin UTR, leading to utrophin upregulation. We have characterised these cultures by demonstrating, respectively, inhibition of dystrophin expression and overexpression of utrophin, and evaluating the expression of myogenic factors (Myf5 and MyH3) and components of the dystrophin associated glycoprotein complex (\\u03b1-sarcoglycan and \\u03b2-dystroglycan). To demonstrate their use in the assessment of DMD treatments, we have performed exon skipping on the DMD\\u039452-Model and have used the unedited DMD cultures/ DMD-UTRN-Model combo to assess utrophin overexpression after drug treatment. While the practical use of DMD\\u039452-Model is limited to the validation to our gene editing protocol, DMD-UTRN-Model presents a possible therapeutic gene edition target as well as a useful positive control in the screening of utrophin overexpression drugs.\"}, {\"paperId\": \"00f0708ddc522eac54917d83beae59d14e764373\", \"externalIds\": {\"PubMedCentral\": \"10743753\", \"DOI\": \"10.3390/ijms242417560\", \"CorpusId\": 266367731, \"PubMed\": \"38139386\"}, \"title\": \"Exploiting Synthetic Lethality between Germline BRCA1 Haploinsufficiency and PARP Inhibition in JAK2V617F-Positive Myeloproliferative Neoplasms\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/24/24/17560/pdf?version=1702894143\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10743753, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2275320741\", \"name\": \"Max Bermes\"}, {\"authorId\": \"2275762798\", \"name\": \"Maria Jimena Rodriguez\"}, {\"authorId\": \"49341667\", \"name\": \"M. A. D. de Toledo\"}, {\"authorId\": \"2269181469\", \"name\": \"Sabrina Ernst\"}, {\"authorId\": \"2269358361\", \"name\": \"Gerhard M\\u00fcller-Newen\"}, {\"authorId\": \"2250575163\", \"name\": \"T. Br\\u00fcmmendorf\"}, {\"authorId\": \"5411371\", \"name\": \"Nicolas Chatain\"}, {\"authorId\": \"2241421022\", \"name\": \"Steffen Koschmieder\"}, {\"authorId\": \"51045027\", \"name\": \"Julian Baumeister\"}], \"abstract\": \"Myeloproliferative neoplasms (MPN) are rare hematologic disorders characterized by clonal hematopoiesis. Familial clustering is observed in a subset of cases, with a notable proportion exhibiting heterozygous germline mutations in DNA double-strand break repair genes (e.g., BRCA1). We investigated the therapeutic potential of targeting BRCA1 haploinsufficiency alongside the JAK2V617F driver mutation. We assessed the efficacy of combining the PARP inhibitor olaparib with interferon-alpha (IFN\\u03b1) in CRISPR/Cas9-engineered Brca1+/\\u2212 Jak2V617F-positive 32D cells. Olaparib treatment induced a higher number of DNA double-strand breaks, as demonstrated by \\u03b3H2AX analysis through Western blot (p = 0.024), flow cytometry (p = 0.013), and confocal microscopy (p = 0.071). RAD51 foci formation was impaired in Brca1+/\\u2212 cells compared to Brca1+/+ cells, indicating impaired homologous recombination repair due to Brca1 haploinsufficiency. Importantly, olaparib enhanced apoptosis while diminishing cell proliferation and viability in Brca1+/\\u2212 cells compared to Brca1+/+ cells. These effects were further potentiated by IFN\\u03b1. Olaparib induced interferon-stimulated genes and increased endogenous production of IFN\\u03b1 in Brca1+/\\u2212 cells. These responses were abrogated by STING inhibition. In conclusion, our findings suggest that the combination of olaparib and IFN\\u03b1 presents a promising therapeutic strategy for MPN patients by exploiting the synthetic lethality between germline BRCA1 mutations and the JAK2V617F MPN driver mutation.\"}, {\"paperId\": \"00f29fd236971262e0ffead6814caf6b894091fa\", \"externalIds\": {\"DOI\": \"10.1002/alz.090967\", \"CorpusId\": 275237653, \"PubMed\": \"39750755\"}, \"title\": \"Basic Science and Pathogenesis.\", \"venue\": \"Alzheimer's & Dementia\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1002/alz.090967\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/alz.090967?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/alz.090967, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48221909\", \"name\": \"Michael Sasner\"}, {\"authorId\": \"2266847079\", \"name\": \"Ravi S. Pandey\"}, {\"authorId\": \"10431359\", \"name\": \"Kevin Kotredes\"}, {\"authorId\": \"150967404\", \"name\": \"Dylan T. Garceau\"}, {\"authorId\": \"2338381281\", \"name\": \"Channing Weber\"}, {\"authorId\": \"122265560\", \"name\": \"Rafiou Agoro\"}, {\"authorId\": \"48803872\", \"name\": \"Christoph Preuss\"}, {\"authorId\": \"2245435309\", \"name\": \"Gregory W. Carter\"}], \"abstract\": \"BACKGROUND\\nApolipoprotein E4 (APOE4), a common variant of APOE, is a major genetic risk factor for Alzheimer's disease (AD), but APOE4 carriers do not always develop AD. Several large-scale genetic studies have identified a common haplotype of the aging factor klotho that modify disease risk in APOE4 carriers. In humans, klothoharbors two common missense variants (rs9536314, p.F352V; rs9527025, p.C370S) that define the klotho V/S (KL-V/S) haplotype, which is protective against AD in APOE4 carriers, and the klotho F/C (KL-F/C) haplotype, which is not. We sought to understand this genetic interaction using novel mouse models.\\n\\n\\nMETHOD\\nMouse klotho differs at the key amino acid position p.C370S rendering the native mouse haplotype as \\\"KL-F/S\\\", matching neither of the observed human haplotypes. We have replaced this with either the homozygous protective KL-V/S or common KL-F/C haplotypes using CRISPR/Cas9. We have tested the effects of these klotho haplotypes on klotho expression in serum, brain, and kidney relative to B6 controls and to the amyloidogenic AppSAA AD model, which exhibit significant amyloid neuropathology. We have also run RNA-seq on whole brain homogenates at 12 months of age.\\n\\n\\nRESULT\\nSecreted p-KL was decreased in KL-F/C mice harboring the novel mouse risk haplotype relative to age matched B6 controls and to KL-V/S mice. In contrast, KL-V/S mice showed no significant differences in soluble p-KL serum levels when compared to B6 controls. Secreted p-KL levels in KL-V/S mice were significantly elevated when compared to the APPSAA mice, whereas young KL-F/C mice showed similar levels to the aged APPSAA model. Transcriptional analysis indicated that the KL-V/S haplotype was anti-correlated with AMP-AD human modules, while the KL-F/C risk haplotype was significantly correlated to AD signatures in modules enriched for neuronal system, cell cycle, myelination, and cellular stress response pathways.\\n\\n\\nCONCLUSION\\nThese data suggest the native mouse klotho allele may act similarly to the protective KL-V/S haplotype, while the KL-F/C haplotype leads to lower secreted klotho and potentially greater disease risk. These models are therefore suitable for experiments to elucidate how klotho variants protect from AD pathologies, and will enable detailed studies of how this protection is specific to the APOE4 genotype.\"}, {\"paperId\": \"00f2fc3c9256ad7d3bd52020b0b4c99f24e411de\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-146369\", \"CorpusId\": 244648353}, \"title\": \"Loss of the Base Excision Repair Gene Apex1 Leads to Dysfunctional Adult Hematopoietic Stem and Progenitor Cells\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-146369\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-146369?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-146369, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1879856315\", \"name\": \"S. Zaunz\"}, {\"authorId\": \"2142194386\", \"name\": \"L. Lauwereins\"}, {\"authorId\": \"5572313\", \"name\": \"M. Bajaj\"}, {\"authorId\": \"2142205153\", \"name\": \"Beatriz Guapo Neves\"}, {\"authorId\": \"2142176787\", \"name\": \"Francheska Cadacio\"}, {\"authorId\": \"2142205111\", \"name\": \"Lana Cleuren\"}, {\"authorId\": \"2142177730\", \"name\": \"C\\u00e9line Notredame\"}, {\"authorId\": \"5832850\", \"name\": \"J. Marteijn\"}, {\"authorId\": \"6411726\", \"name\": \"K. De Keersmaecker\"}, {\"authorId\": \"1860705\", \"name\": \"C. Verfaillie\"}], \"abstract\": \"\\n Postnatal hematopoietic stem (and progenitor) cells (HS(P)Cs) are especially vulnerable to oxidative stress, leading to early hematopoietic senescence and/or malignant transformation. Elevated intracellular reactive oxygen species (ROS) can, among others, oxidize nucleotides, and thus can result in genotoxicity and mutagenesis if left unrepaired. Oxidized bases, as well as other spontaneous single base modifications, are recognized and repaired by the base excision repair (BER) pathway. Hence, the BER pathway is crucial to maintain genome integrity. In contrast to other DNA repair pathways however, the role of BER in maintaining HSPC functionality remains enigmatic, chiefly because knockout (KO) of BER genes is in many cases embryonic lethal.\\n BER is a complex multi-step repair process. After initial removal and excision of the damaged base, the apurinic/apyrimidinic (AP) site is processed by the AP endonuclease (APEX1) enzyme. At this point, the BER pathway branches into 2 sub-pathways, namely the short-patch (SP-BER; wherein DNA polymerase beta (Pol\\u03b2), Ligase III (Lig3) together with X-ray repair cross-complementing protein 1 (Xrcc1) are active) and the long-patch BER (LP-BER; wherein Lig1, Flap Structure-Specific Endonuclease 1 (Fen1), and sometimes Pol\\u03b2 are active) for the repair synthesis and the gap filling steps.\\n In this study we wished to address the role of BER in adult hematopoiesis. Therefore, we used CRISPR-Cas9 to KO different BER genes in adult bone marrow (BM) HS(P)Cs, including two genes common to the BER (sub-)pathway(s) (Apex1 and Pol\\u03b2) as well as one gene in the SP-BER (Xrcc1) and one gene in the LP-BER (Lig1) pathway. The effect thereof was evaluated on HS(P)C repopulation in vivo as well as on HS(P)C expansion during long-term in vitro culture (using the culture medium described by Wilkinson et al., Nature 2019). All CRISPR-Cas9 experiments were validated using a second sgRNA targeting the selected BER genes.\\n Lig1-KO caused in vivo HSPC dysfunction: at 20 weeks post-transplantation, significantly less Lig1 KO cells were observed in the committed progenitor (HPC) and lineage committed (Lin +) BM compartments. By contrast, KO of Xrcc1 had only minor effects on HS(P)C repopulation, but we observed increased HSC expansion and myeloid biased differentiation in some recipient mice, which might correspond to clonal hematopoiesis and is consistent with the finding of XRCC1 loss-of-function mutation in myelodysplastic patients (Joshi et al, Ann Hematol 2016). Knockout of Pol\\u03b2 did not affect hematopoiesis in vivo or in vitro. The most severe phenotype was observed when we knocked out Apex1, as Apex1-KO HS(P)Cs failed to repopulate irradiated recipient mice. Already after 2 weeks, significantly less Apex1 deficient cells were detected in the different blood lineages and nearly no CRISPR-Cas9 KO cells could be detected from 4 weeks onwards. This was confirmed in vitro, where reduced expansion of Apex1 KO BM cells was observed.\\n APEX1 has two major functional activities, namely its nuclease activity, involved in BER, and its redox activity (also called Ref-1 function) important in reducing oxidized transcription factors and therefore implicated in transcriptional regulation. However, little is known regarding the nuclease and Ref-1 function(s) in primary adult hematopoietic cells. We therefore cultured BM HS(P)Cs for 1 week in the continuous presence of 2 distinct chemicals blocking the APEX1 nucleases, or 2 different chemicals inhibiting specifically the Ref-1 function. We demonstrated that both APEX1 functions are essential for hematopoiesis, even if the 2 functions appear to support the survival, expansion and maintenance of HS(P)Cs through different mechanisms. While the Ref-1 function was essential for proliferation (as both Ref-1 inhibitors cause cell cycle arrest) of all the lineages (including the Lin + cells), both inhibitors of the nuclease function affected more the expansion/survival of the less committed HS(P)Cs without leading to any cell cycle arrest.\\n In conclusion, this study demonstrates for the first time the important role of BER genes in adult hematopoiesis, often deregulated in cancer, including hematopoietic malignancies. We observed a particularly severe phenotype upon loss of Apex1 in adult HSPCs, and ongoing studies (such as RNA sequencing analysis) should provide novel insights in underlying mechanisms of APEX1 deficiencies in HS(P)Cs.\\n Figure 1 Figure 1.\\n \\n \\n \\n No relevant conflicts of interest to declare.\\n\"}, {\"paperId\": \"00f9369c30015ff28d1e5dd845ec6076b35dc647\", \"externalIds\": {\"DOI\": \"10.1038/s42003-020-01507-x\", \"CorpusId\": 257085848}, \"title\": \"Unequal contribution of two paralogous CENH3 variants in cowpea centromere function\", \"venue\": \"Communications Biology\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-020-01507-x.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s42003-020-01507-x?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s42003-020-01507-x, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47696219\", \"name\": \"Takayoshi Ishii\"}, {\"authorId\": \"46833573\", \"name\": \"M. Jurani\\u0107\"}, {\"authorId\": \"40172850\", \"name\": \"S. Maheshwari\"}, {\"authorId\": \"7395272\", \"name\": \"F. O. Bustamante\"}, {\"authorId\": \"147629393\", \"name\": \"M. Vogt\"}, {\"authorId\": \"1438671933\", \"name\": \"Rigel Salinas-Gamboa\"}, {\"authorId\": \"5482408\", \"name\": \"Steven Dreissig\"}, {\"authorId\": \"5935676\", \"name\": \"Nial R. Gursanscky\"}, {\"authorId\": \"1573470729\", \"name\": \"Tracy How\"}, {\"authorId\": \"2209788\", \"name\": \"D. Demidov\"}, {\"authorId\": \"2192783657\", \"name\": \"J. Fuchs\"}, {\"authorId\": \"4476123\", \"name\": \"V. Schubert\"}, {\"authorId\": \"47198686\", \"name\": \"A. Spriggs\"}, {\"authorId\": \"1398563155\", \"name\": \"Jean-Philippe Vielle-Calzada\"}, {\"authorId\": \"2400405\", \"name\": \"L. Comai\"}, {\"authorId\": \"152391224\", \"name\": \"A. Koltunow\"}, {\"authorId\": \"2171623\", \"name\": \"A. Houben\"}], \"abstract\": \"In most diploids the centromere-specific histone H3 (CENH3), the assembly site of active centromeres, is encoded by a single copy gene. Persistance of two CENH3 paralogs in diploids species raises the possibility of subfunctionalization. Here we analysed both CENH3 genes of the diploid dryland crop cowpea. Phylogenetic analysis suggests that gene duplication of CENH3 occurred independently during the speciation of Vigna unguiculata. Both functional CENH3 variants are transcribed, and the corresponding proteins are intermingled in subdomains of different types of centromere sequences in a tissue-specific manner together with the kinetochore protein CENPC. CENH3.2 is removed from the generative cell of mature pollen, while CENH3.1 persists. CRISPR/Cas9-based inactivation of CENH3.1 resulted in delayed vegetative growth and sterility, indicating that this variant is needed for plant development and reproduction. By contrast, CENH3.2 knockout individuals did not show obvious defects during vegetative and reproductive development. Hence, CENH3.2 of cowpea is likely at an early stage of pseudogenization and less likely undergoing subfunctionalization. Takayoshi Ishii et al. report that two functional centromere-specific histone H3 (CENH3) paralogs with different centromere occupancy among different tissue types present in diploid cowpea. They demonstrate that CENH3.1 of cowpea is essential for normal plant growth and reproduction, while CENH3.2 is a gene likely to be undergoing early pseudogenization.\"}, {\"paperId\": \"00fcd98ab5e3cb999c29121bc5b50493749b8443\", \"externalIds\": {\"PubMedCentral\": \"10667554\", \"DOI\": \"10.1016/j.xgen.2023.100435\", \"CorpusId\": 265176579, \"PubMed\": \"38020970\"}, \"title\": \"Establishing chromosomal design-build-test-learn through a synthetic chromosome and its combinatorial reconfiguration\", \"venue\": \"Cell Genomics\", \"year\": 2023, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.xgen.2023.100435\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10667554, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3756139\", \"name\": \"J. Foo\"}, {\"authorId\": \"2266571965\", \"name\": \"Shohei Kitano\"}, {\"authorId\": \"8045236\", \"name\": \"Adelia Vicanatalita Susanto\"}, {\"authorId\": \"2111473461\", \"name\": \"Zhu Jin\"}, {\"authorId\": \"2107929526\", \"name\": \"Yicong Lin\"}, {\"authorId\": \"9612018\", \"name\": \"Zhouqing Luo\"}, {\"authorId\": \"2219004870\", \"name\": \"Linsen Huang\"}, {\"authorId\": \"2113514640\", \"name\": \"Zhenzhen Liang\"}, {\"authorId\": \"2249217485\", \"name\": \"Leslie A. Mitchell\"}, {\"authorId\": \"2266140584\", \"name\": \"Kun Yang\"}, {\"authorId\": \"8485705\", \"name\": \"Adison Wong\"}, {\"authorId\": \"2250855921\", \"name\": \"Yizhi Cai\"}, {\"authorId\": \"2266138917\", \"name\": \"Jitong Cai\"}, {\"authorId\": \"1805365\", \"name\": \"Giovanni Stracquadanio\"}, {\"authorId\": \"2432399\", \"name\": \"J. Bader\"}, {\"authorId\": \"2279453\", \"name\": \"J. Boeke\"}, {\"authorId\": \"2118795094\", \"name\": \"Junbiao Dai\"}, {\"authorId\": \"2267223154\", \"name\": \"M. Chang\"}], \"abstract\": \"Summary Chromosome-level design-build-test-learn cycles (chrDBTLs) allow systematic combinatorial reconfiguration of chromosomes with ease. Here, we established chrDBTL with a redesigned synthetic Saccharomyces cerevisiae chromosome XV, synXV. We designed and built synXV to harbor strategically inserted features, modified elements, and synonymously recoded genes throughout the chromosome. Based on the recoded chromosome, we developed a method to enable chrDBTL: CRISPR-Cas9-mediated mitotic recombination with endoreduplication (CRIMiRE). CRIMiRE allowed the creation of customized wild-type/synthetic combinations, accelerating genotype-phenotype mapping and synthetic chromosome redesign. We also leveraged synXV as a \\u201cbuild-to-learn\\u201d model organism for translation studies by ribosome profiling. We conducted a locus-to-locus comparison of ribosome occupancy between synXV and the wild-type chromosome, providing insight into the effects of codon changes and redesigned features on translation dynamics in vivo. Overall, we established synXV as a versatile reconfigurable system that advances chrDBTL for understanding biological mechanisms and engineering strains.\"}, {\"paperId\": \"00fdad2ebd47fbdf1fe7a30cf321ecc58d21870e\", \"externalIds\": {\"PubMedCentral\": \"9247697\", \"DOI\": \"10.1136/jitc-2021-004280\", \"CorpusId\": 250148389, \"PubMed\": \"35772809\"}, \"title\": \"Cancer cell-autonomous overactivation of PARP1 compromises immunosurveillance in non-small cell lung cancer\", \"venue\": \"Journal for ImmunoTherapy of Cancer\", \"year\": 2022, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jitc.bmj.com/content/jitc/10/6/e004280.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9247697, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2242009679\", \"name\": \"Juncheng Pan\"}, {\"authorId\": \"2054920459\", \"name\": \"A. Joseph\"}, {\"authorId\": \"2335749077\", \"name\": \"Antoine Lafarge\"}, {\"authorId\": \"3025391\", \"name\": \"I. Martins\"}, {\"authorId\": \"1734276\", \"name\": \"F. Obrist\"}, {\"authorId\": \"39136240\", \"name\": \"Jonathan G. Pol\"}, {\"authorId\": \"2174202625\", \"name\": \"Ester Saavedra\"}, {\"authorId\": \"2118154453\", \"name\": \"Sijing Li\"}, {\"authorId\": \"7019503\", \"name\": \"Allan Sauvat\"}, {\"authorId\": \"153937073\", \"name\": \"Giulia Cerrato\"}, {\"authorId\": \"12002207\", \"name\": \"Sarah L\\u00e9vesque\"}, {\"authorId\": \"47086711\", \"name\": \"Marion Leduc\"}, {\"authorId\": \"144940235\", \"name\": \"O. Kepp\"}, {\"authorId\": \"40489483\", \"name\": \"S. Durand\"}, {\"authorId\": \"8391207\", \"name\": \"Fanny Aprahamian\"}, {\"authorId\": \"2174202913\", \"name\": \"Nitharsshini Nirmalathansan\"}, {\"authorId\": \"40438126\", \"name\": \"J. Michels\"}, {\"authorId\": \"145056884\", \"name\": \"G. Kroemer\"}, {\"authorId\": \"145240248\", \"name\": \"M. Castedo\"}], \"abstract\": \"Background High activity of poly(ADP-ribose) polymerase-1 (PARP1) in non-small cell lung cancer (NSCLC) cells leads to an increase in immunohistochemically detectable PAR, correlating with poor prognosis in patients with NSCLC, as well as reduced tumor infiltration by cytotoxic T lymphocytes (CTLs). Intrigued by this observation, we decided to determine whether PARP1 activity in NSCLC cells may cause an alteration of anticancer immunosurveillance. Methods Continuous culture of mouse NSCLC cells in the presence of cisplatin led to the generation of cisplatin-resistant PARhigh clones. As compared with their parental controls, such PARhigh cells formed tumors that were less infiltrated by CTLs when they were injected into immunocompetent mice, suggesting a causative link between high PARP1 activity and compromised immunosurveillance. To confirm this cause-and-effect relationship, we used CRISPR/Cas9 technology to knock out PARP1 in two PARhigh NSCLC mouse cell lines (Lewis lung cancer [LLC] and tissue culture number one [TC1]), showing that the removal of PARP1 indeed restored cisplatin-induced cell death responses. Results PARP1 knockout (PARP1KO) cells became largely resistant to the PARP inhibitor niraparib, meaning that they exhibited less cell death induction, reduced DNA damage response, attenuated metabolic shifts and no induction of PD-L1 and MHC class-I molecules that may affect their immunogenicity. PARhigh tumors implanted in mice responded to niraparib irrespective of the presence or absence of T lymphocytes, suggesting that cancer cell-autonomous effects of niraparib dominate over its possible immunomodulatory action. While PARhigh NSCLC mouse cell lines proliferated similarly in immunocompetent and T cell-deficient mice, PARP1KO cells were strongly affected by the presence of T cells. PARP1KO LLC tumors grew more quickly in immunodeficient than in immunocompetent mice, and PARP1KO TC1 cells could only form tumors in T cell-deficient mice, not in immunocompetent controls. Importantly, as compared with PARhigh controls, the PARP1KO LLC tumors exhibited signs of T cell activation in the immune infiltrate such as higher inducible costimulator (ICOS) expression and lower PD-1 expression on CTLs. Conclusions These results prove at the genetic level that PARP1 activity within malignant cells modulates the tumor microenvironment.\"}, {\"paperId\": \"0100390d4a17ede321650ea287e106f83fb5a4ce\", \"externalIds\": {\"MAG\": \"3015343006\", \"PubMedCentral\": \"7336275\", \"DOI\": \"10.1038/s41556-020-0503-2\", \"CorpusId\": 215750097, \"PubMed\": \"32284543\"}, \"title\": \"Merkel cell polyomavirus activates LSD1-mediated blockade of non-canonical BAF to regulate transformation and tumorigenesis\", \"venue\": \"Nature Cell Biology\", \"year\": 2020, \"citationCount\": 66, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7336275\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7336275, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46755417\", \"name\": \"D. Park\"}, {\"authorId\": \"49777033\", \"name\": \"Jingwei Cheng\"}, {\"authorId\": \"143886177\", \"name\": \"J. Mcgrath\"}, {\"authorId\": \"1630930817\", \"name\": \"Matthew Y. Lim\"}, {\"authorId\": \"1630879148\", \"name\": \"Camille H Cushman\"}, {\"authorId\": \"6389122\", \"name\": \"Selene K Swanson\"}, {\"authorId\": \"52160133\", \"name\": \"Michelle L. Tillgren\"}, {\"authorId\": \"145003436\", \"name\": \"J. Paulo\"}, {\"authorId\": \"7366342\", \"name\": \"P. Gokhale\"}, {\"authorId\": \"3946823\", \"name\": \"L. Florens\"}, {\"authorId\": \"2570164\", \"name\": \"M. Washburn\"}, {\"authorId\": \"5925571\", \"name\": \"P. Trojer\"}, {\"authorId\": \"144276803\", \"name\": \"J. Decaprio\"}], \"abstract\": \"Merkel cell carcinoma (MCC)\\u2014a neuroendocrine cancer of the skin\\u2014is caused by the integration of Merkel cell polyomavirus and persistent expression of large T antigen and small T antigen. We report that small T antigen in complex with MYCL and the EP400 complex activates the expression of LSD1 (KDM1A), RCOR2 and INSM1 to repress gene expression by the lineage transcription factor ATOH1. LSD1 inhibition reduces the growth of MCC in vitro and in vivo. Through a forward-genetics CRISPR\\u2013Cas9 screen, we identified an antagonistic relationship between LSD1 and the non-canonical BAF (ncBAF) chromatin remodelling complex. Changes in gene expression and chromatin accessibility caused by LSD1 inhibition were partially rescued by BRD9 inhibition, revealing that LSD1 and ncBAF antagonistically regulate an overlapping set of genes. Our work provides mechanistic insight into the dependence of MCC on LSD1 and a tumour suppressor role for ncBAF in cancer. Park et al. show that Merkel cell polyomavirus upregulates LSD1 activity to repress differentiation genes that can be activated by non-canonical BAF, thereby modulating transformation and tumorigenesis in Merkel cell carcinoma.\"}, {\"paperId\": \"0106c6ad8c2635b791f032089fd06aa01d882dff\", \"externalIds\": {\"DOI\": \"10.1101/2024.04.03.587867\", \"CorpusId\": 268957987}, \"title\": \"SP110 sequestration of SP100 protects against toxic filaments during innate immune signaling\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/04/03/2024.04.03.587867.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.04.03.587867?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.04.03.587867, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"80859115\", \"name\": \"Eric J. Aird\"}, {\"authorId\": \"150158428\", \"name\": \"J. Rabl\"}, {\"authorId\": \"2295310675\", \"name\": \"Tabea Knuesel\"}, {\"authorId\": \"2156892057\", \"name\": \"Lynn Scherpe\"}, {\"authorId\": \"2169620879\", \"name\": \"Daniel Boehringer\"}, {\"authorId\": \"2244464614\", \"name\": \"Jacob E. Corn\"}], \"abstract\": \"Stimulation of the innate immune system by foreign RNA elicits a potent response against invading pathogens and can trigger cell death. The mechanisms by which cells balance a robust response with cell-intrinsic lethality are still being uncovered. Employing genome-wide CRISPR-Cas9 genetic screens with triphosphorylated RNA stimulation, we identify speckled protein 110 (SP110) as a potent negative regulator of type 1 interferon-driven cell death. Death suppression by SP110 counteracts a death-promoting activity of another speckled protein, SP100. Both SP110 suppression and SP100 toxicity are mediated by direct interactions between the caspase activation and recruitment domains (CARDs) in each protein. SP100-induced death is mediated by homomeric CARD filaments that are disassembled by a heteromeric CARD interaction with SP110. Overexpression of SP100 is sufficient to overwhelm normal levels of SP110, leading to genotoxicity. Using cryo-EM and AlphaFold modeling, we develop and validate an atomic description of SP100 CARD filament formation and filament breaking by SP110. Genome-wide binding studies reveal that SP110 and SP100 normally associate at active promoters, but disruption of the CARD interaction releases SP100 to form toxic filaments. Overall, we uncover a novel regulatory partnership in human innate immunity that balances signal potency with cell intrinsic lethality.\"}, {\"paperId\": \"0107fc37a08d978bd2bf4a7005ab02721e735cbc\", \"externalIds\": {\"DOI\": \"10.1101/2021.09.30.462477\", \"CorpusId\": 238261598}, \"title\": \"Hypoxia-directed tumor targeting of CRISPR/Cas9 and HSV-TK suicide gene therapy using lipid nanoparticles\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2329050122000389/pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.09.30.462477?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.09.30.462477, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1727462\", \"name\": \"Alicia Davis\"}, {\"authorId\": \"2019754\", \"name\": \"Kevin V. Morris\"}, {\"authorId\": \"49948437\", \"name\": \"Galina Shevchenko\"}], \"abstract\": \"Hypoxia is a characteristic feature of solid tumors that contributes to tumor aggressiveness and is associated with resistance to cancer therapy. The hypoxia inducible factor-1 (HIF-1) transcription factor complex mediates hypoxia-specific gene expression by binding to hypoxia responsive element (HRE) sequences within the promoter of target genes. HRE driven expression of therapeutic cargo has been widely explored as a strategy to achieve cancer-specific gene expression. By utilizing this system, we achieve hypoxia-specific expression of two therapeutically relevant cargo elements: the Herpes Simplex Virus thymidine kinase (HSV-tk) suicide gene and the CRISPR/Cas9 nuclease. Using an expression vector containing five copies of the HRE derived from the vascular endothelial growth factor gene, we are able to show high transgene expression in cells in a hypoxic environment, similar to levels achieved using the CMV and CBh promoters. Furthermore, we are able to deliver our therapeutic cargo to tumor cells with high efficiency using plasmid packaged lipid nanoparticles (LNPs) to achieve specific killing of tumor cells in hypoxic conditions, while maintaining tight regulation with no significant changes to cell viability in normoxia.\"}, {\"paperId\": \"0107ff93bed1c243b7d3d6f8d4f2b10c5de67c83\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-151280\", \"CorpusId\": 271921255}, \"title\": \"TP53 Mutations and RNA Binding Protein Musashi 2 Drive Resistance to PRMT5-Targeted Therapy in B-Cell Lymphoma\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-151280\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-151280?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-151280, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2316617304\", \"name\": \"I. Erazo\"}, {\"authorId\": \"2184393481\", \"name\": \"Chiara Evans\"}, {\"authorId\": \"31037843\", \"name\": \"D. Zakheim\"}, {\"authorId\": \"2269230235\", \"name\": \"Karen L. Chu\"}, {\"authorId\": \"4947601\", \"name\": \"O. Barbash\"}, {\"authorId\": \"2141865993\", \"name\": \"A. Y. Refermat\"}, {\"authorId\": \"10323799\", \"name\": \"C. Batlevi\"}, {\"authorId\": \"2269372344\", \"name\": \"Anas Younes\"}, {\"authorId\": \"152500082\", \"name\": \"M. Kharas\"}], \"abstract\": \"\\n PRMT5 catalyzes the arginine symmetric demethylation of histone and non-histone proteins. PRMT5 is overexpressed in lymphoma and plays a key role in lymphomagenesis through the repression of several tumor suppressors, including P53, while promoting the expression of lymphoma-drivers, such as c-MYC.\\n Currently, three PRMT5 inhibitors are being clinically evaluated in B-cell lymphoma patients, however, the mechanism of action of these molecules remain poorly understood. Thus, to identify the mechanism of action of the potent selective PRMT5 inhibitor, GSK3203591 (GSK-591), we performed a genome-wide CRISPR/Cas9 KO screen in the human mantle cell line, Z-138 and a validation CRISPR /Cas9 screen in the DLBCL cell line, OCI-LY19. Our genome-wide CRISPR screen identified 316 sensitizing genes and 89 genes involved in resistance. The top sensitizing gene was TP53, which validated our screens, as it is a well characterized target of PRMT5. Furthermore, we found that TP53 deletion and the hot spot TP53 R248Wmutation are biomarkers of resistance to GSK-591.\\n RNA-binding protein MUSASHI 2 (MSI2) was identified as the top-ranked driver of resistance to GSK-591. MSI2 plays a key role in hematopoietic stem cells activation, myeloid leukemia and CLL, however, its function in lymphoma remains unknown. MSI2 is overexpressed in DLBCL patients (n=96). Relapsed MCL and DLBCL primary samples express high levels of both PRMT5 and MSI2. Furthermore, MSI2 depletion decreased cell viability and sensitized lymphoma cells to PRMT5 inhibitor in vitro and vivo. In contrast, overexpression of MSI2 reverted sensitivity to GSK-591 in lymphoma cells. Consistent with our genetic studies, inhibition of MSI2 using Ro 08-2750 (Ro) (Minuesa et al. Nat Commun. 2019), conferred sensitivity to GSK-591, and the combination therapy was synergistic inducing cytotoxicity.\\n In order to identify specific downstream targets of MSI2 that may contribute to resistance to PRMT5 inhibition in lymphoma, we performed MSI2-HyperTRIBE, a recently discovered technology that allows mapping the MSI2 targeting network (Nguyen et al. Nat Commun. 2020). Using MSI2-HyperTRIBE, we were able to identify MSI2 targets in lymphoma cells. Moreover, we found that Ro treatment significantly blocked MSI2 binding activity, while GSK-591 had no effect on MSI2 targets.\\n To uncover the mechanism involved in the synergy of PRMT5 and MSI2 inhibitors, we performed RNA-sequencing of Z-138 cells treated with GSK-591, Ro or the combination. Gene set enrichment analysis (GSEA) demonstrated a loss in the c-MYC pathway upon drug combination.MSI2 RNA-IP assays showed that MSI2 binds c-MYC and this interaction is disrupted by the combination of GSK-591 and Ro. We observed that the combination of MSI2 and PRMT5 inhibitors does not affect c-MYC mRNA levels but, rather, controls translation. Interestingly, in the human B cell line P493-6 that express a conditional, tetracycline-regulated c-MYC, the depletion of c-MYC significantly increased the anti-proliferative activity of GSK-591 and Ro alone or in combination.\\n To further investigate whether there are other functionally relevant downstream targets of MSI2 promoting resistance to PRMT5 inhibition, we overlapped the differentially expressed genes upon treatment with GSK-591 and Ro (RNA-Seq), the Ro-direct targets in lymphoma (MSI2-HyperTRIBE) and the resistance genes to PRMT5 inhibition (whole-genome CRISPR screen) and we identified the anti-apoptotic protein BCL-2 as a common target of the PRMT5-MSI2 axis. We established first that the combination of GSK-591 and Ro blocked the binding of MSI2 to BCL-2 mRNA. We also found that the drug combination significantly decreased BCL-2 mRNA and protein abundance. Furthermore, Z-138 and OCI-LY19 BCL-2 KO cells are more sensitive to GSK-591 and Ro alone or in combination. Using venetoclax, we found that BCL-2 inhibition enhanced GSK-591 activity in vitro and in vivo. Thus, these data confirmed that BCL-2 is a key driver of resistance to PRMT5 inhibition.\\n Overall, our study uncovered a novel oncogenic axis, PRMT5/MSI2/c-MYC/BCL-2 that drives resistance to PRMT5-targeted therapy in lymphoma. We demonstrated that TP53 LOF and MSI2 expression could be used as biomarkers for patient stratification. Moreover, we proposed two novel drug combination strategies, with venetoclax or a MSI2 inhibitor, to be considered in further clinical studies with PRMT5 inhibitors.\\n \\n \\n \\n Barbash:\\u2008GlaxoSmithKline: Current Employment, Current equity holder in publicly-traded company. Batlevi:\\u2008Viatris: Current holder of individual stocks in a privately-held company; Juno/Celgene: Consultancy; Pfizer: Current holder of individual stocks in a privately-held company; Bayer: Research Funding; ADC Therapeutics: Consultancy; TG Therapeutics: Consultancy; Medscape: Honoraria; BMS: Current holder of individual stocks in a privately-held company; Memorial Sloan Kettering Cancer Center: Current Employment; Kite Pharma: Consultancy; Life Sciences: Consultancy; Seattle Genetics: Consultancy; Karyopharm: Consultancy; Regeneron: Current holder of individual stocks in a privately-held company; Moderna: Current holder of individual stocks in a privately-held company; TouchIME: Honoraria; GLG Pharma: Consultancy; Dava Oncology: Honoraria; Xynomic: Research Funding; Roche/Genentech: Research Funding; Novartis: Research Funding; Epizyme: Research Funding; Janssen: Research Funding; Autolus: Research Funding. Younes:\\u2008AZ: Current Employment, Other: Senior Vice President, Global Head of Haematology (Early and Late Stage) Oncology R&D at AstraZeneca.\\n\"}, {\"paperId\": \"0108801f1b4238d9cd0661fd68dd2d71a300b560\", \"externalIds\": {\"DOI\": \"10.1002/biot.202100698\", \"CorpusId\": 248203522, \"PubMed\": \"35427441\"}, \"title\": \"CRISPR/Cas9\\u2010mediated knockout of a prolyl\\u20104\\u2010hydroxylase subfamily in Nicotiana benthamiana using DsRed2 for plant selection\", \"venue\": \"Biotechnology Journal\", \"year\": 2022, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/biot.202100698\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/biot.202100698?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/biot.202100698, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146883825\", \"name\": \"Pia Uetz\"}, {\"authorId\": \"32493185\", \"name\": \"Stanislav Melnik\"}, {\"authorId\": \"1398978633\", \"name\": \"C. Gr\\u00fcnwald\\u2010Gruber\"}, {\"authorId\": \"2380810\", \"name\": \"R. Strasser\"}, {\"authorId\": \"4955661\", \"name\": \"E. Stoger\"}], \"abstract\": \"The properties of host plants used for molecular farming can be modified by CRISPR/Cas9 genome editing to improve the quality and yield of recombinant proteins. However, it is often necessary to target multiple genes simultaneously, particularly when using host plants with large and complex genomes. This is the case for Nicotiana benthamiana, an allotetraploid relative of tobacco frequently used for transient protein expression. A multiplex genome editing system incorporating the DsRed2 fluorescent marker for the identification and selection of transgenic plants was established. As proof of principle, NbP4H4 was targeted encoding a prolyl\\u20104\\u2010hydroxylase involved in protein O\\u2010linked glycosylation. Using preselected gRNAs with efficiencies confirmed by transient expression, transgenic plant lines with knockout mutations in all four NbP4H4 genes were obtained. Leaf fluorescence was then used to screen for the absence of the SpCas9 transgene in T1 plants, and transgene\\u2010free lines with homozygous or biallelic mutations were identified. The analysis of plant\\u2010produced recombinant IgA1 as a reporter protein revealed changes in the number of peptides containing hydroxyproline residues and pentoses in the knockout plants. The selection of efficient gRNAs combined with the DsRed2 marker reduces the effort needed to generate N. benthamiana mutants and simplifies the screening processes to obtain transgene\\u2010free progeny.\"}, {\"paperId\": \"0109095c6e8101f130dd4b10dd514404e4dc2c1b\", \"externalIds\": {\"PubMedCentral\": \"11384121\", \"DOI\": \"10.1093/hr/uhae193\", \"CorpusId\": 271177897, \"PubMed\": \"39257542\"}, \"title\": \"The tomato WRKY-B transcription factor modulates lateral branching by targeting BLIND, PIN4, and IAA15\", \"venue\": \"Horticulture Research\", \"year\": 2024, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hr/advance-article-pdf/doi/10.1093/hr/uhae193/58512961/uhae193.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11384121, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47912647\", \"name\": \"Huanhuan Yang\"}, {\"authorId\": \"2311308440\", \"name\": \"Ke Zhou\"}, {\"authorId\": \"1739585958\", \"name\": \"Qingfei Wu\"}, {\"authorId\": \"2049083292\", \"name\": \"Xinyi Jia\"}, {\"authorId\": \"1879283129\", \"name\": \"Hexuan Wang\"}, {\"authorId\": \"2238956295\", \"name\": \"Wenhui Yang\"}, {\"authorId\": \"150189592\", \"name\": \"Lihao Lin\"}, {\"authorId\": \"2311582642\", \"name\": \"Xiaomeng Hu\"}, {\"authorId\": \"2311179574\", \"name\": \"Bingqing Pan\"}, {\"authorId\": \"2400351259\", \"name\": \"Ping Li\"}, {\"authorId\": \"2170044594\", \"name\": \"Tingting Huang\"}, {\"authorId\": \"2238889119\", \"name\": \"Xiangyang Xu\"}, {\"authorId\": \"19164317\", \"name\": \"Jingfu Li\"}, {\"authorId\": \"4091468\", \"name\": \"Jing-bin Jiang\"}, {\"authorId\": \"4141955\", \"name\": \"Minmin Du\"}], \"abstract\": \"Abstract Lateral branching is a crucial agronomic trait that impacts crop yield. In tomato (Solanum lycopersicum), excessive lateral branching is unfavorable and results in substantial labor and management costs. Therefore, optimizing lateral branching is a primary objective in tomato breeding. Although many genes related to lateral branching have been reported in tomato, the molecular mechanism underlying their network remains elusive. In this study, we found that the expression profile of a WRKY gene, WRKY-B (for WRKY-BRANCING), was associated with the auxin-dependent axillary bud development process. Wrky-b mutants generated by the CRISPR/Cas9 editing system presented fewer lateral branches, while WRKY-B overexpression lines presented more lateral branches than did wild-type plants. Furthermore, WRKY-B can directly target the well-known branching gene BLIND (BL) and the auxin efflux carrier gene PIN4 to activate their expression. Both the bl and pin4 mutants exhibited reduced lateral branching, similar to the wrky-b mutant. The IAA contents in the axillary buds of the wrky-b, bl, and pin4 mutant plants were significantly higher than those in the wild-type plants. In addition, WRKY-B can also directly target the AUX/IAA gene IAA15 and repress its expression. In summary, WRKY-B works upstream of BL, PIN4, and IAA15 to regulate the development of lateral branches in tomato.\"}, {\"paperId\": \"01090b4690533a372f2c3fc8203cc2dd192767a5\", \"externalIds\": {\"MAG\": \"2995115579\", \"DOI\": \"10.1016/j.cj.2019.08.006\", \"CorpusId\": 214513344}, \"title\": \"OsABA8ox2, an ABA catabolic gene, suppresses root elongation of rice seedlings and contributes to drought response\", \"venue\": \"Crop Journal\", \"year\": 2020, \"citationCount\": 57, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.cj.2019.08.006\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.cj.2019.08.006?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.cj.2019.08.006, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152823307\", \"name\": \"Yan Zhang\"}, {\"authorId\": \"2108160535\", \"name\": \"Xiaoping Wang\"}, {\"authorId\": \"5327990\", \"name\": \"Yanzhong Luo\"}, {\"authorId\": \"48570782\", \"name\": \"Lan Zhang\"}, {\"authorId\": \"2116470487\", \"name\": \"Yuan Yao\"}, {\"authorId\": \"2112708446\", \"name\": \"Lu Han\"}, {\"authorId\": \"2380744842\", \"name\": \"Zhenhua Chen\"}, {\"authorId\": \"2152511117\", \"name\": \"Lei Wang\"}, {\"authorId\": \"2110491000\", \"name\": \"Yubin Li\"}], \"abstract\": \"Abstract In rice, OsABA8ox encodes abscisic acid (ABA) 8\\u2032-hydroxylase, which catalyzes the committed step of ABA catabolism. The contribution of ABA catabolism in root development remains unclear. We investigated the role of OsABA8ox2 in root growth and development and drought response. GUS staining results showed that OsABA8ox2 was expressed mainly in roots at seedling stage and was strongly expressed in the meristematic zone of the radicle. OsABA8ox2 expression in roots was markedly decreased after 0.5\\u00a0h polyethylene glycol (PEG) treatment and increased after 0.5\\u00a0h rehydration, implying that OsABA8ox2 is a drought-responsive gene. OsABA8ox2 knockout mediated by the CRISPR-Cas9 system increased drought-induced ABA and indole-3-acetic acid accumulation in roots, conferred increased ABA sensitivity, and promoted a more vertically oriented root system architecture (RSA) beneficial to drought tolerance. OsABA8ox2 overexpression suppressed root elongation and increased stomatal conductance and transpiration rate. Consequently, OsABA8ox2 knockout dramatically improved rice drought tolerance, whereas OsABA8ox2 overexpression seedlings were hypersensitive to drought stress, suggesting that OsABA8ox2 contributes to drought response in rice. Compared with wild type, functional leaves of OsABA8ox2 knockout seedlings showed higher ABA levels, whereas overexpression lines showed lower ABA levels, suggesting that OsABA8ox2, as an ABA catabolic gene, modulates ABA concentration through ABA catabolism. OsABA8ox2 and OsABA8ox3 were both localized in the endoplasmic reticulum. Together, these results indicate that OsABA8ox2 suppresses root elongation of rice seedlings, increases water transpiration, and contributes to drought response through ABA catabolism, and that OsABA8ox2 knockout dramatically improves rice drought tolerance. They highlight the key role of ABA catabolism mediated by OsABA8ox2 on root growth and development. OsABA8ox2, as a novel RSA gene, would be a potential genetic target for the improvement of rice drought tolerance.\"}, {\"paperId\": \"01091ed6976b4a85cf12aec9e26e6d6f5a110f8f\", \"externalIds\": {\"MAG\": \"3011368318\", \"DOI\": \"10.1080/13102818.2020.1738957\", \"CorpusId\": 216282685}, \"title\": \"Selection of novel human scFvs against cancer antigen IL1RAP by phage and yeast surface display technology\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1080/13102818.2020.1738957\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/13102818.2020.1738957?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/13102818.2020.1738957, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2142510949\", \"name\": \"Shixin Duan\"}, {\"authorId\": \"83997155\", \"name\": \"Yanrong Jia\"}, {\"authorId\": \"144829361\", \"name\": \"Debao Xie\"}, {\"authorId\": \"87092617\", \"name\": \"S. Xiao\"}, {\"authorId\": \"2111167586\", \"name\": \"Cheng Zhou\"}, {\"authorId\": \"35521157\", \"name\": \"Fanli Zeng\"}], \"abstract\": \"Abstract The objective of this study was isolation of humanized single-chain variable fragment (scFv) antibodies against IL1RAP, a promising cancer marker in leukemia and other tumors. Here, we screened for antibody fragments that recognized IL1RAP using a phage-display library of humanized scFv through several rounds of bio-panning and further FACS selection of enriched yeast-display sub-library. Two specific scFv clones 02 and 61 were isolated with high affinity against IL1RAP. Selected IL1RAP scFv antibodies containing Fc segment were expressed and purified from 293F cells. scFv-02 expressed and purified from mammalian cells exhibited higher IL1RAP binding affinity on IL1RAP-positive 293F cell surface compared to scFv-61. In addition, scFv-02 was significantly specific to IL1RAP, as no binding signal of IL1RAP was detected on the surface of IL1RAP CRISPR-Cas9 edited cell line generated in this study. Two scFv antibodies targeting IL1RAP were isolated by phage and yeast display screening. scFv-02 could serve as a promising material for further development of IL1RAP targeted immunotherapy of leukemia and other diseases. Our work also modified the process for the selection of scFv against targeted antigen by stepwise using phage display, yeast display and mammalian cell display techniques.\"}, {\"paperId\": \"010bc743b5481cb8a2d465f9db603a72a09b6bb9\", \"externalIds\": {\"PubMedCentral\": \"10402039\", \"DOI\": \"10.1101/2023.07.25.550489\", \"CorpusId\": 260289275, \"PubMed\": \"37547003\"}, \"title\": \"PMS1 as a target for splice modulation to prevent somatic CAG repeat expansion in Huntington\\u2019s disease\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-024-47485-0.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10402039, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11874455\", \"name\": \"Zachariah L. McLean\"}, {\"authorId\": \"3155677\", \"name\": \"Dadi Gao\"}, {\"authorId\": \"49182994\", \"name\": \"Kevin Correia\"}, {\"authorId\": \"2007917533\", \"name\": \"Jennie C L Roy\"}, {\"authorId\": \"79654410\", \"name\": \"Shota Shibata\"}, {\"authorId\": \"2225833232\", \"name\": \"Iris N. Farnum\"}, {\"authorId\": \"2225833223\", \"name\": \"Zoe Valdepenas-Mellor\"}, {\"authorId\": \"1581383023\", \"name\": \"Manasa Rapuru\"}, {\"authorId\": \"152276363\", \"name\": \"E. Morini\"}, {\"authorId\": \"2087192156\", \"name\": \"Jayla Ruliera\"}, {\"authorId\": \"144093397\", \"name\": \"T. Gillis\"}, {\"authorId\": \"2386620779\", \"name\": \"D. Lucente\"}, {\"authorId\": \"2652429\", \"name\": \"B. Kleinstiver\"}, {\"authorId\": \"2157126621\", \"name\": \"Jong-Min Lee\"}, {\"authorId\": \"2729966\", \"name\": \"M. MacDonald\"}, {\"authorId\": \"3337009\", \"name\": \"V. Wheeler\"}, {\"authorId\": \"40361233\", \"name\": \"R. M. Pinto\"}, {\"authorId\": \"3307520\", \"name\": \"J. Gusella\"}], \"abstract\": \"Huntington\\u2019s disease (HD) is a dominantly inherited neurodegenerative disorder whose motor, cognitive, and behavioral manifestations are caused by an expanded, somatically unstable CAG repeat in the first exon of HTT that lengthens a polyglutamine tract in huntingtin. Genome-wide association studies (GWAS) have revealed DNA repair genes that influence the age-at-onset of HD and implicate somatic CAG repeat expansion as the primary driver of disease timing. To prevent the consequent neuronal damage, small molecule splice modulators (e.g., branaplam) that target HTT to reduce the levels of huntingtin are being investigated as potential HD therapeutics. We found that the effectiveness of the splice modulators can be influenced by genetic variants, both at HTT and other genes where they promote pseudoexon inclusion. Surprisingly, in a novel hTERT-immortalized retinal pigment epithelial cell (RPE1) model for assessing CAG repeat instability, these drugs also reduced the rate of HTT CAG expansion. We determined that the splice modulators also affect the expression of the mismatch repair gene PMS1, a known modifier of HD age-at-onset. Genome editing at specific HTT and PMS1 sequences using CRISPR-Cas9 nuclease confirmed that branaplam suppresses CAG expansion by promoting the inclusion of a pseudoexon in PMS1, making splice modulation of PMS1 a potential strategy for delaying HD onset. Comparison with another splice modulator, risdiplam, suggests that other genes affected by these splice modulators also influence CAG instability and might provide additional therapeutic targets.\"}, {\"paperId\": \"010c87ae59f006286ece6f9342346e430162a63d\", \"externalIds\": {\"PubMedCentral\": \"8067554\", \"DOI\": \"10.3390/ani11041037\", \"CorpusId\": 233389717, \"PubMed\": \"33916888\"}, \"title\": \"V-Set and Immunoglobulin Domain-Containing 1 (VSIG1), Predominantly Expressed in Testicular Germ Cells, Is Dispensable for Spermatogenesis and Male Fertility in Mice\", \"venue\": \"Animals\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2076-2615/11/4/1037/pdf?version=1617940985\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8067554, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51169979\", \"name\": \"Yena Jung\"}, {\"authorId\": \"1572179405\", \"name\": \"H. Bang\"}, {\"authorId\": \"49170790\", \"name\": \"Young\\u2010Hyun Kim\"}, {\"authorId\": \"2121916380\", \"name\": \"Na-Eun Park\"}, {\"authorId\": \"121099436\", \"name\": \"Young-Ho Park\"}, {\"authorId\": \"2158093302\", \"name\": \"Chaelin Park\"}, {\"authorId\": \"121945470\", \"name\": \"Sang-Rae Lee\"}, {\"authorId\": \"2146053931\", \"name\": \"Jeong-Woong Lee\"}, {\"authorId\": \"72066089\", \"name\": \"B. Song\"}, {\"authorId\": \"2110060962\", \"name\": \"Ji-Su Kim\"}, {\"authorId\": \"4787520\", \"name\": \"Bo-Woong Sim\"}, {\"authorId\": \"6378687\", \"name\": \"Dong-Won Seol\"}, {\"authorId\": \"145614758\", \"name\": \"G. Wee\"}, {\"authorId\": \"2109592392\", \"name\": \"Sunhyung Kim\"}, {\"authorId\": \"153274649\", \"name\": \"Sun-Uk Kim\"}, {\"authorId\": \"4746155\", \"name\": \"Ekyune Kim\"}], \"abstract\": \"Simple Summary V-set and immunoglobulin domain-containing 1 (VSIG1) is a newly discovered member of the junctional adhesion molecule (JAM) family encoded by a gene located on the X chromosome in humans and mice. Expression of VSIG1 in normal mammalian tissues was originally reported to be highly tissue-specific and was detected in organs such as the testis. However, as little is known about its physiological function, we aimed to investigate the function of VSIG1 in mammalian spermatogenesis and fertilization. Abstract To elucidate the functional role of V-set and immunoglobulin domain-containing 1 (VSIG1) in spermatogenesis and fertilization, we knocked out (KO) VSIG1 in a mouse embryo using CRISPR/Cas9 (Clustered regularly interspaced short palindromic repeat/CRISPR-associated protein 9) -mediated genome editing. Reverse transcription PCR was performed using cDNA synthesized from VSIG1 KO testis RNA. Although Western blot analysis using a specific antibody to VSIG1 confirmed VSIG1 protein defects in the KO mice, hematoxylin-eosin staining analysis was similar in the KO and wild-type mice. Additionally, computer-assisted sperm analysis and in vitro fertilization experiments were conducted to confirm the activity and fertilization ability of sperm derived from the KO mouse. Mice lacking VSIG1 were viable and had no serious developmental defects. As they got older, the KO mice showed slightly higher weight loss, male mice lacking VSIG1 had functional testes, including normal sperm number and motility, and both male and female mice lacking VSIG1 were fertile. Our results from VSIG1 KO mice suggest that VSIG1 may not play essential roles in spermatogenesis and normal testis development, function, and maintenance. VSIG1 in sperm is dispensable for spermatogenesis and male fertility in mice. As several genes are known to possess slightly different functions depending on the species, the importance and molecular mechanism of VSIG1 in tissues of other species needs further investigation.\"}, {\"paperId\": \"010d6741b01c598094d37bd0f19eadcfe249ee57\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2024.103581\", \"CorpusId\": 273363150, \"PubMed\": \"39423676\"}, \"title\": \"CRISPR/Cas9-mediated generation of a human induced pluripotent stem cell line with PRPF6 c.2699 G > A mutation to model retinitis pigmentosa.\", \"venue\": \"Stem Cell Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2024.103581\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2024.103581?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2024.103581, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46992221\", \"name\": \"Yuqin Liang\"}, {\"authorId\": \"102626004\", \"name\": \"Xihao Sun\"}, {\"authorId\": \"2326299854\", \"name\": \"Hang Chen\"}, {\"authorId\": \"48728118\", \"name\": \"Zekai Cui\"}, {\"authorId\": \"6643846\", \"name\": \"Jianing Gu\"}, {\"authorId\": \"146356426\", \"name\": \"Chunwen Duan\"}, {\"authorId\": \"122562463\", \"name\": \"Shengru Mao\"}, {\"authorId\": \"2326003197\", \"name\": \"Yuexi Chen\"}, {\"authorId\": \"2325998306\", \"name\": \"Xiaoxue Li\"}, {\"authorId\": \"2240593208\", \"name\": \"Siqi Xiong\"}, {\"authorId\": \"4832431\", \"name\": \"Jiansu Chen\"}], \"abstract\": \"PRPF6, located on chromosome 20, is required for the formation of the spliceosome. Mutations in the PRPF6 gene can lead to retinitis pigmentosa (RP), a common inherited retinal disease characterized by progressive degeneration of retinal pigment epithelium and photoreceptors. Here, we generated an induced pluripotent stem cell (iPSC) line carrying the PRPF6 c.2699 G > A mutation using CRISPR/Cas9 technology, which will provide a valuable resource for RP pathogenesis and treatment research.\"}, {\"paperId\": \"010e75289b0a7be7c4ec633f0c4eb4099fbbae97\", \"externalIds\": {\"DOI\": \"10.1002/cm.21717\", \"CorpusId\": 246975578, \"PubMed\": \"35811499\"}, \"title\": \"Follow that cell: leukocyte migration in L-plastin mutant zebrafish\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2022.02.15.476948\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/cm.21717?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/cm.21717, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2237151279\", \"name\": \"J. Linehan\"}, {\"authorId\": \"2248380679\", \"name\": \"Jose Lucas Zepeda\"}, {\"authorId\": \"2256240567\", \"name\": \"T.A. Mitchell\"}, {\"authorId\": \"2248370268\", \"name\": \"Elizabeth E. LeClair\"}], \"abstract\": \"Actin assemblies are important in motile cells such as leukocytes which form dynamic plasma membrane extensions or podia. L-plastin (LCP1) is a leukocyte-specific calcium-dependent actin-bundling protein that, in mammals, is known to affect immune cell migration. Previously, we generated CRISPR/Cas9 engineered zebrafish lacking L-plastin (lcp1-/-) and reported that they had reduced survival to adulthood, suggesting that lack of L-plastin might negatively affect the immune system. To test this hypothesis, we examined the distribution and migration of neutrophils and macrophages in the transparent tail of early zebrafish larvae using cell-specific markers and an established wound-migration assay. Knockout larvae were similar to their heterozygous siblings in having equal body sizes and comparable numbers of neutrophils in caudal hematopoietic tissue at two days post-fertilization, indicating no gross defect in neutrophil production or developmental migration. When stimulated by a tail wound, all genotypes of neutrophils were equally migratory in a two-hour window. However for macrophages we observed both migration defects and morphological differences. L-plastin knockout macrophages still homed to wounds but were slower, less directional and had a star-like morphology with many leading and trailing projections. In contrast, wild type macrophages were faster, more directional, and had a more streamlined, slug-like morphology. Overall, these findings show that in larval zebrafish L-plastin knockout primarily affects the macrophage response with possible consequences for organismal immunity. Consistent with our observations, we propose a model in which cytoplasmic L-plastin negatively regulates macrophage integrin adhesion by holding these transmembrane heterodimers in a \\u2018clasped\\u2019, inactive form and is a necessary part of establishing macrophage polarity during chemokine-induced motility.\"}, {\"paperId\": \"010f264a8b87d0542d54a92c2e9c7800e4c23b0f\", \"externalIds\": {\"DOI\": \"10.1089/hum.2023.045\", \"CorpusId\": 259091001, \"PubMed\": \"37276175\"}, \"title\": \"CRISPR-Mediated Base Editing: Promises and Challenges for a Viable Oncotherapy Strategy\", \"venue\": \"Human Gene Therapy\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/hum.2023.045?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/hum.2023.045, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2197663535\", \"name\": \"Lu Huang\"}, {\"authorId\": \"2349427183\", \"name\": \"Chao-He Yang\"}, {\"authorId\": \"2144285113\", \"name\": \"Yan Chen\"}, {\"authorId\": \"2218726384\", \"name\": \"Han Deng\"}, {\"authorId\": \"2061181044\", \"name\": \"Z. Liao\"}, {\"authorId\": \"144494310\", \"name\": \"Hongtao Xiao\"}], \"abstract\": \"Base editing technology, developed from the CRISPR/Cas9 system, is able to efficiently implement single-base substitutions at specific DNA or RNA sites without generating double-strand breaks with precision and efficiency. Point mutations account for 58% of disease-causing genetic mutations in humans, and single nucleotide variants are an important cause of tumorigenesis, and the advent of base editors offers new hope for the study or treatment of such diseases. Although it has some limitations, base editors have been continuously improved in terms of editing efficiency, specificity, and product purity since their development. In this review, we examine the main base editing technologies and discuss their applications and prospects in tumor research and therapy, as well as elaborate on their mode of delivery.\"}, {\"paperId\": \"0112cf04c2f52176134e426663a747a8c2bc052d\", \"externalIds\": {\"DOI\": \"10.1016/j.bbalip.2021.158991\", \"CorpusId\": 235413344, \"PubMed\": \"34116261\"}, \"title\": \"DGAT2 Stability is Increased in Response to DGAT1 Inhibition in Gene Edited HepG2 Cells.\", \"venue\": \"Biochimica et Biophysica Acta - Molecular and Cell Biology of Lipids\", \"year\": 2021, \"citationCount\": 12, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bbalip.2021.158991?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bbalip.2021.158991, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7699785\", \"name\": \"P. J. McFie\"}, {\"authorId\": \"13380655\", \"name\": \"P. Chumala\"}, {\"authorId\": \"48269235\", \"name\": \"G. Katselis\"}, {\"authorId\": \"4766432\", \"name\": \"S. Stone\"}], \"abstract\": null}, {\"paperId\": \"01153461f1ae83c71900b5a14c003ee6d9cb6252\", \"externalIds\": {\"DOI\": \"10.1182/blood-2024-206333\", \"CorpusId\": 274544336}, \"title\": \"Posttranslational Changes in Histone Modification Driven By USP48 Loss Increase Sensitivity to Hypomethylating Agents in Acute Myeloid Leukemia\", \"venue\": \"Blood\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2024-206333?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2024-206333, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269242368\", \"name\": \"C. Schneider\"}, {\"authorId\": \"7602193\", \"name\": \"G. Alexe\"}, {\"authorId\": \"2119710928\", \"name\": \"Ashleigh Meyer\"}, {\"authorId\": \"2312026750\", \"name\": \"L. Merickel\"}, {\"authorId\": \"2304147798\", \"name\": \"A. Basanthakumar\"}, {\"authorId\": \"2269377970\", \"name\": \"A. Taillon\"}, {\"authorId\": \"2304147800\", \"name\": \"S. Salhotra\"}, {\"authorId\": \"2334099439\", \"name\": \"Yara Rodriguez\"}, {\"authorId\": \"13434018\", \"name\": \"B. H\\u00e4upl\"}, {\"authorId\": \"2334070176\", \"name\": \"D. E. Root\"}, {\"authorId\": \"47061835\", \"name\": \"T. Oellerich\"}, {\"authorId\": \"6521164\", \"name\": \"K. Stegmaier\"}], \"abstract\": \"\\n \\n Despite advances in therapeutic strategies for patients with AML not eligible for intensive chemotherapy, survival rates for this subset of patients remain particularly poor. Among this group are older adult patients who receive the hypomethylating agents (HMAs) azacitidine or decitabine as frontline therapy. Despite their status as FDA-approved drugs, HMA monotherapy only achieves low response rates in patients with AML and is not a curative treatment. Discovery of novel sensitizers that can be used in combination with HMAs are needed to improve patient outcome. One challenge is that the mechanism by which HMAs are active in AML has been elusive.\\n We deployed genome-wide CRISPR-Cas9 screens using the two standard HMAs (decitabine and azacitidine) and a selective DNMT1 inhibitor (GSK-3680532) to identify novel response and resistance mechanisms to HMAs. Our screens identified well-characterized, as well as unexplored targets, with a strong overlap among the three different drugs. We discovered an enrichment of genes involved in chromatin remodeling and transcriptional regulation, with knockout (KO) of the gene USP48, which encodes a deubiquitinating enzyme, as the top sensitizer in AML cells. We validated USP48 KO in competitive growth and toxicity assays as a selective sensitizer for HMAs in multiple AML cell lines. In contrast, no increased toxicity was seen with other nucleoside analogues or DNA damage inducing agents, such as cytarabine or doxorubicin, suggesting that loss of DNMT1 and the demethylation of DNA is responsible for the observed synergy.\\n To begin to understand which mechanism of HMAs is enhanced through USP48 KO, we utilized cell differentiation and cell death assays. While the loss of USP48 alone did not affect cell growth or viability, the addition of low dose HMA treatment led to a decrease in cell viability with increased DNA damage and induction of apoptosis. In contrast, no differentiation was observed. In vivo, in two independent studies using an orthotopic mouse model of human AML, we found that the AML model with USP48 KO and 7-day treatment with the DNMT1 inhibitor GSK-3680532 had ablated disease burden in the bone marrow (< 0.5% hCD45+ blasts) and prolonged survival. Mice with non-targeting guides or USP48 KO treated with the vehicle control had ~25% hCD45+ blasts, while the DNMT1 inhibitor in the non-targeting control mice showed some antitumor effect (9% hCD45+ blasts).\\n To date, little is known about the direct substrates of USP48. To gain better insight into possible targets of USP48 we used an omics-based approach, generating ubiquitinome, proteome, interactome IP-mass spectrometry and RNA-Seq data. The ubiquitinome data revealed a significant enrichment of H2A variant ubiquitination and enhanced ubiquitination of key proteins involved in the recognition of DNA double-strand breaks (DSB) (Ku70/Ku80 and PRKDC) upon USP48 KO. These findings were confirmed in the interactome data set, where the H2AX core histone complex was among the most enriched CORUM protein complexes. RNA-Seq data showed increased expression of gene sets involved in DNA damage repair and chromatin organization upon USP48 KO, consistent with a cellular response to maintain chromatin stability.\\n Additional genome-scale CRISPR-Cas9 screening of USP48 KO cells with HMA treatment revealed the KO of RNF138, UBE2K and UBE2D3 as rendering resistance to all three drugs. While previous reports showed that USP48 erases BRCA1 ubiquitin sites, ours is the first work linking the RNF138-UBE2K/UBE2D3 ubiquitination machinery to USP48. RNF138, an E3 ubiquitin ligase, is also described to ubiquitinate and displace repair proteins from DSB sites, connecting RNF138 itself to DNA repair pathway choice. Low-throughput validation confirms rescue of HMA + USP48 KO toxicity with the knockout of either RNF138 or its E2 ligases UBE2K/UBE2D3 in AML cells.\\n Taken together our data confirm a role for USP48 as a histone deubiquitinase, influencing the modification of histones and other proteins important for DNA damage repair pathway choice. While USP48 KO alone does not affect AML cell viability, combining USP48 KO with HMA treatment is highly lethal to AML suggesting a synergistic interplay between DNA hypomethylation, ubiquitin posttranslational modifications, DNA damage and AML cell death. USP48 is thus a new target for combination therapy with HMAs for AML.\\n\"}, {\"paperId\": \"011669f3e4627f4fe2ae3ccf458a38ae2d229881\", \"externalIds\": {\"PubMedCentral\": \"10053445\", \"DOI\": \"10.26508/lsa.202201735\", \"CorpusId\": 257804345, \"PubMed\": \"36977592\"}, \"title\": \"FBXO11 governs macrophage cell death and inflammation in response to bacterial toxins\", \"venue\": \"Life Science Alliance\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.life-science-alliance.org/content/lsa/6/6/e202201735.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10053445, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1748865550\", \"name\": \"Yusun Jeon\"}, {\"authorId\": \"35038509\", \"name\": \"S. Chow\"}, {\"authorId\": \"67173304\", \"name\": \"Isabella Stuart\"}, {\"authorId\": \"2153733256\", \"name\": \"Ashley Weir\"}, {\"authorId\": \"36571100\", \"name\": \"Amy T. Y. Yeung\"}, {\"authorId\": \"26547492\", \"name\": \"C. Hale\"}, {\"authorId\": \"4561133\", \"name\": \"S. Sridhar\"}, {\"authorId\": \"2313711\", \"name\": \"G. Dougan\"}, {\"authorId\": \"6505273\", \"name\": \"J. Vince\"}, {\"authorId\": \"3892476\", \"name\": \"Thomas Naderer\"}], \"abstract\": \"FBXO11 regulates the expression of the complement receptor C5aR1 and the inflammatory cytokine IL-1\\u03b2, affecting how macrophages respond to Staphylococcus aureus pore\\u2013forming toxins. Staphylococcus aureus causes severe infections such as pneumonia and sepsis depending on the pore-forming toxin Panton\\u2013Valentine leukocidin (PVL). PVL kills and induces inflammation in macrophages and other myeloid cells by interacting with the human cell surface receptor, complement 5a receptor 1 (C5aR1). C5aR1 expression is tighly regulated and may thus modulate PVL activity, although the mechanisms involved remain incompletely understood. Here, we used a genome-wide CRISPR/Cas9 screen and identified F-box protein 11 (FBXO11), an E3 ubiquitin ligase complex member, to promote PVL toxicity. Genetic deletion of FBXO11 reduced the expression of C5aR1 at the mRNA level, whereas ectopic expression of C5aR1 in FBXO11\\u2212/\\u2212 macrophages, or priming with LPS, restored C5aR1 expression and thereby PVL toxicity. In addition to promoting PVL-mediated killing, FBXO11 dampens secretion of IL-1\\u03b2 after NLRP3 activation in response to bacterial toxins by reducing mRNA levels in a BCL-6\\u2013dependent and BCL-6\\u2013independent manner. Overall, these findings highlight that FBXO11 regulates C5aR1 and IL-1\\u03b2 expression and controls macrophage cell death and inflammation following PVL exposure.\"}, {\"paperId\": \"011b3fd74d09751f26096fb6e8309bb72a7529a0\", \"externalIds\": {\"DOI\": \"10.1101/2022.03.18.484928\", \"CorpusId\": 247601251}, \"title\": \"Alpha-mannosidase-2 modulates arbovirus infection in a pathogen- and Wolbachia-specific manner in Aedes aegypti mosquitoes\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/03/19/2022.03.18.484928.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.03.18.484928?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.03.18.484928, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5381638\", \"name\": \"N. Urakova\"}, {\"authorId\": \"5062591\", \"name\": \"R. Joseph\"}, {\"authorId\": \"2159564121\", \"name\": \"Allyn Huntsinger\"}, {\"authorId\": \"48880523\", \"name\": \"V. Macias\"}, {\"authorId\": \"2111035964\", \"name\": \"Matthew J Jones\"}, {\"authorId\": \"49276458\", \"name\": \"Leah T. Sigle\"}, {\"authorId\": \"2150653042\", \"name\": \"Ming Li\"}, {\"authorId\": \"6928917\", \"name\": \"O. Akbari\"}, {\"authorId\": \"38978231\", \"name\": \"Z. Xi\"}, {\"authorId\": \"2290154518\", \"name\": \"Konstantinos Lymperopoulos\"}, {\"authorId\": \"143812672\", \"name\": \"R. Sayre\"}, {\"authorId\": \"4051784\", \"name\": \"E. McGraw\"}, {\"authorId\": \"2297429\", \"name\": \"J. Rasgon\"}], \"abstract\": \"Multiple Wolbachia strains can block pathogen infection, replication, and/or transmission in Aedes aegypti mosquitoes under both laboratory and field conditions. However, Wolbachia effects on pathogens can be highly variable across systems and the factors governing this variability are not well understood. It is increasingly clear that the mosquito host is not a passive player in which Wolbachia governs pathogen transmission phenotypes; rather, the genetics of the host can significantly modulate Wolbachia-mediated pathogen blocking. Specifically, previous work linked variation in Wolbachia pathogen blocking to polymorphisms in the mosquito alpha-mannosidase 2 (\\u03b1Man2) gene. Here we use CRISPR-Cas9 mutagenesis to functionally test this association. We developed \\u03b1Man2 knockouts and examined effects on both Wolbachia and virus levels, using both dengue virus (DENV; Flaviviridae) and Mayaro virus (MAYV; Togaviridae). Wolbachia titers were significantly elevated in \\u03b1Man2 knockout (KO) mosquitoes, but there were complex interactions with virus infection and replication. In Wolbachia-uninfected mosquitoes, the \\u03b1Man2 KO mutation was associated with decreased DENV titers, but in a Wolbachia-infected background, the \\u03b1Man2 KO mutation significantly modulated virus blocking. In contrast, the \\u03b1Man2 KO mutation significantly increased MAYV replication in Wolbachia-uninfected mosquitoes and did not affect Wolbachia-mediated virus blocking. These results demonstrate that \\u03b1Man2 modulates arbovirus infection in Ae. aegypti mosquitoes in a pathogen- and Wolbachia-specific manner, and that Wolbachia-mediated pathogen blocking is a complex phenotype dependent on the mosquito host genotype and the pathogen. These results have significant impact for the design and use of Wolbachia-based strategies to control vector-borne pathogens.\"}, {\"paperId\": \"01221df3d0df175b3977ce777e36cfc55e0d5d47\", \"externalIds\": {\"MAG\": \"3021928458\", \"PubMedCentral\": \"7246564\", \"DOI\": \"10.3390/ijms21093268\", \"CorpusId\": 218556159, \"PubMed\": \"32380730\"}, \"title\": \"CRISPR/Cas9 Editing for Gaucher Disease Modelling\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/9/3268/pdf?version=1588678361\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7246564, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144482679\", \"name\": \"E. Pavan\"}, {\"authorId\": \"39377686\", \"name\": \"M. Ormazabal\"}, {\"authorId\": \"50401633\", \"name\": \"P. Peruzzo\"}, {\"authorId\": \"1683861627\", \"name\": \"E. Vaena\"}, {\"authorId\": \"4063060\", \"name\": \"P. Rozenfeld\"}, {\"authorId\": \"3362024\", \"name\": \"A. Dardis\"}], \"abstract\": \"Gaucher disease (GD) is an autosomal recessive lysosomal storage disorder caused by mutations in the acid \\u03b2-glucosidase gene (GBA1). Besides causing GD, GBA1 mutations constitute the main genetic risk factor for developing Parkinson\\u2019s disease. The molecular basis of neurological manifestations in GD remain elusive. However, neuroinflammation has been proposed as a key player in this process. We exploited CRISPR/Cas9 technology to edit GBA1 in the human monocytic THP-1 cell line to develop an isogenic GD model of monocytes and in glioblastoma U87 cell lines to generate an isogenic GD model of glial cells. Both edited (GBA1 mutant) cell lines presented low levels of mutant acid \\u03b2-glucosidase expression, less than 1% of residual activity and massive accumulation of substrate. Moreover, U87 GBA1 mutant cells showed that the mutant enzyme was retained in the ER and subjected to proteasomal degradation, triggering unfolded protein response (UPR). U87 GBA1 mutant cells displayed an increased production of interleukin-1\\u03b2, both with and without inflammosome activation, \\u03b1-syn accumulation and a higher rate of cell death in comparison with wild-type cells. In conclusion, we developed reliable, isogenic, and easy-to-handle cellular models of GD obtained from commercially accessible cells to be employed in GD pathophysiology studies and high-throughput drug screenings.\"}, {\"paperId\": \"0122f455046cb2132503da65fd5ed73ec798dc22\", \"externalIds\": {\"MAG\": \"3048926818\", \"DOI\": \"10.1021/acssynbio.9b00491\", \"CorpusId\": 221127353, \"PubMed\": \"32786921\"}, \"title\": \"CRISPR/Cas9-Based Genome Editing in the Filamentous Fungus Glarea lozoyensis and Its Application in Manipulating gloF.\", \"venue\": \"ACS Synthetic Biology\", \"year\": 2020, \"citationCount\": 31, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://figshare.com/articles/journal_contribution/CRISPR_Cas9-Based_Genome_Editing_in_the_Filamentous_Fungus_i_Glarea_lozoyensis_i_and_Its_Application_in_Manipulating_i_gloF_i_/12797563/1/files/24215239.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acssynbio.9b00491?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acssynbio.9b00491, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79842315\", \"name\": \"Tengyun Wei\"}, {\"authorId\": \"2108185866\", \"name\": \"Yuanjie Wu\"}, {\"authorId\": \"2206004041\", \"name\": \"Qiu Ping Xie\"}, {\"authorId\": \"50994884\", \"name\": \"Jiawei Tang\"}, {\"authorId\": \"2000236178\", \"name\": \"Zhixiong Yu\"}, {\"authorId\": \"50883300\", \"name\": \"Songbai Yang\"}, {\"authorId\": \"2144336393\", \"name\": \"Shaoxin Chen\"}], \"abstract\": \"Glarea lozoyensis is an important industrial fungus that produces the pneumocandin B0, which is used for the synthesis of antifungal drug caspofungin. However, because of the limitations and complications of traditional genetic tools, G. lozoyensis strain engineering has been hindered. In this study, we established an efficient CRISPR/Cas9-based gene editing tool in G. lozoyensis SIPI1208. With this method, gene mutagenesis efficiency in the target locus can be up to 80%, which enables the rapid gene knockout. According to the reports, GloF and Ap-HtyE, proline hydroxylases involved in pneumocandin and Echinocandin B biosynthesis, respectively, can catalyze the proline to generate different ratios of trans-3-hydroxy-l-proline to trans-4-hydroxy-l-proline. Heterologous expression of Ap-HtyE in G. lozoyensis decreased the ratio of pneumocandin C0 to (pneumocandin B0 + pneumocandin C0) from 33.5% to 11% without the addition of proline to the fermentation medium. Furthermore, the gloF was replaced by ap-htyE to study the production of pneumocandin C0. However, the gene replacement has been hampered by traditional gene tools since gloF and gloG, two contiguous genes indispensable in the biosynthesis of pneumocandins, are cotranscribed into one mRNA. With the CRISPR/Cas9 strategy, ap-htyE was knocked in and successfully replaced gloF, and results showed that the knock-in strain retained the ability to produce pneumocandin B0, but the production of pneumocandin C0 was abolished. Thus, this strain displayed a competitive advantage in the industrial production of pneumocandin B0. In summary, this study showed that the CRISPR/Cas9-based gene editing tool is efficient for manipulating genes in G. lozoyensis.\"}, {\"paperId\": \"01230ea97dc9a2188449ac3da642f3100a769c78\", \"externalIds\": {\"DOI\": \"10.1016/j.jcyt.2023.03.011\", \"CorpusId\": 258276001, \"PubMed\": \"37086241\"}, \"title\": \"Allogeneic chimeric antigen receptor-T cells with CRISPR-disrupted programmed death-1 checkpoint exhibit enhanced functional fitness.\", \"venue\": \"Cytotherapy\", \"year\": 2023, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.isct-cytotherapy.org/article/S1465324923000919/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jcyt.2023.03.011?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jcyt.2023.03.011, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47241362\", \"name\": \"Elaine Lau\"}, {\"authorId\": \"39132768\", \"name\": \"G. Kwong\"}, {\"authorId\": \"2058905966\", \"name\": \"Tristan W Fowler\"}, {\"authorId\": \"79546607\", \"name\": \"B. Sun\"}, {\"authorId\": \"7188303\", \"name\": \"Paul D. Donohoue\"}, {\"authorId\": \"39859578\", \"name\": \"Ryan T. Davis\"}, {\"authorId\": \"2205441479\", \"name\": \"Mara Bryan\"}, {\"authorId\": \"2215102944\", \"name\": \"Shannon McCawley\"}, {\"authorId\": \"5849358\", \"name\": \"S. Clarke\"}, {\"authorId\": \"2110364251\", \"name\": \"Carolyn Williams\"}, {\"authorId\": \"10758540\", \"name\": \"Lynda Banh\"}, {\"authorId\": \"1413742110\", \"name\": \"Matthew J Irby\"}, {\"authorId\": \"10787104\", \"name\": \"Leslie Edwards\"}, {\"authorId\": \"2264875459\", \"name\": \"Meghan D. Storlie\"}, {\"authorId\": \"11976155\", \"name\": \"B. Kohrs\"}, {\"authorId\": \"49614215\", \"name\": \"Graham W. G. Lilley\"}, {\"authorId\": \"2111051886\", \"name\": \"Stephen C. Smith\"}, {\"authorId\": \"4440096\", \"name\": \"S. Gradia\"}, {\"authorId\": \"49762070\", \"name\": \"C. Fuller\"}, {\"authorId\": \"46784135\", \"name\": \"J. Skoble\"}, {\"authorId\": \"2205459040\", \"name\": \"E. Garner\"}, {\"authorId\": \"2307050140\", \"name\": \"Megan van Overbeek\"}, {\"authorId\": \"3435134\", \"name\": \"S. Kanner\"}], \"abstract\": \"BACKGROUND AIMS\\nTherapeutic disruption of immune checkpoints has significantly advanced the armamentarium of approaches for treating cancer. The prominent role of the programmed death-1 (PD-1)/programmed death ligand-1 axis for downregulating T cell function offers a tractable strategy for enhancing the disease-modifying impact of CAR-T cell therapy.\\n\\n\\nMETHODS\\nTo address checkpoint interference, primary human T cells were genome edited with a next-generation CRISPR-based platform (Cas9 chRDNA) by knockout of the PDCD1 gene encoding the PD-1 receptor. Site-specific insertion of a chimeric antigen receptor specific for CD19 into the T cell receptor alpha constant locus was implemented to drive cytotoxic activity.\\n\\n\\nRESULTS\\nThese allogeneic CAR-T cells (CB-010) promoted longer survival of mice in a well-established orthotopic tumor xenograft model of a B cell malignancy compared with identically engineered CAR-T cells without a PDCD1 knockout. The persistence kinetics of CB-010 cells in hematologic tissues versus CAR-T cells without PDCD1 disruption were similar, suggesting the robust initial debulking of established tumor xenografts was due to enhanced functional fitness. By single-cell RNA-Seq analyses, CB-010 cells, when compared with identically engineered CAR-T cells without a PDCD1 knockout, exhibited fewer Treg cells, lower exhaustion phenotypes and reduced dysfunction signatures and had higher activation, glycolytic and oxidative phosphorylation signatures. Further, an enhancement of mitochondrial metabolic fitness was observed, including increased respiratory capacity, a hallmark of less differentiated T cells.\\n\\n\\nCONCLUSIONS\\nGenomic PD-1 checkpoint disruption in the context of allogeneic CAR-T cell therapy may provide a compelling option for treating B lymphoid malignancies.\"}, {\"paperId\": \"012338538c154f0f62f1627ea1de466c8468121a\", \"externalIds\": {\"PubMedCentral\": \"10942345\", \"DOI\": \"10.1101/2024.03.05.582637\", \"CorpusId\": 268325007, \"PubMed\": \"38496503\"}, \"title\": \"Precision Enhancement of CAR-NK Cells through Non-Viral Engineering and Highly Multiplexed Base Editing\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10942345\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10942345, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2290854226\", \"name\": \"Minjing Wang\"}, {\"authorId\": \"32562190\", \"name\": \"Joshua B. Krueger\"}, {\"authorId\": \"2290663422\", \"name\": \"Alexandria K. Gilkey\"}, {\"authorId\": \"2290663419\", \"name\": \"Erin M. Stelljes\"}, {\"authorId\": \"51302849\", \"name\": \"Mitchell G. Kluesner\"}, {\"authorId\": \"39530826\", \"name\": \"E. Pomeroy\"}, {\"authorId\": \"2326488819\", \"name\": \"Joseph G. Skeate\"}, {\"authorId\": \"2140540470\", \"name\": \"Nicholas J. Slipek\"}, {\"authorId\": \"51177411\", \"name\": \"Walker S. Lahr\"}, {\"authorId\": \"2139994903\", \"name\": \"Patricia N. Claudio V\\u00e1zquez\"}, {\"authorId\": \"2290872179\", \"name\": \"Yueting Zhao\"}, {\"authorId\": \"2290671650\", \"name\": \"Ella J. Eaton\"}, {\"authorId\": \"13504306\", \"name\": \"Kanut Laoharawee\"}, {\"authorId\": \"9528097\", \"name\": \"Beau R. Webber\"}, {\"authorId\": \"6390232\", \"name\": \"B. Moriarity\"}], \"abstract\": \"Natural killer (NK) cells\\u2019 unique ability to kill transformed cells expressing stress ligands or lacking major histocompatibility complexes (MHC) has prompted their development for immunotherapy. However, NK cells have demonstrated only moderate responses against cancer in clinical trials and likely require advanced genome engineering to reach their full potential as a cancer therapeutic. Multiplex genome editing with CRISPR/Cas9 base editors (BE) has been used to enhance T cell function and has already entered clinical trials but has not been reported in human NK cells. Here, we report the first application of BE in primary NK cells to achieve both loss-of-function and gain-of-function mutations. We observed highly efficient single and multiplex base editing, resulting in significantly enhanced NK cell function. Next, we combined multiplex BE with non-viral TcBuster transposon-based integration to generate IL-15 armored CD19 CAR-NK cells with significantly improved functionality in a highly suppressive model of Burkitt\\u2019s lymphoma both in vitro and in vivo. The use of concomitant non-viral transposon engineering with multiplex base editing thus represents a highly versatile and efficient platform to generate CAR-NK products for cell-based immunotherapy and affords the flexibility to tailor multiple gene edits to maximize the effectiveness of the therapy for the cancer type being treated.\"}, {\"paperId\": \"01277794c39a1180bedce3a4208ee75597350138\", \"externalIds\": {\"PubMedCentral\": \"10396298\", \"DOI\": \"10.1126/sciadv.adg6856\", \"CorpusId\": 260431240, \"PubMed\": \"37531422\"}, \"title\": \"CCR2 is a host entry receptor for severe fever with thrombocytopenia syndrome virus\", \"venue\": \"Science Advances\", \"year\": 2023, \"citationCount\": 50, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.science.org/doi/pdf/10.1126/sciadv.adg6856?download=true\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10396298, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4059719\", \"name\": \"Lei-ke Zhang\"}, {\"authorId\": \"2375236649\", \"name\": \"Xuefang Peng\"}, {\"authorId\": \"1992935411\", \"name\": \"Qingxing Wang\"}, {\"authorId\": \"2118398273\", \"name\": \"Jin Li\"}, {\"authorId\": \"1992995247\", \"name\": \"Shouming Lv\"}, {\"authorId\": \"2226703200\", \"name\": \"Shuo Han\"}, {\"authorId\": \"2226793735\", \"name\": \"Lingyu Zhang\"}, {\"authorId\": \"2161665911\", \"name\": \"Heng Ding\"}, {\"authorId\": \"2155373209\", \"name\": \"Cong-yi Wang\"}, {\"authorId\": \"40206754\", \"name\": \"Gengfu Xiao\"}, {\"authorId\": \"12003979\", \"name\": \"Xuguang Du\"}, {\"authorId\": \"2020678854\", \"name\": \"Ke Peng\"}, {\"authorId\": \"1706574\", \"name\": \"Hao Li\"}, {\"authorId\": \"1638708750\", \"name\": \"Wei Liu\"}], \"abstract\": \"Severe fever with thrombocytopenia syndrome virus (SFTSV) is an emerging tick-borne bunyavirus causing a high fatality rate of up to 30%. To date, the receptor mediating SFTSV entry remained uncharacterized, hindering the understanding of disease pathogenesis. Here, C-C motif chemokine receptor 2 (CCR2) was identified as a host receptor for SFTSV based on a genome-wide CRISPR-Cas9 screen. Knockout of CCR2 substantially reduced viral binding and infection. CCR2 enhanced SFTSV binding through direct binding to SFTSV glycoprotein N (Gn), which is mediated by its N-terminal extracellular domain. Depletion of CCR2 in C57BL/6J mouse model attenuated SFTSV replication and pathogenesis. The peripheral blood primary monocytes from elderly individuals or subjects with underlying diabetes mellitus showed higher CCR2 surface expression and supported stronger binding and replication of SFTSV. Together, these data indicate that CCR2 is a host entry receptor for SFTSV infection and a novel target for developing anti-SFTSV therapeutics.\"}, {\"paperId\": \"012a8aaa4fbee8b5e316a018192d5b6b1f40f7aa\", \"externalIds\": {\"DOI\": \"10.1016/j.biomaterials.2023.122320\", \"CorpusId\": 262072466, \"PubMed\": \"37738742\"}, \"title\": \"Magnetically-targetable outer-membrane vesicles for sonodynamic eradication of antibiotic-tolerant bacteria in bacterial meningitis.\", \"venue\": \"Biomaterials\", \"year\": 2023, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.biomaterials.2023.122320\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.biomaterials.2023.122320?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.biomaterials.2023.122320, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2056570735\", \"name\": \"Rui Shi\"}, {\"authorId\": \"2106277214\", \"name\": \"Rui Lv\"}, {\"authorId\": \"5193849\", \"name\": \"Z. Dong\"}, {\"authorId\": \"2146853297\", \"name\": \"Qinghua Cao\"}, {\"authorId\": \"2088869\", \"name\": \"Renfei Wu\"}, {\"authorId\": \"2108638562\", \"name\": \"Sidi Liu\"}, {\"authorId\": \"2244083158\", \"name\": \"Yijin Ren\"}, {\"authorId\": \"2823939\", \"name\": \"Zhuang Liu\"}, {\"authorId\": \"7368179\", \"name\": \"H. C. van der Mei\"}, {\"authorId\": \"2243160146\", \"name\": \"Jian Liu\"}, {\"authorId\": \"2544851\", \"name\": \"H. Busscher\"}], \"abstract\": \"Treatment of acute bacterial meningitis is difficult due to the impermeability of the blood-brain barrier, greatly limiting the antibiotic concentrations that can be achieved in the brain. Escherichia coli grown in presence of iron-oxide magnetic nanoparticles secrete large amounts of magnetic outer-membrane vesicles (OMVs) in order to remove excess Fe from their cytoplasm. OMVs are fully biomimetic nanocarriers, but can be inflammatory. Here, non-inflammatory magnetic OMVs were prepared from an E. coli strain in which the synthesis of inflammatory lipid A acyltransferase was inhibited using CRISPR/Cas9 mediated gene knockout. OMVs were loaded with ceftriaxone (CRO) and meso-tetra-(4-carboxyphenyl)porphine (TCPP) and magnetically driven across the blood-brain barrier for sonodynamic treatment of bacterial meningitis. ROS-generation upon ultrasound application of CRO- and TCPP-loaded OMVs yielded similar ROS-generation as by TCPP in solution. In vitro, ROS-generation by CRO- and TCPP-loaded OMVs upon ultrasound application operated synergistically with CRO to kill a hard-to-kill, CRO-tolerant E. coli strain. In a mouse model of CRO-tolerant E. coli meningitis, CRO- and TCPP-loaded OMVs improved survival rates and clinical behavioral scores of infected mice after magnetic targeting and ultrasound application. Recurrence did not occur for at least two weeks after arresting treatment.\"}, {\"paperId\": \"012fff318cb19d1bd993a2147f8e317226105e9f\", \"externalIds\": {\"DOI\": \"10.1111/jnc.15684\", \"CorpusId\": 251444792, \"PubMed\": \"35943296\"}, \"title\": \"An in vitro model of glucose transporter 1 deficiency syndrome at the blood\\u2013brain barrier using induced pluripotent stem cells\", \"venue\": \"Journal of Neurochemistry\", \"year\": 2022, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/jnc.15684?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/jnc.15684, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"88321572\", \"name\": \"Iqra Pervaiz\"}, {\"authorId\": \"80666262\", \"name\": \"F. Zahra\"}, {\"authorId\": \"6377968\", \"name\": \"Constantinos M Mikelis\"}, {\"authorId\": \"38191899\", \"name\": \"A. Al-Ahmad\"}], \"abstract\": \"Glucose is an important source of energy for the central nervous system. Its uptake at the blood\\u2013brain barrier (BBB) is mostly mediated via glucose transporter 1 (GLUT1), a facilitated transporter encoded by the SLC2A1 gene. GLUT1 Deficiency Syndrome (GLUT1DS) is a haploinsufficiency characterized by mutations in the SLC2A1 gene, resulting in impaired glucose uptake at the BBB and clinically characterized by epileptic seizures and movement disorder. A major limitation is an absence of in vitro models of the BBB reproducing the disease. This study aimed to characterize an in vitro model of GLUT1DS using human pluripotent stem cells (iPSCs). Two GLUT1DS clones were generated (GLUT1\\u2010iPSC) from their original parental clone iPS(IMR90)\\u2010c4 by CRISPR/Cas9 and differentiated into brain microvascular endothelial cells (iBMECs). Cells were characterized in terms of SLC2A1 expression, changes in the barrier function, glucose uptake and metabolism, and angiogenesis. GLUT1DS iPSCs and iBMECs showed comparable phenotype to their parental control, with exception of reduced GLUT1 expression at the protein level. Although no major disruption in the barrier function was reported in the two clones, a significant reduction in glucose uptake accompanied by an increase in glycolysis and mitochondrial respiration was reported in both GLUT1DS\\u2010iBMECs. Finally, impaired angiogenic features were reported in such clones compared to the parental clone. Our study provides the first documented characterization of GLUT1DS\\u2010iBMECs generated by CRISPR\\u2010Cas9, suggesting that GLUT1 truncation appears detrimental to brain angiogenesis and brain endothelial bioenergetics, but maybe not be detrimental to iBMECs differentiation and barriergenesis. Our future direction is to further characterize the functional outcome of such truncated product, as well as its impact on other cells of the neurovascular unit.\"}, {\"paperId\": \"0132ff06f1421fbccaebb5d35d4d9c7854f4b31e\", \"externalIds\": {\"DOI\": \"10.4049/jimmunol.210.supp.155.11\", \"CorpusId\": 260823103}, \"title\": \"Phenotypic Evaluation of TREX1 Null Mice as a Model for Lupus-Like Autoimmune Disease\", \"venue\": \"Journal of Immunology\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.aai.org/jimmunol/article-pdf/210/1_Supplement/155.11/1632954/155_11.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4049/jimmunol.210.supp.155.11?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4049/jimmunol.210.supp.155.11, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2171424826\", \"name\": \"Zhiying Li\"}, {\"authorId\": \"2153964155\", \"name\": \"Juan Liang\"}, {\"authorId\": \"2221742039\", \"name\": \"Zhong Chen\"}, {\"authorId\": \"12482268\", \"name\": \"Shuxin Xu\"}, {\"authorId\": \"2137357550\", \"name\": \"Yingjiao Chen\"}, {\"authorId\": \"2228710134\", \"name\": \"Huan Tong\"}, {\"authorId\": \"2228976980\", \"name\": \"Cunxiang Ku\"}, {\"authorId\": \"2151692408\", \"name\": \"Jing Zhao\"}, {\"authorId\": \"2055829590\", \"name\": \"Gao Xiang\"}], \"abstract\": \"\\n TREX1 (DNase III) is the major mammalian 3\\u2019-5\\u2019 DNA exonuclease and thought to play a major role in cell death and genomic DNA degradation. Dysfunction of Trex1 has been suggested to activate immune response by self DNA, as TREX1 null mice develop inflammatory myocarditis similar to autoimmune cardiomyopathy and produce type 1 IFN. TREX1 D18N causes a monogenic cutaneous form of lupus called familial chilblain lupus and exhibits dysfunctioned dsDNA-degrading activity, providing a link between dsDNA degradation and nucleic acid-mediated autoimmune diseases. Using CRISPR-Cas9, we generated a Trex1 \\u2212/\\u2212mouse by knocking out exon 2 and performed comprehensive phenotypic analyses to evaluate the loss of function of TREX1 and its potential application in SLE research.\\n Both female and male TREX1 null mice showed dramatically increased post-wean morbidity and significantly increased serum ALT, AST and LDH levels, compared to wildtype and heterozygotes from 6 to 24 weeks of age, indicating liver and heart injuries. Pathohistological analysis showed inflammatory immune cell infiltration in liver, heart, spleen, kidney, lung and skin among TREX1 null mice. Serum anti-dsDNA antibody levels were significantly increased and remained high from 7 to 25 weeks of age, consistent with Trex1\\u2019s being the major DNA exonuclease. Urine protein to creatinine ratio was dramatically increased at 28 weeks of age among TREX1 null mice.\\n In conclusion, the Trex1 \\u2212/\\u2212mice we generated in this work showed lupus-like inflammatory autoimmune responses in multiple organs, providing an urgently needed tool to study Trex1-mediated autoimmunity and to evaluate potential therapeutic treatments for lupus.\"}, {\"paperId\": \"01350c019f87f9cc245f984f58ff780c36ff82e4\", \"externalIds\": {\"DOI\": \"10.1094/MPMI-07-22-0157-R\", \"CorpusId\": 253966951, \"PubMed\": \"36428245\"}, \"title\": \"The role of soybean 14-3-3 gene (Glyma05g29080) on white mold resistance and nodulation investigations using CRISPR-Cas9 editing and RNA silencing.\", \"venue\": \"Molecular Plant-Microbe Interactions\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1094/mpmi-07-22-0157-r\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1094/MPMI-07-22-0157-R?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1094/MPMI-07-22-0157-R, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145041143\", \"name\": \"Yunfang Zhang\"}, {\"authorId\": \"1414035436\", \"name\": \"L. Blahut-Beatty\"}, {\"authorId\": \"3727068\", \"name\": \"Suqin Zheng\"}, {\"authorId\": \"3229282\", \"name\": \"S. Clough\"}, {\"authorId\": \"2192346927\", \"name\": \"Daina H. Simmonds\"}], \"abstract\": \"The role of soybean 14-3-3 gene (Glyma05g29080) in defense against white mold and in nodulation was investigated by loss-of-gene-function with CRISPR-Cas9 editing and RNAi silencing. Particle bombardment was used to introduce the CRISPR expression cassette to target the soybean 14-3-3 gene and an RNAi construct to silence gene transcription. Transmission of the edited 14-3-3 gene and the RNAi construct was confirmed in their respective progeny. The recovered transgenic plants and their progeny were significantly more susceptible to Sclerotinia sclerotiorum infection and showed a significant reduction in nodulation, thus confirming the role of the 14-3-3 (Glyma05g29080) gene in both nodulation and defense.\"}, {\"paperId\": \"0137aa86aaa60e30e2949baa9231d9299dd24200\", \"externalIds\": {\"DOI\": \"10.1016/j.visres.2024.108508\", \"CorpusId\": 273777358, \"PubMed\": \"39488861\"}, \"title\": \"ATXN2 loss of function results in glaucoma-related features supporting a role for Ataxin-2 in primary open-angle glaucoma (POAG) pathogenesis.\", \"venue\": \"Vision Research\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.visres.2024.108508?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.visres.2024.108508, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2329005237\", \"name\": \"Shi Song Rong\"}, {\"authorId\": \"2006607156\", \"name\": \"Anna Larson\"}, {\"authorId\": \"144024599\", \"name\": \"J. Wiggs\"}], \"abstract\": \"Glaucoma is a leading cause of irreversible blindness worldwide. The most common form, primary open-angle glaucoma (POAG), is a genetically complex trait with high heritability. Genome-wide association studies have identified significant POAG and IOP association of a genomic region on chromosome 12 that includes ATXN2 as well as 7 other genes. Association of protein disrupting ATXN2 variants in the NEIGHBORHOOD case-control cohort and the UK Biobank suggests that ATXN2 is a key gene in this locus. To investigate functional effects, we utilized a zebrafish (Danio rerio) CRISPR/Cas9 edited atxn2-knockdown line to show that loss of atxn2 results in reduced eye size, diminished retinal ganglion cells (RGC), increased intraocular pressure (IOP), and impaired visual function in zebrafish. Complementation assays supported functional effects for 14 POAG-associated human ATXN2 missense variants. These results suggest a loss-of-function mechanism underlying a potential role for ATXN2 in POAG pathogenesis.\"}, {\"paperId\": \"0138d24ee1d4bc738e02212ac6df800ce87a60c6\", \"externalIds\": {\"MAG\": \"3002203125\", \"DOI\": \"10.1038/s41591-019-0738-2\", \"CorpusId\": 210926403, \"PubMed\": \"31988462\"}, \"title\": \"Somatic gene editing ameliorates skeletal and cardiac muscle failure in pig and human models of Duchenne muscular dystrophy\", \"venue\": \"Nature Medicine\", \"year\": 2020, \"citationCount\": 193, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7212064\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41591-019-0738-2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41591-019-0738-2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5222382\", \"name\": \"A. Moretti\"}, {\"authorId\": \"2230436494\", \"name\": \"LM Fonteyne\"}, {\"authorId\": \"5567235\", \"name\": \"F. Giesert\"}, {\"authorId\": \"3687864\", \"name\": \"P. Hoppmann\"}, {\"authorId\": \"2064184733\", \"name\": \"A. Meier\"}, {\"authorId\": \"6960845\", \"name\": \"T. Bozoglu\"}, {\"authorId\": \"2068964743\", \"name\": \"A. Baehr\"}, {\"authorId\": \"32846346\", \"name\": \"C. Schneider\"}, {\"authorId\": \"3940574\", \"name\": \"D. Sinnecker\"}, {\"authorId\": \"50578304\", \"name\": \"K. Klett\"}, {\"authorId\": \"144723684\", \"name\": \"T. Fr\\u00f6hlich\"}, {\"authorId\": \"117937372\", \"name\": \"F. Rahman\"}, {\"authorId\": \"1490921061\", \"name\": \"T. Haufe\"}, {\"authorId\": \"2249893409\", \"name\": \"S. Sun\"}, {\"authorId\": \"1471717842\", \"name\": \"V. Jurisch\"}, {\"authorId\": \"28864561\", \"name\": \"B. Kessler\"}, {\"authorId\": \"3706701\", \"name\": \"R. Hinkel\"}, {\"authorId\": \"4891681\", \"name\": \"R. Dirschinger\"}, {\"authorId\": \"38852864\", \"name\": \"Eimo Martens\"}, {\"authorId\": \"4151026\", \"name\": \"C. Jilek\"}, {\"authorId\": \"48828270\", \"name\": \"A. Graf\"}, {\"authorId\": \"143924512\", \"name\": \"S. Krebs\"}, {\"authorId\": \"40478018\", \"name\": \"Gianluca Santamaria\"}, {\"authorId\": \"3910411\", \"name\": \"M. Kurome\"}, {\"authorId\": \"5243503\", \"name\": \"V. Zakhartchenko\"}, {\"authorId\": \"1967970362\", \"name\": \"B. Campbell\"}, {\"authorId\": \"2104952165\", \"name\": \"K. Voelse\"}, {\"authorId\": \"50366576\", \"name\": \"A. Wolf\"}, {\"authorId\": \"39485241\", \"name\": \"Tilman Ziegler\"}, {\"authorId\": \"152822696\", \"name\": \"S. Reichert\"}, {\"authorId\": \"2406132721\", \"name\": \"Seungmin Lee\"}, {\"authorId\": \"5946810\", \"name\": \"F. Flenkenthaler\"}, {\"authorId\": \"5668624\", \"name\": \"Tatjana Dorn\"}, {\"authorId\": \"4021076\", \"name\": \"I. Jeremias\"}, {\"authorId\": \"1878489\", \"name\": \"H. Blum\"}, {\"authorId\": \"5875111\", \"name\": \"A. Dendorfer\"}, {\"authorId\": \"6238834\", \"name\": \"A. Schnieke\"}, {\"authorId\": \"5359316\", \"name\": \"S. Krause\"}, {\"authorId\": \"8161222\", \"name\": \"M. Walter\"}, {\"authorId\": \"6582598\", \"name\": \"N. Klymiuk\"}, {\"authorId\": \"5281948\", \"name\": \"K. Laugwitz\"}, {\"authorId\": \"145493807\", \"name\": \"E. Wolf\"}, {\"authorId\": \"48345149\", \"name\": \"W. Wurst\"}, {\"authorId\": \"48345149\", \"name\": \"W. Wurst\"}, {\"authorId\": \"6370092\", \"name\": \"C. Kupatt\"}], \"abstract\": null}, {\"paperId\": \"013b53bf160d18e8f744444de5ff8e4cbcf067fd\", \"externalIds\": {\"DOI\": \"10.13345/j.cjb.230380\", \"CorpusId\": 269361217, \"PubMed\": \"38658160\"}, \"title\": \"[Experimental teaching design of CRISPR/Cas9 technology in rice breeding application].\", \"venue\": \"Sheng wu gong cheng xue bao = Chinese journal of biotechnology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.13345/j.cjb.230380?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.13345/j.cjb.230380, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2350859494\", \"name\": \"Yaping Liu\"}, {\"authorId\": \"46713332\", \"name\": \"B. Ma\"}, {\"authorId\": \"2277993719\", \"name\": \"Xifeng Chen\"}], \"abstract\": null}, {\"paperId\": \"013d0d20c9b8bf9c52cf8f2c41592a531c81da07\", \"externalIds\": {\"PubMedCentral\": \"8535416\", \"DOI\": \"10.3390/ijms222010909\", \"CorpusId\": 239467776, \"PubMed\": \"34681568\"}, \"title\": \"Optimizing Agrobacterium-Mediated Transformation and CRISPR-Cas9 Gene Editing in the tropical japonica Rice Variety Presidio\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/20/10909/pdf?version=1633774485\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8535416, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1441148131\", \"name\": \"M. Molina-Risco\"}, {\"authorId\": \"46367183\", \"name\": \"Oneida Ibarra\"}, {\"authorId\": \"2134221145\", \"name\": \"Mayra Faion-Molina\"}, {\"authorId\": \"6620782\", \"name\": \"Backki Kim\"}, {\"authorId\": \"4472302\", \"name\": \"E. Septiningsih\"}, {\"authorId\": \"34856839\", \"name\": \"M. Thomson\"}], \"abstract\": \"Bottlenecks in plant transformation and regeneration have slowed progress in applying CRISPR/Cas-based genome editing for crop improvement. Rice (Oryza sativa L.) has highly efficient temperate japonica transformation protocols, along with reasonably efficient indica protocols using immature embryos. However, rapid and efficient protocols are not available for transformation and regeneration in tropical japonica varieties, even though they represent the majority of rice production in the U.S. and South America. The current study has optimized a protocol using callus induction from mature seeds with both Agrobacterium-mediated and biolistic transformation of the high-yielding U.S. tropical japonica cultivar Presidio. Gene editing efficiency was tested by evaluating knockout mutations in the phytoene desaturase (PDS) and young seedling albino (YSA) genes, which provide a visible phenotype at the seedling stage for successful knockouts. Using the optimized protocol, transformation of 648 explants with particle bombardment and 532 explants with Agrobacterium led to a 33% regeneration efficiency. The YSA targets had ambiguous phenotypes, but 60% of regenerated plants for PDS showed an albino phenotype. Sanger sequencing of edited progeny showed a number of insertions, deletions, and substitutions at the gRNA target sites. These results pave the way for more efficient gene editing of tropical japonica rice varieties.\"}, {\"paperId\": \"013e27bfddb8b2a55d2822355b5e433cb22b6650\", \"externalIds\": {\"DOI\": \"10.1101/2022.10.28.513995\", \"CorpusId\": 253239491}, \"title\": \"Protein kinase A gene knockout in Coprinopsis cinerea by CRISPR/Cas9 RNP complex system\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/10/30/2022.10.28.513995.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.10.28.513995?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.10.28.513995, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"118679492\", \"name\": \"P. Chan\"}, {\"authorId\": \"1860865\", \"name\": \"H. Kwan\"}, {\"authorId\": \"116730034\", \"name\": \"Jinhui Chang\"}], \"abstract\": \"Coprinopsis cinerea is a model mushroom for studying the developmental processes of homobasidiomycetous fungi. The development of C. cinerea depends on the sensing of environmental conditions, such as light, temperature, humidity and nutrients. The signal transduction pathway from the environmental condition sensors to the regulators and reproduction is an important research topic as the knowledge on it is still fragmentary. Protein kinases not only are crucial to the signal transduction, but also can be master switches of development. However, information on their role in basidiomycetous fungi is still limited. Using the effective gene-targeting of the current gene modification, a system of CRISPR/ Cas9 RNP with double strain template donor that contained a selective mark hygromycin cassette was developed in this study. In this system, CcPka1 gene knockout was successfully generated through homologues repair together with Cas9 RNP complexes. This was the first report to use CRISPR/ Cas9 RNP approach with C. cinerea. \\u0394CcPka1 mutants showed slow mycelial growth and rapid fruiting body induction compared to the wild type even when under high glucose condition. In addition, \\u0394CcPka1 mutants had significantly increased intracellular glucose level and decreased glycogen level. Moreover, \\u0394CcPka1 mutants regulated the gene expression of components in cAMP-PKA pathway. All these results demonstrated that PKA played an important role in the nutrient signal transduction and negatively regulated the fruiting body formation. This study also confirmed that GSK3 could be the downstream target of PKA, but their interaction requires further investigation.\"}, {\"paperId\": \"014052b79b7119ca2012e79e6423072d20d0fd67\", \"externalIds\": {\"DOI\": \"10.1016/j.pep.2024.106500\", \"CorpusId\": 269633958, \"PubMed\": \"38718989\"}, \"title\": \"A new method for the robust expression and single-step purification of dCas9 for CRISPR interference/activation (CRISPRi/a) applications.\", \"venue\": \"Protein Expression and Purification\", \"year\": 2024, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.pep.2024.106500?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.pep.2024.106500, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277850565\", \"name\": \"Harshita Pandey\"}, {\"authorId\": \"88987809\", \"name\": \"Binduma Yadav\"}, {\"authorId\": \"29654425\", \"name\": \"Koushik Shah\"}, {\"authorId\": \"2277849433\", \"name\": \"Raminder Kaur\"}, {\"authorId\": \"2300359506\", \"name\": \"Diksha Choudhary\"}, {\"authorId\": \"2113524934\", \"name\": \"Nishtha Sharma\"}, {\"authorId\": \"2280218251\", \"name\": \"Vikas Rishi\"}], \"abstract\": \"CRISPR-Cas9 (Clustered Regularly Interspaced Short Palindromic Repeats-CRISPR associated enzyme 9) is known for its simplicity, versatility, and scalability in genome editing applications. In vitro Cas9, when complexed with sgRNA, binds and cleaves the complementary target sequences with almost perfect precision. The enzyme is exploited for various applications in understanding and changing gene function. dCas9 (deactivated or dead Cas9) is a double mutated version of Cas9 that bears mutations in the nuclease domains of the enzyme and thus cannot cleave the target DNA. dCas9 is equally advantageous since it can alter gene expression using various transcriptional activators CRISPRa and repressors CRISPRi. Additionally, dCas9 can bind to the desired target gene without cleaving it, making it a unique reagent to study the kinetics and stability of RNA-protein-DNA interactions required to design more efficient and specific gene-editing nucleases. An appreciable quantity of pure and homogeneous protein is needed to characterise dCas9 for its structural and functional understanding. This study used an N-terminal acidic tag to express the dCas9 in an E. coli-bacterial host. A simple single-step protocol for robust and efficient production of dCas9 has been described. The study and methods are distinctive as the purification is performed in a single step using inexpensive multi-modal hydroxyapatite chromatography. The purified protein can be used in different in vitro and in vivo studies.\"}, {\"paperId\": \"014278afb5bfdc370ea78ecaf2cdf60bbdc0507e\", \"externalIds\": {\"PubMedCentral\": \"10898977\", \"DOI\": \"10.1098/rsob.230456\", \"CorpusId\": 268040421, \"PubMed\": \"38412963\"}, \"title\": \"NFIL3 contributes to cytotoxic T lymphocyte-mediated killing\", \"venue\": \"Open Biology\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://royalsocietypublishing.org/doi/pdf/10.1098/rsob.230456\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10898977, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12874687\", \"name\": \"Tiphaine Douanne\"}, {\"authorId\": \"51299531\", \"name\": \"K. Strege\"}, {\"authorId\": \"1412780148\", \"name\": \"M. del Castillo Velasco-Herrera\"}, {\"authorId\": \"2185979022\", \"name\": \"Adam M. Rochussen\"}, {\"authorId\": \"2266455855\", \"name\": \"D. Adams\"}, {\"authorId\": \"2260626985\", \"name\": \"Gillian M. Griffiths\"}], \"abstract\": \"Cytotoxic T lymphocytes (CTLs) are key effectors of the adaptive immune system that recognize and eliminate virally infected and cancerous cells. In naive CD8+ T cells, T-cell receptor (TCR) engagement drives a number of transcriptional, translational and proliferation changes over the course of hours and days leading to differentiation into CTLs. To gain a better insight into this mechanism, we compared the transcriptional profiles of naive CD8+ T cells to those of activated CTLs. To find new regulators of CTL function, we performed a selective clustered regularly interspaced short palindromic repeats (CRISPR) screen on upregulated genes and identified nuclear factor IL-3 (NFIL3) as a potential regulator of cytotoxicity. Although NFIL3 has established roles in several immune cells including natural killer, Treg, dendritic and CD4+ T cells, its function in CD8+ CTLs is less well understood. Using CRISPR/Cas9 editing, we found that removing NFIL3 in CTLs resulted in a marked decrease in cytotoxicity. We found that in CTLs lacking NFIL3 TCR-induced extracellular signal-regulated kinase phosphorylation, immune synapse formation and granule release were all intact while cytotoxicity was functionally impaired in vitro. Strikingly, NFIL3 controls the production of cytolytic proteins as well as effector cytokines. Thus, NFIL3 plays a cell intrinsic role in modulating cytolytic mechanisms in CTLs.\"}, {\"paperId\": \"0145f0b50a690f3cde136fb9710b8b53d91e9f8b\", \"externalIds\": {\"PubMedCentral\": \"8653980\", \"DOI\": \"10.20517/cdr.2021.44\", \"CorpusId\": 239089029, \"PubMed\": \"34888496\"}, \"title\": \"Expression of histone deacetylase (HDAC) family members in bortezomib-refractory multiple myeloma and modulation by panobinostat\", \"venue\": \"Cancer Drug Resistance\", \"year\": 2021, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.20517/cdr.2021.44\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8653980, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"38736878\", \"name\": \"T. Cheng\"}, {\"authorId\": \"68989837\", \"name\": \"Kendall Kiser\"}, {\"authorId\": \"50235488\", \"name\": \"L. Grasse\"}, {\"authorId\": \"152989336\", \"name\": \"LaKesla R Iles\"}, {\"authorId\": \"3318781\", \"name\": \"G. Bartholomeusz\"}, {\"authorId\": \"144378673\", \"name\": \"F. Samaniego\"}, {\"authorId\": \"6706268\", \"name\": \"R. Orlowski\"}, {\"authorId\": \"143683044\", \"name\": \"J. Chandra\"}], \"abstract\": \"Aim: Multiple myeloma (MM) is a hematological malignancy of antibody-producing mature B cells or plasma cells. The proteasome inhibitor, bortezomib, was the first-in-class compound to be FDA approved for MM and is frequently utilized in induction therapy. However, bortezomib refractory disease is a major clinical concern, and the efficacy of the pan-histone deacetylase inhibitor (HDACi), panobinostat, in bortezomib refractory disease indicates that HDAC targeting is a viable strategy. Here, we utilized isogenic bortezomib resistant models to profile HDAC expression and define baseline and HDACi-induced expression patterns of individual HDAC family members in sensitive vs. resistant cells to better understanding the potential for targeting these enzymes. Methods: Gene expression of HDAC family members in two sets of isogenic bortezomib sensitive or resistant myeloma cell lines was examined. These cell lines were subsequently treated with HDAC inhibitors: panobinostat or vorinostat, and HDAC expression was evaluated. CRISPR/Cas9 knockdown and pharmacological inhibition of specific HDAC family members were conducted. Results: Interestingly, HDAC6 and HDAC7 were significantly upregulated and downregulated, respectively, in bortezomib-resistant cells. Panobinostat was effective at inducing cell death in these lines and modulated HDAC expression in cell lines and patient samples. Knockdown of HDAC7 inhibited cell growth while pharmacologically inhibiting HDAC6 augmented cell death by panobinostat. Conclusion: Our data revealed heterogeneous expression of individual HDACs in bortezomib sensitive vs. resistant isogenic cell lines and patient samples treated with panobinostat. Cumulatively our findings highlight distinct roles for HDAC6 and HDAC7 in regulating cell death in the context of bortezomib resistance.\"}, {\"paperId\": \"0147cb865206cf8bd5023997496d32becce476a5\", \"externalIds\": {\"MAG\": \"3005687190\", \"PubMedCentral\": \"8443683\", \"DOI\": \"10.1038/s41380-021-01052-x\", \"CorpusId\": 213490648, \"PubMed\": \"33727673\"}, \"title\": \"Autism-linked Cullin3 germline haploinsufficiency impacts cytoskeletal dynamics and cortical neurogenesis through RhoA signaling\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41380-021-01052-x.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8443683, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35484943\", \"name\": \"Megha Amar\"}, {\"authorId\": \"143609877\", \"name\": \"A. Pramod\"}, {\"authorId\": \"5562616\", \"name\": \"Nam-Kyung Yu\"}, {\"authorId\": \"1577890328\", \"name\": \"V. M. Herrera\"}, {\"authorId\": \"31827582\", \"name\": \"L. Qiu\"}, {\"authorId\": \"2394957695\", \"name\": \"Patricia Moran-Losada\"}, {\"authorId\": \"2218655405\", \"name\": \"Pan Zhang\"}, {\"authorId\": \"34931139\", \"name\": \"C. Trujillo\"}, {\"authorId\": \"3109361\", \"name\": \"J. Ellegood\"}, {\"authorId\": \"49571813\", \"name\": \"J. Urresti\"}, {\"authorId\": \"48511792\", \"name\": \"Kevin F. Chau\"}, {\"authorId\": \"46760824\", \"name\": \"J. Diedrich\"}, {\"authorId\": \"2108327699\", \"name\": \"Jiaye Chen\"}, {\"authorId\": \"2068360595\", \"name\": \"J. Gutierrez\"}, {\"authorId\": \"2237657\", \"name\": \"J. Sebat\"}, {\"authorId\": \"4028531\", \"name\": \"D. Ramanathan\"}, {\"authorId\": \"2383447\", \"name\": \"J. Lerch\"}, {\"authorId\": \"143613691\", \"name\": \"J. Yates\"}, {\"authorId\": \"8665112\", \"name\": \"A. Muotri\"}, {\"authorId\": \"2602657\", \"name\": \"L. Iakoucheva\"}], \"abstract\": \"E3-ubiquitin ligase Cullin3 ( Cul3 ) is a high confidence risk gene for autism spectrum disorder (ASD) and developmental delay (DD). To investigate how Cul3 mutations impact brain development, we generated a haploinsufficient Cul3 mouse model using CRISPR/Cas9 genome engineering. Cul3 mutant mice exhibited social and cognitive deficits and hyperactive behavior. Brain MRI found decreased volume of cortical regions and changes in many other brain regions of Cul3 mutant mice starting from early postnatal development. Spatiotemporal transcriptomic and proteomic profiling of embryonic, early postnatal and adult brain implicated neurogenesis and cytoskeletal defects as key drivers of Cul3 functional impact. Specifically, dendritic growth, filamentous actin puncta, and spontaneous network activity were reduced in Cul3 mutant mice. Inhibition of small GTPase RhoA, a molecular substrate of Cul3 ligase, rescued dendrite length and network activity phenotypes. Our study identified defects in neuronal cytoskeleton and Rho signaling as the primary targets of Cul3 mutation during brain development.\"}, {\"paperId\": \"014b032eb7ae39917e2a057cde63589cda0c7dd9\", \"externalIds\": {\"DOI\": \"10.61173/jyxf3e24\", \"CorpusId\": 273721616}, \"title\": \"CRISPR-Cas9 and its Application in the Fields of Medics\", \"venue\": \"MedScien\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.deanfrancispress.com/index.php/ms/article/download/1294/1481\", \"status\": \"HYBRID\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.61173/jyxf3e24?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.61173/jyxf3e24, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3274402\", \"name\": \"Guanyu Pan\"}], \"abstract\": \"Gene editing technology has become a prominent objective within the fields of medical research, the clustered regularly interspaced short palindromic repeats-associated protein 9 (CRISPR-Cas9) is one particular technology that has already been practiced in a set of clinical trials, which produced a satisfying result that have demonstrated its potential to be applied to a great range of treatments. CRISPR-Cas9 was derived from bacterial defense system, and has been applied in the field of medical research. For instance, the research practice of using CAR-T cells by CAR-T Therapy, and genetically modifying DNA strands to remove cancerous or mutated sequences. This research has great chance to promote treatments associated with genetic modification and provide new hope for patients in the future. Nevertheless, this technology is still immature, due to its potential drawbacks. Most researchers are still focusing on practices of CRISPR-Cas9 on animal models or isolated somatic cells. This article draws attention on different treatments of CRISPR-Cas9 and provides evaluation and suggestions as a reference for future practices of this technology. Overall, there are two discoveries of advancement to the CRISPR-Cas9 mechanism: modification to the guide RNA that improves the accuracy, and applying high-fidelity Cas9 protein variants to enhance its comprehensive accuracy.\"}, {\"paperId\": \"014f4289075215e767163850eb682dd60376ae4c\", \"externalIds\": {\"PubMedCentral\": \"10472679\", \"DOI\": \"10.1186/s40694-023-00165-y\", \"CorpusId\": 261401351, \"PubMed\": \"37658430\"}, \"title\": \"CRISPR/Cas9 mediated gene editing of transcription factor ACE1 for enhanced cellulase production in thermophilic fungus Rasamsonia emersonii\", \"venue\": \"Fungal Biology and Biotechnology\", \"year\": 2023, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://fungalbiolbiotech.biomedcentral.com/counter/pdf/10.1186/s40694-023-00165-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10472679, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116377540\", \"name\": \"Varinder Singh\"}, {\"authorId\": \"2045750509\", \"name\": \"Y. Raheja\"}, {\"authorId\": \"13631371\", \"name\": \"Neha Basotra\"}, {\"authorId\": \"2146350175\", \"name\": \"Gaurav Sharma\"}, {\"authorId\": \"48058641\", \"name\": \"A. Tsang\"}, {\"authorId\": \"2034800\", \"name\": \"B. S. Chadha\"}], \"abstract\": \"Background The filamentous fungus Rasamsonia emersonii has immense potential to produce biorefinery relevant thermostable cellulase and hemicellulase enzymes using lignocellulosic biomass. Previously in our lab, a hyper-cellulase producing strain of R. emersonii was developed through classical breeding and system biology approaches. ACE1, a pivotal transcription factor in fungi, plays a crucial role in negatively regulating the expression of cellulase genes. In order to identify the role of ACE1 in cellulase production and to further improve the lignocellulolytic enzyme production in R. emersonii , CRISPR/Cas9 mediated disruption of ACE1 gene was employed. Results A gene-edited \\u2206ACE1 strain (GN11) was created, that showed 21.97, 20.70 and 24.63, 9.42, 18.12%, improved endoglucanase, cellobiohydrolase (CBHI), \\u03b2 -glucosidase, FPase, and xylanase, activities, respectively, as compared to parental strain M36. The transcriptional profiling showed that the expression of global regulator ( XlnR ) and different CAZymes genes including endoglucanases, cellobiohydrolase, \\u03b2 -xylosidase, xylanase, \\u03b2 -glucosidase and lytic polysaccharide mono-oxygenases (LPMOs) were significantly enhanced, suggesting critical roles of ACE1 in negatively regulating the expression of various key genes associated with cellulase production in R. emersonii. Whereas, the disruption of ACE1 significantly down-regulated the expression of CreA repressor gene as also evidenced by 2-deoxyglucose (2-DG) resistance phenotype exhibited by edited strain GN11 as well as appreciably higher constitutive production of cellulases in the presence of glucose and mixture of glucose and disaccharide (MGDs) both in batch and flask fed batch mode of culturing. Furthermore, \\u2206ACE1 strains were evaluated for the hydrolysis of biorefinery relevant steam/acid pretreated unwashed rice straw slurry (Praj Industries Ltd; 15% substrate loading rate) and were found to be significantly superior when compared to the benchmark enzymes produced by parent strain M36 and Cellic Ctec3. Conclusions Current work uncovers the crucial role of ACE1 in regulating the expression of the various cellulase genes and carbon catabolite repression mechanism in R. emersonii . This study represents the first successful report of utilizing CRISPR/Cas9 genome editing technology to disrupt the ACE1 gene in the thermophlic fungus R. emersonii . The improved methodologies presented in this work might be applied to other commercially important fungal strains for which genetic manipulation tools are limited.\"}, {\"paperId\": \"0153fe8cab91515af481e1a7b5378f2ad87a7ed7\", \"externalIds\": {\"MAG\": \"3161392932\", \"DOI\": \"10.1007/978-3-030-70099-7_3\", \"CorpusId\": 236716988}, \"title\": \"Technological Progress in the Life Sciences\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-3-030-70099-7_3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-3-030-70099-7_3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"117112076\", \"name\": \"Janella Baxter\"}], \"abstract\": null}, {\"paperId\": \"01549c1db5b079645a2aabe726fbc13cf4ae1d42\", \"externalIds\": {\"PubMedCentral\": \"8807971\", \"DOI\": \"10.1016/j.omto.2022.01.004\", \"CorpusId\": 246676740, \"PubMed\": \"35141398\"}, \"title\": \"Highly efficient PD-1-targeted CRISPR-Cas9 for tumor-infiltrating lymphocyte-based adoptive T cell therapy\", \"venue\": \"Molecular Therapy: Oncolytics\", \"year\": 2022, \"citationCount\": 55, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2372770522000080/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8807971, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50980649\", \"name\": \"C. Chamberlain\"}, {\"authorId\": \"2057741483\", \"name\": \"Eric Paul Bennett\"}, {\"authorId\": \"50405780\", \"name\": \"A. Kverneland\"}, {\"authorId\": \"4463692\", \"name\": \"I. Svane\"}, {\"authorId\": \"4611152\", \"name\": \"M. Donia\"}, {\"authorId\": \"3495055\", \"name\": \"\\u00d6. Met\"}], \"abstract\": \"Adoptive T cell therapy (ACT) with expanded tumor-infiltrating lymphocytes (TIL) can induce durable responses in cancer patients from multiple histologies, with response rates of up to 50%. Antibodies blocking the engagement of the inhibitory receptor programmed cell death protein 1 (PD-1) have been successful across a variety of cancer diagnoses. We hypothesized that these approaches could be combined by using CRISPR-Cas9 gene editing to knock out PD-1 in TILs from metastatic melanoma and head-and-neck, thyroid, and colorectal cancer. Non-viral, non-plasmid-based PD-1 knockout was carried out immediately prior to the traditional 14-day TIL-based ACT rapid-expansion protocol. A median 87.53% reduction in cell surface PD-1 expression was observed post-expansion and confirmed at the genomic level. No off-target editing was detected, and PD-1 knockout had no effect on final fold expansion. Edited cells exhibited few phenotypic differences and matched control functionality. Pre-clinical-scale results were confirmed at a clinical scale by generating a PD-1-deficient TIL product using the good manufacturing practice facilities, equipment, procedures, and starting material used for standard patient treatment. Our results demonstrate that simple, non-viral, non-plasmid-based CRISPR-Cas9 methods can be feasibly adopted into a TIL-based ACT protocol to produce treatment products deficient in molecules such as PD-1, without any evident negative effects.\"}, {\"paperId\": \"0155d56fdd96f9ab14a14e024ef6d7751d24311b\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2021.102401\", \"CorpusId\": 235268694, \"PubMed\": \"34058685\"}, \"title\": \"Generation of a TLR2 homozygous knockout human embryonic stem cell line WAe001-A-64 using CRISPR/Cas9 editing.\", \"venue\": \"Stem Cell Research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2021.102401\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2021.102401?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2021.102401, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7722302\", \"name\": \"Anteneh Getachew\"}, {\"authorId\": \"2149231207\", \"name\": \"Zhen Yang\"}, {\"authorId\": \"47932650\", \"name\": \"Xinping Huang\"}, {\"authorId\": \"14981538\", \"name\": \"Feima Wu\"}, {\"authorId\": \"2156649292\", \"name\": \"Yan Liu\"}, {\"authorId\": \"2116548976\", \"name\": \"Chen Yan\"}, {\"authorId\": \"4814643\", \"name\": \"Fan Yang\"}, {\"authorId\": \"4770571\", \"name\": \"Yin-xiong Li\"}], \"abstract\": \"Toll-like receptor 2 (TLR2) is a pattern recognition receptor which plays an important role in innate immune system. In humans it's encoded by the TLR2 gene and also been designated as CD282. Using CRISPR/Cas9 gene editing technology, we have established a TLR2 mutant WAe001-A-64 cell line from the original embryonic stem cell line H1. It has adopted two biallelic deletions in exon 3 of TLR2 which resulted in a frame shift and early termination in the translation of TLR2. Moreover, WAe001-A-64 has maintained the normal karyotype, pluripotent phenotype, parental cell morphology and the ability to differentiate into three germ layers.\"}, {\"paperId\": \"015641706985fbddc4077b70578232d023d29eef\", \"externalIds\": {\"DOI\": \"10.1016/j.jcyt.2024.03.366\", \"CorpusId\": 270034702}, \"title\": \"CISH KNOCKOUT BY CRISPR/CAS9 ENHANCES HUMAN PERIPHERAL BLOOD-DERIVED NK CELL FUNCTIONS AGAINST ALLOGENEIC GLIOBLASTOMA\", \"venue\": \"Cytotherapy\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jcyt.2024.03.366?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jcyt.2024.03.366, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144837727\", \"name\": \"T. Nakazawa\"}, {\"authorId\": \"1648820391\", \"name\": \"T. Morimoto\"}, {\"authorId\": \"84730060\", \"name\": \"R. Maeoka\"}, {\"authorId\": \"2303187255\", \"name\": \"R. Matsuda\"}, {\"authorId\": \"2303184462\", \"name\": \"F. Nishimura\"}, {\"authorId\": \"2243250981\", \"name\": \"T. Tsujimura\"}, {\"authorId\": \"2303095745\", \"name\": \"I. Nakagawa\"}], \"abstract\": null}, {\"paperId\": \"0159923dc98aa1278a0d55c8edafc5184811b471\", \"externalIds\": {\"PubMedCentral\": \"8229595\", \"DOI\": \"10.3390/cells10061312\", \"CorpusId\": 235296629, \"PubMed\": \"34070429\"}, \"title\": \"Assessing the Anti-Inflammatory Activity of the Anxiolytic Drug Buspirone Using CRISPR-Cas9 Gene Editing in LPS-Stimulated BV-2 Microglial Cells\", \"venue\": \"Cells\", \"year\": 2021, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/10/6/1312/pdf?version=1622022322\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8229595, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2039821874\", \"name\": \"Sarah Thomas Broome\"}, {\"authorId\": \"2106643719\", \"name\": \"Teagan Fisher\"}, {\"authorId\": \"6922979\", \"name\": \"A. Faiz\"}, {\"authorId\": \"5953767\", \"name\": \"K. Keay\"}, {\"authorId\": \"4926357\", \"name\": \"G. Musumeci\"}, {\"authorId\": \"1401635710\", \"name\": \"Ghaith Al-Badri\"}, {\"authorId\": \"2112565\", \"name\": \"A. Castorina\"}], \"abstract\": \"Buspirone is an anxiolytic drug with robust serotonin receptor 1A (Htr1a) agonist activities. However, evidence has demonstrated that this drug also targets the dopamine D3 receptor (Drd3), where it acts as a potent antagonist. In vivo, Drd3 blockade is neuroprotective and reduces inflammation in models of Parkinson\\u2019s disease. To test if buspirone also elicited anti-inflammatory activities in vitro, we generated stable Drd3\\u2212/\\u2212 and Htr1a\\u2212/\\u2212 BV2 microglial cell lines using CRISPR-Cas9 technology and then tested the effects of buspirone after lipopolysaccharide (LPS) challenge. We found that LPS exposure had no effect on cell viability, except in Htr1a\\u2212/\\u2212 cells, where viability was reduced (p < 0.001). Drug treatment reduced viability in Drd3\\u2212/\\u2212 cells, but not in WT or Htr1a\\u2212/\\u2212 cells. Buspirone counteracted LPS-induced NO release, NOS2, IL-1\\u03b2 and TNF-\\u03b1 gene expression in WT cells, whereas it exerted limited effects in Drd3\\u2212/\\u2212 or Htr1a\\u2212/\\u2212 microglia. In summary, our findings indicate that buspirone attenuates microglial polarization after LPS challenge. These results also highlight some major effects of Drd3 or Htr1a genetic ablation on microglial biology, raising important questions on the complex role of neurotransmitters in regulating microglia functions.\"}, {\"paperId\": \"015a88d2732adb7a19e09f29259ed7d0f36ecf81\", \"externalIds\": {\"PubMedCentral\": \"8569894\", \"DOI\": \"10.3389/fcell.2021.767048\", \"CorpusId\": 239054561, \"PubMed\": \"34746155\"}, \"title\": \"Mosmo Is Required for Zebrafish Craniofacial Formation\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2021.767048/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8569894, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2033753906\", \"name\": \"Carlos Camacho-Macorra\"}, {\"authorId\": \"90523240\", \"name\": \"M. Sintes\"}, {\"authorId\": \"6454328\", \"name\": \"N. Tabanera\"}, {\"authorId\": \"1752763253\", \"name\": \"Irene Grasa\"}, {\"authorId\": \"4467184\", \"name\": \"P. Bovolenta\"}, {\"authorId\": \"5005089\", \"name\": \"Marcos J Cardozo\"}], \"abstract\": \"Hedgehog (Hh) signaling is a highly regulated molecular pathway implicated in many developmental and homeostatic events. Mutations in genes encoding primary components or regulators of the pathway cause an array of congenital malformations or postnatal pathologies, the extent of which is not yet fully defined. Mosmo (Modulator of Smoothened) is a modulator of the Hh pathway, which encodes a membrane tetraspan protein. Studies in cell lines have shown that Mosmo promotes the internalization and degradation of the Hh signaling transducer Smoothened (Smo), thereby down-modulating pathway activation. Whether this modulation is essential for vertebrate embryonic development remains poorly explored. Here, we have addressed this question and show that in zebrafish embryos, the two mosmo paralogs, mosmoa and mosmob, are expressed in the head mesenchyme and along the entire ventral neural tube. At the cellular level, Mosmoa localizes at the plasma membrane, cytoplasmic vesicles and primary cilium in both zebrafish and chick embryos. CRISPR/Cas9 mediated inactivation of both mosmoa and mosmob in zebrafish causes frontonasal hypoplasia and craniofacial skeleton defects, which become evident in the adult fish. We thus suggest that MOSMO is a candidate to explain uncharacterized forms of human congenital craniofacial malformations, such as those present in the 16p12.1 chromosomal deletion syndrome encompassing the MOSMO locus.\"}, {\"paperId\": \"01611b6c6070ca044006fa61c1d793a60599433e\", \"externalIds\": {\"PubMedCentral\": \"9000021\", \"DOI\": \"10.3390/ijms23073973\", \"CorpusId\": 247945403, \"PubMed\": \"35409332\"}, \"title\": \"Cruciform DNA Structures Act as Legible Templates for Accelerating Homologous Recombination in Transgenic Animals\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/7/3973/pdf?version=1648893181\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9000021, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1441339577\", \"name\": \"Huan Ou-Yang\"}, {\"authorId\": \"35554701\", \"name\": \"Shiao-Hsuan Yang\"}, {\"authorId\": \"2154940420\", \"name\": \"Wei Chen\"}, {\"authorId\": \"123363146\", \"name\": \"Shang-Hsun Yang\"}, {\"authorId\": \"2124697379\", \"name\": \"Abdulkadir Cidem\"}, {\"authorId\": \"4017937\", \"name\": \"L. Sung\"}, {\"authorId\": \"2109150478\", \"name\": \"Chuan\\u2010Mu Chen\"}], \"abstract\": \"Inverted repeat (IR) DNA sequences compose cruciform structures. Some genetic disorders are the result of genome inversion or translocation by cruciform DNA structures. The present study examined whether exogenous DNA integration into the chromosomes of transgenic animals was related to cruciform DNA structures. Large imperfect cruciform structures were frequently predicted around predestinated transgene integration sites in host genomes of microinjection-based transgenic (Tg) animals (\\u03b1LA-LPH Tg goat, Akr1A1eGFP/eGFP Tg mouse, and NF\\u03baB-Luc Tg mouse) or CRISPR/Cas9 gene-editing (GE) animals (\\u03b1LA-AP1 GE mouse). Transgene cassettes were imperfectly matched with their predestinated sequences. According to the analyzed data, we proposed a putative model in which the flexible cruciform DNA structures acted as a legible template for DNA integration into linear DNAs or double-strand break (DSB) alleles. To demonstrate this model, artificial inverted repeat knock-in (KI) reporter plasmids were created to analyze the KI rate using the CRISPR/Cas9 system in NIH3T3 cells. Notably, the KI rate of the 5\\u2032 homologous arm inverted repeat donor plasmid (5\\u2032IR) with the ROSA gRNA group (31.5%) was significantly higher than the knock-in reporter donor plasmid (KIR) with the ROSA gRNA group (21.3%, p < 0.05). However, the KI rate of the 3\\u2032 inverted terminal repeat/inverted repeat donor plasmid (3\\u2032ITRIR) group was not different from the KIR group (23.0% vs. 22.0%). These results demonstrated that the legibility of the sequence with the cruciform DNA existing in the transgene promoted homologous recombination (HR) with a higher KI rate. Our findings suggest that flexible cruciform DNAs folded by IR sequences improve the legibility and accelerate DNA 3\\u2032-overhang integration into the host genome via homologous recombination machinery.\"}, {\"paperId\": \"0167171db33fe1cc1d9da65fdfd50d46db612841\", \"externalIds\": {\"PubMedCentral\": \"10983962\", \"DOI\": \"10.1101/2024.03.18.585587\", \"CorpusId\": 268537462, \"PubMed\": \"38562885\"}, \"title\": \"Electrical Impedance Spectroscopy Quantifies Skin Barrier Function in Organotypic In Vitro Epidermis Models\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10983962\", \"status\": \"GREEN\", \"license\": \"CCBYND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10983962, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"151156930\", \"name\": \"N. van den Brink\"}, {\"authorId\": \"1410943979\", \"name\": \"F. Pardow\"}, {\"authorId\": \"1799421453\", \"name\": \"L. Meesters\"}, {\"authorId\": \"1443267108\", \"name\": \"I. van Vlijmen-Willems\"}, {\"authorId\": \"1398101787\", \"name\": \"D. Rodijk-Olthuis\"}, {\"authorId\": \"2292271689\", \"name\": \"H. Niehues\"}, {\"authorId\": \"153098233\", \"name\": \"P. Jansen\"}, {\"authorId\": \"2297659916\", \"name\": \"S. Roelofs\"}, {\"authorId\": \"2266103639\", \"name\": \"M. Brewer\"}, {\"authorId\": \"2266099130\", \"name\": \"E. van den Bogaard\"}, {\"authorId\": \"2266097324\", \"name\": \"J. Smits\"}], \"abstract\": \"3 D human epidermal equivalents (HEEs) are a state-of-the-art organotypic culture model in pre\\u2013 clinical investigative dermatology and regulatory toxicology. Here, we investigated the utility of electrical impedance spectroscopy (EIS) for non\\u2013invasive measurement of HEE epidermal barrier function. Our setup comprised a custom\\u2013made lid fit with 12 electrode pairs aligned on the standard 24\\u2013transwell cell culture system. Serial EIS measurements for seven consecutive days did not impact epidermal morphology and readouts showed comparable trends to HEEs measured only once. We determined two frequency ranges in the resulting impedance spectra: a lower frequency range termed EISdiff correlated with keratinocyte terminal differentiation independent of epidermal thickness and a higher frequency range termed EISSC correlated with stratum corneum thickness. HEEs generated from CRISPR/Cas9 engineered keratinocytes that lack key differentiation genes FLG, TFAP2A, AHR or CLDN1 confirmed that keratinocyte terminal differentiation is the major parameter defining EISdiff. Exposure to pro\\u2013inflammatory psoriasis\\u2013 or atopic dermatitis\\u2013associated cytokine cocktails lowered the expression of keratinocyte differentiation markers and reduced EISdiff. This cytokine\\u2013associated decrease in EISdiff was normalized after stimulation with therapeutic molecules. In conclusion, EIS provides a non\\u2013 invasive system to consecutively and quantitatively assess HEE barrier function and to sensitively and objectively measure barrier development, defects and repair.\"}, {\"paperId\": \"0168ccdcb896a7f4ff874156e15b65031195fe78\", \"externalIds\": {\"PubMedCentral\": \"7427935\", \"MAG\": \"3049435789\", \"DOI\": \"10.1186/s42826-020-00048-y\", \"CorpusId\": 221118292, \"PubMed\": \"32817844\"}, \"title\": \"Two base pair deletion in IL2 receptor \\u03b3 gene in NOD/SCID mice induces a highly severe immunodeficiency\", \"venue\": \"Laboratory Animal Research\", \"year\": 2020, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://labanimres.biomedcentral.com/track/pdf/10.1186/s42826-020-00048-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7427935, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39973656\", \"name\": \"I. Bak\"}, {\"authorId\": \"116275036\", \"name\": \"Doo-Jin Kim\"}, {\"authorId\": \"66189774\", \"name\": \"Hyoung\\u2010Chin Kim\"}, {\"authorId\": \"4325657\", \"name\": \"Hye-jun Shin\"}, {\"authorId\": \"2054414591\", \"name\": \"Eunhye Yu\"}, {\"authorId\": \"34519097\", \"name\": \"Kyeong-Won Yoo\"}, {\"authorId\": \"66199548\", \"name\": \"Dae-Yeul Yu\"}], \"abstract\": \"Genome editing has recently emerged as a powerful tool for generating mutant mice. Small deletions of nucleotides in the target genes are frequently found in CRISPR/Cas9 mediated mutant mice. However, there are very few reports analyzing the phenotypes in small deleted mutant mice generated by CRISPR/Cas9. In this study, we generated a mutant by microinjecting sgRNAs targeting the IL2 receptor \\u03b3 gene and Cas9 protein, into the cytoplasm of IVF-derived NOD.CB17/Prkdcscid/JKrb (NOD/SCID) mice embryos, and further investigated whether a 2\\u2009bp deletion of the IL2 receptor \\u03b3 gene affects severe deficiency of immune cells as seen in NOD/LtSz-scid IL2 receptor \\u03b3 \\u2212/\\u2212 (NSG) mice. Our results show that the thymus weight of mutant mice is significantly less than that of NOD/SCID mice, whereas the spleen weight was marginally less. T and B cells in the mutant mice were severely deficient, and NK cells were almost absent. In addition, tumor growth was exceedingly increased in the mutant mice transplanted with HepG2, Raji and A549 cells, but not in nude and NOD/SCID mice. These results suggest that the NOD/SCID mice with deletion\\u00a0of 2\\u2009bp in the IL2 receptor \\u03b3 gene shows same phenotype as NSG mice. Taken together, our data indicates that small deletions by genome editing is sufficient to generate null\\u00a0mutant mice.\"}, {\"paperId\": \"0169147c283771afc0f0ec932cf04f172275ac2c\", \"externalIds\": {\"DOI\": \"10.1093/neuonc/noac209.872\", \"CorpusId\": 253528715}, \"title\": \"EXTH-74. ATR INHIBITION IN EXPERIMENTAL GLIOMA\", \"venue\": \"Neuro-Oncology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/24/Supplement_7/vii226/47020548/noac209.872.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/neuonc/noac209.872?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/neuonc/noac209.872, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1411667412\", \"name\": \"B. Walter\"}, {\"authorId\": \"2190857433\", \"name\": \"L. Schnabel\"}, {\"authorId\": \"2057858018\", \"name\": \"S. Hirsch\"}, {\"authorId\": \"2054695599\", \"name\": \"A. Stahl\"}, {\"authorId\": \"28310480\", \"name\": \"L. Haeusser\"}, {\"authorId\": \"2038111458\", \"name\": \"F. Tsiami\"}, {\"authorId\": \"2190854890\", \"name\": \"L. Kuhlburger\"}, {\"authorId\": \"2088607\", \"name\": \"S. Nahnsen\"}, {\"authorId\": \"2068269069\", \"name\": \"M. Templin\"}, {\"authorId\": \"1390056525\", \"name\": \"K. Schenke-Layland\"}, {\"authorId\": \"2077451014\", \"name\": \"D. Merk\"}, {\"authorId\": \"6418934\", \"name\": \"G. Tabatabai\"}], \"abstract\": \"\\n Glioblastoma are incurable primary tumors of the central nervous system. Novel treatment options are urgently needed. Recently, we investigated molecular effects of disrupting the (b)HLH network, a frequently altered and tumor-promoting transcriptional network in glioma, by introducing a dominant-negative variant of the E47 protein. The identified downstream anti-tumor effects included the DNA damage response pathway. In the present study, we aimed at investigating the anti-glioma effects of ATR inhibition in vitro and in vivo with a particular focus on treatment-induced vulnerabilities and potential combination therapies. We performed acute cytotoxicity, clonogenic survival assays, flow cytometry-based determination of cell cycle status and apoptosis induction in human and murine glioma cell lines in vitro, and investigated tumor growth in the SMA560/VMDk syngeneic mouse model in vivo. Furthermore, we applied RNA sequencing, DigiWest protein profiling analyses and genome-wide CRISPR/Cas9 loss-of function and activation screens to determine potential combination therapies. Combination treatments were further analyzed for synergism by the Bliss and ZIP synergy models. ATR inhibition in glioma cells resulted in reduced viability and clonogenic survival. However, differential patterns of gene expression deregulation (e.g. p53 signaling) and differing modes of cell cycle arrest in distinct glioma model systems argue for a substantial heterogeneity with regard to response to ATR inhibition. Based on our data we designed combinatorial treatments. We will present novel insights into promising combinatorial treatments using ATR inhibition and their underlying molecular mechanisms.\"}, {\"paperId\": \"0169cca16a5425d8c976d000b302e899f26e2d57\", \"externalIds\": {\"DOI\": \"10.1074/jbc.RA120.013596\", \"CorpusId\": 231763468, \"PubMed\": \"33516499\"}, \"title\": \"Dissociation of the AhR/ARNT complex by TGF-\\u03b2/Smad signaling represses CYP1A1 gene expression and inhibits benze[a]pyrene-mediated cytotoxicity.\", \"venue\": \"Journal of Biological Chemistry\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jbc.org/article/S0021925817503269/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1074/jbc.RA120.013596?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1074/jbc.RA120.013596, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46718617\", \"name\": \"N. Nakano\"}, {\"authorId\": \"50719095\", \"name\": \"N. Sakata\"}, {\"authorId\": \"50662100\", \"name\": \"Yuki Katsu\"}, {\"authorId\": \"1699587256\", \"name\": \"Daiki Nochise\"}, {\"authorId\": \"1699589410\", \"name\": \"E. Sato\"}, {\"authorId\": \"1698898039\", \"name\": \"Yuta Takahashi\"}, {\"authorId\": \"1699595950\", \"name\": \"Saori Yamaguchi\"}, {\"authorId\": \"1699590996\", \"name\": \"Yoko Haga\"}, {\"authorId\": \"4271285\", \"name\": \"S. Ikeno\"}, {\"authorId\": \"8124874\", \"name\": \"M. Motizuki\"}, {\"authorId\": \"47581915\", \"name\": \"Keigo Sano\"}, {\"authorId\": \"1699589111\", \"name\": \"Kohei Yamasaki\"}, {\"authorId\": \"34886715\", \"name\": \"K. Miyazawa\"}, {\"authorId\": \"46975389\", \"name\": \"S. Itoh\"}], \"abstract\": \"Cytochrome P450 1A1 (CYP1A1) catalyzes the metabolic activation of polycyclic aromatic hydrocarbons (PAHs) such as benzo[a]pyrene (B[a]P) and is transcriptionally regulated by the aryl hydrocarbon receptor (AhR)/AhR nuclear translocator (ARNT) complex upon exposure to PAHs. Accordingly, inhibition of CYP1A1 expression reduces production of carcinogens from PAHs. Although transcription of the CYP1A1 gene is known to be repressed by transforming growth factor-\\u03b2 (TGF-\\u03b2), how TGF-\\u03b2 signaling is involved in the suppression of CYP1A1 gene expression has yet to be clarified. In this study, using mammalian cell lines, along with shRNA-mediated gene silencing, CRISPR/Cas9-based genome editing, and reporter gene and quantitative RT-PCR assays, we found that TGF-\\u03b2 signaling dissociates the B[a]P-mediated AhR/ARNT heteromeric complex. Among the examined Smads, Smad family member 3 (Smad3) strongly interacted with both AhR and ARNT via its MH2 domain. Moreover, hypoxia-inducible factor 1\\u03b1 (HIF-1\\u03b1), which is stabilized upon TGF-\\u03b2 stimulation, also inhibited AhR/ARNT complex formation in the presence of B[a]P. Thus, TGF-\\u03b2 signaling negatively regulated the transcription of the CYP1A1 gene in at least two different ways. Of note, TGF-\\u03b2 abrogated DNA damage in B[a]P-exposed cells. We therefore conclude that TGF-\\u03b2 may protect cells against carcinogenesis because it inhibits CYP1A1-mediated metabolic activation of PAHs as part of its anti-tumorigenic activities.\"}, {\"paperId\": \"016a3b9449807f61bf435f89c2cd1f82f92015ac\", \"externalIds\": {\"MAG\": \"3115152577\", \"DOI\": \"10.3390/fermentation7010005\", \"CorpusId\": 234318777}, \"title\": \"An Overview of CRISPR-Based Technologies in Wine Yeasts to Improve Wine Flavor and Safety\", \"venue\": \"Fermentation\", \"year\": 2021, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2311-5637/7/1/5/pdf?version=1609840021\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3390/fermentation7010005?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3390/fermentation7010005, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143728930\", \"name\": \"A. Vilela\"}], \"abstract\": \"Modern industrial winemaking is based on the use of specific starters of wine strains. Commercial wine strains present several advantages over natural isolates, and it is their use that guarantees the stability and reproducibility of industrial winemaking technologies. For the highly competitive wine market with new demands for improved wine quality and wine safety, it has become increasingly critical to develop new yeast strains. In the last decades, new possibilities arose for creating upgraded wine yeasts in the laboratory, resulting in the development of strains with better fermentation abilities, able to improve the sensory quality of wines and produce wines targeted to specific consumers, considering their health and nutrition requirements. However, only two genetically modified (GM) wine yeast strains are officially registered and approved for commercial use. Compared with traditional genetic engineering methods, CRISPR/Cas9 is described as efficient, versatile, cheap, easy-to-use, and able to target multiple sites. This genetic engineering technique has been applied to Saccharomyces cerevisiae since 2013. In this review, we aimed to overview the use of CRISPR/Cas9 editing technique in wine yeasts to combine develop phenotypes able to increase flavor compounds in wine without the development of off-flavors and aiding in the creation of \\u201csafer wines.\\u201d\"}, {\"paperId\": \"016d8a5b6cee2ddd39bb3f1d9d54f25b52f83d6a\", \"externalIds\": {\"MAG\": \"3090321192\", \"PubMedCentral\": \"7528073\", \"DOI\": \"10.1038/s42003-020-01203-w\", \"CorpusId\": 222093880, \"PubMed\": \"32999445\"}, \"title\": \"Regulatory gene function handoff allows essential gene loss in mosquitoes\", \"venue\": \"Communications Biology\", \"year\": 2020, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-020-01203-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7528073, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6846606\", \"name\": \"Alys M Cheatle Jarvela\"}, {\"authorId\": \"1978595360\", \"name\": \"Catherine S Trelstad\"}, {\"authorId\": \"4785130\", \"name\": \"L. Pick\"}], \"abstract\": \"Regulatory genes are often multifunctional and constrained, which results in evolutionary conservation. It is difficult to understand how a regulatory gene could be lost from one species\\u2019 genome when it is essential for viability in closely related species. The gene paired is a classic Drosophila pair-rule gene, required for formation of alternate body segments in diverse insect species. Surprisingly, paired was lost in mosquitoes without disrupting body patterning. Here, we demonstrate that a paired family member, gooseberry , has acquired paired -like expression in the malaria mosquito Anopheles stephensi . Anopheles-gooseberry CRISPR-Cas9 knock-out mutants display pair-rule phenotypes and alteration of target gene expression similar to what is seen in Drosophila and beetle paired mutants. Thus, paired was functionally replaced by the related gene, gooseberry , in mosquitoes. Our findings document a rare example of a functional replacement of an essential regulatory gene and provide a mechanistic explanation of how such loss can occur. Cheatle Jarvela et al. demonstrate in the mosquito Anopheles stephensi that the paired gene was functionally replaced by the gene gooseberry , even though paired is essential in other insects such as fruit flies and beetles. This study contributes to the understanding of how essential genes are lost despite their importance during development.\"}, {\"paperId\": \"016efe61f4d8afea445b20dd13d3849f4763cb7c\", \"externalIds\": {\"DOI\": \"10.1016/j.critrevonc.2023.104068\", \"CorpusId\": 259994686, \"PubMed\": \"37468084\"}, \"title\": \"Preclinical Tumor Mouse Models for Studying Esophageal Cancer.\", \"venue\": \"Critical reviews in oncology/hematology\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.critrevonc.2023.104068?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.critrevonc.2023.104068, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5594839\", \"name\": \"R. A. Mahmoudian\"}, {\"authorId\": \"6397287\", \"name\": \"M. Farshchian\"}, {\"authorId\": \"15874896\", \"name\": \"F. F. Golyan\"}, {\"authorId\": \"2193541521\", \"name\": \"Parvaneh Mahmoudian\"}, {\"authorId\": \"1953772\", \"name\": \"A. Alasti\"}, {\"authorId\": \"2292819928\", \"name\": \"Vahid Moghimi\"}, {\"authorId\": \"14970277\", \"name\": \"Mina Maftooh\"}, {\"authorId\": \"40362982\", \"name\": \"M. Khazaei\"}, {\"authorId\": \"12919803\", \"name\": \"S. Hassanian\"}, {\"authorId\": \"49937518\", \"name\": \"G. Ferns\"}, {\"authorId\": \"87393238\", \"name\": \"Hanie Mahaki\"}, {\"authorId\": \"38307597\", \"name\": \"S. Shahidsales\"}, {\"authorId\": \"144999299\", \"name\": \"A. Avan\"}], \"abstract\": \"Preclinical models are extensively employed in cancer research because they can be manipulated in terms of their environment, genome, molecular biology, organ systems, and physical activity to mimic human behavior and conditions. The progress made in in vivo cancer research has resulted in significant advancements, enabling the creation of spontaneous, metastatic, and humanized mouse models. Most recently, the remarkable and extensive developments in genetic engineering, particularly the utilization of CRISPR/Cas9, transposable elements, epigenome modifications, and liquid biopsies, have further facilitated the design and development of numerous mouse models for studying cancer. In this review, we have elucidated the production and usage of current mouse models, such as xenografts, chemical-induced models, and genetically engineered mouse models (GEMMs), for studying esophageal cancer. Additionally, we have briefly discussed various gene-editing tools that could potentially be employed in the future to create mouse models specifically for esophageal cancer research.\"}, {\"paperId\": \"016eff8fed76b05fdf69d2e325033e12fb17960f\", \"externalIds\": {\"PubMedCentral\": \"8293161\", \"DOI\": \"10.3390/jdb9030027\", \"CorpusId\": 236156532, \"PubMed\": \"34287339\"}, \"title\": \"A Novel Mutation in Cse1l Disrupts Brain and Eye Development with Specific Effects on Pax6 Expression\", \"venue\": \"Journal of Developmental Biology\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2221-3759/9/3/27/pdf?version=1626335051\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8293161, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145550822\", \"name\": \"L. Blizzard\"}, {\"authorId\": \"40662907\", \"name\": \"Chelsea Menke\"}, {\"authorId\": \"116496640\", \"name\": \"Shaili D. Patel\"}, {\"authorId\": \"4336691\", \"name\": \"R. Waclaw\"}, {\"authorId\": \"5778707\", \"name\": \"S. Lachke\"}, {\"authorId\": \"6872964\", \"name\": \"R. Stottmann\"}], \"abstract\": \"Forward genetics in the mouse continues to be a useful and unbiased approach to identifying new genes and alleles with previously unappreciated roles in mammalian development and disease. Here, we report a new mouse allele of Cse1l that was recovered from an ENU mutagenesis screen. Embryos homozygous for the anteater allele of Cse1l display a number of variable phenotypes, with craniofacial and ocular malformations being the most obvious. We provide evidence that Cse1l is the causal gene through complementation with a novel null allele of Cse1l generated by CRISPR-Cas9 editing. While the variability in the anteater phenotype was high enough to preclude a detailed molecular analysis, we demonstrate a very penetrant reduction in Pax6 levels in the developing eye along with significant ocular developmental phenotypes. The eye gene discovery tool iSyTE shows Cse1l to be significantly expressed in the lens from early eye development stages in embryos through adulthood. Cse1l has not previously been shown to be required for organogenesis as homozygosity for a null allele results in very early lethality. Future detailed studies of Cse1l function in craniofacial and neural development will be best served with a conditional allele to circumvent the variable phenotypes we report here. We suggest that human next-generation (whole genome or exome) sequencing studies yielding variants of unknown significance in CSE1L could consider these findings as part of variant analysis.\"}, {\"paperId\": \"0170f971b90d56c08d59c8c55bdc7e014dfc8ef6\", \"externalIds\": {\"PubMedCentral\": \"12039400\", \"DOI\": \"10.1080/27694127.2023.2179287\", \"CorpusId\": 257129037, \"PubMed\": \"40395311\"}, \"title\": \"External stimulation induces the secretion of autophagosome-like vesicles by B cells\", \"venue\": \"Autophagy Reports\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1080/27694127.2023.2179287\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC12039400, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"36698207\", \"name\": \"Yu-Diao Kuan\"}, {\"authorId\": \"13676876\", \"name\": \"Chao-Yuan Tsai\"}, {\"authorId\": \"47017399\", \"name\": \"S. Sakakibara\"}, {\"authorId\": \"2177938\", \"name\": \"D. Standley\"}, {\"authorId\": \"40161192\", \"name\": \"H. Kikutani\"}], \"abstract\": \"ABSTRACT Macroautophagy/autophagy is a cellular degradation and recycling process that supports cellular homeostasis. Since an autophagosome marker, microtubule-associated protein 1A/1B-light chain 3 (LC3)-II, was found in cell-derived extracellular vesicles (EVs), autophagy may cooperate with EV secretion pathways to control unconventional secretion of intracellular molecules. Several studies have demonstrated that pharmacological inhibition of autophagic turnover and pathogen-induced endolysosomal dysfunction enhanced the secretion of autophagosome-like EVs (ALVs). However, whether external stimulation induces ALV secretion is unclear. Here we showed that co-stimulation with IL-4 and anti-CD40 antibody (IL-4:CD40) enhanced the secretion of LC3-II+ALVs compared to co-stimulation by IL-4 and lipopolysaccharide (IL-4:LPS) or by IL4 and anti-IgM antibody in B cells. While IL-4:LPS stimulation accelerated autophagic flux, IL-4:CD40 stimulation reduced autophagosome-lysosome fusion without affecting lysosomal function. Although both IL-4:LPS and IL-4:CD40 induced the expression of similar genes involved in vesicle fusion or transportation, IL-4:CD40 preferentially enhanced the expression of the small GTPase RAB27a compared to IL-4:LPS. Genetic disruption by the CRISPR-Cas9 system revealed that loss of RAB27a membrane-binding ability impaired LC3-II+ALV secretion but not ALIX+EV secretion in B-lymphoma A20 cells. Additionally, reconstitution of human wild-type RAB27A in RAB27a mutant A20 cells restored LC3-II+ALV secretion, indicating that RAB27a controls autophagosome secretion. Furthermore, LC3-II+ALVs were found in the sera of tumor-bearing mice and the plasma of healthy human donors. Our findings may provide a role for B-cell secretory autophagy in regulating intercellular communication under various physiological conditions, such as vaccination, pathogen infection, and B-cell lymphoma progression. Abbreviations: ALVs: autophagosome-like vesicles; ATG: autophagy-related; Baf A1: bafilomycin A1; CNX: calnexin; EVs: extracellular vesicles; Ig: immunoglobulin; IL: Interleukin; LC3: microtubule-associated protein 1A/1B-light; LPS: Lipopolysaccharides; MVs: microvesicles; RAB: member RAS oncogene family; TLR: toll-like receptor\"}, {\"paperId\": \"01736d731fe977345f1747e2581bf2b66536f719\", \"externalIds\": {\"DOI\": \"10.1007/s12032-022-01773-1\", \"CorpusId\": 251570497, \"PubMed\": \"35972707\"}, \"title\": \"CRISPR/Cas9-mediated knockout of HO-1 decreased the proliferation and migration of T47D cells and increased cisplatin-induced apoptosis: an in vitro study\", \"venue\": \"Medical Oncology\", \"year\": 2022, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12032-022-01773-1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12032-022-01773-1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2163509024\", \"name\": \"Sahar Evazi Bakhshi\"}, {\"authorId\": \"6351183\", \"name\": \"Amaneh Mohammadi Roushandeh\"}, {\"authorId\": \"13167019\", \"name\": \"Mehryar Habibi Roudkenar\"}, {\"authorId\": \"2124229346\", \"name\": \"Shima Shekarchi\"}, {\"authorId\": \"2060150595\", \"name\": \"Mohammadkarim Bahadori\"}], \"abstract\": null}, {\"paperId\": \"0173ce87b2a55c2e4de881f42a0bac8e36d70fea\", \"externalIds\": {\"PubMedCentral\": \"11595069\", \"DOI\": \"10.3390/ijms252212201\", \"CorpusId\": 274045540, \"PubMed\": \"39596267\"}, \"title\": \"Significant Advancements and Evolutions in Chimeric Antigen Receptor Design\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/25/22/12201/pdf?version=1731509590\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11595069, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"16696475\", \"name\": \"Anna Gaimari\"}, {\"authorId\": \"2111166748\", \"name\": \"Anna De Lucia\"}, {\"authorId\": \"1625301084\", \"name\": \"F. Nicolini\"}, {\"authorId\": \"119102411\", \"name\": \"Luciana Mazzotti\"}, {\"authorId\": \"6444524\", \"name\": \"R. Maltoni\"}, {\"authorId\": \"2330704335\", \"name\": \"Giovanna Rughi\"}, {\"authorId\": \"1389626667\", \"name\": \"Matteo Zurlo\"}, {\"authorId\": \"2186171299\", \"name\": \"Matteo Marchesini\"}, {\"authorId\": \"2252311843\", \"name\": \"Manel Juan\"}, {\"authorId\": \"2330701024\", \"name\": \"Daniel Parras\"}, {\"authorId\": \"8627821\", \"name\": \"C. Cerchione\"}, {\"authorId\": \"2299590370\", \"name\": \"Giovanni Martinelli\"}, {\"authorId\": \"4648826\", \"name\": \"S. Bravaccini\"}, {\"authorId\": \"4600144\", \"name\": \"Sarah Tettamanti\"}, {\"authorId\": \"144916645\", \"name\": \"A. Pasetto\"}, {\"authorId\": \"145542337\", \"name\": \"L. Pasini\"}, {\"authorId\": \"2330705337\", \"name\": \"Chiara Magnoni\"}, {\"authorId\": \"2314969768\", \"name\": \"Luca Gazzola\"}, {\"authorId\": \"2330702373\", \"name\": \"Patricia Borges de Souza\"}, {\"authorId\": \"2327533724\", \"name\": \"M. Mazza\"}], \"abstract\": \"Recent times have witnessed remarkable progress in cancer immunotherapy, drastically changing the cancer treatment landscape. Among the various immunotherapeutic approaches, adoptive cell therapy (ACT), particularly chimeric antigen receptor (CAR) T cell therapy, has emerged as a promising strategy to tackle cancer. CAR-T cells are genetically engineered T cells with synthetic receptors capable of recognising and targeting tumour-specific or tumour-associated antigens. By leveraging the intrinsic cytotoxicity of T cells and enhancing their tumour-targeting specificity, CAR-T cell therapy holds immense potential in achieving long-term remission for cancer patients. However, challenges such as antigen escape and cytokine release syndrome underscore the need for the continued optimisation and refinement of CAR-T cell therapy. Here, we report on the challenges of CAR-T cell therapies and on the efforts focused on innovative CAR design, on diverse therapeutic strategies, and on future directions for this emerging and fast-growing field. The review highlights the significant advances and changes in CAR-T cell therapy, focusing on the design and function of CAR constructs, systematically categorising the different CARs based on their structures and concepts to guide researchers interested in ACT through an ever-changing and complex scenario. UNIVERSAL CARs, engineered to recognise multiple tumour antigens simultaneously, DUAL CARs, and SUPRA CARs are some of the most advanced instances. Non-molecular variant categories including CARs capable of secreting enzymes, such as catalase to reduce oxidative stress in situ, and heparanase to promote infiltration by degrading the extracellular matrix, are also explained. Additionally, we report on CARs influenced or activated by external stimuli like light, heat, oxygen, or nanomaterials. Those strategies and improved CAR constructs in combination with further genetic engineering through CRISPR/Cas9- and TALEN-based approaches for genome editing will pave the way for successful clinical applications that today are just starting to scratch the surface. The frontier lies in bringing those approaches into clinical assessment, aiming for more regulated, safer, and effective CAR-T therapies for cancer patients.\"}, {\"paperId\": \"01746c2c2ec5e56a02d04cbaf9374611470f4697\", \"externalIds\": {\"PubMedCentral\": \"8007595\", \"DOI\": \"10.1038/s41416-020-01238-0\", \"CorpusId\": 231664239, \"PubMed\": \"33473172\"}, \"title\": \"Targeting autophagy reverses de novo resistance in homologous recombination repair proficient breast cancers to PARP inhibition\", \"venue\": \"British Journal of Cancer\", \"year\": 2021, \"citationCount\": 36, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41416-020-01238-0.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8007595, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2047165046\", \"name\": \"Ganesh Pai Bellare\"}, {\"authorId\": \"49460932\", \"name\": \"B. Saha\"}, {\"authorId\": \"1999556\", \"name\": \"B. Patro\"}], \"abstract\": \"Poly(ADP-ribose) polymerase inhibitors (PARPi) target tumours defective in homologous recombination (HR). Most BRCA-wild-type (WT) HR-proficient breast cancers are intrinsically resistant to PARP inhibitors, e.g., talazoparib. We evaluated the role of autophagy in this de novo resistance and determined the underlying mechanism to overcome this. Autophagosome formation and autophagic flux were assessed by evaluating endogenous LC3-II levels and ectopic expression of EGFP-LC3 and mRFP-EGFP-LC3 in breast cancer cells. Autophagy-defective cells were generated by genetic depletion of BECN1, ATG5, p62/SQSTM1 and LAMP1 by using CRISPR-Cas9 double nickase system. The response of PARPi was evaluated in autophagy-proficient and -defective breast cancer cells and in xenograft SCID-mice model. Pro-survival autophagy was significantly enhanced upon talazoparib treatment in BRCA-WT breast cancer cell lines. Autophagy-deficient cells were hypersensitive to talazoparib. Targeting autophagy synergistically enhanced the therapeutic efficacy of talazoparib in BRCA1-WT breast cancer cells in vitro and in vivo xenograft tumour mouse model. Mechanistically, autophagy inhibition by chloroquine promoted deleterious NHEJ mediated DSB-repair, leading to extensive genomic instability and mitotic catastrophe. Autophagy confers de novo resistance to PARP inhibitor, talazoparib. Autophagy inhibition improves the therapeutic outcome of PARPi treatment in preclinical mice model, bearing HR-proficient breast tumours, warranting its usage in the clinical settings.\"}, {\"paperId\": \"0179a0a385f604fd185df0cde0c768429e059661\", \"externalIds\": {\"DOI\": \"10.7287/peerj.8971v0.1/reviews/1\", \"CorpusId\": 241463352}, \"title\": \"Peer Review #1 of \\\"Uricase-deficient rat is generated with CRISPR/Cas9 technique (v0.1)\\\"\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.7287/peerj.8971v0.1/reviews/1\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.7287/peerj.8971v0.1/reviews/1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.7287/peerj.8971v0.1/reviews/1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": null}, {\"paperId\": \"017a4d9bce1e7e0d4d1fac7afc51b62b5289fc4e\", \"externalIds\": {\"PubMedCentral\": \"11493007\", \"DOI\": \"10.7150/jca.98901\", \"CorpusId\": 272695392, \"PubMed\": \"39440061\"}, \"title\": \"CCT6A functions as promising diagnostic biomarker and promotes cell proliferation in colorectal cancer\", \"venue\": \"Journal of Cancer\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11493007, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2319874449\", \"name\": \"Jianxing Ma\"}, {\"authorId\": \"83113275\", \"name\": \"Qiuya Wei\"}, {\"authorId\": \"2403418390\", \"name\": \"Lili Zhang\"}, {\"authorId\": \"2276509583\", \"name\": \"Fengyao Sun\"}, {\"authorId\": \"2276573866\", \"name\": \"Wen Li\"}, {\"authorId\": \"2276498962\", \"name\": \"Ruihang Du\"}, {\"authorId\": \"2321494078\", \"name\": \"Mingchan Liu\"}, {\"authorId\": \"2301453126\", \"name\": \"Siyuan Yan\"}, {\"authorId\": \"2321522761\", \"name\": \"Chen Wang\"}], \"abstract\": \"Background: Chaperonin-containing tailless complex polypeptide 1 subunit 6A (CCT6A) is mainly located in the cytoplasm and considered to be involved in various biological processes in tumors. However, its function and the intrinsic mechanism need to be further elucidated. Methods: Multi-omics analysis was used to evaluate the correlation between CCT6A expression and prognosis of patients, as well as its immune value. CCT6A was knockout by CRISPR-Cas9, and overexpressed by transfecting plasmids in colorectal cancer (CRC) cells. Cell proliferation was analyzed by MTS, EDU staining and colony growth assay, and cell migration was monitored by wound healing assay and Transwell assay. The phosphor-kinase array kit and immunoblotting assay was utilized to explore the potential molecular mechanisms. Results: CCT6A was highly expressed in multiple tumor tissues and significantly correlated with the prognosis of patients. It was also associated with the immune infiltration, immune correlation and prognosis in CRC. CCT6A was highly expressed in CRC biopsies as well as fresh CRC tissues. Meanwhile, knockout of CCT6A reduced cell proliferation, cell cycle and cell migration. On the contrary, overexpression of CCT6A exhibited the opposite phenotypes. Moreover, we identified that HSPD1 and non-phosphorylated P53 were highly increased in CCT6A overexpressed cells, which are involved in regulating tumorigenesis. Conclusions: Therefore, CCT6A positively regulated cell proliferation/migration in CRC cells, and suggesting CCT6A has a high immunological value and is associated with CRC progression, which makes it a potential therapeutic target for CRC.\"}, {\"paperId\": \"017b6c68a178cc40e449ba2bd66a82fcdb0698d3\", \"externalIds\": {\"PubMedCentral\": \"9389688\", \"DOI\": \"10.1186/s12964-022-00932-1\", \"CorpusId\": 251672349, \"PubMed\": \"35986334\"}, \"title\": \"Poly(ADP-ribosyl)ation of acetyltransferase NAT10 by PARP1 is required for its nucleoplasmic translocation and function in response to DNA damage\", \"venue\": \"Cell communication and signaling : CCS\", \"year\": 2022, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://biosignaling.biomedcentral.com/counter/pdf/10.1186/s12964-022-00932-1\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9389688, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3152610\", \"name\": \"Hong-Yi Liu\"}, {\"authorId\": \"1679704\", \"name\": \"Y. Liu\"}, {\"authorId\": \"2108255036\", \"name\": \"Yin-Ling Zhang\"}, {\"authorId\": \"145785799\", \"name\": \"Yan Ning\"}, {\"authorId\": \"1621052743\", \"name\": \"Fang-Lin Zhang\"}, {\"authorId\": \"120510467\", \"name\": \"Da-Qiang Li\"}], \"abstract\": \"Background N-acetyltransferase 10 (NAT10), an abundant nucleolar protein with both lysine and RNA cytidine acetyltransferase activities, has been implicated in Hutchinson-Gilford progeria syndrome and human cancer. We and others recently demonstrated that NAT10 is translocated from the nucleolus to the nucleoplasm after DNA damage, but the underlying mechanism remains unexplored. Methods The NAT10 and PARP1 knockout (KO) cell lines were generated using CRISPR-Cas9 technology. Knockdown of PARP1 was performed using specific small interfering RNAs targeting PARP1. Cells were irradiated with \\u03b3-rays using a 137 Cs Gammacell-40 irradiator and subjected to clonogenic survival assays. Co-localization and interaction between NAT10 and MORC2 were examined by immunofluorescent staining and immunoprecipitation assays, respectively. PARylation of NAT10 and translocation of NAT10 were determined by in vitro PARylation assays and immunofluorescent staining, respectively. Results Here, we provide the first evidence that NAT10 underwent covalent PARylation modification following DNA damage, and poly (ADP-ribose) polymerase 1 (PARP1) catalyzed PARylation of NAT10 on three conserved lysine (K) residues (K1016, K1017, and K1020) within its C-terminal nucleolar localization signal motif (residues 983\\u20131025). Notably, mutation of those three PARylation residues on NAT10, pharmacological inhibition of PARP1 activity, or depletion of PARP1 impaired NAT10 nucleoplasmic translocation after DNA damage. Knockdown or inhibition of PARP1 or expression of a PARylation-deficient mutant NAT10 (K3A) attenuated the co-localization and interaction of NAT10 with MORC family CW-type zinc finger 2 (MORC2), a newly identified chromatin-remodeling enzyme involved in DNA damage response, resulting in a decrease in DNA damage-induced MORC2 acetylation at lysine 767. Consequently, expression of a PARylation-defective mutant NAT10 resulted in enhanced cellular sensitivity to DNA damage agents. Conclusion Collectively, these findings indicate that PARP1-mediated PARylation of NAT10 is key for controlling its nucleoplasmic translocation and function in response to DNA damage. Moreover, our findings provide novel mechanistic insights into the sophisticated paradigm of the posttranslational modification-driven cellular response to DNA damage. Video Abstract\"}, {\"paperId\": \"017cf80c7e87aa10a5b0ce5d43a725d046b8b6bc\", \"externalIds\": {\"MAG\": \"3134465582\", \"PubMedCentral\": \"7945659\", \"DOI\": \"10.1186/s13046-021-01888-9\", \"CorpusId\": 232172846, \"PubMed\": \"33691750\"}, \"title\": \"FGF19/FGFR4 signaling axis confines and switches the role of melatonin in head and neck cancer metastasis\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/counter/pdf/10.1186/s13046-021-01888-9\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7945659, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2644528\", \"name\": \"Liwei Lang\"}, {\"authorId\": \"12495277\", \"name\": \"YuanPing Xiong\"}, {\"authorId\": \"1400900361\", \"name\": \"N\\u00e9stor Prieto\\u2010Dom\\u00ednguez\"}, {\"authorId\": \"119902942\", \"name\": \"R. Loveless\"}, {\"authorId\": \"1454186459\", \"name\": \"Caleb Jensen\"}, {\"authorId\": \"40527169\", \"name\": \"C. Shay\"}, {\"authorId\": \"50538100\", \"name\": \"Y. Teng\"}], \"abstract\": \"There is no consensus about the effective dosages of melatonin in cancer management, thus, it is imperative to fully understand the dose-dependent responsiveness of cancer cells to melatonin and the underlying mechanisms. Head and neck squamous cell carcinoma (HNSCC) cells with or without melatonin treatment were used as a research platform. Gene depletion was achieved by short hairpin RNA, small interfering RNA, and CRISPR/Cas9. Molecular changes and regulations were assessed by Western blotting, quantitative RT-PCR (qRT-PCR), immunohistochemistry, and chromatin Immunoprecipitation coupled with qPCR (ChIP-qPCR). The therapeutic efficacy of FGF19/FGFR4 inhibition in melatonin-mediated tumor growth and metastasis was evaluated in orthotopic tongue tumor mice. The effect of melatonin on controlling cell motility and metastasis varies in HNSCC cells, which is dose-dependent. Mechanistically, high-dose melatonin facilitates the upregulation of FGF19 expression through activating endoplasmic stress (ER)-associated protein kinase RNA-like endoplasmic reticulum kinase (PERK)-Eukaryotic initiation factor 2 alpha (eIF2\\u03b1)-activating transcription factor 4 (ATF4) pathway, which in turn promotes FGFR4-Vimentin invasive signaling and attenuates the role of melatonin in repressing metastasis. Intriguingly, following long-term exposure to high-dose melatonin, epithelial HNSCC cells revert the process towards mesenchymal transition and turn more aggressive, which is enabled by FGF19/FGFR4 upregulation and alleviated by genetic depletion of the FGF19 and FGFR4 genes or the treatment of FGFR4 inhibitor H3B-6527. Our study gains novel mechanistic insights into melatonin-mediated modulation of FGF19/FGFR4 signaling in HNSCC, demonstrating that activating this molecular node confines the role of melatonin in suppressing metastasis and even triggers the switch of its function from anti-metastasis to metastasis promotion. The blockade of FGF19/FGFR4 signaling would have great potential in improving the efficacy of melatonin supplements in cancer treatment.\"}, {\"paperId\": \"017e6280f3e824da822d51b6054ee8df55c6d887\", \"externalIds\": {\"PubMedCentral\": \"7580707\", \"MAG\": \"3092297282\", \"DOI\": \"10.3389/fgene.2020.577053\", \"CorpusId\": 222210748, \"PubMed\": \"33193694\"}, \"title\": \"Transcriptome Analyses of \\u03b2-Thalassemia \\u221228(A>G) Mutation Using Isogenic Cell Models Generated by CRISPR/Cas9 and Asymmetric Single-Stranded Oligodeoxynucleotides (assODNs)\", \"venue\": \"Frontiers in Genetics\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgene.2020.577053/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7580707, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152911418\", \"name\": \"Jing Li\"}, {\"authorId\": \"1664810805\", \"name\": \"Ziheng Zhou\"}, {\"authorId\": \"31596400\", \"name\": \"Haixi Sun\"}, {\"authorId\": \"1419918010\", \"name\": \"Wenjie Ouyang\"}, {\"authorId\": \"51490463\", \"name\": \"Guoyi Dong\"}, {\"authorId\": \"1753492650\", \"name\": \"Tianbin Liu\"}, {\"authorId\": \"2054615152\", \"name\": \"Lei Ge\"}, {\"authorId\": \"11125585\", \"name\": \"Xiuqing Zhang\"}, {\"authorId\": \"2152504994\", \"name\": \"Chao Liu\"}, {\"authorId\": \"121593100\", \"name\": \"Ying Gu\"}], \"abstract\": \"\\u03b2-thalassemia, caused by mutations in the human hemoglobin \\u03b2 (HBB) gene, is one of the most common genetic diseases in the world. The HBB \\u221228(A>G) mutation is one of the five most common mutations in Chinese patients with \\u03b2-thalassemia. However, few studies have been conducted to understand how this mutation affects the expression of pathogenesis-related genes, including globin genes, due to limited homozygote clinical materials. Therefore, we developed an efficient technique using CRISPR/Cas9 combined with asymmetric single-stranded oligodeoxynucleotides (assODNs) to generate a K562 cell model with HBB \\u221228(A>G) named K562\\u201328(A>G). Then, we systematically analyzed the differences between K562\\u201328(A>G) and K562 at the transcriptome level by high-throughput RNA-seq before and after erythroid differentiation. We found that the HBB \\u221228(A>G) mutation not only disturbed the transcription of HBB, but also decreased the expression of HBG, which may further aggravate the thalassemia phenotype and partially explain the more severe clinical outcome of \\u03b2-thalassemia patients with the HBB \\u221228(A>G) mutation. Moreover, we found that the K562\\u201328(A>G) cell line is more sensitive to hypoxia and shows a defective erythrogenic program compared with K562 before differentiation. Importantly, all abovementioned abnormalities in K562\\u201328(A>G) were reversed after correction of this mutation with CRISPR/Cas9 and assODNs, confirming the specificity of these phenotypes. Overall, this is the first time to analyze the effects of the HBB \\u221228(A>G) mutation at the whole-transcriptome level based on isogenic cell lines, providing a landscape for further investigation of the mechanism of \\u03b2-thalassemia with the HBB \\u221228(A>G) mutation.\"}, {\"paperId\": \"017f20bf5ef348cc929e9c382996175ca8ede169\", \"externalIds\": {\"MAG\": \"3090447589\", \"DOI\": \"10.33540/360\", \"CorpusId\": 224910306}, \"title\": \"Uncovering new cardiac biology by the application of novel techniques in the adult heart\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://dspace.library.uu.nl/bitstream/1874/399698/1/5ec3ba1ee83bf.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.33540/360?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.33540/360, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39200770\", \"name\": \"B. Molenaar\"}], \"abstract\": null}, {\"paperId\": \"018293c1fc5a1f8b682efc7ee1bd02b6918fd654\", \"externalIds\": {\"DOI\": \"10.1126/science.adh8190\", \"CorpusId\": 260956282, \"PubMed\": \"37590348\"}, \"title\": \"MyoD-family inhibitor proteins act as auxiliary subunits of Piezo channels\", \"venue\": \"Science\", \"year\": 2023, \"citationCount\": 69, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/science.adh8190?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/science.adh8190, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47230316\", \"name\": \"Zijing Zhou\"}, {\"authorId\": \"2232070778\", \"name\": \"Xiaonuo Ma\"}, {\"authorId\": \"40827866\", \"name\": \"Yiechang Lin\"}, {\"authorId\": \"5817750\", \"name\": \"D. Cheng\"}, {\"authorId\": \"5290331\", \"name\": \"N. Bavi\"}, {\"authorId\": \"3897294\", \"name\": \"G. Secker\"}, {\"authorId\": \"2117938560\", \"name\": \"J. Li\"}, {\"authorId\": \"10353127\", \"name\": \"Vaibhao Janbandhu\"}, {\"authorId\": \"48836291\", \"name\": \"Drew L. Sutton\"}, {\"authorId\": \"1966722\", \"name\": \"H. Scott\"}, {\"authorId\": \"3076126\", \"name\": \"Mingxi Yao\"}, {\"authorId\": \"145735065\", \"name\": \"R. Harvey\"}, {\"authorId\": \"4547684\", \"name\": \"N. Harvey\"}, {\"authorId\": \"2353885\", \"name\": \"B. Corry\"}, {\"authorId\": \"7549424\", \"name\": \"Yixiao Zhang\"}, {\"authorId\": \"2052347195\", \"name\": \"C. Cox\"}], \"abstract\": \"Piezo channels are critical cellular sensors of mechanical forces. Despite their large size, ubiquitous expression, and irreplaceable roles in an ever-growing list of physiological processes, few Piezo channel\\u2013binding proteins have emerged. In this work, we found that MyoD (myoblast determination)\\u2013family inhibitor proteins (MDFIC and MDFI) are PIEZO1/2 interacting partners. These transcriptional regulators bind to PIEZO1/2 channels, regulating channel inactivation. Using single-particle cryogenic electron microscopy, we mapped the interaction site in MDFIC to a lipidated, C-terminal helix that inserts laterally into the PIEZO1 pore module. These Piezo-interacting proteins fit all the criteria for auxiliary subunits, contribute to explaining the vastly different gating kinetics of endogenous Piezo channels observed in many cell types, and elucidate mechanisms potentially involved in human lymphatic vascular disease. Description Editor\\u2019s summary Piezo ion channels act as sensors that convert mechanical energy into cellular signals. The mechanistic details of their modulation remains to be fully elucidated. Zhou et al. used two molecular strategies in combination with CRISPR/Cas9 editing to identify previously unrecognized Piezo channel-binding partners. Using a blend of electrophysiology and cryo\\u2013electron microscopy, the authors provide molecular details of how MyoD family inhibitor proteins interact with Piezo channels and regulate their gating. They identified an interacting interface that likely represents a scaffold that might be leveraged to generate Piezo-targeted therapeutics. \\u2014Mattia Marosov Discovery and characterization of binding partners for Piezo channels.\"}, {\"paperId\": \"0184382575a2f7233c417f85f6b3bbef89cdfbb3\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-3131-7_10\", \"CorpusId\": 257834687, \"PubMed\": \"36995625\"}, \"title\": \"Delivery of CRISPR-Cas12a Ribonucleoprotein Complex for Genome Editing in an Embryogenic Citrus Cell Line.\", \"venue\": \"Methods in molecular biology\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-3131-7_10?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-3131-7_10, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"88171215\", \"name\": \"Hong-Liang Fang\"}, {\"authorId\": \"5000917\", \"name\": \"J. Culver\"}, {\"authorId\": \"5407424\", \"name\": \"R. Niedz\"}, {\"authorId\": \"1901105\", \"name\": \"Yiping Qi\"}], \"abstract\": null}, {\"paperId\": \"018ac8235f9a45eef70a901d13c41a7c29cce04a\", \"externalIds\": {\"PubMedCentral\": \"8863422\", \"DOI\": \"10.1093/hmg/ddab235\", \"CorpusId\": 237480377, \"PubMed\": \"34508586\"}, \"title\": \"Genetic modeling of GNAO1 disorder delineates mechanisms of G\\u03b1o dysfunction\", \"venue\": \"Human Molecular Genetics\", \"year\": 2021, \"citationCount\": 29, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hmg/advance-article-pdf/doi/10.1093/hmg/ddab235/41010452/ddab235.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8863422, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2155679999\", \"name\": \"Dandan Wang\"}, {\"authorId\": \"35080554\", \"name\": \"Maria T. Dao\"}, {\"authorId\": \"47015692\", \"name\": \"Brian S Muntean\"}, {\"authorId\": \"46707856\", \"name\": \"A. Giles\"}, {\"authorId\": \"6097611\", \"name\": \"K. Martemyanov\"}, {\"authorId\": \"1780339\", \"name\": \"Brock Grill\"}], \"abstract\": \"Abstract GNAO1 encephalopathy is a neurodevelopmental disorder with a spectrum of symptoms that include dystonic movements, seizures and developmental delay. While numerous GNAO1 mutations are associated with this disorder, the functional consequences of pathological variants are not completely understood. Here, we deployed the invertebrate C. elegans as a whole-animal behavioral model to study the functional effects of GNAO1 disorder-associated mutations. We tested several pathological GNAO1 mutations for effects on locomotor behaviors using a combination of CRISPR/Cas9 gene editing and transgenic overexpression in vivo. We report that all three mutations tested (G42R, G203R and R209C) result in strong loss of function defects when evaluated as homozygous CRISPR alleles. In addition, mutations produced dominant negative effects assessed using both heterozygous CRISPR alleles and transgenic overexpression. Experiments in mice confirmed dominant negative effects of GNAO1 G42R, which impaired numerous motor behaviors. Thus, GNAO1 pathological mutations result in conserved functional outcomes across animal models. Our study further establishes the molecular genetic basis of GNAO1 encephalopathy, and develops a CRISPR-based pipeline for functionally evaluating mutations associated with neurodevelopmental disorders.\"}, {\"paperId\": \"01909971f42184ebe5bd8a3ae3d23c6f03da6e69\", \"externalIds\": {\"DOI\": \"10.1016/j.schres.2022.04.003\", \"CorpusId\": 248271493, \"PubMed\": \"35459617\"}, \"title\": \"Modeling common and rare genetic risk factors of neuropsychiatric disorders in human induced pluripotent stem cells.\", \"venue\": \"Schizophrenia Research\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9735430\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.schres.2022.04.003?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.schres.2022.04.003, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1394985769\", \"name\": \"Abdurrahman W. Muhtaseb\"}, {\"authorId\": \"88756317\", \"name\": \"J. Duan\"}], \"abstract\": \"Recent genome-wide association studies (GWAS) and whole-exome sequencing of neuropsychiatric disorders, especially schizophrenia, have identified a plethora of common and rare disease risk variants/genes. Translating the mounting human genetic discoveries into novel disease biology and more tailored clinical treatments is tied to our ability to causally connect genetic risk variants to molecular and cellular phenotypes. When combined with the Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)/CRISPR-associated (Cas) nuclease-mediated genome editing system, human induced pluripotent stem cell (hiPSC)-derived neural cultures (both 2D and 3D organoids) provide a promising tractable cellular model for bridging the gap between genetic findings and disease biology. In this review, we first conceptualize the advances in understanding the disease polygenicity and convergence from the past decade of iPSC modeling of different types of genetic risk factors of neuropsychiatric disorders. We then discuss the major cell types and cellular phenotypes that are most relevant to neuropsychiatric disorders in iPSC modeling. Finally, we critically review the limitations of iPSC modeling of neuropsychiatric disorders and outline the need for implementing and developing novel methods to scale up the number of iPSC lines and disease risk variants in a systematic manner. Sufficiently scaled-up iPSC modeling and a better functional interpretation of genetic risk variants, in combination with cutting-edge CRISPR/Cas9 gene editing and single-cell multi-omics methods, will enable the field to identify the specific and convergent molecular and cellular phenotypes in precision for neuropsychiatric disorders.\"}, {\"paperId\": \"0193436087bd836369b743ec38f7233e3ee8a188\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2021.102519\", \"CorpusId\": 237374193, \"PubMed\": \"34464854\"}, \"title\": \"CRISPR/Cas9 mediated generation of a iPSC line EHTJUi005-A-1 with homozygous knockout of the SUV39H1 gene.\", \"venue\": \"Stem Cell Research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2021.102519\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2021.102519?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2021.102519, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"88820334\", \"name\": \"Zhibin Qiao\"}, {\"authorId\": \"1492188371\", \"name\": \"Ji-Zhen Lu\"}, {\"authorId\": \"2156145730\", \"name\": \"Lu Zhang\"}, {\"authorId\": \"2100562380\", \"name\": \"H. Cao\"}, {\"authorId\": \"2107001244\", \"name\": \"Zhi-Hui Bai\"}, {\"authorId\": \"1910746719\", \"name\": \"Yi-Yao Qi\"}, {\"authorId\": \"1927023309\", \"name\": \"Han-Yu Zhu\"}, {\"authorId\": \"2108109301\", \"name\": \"Shou-Mei Zhang\"}, {\"authorId\": \"2100697710\", \"name\": \"Yan Bao\"}, {\"authorId\": \"2072955764\", \"name\": \"Wen-Wen Jia\"}, {\"authorId\": \"2145285203\", \"name\": \"Zhongmin Liu\"}], \"abstract\": \"SUV39H1 is a histone methyltransferase involve numerous biological processes, including of aging, embryo development, tumor growth and mitosis via catalysis of dimethylation and trimethylation of lysine 9 of histone H3. Here we report a human induced pluripotent stem cell line (EHTJUi005-A-1) which is generated from a wildtype human iPSC previously established in our laboratory, and this iPSC has a homozygous knockout of 8\\u00a0bp in Exon 2 of SUV39H1. This iPSC model provides a valuable resource to study epigenetic regulation in extensive biological processes as mentioned above.\"}, {\"paperId\": \"01958f027008bdb88a92583c749d034ea4d3b023\", \"externalIds\": {\"PubMedCentral\": \"9122501\", \"DOI\": \"10.1101/2021.12.05.471309\", \"CorpusId\": 245060636, \"PubMed\": \"35543413\"}, \"title\": \"C/EBP\\u03b4-induced epigenetic changes control the dynamic gene transcription of S100a8 and S100a9\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.12.05.471309\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9122501, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145012848\", \"name\": \"Saskia-L. Jauch-Speer\"}, {\"authorId\": \"49949909\", \"name\": \"Jonas Wolf\"}, {\"authorId\": \"1401009657\", \"name\": \"Marisol Herrera-Rivero\"}, {\"authorId\": \"51225546\", \"name\": \"Leonie Martens\"}, {\"authorId\": \"11997441\", \"name\": \"A. I. Chasan\"}, {\"authorId\": \"2213024\", \"name\": \"A. Witten\"}, {\"authorId\": \"50658270\", \"name\": \"B. Markus\"}, {\"authorId\": \"5845568\", \"name\": \"B. Schieffer\"}, {\"authorId\": \"40633169\", \"name\": \"T. Vogl\"}, {\"authorId\": \"2067048422\", \"name\": \"M. Stoll\"}, {\"authorId\": \"2264171454\", \"name\": \"J. Roth\"}, {\"authorId\": \"4217202\", \"name\": \"Olesja Fehler\"}], \"abstract\": \"The proinflammatory alarmins S100A8 and S100A9 are among the most abundant proteins in neutrophils and monocytes but completely silenced after differentiation to macrophages. The molecular mechanisms of the extraordinarily dynamic transcriptional regulation of s100a8 and s100a9 genes, however, are only barely understood. Using an unbiased genome-wide CRISPR/Cas9 knockout based screening approach in immortalized murine monocytes we identified the transcription factor C/EBP\\u03b4 as a central regulator of S100A8 and S100A9 expression. S100a8 and S100a9 expression was further controlled by the C/EBP\\u03b4-antagonists ATF3 and FBXW7. We confirmed the clinical relevance of this regulatory network in subpopulations of human monocytes in a clinical cohort of cardiovascular patients. Moreover, we identified specific C/EBP\\u03b4-binding sites within s100a8 and s100a9 promoter regions, and demonstrated that C/EBP\\u03b4-dependent JMJD3-mediated demethylation of H3K27me3 is indispensable for their expression. Overall, our work uncovered C/EBP\\u03b4 as a novel regulator of S100A8 and S100A9 expression. Therefore, C/EBP\\u03b4 represents a promising target for modulation of inflammatory conditions that are characterised by S100A8 and S100A9 overexpression.\"}, {\"paperId\": \"01987e40f588087c290e499a3dbe3a1b3caf3467\", \"externalIds\": {\"DOI\": \"10.1101/2023.12.19.572484\", \"CorpusId\": 266522723}, \"title\": \"Lactose blocks intercellular spreading of Galectin-1 from cancer cells to T-cells and activates tumor immunological control\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/12/20/2023.12.19.572484.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.12.19.572484?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.12.19.572484, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1405890391\", \"name\": \"Yu Hong\"}, {\"authorId\": \"37999987\", \"name\": \"Xiaofang Si\"}, {\"authorId\": \"2276316433\", \"name\": \"Wenjing Liu\"}, {\"authorId\": \"51895367\", \"name\": \"Xueying Mai\"}, {\"authorId\": \"2276321198\", \"name\": \"Yu Zhang\"}], \"abstract\": null}, {\"paperId\": \"019abe1eee2c926c8254e04a04df83178c50c175\", \"externalIds\": {\"PubMedCentral\": \"9128035\", \"DOI\": \"10.1212/NXI.0000000000001169\", \"CorpusId\": 261717631, \"PubMed\": \"35473886\"}, \"title\": \"Heterogeneity of Acetylcholine Receptor Autoantibody\\u2013Mediated Complement Activity in Patients With Myasthenia Gravis\", \"venue\": \"Neurology: Neuroimmunology & Neuroinflammation\", \"year\": 2022, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://nn.neurology.org/content/nnn/9/4/e1169.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9128035, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2215288400\", \"name\": \"Abeer H. Obaid\"}, {\"authorId\": \"2006346576\", \"name\": \"C. Zografou\"}, {\"authorId\": \"6529039\", \"name\": \"D. Vadysirisack\"}, {\"authorId\": \"2131095605\", \"name\": \"Bailey Munro-Sheldon\"}, {\"authorId\": \"83872248\", \"name\": \"M. Fichtner\"}, {\"authorId\": \"2238358745\", \"name\": \"Bhaskar Roy\"}, {\"authorId\": \"2239328753\", \"name\": \"William M. Philbrick\"}, {\"authorId\": \"2239270783\", \"name\": \"Jeffrey L Bennett\"}, {\"authorId\": \"9677311\", \"name\": \"R. Nowak\"}, {\"authorId\": \"2208551309\", \"name\": \"Kevin C. O\\u2019Connor\"}], \"abstract\": \"Background and Objectives Autoantibodies targeting the acetylcholine receptor (AChR), found in patients with myasthenia gravis (MG), mediate pathology through 3 mechanisms: complement-directed tissue damage, blocking of the acetylcholine binding site, and internalization of the AChR. Clinical assays, used to diagnose and monitor patients, measure only autoantibody binding. Consequently, they are limited in providing association with disease burden, understanding of mechanistic heterogeneity, and monitoring therapeutic response. The objective of this study was to develop a cell-based assay that measures AChR autoantibody\\u2013mediated complement membrane attack complex (MAC) formation. Methods An HEK293T cell line\\u2014modified using CRISPR/Cas9 genome editing to disrupt expression of the complement regulator genes (CD46, CD55, and CD59)\\u2014was used to measure AChR autoantibody\\u2013mediated MAC formation through flow cytometry. Results Serum samples (n = 155) from 96 clinically confirmed AChR MG patients, representing a wide range of disease burden and autoantibody titer, were tested along with 32 healthy donor (HD) samples. AChR autoantibodies were detected in 139 of the 155 (89.7%) MG samples through a cell-based assay. Of the 139 AChR-positive samples, autoantibody-mediated MAC formation was detected in 83 (59.7%), whereas MAC formation was undetectable in the HD group or AChR-positive samples with low autoantibody levels. MAC formation was positively associated with autoantibody binding in most patient samples; ratios (mean fluorescence intensity) of MAC formation to AChR autoantibody binding ranged between 0.27 and 48, with a median of 0.79 and an interquartile range of 0.43 (0.58\\u20131.1). However, the distribution of ratios was asymmetric and included extreme values; 16 samples were beyond the 10\\u201390 percentile, with high MAC to low AChR autoantibody binding ratio or the reverse. Correlation between MAC formation and clinical disease scores suggested a modest positive association (rho = 0.34, p = 0.0023), which included a subset of outliers that did not follow this pattern. MAC formation did not associate with exposure to immunotherapy, thymectomy, or MG subtypes defined by age-of-onset. Discussion A novel assay for evaluating AChR autoantibody\\u2013mediated complement activity was developed. A subset of patients that lacks association between MAC formation and autoantibody binding or disease burden was identified. The assay may provide a better understanding of the heterogeneous autoantibody molecular pathology and identify patients expected to benefit from complement inhibitor therapy.\"}, {\"paperId\": \"019ae20b14d7376d70e35581831e796bb0f2305a\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-150101\", \"CorpusId\": 244565778}, \"title\": \"Elucidation of Biological Role and Regulatory Landscape of PD-L2 in B-Cell Lymphoma\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-150101\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-150101?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-150101, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47261843\", \"name\": \"S. Shingaki\"}, {\"authorId\": \"4525251\", \"name\": \"J. Koya\"}, {\"authorId\": \"38424163\", \"name\": \"M. Yuasa\"}, {\"authorId\": \"2148327443\", \"name\": \"Y. Saito\"}, {\"authorId\": \"151379270\", \"name\": \"M. McClure\"}, {\"authorId\": \"49892558\", \"name\": \"Mariko Tabata\"}, {\"authorId\": \"145981067\", \"name\": \"K. Yamaguchi\"}, {\"authorId\": \"47269359\", \"name\": \"Yuta Ito\"}, {\"authorId\": \"50369317\", \"name\": \"Yasunori Kogure\"}, {\"authorId\": \"35438168\", \"name\": \"K. Kataoka\"}], \"abstract\": \"\\n PD-L2 is a ligand for PD-1 immune checkpoint. In contrast to another ligand PD-L1, little is known about the biological relevance and regulatory mechanism of PD-L2 in cancer. Here we found by pan-cancer transcriptome analysis that PD-L2 was highly expressed in limited cancer types, especially in diffuse large B-cell lymphoma (DLBCL). In particular, PD-L2 expression was elevated in patients with PD-L2 genetic alterations, such as copy number amplifications and rearrangements causing promoter replacement or 3\\u2032-untranslated region (UTR) disruption.\\n To evaluate the effect of PD-L1 and PD-L2 on the tumor microenvironment and clarify their similarities and differences at a similar expression level, we generated a A20-ovalbumin (OVA) murine B-cell lymphoma cell line lacking Pd-l1 and introduced exogenous Pd-l1 or Pd-l2 expression. Analysis of A20-OVA model showed that Pd-l2 expression accelerated tumor growth and attenuated CD8 + T cell infiltration in vivo, similar to Pd-l1 expression. Then, we performed multi-omics single-cell analysis in this model, constructing transcriptomic, surface phenotypic, and immune repertoire maps of > 20,000 cells from mock-, Pd-l1-, and Pd-l2-expressing A20-OVA tumors. Importantly, Pd-l1- and Pd-l2-expressing tumors exhibited similar cellular dynamics as well as transcriptomic and surface phenotypic changes in the tumor microenvironment. Specifically, a significant decrease of CD8 + T cells, particularly effector/memory cells showing high clonality, and regulatory T cells as well as a significant increase of myeloid-derived cells, including monocytes/macrophages and plasmacytoid dendritic cells (DCs), were observed in Pd-l1- and Pd-l2-expressing tumors. Differentially expressed gene analysis demonstrated the downregulation of response to bacterial molecules, including lipopolysaccharide, and antigen processing and presentation pathways in monocytes/macrophages and conventional and plasmacytoid DCs, respectively, in Pd-l1- and Pd-l2-expressing tumors. In line with this, pro-inflammatory cytokine\\u2012inducible markers, such as Ly6A/E and I-A/I-E, were down-regulated in various cell types in Pd-l1- and Pd-l2-expressing tumors. These results suggest that delineates pleiotropic effects shared by PD-L1 and PD-L2, mainly enhancing anti-inflammatory, pro-tumorigenic responses in the tumor microenvironment.\\n Given similar functions of PD-L1 and PD-L2, we hypothesized that the expression level of PD-1 ligands determines their biological relevance. Therefore, we aimed to dissect PD-L2 regulatory landscape by performing CRISPR tiling screening targeting 51 candidate regulatory elements predicted from Hi-C and DNase-seq data of a human transformed B cell line (GM12878). In addition to known cis-regulatory elements including the canonical transcription start site (TSS) and 3\\u2032-UTR, we identified a novel TSS, which was validated by cap analysis of gene expression (CAGE) with sequencing (CAGE-seq). Pan-cancer and -tissue expression analyses revealed that this novel element was expressed in 13% of DLBCL, but not in normal tissues nor other cancer types, suggestive of a unique PD-L2 regulatory mechanism in DLBCL. In addition, we identified an element located in the PD-L1 promoter which function as a distal silencer, suggesting functional complexity of this regulatory element. CRISPR-mediated knockout of other PD-L1 exons did not affect PD-L2 expression, suggesting that a silencer function in the PD-L1 promoter is independent of PD-L1 expression.\\n The identified PD-L2 regulatory elements can be occupied by an array of trans-regulatory factors. Indeed, ENCODE ChIP-seq of GM12878 revealed that many chromatin-associated proteins (CAPs) were bound within the PD-L1/PD-L2 topology associating domain. Therefore, to determine key regulators, we performed loss-of-function CRISPR screening for 103 CAPs. This CRISPR screening identified seven negative (such as IRF4 and BATF) and two positive regulators of PD-L2 expression. CRISPR/Cas9-based inhibition exhibited differential usage of canonical and novel TSSs among these factors.\\n Taken together, our findings reveal lineage-specific complex network of cis-regulatory elements and CAPs in regulating PD-L2 expression. These data provide insights into the molecular mechanisms underlying immune evasion and help refining immune-based therapeutic strategy in DLBCL.\\n \\n \\n Koya:\\u200810x Genomics: Honoraria. Kogure:\\u2008Takeda Pharmaceutical: Honoraria. Kataoka:\\u2008Bristol-Myers Squibb: Research Funding; Japan Blood Products Organization: Research Funding; Teijin Pharma: Research Funding; Shionogi: Research Funding; Asahi Genomics: Current holder of individual stocks in a privately-held company; Otsuka Pharmaceutical: Honoraria, Research Funding; Takeda Pharmaceutical: Honoraria, Research Funding; Janssen Pharmaceutical: Honoraria; Kyowa Kirin: Honoraria, Research Funding; Sumitomo Dainippon Pharma: Honoraria, Research Funding; AstraZeneca: Honoraria; Chugai Pharmaceutical: Honoraria, Research Funding; Novartis: Honoraria, Research Funding; Astellas Pharma: Honoraria, Research Funding; Eisai: Honoraria, Research Funding; Celgene: Honoraria; Ono Pharmaceutical: Honoraria, Research Funding; Mochida Pharmaceutical: Research Funding; JCR Pharmaceuticals: Research Funding; MSD: Research Funding.\\n\"}, {\"paperId\": \"019b14509c4c68e2ef22bb5a660b5682977dc75c\", \"externalIds\": {\"PubMedCentral\": \"11798634\", \"DOI\": \"10.1002/ejhf.3516\", \"CorpusId\": 274177115, \"PubMed\": \"39576264\"}, \"title\": \"State of the art and perspectives of gene therapy in heart failure. A scientific statement of the Heart Failure Association of the ESC, the ESC Council on Cardiovascular Genomics and the ESC Working Group on Myocardial & Pericardial Diseases\", \"venue\": \"European Journal of Heart Failure\", \"year\": 2024, \"citationCount\": 19, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11798634, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2298870801\", \"name\": \"S. Van Linthout\"}, {\"authorId\": \"2294162963\", \"name\": \"K. Stellos\"}, {\"authorId\": \"2244380441\", \"name\": \"Mauro Giacca\"}, {\"authorId\": \"46380637\", \"name\": \"E. Bertero\"}, {\"authorId\": \"2296265805\", \"name\": \"Antonio Cannata\"}, {\"authorId\": \"2251371524\", \"name\": \"Lucie Carrier\"}, {\"authorId\": \"1395889590\", \"name\": \"P. Garc\\u00eda-Pav\\u00eda\"}, {\"authorId\": \"49061176\", \"name\": \"A. Ghigo\"}, {\"authorId\": \"2110360806\", \"name\": \"Arantxa Gonz\\u00e1lez\"}, {\"authorId\": \"2253712160\", \"name\": \"Kristina H. Haugaa\"}, {\"authorId\": \"2238938607\", \"name\": \"M. Imazio\"}, {\"authorId\": \"2330616662\", \"name\": \"Luis R Lopes\"}, {\"authorId\": \"2284488659\", \"name\": \"P. Most\"}, {\"authorId\": \"2297357038\", \"name\": \"Piero Pollesello\"}, {\"authorId\": \"2250408379\", \"name\": \"H. Schunkert\"}, {\"authorId\": \"2331713311\", \"name\": \"Katrin Streckfuss\\u2010B\\u00f6meke\"}, {\"authorId\": \"2263892000\", \"name\": \"T. Thum\"}, {\"authorId\": \"5485723\", \"name\": \"C. Tocchetti\"}, {\"authorId\": \"2270872958\", \"name\": \"Carsten Tsch\\u00f6pe\"}, {\"authorId\": \"145369247\", \"name\": \"P. van der Meer\"}, {\"authorId\": \"5080129\", \"name\": \"E. van Rooij\"}, {\"authorId\": \"2250060679\", \"name\": \"M. Metra\"}, {\"authorId\": \"2298870221\", \"name\": \"G. Rosano\"}, {\"authorId\": \"2255336999\", \"name\": \"Stephane Heymans\"}], \"abstract\": \"Gene therapy has recently become a reality in the treatment of cardiovascular diseases. Strategies to modulate gene expression using antisense oligonucleotides or small interfering RNA are proving to be safe and effective in the clinic. Adeno\\u2010associated viral vector\\u2010based gene delivery and CRISPR\\u2010Cas9\\u2010based genome editing have emerged as efficient strategies for gene delivery and repair in humans. Overall, gene therapy holds the promise not only of expanding current treatment options, but also of intervening in previously untackled causal disease mechanisms with little side effects. This scientific statement provides a comprehensive overview of the various modalities of gene therapy used to treat heart failure and some of its risk factors, and their application in the clinical setting. It discusses specifically the possibilities of gene therapy for hereditary heart diseases and (non)\\u2010genetic heart failure. Furthermore, it addresses safety and clinical trial design issues and challenges for future regulatory strategies.\"}, {\"paperId\": \"019c42c67f8db80ec7226d942c7dd6d24a66cafe\", \"externalIds\": {\"DOI\": \"10.1021/acs.bioconjchem.1c00088\", \"CorpusId\": 233173654, \"PubMed\": \"33825445\"}, \"title\": \"Molecular Switch Engineering for Precise Genome Editing.\", \"venue\": \"Bioconjugate chemistry\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.bioconjchem.1c00088?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.bioconjchem.1c00088, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49105665\", \"name\": \"Daisuke Matsumoto\"}, {\"authorId\": \"2799801\", \"name\": \"W. Nomura\"}], \"abstract\": \"Genome editing technology commenced in 1996 with the discovery of the first zinc-finger nuclease. Application of Clustered Regularly Interspaced Short Palindromic Repeat (CRISPR) associated protein 9 (Cas9) technology to genome editing of mammalian cells allowed researchers to use genome editing more easily and cost-effectively. However, one of the technological problems that remains to be solved is \\\"off-target effects\\\", which are unexpected mutations in nontarget DNA. One significant improvement in genome editing technology has been achieved with molecular/protein engineering. The key to this engineering is a \\\"switch\\\" to control function. In this review, we discuss recent efforts to design novel \\\"switching\\\" systems for precise editing using genome editing tools.\"}, {\"paperId\": \"019da4cee248806681a96ee4b99a61175aae7c88\", \"externalIds\": {\"PubMedCentral\": \"8830411\", \"DOI\": \"10.1556/1886.2021.00023\", \"CorpusId\": 246079266, \"PubMed\": \"35060920\"}, \"title\": \"Importance of cortactin for efficient epithelial NF-\\u03baB activation by Helicobacter pylori, Salmonella enterica and Pseudomonas aeruginosa, but not Campylobacter spp.\", \"venue\": \"European Journal of Microbiology & Immunology\", \"year\": 2021, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://akjournals.com/downloadpdf/journals/1886/11/4/article-p95.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8830411, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2028467\", \"name\": \"Nicole Tegtmeyer\"}, {\"authorId\": \"2051433072\", \"name\": \"Delara Soltan Esmaeili\"}, {\"authorId\": \"1489800551\", \"name\": \"I. Sharafutdinov\"}, {\"authorId\": \"100592195\", \"name\": \"Jakob Knorr\"}, {\"authorId\": \"145408987\", \"name\": \"M. Naumann\"}, {\"authorId\": \"2095898\", \"name\": \"T. Alter\"}, {\"authorId\": \"1899290\", \"name\": \"S. Backert\"}], \"abstract\": \"Transcription factors of the nuclear factor kappa-light-chain-enhancer of activated B cells (NF-\\u03baB) family control important signaling pathways in the regulation of the host innate immune system. Various bacterial pathogens in the human gastrointestinal tract induce NF-\\u03baB activity and provoke proinflammatory signaling events in infected epithelial cells. NF-\\u03baB activation requires the phosphorylation-dependent proteolysis of inhibitor of \\u03baB (I\\u03baB) molecules including the NF-\\u03baB precursors through ubiquitin-mediated proteolysis. The canonical NF-\\u03baB pathway merges on I\\u03baB kinases (IKKs), which are required for signal transduction. Using CRISPR-Cas9 technology, secreted embryonic alkaline phosphatase (SEAP) reporter assays and cytokine enzyme-linked immunosorbent assay (ELISA), we demonstrate that the actin-binding protein cortactin is involved in NF-\\u03baB activation and subsequent interleukin-8 (IL-8) production upon infection by Helicobacter pylori, Salmonella enterica and Pseudomonas aeruginosa. Our data indicate that cortactin is needed to efficiently activate the c-Sarcoma (Src) kinase, which can positively stimulate NF-\\u03baB during infection. In contrast, cortactin is not involved in activation of NF-\\u03baB and IL-8 expression upon infection with Campylobacter species C. jejuni, C. coli or C. consisus, suggesting that Campylobacter species pluralis (spp.) induce a different signaling pathway upstream of cortactin to trigger the innate immune response.\"}, {\"paperId\": \"019dbe2231f3e3b8f8aa923c82a502d8744c1cda\", \"externalIds\": {\"PubMedCentral\": \"9680875\", \"DOI\": \"10.1021/acssynbio.2c00409\", \"CorpusId\": 253267265, \"PubMed\": \"36326101\"}, \"title\": \"Control of \\u03bb Lysogenic Escherichia coli Cells by Synthetic \\u03bb Phage Carrying cIantisense\", \"venue\": \"ACS Synthetic Biology\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1021/acssynbio.2c00409\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9680875, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2110756757\", \"name\": \"Ho Joung Lee\"}, {\"authorId\": \"2145489771\", \"name\": \"H. Kim\"}, {\"authorId\": \"48601747\", \"name\": \"S. J. Lee\"}], \"abstract\": \"Enterobacterial phage \\u03bb is a temperate phage that infects Escherichia coli and has a lytic\\u2013lysogenic life cycle. CI, a \\u03bb repressor, regulates the expression of lytic transcripts and acts as a major genetic switch that determines the lysogenic state. To manipulate the genome of phage \\u03bb, the CRISPR-Cas9 genome editing system was constructed in lysogenic E. coli MG1655 cells. For instance, we successfully changed cI857 to cIWT in the phage genome through Cas9-mediated single-nucleotide editing. A lytic phage was prepared by introducing an amber mutation in the middle of the cI gene, but it could not lyse lysogenic MG1655 cells. We prepared a phage expressing cI antisense mRNA by reverse substitution of the cI gene. Lysis of \\u03bb cI857 lysogenic cells occurred by the infection of the \\u03bb cIantisense. These results suggest an effective lysogenic cell control method by a synthetic phage expressing antisense mRNA of the genetic switch gene. It is expected to be applied as a tool to control harmful lysogenic microorganisms.\"}, {\"paperId\": \"019e86cf05078a2a88629d785113068e9e1ca8a0\", \"externalIds\": {\"PubMedCentral\": \"10349965\", \"DOI\": \"10.1101/2023.03.07.531588\", \"CorpusId\": 257431459, \"PubMed\": \"37461457\"}, \"title\": \"Inactivation of phosphodiesterase-4B gene in rat nucleus accumbens shell by CRISPR/Cas9 modulates the motivation to chronically self-administer nicotine\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10349965\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10349965, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2021661\", \"name\": \"B. Sharp\"}, {\"authorId\": \"2113804455\", \"name\": \"Qin Jiang\"}, {\"authorId\": \"2038110902\", \"name\": \"Panjun Kim\"}, {\"authorId\": \"2149050510\", \"name\": \"Hao Chen\"}], \"abstract\": \"Large scale human genome wide association studies (GWAS) have identified a growing pool of genes associated with cigarette smoking. One of the most prominent, phosphodiesterase-4B (PDE4B), has been associated with multiple smoking phenotypes. Although PDE4B modulates the half-life of neuronal cAMP, its precise role in smoking behaviors is unknown. To address this knowledge gap, we used a reverse translational approach. We inactivated PDE4B in bilateral medial nucleus accumbens shell (NAcs) neurons by injecting AAV containing a specific gRNA in female transgenic Cas9+ Long Evans rats. These rats then were given 23-hour chronic access to nicotine intravenous self-administration (IVSA) under a schedule of increasing fixed ratios (FR). With the increased effort required at FR7, nicotine SA (i.e. active presses and drug infusions) declined significantly in controls, whereas it was maintained in the mutagenized group. A progressive ratio (PR) study also showed significantly greater cumulative nicotine infusions in the mutant group. Hence, we hypothesized that enhanced PDE4B protein activity would reduce nicotine IVSA. A positive allosteric modulator,2-(3-(4-chloro-3-fluorophenyl)-5-ethyl-1H-1,2,4-triazol-1-yl)-N-(3,5-dichlorobenzyl)acetamide (MR-L2), was microinfused into NAcs bilaterally at FR3 or FR5; in both cohorts, MR-L2 acutely reduced nicotine IVSA. In summary, these studies show that the activity of PDE4B regulates the capacity of NAcs to maintain nicotine IVSA in face of the cost of increasing work. This finding and the results of the PR study indicate that PDE4B affects the motivation to obtain nicotine. These reverse translational studies in rats provide insight into the motivational effects of NAcs PDE4B that advance our understanding of the smoking behaviors mapped in human GWAS.\"}, {\"paperId\": \"01a13e86931488b0823558090f4d21166f2b8ddc\", \"externalIds\": {\"DOI\": \"10.1007/s00436-022-07739-6\", \"CorpusId\": 254273503, \"PubMed\": \"36471092\"}, \"title\": \"Effect of deleting four Toxoplasma gondii calcium-binding EGF domain-containing proteins on parasite replication and virulence\", \"venue\": \"Parasitology Research\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00436-022-07739-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00436-022-07739-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1524736862\", \"name\": \"Xin-Cheng Wang\"}, {\"authorId\": \"48779635\", \"name\": \"Ting-Ting Li\"}, {\"authorId\": \"6772715\", \"name\": \"H. Elsheikha\"}, {\"authorId\": \"2220672696\", \"name\": \"Xiao-Nan Zheng\"}, {\"authorId\": \"2110819047\", \"name\": \"Dandan Zhao\"}, {\"authorId\": \"5251113\", \"name\": \"Jin-Lei Wang\"}, {\"authorId\": \"48958207\", \"name\": \"Meng Wang\"}, {\"authorId\": \"4898337\", \"name\": \"Xing-Quan Zhu\"}], \"abstract\": null}, {\"paperId\": \"01a6897aa0366166841147fac33430008f92be33\", \"externalIds\": {\"PubMedCentral\": \"11091187\", \"DOI\": \"10.1038/s41598-024-61626-x\", \"CorpusId\": 269760994, \"PubMed\": \"38741006\"}, \"title\": \"CRISPR/Cas9 genome editing of CCR5 combined with C46 HIV-1 fusion inhibitor for cellular resistant to R5 and X4 tropic HIV-1\", \"venue\": \"Scientific Reports\", \"year\": 2024, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-024-61626-x.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11091187, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47212130\", \"name\": \"Wannisa Khamaikawin\"}, {\"authorId\": \"2266625938\", \"name\": \"Chonticha Saisawang\"}, {\"authorId\": \"6520595\", \"name\": \"B. Tassaneetrithep\"}, {\"authorId\": \"7736032\", \"name\": \"Kanit Bhukhai\"}, {\"authorId\": \"6723357\", \"name\": \"Phetcharat Phanthong\"}, {\"authorId\": \"5734614\", \"name\": \"S. Borwornpinyo\"}, {\"authorId\": \"11704362\", \"name\": \"A. Phuphuakrat\"}, {\"authorId\": \"6579959\", \"name\": \"E. Pasomsub\"}, {\"authorId\": \"8956224\", \"name\": \"Sujittra Chaisavaneeyakorn\"}, {\"authorId\": \"5287715\", \"name\": \"U. Anurathapan\"}, {\"authorId\": \"6251032\", \"name\": \"N. Apiwattanakul\"}, {\"authorId\": \"1786349\", \"name\": \"S. Hongeng\"}], \"abstract\": \"Hematopoietic stem-cell (HSC) transplantation using a donor with a homozygous mutation in the HIV co-receptor CCR5 (CCR5\\u039432/\\u039432) holds great promise as a cure for HIV-1. Previously, there were three patients that had been reported to be completely cured from HIV infection by this approach. However, finding a naturally suitable Human Leukocyte Antigen (HLA)-matched homozygous CCR5\\u039432 donor is very difficult. The prevalence of this allele is only 1% in the Caucasian population. Therefore, additional sources of CCR5\\u039432/\\u039432 HSCs are required. The Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)/CRISPR-associated (Cas) system is one method to mediate CCR5 knockout in HSCs that has been successfully employed as a gene editing tool in clinical trials. Additional anti-HIV-1 strategies are still required for broad-spectrum inhibition of HIV-1 replication. Here in this study, we combined an additional anti-HIV-1 therapy, which is C46, a cell membrane-anchored HIV-1 fusion inhibitor with the CRISPR/Cas9 mediated knockout CCR5. The combined HIV-1 therapeutic genes were investigated for the potential prevention of both CCR5 (R5)- and CXCR4 (X4)-tropic HIV-1 infections in the MT4CCR5 cell line. The combinatorial CRISPR/Cas9 therapies were superior compared to single method therapy for achieving the HIV-1 cure strategy and shows potential for future applications.\"}, {\"paperId\": \"01a6b4ea4cfbe09a1f4d850c443a2f6823fe3a64\", \"externalIds\": {\"PubMedCentral\": \"8909769\", \"DOI\": \"10.3390/cells11050853\", \"CorpusId\": 247342271, \"PubMed\": \"35269475\"}, \"title\": \"A Novel LHX6 Reporter Cell Line for Tracking Human iPSC-Derived Cortical Interneurons\", \"venue\": \"Cells\", \"year\": 2022, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/11/5/853/pdf?version=1646209123\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8909769, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2336861265\", \"name\": \"Maria Cruz-Santos\"}, {\"authorId\": \"5556985\", \"name\": \"L. Cardo\"}, {\"authorId\": \"2153101259\", \"name\": \"Meng Li\"}], \"abstract\": \"GABAergic interneurons control the neural circuitry and network activity in the brain. The dysfunction of cortical interneurons, especially those derived from the medial ganglionic eminence, contributes to neurological disease states. Pluripotent stem cell-derived interneurons provide a powerful tool for understanding the etiology of neuropsychiatric disorders, as well as having the potential to be used as medicine in cell therapy for neurological conditions such as epilepsy. Although large numbers of interneuron progenitors can be readily induced in vitro, the generation of defined interneuron subtypes remains inefficient. Using CRISPR/Cas9-assisted homologous recombination in hPSCs, we inserted the coding sequence of mEmerald and mCherry fluorescence protein, respectively, downstream that of the LHX6, a gene required for, and a marker of medial ganglionic eminence (MGE)-derived cortical interneurons. Upon differentiation of the LHX6-mEmerald and LHX6-mCherry hPSCs towards the MGE fate, both reporters exhibited restricted expression in LHX6+ MGE derivatives of hPSCs. Moreover, the reporter expression responded to changes of interneuron inductive cues. Thus, the LHX6-reporter lines represent a valuable tool to identify molecules controlling human interneuron development and design better interneuron differentiation protocols as well as for studying risk genes associated with interneuronopathies.\"}, {\"paperId\": \"01a7acaa62a776f6f264aaf60d11ead2a9d6550d\", \"externalIds\": {\"PubMedCentral\": \"8347876\", \"DOI\": \"10.3390/ijms22157915\", \"CorpusId\": 236945698, \"PubMed\": \"34360680\"}, \"title\": \"Arabidopsis OSMOTIN 34 Functions in the ABA Signaling Pathway and Is Regulated by Proteolysis\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/15/7915/pdf?version=1627349351\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8347876, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2113344352\", \"name\": \"E. Park\"}, {\"authorId\": \"48271223\", \"name\": \"Tae-Houn Kim\"}], \"abstract\": \"Plants have evolutionarily established resistance responses to a variety of abiotic stress conditions, in which ABA mediates the integrated regulation of these stress responses. Numerous proteins function at the transcription level or at the protein level when contributing to controls of the ABA signaling process. Although osmotin is identified as a salt-inducible protein, its function in the abiotic stress response is yet to be elucidated. To examine the role of Arabidopsis OSMOTIN 34 (OSM34) in the ABA signaling pathway, a deletion mutant osm34 generated by a CRISPR/Cas9 system and the double mutant osm34 osml (osmotin 34-like) were analyzed for various ABA responses. Both osm34 and osm34 osml showed reduced levels of ABA responses in seeds and leaves. Moreover, proline level and expression of the proline biosynthesis gene P5CS1 was significantly reduced in osm34 osml. Interestingly, OSM34 binds to SKP2A, an F-Box protein whose transcription is induced by ABA. The protein stability of OSM34 was determined to be under the control of the 26S proteasome. In conclusion, our data suggest that OSM34 functions as a positive regulator in the generation of ABA responses and is under post-translational control.\"}, {\"paperId\": \"01ac14b3a4bd9aaddb0fe3cafb39be6cbe400e09\", \"externalIds\": {\"PubMedCentral\": \"8860247\", \"DOI\": \"10.3389/fcell.2022.769862\", \"CorpusId\": 237425092, \"PubMed\": \"35198555\"}, \"title\": \"ERM-1 Phosphorylation and NRFL-1 Redundantly Control Lumen Formation in the C. elegans Intestine\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2022.769862/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8860247, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1768734355\", \"name\": \"Jorian J. Sepers\"}, {\"authorId\": \"39224917\", \"name\": \"J. J. Ramalho\"}, {\"authorId\": \"50684604\", \"name\": \"Jason R. Kroll\"}, {\"authorId\": \"2087009463\", \"name\": \"R. Schmidt\"}, {\"authorId\": \"46437729\", \"name\": \"M. Boxem\"}], \"abstract\": \"Reorganization of the plasma membrane and underlying actin cytoskeleton into specialized domains is essential for the functioning of most polarized cells in animals. Proteins of the ezrin-radixin-moesin (ERM) and Na+/H+ exchanger 3 regulating factor (NHERF) family are conserved regulators of cortical specialization. ERM proteins function as membrane-actin linkers and as molecular scaffolds that organize the distribution of proteins at the membrane. NHERF proteins are PDZ-domain containing adapters that can bind to ERM proteins and extend their scaffolding capability. Here, we investigate how ERM and NHERF proteins function in regulating intestinal lumen formation in the nematode Caenorhabditis elegans. C. elegans has single ERM and NHERF family proteins, termed ERM-1 and NRFL-1, and ERM-1 was previously shown to be critical for intestinal lumen formation. Using CRISPR/Cas9-generated nrfl-1 alleles we demonstrate that NRFL-1 localizes at the intestinal microvilli, and that this localization is depended on an interaction with ERM-1. However, nrfl-1 loss of function mutants are viable and do not show defect in intestinal development. Interestingly, combining nrfl-1 loss with erm-1 mutants that either block or mimic phosphorylation of a regulatory C-terminal threonine causes severe defects in intestinal lumen formation. These defects are not observed in the phosphorylation mutants alone, and resemble the effects of strong erm-1 loss of function. The loss of NRFL-1 did not affect the localization or activity of ERM-1. Together, these data indicate that ERM-1 and NRFL-1 function together in intestinal lumen formation in C. elegans. We postulate that the functioning of ERM-1 in this tissue involves actin-binding activities that are regulated by the C-terminal threonine residue and the organization of apical domain composition through NRFL-1.\"}, {\"paperId\": \"01ad087b871551f70e3f6905a041019ca2db42b7\", \"externalIds\": {\"PubMedCentral\": \"8255424\", \"DOI\": \"10.1093/noajnl/vdab070.069\", \"CorpusId\": 235756060}, \"title\": \"OTME-18. Targeted CRISPR/Cas9 gene-editing regulates the brain tumor environment\", \"venue\": \"Neuro-Oncology Advances\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/noajnl/vdab070.069\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8255424, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2150211437\", \"name\": \"J. Perez\"}, {\"authorId\": \"2044973325\", \"name\": \"J. Fierro\"}, {\"authorId\": \"47933257\", \"name\": \"R. Aguilar\"}, {\"authorId\": \"145397138\", \"name\": \"H. Dou\"}], \"abstract\": \"Abstract Glioblastoma multiform (GBM) is the most common malignant brain tumor. Recent immunotherapy has demonstrated potential to treat GBM. However, the immune suppressive tumor environment in the brain represents a significant barrier for the treatment of GBM. Overexpression of programmed death ligand-1 (PD-L1) in GBM tumor cells and macrophages plays a key role in GBM vitality, proliferation, and migration, while also suppressing the immune system. We developed a CRISPR/Cas9 gene-editing system to delete whole cell PD-L1. Human PD-L1 targeted sgRNA were cloned into CRISPR/Cas9 plasmids with or without an HDR templet. CRISPR/Cas9 were treated to human GBM U87 cells for 15, 30, 60, 120 and 240 minutes. The intracellular concentration of CRISPR/Cas9 exhibited a time-dependent increases. A GFP tagged CRISPR/Cas9 plasmid was developed to test the transfection efficacy. Higher levels of GFP+ U87 cells were observed at day 3. CRISPR/Cas9 showed a greater PD-L1 knockout at day 3. The PD-L1 reduction limited the proliferation of U87 cells. A scratch assay showed that PD-L1 deletion inhibited the migration of U87 cells. An in vitro GBM model was developed by co-cultivation of U87 cells and macrophages. CRISPR/Cas9 treated co-cultures changed the ratios of U87 cells and macrophages and polarized tumor associated macrophages (TAM) from M2 toward M1. CRISPR/Cas9 gene-editing effectively deleted PD-L1 in U87 cells. Successful deletion of PD-L1 prevented U87 cells growth and migration, and altered the TAMs plasticity and the tumor environment.\"}, {\"paperId\": \"01ae6325d72ff466fc4b7dd01ecf699ab46fa517\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-2920\", \"CorpusId\": 268651020}, \"title\": \"Abstract 2920: Targeting integrin alpha V beta 5 heterodimer stability using a novel small molecular inhibitor for tumor suppression\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-2920?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-2920, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2091161899\", \"name\": \"Nicole M Mattson\"}, {\"authorId\": \"2282941691\", \"name\": \"Kazuya Miyashita\"}, {\"authorId\": \"153748767\", \"name\": \"Anthony K. N. Chan\"}, {\"authorId\": \"2282973786\", \"name\": \"Lu Yang\"}, {\"authorId\": \"2066699621\", \"name\": \"S. Pokharel\"}, {\"authorId\": \"2266185831\", \"name\": \"Wei Lu\"}, {\"authorId\": \"2124902415\", \"name\": \"Mingli Li\"}, {\"authorId\": \"2145484953\", \"name\": \"Qiao Liu\"}, {\"authorId\": \"51302741\", \"name\": \"Xiaobao Xu\"}, {\"authorId\": \"2282605037\", \"name\": \"Mingye Feng\"}, {\"authorId\": \"2293015675\", \"name\": \"Chun-Wei Chen\"}], \"abstract\": \"\\n The cell surface proteome provides a pivotal interphase that connects the intracellular signaling with external environments, which may harbor molecular targets for therapeutic development. To identify essential cell surface proteins in cancers, we established a CRISPR library that contains 2,910 sgRNAs targeting 582 genes encoding cell surface receptors (to cytokines, extracellular matrices [ECM], etc.), molecular channels, and signaling components. We then screened this library in 3 solid cancer (MDA-MB-231, SW620, PANC1) and 3 liquid cancer (MV4-11, HUT78, CCRF-CEM) cell models expressing the Cas9 endonuclease, and observed an essential role of ITGAV (Integrin Alpha V) specifically in the solid cancer. As integrins require the dimerization between an alpha and beta subunit to function as cell surface ECM receptors, we further developed a focused CRISPR library with 650 sgRNAs targeting all 26 integrin alpha and beta subunits. This validation screen revealed a strong correlation between ITGAV and ITGB5 (Integrin Beta 5) in solid tumors. CRISPR targeting either ITGAV or ITGB5 led to attenuated cell proliferation with increased cell cycle stalling and apoptosis. Knockout of ITGAV-ITGB5 also suppressed the capacity of tumor cells to migrate and invade through the ECM, highlighting the therapeutic benefit via blocking the ITGAV-ITGB5 heterodimer. To identify novel compounds that can disrupt ITGAV-ITGB5 dimerization, we first modeled a 3D crystal structure of ITGAV (PDB ID: 3IJE) using AutoSite (Scripps) to reveal the protein surface pockets amenable to the small molecular binding. This analysis revealed an AVB pocket at the N-terminal extracellular domain of ITGAV, which is in close contact with the beta subunit. CRISPR targeting this AVB pocket abolished the ITGAV-ITGB5 heterodimers (detected by an AV-B5-complex antibody) and induced rapid cell death, rationalizing this pocket for further therapeutic development. Based on these observations, we computationally docked >100,000 compounds from the NCI DTP Open Chemicals Repository using AutoDock Vina (Scripps), subsequently obtaining the top 500 binder compounds for in-lab validation, and identified a lead AVB pocket inhibitor \\u201cCpd_2\\u201d (C32H40N4). Treatment of Cpd_2 killed tumor cells and diminished the AV-B5-complex antibody stain. Furthermore, we confirmed the capacity of Cpd_2 to dissociate ITGAV and ITGB5 on the cell surface by a NanoBRET energy transfer system. Of note, while the traditional ITGAV inhibitor cilengitide (an RGD peptide mimic) blocked the ECM interaction and detached the cells from TC dishes, they failed to dissociate the ITGAV-ITGB5 heterodimer nor induce rapid cell death. In summary, our study highlights a novel strategy of targeting the ITGAV-ITGB5 heterodimer stability by the small molecular inhibitor Cpd_2 for future anti-tumor treatment.\\n Citation Format: Nicole Mattson, Kazuya Miyashita, Anthony Chan, Lu Yang, Sheela Pangeni Pokharel, Wei Lu, Mingli Li, Qiao Liu, Xiaobao Xu, Mingye Feng, Chun-Wei Chen. Targeting integrin alpha V beta 5 heterodimer stability using a novel small molecular inhibitor for tumor suppression [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 2920.\"}, {\"paperId\": \"01b99251210dea3221d4852ce0ac9e5bd1370bf7\", \"externalIds\": {\"MAG\": \"3133669272\", \"DOI\": \"10.15389/AGROBIOLOGY.2021.1.20RUS\", \"CorpusId\": 233834439}, \"title\": \"\\u0421\\u0415\\u041a\\u0412\\u0415\\u041d\\u0418\\u0420\\u041e\\u0412\\u0410\\u041d\\u0418\\u0415 \\u041f\\u0420\\u041e\\u041c\\u041e\\u0422\\u041e\\u0420\\u041e\\u0412 \\u0413\\u0415\\u041d\\u041e\\u0412 U6 \\u041a\\u041b\\u0415\\u0429\\u0415\\u0412\\u0418\\u041d\\u042b (Ricinus communis L.) \\u0418 \\u0421\\u041e\\u0417\\u0414\\u0410\\u041d\\u0418\\u0415 \\u041d\\u0410 \\u0418\\u0425 \\u041e\\u0421\\u041d\\u041e\\u0412\\u0415 \\u0412\\u0415\\u041a\\u0422\\u041e\\u0420\\u041e\\u0412 \\u0414\\u041b\\u042f \\u0413\\u0415\\u041d\\u041e\\u041c\\u041d\\u041e\\u0413\\u041e \\u0420\\u0415\\u0414\\u0410\\u041a\\u0422\\u0418\\u0420\\u041e\\u0412\\u0410\\u041d\\u0418\\u042f \\u0421 \\u041f\\u041e\\u041c\\u041e\\u0429\\u042c\\u042e \\u0421\\u0418\\u0421\\u0422\\u0415\\u041c\\u042b CRISPR/Cas9\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.15389/agrobiology.2021.1.20rus\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15389/AGROBIOLOGY.2021.1.20RUS?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15389/AGROBIOLOGY.2021.1.20RUS, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2093092783\", \"name\": \"\\u041e.\\u0421. \\u0410\\u043b\\u0435\\u043a\\u0441\\u0430\\u043d\\u0434\\u0440\\u043e\\u0432\"}, {\"authorId\": \"90171586\", \"name\": \"\\u0424\\u0433\\u0431\\u043d\\u0443 \\u0412\\u0441\\u0435\\u0440\\u043e\\u0441\\u0441\\u0438\\u0439\\u0441\\u043a\\u0438\\u0439 \\u041d\\u0438\\u0438 \\u0441\\u0435\\u043b\\u044c\\u0441\\u043a\\u043e\\u0445\\u043e\\u0437\\u044f\\u0439\\u0441\\u0442\\u0432\\u0435\\u043d\\u043d\\u043e\\u0439 \\u0431\\u0438\\u043e\\u0442\\u0435\\u0445\\u043d\\u043e\\u043b\\u043e\\u0433\\u0438\\u0438\"}], \"abstract\": null}, {\"paperId\": \"01bc86dec78d9680acdc3297e321c663659fe0c3\", \"externalIds\": {\"DOI\": \"10.1266/ggs.21-00024\", \"CorpusId\": 237617740, \"PubMed\": \"34556622\"}, \"title\": \"The Drosophila Neprilysin 4 gene is essential for sperm function following sperm transfer to females.\", \"venue\": \"Genes & Genetic Systems\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1266/ggs.21-00024\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1266/ggs.21-00024?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1266/ggs.21-00024, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15552468\", \"name\": \"T. Ohsako\"}, {\"authorId\": \"89151979\", \"name\": \"Machi Shirakami\"}, {\"authorId\": \"2127972726\", \"name\": \"Kazuharu Oiwa\"}, {\"authorId\": \"98390463\", \"name\": \"Kimihide Ibaraki\"}, {\"authorId\": \"39455556\", \"name\": \"T. Karr\"}, {\"authorId\": \"47611496\", \"name\": \"M. Tomaru\"}, {\"authorId\": \"4844726\", \"name\": \"Rikako Sanuki\"}, {\"authorId\": \"1404390257\", \"name\": \"T. Takano-Shimizu-Kouno\"}], \"abstract\": \"Sperm are modified substantially in passing through both the male and the female reproductive tracts, only thereafter becoming functionally competent to fertilize eggs. Drosophila sperm become motile in the seminal vesicle; after ejaculation, they interact with seminal fluid proteins and undergo biochemical changes on their surface while they are stored in the female sperm storage organs. However, the molecular mechanisms underlying these maturation processes remain largely unknown. Here, we focused on Drosophila Neprilysin genes, which are the fly orthologs of the mouse Membrane metallo-endopeptidase-like 1 (Mmel1) gene. While Mmel1 knockout male mice have reduced fertility without abnormality in either testis morphology or sperm motility, there are inconsistent results regarding the association of any Neprilysin gene with male fertility in Drosophila. We examined the association of the Nep1-5 genes with male fertility by RNAi and found that Nep4 gene function is specifically required in germline cells. To investigate this in more detail, we induced mutations in the Nep4 gene by the CRISPR/Cas9 system and isolated two mutants, both of which were viable and female fertile, but male sterile. The mutant males had normal-looking testes and sperm; during copulation, sperm were transferred to females and stored in the seminal receptacle and paired spermathecae. However, following sperm transfer and storage, three defects were observed for Nep4 mutant sperm. First, sperm were quickly discarded by the females; second, the proportion of eggs fertilized was significantly lower for mutant sperm than for control sperm; and third, most eggs laid did not initiate development after sperm entry. Taking these observations together, we conclude that the Nep4 gene is essential for sperm function following sperm transfer to females.\"}, {\"paperId\": \"01bc9b904156672ce8970bd41b20d8a2c0b0b7cf\", \"externalIds\": {\"PubMedCentral\": \"7733971\", \"MAG\": \"3107713709\", \"DOI\": \"10.3389/fpls.2020.600021\", \"CorpusId\": 227217857, \"PubMed\": \"33329664\"}, \"title\": \"RSD1 Is Essential for Stomatal Patterning and Files in Rice\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2020, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2020.600021/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7733971, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116044508\", \"name\": \"Qi Yu\"}, {\"authorId\": \"2146032444\", \"name\": \"Liang Chen\"}, {\"authorId\": \"1471203281\", \"name\": \"Wenqi Zhou\"}, {\"authorId\": \"2029325859\", \"name\": \"Yanhuang An\"}, {\"authorId\": \"50119925\", \"name\": \"Tengxiao Luo\"}, {\"authorId\": \"2109717312\", \"name\": \"Zhongliang Wu\"}, {\"authorId\": \"2287406490\", \"name\": \"Yuqi Wang\"}, {\"authorId\": \"1850715113\", \"name\": \"Yunfeng Xi\"}, {\"authorId\": \"39592484\", \"name\": \"Longfeng Yan\"}, {\"authorId\": \"5347484\", \"name\": \"S. Hou\"}], \"abstract\": \"Stomatal density is an important factor that determines the efficiency of plant gas exchange and water transpiration. Through forward genetics, we screened a mutant rice stomata developmental defect 1 (rsd1-1) with decreased stomatal density and clustered stomata in rice (Oryza sativa). After the first asymmetric division, some of the larger sister cells undergo an extra asymmetric division to produce a small cell neighboring guard mother cell. Some of these small cells develop into stomata, which leads to stomatal clustering, and the rest arrested or developed into pavement cell. After map-based cloning, we found the protein encoded by this gene containing DUF630 and DUF632 domains. Evolutionary analysis showed that the DUF630/632 gene family differentiated earlier in land plants. It was found that the deletion of RSD1 would lead to the disorder of gene expression regarding stomatal development, especially the expression of stomatal density and distribution 1 (OsSDD1). Through the construction of OsSDD1 deletion mutants by CRISPR-Cas9, we found that, similar to rsd1 mutants, the ossdd1 mutants have clustered stomata and extra small cells adjacent to the stomata. OsSDD1 and RSD1 are both required for inhibiting ectopic asymmetric cell divisions (ACDs) and clustered stomata. By dehydration stress assay, the decreased stomatal density of rsd1 mutants enhanced their dehydration avoidance. This study characterized the functions of RSD1 and OsSDD1 in rice stomatal development. Our findings will be helpful in developing drought-resistant crops through controlling the stomatal density.\"}, {\"paperId\": \"01bd370e9b9d6288cebcb44aebd9839b2f9e81a0\", \"externalIds\": {\"DOI\": \"10.1101/2021.09.09.459666\", \"CorpusId\": 237495275}, \"title\": \"Multiplex knockout of trichome-regulating MYBs in poplar affects light sensitivity and triterpene accumulation\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/plphys/article-pdf/189/2/516/43913999/kiac128.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.09.09.459666?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.09.09.459666, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"89769877\", \"name\": \"W. P. Bewg\"}, {\"authorId\": \"2056345784\", \"name\": \"S. Harding\"}, {\"authorId\": \"3128127\", \"name\": \"N. Engle\"}, {\"authorId\": \"32080831\", \"name\": \"B. Vaidya\"}, {\"authorId\": \"2969860\", \"name\": \"Jingyin Yu\"}, {\"authorId\": \"2068015767\", \"name\": \"Ran Zhou\"}, {\"authorId\": \"2126517319\", \"name\": \"J. Reeves\"}, {\"authorId\": \"2067730450\", \"name\": \"Thomas Horn\"}, {\"authorId\": \"3794505\", \"name\": \"N. Joshee\"}, {\"authorId\": \"143790958\", \"name\": \"J. Jenkins\"}, {\"authorId\": \"39323696\", \"name\": \"S. Shu\"}, {\"authorId\": \"5584309\", \"name\": \"K. Barry\"}, {\"authorId\": \"35463079\", \"name\": \"Y. Yoshinaga\"}, {\"authorId\": \"32663554\", \"name\": \"J. Grimwood\"}, {\"authorId\": \"4918317\", \"name\": \"Robert J. Schmitz\"}, {\"authorId\": \"144816375\", \"name\": \"J. Schmutz\"}, {\"authorId\": \"2362469\", \"name\": \"T. Tschaplinski\"}, {\"authorId\": \"1783183\", \"name\": \"Chung-Jui Tsai\"}], \"abstract\": \"Hair-like trichomes cover the aerial organs of many plant species and act as a barrier between a plant and its environment. They function in defense against biotic and abiotic stresses, while also serving as sites for synthesis and storage of secondary metabolites. Previously, the transcription factor PtaMYB186 was identified as a positive regulator of trichome initiation during early stages of leaf development in Populus tremula x P. alba (IRNA 717-1B4). However, trichome regulation in poplar remains largely unexplored, as does the functional redundancy of duplicated poplar genes. Here, we employed CRISPR/Cas9 to target a consensus region of PtaMYB186 and its close paralogs for knockout. Regeneration of glabrous mutants suggested their essential roles in poplar trichome development. No apparent differences in growth and leaf transpiration rates between the mutants and the controls were observed, but trichomeless poplars showed increased insect pest susceptibility. RNA-seq analysis revealed widespread down-regulation of circadian- and light-responsive genes in the mutants. When exposed to a high light regime, trichomeless mutants accumulated significantly higher levels of photoprotective anthocyanins. Cuticular wax and whole leaf analyses showed a complete absence of triterpenes in the mutants, suggesting biosynthesis and storage of triterpenes in poplar occurs in the non-glandular trichomes. This work also demonstrates that a single gRNA with SNP-aware design is sufficient for multiplex targeting of paralogous genes in outcrossing and/or hybrid species with unexpected copy number variations. ONE SENTENCE SUMMARY Non-glandular trichomes in poplar have roles both as a physical barrier and a chemical factory to mediate plant interactions with the environment.\"}, {\"paperId\": \"01be545bd64f54bf192c509f1b5a86b5608387d8\", \"externalIds\": {\"PubMedCentral\": \"7590446\", \"MAG\": \"3095500846\", \"DOI\": \"10.1186/s13041-020-00688-0\", \"CorpusId\": 225076689, \"PubMed\": \"33109226\"}, \"title\": \"Intrinsic braking role of descending locus coeruleus noradrenergic neurons in acute and chronic itch in mice\", \"venue\": \"Molecular Brain\", \"year\": 2020, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://molecularbrain.biomedcentral.com/track/pdf/10.1186/s13041-020-00688-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7590446, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46804524\", \"name\": \"Keisuke Koga\"}, {\"authorId\": \"2066479173\", \"name\": \"Y. Shiraishi\"}, {\"authorId\": \"34685260\", \"name\": \"Ryo Yamagata\"}, {\"authorId\": \"1399543503\", \"name\": \"H. Tozaki-Saitoh\"}, {\"authorId\": \"1402532018\", \"name\": \"Miho Shiratori-Hayashi\"}, {\"authorId\": \"8339313\", \"name\": \"M. Tsuda\"}], \"abstract\": \"Itch is defined as an unpleasant sensation that provokes a desire to scratch. Our understanding of neuronal circuits for itch information transmission and processing in the spinal dorsal horn (SDH) has progressively advanced following the identification of SDH neuron subsets that are crucial for scratching behavior in models of itch. However, little is known about the control of acute and chronic itch by descending signals from the brain to the SDH. In this study, using genetic approaches that enable cell-type and circuit-specific functional manipulation, we reveal an intrinsic potential of locus coeruleus (LC)-noradrenergic (NAergic) neurons that project to the SDH to control acute and chronic itch. Activation and silencing of SDH-projecting LC-NAergic neurons reduced and enhanced scratching behavior, respectively, in models of histamine-dependent and -independent acute itch. Furthermore, in a model of chronic itch associated with contact dermatitis, repetitive scratching behavior was suppressed by the activation of the descending LC-NAergic pathway and by knocking out NA transporters specific to descending LC-NAergic neurons using a CRISPR-Cas9 system. Moreover, patch-clamp recording using spinal slices showed that noradrenaline facilitated inhibitory synaptic inputs onto gastrin-releasing peptide receptor-expressing SDH neurons, a neuronal subset known to be essential for itch transmission. Our findings suggest that descending LC-NAergic signaling intrinsically controls acute and chronic itch and provide potential therapeutic strategies for the treatment of acute and chronic itch.\"}, {\"paperId\": \"01c1d89adc2e1040c47496183a3a013155803cb5\", \"externalIds\": {\"DOI\": \"10.1136/ijgc-2024-igcs.461\", \"CorpusId\": 273462258}, \"title\": \"EV342/#765\\u2005 Identification of biomarkers associated with resistance to CDDP and ferroptosis/cuproptosis inducers in ovarian cancer using genome-scale CRISPR/Cas9 knockout technology and AI virtual screening\", \"venue\": \"E-Poster Viewing Abstracts\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/ijgc-2024-igcs.461?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/ijgc-2024-igcs.461, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145295966\", \"name\": \"Jinjiang Wang\"}], \"abstract\": null}, {\"paperId\": \"01c59972a4378b3ca0d334ba9f296bf8b63f1461\", \"externalIds\": {\"MAG\": \"3170442369\", \"PubMedCentral\": \"8442027\", \"DOI\": \"10.1128/jmbe.00106-21\", \"CorpusId\": 264615893, \"PubMed\": \"34594460\"}, \"title\": \"CRISPR-Cas9 Gene Editing in Yeast: A Molecular Biology and Bioinformatics Laboratory Module for Undergraduate and High School Students\", \"venue\": \"Journal of Microbiology & Biology Education\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/jmbe.00106-21\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8442027, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5254186\", \"name\": \"Saumya M. Sankaran\"}, {\"authorId\": \"2109795675\", \"name\": \"Justin D. Smith\"}, {\"authorId\": \"2061562999\", \"name\": \"Kevin R. Roy\"}], \"abstract\": \"CRISPR-Cas9 genome editing technology is widely used in scientific research and biotechnology. As this technology becomes a staple tool in life sciences research, it is increasingly important to incorporate it into biology curricula to train future scientists. ABSTRACT CRISPR-Cas9 genome editing technology is widely used in scientific research and biotechnology. As this technology becomes a staple tool in life sciences research, it is increasingly important to incorporate it into biology curricula to train future scientists. To demonstrate the molecular underpinnings and some limitations of CRISPR-based gene editing, we designed a laboratory module to accompany a discussion-based course on genome editing for college and advanced high school biology students. The laboratory module uses CRISPR-Cas9 to target and inactivate the ADE2 gene in Saccharomyces cerevisiae so as to give red colonies, employing an inexpensive yeast model system with a phenotypic readout that is easily detectable without specialized equipment. Students begin by accessing the yeast ADE2 sequence in a genome database, applying their understanding of Cas9 activity to design guide RNA (gRNA) sequences, using a CRISPR analysis tool to compare predicted on- and off-target effects of various gRNAs, and presenting and explaining their choice of an optimal gRNA to disrupt the ADE2 gene. They then conduct yeast transformations using Cas9 and preselected gRNA plasmids with or without donor templates to explore the importance of DNA repair pathways in genome editing. Lastly, they analyze the observed editing rates across different gRNAs targeting ADE2, leading to a discussion of editing efficiency. This module engages students in experimental design, provides hands-on experience with CRISPR-Cas9 gene editing and collaborative data analysis, and stimulates discussion on the uses and limitations of CRISPR-based gene editing technology.\"}, {\"paperId\": \"01ca415b81b64f52dd7cc3497c5d92e60420339b\", \"externalIds\": {\"DOI\": \"10.1186/s43042-021-00155-y\", \"CorpusId\": 233733834}, \"title\": \"HLA-A gene knockout using CRISPR/Cas9 system toward overcoming transplantation concerns\", \"venue\": \"Egyptian Journal of Medical Human Genetics\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jmhg.springeropen.com/track/pdf/10.1186/s43042-021-00155-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s43042-021-00155-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s43042-021-00155-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1575214226\", \"name\": \"Farshid Amiri\"}, {\"authorId\": \"26899565\", \"name\": \"M. Ranjbar\"}, {\"authorId\": \"151130750\", \"name\": \"Mohammad Pirouzfar\"}, {\"authorId\": \"2088174526\", \"name\": \"Marjan Nourigorji\"}, {\"authorId\": \"5764786\", \"name\": \"M. Dianatpour\"}], \"abstract\": \"The treatment of many cancers and genetic diseases relies on novel engraftment approaches such as cell therapy and hematopoietic stem cell transplantation (HSCT). However, these methods are hindered by the alloreactive immune responses triggered by incompatible human leukocyte antigen (HLA) molecules. A successful HSCT procedure requires the eradication of donor and recipient HLA alloimmunization. Eliminating HLA-A gene expression using clustered regularly interspaced short palindromic repeats/CRISPR-associated protein 9 nuclease (CRISPR/Cas9) could be a great approach to increase the possibility of a successful HSCT through extending pool of unrelated donors. Our dual gRNA approach introduced a large deletion in the HLA-A gene. Among 22 single-cloned cells, two clones (9.09%) and 11 clones (50%) received homozygous and heterozygous large deletions, respectively. Finally, the real-time PCR results also revealed that HLA-A gene expression was diminished significantly. The results suggested that CRISPR/Cas9 could be used as an efficient technique to introduce HLA-A gene knockout; thus, it can considerably lessen the burden of finding a fully matched donor by lowering the alleles required for a successful HSCT.\"}, {\"paperId\": \"01cb255b498245017a003ed03edffebe4f2e8337\", \"externalIds\": {\"DOI\": \"10.1039/d2nr04095f\", \"CorpusId\": 252887829, \"PubMed\": \"36255392\"}, \"title\": \"Microfluidic-assisted biomineralization of CRISPR/Cas9 in near-infrared responsive metal-organic frameworks for programmable gene-editing.\", \"venue\": \"Nanoscale\", \"year\": 2022, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://pubs.rsc.org/en/content/articlepdf/2022/nr/d2nr04095f\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1039/d2nr04095f?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1039/d2nr04095f, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144003042\", \"name\": \"Xiaoyu Xu\"}, {\"authorId\": \"2118484465\", \"name\": \"Chang Liu\"}, {\"authorId\": \"2151484889\", \"name\": \"Shengyi Wang\"}, {\"authorId\": \"2016417\", \"name\": \"E. M\\u00e4kil\\u00e4\"}, {\"authorId\": \"2109656107\", \"name\": \"Jiali Wang\"}, {\"authorId\": \"2047071027\", \"name\": \"Oliver Koivisto\"}, {\"authorId\": \"1785356971\", \"name\": \"Jun-Nian Zhou\"}, {\"authorId\": \"6423578\", \"name\": \"J. Rosenholm\"}, {\"authorId\": \"48084899\", \"name\": \"Y. Shu\"}, {\"authorId\": \"2119259503\", \"name\": \"Hongbo Zhang\"}], \"abstract\": \"Ribonucleoprotein (RNP) based CRISPR/Cas9 gene-editing system shows great potential in biomedical applications. However, due to the large size, charged surface and high biological sensitivity of RNP, its efficient delivery with precise control remains highly challenging. Herein, a microfluidic-assisted metal-organic framework (MOF) based biomineralization strategy is designed and utilized for the efficient delivery and remote regulation of CRISPR/Cas9 RNP gene editing. The strategy is realized by biomimetic growing of thermo-responsive EuMOFs onto photothermal template Prussian blue (PB). The RNP is loaded during MOFs crystallization in microfluidic channels. By adjusting different microfluidic parameters, well-defined and comparable RNP encapsulated nanocarrier (PB@RNP-EuMOFs) are obtained with high loading efficiency (60%), remarkable RNP protection and NIR-stimulated release capacity. Upon laser exposure, the nanocarrier induces effective endosomal escape (4 h) and precise gene knockout of green fluorescent protein by 40% over 2 days. Moreover, the gene-editing activity can be programmed by tuning exposure times (42% for three times and 47% for four times), proving more controllable and inducible editing modality compared to control group without laser irradiation. This novel microfluidic-assisted MOFs biomineralization strategy thus offers an attractive route to optimize delivery systems and reduce off-target side effects by NIR-triggered remote control of CRISPR/Cas9 RNP, improving the potential for its highly efficient and precise therapeutic application.\"}, {\"paperId\": \"01cc1bcddf0b495e437ebef037c9a3b27baead9b\", \"externalIds\": {\"DOI\": \"10.1002/smtd.202300069\", \"CorpusId\": 258566868, \"PubMed\": \"37156748\"}, \"title\": \"ptARgenOM\\u2014A Flexible Vector For CRISPR/CAS9 Nonviral Delivery\", \"venue\": \"Small Methods\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/smtd.202300069\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/smtd.202300069?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/smtd.202300069, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2216616276\", \"name\": \"Abdelmnim Radoua\"}, {\"authorId\": \"2190225789\", \"name\": \"Baptiste Pernon\"}, {\"authorId\": \"50521745\", \"name\": \"N. Pernet\"}, {\"authorId\": \"2266635765\", \"name\": \"C. Jean\"}, {\"authorId\": \"4697846\", \"name\": \"Mohammed I. Y. Elmallah\"}, {\"authorId\": \"2191495784\", \"name\": \"Abderrahmane Guerrache\"}, {\"authorId\": \"38885955\", \"name\": \"A. Constantinescu\"}, {\"authorId\": \"2216615575\", \"name\": \"Sofiane Hadj Hamou\"}, {\"authorId\": \"5342804\", \"name\": \"J. Devy\"}, {\"authorId\": \"3790975\", \"name\": \"O. Micheau\"}], \"abstract\": \"Viral\\u2010mediated delivery of the CRISPR\\u2010Cas9 system is one the most commonly used techniques to modify the genome of a cell, with the aim of analyzing the function of the targeted gene product. While these approaches are rather straightforward for membrane\\u2010bound proteins, they can be laborious for intracellular proteins, given that selection of full knockout (KO) cells often requires the amplification of single\\u2010cell clones. Moreover, viral\\u2010mediated delivery systems, besides the Cas9 and gRNA, lead to the integration of unwanted genetic material, such as antibiotic resistance genes, introducing experimental biases. Here, an alternative non\\u2010viral delivery approach is presented for CRISPR/Cas9, allowing efficient and flexible selection of KO polyclonal cells. This all\\u2010in\\u2010one mammalian CRISPR\\u2010Cas9 expression vector, ptARgenOM, encodes the gRNA and the Cas9 linked to a ribosomal skipping peptide sequence followed by the enhanced green fluorescent protein and the puromycin N\\u2010acetyltransferase, allowing for transient, expression\\u2010dependent selection and enrichment of isogenic KO cells. After evaluation using more than 12 distinct targets in 6 cell lines, ptARgenOM is found to be efficient in producing KO cells, reducing the time required to obtain a polyclonal isogenic cell line by 4\\u20136 folds. Altogether ptARgenOM provides a simple, fast, and cost\\u2010effective delivery tool for genome editing.\"}, {\"paperId\": \"01cc29e1c71ebde56e5a4f64bc5fa3eed76f8c9a\", \"externalIds\": {\"DOI\": \"10.1182/bloodadvances.2020003291\", \"CorpusId\": 233371948, \"PubMed\": \"33890979\"}, \"title\": \"Activated IL-6 signaling contributes to the pathogenesis of, and is a novel therapeutic target for, CALR-mutated MPNs.\", \"venue\": \"Blood Advances\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ashpublications.org/bloodadvances/article-pdf/5/8/2184/1805778/advancesadv2020003291.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/bloodadvances.2020003291?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/bloodadvances.2020003291, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5483356\", \"name\": \"M. Balliu\"}, {\"authorId\": \"4981157\", \"name\": \"L. Calabresi\"}, {\"authorId\": \"5784882\", \"name\": \"N. Bartalucci\"}, {\"authorId\": \"2070144460\", \"name\": \"Simone Romagnoli\"}, {\"authorId\": \"39437272\", \"name\": \"L. Maggi\"}, {\"authorId\": \"11732157\", \"name\": \"R. Manfredini\"}, {\"authorId\": \"1813990\", \"name\": \"M. Lulli\"}, {\"authorId\": \"4832517\", \"name\": \"P. Guglielmelli\"}, {\"authorId\": \"5699021\", \"name\": \"A. Vannucchi\"}], \"abstract\": \"Calreticulin (CALR), an endoplasmic reticulum-associated chaperone, is frequently mutated in myeloproliferative neoplasms (MPNs). Mutated CALR promotes downstream JAK2/STAT5 signaling through interaction with, and activation of, the thrombopoietin receptor (MPL). Here, we provide evidence of a novel mechanism contributing to CALR-mutated MPNs, represented by abnormal activation of the interleukin 6 (IL-6)-signaling pathway. We found that UT7 and UT7/mpl cells, engineered by clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated protein 9 (Cas9) to express the CALR type 1-like (DEL) mutation, acquired cytokine independence and were primed to the megakaryocyte (Mk) lineage. Levels of IL-6 messenger RNA (mRNA), extracellular-released IL-6, membrane-associated glycoprotein 130 (gp130), and IL-6 receptor (IL-6R), phosphorylated JAK1 and STAT3 (p-JAK1 and p-STAT3), and IL-6 promoter region occupancy by STAT3 all resulted in increased CALR DEL cells in the absence of MPL stimulation. Wild-type, but not mutated, CALR physically interacted with gp130 and IL-6R, downregulating their expression on the cell membrane. Agents targeting gp130 (SC-144), IL-6R (tocilizumab [TCZ]), and cell-released IL-6 reduced proliferation of CALR DEL as well as CALR knockout cells, supporting a mutated CALR loss-of-function model. CD34+ cells from CALR-mutated patients showed increased levels of IL-6 mRNA and p-STAT3, and colony-forming unit-Mk growth was inhibited by either SC144 or TCZ, as well as an IL-6 antibody, supporting cell-autonomous activation of the IL-6 pathway. Targeting IL-6 signaling also reduced colony formation by CD34+ cells of JAK2V617F-mutated patients. The combination of TCZ and ruxolitinib was synergistic at very low nanomolar concentrations. Overall, our results suggest that target inhibition of IL-6 signaling may have therapeutic potential in CALR, and possibly JAK2V617F, mutated MPNs.\"}, {\"paperId\": \"01d05fa3c5160ee07d96797bd76e87c372639db4\", \"externalIds\": {\"MAG\": \"3048136791\", \"PubMedCentral\": \"7414887\", \"DOI\": \"10.1038/s41598-020-70258-w\", \"CorpusId\": 263235247, \"PubMed\": \"32770110\"}, \"title\": \"A versatile bulk electrotransfection protocol for murine embryonic fibroblasts and iPS cells\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-70258-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7414887, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5617857\", \"name\": \"S. Eghbalsaied\"}, {\"authorId\": \"2248830172\", \"name\": \"Iqbal Hyder\"}, {\"authorId\": \"5326431\", \"name\": \"W. Kues\"}], \"abstract\": \"Although electroporation has been widely accepted as the main gene transfer tool, there is still considerable scope to improve the electroporation efficiency of exogenous DNAs into primary cells. Here, we developed a square-wave pulsing protocol using OptiMEM-GlutaMAX for highly efficient transfection of murine embryonic fibroblasts (MEF) and induced pluripotency stem (iPS) cells using reporter genes as well as gRNA/Cas9-encoding plasmids. An electrotransfection efficiency of\\u2009>\\u200995% was achieved for both MEF and iPS cells using reporter-encoding plasmids. The protocol was efficient for plasmid sizes ranging from 6.2 to 13.5 kb. Inducing the error prone non-homologous end joining repair by gRNA/Cas9 plasmid transfection, a high rate of targeted gene knockouts of up to 98% was produced in transgenic cells carrying a single-copy of Venus reporter. Targeted deletions in the Venus transgene were efficiently (up to 67% deletion rate) performed by co-electroporation of two gRNA-encoding plasmids. We introduced a plasmid electrotransfection protocol which is straight-forward, cost-effective, and efficient for CRISPRing murine primary cells. This protocol is promising to make targeted genetic engineering using the CRISPR/Cas9 plasmid system.\"}, {\"paperId\": \"01d06514ecfb76e9b6db14454e63eeb1f5ce6cf8\", \"externalIds\": {\"DOI\": \"10.1038/d41573-023-00011-1\", \"CorpusId\": 255747729, \"PubMed\": \"36631695\"}, \"title\": \"Synthetic cytokine circuit targets solid tumours\", \"venue\": \"Nature reviews. Drug discovery\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/d41573-023-00011-1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/d41573-023-00011-1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4162347\", \"name\": \"Sarah Crunkhorn\"}], \"abstract\": null}, {\"paperId\": \"01d40187cfe6e29c30e24f78dbc0fd9fb74528eb\", \"externalIds\": {\"MAG\": \"3088715399\", \"DOI\": \"10.1038/s41586-020-2674-1\", \"CorpusId\": 221884407, \"PubMed\": \"32968253\"}, \"title\": \"Zebrafish prrx1a mutants have normal hearts\", \"venue\": \"Nature\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8191740\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41586-020-2674-1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41586-020-2674-1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5604175\", \"name\": \"F. Tessadori\"}, {\"authorId\": \"2312194028\", \"name\": \"D. Bakker\"}, {\"authorId\": \"6913834\", \"name\": \"Lindsey Barske\"}, {\"authorId\": \"6913834\", \"name\": \"Lindsey Barske\"}, {\"authorId\": \"6913834\", \"name\": \"Lindsey Barske\"}, {\"authorId\": \"2054529798\", \"name\": \"Nellie Nelson\"}, {\"authorId\": \"1964192934\", \"name\": \"H. Algra\"}, {\"authorId\": \"3501030\", \"name\": \"S. Willekers\"}, {\"authorId\": \"31605091\", \"name\": \"J. Nichols\"}, {\"authorId\": \"144387999\", \"name\": \"J. G. Crump\"}, {\"authorId\": \"4408656\", \"name\": \"J. Bakkers\"}], \"abstract\": null}, {\"paperId\": \"01d529e5a459498562bbbc9b8d0cd4ff12e7113b\", \"externalIds\": {\"MAG\": \"3016980524\", \"DOI\": \"10.1096/fasebj.2020.34.s1.04762\", \"CorpusId\": 218786279}, \"title\": \"Two\\u2010pore channel 2 (TPC2) Role in Melanoma\", \"venue\": \"The FASEB Journal\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1096/fasebj.2020.34.s1.04762\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fasebj.2020.34.s1.04762?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fasebj.2020.34.s1.04762, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"81734266\", \"name\": \"Ali Hanbashi\"}, {\"authorId\": \"1401745441\", \"name\": \"Antonella D'Amore\"}, {\"authorId\": \"143705039\", \"name\": \"J. Parrington\"}], \"abstract\": \"Two\\u2010pore channels (TPC), a recently described class of NAADP\\u2010 and PI(3,5)P2\\u2013sensitive calcium\\u2010permeable cation channels in the endolysosomal system of cells have a crucial rule in cellular functions and have been linked to various type of diseases including cancer. Here, TPC2 protein stable silencing in melanoma cancer cell lines was developed using CRISPR/Cas9 genome editing technology. TPC2 knockout (KO) in B16 murine melanoma cancer cell was associated with higher viability and migration rates with higher melanin accumulation inside the cells compared to wild type controls. TPC2 KO CHL1 human melanoma cancer cells showed an increased level of proliferation with reduced migration capacity. Both KO cell lines had lower invasion rates and lacked capacity for angiogenesis compared to wild type controls. Proteomic analysis was used to identify novel targets which were affected by genetic modification of TPC2. Thus, the findings of the present study indicated that CRISPR/Cas9 model is an ideal and cost\\u2010effective tool to study the role of TPC2 in melanoma cancer cells which can be further used as a target to understand the biological basis of this disease.\"}, {\"paperId\": \"01d70522ceb867559405ef95404791be1d5d4885\", \"externalIds\": {\"MAG\": \"3097532116\", \"DOI\": \"10.1182/blood-2020-139982\", \"CorpusId\": 228910143}, \"title\": \"Pyruvate Dehydrogenase Inhibition Leads to Decreased Glycolysis and Increased Reliance on Gluconeogenesis in Acute Myeloid Leukemia\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2020-139982\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2020-139982?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2020-139982, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"41202609\", \"name\": \"Rebecca G. Anderson\"}, {\"authorId\": \"18258605\", \"name\": \"K. Pladna\"}, {\"authorId\": \"2093477579\", \"name\": \"Nathaniel J. Schramm\"}, {\"authorId\": \"5280575\", \"name\": \"T. Pardee\"}], \"abstract\": \"Background:\\n Acute myeloid leukemia (AML) is an aggressive disease characterized by poor outcomes and chemotherapy resistance. Devimistat (CPI-613\\u00ae) is a novel agent that inhibits two key tricarboxylic acid (TCA) cycle enzymes, pyruvate dehydrogenase (PDH) and \\u03b1-ketoglutarate dehydrogenase complexes (KGDH). Our lab has shown that genetic and pharmacologic inhibition of PDH sensitizes cells to chemotherapy and recent clinical trials of chemotherapy plus devimistat have been promising. However, the means by which AML cells adapt to PDH inhibition during devimistat treatment is unknown.\\n Methods:\\n Murine AML cells were used to knockout PDH through the CRISPR-CAS9 system. Viability assays were done using EZQuant or Cell-Titer Glo assays. Glycolytic flux was assessed by measurement of the extracellular acidification rate (ECAR) using the XF24 Extracellular Flux Analyzer. Glucose uptake was measured by Glucose Uptake-Glo assay. Protein levels were assessed by Western blot. Gene expression was measured by qPCR. Amino acid dependencies were assessed by incubating cells in Hank's Balanced Salt Solution with devimistat and either asparagine or glutamate for 4 hours followed by return to complete media and viability assayed after 72-hours.\\n Results:\\n Previous studies have shown that glycolysis can compensate for mitochondrial inhibition so we determined glycolytic rates during PDH inhibition. We have shown previously that genetic PDH loss decreases ECAR levels consistent with decreased glycolytic flux. Devimisat treatment also decreased ECAR levels in K562 and OCI cells in a dose dependent manner. We next examined glucose uptake. PDH knockout cells showed decreased glucose uptake compared to control. This could be due to reduced glucose import or reduced glucose retention. The expression of glucose importer GLUT1 was significantly decreased in cells with genetic or pharmacologic inhibition of PDH. LDHA expression was also reduced in PDH KO cells and devimistat treated cells, contributing to the ECAR decrease. Hexokinase II (HKII) traps glucose in AML cells and docks at the mitochondrial membrane. It can be dislodged with mitochondrial stress and subsequently degraded via the proteasome. PDH knockout cells and devimistat treated cells demonstrated reduced levels of HKII that could be rescued with the proteasomal inhibitor bortezomib. Taken together this data shows that genetic and pharmacologic inhibition of PDH decreases glycolysis by decreasing glucose import and retention. To assess the necessity of the diminished glycolytic activity we treated PDH knockout and devimistat treated cells with the glycolytic inhibitor 2-deoxy-D-glucose. Both devimistat treated and PDH KO cells were exquisitely sensitive to glycolysis inhibition. We next assessed the importance of gluconeogenic amino acids. We specifically looked at glutamate and asparagine as they have been shown to be highly utilized in cancers. Asparagine but not glutamate rescued AML cells from devimistat treatment. Asparaginase which catalysis the conversion of asparagine to aspartic acid, thus limiting the amount of asparagine in the cells sensitizes cells to both genetic and pharmacologic PDH inhibition. Asparagine can be converted into oxaloacetate which can be converted into phosphoenolpyruvate (PEP) for gluconeogenesis. Phosphoenolpyruvate carboxykinase (PCK2) catalyzes the rate limiting step in gluconeogenesis converting oxaloacetate to PEP which can travel backwards through glycolysis. We found that PCK2 was highly upregulated in both the PDH knock cells and devimisat treated cells. Indicating that with the reduced glucose import and retention the cells rely on gluconeogenesis from amino acids to maintain needed glycolytic intermediates.\\n Conclusions:\\n This data shows that PDH inhibition leads to diminished glycolytic rate, increased reliance on amino acid metabolism and increased gluconeogenesis. This in turn suggests that glycolysis inhibition and amino acid deprivation in combination with devminisat mediated PDH inhibition should be explored in clinical trials.\\n \\n \\n Pardee: Amgen: Honoraria, Speakers Bureau; Pharmacyclics: Speakers Bureau; Celgene: Consultancy, Honoraria, Speakers Bureau; Rafael: Research Funding; Karyopharm: Research Funding; BMS: Consultancy, Honoraria, Speakers Bureau; Genentech, Inc.: Consultancy; AbbVie: Consultancy; Rafael Pharmaceuticals: Consultancy.\\n \\n \\n \\n Devimistat for the treatment of AML\\n\"}, {\"paperId\": \"01dbbf59079cce07377ed4f1ce64aa2f4c3d6880\", \"externalIds\": {\"PubMedCentral\": \"9929328\", \"DOI\": \"10.1038/s41467-023-36446-8\", \"CorpusId\": 256832923, \"PubMed\": \"36788244\"}, \"title\": \"A genome-wide CRISPR-Cas9 knockout screen identifies FSP1 as the warfarin-resistant vitamin K reductase\", \"venue\": \"Nature Communications\", \"year\": 2023, \"citationCount\": 54, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-023-36446-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9929328, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"66438522\", \"name\": \"D. Jin\"}, {\"authorId\": \"2400098\", \"name\": \"Xuejie Chen\"}, {\"authorId\": \"2144411289\", \"name\": \"Yizhou Liu\"}, {\"authorId\": \"20100359\", \"name\": \"Craig M. Williams\"}, {\"authorId\": \"145750611\", \"name\": \"L. Pedersen\"}, {\"authorId\": \"2332662\", \"name\": \"D. Stafford\"}, {\"authorId\": \"13871911\", \"name\": \"J. Tie\"}], \"abstract\": \"Vitamin K is a vital micronutrient implicated in a variety of human diseases. Warfarin, a vitamin K antagonist, is the most commonly prescribed oral anticoagulant. Patients overdosed on warfarin can be rescued by administering high doses of vitamin K because of the existence of a warfarin-resistant vitamin K reductase. Despite the functional discovery of vitamin K reductase over eight decades ago, its identity remained elusive. Here, we report the identification of warfarin-resistant vitamin K reductase using a genome-wide CRISPR-Cas9 knockout screen with a vitamin K-dependent apoptotic reporter cell line. We find that ferroptosis suppressor protein 1 (FSP1), a ubiquinone oxidoreductase, is the enzyme responsible for vitamin K reduction in a warfarin-resistant manner, consistent with a recent discovery by Mishima et al. FSP1 inhibitor that inhibited ubiquinone reduction and thus triggered cancer cell ferroptosis, displays strong inhibition of vitamin K-dependent carboxylation. Intriguingly, dihydroorotate dehydrogenase, another ubiquinone-associated ferroptosis suppressor protein parallel to the function of FSP1, does not support vitamin K-dependent carboxylation. These findings provide new insights into selectively controlling the physiological and pathological processes involving electron transfers mediated by vitamin K and ubiquinone. The authors develop a Vitamin K-dependent apoptotic reporter cell line for large-scale screening of enzymes associated with Vitamin K-dependent carboxylation and identify ferroptosis suppressor protein 1 (FSP1) as responsible for warfarin-resistant vitamin K reduction.\"}, {\"paperId\": \"01dc37c6731459a4dd1fa211467c984b3d1d7dd1\", \"externalIds\": {\"DOI\": \"10.1007/s00439-023-02617-2\", \"CorpusId\": 265380731, \"PubMed\": \"37994973\"}, \"title\": \"rs10924104 in the expression enhancer motif of CD58 confers susceptibility to human autoimmune diseases\", \"venue\": \"Human Genetics\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00439-023-02617-2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00439-023-02617-2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39594178\", \"name\": \"Y. Hitomi\"}, {\"authorId\": \"2486383\", \"name\": \"Kazuko Ueno\"}, {\"authorId\": \"34902960\", \"name\": \"Yoshihiro Aiba\"}, {\"authorId\": \"2158134\", \"name\": \"N. Nishida\"}, {\"authorId\": \"2248197966\", \"name\": \"Yosuke Kawai\"}, {\"authorId\": \"5228192\", \"name\": \"Minae Kawashima\"}, {\"authorId\": \"39084810\", \"name\": \"Seik-Soon Khor\"}, {\"authorId\": \"2267897387\", \"name\": \"Sanami Takada\"}, {\"authorId\": \"89990763\", \"name\": \"Chisato Iwabuchi\"}, {\"authorId\": \"2076689724\", \"name\": \"M. Nagasaki\"}, {\"authorId\": \"2053274010\", \"name\": \"K. Tokunaga\"}, {\"authorId\": \"2268052831\", \"name\": \"Minoru Nakamura\"}], \"abstract\": null}, {\"paperId\": \"01de5197b99752017344eeb7624083029c88f903\", \"externalIds\": {\"PubMedCentral\": \"9898536\", \"DOI\": \"10.1038/s41598-023-28944-y\", \"CorpusId\": 256550247, \"PubMed\": \"36737489\"}, \"title\": \"Post-GWAS screening of candidate genes for refractive error in mutant zebrafish models\", \"venue\": \"Scientific Reports\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-023-28944-y.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9898536, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1820743799\", \"name\": \"Wim H. Quint\"}, {\"authorId\": \"2106779815\", \"name\": \"Kirke C. D. Tadema\"}, {\"authorId\": \"2158765812\", \"name\": \"Nina C. C. J. Kokke\"}, {\"authorId\": \"1402495707\", \"name\": \"M. Meester-Smoor\"}, {\"authorId\": \"145102062\", \"name\": \"Adam C. Miller\"}, {\"authorId\": \"152936057\", \"name\": \"R. Willemsen\"}, {\"authorId\": \"2260852\", \"name\": \"C. Klaver\"}, {\"authorId\": \"38239052\", \"name\": \"Adriana I. Iglesias\"}], \"abstract\": \"Genome-wide association studies (GWAS) have dissected numerous genetic factors underlying refractive errors (RE) such as myopia. Despite significant insights into understanding the genetic architecture of RE, few studies have validated and explored the functional role of candidate genes within these loci. To functionally follow-up on GWAS and characterize the potential role of candidate genes on the development of RE, we prioritized nine genes ( TJP2 , PDE11A , SHISA6 , LAMA2 , LRRC4C , KCNQ5 , GNB3 , RBFOX1 , and GRIA4 ) based on biological and statistical evidence; and used CRISPR/cas9 to generate knock-out zebrafish mutants. These mutant fish were screened for abnormalities in axial length by spectral-domain optical coherence tomography and refractive status by eccentric photorefraction at the juvenile (2\\u00a0months) and adult (4\\u00a0months) developmental stage. We found a significantly increased axial length and myopic shift in refractive status in three of our studied mutants, indicating a potential involvement of the human orthologs ( LAMA2 , LRRC4C , and KCNQ5 ) in myopia development. Further, in-situ hybridization studies showed that all three genes are expressed throughout the zebrafish retina. Our zebrafish models provide evidence of a functional role of these three genes in refractive error development and offer opportunities to elucidate pathways driving the retina-to-sclera signaling cascade that leads to myopia.\"}, {\"paperId\": \"01e763eabf00a0eb81acabb7f5f4419fb2806551\", \"externalIds\": {\"DOI\": \"10.1096/fasebj.2022.36.s1.l8134\", \"CorpusId\": 248637550, \"PubMed\": \"35555760\"}, \"title\": \"The \\u03b2\\u2010galactoside binding lectin Galectin regulates metabolism in Drosophila\", \"venue\": \"The FASEB Journal\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fasebj.2022.36.s1.l8134?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fasebj.2022.36.s1.l8134, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2114163716\", \"name\": \"Liping Luo\"}, {\"authorId\": \"49457639\", \"name\": \"B. Robinson\"}], \"abstract\": \"The \\u03b2\\u2010galactoside binding lectins, termed galectins, have garnered immense scientific interest for their ability to regulate diverse biologic processes, from adaptive immune responses to epithelial cell biology. Yet, an understanding of the role of galectins in regulating developmental processes has been limited by the functional redundancies across galectins which exist in vertebrates. Thus, we utilized the model organism Drosophila, which contains a single galectin ortholog, to ask what are the developmental requirements for galectins in metazoans. Using CRISPR/Cas9, we generated deletions in the galectin locus which efficiently eliminated galectin protein (Dmgal) across tissues. Intriguing, loss of galectin is not essential in Drosophila as animals ecclose with relatively minimal phenotypes. Among these, dmgal\\u2010deficient animals are significantly smaller than their wild\\u2010type counterparts. Moreover, when challenged to nutrient\\u2010deprivation or Paraquat\\u2010toxicity, dmgal\\u2010deficient animals show marked sensitivity compared to their wild\\u2010type animals. Transcriptomics analysis reveals that dmgal\\u2010deficient animals show significantly different profiles than their wild\\u2010type counterparts, with enrichment in metabolic pathways. Similarly, metabolomics shows distinct profiles from dmgal\\u2010deficient and wild\\u2010type animals with significant alterations in amino acid and nutrient\\u2010sensing pathways. Finally, analysis of the Drosophila fat body reveals alterations in fat content, and tissue specific deletion of galectin in this organ renders animals sensitive to nutrient loss. Taken together, these findings uncover a novel role for dmgal in regulating Drosophila metabolism in the Drosophila fat body, and may provide clues into the role of galectins in regulating insulin sensitivity and NASH/NAFLD in vertebrates.\"}, {\"paperId\": \"01f24b9344c6e183f136d776921509c94ac4c2e6\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-672\", \"CorpusId\": 268645743}, \"title\": \"Abstract 672: Small molecule NSC59984 stimulates mitochondria-dependent ferroptosis and overcomes integrated stress response pro-survival signaling in pre-clinical pancreatic and colorectal cancer models\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-672?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-672, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2057278992\", \"name\": \"Praveen R Srinivasan\"}, {\"authorId\": \"2170057102\", \"name\": \"Arielle De La Cruz\"}, {\"authorId\": \"2213622866\", \"name\": \"Maximilian Pinho-Schwermann\"}, {\"authorId\": \"2057470158\", \"name\": \"Andrew George\"}, {\"authorId\": \"2213524086\", \"name\": \"William J MacDonald\"}, {\"authorId\": \"3493484\", \"name\": \"Shengliang Zhang\"}, {\"authorId\": \"12525031\", \"name\": \"W. El-Deiry\"}], \"abstract\": \"\\n Pancreatic and colorectal cancer are leading causes of cancer deaths worldwide. Resistance to current therapeutics is a significant challenge in treating these cancers. Ferroptosis, a non-apoptotic iron-dependent form of cell death characterized by overwhelming lipid peroxidation, has emerged as a potential strategy to overcome drug resistance. Our lab previously identified the small-molecule NSC59984 as a p53 pathway restoring compound that induces reactive oxygen species, requires p73, and targets mutant p53 for ubiquitin-mediated proteolysis involving MDM2 and HSP90. In pre-clinical models of pancreatic and colorectal cancer, we now show that the small-molecule NSC59984 induces lipid peroxidation and causes reactive oxygen species-dependent apoptosis as monotherapy. However, when combined with ferroptosis inducers or cystine deprivation, NSC59984 potently induces ferroptosis in a mitochondrial complex III-dependent manner. Using CRISPR/Cas9 in pancreatic cancer cells, we further show that HRI, an EIF2-alpha kinase responsible for the cellular response to mitochondrial stress, induces the integrated stress response (ISR) upon treatment with NSC59984 or ferroptosis inducers. The ISR serves as a mechanism for resistance to cell death induced by NSC59984 or ferroptosis inducers, causing upregulation of key anti-oxidative stress and anti-ferroptosis proteins, including the cystine importer SLC7A11 and the GPX4-stabilizing protein HSPA5/BIP/GRP78. The combination therapy overcomes the ISR to induce potent cell death. Our work demonstrates the importance of the interplay between mitochondria and the ISR during ferroptosis induction in pancreatic and colorectal cancer cells.\\n Citation Format: Praveen R. Srinivasan, Arielle J. De La Cruz, Maximilian Pinho-Schwermann, Andrew George, William J. MacDonald, Shengliang Zhang, Wafik S. El-Deiry. Small molecule NSC59984 stimulates mitochondria-dependent ferroptosis and overcomes integrated stress response pro-survival signaling in pre-clinical pancreatic and colorectal cancer models [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 672.\"}, {\"paperId\": \"01f2abc65152261fffa8e30aedcaf9d1019944c7\", \"externalIds\": {\"MAG\": \"3006888660\", \"DOI\": \"10.1038/s41684-020-0490-8\", \"CorpusId\": 211138956, \"PubMed\": \"32066972\"}, \"title\": \"Piecing together the vector control puzzle\", \"venue\": \"Lab animal\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41684-020-0490-8.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41684-020-0490-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41684-020-0490-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"28001328\", \"name\": \"Ellen P. Neff\"}], \"abstract\": null}, {\"paperId\": \"01f300b1538149e1ee0d3542f4cc122f5397770a\", \"externalIds\": {\"PubMedCentral\": \"10020200\", \"DOI\": \"10.3389/fcell.2023.1111488\", \"CorpusId\": 257348566, \"PubMed\": \"36936678\"}, \"title\": \"HAP1, a new revolutionary cell model for gene editing using CRISPR-Cas9\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2023, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2023.1111488/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10020200, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2034034525\", \"name\": \"Gemma Llargu\\u00e9s-Sistac\"}, {\"authorId\": \"5258211\", \"name\": \"Laia Bonjoch\"}, {\"authorId\": \"1390175152\", \"name\": \"S. Castellv\\u00ed-Bel\"}], \"abstract\": \"The use of next-generation sequencing (NGS) technologies has been instrumental in the characterization of the mutational landscape of complex human diseases like cancer. But despite the enormous rise in the identification of disease candidate genetic variants, their functionality is yet to be fully elucidated in order to have a clear implication in patient care. Haploid human cell models have become the tool of choice for functional gene studies, since they only contain one copy of the genome and can therefore show the unmasked phenotype of genetic variants. Over the past few years, the human near-haploid cell line HAP1 has widely been consolidated as one of the favorite cell line models for functional genetic studies. Its rapid turnover coupled with the fact that only one allele needs to be modified in order to express the subsequent desired phenotype has made this human cell line a valuable tool for gene editing by CRISPR-Cas9 technologies. This review examines the recent uses of the HAP1 cell line model in functional genetic studies and high-throughput genetic screens using the CRISPR-Cas9 system. It covers its use in an attempt to develop new and relevant disease models to further elucidate gene function, and create new ways to understand the genetic basis of human diseases. We will cover the advantages and potential of the use of CRISPR-Cas9 technology on HAP1 to easily and efficiently study the functional interpretation of gene function and human single-nucleotide genetic variants of unknown significance identified through NGS technologies, and its implications for changes in clinical practice and patient care.\"}, {\"paperId\": \"01f51fd37eb578712cb23d88a0d1f51f77960945\", \"externalIds\": {\"DOI\": \"10.37446/corbio/ra/1.1.2023.1-6\", \"CorpusId\": 268682364}, \"title\": \"CRISPR/Cas9 genome editing tool for rice crop improvement\", \"venue\": \"Cornous Biology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cornous.com/downloadpdf/164\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.37446/corbio/ra/1.1.2023.1-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.37446/corbio/ra/1.1.2023.1-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152646091\", \"name\": \"Selvakumar Gurunathan\"}], \"abstract\": null}, {\"paperId\": \"01f57887d51ce2e1f60071bc0c19bef81d890293\", \"externalIds\": {\"DOI\": \"10.1136/jitc-2021-itoc8.7\", \"CorpusId\": 242146272}, \"title\": \"P01.03\\u2005Targeting diaclyglycerol kinase alpha and zeta by self delivering RNAi to optimize tlymphocytes for adoptive therapy of solid tumors\", \"venue\": \"Journal for ImmunoTherapy of Cancer\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jitc.bmj.com/content/jitc/9/Suppl_1/A4.1.full.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/jitc-2021-itoc8.7?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/jitc-2021-itoc8.7, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2003398816\", \"name\": \"AS Herbstritt\"}, {\"authorId\": \"2067598934\", \"name\": \"M. Maxwell\"}, {\"authorId\": \"84112097\", \"name\": \"D. Yan\"}, {\"authorId\": \"4742552\", \"name\": \"B. Cuiffo\"}, {\"authorId\": \"8696489\", \"name\": \"J. Cardia\"}, {\"authorId\": \"88423122\", \"name\": \"S. Fricker\"}, {\"authorId\": \"3593344\", \"name\": \"E. Noessner\"}], \"abstract\": \"Evidence indicates that diacylglycerol kinases (DGK) are promising targets for the optimization of T cell activity, for example in the setting of adoptive cell therapy (ACT). The tumor microenvironment (TME) of human renal cell carcinoma (RCC) is an immunosuppressive setting where T and NK cell functionality is blocked. DGK\\u2013\\u03b1 is a negative regulator of TCR signaling, functioning by metabolizing diacylglycerol to phosphatidic acid and thereby limiting the activation of MAPK/ERK1/2 signaling pathway. DGK-\\u03b1 is found increased in tumor-infiltrating lymphocytes (TIL) from RCC patients and also in adoptively transferred T cells after infiltrating into the TME.1 We previously reported that inhibition of DGK-\\u03b1 restored functionality of unresponsive CD8 T cells and NK cells from RCC-TIL. Other studies demonstrated that knockdown or pharmacologic inhibition of DGK-\\u03b1 and DGK-\\u03b6 alone or together increased target cell killing and cytokine production, and protected T cells from inhibitory factors in the TME.2 However, there are no inhibitors for DGK-\\u03b6 and available DGK-\\u03b1 inhibitors have undesired pharmacokinetic/pharmacodynamic properties and are highly toxic precluding their clinical application. Here, we present data using a novel RNA interference (RNAi) technology that can specifically target each DGK isoform.INTASYL\\u2122 compounds incorporate drug-like properties into RNAi, resulting not only in enhanced cellular uptake in the presence of serum but also eliminating the need for further transfection reagents. Toxicity of compounds applied alone or in combination was assessed by 7-AAD flow cytometry analysis and WST assay. Silencing of mRNA and protein was analyzed by RT-qPCR and SimpleWestern. Downstream signaling pathways and T cell function were analyzed to demonstrate pharmacological efficacy.Two DGK-\\u03b6 compounds and one DGK-\\u03b1 compound were analyzed using Jurkat T cells and primary human TCR-transduced T cells. No effects were seen on cell viability for the compounds applied alone or in combination. On-target knockdown was achieved in Jurkat T cells evidenced by RT-qPCR and SimpleWestern. Silencing of mRNA and protein occurred quickly after 24h, peaked between 48h and 72h and lasted at least for 96h. Stimulation under DGK-targeting INTASYL treatment resulted in enhanced levels of phosphorylated ERK1/2 and enhanced secretion of IL-2.INTASYL\\u2122 self-delivering RNAi compounds represent a promising approach to target intracellular immune checkpoints such as DGKs. The good toxicity profile allows for combined application of several compounds enabling targeting of multiple checkpoints, which likely is necessary to counteract the complex and heterogeneous inhibitory influences of the TME. The technology enables the anti-tumor activity of T and NK cells for immunotherapy, and can be used in ACT and direct therapeutic applications towards the TME.Moon EK, Wang L-C, Dolfi DV, Wilson CB, Ranganathan R, Sun J, et al. Multifactorial T-cell hypofunction that is reversible can limit the efficacy of chimeric antigen receptor-transduced human T cells in solid tumors. Clin Cancer Res 2014;20(16):4262\\u201373.Jung I-Y, Kim Y-Y, Yu H-S, Lee M, Kim S, Lee J. CRISPR/Cas9-mediated knockout of DGK improves antitumor activities of human T cells. Cancer Res 2018;78(16):4692\\u2013703.A.S. Herbstritt: C. Other Research Support (supplies, equipment, receipt of drugs or other in-kind support); Significant; Phio Pharmaceuticals. M. Maxwell: A. Employment (full or part-time); Significant; Phio Pharmaceuticals. D. Yan: A. Employment (full or part-time); Significant; Phio Pharmaceuticals. B. Cuiffo: A. Employment (full or part-time); Significant; Phio Pharmaceuticals. J. Cardia: A. Employment (full or part-time); Significant; Phio Pharmaceuticals. S.P. Fricker: A. Employment (full or part-time); Significant; Phio Pharmaceuticals. E. Noessner: C. Other Research Support (supplies, equipment, receipt of drugs or other in-kind support); Significant; Phio Pharmaceuticals.\"}, {\"paperId\": \"01f590a4c3eca04f26a924bd874a6d1641a352ce\", \"externalIds\": {\"DOI\": \"10.1101/2024.05.19.594889\", \"CorpusId\": 269976097}, \"title\": \"Production and functional verification of 8-gene (GGTA1, CMAH, \\u03b24GalNT2, hCD46, hCD55, hCD59, hTBM, hCD39)-edited donor pigs for xenotransplantation\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/05/20/2024.05.19.594889.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.05.19.594889?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.05.19.594889, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2302614069\", \"name\": \"Jiaoxiang Wang\"}, {\"authorId\": \"49343458\", \"name\": \"Kaixiang Xu\"}, {\"authorId\": \"2302855648\", \"name\": \"Tao Liu\"}, {\"authorId\": \"2112151746\", \"name\": \"Heng Zhao\"}, {\"authorId\": \"2302738374\", \"name\": \"Muhammad Ameen Jamal\"}, {\"authorId\": \"2302788808\", \"name\": \"Gen Chen\"}, {\"authorId\": \"2302562602\", \"name\": \"Xiaoying Huo\"}, {\"authorId\": \"46962245\", \"name\": \"Chang-qin Yang\"}, {\"authorId\": \"116987213\", \"name\": \"Deling Jiao\"}, {\"authorId\": \"15010247\", \"name\": \"Tai-yun Wei\"}, {\"authorId\": \"30131892\", \"name\": \"HanFei Huang\"}, {\"authorId\": \"2303096707\", \"name\": \"Hong-Ye Zhao\"}, {\"authorId\": \"5582595\", \"name\": \"Jianxiong Guo\"}, {\"authorId\": \"2302858541\", \"name\": \"Fengchong Wang\"}, {\"authorId\": \"2302610986\", \"name\": \"Xiong Zhang\"}, {\"authorId\": \"2303355817\", \"name\": \"Kai Liu\"}, {\"authorId\": \"29997316\", \"name\": \"Siming Qu\"}, {\"authorId\": \"2302993025\", \"name\": \"Gang Wang\"}, {\"authorId\": \"2303096707\", \"name\": \"Hong-Ye Zhao\"}, {\"authorId\": \"2303250303\", \"name\": \"Zhong Zeng\"}, {\"authorId\": \"48056018\", \"name\": \"Hongjiang Wei\"}], \"abstract\": \"Gene-edited pig-to-human xenotransplantation continues to make breakthroughs and is expected to enter clinic to solve the global shortage of donor organs. However, which gene combination is suitable for which organ transplantation remains unclear. In this study, we utilized CRISPR/Cas9 gene editing technology, PiggyBac transposon system and somatic cell cloning to construct GTKO/CMAHKO/\\u03b24GalNT2KO/hCD46/hCD55/hCD59/hCD39/hTBM 8 gene-edited cloned (GEC) donor pigs, and performed pig to non-human primate (NHP) transplantation to evaluate the effectiveness of these GEC pigs. The multiple vectors were co-transfected into fetal fibroblasts of Diannan miniature pig with O blood type, and 25 colonies were screened out, and one of them carried GGTA1, CMAH and \\u03b24GalNT2 biallelic knockout and integration of hCD46, hCD55, hCD59, hTBM and hCD39 genes, which was used as a donor cell for cloning, and a 33-day-old viable fetus was obtained. The fetus was identified and confirmed for normal karyotype and the absence of three xenogeneic antigens \\u03b1-Gal, Neu5Gc and Sda, and expression of hCD46, hCD55, hCD59, hTBM and hCD39 genes, then the recloning was carried out and 28 cloned piglets were obtained by natural delivery. Molecular identification at DNA, mRNA and protein levels showed that 8 gene editing (GE) was successful in these GEC piglets. Moreover, antigen-antibody binding assay and complement-dependent cytotoxicity assay demonstrated that 8GE effectively reduced the immune incompatibility and kidney xenograft survived up to 15 and 17 days into two NHPs, respectively. During this period, the recipient serum antibodies IgA and IgM, complements C3 and C4, coagulation indicators PT, APTT, TT and FIB, as well as most electrolytes and liver function indicators remained relatively stable. The 24-hour urine output and serum creatinine remained normal at a period of post-transplantation. These results indicated that the 8GEC pigs effectively alleviated immune rejection and exerted life-supporting kidney function in the recipient.\"}, {\"paperId\": \"01f96daf1b79b2512069b1b323cc34f1abb0e838\", \"externalIds\": {\"PubMedCentral\": \"10935927\", \"DOI\": \"10.1186/s13046-024-02995-z\", \"CorpusId\": 268371499, \"PubMed\": \"38475864\"}, \"title\": \"Functionally-instructed modifiers of response to ATR inhibition in experimental glioma\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/counter/pdf/10.1186/s13046-024-02995-z\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10935927, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1411667412\", \"name\": \"B. Walter\"}, {\"authorId\": \"2057858018\", \"name\": \"S. Hirsch\"}, {\"authorId\": \"2190854890\", \"name\": \"L. Kuhlburger\"}, {\"authorId\": \"2054695599\", \"name\": \"A. Stahl\"}, {\"authorId\": \"2190857433\", \"name\": \"L. Schnabel\"}, {\"authorId\": \"2384174769\", \"name\": \"Silas Wisser\"}, {\"authorId\": \"28310480\", \"name\": \"L. Haeusser\"}, {\"authorId\": \"2038111458\", \"name\": \"F. Tsiami\"}, {\"authorId\": \"2093745212\", \"name\": \"Sarah Pl\\u00f6ger\"}, {\"authorId\": \"2238759420\", \"name\": \"N. Aghaallaei\"}, {\"authorId\": \"2238688493\", \"name\": \"A. M. Dick\"}, {\"authorId\": \"2238760370\", \"name\": \"J. Skokowa\"}, {\"authorId\": \"2238758425\", \"name\": \"C. Schmees\"}, {\"authorId\": \"2238762107\", \"name\": \"M. Templin\"}, {\"authorId\": \"2274635079\", \"name\": \"K. Schenke-Layland\"}, {\"authorId\": \"2071804952\", \"name\": \"M. Tatagiba\"}, {\"authorId\": \"2088607\", \"name\": \"S. Nahnsen\"}, {\"authorId\": \"2238760782\", \"name\": \"D. Merk\"}, {\"authorId\": \"2428841249\", \"name\": \"G. Tabatabai\"}], \"abstract\": \"The DNA damage response (DDR) is a physiological network preventing malignant transformation, e.g. by halting cell cycle progression upon DNA damage detection and promoting DNA repair. Glioblastoma are incurable primary tumors of the nervous system and DDR dysregulation contributes to acquired treatment resistance. Therefore, DDR targeting is a promising therapeutic anti-glioma strategy. Here, we investigated Ataxia telangiectasia and Rad3 related (ATR) inhibition (ATRi) and functionally-instructed combination therapies involving ATRi in experimental glioma. We used acute cytotoxicity to identify treatment efficacy as well as RNAseq and DigiWest protein profiling to characterize ATRi-induced modulations within the molecular network in glioma cells. Genome-wide CRISPR/Cas9 functional genomic screens and subsequent validation with functionally-instructed compounds and selected shRNA-based silencing were employed to discover and investigate molecular targets modifying response to ATRi in glioma cell lines in vitro, in primary cultures ex vivo and in zebrafish and murine models in vivo. ATRi monotherapy displays anti-glioma efficacy in vitro and ex vivo and modulates the molecular network. We discovered molecular targets by genome-wide CRISPR/Cas9 loss-of-function and activation screens that enhance therapeutic ATRi effects. We validated selected druggable targets by a customized drug library and functional assays in vitro, ex vivo and in vivo. In conclusion, our study leads to the identification of novel combination therapies involving ATRi that could inform future preclinical studies and early phase clinical trials.\"}, {\"paperId\": \"01f9a70bd44a3d21297d49d4ddf304c4829759bf\", \"externalIds\": {\"MAG\": \"3007716411\", \"DOI\": \"10.1101/2020.12.13.422549\", \"CorpusId\": 212925260}, \"title\": \"TM6SF2/PNPLA3/MBOAT7 loss-of-function genetic variants impact on NAFLD development and progression both in patients and in in vitro models\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 59, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://air.unimi.it/bitstream/2434/907018/2/1-s2.0-S2352345X21002411-main.pdf\", \"status\": \"GREEN\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.12.13.422549?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.12.13.422549, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47359653\", \"name\": \"M. Longo\"}, {\"authorId\": \"11274452\", \"name\": \"M. Meroni\"}, {\"authorId\": \"89193163\", \"name\": \"V. Erconi\"}, {\"authorId\": \"5065876\", \"name\": \"A. Alisi\"}, {\"authorId\": \"3536122\", \"name\": \"L. Miele\"}, {\"authorId\": \"4901173\", \"name\": \"R. Rametta\"}, {\"authorId\": \"5075005\", \"name\": \"A. Fracanzani\"}, {\"authorId\": \"144167182\", \"name\": \"L. N. Valenti\"}, {\"authorId\": \"6018349\", \"name\": \"P. Dongiovanni\"}], \"abstract\": \"Background and aims The I148M PNPLA3, the rs641738 in MBOAT7/TMC4 locus and the E167K TM6SF2 polymorphisms represent the main predisposing factors to non-alcoholic fatty liver disease (NAFLD) development and progression. We previously generated a full knockout of MBOAT7 in HepG2 cells (MBOAT7-/-), homozygous for the I148M PNPLA3. Therefore, we aimed to:1) investigate the synergic impact of the 3 at-risk variants on liver injury and hepatocellular carcinoma (HCC) in a large cohort of NAFLD patients;2) create in vitro models of genetic NAFLD by silencing TM6SF2 in both HepG2 and MBOAT7-/- cells. Methods NAFLD patients (n=1380) of whom 121 had HCC were stratified with a semi-quantitative score ranging from 0 to 3 according to the number of PNPLA3, TM6SF2 and MBOAT7 at-risk variants. TM6SF2 was silenced in HepG2 (TM6SF2-/-) and MBOAT7-/- (MBOAT7-/-TM6SF2-/-) through CRISPR/Cas9. Results In NAFLD patients, the additive weight of these mutations was associated with liver disease severity and increased risk to develop HCC. In HepG2 cells, TM6SF2 silencing altered lipid composition and induced the accumulation of micro-vesicular LDs, whereas the MBOAT7-/-TM6SF2-/- cells showed a mixed micro/macro pattern of LDs. TM6SF2 deletion strongly affected endoplasmic reticulum (ER) and mitochondria ultrastructures thus increasing ER/oxidative stress. Mitochondrial number raised in both TM6SF2-/- and MBOAT7-/-TM6SF2-/- models, suggesting an unbalancing in mitochondrial dynamics and the silencing of both MBOAT7 and TM6SF2 impaired mitochondrial activity with a shift towards anaerobic glycolysis. MBOAT7-/-TM6SF2-/- cells also showed the highest proliferation rate. Conclusions The co-presence of the 3 at-risk variants impacts on NAFLD course, in both patients and experimental models affecting LDs accumulation, mitochondrial functionality and metabolic reprogramming towards HCC.\"}, {\"paperId\": \"01fd630d23025940c223845a5711aaffd6dfe6f2\", \"externalIds\": {\"PubMedCentral\": \"7691383\", \"MAG\": \"3098452074\", \"DOI\": \"10.3389/fcell.2020.585995\", \"CorpusId\": 226308187, \"PubMed\": \"33282868\"}, \"title\": \"Gut Microbiota-Related Evidence Provides New Insights Into the Association Between Activating Transcription Factor 4 and Development of Salt-Induced Hypertension in Mice\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2020, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2020.585995/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7691383, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115347226\", \"name\": \"Tian-hao Liu\"}, {\"authorId\": \"103944234\", \"name\": \"Wen-cong Tao\"}, {\"authorId\": \"35289009\", \"name\": \"Qiuer Liang\"}, {\"authorId\": \"2069470673\", \"name\": \"Wan-qing Tu\"}, {\"authorId\": \"144359112\", \"name\": \"Ya Xiao\"}, {\"authorId\": \"2108445756\", \"name\": \"Liguo Chen\"}], \"abstract\": \"Activating transcription factor 4 (ATF4), which regulates genes associated with endoplasmic reticulum stress, apoptosis, autophagy, the gut microbiome, and metabolism, has been implicated in many diseases. However, its mechanistic role in hypertension remains unclear. In the present study, we investigated its role in salt-sensitive hypertensive mice. Wild-type (WT) C57BL/6J mice were used to establish Atf4 knockout (KO) and overexpression mice using CRISPR-Cas9 and lentiviral overexpression vectors. Then, fecal microbiota transplantation (FMT) from Atf4\\u00b1 mice and vitamin K2 (VK2) supplementation were separately carried out in high-salt-diet (8% NaCl)-induced mice for 4 weeks. We found that Atf4 KO inhibited and Atf4 overexpression enhanced the increase in blood pressure and endothelial dysfunction induced by high salt intake in mice, while regulating the gut microbiota composition and VK2 expression. It was further verified that ATF4 is involved in the regulation of salt-sensitive hypertension and vascular endothelial function, which is achieved through association with gut microbiota and may be related to VK2 and different bacteria such as Dubosiella. In addition, we found that VK2 supplementation prevents the development of salt-sensitive hypertension and maintains vascular endothelial function; moreover, VK2 supplementation increases the abundance of intestinal Dubosiella and downregulates the relative expression of Atf4 in the thoracic aorta of mice. We conclude that ATF4 plays an important role in regulating gut microbiota and VK2 production, providing new insights into the association between ATF4 and development of salt-induced hypertension in mice, meanwhile contributing to the development for a new preventive strategy of hypertension.\"}, {\"paperId\": \"0201d01f1f028fc2eb5768ee89c996046c04b1b8\", \"externalIds\": {\"PubMedCentral\": \"9428373\", \"DOI\": \"10.1007/s12640-022-00564-w\", \"CorpusId\": 251952701, \"PubMed\": \"36044181\"}, \"title\": \"CRISPR and iPSCs: Recent Developments and Future Perspectives in Neurodegenerative Disease Modelling, Research, and Therapeutics\", \"venue\": \"Neurotoxicity research\", \"year\": 2022, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12640-022-00564-w.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9428373, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2059583116\", \"name\": \"Tirthankar Sen\"}, {\"authorId\": \"49985384\", \"name\": \"Rajkumar P. Thummer\"}], \"abstract\": \"Neurodegenerative diseases are prominent causes of pain, suffering, and death worldwide. Traditional approaches modelling neurodegenerative diseases are deficient, and therefore, improved strategies that effectively recapitulate the pathophysiological conditions of neurodegenerative diseases are the need of the hour. The generation of human-induced pluripotent stem cells (iPSCs) has transformed our ability to model neurodegenerative diseases in vitro and provide an unlimited source of cells (including desired neuronal cell types) for cell replacement therapy. Recently, CRISPR/Cas9-based genome editing has also been gaining popularity because of the flexibility they provide to generate and ablate disease phenotypes. In addition, the recent advancements in CRISPR/Cas9 technology enables researchers to seamlessly target and introduce precise modifications in the genomic DNA of different human cell lines, including iPSCs. CRISPR-iPSC-based disease modelling, therefore, allows scientists to recapitulate the pathological aspects of most neurodegenerative processes and investigate the role of pathological gene variants in healthy non-patient cell lines. This review outlines how iPSCs, CRISPR/Cas9, and CRISPR-iPSC-based approaches accelerate research on neurodegenerative diseases and take us closer to a cure for neurodegenerative diseases such as Alzheimer\\u2019s disease, Parkinson\\u2019s disease, Huntington\\u2019s disease, Amyotrophic Lateral Sclerosis, and so forth.\"}, {\"paperId\": \"0202804a38a2d82eefea53cd85cec8e58b736b69\", \"externalIds\": {\"MAG\": \"3036461677\", \"DOI\": \"10.1016/j.nantod.2020.100895\", \"CorpusId\": 225013402}, \"title\": \"Harnessing nanoparticles for the efficient delivery of the CRISPR/Cas9 system\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 63, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.nantod.2020.100895?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.nantod.2020.100895, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40139095\", \"name\": \"H. Rahimi\"}, {\"authorId\": \"27024638\", \"name\": \"Marziyeh Salehiabar\"}, {\"authorId\": \"46192830\", \"name\": \"Jalil Charmi\"}, {\"authorId\": \"2345206071\", \"name\": \"Murat Barsbay\"}, {\"authorId\": null, \"name\": \"Mohammadreza Ghaffarlou\"}, {\"authorId\": \"2265369729\", \"name\": \"Mahdi Roohi Razlighi\"}, {\"authorId\": \"4164969\", \"name\": \"S. Davaran\"}, {\"authorId\": \"2296318630\", \"name\": \"Rovshan Khalilov\"}, {\"authorId\": \"32066433\", \"name\": \"M. Sugiyama\"}, {\"authorId\": \"2882466\", \"name\": \"H. Nosrati\"}, {\"authorId\": \"33147816\", \"name\": \"Saeed Kaboli\"}, {\"authorId\": \"5057240\", \"name\": \"H. Danafar\"}, {\"authorId\": \"79824844\", \"name\": \"T. Webster\"}], \"abstract\": \"Abstract Exploiting bacterial DNA-acting enzymes and expanding their repertoire for genome engineering have been major technological and conceptual advances in molecular biology over the last decade. The CRISPR-Cas9 system offers many attractive superiorities, such as multiplexing, high precision, low cost, and simplicity compared to other strategies/systems/approaches known to date for gene editing. The efficient co-delivery of Cas9 and single guide RNA(s) into a desired cell and subsequent correct targeting of selected genomic fragment(s) are among the most critical and determining issues for CRISPR-Cas9-based genome engineering. CRISPR/Cas9 components can be transported into target cells via various delivery methods, including physical methods (such as electroporation and microinjection) as well as viral and non-viral methods. Physical and viral methods, with all their privileges, still suffer from disadvantages including induction of immune responses, cell damage, lack of high specificity, etc. We are witnessing a remarkable increase in the employment of nanomaterials as non-viral carriers for the delivery of the CRISPR/Cas9 system. Nanoparticles have so far presented numerous advantages such as ease of synthesis, high efficiency, low cost, size tunability, non-mutagenicity, non-immunogenicity, etc. with regard to the delivery of CRISPR/Cas9. Here, we will review the recent progress in the delivery of CRISPR/Cas9 system components via nanomaterials and outline future challenges.\"}, {\"paperId\": \"020949eb5a050c1250a86986fd2f709402f9bc22\", \"externalIds\": {\"PubMedCentral\": \"7925485\", \"DOI\": \"10.1007/s11033-020-06125-8\", \"CorpusId\": 231680677, \"PubMed\": \"33481178\"}, \"title\": \"An improved method for precise genome editing in zebrafish using CRISPR-Cas9 technique\", \"venue\": \"Molecular Biology Reports\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s11033-020-06125-8.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7925485, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6977953\", \"name\": \"E. Gasanov\"}, {\"authorId\": \"30514396\", \"name\": \"Justyna J\\u0119drychowska\"}, {\"authorId\": \"48877530\", \"name\": \"M. Pastor\"}, {\"authorId\": \"5596895\", \"name\": \"M. Wiweger\"}, {\"authorId\": \"4841390\", \"name\": \"A. Methner\"}, {\"authorId\": \"6362069\", \"name\": \"V. Korzh\"}], \"abstract\": \"Current methods of CRISPR-Cas9-mediated site-specific mutagenesis create deletions and small insertions at the target site which are repaired by imprecise non-homologous end-joining. Targeting of the Cas9 nuclease relies on a short guide RNA (gRNA) corresponding to the genome sequence approximately at the intended site of intervention. We here propose an improved version of CRISPR-Cas9 genome editing that relies on two complementary guide RNAs instead of one. Two guide RNAs delimit the intervention site and allow the precise deletion of several nucleotides at the target site. As proof of concept, we generated heterozygous deletion mutants of the kcng4b, gdap1, and ghitm genes in the zebrafish Danio rerio using this method. A further analysis by high-resolution DNA melting demonstrated a high efficiency and a low background of unpredicted mutations. The use of two complementary gRNAs improves CRISPR-Cas9 specificity and allows the creation of predictable and precise mutations in the genome of D. rerio.\"}, {\"paperId\": \"020977fbd8875ec86dfab4550d13dfc12817df04\", \"externalIds\": {\"MAG\": \"3012351699\", \"DOI\": \"10.1038/s41588-020-0590-9\", \"CorpusId\": 212731832, \"PubMed\": \"32203462\"}, \"title\": \"Using antagonistic pleiotropy to design a chemotherapy-induced evolutionary trap to target drug resistance in cancer\", \"venue\": \"Nature Genetics\", \"year\": 2020, \"citationCount\": 52, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7398704\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41588-020-0590-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41588-020-0590-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2113283167\", \"name\": \"Kevin H. Lin\"}, {\"authorId\": \"83768798\", \"name\": \"Justine C. Rutter\"}, {\"authorId\": \"6670596\", \"name\": \"Abigail Xie\"}, {\"authorId\": \"1566032756\", \"name\": \"Bryann Pardieu\"}, {\"authorId\": \"1498640703\", \"name\": \"Emily T. Winn\"}, {\"authorId\": \"40126405\", \"name\": \"R. D. Bello\"}, {\"authorId\": \"47774370\", \"name\": \"Antoine Forget\"}, {\"authorId\": \"5372240\", \"name\": \"R. Itzykson\"}, {\"authorId\": \"48260568\", \"name\": \"Yeong-ran Ahn\"}, {\"authorId\": \"3345376\", \"name\": \"Ziwei Dai\"}, {\"authorId\": \"1565965348\", \"name\": \"Raiyan T. Sobhan\"}, {\"authorId\": \"2149887116\", \"name\": \"Gray R. Anderson\"}, {\"authorId\": \"40622266\", \"name\": \"Katherine R. Singleton\"}, {\"authorId\": \"23799656\", \"name\": \"Amy E. Decker\"}, {\"authorId\": \"40135270\", \"name\": \"Peter S. Winter\"}, {\"authorId\": \"2268976\", \"name\": \"J. Locasale\"}, {\"authorId\": \"50661012\", \"name\": \"Lorin Crawford\"}, {\"authorId\": \"39041208\", \"name\": \"A. Puissant\"}, {\"authorId\": \"84679208\", \"name\": \"K. Wood\"}], \"abstract\": null}, {\"paperId\": \"020cc4e4440f8c1d4f158c00c1ec29ed81f36f0b\", \"externalIds\": {\"MAG\": \"3157019241\", \"DOI\": \"10.21203/RS.3.RS-398418/V1\", \"CorpusId\": 234883660}, \"title\": \"A Highly Efficient Protocol To Establish Regeneration And Genetic Transformation Systems And Create Targeted Mutations Using CRISPR/Cas9 in Lycium Ruthenicum\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.researchsquare.com/article/rs-398418/v1.pdf?c=1631895056000\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21203/RS.3.RS-398418/V1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21203/RS.3.RS-398418/V1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145441369\", \"name\": \"Wang Wang\"}, {\"authorId\": \"2118002489\", \"name\": \"Hai Wang\"}, {\"authorId\": \"2119612281\", \"name\": \"Jiangmiao Liu\"}, {\"authorId\": \"2117950208\", \"name\": \"Tong Li\"}, {\"authorId\": \"3545171\", \"name\": \"Huien Zhao\"}], \"abstract\": \"\\n Background: The CRISPR/Cas9 system has rapidly become the preferred tool for various biological sequencing projects due to its high efficiency, specificity, simplicity and versatility, and it has been utilized for targeted genomic alternations in several important plants of Solanaceae, including tomato, tobacco, potato, petunia and groundcherry. Wolfberry is the sixth most important solanaceous crop in China following potato, tomato, eggplant, pepper and tobacco. To date, there has been no report on CRISPR/Cas9 technology to improve Lycium ruthenicum due to the unknown genome and the lack of efficient regeneration and genetic transformation systems.Results: In this study, we established a suitable regeneration and genetic transformation system of Lycium ruthenicum, the fw2.2 gene was identified, which was the first fruit weight gene identifified from tomato and accounted for 30% of the variation in fruit size. The gene editing of black wolfberry were carried out by CRISPR/ Cas9 for the first time here with a very high editing efficiency (95.45%) in fw2.2. Four homozygous mutations and nine biallelic mutations were obtained from T0 generation plants. Conclusions: These results suggest that the CRISPR/Cas9 system is effective for gene editing study of black wolfberry, and we expect this approach to be routinely applied to this important economic fruit.\"}, {\"paperId\": \"0210bcfcd7d58c9ff979d493fc990f3af3126ea3\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2022.102817\", \"CorpusId\": 248955862, \"PubMed\": \"35605479\"}, \"title\": \"Corrigendum to \\\"Generation of a homozygous CRISPR/Cas9-mediated knockout human iPSC line for PTCH1 gene\\\" [Stem Cell Res. 56 (2021) 102517].\", \"venue\": \"Stem Cell Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2022.102817\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2022.102817?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2022.102817, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1621840106\", \"name\": \"Bailing Zu\"}, {\"authorId\": \"152899318\", \"name\": \"Xiaoqing Zhang\"}, {\"authorId\": \"145205196\", \"name\": \"Guoling You\"}, {\"authorId\": \"8140809\", \"name\": \"Q. Fu\"}], \"abstract\": null}, {\"paperId\": \"0211662c0ba00e8e1395f936f2b4accd152e6c1a\", \"externalIds\": {\"PubMedCentral\": \"7496274\", \"MAG\": \"3023693209\", \"DOI\": \"10.1111/tpj.14795\", \"CorpusId\": 218519414, \"PubMed\": \"32369642\"}, \"title\": \"The genetic and functional analysis of flavor in commercial tomato: the FLORAL4 gene underlies a QTL for floral aroma volatiles in tomato fruit\", \"venue\": \"The Plant Journal\", \"year\": 2020, \"citationCount\": 41, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7496274\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7496274, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2944799\", \"name\": \"Y. Tikunov\"}, {\"authorId\": \"1413202205\", \"name\": \"F. Meijer-Dekens\"}, {\"authorId\": \"4849553\", \"name\": \"J. Molthoff\"}, {\"authorId\": \"30842593\", \"name\": \"J. Paulo\"}, {\"authorId\": \"2425367\", \"name\": \"R. Finkers\"}, {\"authorId\": \"2254585793\", \"name\": \"I.E.M. Capel\"}, {\"authorId\": \"1677811597\", \"name\": \"Fatima Carvajal Moreno\"}, {\"authorId\": \"144191224\", \"name\": \"C. Maliepaard\"}, {\"authorId\": \"1423463265\", \"name\": \"Mariska A Nijenhuis-de Vries\"}, {\"authorId\": \"50052181\", \"name\": \"C. Labrie\"}, {\"authorId\": \"2300900751\", \"name\": \"Wouter Verkerke\"}, {\"authorId\": \"113907238\", \"name\": \"A. W. van Heusden\"}, {\"authorId\": \"1918088\", \"name\": \"F. V. van Eeuwijk\"}, {\"authorId\": \"145080052\", \"name\": \"R. Visser\"}, {\"authorId\": \"2797415\", \"name\": \"A. Bovy\"}], \"abstract\": \"SUMMARY Tomato (Solanum lycopersicum L.) has become a popular model for genetic studies of fruit flavor in the last two decades. In this article we present a study of tomato fruit flavor, including an analysis of the genetic, metabolic and sensorial variation of a collection of contemporary commercial glasshouse tomato cultivars, followed by a validation of the associations found by quantitative trait locus (QTL) analysis of representative biparental segregating populations. This led to the identification of the major sensorial and chemical components determining fruit flavor variation and detection of the underlying QTLs. The high representation of QTL haplotypes in the breeders\\u2019 germplasm suggests that there is great potential for applying these QTLs in current breeding programs aimed at improving tomato flavor. A QTL on chromosome 4 was found to affect the levels of the phenylalanine\\u2010derived volatiles (PHEVs) 2\\u2010phenylethanol, phenylacetaldehyde and 1\\u2010nitro\\u20102\\u2010phenylethane. Fruits of near\\u2010isogenic lines contrasting for this locus and in the composition of PHEVs significantly differed in the perception of fruity and rose\\u2010hip\\u2010like aroma. The PHEV locus was fine mapped, which allowed for the identification of FLORAL4 as a candidate gene for PHEV regulation. Using a gene\\u2010editing\\u2010based (CRISPR\\u2010CAS9) reverse\\u2010genetics approach, FLORAL4 was demonstrated to be the key factor in this QTL affecting PHEV accumulation in tomato fruit.\"}, {\"paperId\": \"0213a22b2dafcbb858ec834754ae3e87fd6d9bfa\", \"externalIds\": {\"DOI\": \"10.1007/s00294-021-01182-3\", \"CorpusId\": 233183815, \"PubMed\": \"33830322\"}, \"title\": \"Lessons from the Nakaseomyces: mating-type switching, DSB repair and evolution of Ho\", \"venue\": \"Current Genetics\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00294-021-01182-3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00294-021-01182-3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1395581750\", \"name\": \"Laetitia Maroc\"}, {\"authorId\": \"66017349\", \"name\": \"C. Fairhead\"}], \"abstract\": null}, {\"paperId\": \"02169efbdaeca8bfd48e7e553ec9af538e42bd1b\", \"externalIds\": {\"DOI\": \"10.1016/j.cbd.2023.101106\", \"CorpusId\": 259354069, \"PubMed\": \"37413699\"}, \"title\": \"Screening for IBs-relative genes by transcriptome analysis and generation IBs-less mutants in Culter alburnus.\", \"venue\": \"Comparative Biochemistry and Physiology - Part D:Genomics and Proteomics\", \"year\": 2023, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.cbd.2023.101106?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.cbd.2023.101106, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145082091\", \"name\": \"Jianbo Zheng\"}, {\"authorId\": \"2322457883\", \"name\": \"Changxia He\"}, {\"authorId\": \"2220589545\", \"name\": \"Wen-ping Jiang\"}, {\"authorId\": \"47129794\", \"name\": \"Shili Liu\"}, {\"authorId\": \"2109531008\", \"name\": \"Fei Li\"}, {\"authorId\": \"5614637\", \"name\": \"Meili Chi\"}, {\"authorId\": \"145722148\", \"name\": \"Shun Cheng\"}, {\"authorId\": \"2157429189\", \"name\": \"Yi\\u2010nuo Liu\"}], \"abstract\": \"Intermuscular bones (IBs), distributed specifically in the myosepta on both sides of lower teleosts, negatively affect palatability and processing. Recent research in zebrafish and several economically important farmed fishes has led to the breakthrough discovery of the mechanism of IBs formation and generation of IBs-loss mutants. This study explored the ossification patterns of IBs in juvenile Culter alburnus. Besides, some key genes and bone-related signaling pathways were identified by transcriptomic data. Furthermore, PCR microarray validation revealed that claudin1 could potentially regulate IBs formation. Additionally, we created several IBs-reduced mutants of C. alburnus by loss of the function of bone morphogenetic proteins 6 (bmp6) gene using CRISPR/Cas9 editing. These results suggested that CRISPR/Cas9-mediated bmp6 knockout was promising approach for breeding IBs-free strain in other cyprinids.\"}, {\"paperId\": \"0217e25f2ceca6c2a341930cef7c0f19be3ac34f\", \"externalIds\": {\"PubMedCentral\": \"10834515\", \"DOI\": \"10.1038/s41467-024-45128-y\", \"CorpusId\": 267365988, \"PubMed\": \"38302473\"}, \"title\": \"Nuclear to cytoplasmic transport is a druggable dependency in MYC-driven hepatocellular carcinoma\", \"venue\": \"Nature Communications\", \"year\": 2024, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-024-45128-y.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10834515, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48935298\", \"name\": \"A. Deutzmann\"}, {\"authorId\": \"21420994\", \"name\": \"Delaney K. Sullivan\"}, {\"authorId\": \"3830083\", \"name\": \"R. Dhanasekaran\"}, {\"authorId\": \"2157337006\", \"name\": \"Wei Li\"}, {\"authorId\": \"2269710216\", \"name\": \"Xinyu Chen\"}, {\"authorId\": \"2282148205\", \"name\": \"Ling Tong\"}, {\"authorId\": \"1401104438\", \"name\": \"Wadie D. Mahauad-Fernandez\"}, {\"authorId\": \"2254846492\", \"name\": \"John Bell\"}, {\"authorId\": \"40388226\", \"name\": \"Adriane R. Mosley\"}, {\"authorId\": \"2282149672\", \"name\": \"Angela N. Koehler\"}, {\"authorId\": \"2111352861\", \"name\": \"Yulin Li\"}, {\"authorId\": \"1869241\", \"name\": \"D. Felsher\"}], \"abstract\": \"The MYC oncogene is often dysregulated in human cancer, including hepatocellular carcinoma (HCC). MYC is considered undruggable to date. Here, we comprehensively identify genes essential for survival of MYC^ high but not MYC^ low cells by a CRISPR/Cas9 genome-wide screen in a MYC-conditional HCC model. Our screen uncovers novel MYC synthetic lethal (MYC-SL) interactions and identifies most MYC-SL genes described previously. In particular, the screen reveals nucleocytoplasmic transport to be a MYC-SL interaction. We show that the majority of MYC-SL nucleocytoplasmic transport genes are upregulated in MYC^ high murine HCC and are associated with poor survival in HCC patients. Inhibiting Exportin-1 (XPO1) in vivo induces marked tumor regression in an autochthonous MYC-transgenic HCC model and inhibits tumor growth in HCC patient-derived xenografts. XPO1 expression is associated with poor prognosis only in HCC patients with high MYC activity. We infer that MYC may generally regulate and require altered expression of nucleocytoplasmic transport genes for tumorigenesis. The MYC oncogene is activated in the majority of human cancers and has proven challenging to target therapeutically. In this study, the authors identify genome-wide MYC synthetic-lethal interactions that could serve as potential alternative targets for the treatment of MYC-driven cancers.\"}, {\"paperId\": \"021f30510460df5eb2a3e1644fd90262a98c3c67\", \"externalIds\": {\"MAG\": \"3016783527\", \"DOI\": \"10.1101/2020.04.19.048728\", \"CorpusId\": 216145627}, \"title\": \"Production of a tributyltin-binding protein 2 knockout mutant strain of Japanese medaka, Oryzias latipes\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/04/20/2020.04.19.048728.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.04.19.048728?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.04.19.048728, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1403003473\", \"name\": \"Yoko Kato-Unoki\"}, {\"authorId\": \"51247241\", \"name\": \"Yuki Takai\"}, {\"authorId\": \"1656981649\", \"name\": \"Y. Nagano\"}, {\"authorId\": \"48430517\", \"name\": \"S. Matsunaga\"}, {\"authorId\": \"1656935133\", \"name\": \"Shintaro Enoki\"}, {\"authorId\": \"145234005\", \"name\": \"T. Takamura\"}, {\"authorId\": \"48388680\", \"name\": \"Sangwan Kim\"}, {\"authorId\": \"3625711\", \"name\": \"M. Kinoshita\"}, {\"authorId\": \"5356258\", \"name\": \"T. Kitano\"}, {\"authorId\": \"4830594\", \"name\": \"Y. Shimasaki\"}, {\"authorId\": \"48554959\", \"name\": \"Y. Oshima\"}], \"abstract\": \"Tributyltin-binding proteins (TBT-bps), members of the lipocalin family, bind TBT in fish blood and are presumed to contribute to detoxification of TBT. Recent studies have shown that many fish species have TBT-bp genes, and that these genes are induced by stresses such as exposure to chemicals or fish pathogenic bacteria. However, the function of TBT-bps, and the mechanisms of their induction and detoxification activity are still unclear. Here, towards elucidating the functions of TBT-bp2, we produced a TBT-bp2 knockout (TBT-bp2-/-) strain of Japanese medaka, Oryzias latipes, by using the CRISPR/Cas9 system. Gene expression of the mutated TBT-bp2 was reduced, and the cDNA sequencing and predicted protein structure suggested possible loss of function. However, the fish could be grown under normal conditions. Exposure of the TBT-bp2-/- strain of medaka to various stresses in future experiments is expected to contribute to our understanding of this novel detoxification system in aquatic organisms.\"}, {\"paperId\": \"021f5968446defa221bf97e4ea224ebe85825162\", \"externalIds\": {\"DOI\": \"10.21294/1814-4861-2023-22-2-76-84\", \"CorpusId\": 258519022}, \"title\": \"Knockout of the histone methyltransferase NSD1 leads to a decrease in cell proliferation and an increase in sensitivity to cisplatin in laryngeal squamous cell carcinoma\", \"venue\": \"Siberian journal of oncology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.siboncoj.ru/jour/article/download/2531/1097\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21294/1814-4861-2023-22-2-76-84?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21294/1814-4861-2023-22-2-76-84, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2053873885\", \"name\": \"I. Topchu\"}, {\"authorId\": \"16280133\", \"name\": \"M. Tikhomirova\"}, {\"authorId\": \"5086064\", \"name\": \"E. Bulatov\"}, {\"authorId\": \"46280829\", \"name\": \"Z. Abramova\"}, {\"authorId\": \"3869980\", \"name\": \"Y. Boumber\"}], \"abstract\": \"Introduction. The histone methylation regulates gene expression and plays a role in genomic stability participating in DNA repair. Dimethylation of histone 3 lysine 36 (H3K36me2) is an important histone modification which is responsible for gene expression activation. H3K36me2 is a product of methyltransferase activity of NSD1, NSD2, NSD3, and ASH1L proteins. NSD1 mutations are known to often occur in head and neck squamous carcinoma. The presence of NSD1 mutations highly correlates with increased survival, especially for patients with laryngeal cancer. The aim of this study was an in vitro investigation of the role of NSD1 in the cell proliferation of laryngeal squamous cell cancer and non-small lung cancer cells, as well as a study of the effect of disruption of the NSD1 gene expression on cisplatin treatment response.Material and Methods. Using TCGA, correlation analysis was performed to compare NSD1 wild type and mutant patient survival. NSD1 knockout cell lines models of laryngeal and non-small cell lung cancer were developed using the CRISPR/ Cas9 system. The effect of NSD1 knockout on H3K36me2 level was evaluated by western blot. Proliferation and IC50 of cisplatin in control and knockout cells were studied as well.Results. It was demonstrated that NSD1 knockout decreased the H3K36me2 level and cell proliferation in laryngeal squamous cell cancer cells and increased the sensitivity of head and neck cancer cells to cisplatin treatment, while there was no effect of NSD1 knockout in a non-small cell lung cancer cell line.Conclusion. Based on the data obtained, it can be concluded that the NSD1 protein is a potential target for inhibitor development following in vitro and in vivo testing in head-neck squamous cell carcinoma models. More studies are needed for better understanding of the regulation of tumor cell growth by NSD1.\\u00a0\"}, {\"paperId\": \"02224a7d0d7c7d3022ea5290a577f20ea984cf4f\", \"externalIds\": {\"DOI\": \"10.1128/aem.00230-23\", \"CorpusId\": 259074005, \"PubMed\": \"37272803\"}, \"title\": \"A Programmable CRISPR/Cas9 Toolkit Improves Lycopene Production in Bacillus subtilis\", \"venue\": \"Applied and Environmental Microbiology\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10305015\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1128/aem.00230-23?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1128/aem.00230-23, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152799306\", \"name\": \"Yang Liu\"}, {\"authorId\": \"6939850\", \"name\": \"Haijiao Cheng\"}, {\"authorId\": \"3196294\", \"name\": \"Haoni Li\"}, {\"authorId\": \"2177377774\", \"name\": \"Yingzhe Zhang\"}, {\"authorId\": \"39872583\", \"name\": \"M. Wang\"}], \"abstract\": \"We present a toolkit that allows for rapid cloning procedures and one-step subcloning to move from plasmid-based expression to stable chromosome integration and expression in a production strain in less than a week. The utility of the customized tool was demonstrated by integrating the MEP (2C-methyl-d-erythritol-4-phosphate) pathway, part of the pentose phosphate pathway (PPP), and the hetero-lycopene biosynthesis genes by stable expression in the genome. ABSTRACT Bacillus subtilis has been widely used and generally recognized as a safe host for the production of recombinant proteins, high-value chemicals, and pharmaceuticals. Thus, its metabolic engineering attracts significant attention. Nevertheless, the limited availability of selective markers makes this process difficult and time-consuming, especially in the case of multistep biosynthetic pathways. Here, we employ CRISPR/Cas9 technology to build an easy cloning toolkit that addresses commonly encountered obstacles in the metabolic engineering of B. subtilis, including the chromosomal integration locus, promoter, terminator, and guide RNA (gRNA) target. Six promoters were characterized, and the promoter strengths ranged from 0.9- to 23-fold that of the commonly used strong promoter P43. We characterized seven terminators in B. subtilis, and the termination efficiencies (TEs) of the seven terminators are all more than 90%. Six gRNA targets were designed upstream of the promoter and downstream of the terminator. Using a green fluorescent protein (GFP) reporter, we confirmed integration efficiency with the single-locus integration site is up to 100%. We demonstrated the applicability of this toolkit by optimizing the expression of a challenging but industrially important product, lycopene. By heterologous expression of the essential genes for lycopene synthesis on the B. subtilis genome, a total of 13\\u2009key genes involved in the lycopene biosynthetic pathway were manipulated. Moreover, our findings showed that the gene cluster ispG-idi-dxs-ispD could positively affect the production of lycopene, while the cluster dxr-ispE-ispF-ispH had a negative effect on lycopene production. Hence, our multilocus integration strategy can facilitate the pathway assembly for production of complex chemicals and pharmaceuticals in B. subtilis. IMPORTANCE We present a toolkit that allows for rapid cloning procedures and one-step subcloning to move from plasmid-based expression to stable chromosome integration and expression in a production strain in less than a week. The utility of the customized tool was demonstrated by integrating the MEP (2C-methyl-d-erythritol-4-phosphate) pathway, part of the pentose phosphate pathway (PPP), and the hetero-lycopene biosynthesis genes by stable expression in the genome. The tool could be useful to engineer B. subtilis strains through diverse recombination events and ultimately improve its potential and scope of industrial application as biological chassis.\"}, {\"paperId\": \"0222de8643110b993452689efae3c60419b432eb\", \"externalIds\": {\"DOI\": \"10.1101/2024.04.01.587492\", \"CorpusId\": 268876639}, \"title\": \"Developmental convergence and divergence in human stem cell models of autism spectrum disorder\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/04/02/2024.04.01.587492.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.04.01.587492?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.04.01.587492, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47926250\", \"name\": \"Aaron Gordon\"}, {\"authorId\": \"2294778698\", \"name\": \"Se-Jin Yoon\"}, {\"authorId\": \"2256551470\", \"name\": \"L. Bicks\"}, {\"authorId\": \"2294811215\", \"name\": \"Jaqueline M Martin\"}, {\"authorId\": \"40186783\", \"name\": \"G. Pintacuda\"}, {\"authorId\": \"2162603505\", \"name\": \"Stephanie A Arteaga\"}, {\"authorId\": \"6007881\", \"name\": \"B. Wamsley\"}, {\"authorId\": \"2295886723\", \"name\": \"Qiuyu Guo\"}, {\"authorId\": \"41029735\", \"name\": \"Lubayna Elahi\"}, {\"authorId\": \"2294722305\", \"name\": \"Ricardo Dolmetsch\"}, {\"authorId\": \"2203502832\", \"name\": \"Jonathan A. Bernstein\"}, {\"authorId\": \"2294722566\", \"name\": \"Ruth O\\u2019Hara\"}, {\"authorId\": \"2289338391\", \"name\": \"Joachim F Hallmayer\"}, {\"authorId\": \"2201905919\", \"name\": \"K. Lage\"}, {\"authorId\": \"3083168\", \"name\": \"S. Pa\\u0219ca\"}, {\"authorId\": \"2256531234\", \"name\": \"D. Geschwind\"}], \"abstract\": \"Two decades of genetic studies in autism spectrum disorder (ASD) have identified over a hundred genes harboring rare risk mutations. Despite this substantial heterogeneity, transcriptomic and epigenetic analyses have identified convergent patterns of dysregulation across ASD post-mortem brain tissue. To identify shared and distinct mutational mechanisms, we assembled the largest hiPS cell patient cohort to date, consisting of 70 hiPS cell lines after stringent quality control representing 8 ASD-associated mutations, idiopathic ASD, and 20 lines from non-affected controls. We used these hiPS lines to generate human cortical organoids (hCO), profiling by RNAseq at four distinct timepoints up to 100 days of in vitro differentiation. Early timepoints harbored the largest mutation-specific changes, but different genetic forms converged on shared transcriptional changes as development progressed. We identified a shared RNA and protein interaction network, which was enriched in ASD risk genes and predicted to drive the observed down-stream changes in gene expression. CRISPR-Cas9 screening of these candidate transcriptional regulators in induced human neural progenitors validated their downstream molecular convergent effects. These data illustrate how genetic risk can propagate via transcriptional regulation to impact convergently dysregulated pathways, providing new insight into the convergent impact of ASD genetic risk on human neurodevelopment.\"}, {\"paperId\": \"02239626bc3ac4afe990605f08a39e3ac82fad51\", \"externalIds\": {\"DOI\": \"10.1093/neuonc/noac209.112\", \"CorpusId\": 253538247}, \"title\": \"CNSC-31. CRISPR FUNCTIONAL SCREEN IDENTIFIES A NOVEL LONG NONCODING RNA MODULATING GLIOBLASTOMA INVASION\", \"venue\": \"Neuro-Oncology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/24/Supplement_7/vii29/47018940/noac209.112.pdf\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/neuonc/noac209.112?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/neuonc/noac209.112, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"21143410\", \"name\": \"Kathleen Tsung\"}, {\"authorId\": \"2187065243\", \"name\": \"Jane S Han\"}, {\"authorId\": \"30406669\", \"name\": \"Kristie Q. Liu\"}, {\"authorId\": \"143802738\", \"name\": \"Eddie Loh\"}, {\"authorId\": \"2028970306\", \"name\": \"F. Attenello\"}], \"abstract\": \"\\n \\n \\n Glioblastoma(GBM) invasion studies traditionally target coding genes. Long noncoding RNAs (lncRNAs), are transcripts without coding potential, with limited data regarding function. We leveraged CRISPR-interference, repressing lncRNA transcription via Cas9-KRAB, to evaluate invasive function of GBM-associated lncRNAs in a CRISPRi functional screen.\\n \\n \\n \\n 2,307 candidate lncRNAs were assembled from GBM differential gene expression. Guide RNAs targeting candidates were lentivirally incorporated into GBM screening populations. Screen populations were evaluated via Matrigel invasion, comparing sgRNA populations before/after a 24-hour invasion period. ASO treatment evaluated pharmacologic targeting of candidate lncRNAs. Top screening candidates were evaluated in a patient derived glioma stem cell (GSC) line, USC02, as well as U87 and U251 commercial lines. Differential gene expression was assessed in multiple cell lines following lncRNA knockdown via RNA-seq followed by GSEA and pathway analysis was evaluated to assess downstream mechanistic candidates affected by lncRNA KD.\\n \\n \\n \\n Forty-eight lncRNAs were significantly associated with GBM invasion, with lncRNA repression associated with decreased invasion of 31-85%(p< 0.01). Individual validation of a candidate lncRNA KD, LH02236, confirmed 85% decrease in tumor cell invasion versus control. Evaluation of gene expression across normal cortex and tumor samples from GSEA/TCGA datasets revealed LH02236 is significantly more expressed in GBM versus low grade glioma, and in low grade glioma versus normal cortex. Expression of LH02236 was significantly associated with patient survival (p< 0.0001). Gene expression analysis of LH02236 knockdown revealed Sox10 to be highly correlated with lncRNA expression across multiple cell lines.\\n \\n \\n \\n Large scale CRISPRi screening identified LH02236, a previously unannotated lncRNA, as essential to invasion in patient lines. Gene expression is significantly associated with tumor grade and patient survival. Analysis of knockdown across multiple cell lines suggests Sox 10, commonly associated with GSC function, is modulated by this novel lncRNA.\\n\"}, {\"paperId\": \"0223f9c610e468b91f76a3d0d3c32d2186c56a77\", \"externalIds\": {\"MAG\": \"3028935496\", \"DOI\": \"10.1101/2020.05.28.120543\", \"CorpusId\": 219155066}, \"title\": \"Quantitative live-cell imaging yields novel insight into endogenous WNT/CTNNB1 signaling dynamics\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.7554/elife.66440\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.05.28.120543?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.05.28.120543, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1752912063\", \"name\": \"Saskia de Man\"}, {\"authorId\": \"10778274\", \"name\": \"G. Zwanenburg\"}, {\"authorId\": \"4563774\", \"name\": \"M. Hink\"}, {\"authorId\": \"41199669\", \"name\": \"R. V. Amerongen\"}], \"abstract\": \"WNT/CTNNB1 signaling regulates tissue development and homeostasis in all multicellular animals. Multiple aspects of the underlying molecular mechanism remain poorly understood and critical information on endogenous WNT/CTNNB1 signaling dynamics is missing. Here we combine CRISPR/Cas9-mediated genome editing and quantitative live-cell microscopy to measure diffusion characteristics of fluorescently tagged, endogenous CTNNB1 in human cells with high spatiotemporal resolution. State-of-the-art functional imaging reveals that both in the absence and presence of WNT, a substantial fraction of CTNNB1 resides in slow-diffusing complexes in the cytoplasm and that WNT stimulation changes their identity. We also measure the concentration of complexed and free CTNNB1 in both the cytoplasm and the nucleus before and after WNT stimulation, and use these parameters to build a minimal computational model of WNT/CTNNB1 signaling. Our work reveals that WNT regulates the dynamic distribution of CTNNB1 across different functional pools by modulating the destruction complex, nucleocytoplasmic shuttling and nuclear retention.\"}, {\"paperId\": \"022f93974df5cb90c04318ece7f26774f2900657\", \"externalIds\": {\"MAG\": \"3044001306\", \"DOI\": \"10.1016/j.cpcardiol.2020.100652\", \"CorpusId\": 221285908, \"PubMed\": \"32828559\"}, \"title\": \"CRISPR-Cas9 Applications in Cardiovascular Disease.\", \"venue\": \"Current problems in cardiology\", \"year\": 2020, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.cpcardiol.2020.100652?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.cpcardiol.2020.100652, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1905105975\", \"name\": \"J. P. Khouzam\"}, {\"authorId\": \"52229155\", \"name\": \"Vijai S. Tivakaran\"}], \"abstract\": \"The CRISPR-Cas9 system is an economical and accessible gene-editing technology first discovered as a naturally occurring bacterial immune system. Since its fairly recent discovery, CRISPR-Cas9 system's efficiency and simplicity have been successfully used to edit genomes of living organisms in many fields, working in vitro and in vivo in germline and somatic cells to knock-out harmful mutated genes or in some cases working to knock-in a beneficial gene. A current application of the gene-editing system works against specific mutations that cause certain cardiovascular diseases. However, there are current technical limitations as well as ethical dilemmas in introducing gene-editing to humans. Here, we explore highlights on the current state of research of the CRISPR-Cas9 system through the lens of cardiovascular disease and examine potential untouched applications of the system in the field of cardiology.\"}, {\"paperId\": \"022f9b2c5a91908e9c7a1b45c19d24b6bc29849f\", \"externalIds\": {\"PubMedCentral\": \"11148293\", \"DOI\": \"10.3389/fcell.2024.1411162\", \"CorpusId\": 269970077, \"PubMed\": \"38835510\"}, \"title\": \"Gene-deficient mouse model established by CRISPR/Cas9 system reveals 15 reproductive organ-enriched genes dispensable for male fertility\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2024.1411162/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11148293, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2328249272\", \"name\": \"Tuyen Thi Thanh Nguyen\"}, {\"authorId\": \"6650922\", \"name\": \"K. Tokuhiro\"}, {\"authorId\": \"51164018\", \"name\": \"Keisuke Shimada\"}, {\"authorId\": \"2282502315\", \"name\": \"Haoting Wang\"}, {\"authorId\": \"2299057427\", \"name\": \"Daisuke Mashiko\"}, {\"authorId\": \"2302676954\", \"name\": \"Shingo Tonai\"}, {\"authorId\": \"4826345\", \"name\": \"D. Kiyozumi\"}, {\"authorId\": \"2271563980\", \"name\": \"Masahito Ikawa\"}], \"abstract\": \"Since the advent of gene-targeting technology in embryonic stem cells, mice have become a primary model organism for investigating human gene function due to the striking genomic similarities between the two species. With the introduction of the CRISPR/Cas9 system for genome editing in mice, the pace of loss-of-function analysis has accelerated significantly. This has led to the identification of numerous genes that play crucial roles in male reproductive processes, including meiosis, chromatin condensation, flagellum formation in the testis, sperm maturation in the epididymis, and fertilization in the oviduct. Despite the advancements, the functions of many genes, particularly those enriched in male reproductive tissues, remain largely unknown. In our study, we focused on 15 genes and generated 13 gene-deficient mice [4933411K16Rik, Adam triple (Adam20, Adam25, and Adam39), BC048671, Cfap68, Gm4846, Gm4984, Gm13570, Nt5c1b, Ppp1r42, Saxo4, Sh3d21, Spz1, and Tektl1] to elucidate their roles in male fertility. Surprisingly, all 13 gene-deficient mice exhibited normal fertility in natural breeding experiments, indicating that these genes are not essential for male fertility. These findings have important implications as they may help prevent other research laboratories from duplicating efforts to generate knockout mice for genes that do not demonstrate an apparent phenotype related to male fertility. By shedding light on the dispensability of these genes, our study contributes to a more efficient allocation of research resources in the exploration of male reproductive biology.\"}, {\"paperId\": \"0234fc2399223dfdad1862f7160b58bf0ef759fa\", \"externalIds\": {\"MAG\": \"3093045073\", \"DOI\": \"10.1007/s12015-020-10057-y\", \"CorpusId\": 222826153, \"PubMed\": \"33057942\"}, \"title\": \"Disruption of CTCF Boundary at HOXA Locus Promote BET Inhibitors\\u2019 Therapeutic Sensitivity in Acute Myeloid Leukemia\", \"venue\": \"Stem Cell Reviews and Reports\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12015-020-10057-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12015-020-10057-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12066999\", \"name\": \"Jie Zha\"}, {\"authorId\": \"5092435\", \"name\": \"Qian Lai\"}, {\"authorId\": \"6212754\", \"name\": \"Manman Deng\"}, {\"authorId\": \"49160852\", \"name\": \"P. Shi\"}, {\"authorId\": \"47941097\", \"name\": \"Haijun Zhao\"}, {\"authorId\": \"2218649523\", \"name\": \"Qinwei Chen\"}, {\"authorId\": \"1715943\", \"name\": \"Hua Wu\"}, {\"authorId\": \"46798935\", \"name\": \"Bing Xu\"}], \"abstract\": null}, {\"paperId\": \"023653b06ebc3db0fc66057fcb6410347ffebf48\", \"externalIds\": {\"PubMedCentral\": \"9943641\", \"DOI\": \"10.1098/rsob.220220\", \"CorpusId\": 257051264, \"PubMed\": \"36809799\"}, \"title\": \"Analysis of the phosphoproteome of CK2\\u03b1(\\u2013/\\u2013)/\\u0394\\u03b1\\u2032 C2C12 myoblasts compared to the wild-type cells\", \"venue\": \"Open Biology\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1098/rsob.220220\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9943641, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5720119\", \"name\": \"Christian Borgo\"}, {\"authorId\": \"6387047\", \"name\": \"L. Cesaro\"}, {\"authorId\": \"47933608\", \"name\": \"T. Hirota\"}, {\"authorId\": \"40054242\", \"name\": \"K. Kuwata\"}, {\"authorId\": \"1396041604\", \"name\": \"C. D'Amore\"}, {\"authorId\": \"2044624\", \"name\": \"T. Ruppert\"}, {\"authorId\": \"7985786\", \"name\": \"Renata Blatnik\"}, {\"authorId\": \"32783907\", \"name\": \"M. Salvi\"}, {\"authorId\": \"2079990\", \"name\": \"L. Pinna\"}], \"abstract\": \"CK2 is a Ser/Thr protein kinase composed of two catalytic (\\u03b1/\\u03b1\\u2032) subunits and a non-catalytic \\u03b2-subunit dimer, whose activity is often abnormally high in cancer cells. The concept that CK2 may be dispensable for cell survival has been challenged by the finding that viable CK2\\u03b1/\\u03b1\\u2032 knock-out myoblast clones still express small amounts of an N-terminally deleted \\u03b1\\u2032 subunit generated during the CRISPR/Cas9 procedure. Here we show that, although the overall CK2 activity of these CK2\\u03b1(\\u2013/\\u2013)/\\u0394\\u03b1\\u2032 (KO) cells is less than 10% compared to wild-type (WT) cells, the number of phosphosites with the CK2 consensus is comparable to that of WT cells. A more in-depth analysis, however, reveals that the two phosphoproteomes are not superimposable according to a number of criteria, notably a functional analysis of the phosphoproteome found in the two types of cells, and variable sensitivity of the phosphosites to two structurally unrelated CK2 inhibitors. These data support the idea that a minimal CK2 activity, as in KO cells, is sufficient to perform basic housekeeping functions essential for cell survival, but not to accomplish several specialized tasks required upon cell differentiation and transformation. From this standpoint, a controlled downregulation of CK2 would represent a safe and valuable anti-cancer strategy.\"}, {\"paperId\": \"023692ead85d648d7a0f119a67a392f784aee1a3\", \"externalIds\": {\"DOI\": \"10.1111/tpj.16317\", \"CorpusId\": 259000335, \"PubMed\": \"37256847\"}, \"title\": \"Targeted Mutagenesis of the Vacuolar H+ Translocating Pyrophosphatase Gene Reduces Grain Chalkiness in Rice.\", \"venue\": \"The Plant Journal\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/tpj.16317?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/tpj.16317, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2000439840\", \"name\": \"P. Gann\"}, {\"authorId\": \"2218832895\", \"name\": \"Dominic Dharwadker\"}, {\"authorId\": \"2218829620\", \"name\": \"Sajedeh Rezaei Cherati\"}, {\"authorId\": \"2389413034\", \"name\": \"Kari Vinzant\"}, {\"authorId\": \"5125981\", \"name\": \"Mariya V. Khodakovskaya\"}, {\"authorId\": \"143729318\", \"name\": \"V. Srivastava\"}], \"abstract\": \"Grain chalkiness is a major concern in rice production as it impacts milling yield and cooking quality, eventually reducing market value of the rice. A gene encoding the vacuolar H+ translocating pyrophosphatase (V-PPase) is a major quantitative trait locus in indica rice, controlling grain chalkiness. Higher transcriptional activity of this gene is associated with increased chalk content. However, whether the suppression of V-PPase could reduce chalkiness is not clear. Further, natural variation in the chalkiness of japonica rice has not been linked with V-PPase. Here, we describe promoter targeting of the japonica V-PPase allele that led to reduced grain chalkiness and development of more translucent grains. Disruption of a putative GATA element by CRISPR/Cas9 suppressed V-PPase activity, reduced grain chalkiness, and impacted post-germination growth that could be rescued by the exogenous supply of sucrose. The mature grains of the targeted lines showed a much lower percentage of large or medium chalk. Interestingly, the targeted lines developed a significantly lower chalk under heat stress, a major inducer of grain chalk. Metabolomic analysis showed that pathways related to starch and sugar metabolism were affected in the developing grains of the targeted lines that correlated with higher inorganic pyrophosphate and starch contents and upregulation of starch biosynthesis genes. In summary, we show a biotechnology approach of reducing grain chalkiness in rice by downregulating the transcriptional activity of V-PPase that presumably leads to altered metabolic rates including starch biosynthesis, resulting in more compact packing of starch granules and formation of translucent rice grains.\"}, {\"paperId\": \"02383d8061c3960b591c42bb11bf9d03ee4affe8\", \"externalIds\": {\"PubMedCentral\": \"10497038\", \"DOI\": \"10.1242/bio.059970\", \"CorpusId\": 261123042, \"PubMed\": \"37623822\"}, \"title\": \"A universal method for generating knockout mice in multiple genetic backgrounds using zygote electroporation\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.biologists.com/bio/article-pdf/doi/10.1242/bio.059970/3102654/bio059970.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10497038, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35570157\", \"name\": \"T. Tamari\"}, {\"authorId\": \"97819322\", \"name\": \"Y. Ikeda\"}, {\"authorId\": \"2055245914\", \"name\": \"Kento Morimoto\"}, {\"authorId\": \"2111101230\", \"name\": \"Keiko Kobayashi\"}, {\"authorId\": \"1422413975\", \"name\": \"Saori Mizuno-Iijima\"}, {\"authorId\": \"50707473\", \"name\": \"Shinya Ayabe\"}, {\"authorId\": \"35192934\", \"name\": \"Akihiro Kuno\"}, {\"authorId\": \"2109339\", \"name\": \"S. Mizuno\"}, {\"authorId\": \"2855375\", \"name\": \"A. Yoshiki\"}], \"abstract\": \"Genetically engineered mouse models are essential tools for understanding mammalian gene functions and disease pathogenesis. Genome editing allows for the generation of these models in multiple inbred strains of mice without backcrossing. Zygote electroporation dramatically removed the barrier for introducing the CRISPR-Cas9 complex in terms of cost and labour. However, the editing conditions and protocols to produce knockout lines have been optimised for a limited number of strains or stocks. Here, we demonstrate a novel and universal approach for generating knockout mice in multiple inbred strains. By combining in vitro fertilisation and electroporation, we obtained founders for knockout alleles in 8 common inbred strains. Long-read sequencing analysis detected not only intended mutant alleles but also differences in read frequency of intended and unintended alleles among strains. Successful germline transmission of knockout alleles demonstrated that our novel approach can establish mutant mice targeting the same locus in multiple inbred strains for phenotyping analysis, contributing to reverse genetics and human disease research. Summary statement Universal method for zygote genome editing in multiple inbred mouse strains allows for generation of novel mutant mice for understanding mammalian gene function and human disease pathogenesis.\"}, {\"paperId\": \"023b52f421a971af4f77ce1088735ae4ad3ee6b4\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-3106\", \"CorpusId\": 249719764}, \"title\": \"Abstract 3106: Identifying drivers in the converging syntenic aneuploidies of spontaneous canine and pediatric high-grade glioma using imaging-based an arrayed CRISPR-Cas9 phenotypic screen\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-3106?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-3106, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4753151\", \"name\": \"S. Amin\"}, {\"authorId\": \"34553850\", \"name\": \"A. Gujar\"}, {\"authorId\": \"2142141006\", \"name\": \"Eunhee Yi\"}, {\"authorId\": \"2147132042\", \"name\": \"Wonyeong Kang\"}, {\"authorId\": \"2148491031\", \"name\": \"Megan L Costa\"}, {\"authorId\": \"2170631053\", \"name\": \"Greg Sjogren\"}, {\"authorId\": \"2058750094\", \"name\": \"P. Gabriel\"}, {\"authorId\": \"40434737\", \"name\": \"Leigh Maher\"}, {\"authorId\": \"2062909416\", \"name\": \"Peter Dickinson\"}, {\"authorId\": \"2141394979\", \"name\": \"Rebecca A. Packer\"}, {\"authorId\": \"48076092\", \"name\": \"Elise T. Courtois\"}, {\"authorId\": \"144304936\", \"name\": \"P. Robson\"}, {\"authorId\": \"2150758427\", \"name\": \"Charles Lee\"}, {\"authorId\": \"144672002\", \"name\": \"R. Verhaak\"}], \"abstract\": \"\\n Gliomas occur in companion dogs at rates comparable to humans, with short-snouted breeds such as boxers being more susceptible than others. The natural progression of cancer in the immuno-competent host allows companion dogs diagnosed with sporadic glioma as an optimal model for preclinical testing of therapeutic approaches with human relevance, including immunotherapies. We have recently performed comprehensive genomic and epigenetic characterization of glioma in dogs to their human counterparts and found strong convergent evolution - shared somatic mutations and aneuploidies - among syntenic regions, including those of known pediatric glioma drivers, e.g., PDGFRA, MYC, PIK3CA. Here, using arrayed CRISPR-Cas9 imaging based phenotypic screen, we will probe potential oncogenic drivers and tumor suppressor genes within syntenic aneuploidies and thus outline functional versus non-functional heterogeneity of cancer aneuploidy. Specifically, we are conducting arrayed knockout screen (one gene per well) of 400+ genes within syntenic aneuploidies across primary cultured cells of canine glioma (n=2) and pediatric high-grade glioma cell lines (n=2). We will first capture images by high-speed confocal imaging system at three time points post-transduction of single guide RNAs (2 per gene) targeting each of 400+ genes in their separate wells. Then, using high-throughput image analysis and semi-supervised machine learning methods, we will measure well-based phenotypic features (viability, growth, and morphology) from these images. Genes will be ranked per cross-validated predicted probability in yielding either proliferating or slow-growing cell type based on learned phenotypic features using image data of knockout cells from and across wells. The top ranked genes will then be linked to oncogenes and tumor suppressors based on pathway and ontology analysis as well as further functional in vitro and in vivo (PDX) validation. We expect to find convergence of the most impactful molecular abnormalities (based on their knockout phenotypes) on candidate signaling pathways for the development of new drugs and repurposing of existing drugs for children and dogs with high-grade glioma.\\n Citation Format: Samirkumar B. Amin, Amit Gujar, Eunhee Yi, Wonyeong Kang, Megan Costa, Greg Sjogren, Paul Gabriel, Leigh Maher, Peter Dickinson, Rebecca Packer, Elise Courtois, Paul Robson, Charles Lee, Roel Verhaak. Identifying drivers in the converging syntenic aneuploidies of spontaneous canine and pediatric high-grade glioma using imaging-based an arrayed CRISPR-Cas9 phenotypic screen [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 3106.\"}, {\"paperId\": \"023bb32fc0bd49d114fe3fd2178871b16f9a9ad4\", \"externalIds\": {\"DOI\": \"10.1002/jmv.70120\", \"CorpusId\": 274892395, \"PubMed\": \"39704250\"}, \"title\": \"HCC Model Induced by P53 and Pten Knockout in HBV\\u2010Transgenic Mice Mirrors Human HCC at the Transcriptome Level\", \"venue\": \"Journal of Medical Virology\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/jmv.70120?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/jmv.70120, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2226420746\", \"name\": \"Zhao Chen\"}, {\"authorId\": \"2260442108\", \"name\": \"Jing Yang\"}, {\"authorId\": \"2336527915\", \"name\": \"Yang Song\"}, {\"authorId\": \"48283297\", \"name\": \"Xiangmei Chen\"}, {\"authorId\": \"2336689292\", \"name\": \"Yuan Duan\"}, {\"authorId\": \"2320186084\", \"name\": \"Jingzhou Wang\"}, {\"authorId\": \"2336293792\", \"name\": \"Yongzhen Liu\"}, {\"authorId\": \"23270444\", \"name\": \"G. Guan\"}], \"abstract\": \"With a multitude of HCC mouse models available, choosing the one that most closely resembles human HCC can be challenging. This study addresses this gap by conducting a comprehensive transcriptomic similarity analysis of widely used HCC mouse models. In this study, RNA\\u2010seq was performed on a model induced by double knockout of P53 and Pten via CRISPR/Cas9 in HBV\\u2010transgenic mice. Additionally, RNA\\u2010seq data from 2345 various other models induced by different methods were collected from GEO databases. The gene expression profiles, immune microenvironments, and metabolic pathways of these models were compared with those of human HCC. The analysis revealed distinct transcriptomic features among the different models. The HBV\\u2009+\\u2009P53&Pten KO model demonstrated the highest overall similarity to human HCC across various parameters. It shared a high degree of overlap in differentially expression genes (DEGs) between tumor and non\\u2010tumor tissues with human HCC, exhibited a transcriptome profile and immune cell infiltration pattern closely resembling human HCC, and showed metabolic alterations similar to those in human HCC. Conversely the DEN\\u2009+\\u2009CCl4\\u2010induced model showed the lowest similarity to human HCC in transcriptome profiles and DEGs and exhibited a distinct immune microenvironment with high NK cell infiltration, with minimal metabolic differences between tumor and non\\u2010tumor tissues. This study highlights the importance of selecting appropriate HCC mouse models for research. The HBV\\u2009+\\u2009p53&Pten KO model emerged as the most promising due to its remarkable similarity to human HCC across various aspects.\"}, {\"paperId\": \"023d874e514f28ccecacab7cedb3aa83bc86354b\", \"externalIds\": {\"DOI\": \"10.1681/asn.20233411s1942c\", \"CorpusId\": 269903662}, \"title\": \"Benefits of Genetic Testing in Patients with Polycystic Kidney Disease (PKD)\", \"venue\": \"Journal of the American Society of Nephrology\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1681/asn.20233411s1942c?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1681/asn.20233411s1942c, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2056970809\", \"name\": \"Marissa R Samuels\"}, {\"authorId\": \"2298256567\", \"name\": \"Wing H. Zeng\"}, {\"authorId\": \"2298407040\", \"name\": \"Jingjing Zhang\"}], \"abstract\": \". Background: ADPKD is mainly caused by mutations in PKD1 and PKD2 that encode polycystins, PC1 and PC2, respectively. Current evidence suggests that the dosage of PCs in primary cilia controls the severity and progression of ADPKD. But the molecular mechanisms mediating the trafficking of PCs into primary cilia remain unclear. NEK8 is the only known protein kinase residing in primary cilia, in the Inversin compartment, and is associated with a syndromic ciliopathy when both alleles are mutated. Interestingly, a novel monoallelic NEK8 mutation (p.Arg45Trp) was recently identified in 3 Mayo families with early onset PKD without extrarenal manifestations. This finding suggests that the mutation selectively causes PKD, and thus represents a unique tool for investigating the molecular mechanisms specifically regulating renal cystogenesis. Methods: Mutagenesis Transfection CRISPR/Cas9 Immunostaining Kinase assay Fluorescence Results: To understand how p.Arg45Trp (R45W) affects NEK8, we inactivated Nek8 in IMCD3 cells, and then re-expressed wild type (WT) or R45W variant NEK8. Primary cilia in Nek8 -/- cells were truncated but were rescued equally well by NEK8-WT and NEK8-R45W, which show comparable expression and stability. The level of GPR161 in cilia remained the same with or without Nek8 . Yet, ANKS6 as a binding partner of NEK8, lost its localization in Nek8 -/- cilia, which was fully recovered by reexpressing NEK8-WT or R45W. These data suggest that the overall structure of primary cilia is not affected by the R45W mutation. However, we observed that PC2 levels significantly decreased in Nek8 -null cilia; a defect rescued by NEK8-WT but not R45W, although the total protein level of PC2 appeared comparable. Our results indicate that the R45W mutation specifically impairs PC2 in cilia. Moreover, we showed that the autophosphorylation of NEK8-R45W was significantly decreased compared to NEK8-WT, implying a partial loss of kinase activity. This suggests that adequate NEK8 kinase activity is necessary for supporting the normal level of PC2 in cilia. Conclusions: We found that a novel ADPKD variant of NEK8 (R45W) selectively repressed the ciliary level of PC2. In future, we will seek NEK8 partners in cilia that are specifically affected by this single-point mutation in NEK8. Our work will provide critical information to the understanding of PC trafficking in cilia and ADPKD etiology.\"}, {\"paperId\": \"023e5dcb82842f96dfcacade6a6ce6015e28e407\", \"externalIds\": {\"DOI\": \"10.1007/s00441-022-03702-0\", \"CorpusId\": 253839121, \"PubMed\": \"36418571\"}, \"title\": \"The medaka mutant deficient in eyes shut homolog exhibits opsin transport defects and enhanced autophagy in retinal photoreceptors\", \"venue\": \"Cell and Tissue Research\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00441-022-03702-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00441-022-03702-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115497698\", \"name\": \"Keita Sato\"}, {\"authorId\": \"2196216813\", \"name\": \"Yang Liu\"}, {\"authorId\": \"144389667\", \"name\": \"T. Yamashita\"}, {\"authorId\": \"5442378\", \"name\": \"H. Ohuchi\"}], \"abstract\": null}, {\"paperId\": \"0244570318bf8fd28bd3e031c52125abe3868e6c\", \"externalIds\": {\"DOI\": \"10.1089/hum.2022.230\", \"CorpusId\": 256764443}, \"title\": \"Genome Editing: Moving Toward a New Era of Innovation, Development, and Approval\", \"venue\": \"\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1089/hum.2022.230?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/hum.2022.230, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46535588\", \"name\": \"H. Bachtarzi\"}], \"abstract\": null}, {\"paperId\": \"024fe7f02dccc5900c3222f0d4b936751df923fc\", \"externalIds\": {\"PubMedCentral\": \"12068771\", \"DOI\": \"10.1097/CM9.0000000000003104\", \"CorpusId\": 270866020, \"PubMed\": \"38945689\"}, \"title\": \"Vagus nerve modulates acute-on-chronic liver failure progression via CXCL9\", \"venue\": \"Chinese Medical Journal\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1097/cm9.0000000000003104\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC12068771, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2353698585\", \"name\": \"Li Wu\"}, {\"authorId\": \"2268251771\", \"name\": \"Jie Li\"}, {\"authorId\": \"87844576\", \"name\": \"Juqiu Zou\"}, {\"authorId\": \"2309213521\", \"name\": \"Daolin Tang\"}, {\"authorId\": \"9593164\", \"name\": \"Ruochan Chen\"}], \"abstract\": \"Abstract Background: Hepatic inflammatory cell accumulation and the subsequent systematic inflammation drive acute-on-chronic liver failure (ACLF) development. Previous studies showed that the vagus nerve exerts anti-inflammatory activity in many inflammatory diseases. Here, we aimed to identify the key molecule mediating the inflammatory process in ACLF and reveal the neuroimmune communication arising from the vagus nerve and immunological disorders of ACLF. Methods: Proteomic analysis was performed and validated in ACLF model mice or patients, and intervention animal experiments were conducted using neutralizing antibodies. PNU-282987 (acetylcholine receptor agonist) and vagotomy were applied for perturbing vagus nerve activity. Single-cell RNA sequencing (scRNA-seq), flow cytometry, immunohistochemical and immunofluorescence staining, and clustered regularly interspaced short palindromic repeats/CRISPR-associated protein 9 (CRISPR/Cas9) technology were used for in vivo or in vitro mechanistic studies. Results: The unbiased proteomics identified C-X-C motif chemokine ligand 9 (CXCL9) as the greatest differential protein in the livers of mice with ACLF and its relation to the systematic inflammation and mortality were confirmed in patients with ACLF. Interventions on CXCL9 and its receptor C-X-C chemokine receptor 3 (CXCR3) improved liver injury and decreased mortality of ACLF mice, which were related to the suppressing of hepatic immune cells\\u2019 accumulation and activation. Vagus nerve stimulation attenuated while vagotomy aggravated the expression of CXCL9 and the severity of ACLF. Blocking CXCL9 and CXCR3 ameliorated liver inflammation and increased ACLF-associated mortality in ACLF mice with vagotomy. scRNA-seq revealed that hepatic macrophages served as the major source of CXCL9 in ACLF and were validated by immunofluorescence staining and flow cytometry analysis. Notably, the expression of CXCL9 in macrophages was modulated by vagus nerve-mediated cholinergic signaling. Conclusions: Our novel findings highlighted that the neuroimmune communication of the vagus nerve\\u2013macrophage\\u2013CXCL9 axis contributed to ACLF development. These results provided evidence for neuromodulation as a promising approach for preventing and treating ACLF.\"}, {\"paperId\": \"0252fd57f23be77c5d6f28adf25bfa4765ea2993\", \"externalIds\": {\"PubMedCentral\": \"10176696\", \"DOI\": \"10.1186/s13046-023-02694-1\", \"CorpusId\": 258620936, \"PubMed\": \"37170124\"}, \"title\": \"CRISPR/Cas9-based genome-wide screening of the deubiquitinase subfamily identifies USP3 as a protein stabilizer of REST blocking neuronal differentiation and promotes neuroblastoma tumorigenesis\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2023, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/counter/pdf/10.1186/s13046-023-02694-1\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10176696, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1659249595\", \"name\": \"J. Karapurkar\"}, {\"authorId\": \"2116507271\", \"name\": \"Min-Seong Kim\"}, {\"authorId\": \"2163192946\", \"name\": \"Jencia Carminha Colaco\"}, {\"authorId\": \"48520003\", \"name\": \"B. Suresh\"}, {\"authorId\": \"1659241479\", \"name\": \"N. Sarodaya\"}, {\"authorId\": \"2155644634\", \"name\": \"Dong-Ho Kim\"}, {\"authorId\": \"150062556\", \"name\": \"Chang-Hwan Park\"}, {\"authorId\": \"6653601\", \"name\": \"Seok-Ho Hong\"}, {\"authorId\": \"46328279\", \"name\": \"Kye-Seong Kim\"}, {\"authorId\": \"39146021\", \"name\": \"S. Ramakrishna\"}], \"abstract\": \"Background The repressor element-1 silencing transcription factor (REST), a master transcriptional repressor, is essential for maintenance, self-renewal, and differentiation in neuroblastoma. An elevated expression of REST is associated with impaired neuronal differentiation, which results in aggressive neuroblastoma formation. E3 ligases are known to regulate REST protein abundance through the 26\\u00a0S proteasomal degradation pathway in neuroblastoma. However, deubiquitinating enzymes (DUBs), which counteract the function of E3 ligase-mediated REST protein degradation and their impact on neuroblastoma tumorigenesis have remained unexplored. Methods We employed a CRISPR/Cas9 system to perform a genome-wide knockout of ubiquitin-specific proteases (USPs) and used western blot analysis to screen for DUBs that regulate REST protein abundance. The interaction between USP3 and REST was confirmed by immunoprecipitation and Duolink in situ proximity assays. The deubiquitinating effect of USP3 on REST protein degradation, half-life, and neuronal differentiation was validated by immunoprecipitation, in vitro deubiquitination, protein-turnover, and immunostaining assays. The correlation between USP3 and REST expression was assessed using patient neuroblastoma datasets. The USP3 gene knockout in neuroblastoma cells was performed using CRISPR/Cas9, and the clinical relevance of USP3 regulating REST-mediated neuroblastoma tumorigenesis was confirmed by in vitro and in vivo oncogenic experiments. Results We identified a deubiquitinase USP3 that interacts with, stabilizes, and increases the half-life of REST protein by counteracting its ubiquitination in neuroblastoma. An in silico analysis showed a correlation between USP3 and REST in multiple neuroblastoma cell lines and identified USP3 as a prognostic marker for overall survival in neuroblastoma patients. Silencing of USP3 led to a decreased self-renewal capacity and promoted retinoic acid-induced differentiation in neuroblastoma. A loss of USP3 led to attenuation of REST-mediated neuroblastoma tumorigenesis in a mouse xenograft model. Conclusion The findings of this study indicate that USP3 is a critical factor that blocks neuronal differentiation, which can lead to neuroblastoma. We envision that targeting USP3 in neuroblastoma tumors might provide an effective therapeutic differentiation strategy for improved survival rates of neuroblastoma patients.\"}, {\"paperId\": \"0255aad50126bda69ce9a10ae83fba6d50329103\", \"externalIds\": {\"PubMedCentral\": \"9272118\", \"DOI\": \"10.5607/en22016\", \"CorpusId\": 250281113, \"PubMed\": \"35786639\"}, \"title\": \"Generation of Astrocyte-Specific MAOB Conditional Knockout Mouse with Minimal Tonic GABA Inhibition\", \"venue\": \"Experimental Neurobiology\", \"year\": 2022, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.en-journal.org/journal/download_pdf.php?uid=592\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9272118, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2119170554\", \"name\": \"Jung Moo Lee\"}, {\"authorId\": \"9531746\", \"name\": \"Moonsun Sa\"}, {\"authorId\": \"39360723\", \"name\": \"H. An\"}, {\"authorId\": \"2175106900\", \"name\": \"Jong Min Joseph Kim\"}, {\"authorId\": \"7813760\", \"name\": \"Jea Kwon\"}, {\"authorId\": \"120364634\", \"name\": \"Bo-Eun Yoon\"}, {\"authorId\": \"1390581732\", \"name\": \"C. J. Lee\"}], \"abstract\": \"Monoamine oxidase B (MAOB) is a key enzyme for GABA production in astrocytes in several brain regions. To date, the role of astrocytic MAOB has been studied in MAOB null knockout (KO) mice, although MAOB is expressed throughout the body. Therefore, there has been a need for genetically engineered mice in which only astrocytic MAOB is targeted. Here, we generated an astrocyte-specific MAOB conditional KO (cKO) mouse line and characterized it in the cerebellar and striatal regions of the brain. Using the CRISPR-Cas9 gene-editing technique, we generated Maob floxed mice (B6-Maobem1Cjl/Ibs) which have floxed exons 2 and 3 of Maob with two loxP sites. By crossing these mice with hGFAP-CreERT2, we obtained Maob floxed::hGFAP-CreERT2 mice which have a property of tamoxifen-inducible ablation of Maob under the human GFAP (hGFAP) promoter. When we treated Maob floxed::hGFAP-CreERT2 mice with tamoxifen for 5 consecutive days, MAOB and GABA immunoreactivity were significantly reduced in striatal astrocytes as well as in Bergmann glia and lamellar astrocytes in the cerebellum, compared to sunflower oil-injected control mice. Moreover, astrocyte-specific MAOB cKO led to a 74.6% reduction in tonic GABA currents from granule cells and a 76.8% reduction from medium spiny neurons. Our results validate that astrocytic MAOB is a critical enzyme for the synthesis of GABA in astrocytes. We propose that this new mouse line could be widely used in studies of various brain diseases to elucidate the pathological role of astrocytic MAOB in the future.\"}, {\"paperId\": \"025a3e2110efc309859309f6c8681801782f7a66\", \"externalIds\": {\"PubMedCentral\": \"7706176\", \"MAG\": \"3108486808\", \"DOI\": \"10.1038/s41580-020-00319-5\", \"CorpusId\": 227239684, \"PubMed\": \"33262537\"}, \"title\": \"Cellular basis for SARS-CoV-2 infection\", \"venue\": \"Nature reviews. Molecular cell biology\", \"year\": 2020, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41580-020-00319-5.pdf\", \"status\": \"HYBRID\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7706176, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50236016\", \"name\": \"K. Baumann\"}], \"abstract\": \"Daniloski, Jordan et al. report a genome-wide CRISPR\\u2013Cas9-mediated loss-of-function screen to identify host factors required for SARS-CoV-2 viral infection.\"}, {\"paperId\": \"0260684cf50c3659f955b7793ec091453411cc3e\", \"externalIds\": {\"MAG\": \"3049527344\", \"DOI\": \"10.1016/j.bbagen.2020.129707\", \"CorpusId\": 221180739, \"PubMed\": \"32810562\"}, \"title\": \"Heparan sulfate controls skeletal muscle differentiation and motor functions.\", \"venue\": \"Biochimica et Biophysica Acta - General Subjects\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bbagen.2020.129707?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bbagen.2020.129707, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404279242\", \"name\": \"Mariko Yokoyama\"}, {\"authorId\": \"31805683\", \"name\": \"T. Matsuzawa\"}, {\"authorId\": \"153196790\", \"name\": \"T. Yoshikawa\"}, {\"authorId\": \"6702094\", \"name\": \"Aki Nunomiya\"}, {\"authorId\": \"2349364\", \"name\": \"Y. Yamaguchi\"}, {\"authorId\": \"7642946\", \"name\": \"K. Yanai\"}], \"abstract\": \"BACKGROUND\\nHeparan sulfate (HS) is a sulfated linear polysaccharide on cell surfaces that plays an important role in physiological processes. HS is present in skeletal muscles but its detailed role in this tissue remains unclear.\\n\\n\\nMETHODS\\nWe examined the role of HS in the differentiation of C2C12 cells, a mouse myoblast cell line. We also phenotyped the impact of HS deletion in mouse skeletal muscles on their functions by using Cre-loxP system.\\n\\n\\nRESULTS\\nCRISPR-Cas9-dependent HS deletion or pharmacological removal of HS dramatically impaired myoblast differentiation of C2C12. To confirm the importance of HS in vivo, we deleted Ext1, which encodes an enzyme essential for HS biosynthesis, specifically in the mouse skeletal muscles (referred to as mExt1CKO mice). Treadmill and wire hang tests demonstrated that mExt1CKO mice exhibited muscle weakness. The contraction of isolated soleus muscles from mExt1CKO mice was also impaired. Morphological examination of mExt1CKO muscle tissue under light and electron microscopes revealed smaller cross sectional areas and thinner myofibrils. Finally, a model of muscle regeneration following BaCl2 injection into the tibialis anterior muscle (TA) of mice demonstrated that mExt1CKO mice had reduced expression of myosin heavy chain and an increased number of centronucleated cells. This indicates that muscle regeneration after injury was attenuated in the absence of HS expression in muscle cells.\\n\\n\\nGENERAL SIGNIFICANCE\\nThese results demonstrate that HS plays an important role in skeletal muscle function by promoting differentiation.\"}, {\"paperId\": \"02627cbca46b3f2ee0199dff5f2d4602117f5a6f\", \"externalIds\": {\"DOI\": \"10.1101/2021.05.24.445356\", \"CorpusId\": 235204295}, \"title\": \"Reprogrammed tracrRNAs enable repurposing RNAs as crRNAs and detecting RNAs\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.05.24.445356\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.05.24.445356?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.05.24.445356, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152799515\", \"name\": \"Yang Liu\"}, {\"authorId\": \"13733403\", \"name\": \"F. Pinto\"}, {\"authorId\": \"50624767\", \"name\": \"Xinyi Wan\"}, {\"authorId\": \"7323377\", \"name\": \"Shuguang Peng\"}, {\"authorId\": \"2357705190\", \"name\": \"Mengxi Li\"}, {\"authorId\": \"144050010\", \"name\": \"Zhen Xie\"}, {\"authorId\": \"4263173\", \"name\": \"C. French\"}, {\"authorId\": \"47780526\", \"name\": \"Baojun Wang\"}], \"abstract\": \"In type II CRISPR systems, the guide RNA (gRNA) consists of a CRISPR RNA (crRNA) and a hybridized trans-acting CRISPR RNA (tracrRNA) which interacts directly with Cas9 and is essential to its guided DNA targeting function. Though tracrRNAs are diverse in sequences and structures across type II CRISPR systems, the programmability of crRNA-tracrRNA hybridization for particular Cas9 has not been studied adequately. Here, we revealed the high programmability of crRNA-tracrRNA hybridization for Streptococcus pyogenes Cas9. By reprogramming the crRNA-tracrRNA hybridized sequence, reprogrammed tracrRNAs can repurpose various RNAs as crRNAs to trigger CRISPR function. We showed that the engineered crRNA-tracrRNA pairs enable design of orthogonal cellular computing devices and hijacking of endogenous RNAs as crRNAs. We next designed novel RNA sensors that can monitor the transcriptional activity of specific genes on the host genome and detect SARS-CoV-2 RNA in vitro. The engineering potential of crRNA-tracrRNA interaction has therefore redefined the capabilities of CRISPR/Cas9 system.\"}, {\"paperId\": \"02653c15c1c4443d9e4685c7c408a134b796978a\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.pancreatic24-a006\", \"CorpusId\": 272686647}, \"title\": \"Abstract A006: Generation of a flexible pancreatic cancer mouse model via somatic tissue engineering\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.pancreatic24-a006?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.pancreatic24-a006, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2214614595\", \"name\": \"Z. Yang\"}, {\"authorId\": \"2271729194\", \"name\": \"M. Bayani Cardenas\"}, {\"authorId\": \"4111977\", \"name\": \"Akihiko Miyauchi\"}, {\"authorId\": \"2397846245\", \"name\": \"Caroline G Snider\"}, {\"authorId\": \"2321381057\", \"name\": \"Ronald J. Parchem\"}], \"abstract\": \"\\n Pancreatic cancer, recognized as one of the most lethal cancer types, exhibits a dismal five-year survival rate below 12%. The genetic and epigenetic heterogeneity in human cancer poses a tremendous challenge in understanding disease mechanisms and developing targeted therapeutics. Current mouse models in the field can recapitulate some features of human pathophysiology but have limitations. While tumor formation in patients is focal, most genetically engineered mouse models (GEMMs) express oncogenes throughout the pancreas. GEMMs also have limited flexibility to manipulate gene expression and model the heterogeneity of human cancer. Additionally, GEMMs require significant time for crossing and tumor formation. Tumor transplantation models offer greater flexibility, however, they often require immunodeficient mice, which limits their applications in modeling the tumor microenvironment. To overcome the limits of current mouse models, we combined the piggyBac transposon system, CRISPR/Cas9, and in vivo electroporation to engineer somatic pancreatic tissue to induce focal tumor formation in immune-competent mice. With this approach, we engineered wildtype pancreata to express oncogenic KrasG12D while knocking out multiple tumor suppressors. We optimized this protocol by generating multiplexed gRNA constructs and cell type-specific promoters to improve reproducibility. Low-grade tumors formed within 10 days after electroporation, progressed to higher grade within a month, and metastasized to peritoneal organs during disease progression. Mouse tumors also recapitulated histopathological features in human patients. Lastly, we used our novel mouse model to study how mutant Kras disrupts post-transcriptional regulation by microRNA to drive pancreatic tumorigenesis. This model offers a powerful platform for manipulating gene expression and functionality to model cancer heterogeneity, ultimately advancing precision oncology's prospects for treating human patients.\\n Citation Format: Ziyue (Zoey) Yang, Mara Cardenas, Akihiko Miyauchi, Caroline Snider, Ronald Parchem. Generation of a flexible pancreatic cancer mouse model via somatic tissue engineering [abstract]. In: Proceedings of the AACR Special Conference in Cancer Research: Advances in Pancreatic Cancer Research; 2024 Sep 15-18; Boston, MA. Philadelphia (PA): AACR; Cancer Res 2024;84(17 Suppl_2):Abstract nr A006.\"}, {\"paperId\": \"0266cd1c0284bd21c3313bc3e4fd06667b791391\", \"externalIds\": {\"PubMedCentral\": \"9495794\", \"DOI\": \"10.3390/antiox11091787\", \"CorpusId\": 252225325, \"PubMed\": \"36139865\"}, \"title\": \"Genome-Scale CRISPR Knockout Screening Identifies BACH1 as a Key Regulator of Aflatoxin B1-Induced Oxidative Damage\", \"venue\": \"Antioxidants\", \"year\": 2022, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2076-3921/11/9/1787/pdf?version=1662804960\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9495794, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1970835864\", \"name\": \"Jinfu Zhang\"}, {\"authorId\": \"48802390\", \"name\": \"Siyi Hu\"}, {\"authorId\": \"15454044\", \"name\": \"Changzhi Zhao\"}, {\"authorId\": \"2145108404\", \"name\": \"Yuan Zhou\"}, {\"authorId\": \"2156147688\", \"name\": \"Lu Zhang\"}, {\"authorId\": \"2378727008\", \"name\": \"Hailong Liu\"}, {\"authorId\": \"2113327296\", \"name\": \"Peng Zhou\"}, {\"authorId\": \"2185191985\", \"name\": \"Sheng Li\"}, {\"authorId\": \"4618445\", \"name\": \"Liangliang Fu\"}, {\"authorId\": \"7003235\", \"name\": \"Zhuqing Zheng\"}, {\"authorId\": \"2068339957\", \"name\": \"Yue Xiang\"}, {\"authorId\": \"48670626\", \"name\": \"Xuewen Xu\"}, {\"authorId\": \"48564133\", \"name\": \"Jinxue Ruan\"}, {\"authorId\": \"48568992\", \"name\": \"Xinyun Li\"}, {\"authorId\": \"2383502745\", \"name\": \"Lvhui Sun\"}, {\"authorId\": \"49345119\", \"name\": \"Gang Cao\"}, {\"authorId\": \"2145075603\", \"name\": \"S. Zhao\"}, {\"authorId\": \"2108601626\", \"name\": \"Xu Wang\"}, {\"authorId\": \"33391089\", \"name\": \"Shengsong Xie\"}], \"abstract\": \"Aflatoxin B1 (AFB1) is amongst the mycotoxins commonly affecting human and animal health, raising global food safety and control concerns. The mechanisms underlying AFB1 toxicity are poorly understood. Moreover, antidotes against AFB1 are lacking. Genome-wide CRISPR/Cas9 knockout screening in porcine kidney cells identified the transcription factor BTB and CNC homolog 1 (BACH1) as a gene required for AFB1 toxicity. The inhibition of BACH1 expression in porcine kidney cells and human hepatoma cells resulted in increased resistance to AFB1. BACH1 depletion attenuates AFB1-induced oxidative damage via the upregulation of antioxidant genes. Subsequently, virtual structural screening identified the small molecule 1-Piperazineethanol, \\u03b1-[(1,3-benzodioxol-5-yloxy)methyl] -4-(2-methoxyphenyl) (M2) as an inhibitor of BACH1. M2 and its analogues inhibited AFB1-induced porcine and human cell death in vitro, while M2 administration significantly improved AFB1-induced symptoms of weight loss and liver injury in vivo. These findings demonstrate that BACH1 plays a central role in AFB1-induced oxidative damage by regulating antioxidant gene expression. We also present a potent candidate small-molecule inhibitor in developing novel treatments for AFB1 toxicity.\"}, {\"paperId\": \"026b26009de212060ad336ca00a46acba084f5c0\", \"externalIds\": {\"PubMedCentral\": \"11183856\", \"DOI\": \"10.1093/neuonc/noae064.132\", \"CorpusId\": 270587587}, \"title\": \"DIPG-79. METTL16 AS A THERAPEUTIC VULNERABILITY IN H3K27M MUTANT DMG CELLS\", \"venue\": \"Neuro-Oncology\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/26/Supplement_4/0/58252814/noae064.132.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11183856, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1500459466\", \"name\": \"Akanksha S Chilukuri\"}, {\"authorId\": \"2304685802\", \"name\": \"Monica Pomaville\"}, {\"authorId\": \"1932453757\", \"name\": \"Matthew E. Halbert\"}, {\"authorId\": \"2307890640\", \"name\": \"Chaun He\"}, {\"authorId\": \"2157445426\", \"name\": \"S. Agnihotri\"}], \"abstract\": \"Abstract BACKGROUND Diffuse Midline Glioma (DMG) is a highly aggressive (CNS WHO Grade IV) pediatric brain tumor characterized by the histone mutation H3K27M, resulting in global hypomethylation of histones. H3K27M mutant cells are highly dependent on methionine and methionine Adenosyltransferase 2A (MAT2A), a central regulator of the methionine cycle, representing a key vulnerability in H3K27M gliomas. MAT2A is upregulated by methyltransferase-like protein 16 (METTL16), which deposits N6-methyladenosine (m6A) on a subset of RNA residues to regulate gene expression. MAT2A is a sensor of methyl group donor S-adenosylmethionine (SAM) that, when placed, increases MAT2A intron splicing to compensate for a decrease in MAT2A function. METHODS To investigate our hypothesis, H3K27M histone mutation knockout cell lines were established using CRISPR Cas9 (Jabado lab) in DIPG4 cells. shRNA-mediated knockdown was used to attenuate METTL16 expression in DIPG4 H3K27M cells, and growth was assessed via sulforhodamine B (SRB) assay. RESULTS In silico analysis of normal brain tissue compared to low-grade glioma and high-grade glioma demonstrated increased METTL16 at both the RNA and protein levels (p=<0.0001). Therefore, we postulated that targeting METTL16 would affect H3K27M growth. Results showed increased cell death compared to control cells by day 4 (p=0.0034) and day 8 (p=<0.0001). Furthermore, knockdown of METTL16 in DMG cells with H3K27M decreased m6A levels on poly (A) RNA (p=0.049). CONCLUSIONS Our study highlights the vulnerability of H3K27M mutant cells to METTL16 modulation, elucidating underlying molecular mechanisms and paving the way for innovative therapeutic strategies targeting this axis.\"}, {\"paperId\": \"026f8a44ad7253236edd30cc737ca5e3b5f4e032\", \"externalIds\": {\"DOI\": \"10.1016/j.jaci.2021.07.003\", \"CorpusId\": 236000601, \"PubMed\": \"34271060\"}, \"title\": \"Novel Role for Caspase Recruitment Domain Family Member 14 and its Genetic Variant rs11652075 in Skin Filaggrin Homeostasis.\", \"venue\": \"Journal of Allergy and Clinical Immunology\", \"year\": 2021, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9119145\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jaci.2021.07.003?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jaci.2021.07.003, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39872658\", \"name\": \"Stanley B. DeVore\"}, {\"authorId\": \"31540437\", \"name\": \"Mariana L. Stevens\"}, {\"authorId\": \"35583969\", \"name\": \"Hua He\"}, {\"authorId\": \"33619285\", \"name\": \"J. Biagini\"}, {\"authorId\": \"11981290\", \"name\": \"J. Kroner\"}, {\"authorId\": \"50272672\", \"name\": \"Lisa J. Martin\"}, {\"authorId\": \"4461817\", \"name\": \"G. K. Khurana Hershey\"}], \"abstract\": \"BACKGROUND\\nLow epidermal filaggrin (FLG) is a risk factor for atopic dermatitis (AD) and allergic co-morbidity. FLG mutations do not fully explain the variation in epidermal FLG levels, highlighting that other genetic loci may also regulate FLG expression.\\n\\n\\nOBJECTIVE\\nTo identify genetic loci that regulate FLG expression and elucidate their functional and mechanistic consequences.\\n\\n\\nMETHODS\\nA genome-wide association study (GWAS) of quantified skin FLG expression in lesional and baseline non(never)-lesional skin of children with AD in the Mechanisms of Progression of Atopic Dermatitis to Asthma in Children (MPAACH) cohort was conducted. CRISPR-Cas9 approaches were used to create isogenic human keratinocytes differing only at the identified variant rs11652075, and CARD14-deficient keratinocytes for subsequent mechanistic studies.\\n\\n\\nRESULTS\\nThe GWAS identified the CARD14 rs11652075 variant to be associated with FLG expression in non(never)-lesional skin of children with AD. Rs11652075 is a CARD14 eQTL in human skin and primary human keratinocytes. The T variant destroys a functional CpG site resulting in reduced CpG methylation at this site (but not neighboring sites) in TT and CT compared to CC primary human keratinocytes and MPAACH children's skin samples, and rs11652075 increases CARD14 expression in an allele-specific fashion. Further, studies in CRISPR-generated CC and TT isogenic keratinocytes, as well as CARD14-haplosufficient and deficient keratinocytes, reveal that IL-17A regulates FLG expression via CARD14, and that the underlying mechanisms are rs11652075 genotype-dependent.\\n\\n\\nCONCLUSION\\nOur study identifies CARD14 as a novel regulator of FLG expression in the skin of children with AD. Further, CARD14 regulates skin FLG homeostasis in a rs11652075-dependent fashion.\"}, {\"paperId\": \"026fe95cc0a81f90409f725d3d42db8560594e3d\", \"externalIds\": {\"PubMedCentral\": \"10811912\", \"DOI\": \"10.1186/s12864-024-10007-9\", \"CorpusId\": 267212768, \"PubMed\": \"38273232\"}, \"title\": \"Differential gene expression and microRNA profile in corpora allata-corpora cardiaca of Aedes aegypti mosquitoes with weak juvenile hormone signalling\", \"venue\": \"BMC Genomics\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bmcgenomics.biomedcentral.com/counter/pdf/10.1186/s12864-024-10007-9\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10811912, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2265294029\", \"name\": \"Zhi Qi\"}, {\"authorId\": \"4908298\", \"name\": \"K. Etebari\"}, {\"authorId\": \"2325153\", \"name\": \"M. Nouzov\\u00e1\"}, {\"authorId\": \"2258704507\", \"name\": \"Fernando G. Noriega\"}, {\"authorId\": \"2124679563\", \"name\": \"Sassan Asgari\"}], \"abstract\": \"The corpora allata - corpora cardiaca (CA-CC) is an endocrine gland complex that regulates mosquito development and reproduction through the synthesis of juvenile hormone (JH). Epoxidase (Epox) is a key enzyme in the production of JH. We recently utilized CRISPR/Cas9 to establish an epoxidase- deficient ( epox ^\\u2212/\\u2212) Aedes aegypti line. The CA from epox ^\\u2212/\\u2212 mutants do not synthesize epoxidated JH III but methyl farneosate (MF), a weak agonist of the JH receptor, and therefore have reduced JH signalling. Illumina sequencing was used to examine the differences in gene expression between the CA-CC from wild type ( WT ) and epox ^ \\u2212/\\u2212 adult female mosquitoes. From 18,034 identified genes, 317 were significantly differentially expressed. These genes are involved in many biological processes, including the regulation of cell proliferation and apoptosis, energy metabolism, and nutritional uptake. In addition, the same CA-CC samples were also used to examine the microRNA (miRNA) profiles of epox ^ \\u2212/\\u2212 and WT mosquitoes. A total of 197 miRNAs were detected, 24 of which were differentially regulated in epox ^\\u2212/\\u2212 mutants. miRNA binding sites for these particular miRNAs were identified using an in silico approach; they target a total of 101 differentially expressed genes. Our results suggest that a lack of epoxidase, besides affecting JH synthesis, results in the diminishing of JH signalling that have significant effects on Ae. aegypti CA-CC transcriptome profiles, as well as its miRNA repertoire.\"}, {\"paperId\": \"026ff81650eaa1095055dfa620580d4f7788e6b6\", \"externalIds\": {\"PubMedCentral\": \"8633515\", \"DOI\": \"10.1111/pbi.13703\", \"CorpusId\": 237454134, \"PubMed\": \"34498373\"}, \"title\": \"CRISPR/Cas9\\u2010targeted mutagenesis of the BnaA03.BP gene confers semi\\u2010dwarf and compact architecture to rapeseed (Brassica napus L.)\", \"venue\": \"Plant Biotechnology Journal\", \"year\": 2021, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/pbi.13703\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8633515, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6137214\", \"name\": \"Shihang Fan\"}, {\"authorId\": \"2146644598\", \"name\": \"Liang Zhang\"}, {\"authorId\": \"38577573\", \"name\": \"Minqiang Tang\"}, {\"authorId\": \"2111027444\", \"name\": \"Ying Cai\"}, {\"authorId\": \"2108326042\", \"name\": \"Jinglin Liu\"}, {\"authorId\": \"40605301\", \"name\": \"Hongfang Liu\"}, {\"authorId\": \"2153466526\", \"name\": \"Jing Liu\"}, {\"authorId\": \"6570810\", \"name\": \"W. Terzaghi\"}, {\"authorId\": \"2113289351\", \"name\": \"Hanzhong Wang\"}, {\"authorId\": \"145221795\", \"name\": \"Wei Hua\"}, {\"authorId\": \"145537628\", \"name\": \"M. Zheng\"}], \"abstract\": \"Plant height and branch angle are the key factors of rapeseed plant architecture that affect plant density and lodging, which are crucial for rapeseed yield. In China, ~80% of growing areas are the semi-winter type (Bol-type), with taller plants that are easily affected by lodging and limit mechanical harvesting, especially of hybrids. Breeders have therefore been seeking an 'ideotype' for rapeseed breeding, deeming that semi-dwarf and compact architecture could benefit yield (Fu and Zhou, 2013; Li et al., 2019).\"}, {\"paperId\": \"0270f5e1c27780d0add22227218b77a3b8198f6f\", \"externalIds\": {\"DOI\": \"10.1002/dvdy.399\", \"CorpusId\": 231834138, \"PubMed\": \"34242444\"}, \"title\": \"The role of Gdf5 in the development of the zebrafish fin endoskeleton\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/dvdy.399\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/dvdy.399?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/dvdy.399, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"91284621\", \"name\": \"L. Waldmann\"}, {\"authorId\": \"46250417\", \"name\": \"J. Leyhr\"}, {\"authorId\": \"1672323229\", \"name\": \"Hanqing Zhang\"}, {\"authorId\": \"2995349\", \"name\": \"Amin Allalou\"}, {\"authorId\": \"1397876613\", \"name\": \"C. \\u00d6hman-M\\u00e4gi\"}, {\"authorId\": \"5846985\", \"name\": \"T. Haitina\"}], \"abstract\": \"Background The development of the vertebrate limb skeleton requires a complex interaction of multiple factors to facilitate correct shaping and positioning of bones and joints. Growth and differentiation factor 5 (Gdf5), a member of the transforming growth factor-beta family (TGF-\\u03b2) is involved in patterning appendicular skeletal elements including joints. Expression of gdf5 in zebrafish has been detected within the first pharyngeal arch jaw joint, fin mesenchyme condensations and segmentation zones in median fins, however little is known about the functional role of Gdf5 outside of Amniota. Results We generated CRISPR/Cas9 knockout of gdf5 in zebrafish and analysed the resulting phenotype at different developmental stages. Homozygous gdf5 mutant zebrafish displayed changes in segmentation of the endoskeletal disc and, in consequence, loss of posterior radials in the pectoral fins. Mutant fish also displayed affected organisation and length of skeletal elements in the median fins, however joint formation and mineralisation process seemed unaffected. Conclusions Our study demonstrates the importance of Gdf5 for the paired and median fin endoskeleton development in zebrafish and reveals that the severity of the effect increases from anterior to posterior side of the elements. Our findings are consistent with phenotypes observed in human and mouse appendicular skeleton in response to Gdf5 knockout, suggesting a broadly conserved role for Gdf5 in Osteichthyes.\"}, {\"paperId\": \"0275fac0f7b9a50823189c7a1241f095bfff41fb\", \"externalIds\": {\"PubMedCentral\": \"10351154\", \"DOI\": \"10.1186/s13058-023-01686-5\", \"CorpusId\": 259925626, \"PubMed\": \"37461077\"}, \"title\": \"RAGE inhibition blunts insulin-induced oncogenic signals in breast cancer\", \"venue\": \"Breast Cancer Research\", \"year\": 2023, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://breast-cancer-research.biomedcentral.com/counter/pdf/10.1186/s13058-023-01686-5\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10351154, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"78339207\", \"name\": \"M. G. Muoio\"}, {\"authorId\": \"48067610\", \"name\": \"M. Pellegrino\"}, {\"authorId\": \"108465797\", \"name\": \"V. Rapicavoli\"}, {\"authorId\": \"87342321\", \"name\": \"M. Talia\"}, {\"authorId\": \"146842853\", \"name\": \"G. Scavo\"}, {\"authorId\": \"118043964\", \"name\": \"V. Sergi\"}, {\"authorId\": \"4464163\", \"name\": \"V. Vella\"}, {\"authorId\": \"144631123\", \"name\": \"S. Pettinato\"}, {\"authorId\": \"39708870\", \"name\": \"M. Galasso\"}, {\"authorId\": \"6295171\", \"name\": \"R. Lappano\"}, {\"authorId\": \"1654297042\", \"name\": \"D. Scordamaglia\"}, {\"authorId\": \"50081144\", \"name\": \"F. Cirillo\"}, {\"authorId\": \"143840524\", \"name\": \"A. Pulvirenti\"}, {\"authorId\": \"5917404\", \"name\": \"D. Rigiracciolo\"}, {\"authorId\": \"153375058\", \"name\": \"M. Maggiolini\"}, {\"authorId\": \"34988907\", \"name\": \"A. Belfiore\"}, {\"authorId\": \"3209615\", \"name\": \"E. M. De Francesco\"}], \"abstract\": \"The receptor for advanced glycation end products (RAGE) is implicated in diabetes and obesity complications, as well as in breast cancer (BC). Herein, we evaluated whether RAGE contributes to the oncogenic actions of Insulin, which plays a key role in BC progression particularly in obese and diabetic patients. Analysis of the publicly available METABRIC study, which collects gene expression and clinical data from a large cohort ( n \\u2009=\\u20091904) of BC patients, revealed that RAGE and the Insulin Receptor ( IR ) are co-expressed and associated with negative prognostic parameters. In MCF-7, ZR75 and 4T1 BC cells, as well as in patient-derived Cancer-Associated Fibroblasts, the pharmacological inhibition of RAGE as well as its genetic depletion interfered with Insulin-induced activation of the oncogenic pathway IR/IRS1/AKT/CD1. Mechanistically, IR and RAGE directly interacted upon Insulin stimulation, as shown by in situ proximity ligation assays and coimmunoprecipitation studies. Of note, RAGE inhibition halted the activation of both IR and insulin like growth factor 1 receptor (IGF-1R), as demonstrated in MCF-7 cells KO for the IR and the IGF-1R gene via CRISPR-cas9 technology. An unbiased label-free proteomic analysis uncovered proteins and predicted pathways affected by RAGE inhibition in Insulin-stimulated BC cells. Biologically, RAGE inhibition reduced cell proliferation, migration, and patient-derived mammosphere formation triggered by Insulin. In vivo, the pharmacological inhibition of RAGE halted Insulin-induced tumor growth, without affecting blood glucose homeostasis. Together, our findings suggest that targeting RAGE may represent an appealing opportunity to blunt Insulin-induced oncogenic signaling in BC.\"}, {\"paperId\": \"0276e7b904bdf76bab80de64e40204fb1b4a109a\", \"externalIds\": {\"DOI\": \"10.1094/ismpmi-2023-6\", \"CorpusId\": 266879008}, \"title\": \"Identification of HLB Susceptibility Genes in a Citrus Population Generated Using Multiplexed CRISPR/Cas9 Gene Editing\", \"venue\": \"Poster \\u200b\\u200bAbstracts\\u200b\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1094/ismpmi-2023-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1094/ismpmi-2023-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4712862\", \"name\": \"C. Sagawa\"}], \"abstract\": \"Citrus greening or Huanglongbing (HLB) disease is caused by the bacteria Candidatus Liberibacter spp. which is a major threat to the citrus industry worldwide. This has led to the generation of a large number of genomic databases characterizing HLB at the molecular level. Based on the genomic information of 71 published transcriptomic and proteomic datasets we selected 1,200 potential susceptibility genes associated with HLB in citrus. By using CRISPR/Cas9 technology combined with a multiplex approach, we generated 300 constructs targeting a combination of four of those genes in each construct. We currently have a population of over 3,000 transformed lines of Carrizo, a commercial rootstock hybrid (Citrus sinensis 'Washington' sweet orange X Poncirus trifoliata) and population of Valencia sweet orange lines with a diversified combination of mutations. To aid in genotyping, our group is performing a whole genome sequencing of the hybrid Carrizo. Biallelic/homozygous mutants were confirmed by Sanger sequencing of target sites and alignment with respective genomes. Confirmed mutants are currently being tested for bacterial resistance. Identification and stacking of susceptibility gene mutations will be valuable in developing tolerance to HLB and these mutations can subsequently be introduced into other economically significant citrus cultivars and evaluated in the field.\"}, {\"paperId\": \"027db016a0473af49fd1ba03bd05976ec5739fdf\", \"externalIds\": {\"DOI\": \"10.1210/endocr/bqac024\", \"CorpusId\": 218608522, \"PubMed\": \"35245347\"}, \"title\": \"The G209R mutant mouse as a model for human PCSK1 polyendocrinopathy.\", \"venue\": \"Endocrinology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1210/endocr/bqac024\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1210/endocr/bqac024?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1210/endocr/bqac024, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7251292\", \"name\": \"Manita Shakya\"}, {\"authorId\": \"1391346343\", \"name\": \"Surbhi Gahlot\"}, {\"authorId\": \"152642726\", \"name\": \"A. Arunagiri\"}, {\"authorId\": \"1693384757\", \"name\": \"Anis Hassan\"}, {\"authorId\": \"145658106\", \"name\": \"P. Arvan\"}, {\"authorId\": \"1783960\", \"name\": \"M. Low\"}, {\"authorId\": \"21548960\", \"name\": \"I. Lindberg\"}], \"abstract\": \"PCSK1 encodes an enzyme required for prohormone maturation into bioactive peptides. A striking number of SNPs and rare mutations in PCSK1 are associated with a range of clinical phenotypes. Infants bearing two copies of a catalytically inactivating mutation, such as G209R, exhibit life-threatening chronic diarrhea and subsequently develop systemic endocrinopathies. Using CRISPR/Cas9 technology, we have engineered a mouse model bearing a G209R missense mutation in exon 6 of the murine Pcsk1 locus. Most pups homozygous for the G209R mutation succumbed by day 2, and surviving pups were severely dwarfed. In homozygous (but not heterozygous) pups, blood glucose levels were significantly lower, accompanied by elevated plasma insulin-like immunoreactivity and accumulation of large quantities of unprocessed proinsulin in the pancreas. Peptide hormone processing was also aberrant in G209R mouse pituitary, with mature ACTH levels markedly reduced in homozygotes, accompanied by a significant accumulation of POMC. We also observed a significant reduction in PC1/3 protein in the brains of G209R homozygous mice by Western blotting, while PC2 levels remained unaffected. Most likely due to the continued presence of PC2, pituitary and brain levels of \\u03b1-MSH were not impaired. Analysis of intestinal cell types indicated a modest reduction of enteroendocrine cells in G209R homozygotes. We suggest that the G209R Pcsk1 mouse model recapitulates many of the dramatic neonatal deficiencies of human patients with this homozygous mutation.\"}, {\"paperId\": \"027f34c32f8c444fe7bc3bf1a377592b6752b880\", \"externalIds\": {\"MAG\": \"3083327903\", \"PubMedCentral\": \"7906472\", \"DBLP\": \"journals/ploscb/LuBSMJCCGDPW21\", \"DOI\": \"10.1101/2020.09.07.285759\", \"CorpusId\": 221589087, \"PubMed\": \"33577557\"}, \"title\": \"OpenAWSEM with Open3SPN2: A fast, flexible, and accessible framework for large-scale coarse-grained biomolecular simulations\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 43, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/ploscompbiol/article/file?id=10.1371/journal.pcbi.1008308&type=printable\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7906472, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48628181\", \"name\": \"W. Lu\"}, {\"authorId\": \"117822797\", \"name\": \"Carlos Bueno\"}, {\"authorId\": \"4018696\", \"name\": \"N. Schafer\"}, {\"authorId\": \"50114130\", \"name\": \"Joshua Moller\"}, {\"authorId\": \"3451659\", \"name\": \"Shikai Jin\"}, {\"authorId\": \"1935847728\", \"name\": \"Xun Chen\"}, {\"authorId\": \"8408938\", \"name\": \"Mingchen Chen\"}, {\"authorId\": \"1910866756\", \"name\": \"Xinyu Gu\"}, {\"authorId\": \"2058945\", \"name\": \"J. D. de Pablo\"}, {\"authorId\": \"1909412\", \"name\": \"P. Wolynes\"}], \"abstract\": \"We present OpenAWSEM and Open3SPN2, new cross-compatible implementations of coarse-grained models for protein (AWSEM) and DNA (3SPN2) molecular dynamics simulations within the OpenMM framework. These new implementations retain the chemical accuracy and intrinsic efficiency of the original models while adding GPU acceleration and the ease of forcefield modification provided by OpenMM\\u2019s Custom Forces software framework. By utilizing GPUs, we achieve more than a 100-fold speedup in protein and protein-DNA simulations over the existing LAMMPS-based implementations running on a CPU. We showcase the benefits of OpenMM\\u2019s Custom Forces framework by devising and implementing two new potentials that allow us to address important aspects of protein folding and structure prediction and by testing the ability of the combined OpenAWSEM and Open3SPN2 to model protein-DNA binding. The first potential is used to describe the changes in effective interactions that occur as a protein becomes partially buried in a membrane. We also introduced an interaction to describe proteins with multiple disulfide bonds. Using simple pairwise disulfide bonding terms results in unphysical clustering of cysteine residues, posing a problem when simulating the folding of proteins with many cysteines. We now can computationally reproduce Anfinsen\\u2019s early Nobel prize winning experiments [1] by using OpenMM\\u2019s Custom Forces framework to introduce a multi-body disulfide bonding term that prevents unphysical clustering. Our protein-DNA simulations show that the binding landscape is funneled towards structures that are quite similar to those found using experiments. In summary, this paper provides a simulation tool for the molecular biophysics community that is both easy to use and sufficiently efficient to simulate large proteins and large protein-DNA systems that are central to many cellular processes. These codes should facilitate the interplay between molecular simulations and cellular studies, which have been hampered by the large mismatch between the time and length scales accessible to molecular simulations and those relevant to cell biology. Author summary The cell\\u2019s most important pieces of machinery are large complexes of proteins often along with nucleic acids. From the ribosome, to CRISPR-Cas9, to transcription factors and DNA-wrangling proteins like the SMC-Kleisins, these complexes allow organisms to replicate and enable cells to respond to environmental cues. Computer simulation is a key technology that can be used to connect physical theories with biological reality. Unfortunately, the time and length scales accessible to molecular simulation have not kept pace with our ambition to study the cell\\u2019s molecular factories. Many simulation codes also unfortunately remain effectively locked away from the user community who need to modify them as more of the underlying physics is learned. In this paper, we present OpenAWSEM and Open3SPN2, two new easy-to-use and easy to modify implementations of efficient and accurate coarse-grained protein and DNA simulation forcefields that can now be run hundreds of times faster than before, thereby making studies of large biomolecular machines more facile.\"}, {\"paperId\": \"028095f14664cd5f8579a770e835c16a155d02cd\", \"externalIds\": {\"MAG\": \"3017375603\", \"PubMedCentral\": \"7194332\", \"DOI\": \"10.1089/crispr.2019.0068\", \"CorpusId\": 216075061, \"PubMed\": \"32315227\"}, \"title\": \"ErCas12a CRISPR-MAD7 for Model Generation in Human Cells, Mice, and Rats\", \"venue\": \"The CRISPR Journal\", \"year\": 2020, \"citationCount\": 40, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1089/crispr.2019.0068\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7194332, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2987595\", \"name\": \"Zhenyi Liu\"}, {\"authorId\": \"15158239\", \"name\": \"John A. Schiel\"}, {\"authorId\": \"145688245\", \"name\": \"E. Maksimova\"}, {\"authorId\": \"6444347\", \"name\": \"Z. Strezoska\"}, {\"authorId\": \"47153467\", \"name\": \"Guojun Zhao\"}, {\"authorId\": \"35402687\", \"name\": \"E. Anderson\"}, {\"authorId\": \"2145020973\", \"name\": \"Yumei Wu\"}, {\"authorId\": \"2054883673\", \"name\": \"Joe Warren\"}, {\"authorId\": \"2052788113\", \"name\": \"Angela Bartels\"}, {\"authorId\": \"4741508\", \"name\": \"Anja van Brabant Smith\"}, {\"authorId\": \"1650230108\", \"name\": \"C. Lowe\"}, {\"authorId\": \"35661762\", \"name\": \"Kevin P. Forbes\"}], \"abstract\": \"MAD7 is an engineered class 2 type V-A CRISPR-Cas (Cas12a/Cpf1) system isolated from Eubacterium rectale. Analogous to Cas9, it is an RNA-guided nuclease with demonstrated gene editing activity in Escherichia coli and yeast cells. Here, we report that MAD7 is capable of generating indels and fluorescent gene tagging of endogenous genes in human HCT116 and U2OS cancer cell lines, respectively. In addition, MAD7 is highly proficient in generating indels, small DNA insertions (23 bases), and larger integrations ranging from 1 to 14\\u2009kb in size in mouse and rat embryos, resulting in live-born transgenic animals. Due to the different protospacer adjacent motif requirement, small-guide RNA, and highly efficient targeted gene disruption and insertions, MAD7 can expand the CRISPR toolbox for genome enginnering across different systems and model organisms.\"}, {\"paperId\": \"0281d62ea02d87cebb340c574c4a62dda30d8e23\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-1\", \"CorpusId\": 259128836}, \"title\": \"Abstract 1: Mouse models of cancer available from The Jackson Laboratory\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47016152\", \"name\": \"J. Beckwith\"}, {\"authorId\": \"31361791\", \"name\": \"Jennifer J. Merriam\"}, {\"authorId\": \"152966646\", \"name\": \"A. Valenzuela\"}, {\"authorId\": \"32672871\", \"name\": \"Darcy P. Pomerleau\"}, {\"authorId\": \"33180747\", \"name\": \"Crystal Davis\"}], \"abstract\": \"\\n Genetically defined mice are a cornerstone of cancer research. The Jackson Laboratory (JAX) offers more than 13,500 unique mouse lines to the scientific community, many useful in advancing cancer research. Available are mouse models for specific cancers, xenograft recipients, immunodeficient platforms for PDX studies and multi-purpose tool strains having CRISPR/Cas9 expression, conditional/inducible expression (Cre-lox, FLP-frt, Tet-On/-Off), optogenetic function and calcium-sensing technologies. This poster will highlight some recently added models, more than 150 of which have cancer research applications. The portfolio of strains useful for transplantation/engraftment and \\u201chumanized\\u201d mouse research continues to expand and complement the NSG (NOD scid IL2r\\u03b3c-/-) model as ideal tools for engraftment with a wide range of malignant or non-malignant human or mouse tissues. Fluorescent protein-expressing strains include the Traffic Light Reporter models for tracking of DNA repair pathways and the Gene Editing Reporter models for detection of homology directed repair (HDR) or non-homologous end joining (NHEJ) repair events. As a tool for gene targeting, the RosaBxb-GT/GA mice are designed to allow insertion of ~40kb of desired DNA sequence into the Gt(ROSA)26Sor locus. In addition to safeguarding each strain by cryopreservation, JAX has a comprehensive genetic quality control program that confirms mutation identity and genetic background, and screens for unwanted alleles (such as stray GFP, Cre, neo, etc.). Search the comprehensive collection of innovative mouse models using our improved JAX Mouse Search site (mice.jax.org). This resource includes models created by many generous donating institutions. Researchers are encouraged to donate their mouse lines via a very short Strain Submission form (jax.org/donate-a-mouse). Please also visit the JAX Oncology webpage for cancer research related strains and resources (jax.org/jax-mice-and-services/solutions-by-therapeutic-area/oncology). JAX is supported by the NIH, The Howard Hughes Medical Institute and other private charitable foundations.\\n Citation Format: Jason Beckwith, Jen Merriam, Alicia Valenzuela, Darcy Pomerleau, Crystal Davis. Mouse models of cancer available from The Jackson Laboratory [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 1.\"}, {\"paperId\": \"0282f3c30dfd0c045f59d86afb76a57ba80fc2f6\", \"externalIds\": {\"MAG\": \"3082321333\", \"DOI\": \"10.21873/cgp.20205\", \"CorpusId\": 221355074, \"PubMed\": \"32859627\"}, \"title\": \"Whole-transcriptome Analysis of Fully Viable Energy Efficient Glycolytic-null Cancer Cells Established by Double Genetic Knockout of Lactate Dehydrogenase A/B or Glucose-6-Phosphate Isomerase\", \"venue\": \"Cancer Genomics & Proteomics\", \"year\": 2020, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://cgp.iiarjournals.org/content/cgp/17/5/469.full.pdf\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21873/cgp.20205?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21873/cgp.20205, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3784480\", \"name\": \"E. Mazzio\"}, {\"authorId\": \"3959039\", \"name\": \"R. Badisa\"}, {\"authorId\": \"47179544\", \"name\": \"Nzinga Mack\"}, {\"authorId\": \"7859550\", \"name\": \"S. Cassim\"}, {\"authorId\": \"4819900\", \"name\": \"M. \\u017ddralevi\\u0107\"}, {\"authorId\": \"4376044\", \"name\": \"J. Pouyss\\u00e9gur\"}, {\"authorId\": \"50497047\", \"name\": \"K. Soliman\"}], \"abstract\": \"Background/Aim: Nearly all mammalian tumors of diverse tissues are believed to be dependent on fermentative glycolysis, marked by elevated production of lactic acid and expression of glycolytic enzymes, most notably lactic acid dehydrogenase (LDH). Therefore, there has been significant interest in developing chemotherapy drugs that selectively target various isoforms of the LDH enzyme. However, considerable questions remain as to the consequences of biological ablation of LDH or upstream targeting of the glycolytic pathway. Materials and Methods: In this study, we explore the biochemical and whole transcriptomic effects of CRISPR-Cas9 gene knockout (KO) of lactate dehydrogenases A and B [LDHA/B double KO (DKO)] and glucose-6-phosphate isomerase (GPI KO) in the human colon cancer cell line LS174T, using Affymetrix 2.1 ST arrays. Results: The metabolic biochemical profiles corroborate that relative to wild type (WT), LDHA/B DKO produced no lactic acid, (GPI KO) produced minimal lactic acid and both KOs displayed higher mitochondrial respiration, and minimal use of glucose with no loss of cell viability. These findings show a high biochemical energy efficiency as measured by ATP in glycolysis-null cells. Next, transcriptomic analysis conducted on 48,226 mRNA transcripts reflect 273 differentially expressed genes (DEGS) in the GPI KO clone set, 193 DEGS in the LDHA/B DKO clone set with 47 DEGs common to both KO clones. Glycolytic-null cells reflect up-regulation in gene transcripts typically associated with nutrient deprivation / fasting and possible use of fats for energy: thioredoxin interacting protein (TXNIP), mitochondrial 3-hydroxy-3-methylglutaryl-CoA synthase 2 (HMGCS2), PPAR\\u03b3 coactivator 1\\u03b1 (PGC-1\\u03b1), and acetyl-CoA acyltransferase 2 (ACAA2). Other changes in non-ergometric transcripts in both KOs show losses in \\u201cstemness\\u201d, WNT signaling pathway, chemo/radiation resistance, retinoic acid synthesis, drug detoxification, androgen/estrogen activation, and extracellular matrix reprogramming genes. Conclusion: These findings demonstrate that: 1) The \\u201cWarburg effect\\u201d is dispensable, 2) loss of the LDHAB gene is not only inconsequential to viability but fosters greater mitochondrial energy, and 3) drugs that target LDHA/B are likely to be ineffective without a plausible combination second drug target.\"}, {\"paperId\": \"0283f67bba858f15cbf84a5750f8627a1cc9ab24\", \"externalIds\": {\"PubMedCentral\": \"10972466\", \"DOI\": \"10.3390/mi15030413\", \"CorpusId\": 268589211, \"PubMed\": \"38542660\"}, \"title\": \"Droplets for Gene Editing Using CRISPR-Cas9 and Clonal Selection Improvement Using Hydrogels\", \"venue\": \"Micromachines\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2072-666X/15/3/413/pdf?version=1710852124\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10972466, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2149859264\", \"name\": \"Camilo P\\u00e9rez-Sosa\"}, {\"authorId\": \"38963858\", \"name\": \"Maximiliano S. Perez\"}, {\"authorId\": \"2078504063\", \"name\": \"Alexander Paolo Vallejo-Janeta\"}, {\"authorId\": \"1756006\", \"name\": \"S. Bhansali\"}, {\"authorId\": \"2187331867\", \"name\": \"Santiago Miriuka\"}, {\"authorId\": \"49985276\", \"name\": \"B. Lerner\"}], \"abstract\": \"Gene editing tools have triggered a revolutionary transformation in the realms of cellular and molecular physiology, serving as a fundamental cornerstone for the evolution of disease models and assays in cell culture reactions, marked by various enhancements. Concurrently, microfluidics has emerged over recent decades as a versatile technology capable of elevating performance and reducing costs in daily experiments across diverse scientific disciplines, with a pronounced impact on cell biology. The amalgamation of these groundbreaking techniques holds the potential to amplify the generation of stable cell lines and the production of extracellular matrix hydrogels. These hydrogels, assuming a pivotal role in isolating cells at the single-cell level, facilitate a myriad of analyses. This study presents a novel method that seamlessly integrates CRISPR-Cas9 gene editing techniques with single-cell isolation methods in induced pluripotent stem cell (hiPSC) lines, utilizing the combined power of droplets and hydrogels. This innovative approach is designed to optimize clonal selection, thereby concurrently reducing costs and the time required for generating a stable genetically modified cell line. By bridging the advancements in gene editing and microfluidic technologies, our approach not only holds significant promise for the development of disease models and assays but also addresses the crucial need for efficient single-cell isolation. This integration contributes to streamlining processes, making it a transformative method with implications for enhancing the efficiency and cost-effectiveness of stable cell line generation. As we navigate the intersection of gene editing and microfluidics, our study marks a significant stride toward innovative methodologies in the dynamic landscape of cellular and molecular physiology research.\"}, {\"paperId\": \"0284ca28f8007ecf0c6fcb299c6606cd31f50539\", \"externalIds\": {\"DOI\": \"10.17504/protocols.io.bvv3n68n\", \"CorpusId\": 239156127}, \"title\": \"\\u00a0Evaluating large spontaneous deletions in a bovine cell line selected for bovine viral diarrhea virus resistance -\\u00a0MDBK reads mapping to regions in genome \\u00a0not shared with CRIB cell line v1\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.17504/protocols.io.bvv3n68n?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.17504/protocols.io.bvv3n68n, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2133824448\", \"name\": \"aspen.workman not provided\"}, {\"authorId\": \"2124097775\", \"name\": \"Michael not provided\"}, {\"authorId\": \"2133980042\", \"name\": \"Dennis A. Webster\"}, {\"authorId\": \"2127579321\", \"name\": \"Gregory P Harhay\"}, {\"authorId\": \"2111858359\", \"name\": \"Tim P. L. Smith\"}, {\"authorId\": \"2133976444\", \"name\": \"Shollie not provided M Falkenberg\"}, {\"authorId\": \"2133967502\", \"name\": \"Daniel not provided F. Carlson\"}, {\"authorId\": \"2133975782\", \"name\": \"Tad S. Sonstegard\"}, {\"authorId\": \"2133974606\", \"name\": \"ted.kalbfleisch not provided\"}], \"abstract\": \"Bovine viral diarrhea virus (BVDV) entry into bovine cells involves attachment of virions to cellular receptors, internalization, and pH-dependent fusion with endosomal membranes. The primary host receptor for BVDV is CD46; however, the complete set of host factors required for virus entry is unknown. The Madin-Darby bovine kidney (MDBK) cell line is susceptible to BVDV infection, while a derivative cell line (CRIB) is resistant at the level of virus entry. We performed complete genome sequencing of each to identify genomic variation underlying the resistant phenotype with the aim of identifying host factors essential for BVDV entry. Three large compound deletions in the BVDV-resistant CRIB cell line were identified and predicted to disrupt the function or expression of the genesPTPN12,GRID2, andRABGAP1L. However, CRISPR/Cas9 mediated knockout of these genes, individually or in combination, in the parental MDBK cell line did not impact virus entry or replication. Therefore, resistance to BVDV in the CRIB cell line is not due to the apparent spontaneous loss ofPTPN12,GRID2, orRABGAP1Lgene function. Identifying the functional cause of BVDV resistance in the CRIB cell line may require more detailed comparisons of the genomes and epigenomes.\"}, {\"paperId\": \"028548fe2d6e06e8081c9bfb67b6573fbcdc0983\", \"externalIds\": {\"DOI\": \"10.55218/jasr.s1202112402\", \"CorpusId\": 247637383}, \"title\": \"GLUTEN FREE WHEAT (TRITICUM AESTIVUM L.): A GENETIC WAY TO CURB COELIAC DISEASE\", \"venue\": \"Journal of advanced scientific research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.55218/jasr.s1202112402\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.55218/jasr.s1202112402?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.55218/jasr.s1202112402, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2143305781\", \"name\": \"Mahek Sharan\"}, {\"authorId\": \"2133521951\", \"name\": \"M. P\"}], \"abstract\": \"There are three main cereal crops, rice, maize and wheat, in which, latter constitutes the major portion in the category. According to 2017 reports, it is known to be harvested around 772 million tonnes. Wheat is present in a diverse range and gets its elasticity, viscosity and properties of binding by the storage protein, Gluten, which is a secretory protein synthesised on rough endoplasmic reticulum. Gluten is roughly 78-85% of total wheat protein and made of gliadin and glutenins. There is a part of population with genes which develop autoimmune response against gluten that majorly affects the small intestine by damaging its lining and have to suffer from problems like pain in abdomen, joints, anaemia, osteoporosis and various gastro intestinal problems, developmental problems and problems like cramping, itching and lactose tolerance and excess weight loss. The patients who suffer from this disease undergo either biopsy of small intestine or serological assay like Rapid or ELISA for diagnosis. There are currently no treatments available for coeliac disease as the only way to curb this is strict gluten-free diet. There have been advances made in the field of agriculture, which resulted in production of the low gliadin content by use of gene editing technology and RNAi but the customer acceptance is the major issue faced. The most recent technological advancements in the field of biotechnology, like CRISPR-Cas9 is capable of producing the genetically modified wheat with lowest gliadin composition to curb the celiac disease impact in population.\"}, {\"paperId\": \"0285a52c9212b7fd7416deb9da794304e6be41c0\", \"externalIds\": {\"PubMedCentral\": \"9940387\", \"DOI\": \"10.1186/s12967-023-03985-z\", \"CorpusId\": 257023735, \"PubMed\": \"36803784\"}, \"title\": \"P2RX7 promotes osteosarcoma progression and glucose metabolism by enhancing c-Myc stabilization\", \"venue\": \"Journal of Translational Medicine\", \"year\": 2023, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://translational-medicine.biomedcentral.com/counter/pdf/10.1186/s12967-023-03985-z\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9940387, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51225996\", \"name\": \"Gaohong Sheng\"}, {\"authorId\": \"2118635465\", \"name\": \"Yuan Gao\"}, {\"authorId\": \"2120933770\", \"name\": \"Qing Ding\"}, {\"authorId\": \"2399155307\", \"name\": \"Ruizhuo Zhang\"}, {\"authorId\": \"2155412643\", \"name\": \"Tianqi Wang\"}, {\"authorId\": \"2202394802\", \"name\": \"Shaoze Jing\"}, {\"authorId\": \"2200132978\", \"name\": \"Hongqi Zhao\"}, {\"authorId\": \"2087494952\", \"name\": \"Tian Ma\"}, {\"authorId\": \"49498592\", \"name\": \"Hua Wu\"}, {\"authorId\": \"49307806\", \"name\": \"Yong Yang\"}], \"abstract\": \"Background Osteosarcoma is the most common malignant tumor in bone and its prognosis has reached a plateau in the past few decades. Recently, metabolic reprogramming has attracted increasing attention in the field of cancer research. In our previous study, P2RX7 has been identified as an oncogene in osteosarcoma. However, whether and how P2RX7 promotes osteosarcoma growth and metastasis through metabolic reprogramming remains unexplored. Methods We used CRISPR/Cas9 genome editing technology to establish P2RX7 knockout cell lines. Transcriptomics and metabolomics were performed to explore metabolic reprogramming in osteosarcoma. RT-PCR, western blot and immunofluorescence analyses were used to determine gene expression related to glucose metabolism. Cell cycle and apoptosis were examined by flowcytometry. The capacity of glycolysis and oxidative phosphorylation were assessed by seahorse experiments. PET/CT was carried out to assess glucose uptake in vivo. Results We demonstrated that P2RX7 significantly promotes glucose metabolism in osteosarcoma via upregulating the expression of genes related to glucose metabolism. Inhibition of glucose metabolism largely abolishes the ability of P2RX7 to promote osteosarcoma progression. Mechanistically, P2RX7 enhances c-Myc stabilization by facilitating nuclear retention and reducing ubiquitination-dependent degradation. Furthermore, P2RX7 promotes osteosarcoma growth and metastasis through metabolic reprogramming in a predominantly c-Myc-dependent manner. Conclusions P2RX7 plays a key role in metabolic reprogramming and osteosarcoma progression via increasing c-Myc stability. These findings provide new evidence that P2RX7 might be a potential diagnostic and/or therapeutic target for osteosarcoma. Novel therapeutic strategies targeting metabolic reprogramming appear to hold promise for a breakthrough in the treatment of osteosarcoma.\"}, {\"paperId\": \"028747522e92fa128924725c4324fb6f050a8504\", \"externalIds\": {\"DOI\": \"10.21769/bioprotoc.4346\", \"CorpusId\": 247285117, \"PubMed\": \"35592598\"}, \"title\": \"RNA-mediated in vivo Directed Evolution in Yeast.\", \"venue\": \"Bio-protocol\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8918223\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21769/bioprotoc.4346?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21769/bioprotoc.4346, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1394971117\", \"name\": \"Emil D. Jensen\"}, {\"authorId\": \"2455646\", \"name\": \"M. Jensen\"}], \"abstract\": \"Directed evolution is a powerful approach to obtain genetically-encoded sought-for traits. Compared to the prolonged adaptation regimes to mutations occurring under natural selection, directed evolution unlocks rapid screening and selection of mutants with improved traits from vast mutated sequence spaces. Many systems have been developed to search variant landscapes based on ex vivo or in vivo mutagenesis, to identify and select new-to-nature and optimized properties in biomolecules. Yet, the majority of such systems rely on tedious iterations of library preparation, propagation, and selection steps. Furthermore, among the relatively few in vivo directed evolution systems developed to mitigate handling of repetitive ex vivo steps, directed evolution of DNA is the standard approach. Here, we present the protocol for designing the transfer of genetic information from evolving RNA donors to DNA in baker's yeast, using CRISPR- and RNA-assisted in vivo directed evolution (CRAIDE). We use mutant T7 RNA polymerase to introduce mutations in RNA donors, while incorporation into DNA is directed by CRISPR/Cas9. As such, CRAIDE offers an opportunity to study fundamental questions, such as RNA's contribution to the evolution of DNA-based life on Earth. Graphic abstract: CRISPR- and RNA-assisted in vivo directed evolution (CRAIDE).\"}, {\"paperId\": \"028a206c34d5c05331a8052de94b1c81268755db\", \"externalIds\": {\"DOI\": \"10.1201/9781003213864-9\", \"CorpusId\": 266027043}, \"title\": \"CRISPR/Cas9\", \"venue\": \"Plant-Microbial Interactions and Smart Agricultural Biotechnology\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1201/9781003213864-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1201/9781003213864-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2380322170\", \"name\": \"Parul Sharma\"}, {\"authorId\": \"2257908256\", \"name\": \"Rajnish Sharma\"}], \"abstract\": \"Re-evaluation of the rin mutation and the role of RIN in the induction of tomato ripening. Ito Y, Nishizawa-Yokoi A, Endo M, Mikami M, Shima Y, Nakamura N, Kotake-Nara E, Kawasaki S, Toki S. Nature Plants. 3(11):866-874 (2017) CRISPR/Cas9-mediated mutagenesis of the RIN locus that regulates tomato fruit ripening. Ito Y, Nishizawa-Yokoi A, Endo M, Mikami M, Toki S. Biochem Biophys Res Commun. 467(1)76-82 (2015)\"}, {\"paperId\": \"028c382f6e32df7b03a17f3b0901801c04680676\", \"externalIds\": {\"DOI\": \"10.1021/acs.analchem.0c03708\", \"CorpusId\": 231193197, \"PubMed\": \"33411517\"}, \"title\": \"High-Fidelity CRISPR/Cas13a trans-Cleavage-Triggered Rolling Circle Amplified DNAzyme for Visual Profiling of MicroRNA.\", \"venue\": \"Analytical Chemistry\", \"year\": 2021, \"citationCount\": 85, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.analchem.0c03708?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.analchem.0c03708, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2114110838\", \"name\": \"Ting Zhou\"}, {\"authorId\": \"152809794\", \"name\": \"Mengqi Huang\"}, {\"authorId\": \"8879374\", \"name\": \"Jinqiong Lin\"}, {\"authorId\": \"120899316\", \"name\": \"R. Huang\"}, {\"authorId\": \"144795830\", \"name\": \"D. Xing\"}], \"abstract\": \"The clustered regularly interspaced short palindromic repeats (CRISPR) and CRISPR-associated (Cas) (CRISPR/Cas) system innovates a next-generation biosensor due to its high-fidelity, programmability, and efficient signal amplification ability. Developing a CRISPR/Cas-based visual detection system could contribute to point-of-care biomarker diagnosis. Existing CRISPR/Cas9-mediated visual detection methods are limited by the inherent properties of Cas9. Herein, we explored the trans-cleavage ability of Cas13a on ribonucleotide-bearing DNA oligo, eliminated the unavailability of the trans-cleavage substrate for subsequent polymerization reaction, and developed a homogeneous CRISPR/Cas13a-based visual detection system (termed vCas) for specific and sensitive detection of miRNA. The results indicated that vCas can provide a detection limit of 1 fM for miR-10b with single-base specificity and can be used to analyze miRNA in serum and cell extracts. Conclusively, vCas holds a great application prospective for clinical molecular diagnosis.\"}, {\"paperId\": \"028dd596ae4e41584c0941b95e8727ffdb9929ae\", \"externalIds\": {\"PubMedCentral\": \"9180186\", \"DOI\": \"10.3390/ijms23115867\", \"CorpusId\": 249077139, \"PubMed\": \"35682546\"}, \"title\": \"ORAI1-Regulated Gene Expression in Breast Cancer Cells: Roles for STIM1 Binding, Calcium Influx and Transcription Factor Translocation\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/11/5867/pdf?version=1653382208\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9180186, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144472547\", \"name\": \"M. Robitaille\"}, {\"authorId\": \"2148797345\", \"name\": \"S. Chan\"}, {\"authorId\": \"33627094\", \"name\": \"Amelia A Peters\"}, {\"authorId\": \"2072644637\", \"name\": \"Limin Dai\"}, {\"authorId\": \"11677125\", \"name\": \"C. So\"}, {\"authorId\": \"89772876\", \"name\": \"A. Bong\"}, {\"authorId\": \"89560932\", \"name\": \"Francisco Sadras\"}, {\"authorId\": \"1384333457\", \"name\": \"S. Roberts-Thomson\"}, {\"authorId\": \"4488158\", \"name\": \"G. Monteith\"}], \"abstract\": \"A remodeling of calcium homeostasis, including calcium influx via store-operated calcium entry (SOCE), is a feature of breast cancers. SOCE is critical to maintain calcium balance in the endoplasmic reticulum calcium store and is an important mechanism for calcium signaling in a variety of cell types, including breast cancer cells. The canonical mechanism of SOCE is stromal interacting molecule 1 (STIM1)-mediated activation of ORAI. Elevated ORAI1 expression is a feature of basal breast cancer cells. However, the role of ORAI1 in the regulation of transcription in breast cancer cells of the basal molecular subtype is still unclear. Using CRISPR-Cas9 gene editing, ORAI1 protein expression was disrupted in MDA-MB-231 and MDA-MB-468 basal breast cancer cells. The ORAI1 wild-type and mutants were reintroduced into ORAI1 knockout cells to study the role of ORAI1 in gene transcriptional regulation. In the absence of calcium store depletion, ORAI1 regulated PTGS2 in MDA-MB-231 cells, and this was dependent on ORAI1 pore function and STIM1 binding. The activation of SOCE by thapsigargin resulted in ORAI1-dependent increases in IL6 transcription in MDA-MB-468 cells; this was also dependent on ORAI1 pore function and STIM1 binding and was associated with the translocation of NFAT1. Given the upregulation of ORAI1 in basal breast cancer cells, our results provide further evidence that ORAI1 may contribute to cancer progression through regulation of gene expression.\"}, {\"paperId\": \"0291183d0b1e1c9d106c4759c4b94c94d750da4d\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-954\", \"CorpusId\": 257960914}, \"title\": \"Abstract 954: PIK3CA mutation induces immunogenicity and increases the immune checkpoint inhibitor response in urothelial carcinoma\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-954?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-954, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46444206\", \"name\": \"H. Su\"}, {\"authorId\": \"13652571\", \"name\": \"Ling-Yi Xiao\"}, {\"authorId\": \"47156905\", \"name\": \"Shi-Yu Huang\"}, {\"authorId\": \"2213512458\", \"name\": \"Li-Chung Chang\"}, {\"authorId\": \"2145315708\", \"name\": \"Yi-Hua Chen\"}, {\"authorId\": \"47030271\", \"name\": \"Hao-Lun Luo\"}, {\"authorId\": \"2146335847\", \"name\": \"Chia-Ling Wu\"}], \"abstract\": \"\\n Background: Immune checkpoint inhibitor (ICI) has been widely used for advanced urothelial carcinoma (mUC) globally. However, little is known about the potential predictive factors of the ICI response. The study aims to identify a potential biomarker to predict ICI response in UC.\\n Material and methods: We performed targeted next generation sequencing (NGS) of pre-treatment tumor Formalin-fixed paraffin-embedded (FFPE) samples by using ACTOnco\\u00ae comprehensive genomic panel (ACT Genomics, Co. Ltd., Taiwan) to target all coding exons of 440 cancer-associated genes. We retrospective analyzed a total of 70 patients with mUC underwent at least one cycle of ICI with or without chemotherapy at Kaohsiung Chang Gung Memorial Hospital between April 2016 and November 2019. Patients were defined as responders (CR/PR) and non-responders (SD/PD) according to the RECIST evaluation. TMB was estimated by calculating all coding exons variants, including somatic non-synonymous, frameshift and splice site variants.\\n Results: A total of 55 UC tumor samples passed QC process were analyzed. The median age was 67, and 74% of all patients were in ICI monotherapy cohort. The most common genetic alterations were TP53 (66%), KMT2D (42%) and MUC16 (32%). In ICI monotherapy group, responders had a higher TMB than non-responders (median 19.5 vs 6.5 mt/Mb; p = 0.004). Patients with high TMB on ICI monotherapy had a significantly longer PFS (14.6 vs 2.9 months; p = 0.003) and OS (NR vs 11.0 months; p = 0.01) than TMB low patients. We found that PIK3CA (32% vs 3%), UBR5 (23% vs 0%), PRKDC (32% vs 10%) were the top 3 enriched mutations between responders and non-responders. All PIK3CA mutation were hot-spot mutation, and tumor harbored PIK3CA mutation had a median high TMB than PIK3CA wild type in UC, NSCLC, breast and colorectal cancer. By analyzing tumor and immune microenvironment by TISIDB platform, UC with PIK3CA mutation was highly associated with increasing MHC molecules expression (HLA-A, HLA-B, HLA-C, B2M) in UC and gastric cancer. In vitro study, we confirmed anti-PDL1 with PBMC had a synergistic cytotoxicity in PIK3CA mutated cell lines (BFTC-909, AGS and DLD-1), but not in PIK3CA wild type cell lines (T24, RT4, UMUC-14, N87 and SW837). Knocking-down PIK3CA expression diminished the cytotoxic activity of anti-PDL1 with PBMC in BFTC-909 and AGS cells. PIK3CA down-regulation inhibits antigen presentation machinery process. We confirmed that knockout PIK3CA gene function by\\n CRISPR/Cas9 decreased MHC1 and B2M molecules expression, and showing modest resistance to ICI than mice with preserved PIK3CA function.\\n Conclusion: UC with PIK3CA missense mutation exhibits a higher immunogenicity through enhancing MHC class I and B2M expression. PIK3CA missense mutation is a potential predictive marker for ICI response in UC.\\n Citation Format: Harvey Yu-Li Su, Ling-Yi Xiao, Shih-Yu Huang, Li-Chung Chang, Yi-Hua Chen, Hao-Lun Luo, Chia-Ling Wu. PIK3CA mutation induces immunogenicity and increases the immune checkpoint inhibitor response in urothelial carcinoma [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 954.\"}, {\"paperId\": \"029390752c6166cae9b4155000ff48585a83a3fd\", \"externalIds\": {\"MAG\": \"3111552063\", \"DOI\": \"10.1016/j.scr.2020.102128\", \"CorpusId\": 229691004, \"PubMed\": \"33360099\"}, \"title\": \"Establishment of a human MYH6 compound heterozygous knockout hESC line to model cardiomyopathy and congenital heart defects by CRISPR/Cas9 system.\", \"venue\": \"Stem Cell Research\", \"year\": 2020, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2020.102128\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2020.102128?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2020.102128, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2042566853\", \"name\": \"Engang Hao\"}, {\"authorId\": \"2116300547\", \"name\": \"Guizhong Zhang\"}, {\"authorId\": \"1612989922\", \"name\": \"Lihua Mu\"}, {\"authorId\": \"2017124573\", \"name\": \"Nana Ma\"}, {\"authorId\": \"72259333\", \"name\": \"Tao Wang\"}], \"abstract\": \"MYH6 encodes the alpha heavy chain subunit of cardiac myosin. Mutations in MYH6 cause cardiomyopathy and congenital heart defects. However, due to embryonic lethality in MYH6 knockout mice, the precise roles of MYH6 in cardiomyopathy, congenital heart defects and development process remain largely unknown. In this study, we generated a human MYH6 compound heterozygous knockout hESC line using CRISPR/Cas9 technology. The establishment cell line WAe009-A-46 carried a compound heterozygous 2\\u00a0bp deletion/7\\u00a0bp deletion in MYH6, expressed pluripotency markers, showed a normal karyotype and exhibited capability to differentiate into the three germ layers in vitro. MYH6 protein was not detectable in WAe009-A-46 line. This cell line provides a useful tool for studying the role of MYH6 in cardiomyopathy and congenital heart defects.\"}, {\"paperId\": \"0293954f77d0b84f42ac7c3770df60ce97845e83\", \"externalIds\": {\"PubMedCentral\": \"8776920\", \"DOI\": \"10.1007/s13238-021-00889-w\", \"CorpusId\": 244489831, \"PubMed\": \"34813054\"}, \"title\": \"PINK1 mediates neuronal survival in monkey\", \"venue\": \"Protein & Cell\", \"year\": 2021, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s13238-021-00889-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8776920, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145110304\", \"name\": \"Zhiyu Sun\"}, {\"authorId\": \"2153258530\", \"name\": \"Jiangyu Ye\"}, {\"authorId\": \"2148566893\", \"name\": \"Junying Yuan\"}], \"abstract\": \"Parkinson\\u2019s disease (PD) is one of the most common neurodegenerative diseases with progressive motor dysfunction and pathologically characterized by the degeneration of dopaminergic neurons in the substantia nigra of the midbrain and the development of neuronal Lewy bodies. Autosomal recessive mutations in the gene PINK1 leads to inherited idiopathic PD. PINK1 is known to regulate PARKIN translocation upon mitochondrial damage which drives their removal via selective autophagy, a process known as mitophagy (Pickrell and Youle 2015; Cummins and Gotz 2018). While mitochondrial defects had been noted in postmortem studies of patient brain samples with PD, there is a continuing debate as how mutations in PINK1 may lead to selective neuronal death in the substantia nigra. At least in part due to the difficulty in demonstrating neurodegenerative phenotypes in PINK1 knockout mouse models, the evidence that supports the contribution of defective mitophagy to PINK1-related parkinsonian syndromes is still circumstantial. Monkey models may provide new insights into human diseases. Yang et al. have previously reported a monkey model with PINK1 deficiency generated by CRISPR-Cas9 (Yang et al. 2019). This CRISPR-based PINK1 deficient monkey model, which exhibits obvious reduction in the protein levels of PINK1, demonstrates robust neurodegeneration in both substantia nigra and cortex, more extensive than what is found in lateonset familial PD patients with homozygous point mutation in PINK1 that can be explained by the nature of a partial lossof-function. In this current study, Yang et al. used AAV-gRNA based strategy by stereotaxic injection to achieve local PINK1 knockdown in prefrontal cortex and substantia nigra in adult rhesus monkeys. Strikingly, knockdown of PINK1 leads to substantial loss of neurons and motor dysfunction with activation of caspase-3 in monkey. Demonstrating neuronal loss by PINK1 knockout or knockdown in monkey is exciting as it provides an important tool for investigating the mechanism of neuronal cell death in human PD. Using EM analysis, Yang et al. demonstrate degenerating neurons in the brains of adult PINK1 knockdown monkey with increased lysosomal and phagocytic vacuoles but without clear evidence of mitochondrial abnormality. This observation questions if defects in mitophagy, as implicated by many previous studies, are responsible for neurodegeneration in human PD. While most previous studies focused on a 70 kDa PINK1 protein product, which can be stabilized by mitochondrial damage (Okatsu et al. 2012), Yang et al. found a dominant cytosolic 55 kDa PINK1 protein product which was reduced in CRISPR-based PINK1 knockout monkey, suggesting that this 55 kDa PINK1 protein is a major product from the PINK1 locus in the brains. Yang et al. found that this 55 kDa PINK1 was expressed at the undetectable level in control rodent brains, which may explain the lack of phenotype in PINK1 knockout mice. This 55 kDa PINK1 protein was abundantly present in human brains, but not in peripheral tissues, such as liver, heart, muscle, intestine or kidney. Interestingly, this 55 kDa PINK1 protein was abundantly present in the substantia nigra, the brain area most vulnerable in PD (Yang et al. 2021). The relationship between the 70 kDa and 55 kDa PINK1 products should be explored in future. Yang et al. conducted further biochemical characterization of monkey brain proteins with PINK1 knockdown. The authors found a dramatic loss of synaptic proteins, PSD95, SNAP25, crmp2 and synaptophysin in the fetal PINK1 knockout monkey model. In contrast, no changes in the mitochondrial complex proteins, VDAC1 or Tom20, or metabolites were found in this PINK1 knockout monkey. The striking preferential loss of synaptic proteins in fetal monkey PINK1 knockout brains suggest the role of PINK1 in developing synapses. While deposits of fibrillary \\u03b1-synuclein aggregates, known as Lewy bodies and Lewy neurites, are primarily presynaptic in nature, defective postsynaptic mechanisms involving NMDA receptors in striatal spiny\"}, {\"paperId\": \"0294b99fe881c742dad84d6eb53f8da050a7ccb3\", \"externalIds\": {\"DOI\": \"10.57230/ejplt222sg\", \"CorpusId\": 258422150}, \"title\": \"Golem vs. Transhuman: l\\u2019uomo del futuro tra biologia, nuove tecnologie, etica e sostenibilit\\u00e0. | Golem vs. Transhuman: the man of the future between biology, new technology, ethic and sustainability.\", \"venue\": \"European Journal of Privacy Law &amp; Technologies\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://universitypress.unisob.na.it/ojs/index.php/ejplt/article/download/1686/1236\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.57230/ejplt222sg?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.57230/ejplt222sg, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2215845484\", \"name\": \"Guida\"}], \"abstract\": \"In tema di uomo del futuro, spaziare tra diverse discipline fa pensare a come le scoperte e le innovazioni scientifiche, supportate e potenziate dalle nuove tecnologie, abbiano importanti ricadute etiche e interrogativi sui vantaggi concreti e sul benessere che l'essere umano potrebbe derivare dall\\u2019uso consapevole e responsabile di strumenti inediti e straordinari come CRISPR Cas9, un sistema di editing genomico Premio Nobel per la Chimica nel 2020. Come evidenziato anche da EGE e OMS, le terapie cellulari varcano un confine, trasformando le persone in una 'nuova somma di nuove parti', sicch\\u00e9 consultazioni pubbliche le pi\\u00f9 ampie possibili sono essenziali per garantire che la piena sostenibilit\\u00e0 scientifica e tecnologica sia valutata dagli stakeholder globali, magari integrati fra loro.\"}, {\"paperId\": \"0299a968a1a225f85ed7f48b33c275a1fe34c346\", \"externalIds\": {\"MAG\": \"3047122518\", \"DOI\": \"10.1093/hmg/ddaa170\", \"CorpusId\": 220941216, \"PubMed\": \"32744307\"}, \"title\": \"A Drosophila model of Friedreich Ataxia with CRISPR/Cas9 insertion of GAA repeats in the frataxin gene reveals in vivo protection by N-acetyl cysteine.\", \"venue\": \"Human Molecular Genetics\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/hmg/ddaa170?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/hmg/ddaa170, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"153404374\", \"name\": \"M. Russi\"}, {\"authorId\": \"47139295\", \"name\": \"E. Martin\"}, {\"authorId\": \"1397505051\", \"name\": \"B. D'Autr\\u00e9aux\"}, {\"authorId\": \"1855014108\", \"name\": \"Laura Tixier\"}, {\"authorId\": \"4497472\", \"name\": \"H. Tricoire\"}, {\"authorId\": \"36744394\", \"name\": \"V\\u00e9ronique Monnier\"}], \"abstract\": \"Friedreich Ataxia (FA) is caused by GAA repeat expansions in the first intron of FXN, the gene encoding frataxin, which results in decreased gene expression. Thanks to the high degree of frataxin conservation, the Drosophila melanogaster fruitfly appears as an adequate animal model to study this disease and to evaluate therapeutic interventions. Here, we generated a Drosophila model of FA with CRISPR/Cas9 insertion of approximately 200 GAA in the intron of the fly frataxin gene fh. These flies exhibit a developmental delay and lethality associated with decreased frataxin expression. We were able to by-pass preadult lethality using genetic tools to overexpress frataxin only during the developmental period. These frataxin-deficient adults are short-lived and present strong locomotor defects. RNA-Seq analysis identified deregulation of genes involved in amino-acid metabolism and transcriptomic signatures of oxidative stress. In particular, we observed a progressive increase of Tspo expression, fully rescued by adult frataxin expression. Thus, Tspo expression constitutes a molecular marker of the disease progression in our fly model and might be of interest in other animal models or in patients. Finally, in a candidate drug screening, we observed that N-acetyl cysteine improved the survival, locomotor function, resistance to oxidative stress and aconitase activity of frataxin-deficient flies. Therefore, our model provides the opportunity to elucidate in vivo the protective mechanisms of this molecule of therapeutic potential. This study also highlights the strength of the CRISPR/Cas9 technology to introduce human mutations in endogenous orthologous genes, leading to Drosophila models of human diseases with improved physiological relevance.\"}, {\"paperId\": \"029d834bd50b764f719fec902cc9f6aad803e7ba\", \"externalIds\": {\"MAG\": \"3013553340\", \"DOI\": \"10.1126/science.abb9662\", \"CorpusId\": 214763467, \"PubMed\": \"33303588\"}, \"title\": \"CiBER-seq dissects genetic networks by quantitative CRISPRi profiling of expression phenotypes\", \"venue\": \"Science\", \"year\": 2020, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7819735\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/science.abb9662?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/science.abb9662, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34555335\", \"name\": \"Ryan Muller\"}, {\"authorId\": \"88739127\", \"name\": \"Zuriah A. Meacham\"}, {\"authorId\": \"2068987131\", \"name\": \"Lucas Ferguson\"}, {\"authorId\": \"5450801\", \"name\": \"Nicholas T. Ingolia\"}], \"abstract\": \"CiBER-seq dissects genetic networks Cells integrate environmental signals and internal states to dynamically control gene expression. Muller et al. developed a technique to dissect this cellular logic by linking targeted, genome-wide genetic perturbations with a deep-sequencing readout that quantitatively measured the expression phenotype induced by each perturbation. The method, dubbed CiBER-seq, was able to recapitulate known regulatory pathways linking protein synthesis with nutrient availability in budding yeast cells. Unexpectedly, the authors found that the cellular logic also appears to consider protein production machinery in this decision. By uncovering additional facets of this deeply conserved pathway, the findings demonstrate the utility of comprehensive and quantitative CiBER-seq profiling in mapping the gene networks underlying cellular decisions. Science, this issue p. eabb9662 Barcoded reporters linked to CRISPR guide RNAs provide high-precision profiles of cellular responses to genetic perturbations. INTRODUCTION Systematically profiling the effects of genetic perturbations is a powerful approach that has revealed the molecular basis for a wide range of biological phenomena. The simple, programmable DNA recognition of CRISPR-Cas9 enables genome-wide genetic analysis in human cells and many other systems. Cas9 is guided by a short RNA to a complementary sequence in the genome, where it can introduce mutations or alter gene expression. Pooled libraries of guide RNAs (gRNAs) that individually target each gene in the genome allow us to introduce genetic perturbations systematically into a population of cells. A key challenge is measuring the phenotypic effects caused by individual guides in these pooled libraries and linking these phenotypes back to the associated gRNA, thereby finding the gene that is responsible. RATIONALE Molecular phenotypes such as gene expression changes provide a clear and sensitive measure for many cellular processes. We sought a general approach to profile how the expression of a particular gene of interest changed when other genes were perturbed. We began with a library of gRNAs, each disrupting one gene, and linked these guides with an expression reporter containing a guide-specific nucleotide barcode. gRNAs that alter reporter expression will change the abundance of the expressed RNA barcode specifically associated with that guide. Deep sequencing of these expressed barcodes quantifies each of these guide-specific reporter expression effects individually within a pooled, complex population. We have implemented this strategy by combining CRISPR interference (CRISPRi) with barcoded expression reporter sequencing (CiBER-seq). RESULTS We used CiBER-seq to profile the responses of several yeast promoters tied to a range of biological functions. Each promoter yielded a distinct pattern of responses that could be understood in terms of its known function and regulation. For example, we rediscover the control of MET6 expression by regulatory ubiquitylation and connect the bud scar protein Cwp1 to other genes required for budding and cytokinesis. Our analysis of the HIS4 promoter, a well-characterized target of the integrated stress response, yielded a range of genetic perturbations that activate this pathway by causing the accumulation of uncharged transfer RNAs (tRNAs). We also uncovered a notable role for tRNA depletion in this response, as impaired tRNA biogenesis activated HIS4 expression through a distinct pathway. In order to understand this regulation, we carried out genetic interaction analysis and looked for quantitative deviations in CiBER-seq profiles caused by the introduction of a second genetic perturbation. We also developed an indirect CiBER-seq approach to measure translational and posttranslational regulation, which both play roles in the signaling pathways upstream of HIS4. CONCLUSION CiBER-seq produces comprehensive phenotypic profiles that offer insights into gene function and regulation. These high-throughput and quantitative phenotypic measurements are also well suited for the systematic measurement of genetic interactions, which contain rich information about the operation of biological processes. This approach can be applied to study a wide range of transcriptional, translational, and posttranslational regulatory responses, and it has the potential to shed light on many areas of biology. CRISPRi with barcoded expression reporters. CRISPR-Cas9 gRNA cassettes are linked with transcriptional reporters containing specific barcodes. The RNA-to-DNA ratio for each barcode, measured by deep sequencing, reveals the reporter expression phenotype induced by each gRNA. To realize the promise of CRISPR-Cas9\\u2013based genetics, approaches are needed to quantify a specific, molecular phenotype across genome-wide libraries of genetic perturbations. We addressed this challenge by profiling transcriptional, translational, and posttranslational reporters using CRISPR interference (CRISPRi) with barcoded expression reporter sequencing (CiBER-seq). Our barcoding approach allowed us to connect an entire library of guides to their individual phenotypic consequences using pooled sequencing. CiBER-seq profiling fully recapitulated the integrated stress response (ISR) pathway in yeast. Genetic perturbations causing uncharged transfer RNA (tRNA) accumulation activated ISR reporter transcription. Notably, tRNA insufficiency also activated the reporter, independent of the uncharged tRNA sensor. By uncovering alternate triggers for ISR activation, we illustrate how precise, comprehensive CiBER-seq profiling provides a powerful and broadly applicable tool for dissecting genetic networks.\"}, {\"paperId\": \"02a24c0dc37b87ce4a7def350e851b0b1eaddbac\", \"externalIds\": {\"DOI\": \"10.1152/physiol.2024.39.s1.1533\", \"CorpusId\": 269972205}, \"title\": \"Pathophysiology of Carnitine Palmitoyltransferase 2 (CPT2) Deficiency in the Dahl Salt-sensitive R at\", \"venue\": \"Physiology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1152/physiol.2024.39.s1.1533?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1152/physiol.2024.39.s1.1533, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2302818498\", \"name\": \"Brody A Smith\"}, {\"authorId\": \"51879338\", \"name\": \"Lashodya V. Dissanayake\"}, {\"authorId\": \"66951061\", \"name\": \"Adrian Zietara\"}, {\"authorId\": \"3267972\", \"name\": \"V. Levchenko\"}, {\"authorId\": \"2258261738\", \"name\": \"Gunjan Upadhyay\"}, {\"authorId\": \"6652074\", \"name\": \"O. Palygin\"}, {\"authorId\": \"2258261789\", \"name\": \"Ganesh V. Halade\"}], \"abstract\": \"Carnitine palmitoyltransferase 2 (CPT2) is an essential enzyme of the carnitine shuttle, which facilitates fatty acid -oxidation in mitochondria. This study aims to characterize the various effects of CPT2 deficiency on the Dahl salt-sensitive (SS) rat metabolome and its concomitant influence on renal homeostasis. CRISPR/Cas9 was used to insert a single base pair into the SS Cpt2 gene, causing a frameshift mutation found to be lethal in homozygotes (SSCpt2\\u2212/\\u2212). Western blotting and qPCR analysis of renal cortex tissue confirmed a reduced expression of CPT2 in heterozygous (SSCpt2+/-) rats compared to wild-type (WT) littermates; therefore, male and female heterozygotes were used for all experiments. Lipid metabolomics of renal cortex samples collected from SSCpt2+/- animals at 8 weeks old on a baseline 0.4% NaCl diet revealed a significant upregulation in inflammatory lipids such as 11-HETE (p<0.01) and 12-HHT (p<0.05) when compared to WT littermates. Urine analysis from the SSCpt2+/- group demonstrated a severe reduction in acetoacetic acid production (p<0.001), indicating ketogenesis is likely impacted by the loss of CPT2 in -oxidation. Additionally, TCA cycle metabolites fumaric acid (p<0.05) and oxaloacetic acid (p<0.01) are significantly downregulated in urine from SSCpt2+/- animals. Radio telemeters were implanted into the rats at 8 weeks of age to continuously record mean arterial pressure (MAP) and monitor the development of SS hypertension over the course of several dietary treatment protocols. Three weeks of either a 4% NaCl high-salt (HS) diet or a HS + ketogenic (HSK) diet with equivalent caloric content (4:1 caloric ratio, fat: carbohydrate) were administered to the animals. No difference in MAP elevation occurred between groups after the HS challenge alone, but SSCpt2+/- animals on the HSK diet had a significantly attenuated development of hypertension (p=0.03). Further metabolic analysis after the HSK diet illustrated that both groups had similar increases in long-chain fatty acids, liver enzymes, and cholesterol levels with a decrease in short-chain fatty acids. These experiments show that the partial loss of CPT2 in the Dahl SS rat leads to dysregulation across multiple metabolic pathways. Moreover, a ketogenic diet appears to protect heterozygous animals from the development of salt-sensitive hypertension. Funding: NIH R35 HL135749 and VA I01 BX004024. This is the full abstract presented at the American Physiology Summit 2024 meeting and is only available in HTML format. There are no additional versions or additional content available for this abstract. Physiology was not involved in the peer review process.\"}, {\"paperId\": \"02a42f0daeace7a8d701374200e61c361d58bfa4\", \"externalIds\": {\"DOI\": \"10.1093/pcp/pcad006\", \"CorpusId\": 256103299, \"PubMed\": \"36688592\"}, \"title\": \"OsSYMRK Plays an Essential Role in AM Symbiosis in Rice (Oryza sativa).\", \"venue\": \"Plant and Cell Physiology\", \"year\": 2023, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/pcp/article-pdf/64/4/378/49993331/pcad006.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/pcp/pcad006?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/pcp/pcad006, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13566822\", \"name\": \"Kana Miyata\"}, {\"authorId\": \"2202330908\", \"name\": \"Moe Hosotani\"}, {\"authorId\": \"31869551\", \"name\": \"Akira Akamatsu\"}, {\"authorId\": \"34144208\", \"name\": \"N. Takeda\"}, {\"authorId\": \"2202330435\", \"name\": \"Jiang Wendi\"}, {\"authorId\": \"2302714032\", \"name\": \"Taisei Sugiyama\"}, {\"authorId\": \"2202330809\", \"name\": \"Ryou Takaoka\"}, {\"authorId\": \"2202233166\", \"name\": \"Kotarou Matsumoto\"}, {\"authorId\": \"92620089\", \"name\": \"S. Abe\"}, {\"authorId\": \"4320470\", \"name\": \"N. Shibuya\"}, {\"authorId\": \"5141915\", \"name\": \"H. Kaku\"}], \"abstract\": \"Arbuscular mycorrhizal (AM) fungi establish mutualistic symbiosis with a wide range of terrestrial plants, including rice. However, the mechanisms underlying the initiation of AM symbiosis have yet to be elucidated, particularly in nonleguminous plants. We previously demonstrated that OsCERK1, a lysin motif (LysM) receptor-like kinase essential for chitin-triggered immunity, also plays a key role in AM symbiosis in rice. However, the mechanisms underlying the regulation of switching between immunity and symbiosis by OsCERK1 have yet to be fully elucidated. SYMRK/DMI2 is a leucine-rich repeat receptor-like kinase associated with both root nodule symbiosis and AM symbiosis in legumes. The homologue of SYMRK in rice, OsSYMRK, has a shorter form than in legumes because OsSYMRK lacks a malectin-like domain (MLD). The MLD reportedly contributes to symbiosis in Lotus japonicus; however, the contribution of OsSYMRK to AM symbiosis in rice remains unclear. Phylogenetic analyses indicated that the MLD of SYMRK/DMI2 is widely conserved even in mosses and ferns but absent in commelinids, including rice. To understand the function of OsSYMRK, we produced an Ossymrk knockout mutant using CRISPR/Cas9 technology. AM colonization was mostly abolished in Ossymrk with a more severe phenotype than Oscerk1. Ca2+ spiking against chitin tetramer was also diminished in Ossymrk. In contrast, comparable defense responses against chitin heptamer to wild type were observed in Ossymrk. Bimolecular fluorescence complementation studies demonstrating an interaction between OsSYMRK and OsCERK1 indicate OsSYMRK may play an important role in switching from immunity to symbiosis through the interaction with OsCERK1 in rice.\"}, {\"paperId\": \"02a498c380b9deaba2229ca35e20db710b76c9f1\", \"externalIds\": {\"PubMedCentral\": \"7837686\", \"MAG\": \"3112975627\", \"DOI\": \"10.1161/ATVBAHA.120.314655\", \"CorpusId\": 228088755, \"PubMed\": \"33297749\"}, \"title\": \"Single Mutation in the NFU1 Gene Metabolically Reprograms Pulmonary Artery Smooth Muscle Cells\", \"venue\": \"Arteriosclerosis, Thrombosis and Vascular Biology\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ahajournals.org/doi/pdf/10.1161/ATVBAHA.120.314655\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7837686, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40366228\", \"name\": \"J. James\"}, {\"authorId\": \"46658366\", \"name\": \"M. Zemskova\"}, {\"authorId\": \"51229961\", \"name\": \"Cody A. Eccles\"}, {\"authorId\": \"4814043\", \"name\": \"M. Varghese\"}, {\"authorId\": \"49273316\", \"name\": \"M. Niihori\"}, {\"authorId\": \"48243484\", \"name\": \"N. Barker\"}, {\"authorId\": \"5482775\", \"name\": \"M. Luo\"}, {\"authorId\": \"2291497\", \"name\": \"L. Mandarino\"}, {\"authorId\": \"46656595\", \"name\": \"P. Langlais\"}, {\"authorId\": \"3837421\", \"name\": \"O. Rafikova\"}, {\"authorId\": \"145132069\", \"name\": \"R. Rafikov\"}], \"abstract\": \"Supplemental Digital Content is available in the text. Objective: NFU1 is a mitochondrial iron-sulfur scaffold protein, involved in iron-sulfur assembly and transfer to complex II and LAS (lipoic acid synthase). Patients with the point mutation NFU1G208C and CRISPR/CAS9 (clustered regularly interspaced short palindromic repeats/clustered regularly interspaced short palindromic repeat\\u2013associated 9)-generated rats develop mitochondrial dysfunction leading to pulmonary arterial hypertension. However, the mechanistic understanding of pulmonary vascular proliferation due to a single mutation in NFU1 remains unresolved. Approach and Results: Quantitative proteomics of isolated mitochondria showed the entire phenotypic transformation of NFU1G206C rats with a disturbed mitochondrial proteomic landscape, involving significant changes in the expression of 208 mitochondrial proteins. The NFU1 mutation deranged the expression pattern of electron transport proteins, resulting in a significant decrease in mitochondrial respiration. Reduced reliance on mitochondrial respiration amplified glycolysis in pulmonary artery smooth muscle cell (PASMC) and activated GPD (glycerol-3-phosphate dehydrogenase), linking glycolysis to oxidative phosphorylation and lipid metabolism. Decreased PDH (pyruvate dehydrogenase) activity due to the lipoic acid shortage is compensated by increased fatty acid metabolism and oxidation. PASMC became dependent on extracellular fatty acid sources due to upregulated transporters such as CD36 (cluster of differentiation 36) and CPT (carnitine palmitoyltransferase)-1. Finally, the NFU1 mutation produced a dysregulated antioxidant system in the mitochondria, leading to increased reactive oxygen species levels. PASMC from NFU1 rats showed apoptosis resistance, increased anaplerosis, and attained a highly proliferative phenotype. Attenuation of mitochondrial reactive oxygen species by mitochondrial-targeted antioxidant significantly decreased PASMC proliferation. Conclusions: The alteration in iron-sulfur metabolism completely transforms the proteomic landscape of the mitochondria, leading toward metabolic plasticity and redistribution of energy sources to the acquisition of a proliferative phenotype by the PASMC.\"}, {\"paperId\": \"02aa0bda5ffe222d9bfeac2b4f7317461ada5a97\", \"externalIds\": {\"PubMedCentral\": \"7404234\", \"MAG\": \"3028986536\", \"DOI\": \"10.1534/genetics.120.303269\", \"CorpusId\": 219314953, \"PubMed\": \"32493719\"}, \"title\": \"High-Efficiency CRISPR/Cas9 Mutagenesis of the white Gene in the Milkweed Bug Oncopeltus fasciatus\", \"venue\": \"Genetics\", \"year\": 2020, \"citationCount\": 37, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/genetics/article-pdf/215/4/1027/42225050/genetics1027.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7404234, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40039488\", \"name\": \"Katie Reding\"}, {\"authorId\": \"4785130\", \"name\": \"L. Pick\"}], \"abstract\": \"In this manuscript, we report that clustered regularly interspaced short palindromic repeats (CRISPR)/Cas9 is highly efficient in the hemipteran Oncopeltus fasciatus. The white gene is well characterized in Drosophila where mutation causes loss of eye pigmentation; white is a reliable marker for transgenesis and other genetic manipulations. Accordingly, white has been targeted in a number of nonmodel insects to establish tools for genetic studies. Here, we generated mutations in the Of-white (Of-w) locus using CRISPR/Cas9. We found that Of-w is required for pigmentation throughout the body of Oncopeltus, not just the ommatidia. High rates of somatic mosaicism were observed in the injected generation, reflecting biallelic mutations, and a high rate of germline mutation was evidenced by the large proportion of heterozygous G1s. However, Of-w mutations are homozygous lethal; G2 homozygotes lacked pigment dispersion throughout the body and did not hatch, precluding the establishment of a stable mutant line. Embryonic and parental RNA interference (RNAi) were subsequently performed to rule out off-target mutations producing the observed phenotype and to evaluate the efficacy of RNAi in ablating gene function compared to a loss-of-function mutation. RNAi knockdowns phenocopied Of-w homozygotes, with an unusual accumulation of orange granules observed in unhatched embryos. This is, to our knowledge, the first CRISPR/Cas9-targeted mutation generated in Oncopeltus. While we were unable to establish white as a useful visible marker for Oncopeltus, these findings are instructive for the selection of visible markers in nonmodel species and reveal an unusual role for an ortholog of a classic Drosophila gene.\"}, {\"paperId\": \"02aa5ff4616094f8e51a8658d384a6beb1dbe218\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.prca2023-b014\", \"CorpusId\": 259049802}, \"title\": \"Abstract B014: ONECUT2 activates diverse drug-resistant phenotypes in prostate cancer\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.prca2023-b014?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.prca2023-b014, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2131370339\", \"name\": \"Chen Qian\"}, {\"authorId\": \"12993877\", \"name\": \"Qian Yang\"}, {\"authorId\": \"2218990928\", \"name\": \"Hyoyoung Kim\"}, {\"authorId\": \"5702617\", \"name\": \"Yiwu Yan\"}, {\"authorId\": \"5900452\", \"name\": \"E. Mostaghel\"}, {\"authorId\": \"1744155\", \"name\": \"L. Ellis\"}, {\"authorId\": \"143832028\", \"name\": \"B. Knudsen\"}, {\"authorId\": \"7869549\", \"name\": \"S. Kaochar\"}, {\"authorId\": \"3073381\", \"name\": \"Huihui Ye\"}, {\"authorId\": \"5291306\", \"name\": \"I. Garraway\"}, {\"authorId\": \"35526467\", \"name\": \"S. You\"}, {\"authorId\": \"5062205\", \"name\": \"M. Freeman\"}], \"abstract\": \"\\n BACKGROUND. Prostate cancer (PC) cells can escape from lineage confinement and be reprogrammed to a drug-resistant, high-plasticity state, however the mechanism underlying this process is not understood. Our group identified the HOX/CUT transcription factor ONECUT2 (OC2) as a mediator of metastatic castration-resistant PC (mCRPC) that can be inhibited with a novel family of small molecules. OC2 was shown to be a lineage plasticity driver that promotes neuroendocrine prostate cancer (NEPC). In this study, we sought to uncover the mechanism whereby OC2 exerts effects on lineage plasticity. METHODS. RNAseq, CUT&RUNseq, scRNAseq, forced expression, shRNA, CRISPR-Cas9, co-precipitation/western blot, PCR, mutagenesis, human PC, PC models, computational modeling. RESULTS. We found that OC2 is capable of activating multiple androgen receptor- (AR)-indifferent, drug-resistant lineages, including programs not associated with NEPC, such as upregulation of the glucocorticoid receptor (GR). Consistent with the GR findings, OC2 regulated genes on the AR cistrome previously shown to be regulated by GR in CRPC, including KLK3/PSA. OC2 activated bivalent promoters of master regulator genes via epigenetic modification, and reprogramed multiple super-enhancers, including those associated with TMPRSS2 and SRRM4. OC2-expressing cells in human CRPC included populations that express AR, NE+/stem-like+, NE-/stem-like+, and \\u201cdouble negative\\u201d (NE-/AR-) phenotypes. OC2 also transcriptionally upregulated UDP-glucuronosyltransferase enzymes UGT2B15 and UGT2B17, which inactivate DHT, suggesting that the emergence of phenotypic plasticity also arises from AR suppression by ligand depletion. Consistent with this, low levels of androgen correlated with OC2 activation in human CRPC tumors. Enforced OC2 promoted both enzalutamide and docetaxel resistance in PC models. CONCLUSIONS. These findings identify OC2 as an upstream mediator of many lineage-defining factors that govern drug resistance, including those associated with adenocarcinoma. Because OC2 can be inhibited pharmacologically, these results suggest that suppressing this target may inhibit the emergence of a wide range of drug resistance mechanisms arising from loss of lineage confinement.\\n Citation Format: Chen Qian, Qian Yang, HyoYoung Kim, Yiwu Yan, Elahe Mostaghel, Leigh Ellis, Beatrice Knudsen, Salma Kaochar, Huihui Ye, Isla Garraway, Sungyong You, Michael Freeman. ONECUT2 activates diverse drug-resistant phenotypes in prostate cancer [abstract]. In: Proceedings of the AACR Special Conference: Advances in Prostate Cancer Research; 2023 Mar 15-18; Denver, Colorado. Philadelphia (PA): AACR; Cancer Res 2023;83(11 Suppl):Abstract nr B014.\"}, {\"paperId\": \"02ab55284e7702f9af238cc38bee2676651294a2\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-3068\", \"CorpusId\": 268644816}, \"title\": \"Abstract 3068: CD146mediates intimate crosstalk between adipocytes and triple-negative breast cancer cells and drives tumor metastasis through lipid metabolic reprogramming\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-3068?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-3068, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2180780559\", \"name\": \"Hexing Sun\"}, {\"authorId\": \"2244775641\", \"name\": \"Kaiyuan Huang\"}, {\"authorId\": \"2281386396\", \"name\": \"Bingmei Sun\"}, {\"authorId\": \"2281380412\", \"name\": \"Jiajia Lin\"}, {\"authorId\": \"2293069150\", \"name\": \"Ruiqian Yang\"}, {\"authorId\": \"2351047608\", \"name\": \"Jiawei Li\"}, {\"authorId\": \"2281281428\", \"name\": \"Shimeng Wang\"}, {\"authorId\": \"2244206626\", \"name\": \"De Zeng\"}, {\"authorId\": \"2244694325\", \"name\": \"Haoyu Lin\"}, {\"authorId\": \"2244581873\", \"name\": \"Yuanke Liang\"}], \"abstract\": \"\\n Background & Aim: In the tumor microenvironment, the adipocytes enhance the invasiveness of breast cancer (BC) by remodeling the lipid metabolism, especially in triple-negative breast cancer (TNBC). The cell adhesion molecule CD146 was highly expressed in TNBC and predicted poor distant metastasis free survival (DMFS) in patients. Meanwhile, CD146 was known to alter the obesity process by regulating the metabolic level of the body. In this study, we aimed to explore the molecular mechanism of CD146 in tumor metastasis mediating by lipid metabolic reprogramming between adipocytes and TNBC cells.\\n Methods: CD146 knockout (KO) or overexpression cell models were constructed by CRISPR/Cas9 or lentivirus. Cells labeled with luciferase were injected in tail vein of Balb/c-nude mice and monitored lung metastasis by IVIS Kinetic system in vivo. Transwell and wound healing assays were analyzed cell aggressiveness in vitro. We synthesized anti-CD146 nanobodies, which significantly degraded CD146 protein and inhibitd its function. RNA-seq and Lipidomics in CD146 knockout models were performed to analyze the role of CD146 in TNBC cell metabolism. Immunofluorescence was used to detect the intracellular content of Lipid Droplet (LD) and protein localization. Finally, we used oleic acid (OA) and adipocyte-conditioned medium (CM) to mimic the tumor microenvironment.\\n Results: CD146 was highly expressed in TNBC and predicted poor DMFS survival. Inhibition of CD146 suppressed tumor aggressiveness and lung metastasis in vitro and in vivo. According to the bioinformatics and RNA-Seq analysis, we showed that CD146 was intimately involved in the lipid metabolic pathway, particularly fatty acid metabolism, and revealed that inhibiting CD146 in TNBC elevated the intracellular triglyceride level through lipidomic assay. Meanwhile, knockout of CD146 promoted LD accumulation and decreased fatty acid oxidation (FAO) and mitochondrial ATP levels. In molecular mechanism, we found that adipocytes secrete high level of IL6 and fatty acid, which activated JAK/STAT3 signaling and FAO mediating by CD146 in TNBC cells. Blocking CD146 using its nanobody inhibited IL6/JAK/STAT3 activities and ACADM, leading to impairment of FAO and lung metastasis suppression in vitro and in vivo.\\n Conclusions: In this study, we demonstrate the crucial role of CD146 in the crosstalk between tumor cells and adipocytes in the tumor microenvironment. CD146 promotes the utilization of fatty acids through fatty acid oxidation and activates the downstream inflammatory pathway response with adipocyte-secreted IL-6, thereby driving BC aggressiveness. Our study has important implications for the development of TNBC therapeutics to block CD146-driven FAO process, inflammatory response and tumor metastasis.\\n Citation Format: Hexing Sun, Kaiyuan Huang, Bingmei Sun, Jiajia Lin, Ruiqian Yang, Jiawei Li, Shimeng Wang, De Zeng, Haoyu Lin, Yuanke Liang. CD146mediates intimate crosstalk between adipocytes and triple-negative breast cancer cells and drives tumor metastasis through lipid metabolic reprogramming [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 3068.\"}, {\"paperId\": \"02ae9053a3cbc425922aa6f2eeba4d8e0f7318c4\", \"externalIds\": {\"PubMedCentral\": \"11218679\", \"DOI\": \"10.3389/fbioe.2024.1346810\", \"CorpusId\": 270606242, \"PubMed\": \"38957576\"}, \"title\": \"Use of CRISPRoff and synthetic Notch to modulate and relay endogenous gene expression programs in engineered cells\", \"venue\": \"Frontiers in Bioengineering and Biotechnology\", \"year\": 2024, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fbioe.2024.1346810/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11218679, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2307899407\", \"name\": \"Shuqun Shi\"}, {\"authorId\": \"49607015\", \"name\": \"Catherine A. Hamann\"}, {\"authorId\": \"2307406609\", \"name\": \"Joanne C. Lee\"}, {\"authorId\": \"6432740\", \"name\": \"Jonathan M. Brunger\"}], \"abstract\": \"Uncovering the stimulus-response histories that give rise to cell fates and behaviors is an area of great interest in developmental biology, tissue engineering, and regenerative medicine. A comprehensive accounting of cell experiences that lead to the development of organs and tissues can help us to understand developmental anomalies that may underly disease. Perhaps more provocatively, such a record can also reveal clues as to how to drive cell collective decision-making processes, which may yield predictable cell-based therapies or facilitate production of tissue substitutes for transplantation or in vitro screening of prospective therapies to mitigate disease. Toward this end, various methods have been applied to molecularly trace developmental trajectories and record interaction histories of cells. Typical methods involve artificial gene circuits based on recombinases that activate a suite of fluorescent reporters or CRISPR-Cas9 genome writing technologies whose nucleic acid-based record keeping serves to chronicle cell-cell interactions or past exposure to stimuli of interests. Exciting expansions of the synthetic biology toolkit with artificial receptors that permit establishment of defined input-to-output linkages of cell decision-making processes opens the door to not only record cell-cell interactions, but to also potentiate directed manipulation of the outcomes of such interactions via regulation of carefully selected transgenes. Here, we combine CRISPR-based strategies to genetically and epigenetically manipulate cells to express components of the synthetic Notch receptor platform, a widely used artificial cell signaling module. Our approach gives rise to the ability to conditionally record interactions between human cells, where the record of engagement depends on expression of a state-specific marker of a subset of cells in a population. Further, such signal-competent interactions can be used to direct differentiation of human embryonic stem cells toward pre-selected fates based on assigned synNotch outputs. We also implemented CRISPR-based manipulation of native gene expression profiles to bias outcomes of cell engagement histories in a targeted manner. Thus, we present a useful strategy that gives rise to both state-specific recording of cell-cell interactions as well as methods to intentionally influence products of such cell-cell exchanges.\"}, {\"paperId\": \"02af2ba6ca1916ea5d327e0b02fd3efdf45f7dec\", \"externalIds\": {\"MAG\": \"3002402595\", \"DOI\": \"10.1016/j.dnarep.2020.102807\", \"CorpusId\": 211004873, \"PubMed\": \"32006716\"}, \"title\": \"Drosophila Xrcc2 regulates DNA double-strand repair in somatic cells.\", \"venue\": \"DNA Repair\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.dnarep.2020.102807?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.dnarep.2020.102807, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3885184\", \"name\": \"Fabienne E. Bayer\"}, {\"authorId\": \"1491296231\", \"name\": \"Sebastian Deichsel\"}, {\"authorId\": \"1491296107\", \"name\": \"Pascal Mahl\"}, {\"authorId\": \"14978144\", \"name\": \"A. Nagel\"}], \"abstract\": \"Genomic integrity is challenged by endo- and exogenous assaults that are combated by highly conserved DNA repair mechanisms. Repair of DNA double-strand breaks (DSBs) is of particular importance, as DSBs inflict chromosome breaks that are the basis of genomic instability. High fidelity recombination repair of DSBs relies on the Rad51 recombinase, aided by several Rad51 paralogs. Despite their significant contribution to DSB repair, the individual roles for Rad51 paralogs are incompletely understood. Drosophila serves as a metazoan model for DNA damage repair at the organismal level. Yet, only two out of four Rad51 paralogs have been studied so far and both are restricted to meiotic recombination repair. Using CRISPR/Cas9 technology, we have generated the first X-ray repair cross complementing 2 (xrcc2) null mutant in Drosophila. Like any other Drosophila Rad51 homologue, loss of xrcc2 does not affect fly development. We found that Drosophila xrcc2 - despite a specific expression in ovaries - is not essential for meiotic DSB repair, but supports the process. In contrast, xrcc2 is required for mitotic DNA damage repair: the mutants are highly sensitive towards various genotoxic stressors, including ionizing radiation, which significantly increase mortality. Moreover, loss of xrcc2 provokes chromosome aberrations in mitotic larval neuroblasts under unstressed conditions and enduring chromosomal breaks as well as persistent repair foci after irradiation exposure. Together these results demonstrate that xrcc2 plays a crucial role in combating genotoxic insult by controlling DSB repair in somatic cells of Drosophila.\"}, {\"paperId\": \"02b2094bdac883af470c9181387c7d09a17c0174\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2022.102704\", \"CorpusId\": 246942242, \"PubMed\": \"35176664\"}, \"title\": \"Generation of human GAPDH knock-in reporter iPSC lines for stable expression of tdTomato in pluripotent and differentiated culture conditions.\", \"venue\": \"Stem Cell Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2022.102704\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2022.102704?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2022.102704, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47218692\", \"name\": \"Daisuke Kamiya\"}, {\"authorId\": \"21739221\", \"name\": \"Teruyoshi Yamashita\"}, {\"authorId\": \"47422251\", \"name\": \"Teppei Akaboshi\"}, {\"authorId\": \"2154911712\", \"name\": \"Yoshiki Yamaguchi\"}, {\"authorId\": \"5902886\", \"name\": \"Yayoi Toyooka\"}, {\"authorId\": \"7903230\", \"name\": \"M. Ikeya\"}], \"abstract\": \"Human induced pluripotent stem cells (iPSCs) can differentiate into multiple cell types and are utilized for research on human development and regenerative medicine. Here, we report the establishment of human GAPDH knock-in reporter iPSC lines (GAPDH-tdT1 and 2), via CRISPR/Cas9-mediated homologous recombination, that stably express tdTomato as a constitutive cell label in both iPSCs and their differentiated derivatives. These cell lines will provide useful tools to trace cell locations and fates in 2D cultures and 3D organoids and will facilitate in vivo experiments.\"}, {\"paperId\": \"02b284ddb0311e020cde2afe14f34c621875d47d\", \"externalIds\": {\"DOI\": \"10.3103/S0027131423010029\", \"CorpusId\": 258302634}, \"title\": \"The Effect of the TacA Knockout Transcription Factor on the cbhI Gene Transcription and Expression in the Filamentous Fungus Strain Penicillium verruculosum\", \"venue\": \"Moscow University Chemistry Bulletin\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.3103/S0027131423010029?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3103/S0027131423010029, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5064311\", \"name\": \"A. Chulkin\"}, {\"authorId\": \"90114613\", \"name\": \"V. Kislitsin\"}, {\"authorId\": \"3874831\", \"name\": \"I. Zorov\"}, {\"authorId\": \"93299493\", \"name\": \"I. Shashkov\"}, {\"authorId\": \"50115068\", \"name\": \"A. Rozhkova\"}], \"abstract\": null}, {\"paperId\": \"02b2eba15b1282c622e8197a21389bc66e4c0618\", \"externalIds\": {\"PubMedCentral\": \"7825080\", \"DOI\": \"10.3390/ijms22020480\", \"CorpusId\": 231300202, \"PubMed\": \"33418923\"}, \"title\": \"Establishment of a Genome Editing Tool Using CRISPR-Cas9 in Chlorella vulgaris UTEX395\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 31, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/2/480/pdf?version=1609920129\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7825080, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2125902998\", \"name\": \"Jongrae Kim\"}, {\"authorId\": \"49223415\", \"name\": \"Kwang Suk Chang\"}, {\"authorId\": \"96105205\", \"name\": \"Sangmuk Lee\"}, {\"authorId\": \"2539146\", \"name\": \"E. Jin\"}], \"abstract\": \"To date, Chlorella vulgaris is the most used species of microalgae in the food and feed additive industries, and also considered as a feasible cell factory for bioproducts. However, the lack of an efficient genetic engineering tool makes it difficult to improve the physiological characteristics of this species. Therefore, the development of new strategic approaches such as genome editing is trying to overcome this hurdle in many research groups. In this study, the possibility of editing the genome of C. vulgaris UTEX395 using clustered regularly interspaced short palindromic repeats (CRISPR)-associated protein 9 (Cas9) has been proven to target nitrate reductase (NR) and adenine phosphoribosyltransferase (APT). Genome-edited mutants, nr and apt, were generated by a DNA-mediated and/or ribonucleoprotein (RNP)-mediated CRISPR-Cas9 system, and isolated based on the negative selection against potassium chlorate or 2-fluoroadenine in place of antibiotics. The null mutation of edited genes was demonstrated by the expression level of the correspondent proteins or the mutation of transcripts, and through growth analysis under specific nutrient conditions. In conclusion, this study offers relevant empirical evidence of the possibility of genome editing in C. vulgaris UTEX395 by CRISPR-Cas9 and the practical methods. Additionally, among the generated mutants, nr can provide an easier screening strategy during DNA transformation than the use of antibiotics owing to their auxotrophic characteristics. These results will be a cornerstone for further advancement of the genetics of C. vulgaris.\"}, {\"paperId\": \"02b30a4e4a4bfeb12a1d843309010c9db3e3792b\", \"externalIds\": {\"DOI\": \"10.1021/acs.est.3c10763\", \"CorpusId\": 267034082, \"PubMed\": \"38232111\"}, \"title\": \"Editing Silicon Transporter Genes to Reduce Arsenic Accumulation in Rice.\", \"venue\": \"Environmental Science and Technology\", \"year\": 2024, \"citationCount\": 35, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.est.3c10763?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.est.3c10763, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2279848906\", \"name\": \"Xuejie Xu\"}, {\"authorId\": \"2109355057\", \"name\": \"Sheng-Kai Sun\"}, {\"authorId\": \"2108038253\", \"name\": \"Wenwen Zhang\"}, {\"authorId\": \"47347683\", \"name\": \"Zhu Tang\"}, {\"authorId\": \"2242844593\", \"name\": \"Fangjie Zhao\"}], \"abstract\": \"Rice is a dominant source of inorganic arsenic (As) exposure for populations consuming rice as a staple food. Decreasing As accumulation in rice grain is important for improving food safety. Arsenite [As(III)], the main form of As in paddy soil porewater, is taken up inadvertently by OsLsi1 and OsLsi2, the two key transporters for silicon (Si) uptake in rice roots. Here, we investigated whether editing OsLsi1 or OsLsi2 can decrease As accumulation in rice grain without compromising grain yield. We used the CRISPR-Cas9 technology to edit the promoter region of OsLsi1 and the C-terminal coding sequence of OsLsi1 and OsLsi2, and we generated a total of 27 mutants. Uptake and accumulation of Si and As were evaluated in both short-term hydroponic experiments and in a paddy field. Deletion of 1.2-2 kb of the OsLsi1 promoter suppressed OsLsi1 expression in roots and Si uptake markedly and did not affect As(III) uptake or grain As concentration. Some of the OsLsi1 and OsLsi2 coding sequence mutants showed large decreases in the uptake of Si and As(III) as well as large decreases in Si accumulation in rice husks. However, only OsLsi2 mutants showed significant decreases (by up to 63%) in the grain total As concentration. Editing OsLsi2 mainly affected the accumulation of inorganic As in rice grain with little effect on the accumulation of dimethylarsenate (DMA). Grain yields of the OsLsi2 mutants were comparable to those of the wild type. Editing OsLsi2 provides a promising way to reduce As accumulation in rice grain without compromising the grain yield.\"}, {\"paperId\": \"02b4e1fac9b16b9df3c9031806e05cb1ea89c127\", \"externalIds\": {\"PubMedCentral\": \"7875908\", \"DOI\": \"10.1111/jcmm.16268\", \"CorpusId\": 231621755, \"PubMed\": \"33452765\"}, \"title\": \"Knockout of MYOM1 in human cardiomyocytes leads to myocardial atrophy via impairing calcium homeostasis\", \"venue\": \"Journal of Cellular and Molecular Medicine\", \"year\": 2021, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/jcmm.16268\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7875908, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2046136387\", \"name\": \"C. Hang\"}, {\"authorId\": \"2046101571\", \"name\": \"Yuanxiu Song\"}, {\"authorId\": \"2110465847\", \"name\": \"Ya\\u2019nan Li\"}, {\"authorId\": \"2045769783\", \"name\": \"Siyao Zhang\"}, {\"authorId\": \"1399879344\", \"name\": \"Yun Chang\"}, {\"authorId\": \"2065884380\", \"name\": \"Rui Bai\"}, {\"authorId\": \"2028651974\", \"name\": \"Amina Saleem\"}, {\"authorId\": \"2046171022\", \"name\": \"Mengqi Jiang\"}, {\"authorId\": \"2137478146\", \"name\": \"Wen-jing Lu\"}, {\"authorId\": \"144132030\", \"name\": \"F. Lan\"}, {\"authorId\": \"2055098787\", \"name\": \"M. Cui\"}], \"abstract\": \"Myomesin\\u20101 (encoded by MYOM1 gene) is expressed in almost all cross\\u2010striated muscles, whose family (together with myomesin\\u20102 and myomesin\\u20103) helps to cross\\u2010link adjacent myosin to form the M\\u2010line in myofibrils. However, little is known about its biological function, causal relationship and mechanisms underlying the MYOM1\\u2010related myopathies (especially in the heart). Regrettably, there is no MYMO1 knockout model for its study so far. A better and further understanding of MYOM1 biology is urgently needed. Here, we used CRISPR/Cas9 gene\\u2010editing technology to establish an MYOM1 knockout human embryonic stem cell line (MYOM1\\u2212/\\u2212 hESC), which was then differentiated into myomesin\\u20101 deficient cardiomyocytes (MYOM1\\u2212/\\u2212 hESC\\u2010CMs) in vitro. We found that myomesin\\u20101 plays an important role in sarcomere assembly, contractility regulation and cardiomyocytes development. Moreover, myomesin\\u20101\\u2010deficient hESC\\u2010CMs can recapitulate myocardial atrophy phenotype in vitro. Based on this model, not only the biological function of MYOM1, but also the aetiology, pathogenesis, and potential treatments of myocardial atrophy caused by myomesin\\u20101 deficiency can be studied.\"}, {\"paperId\": \"02b50be2e4703f81d92c20de46d9b12709919847\", \"externalIds\": {\"DOI\": \"10.1021/acs.jafc.3c05131\", \"CorpusId\": 263775670, \"PubMed\": \"37807760\"}, \"title\": \"Safe-Harbor-Targeted CRISPR/Cas9 System and Cmhyd1 Overexpression Enhances Disease Resistance in Cordyceps militaris.\", \"venue\": \"Journal of Agricultural and Food Chemistry\", \"year\": 2023, \"citationCount\": 17, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.jafc.3c05131?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.jafc.3c05131, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2256693118\", \"name\": \"Qing Liu\"}, {\"authorId\": \"2256505231\", \"name\": \"Guoliang Meng\"}, {\"authorId\": \"2256580508\", \"name\": \"Miao Wang\"}, {\"authorId\": \"2108787427\", \"name\": \"Xiao Li\"}, {\"authorId\": \"2152970332\", \"name\": \"MengQian Liu\"}, {\"authorId\": \"2142697283\", \"name\": \"Fen Wang\"}, {\"authorId\": \"2146420857\", \"name\": \"Ying Yang\"}, {\"authorId\": \"5467295\", \"name\": \"C. Dong\"}], \"abstract\": \"Fungal disease of mushroomCordyceps militaris (CM) caused byCalcarisporium cordycipiticola (CC) is destructive to fruiting body cultivation, resulting in significant economic loss and potential food safety risks. CRISPR/Cas9 genome editing has proven to be a powerful tool for crop improvement but seldom succeeded in mushrooms. Here, the first genomic safe-harbor site, CmSH1 locus, was identified in the CM genome. A safe-harbor-targeted CRISPR/Cas9 system based on an autonomously replicating plasmid was designed to facilitate alien gene integration at the CmSH1 locus. Cmhyd1, one of the hydrophobin genes, was confirmed as a defensive factor against CC infection, and Cmhyd1 overexpression by this system showed enhancement of disease resistance with negligible effect on the agronomic traits of CM. No off-target events and residues of plasmid sequence were tested by PCR and genome resequencing. This study provided the first safe harbor site for genetic manipulations, a safe harbor-targeted CRISPR/Cas9 system, and the first disease-resistant gene-editing breeding system in mushrooms.\"}, {\"paperId\": \"02b637504e49722a09e543905a2d77b559736cad\", \"externalIds\": {\"DOI\": \"10.1039/d2bm00480a\", \"CorpusId\": 250116439, \"PubMed\": \"35766814\"}, \"title\": \"Cell-derived extracellular vesicles for CRISPR/Cas9 delivery: engineering strategies for cargo packaging and loading.\", \"venue\": \"Biomaterials Science\", \"year\": 2022, \"citationCount\": 47, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1039/d2bm00480a?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1039/d2bm00480a, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1881114271\", \"name\": \"Yujie Liang\"}, {\"authorId\": \"2034188308\", \"name\": \"Zoya Iqbal\"}, {\"authorId\": \"2144538337\", \"name\": \"Jianhong Wang\"}, {\"authorId\": \"2112141602\", \"name\": \"Limei Xu\"}, {\"authorId\": \"2108894535\", \"name\": \"Xiao Xu\"}, {\"authorId\": \"2174058976\", \"name\": \"Kan Ouyang\"}, {\"authorId\": null, \"name\": \"Hao Zhang\"}, {\"authorId\": \"145993748\", \"name\": \"Jianping Lu\"}, {\"authorId\": \"2055790629\", \"name\": \"Lijuan Duan\"}, {\"authorId\": \"2152106510\", \"name\": \"Jiang Xia\"}], \"abstract\": null}, {\"paperId\": \"02bc0dfd3fa551e601fdd7ca79e2878decd1fdb7\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-150305\", \"CorpusId\": 244647185}, \"title\": \"WT1 and DNMT3A Play an Essential Function and Represent Therapeutic Vulnerabilities in Certain AML Samples, As Shown By CRISPR/Cas9 Mediated Knockout in PDX Models In Vivo\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-150305\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-150305?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-150305, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14478227\", \"name\": \"M. Ghalandary\"}, {\"authorId\": \"2322611538\", \"name\": \"Yuqiao Gao\"}, {\"authorId\": \"2071187961\", \"name\": \"M. Becker\"}, {\"authorId\": \"50057754\", \"name\": \"D. Amend\"}, {\"authorId\": \"5017753\", \"name\": \"K. Metzeler\"}, {\"authorId\": \"1399168935\", \"name\": \"M. Rothenberg-Thurley\"}, {\"authorId\": \"4021076\", \"name\": \"I. Jeremias\"}], \"abstract\": \"\\n Background:\\n The prognosis of patients with acute myeloid leukemia (AML) remains poor and novel therapeutic options are intensively needed. Targeted therapies specifically address molecules with essential function for AML and deciphering novel essential target genes is of utmost importance. Functional genomics via CRISPR\\\\Cas9 technology paves the way for the systematic discovery of novel essential genes, but was so far mostly restricted to studying cell lines in vitro, lacking features of, e.g., primary tumor cells and the in vivo tumor microenvironment. To move closer to the clinical situation in patients, we used the CRISPR\\\\Cas9 technology in patient-derived xenograft (PDX) models of AML in vivo.\\n Methods:\\n Primary tumor cells from seven patients with AML were transplanted into immunocompromised NSG mice and serially transplantable PDX models derived thereof. PDX models were selected which carry the AML specific mutations of interest at variant allele frequencies close to 0.5. PDX cells were lentivirally transduced to express the Cas9 protein and a sgRNA; successfully transduced PDX cells were enriched by flow cytometry gating on a recombinant fluorochrome or by puromycin. The customized sgRNA library was designed using the CLUE (www.crispr-clue.de) platform and cloned into a lentiviral vector with five different sgRNAs per target gene, plus positive and negative controls (Becker et al., Nucleic Acids Res. 2020). PDX cells were lentivirally transduced with the CRISPR/Cas9 sgRNA library, transplanted into NSG mice, grown in vivo and cells re-isolated at advanced AML disease. sgRNA distribution was measured by next generation sequencing and compared to input control using the MAGeCK pipeline.\\n Interesting dropout hits from PDX in vivo screens were validated by fluorochrome-guided competitive in vivo experiments in the PDX models, comparing growth of PDX AML cells with knockout of the gene of interest versus control knockout in the same mouse. PDX cells were transduced with lentiviral vectors expressing a single sgRNA, using in parallel three different sgRNAs per target gene. Targeting and control sgRNAs were marked by different fluorochromes; PDX cells expressing targeting or control sgRNA were mixed at a 1:1 ratio, injected into NSG mice and PDX models competitively grown until advanced disease stage, when cell distributions was determined by flow cytometry.\\n Human AML cell lines were studied in vitro for comparison.\\n Results:\\n In search for genes with essential function in AML, we cloned a small customized sgRNA library targeting 34 genes recurrently mutated in AML and tested the library in two PDX AML models in vivo. From the dropouts, we validated most interesting target genes using fluorochrome-guided competitive in vivo assays.\\n Knockout of NPM1 abrogated in vivo growth in all PDX AML models tested, reproducing the known common essential function of NPM1. KRAS proved an essential function in PDX AML models both with and without an oncogenic mutation in KRAS, although with a stronger effect upon KRAS mutation, suggesting that patients with tumors both with and without KRAS mutation might benefit from treatment inhibiting KRAS.\\n Surprising results were obtained for WT1 and DNMT3A. Both genes are frequently mutated in AML, but most AML cell lines tested in vitro do not show an essential function of any of the two genes, in published knockdown or knockout data, including from the Cancer Dependency Map database. On the contrary, knockout of either WT1 or DNMT3A was shown to enhance growth of AML cell lines and increase leukemogenesis in certain models.\\n In PDX models in vivo, we found a clearly essential function for DNMT3A in all AML samples and WT1 in most samples tested and PDX in vivo results were discordant to cell line in vitro data, suggesting that cell line inherent features and/or the in vivo environment influence the function of WT1 and DNMT3A.\\n Conclusion:\\n We conclude that functional genomics in PDX models in vivo allows discovering essentialities hidden for cell line in vitro approaches. WT1 and DNMT3A harbor the potential to represent attractive therapeutic targets in AML under in vivo conditions, warranting further evaluation.\\n \\n \\n No relevant conflicts of interest to declare.\\n\"}, {\"paperId\": \"02bd37e0caabaafbba4eff460400ca7cc06f5e6f\", \"externalIds\": {\"DOI\": \"10.15252/embr.202256689\", \"CorpusId\": 257911555, \"PubMed\": \"37009825\"}, \"title\": \"STAT5b is a key effector of NRG\\u20101/ERBB4\\u2010mediated myocardial growth\", \"venue\": \"EMBO Reports\", \"year\": 2023, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.15252/embr.202256689\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15252/embr.202256689?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15252/embr.202256689, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14476974\", \"name\": \"Katri Vaparanta\"}, {\"authorId\": \"3784769\", \"name\": \"A. Jokilammi\"}, {\"authorId\": \"6588408\", \"name\": \"I. Paatero\"}, {\"authorId\": \"31811479\", \"name\": \"Johannes A. M. Merilahti\"}, {\"authorId\": \"78851569\", \"name\": \"J. Heliste\"}, {\"authorId\": \"30426568\", \"name\": \"K. A. Hemanthakumar\"}, {\"authorId\": \"4811677\", \"name\": \"R. Kivel\\u00e4\"}, {\"authorId\": \"4943908\", \"name\": \"K. Alitalo\"}, {\"authorId\": \"5092003\", \"name\": \"P. Taimen\"}, {\"authorId\": \"31714935\", \"name\": \"K. Elenius\"}], \"abstract\": \"The growth factor Neuregulin\\u20101 (NRG\\u20101) regulates myocardial growth and is currently under clinical investigation as a treatment for heart failure. Here, we demonstrate in several in vitro and in vivo models that STAT5b mediates NRG\\u20101/EBBB4\\u2010stimulated cardiomyocyte growth. Genetic and chemical disruption of the NRG\\u20101/ERBB4 pathway reduces STAT5b activation and transcription of STAT5b target genes Igf1, Myc, and Cdkn1a in murine cardiomyocytes. Loss of Stat5b also ablates NRG\\u20101\\u2010induced cardiomyocyte hypertrophy. Dynamin\\u20102 is shown to control the cell surface localization of ERBB4 and chemical inhibition of Dynamin\\u20102 downregulates STAT5b activation and cardiomyocyte hypertrophy. In zebrafish embryos, Stat5 is activated during NRG\\u20101\\u2010induced hyperplastic myocardial growth, and chemical inhibition of the Nrg\\u20101/Erbb4 pathway or Dynamin\\u20102 leads to loss of myocardial growth and Stat5 activation. Moreover, CRISPR/Cas9\\u2010mediated knockdown of stat5b results in reduced myocardial growth and cardiac function. Finally, the NRG\\u20101/ERBB4/STAT5b signaling pathway is differentially regulated at mRNA and protein levels in the myocardium of patients with pathological cardiac hypertrophy as compared to control human subjects, consistent with a role of the NRG\\u20101/ERBB4/STAT5b pathway in myocardial growth.\"}, {\"paperId\": \"02be78595c4a60eea1eb02d7b81888329b533f39\", \"externalIds\": {\"MAG\": \"3099670189\", \"DOI\": \"10.1016/j.ymthe.2020.11.023\", \"CorpusId\": 227132554, \"PubMed\": \"33221434\"}, \"title\": \"CRISPR/Cas9-mediated gene correction in newborn rabbits with hereditary tyrosinemia type I.\", \"venue\": \"Molecular Therapy\", \"year\": 2020, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S1525001620306213/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymthe.2020.11.023?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymthe.2020.11.023, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2157950193\", \"name\": \"Nan Li\"}, {\"authorId\": \"148051679\", \"name\": \"Shixue Gou\"}, {\"authorId\": \"1963719704\", \"name\": \"Jiaowei Wang\"}, {\"authorId\": \"6713255\", \"name\": \"Quanjun Zhang\"}, {\"authorId\": \"1962869901\", \"name\": \"Xingyun Huang\"}, {\"authorId\": \"32522207\", \"name\": \"Jingke Xie\"}, {\"authorId\": \"2156054591\", \"name\": \"Li Li\"}, {\"authorId\": \"2072795829\", \"name\": \"Qin Jin\"}, {\"authorId\": \"2228902145\", \"name\": \"Ouyang Zhen\"}, {\"authorId\": \"25121136\", \"name\": \"Fangbing Chen\"}, {\"authorId\": \"32477923\", \"name\": \"Weikai Ge\"}, {\"authorId\": \"2108701826\", \"name\": \"Hui Shi\"}, {\"authorId\": \"2107984700\", \"name\": \"Yanhui Liang\"}, {\"authorId\": \"1960445968\", \"name\": \"Zhenpeng Zhuang\"}, {\"authorId\": \"115758968\", \"name\": \"Xiaozhu Zhao\"}, {\"authorId\": \"1677733059\", \"name\": \"Meng Lian\"}, {\"authorId\": \"50129545\", \"name\": \"Yinghua Ye\"}, {\"authorId\": \"38005067\", \"name\": \"Longquan Quan\"}, {\"authorId\": \"100646018\", \"name\": \"Han Wu\"}, {\"authorId\": \"38165908\", \"name\": \"L. Lai\"}, {\"authorId\": \"15885466\", \"name\": \"Kepin Wang\"}], \"abstract\": \"Patients with hereditary tyrosinemia type I (HT1) present acute and irreversible liver and kidney damages during infancy. CRISPR/Cas9-mediated gene correction during infancy may provide a promising approach to treat patients with HT1. However, all previous studies were performed on adult HT1 rodent models, which cannot authentically recapitulate some symptoms of human patients. To translate precise gene therapy to clinical practice, the efficacy and safety should be verified in large animals. Here, we delivered CRISPR/Cas9 and donor templates via adeno-associated virus to newborn HT1 rabbits. The lethal phenotypes could be rescued, and notably, these HT1 rabbits reached adulthood normally without 2-(2-nitro-4-trifluoromethylbenzyol)-1,3 cyclohexanedione administration, and even gave birth to offspring. AAV-treated HT1 rabbits displayed normal liver and kidney structures and functions. Homology-directed repair-mediated precise gene corrections and non-homologous end joining-mediated out-of-frame to in-frame corrections in the livers were observed with efficiencies of 0.90%-3.71% and 2.39%-6.35%, respectively, which appeared to be sufficient to recover liver function and decrease liver and kidney damages. This study provides useful large-animal preclinical data for rescuing hepatocyte-related monogenetic metabolic disorders with precise gene therapy.\"}, {\"paperId\": \"02be8cb04593e3bd868ffcd420661c33e4dffc6b\", \"externalIds\": {\"MAG\": \"3002743065\", \"PubMedCentral\": \"6992938\", \"DOI\": \"10.1016/j.ebiom.2020.102633\", \"CorpusId\": 210912655, \"PubMed\": \"31981984\"}, \"title\": \"Enhanced thrombospondin-1 causes dysfunction of vascular endothelial cells derived from Fabry disease-induced pluripotent stem cells\", \"venue\": \"EBioMedicine\", \"year\": 2020, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.thelancet.com/article/S2352396420300086/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6992938, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"119710334\", \"name\": \"Hyo-Sang Do\"}, {\"authorId\": \"14966057\", \"name\": \"Sang-Wook Park\"}, {\"authorId\": \"5231096\", \"name\": \"I. Im\"}, {\"authorId\": \"144643119\", \"name\": \"Dong-Bum Seo\"}, {\"authorId\": \"145022417\", \"name\": \"H. Yoo\"}, {\"authorId\": \"5856131\", \"name\": \"H. Go\"}, {\"authorId\": \"2117905065\", \"name\": \"Yoo Hyung Kim\"}, {\"authorId\": \"8345429\", \"name\": \"G. Koh\"}, {\"authorId\": \"143716376\", \"name\": \"B. Lee\"}, {\"authorId\": \"115141247\", \"name\": \"Yong-Mahn Han\"}], \"abstract\": \"Background Fabry disease (FD) is a recessive X-linked lysosomal storage disorder caused by \\u03b1-galactosidase A (GLA) deficiency. Although the mechanism is unclear, GLA deficiency causes an accumulation of globotriaosylceramide (Gb3), leading to vasculopathy. Methods To explore the relationship between the accumulation of Gb3 and vasculopathy, induced pluripotent stem cells generated from four Fabry patients (FD-iPSCs) were differentiated into vascular endothelial cells (VECs). Genome editing using CRISPR-Cas9 system was carried out to correct the GLA mutation or to delete Thrombospondin-1 (TSP-1). Global transcriptomes were compared between wild-type (WT)- and FD-VECs by RNA-sequencing analysis. Findings Here, we report that overexpression of TSP-1 contributes to the dysfunction of VECs in FD. VECs originating from FD-iPSCs (FD-VECs) showed aberrant angiogenic functionality even upon treatment with recombinant \\u03b1-galactosidase. Intriguingly, FD-VECs produced more p-SMAD2 and TSP-1 than WT-VECs. We also found elevated TSP-1 in the peritubular capillaries of renal tissues biopsied from FD patients. Inhibition of SMAD2 signaling or knock out of TSP-1 (TSP-1\\u2212/\\u2212) rescues normal vascular functionality in FD-VECs, like in gene-corrected FD-VECs. In addition, the enhanced oxygen consumption rate is reduced in TSP-1\\u2212/\\u2212 FD-VECs. Interpretation The overexpression of TSP-1 secondary to Gb3 accumulation is primarily responsible for the observed FD-VEC dysfunction. Our findings implicate dysfunctional VEC angiogenesis in the peritubular capillaries in some of the complications of Fabry disease. Funding This study was supported by grant 2018M3A9H1078330 from the National Research Foundation of the Republic of Korea.\"}, {\"paperId\": \"02bf4e1eb0a129a68e73bba82b76a44d85eecaba\", \"externalIds\": {\"MAG\": \"3048609924\", \"DOI\": \"10.1016/j.tube.2020.101983\", \"CorpusId\": 221278206, \"PubMed\": \"32829077\"}, \"title\": \"Efficient genome editing in pathogenic mycobacteria using Streptococcus thermophilus CRISPR1-Cas9.\", \"venue\": \"Tuberculosis\", \"year\": 2020, \"citationCount\": 39, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.tube.2020.101983\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.tube.2020.101983?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.tube.2020.101983, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1390162208\", \"name\": \"Aniek S. Meijers\"}, {\"authorId\": \"1903758819\", \"name\": \"R. Troost\"}, {\"authorId\": \"5912690\", \"name\": \"R. Ummels\"}, {\"authorId\": \"3803288\", \"name\": \"J. Maaskant\"}, {\"authorId\": \"118363310\", \"name\": \"A. Speer\"}, {\"authorId\": \"2012397\", \"name\": \"S. Nejentsev\"}, {\"authorId\": \"4838609\", \"name\": \"W. Bitter\"}, {\"authorId\": \"5482778\", \"name\": \"C. Kuijl\"}], \"abstract\": \"The ability to genetically engineer pathogenic mycobacteria has increased significantly over the last decades due to the generation of new molecular tools. Recently, the application of the Streptococcus pyogenes and the Streptococcus thermophilus CRISPR-Cas9 systems in mycobacteria has enabled gene editing and efficient CRISPR interference-mediated transcriptional regulation. Here, we converted CRISPR interference into an efficient genome editing tool for mycobacteria. We demonstrate that the Streptococcus thermophilus CRISPR1-Cas9 (Sth1Cas9) is functional in Mycobacterium marinum and Mycobacterium tuberculosis, enabling highly efficient and precise DNA breaks and indel formation, without any off-target effects. In addition, with dual sgRNAs this system can be used to generate two indels simultaneously or to create specific deletions. The ability to use the power of the CRISPR-Cas9-mediated gene editing toolbox in M. tuberculosis with a single step will accelerate research into this deadly pathogen.\"}, {\"paperId\": \"02c1866dfb3859723ced5012be914f9e0c4acf64\", \"externalIds\": {\"PubMedCentral\": \"8187572\", \"DOI\": \"10.3389/fmicb.2021.629153\", \"CorpusId\": 235189965, \"PubMed\": \"34122355\"}, \"title\": \"Inactivation of Latent HIV-1 Proviral DNA Using Clustered Regularly Interspaced Short Palindromic Repeats/Cas9 Treatment and the Assessment of Off-Target Effects\", \"venue\": \"Frontiers in Microbiology\", \"year\": 2021, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fmicb.2021.629153/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8187572, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2110639070\", \"name\": \"Yufan Xu\"}, {\"authorId\": \"2375346031\", \"name\": \"Xiaorong Peng\"}, {\"authorId\": \"2124949361\", \"name\": \"Yanghao Zheng\"}, {\"authorId\": \"4033401\", \"name\": \"C. Jin\"}, {\"authorId\": \"4968519\", \"name\": \"Xiangyun Lu\"}, {\"authorId\": \"81966013\", \"name\": \"Dating Han\"}, {\"authorId\": \"2118645460\", \"name\": \"Hai-Yin Fu\"}, {\"authorId\": \"114576586\", \"name\": \"Chaoyu Chen\"}, {\"authorId\": \"33500977\", \"name\": \"N. Wu\"}], \"abstract\": \"Viral DNA integrated in host cells is a major barrier to completely curing HIV-1. However, genome editing using the recently developed technique of clustered regularly interspaced short palindromic repeats (CRISPR)/Cas9 has the potential to eradicate HIV-1. The present study aimed to use a lentiviral vector-based CRISPR/Cas9 system combined with dual-small/single guide RNAs (sgRNAs) to attack HIV-1 DNA in the latency reactivation model J-Lat 10.6 cell line and to assess off-target effects using whole-genome sequencing (WGS). We designed 12 sgRNAs targeting HIV-1 DNA, and selected high-efficiency sgRNAs for further pairwise combinations after a preliminary evaluation of the editing efficiency. Three combinations of dual-sgRNAs/Cas9 with high editing efficiency were screened successfully from multiple combinations. Among these combinations, the incidences of insertions and deletions in the sgRNA-targeted regions reached 76% and above, and no credible off-target sites were detected using WGS. The results provided comprehensive basic experimental evidence and methodological recommendations for future personalized HIV-1 treatment using CRISPR/Cas9 genome editing technology.\"}, {\"paperId\": \"02c256dac70ac60d9186a040392979aaff778b8c\", \"externalIds\": {\"PubMedCentral\": \"11604831\", \"DOI\": \"10.1007/s00125-024-06232-2\", \"CorpusId\": 271568542, \"PubMed\": \"39080045\"}, \"title\": \"Deletion of RFX6 impairs iPSC-derived islet organoid development and survival, with no impact on PDX1+/NKX6.1+ progenitors\", \"venue\": \"Diabetologia\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1007/s00125-024-06232-2\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11604831, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2190991950\", \"name\": \"Noura Aldous\"}, {\"authorId\": \"145003196\", \"name\": \"A. Elsayed\"}, {\"authorId\": \"36676353\", \"name\": \"Bushra Memon\"}, {\"authorId\": \"2291017369\", \"name\": \"Sadaf Ijaz\"}, {\"authorId\": \"1878730329\", \"name\": \"Sikander Hayat\"}, {\"authorId\": \"4618473\", \"name\": \"E. Abdelalim\"}], \"abstract\": \"Homozygous mutations in RFX6 lead to neonatal diabetes accompanied by a hypoplastic pancreas, whereas heterozygous mutations cause MODY. Recent studies have also shown RFX6 variants to be linked with type 2 diabetes. Despite RFX6\\u2019s known function in islet development, its specific role in diabetes pathogenesis remains unclear. Here, we aimed to understand the mechanisms underlying the impairment of pancreatic islet development and subsequent hypoplasia due to loss-of-function mutations in RFX6. We examined regulatory factor X6 (RFX6) expression during human embryonic stem cell (hESC) differentiation into pancreatic islets and re-analysed a single-cell RNA-seq dataset to identify RFX6-specific cell populations during islet development. Furthermore, induced pluripotent stem cell (iPSC) lines lacking RFX6 were generated using CRISPR/Cas9. Various approaches were then employed to explore the consequences of RFX6 loss across different developmental stages. Subsequently, we evaluated transcriptional changes resulting from RFX6 loss through RNA-seq of pancreatic progenitors (PPs) and endocrine progenitors (EPs). RFX6 expression was detected in PDX1+ cells in the hESC-derived posterior foregut (PF). However, in the PPs, RFX6 did not co-localise with pancreatic and duodenal homeobox 1 (PDX1) or NK homeobox 1 (NKX6.1) but instead co-localised with neurogenin 3, NK2 homeobox 2 and islet hormones in the EPs and islets. Single-cell analysis revealed high RFX6 expression levels in endocrine clusters across various hESC-derived pancreatic differentiation stages. Upon differentiating iPSCs lacking RFX6 into pancreatic islets, a significant decrease in PDX1 expression at the PF stage was observed, although this did not affect PPs co-expressing PDX1 and NKX6.1. RNA-seq analysis showed the downregulation of essential genes involved in pancreatic endocrine differentiation, insulin secretion and ion transport due to RFX6 deficiency. Furthermore, RFX6 deficiency resulted in the formation of smaller islet organoids due to increased cellular apoptosis, linked to reduced catalase expression, implying a protective role for RFX6. Overexpression of RFX6 reversed defective phenotypes in RFX6-knockout PPs, EPs and islets. These findings suggest that pancreatic hypoplasia and reduced islet cell formation associated with RFX6 mutations are not due to alterations in PDX1+/NKX6.1+ PPs but instead result from cellular apoptosis and downregulation of pancreatic endocrine genes. RNA-seq datasets have been deposited in the Zenodo repository with accession link (DOI: https://doi.org/10.5281/zenodo.10656891).\"}, {\"paperId\": \"02c26894104e0279a11252f8aa3507ffac102253\", \"externalIds\": {\"DOI\": \"10.1117/12.2634131\", \"CorpusId\": 247895682}, \"title\": \"Plasmonic-induced molecular transfer and its perspectives in plant science\", \"venue\": \"Photonics Europe\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1117/12.2634131?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1117/12.2634131, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40993735\", \"name\": \"S. Johannsmeier\"}, {\"authorId\": \"1581090943\", \"name\": \"A. Londenberg\"}, {\"authorId\": \"11484024\", \"name\": \"M. Zabic\"}, {\"authorId\": \"2161154034\", \"name\": \"Jana Schiwack\"}, {\"authorId\": \"46459649\", \"name\": \"J. Boch\"}, {\"authorId\": \"2851600\", \"name\": \"T. Ripken\"}, {\"authorId\": \"5027520\", \"name\": \"D. Heinemann\"}], \"abstract\": \"Molecular transfer across cellular membranes into living cells represents a fundamental technical challenge for the biological sciences. Within the biomedical field, a variety of laser-based transfer methods have been explored and successfully applied. In the most abundant approach, a NIR fs laser is tightly focused on the cellular membrane in order to achieve transient permeabilization and a diffusion-driven volume exchange. However, this approach is limited by the single-cell throughput. Plasmonic nanoparticles have proven as viable mediator to dramatically improve the throughput of laser-based molecular delivery within a process termed gold nanoparticle mediated (GNOME) laser transfection: membrane bound nanoparticles are illuminated by 532 nm, 850 ps laser pulses, leading to a confined nanoheater effect. With careful selection of the process parameters, the effect is localized to tens of nanometers around the nanoparticles and can achieve efficient and gentle transient permeabilization of the cellular membrane using a scanning laser setup. This approach has been successfully utilized to deliver a variety of molecules into different mammalian cell types. Herein, we investigate for the first time GNOME laser transfection in the context of plant cells. Plant cells are a promising target for manipulation via genome editing for breeding purposes, but delivery efficiencies for genome editing tools like CRISPR/Cas9 ribonucleotide complexes are still limited. For RNOME laser transfection, as well as for other laser based delivery approaches, the plant cell architecture yields several hurdles. The cells wall represents a quit rigid barrier for molecules above the size exclusion limit of about 40 to 60 kDa. Permeabilization of the cell wall requires high laser energy, which could raise concerns regarding the viability of the cells. In addition, the turgor would induce an outwards driven volume flow upon permeabilization. The presented approach therefore includes the formation of protoplasts from climate chamber cultivated Nicotiana benthamiana plant in isotonic solution before the incubation with the gold nanoparticles. Nanoparticles and protoplasts are brought into close vicinity by a centrifugation approach, before laser illumination of the sample. We investigate the impact of different process parameters (e.g. incubation conditions, laser fluence, scanning speed, \\u2026) on the viability and delivery efficiency of marker molecules. The presented approach provides the basis for future vector free genome editing of plant cells.\"}, {\"paperId\": \"02c514fc04ff79e01bc64d0faeed536a3d67a4eb\", \"externalIds\": {\"DOI\": \"10.1016/j.celrep.2024.114536\", \"CorpusId\": 271675705, \"PubMed\": \"39096901\"}, \"title\": \"SETDB1 suppresses NK cell-mediated immunosurveillance in acute myeloid leukemia with granulo-monocytic differentiation.\", \"venue\": \"Cell Reports\", \"year\": 2024, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.celrep.2024.114536?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.celrep.2024.114536, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269518791\", \"name\": \"Yu-Hsuan Chang\"}, {\"authorId\": \"2238210909\", \"name\": \"Keita Yamamoto\"}, {\"authorId\": \"49868144\", \"name\": \"Takeshi Fujino\"}, {\"authorId\": \"1953089388\", \"name\": \"Teh-Wei Wang\"}, {\"authorId\": \"2205508026\", \"name\": \"Emi Sugimoto\"}, {\"authorId\": \"2269404499\", \"name\": \"Wenyu Zhang\"}, {\"authorId\": \"2291657651\", \"name\": \"T. Yabushita\"}, {\"authorId\": \"2314589599\", \"name\": \"Ken Suzaki\"}, {\"authorId\": \"2269233043\", \"name\": \"E. C. Pietsch\"}, {\"authorId\": \"2269271385\", \"name\": \"Barbara A. Weir\"}, {\"authorId\": \"2269249610\", \"name\": \"Ramona Crescenzo\"}, {\"authorId\": \"2269271667\", \"name\": \"Glenn S. Cowley\"}, {\"authorId\": \"2269274065\", \"name\": \"Ricardo M. Attar\"}, {\"authorId\": \"4330895\", \"name\": \"U. Philippar\"}, {\"authorId\": \"47379328\", \"name\": \"M. Wunderlich\"}, {\"authorId\": \"9944993\", \"name\": \"B. Mizukawa\"}, {\"authorId\": \"2269308651\", \"name\": \"Yi Zheng\"}, {\"authorId\": \"2228669626\", \"name\": \"Yutaka Enomoto\"}, {\"authorId\": \"2243371745\", \"name\": \"Yoichi Imai\"}, {\"authorId\": \"2061332661\", \"name\": \"T. Kitamura\"}, {\"authorId\": \"4966565\", \"name\": \"S. Goyama\"}], \"abstract\": \"Monocytic acute myeloid leukemia (AML) responds poorly to current treatments, including venetoclax-based therapy. We conducted in\\u00a0vivo and in\\u00a0vitro CRISPR-Cas9 library screenings using a mouse monocytic AML model and identified SETDB1 and its binding partners (ATF7IP and TRIM33) as crucial tumor promoters in\\u00a0vivo. The growth-inhibitory effect of Setdb1 depletion in\\u00a0vivo is dependent mainly on natural killer (NK) cell-mediated cytotoxicity. Mechanistically, SETDB1 depletion upregulates interferon-stimulated genes and NKG2D ligands through the demethylation of histone H3 Lys9 at the enhancer regions, thereby enhancing their immunogenicity to NK cells and intrinsic apoptosis. Importantly, these effects are not observed in non-monocytic leukemia cells. We also identified the expression of myeloid cell nuclear differentiation antigen (MNDA) and its murine counterpart Ifi203 as biomarkers to predict the sensitivity of AML to SETDB1 depletion. Our study highlights the critical and selective role of SETDB1 in AML with granulo-monocytic differentiation and underscores its potential as a therapeutic target for current unmet needs.\"}, {\"paperId\": \"02c67abf458c7cfc9b906a3da5c3206442a0cdc1\", \"externalIds\": {\"PubMedCentral\": \"9988832\", \"DOI\": \"10.1038/s41421-023-00525-3\", \"CorpusId\": 257367404, \"PubMed\": \"36878905\"}, \"title\": \"CHD8 mutations increase gliogenesis to enlarge brain size in the nonhuman primate\", \"venue\": \"Cell Discovery\", \"year\": 2023, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41421-023-00525-3.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9988832, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2045294738\", \"name\": \"Bang Li\"}, {\"authorId\": \"2153034823\", \"name\": \"Hui Zhao\"}, {\"authorId\": \"4333888\", \"name\": \"Zhuchi Tu\"}, {\"authorId\": \"2144831366\", \"name\": \"Weili Yang\"}, {\"authorId\": \"2151222504\", \"name\": \"Rui Han\"}, {\"authorId\": \"2153516059\", \"name\": \"Lu Wang\"}, {\"authorId\": \"2115828810\", \"name\": \"Xiaopeng Luo\"}, {\"authorId\": \"2187885731\", \"name\": \"Mingtian Pan\"}, {\"authorId\": \"2116950388\", \"name\": \"Xiu-sheng Chen\"}, {\"authorId\": \"2107988165\", \"name\": \"Jiawei Zhang\"}, {\"authorId\": \"2375279152\", \"name\": \"Huijuan Xu\"}, {\"authorId\": \"2144102600\", \"name\": \"Xiangyu Guo\"}, {\"authorId\": \"144579983\", \"name\": \"Sen Yan\"}, {\"authorId\": \"1620370731\", \"name\": \"Peng Yin\"}, {\"authorId\": \"50144911\", \"name\": \"Zhiguang Zhao\"}, {\"authorId\": \"2108378598\", \"name\": \"Jianrong Liu\"}, {\"authorId\": \"2210832087\", \"name\": \"Yafeng Luo\"}, {\"authorId\": \"2144464256\", \"name\": \"Yuefeng Li\"}, {\"authorId\": \"3175308\", \"name\": \"Zhengyi Yang\"}, {\"authorId\": \"2118875313\", \"name\": \"Baogui B Zhang\"}, {\"authorId\": \"1647025203\", \"name\": \"Zhiqiang Tan\"}, {\"authorId\": \"2265422901\", \"name\": \"Hao Xu\"}, {\"authorId\": \"2114747903\", \"name\": \"Tianzi Jiang\"}, {\"authorId\": \"40299902\", \"name\": \"Yong-hui Jiang\"}, {\"authorId\": \"40632599\", \"name\": \"Shihua Li\"}, {\"authorId\": \"2144289533\", \"name\": \"Yong Q. Zhang\"}, {\"authorId\": \"2141633199\", \"name\": \"Xiao-Jiang Li\"}], \"abstract\": \"Autism spectrum disorder (ASD) is a complex neurodevelopmental condition that affects social interaction and behavior. Mutations in the gene encoding chromodomain helicase DNA-binding protein 8 (CHD8) lead to autism symptoms and macrocephaly by a haploinsufficiency mechanism. However, studies of small animal models showed inconsistent findings about the mechanisms for CHD8 deficiency-mediated autism symptoms and macrocephaly. Using the nonhuman primate as a model system, we found that CRISPR/Cas9-mediated CHD8 mutations in the embryos of cynomolgus monkeys led to increased gliogenesis to cause macrocephaly in cynomolgus monkeys. Disrupting CHD8 in the fetal monkey brain prior to gliogenesis increased the number of glial cells in newborn monkeys. Moreover, knocking down CHD8 via CRISPR/Cas9 in organotypic monkey brain slices from newborn monkeys also enhanced the proliferation of glial cells. Our findings suggest that gliogenesis is critical for brain size in primates and that abnormal gliogenesis may contribute to ASD.\"}, {\"paperId\": \"02c6e199d7f9312fdfc0909a2c092bd65be5a852\", \"externalIds\": {\"CorpusId\": 249616809}, \"title\": \"DMSO_A_330700 4209..4221\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20211020040821/https://www.dovepress.com/getfile.php?fileID=74848, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2192017871\", \"name\": \"Fangfang Xu\"}, {\"authorId\": \"2156503764\", \"name\": \"Na Wang\"}, {\"authorId\": \"2155121042\", \"name\": \"Gang Li\"}, {\"authorId\": \"2170020524\", \"name\": \"Dandan Tian\"}, {\"authorId\": \"2119205046\", \"name\": \"X. Shi\"}], \"abstract\": null}, {\"paperId\": \"02c776f8e2198884ecc460471878cfa329e729ea\", \"externalIds\": {\"MAG\": \"3047464915\", \"DOI\": \"10.1007/s11033-020-05685-z\", \"CorpusId\": 220980890, \"PubMed\": \"32761301\"}, \"title\": \"The AKR1B1 inhibitor epalrestat suppresses the progression of cervical cancer\", \"venue\": \"Molecular Biology Reports\", \"year\": 2020, \"citationCount\": 22, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s11033-020-05685-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s11033-020-05685-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2111810145\", \"name\": \"J. Ji\"}, {\"authorId\": \"1855945221\", \"name\": \"Minxue Xu\"}, {\"authorId\": \"2058892113\", \"name\": \"Tian-Yang Qian\"}, {\"authorId\": \"2158344049\", \"name\": \"Sheng-Ze Zhu\"}, {\"authorId\": \"144999030\", \"name\": \"F. Jiang\"}, {\"authorId\": \"11181575\", \"name\": \"Zhao-xiu Liu\"}, {\"authorId\": \"16548085\", \"name\": \"Weisong Xu\"}, {\"authorId\": \"2608832\", \"name\": \"Juan Zhou\"}, {\"authorId\": \"7533894\", \"name\": \"Mingbing Xiao\"}], \"abstract\": null}, {\"paperId\": \"02ca59a338f77e5d344328253c21f1747b587e32\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-4041\", \"CorpusId\": 257976294}, \"title\": \"Abstract 4041: The EML4-ALK fusion protein mediates reduced sensitivity to the combination of neratinib and dasatinib\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-4041?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-4041, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2158305205\", \"name\": \"Myra E. Castel\"}, {\"authorId\": \"35198717\", \"name\": \"N. Conlon\"}, {\"authorId\": \"49309561\", \"name\": \"L. Eli\"}, {\"authorId\": \"2064872143\", \"name\": \"A. Wong\"}, {\"authorId\": \"143723492\", \"name\": \"J. Crown\"}, {\"authorId\": \"34515754\", \"name\": \"D. Collins\"}], \"abstract\": \"\\n Introduction: The anaplastic lymphoma kinase (ALK) gene encodes a receptor tyrosine kinase involved in cellular proliferation, differentiation, and cell death. ALK becomes oncogenic when it forms a fusion gene. The EML4-ALK fusion gene has been identified mainly in non-small cell lung cancer (NSCLC). It is unknown whether neratinib, an irreversible pan-HER tyrosine kinase inhibitor (TKI) targeting EGFR, HER2 and HER4, is effective in cancers harboring EML4-ALK gene fusion. The objective of this study was to assess in vitro efficacy of neratinib in combination with dasatinib (Src/Abl TKI) or crizotinib (ALK TKI) in EML4-ALK+ NSCLC.\\n Methods: The antiproliferative effects of neratinib, dasatinib and crizotinib were assessed in the CRISPR/Cas9-modified EML4-ALK fusion-A549 (EML4-ALK+) and parental A459 (A549-Par) NSCLC cell lines by 5-day acid phosphatase assay. IC50 values were calculated using CalcuSyn software. To assess the synergy between neratinib and dasatinib, and neratinib and crizotinib, matrix assays were performed and analyzed using Combenefit software. To further assess the efficacy of the TKIs, changes in signaling pathways were assessed by Western blotting, and apoptosis induction and cell migration were measured with the Incucyte\\u00ae S3 imaging system.\\n Results: Neratinib, crizotinib, and dasatinib displayed nanomolar IC50 values in both cell lines. As expected, EML4-ALK+ cells were more sensitive to crizotinib than A549-Par cells (IC50 = 595 nM vs 1 \\u00b5M, p \\u2264 0.05). EML4-ALK expression led to numerical increases in neratinib IC50 value (326.37 \\u00b1 44.34 nM in EML4-ALK+ vs 247 \\u00b1 32.65 nM in A549-Par) and dasatinib IC50 value (39.95 \\u00b1 5.67 nM in EML4-ALK+ vs 27.75 \\u00b1 18.53 nM in A549-Par) but these changes were not statistically significant. Matrix assays showed that neratinib-crizotinib (NC) was more effective than crizotinib alone in both cell lines, with more potent sensitivity in EML4-ALK+ cells. The neratinib-dasatinib (ND) combination was synergistic in the A549-Par cell line but only additive in the EML4-ALK+ cell line, suggesting a reduced sensitivity to the ND combination. EML4-ALK+ cells had sustained pERK1/2 levels after treatment with all TKIs, except NC, compared to A549-Par cells. Neratinib alone was significantly less effective at inhibiting pAkt (99.2 \\u00b1 5.3 % in EML4-ALK+ vs 64.9 \\u00b1 19.0 %, p \\u2264 0.05) and pERK1/2 (91.3 \\u00b1 4.6 % in EML4-ALK+ vs 54.9 \\u00b1 15.9 %, p \\u2264 0.01) in EML4-ALK+ cells than in A549-Par cells at 24h. In A549-Par cells, ND caused the highest apoptotic induction, followed by NC. Apoptosis levels induced by ND in EML4-ALK+ cells were 4-fold lower at 72hr than in A549-Par cells (p \\u2264 0.0001). Dasatinib and ND were more effective than crizotinib or NC at preventing cell migration in both cell lines.\\n Conclusion: EML4-ALK potentially decreases sensitivity to the neratinib-dasatinib combination. This warrants further investigation in other EML4-ALK+ models.\\n Citation Format: Myra E. Castel, Neil T. Conlon, Lisa D. Eli, Alvin Wong, John Crown, Denis M. Collins. The EML4-ALK fusion protein mediates reduced sensitivity to the combination of neratinib and dasatinib. [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 4041.\"}, {\"paperId\": \"02cb5376d0ec8cff11d9ca61d6cb2130563c3b4c\", \"externalIds\": {\"PubMedCentral\": \"9241307\", \"DOI\": \"10.1186/s13287-022-02964-3\", \"CorpusId\": 250094896, \"PubMed\": \"35765105\"}, \"title\": \"KCNQ1-deficient and KCNQ1-mutant human embryonic stem cell-derived cardiomyocytes for modeling QT prolongation\", \"venue\": \"Stem cell research & therapeutics\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://stemcellres.biomedcentral.com/counter/pdf/10.1186/s13287-022-02964-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9241307, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2046101571\", \"name\": \"Yuanxiu Song\"}, {\"authorId\": \"122835565\", \"name\": \"Tianwei Guo\"}, {\"authorId\": \"48751982\", \"name\": \"Youxu Jiang\"}, {\"authorId\": \"2173991621\", \"name\": \"Min Zhu\"}, {\"authorId\": \"2141786885\", \"name\": \"Hongyue Wang\"}, {\"authorId\": \"2137478146\", \"name\": \"Wen-jing Lu\"}, {\"authorId\": \"2046171022\", \"name\": \"Mengqi Jiang\"}, {\"authorId\": \"145635545\", \"name\": \"Man Qi\"}, {\"authorId\": \"144132030\", \"name\": \"F. Lan\"}, {\"authorId\": \"8618672\", \"name\": \"Mingda Cui\"}], \"abstract\": \"The slowly activated delayed rectifier potassium current (IKs) mediated by the KCNQ1 gene is one of the main currents involved in repolarization. KCNQ1 mutation can result in long-QT syndrome type 1 (LQT1). IKs does not participate in repolarization in mice; thus, no good model is currently available for research on the mechanism of and drug screening for LQT1. In this study, we established a KCNQ1-deficient human cardiomyocyte (CM) model and performed a series of microelectrode array (MEA) detection experiments on KCNQ1-mutant CMs constructed in other studies to explore the pathogenic mechanism of KCNQ1 deletion and mutation and perform drug screening. KCNQ1 was knocked out in human embryonic stem cell (hESC) H9 line using the CRISPR/cas9 system. KCNQ1-deficient and KCNQ1-mutant hESCs were differentiated into CMs through a chemically defined differentiation protocol. Subsequently, high-throughput MEA analysis and drug intervention were performed to determine the electrophysiological characteristics of KCNQ1-deficient and KCNQ1-mutant CMs. During high-throughput MEA analysis, the electric field potential and action potential durations in KCNQ1-deficient CMs were significantly longer than those in wild-type CMs. KCNQ1-deficient CMs also showed an irregular rhythm. Furthermore, KCNQ1-deficient and KCNQ1-mutant CMs showed different responses to different drug treatments, which reflected the differences in their pathogenic mechanisms. We established a human CM model with KCNQ1 deficiency showing a prolonged QT interval and an irregular heart rhythm. Further, we used various drugs to treat KCNQ1-deficient and KCNQ1-mutant CMs, and the three models showed different responses to these drugs. These models can be used as important tools for studying the different pathogenic mechanisms of KCNQ1 mutation and the relationship between the genotype and phenotype of KCNQ1, thereby facilitating drug development.\"}, {\"paperId\": \"02cb6e4a1a5541700ab4f558a606da5e328065d5\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-1585-0_8\", \"CorpusId\": 240342829, \"PubMed\": \"34718995\"}, \"title\": \"Computational Approaches for Designing Highly Specific and Efficient sgRNAs.\", \"venue\": \"Methods in molecular biology\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-1585-0_8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-1585-0_8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2000421\", \"name\": \"J. Dhanjal\"}, {\"authorId\": \"1571791432\", \"name\": \"D. Vora\"}, {\"authorId\": \"22470296\", \"name\": \"Navaneethan Radhakrishnan\"}, {\"authorId\": \"145063855\", \"name\": \"D. Sundar\"}], \"abstract\": null}, {\"paperId\": \"02cc84b51612577d8086cc65682cc33cf2ff2833\", \"externalIds\": {\"PubMedCentral\": \"7943453\", \"DOI\": \"10.3389/fpls.2021.630396\", \"CorpusId\": 232022244, \"PubMed\": \"33719302\"}, \"title\": \"Global Regulation of Genetically Modified Crops Amid the Gene Edited Crop Boom \\u2013 A Review\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 312, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2021.630396/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7943453, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2051454407\", \"name\": \"C. Turnbull\"}, {\"authorId\": \"5439778\", \"name\": \"M. Lillemo\"}, {\"authorId\": \"1411342666\", \"name\": \"Trine Hvoslef-Eide\"}], \"abstract\": \"Products derived from agricultural biotechnology is fast becoming one of the biggest agricultural trade commodities globally, clothing us, feeding our livestock, and fueling our eco-friendly cars. This exponential growth occurs despite asynchronous regulatory schemes around the world, ranging from moratoriums and prohibitions on genetically modified (GM) organisms, to regulations that treat both conventional and biotech novel plant products under the same regulatory framework. Given the enormous surface area being cultivated, there is no longer a question of acceptance or outright need for biotech crop varieties. Recent recognition of the researchers for the development of a genome editing technique using CRISPR/Cas9 by the Nobel Prize committee is another step closer to developing and cultivating new varieties of agricultural crops. By employing precise, efficient, yet affordable genome editing techniques, new genome edited crops are entering country regulatory schemes for commercialization. Countries which currently dominate in cultivating and exporting GM crops are quickly recognizing different types of gene-edited products by comparing the products to conventionally bred varieties. This nuanced legislative development, first implemented in Argentina, and soon followed by many, shows considerable shifts in the landscape of agricultural biotechnology products. The evolution of the law on gene edited crops demonstrates that the law is not static and must adjust to the mores of society, informed by the experiences of 25 years of cultivation and regulation of GM crops. The crux of this review is a consolidation of the global legislative landscape on GM crops, as it stands, building on earlier works by specifically addressing how gene edited crops will fit into the existing frameworks. This work is the first of its kind to synthesize the applicable regulatory documents across the globe, with a focus on GM crop cultivation, and provides links to original legislation on GM and gene edited crops.\"}, {\"paperId\": \"02cca405dfc84e2759ae8b37cc58539065240bc2\", \"externalIds\": {\"DOI\": \"10.22541/au.164311932.28885305/v1\", \"CorpusId\": 246356182}, \"title\": \"Construction of recombinant ORFV-TRAP using CRISPR/Cas9 technology\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.authorea.com/doi/pdf/10.22541/au.164311932.28885305\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.22541/au.164311932.28885305/v1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.22541/au.164311932.28885305/v1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5614072\", \"name\": \"Yongzhong Yu\"}, {\"authorId\": \"2153304898\", \"name\": \"Fan Zhang\"}, {\"authorId\": \"100944363\", \"name\": \"Xuyang Duan\"}, {\"authorId\": \"2109436\", \"name\": \"Chao-shun Yang\"}, {\"authorId\": \"46586763\", \"name\": \"Z. Lian\"}, {\"authorId\": \"5177648\", \"name\": \"Yudong Cui\"}], \"abstract\": \"Orf is an acute and highly contracted human and animal infection caused\\nby orf virus (ORFV), which mainly affects sheep and goats, especially\\nyoung animals, who have close contact with sick animals. Clinically, in\\nsecondary infection cases of orf, opportunistic or conditional pathogens\\nsuch as Staphylococcus aureus (S. aureus) are often detected. The S.\\naureus TRAP gene product is reportedly protective against bacterial\\ninfection. For joint control of ORFV and S. aureus, the research\\ndirection of delivering a TRAP gene vaccine against S. aureus infection\\nusing the ORFV live vector is proposed. Here, we used CRISPR/Cas9\\ntechnology to edit vascular endothelial growth factor E of ORFV (VEGF-V)\\nand introduced the TRAP gene of S. aureus into the terminus of the ORFV\\ngenome to promote TRAP expression in infected keratinocytes. The\\nconstruction and experimental verification of recombinant ORFV\\n(ORFV-V/TRAP) will provide a reference for in-depth studies on the\\nprevention and control of orf and S. aureus disease.\"}, {\"paperId\": \"02cce54f70363f30680c528443ee68598457fa2e\", \"externalIds\": {\"PubMedCentral\": \"9375321\", \"DOI\": \"10.1186/s13068-022-02182-2\", \"CorpusId\": 251519250, \"PubMed\": \"35962411\"}, \"title\": \"Lysophosphatidic acid acyltransferase 2 and 5 commonly, but differently, promote seed oil accumulation in Brassica napus\", \"venue\": \"Biotechnology for Biofuels and Bioproducts\", \"year\": 2022, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://biotechnologyforbiofuels.biomedcentral.com/counter/pdf/10.1186/s13068-022-02182-2\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9375321, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153281167\", \"name\": \"Kai Zhang\"}, {\"authorId\": \"118498819\", \"name\": \"Jianjie He\"}, {\"authorId\": \"5573318\", \"name\": \"Yongtai Yin\"}, {\"authorId\": \"50053899\", \"name\": \"Kang Chen\"}, {\"authorId\": \"2390177233\", \"name\": \"X. Deng\"}, {\"authorId\": \"2114104691\", \"name\": \"Peng Yu\"}, {\"authorId\": \"79482893\", \"name\": \"Huaixin Li\"}, {\"authorId\": \"47748757\", \"name\": \"Weiguo Zhao\"}, {\"authorId\": \"2153731044\", \"name\": \"Shuxiang Yan\"}, {\"authorId\": \"6652084\", \"name\": \"Maoteng Li\"}], \"abstract\": \"Background Increasing seed oil content (SOC) of Brassica napus has become one of the main plant breeding goals over the past decades. Lysophosphatidic acid acyltransferase (LPAT) performs an important molecular function by regulating the production of phosphatidic acid (PA), a key intermediate in the synthesis of membrane and storage lipids. However, the mechanism underlying the effect of LPAT on the SOC of B. napus remains unclear. Results In the present study, significant elevation of SOC was achieved by overexpressing BnLPAT2 and BnLPAT5 in B. napus . RNAi and CRISPR\\u2013Cas9 were also successfully used to knock down and knock out these two genes in B. napus where SOC significantly decreased. Meanwhile, we found an accumulation of lipid droplets and oil bodies in seeds of BnLPAT2 and BnLPAT5 overexpression lines, whereas an increase of sugar and protein in Bnlpat2 and Bnlpat5 mutant seeds. Sequential transcriptome analysis was further performed on the developing seeds of the BnLPAT2 and BnLPAT5 overexpression, knockdown, and knockout rapeseed lines. Most differentially expressed genes (DEGs) that were expressed in the middle and late stages of seed development were enriched in photosynthesis and lipid metabolism, respectively. The DEGs involved in fatty acid and lipid biosynthesis were active in the overexpression lines but were relatively inactive in the knockdown and knockout lines. Further analysis revealed that the biological pathways related to fatty acid/lipid anabolism and carbohydrate metabolism were specifically enriched in the BnLPAT2 overexpression lines. Conclusions BnLPAT2 and BnLPAT5 are essential for seed oil accumulation. BnLPAT2 preferentially promoted diacylglycerol synthesis to increase SOC, whereas BnLPAT5 tended to boost PA synthesis for membrane lipid generation. Taken together, BnLPAT2 and BnLPAT5 can jointly but differently promote seed oil accumulation in B. napus . This study provides new insights into the potential mechanisms governing the promotion of SOC by BnLPAT2 and BnLPAT5 in the seeds of B. napus .\"}, {\"paperId\": \"02cda38d88a719e9a2adea4b80d15eb3a13fa007\", \"externalIds\": {\"MAG\": \"3047089095\", \"DOI\": \"10.1158/1538-7445.pedca19-b49\", \"CorpusId\": 225605250}, \"title\": \"Abstract B49: Modeling a pathogenic SAMD9 mutation in human induced pluripotent stem cells\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.pedca19-b49?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.pedca19-b49, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2405470115\", \"name\": \"Jason R. Schwartz\"}, {\"authorId\": \"50267266\", \"name\": \"J. Connelly\"}, {\"authorId\": \"1403966623\", \"name\": \"S. Pruett-Miller\"}, {\"authorId\": \"4686560\", \"name\": \"J. Klco\"}], \"abstract\": \"Germline mutations in SAMD9 are the molecular determinants of some pedigrees with familial monosomy 7 and myelodysplastic syndrome (MDS) (OMIM 252270), MIRAGE syndrome (myelodysplasia, infection, restriction of growth, adrenal hypoplasia, genital phenotypes, enteropathy), and other nonsyndromic pediatric MDS. Mutations identified thus far have been associated with decreased growth of hematopoietic stem and progenitor cells (HSPCs) and bone marrow hypocellularity. Previous studies suggest that the wild-type function of SAMD9 is growth restrictive; therefore, the mutations identified in pediatric MDS have been deemed gain-of-function (GoF), given the exaggerated antiproliferative phenotype demonstrated in overexpression systems within nonhematopoietic cell lines, most commonly HEK-293T. To date, no model systems are available to study the impact of these mutations in their endogenous locus, a locus known to be induced by inflammatory stimuli, namely interferon (IFN). Here we report our development, using CRISPR/Cas9 genomic engineering, of two separate isogenic human induced pluripotent stem cell (iPSC) lines, derived from a non-neoplastic iPSC line (BJFF.6), containing a known pathogenic SAMD9 mutation (c.3406G>C; p.E1136Q), which we previously identified in a family with monosomy 7 and MDS. From this mutated iPSC line we are able to successfully differentiate hematopoietic precursors and myeloid cells that contain a pathogenic SAMD9 mutation. Using our novel pediatric MDS model system, we demonstrate that in the presence of IFN, viability of HSPCs (CD34+) and differentiated myeloid cells (CD13+) is significantly decreased when the SAMD9 p.E1136Q mutation is present (CD34+; WT=16.7% vs Mut=11.5% (p=0.05), CD13+; WT=22.6% vs. Mut=3.5% (p Citation Format: Jason R. Schwartz, Jon P. Connelly, Shondra M. Pruett-Miller, Jeffery M. Klco. Modeling a pathogenic SAMD9 mutation in human induced pluripotent stem cells [abstract]. In: Proceedings of the AACR Special Conference on the Advances in Pediatric Cancer Research; 2019 Sep 17-20; Montreal, QC, Canada. Philadelphia (PA): AACR; Cancer Res 2020;80(14 Suppl):Abstract nr B49.\"}, {\"paperId\": \"02ce2467168744b8f31b89cf9c4083953bf5f4f7\", \"externalIds\": {\"DOI\": \"10.1016/j.ibmb.2021.103701\", \"CorpusId\": 245108027, \"PubMed\": \"34890799\"}, \"title\": \"CYP4G8 is responsible for the synthesis of methyl-branched hydrocarbons in the polyphagous caterpillar of Helicoverpa armigera.\", \"venue\": \"Insect Biochemistry and Molecular Biology\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ibmb.2021.103701?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ibmb.2021.103701, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4066534\", \"name\": \"Yucui Xin\"}, {\"authorId\": \"2118768536\", \"name\": \"Nan Chen\"}, {\"authorId\": \"2154576228\", \"name\": \"Yawei Wang\"}, {\"authorId\": \"35535809\", \"name\": \"Ruoyao Ni\"}, {\"authorId\": \"2658957\", \"name\": \"Hongrui Zhao\"}, {\"authorId\": \"2596543\", \"name\": \"Peiqi Yang\"}, {\"authorId\": \"50651626\", \"name\": \"Mei Li\"}, {\"authorId\": \"145035937\", \"name\": \"X. Qiu\"}], \"abstract\": \"Insect cuticular hydrocarbons (CHCs) have dual functions as physical barrier and chemical signals. The last step of CHC biosynthesis is known to be catalyzed by cytochrome P450 CYP4G in a number of insects. Until recently, studies on CYP4Gs in the context of functional evolution are rare. In this study, we analyzed sequence similarity and temporal-spatial expression patterns of the five CYP4G genes in the cotton bollworm Helicoverpa armigera, an important agricultural pest and also typical representative of lepidopteran insects. Moreover, the CRISPR/Cas9-induced knockout was used to clarify the roles of the five CYP4Gs in CHC biosynthesis. Temporal-spatial expression patterns revealed that CYP4G8 was highly expressed at all developmental stages and in most tissues examined. Larvae with CYP4G8 knocked out could not produce methyl-branched CHCs and failed to pupate, while larvae with the other four CYP4G genes knocked out (4G1-type-KO) showed no significant changes in their CHC profiles, weight gain and survival. Comparative transcriptomics revealed that knocking out CYP4G8 affected the global gene expression in larvae, especially down-regulated the expression of genes in the fatty acid biosynthetic pathway, while no significant change in 4G1-type-KO transcriptome was observed. These findings indicate that the five members of the CYP4G subfamily have undergone functional divergence: CYP4G8 maintains the essential function in CHC biosynthesis, while the function of the other four CYP4G genes remains unclear. Intriguingly, CYP4G8 has evolved to be a P450 enzyme responsible for the synthesis of larval methyl-branched hydrocarbons. The observation that CYP4G8 knockout is lethal strongly suggest that CYP4G8 may serve as a candidate target for the development of insecticidal agents for the control of cotton bollworms.\"}, {\"paperId\": \"02cf6223b54e12d2642198ad94002071fb1ca93c\", \"externalIds\": {\"DOI\": \"10.1158/1541-7786.MCR-21-0161\", \"CorpusId\": 238411156, \"PubMed\": \"34610960\"}, \"title\": \"DCLK1-Short Splice Variant Promotes Esophageal Squamous Cell Carcinoma Progression via the MAPK/ERK/MMP2 Pathway\", \"venue\": \"Molecular Cancer Research\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://aacrjournals.org/mcr/article-pdf/19/12/1980/3016514/1980.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1541-7786.MCR-21-0161?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1541-7786.MCR-21-0161, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49982506\", \"name\": \"Y. Ge\"}, {\"authorId\": \"2117799518\", \"name\": \"Xiaona Fan\"}, {\"authorId\": \"145712458\", \"name\": \"Xuying Huang\"}, {\"authorId\": \"5148323\", \"name\": \"N. Weygant\"}, {\"authorId\": \"2148325675\", \"name\": \"Zeru Xiao\"}, {\"authorId\": \"2055863722\", \"name\": \"R. Yan\"}, {\"authorId\": \"150124667\", \"name\": \"Heshu Liu\"}, {\"authorId\": \"2150167662\", \"name\": \"Jian Liu\"}, {\"authorId\": \"144525519\", \"name\": \"G. An\"}, {\"authorId\": \"4925762\", \"name\": \"Jiannan Yao\"}], \"abstract\": \"Cancer stem cell (CSC) marker doublecortin-like kinase 1 (DCLK1) contributes greatly to the malignancy of gastrointestinal cancers, and DCLK1-targeted agents have potential therapeutic value. However, the molecular pathways regulated by DCLK1-S (DCLK1 isoform 4), a shortened splice variant of DCLK1, still remain obscure. Here we found that the expression of DCLK1-S is significantly increased in human esophageal squamous cell carcinoma (ESCC) tissues and associated with malignant progression and poor prognosis. Functional studies indicated that silencing total of DCLK1 mediated by CRISPR/Cas9 inhibited ESCC cell proliferation, migration, and invasion. Conversely, these changes were largely reversed after DCLK1-S rescue or overexpression. More importantly, DCLK1-S significantly enhanced primary tumor formation and metastatic lung colonization in vivo. The Cancer Genome Atlas database and molecular analysis showed that DCLK1-S was closely related to the epithelial\\u2013mesenchymal transition (EMT) process in patients with ESCC. Further RNA sequencing and Kyoto Encyclopedia of Genes and Genomes analysis demonstrated that MAPK signaling pathway was significantly enriched. Our in vitro study proclaimed that DCLK1-S induced MMP2 expression in ESCC cells via MAPK/ERK signaling, leading to the activation of EMT. In addition, administration of ERK1/2 blocker SCH772984 attenuated the proliferative and migratory phenotype induced by DCLK1-S. In conclusion, these findings suggest that DCLK1-S may be a key molecule in MAPK/ERK/MMP2 pathway\\u2013mediated progression of ESCC, and that it has potential as a biomarker or therapeutic target to improve outcomes in patients with ESCC. Implications : DCLK1-S induces ESCC progression by activating the MAPK/ERK/MMP2 axis and may serve as a prognostic biomarker or therapeutic target for patients with ESCC.\"}, {\"paperId\": \"02d01a3223246d021c3a8b00705d7e24143ba23c\", \"externalIds\": {\"DOI\": \"10.1051/shsconf/202315802004\", \"CorpusId\": 256862958}, \"title\": \"Case Study of Co-morbidities --- HIV/AIDS and Blood Cancer\", \"venue\": \"SHS Web of Conferences\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.shs-conferences.org/articles/shsconf/pdf/2023/07/shsconf_icpahd2023_02004.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1051/shsconf/202315802004?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1051/shsconf/202315802004, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2057229909\", \"name\": \"F. Gong\"}], \"abstract\": \"HIV/AIDS is considered an uncurable disease today, and patients have to take medicine uninterrupted for their whole life to control the viral load. However, there have been five special cases possibly cured --- the Berlin patient (HIV-1 and AML), the London patient (HIV-1 and Hodgkin\\u2019s Lymphoma), the D\\u00fcsseldorf patient (HIV-1 and AML), the New York patient (HIV-1 and high-risk AML monosomy 7), and the City of Hope patient (HIV-1 and AML). They were infected with HIV and blood cancer concurrently and received allogeneic hematopoietic stem cell transplant (allo-HSCT). By comparing the D\\u00fcsseldorf patient and the New York patient who are in relatively similar conditions, umbilical cord blood (UCB) is very likely to be the better source for transplant based on the severity of graft versus host disease (GvHD) after transplant. A possible future treatment which is to combine the haematopoietic stem cell transplant (HSCT) and gene therapy with the help of CRISPR-Cas9, is suggested.\"}, {\"paperId\": \"02d0596e384a68697d8aa6894144eb783347f07b\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-1465\", \"CorpusId\": 257966150}, \"title\": \"Abstract 1465: A SNAI2/CDKN1A pathway protects rhabdomyosarcoma tumors from radiation\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-1465?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-1465, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2164258556\", \"name\": \"Paulomi S. Modi\"}, {\"authorId\": \"2111541803\", \"name\": \"Long Wang\"}, {\"authorId\": \"46283438\", \"name\": \"Prethish Sreenivas\"}, {\"authorId\": \"5127970\", \"name\": \"Myron S. Ignatius\"}], \"abstract\": \"\\n Rhabdomyosarcoma (RMS) is tumor of the muscle and is the most common soft tissue cancer in children and teens, with approximately 400 to 500 new cases every year in the United States. There are two main subtypes of rhabdomyosarcoma: 1) Alveolar rhabdomyosarcoma (fusion-positive RMS FP-RMS), is classified primarily by the presence of the fusion between PAX3/PAX7 and FOXO1 proteins. 2) Embryonal rhabdomyosarcoma (fusion-negative FN-RMS) is the more common subtype. The survival rate for patients with RMS is 70%, but at relapse it is less than 30%. The standard of care for this disease includes radiation, chemotherapy and surgery. To better understand how RMS tumors survive therapy, we sought to define the role of SNAI2 in the response to radiation treatment. We identified SNAI2 as a critical oncogene that protects RMS tumors from radiation induced apoptosis by repressing pro-apoptotic BIM expression (Cancer Research 2021). SNAI2 additionally prevents FN-RMS tumors and cells from undergoing myogenic differentiation (Nature Comm. 2021). We also showed that MEK maintained SNAI2 post translationally in RAS mutant FN-RMS tumors and combining MEK inhibitor with radiation led to complete tumor regression and delayed event free survival in xenograft and PDX models. However, rare tumor cells grow back after a 2-4 weeks delay (Molecular Cancer Therapeutics, 2022). Hence, we hypothesized that there are additional genes or pathways in cells lacking SNAI2 that are co-opted to drive relapse disease. We have identified that CDKN1A or p21 expression is robustly increased in SNAI2 null cells. CDKN1A is thought to be a tumor suppressor in RMS and other cancers. However, our preliminary data indicate that CDKN1A is an oncogene and in RMS patients, high expression in tumors is associated with poor outcome. We found that p21 expression in combination with SNAI2 can predict resistance to radiation across RMS cell lines. We next developed control RD, Rh30 and Rh18 cells either CDKN1A or both CDKN1A and SNAI2 ablated using CRISPR/Cas9 reagents with control cells expressing control gRNAs. Ablation of CDKN1A while not effecting proliferation led to a significant increase in apoptosis post-radiation and this effect was increased in SNAI2/CDKN1A double knockout cells. Further, in colony forming assays we find that double ablated cells form significantly fewer colonies than control and single knockout cells. Rather unexpectedly, loss of CDKN1A, SNAI2, or CDKN1A/SNAI2 led to a G2/M cell cycle block, indicating that the cell cycle effects of p21 might not be responsible for the phenotypes observed. Ongoing xenograft experiments will determine if the effect we observe in vitro will also translate in vivo. Additionally, we are performing experiments to test how SNAI2 modulates CDKN1A expression. In summary, our study identifies CDKN1A as an oncogene that protects SNAI2 deficient cells from ionizing radiation, thus enabling the survival or rare relapse driving tumor cells.\\n Citation Format: Paulomi S. Modi, Long Wang, Prethish Sreenivas, Myron Ignatius. A SNAI2/CDKN1A pathway protects rhabdomyosarcoma tumors from radiation [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 1465.\"}, {\"paperId\": \"02d59c4646d211047f10f56c64281578f5f28033\", \"externalIds\": {\"DOI\": \"10.70389/pjpb.100004\", \"CorpusId\": 275408446}, \"title\": \"Crop Improvement Using CRISPR/Cas9 Systems: Advances and Challenges\", \"venue\": \"Premier Journal of Plant Biology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.70389/pjpb.100004?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.70389/pjpb.100004, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49485385\", \"name\": \"Saumya Shah\"}], \"abstract\": \"With a rapid increase in the human population, agriculture is facing immense pressure to increase crop productivity, resilience, and sustainability under changing climatic conditions. More often than not, traditional crop improvement methods, including hybridization and selection, are often time-consuming and inconsistent processes. However, biotechnology provides a solution to address these problems through generating genetically modified organisms, which are both expensive and responsible for a well-propagated controversy. Recent advancements in genome-editing technologies, especially clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated protein 9 (Cas9), offer new and highly efficient strategies for editing crop genomes at low cost. CRISPR/Cas9 provides targeted modifications in plant genomes with minimal off-target effects, showing enhancement of traits such as crop yield, nutritional quality, and disease resistance. This review is focused on the recent advancements in CRISPR/Cas9 technology, its applications in crop improvement, and the challenges faced in its implementation.\"}, {\"paperId\": \"02d5e24b82a696a856e18bfdf286e8a6475594e4\", \"externalIds\": {\"MAG\": \"3034299090\", \"DOI\": \"10.18270/rcb.v15i1.2732\", \"CorpusId\": 225804689}, \"title\": \"Edici\\u00f3n gen\\u00f3mica heredable: un estudio exploratorio desde la perspectiva del principio bio\\u00e9tico de la beneficencia\", \"venue\": \"Revista Colombiana de Bio\\u00e9tica\", \"year\": 2020, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://revistas.unbosque.edu.co/index.php/RCB/article/download/2732/2390\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.18270/rcb.v15i1.2732?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.18270/rcb.v15i1.2732, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2006802867\", \"name\": \"Henry David Caro-Romero\"}], \"abstract\": \"Prop\\u00f3sito/Contexto. Este art\\u00edculo busca comprender el significado que tendr\\u00eda, para un grupo de personas residentes en Bogot\\u00e1, la posibilidad de realizar variaciones gen\\u00e9ticas, previas al nacimiento, en seres humanos. El estudio se centr\\u00f3 en la aplicaci\\u00f3n de la t\\u00e9cnica de alteraci\\u00f3n gen\\u00f3mica CRISPR-Cas9, desde la perspectiva del principio bio\\u00e9tico de la beneficencia, que est\\u00e1 dirigido a realizar el mayor bien posible.Metodolog\\u00eda/Enfoque. Primero, se efectu\\u00f3 una revisi\\u00f3n te\\u00f3rica de la t\\u00e9cnica CRISPR-Cas9 y del principio bio\\u00e9tico de la beneficencia. Luego, se estudiaron documentos regulatorios internacionales acerca de la edici\\u00f3n gen\\u00f3mica. Con base en esto, se aplic\\u00f3 una encuesta, apoyada por un video, para conocer la decisi\\u00f3n hipot\\u00e9tica que tomar\\u00eda un grupo de profesionales legos en temas bio\\u00e9ticos, frente a otro grupo de universitarios que recibieron formaci\\u00f3n bio\\u00e9tica. Resultados/Hallazgos. Los resultados mostraron que la modificaci\\u00f3n gen\\u00f3mica destinada a la prevenci\\u00f3n o a la terapia fue aprobada por ambos grupos, aunque con diferencias. La mejora gen\\u00f3mica fue rechazada, en general, por considerarse inmoral; en ambos grupos se abri\\u00f3 la posibilidad de admitirla, no obstante, pero solo como preparaci\\u00f3n gen\\u00f3mica para las futuras generaciones, debido a los efectos del cambio clim\\u00e1tico.Discusi\\u00f3n/Conclusiones/Contribuciones. El principio bio\\u00e9tico de la beneficencia resulta esclarecedor porque sugiere el bien, no solo individual sino com\\u00fan. Igualmente, se corrobora que existe una reserva moral frente a la edici\\u00f3n gen\\u00f3mica heredable.\"}, {\"paperId\": \"02dcb7432d2a3fb7c5c14d37af5e857790ba45e6\", \"externalIds\": {\"DOI\": \"10.1080/07388551.2022.2042481\", \"CorpusId\": 249015148, \"PubMed\": \"35606905\"}, \"title\": \"Improving environmental stress resilience in crops by genome editing: insights from extremophile plants\", \"venue\": \"Critical Reviews in Biotechnology\", \"year\": 2022, \"citationCount\": 15, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/07388551.2022.2042481?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/07388551.2022.2042481, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"31388504\", \"name\": \"M. Kouhen\"}, {\"authorId\": \"1404337635\", \"name\": \"P. Garc\\u00eda\\u2010Caparr\\u00f3s\"}, {\"authorId\": \"3901031\", \"name\": \"R. Twyman\"}, {\"authorId\": \"3614112\", \"name\": \"C. Abdelly\"}, {\"authorId\": \"11538474\", \"name\": \"H. Mahmoudi\"}, {\"authorId\": \"2852398\", \"name\": \"S. Schillberg\"}, {\"authorId\": \"5593302\", \"name\": \"A. Debez\"}], \"abstract\": \"Abstract In basic and applied sciences, genome editing has become an indispensable tool, especially the versatile and adaptable CRISPR/Cas9 system. Using CRISPR/Cas9 in plants has enabled modifications of many valuable traits, including environmental stress tolerance, an essential aspect when it comes to ensuring food security under climate change pressure. The CRISPR toolbox enables faster and more precise plant breeding by facilitating: multiplex gene editing, gene pyramiding, and de novo domestication. In this paper, we discuss the most recent advances in CRISPR/Cas9 and alternative CRISPR-based systems, along with the technical challenges that remain to be overcome. A revision of the latest proof-of-concept and functional characterization studies has indeed provided more insight into the quantitative traits affecting crop yield and stress tolerance. Additionally, we focus on the applications of CRISPR/Cas9 technology in regard to extremophile plants, due to their significance on: industrial, ecological and economic levels. These still unexplored genetic resources could provide the means to harden our crops against the threat of climate change, thus ensuring food security over the next century.\"}, {\"paperId\": \"02de4d2d69d022a3689c610d8f3c0a8f1dd9ca51\", \"externalIds\": {\"DOI\": \"10.25557/2073-7998.2021.08.48-59\", \"CorpusId\": 245073126}, \"title\": \"Genome editing technology CRISPR/Cas9 in the study of the biological effect of GC-rich cell-free DNA sequences (cfDNA) on the regulation of the transcriptional activity of TLR9 receptor-DNA sensor genes and AIM2 on the MCF7 line cells\", \"venue\": \"Nauchno-prakticheskii zhurnal \\u00abMedicinskaia genetika\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.25557/2073-7998.2021.08.48-59?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.25557/2073-7998.2021.08.48-59, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2091561736\", \"name\": \"\\u0415. \\u041c. \\u041c\\u0430\\u043b\\u0438\\u043d\\u043e\\u0432\\u0441\\u043a\\u0430\\u044f\"}, {\"authorId\": \"2099523350\", \"name\": \"\\u0415. \\u0410. \\u041a\\u043e\\u0436\\u0438\\u043d\\u0430\"}, {\"authorId\": \"2058491062\", \"name\": \"\\u0415. \\u0421. \\u0415\\u0440\\u0448\\u043e\\u0432\\u0430\"}, {\"authorId\": \"2091535684\", \"name\": \"\\u041c. \\u0421. \\u041a\\u043e\\u043d\\u044c\\u043a\\u043e\\u0432\\u0430\"}, {\"authorId\": \"2097663474\", \"name\": \"\\u0412\\u043b\\u0430\\u0434\\u0438\\u043c\\u0438\\u0440 \\u041f\\u0435\\u0442\\u0440\\u043e\\u0432\\u0438\\u0447 \\u0412\\u0435\\u0439\\u043a\\u043e\"}, {\"authorId\": \"2089469537\", \"name\": \"\\u041f. \\u0410. \\u0411\\u043e\\u0431\\u0440\\u043e\\u0432\\u0441\\u043a\\u0438\\u0439\"}, {\"authorId\": \"2089159193\", \"name\": \"\\u0412\\u0430\\u0441\\u0438\\u043b\\u0438\\u0439 \\u041d\\u0438\\u043a\\u043e\\u043b\\u0430\\u0435\\u0432\\u0438\\u0447 \\u041b\\u0430\\u0437\\u0430\\u0440\\u0435\\u0432\"}, {\"authorId\": \"2098007731\", \"name\": \"\\u0413. \\u0412. \\u0428\\u043c\\u0430\\u0440\\u0438\\u043d\\u0430\"}, {\"authorId\": \"2094728063\", \"name\": \"\\u041b. \\u0412. \\u041a\\u0430\\u043c\\u0435\\u043d\\u0435\\u0432\\u0430\"}, {\"authorId\": \"2091532639\", \"name\": \"\\u041d. \\u041d. \\u0412\\u0435\\u0439\\u043a\\u043e\"}, {\"authorId\": \"1581061019\", \"name\": \"\\u0421. \\u0412. \\u041a\\u043e\\u0441\\u0442\\u044e\\u043a\"}], \"abstract\": \"\\u0420\\u044f\\u0434 \\u0437\\u0430\\u0431\\u043e\\u043b\\u0435\\u0432\\u0430\\u043d\\u0438\\u0439, \\u0432 \\u0442\\u043e\\u043c \\u0447\\u0438\\u0441\\u043b\\u0435 \\u043e\\u043d\\u043a\\u043e\\u043b\\u043e\\u0433\\u0438\\u0447\\u0435\\u0441\\u043a\\u0438\\u0445, \\u0441\\u043e\\u043f\\u0440\\u043e\\u0432\\u043e\\u0436\\u0434\\u0430\\u0435\\u0442\\u0441\\u044f \\u043f\\u043e\\u0432\\u044b\\u0448\\u0435\\u043d\\u043d\\u044b\\u043c \\u0443\\u0440\\u043e\\u0432\\u043d\\u0435\\u043c \\u043d\\u0430\\u043a\\u043e\\u043f\\u043b\\u0435\\u043d\\u0438\\u044f \\u0413\\u0426-\\u043e\\u0431\\u043e\\u0433\\u0430\\u0449\\u0435\\u043d\\u043d\\u044b\\u0445 \\u043f\\u043e\\u0441\\u043b\\u0435\\u0434\\u043e\\u0432\\u0430\\u0442\\u0435\\u043b\\u044c\\u043d\\u043e\\u0441\\u0442\\u0435\\u0439 \\u0432 \\u043e\\u0431\\u0449\\u0435\\u043c \\u043f\\u0443\\u043b\\u0435 \\u0441\\u0432\\u043e\\u0431\\u043e\\u0434\\u043d\\u043e\\u0439 \\u0432\\u043d\\u0435\\u043a\\u043b\\u0435\\u0442\\u043e\\u0447\\u043d\\u043e\\u0439 \\u0414\\u041d\\u041a (\\u0432\\u043a\\u0414\\u041d\\u041a). \\u0412\\u043e \\u043c\\u043d\\u043e\\u0433\\u043e\\u043c \\u044d\\u0442\\u043e\\u0442 \\u0444\\u0430\\u043a\\u0442 \\u043e\\u0431\\u044a\\u044f\\u0441\\u043d\\u044f\\u0435\\u0442\\u0441\\u044f \\u043f\\u043e\\u0432\\u044b\\u0448\\u0435\\u043d\\u043d\\u043e\\u0439 \\u0443\\u0441\\u0442\\u043e\\u0439\\u0447\\u0438\\u0432\\u043e\\u0441\\u0442\\u044c\\u044e \\u044d\\u0442\\u0438\\u0445 \\u0444\\u0440\\u0430\\u0433\\u043c\\u0435\\u043d\\u0442\\u043e\\u0432 \\u0414\\u041d\\u041a \\u043a \\u0434\\u0435\\u0439\\u0441\\u0442\\u0432\\u0438\\u044e \\u043d\\u0443\\u043a\\u043b\\u0435\\u0430\\u0437 \\u043a\\u0440\\u043e\\u0432\\u0438. \\u041e\\u043d\\u0438 \\u043c\\u043e\\u0433\\u0443\\u0442 \\u0430\\u043a\\u0442\\u0438\\u0432\\u0438\\u0440\\u043e\\u0432\\u0430\\u0442\\u044c \\u0414\\u041d\\u041a-\\u0441\\u0435\\u043d\\u0441\\u043e\\u0440\\u044b \\u043d\\u0443\\u043a\\u043b\\u0435\\u0438\\u043d\\u043e\\u0432\\u044b\\u0445 \\u043a\\u0438\\u0441\\u043b\\u043e\\u0442 - TLR9 \\u0438 AIM2, \\u043a\\u043e\\u0442\\u043e\\u0440\\u044b\\u0435 \\u0438\\u0433\\u0440\\u0430\\u044e\\u0442 \\u0441\\u0443\\u0449\\u0435\\u0441\\u0442\\u0432\\u0435\\u043d\\u043d\\u0443\\u044e \\u0440\\u043e\\u043b\\u044c \\u0432 \\u0444\\u0443\\u043d\\u043a\\u0446\\u0438\\u043e\\u043d\\u0438\\u0440\\u043e\\u0432\\u0430\\u043d\\u0438\\u0438 \\u0440\\u0430\\u043a\\u043e\\u0432\\u044b\\u0445 \\u043a\\u043b\\u0435\\u0442\\u043e\\u043a. \\u0426\\u0435\\u043b\\u044c \\u0438\\u0441\\u0441\\u043b\\u0435\\u0434\\u043e\\u0432\\u0430\\u043d\\u0438\\u044f: \\u0438\\u0437\\u0443\\u0447\\u0435\\u043d\\u0438\\u0435 \\u0431\\u0438\\u043e\\u043b\\u043e\\u0433\\u0438\\u0447\\u0435\\u0441\\u043a\\u043e\\u0433\\u043e \\u043e\\u0442\\u0432\\u0435\\u0442\\u0430 \\u043a\\u043b\\u0435\\u0442\\u043e\\u043a \\u043b\\u0438\\u043d\\u0438\\u0438 MCF7 \\u043d\\u0430 \\u0434\\u0435\\u0439\\u0441\\u0442\\u0432\\u0438\\u0435 \\u0413\\u0426-\\u0431\\u043e\\u0433\\u0430\\u0442\\u044b\\u0445 \\u043f\\u043e\\u0441\\u043b\\u0435\\u0434\\u043e\\u0432\\u0430\\u0442\\u0435\\u043b\\u044c\\u043d\\u043e\\u0441\\u0442\\u0435\\u0439 \\u0432\\u043a\\u0414\\u041d\\u041a \\u0438 \\u0432\\u044b\\u044f\\u0432\\u043b\\u0435\\u043d\\u0438\\u0435 \\u0441 \\u043f\\u043e\\u043c\\u043e\\u0449\\u044c\\u044e \\u043d\\u043e\\u043a\\u0430\\u0443\\u0442\\u0430 \\u0433\\u0435\\u043d\\u043e\\u0432 AIM2 \\u0438 TLR9 \\u0444\\u0443\\u043d\\u043a\\u0446\\u0438\\u043e\\u043d\\u0430\\u043b\\u044c\\u043d\\u043e\\u0439 \\u0440\\u043e\\u043b\\u0438 \\u0414\\u041d\\u041a-\\u0441\\u0432\\u044f\\u0437\\u044b\\u0432\\u0430\\u044e\\u0449\\u0438\\u0445 \\u0440\\u0435\\u0446\\u0435\\u043f\\u0442\\u043e\\u0440\\u043e\\u0432 \\u0432 \\u0440\\u0430\\u0437\\u0432\\u0438\\u0442\\u0438\\u0438 \\u043a\\u043b\\u0435\\u0442\\u043e\\u0447\\u043d\\u043e\\u0433\\u043e \\u0430\\u0434\\u0430\\u043f\\u0442\\u0438\\u0432\\u043d\\u043e\\u0433\\u043e \\u043e\\u0442\\u0432\\u0435\\u0442\\u0430. \\u042d\\u043a\\u0441\\u043f\\u0435\\u0440\\u0438\\u043c\\u0435\\u043d\\u0442\\u0430\\u043b\\u044c\\u043d\\u043e \\u0443\\u0441\\u0442\\u0430\\u043d\\u043e\\u0432\\u043b\\u0435\\u043d\\u043e, \\u0447\\u0442\\u043e \\u043a\\u043b\\u0435\\u0442\\u043a\\u0438 \\u043a\\u0443\\u043b\\u044c\\u0442\\u0443\\u0440\\u044b MCF7 \\u0441 \\u00ab\\u0432\\u044b\\u043a\\u043b\\u044e\\u0447\\u0435\\u043d\\u043d\\u044b\\u043c\\u0438\\u00bb \\u0440\\u0435\\u0446\\u0435\\u043f\\u0442\\u043e\\u0440\\u0430\\u043c\\u0438 TLR9 \\u0438 AIM2 \\u043e\\u0442\\u0432\\u0435\\u0447\\u0430\\u044e\\u0442 \\u043d\\u0430 \\u0441\\u0442\\u0438\\u043c\\u0443\\u043b\\u044f\\u0446\\u0438\\u044e \\u0444\\u0440\\u0430\\u0433\\u043c\\u0435\\u043d\\u0442\\u0430\\u043c\\u0438 \\u0413\\u0426-\\u0431\\u043e\\u0433\\u0430\\u0442\\u044b\\u0445 \\u043f\\u043e\\u0441\\u043b\\u0435\\u0434\\u043e\\u0432\\u0430\\u0442\\u0435\\u043b\\u044c\\u043d\\u043e\\u0441\\u0442\\u0435\\u0439 \\u0432\\u043a\\u0414\\u041d\\u041a \\u0441\\u043d\\u0438\\u0436\\u0435\\u043d\\u0438\\u0435\\u043c \\u0442\\u0440\\u0430\\u043d\\u0441\\u043a\\u0440\\u0438\\u043f\\u0446\\u0438\\u043e\\u043d\\u043d\\u043e\\u0439 \\u0430\\u043a\\u0442\\u0438\\u0432\\u043d\\u043e\\u0441\\u0442\\u0438 \\u0433\\u0435\\u043d\\u043e\\u0432 \\u0441\\u0438\\u0433\\u043d\\u0430\\u043b\\u044c\\u043d\\u044b\\u0445 \\u043a\\u0430\\u0441\\u043a\\u0430\\u0434\\u043e\\u0432 TLR9/MYD88/NF-kB-\\u0441\\u0438\\u0433\\u043d\\u0430\\u043b\\u044c\\u043d\\u043e\\u0433\\u043e \\u043f\\u0443\\u0442\\u0438 \\u0438 \\u0441\\u0432\\u044f\\u0437\\u0430\\u043d\\u043d\\u044b\\u0445 \\u0441 \\u043d\\u0438\\u043c STAT 3/6-\\u0441\\u0438\\u0433\\u043d\\u0430\\u043b\\u044c\\u043d\\u044b\\u0445 \\u043f\\u0443\\u0442\\u0435\\u0439, \\u043f\\u043e\\u0432\\u044b\\u0448\\u0430\\u044e\\u0449\\u0438\\u0445 \\u0432\\u044b\\u0436\\u0438\\u0432\\u0430\\u0435\\u043c\\u043e\\u0441\\u0442\\u044c \\u0440\\u0430\\u043a\\u043e\\u0432\\u044b\\u0445 \\u043a\\u043b\\u0435\\u0442\\u043e\\u043a. \\u042d\\u0442\\u043e \\u043f\\u043e\\u043a\\u0430\\u0437\\u044b\\u0432\\u0430\\u0435\\u0442 \\u043d\\u0435\\u043e\\u0431\\u0445\\u043e\\u0434\\u0438\\u043c\\u043e\\u0441\\u0442\\u044c \\u0434\\u0430\\u043b\\u044c\\u043d\\u0435\\u0439\\u0448\\u0438\\u0445 \\u0438\\u0441\\u0441\\u043b\\u0435\\u0434\\u043e\\u0432\\u0430\\u043d\\u0438\\u0439 \\u0440\\u043e\\u043b\\u0438 \\u0434\\u0440\\u0443\\u0433\\u0438\\u0445 \\u0433\\u0435\\u043d\\u043e\\u0432 \\u0432 \\u0440\\u0430\\u043a\\u043e\\u0432\\u044b\\u0445 \\u043a\\u043b\\u0435\\u0442\\u043a\\u0430\\u0445 \\u0434\\u043b\\u044f \\u0434\\u0435\\u0442\\u0430\\u043b\\u0438\\u0437\\u0430\\u0446\\u0438\\u0438 \\u043c\\u0435\\u0445\\u0430\\u043d\\u0438\\u0437\\u043c\\u043e\\u0432 \\u043e\\u0442\\u043c\\u0435\\u0447\\u0435\\u043d\\u043d\\u044b\\u0445 \\u0432 \\u0434\\u0430\\u043d\\u043d\\u043e\\u0439 \\u0440\\u0430\\u0431\\u043e\\u0442\\u0435 \\u044d\\u0444\\u0444\\u0435\\u043a\\u0442\\u043e\\u0432 \\u043f\\u043e \\u0432\\u044b\\u0436\\u0438\\u0432\\u0430\\u0435\\u043c\\u043e\\u0441\\u0442\\u0438 \\u0440\\u0430\\u043a\\u043e\\u0432\\u044b\\u0445 \\u043a\\u043b\\u0435\\u0442\\u043e\\u043a.\\n A number of diseases, including cancer, are associated with accumulation of GC-enriched sequences in the general cell-free DNA (cfDNA) pool. This fact is primarily explained by these DNA fragments increased resistance to the blood nucleases which can activate DNA sensors - TLR9 and AIM2 that have a different effect on the cancer cells functioning. The aim of the present study was to study the MCF 7 cells biological response to GC-rich cfDNA sequences and using AIM2 and TLR9 knockout to identify the functional role of DNA-binding receptors in the development of cellular adaptive response. It was experimentally established that MCF7 culture cells with TLR9 and AIM2 receptors \\u201cturned off\\u201d respond to stimulation by GC-DNA fragments by reducing the transcriptional activity of the genes of the TLR9/MYD88/NF-KBsignaling pathway and associated STAT 3/6 signaling pathways that increase the survival of cancer cells. This shows the need for further studies of the role of other genes, including on the example of cell lines with TLR9 and AIM2 knockout, in terms of detailing the mechanisms of the effects noted in this work on cancer cell survival.\"}, {\"paperId\": \"02e58bf424bdb775ab261a49583e8d9d2f141caa\", \"externalIds\": {\"DOI\": \"10.1016/j.drup.2024.101171\", \"CorpusId\": 273947845, \"PubMed\": \"39531951\"}, \"title\": \"TMOD3 accelerated resistance to immunotherapy in KRAS-mutated pancreatic cancer through promoting autophagy-dependent degradation of ASCL4.\", \"venue\": \"Drug resistance updates\", \"year\": 2024, \"citationCount\": 13, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.drup.2024.101171?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.drup.2024.101171, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2242030766\", \"name\": \"Zhiwei He\"}, {\"authorId\": \"2153430219\", \"name\": \"Dijie Zheng\"}, {\"authorId\": \"2330179138\", \"name\": \"Futang Li\"}, {\"authorId\": \"2296657364\", \"name\": \"Liwen Chen\"}, {\"authorId\": \"2261749327\", \"name\": \"Changhao Wu\"}, {\"authorId\": \"2330093538\", \"name\": \"Zhirui Zeng\"}, {\"authorId\": \"2296661721\", \"name\": \"Chao Yu\"}], \"abstract\": \"The high prevalence of KRAS mutations in pancreatic cancer (PC) is widely acknowledged and results in the resistance of targeted ferroptosis therapy and immunotherapy. Herein, via a CRISPR/Cas9 library screen, the effects of ferroptosis agonists were increased in KRAS-mutant PC cells upon knockout of tropomodulin 3 (TMOD3), while these effects were not observed in KRAS-wild-type cells. Increased levels of TMOD3 were found in PC tissues, particularly in those with KRAS mutations. The increase in TMOD3 expression was facilitated by KRAS via the ETS transcription factor ELK1. Liquid chromatography-mass spectrometry (LC/MS) showed that TMOD3 increased acyl-CoA synthetase long chain family member 4 (ACSL4) protein expression and fatty acid metabolism. Mechanistically, TMOD3 promoted F-actin polymerization, thereby facilitating the fusion of autophagosomes with lysosomes, increasing the degradation of the ACSL4 protein, and augmenting the ferroptosis-inducing effects of RSL3. These effects of TMOD3 were counteracted by the administration of cytochalasin, the removal of the \\u03b12 domain of TMOD3, or the introduction of a mutation at S71. Cangrelor, an FDA-approved drug, can target TMOD3. In a mouse model, the suppression of TMOD3 using cangrelor or gene silencing technology resulted in increased infiltration of CD8+ T cells into tumor tissues with KRAS mutations and exhibited a synergistic effect with the PD-1 antibody. In conclusion, TMOD3 was found to inhibit ferroptosis and induced the resistance to PD-1 antibody by facilitating the fusion of autophagosomes and lysosomes through the promotion of F-actin polymerization in KRAS-mutant PC. TMOD3 was identified as a novel target for PC therapy.\"}, {\"paperId\": \"02e75b0766bbb048bbf4ecbc6fdcc098e2cf8b57\", \"externalIds\": {\"DOI\": \"10.21203/rs.3.rs-999842/v1\", \"CorpusId\": 240161215}, \"title\": \"Delivery of dCas9 CRISPR System Into the Hard Transfection Cells by Magnetofection Approach\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.21203/rs.3.rs-999842/v1\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21203/rs.3.rs-999842/v1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21203/rs.3.rs-999842/v1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"89432145\", \"name\": \"Mahdi Mohammadi Ghanbarlou\"}, {\"authorId\": \"11248777\", \"name\": \"Shahriyar Abdoli\"}, {\"authorId\": \"40813786\", \"name\": \"Hadi Bamehr\"}, {\"authorId\": \"2136128358\", \"name\": \"Leila Qazizadeh\"}, {\"authorId\": \"114735781\", \"name\": \"Hamed Omid\"}, {\"authorId\": \"1581553648\", \"name\": \"H. Iranpour\"}, {\"authorId\": \"47076451\", \"name\": \"H. Shahsavarani\"}, {\"authorId\": \"5503039\", \"name\": \"M. Karimipour\"}, {\"authorId\": \"145972686\", \"name\": \"M. Shokrgozar\"}], \"abstract\": \"\\n Background: The CRISPR-Cas9 system, a powerful tool, has revolutionized genome engineering in eukaryotic cells and living organisms. However, this approach poses unique concerns and limitations when used by conventional transfection methods, including limited packaging size and low delivery efficiency. Here, we aim at assessing the transfection efficiency of DNA encoding for the CRISPR-Cas9 system by PEI coated Magnetic NanoParticle (MNPs) to improve the delivery of CRISPR/Cas9 constructs into eukaryotic cells. Results: Superparamagnetic iron oxide nanoparticles (SPIONs) coated with polyethylenimine (PEI) and then complexed with pCXLE-dCas9VPH-T2A-GFP-shP53 plasmid DNA. We used HEK-293 (human embryonic kidney) and Human foreskin fibroblasts (HFF) cells to express GFP after transfection to evaluate delivery efficiency with MNPs and Lipofection methods. PEI-coated nanoparticles with magnetic iron oxide core were synthesized by co-precipitation technique resulting in an average size of ~ 20 nm in diameter. Characterization of Magnetic Nano Particle (MNPs) revealed that particles have narrow size distribution sufficient colloidal stability. The result showed that the magnetofection method with an efficiency around 85.7% for HEK-293 and 28.2% for HFF. Also, transfection efficiency by lipofection method was 83.2% and 7.89% for HEK-293 and HFF respectively. Conclusion: The magnetofection was revealed to be more efficient than classic Lipofectamine transfection as measured by GFP expression. We show that PEI-MNPs enable effective delivery and improved safety of plasmids encoding CRISPR/Cas9 into eukaryote cells.\"}, {\"paperId\": \"02ea18a54bd6c3dca57a210e947a57bf3d9ac8a6\", \"externalIds\": {\"DOI\": \"10.3410/f.738498138.793579901\", \"CorpusId\": 240642932}, \"title\": \"Faculty Opinions recommendation of Engineering designer beta cells with a CRISPR-Cas9 conjugation platform.\", \"venue\": \"Faculty Opinions \\u2013 Post-Publication Peer Review of the Biomedical Literature\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.3410/f.738498138.793579901\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3410/f.738498138.793579901?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3410/f.738498138.793579901, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79951018\", \"name\": \"Y. Suh\"}], \"abstract\": null}, {\"paperId\": \"02f1c6b7812f89c61082779769d03425e22b789e\", \"externalIds\": {\"PubMedCentral\": \"7657476\", \"MAG\": \"3089473964\", \"DOI\": \"10.1242/bio.051268\", \"CorpusId\": 222159209, \"PubMed\": \"32994186\"}, \"title\": \"An improved whole life cycle culture protocol for the hydrozoan genetic model Clytia hemisphaerica\", \"venue\": \"Biology Open\", \"year\": 2020, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bio.biologists.org/content/biolopen/9/11/bio051268.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7657476, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1471623024\", \"name\": \"Marion Lechable\"}, {\"authorId\": \"1571541269\", \"name\": \"Alexandre Jan\"}, {\"authorId\": \"1990659942\", \"name\": \"A. Duchene\"}, {\"authorId\": \"1441902877\", \"name\": \"Julie Uveira\"}, {\"authorId\": \"3863504\", \"name\": \"Brandon Weissbourd\"}, {\"authorId\": \"1573617738\", \"name\": \"Loann Gissat\"}, {\"authorId\": \"71718497\", \"name\": \"Sophie Collet\"}, {\"authorId\": \"89755173\", \"name\": \"Laurent Gilletta\"}, {\"authorId\": \"49354918\", \"name\": \"S. Chevalier\"}, {\"authorId\": \"4456763\", \"name\": \"L. Lecl\\u00e8re\"}, {\"authorId\": \"2066035180\", \"name\": \"Sophie Peron\"}, {\"authorId\": \"29869831\", \"name\": \"C. Barreau\"}, {\"authorId\": \"89700849\", \"name\": \"R. Lasbleiz\"}, {\"authorId\": \"6589900\", \"name\": \"E. Houliston\"}, {\"authorId\": \"9235501\", \"name\": \"T. Momose\"}], \"abstract\": \"ABSTRACT The jellyfish species Clytia hemisphaerica (Cnidaria, Hydrozoa) has emerged as a new experimental model animal in the last decade. Favorable characteristics include a fully transparent body suitable for microscopy, daily gamete production and a relatively short life cycle. Furthermore, whole genome sequence assembly and efficient gene editing techniques using CRISPR/Cas9 have opened new possibilities for genetic studies. The quasi-immortal vegetatively-growing polyp colony stage provides a practical means to maintain mutant strains. In the context of developing Clytia as a genetic model, we report here an improved whole life cycle culture method including an aquarium tank system designed for culture of the tiny jellyfish form. We have compared different feeding regimes using Artemia larvae as food and demonstrate that the stage-dependent feeding control is the key for rapid and reliable medusa and polyp rearing. Metamorphosis of the planula larvae into a polyp colony can be induced efficiently using a new synthetic peptide. The optimized procedures detailed here make it practical to generate genetically modified Clytia strains and to maintain their whole life cycle in the laboratory. This article has an associated First Person interview with the two first authors of the paper. Summary: We developed a reliable whole life cycle culture method for the hydrozoan jellyfish Clytia hemisphaerica, a model animal for genetics and developmental biology.\"}, {\"paperId\": \"02f26b84e9941f10445e5a884932448061eb8b57\", \"externalIds\": {\"DOI\": \"10.1101/2024.10.29.620976\", \"CorpusId\": 273878270}, \"title\": \"KOnezumi-AID: A Software to Automate the Design of Multiplex Knockouts Using Target-AID\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/11/03/2024.10.29.620976.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.10.29.620976?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.10.29.620976, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2329568362\", \"name\": \"Taito Taki\"}, {\"authorId\": \"2055245914\", \"name\": \"Kento Morimoto\"}, {\"authorId\": \"2109339\", \"name\": \"S. Mizuno\"}, {\"authorId\": \"35192934\", \"name\": \"Akihiro Kuno\"}], \"abstract\": \"With the groundbreaking advancements in genome editing technologies, particularly CRISPR-Cas9, creating knockout mutants has become highly efficient. However, the CRISPR-Cas9 system introduces DNA double-strand breaks, which can increase the risk of chromosomal rear-rangements, presenting a major obstacle when attempting to knockout multiple genes simultaneously. Base editing systems like Target-AID provide a safer alternative by enabling precise base modifications without requiring DNA double-strand breaks, making them a promising solution for addressing this challenge. Nevertheless, the absence of adequate tools to support Target-AID-based gene knockouts highlights the need for a comprehensive system to design guide RNA (gRNA) for the simultaneous knockout of multiple genes. Here, we present KOnezumi-AID, a command-line tool designed to facilitate gRNA design for Target-AID-mediated genome editing. KOnezumi-AID supports gene knockout strategies by inducing premature termination codons or promoting exon skipping. It generates experiment-ready gRNA designs for both mouse and human genomes. Additionally, KOnezumi-AID offers batch processing capabilities, enabling rapid and precise gRNA design for large-scale genome editing projects such as CRISPR screening. In summary, KOnezumi-AID provides an efficient and user-friendly tool for gRNA design, streamlining genome editing workflows and advancing gene knockout research.\"}, {\"paperId\": \"02f439bccfdea1557df2d3d38f20b6d186531890\", \"externalIds\": {\"PubMedCentral\": \"7488347\", \"MAG\": \"3084996367\", \"DOI\": \"10.1186/s13287-020-01876-4\", \"CorpusId\": 221621747, \"PubMed\": \"32912325\"}, \"title\": \"CRISPR-mediated gene modification of hematopoietic stem cells with beta-thalassemia IVS-1-110 mutation\", \"venue\": \"Stem cell research & therapeutics\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://stemcellres.biomedcentral.com/track/pdf/10.1186/s13287-020-01876-4\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7488347, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145602584\", \"name\": \"H. Gabr\"}, {\"authorId\": \"1937876020\", \"name\": \"Mona Kamal El Ghamrawy\"}, {\"authorId\": \"95521818\", \"name\": \"A. Almaeen\"}, {\"authorId\": \"14626157\", \"name\": \"A. Abdelhafiz\"}, {\"authorId\": \"1938056084\", \"name\": \"A. S. Hassan\"}, {\"authorId\": \"46823789\", \"name\": \"Maha Hamdi El Sissy\"}], \"abstract\": \"Background \\u03b2-Thalassemias represent a group of genetic disorders caused by human hemoglobin beta ( HBB ) gene mutations. The radical curative approach is to correct the mutations causing the disease. CRISPR-CAS9 is a novel gene-editing technology that can be used auspiciously for the treatment of these disorders. The study aimed to investigate the utility of CRISPR-CAS9 for gene modification of hematopoietic stem cells in \\u03b2-thalassemia with IVS-1-110 mutation. Methods and results We successfully isolated CD34 + cells from peripheral blood of \\u03b2-thalassemia patients with IVS-1-110 mutation. The cells were transfected with Cas9 endonuclease together with guide RNA to create double-strand breaks and knock out the mutation. The mutation-corrected CD34 + cells were subjected to erythroid differentiation by culturing in complete media containing erythropoietin. Conclusion CRISPR/Cas-9 is an effective tool for gene therapy that will broaden the spectrum of therapy and potentially improve the outcomes of \\u03b2-thalassemia.\"}, {\"paperId\": \"02f54790c08289538a958ace827a4c597542631b\", \"externalIds\": {\"DOI\": \"10.1186/s12284-021-00474-z\", \"CorpusId\": 255586201}, \"title\": \"RETRACTED ARTICLE: Light Harvesting-like Protein 3 Interacts with Phytoene Synthase and Is Necessary for Carotenoid and Chlorophyll Biosynthesis in Rice\", \"venue\": \"Rice\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://thericejournal.springeropen.com/counter/pdf/10.1186/s12284-021-00474-z\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s12284-021-00474-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s12284-021-00474-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108022654\", \"name\": \"Feng Yang\"}, {\"authorId\": \"1820969297\", \"name\": \"Das Debatosh\"}, {\"authorId\": \"2055314082\", \"name\": \"Tao Song\"}, {\"authorId\": \"2108239609\", \"name\": \"Jian-hua Zhang\"}], \"abstract\": \"Carotenoid biosynthesis is essential for the generation of photosynthetic pigments, phytohormone production, and flower color development. The light harvesting like 3 (LIL3) protein, which belongs to the light-harvesting complex protein family in photosystems, interacts with geranylgeranyl reductase (GGR) and protochlorophyllide oxidoreductase (POR) both of which are known to regulate terpenoid and chlorophyll biosynthesis, respectively, in both rice and Arabidopsis. In our study, a CRISPR-Cas9 generated 4-bp deletion mutant oslil3 showed aberrant chloroplast development, growth defects, low fertility rates and reduced pigment contents. A comparative transcriptomic analysis of oslil3 suggested that differentially expressed genes (DEGs) involved in photosynthesis, cell wall modification, primary and secondary metabolism are differentially regulated in the mutant. Protein-protein interaction assays indicated that LIL3 interacts with phytoene synthase (PSY) and in addition the gene expression of PSY genes are regulated by LIL3. Subcellular localization of LIL3 and PSY suggested that both are thylakoid membrane anchored proteins in the chloroplast. We suggest that LIL3 directly interacts with PSY to regulate carotenoid biosynthesis. This study reveals a new role of LIL3 in regulating pigment biosynthesis through interaction with the rate limiting enzyme PSY in carotenoid biosynthesis in rice presenting it as a putative target for genetic manipulation of pigment biosynthesis pathways in crop plants.\"}, {\"paperId\": \"02f5c3f827bf5abb64f1f7dd7512510d48a911cd\", \"externalIds\": {\"PubMedCentral\": \"8514523\", \"DOI\": \"10.1038/s41598-021-99808-6\", \"CorpusId\": 238859993, \"PubMed\": \"34645928\"}, \"title\": \"In vivo evaluation of GG2\\u2013GG1/A2 element activity in the insulin promoter region using the CRISPR\\u2013Cas9 system\", \"venue\": \"Scientific Reports\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-021-99808-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8514523, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46521079\", \"name\": \"H. Noguchi\"}, {\"authorId\": \"1403619633\", \"name\": \"Chika Miyagi-Shiohira\"}, {\"authorId\": \"36311284\", \"name\": \"Takao Kinjo\"}, {\"authorId\": \"145459842\", \"name\": \"I. Saitoh\"}, {\"authorId\": \"144202714\", \"name\": \"Masami Watanabe\"}], \"abstract\": \"The insulin promoter is regulated by ubiquitous as well as pancreatic \\u03b2-cell-specific transcription factors. In the insulin promoter, GG2\\u2013GG1/A2\\u2013C1 (bases\\u2009\\u2212\\u2009149 to\\u2009\\u2212\\u2009116 in the human insulin promoter) play important roles in regulating \\u03b2-cell-specific expression of the insulin gene. However, these events were identified through in vitro studies, and we are unaware of comparable in vivo studies. In this study, we evaluated the activity of GG2\\u2013GG1/A2 elements in the insulin promoter region in vivo. We generated homozygous mice with mutations in the GG2\\u2013GG1/A2 elements in each of the Ins1 and Ins2 promoters by CRISPR\\u2013Cas9 technology. The mice with homozygous mutations in the GG2\\u2013GG1/A2 elements in both Ins1 and Ins2 were diabetic. These data suggest that the GG2\\u2013GG1/A2 element in mice is important for Ins transcription in vivo.\"}, {\"paperId\": \"02f5e59a3ffd7a1c89d61ab493ed816b18b9e290\", \"externalIds\": {\"DOI\": \"10.1002/mrd.23711\", \"CorpusId\": 264099247, \"PubMed\": \"37831754\"}, \"title\": \"Long\\u2010term culture induces Bax\\u2010dependent apoptosis in rat preimplantation embryos\", \"venue\": \"Molecular Reproduction and Development\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/mrd.23711?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/mrd.23711, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2258679744\", \"name\": \"Kazuomi Nakamura\"}, {\"authorId\": \"2142179268\", \"name\": \"Misako Seno\"}, {\"authorId\": \"48627168\", \"name\": \"Yuki Yoshimura\"}, {\"authorId\": \"2150691933\", \"name\": \"Osamu Suzuki\"}], \"abstract\": \"Although rat preimplantation embryos are necessary for producing genetically modified rats, their in vitro culture remains a challenge. Rat zygotes can develop from the one\\u2010cell stage to the blastocyst stage in vitro; however, long\\u2010term culture reduces their developmental competence via an unknown mechanism. In this study, we examined how in vitro conditions affect rat preimplantation embryos, which may explain this reduced competence. Comprehensive gene expression analysis showed that genes related to apoptosis and energy metabolism were differentially expressed in rat embryos cultured long\\u2010term in vitro compared with those developed in vivo. Furthermore, we found that the expression of Bak1 and Bax, which are responsible for mitochondrial outer membrane permeabilization, were more upregulated in embryos cultured in vitro than those developed in vivo. Similarly, apoptosis\\u2010dependent DNA fragmentation was also exacerbated in in vitro culture conditions. Finally, gene disruption using CRISPR/Cas9 showed that Bax, but not Bak1, was responsible for these effects. These findings suggest that long\\u2010term in vitro culture induces Bax\\u2010dependent apoptosis through the mitochondrial pathway and may provide clues to improve the long\\u2010term culture of rat preimplantation embryos for genetic engineering research.\"}, {\"paperId\": \"02f639d0a63b7735b42989de7a158f2fe5ba3b6e\", \"externalIds\": {\"MAG\": \"3096198681\", \"DOI\": \"10.1182/BLOOD-2020-136860\", \"CorpusId\": 228875244}, \"title\": \"CRISPR-Cas9 Knock out of CD5 Enhances the Anti-Tumor Activity of Chimeric Antigen Receptor T Cells\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 24, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2020-136860\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/BLOOD-2020-136860?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/BLOOD-2020-136860, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2050303193\", \"name\": \"Inkook Chun\"}, {\"authorId\": \"2293150724\", \"name\": \"Ki Hyun Kim\"}, {\"authorId\": \"12515480\", \"name\": \"Yi-Hao Chiang\"}, {\"authorId\": \"1597326535\", \"name\": \"Wei Xie\"}, {\"authorId\": \"47868320\", \"name\": \"Yong Gu Lee\"}, {\"authorId\": \"2050662674\", \"name\": \"R. Pajarillo\"}, {\"authorId\": \"32000176\", \"name\": \"A. Rotolo\"}, {\"authorId\": \"6531993\", \"name\": \"O. Shestova\"}, {\"authorId\": \"5358552\", \"name\": \"S. Hong\"}, {\"authorId\": \"88820891\", \"name\": \"M. Abdel-Mohsen\"}, {\"authorId\": \"4695684\", \"name\": \"M. Wysocka\"}, {\"authorId\": \"1454349956\", \"name\": \"H. Ballard\"}, {\"authorId\": \"31936169\", \"name\": \"D. Barrett\"}, {\"authorId\": \"4191206\", \"name\": \"A. Posey\"}, {\"authorId\": \"2241360559\", \"name\": \"D. Powell\"}, {\"authorId\": \"143998802\", \"name\": \"S. Gill\"}, {\"authorId\": \"40627760\", \"name\": \"S. Schuster\"}, {\"authorId\": \"4066353\", \"name\": \"S. Barta\"}, {\"authorId\": \"3283808\", \"name\": \"A. Rook\"}, {\"authorId\": \"5153116\", \"name\": \"C. June\"}, {\"authorId\": \"6344309\", \"name\": \"M. Ruella\"}], \"abstract\": \"Chimeric Antigen Receptor T cells (CART) have led to unprecedented clinical responses in relapsed or refractory (r/r) B-cell acute lymphoblastic leukemia (B-ALL), non-Hodgkin lymphomas (NHL), and multiple myeloma. However, despite these exciting results, most patients treated with CART therapy either do not respond or eventually relapse. Moreover, CART therapy has not yet been proven effective in several hematological malignancies, such as T cell lymphoma and leukemia (T-NHL/T-ALL) and acute myeloid leukemia (AML). Thus, there is a need to enhance currently available CART products and also to develop next-generation CART therapies to successfully treat additional neoplasms like T-NHL /T-ALL and AML.\\n To this goal, we studied the cysteine-rich scavenger receptor CD5, an attractive target for CART immunotherapy because of its dual role in malignant cells and normal T cells. In malignant cells, CD5 is expressed by ~90% of TCL cells, by ~15-20% of AML cells, and also by most cases of chronic lymphocytic leukemia and mantle cell lymphoma (MCL). Of note, promising results using a CD28-based anti-CD5 CART against T-NHL and T-ALL were reported at this meeting in 2019 (LaQuisa C. Hill #199). In T cells, CD5 is highly expressed and inhibits T cell receptor (TCR)-mediated activation through several mediators including SHP-1, CBL, CBL-B, and GRB2. Therefore, we hypothesized that the genetic deletion of CD5 in engineered T cells could potentially enhance their effector functions.\\n First, we designed and screened six 4-1BB-costimulated anti-CD5 lentiviral CAR constructs designed to have high, medium, and low affinity for CD5. We then selected the lead CAR5 construct (high affinity, heavy to light light chain orientation) based on its superior anti-tumor function in vivo in NOD-SCID IL2Rgnull (NSG) mice engrafted with T-cell leukemia (Jurkat). Then, to further improve CART5 activity, we optimized a CD5 short-guide RNA and deleted CD5 in CART5 cells using CRISPR-Cas9. CD5 gene deletion was reproducibly efficient (95-100% by flow cytometry and TIDE) during manufacturing (6 donors). Interestingly, the growth rate of wild type (WT) CART5 was comparable to CD5 KO CART5 and the expression of CD5 in WT CART5 was reduced. However, at the end of manufacturing, CD5 KO CART5 had increased central memory T cells (33.0% vs. 18.4%) and reduced expression of activation/exhaustion markers (PD-1 4.4% vs. 14.8%, LAG3 13.1% vs. 55.9%) compared to WT CART5, potentially indicating that CD5 KO reduces CART5-CART5 fratricide during manufacturing.\\n We then compared wild type (WT) CART5 to CD5 KO CART5 in vitro using several T-NHL/T-ALL, MCL, and AML models, including primary samples (Sezary cells, primary MCL cells, and CD5+ AML cells). Both WT and CD5 KO CART5 were highly effective in killing CD5+ malignant cells, but CD5 KO CART5 showed enhanced proliferation upon activation. In two xenograft models of T-cell leukemia (primary T-ALL and Jurkat), CD5 KO CART5 showed dramatically increased tumor control compared to WT (Fig.1A, median overall survival for WT= 62 days vs. CD5 KO=not reached, p = 0.006, Mantel-Cox). This enhanced anti-tumor effect was associated with increased expansion of CD5 KO CART5 in the peripheral blood (PB) compared to WT CART5.\\n To test the hypothesis that deletion of CD5 could increase the anti-tumor effect of CART targeting antigens other than CD5, we knocked out CD5 in anti-CD19 CART cells and tested their function in a CD19+ B-ALL xenograft model (NALM6). Remarkably, CD5 KO CART19 displayed significantly enhanced anti-leukemia activity and PB expansion compared to WT (Fig.1B,C, p<0.05, p = 0.001, Mantel-Cox).\\n Finally, we aimed to define the mechanisms by which CD5 KO enhances CART anti-tumor efficacy. We analyzed the phosphorylation of multiple targets in T cells after 15 minutes of CAR stimulation. Remarkably, CD5 KO CART5 cells had higher (>2fold) phosphorylation of several signaling proteins, including key regulators of T cell activation, migration, and survival compared to WT CART5 (Fig. 1D). To confirm that the CD5 pathway was indeed the mediator of this effect, we knocked out SHP-1 in CART19 cells using CRISPR/Cas9 and observed increased leukemia killing.\\n In conclusion, we demonstrate that CRISPR-Cas9 KO of CD5 enhances the anti-tumor activity of CAR T cells by enhancement of CAR-mediated activation and proliferation. These findings support the development of CD5 KO CART products in early-phase clinical trials.\\n \\n \\n \\n Schuster: Novartis, Genentech, Inc./ F. Hoffmann-La Roche: Research Funding; AlloGene, AstraZeneca, BeiGene, Genentech, Inc./ F. Hoffmann-La Roche, Juno/Celgene, Loxo Oncology, Nordic Nanovector, Novartis, Tessa Therapeutics: Consultancy, Honoraria. Barta:Atara: Honoraria; Monsanto: Consultancy; Seattle Genetics: Honoraria, Research Funding; Janssen: Honoraria; Pfizer: Honoraria. June:Tmunity Therapeutics: Current equity holder in private company, Membership on an entity's Board of Directors or advisory committees, Patents & Royalties, Research Funding; Ziopharm Oncology: Current equity holder in private company, Membership on an entity's Board of Directors or advisory committees; Novartis: Patents & Royalties, Research Funding; Bluesphere Bio: Membership on an entity's Board of Directors or advisory committees; Cabaletta Bio: Current equity holder in private company, Membership on an entity's Board of Directors or advisory committees; Carisma Therapeutics: Membership on an entity's Board of Directors or advisory committees; Cellares: Membership on an entity's Board of Directors or advisory committees; Celldex: Consultancy, Membership on an entity's Board of Directors or advisory committees; DeCART Therapeutics: Membership on an entity's Board of Directors or advisory committees; Immune Design: Membership on an entity's Board of Directors or advisory committees; Kiadis Pharma: Current equity holder in private company. Ruella:Abclon, BMS, NanoString: Consultancy; UPenn/Novartis: Patents & Royalties; Abclon: Consultancy, Research Funding.\\n\"}, {\"paperId\": \"02f6809d376fcb9d4a0a2af618d370a8baeb002e\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-5963\", \"CorpusId\": 268640486}, \"title\": \"Abstract 5963: VGLL1-derived peptides demonstrated anticancer effect by inhibiting VGLL1-TEAD4 interaction\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-5963?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-5963, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"37723487\", \"name\": \"Sangmi Ock\"}, {\"authorId\": \"2293270187\", \"name\": \"Changsub Lee\"}, {\"authorId\": \"2339286451\", \"name\": \"W. Jung\"}, {\"authorId\": \"2293000969\", \"name\": \"I. Whang\"}, {\"authorId\": \"2117900220\", \"name\": \"Kyung-Soo Kim\"}, {\"authorId\": \"2255600013\", \"name\": \"Jongmin Han\"}, {\"authorId\": \"2056340760\", \"name\": \"Sujin Yim\"}, {\"authorId\": \"2280467233\", \"name\": \"Bo-Kyung Kim\"}, {\"authorId\": \"48412302\", \"name\": \"Hongsub Lee\"}, {\"authorId\": \"2293129471\", \"name\": \"Kwan-Young Chang\"}, {\"authorId\": \"2280312703\", \"name\": \"Misun Won\"}], \"abstract\": \"\\n YAP/TAZ, cofactors of TEA domain-containing transcription factor TEADs (TEAD1-4), play a key role in the HIPPO pathway, which is involved in various function including embryonic development, organ size, cell proliferation, tissue regeneration, and the development and progression of several cancers. YAP/TAZ is therefore considered as master regulators of various cancers. However, we are interested in VGLL1, a cofactor of TEAD4, because it is mainly involved in the proliferation and metastasis of various cancers, including gastric, breast, pancreatic, and ovarian cancers. In gastric cancer, VGLL1 expression is regulated by the PI3K/AKT/\\u03b2-catenin pathway. VGLL1 is then phosphorylated at S84 by TGF-\\u03b2/ribosomal S6 kinase 2 (RSK2) and interacts with TEAD4 to express target genes such as MMP9, cyclin D1, IGFBP3, IGFBP5 and ITG\\u03b1V. which are involved in cancer malignancy. We designed S84-containing VGLL1-derived peptides (VGLL1S84 peptides, SCVP), which consist of 7 to 15 amino acids linked to CPP, a cell-penetration peptide. We evaluated SCVP to inhibit the VGLL1-TEAD4 interaction and their therapeutic potential as anticancer agents. SCVP suppressed the growth of gastric and breast cancer cells expressing high levels of VGLL1, EGFR, and/or HER2. In the RNA-seq analysis of NUGC3 to elucidate the molecular mechanisms of SCVP induced cell death, SCVP-treated cells showed gene expression changes in metabolic pathway, RAS signaling, PI3K-AKT signaling, Wnt signaling, TNF signaling, and mTOR signaling. However, RNA-seq analysis of breast cancer cells treated with SCVP showed changes in the expression of genes involved in cell cycle, DNA replication, DNA repair, and apoptosis. Then, we performed CRISPR/Cas9 screening using SCVP and sgRNA library to explore companion biomarkers and genetic interactors of VGLL1 for targeted cancer therapy. As a result, we identified several candidate genes, including ZNF292 and PLK1, as synthetic lethal genes of VGLL1. As expected, HCC70 cells with ZNF292 mutation showed increased sensitivity to SCVP. We also found that SCVP in combination and the PLK inhibitor volasertib resulted in a synergistic effect on the growth inhibition of breast cancer cells. In conclusion, we demonstrated VGLL1 as a novel target for anticancer drug development, and elucidated the molecular mechanism and therapeutic potential of the SCVP in gastric and breast cancers.\\n Citation Format: Sangmi Ock, Changsub Lee, Wongi Jung, Ina Whang, Kyung-Soo Kim, Jongmin Han, Sujin Yim, Bo-Kyung Kim, Hong-Sub Lee, Kwan-Young Chang, Misun Won. VGLL1-derived peptides demonstrated anticancer effect by inhibiting VGLL1-TEAD4 interaction [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 5963.\"}, {\"paperId\": \"02f78ae72f3e8b7a8720739789cb4b5a2e11f4b7\", \"externalIds\": {\"DOI\": \"10.1007/s12033-024-01155-0\", \"CorpusId\": 269314848, \"PubMed\": \"38649638\"}, \"title\": \"Detection of CRISPR/Cas9-Mediated Fetal Hemoglobin Reactivation in Erythroblasts Derived from Cord Blood-Hematopoietic Stem Cells\", \"venue\": \"Molecular Biotechnology\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12033-024-01155-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12033-024-01155-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"18152909\", \"name\": \"Nahal Maroofi\"}, {\"authorId\": \"2297908325\", \"name\": \"Masoumeh Sadat Mousavi Maleki\"}, {\"authorId\": \"2004917787\", \"name\": \"Mahsa Tahmasebi\"}, {\"authorId\": \"7929944\", \"name\": \"H. K. Khorshid\"}, {\"authorId\": \"2297945527\", \"name\": \"Younes Modaberi\"}, {\"authorId\": \"2282461824\", \"name\": \"Reza Najafipour\"}, {\"authorId\": \"4195388\", \"name\": \"M. Banan\"}], \"abstract\": null}, {\"paperId\": \"02fc7851333c23b7a983993c14c6f85fbc141488\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-1326\", \"CorpusId\": 249723419}, \"title\": \"Abstract 1326: Loss of p53 sensitizes tumor cells to immune checkpoint blockade therapy via upregulation of IL-33\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-1326?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-1326, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153593828\", \"name\": \"David Shihong Gao\"}, {\"authorId\": \"2154900225\", \"name\": \"Yang Li\"}, {\"authorId\": \"2165333058\", \"name\": \"Jason Shoush\"}, {\"authorId\": \"134680937\", \"name\": \"Runzi Sun\"}, {\"authorId\": \"49732876\", \"name\": \"B. Lu\"}], \"abstract\": \"\\n Recent studies suggest p53 contributes to poor survival in the context of immune checkpoint blockade (ICB). Mutations to p53 significantly improve the response rate to PD-1 ICB in lung cancer patients. Tumor-derived IL-33 is required for the anti-tumor immune response and efficacy of ICB. However, the relationship between p53 and IL-33 during ICB is unknown. In this study, we characterize the role of the p53/IL-33 axis in regulating the response of the tumor microenvironment to ICB. We use CRISPR-Cas9 to delete Trp53 from murine MC38 colon adenocarcinoma. Deletion of Trp53 and PD-1 ICB synergistically inhibits tumor growth. Il33 is upregulated in the Trp53-deficient and treated tumor cells, and its expression increases with time and response to treatment. Cd4+ and Cd8+ T cell infiltration increases adjacent to IL-33 expressing tumor cells, while Treg infiltration is decreased. Simultaneous deletion of Il33 in MC38 tumors reverses the efficacy PD-1 ICB. Trp53-deficient MC38 in ST2-/- (IL-33 receptor) mice also show no response to PD-1 ICB. Our findings depict a novel mechanism by which the loss of p53 in tumors treated with ICB unleashes the expression of tumoral IL-33 and induces downstream signaling. p53 mutations may be a double-edged sword for cancer, i.e. the loss of the tumor suppressor initially facilitates tumorigenesis, but eventual buildup of mutations and activation of damage pathways, such as NF-kB, leads to upregulation of danger signals in the tumor. These danger signals, such as IL-33, mediate the anti-tumor effect of ICB.\\n Citation Format: David Shihong Gao, Yang Li, Jason Shoush, Runzi Sun, Binfeng Lu. Loss of p53 sensitizes tumor cells to immune checkpoint blockade therapy via upregulation of IL-33 [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 1326.\"}, {\"paperId\": \"02fd4a523717c14eaa1d88b71d264910628edf70\", \"externalIds\": {\"PubMedCentral\": \"8038940\", \"DOI\": \"10.1016/j.jbc.2021.100497\", \"CorpusId\": 232135794, \"PubMed\": \"33675752\"}, \"title\": \"HMEJ-based safe-harbor genome editing enables efficient generation of cattle with increased resistance to tuberculosis\", \"venue\": \"Journal of Biological Chemistry\", \"year\": 2021, \"citationCount\": 34, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jbc.org/article/S0021925821002738/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8038940, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47548885\", \"name\": \"Mengke Yuan\"}, {\"authorId\": \"50561104\", \"name\": \"Jingcheng Zhang\"}, {\"authorId\": \"8853620\", \"name\": \"Yuanpeng Gao\"}, {\"authorId\": \"2107234124\", \"name\": \"Z. Yuan\"}, {\"authorId\": \"2219904620\", \"name\": \"Zhenliang Zhu\"}, {\"authorId\": \"2112456964\", \"name\": \"Y. Wei\"}, {\"authorId\": \"2112300053\", \"name\": \"Teng Wu\"}, {\"authorId\": \"116270259\", \"name\": \"Jingqiang Han\"}, {\"authorId\": \"48378843\", \"name\": \"Yong Zhang\"}], \"abstract\": \"The CRISPR/Cas9 system has been used in a wide range of applications in the production of gene-edited animals and plants. Most efforts to insert genes have relied on homology-directed repair (HDR)-mediated integration, but this strategy remains inefficient for the production of gene-edited livestock, especially monotocous species such as cattle. Although efforts have been made to improve HDR efficiency, other strategies have also been proposed to circumvent these challenges. Here we demonstrate that a homology-mediated end-joining (HMEJ)-based method can be used to create gene-edited cattle that displays precise integration of a functional gene at the ROSA26 locus. We found that the HMEJ-based method increased the knock-in efficiency of reporter genes by eightfold relative to the traditional HDR-based method in bovine fetal fibroblasts. Moreover, we identified the bovine homology of the mouse Rosa26 locus that is an accepted genomic safe harbor and produced three live-born gene-edited cattle with higher rates of pregnancy and birth, compared with previous work. These gene-edited cattle exhibited predictable expression of the functional gene natural resistance-associated macrophage protein-1 (NRAMP1), a metal ion transporter that should and, in our experiments does, increase resistance to bovine tuberculosis, one of the most detrimental zoonotic diseases. This research contributes to the establishment of a safe and efficient genome editing system and provides insights for gene-edited animal breeding.\"}, {\"paperId\": \"02fed52a724b55b9eab6962344862016839a9983\", \"externalIds\": {\"DOI\": \"10.1021/acs.jmedchem.1c00851\", \"CorpusId\": 237199508, \"PubMed\": \"34406006\"}, \"title\": \"Identification of Betulinic Acid Derivatives as Potent TGR5 Agonists with Antidiabetic Effects via Humanized TGR5H88Y Mutant Mice.\", \"venue\": \"Journal of Medicinal Chemistry\", \"year\": 2021, \"citationCount\": 23, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.jmedchem.1c00851?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.jmedchem.1c00851, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2111668834\", \"name\": \"Ying Yun\"}, {\"authorId\": \"2200059284\", \"name\": \"Chenlu Zhang\"}, {\"authorId\": \"3062043\", \"name\": \"Shimeng Guo\"}, {\"authorId\": \"2153398445\", \"name\": \"Xiaoying Liang\"}, {\"authorId\": \"2150277948\", \"name\": \"Yuan Lan\"}, {\"authorId\": \"50468602\", \"name\": \"Min Wang\"}, {\"authorId\": \"2123615655\", \"name\": \"N. Zhuo\"}, {\"authorId\": \"10331550\", \"name\": \"Jianpeng Yin\"}, {\"authorId\": \"2146397979\", \"name\": \"Hua-nan Liu\"}, {\"authorId\": \"32956740\", \"name\": \"Min Gu\"}, {\"authorId\": \"2152907439\", \"name\": \"Jing Li\"}, {\"authorId\": \"144629983\", \"name\": \"Xin Xie\"}, {\"authorId\": \"2064863198\", \"name\": \"Fajun Nan\"}], \"abstract\": \"Takeda G protein-coupled receptor 5 (TGR5) is a promising target for treating metabolic syndrome and inflammatory diseases. Herein, we identified a new series of betulinic acid derivatives as potent TGR5 agonists, which show remarkable activity on human (h) and canine (c) TGR5 but exhibit unpromising activity on murine (m) TGR5. Species difference was also observed with many other reported TGR5 agonists. Therefore, we screened 29 amino acids which were conserved in hTGR5 and cTGR5 but different in mTGR5 and found a key amino acid, H88 in mTGR5 (Y89 in hTGR5), which contributed to the species difference. With the CRISPR/Cas9 system, the mTGR5H88Y mutation was introduced into mice, and the optimized compound 11d-Na displayed a significant glucose-lowering effect and stimulated GLP-1 and insulin secretion in TGR5H88Y mice but not in wild-type animals. Taken together, our study provides a useful tool to bridge the gap of species difference and discovers a potent TGR5 agonist for further investigation.\"}, {\"paperId\": \"03001138d096a2a0842c0cc44935aa21df5d98d2\", \"externalIds\": {\"PubMedCentral\": \"10241889\", \"DOI\": \"10.1038/s41416-023-02247-5\", \"CorpusId\": 258008088, \"PubMed\": \"37024667\"}, \"title\": \"Genome-scale CRISPR screen reveals neddylation to contribute to cisplatin resistance of testicular germ cell tumours\", \"venue\": \"British Journal of Cancer\", \"year\": 2023, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41416-023-02247-5.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10241889, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2120375776\", \"name\": \"K. Funke\"}, {\"authorId\": \"3884190\", \"name\": \"Ulf Einsfelder\"}, {\"authorId\": \"2213623369\", \"name\": \"Aylin Hansen\"}, {\"authorId\": \"51019173\", \"name\": \"Lena Ar\\u00e9valo\"}, {\"authorId\": \"46416513\", \"name\": \"S. Schneider\"}, {\"authorId\": \"3870500\", \"name\": \"D. Nettersheim\"}, {\"authorId\": \"2061067292\", \"name\": \"V. Stein\"}, {\"authorId\": \"4064463\", \"name\": \"H. Schorle\"}], \"abstract\": \"Background Type II testicular germ cell tumours (TGCT) are the most prevalent tumours in young men. Patients suffering from cisplatin-resistant TGCTs are facing very poor prognosis demanding novel therapeutic options. Neddylation is a known posttranslational modification mediating many important biological processes, including tumorigenesis. Overactivation of the neddylation pathway promotes carcinogenesis and tumour progression in various entities by inducing proteasomal degradation of tumour suppressors (e.g., p21, p27). Methods We used a genome-scale CRISPR/Cas9 activation screen to identify cisplatin resistance factors. TGCT cell lines were treated with the neddylation inhibitor (MLN4924)/cisplatin/combination and investigated for changes in viability (XTT assay), apoptosis/cell cycle (flow cytometry) as well as in the transcriptome (3\\u2019mRNA sequencing). Results NAE1 overexpression was detected in cisplatin-resistant colonies from the CRISPR screen. Inhibition of neddylation using MLN4924 increased cisplatin cytotoxicity in TGCT cell lines and sensitised cisplatin-resistant cells towards cisplatin. Apoptosis, G2/M-phase cell cycle arrest, \\u03b3H2A.X/P27 accumulation and mesoderm/endoderm differentiation were observed in TGCT cells, while fibroblast cells were unaffected. Conclusions We identified overactivation of neddylation as a factor for cisplatin resistance in TGCTs and highlighted the additive effect of NAE1 inhibition by MLN4924 in combination with cisplatin as a novel treatment option for TGCTs.\"}, {\"paperId\": \"03013d2706a0472e4a382dd8da6ca79cf6808e91\", \"externalIds\": {\"MAG\": \"3090533999\", \"DOI\": \"10.1101/2020.10.01.321612\", \"CorpusId\": 222232482}, \"title\": \"Single Cell Analysis Reveals Multi-faceted miR-375 Regulation of the Intestinal Crypt\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2020.10.01.321612\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.10.01.321612?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.10.01.321612, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"39058665\", \"name\": \"M. Shanahan\"}, {\"authorId\": \"46737999\", \"name\": \"Matt Kanke\"}, {\"authorId\": \"2117775721\", \"name\": \"A. Singh\"}, {\"authorId\": \"145072130\", \"name\": \"Jonathan W. Villanueva\"}, {\"authorId\": \"5065161\", \"name\": \"Adrian J. McNairn\"}, {\"authorId\": \"51304345\", \"name\": \"O. Oyesola\"}, {\"authorId\": \"5490775\", \"name\": \"Alessandro Bonfini\"}, {\"authorId\": \"50509355\", \"name\": \"Y. Hung\"}, {\"authorId\": \"50817146\", \"name\": \"B. Sheahan\"}, {\"authorId\": \"31689228\", \"name\": \"Jordana C. Bloom\"}, {\"authorId\": \"97966628\", \"name\": \"Rebecca L Cubitt\"}, {\"authorId\": \"41129669\", \"name\": \"Ennessa G. Curry\"}, {\"authorId\": \"49624693\", \"name\": \"W. Pitman\"}, {\"authorId\": \"37216397\", \"name\": \"Vera D. Rinaldi\"}, {\"authorId\": \"4481599\", \"name\": \"C. M. Dekaney\"}, {\"authorId\": \"1973035\", \"name\": \"Shengli Ding\"}, {\"authorId\": \"145616410\", \"name\": \"B. Peck\"}, {\"authorId\": \"1924090\", \"name\": \"J. Schimenti\"}, {\"authorId\": \"3918769\", \"name\": \"L. Dow\"}, {\"authorId\": \"5686943\", \"name\": \"N. Buchon\"}, {\"authorId\": \"1403191337\", \"name\": \"Elia D. Tait-Wojno\"}, {\"authorId\": \"3200763\", \"name\": \"P. Sethupathy\"}], \"abstract\": \"The role of individual miRNAs in small intestinal (SI) epithelial homeostasis is under-explored. In this study, we discovered that miR-375 is among the most enriched miRNAs in intestinal crypts and stem cells (ISCs), especially facultative ISCs. We then showed by multiple manipulations, including CRISPR/Cas9 editing, that miR-375 is strongly suppressed by Wnt-signaling. Single-cell RNA-seq analysis of SI crypt-enriched cells from miR-375 knockout (375-KO) mice revealed elevated numbers of tuft cells and increased expression of pro-proliferative genes in ISCs. Accordingly, the genetic loss of miR-375 promoted resistance to helminth infection and enhanced the regenerative response to irradiation. The conserved effects of miR-375 were confirmed by gain-of-function studies in Drosophila midgut stem cells in vivo. Moreover, functional experiments in enteroids uncovered a regulatory relationship between miR-375 and Yap1 that controls cell survival. Finally, analysis of mouse model and clinical data revealed an inverse association between miR-375 levels and intestinal tumor development. Highlights miR-375 is one of the most enriched miRNAs in ISCs, especially facultative ISCs. miR-375 modifies tuft cell abundance and pro-proliferative gene expression in ISCs. Loss of miR-375 in mice enhances the host response to helminth infection and crypt regeneration. Mouse and human intestinal cancer are associated with reduced miR-375 expression. eTOC Blurb Sethupathy and colleagues show that miR-375 is a Wnt-responsive, ISC-enriched miRNA that serves as a break on intestinal crypt proliferation. They also show that miR-375 modulates tuft cell abundance and pro-proliferative gene expression in ISCs, that miR-375 loss enhances the host response to helminth infection as well as crypt regeneration post-irradiation, and its reduced expression is associated with intestinal cancer.\"}, {\"paperId\": \"0303ed97ee7bf39ea693c331193aba10573f59f3\", \"externalIds\": {\"DOI\": \"10.1186/s13046-021-01916-8\", \"CorpusId\": 255993529}, \"title\": \"MITF induces escape from innate immunity in melanoma\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/counter/pdf/10.1186/s13046-021-01916-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s13046-021-01916-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s13046-021-01916-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1401406685\", \"name\": \"Luis S\\u00e1nchez-Del-Campo\"}, {\"authorId\": \"2044999913\", \"name\": \"Rom\\u00e1n Mart\\u00ed-D\\u00edaz\"}, {\"authorId\": \"38833396\", \"name\": \"M. Montenegro\"}, {\"authorId\": \"1401901979\", \"name\": \"R. Gonz\\u00e1lez-Guerrero\"}, {\"authorId\": \"1401675431\", \"name\": \"T. Hern\\u00e1ndez-Caselles\"}, {\"authorId\": \"1390135673\", \"name\": \"E. Mart\\u00ednez-Barba\"}, {\"authorId\": \"1399240870\", \"name\": \"A. Pi\\u00f1ero-Madrona\"}, {\"authorId\": \"1399926379\", \"name\": \"J. Cabezas-Herrera\"}, {\"authorId\": \"2966918\", \"name\": \"C. Goding\"}, {\"authorId\": \"1393671855\", \"name\": \"J. N. Rodr\\u00edguez-L\\u00f3pez\"}], \"abstract\": \"The application of immune-based therapies has revolutionized cancer treatment. Yet how the immune system responds to phenotypically heterogeneous populations within tumors is poorly understood. In melanoma, one of the major determinants of phenotypic identity is the lineage survival oncogene MITF that integrates diverse microenvironmental cues to coordinate melanoma survival, senescence bypass, differentiation, proliferation, invasion, metabolism and DNA damage repair. Whether MITF also controls the immune response is unknown. By using several mouse melanoma models, we examine the potential role of MITF to modulate the anti-melanoma immune response. ChIP-seq data analysis, ChIP-qPCR, CRISPR-Cas9 genome editing, and luciferase reporter assays were utilized to identify ADAM10 as a direct MITF target gene. Western blotting, confocal microscopy, flow cytometry, and natural killer (NK) cytotoxicity assays were used to determine the underlying mechanisms by which MITF-driven phenotypic plasticity modulates melanoma NK cell-mediated killing. Here we show that MITF regulates expression of ADAM10, a key sheddase that cleaves the MICA/B family of ligands for NK cells. By controlling melanoma recognition by NK-cells MITF thereby controls the melanoma response to the innate immune system. Consequently, while melanoma MITFLow cells can be effectively suppressed by NK-mediated killing, MITF-expressing cells escape NK cell surveillance. Our results reveal how modulation of MITF activity can impact the anti-melanoma immune response with implications for the application of anti-melanoma immunotherapies.\"}, {\"paperId\": \"03047e8bc290d7e8b5326f4137053db3b447195d\", \"externalIds\": {\"PubMedCentral\": \"8886810\", \"DOI\": \"10.1091/mbc.E21-05-0268\", \"CorpusId\": 243988246, \"PubMed\": \"34757852\"}, \"title\": \"The RabGAPs EPI64A and EPI64B regulate the apical structure of epithelial cells \\u2020\", \"venue\": \"Molecular Biology of the Cell\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8886810\", \"status\": \"GREEN\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8886810, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46906948\", \"name\": \"Matthew R. Miller\"}, {\"authorId\": \"10697094\", \"name\": \"D. McDermitt\"}, {\"authorId\": \"50251270\", \"name\": \"C\\u00e9cile Sauvanet\"}, {\"authorId\": \"38737675\", \"name\": \"A. Lombardo\"}, {\"authorId\": \"1796294155\", \"name\": \"Riasat Zaman\"}, {\"authorId\": \"4586380\", \"name\": \"A. Bretscher\"}], \"abstract\": \"Here we report on the related TBC/RabGAPs EPI64A and EPI64B and show that they function to organize the apical aspect of epithelial cells. EPI64A binds the scaffolding protein EBP50/NHERF1, which itself binds active ezrin in epithelial cell microvilli. Epithelial cells additionally express EPI64B that also localizes to microvilli. However, EPI64B does not bind EBP50 and both proteins are shown to have a microvillar localization domain that spans the RabGAP domains. CRISPR/Cas9 was used to inactivate expression of each protein individually or both in Jeg-3 and Caco2 cells. In Jeg-3 cells, loss of EPI64B resulted in a reduction of apical microvilli, and a further reduction was seen in the double knockout, mostly likely due to misregulation of Rab8 and Rab35. In addition, apical junctions were partially disrupted in cells lacking EPI64A and accentuated in the double knockout. In Caco2 loss of EPI64B resulted in wavy junctions, whereas loss of both EPI64A and EPI64B had a severe phenotype often resulting in cells with a stellate apical morphology. In the knockout cells, the basal region of the cell remained unchanged, so EPI64A and EPI64B specifically localize to and regulate the morphology of the apical domain of polarized epithelial cells.\"}, {\"paperId\": \"03063f3b5473701e6b222f37de31c49506918a00\", \"externalIds\": {\"DOI\": \"10.1136/jitc-2021-sitc2021.905\", \"CorpusId\": 243968927}, \"title\": \"905\\u2005FASN prevents immunogenicity of irradiated glioblastoma by inhibiting ER stress\", \"venue\": \"Journal for ImmunoTherapy of Cancer\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jitc.bmj.com/content/jitc/9/Suppl_2/A950.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/jitc-2021-sitc2021.905?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/jitc-2021-sitc2021.905, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"82596593\", \"name\": \"M. D. Martino\"}, {\"authorId\": \"150946993\", \"name\": \"C. Daviaud\"}, {\"authorId\": \"1398289598\", \"name\": \"C. Vanpouille\\u2010Box\"}], \"abstract\": \"Glioblastoma (GBM) is the most aggressive and incurable adult brain tumor. Radiation therapy (RT) is an essential modality for GBM treatment and is recognized to stimulate anti-tumor immunity by inducing immunogenic cell death (ICD) subsequent to endoplasmic reticulum (ER) stress. However, RT also exacerbates potent immunosuppressive mechanisms that facilitate immune evasion. Notably, increased de novo lipid synthesis by the fatty acid synthase (FASN) is emerging as a mechanism of therapy resistance and immune escape. Here, we hypothesize that RT induces FASN to promote GBM survival and evade immune recognition by inhibiting ER stress and ICD.To determine if lipid synthesis is altered in response to RT, we first assessed FASN expression by western blot (WB) and lipid accumulation by BODIPY staining in murine (CT2A and GL261) and human (U118) GBM cell lines. Next, FASN expression was blocked in CT2A cells using CRISPR-Cas9 or an inducible shRNA directed against Fasn to evaluate ICD and ER stress markers by ELISA, WB, and electron microscopy. Finally, CT2AshFASN cells or its non-silencing control (CT2AshNS) were orthotopically implanted and FASN knockdown was induced by feeding the mice with doxycycline. The immune contexture was determined by in situ immunofluorescence (n=3/group). Remaining mice were followed for survival (n=7/group).We found that in vitro irradiation of GBM cells induces lipid accumulation in a dose-dependent fashion; an effect that is magnified over time lasting at least 6/7 days. Consistent with these findings, FASN expression was upregulated in irradiated GBM cells. Confirming the role of FASN, RT-induced accumulation of lipids was reverted when GBM cells were incubated with a FASN inhibitor. Next, we found that FASN ablation in CT2A cells induces mitochondria disruption and was sufficient to increase the expression of the ER stress makers BIP and CHOP. Along similar lines, shFASN enhances the secretion of the ICD markers HMGB1, IFN-beta and CXCL10 in irradiated CT2A cells. In vivo, CT2AshFASN tumors presented increased infiltration of CD11c+ cells and CD8+ T cells, consistent with prolonged mice survival (56 days vs. 28 days for CT2AshNS). Importantly, 43% of CT2AshFASN-bearing mice remained tumor-free for more than 70 days, while none of the CT2AshNS-bearing mice survived.Altogether, our data suggest that FASN-mediated lipid synthesis is an important mechanism to prevent ER stress, ICD, and anti-tumor immune responses in GBM. While much work remains to be done, our data propose FASN as a novel therapeutic target to overcome immunosuppression and sensitize GBM to immunotherapies.\"}, {\"paperId\": \"03066269f229f00ef596492281f305fac8601645\", \"externalIds\": {\"PubMedCentral\": \"7722470\", \"MAG\": \"3113321847\", \"DOI\": \"10.1186/s40779-020-00292-2\", \"CorpusId\": 227503163, \"PubMed\": \"33287895\"}, \"title\": \"CRISPR/Cas9 from bench to bedside: what clinicians need to know before application?\", \"venue\": \"Military Medical Research\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://mmrjournal.biomedcentral.com/track/pdf/10.1186/s40779-020-00292-2\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7722470, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2410452826\", \"name\": \"Ziqian Li\"}, {\"authorId\": \"2150359229\", \"name\": \"Chao Li\"}], \"abstract\": \"In October 2020, Dr. Emmanuelle Charpentier and Dr. Jennifer Doudna won the Nobel Prize in Chemistry for their pioneering work in precise genome editing using the CRISPR technology. Although CRISPR technology has developed rapidly in the last decade, there are still many uncertainties before eventual use in clinical settings. In this mini review, we summarize the current efforts in addressing the limitations of CRISPR technology and future directions.\"}, {\"paperId\": \"0307f2d3f5823677b63f16046a8d575a42b9d0be\", \"externalIds\": {\"PubMedCentral\": \"8577253\", \"DOI\": \"10.4103/aja.aja_97_20\", \"CorpusId\": 231789493, \"PubMed\": \"33533741\"}, \"title\": \"Rescue of male infertility through correcting a genetic mutation causing meiotic arrest in spermatogonial stem cells\", \"venue\": \"Asian Journal of Andrology\", \"year\": 2021, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.4103/aja.aja_97_20\", \"status\": \"GOLD\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8577253, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2107962079\", \"name\": \"Yinghua Wang\"}, {\"authorId\": \"2114007451\", \"name\": \"Meng Yan\"}, {\"authorId\": \"2108287466\", \"name\": \"Xi Zhang\"}, {\"authorId\": \"49543949\", \"name\": \"Xin-Yu Liu\"}, {\"authorId\": \"47814960\", \"name\": \"Yifu Ding\"}, {\"authorId\": \"32023875\", \"name\": \"Ch Lai\"}, {\"authorId\": \"10219037\", \"name\": \"M. Tong\"}, {\"authorId\": \"2109374601\", \"name\": \"Jinsong Li\"}], \"abstract\": \"Azoospermia patients who carry a monogenetic mutation that causes meiotic arrest may have their biological child through genetic correction in spermatogonial stem cells (SSCs). However, such therapy for infertility has not been experimentally investigated yet. In this study, a mouse model with an X-linked testis-expressed 11 (TEX11) mutation (Tex11PM/Y) identified in azoospermia patients exhibited meiotic arrest due to aberrant chromosome segregation. Tex11PM/Y SSCs could be isolated and expanded in vitro normally, and the mutation was corrected by clustered regularly interspaced short palindromic repeats (CRISPR)\\u2013CRISPR-associated endonuclease 9 (Cas9), leading to the generation of repaired SSC lines. Whole-genome sequencing demonstrated that the mutation rate in repaired SSCs is comparable with that of autonomous mutation in untreated Tex11PM/Y SSCs, and no predicted off-target sites are modified. Repaired SSCs could restore spermatogenesis in infertile males and give rise to fertile offspring at a high efficiency. In summary, our study establishes a paradigm for the treatment of male azoospermia by combining in vitro expansion of SSCs and gene therapy.\"}, {\"paperId\": \"0309343c4e0978fac15e9375534586e21600be7c\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-2891\", \"CorpusId\": 277976406}, \"title\": \"Abstract 2891: Cystatin C is glucocorticoid-responsive, directs recruitment of Trem2+ macrophages and predicts failure of cancer immunotherapy\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-2891?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-2891, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1396879864\", \"name\": \"S. Kleeman\"}, {\"authorId\": \"1622652180\", \"name\": \"B. Demestichas\"}, {\"authorId\": \"2154084568\", \"name\": \"Nicholas Mourikis\"}, {\"authorId\": \"2058293733\", \"name\": \"M. Ferrer\"}, {\"authorId\": \"2220041043\", \"name\": \"Qing Gao\"}, {\"authorId\": \"2280290096\", \"name\": \"Dominik Loiero\"}, {\"authorId\": \"2205487359\", \"name\": \"Y. Riazat-Kesh\"}, {\"authorId\": \"1473539163\", \"name\": \"S. Bankier\"}, {\"authorId\": \"4355580\", \"name\": \"D. Chantzichristos\"}, {\"authorId\": \"3278851\", \"name\": \"G. Johannsson\"}, {\"authorId\": \"2069776688\", \"name\": \"C. Regan\"}, {\"authorId\": \"5552238\", \"name\": \"Jonathan Preall\"}, {\"authorId\": \"6574060\", \"name\": \"V. Koelzer\"}, {\"authorId\": \"2242557397\", \"name\": \"Brian R. Walker\"}, {\"authorId\": \"2268857678\", \"name\": \"Hannah V. Meyer\"}, {\"authorId\": \"4232759\", \"name\": \"T. Janowitz\"}], \"abstract\": \"\\n Cystatin C (CyC) is a secreted cysteine protease inhibitor that is commonly used as a marker of renal function, and whose biological functions remain insufficiently characterized. Plasma CyC is elevated relative to renal function in many patients, including those receiving glucocorticoid (GC) treatment and patients with cancer. Endogenous GCs are essential for life and are appropriately upregulated in response to systemic stress. Here we empirically connect GCs with the systemic regulation of CyC. Using measurements of CyC and creatinine, another established marker of renal function, we used genome-wide association and structural equation modeling to determine the genetics of the latent trait CyC production in UK Biobank, thereby uncoupling CyC from renal function. CyC production and a polygenic score (PGS) capturing germline predisposition to CyC production predicted elevated all-cause and cancer-specific mortality. Using phenome-wide association, we further identified an association between germline predisposition to CyC production and accelerated onset of metabolic syndrome. As a potential explanation for these associations, we provide multiple lines of evidence that CyC is a direct transcriptional target of GC receptor, with GC-responsive CyC secretion exhibited by macrophages (cf. monocytes) and co-opted by multiple cancer cell lines, potentially explaining selective CyC elevations in disease states. Using isogenic CyC-knockout tumors (CRISPR-Cas9), we discovered a markedly attenuated tumor growth in vivo that was associated with a significantly reduced fraction of non-epithelial cells. To investigate whether depletion of specific non-epithelial cells could explain this, we performed single-cell RNA sequencing, which revealed abrogated recruitment of Trem2+ macrophages in knockout tumors, subsequently validated by Trem2 immunohistochemistry in a non-overlapping cohort. Trem2+ macrophages have previously been linked to immune suppression and failure of cancer immunotherapy. Consistent with this, we show that the CyC production PGS predicted checkpoint immunotherapy failure in a combined clinical trial cohort of 685 metastatic cancer patients. Taken together, our results demonstrate that CyC may be a direct effector of GC-induced immunosuppression, acting through the recruitment of Trem2+ macrophages, and therefore could be a target for combination cancer immunotherapy.\\n Citation Format: Sam O. Kleeman, Breanna Demestichas, Nicholas Mourikis, Miriam Ferrer, Qing Gao, Dominik Loiero, Yosef J. Riazat-Kesh, Sean Bankier, Dimitrios Chantzichristos, Gudmundur Johannsson, Claire Regan, Jonathan Preall, Viktor H. Koelzer, Brian R. Walker, Hannah Meyer, Tobias Janowitz. Cystatin C is glucocorticoid-responsive, directs recruitment of Trem2+ macrophages and predicts failure of cancer immunotherapy [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 2891.\"}, {\"paperId\": \"03096a471e60431f0875af7be36498739bd841cc\", \"externalIds\": {\"PubMedCentral\": \"8264917\", \"MAG\": \"3153067865\", \"DOI\": \"10.1093/femsml/uqab001\", \"CorpusId\": 234888245, \"PubMed\": \"34250489\"}, \"title\": \"An overview of Salmonella enterica metal homeostasis pathways during infection\", \"venue\": \"microLife\", \"year\": 2021, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/microlife/article-pdf/doi/10.1093/femsml/uqab001/37541566/uqab001.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8264917, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6300827\", \"name\": \"Olivier Cunrath\"}, {\"authorId\": \"145346304\", \"name\": \"Jacob D. Palmer\"}], \"abstract\": \"ABSTRACT Nutritional immunity is a powerful strategy at the core of the battlefield between host survival and pathogen proliferation. A host can prevent pathogens from accessing biological metals such as Mg, Fe, Zn, Mn, Cu, Co or Ni, or actively intoxicate them with metal overload. While the importance of metal homeostasis for the enteric pathogen Salmonella enterica Typhimurium was demonstrated many decades ago, inconsistent results across various mouse models, diverse Salmonella genotypes, and differing infection routes challenge aspects of our understanding of this phenomenon. With expanding access to CRISPR-Cas9 for host genome manipulation, it is now pertinent to re-visit past results in the context of specific mouse models, identify gaps and incongruities in current knowledge landscape of Salmonella homeostasis, and recommend a straight path forward towards a more universal understanding of this historic host\\u2013microbe relationship.\"}, {\"paperId\": \"0310dfd3f725bf28a2a0dd1de560e1721b38426d\", \"externalIds\": {\"DOI\": \"10.1158/0008-5472.CAN-21-1443\", \"CorpusId\": 245289112, \"PubMed\": \"34921013\"}, \"title\": \"Concurrent inhibition of IGF1R and ERK increases pancreatic cancer sensitivity to autophagy inhibitors.\", \"venue\": \"Cancer Research\", \"year\": 2021, \"citationCount\": 40, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://aacrjournals.org/cancerres/article-pdf/82/4/586/3044565/586.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/0008-5472.CAN-21-1443?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/0008-5472.CAN-21-1443, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15534610\", \"name\": \"Clint A. Stalnecker\"}, {\"authorId\": \"40974553\", \"name\": \"Kajal R. Grover\"}, {\"authorId\": \"2147108919\", \"name\": \"A. C. Edwards\"}, {\"authorId\": \"1610536909\", \"name\": \"M. Coleman\"}, {\"authorId\": \"4630965\", \"name\": \"Run-Wei Yang\"}, {\"authorId\": \"2051164475\", \"name\": \"Jonathan M. DeLiberty\"}, {\"authorId\": \"5707103\", \"name\": \"Bjoern Papke\"}, {\"authorId\": \"11895962\", \"name\": \"Craig M. Goodwin\"}, {\"authorId\": \"50259934\", \"name\": \"M. Pierobon\"}, {\"authorId\": \"46319892\", \"name\": \"E. Petricoin\"}, {\"authorId\": \"46485344\", \"name\": \"Prson Gautam\"}, {\"authorId\": \"3118557\", \"name\": \"K. Wennerberg\"}, {\"authorId\": \"5310343\", \"name\": \"A. Cox\"}, {\"authorId\": \"4764611\", \"name\": \"C. Der\"}, {\"authorId\": \"6912808\", \"name\": \"S. Hursting\"}, {\"authorId\": \"49082560\", \"name\": \"Kirsten L. Bryant\"}], \"abstract\": \"The aggressive nature of pancreatic ductal adenocarcinoma (PDAC) mandates the development of improved therapies. Since KRAS mutations are found in 95% of PDAC and are critical for tumor maintenance, one promising strategy involves exploiting KRAS-dependent metabolic perturbations. The macrometabolic process of autophagy is upregulated in KRAS-mutant PDAC, and PDAC growth is reliant on autophagy. However, inhibition of autophagy as monotherapy using the lysosomal inhibitor hydroxychloroquine (HCQ) has shown limited clinical efficacy. To identify strategies that can improve PDAC sensitivity to HCQ, we applied a CRISPR-Cas9 loss-of-function screen and found that a top sensitizer was the receptor tyrosine kinase (RTK) insulin-like growth factor 1 receptor (IGF1R). Additionally, RPPA pathway activation mapping profiled the signaling pathways altered by CQ treatment. Activating phosphorylation of RTKs, including IGF1R, were common compensatory increases in response to CQ. Inhibition of IGF1R increased autophagic flux and sensitivity to CQ-mediated growth suppression both in vitro and in vivo. Co-targeting both IGF1R and pathways that antagonize autophagy, such as ERK-MAPK axis, was strongly synergistic. IGF1R and ERK inhibition converged on suppression of glycolysis, leading to enhanced dependence on autophagy. Accordingly, concurrent inhibition of IGF1R, ERK, and autophagy induced cytotoxicity in PDAC cell lines, and decreased viability in human PDAC organoids. In conclusion, targeting IGF1R together with ERK enhances the effectiveness of autophagy inhibitors in PDAC.\"}, {\"paperId\": \"0311a76582b2cca20795b705c9fd1566f475c5f8\", \"externalIds\": {\"PubMedCentral\": \"9164957\", \"DOI\": \"10.1093/neuonc/noac079.323\", \"CorpusId\": 249359812}, \"title\": \"LGG-07. Novel CRISPR/Cas9 induced KIAA1549:BRAF fusion model for preclinical studies of pediatric gliomas\", \"venue\": \"Neuro-Oncology\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/24/Supplement_1/i88/43945406/noac079.323.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9164957, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4424136\", \"name\": \"K. Patel\"}, {\"authorId\": \"5707178\", \"name\": \"Guisheng Zhao\"}, {\"authorId\": \"12184814\", \"name\": \"Shih-Ming Huang\"}, {\"authorId\": \"26373133\", \"name\": \"Triantafyllia Karakousi\"}, {\"authorId\": \"5401009\", \"name\": \"T. Nicolaides\"}, {\"authorId\": \"47844639\", \"name\": \"T. Papagiannakopoulos\"}], \"abstract\": \"Abstract BACKGROUND: Pediatric Low Grade Gliomas (pLGG) are the most common group of central nervous system (CNS) tumors in children and cause significant morbidities. Pilocytic astrocytoma (PA) is the most frequent pLGG. KIAA1549:BRAF fusion is a well-established oncogenic driver in PA. Oncogene induced senescence (OIS) has prevented establishing PA cultures for in vitro and in vivo studies. Here we look at a novel NIH-3T3 fibroblast model harboring KIAA1549:BRAF fusion gene via CRISPR/Cas9 somatic genome engineering technology. OBJECTIVES: Establishing that the CRISPR/Cas9 edited NIH-3T3 fibroblast model with the KIAA1549:BRAF fusion is valuable for in vitro and in vivo studies without early OIS. DESIGN/METHOD: CRISPR/Cas9 editing technology was used to establish a KIAA1549:BRAF fusion positive cell model. This cell model was studied in vitro with MEK inhibitor cobimetinib (GDC-0973) and using WST-1 viability assay, clonogenic assay, senescence \\u03b2-galactosidase staining, and western blot. In vivo murine models with subcutaneous fusion positive NIH-3T3 fibroblast tumors were treated with GDC-0973. Survival studies and tissue studies were subsequently done. RESULTS: A fusion positive NIH-3T3 fibroblast model was successfully established. Increased BRAF cDNA expression and higher levels of p-ERK were observed. In vitro studies showed decreased viability with GDC-0973. Clonogenic assay showed qualitative and quantitative decreases in viable cells. P-ERK target inhibition was established without induction of senescence. In vivo studies demonstrated successful subcutaneous tumor implantation, therapy efficacy, and target inhibition. CONCLUSION: CNS tumors, most commonly pLGG, in children cause significant morbidities. KIAA1549:BRAF fusion is an oncogenic driver in PA. In vitro and in vivo studies are important for pre-clinical models. OIS has prevented establishing adequate fusion positive animal cell models. Here we have demonstrated a successful CRISPR/Cas9 edited fusion positive NIH-3T3 fibroblast model.\"}, {\"paperId\": \"031513b118502ecc0805b7cbfdfb80c568e88bd1\", \"externalIds\": {\"PubMedCentral\": \"11794148\", \"DOI\": \"10.1038/s41375-024-02454-w\", \"CorpusId\": 274129347, \"PubMed\": \"39551873\"}, \"title\": \"The glycosyltransferase ST3GAL4 drives immune evasion in acute myeloid leukemia by synthesizing ligands for the glyco-immune checkpoint receptor Siglec-9\", \"venue\": \"Leukemia\", \"year\": 2024, \"citationCount\": 19, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11794148, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"81865011\", \"name\": \"Vignesh K Krishnamoorthy\"}, {\"authorId\": \"2275930122\", \"name\": \"John Daly\"}, {\"authorId\": \"2331367309\", \"name\": \"Jimmy Kim\"}, {\"authorId\": \"2331303398\", \"name\": \"Lidia Piatnitca\"}, {\"authorId\": \"2291578881\", \"name\": \"Katie A. Yuen\"}, {\"authorId\": \"2313267916\", \"name\": \"Bhoj Kumar\"}, {\"authorId\": \"2326288830\", \"name\": \"Mehrnoush Taherzadeh Ghahfarrokhi\"}, {\"authorId\": \"2331302854\", \"name\": \"Tom Q. T. Bui\"}, {\"authorId\": \"2279128083\", \"name\": \"Parastoo Azadi\"}, {\"authorId\": \"2331304593\", \"name\": \"Ly P. Vu\"}, {\"authorId\": \"5501263\", \"name\": \"S. Wisnovsky\"}], \"abstract\": \"Immunotherapy has demonstrated promise as a treatment for acute myeloid leukemia (AML). However, there is still an urgent need to identify new molecules that inhibit the immune response to AML. Most prior research in this area has focused on protein-protein interaction interfaces. While carbohydrates also regulate immune recognition, the role of cell-surface glycans in driving AML immune evasion is comparatively understudied. The Siglecs, for example, are an important family of inhibitory, glycan-binding signaling receptors that have emerged as prime targets for cancer immunotherapy in recent years. In this study, we find that AML cells express ligands for the receptor Siglec-9 at high levels. Integrated CRISPR genomic screening and clinical bioinformatic analysis identified ST3GAL4 as a potential driver of Siglec-9 ligand expression in AML. Depletion of ST3GAL4 by CRISPR-Cas9 knockout (KO) dramatically reduced the expression of Siglec-9 ligands in AML cells. Mass spectrometry analysis of cell-surface glycosylation in ST3GAL4 KO cells revealed that Siglec-9 primarily binds N-linked sialoglycans on these cell types. Finally, we found that ST3GAL4 KO enhanced the sensitivity of AML cells to phagocytosis by Siglec-9-expressing macrophages. This work reveals a novel axis of immune evasion and implicates ST3GAL4 as a possible target for immunotherapy in AML.\"}, {\"paperId\": \"0319aba7967a522bbdc9c08bf5c2a76eb985d7ac\", \"externalIds\": {\"PubMedCentral\": \"11742120\", \"DOI\": \"10.1091/mbc.E24-09-0434\", \"CorpusId\": 274340187, \"PubMed\": \"39602282\"}, \"title\": \"CARMIL1-AA selectively inhibits macropinocytosis while sparing autophagy\", \"venue\": \"Molecular Biology of the Cell\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11742120, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2282837270\", \"name\": \"Rebecca M Lim\"}, {\"authorId\": \"2332737395\", \"name\": \"Alexa Lu\"}, {\"authorId\": \"121115156\", \"name\": \"Brennan Chuang\"}, {\"authorId\": \"2190944251\", \"name\": \"Cecily Anaraki\"}, {\"authorId\": \"2282773650\", \"name\": \"Brandon Chu\"}, {\"authorId\": \"7745600\", \"name\": \"Christopher J. Halbrook\"}, {\"authorId\": \"2259348746\", \"name\": \"Aimee L. Edinger\"}], \"abstract\": \"Macropinocytosis is reported to fuel tumor growth and drug resistance by allowing cancer cells to scavenge extracellular macromolecules. However, accurately defining the role of macropinocytosis in cancer depends on our ability to selectively block this process. 5-(N-ethyl-N-isopropyl)-amiloride (EIPA) is widely used to inhibit macropinocytosis but affects multiple Na+/H+ exchangers (NHE) that regulate cytoplasmic and organellar pH. Consistent with this, we report that EIPA slows proliferation to a greater extent than can be accounted for by macropinocytosis inhibition and triggers conjugation of ATG8 to single membranes (CASM). Knocking down only NHE1 would not avoid macropinocytosis-independent effects on pH. Moreover, contrary to published reports, NHE1 loss did not block macropinocytosis in multiple cell lines. Knocking down CARMIL1 with CRISPR-Cas9 editing limited macropinocytosis, but only by 50%. In contrast, expressing the CARMIL1-AA mutant inhibits macropinocytosis induced by a wide range of macropinocytic stimuli to a similar extent as EIPA. CARMIL1-AA expression did not inhibit proliferation, highlighting the shortcomings of EIPA as a macropinocytosis inhibitor. Importantly, autophagy, another actin dependent, nutrient-producing process, was not affected by CARMIL1-AA expression. In sum, constitutive or inducible CARMIL1-AA expression reduced macropinocytosis without affecting proliferation, RAC activation, or autophagy, other processes that drive tumor initiation and progression.\"}, {\"paperId\": \"031a65228348c5b4740a127177a095a5e9f17227\", \"externalIds\": {\"DOI\": \"10.1016/j.canlet.2024.216760\", \"CorpusId\": 268121553, \"PubMed\": \"38428724\"}, \"title\": \"Improved antitumor effects elicited by an oncolytic HSV-1 expressing a novel B7H3nb/CD3 BsAb.\", \"venue\": \"Cancer Letters\", \"year\": 2024, \"citationCount\": 20, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.canlet.2024.216760?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.canlet.2024.216760, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47294022\", \"name\": \"Zongliang Zhang\"}, {\"authorId\": \"2075332190\", \"name\": \"Nian Yang\"}, {\"authorId\": \"2228915015\", \"name\": \"Huaqing Lu\"}, {\"authorId\": \"2281007621\", \"name\": \"Yongdong Chen\"}, {\"authorId\": \"2289275794\", \"name\": \"Long Xu\"}, {\"authorId\": \"2108725718\", \"name\": \"Zeng Wang\"}, {\"authorId\": \"2279282605\", \"name\": \"Qizhong Lu\"}, {\"authorId\": \"46821965\", \"name\": \"Kunhong Zhong\"}, {\"authorId\": \"2281294193\", \"name\": \"Zhixiong Zhu\"}, {\"authorId\": \"2289125603\", \"name\": \"Guoqing Wang\"}, {\"authorId\": \"2279185589\", \"name\": \"Hexian Li\"}, {\"authorId\": \"153286102\", \"name\": \"Meijun Zheng\"}, {\"authorId\": \"2289297684\", \"name\": \"Weiwei Zhang\"}, {\"authorId\": \"2274742934\", \"name\": \"Hui Yang\"}, {\"authorId\": \"2267023095\", \"name\": \"Xing-chen Peng\"}, {\"authorId\": \"2289191623\", \"name\": \"Liangxue Zhou\"}, {\"authorId\": \"2269026945\", \"name\": \"Aiping Tong\"}], \"abstract\": \"Oncolytic viruses have emerged as a promising modality for cancer treatment due to their unique abilities to directly destroy tumor cells and modulate the tumor microenvironment. Bispecific T-cell engagers (BsAbs) have been developed to activate and redirect cytotoxic T lymphocytes, enhancing the antitumor response. To take advantage of the specific infection capacity and carrying ability of exogenous genes, we generated a recombinant herpes simplex virus type 1 (HSV-1), HSV-1dko-B7H3nb/CD3 or HSV-1dko-B7H3nb/mCD3, carrying a B7H3nb/CD3 or B7H3nb/mCD3 BsAb that replicates and expresses BsAb in tumor cells in vitro and in vivo. The new generation of oncolytic viruses has been genetically modified using CRISPR/Cas9 technology and the cre-loxp system to increase the efficiency of HSV genome editing. Additionally, we used two fully immunocompetent models (GL261 and MC38) to assess the antitumor effect of HSV-1dko-B7H3nb/mCD3. Compared with the HSV-1dko control virus, HSV-1dko-B7H3nb/mCD3 induced enhanced anti-tumor immune responses and T-cell infiltration in both GL261 and MC38 models, resulting in improved treatment efficacy in the latter. Furthermore, flow cytometry analysis of the tumor microenvironment confirmed an increase in NK cells and effector CD8+ T cells, and a decrease in immunosuppressive cells, including FOXP3+ regulatory T cells (Tregs), myeloid-derived suppressor cells (MDSCs), and CD206+ macrophages (M2). Overall, our study identified a novel camel B7H3 nanobody and described the genetic modification of the HSV-1 genome using CRISPR/Cas9 technology and the cre-loxp system. Our findings indicate that expressing B7H3nb/CD3 BsAb could improve the antitumor effects of HSV-1 based oncolytic virus.\"}, {\"paperId\": \"0320f4af4089f07d6937f1e6b247c0a86819f7b7\", \"externalIds\": {\"DOI\": \"10.1038/s41596-025-01154-8\", \"CorpusId\": 271269295, \"PubMed\": \"39071446\"}, \"title\": \"Peptide-enabled ribonucleoprotein delivery for CRISPR engineering (PERC) in primary human immune cells and hematopoietic stem cells\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2024.07.14.603391\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41596-025-01154-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41596-025-01154-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3589206\", \"name\": \"Srishti U. Sahu\"}, {\"authorId\": \"2312110967\", \"name\": \"Madalena Castro\"}, {\"authorId\": \"2269062656\", \"name\": \"Joseph J. Muldoon\"}, {\"authorId\": \"41136962\", \"name\": \"Kunica Asija\"}, {\"authorId\": \"1810589\", \"name\": \"S. Wyman\"}, {\"authorId\": \"50551934\", \"name\": \"Netravathi Krishnappa\"}, {\"authorId\": \"2250503777\", \"name\": \"L. O\\u00f1ate\"}, {\"authorId\": \"50508006\", \"name\": \"Justin Eyquem\"}, {\"authorId\": \"2310415080\", \"name\": \"David N. Nguyen\"}, {\"authorId\": \"2312107047\", \"name\": \"Ross C. Wilson\"}], \"abstract\": null}, {\"paperId\": \"0324325fccf5336b614eb6ccf451a7ad89d9df73\", \"externalIds\": {\"DOI\": \"10.1111/liv.15716\", \"CorpusId\": 258182227, \"PubMed\": \"37650211\"}, \"title\": \"Investigating the role of lipid genes in liver disease using fatty liver models of alcohol and high fat in zebrafish (Danio rerio)\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/liv.15716\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/liv.15716?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/liv.15716, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4851859\", \"name\": \"Fathima Shihana\"}, {\"authorId\": \"91373270\", \"name\": \"P. Cholan\"}, {\"authorId\": \"2214612044\", \"name\": \"Stuart Fraser\"}, {\"authorId\": \"4771332\", \"name\": \"Stefan H. Oehlers\"}, {\"authorId\": \"4686415\", \"name\": \"D. Seth\"}], \"abstract\": \"Background Accumulation of lipid in the liver is the first hallmark of both alcohol-related liver disease (ALD) and non-alcohol-related fatty liver disease (NAFLD). Recent studies indicate that specific mutations in lipid genes confer risk and might influence disease progression to irreversible liver cirrhosis. This study aimed to understand the function/s of lipid risk genes driving disease development in zebrafish genetic models of alcohol- and non-alcohol related fatty liver. Methods We used zebrafish larvae to investigate the effect of alcohol and high fat to model fatty liver and tested the utility of this model to study lipid risk gene functions. CRISPR/Cas9 gene editing was used to create knockdowns in 5 days post-fertilization zebrafish larvae for the available orthologs of human cirrhosis risk genes (pnpla3, faf2, tm6sf2). To establish fatty liver models, larvae were exposed to ethanol and a high fat diet (HFD) consisting of chicken egg yolk. Changes in morphology (imaging), survival, liver injury (biochemical tests, histopathology), gene expression (qPCR) and lipid accumulation (dye specific live imaging) were analysed across treatment groups to test the functions of these genes. Results Exposure of 5-day post-fertilization (dpf) WT larvae to 2% ethanol or HFD for 48 hours developed measurable hepatic steatosis. CRISPR-Cas9 genome editing depleted pnpla3, faf2 and tm6sf2 gene expression in these CRISPR knockdown larvae (crispants). Knockdown significantly increased effects of ethanol and HFD toxicity by increasing hepatic steatosis and hepatic neutrophil recruitment \\u22652-fold in all three crispants. Furthermore, ethanol or HFD exposure significantly altered the expression of genes associated with ethanol metabolism (cyp2y3) and lipid metabolism-related gene expression, including atgl (triglyceride hydrolysis), axox1, echs1 (fatty acid \\u03b2-oxidation), fabp10a (transport), hmgcra (metabolism), notch1 (signaling) and srebp1 (lipid synthesis), in all three pnpla3, faf2 and tm6sf2 crispants. Nile Red staining in all three crispants revealed significantly increased lipid droplet size and triglyceride accumulation in the livers following exposure to ethanol or HFD. Conclusions We identified roles for pnpla3, faf2 and tm6sf2 genes in triglyceride accumulation and fatty acid oxidation pathways in a zebrafish larvae model of fatty liver.\"}, {\"paperId\": \"0324c9a310ece24c3822614e9e3739da9493749d\", \"externalIds\": {\"PubMedCentral\": \"9465254\", \"DOI\": \"10.3389/fpls.2022.940003\", \"CorpusId\": 251886493, \"PubMed\": \"36105709\"}, \"title\": \"CRISPR/Cas9 targeted inactivation of the kauniolide synthase in chicory results in accumulation of costunolide and its conjugates in taproots\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.940003/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9465254, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5000328\", \"name\": \"Katarina Cankar\"}, {\"authorId\": \"15448712\", \"name\": \"J. C. Hakkert\"}, {\"authorId\": \"5335029\", \"name\": \"Robert Sevenier\"}, {\"authorId\": \"1965953223\", \"name\": \"E. Campo\"}, {\"authorId\": \"32379445\", \"name\": \"B. Schipper\"}, {\"authorId\": \"35603587\", \"name\": \"C. Papastolopoulou\"}, {\"authorId\": \"3646018\", \"name\": \"K. Vahabi\"}, {\"authorId\": \"144374023\", \"name\": \"A. Tissier\"}, {\"authorId\": \"38797233\", \"name\": \"P. Bundock\"}, {\"authorId\": \"144787830\", \"name\": \"D. Bosch\"}], \"abstract\": \"Chicory taproots accumulate sesquiterpene lactones lactucin, lactucopicrin, and 8-deoxylactucin, predominantly in their oxalated forms. The biosynthetic pathway for chicory sesquiterpene lactones has only partly been elucidated; the enzymes that convert farnesyl pyrophosphate to costunolide have been described. The next biosynthetic step of the conversion of costunolide to the tricyclic structure, guaianolide kauniolide, has so far not been elucidated in chicory. In this work three putative kauniolide synthase genes were identified in chicory named CiKLS1, CiKLS2, and CiKLS3. Their activity to convert costunolide to kauniolide was demonstrated in vitro using yeast microsome assays. Next, introduction of CRISPR/Cas9 reagents into chicory protoplasts was used to inactivate multiple chicory KLS genes and several chicory lines were successfully regenerated. The inactivation of the kauniolide synthase genes in chicory by the CRISPR/Cas9 approach resulted in interruption of the sesquiterpene lactone biosynthesis in chicory leaves and taproots. In chicory taproots, but not in leaves, accumulation of costunolide and its conjugates was observed to high levels, namely 1.5 mg/g FW. These results confirmed that all three genes contribute to STL accumulation, albeit to different extent. These observations demonstrate that three genes oriented in tandem on the chicory genome encode kauniolide synthases that initiate the conversion of costunolide toward the sesquiterpene lactones in chicory.\"}, {\"paperId\": \"0327b90ea6ebcc4b77043c82cefde1023b2c2712\", \"externalIds\": {\"MAG\": \"3037661554\", \"PubMedCentral\": \"8251967\", \"DOI\": \"10.1111/tpj.15164\", \"CorpusId\": 220253000, \"PubMed\": \"33484202\"}, \"title\": \"Efficient Cas9 multiplex editing using unspaced sgRNA arrays engineering in a Potato virus X vector\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 82, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2020.06.25.170977\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8251967, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"150236601\", \"name\": \"M. Uranga\"}, {\"authorId\": \"5737785\", \"name\": \"V. Aragon\\u00e9s\"}, {\"authorId\": \"91037266\", \"name\": \"S. Selma\"}, {\"authorId\": \"1401611782\", \"name\": \"M. V\\u00e1zquez-Vilar\"}, {\"authorId\": \"5117759\", \"name\": \"D. Orz\\u00e1ez\"}, {\"authorId\": \"48653623\", \"name\": \"J. Dar\\u00f2s\"}], \"abstract\": \"Systems based on the clustered, regularly interspaced, short palindromic repeat (CRISPR) and CRISPR associated proteins (Cas) have revolutionized genome editing in many organisms, including plants. Most CRISPR-Cas strategies in plants rely on genetic transformation using Agrobacterium tumefaciens to supply the gene editing reagents, such as the Cas nucleases or the guide RNA (gRNA). While the Cas nucleases are constant elements in editing approaches, gRNAs are target-specific and a screening process is usually required to identify those most effective. Plant virus-derived vectors are an alternative for the fast and efficient delivery of gRNAs into adult plants, due to the virus capacity for genome amplification and systemic movement, a strategy known as virus-induced genome editing (VIGE). In this work, we engineered Potato virus X (PVX) to build a vector able to easily express one or more gRNAs in adult solanaceous plants. Using the PVX-based vector, Nicotiana benthamiana genes were efficiently targeted, producing nearly 80% indels in a transformed line that constitutively expressed Streptococcus pyogenes Cas9. Interestingly, results showed that the PVX vector allows expression of arrays of unspaced gRNAs achieving highly efficient multiplex editing in a few days in adult plant tissues. We also demonstrate that genome modifications are inherited in plants regenerated from infected tissues. In sum, the new PVX VIGE vector allows easy, fast and efficient expression of gRNAs arrays for multiplex CRISPR-Cas genome editing and will be a useful tool for functional gene analysis and precision breeding across diverse plant species, particularly in important crops of the family Solanaceae.\"}, {\"paperId\": \"0327fb00feee3f00f203965499237c865951612f\", \"externalIds\": {\"DOI\": \"10.1016/j.htct.2024.09.1990\", \"CorpusId\": 273493594}, \"title\": \"DISCOVERIES OF GENE EDITING USING CRISPR-CAS9 FOR THE TREATMENT OF SICKLE CELL DISEASE: A LITERATURE REVIEW\", \"venue\": \"Hematology, Transfusion and Cell Therapy\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.htct.2024.09.1990\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.htct.2024.09.1990?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.htct.2024.09.1990, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2326856668\", \"name\": \"IS Estevam\"}, {\"authorId\": \"2326873660\", \"name\": \"Cab Neto\"}, {\"authorId\": \"2326861731\", \"name\": \"FC Marques\"}, {\"authorId\": \"2326896766\", \"name\": \"Cdc Gentile\"}, {\"authorId\": \"2326937412\", \"name\": \"Eac Lima\"}, {\"authorId\": \"2326894608\", \"name\": \"Elf Mota\"}, {\"authorId\": \"2326957297\", \"name\": \"GF Costa\"}, {\"authorId\": \"2326894656\", \"name\": \"GS Feitosa\"}, {\"authorId\": \"2326879590\", \"name\": \"Voc Filho\"}, {\"authorId\": \"2326864833\", \"name\": \"MM Noronha\"}], \"abstract\": null}, {\"paperId\": \"032920562d2008a34fad345cde1e88373f40d37a\", \"externalIds\": {\"PubMedCentral\": \"7772566\", \"MAG\": \"3111256088\", \"DOI\": \"10.1016/j.isci.2020.101926\", \"CorpusId\": 229719178, \"PubMed\": \"33385119\"}, \"title\": \"Mapping germ-layer specification preventing genes in hPSCs via genome-scale CRISPR screening\", \"venue\": \"iScience\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2589004220311238/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7772566, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5608869\", \"name\": \"Xiangjie Xu\"}, {\"authorId\": \"6560236\", \"name\": \"Yanhua Du\"}, {\"authorId\": \"2115503547\", \"name\": \"Lin Ma\"}, {\"authorId\": \"2107934050\", \"name\": \"Shuwei Zhang\"}, {\"authorId\": \"2117206442\", \"name\": \"Lei Shi\"}, {\"authorId\": \"2109268634\", \"name\": \"Zhenyu Chen\"}, {\"authorId\": \"2109471731\", \"name\": \"Zhongshu Zhou\"}, {\"authorId\": \"145040006\", \"name\": \"Yi Hui\"}, {\"authorId\": \"2152803192\", \"name\": \"Yang Liu\"}, {\"authorId\": \"4054676\", \"name\": \"Yujiang Fang\"}, {\"authorId\": \"2052131072\", \"name\": \"Beibei Fan\"}, {\"authorId\": \"1926111\", \"name\": \"Zhongliang Liu\"}, {\"authorId\": \"2155791476\", \"name\": \"Nan Li\"}, {\"authorId\": \"2210200061\", \"name\": \"Shanshan Zhou\"}, {\"authorId\": \"34252627\", \"name\": \"Cizhong Jiang\"}, {\"authorId\": \"2146022191\", \"name\": \"Ling Liu\"}, {\"authorId\": \"2108113188\", \"name\": \"Xiaoqing Zhang\"}], \"abstract\": \"Summary Understanding the biological processes that determine the entry of three germ layers of human pluripotent stem cells (hPSCs) is a central question in developmental and stem cell biology. Here, we genetically engineered hPSCs with the germ layer reporter and inducible CRISPR/Cas9 knockout system, and a genome-scale screening was performed to define pathways restricting germ layer specification. Genes clustered in the key biological processes, including embryonic development, mRNA processing, metabolism, and epigenetic regulation, were centered in the governance of pluripotency and lineage development. Other than typical pluripotent transcription factors and signaling molecules, loss of function of mesendodermal specifiers resulted in advanced neuroectodermal differentiation, given their inter-germ layer antagonizing effect. Regarding the epigenetic superfamily, microRNAs enriched in hPSCs showed clear germ layer-targeting specificity. The cholesterol synthesis pathway maintained hPSCs via retardation of neuroectoderm specification. Thus, in this study, we identified a full landscape of genetic wiring and biological processes that control hPSC self-renewal and trilineage specification.\"}, {\"paperId\": \"032aee381310d83c8f9b10848dfc3ac86588adfe\", \"externalIds\": {\"MAG\": \"3086231915\", \"PubMedCentral\": \"7476086\", \"DOI\": \"10.20892/j.issn.2095-3941.2020.0056\", \"CorpusId\": 221740118, \"PubMed\": \"32944401\"}, \"title\": \"SHP2 promotes proliferation of breast cancer cells through regulating Cyclin D1 stability via the PI3K/AKT/GSK3\\u03b2 signaling pathway\", \"venue\": \"Cancer Biology and Medicine\", \"year\": 2020, \"citationCount\": 46, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cancerbiomed.org/index.php/cocr/article/download/1678/1617\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7476086, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48009962\", \"name\": \"Yue Yuan\"}, {\"authorId\": \"3542066\", \"name\": \"Yanling Fan\"}, {\"authorId\": \"13180784\", \"name\": \"Zicong Gao\"}, {\"authorId\": \"34994932\", \"name\": \"Xuan Sun\"}, {\"authorId\": \"2153526369\", \"name\": \"He Zhang\"}, {\"authorId\": \"2108503571\", \"name\": \"Zhiyong Wang\"}, {\"authorId\": \"50354928\", \"name\": \"Yanfen Cui\"}, {\"authorId\": \"49918067\", \"name\": \"Weijie Song\"}, {\"authorId\": \"2144716290\", \"name\": \"Zhaosong Wang\"}, {\"authorId\": \"50212997\", \"name\": \"Fei Zhang\"}, {\"authorId\": \"2035940\", \"name\": \"R. Niu\"}], \"abstract\": \"Objective: The tyrosine phosphatase SHP2 has a dual role in cancer initiation and progression in a tissue type-dependent manner. Several studies have linked SHP2 to the aggressive behavior of breast cancer cells and poorer outcomes in people with cancer. Nevertheless, the mechanistic details of how SHP2 promotes breast cancer progression remain largely undefined. Methods: The relationship between SHP2 expression and the prognosis of patients with breast cancer was investigated by using the TCGA and GEO databases. The expression of SHP2 in breast cancer tissues was analyzed by immunohistochemistry. CRISPR/Cas9 technology was used to generate SHP2-knockout breast cancer cells. Cell-counting kit-8, colony formation, cell cycle, and EdU incorporation assays, as well as a tumor xenograft model were used to examine the function of SHP2 in breast cancer proliferation. Quantitative RT-PCR, western blotting, immunofluorescence staining, and ubiquitination assays were used to explore the molecular mechanism through which SHP2 regulates breast cancer proliferation. Results: High SHP2 expression is correlated with poor prognosis in patients with breast cancer. SHP2 is required for the proliferation of breast cancer cells in vitro and tumor growth in vivo through regulation of Cyclin D1 abundance, thereby accelerating cell cycle progression. Notably, SHP2 modulates the ubiquitin\\u2013proteasome-dependent degradation of Cyclin D1 via the PI3K/AKT/GSK3\\u03b2 signaling pathway. SHP2 knockout attenuates the activation of PI3K/AKT signaling and causes the dephosphorylation and resultant activation of GSK3\\u03b2. GSK3\\u03b2 then mediates phosphorylation of Cyclin D1 at threonine 286, thereby promoting the translocation of Cyclin D1 from the nucleus to the cytoplasm and facilitating Cyclin D1 degradation through the ubiquitin\\u2013proteasome system. Conclusions: Our study uncovered the mechanism through which SHP2 regulates breast cancer proliferation. SHP2 may therefore potentially serve as a therapeutic target for breast cancer.\"}, {\"paperId\": \"032bf49b9ab9933ec5c6d02ad280d71077439515\", \"externalIds\": {\"PubMedCentral\": \"9426387\", \"DOI\": \"10.1002/hep4.1997\", \"CorpusId\": 249096173, \"PubMed\": \"35621045\"}, \"title\": \"The unfolded protein response to PI*Z alpha\\u20101 antitrypsin in human hepatocellular and murine models\", \"venue\": \"Hepatology Communications\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9426387\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9426387, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4504723\", \"name\": \"Yuanqing Lu\"}, {\"authorId\": \"2155151715\", \"name\": \"Liqun Wang\"}, {\"authorId\": \"120704691\", \"name\": \"Jungnam Lee\"}, {\"authorId\": \"2166474224\", \"name\": \"Naweed S Mohammad\"}, {\"authorId\": \"11617302\", \"name\": \"A. Aranyos\"}, {\"authorId\": \"2166474690\", \"name\": \"Calvin Gould\"}, {\"authorId\": \"8304168\", \"name\": \"N. Khodayari\"}, {\"authorId\": \"12146948\", \"name\": \"Regina A Oshins\"}, {\"authorId\": \"6718034\", \"name\": \"C. Moneypenny\"}, {\"authorId\": \"4262828\", \"name\": \"M. Brantly\"}], \"abstract\": \"Alpha\\u20101 antitrypsin (AAT) deficiency (AATD) is an inherited disease caused by mutations in the serpin family A member 1 (SERPINA1, also known as AAT) gene. The most common variant, PI*Z (Glu342Lys), causes accumulation of aberrantly folded AAT in the endoplasmic reticulum (ER) of hepatocytes that is associated with a toxic gain of function, hepatocellular injury, liver fibrosis, and hepatocellular carcinoma. The unfolded protein response (UPR) is a cellular response to improperly folded proteins meant to alleviate ER stress. It has been unclear whether PI*Z AAT elicits liver cell UPR, due in part to limitations of current cellular and animal models. This study investigates whether UPR is activated in a novel human PI*Z AAT cell line and a new PI*Z human AAT (hAAT) mouse model. A PI*Z AAT hepatocyte cell line (Huh7.5Z) was established using clustered regularly interspaced short palindromic repeats (CRISPR)/Cas9 gene editing of the normal ATT (PI*MM) gene in the Huh7.5 cell line. Additionally, novel full\\u2010length genomic DNA PI*Z hAAT and PI*M hAAT transgenic mouse models were established. Using these new models, UPR in Huh7.5Z cells and PI*Z mice were comprehensively determined. Robust activation of UPR was observed in Huh7.5Z cells compared to Huh7.5 cells. Activated caspase cascade and apoptosis markers, increased chaperones, and autophagy markers were also detected in Z hepatocytes. Selective attenuation of UPR signaling branches was observed in PI*Z hAAT mice in which the protein kinase R\\u2010like ER kinase and inositol\\u2010requiring enzyme1\\u03b1 branches were suppressed while the activating transcription factor 6\\u03b1 branch remained active. This study provides direct evidence that PI*Z AAT triggers canonical UPR and that hepatocytes survive pro\\u2010apoptotic UPR by selective suppression of UPR branches. Our data improve understanding of underlying pathological molecular mechanisms of PI*Z AATD liver disease.\"}, {\"paperId\": \"032cd4055f0443d082df8bb7aad9d26dfc8bbaca\", \"externalIds\": {\"DOI\": \"10.1021/acsmacrolett.1c00740\", \"CorpusId\": 246713968, \"PubMed\": \"35575367\"}, \"title\": \"Design and Synthesis of Shikimoylated-Polypeptides for Nuclear Specific Internalization.\", \"venue\": \"ACS Macro Letters\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acsmacrolett.1c00740?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acsmacrolett.1c00740, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"90335166\", \"name\": \"Basudeb Mondal\"}, {\"authorId\": \"2091356292\", \"name\": \"Namita S. Mahadik\"}, {\"authorId\": \"35691777\", \"name\": \"R. Banerjee\"}, {\"authorId\": \"1720154\", \"name\": \"Sayam Sen Gupta\"}], \"abstract\": \"Targeted delivery of therapeutics such as small molecule drugs or nucleic acids exclusively to the nucleus of diseased mammalian cells poses a significant challenge. The development of targeting ligands that can specifically enter certain cancer cells via a specific receptor-mediated endocytosis and then traffic exclusively to the nucleus to deliver the cargo inside it can achieve this goal. We have developed an end-functionalized shikimoylated-polypeptide with pendant shikimoyl moieties that can enter mammalian cells via the mannose receptors and are then exclusively trafficked into the nucleus. The presence of the shikimoyl group in the polypeptide, which traffics it exclusively to the nucleus, contrasts with the mannosylated or galactosylated glycopolypeptides that are distributed all over the cytoplasm or the mannose-6-phosphate containing polypeptide that is exclusively trafficked to the lysosome. Using challenge experiments, we demonstrate that these polypeptides can enter both dendritic and cancer cells through mannose-receptors and subsequently enter the cell nucleus via the interaction with a nuclear pore complex (NPC) protein importin-\\u03b1/\\u03b21. To the best of our knowledge, this represents the first example of a synthetic polyvalent glycopolypeptide mimic that performs the dual function of entering mammalian cells through specific receptors and subsequently traffics into the nucleus. The conjugation of these end-functionalized shikimoylated-polypeptides to other biological entities, such as recombinant anticancer drugs, DNA, RNA, and CRISPR-Cas9, may be a suitable alternative for delivery of these biological entities into cells affected by cancer and other genetic diseases.\"}, {\"paperId\": \"0335181b186e288caf2da362c491a8db4074bfbb\", \"externalIds\": {\"DOI\": \"10.1101/2023.03.09.531870\", \"CorpusId\": 257509379}, \"title\": \"Constraint-based modeling predicts metabolic signatures of low- and high-grade serous ovarian cancer\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/03/12/2023.03.09.531870.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.03.09.531870?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.03.09.531870, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2211500227\", \"name\": \"Kate E. Meeson\"}, {\"authorId\": \"48158586\", \"name\": \"J. Schwartz\"}], \"abstract\": \"Ovarian cancer is an aggressive, heterogeneous disease, burdened with late diagnosis and resistance to chemotherapy. Clinical features of ovarian cancer could be explained by investigating its metabolism, and how the regulation of specific pathways link to individual phenotypes. Ovarian cancer is of particular interest for metabolic research due to its heterogeneous nature, with five distinct subtypes having been identified, each of which may display a unique metabolic signature. To elucidate metabolic differences, constraint-based modeling (CBM) represents a powerful technology, inviting the integration of \\u2018omics\\u2019 data, such as transcriptomics. However, many CBM methods have not prioritised accurate growth rate predictions, and there are very few ovarian cancer genome-scale studies, thus highlighting a niche in disease research. Here, a novel method for constraint-based modeling has been developed, employing the genome-scale model Human1 and flux balance analysis (FBA), enabling the integration of in vitro growth rates, transcriptomics data and media conditions to predict the metabolic behaviour of cells. Using low- and high-grade ovarian cancer as a case study, subtype-specific metabolic differences have been predicted, which have been supported with CRISPR-Cas9 data and an extensive literature review. Metabolic drivers of aggressive phenotypes, as well as pathways responsible for increased proliferation and chemoresistance in low-grade cell lines have been suggested. Experimental gene dependency data has been used to validate fatty acid biosynthesis and the pentose phosphate pathway as essential for low-grade cellular growth, highlighting potential vulnerabilities for this ovarian cancer subtype.\"}, {\"paperId\": \"033674ca48d093c517cac526d7c64f6e40ab9322\", \"externalIds\": {\"DOI\": \"10.1007/s00109-024-02476-y\", \"CorpusId\": 271897060, \"PubMed\": \"39158595\"}, \"title\": \"New CRISPR/Cas9-based Fgfr2C361Y/+ mouse model of Crouzon syndrome exhibits skull and behavioral abnormalities\", \"venue\": \"Journal of molecular medicine\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00109-024-02476-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00109-024-02476-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2293701782\", \"name\": \"Yingying Yue\"}, {\"authorId\": \"2316442300\", \"name\": \"Chenzhi Lai\"}, {\"authorId\": \"2316395296\", \"name\": \"Xiaoshuang Guo\"}, {\"authorId\": \"2206932373\", \"name\": \"Chang-Sheng Yang\"}, {\"authorId\": \"2258898010\", \"name\": \"Yu Wang\"}, {\"authorId\": \"2316450456\", \"name\": \"Guodong Song\"}, {\"authorId\": \"2243974234\", \"name\": \"Xiaolei Jin\"}], \"abstract\": null}, {\"paperId\": \"03371ec1403c175779692186fb846b09a228b279\", \"externalIds\": {\"MAG\": \"3001297896\", \"PubMedCentral\": \"6989618\", \"DOI\": \"10.3389/fphys.2019.01585\", \"CorpusId\": 210863218, \"PubMed\": \"32038281\"}, \"title\": \"CRISPR/Cas9-Mediated Vitellogenin Receptor Knockout Leads to Functional Deficiency in the Reproductive Development of Plutella xylostella\", \"venue\": \"Frontiers in Physiology\", \"year\": 2020, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fphys.2019.01585/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6989618, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144023279\", \"name\": \"Lu Peng\"}, {\"authorId\": \"2117946354\", \"name\": \"Qing Wang\"}, {\"authorId\": \"15171168\", \"name\": \"Mingmin Zou\"}, {\"authorId\": \"152300522\", \"name\": \"Yu-Dong Qin\"}, {\"authorId\": \"5122697\", \"name\": \"L. Vasseur\"}, {\"authorId\": \"40521680\", \"name\": \"L. Chu\"}, {\"authorId\": \"152620825\", \"name\": \"Yi-Long Zhai\"}, {\"authorId\": \"5316474\", \"name\": \"S. Dong\"}, {\"authorId\": \"2109507790\", \"name\": \"Li-li Liu\"}, {\"authorId\": \"153014112\", \"name\": \"Weiyi He\"}, {\"authorId\": \"2149520824\", \"name\": \"Guang Yang\"}, {\"authorId\": \"145760708\", \"name\": \"M. You\"}], \"abstract\": \"The vitellogenin receptor (VgR) belongs to the low-density lipoprotein receptor (LDLR) gene superfamily and plays an indispensable role in Vg transport, yolk deposition, and oocyte development. For this reason, it has become a promising target for pest control. The involvement of VgR in Vg transport and reproductive functions remains unclear in diamondback moths, Plutella xylostella (L.), a destructive pest of cruciferous crops. Here, we cloned and identified the complete cDNA sequence of P. xylostella VgR, which encoded 1805 amino acid residues and contained four conserved domains of LDLR superfamily. PxVgR was mainly expressed in female adults, more specifically in the ovary. PxVgR protein also showed the similar expression profile with the PxVgR transcript. CRISPR/Cas9-mediated PxVgR knockout created a homozygous mutant of P. xylostella with 5-bp-nucleotide deletion in the PxVgR. The expression deficiency of PxVgR protein was detected in the ovaries and eggs of mutant individuals. Vg protein was still detected in the eggs of the mutant individuals, but with a decreased expression level. However, PxVg transcripts were not significantly affected by the PxVgR knockout. Knockout of PxVgR resulted in shorter ovarioles of newly emerged females. No significant difference was detected between wild and mutant individuals in terms of the number of eggs laid in the first 3 days after mating. The loss of PxVgR gene resulted in smaller and whiter eggs and lower egg hatching rate. This study represents the first report on the functions of VgR in Vg transport, ovary development, oviposition, and embryonic development of P. xylostella using CRISPR/Cas9 technology. This study lays the foundation for understanding molecular mechanisms of P. xylostella reproduction, and for making use of VgR as a potential genetic-based molecular target for better control of the P. xylostella.\"}, {\"paperId\": \"0337d36784b8491d04421cc893fbcfe6f2e3ae80\", \"externalIds\": {\"DOI\": \"10.1016/j.bcp.2023.115470\", \"CorpusId\": 257327073, \"PubMed\": \"36870576\"}, \"title\": \"A Precisely Humanized Fcrn Transgenic Mouse For Preclinical Pharmacokinetics Studies.\", \"venue\": \"Biochemical Pharmacology\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bcp.2023.115470?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bcp.2023.115470, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1478546742\", \"name\": \"C. M. Conner\"}, {\"authorId\": \"2184149273\", \"name\": \"Don van Fossan\"}, {\"authorId\": \"2184149784\", \"name\": \"Kristen Read\"}, {\"authorId\": \"40154220\", \"name\": \"D. Cowley\"}, {\"authorId\": \"2184149692\", \"name\": \"O. Alvarez\"}, {\"authorId\": \"2110830321\", \"name\": \"Shan Xu\"}, {\"authorId\": \"2100510340\", \"name\": \"D. Webb\"}, {\"authorId\": \"5921145\", \"name\": \"K. Jarnagin\"}], \"abstract\": \"Monoclonal antibodies (mAbs) are one of the fastest-growing classes of drugs and have been approved to treat several diseases, including cancers and autoimmune disorders. Preclinical pharmacokinetics studies are performed to determine the therapeutically meaningful dosages and efficacy of candidate drugs. These studies are typically performed in non-human primates; however, using primates is costly and raises ethical considerations. As a result, rodent models that better mimic human-like pharmacokinetics have been generated and remain an area of active investigation. Pharmacokinetic characteristics of a candidate drug, such as half-life, are partly controlled by antibody binding to the human neonatal receptor hFCRN. Due to the abnormally high binding of human antibodies to mouse FCRN, traditional laboratory rodents do not accurately model the pharmacokinetics of human mAbs. In response, humanized rodents expressing hFCRN have been generated. However, these models generally use large inserts randomly integrated into the mouse genome. Here, we report the production and characterization of a CRISPR/Cas9-mediated hFCRN transgenic mouse termed SYNB-hFCRN. Using CRISPR/Cas9-assisted gene targeting, we prepared a strain with a simultaneous knockout of mFcrn and insertion of a hFCRN mini-gene under the control of the endogenous mouse promoter. These mice are healthy and express hFCRN in the appropriate tissues and immune cell subtypes. Pharmacokinetic evaluation of human IgG and adalimumab (Humira\\u00ae) demonstrate hFCRN-mediated protection. These newly generated SYNB-hFCRN mice provide another valuable animal model for use in preclinical pharmacokinetics studies during early drug development.\"}, {\"paperId\": \"033b7ec3b9b4eb2f6cd2bfca968efd487bc48a40\", \"externalIds\": {\"DOI\": \"10.1101/2024.11.27.624305\", \"CorpusId\": 274446576, \"PubMed\": \"40684990\"}, \"title\": \"Advanced Peptide Nanoparticles Enable Robust and Efficient delivery of gene editors across cell types\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/12/02/2024.11.27.624305.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.11.27.624305?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.11.27.624305, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1946033094\", \"name\": \"Oskar Gustafsson\"}, {\"authorId\": \"2284231529\", \"name\": \"Supriya Krishna\"}, {\"authorId\": \"2333430393\", \"name\": \"Sophia Borate\"}, {\"authorId\": \"1960425233\", \"name\": \"Marziyeh Ghaeidamini\"}, {\"authorId\": \"2146087709\", \"name\": \"Xiuming Liang\"}, {\"authorId\": \"15040103\", \"name\": \"Osama Saher\"}, {\"authorId\": \"2333430538\", \"name\": \"Raul Cuellar\"}, {\"authorId\": \"2333430370\", \"name\": \"Bj\\u00f6rn K. Birdsong\"}, {\"authorId\": \"2117484173\", \"name\": \"Samantha Roudi\"}, {\"authorId\": \"2333432187\", \"name\": \"H. Y. Estupi\\u00f1\\u00e1n\"}, {\"authorId\": \"4414193\", \"name\": \"E. Alici\"}, {\"authorId\": \"2206802362\", \"name\": \"C. Smith\"}, {\"authorId\": \"3678192\", \"name\": \"E. K. Esbj\\u00f6rner\"}, {\"authorId\": \"2284226975\", \"name\": \"Simone Spuler\"}, {\"authorId\": \"4581407\", \"name\": \"O. G. de Jong\"}, {\"authorId\": \"49048728\", \"name\": \"H. Escobar\"}, {\"authorId\": \"6849788\", \"name\": \"J. Nordin\"}, {\"authorId\": \"4886926\", \"name\": \"S. E. Andaloussi\"}], \"abstract\": \"Efficient delivery of the CRISPR/Cas9 system and its larger derivatives, base editors, and prime editors remain a significant challenge, particularly in tissue-specific stem cells and induced pluripotent stem cells (iPSCs). This study optimized a novel family of cell-penetrating peptides, hPep, to deliver gene-editing ribonucleoproteins. The hPep-based nanoparticles enable highly efficient and biocompatible delivery of Cre recombinase, Cas9, base-, and prime editors. Using base editors, robust and nearly complete genome editing was achieved in the human cells: HEK293T (96%), iPSCs (74%), and muscle stem cells (80%). This strategy opens promising avenues for ex vivo and, potentially, in vivo applications. Incorporating silica particles enhanced the system\\u2019s versatility, facilitating cargo-agnostic delivery. Notably, the nanoparticles can be synthesized quickly on a benchtop and stored as lyophilized powder without compromising functionality. This represents a significant advancement in the feasibility and scalability of gene-editing delivery technologies.\"}, {\"paperId\": \"033b84e33e492489b97246a7d4919a782367d531\", \"externalIds\": {\"PubMedCentral\": \"11472037\", \"DOI\": \"10.1093/nar/gkae781\", \"CorpusId\": 272647038, \"PubMed\": \"39271125\"}, \"title\": \"CRISETR: an efficient technology for multiplexed refactoring of biosynthetic gene clusters\", \"venue\": \"Nucleic Acids Research\", \"year\": 2024, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/nar/gkae781\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11472037, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2321105785\", \"name\": \"Fuqiang He\"}, {\"authorId\": \"2282344789\", \"name\": \"Xinpeng Liu\"}, {\"authorId\": \"2282277305\", \"name\": \"Min Tang\"}, {\"authorId\": \"2321151022\", \"name\": \"Haiyi Wang\"}, {\"authorId\": \"2321141035\", \"name\": \"Yun Wu\"}, {\"authorId\": \"2282357018\", \"name\": \"Shufang Liang\"}], \"abstract\": \"Abstract The efficient refactoring of natural product biosynthetic gene clusters (BGCs) for activating silent BGCs is a central challenge for the discovery of new bioactive natural products. Herein, we have developed a simple and robust CRISETR (CRISPR/Cas9 and RecET-mediated Refactoring) technique, combining clustered regulatory interspaced short palindromic repeats (CRISPR)/Cas9 and RecET, for the multiplexed refactoring of natural product BGCs. By this approach, natural product BGCs can be refactored through the synergistic interaction between RecET-mediated efficient homologous recombination and the CRISPR/Cas9 system. We first performed a proof-of-concept validation of the ability of CRISETR, and CRISETR can achieve simultaneous replacement of four promoter sites and marker-free replacement of single promoter site in natural product BGCs. Subsequently, we applied CRISETR to the promoter engineering of the 74-kb daptomycin BGC containing a large number of direct repeat sequences for enhancing the heterologous production of daptomycin. We used combinatorial design to build multiple refactored daptomycin BGCs with diverse combinations of promoters different in transcriptional strengths, and the yield of daptomycin was improved 20.4-fold in heterologous host Streptomyces coelicolor A3(2). In general, CRISETR exhibits enhanced tolerance to repetitive sequences within gene clusters, enabling efficient refactoring of diverse and complex BGCs, which would greatly accelerate discovery of novel bioactive metabolites present in microorganism.\"}, {\"paperId\": \"033bc4bada77551ddbfadef03445916744d6c4df\", \"externalIds\": {\"PubMedCentral\": \"10873588\", \"DOI\": \"10.1093/hr/uhad280\", \"CorpusId\": 266612279, \"PubMed\": \"38371637\"}, \"title\": \"Lskipk Lsatpase double mutants are necessary and sufficient for the compact plant architecture of butterhead lettuce\", \"venue\": \"Horticulture Research\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hr/advance-article-pdf/doi/10.1093/hr/uhad280/54915158/uhad280.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10873588, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144713971\", \"name\": \"Sai Xie\"}, {\"authorId\": \"2172003316\", \"name\": \"Guangbao Luo\"}, {\"authorId\": \"2059390265\", \"name\": \"Guanghui An\"}, {\"authorId\": \"88755266\", \"name\": \"Bincai Wang\"}, {\"authorId\": \"1919989\", \"name\": \"H. Kuang\"}, {\"authorId\": \"2270183982\", \"name\": \"Xin Wang\"}], \"abstract\": \"Abstract Lettuce, an important leafy vegetable crop worldwide, has rich variations in plant architecture. Butterhead lettuce, a popular horticultural type, has a unique plant architecture with loose leafy heads. The genetic and molecular mechanisms for such a compact plant architecture remain unclear. In this study we constructed a segregating population through crossing a butterhead cultivar and a stem lettuce cultivar. Genetic analysis identified the LsKIPK gene, which encodes a kinase, as the candidate gene controlling butterhead plant architecture. The Lskipk gene in the butterhead parent had a nonsense mutation, leading to a partial predicted protein. CRISPR/Cas9 and complementation tests verified its functions in plant architecture. We showed that the loss of function of LsKIPK is necessary but not sufficient for the butterhead plant architecture. To identify additional genes required for butterhead lettuce, we crossed a butterhead cultivar and a crisphead cultivar, both with the mutated Lskipk gene. Genetic mapping identified a new gene encoding an ATPase contributing to butterhead plant architecture. Knockout and complementation tests showed that loss of function of LsATPase is also required for the development of butterhead plant architecture. The Lskipk Lsatpase double mutation could reduce leaf size and leaf angle, leading to butterhead plant architecture. Expression and cytology analysis indicated that the loss of function of LsKIPK and LsATPase contributed to butterhead plant architecture by regulating cell wall development, a regulatory mechanism different from that for crisphead. This study provides new gene resources and theory for the breeding of the crop ideotype.\"}, {\"paperId\": \"033e28cf6ffd866bac5ea54b028b31291d2a7e26\", \"externalIds\": {\"MAG\": \"3034184621\", \"PubMedCentral\": \"7295971\", \"DOI\": \"10.1038/s41598-020-66775-3\", \"CorpusId\": 219637886, \"PubMed\": \"32541822\"}, \"title\": \"Abrogation of PRRSV infectivity by CRISPR-Cas13b-mediated viral RNA cleavage in mammalian cells\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 49, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-66775-3.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7295971, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2114353069\", \"name\": \"Jin Cui\"}, {\"authorId\": \"6982972\", \"name\": \"N. Techakriengkrai\"}, {\"authorId\": \"13466686\", \"name\": \"T. Nedumpun\"}, {\"authorId\": \"4528949\", \"name\": \"S. Suradhat\"}], \"abstract\": \"CRISPR/Cas9 enables dsDNA viral genome engineering. However, the lack of RNA targeting activities limits the ability of CRISPR/Cas9 to combat RNA viruses. The recently identified class II type VI CRISPR/Cas effectors (Cas13) are RNA-targeting CRISPR enzymes that enable RNA cleavage in mammalian and plant cells. We sought to knockdown the viral RNA of porcine reproductive and respiratory syndrome virus (PRRSV) directly by exploiting the CRISPR/Cas13b system. Effective mRNA cleavage by CRISPR/Cas13b-mediated CRISPR RNA (crRNA) targeting the ORF5 and ORF7 genes of PRRSV was observed. To address the need for uniform delivery of the Cas13b protein and crRNAs, an all-in-one system expressing Cas13b and duplexed crRNA cassettes was developed. Delivery of a single vector carrying double crRNAs enabled the simultaneous knockdown of two PRRSV genes. Transgenic MARC-145 cells stably expressing the Cas13b effector and crRNA mediated by lentiviral-based transduction showed a robust ability to splice the PRRSV genomic RNA and subgenomic RNAs; viral infection was almost completely abrogated by the combination of double crRNAs simultaneously targeting the ORF5 and ORF7 genes. Our study indicated that the CRISPR/Cas13b system can effectively knockdown the PRRSV genome in vitro and can potentially be used as a potent therapeutic antiviral strategy.\"}, {\"paperId\": \"033f9d54bbdbe01c98f5681f56787a8bbb7df15e\", \"externalIds\": {\"MAG\": \"3036568052\", \"DOI\": \"10.1101/2020.05.13.093575\", \"CorpusId\": 220046147, \"PubMed\": \"32574856\"}, \"title\": \"Efficient Gene Targeting in Maize using Inducible CRISPR-Cas9 and Marker-Free Donor Template\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 67, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S1674205220301866/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.05.13.093575?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.05.13.093575, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5271262\", \"name\": \"Pierluigi (Piero) Barone\"}, {\"authorId\": \"39276288\", \"name\": \"E. Wu\"}, {\"authorId\": \"5848637\", \"name\": \"B. Lenderts\"}, {\"authorId\": \"49095286\", \"name\": \"Ajith Anand\"}, {\"authorId\": \"1401353022\", \"name\": \"W. Gordon-Kamm\"}, {\"authorId\": \"8639963\", \"name\": \"S. Svitashev\"}, {\"authorId\": \"2109726116\", \"name\": \"Sandeep Kumar\"}], \"abstract\": \"CRISPR-Cas9 is a powerful tool for generating targeted mutations and genomic deletions. However, precise gene insertion or sequence replacement remains a major hurdle before application of CRISPR-Cas9 technology is fully realized in plant breeding. Here we report high frequency, selectable marker-free intra-genomic gene targeting (GT) in maize. Heat shock-inducible Cas9 was used for generating targeted double-strand breaks (DSBs) and simultaneous mobilization of the donor template from pre-integrated T-DNA. The construct was designed such that release of the donor template and subsequent DNA repair activated expression of the selectable marker gene within the donor locus. This approach generated up to 4.7% targeted insertion of the donor sequence into the target locus in T0 plants, with up to 86% detected donor template release and 99% mutation rate were observed at the donor loci and the genomic target site, respectively. Unlike previous in planta or intra-genomic homologous recombination reports, that required multiple generations and extensive screening, our method provides non-chimeric, heritable GT in the T0 generation.\"}, {\"paperId\": \"03411d10a5ee3dc66979542ac2afc0346746eb3d\", \"externalIds\": {\"PubMedCentral\": \"10896810\", \"DOI\": \"10.1007/s00018-024-05123-4\", \"CorpusId\": 267941137, \"PubMed\": \"38409392\"}, \"title\": \"The impact of VPS35 D620N mutation on alternative autophagy and its reversal by estrogen in Parkinson's disease\", \"venue\": \"Cellular and Molecular Life Sciences\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s00018-024-05123-4.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10896810, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"151237593\", \"name\": \"T. Shiraishi\"}, {\"authorId\": \"37690479\", \"name\": \"Keiko Bono\"}, {\"authorId\": \"2000580531\", \"name\": \"Hiromi Hiraki\"}, {\"authorId\": \"153340214\", \"name\": \"Yoko Manome\"}, {\"authorId\": \"2286929428\", \"name\": \"Hisayoshi Oka\"}, {\"authorId\": \"2201895029\", \"name\": \"Yasuyuki Iguchi\"}, {\"authorId\": \"2262239493\", \"name\": \"Hirotaka James Okano\"}], \"abstract\": \"VPS35 plays a key role in neurodegenerative processes in Alzheimer\\u2019s disease and Parkinson\\u2019s disease (PD). Many genetic studies have shown a close relationship between autophagy and PD pathophysiology, and specifically, the PD-causing D620N mutation in VPS35 has been shown to impair autophagy. However, the molecular mechanisms underlying neuronal cell death and impaired autophagy in PD are debated. Notably, increasing evidence suggests that Rab9-dependent \\u201calternative\\u201d autophagy, which is driven by a different molecular mechanism that driving ATG5-dependent \\u201cconventional\\u201d autophagy, also contributes to neurodegenerative process. In this study, we investigated the relationship between alternative autophagy and VPS35 D620N mutant-related PD pathogenesis. We isolated iPSCs from the blood mononuclear cell population of two PD patients carrying the VPS35 D620N mutant. In addition, we used CRISPR-Cas9 to generate SH-SY5Y cells carrying the D620N variant of VPS35. We first revealed that the number of autophagic vacuoles was significantly decreased in ATG5-knockout Mouse Embryonic Fibroblast or ATG5-knockdown patient-derived dopaminergic neurons carrying the VPS35 D620N mutant compared with that of the wild type VPS35 control cells. Furthermore, estrogen, which activates alternative autophagy pathways, increased the number of autophagic vacuoles in ATG5-knockdown VPS35 D620N mutant dopaminergic neurons. Estrogen induces Rab9 phosphorylation, mediated through Ulk1 phosphorylation, ultimately regulating alternative autophagy. Moreover, estrogen reduced the apoptosis rate of VPS35 D620N neurons, and this effect of estrogen was diminished under alternative autophagy knockdown conditions. In conclusion, alternative autophagy might be important for maintaining neuronal homeostasis and may be associated with the neuroprotective effect of estrogen in PD with VPS35 D620N.\"}, {\"paperId\": \"0341840f8a38eff2ad585b818a83826174ae581b\", \"externalIds\": {\"DOI\": \"10.51161/geneticon/9118\", \"CorpusId\": 251338535}, \"title\": \"A UTILIZA\\u00c7\\u00c3O DE H\\u00cdBRIDOS NA PRODU\\u00c7\\u00c3O DE HORTALI\\u00c7AS\", \"venue\": \"Anais do I Congresso Nacional de Pesquisas e Estudos Gen\\u00e9ticos On-line\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.51161/geneticon/9118?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.51161/geneticon/9118, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"94463178\", \"name\": \"C. Oliveira\"}, {\"authorId\": \"118180386\", \"name\": \"F. Silva\"}, {\"authorId\": \"153163804\", \"name\": \"Danilo Pereira\"}, {\"authorId\": \"2180456383\", \"name\": \"Ezildo Francisco Felinto Filho\"}, {\"authorId\": \"2110780326\", \"name\": \"M. Oliveira\"}], \"abstract\": \"Introdu\\u00e7\\u00e3o: Visando suprir a demanda nacional de hortali\\u00e7as diversas em quantidade, regularidade e qualidade, tornou-se necess\\u00e1rio o uso de cultivares h\\u00edbridas nos diferentes sistemas de cultivo. Os h\\u00edbridos apresentam como vantagens: maior produtividade quando comparada a sementes crioulas, adapta\\u00e7\\u00e3o a diferentes sistemas de cultivo e toler\\u00e2ncia/resist\\u00eancia \\u00e0s principais doen\\u00e7as que acometem a cultura. Objetivo: Esse trabalho consiste em uma revis\\u00e3o bibliogr\\u00e1fica sobre a utiliza\\u00e7\\u00e3o de h\\u00edbridos na produ\\u00e7\\u00e3o de hortali\\u00e7as, relatando os principais m\\u00e9todos e desafios para sua obten\\u00e7\\u00e3o. Material e m\\u00e9todos: A coleta de dados a respeito do tema foi realizada atrav\\u00e9s das plataformas Google Acad\\u00eamico, Portal de peri\\u00f3dicos da CAPES e SciElO, al\\u00e9m de sites, cat\\u00e1logos de empresas e contato com representantes t\\u00e9cnicos. Resultados: As informa\\u00e7\\u00f5es referentes aos \\u00faltimos quinze anos, indicaram que apenas com a chegada de empresas multinacionais o mercado de hortali\\u00e7as passou a apresentar uma maior diversidade de esp\\u00e9cies h\\u00edbridas. Os programas de melhoramento de hortali\\u00e7as, passaram a ser mais flex\\u00edveis para poder realizar ajustes de acordo com as exig\\u00eancias organol\\u00e9pticas do consumidor final. As etapas de um programa de melhoramento de hortali\\u00e7as consistem na sele\\u00e7\\u00e3o de linhagens ou parentais geneticamente est\\u00e1veis, o estabelecimento e exposi\\u00e7\\u00e3o da variabilidade gen\\u00e9tica a partir das combina\\u00e7\\u00f5es contrastantes, identifica\\u00e7\\u00e3o e sele\\u00e7\\u00e3o de prog\\u00eanies com atributos superiores, libera\\u00e7\\u00e3o e distribui\\u00e7\\u00e3o de comercializa\\u00e7\\u00e3o. Todas as etapas anteriores \\u00e0 distribui\\u00e7\\u00e3o, devem ser realizadas em estruturas protegidas para que ocorra o aumento da efici\\u00eancia e da qualidade gen\\u00e9tica da semente h\\u00edbrida. O tempo para obten\\u00e7\\u00e3o de hortali\\u00e7as h\\u00edbridas pode variar entre 6 e 10 anos para serem dependendo do ciclo reprodutivo da esp\\u00e9cie. Recentemente, t\\u00e9cnicas de edi\\u00e7\\u00e3o g\\u00eanica mediada por CRISPR/Cas9 est\\u00e3o sendo utilizadas para gera\\u00e7\\u00e3o de variabilidade gen\\u00e9tica em hortali\\u00e7as. Conclus\\u00e3o: Diferentes m\\u00e9todos de obten\\u00e7\\u00e3o de sementes h\\u00edbridas podem ser empregados, na maior parte das vezes, a escolha est\\u00e1 relacionada ao mecanismo de reprodu\\u00e7\\u00e3o da esp\\u00e9cie. Apesar de elevar o custo de produ\\u00e7\\u00e3o e o aumento do pre\\u00e7o da hortali\\u00e7a por causa do investimento em sementes h\\u00edbridas, sua utiliza\\u00e7\\u00e3o \\u00e9 ben\\u00e9fica em toda cadeia de comercializa\\u00e7\\u00e3o.\"}, {\"paperId\": \"0342fdb81d748a9b69abbe34f7b8033c711db872\", \"externalIds\": {\"MAG\": \"3000761312\", \"DOI\": \"10.1073/pnas.1915079117\", \"CorpusId\": 210871247, \"PubMed\": \"31964807\"}, \"title\": \"Cops5 safeguards genomic stability of embryonic stem cells through regulating cellular metabolism and DNA repair\", \"venue\": \"Proceedings of the National Academy of Sciences of the United States of America\", \"year\": 2020, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.pnas.org/content/pnas/117/5/2519.full.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1073/pnas.1915079117?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1073/pnas.1915079117, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2194231758\", \"name\": \"Peng Li\"}, {\"authorId\": \"1610766304\", \"name\": \"Lulu Gao\"}, {\"authorId\": \"2053996248\", \"name\": \"Tong Cui\"}, {\"authorId\": \"2107988641\", \"name\": \"Weiyu Zhang\"}, {\"authorId\": \"2519659\", \"name\": \"Zixin Zhao\"}, {\"authorId\": \"79363789\", \"name\": \"Lingyi Chen\"}], \"abstract\": \"Significance Genome integrity is required for clinical applications of pluripotent stem cells. Two major strategies, maintaining low levels of reactive oxygen species (ROS) and high DNA damage repair (DDR) activities, are applied by embryonic stem cells (ESCs) to secure their genomic stability. Here, we demonstrate the pivotal role of Cops5 in safeguarding genome integrity of ESCs. Through regulating the autophagic degradation of Mtch2, Cops5 suppresses oxidative phosphorylation and ROS production, thereby reducing endogenous DNA damage. Meanwhile, Cops5 is also involved in maintaining high DDR activities, including nucleotide excision repair, nonhomologous end joining, and homologous recombination, in ESCs. The highly conserved COP9 signalosome (CSN), composed of 8 subunits (Cops1 to Cops8), has been implicated in pluripotency maintenance of human embryonic stem cells (ESCs). Yet, the mechanism for the CSN to regulate pluripotency remains elusive. We previously showed that Cops2, independent of the CSN, is essential for the pluripotency maintenance of mouse ESCs. In this study, we set out to investigate how Cops5 and Cops8 regulate ESC differentiation and tried to establish Cops5 and Cops8 knockout (KO) ESC lines by CRISPR/Cas9. To our surprise, no Cops5 KO ESC clones were identified out of 127 clones, while three Cops8 KO ESC lines were established out of 70 clones. We then constructed an inducible Cops5 KO ESC line. Cops5 KO leads to decreased expression of the pluripotency marker Nanog, proliferation defect, G2/M cell-cycle arrest, and apoptosis of ESCs. Further analysis revealed dual roles of Cops5 in maintaining genomic stability of ESCs. On one hand, Cops5 suppresses the autophagic degradation of Mtch2 to direct cellular metabolism toward glycolysis and minimize reactive oxygen species (ROS) production, thereby reducing endogenous DNA damage. On the other hand, Cops5 is required for high DNA damage repair (DDR) activities in ESCs. Without Cops5, elevated ROS and reduced DDR activities lead to DNA damage accumulation in ESCs. Subsequently, p53 is activated to trigger G2/M arrest and apoptosis. Altogether, our studies reveal an essential role of Cops5 in maintaining genome integrity and self-renewal of ESCs by regulating cellular metabolism and DDR pathways.\"}, {\"paperId\": \"0347c725dba181e79cbf0241aa88dc322a9e2648\", \"externalIds\": {\"PubMedCentral\": \"8996936\", \"DOI\": \"10.3390/cancers14071655\", \"CorpusId\": 247731809, \"PubMed\": \"35406427\"}, \"title\": \"TERT Expression in Wilms Tumor Is Regulated by Promoter Mutation or Hypermethylation, WT1, and N-MYC\", \"venue\": \"Cancers\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2072-6694/14/7/1655/pdf?version=1648454648\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8996936, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34740930\", \"name\": \"Carolyn M. Jablonowski\"}, {\"authorId\": \"38768787\", \"name\": \"H. Gil\"}, {\"authorId\": \"145756628\", \"name\": \"E. Pinto\"}, {\"authorId\": \"13327974\", \"name\": \"Prahalathan Pichavaram\"}, {\"authorId\": \"2061440806\", \"name\": \"A. Fleming\"}, {\"authorId\": \"5991851\", \"name\": \"Michael R. Clay\"}, {\"authorId\": \"11022980\", \"name\": \"Dongli Hu\"}, {\"authorId\": \"144394285\", \"name\": \"C. Morton\"}, {\"authorId\": \"1403966623\", \"name\": \"S. Pruett-Miller\"}, {\"authorId\": \"2111041641\", \"name\": \"Baranda S. Hansen\"}, {\"authorId\": \"2143737850\", \"name\": \"Xiang Chen\"}, {\"authorId\": \"89188680\", \"name\": \"K. Jones\"}, {\"authorId\": \"46398740\", \"name\": \"Yanling Liu\"}, {\"authorId\": \"2532296\", \"name\": \"Xiaotu Ma\"}, {\"authorId\": \"2146157042\", \"name\": \"Jun Yang\"}, {\"authorId\": \"6089818\", \"name\": \"A. Davidoff\"}, {\"authorId\": \"35010778\", \"name\": \"G. Zambetti\"}, {\"authorId\": \"48774633\", \"name\": \"A. Murphy\"}], \"abstract\": \"Simple Summary The telomerase enzyme adds repetitive genetic sequences to the ends of chromosomes called telomeres to prevent cellular senescence. Gain of telomerase function is one of the hallmarks of human cancer. The telomerase protein is coded by the gene TERT and increased TERT RNA levels have been associated with disease relapse in Wilms tumor, the most common kidney cancer of childhood. This study aimed to determine the mechanisms of increased TERT expression in Wilms tumor. This study found mutations in the TERT promoter, increased methylation of the TERT promoter, and genomic copy number amplifications of TERT as potential mechanisms of TERT activation. Conversely, this study found that inactivating WT1 mutation was associated with low TERT RNA levels and telomerase activity. N-MYC overexpression in Wilms tumor cells resulted in increased TERT promoter activity and TERT transcription. TERT transcription is associated with molecular and histologic subgroups in Wilms tumor and telomere-targeted therapies warrant future investigation. Abstract Increased TERT mRNA is associated with disease relapse in favorable histology Wilms tumor (WT). This study sought to understand the mechanism of increased TERT expression by determining the association between TERT and WT1 and N-MYC, two proteins important in Wilms tumor pathogenesis that have been shown to regulate TERT expression. Three out of 45 (6.7%) WTs and the corresponding patient-derived xenografts harbored canonical gain-of-function mutations in the TERT promoter. This study identified near ubiquitous hypermethylation of the TERT promoter region in WT compared to normal kidney. WTs with biallelic inactivating mutations in WT1 (7/45, 15.6%) were found to have lower TERT expression by RNA-seq and qRT-PCR and lower telomerase activity determined by the telomerase repeat amplification protocol. Anaplastic histology and increased percentage of blastema were positively correlated with higher TERT expression and telomerase activity. In vitro shRNA knockdown of WT1 resulted in decreased expression of TERT, reduced colony formation, and decreased proliferation of WiT49, an anaplastic WT cell line with wild-type WT1. CRISPR-Cas9-mediated knockout of WT1 resulted in decreased expression of telomere-related gene pathways. However, an inducible Wt1-knockout mouse model showed no relationship between Wt1 knockout and Tert expression in normal murine nephrogenesis, suggesting that WT1 and TERT are coupled in transformed cells but not in normal kidney tissues. N-MYC overexpression resulted in increased TERT promoter activity and TERT transcription. Thus, multiple mechanisms of TERT activation are involved in WT and are associated with anaplastic histology and increased blastema. This study is novel because it identifies potential mechanisms of TERT activation in Wilms tumor that could be of therapeutic interests.\"}, {\"paperId\": \"03484a51544fe2e81a1c50f9bdf6330a27635dfc\", \"externalIds\": {\"MAG\": \"3201354808\", \"DOI\": \"10.1080/10736700.2020.1879464\", \"CorpusId\": 240554758}, \"title\": \"CRISPR and new genetic-engineering techniques: emerging challenges to strategic stability and nonproliferation\", \"venue\": \"The Nonproliferation Review\", \"year\": 2020, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/10736700.2020.1879464?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/10736700.2020.1879464, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50161451\", \"name\": \"M. Kosal\"}], \"abstract\": \"ABSTRACT This article explores the potential for new biotechnologically enabled weapons to compete with nuclear weapons in the context of strategic stability, assesses how such new technologies may affect assumptions in traditional strategic-stability models when applied to such scenarios, and how changing capabilities and adversaries may shape approaches to nonproliferation, verification, and monitoring. Among the most recent additions to the genome-editing arsenal is CRISPR (clustered regularly interspaced short palindromic repeats), a bacteria-derived system that is among the simplest genome-editing tools. The CRISPR-Cas9 system\\u2014and emerging variants of the system\\u2014enables unprecedented control and ease when editing the genome. With parallels to remote \\u201ccommand and control\\u201d of the genome, this aspect makes the technology different from earlier gene-editing methods. This article furthers the scholarly work on the biosecurity implications of CRISPR, gene editing, and broader issues of biotechnology by addressing these emerging life-science technologies in the context of nuclear strategic stability and implications for balance of power, nonproliferation, and international security.\"}, {\"paperId\": \"034ae9ce3bd50da79663d424cddb7c8ea57de598\", \"externalIds\": {\"MAG\": \"3032590616\", \"PubMedCentral\": \"7251672\", \"DOI\": \"10.1186/s13287-020-01729-0\", \"CorpusId\": 218898875, \"PubMed\": \"32460847\"}, \"title\": \"Role of CD133 in human embryonic stem cell proliferation and teratoma formation\", \"venue\": \"Stem cell research & therapeutics\", \"year\": 2020, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://stemcellres.biomedcentral.com/track/pdf/10.1186/s13287-020-01729-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7251672, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2197900825\", \"name\": \"Hua Wang\"}, {\"authorId\": \"2057715988\", \"name\": \"Peng Gong\"}, {\"authorId\": \"2155870515\", \"name\": \"Jie Li\"}, {\"authorId\": \"148389494\", \"name\": \"Yudong Fu\"}, {\"authorId\": \"2028223495\", \"name\": \"Zhongcheng Zhou\"}, {\"authorId\": \"2146017599\", \"name\": \"Lin Liu\"}], \"abstract\": \"Background Pluripotent stem cells (PSCs), including human embryonic stem cells (hESCs), hold great potential for regenerative medicine and cell therapy. One of the major hurdles hindering the clinical development of PSC-based therapy is the potential risk of tumorigenesis. CD133 (Prominin 1, PROM1) is a transmembrane protein whose mRNA and glycosylated forms are highly expressed in many human cancer cell types. CD133 also serves as a cancer stem cell (CSC) marker associated with cancer progression and patient outcome. Interestingly, CD133 is highly expressed in hESCs as well as in human preimplantation embryos, but its function in hESCs has remained largely unknown. Methods CD133 knockout hESC WA26 cell line was generated with CRISPR/Cas9. CD133 knockout and wide type hESC lines were subjected to pluripotency, proliferation, telomere biology, and teratoma tests; the related global changes and underlying mechanisms were further systemically analyzed by RNA-seq. Results CD133 deficiency did not affect hESC pluripotency or in vivo differentiation into three germ layers but significantly decreased cell proliferation. RNA-seq revealed that CD133 deficiency dysregulated the p53, PI3K-Akt, AMPK, and Wnt signaling pathways. Alterations in these pathways have been implicated in tumor proliferation and apoptotic escape. Conclusions Our data imply that CD133 could be an additional target and used as a selective marker to sort and eliminate undifferentiated cells in reducing potential teratoma formation risk of hESCs in regenerative medicine.\"}, {\"paperId\": \"034d7c9316c4bf0a5a257c49c86f9f9e6fa7bebe\", \"externalIds\": {\"MAG\": \"3206228986\", \"DOI\": \"10.18725/OPARU-38993\", \"CorpusId\": 245000820}, \"title\": \"Generierung eines CRISPR/Cas9-Knockouts des Kardiomyopathie-Gens Nexilin im Zebrafisch und Untersuchungen zu Nexilin-Interaktoren\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.18725/OPARU-38993?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.18725/OPARU-38993, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2058155965\", \"name\": \"M. Huber\"}], \"abstract\": null}, {\"paperId\": \"034dbb1d6b28c32b973a5ca0e15cd51a1f342cd0\", \"externalIds\": {\"CorpusId\": 219301007}, \"title\": \"Verification of CRISPR editing by XdropTM Indirect Sequence Capture followed by short- and long- read sequencing Blondal\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2247590300\", \"name\": \"Thorarinn\"}, {\"authorId\": \"2247593841\", \"name\": \"Gamba\"}, {\"authorId\": \"2247593827\", \"name\": \"Cristina\"}, {\"authorId\": \"2247442886\", \"name\": \"Johnston\"}, {\"authorId\": \"2247594515\", \"name\": \"M. Camille\"}, {\"authorId\": \"2247597513\", \"name\": \"M. RiisingEva\"}, {\"authorId\": \"2247599188\", \"name\": \"M. Marie\"}, {\"authorId\": \"1738700406\", \"name\": \"M. Peter\"}, {\"authorId\": \"2247599020\", \"name\": \"Peter Mouritzen\"}], \"abstract\": null}, {\"paperId\": \"034f0cafe04c2216ee20898e0d7de46adcb31fcb\", \"externalIds\": {\"DOI\": \"10.1016/j.ymgme.2023.107508\", \"CorpusId\": 255925171, \"PubMed\": \"36709532\"}, \"title\": \"Glb1 knockout mouse model shares natural history with type II GM1 gangliosidosis patients.\", \"venue\": \"Molecular Genetics and Metabolism\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.sciencedirect.com/science/article/am/pii/S1096719223001385\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymgme.2023.107508?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymgme.2023.107508, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40360906\", \"name\": \"Elena-Raluca Nicoli\"}, {\"authorId\": \"5873934\", \"name\": \"Mylene Huebecker\"}, {\"authorId\": \"49107081\", \"name\": \"Sangwoo T Han\"}, {\"authorId\": \"2152406566\", \"name\": \"Karolyn Garcia\"}, {\"authorId\": \"47400006\", \"name\": \"J. Munasinghe\"}, {\"authorId\": \"2265948\", \"name\": \"M. Lizak\"}, {\"authorId\": \"1389132196\", \"name\": \"Yvonne L. Latour\"}, {\"authorId\": \"1404266718\", \"name\": \"Robin Yoon\"}, {\"authorId\": \"91682347\", \"name\": \"Brianna Glase\"}, {\"authorId\": \"52178271\", \"name\": \"Michal Tyrlik\"}, {\"authorId\": \"2141469371\", \"name\": \"Morteza Peiravi\"}, {\"authorId\": \"39663097\", \"name\": \"D. Springer\"}, {\"authorId\": \"145302551\", \"name\": \"E. Baker\"}, {\"authorId\": \"143885832\", \"name\": \"D. Priestman\"}, {\"authorId\": \"36770074\", \"name\": \"Rohini Sidhu\"}, {\"authorId\": \"38419303\", \"name\": \"Pamela J. Kell\"}, {\"authorId\": \"4254545\", \"name\": \"Xuntian Jiang\"}, {\"authorId\": \"2159489921\", \"name\": \"Josephine Kolstad\"}, {\"authorId\": \"49393577\", \"name\": \"A. Kuhn\"}, {\"authorId\": \"7433243\", \"name\": \"M. Shazeeb\"}, {\"authorId\": \"39756055\", \"name\": \"M. Acosta\"}, {\"authorId\": \"3776118\", \"name\": \"R. Proia\"}, {\"authorId\": \"145618439\", \"name\": \"F. Platt\"}, {\"authorId\": \"4988995\", \"name\": \"C. Tifft\"}], \"abstract\": \"GM1 gangliosidosis is a rare lysosomal storage disorder affecting multiple organ systems, primarily the central nervous system, and is caused by functional deficiency of \\u03b2-galactosidase (GLB1). Using CRISPR/Cas9 genome editing, we generated a mouse model to evaluate characteristics of the disease in comparison to GM1 gangliosidosis patients. Our Glb1-/- mice contain small deletions in exons 2 and 6, producing a null allele. Longevity is approximately 50 weeks and studies demonstrated that female Glb1-/- mice die six weeks earlier than male Glb1-/- mice. Gait analyses showed progressive abnormalities including abnormal foot placement, decreased stride length and increased stance width, comparable with what is observed in type II GM1 gangliosidosis patients. Furthermore, Glb1-/- mice show loss of motor skills by 20 weeks assessed by adhesive dot, hanging wire, and inverted grid tests, and deterioration of motor coordination by 32 weeks of age when evaluated by rotarod testing. Brain MRI showed progressive cerebellar atrophy in Glb1-/- mice as seen in some patients. In addition, Glb1-/- mice also show significantly increased levels of a novel pentasaccharide biomarker in urine and plasma which we also observed in GM1 gangliosidosis patients. Glb1-/- mice also exhibit accumulation of glycosphingolipids in the brain with increases in GM1 and GA1 beginning by 8 weeks. Surprisingly, despite being a null variant, this Glb1-/- mouse most closely models the less severe type II disease and will guide the development of new therapies for patients with the disorder.\"}, {\"paperId\": \"035015439b964fb66c6d903473039be905157170\", \"externalIds\": {\"MAG\": \"3023972687\", \"DOI\": \"10.1101/2020.05.08.084426\", \"CorpusId\": 232261811, \"PubMed\": \"33728790\"}, \"title\": \"The consensus Nglyco-X-S/T motif and a previously unknown Nglyco-N -linked glycosylation are necessary for growth and pathogenicity of Phytophthora\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/05/09/2020.05.08.084426.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.05.08.084426?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.05.08.084426, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1666979126\", \"name\": \"Can Zhang\"}, {\"authorId\": \"5681498\", \"name\": \"Shanshan Chen\"}, {\"authorId\": \"2220587479\", \"name\": \"Fan Zhang\"}, {\"authorId\": \"1621957934\", \"name\": \"Tongshan Cui\"}, {\"authorId\": \"1621978216\", \"name\": \"Zhaolin Xue\"}, {\"authorId\": \"1390876141\", \"name\": \"Weizhen Wang\"}, {\"authorId\": \"1490811286\", \"name\": \"Borui Zhang\"}, {\"authorId\": \"2108704376\", \"name\": \"Xili Liu\"}], \"abstract\": \"Asparagine (Asn, N) -linked glycosylation within the glycosylation motif (Nglyco-X-S/T; X\\u2260P) is a ubiquitously distributed post-translational modification that participates in diverse eukaryotic cellular processes. However, little is known about the characteristic features and roles of N-glycosylation in oomycetes. In this work, it found that 2.5 \\u03bcg/ml tunicamycin (N-glycosylation inhibitor) completely inhibited Phytophthora sojae growth, suggesting that N-glycosylation is necessary for oomycete development. We conducted a glycoproteomic analysis of P. sojae to identify and map all N-glycosylated proteins and to quantify differentially expressed glycoproteins associated with mycelia, asexual cysts, and sexual oospores. A total of 355 N-glycosylated proteins were found, containing 496 glycosites that likely participate in glycan degradation, carbon metabolism, glycolysis, or other central metabolic pathways. To verify the glycoproteomic results and further examine the function of N-glycosylation in P. sojae, two proteins were selected for PNGase F deglycosylation assays and CRISPR/Cas9-mediated site-directed mutagenesis, including a GPI transamidase protein (GPI16) up-regulated in cysts, with the consensus Nglyco-X-S/T motif at Asn 94, and a heat shock protein 70 (HSP70) up-regulated in cysts and oospores with a previously unknown Nglyco-N motif at Asn 270. We demonstrated that the GPI16 and HSP70 are both N-glycosylated proteins, confirming that the Nglyco-N motif is a target site for asparagine - oligosaccharide N-glycosidic linkage. Glycosite mutations of Asn 94 in the GPI16 led to impaired cyst germination and pathogenicity, while HSP70 mutants exhibited decreased cyst germination and oospore production. This work describes an integrated map of oomycete N-glycoproteomes and advances our understanding of N-glycosylation in oomycetes. Moreover, we confirm that the consensus Nglyco-X-S/T and the Nglyco-N -linked glycosites are both essential for the growth of Phytophthora sojae, indicating that there are multiple N-glycosylation motifs in oomycetes.\"}, {\"paperId\": \"035265e92e9d113c23d4dfccad3ee362d0a9efcf\", \"externalIds\": {\"DOI\": \"10.36233/0507-4088-2020-65-6-2\", \"CorpusId\": 263531650, \"PubMed\": \"33533228\"}, \"title\": \"[The role of herpesviruses in development of diseases of the urogenital tract and infertility in women].\", \"venue\": \"Voprosy virusologii\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://virusjour.crie.ru/jour/article/download/455/284\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.36233/0507-4088-2020-65-6-2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.36233/0507-4088-2020-65-6-2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2250635602\", \"name\": \"A. A. Kushch\"}, {\"authorId\": \"3664181\", \"name\": \"L. Kisteneva\"}, {\"authorId\": \"144106589\", \"name\": \"R. Klimova\"}, {\"authorId\": \"2252293713\", \"name\": \"S. G. Cheshik\"}], \"abstract\": \"This review presents the data on the spreading of all known human herpesviruses (\\u041dHVs) in female urogenital tract. According to the WHO almost 500 million people worldwide suffer from genital infection caused by \\u041dHVs. \\u041dHVs were detected in various inflammatory diseases of female upper and lower genital tract (vaginitis and cervicitis), in extrauterine pregnancy (in fallopian tubes), in infertility (cervical channel, endometrium and ovaries). Herpes simplex virus 1 (HSV\\u20111) was identified for the first time in oocytes after failed in vitro fertilization (IVF). \\u041dHVs produce negative effect on the entire reproductive process from conception to childbirth. It was established that HSV, cytomegalovirus (CMV) and human herpesvirus 6 (HHV-6) markedly increase the risk of spontaneous abortion, preterm birth and stillbirth. Intrauterine \\u041dHV infection is a major cause of congenital malformations. Data on humoral and cell immunity in genital herpesvirus infections (\\u041dHVI) are also reviewed. Intravaginal HSV\\u20112 infection changes cell composition of vaginal mucosa, i.e., together with cells mobilized from the blood, protective role is performed by resident memory T\\u2011cells (TRM), natural killer cells (NK\\u2011cells) and regulatory T\\u2011cells (Treg) whose function consists in maintaining the balance of the activities of lymphocytes. Constant \\u041dHVI spreading is largely explained by transition of primary infection to potentially reactivating latent form, since latent virus is unavailable to immune recognition and medicines. The genome editing system CRISPR/Cas9 can recognize and modify not only active but also latent viruses. The promising pilot results with the use of this system offer the possibility of developing innovative technologies for \\u041dHV elimination and \\u041dHVI eradication.\"}, {\"paperId\": \"03534f990126970c142f21c19f26a50846aac4ef\", \"externalIds\": {\"DOI\": \"10.1101/2022.02.27.481379\", \"CorpusId\": 248050343, \"PubMed\": \"35396726\"}, \"title\": \"CLE42 Delays Leaf Senescence by Antagonizing Ethylene Pathway in Arabidopsis\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 50, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/03/01/2022.02.27.481379.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.02.27.481379?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.02.27.481379, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153910905\", \"name\": \"Yi Zhang\"}, {\"authorId\": \"2151467548\", \"name\": \"Shuya Tan\"}, {\"authorId\": \"2282243008\", \"name\": \"Yu-han Gao\"}, {\"authorId\": \"2065417272\", \"name\": \"Chen Kan\"}, {\"authorId\": \"48016660\", \"name\": \"Hou-ling Wang\"}, {\"authorId\": \"2143516634\", \"name\": \"Qi Yang\"}, {\"authorId\": \"7891981\", \"name\": \"X. Xia\"}, {\"authorId\": \"2069409253\", \"name\": \"Takashi Ishida\"}, {\"authorId\": \"2847845\", \"name\": \"S. Sawa\"}, {\"authorId\": \"47331517\", \"name\": \"Hongwei Guo\"}, {\"authorId\": \"151480067\", \"name\": \"Zhonghai Li\"}], \"abstract\": \"Leaf senescence is the final stage of leaf development and is influenced by numerous internal and environmental factors. CLE family peptides are plant-specific peptide hormones that regulate various developmental processes. However, the role of CLE in regulating leaf senescence remains unclear. Here, we found that CLE42 is a negative regulator of leaf senescence by using a CRISPR/Cas9-produced CLE mutant collection. The cle42 mutant displayed earlier senescence phenotypes, while overexpression of CLE42 delayed age-dependent and dark-induced leaf senescence. Moreover, application of the synthesized 12-aa peptide (CLE42p) also delayed leaf senescence under natural and dark conditions. CLE42 and CLE41/44 displayed functional redundancy in leaf senescence, and the cle41 cle42 cle44 triple mutant displayed more pronounced earlier senescence phenotypes than any single mutant. Analysis of differentially expressed genes obtained by RNA-Seq methodology revealed that ethylene pathway was suppressed by overexpressing CLE42. Moreover, CLE42 suppressed ethylene biosynthesis and thus promoted the protein accumulation of EBF, which in turn decreased the function of EIN3. Accordingly, mutation of EIN3/EIL1 or overexpression of EBF1 suppressed the earlier senescence phenotypes of the cle42 mutant. Together, our results reveal that the CLE peptide hormone regulates leaf senescence by communicating with ethylene pathway.\"}, {\"paperId\": \"0353b69e4cbfffc4c8be1edf5fe854a1fc6385a7\", \"externalIds\": {\"MAG\": \"3030728637\", \"PubMedCentral\": \"7305269\", \"DOI\": \"10.1007/s13238-020-00732-8\", \"CorpusId\": 218879396, \"PubMed\": \"32451721\"}, \"title\": \"FAK-targeting PROTAC as a chemical tool for the investigation of non-enzymatic FAK function in mice\", \"venue\": \"Protein & Cell\", \"year\": 2020, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s13238-020-00732-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7305269, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34156515\", \"name\": \"Hongying Gao\"}, {\"authorId\": \"6473093\", \"name\": \"Chunwei Zheng\"}, {\"authorId\": \"5514720\", \"name\": \"Jianjie du\"}, {\"authorId\": \"2144792433\", \"name\": \"Yue Wu\"}, {\"authorId\": \"46675278\", \"name\": \"Yonghui Sun\"}, {\"authorId\": \"36536169\", \"name\": \"Chunsheng Han\"}, {\"authorId\": \"4200379\", \"name\": \"Kehkooi Kee\"}, {\"authorId\": \"2084601136\", \"name\": \"Yu Rao\"}], \"abstract\": \"Animal models, most commonly mice, that lack a protein of interest play an important role in phenotypic and functional studies of a target gene, allowing researchers to answer various biological questions (Chaible et al., 2010). At present, a variety of tools act at the DNA or RNA level to enable researchers to model gene function (and thus protein) deficiency, including nucleic acid-based RNA interference (Elbashir et al., 2001), antisense oligonucleotides (Schoch and Miller, 2017), and genome editing-based CRISPR-Cas9 (Doudna and Charpentier, 2014) strategies. However, challenges remain. RNA and DNA-based technologies lack exquisite temporal control of the target gene at specified time points in an organism\\u2019s development, and they fail to realize acute and reversible target gene function (Chan, 2013). These shortcomings have garnered widespread concern in both fundamental research and drug development. Furthermore, gene knockout will often lead to embryonic lethality, precluding the study of post-embryonic pathophysiological functions of target genes and proteins of interest (Dhanjal et al., 2017). Proteolysis targeting chimera (PROTAC) is a novel chemical knockdown technology for the post-translational study of proteins of interest. PROTACs are hetero-bifunctional small molecules, which can drive E3 ubiquitin ligase to bind with the target protein, resulting in ubiquitination of the target protein and consequent proteasome-mediated degradation (Raina and Crews, 2010) (Fig. 1A). Unlike classic inhibitors, PROTAC eliminates rather than inhibits both enzymatic and non-enzymatic protein functions. Furthermore, unlike nucleic acid (e.g., siRNA) and genome editing-based (e.g., CRISPR-Cas9) strategies (Cong et al., 2013; Deng et al., 2014), the small molecule-based PROTAC approach is capable of degrading target proteins without requiring any genetic manipulation, guaranteeing the integrity and stability of the genome, which especially suitable for knockdown of embryonic lethal protein. Thus, PROTACs offer significantly broader therapeutic applicability than DNA or RNA-targeting strategies for protein knockdown in vivo. Focal adhesion kinase (FAK), an embryonic lethal protein, exerts kinase-dependent enzymatic functions and kinaseindependent scaffolding functions (Hall et al., 2011). Both functions are crucial in reproduction and early embryonic development (Gungor-Ordueri et al., 2014). Many essential non-enzymatic functions of FAK cannot be investigated with reported FAK kinase inhibitors. To the best of our knowledge, the PROTAC strategy has not been used to study the nonenzymatic function of FAK in vivo. It is also unknown whether FAK PROTACs will yield different phenotypes or reveal different FAK functions than kinase-dependent FAK inhibitors in vivo. For these reasons, we have chosen FAK as a target to demonstrate the potential utility of the PROTAC strategy for the study of non-enzymatic protein function in mouse reproductive system in vivo. Based on the previous studies of our laboratory, we synthesised the FAK-targeting PROTAC library with FAK ligand of PF562271, cereblon (CRBN)-based E3 ubiquitin ligase ligand of thalidomide, and a variable length of polyethylene glycol or alkyl linkers (Fig. S1). Firstly, we screened the degradation effect of FAK targeting PROTAC molecules in mice primary reproductive related cells. We separated and purified testis-related cells, including primary Sertoli cells and primary germ cells, from 6 dpp C57BL/6N mice, and tested whether degradation resulted from FAK PROTAC library molecules in these primary cells. A remarkable degradation effect, with a DC50 of 1.3 nmol/L for primary Sertoli cells and 0.4 nmol/L for primary germ cells, was observed from FAK-PROTAC library molecules, which we confirmed it is FC-11, a PROTAC from our previous reported work (Gao et al., 2019) (Fig. 1B\\u2013D). The optimized synthesis route of FC-11 was shown in Supplementary Materials (Scheme 1). Next, in order to overcome the defect of FAK knockdown in vivo caused by existing genetic tools and to clarify the effect of PROTAC tools on the non-enzymatic function of protein in the mouse reproductive system, a few critical issues need to be addressed: 1. Can FC-11 degrade FAK in vivo? 2. If it can, is there any different phenotypes between FAK PROTAC and FAK inhibitor? 3. Is the FAK protein degradation reversible?\"}, {\"paperId\": \"0353c9ed5ab607db498b95a8eb6538c2f9e56461\", \"externalIds\": {\"PubMedCentral\": \"9367451\", \"DOI\": \"10.3390/cancers14153756\", \"CorpusId\": 251334807, \"PubMed\": \"35954420\"}, \"title\": \"Actin Retrograde Flow Regulated by the Wiskott\\u2013Aldrich Syndrome Protein Drives the Natural Killer Cell Response\", \"venue\": \"Cancers\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2072-6694/14/15/3756/pdf?version=1659955820\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9367451, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"9725927\", \"name\": \"Batel Sabag\"}, {\"authorId\": \"2067842965\", \"name\": \"Mary Levy\"}, {\"authorId\": \"35303734\", \"name\": \"Jessica Kivelevitz\"}, {\"authorId\": \"2180497836\", \"name\": \"Nataly Dashevsky\"}, {\"authorId\": \"1401031957\", \"name\": \"Aviad Ben-Shmuel\"}, {\"authorId\": \"1958744643\", \"name\": \"Abhishek Puthenveetil\"}, {\"authorId\": \"2253123391\", \"name\": \"Fatima Awwad\"}, {\"authorId\": \"1398161523\", \"name\": \"M. Barda\\u2010Saad\"}], \"abstract\": \"Simple Summary Immune cells sense mechanical stimuli from their microenvironment by transducing them into biochemical signals through mechanosensors, in a process called mechanotransduction. The cytoskeleton mediates mechanotransduction in response to local environmental changes. The cytoskeletal component, actin, provides the structural basis for the NK cell immunological synapse (NKIS) and polarization of the signaling complex and secretory apparatus. Actin-mediated mechanotransduction is essential to adjust and to improve the natural killer (NK) cell response to changes induced by the microenvironment. Wiskott\\u2013Aldrich Syndrome protein (WASp), another key cytoskeletal component, plays a role in actin filament nucleation, and hence it\\u2019s branching toward the membrane. Here, we found that WASp regulates mechanotransduction by controlling F-actin movement thereby modulating NK cell signaling and the equilibrium between activation versus inhibition. WASp regulation of the actin retrograde flow (ARF) provides a novel mechanism to modulate the functional outcome of NK cells in response to their environment. Abstract Understanding the crosstalk between natural killer (NK) cells and the tumor microenvironment (TME) has enhanced the potential of exploiting the interplay between activation and inhibition of NK cells for immunotherapy. This interaction is crucial for understanding how tumor cells escape NK cell immune surveillance. NK cell dysfunction is regulated by two molecular mechanisms, downregulated activating receptor ligand expression on the tumor cells, and upregulated inhibitory signals delivered to NK cells. Recent studies demonstrated the role of mechanotransduction in modulating NK cell responses in the TME. The immunological synapse represents a functional interface between the NK cell and its target, regulated by Actin Retrograde Flow (ARF), which drives the adhesion molecules and receptors toward the central zone of the immunological synapse (IS). Here, we further characterize the role of ARF in controlling the immune response of NK cells, using CRISPR/cas9-mediated Wiskott\\u2013Aldrich Syndrome protein (WASp) gene silencing of NK cells. We demonstrate that WASp regulates ARF velocity, affecting the conformation and function of the key NK inhibitory regulator, SH2-domain containing protein tyrosine phosphatase-1 (SHP-1), and consequently, the NK cell response. Our results demonstrate the potential of modulating the biophysical and intracellular regulation of NK activation as a promising approach for improving immunotherapy.\"}, {\"paperId\": \"0355482b930e8c150d99b573a2d6f55418c449b5\", \"externalIds\": {\"MAG\": \"3108448221\", \"PubMedCentral\": \"8041210\", \"DOI\": \"10.1371/journal.ppat.1009138\", \"CorpusId\": 227231993, \"PubMed\": \"33788904\"}, \"title\": \"Population genomics of the pathogenic yeast Candida tropicalis identifies hybrid isolates in environmental samples\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 49, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plospathogens/article/file?id=10.1371/journal.ppat.1009138&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8041210, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1395372883\", \"name\": \"Caoimhe E. O\\u2019Brien\"}, {\"authorId\": \"1404970639\", \"name\": \"J. Oliveira-Pacheco\"}, {\"authorId\": \"2029673562\", \"name\": \"Eoin \\u00d3 Cinn\\u00e9ide\"}, {\"authorId\": \"2029672583\", \"name\": \"M. Hasse\"}, {\"authorId\": \"3727281\", \"name\": \"C. T. Hittinger\"}, {\"authorId\": \"145055699\", \"name\": \"T. Rogers\"}, {\"authorId\": \"144611429\", \"name\": \"\\u00d3. Zaragoza\"}, {\"authorId\": \"4079950\", \"name\": \"U. Bond\"}, {\"authorId\": \"1691930\", \"name\": \"G. Butler\"}], \"abstract\": \"Candida tropicalis is a human pathogen that primarily infects the immunocompromised. Whereas the genome of one isolate, C. tropicalis MYA-3404, was originally sequenced in 2009, there have been no large-scale, multi-isolate studies of the genetic and phenotypic diversity of this species. Here, we used whole genome sequencing and phenotyping to characterize 77 isolates C. tropicalis isolates from clinical and environmental sources from a variety of locations. We show that most C. tropicalis isolates are diploids with approximately 2 - 6 heterozygous variants per kilobase. The genomes are relatively stable, with few aneuploidies. However, we identified one highly homozygous isolate and six isolates of C. tropicalis with much higher heterozygosity levels ranging from 36 - 49 heterozygous variants per kilobase. Our analyses show that the heterozygous isolates represent two different hybrid lineages, where the hybrids share one parent (A) with most other C. tropicalis isolates, but the second parent (B or C) differs by at least 4% at the genome level. Four of the sequenced isolates descend from an AB hybridization, and two from an AC hybridization. The hybrids are MTLa/\\u03b1 heterozygotes. Hybridization, or mating, between different parents is therefore common in the evolutionary history of C. tropicalis. The new hybrids were predominantly found in environmental niches, including from soil. Hybridization is therefore unlikely to be associated with virulence. In addition, we used genotype-phenotype correlation and CRISPR-Cas9 editing to identify a genome variant that results in the inability of one isolate to utilize certain branched-chain amino acids as a sole nitrogen source. Author summary Candida tropicalis is an important fungal pathogen, which is particularly common in the Asia-Pacific and Latin America. There is currently very little known about the diversity of genotype and phenotype of C. tropicalis isolates. By carrying out a phylogenomic analysis of 77 isolates, we find that C. tropicalis genomes range from very homozygous to highly heterozygous. We show that the heterozygous isolates are hybrids, most likely formed by mating between different parents. Unlike other Candida species, the hybrids are more common in environmental than in clinical niches, suggesting that for this species, hybridization is not associated with virulence. We also explore the range of phenotypes, and we identify a genomic variant that is required for growth on valine and isoleucine as sole nitrogen sources.\"}, {\"paperId\": \"0355614af1370778f929d6f68368e487ef7cf280\", \"externalIds\": {\"DOI\": \"10.11594/jaab.04.02.01\", \"CorpusId\": 259793542}, \"title\": \"Efficient Agrobacterium mediated genetic transformation of CRISPR/Cas9 construct using cotyledonary node explants of greengram\", \"venue\": \"Journal of Agriculture and Applied Biology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jaabjournal.org/index.php/jaab/article/download/272/81\", \"status\": \"GOLD\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.11594/jaab.04.02.01?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.11594/jaab.04.02.01, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"114464237\", \"name\": \"Ashwini Talakayala\"}, {\"authorId\": \"2087441813\", \"name\": \"Narasimham Dokka\"}, {\"authorId\": \"1394296734\", \"name\": \"G. Baloji\"}, {\"authorId\": \"91233639\", \"name\": \"Srinivas Ankanagari\"}, {\"authorId\": \"5057678\", \"name\": \"Mallikarjuna Garladinne\"}], \"abstract\": \"An efficient protocol for generating transformed greengram plants by choosing prominent explant which is used to generate transformed plantlets for their survivability and also with high transformation efficiency. However, the crop production is reduced due to factors. In current work, we employed transgenic free approach using CRISPR/Cas9 tool for establishing transformation protocol. The CRISPR/Cas9 is getting momentum widely for developing transgene free crops. In this approach, guide RNA encoding for ~18-23 bp sequence that contains a PAM (protospacer adjacent motif) on either strand of DNA, where CRISPR incepts with a single guide RNA (sgRNA) to target genes and initiate excision of a complimentary strands through the Cas9 endonuclease. Explants\\u2019 effects on CRISPR/Cas9 construct transformation were studied. For transformation, three distinct explants cotyledonary node (CN- MSB5 +3% sucrose+ 0.5 mg/L BAP for CN), shoot tip (ST- MSB5 + 3% sucrose+ + 0.5 mg/L BAP + 0.01 mg/L NAA), and immature cotyledon (IMC-3% sucrose + 0.5 mg/L BAP + 0.1 mg/L NAA) were used. The prepared explants were infected with EHA105 strain of Agrobacterium tumefaciens harboring a binary vector of pMDC100 containing npt II gene as screenable marker and Cas9. The explants were selected on 50 mg/L kanamycin medium. The transformed plants were confirmed by PCR using npt II and Cas9 specific primers. Cotyledonary node explant was found to be more efficient for CRISPR/Cas9 transformation and also it promisingly showed transgene integration through PCR analysis having more transformation efficiency and can be used for the production of transgenic free greengram crop using CRISPR/Cas9 approach.\"}, {\"paperId\": \"03565eba6221f00815b737df0163bb45a8e1eace\", \"externalIds\": {\"PubMedCentral\": \"12824609\", \"DOI\": \"10.1182/blood.2024025886\", \"CorpusId\": 270963345, \"PubMed\": \"39841016\"}, \"title\": \"FLT3 is genetically essential for ITD-mutated leukemic stem cells but dispensable for human hematopoietic stem cells\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC12824609, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2309823511\", \"name\": \"J. L. Ara\\u00fajo\"}, {\"authorId\": \"5689173\", \"name\": \"Elvin Wagenblast\"}, {\"authorId\": \"4575474\", \"name\": \"V. Voisin\"}, {\"authorId\": \"35335687\", \"name\": \"Jessica McLeod\"}, {\"authorId\": \"2245253925\", \"name\": \"Olga I. Gan\"}, {\"authorId\": \"2143945830\", \"name\": \"Suraj Bansal\"}, {\"authorId\": \"7472536\", \"name\": \"Liqing Jin\"}, {\"authorId\": \"46672395\", \"name\": \"Amanda Mitchell\"}, {\"authorId\": \"2173188583\", \"name\": \"Blaise A. Gratton\"}, {\"authorId\": \"2031055098\", \"name\": \"Sarah K. Cutting\"}, {\"authorId\": \"145305604\", \"name\": \"A. Arruda\"}, {\"authorId\": \"4380268\", \"name\": \"M. Doedens\"}, {\"authorId\": \"2269177086\", \"name\": \"Anthea Travas\"}, {\"authorId\": \"2341509499\", \"name\": \"D. D. H. Kim\"}, {\"authorId\": \"1387466310\", \"name\": \"Jose-Mario Capo-Chichi\"}, {\"authorId\": \"2357843\", \"name\": \"Sagi Abelson\"}, {\"authorId\": \"3876343\", \"name\": \"M. Minden\"}, {\"authorId\": \"2252077786\", \"name\": \"J. Wang\"}, {\"authorId\": \"2297257518\", \"name\": \"Manuel A Sobrinho-Sim\\u00f5es\"}, {\"authorId\": \"1398111481\", \"name\": \"P. Pinto-do-\\u00d3\"}, {\"authorId\": \"3794497\", \"name\": \"E. Lechman\"}, {\"authorId\": \"2242368620\", \"name\": \"J. Dick\"}], \"abstract\": \"Leukemic stem cells (LSCs) fuel acute myeloid leukemia (AML) growth and relapse, but therapies tailored towards eradicating LSCs without harming healthy hematopoietic stem cells (HSCs) are lacking. FLT3 is considered an important therapeutic target due to frequent mutation in AML and association with relapse. However, there has been limited clinical success with FLT3 targeting, suggesting either that FLT3 is not a vulnerability in LSC, or that more potent inhibition is required, a scenario where HSC toxicity could become limiting. We tested these possibilities by ablating FLT3 using CRISPR/Cas9-mediated FLT3 knock-out (FLT3-KO) in human LSCs and HSCs followed by functional xenograft assays. FLT3-KO in LSCs from FLT3-ITD mutated, but not FLT3-WT AMLs, resulted in short-term leukemic grafts of FLT-3-KO edited cells that disappeared by 12 weeks. By contrast, FLT3-KO in HSCs from fetal liver, cord blood and adult bone marrow did not impair multilineage hematopoiesis in primary and secondary xenografts. Our study establishes FLT3 as an ideal therapeutic target where ITD+ LSC are eradicated upon FLT3 deletion, while HSCs are spared. These findings support the development of more potent FLT3-targeting drugs or gene-editing approaches for LSC eradication to improve clinical outcomes. KEY POINTS The FLT3 gene is essential for ITD-mutated leukemic stem cells (LSCs) to establish and propagate leukemia. Normal human hematopoietic stem cells (HSCs) do not require FLT3 to engraft and sustain hematopoiesis.\"}, {\"paperId\": \"0359193b88bfe08a1b800fda7dcb2051b7a093f3\", \"externalIds\": {\"DOI\": \"10.2478/aoas-2023-0009\", \"CorpusId\": 257206779}, \"title\": \"Applying the CRISPR/Cas9 for Treating Human and Animal Diseases \\u2013 Comprehensive Review\", \"venue\": \"Annals of Animal Science\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://sciendo.com/pdf/10.2478/aoas-2023-0009\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2478/aoas-2023-0009?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2478/aoas-2023-0009, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46548580\", \"name\": \"S. Abdelnour\"}, {\"authorId\": \"4370646\", \"name\": \"A. Salaka\"}, {\"authorId\": \"31851726\", \"name\": \"A. Shakoori\"}, {\"authorId\": \"2209888495\", \"name\": \"N. Alsaffar\"}, {\"authorId\": \"1907592192\", \"name\": \"A. Hassanin\"}, {\"authorId\": \"22260109\", \"name\": \"M. Abukhalil\"}, {\"authorId\": \"1390039873\", \"name\": \"M. A. Abd El-Hack\"}], \"abstract\": \"Abstract Recently, genome editing tools have been extensively used in many biomedical sciences. The gene editing system is applied to modify the dnA sequences in the cellular system to comprehend their physiological response. A developing genome editing technology like clustered regularly short palindromic repeats (CRISPR) is widely used in medical sciences. CRISPR and CRISPR-associated protein 9 (CRISPR/Cas9) system is being exploited to edit any DNA mutations related to inherited ailments to investigate in animals (in vivo) and cell lines (in vitro). Remarkably, CRISPR/Cas9 could be employed to examine treatments of many human genetic diseases such as cystic fibrosis, tyrosinemia, phenylketonuria, muscular dystrophy, Parkinson\\u2019s disease, retinoschisis, hemophilia, \\u03b2-thalassemia and atherosclerosis. Moreover, CRISPR/Cas9 was used for disease resistance such as tuberculosis, Johne\\u2019s diseases, chronic enteritis, and brucellosis in animals. Finally, this review discusses existing progress in treating hereditary diseases using CRISPR/Cas9 technology and the high points accompanying obstacles.\"}, {\"paperId\": \"035e19e8f2ccce46ecaff3e084a0b74a62446d72\", \"externalIds\": {\"MAG\": \"3008635039\", \"DOI\": \"10.1093/glycob/cwaa016\", \"CorpusId\": 211262718, \"PubMed\": \"32091093\"}, \"title\": \"Corrigendum to: Triglyceride-rich lipoprotein binding and uptake by heparan sulfate proteoglycan receptors in a CRISPR/Cas9 library of Hep3B mutants.\", \"venue\": \"Glycobiology\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/glycob/article-pdf/30/9/760/33675097/cwaa016.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/glycob/cwaa016?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/glycob/cwaa016, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1422882386\", \"name\": \"Ferdous Anower-E-Khuda\"}, {\"authorId\": \"2117029515\", \"name\": \"Gagandeep Singh\"}, {\"authorId\": \"48362535\", \"name\": \"Yiping Deng\"}, {\"authorId\": \"5718216\", \"name\": \"P. Gordts\"}, {\"authorId\": \"3635836\", \"name\": \"J. Esko\"}], \"abstract\": null}, {\"paperId\": \"035e75461cfc99f043c2ffda5dd489d274f024fd\", \"externalIds\": {\"DOI\": \"10.1117/12.3013065\", \"CorpusId\": 266892192}, \"title\": \"Development and applications of CRISPR/Cas system in genetic engineering\", \"venue\": \"International Conference on Biological Engineering and Medical Science\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1117/12.3013065?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1117/12.3013065, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"101636970\", \"name\": \"D. You\"}], \"abstract\": \"Less than ten years after the discovery of the key chemical components of the system, the invention of a technique for genome editing based on CRISPR-Cas9 technology was recognized with the Nobel Prize in Chemistry in 2020. In this paper, the working mechanism and historical development of CRISPR are briefly described, the CRISPR/Cas system is a type of microbial adaptive immune system that gives resistance to plasmids and other non-native genetic materials. This review provides a brief history of the pioneering contributions and the researchers who advanced this topic after its first discovery. Next, how CRISPR regulates gene expression and realizes gene editing in organisms is described in detail, and its application achievements in various fields are also listed. Finally, the development foreground of the system as a high-precision method to edit genome is discussed, and the safety and ethical issues that may be caused by the application of prediction are considered. The differences, merits, and drawbacks of CRISPR and other gene editing techniques are reviewed after a brief description of the working mechanism and history of CRISPR. Then, a detailed explanation of how CRISPR controls gene expression and enables gene editing in organisms is given, along with a list of the many areas in which it has been successfully used. Last but not least, the prospective study for the CRISPR to become a high-precision gene editing technique is discussed, and potential risks and ethical issues associated with the use of prediction are considered.\"}, {\"paperId\": \"0366e133e2883f24a2c7c560fc94f377f6f0208b\", \"externalIds\": {\"DOI\": \"10.47611/jsr.v11i1.1534\", \"CorpusId\": 254579319}, \"title\": \"Current Sickle Cell Disease Gene Therapy Treatments: Literature Review\", \"venue\": \"Journal of student-scientists' research\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.jsr.org/index.php/path/article/download/1534/1133\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.47611/jsr.v11i1.1534?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.47611/jsr.v11i1.1534, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2363097622\", \"name\": \"Anika Ranadive\"}, {\"authorId\": \"2196275782\", \"name\": \"Janaksha Linga-Easwaran\"}], \"abstract\": \"Sickle cell disease (SCD) consists of haemoglobin-mutation related blood disorders caused by mutations of the HBB gene. Current treatments for SCD are symptom-based or preventive treatments. The only curative treatment for SCD- an allogeneic hematopoietic stem cell transplant- is inaccessible to the majority of SCD patients. The transplant required a donor graft is unavailable for most individuals. Currently, research in gene therapy treatment for SCD attempts to provide long-lasting treatments in two distinct techniques. The first technique is to change the mutation-containing genotype to produce a normal or functional haemoglobin protein. The second technique is to bypass the production of the mutated adult haemoglobin and product fetal haemoglobin instead. This literature review compares three gene-editing methods; Lentiviral Vectors, CRISPR/Cas9, and Base Editors. A review of previously published research papers was conducted and compared over a 2 month period during a summer student research program to determine the progression of each of the three gene-editing methods in the two techniques of SCD gene therapy treatment. While all three were successful in both genotype correction and fetal haemoglobin induction, only the Lentiviral Vector and CRISPR/Cas9 treatments for fetal haemoglobin induction have published data on human trials. However, the Base Editor shows promise in its ability to surpass many issues faced with both viral vectors and CRISPR/Cas9 such as off-target DNA breaks. Progression in SCD gene therapy can provide a treatment option for all affected individuals and can even provide a basis for gene therapy for other blood disorders.\"}, {\"paperId\": \"036ace2a5f40febc17995a37d9602eb112edb5fb\", \"externalIds\": {\"MAG\": \"3027874318\", \"PubMedCentral\": \"7290052\", \"DOI\": \"10.3389/fcell.2020.00358\", \"CorpusId\": 219310935, \"PubMed\": \"32582689\"}, \"title\": \"Ppp2r2a Knockout Mice Reveal That Protein Phosphatase 2A Regulatory Subunit, PP2A-B55\\u03b1, Is an Essential Regulator of Neuronal and Epidermal Embryonic Development\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2020, \"citationCount\": 23, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2020.00358/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7290052, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"36111833\", \"name\": \"N. Panicker\"}, {\"authorId\": \"1739108440\", \"name\": \"Melody Coutman\"}, {\"authorId\": \"1739137017\", \"name\": \"Charley Lawlor-O\\u2019Neill\"}, {\"authorId\": \"34782515\", \"name\": \"R. Kahl\"}, {\"authorId\": \"3663708\", \"name\": \"S. Roselli\"}, {\"authorId\": \"4986351\", \"name\": \"N. Verrills\"}], \"abstract\": \"The serine/threonine protein phosphatase 2A (PP2A) is a master regulator of the complex cellular signaling that occurs during all stages of mammalian development. PP2A is composed of a catalytic, a structural, and regulatory subunit, for which there are multiple isoforms. The association of specific regulatory subunits determines substrate specificity and localization of phosphatase activity, however, the precise role of each regulatory subunit in development is not known. Here we report the generation of the first knockout mouse for the Ppp2r2a gene, encoding the PP2A-B55\\u03b1 regulatory subunit, using CRISPR/Cas9. Heterozygous animals developed and grew as normal, however, homozygous knockout mice were not viable. Analysis of embryos at different developmental stages found a normal Mendelian ratio of Ppp2r2a\\u2013/\\u2013 embryos at embryonic day (E) 10.5 (25%), but reduced Ppp2r2a\\u2013/\\u2013 embryos at E14.5 (18%), and further reduced at E18.5 (10%). No live Ppp2r2a\\u2013/\\u2013 pups were observed at birth. Ppp2r2a\\u2013/\\u2013 embryos were significantly smaller than wild-type or heterozygous littermates and displayed a variety of neural defects such as exencephaly, spina bifida, and cranial vault collapse, as well as syndactyly and severe epidermal defects; all processes driven by growth and differentiation of the ectoderm. Ppp2r2a\\u2013/\\u2013 embryos had incomplete epidermal barrier acquisition, associated with thin, poorly differentiated stratified epithelium with weak attachment to the underlying dermis. The basal keratinocytes in Ppp2r2a\\u2013/\\u2013 embryos were highly disorganized, with reduced immunolabeling of integrins and basement membrane proteins, suggesting impaired focal adhesion and hemidesmosome assembly. The spinous and granular layers were thinner in the Ppp2r2a\\u2013/\\u2013 embryos, with aberrant expression of adherens and tight junction associated proteins. The overlying stratum corneum was either absent or incomplete. Thus PP2A-B55\\u03b1 is an essential regulator of epidermal stratification, and is essential for ectodermal development during embryogenesis.\"}, {\"paperId\": \"036bdb6fb3f4b55ef33aa8761425961de37c363b\", \"externalIds\": {\"MAG\": \"3082072705\", \"PubMedCentral\": \"7471924\", \"DOI\": \"10.1038/s41598-020-71648-w\", \"CorpusId\": 221497159, \"PubMed\": \"32884066\"}, \"title\": \"A CRISPR activation and interference toolkit for industrial Saccharomyces cerevisiae strain KE6-12\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 49, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-71648-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7471924, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5177287\", \"name\": \"Elena C\\u00e1mara\"}, {\"authorId\": \"1932181984\", \"name\": \"Ibai Lenitz\"}, {\"authorId\": \"4653965\", \"name\": \"Yvonne Nyg\\u00e5rd\"}], \"abstract\": \"Recent advances in CRISPR/Cas9 based genome editing have considerably advanced genetic engineering of industrial yeast strains. In this study, we report the construction and characterization of a toolkit for CRISPR activation and interference (CRISPRa/i) for a polyploid industrial yeast strain. In the CRISPRa/i plasmids that are available in high and low copy variants, dCas9 is expressed alone, or as a fusion with an activation or repression domain; VP64, VPR or Mxi1. The sgRNA is introduced to the CRISPRa/i plasmids from a double stranded oligonucleotide by in vivo homology-directed repair, allowing rapid transcriptional modulation of new target genes without cloning. The CRISPRa/i toolkit was characterized by alteration of expression of fluorescent protein-encoding genes under two different promoters allowing expression alterations up to ~\\u20092.5-fold. Furthermore, we demonstrated the usability of the CRISPRa/i toolkit by improving the tolerance towards wheat straw hydrolysate of our industrial production strain. We anticipate that our CRISPRa/i toolkit can be widely used to assess novel targets for strain improvement and thus accelerate the design-build-test cycle for developing various industrial production strains.\"}, {\"paperId\": \"036c1d602cae4f85bd1ac69dc146b2e490fb6419\", \"externalIds\": {\"DOI\": \"10.1016/j.ydbio.2022.07.008\", \"CorpusId\": 251236251, \"PubMed\": \"35917936\"}, \"title\": \"Optimizing CRISPR/Cas9-based gene manipulation in echinoderms.\", \"venue\": \"Developmental Biology\", \"year\": 2022, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.ydbio.2022.07.008\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ydbio.2022.07.008?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ydbio.2022.07.008, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4729935\", \"name\": \"Nathalie Oulhen\"}, {\"authorId\": \"2151646631\", \"name\": \"Cosmo Pieplow\"}, {\"authorId\": \"33606823\", \"name\": \"M. Perillo\"}, {\"authorId\": \"2179932213\", \"name\": \"Pauline Gregory\"}, {\"authorId\": \"2283624\", \"name\": \"G. Wessel\"}], \"abstract\": \"The impact of new technology can be appreciated by how broadly it is used. Investigators that previously relied only on pharmacological approaches or the use of morpholino antisense oligonucleotide (MASO) technologies are now able to apply CRISPR-Cas9 to study biological problems in their model organism of choice much more effectively. The transitions to new CRISPR-based approaches could be enhanced, first, by standardized protocols and education in their applications. Here we summarize our results for optimizing the CRISPR-Cas9 technology in a sea urchin and a sea star, and provide advice on how to set up CRISPR-Cas9 experiments and interpret the results in echinoderms. Our goal through these protocols and sharing examples of success by other labs is to lower the activation barrier so that more laboratories can apply CRISPR-Cas9 technologies in these important animals.\"}, {\"paperId\": \"036da61ba4042df39d071695aa97b280dae13103\", \"externalIds\": {\"PubMedCentral\": \"7194981\", \"MAG\": \"3013277538\", \"DOI\": \"10.1038/s41564-020-0692-2\", \"CorpusId\": 214648234, \"PubMed\": \"32218510\"}, \"title\": \"Broad-spectrum anti-CRISPR proteins facilitate horizontal gene transfer\", \"venue\": \"Nature Microbiology\", \"year\": 2020, \"citationCount\": 101, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7194981\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7194981, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1418947733\", \"name\": \"C. Mahendra\"}, {\"authorId\": \"38099661\", \"name\": \"Kathleen A. Christie\"}, {\"authorId\": \"4056723\", \"name\": \"Beatriz A. Osuna\"}, {\"authorId\": \"1417552795\", \"name\": \"R. Pinilla-Redondo\"}, {\"authorId\": \"2652429\", \"name\": \"B. Kleinstiver\"}, {\"authorId\": \"1398328884\", \"name\": \"Joseph Bondy-Denomy\"}], \"abstract\": \"CRISPR\\u2013Cas adaptive immune systems protect bacteria and archaea against their invading genetic parasites, including bacteriophages/viruses and plasmids. In response to this immunity, many phages have anti-CRISPR (Acr) proteins that inhibit CRISPR\\u2013Cas targeting. To date, anti-CRISPR genes have primarily been discovered in phage or prophage genomes. Here, we uncovered acr loci on plasmids and other conjugative elements present in Firmicutes using the Listeria acrIIA1 gene as a marker. The four identified genes, found in Listeria, Enterococcus, Streptococcus and Staphylococcus genomes, can inhibit type II-A SpyCas9 or SauCas9, and are thus named acrIIA16\\u2013 19 . In Enterococcus faecalis , conjugation of a Cas9-targeted plasmid was enhanced by anti-CRISPRs derived from Enterococcus conjugative elements, highlighting a role for Acrs in the dissemination of plasmids. Reciprocal co-immunoprecipitation showed that each Acr protein interacts with Cas9, and Cas9\\u2013Acr complexes were unable to cleave DNA. Northern blotting suggests that these anti-CRISPRs manipulate single guide RNA length, loading or stability. Mirroring their activity in bacteria, AcrIIA16 and AcrIIA17 provide robust and highly potent broad-spectrum inhibition of distinct Cas9 proteins in human cells (for example, SpyCas9, SauCas9, SthCas9, NmeCas9 and CjeCas9). This work presents a focused analysis of non-phage Acr proteins, demonstrating a role in horizontal gene transfer bolstered by broad-spectrum CRISPR\\u2013Cas9 inhibition. A search for genes encoding anti-CRISPR (Acr) proteins on plasmids and other conjugative elements identifies new Acrs that regulate plasmid dissemination and are broad-spectrum inhibitors of Cas9 in human cells.\"}, {\"paperId\": \"037080e52a39bba60a4e10ef561abe7d6dd5e88a\", \"externalIds\": {\"PubMedCentral\": \"8642896\", \"DOI\": \"10.1186/s12951-021-01132-8\", \"CorpusId\": 244842903, \"PubMed\": \"34863214\"}, \"title\": \"Engineered CRISPR-Cas systems for the detection and control of antibiotic-resistant infections\", \"venue\": \"Journal of Nanobiotechnology\", \"year\": 2021, \"citationCount\": 122, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jnanobiotechnology.biomedcentral.com/track/pdf/10.1186/s12951-021-01132-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8642896, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2142862486\", \"name\": \"Yuye Wu\"}, {\"authorId\": \"41092557\", \"name\": \"Dheerendranath Battalapalli\"}, {\"authorId\": \"39396396\", \"name\": \"Mohammed J Hakeem\"}, {\"authorId\": \"1396080982\", \"name\": \"Venkatarao Selamneni\"}, {\"authorId\": \"2110149689\", \"name\": \"Pengfei Zhang\"}, {\"authorId\": \"3656841\", \"name\": \"Mohamed S. Draz\"}, {\"authorId\": \"143994425\", \"name\": \"Z. Ruan\"}], \"abstract\": \"Antibiotic resistance is spreading rapidly around the world and seriously impeding efforts to control microbial infections. Although nucleic acid testing is widely deployed for the detection of antibiotic resistant bacteria, the current techniques\\u2014mainly based on polymerase chain reaction (PCR)\\u2014are time-consuming and laborious. There is an urgent need to develop new strategies to control bacterial infections and the spread of antimicrobial resistance (AMR). The CRISPR-Cas system is an adaptive immune system found in many prokaryotes that presents attractive opportunities to target and edit nucleic acids with high precision and reliability. Engineered CRISPR-Cas systems are reported to effectively kill bacteria or even revert bacterial resistance to antibiotics (resensitizing bacterial cells to antibiotics). Strategies for combating antimicrobial resistance using CRISPR (i.e., Cas9, Cas12, Cas13, and Cas14) can be of great significance in detecting bacteria and their resistance to antibiotics. This review discusses the structures, mechanisms, and detection methods of CRISPR-Cas systems and how these systems can be engineered for the rapid and reliable detection of bacteria using various approaches, with a particular focus on nanoparticles. In addition, we summarize the most recent advances in applying the CRISPR-Cas system for virulence modulation of bacterial infections and combating antimicrobial resistance. Graphical Abstract\"}, {\"paperId\": \"0372a7421555e3c0c4d15d689fd3286428a9f6fd\", \"externalIds\": {\"PubMedCentral\": \"9365196\", \"DOI\": \"10.1016/j.hoc.2022.05.002\", \"CorpusId\": 250174710, \"PubMed\": \"35773054\"}, \"title\": \"A Curative DNA Code for Hematopoietic Defects Novel Cell Therapies for Monogenic Diseases of the Blood and Immune System\", \"venue\": \"Hematology/Oncology Clinics of North America\", \"year\": 2022, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.hoc.2022.05.002\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9365196, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4046906\", \"name\": \"M. Porteus\"}, {\"authorId\": \"1403563937\", \"name\": \"Mara Pavel-Dinu\"}, {\"authorId\": \"144873651\", \"name\": \"S. Pai\"}], \"abstract\": \"Innovations in programmable nucleases have expanded genetic engineering capabilities, raising the possibility of a new approach to curing monogenic hematological diseases. Feasibility studies using ex\\u00a0vivo targeted genome-editing, and nonintegrating viral vectors show outstanding potential for correcting genetic conditions at their root cause. This article reviews the latest technological advances in the CRISPR/Cas9 system alone and combined with engineered viruses as editing tools for human hematopoietic stem and progenitor cells (HSPCs). We discuss the early phase in human trials of genome editing-based therapies for hemoglobinopathies.\"}, {\"paperId\": \"0373940da3470cb0532c01794ee36fb665e7c9f3\", \"externalIds\": {\"PubMedCentral\": \"7556509\", \"MAG\": \"3091745123\", \"DOI\": \"10.1371/journal.pntd.0008709\", \"CorpusId\": 222152463, \"PubMed\": \"33006969\"}, \"title\": \"Mycolactone induces cell death by SETD1B-dependent degradation of glutathione\", \"venue\": \"PLoS Neglected Tropical Diseases\", \"year\": 2020, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosntds/article/file?id=10.1371/journal.pntd.0008709&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7556509, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48759383\", \"name\": \"B. F\\u00f6rster\"}, {\"authorId\": \"6464718\", \"name\": \"C. Demangel\"}, {\"authorId\": \"4881036\", \"name\": \"T. Thye\"}], \"abstract\": \"Mycobacterium ulcerans is a human pathogen that causes a necrotizing skin disease known as Buruli ulcer. Necrosis of infected skin is driven by bacterial production of mycolactone, a diffusible exotoxin targeting the host translocon (Sec61). By blocking Sec61, mycolactone prevents the transport of nascent secretory proteins into the endoplasmic reticulum of host cells. This triggers pro-apoptotic stress responses partially depending on activation of the ATF4 transcription factor. To gain further insight into the molecular pathways mediating the cytotoxic effects of mycolactone we conducted the first haploid genetic screen with the M. ulcerans toxin in KBM-7 cells. This approach allowed us to identify the histone methyltransferase SETD1B as a novel mediator of mycolactone-induced cell death. CRISPR/Cas9-based inactivation of SETD1B rendered cells resistant to lethal doses of the toxin, highlighting the critical importance of this gene\\u2019s expression. To understand how SETD1B contributes to mycolactone cytotoxicity, we compared the transcriptomes of wild-type (WT) and SETD1B knockout KBM-7 cells upon exposure to the toxin. While ATF4 effectors were upregulated by mycolactone in both WT and SETD1B knockout cells, mycolactone selectively induced the expression of pro-apoptotic genes in WT cells. Among those genes we identified CHAC1, which codes for a major glutathione (GSH)-degrading enzyme, and whose strong upregulation in mycolactone-treated WT cells correlated with a marked reduction in GSH protein level. Moreover, GSH supplementation conferred cells with substantial protection against the toxic effects of mycolactone. Our data thus identify SETD1B/CHAC1/GSH as a novel, epigenetic mechanism connecting Sec61 blockade with apoptotic cell death. They suggest that GSH-based treatments might have the capacity to limit skin necrosis in Buruli ulcer.\"}, {\"paperId\": \"0376ab54332020c08d1f8478977fb8fb38e57d77\", \"externalIds\": {\"MAG\": \"3008188839\", \"DOI\": \"10.1182/blood.2019004121\", \"CorpusId\": 211525203, \"PubMed\": \"32097467\"}, \"title\": \"Site-specific methylation of 18S ribosomal RNA by SNORD42A is required for Acute Myeloid Leukemia cell proliferation.\", \"venue\": \"Blood\", \"year\": 2020, \"citationCount\": 67, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ashpublications.org/blood/article-pdf/135/23/2059/1743330/bloodbld2019004121.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood.2019004121?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood.2019004121, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46262296\", \"name\": \"C. Pauli\"}, {\"authorId\": \"2153630389\", \"name\": \"Yi Liu\"}, {\"authorId\": \"49637825\", \"name\": \"C. Rohde\"}, {\"authorId\": \"35645784\", \"name\": \"Chunhong Cui\"}, {\"authorId\": \"1879862471\", \"name\": \"D. Fija\\u0142kowska\"}, {\"authorId\": \"10146028\", \"name\": \"Dennis Gerloff\"}, {\"authorId\": \"29164993\", \"name\": \"C. Walter\"}, {\"authorId\": \"4606143\", \"name\": \"J. Krijgsveld\"}, {\"authorId\": \"145648033\", \"name\": \"M. Dugas\"}, {\"authorId\": \"6383206\", \"name\": \"B. Edemir\"}, {\"authorId\": \"4791674\", \"name\": \"C. Pabst\"}, {\"authorId\": \"152203868\", \"name\": \"L. Mueller\"}, {\"authorId\": \"13125522\", \"name\": \"Fengbiao Zhou\"}, {\"authorId\": \"1397412040\", \"name\": \"C. M\\u00fcller-Tidow\"}], \"abstract\": \"Non-coding RNAs including small nucleolar RNAs (snoRNAs) play important roles in leukemogenesis but the relevant mechanisms remain incompletely understood. We performed snoRNA focused CRISPR-Cas9 knockout library screenings which targeted the entire snoRNAnome and corresponding host genes. The C/D box containing SNORD42A was identified as an essential modulator for AML cell survival and proliferation in multiple human leukemia cell lines. In line, SNORD42A was consistently expressed at higher levels in primary AML patient samples than in CD34+ progenitors, monocytes and granulocytes. Functionally, knockout of SNORD42A reduced colony formation capability and inhibited proliferation. The SNORD42A acts as a C/D box snoRNA and directs 2\\u00b4-O-methylation at Uridine 116 of 18S rRNA. Deletion of SNORD42A decreased 18S-U116 2\\u00b4-O-methylation which was associated with a specific decrease in the translation of ribosomal proteins. In line, the cell size of SNORD42A deletion carrying leukemia cells was decreased. Taken together, these findings establish that high level expression of SNORD42A with concomitant U116 18S rRNA 2\\u00b4-O-methylation is essential for leukemia cell growth and survival.\"}, {\"paperId\": \"03778b73e64fee12f72dbba5fc2ee9d502923b8f\", \"externalIds\": {\"DOI\": \"10.1111/tpj.17052\", \"CorpusId\": 273588004, \"PubMed\": \"39453388\"}, \"title\": \"Boron confers salt tolerance through facilitating BnaA2.HKT1-mediated root xylem Na+ unloading in rapeseed (Brassica napus L.).\", \"venue\": \"The Plant Journal\", \"year\": 2024, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/tpj.17052\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/tpj.17052?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/tpj.17052, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4343678\", \"name\": \"Ying-peng Hua\"}, {\"authorId\": \"2283276460\", \"name\": \"Min-nan Pei\"}, {\"authorId\": \"2190578487\", \"name\": \"Haili Song\"}, {\"authorId\": \"2155355675\", \"name\": \"Ying Liu\"}, {\"authorId\": \"2299291297\", \"name\": \"Ting Zhou\"}, {\"authorId\": \"39994133\", \"name\": \"Hongbo Chao\"}, {\"authorId\": \"153145140\", \"name\": \"Cai-Peng Yue\"}, {\"authorId\": \"2377289524\", \"name\": \"Jinyong Huang\"}, {\"authorId\": \"2244259230\", \"name\": \"Guangyong Qin\"}, {\"authorId\": \"2219011879\", \"name\": \"Yingna Feng\"}], \"abstract\": \"Boron (B) is an important limiting factor for plant growth and yield in saline soils, but the underlying molecular mechanisms remain poorly understood. In this study, we found that appropriate B supply obviously complemented rapeseed (Brassica napus L.) growth under salinity accompanied by higher biomass production and less reactive oxygen species accumulation. Determination of Na+ content in shoots and roots indicated that B significantly repressed root-to-shoot Na+ translocation, and non-invasive micro-tests of root xylem sap demonstrated that B increased xylem Na+ unloading in the roots of rapeseed plants under salinity. Comparative transcriptomic profiling revealed that B strongly upregulated BnaHKT1s expression, especially BnaA2.HKT1, in rapeseed roots exposed to salinity. In situ hybridizations analysis showed that BnaA2.HKT1 was significantly induced in root stelar tissues by high B (HB) under salinity. Green fluorescent protein and yeast heterologous expression showed that BnaA2.HKT1 functioned as a plasma membrane-localized Na+ transporter. Knockout of BnaA2.HKT1 by CRISPR/Cas9 resulted in hypersensitive of rapeseed plants to salinity even under HB condition, with higher shoot Na+ accumulation and lower biomass production. By contrast, overexpression of BnaA2.HKT1 ameliorated salinity-induced growth inhibition under B deficiency and salinity. Overall, our results proposed that B functioned as a positive regulator for the rapeseed growth and seed production under salt stress through facilitating BnaA2.HKT1-mediated root xylem Na+ unloading. This study may also provide an alternative strategy for the improvement of crop growth and development in saline soils.\"}, {\"paperId\": \"037cb1153e55d8a783656b3cfa3970984a522d0f\", \"externalIds\": {\"MAG\": \"3136206361\", \"DOI\": \"10.26265/POLYNOE-255\", \"CorpusId\": 236690961}, \"title\": \"\\u039c\\u03bf\\u03c1\\u03b9\\u03b1\\u03ba\\u03ae \\u03bc\\u03b5\\u03bb\\u03ad\\u03c4\\u03b7 \\u03c4\\u03b7\\u03c2 \\u03b3\\u03bf\\u03bd\\u03b9\\u03b4\\u03b9\\u03b1\\u03ba\\u03ae\\u03c2 \\u03b1\\u03c0\\u03bf\\u03c3\\u03b9\\u03ce\\u03c0\\u03b7\\u03c3\\u03b7\\u03c2 \\u03c4\\u03bf\\u03c5 \\u03b3\\u03bf\\u03bd\\u03b9\\u03b4\\u03af\\u03bf\\u03c5 dicer-2 \\u03c3\\u03b5 \\u03ba\\u03c5\\u03c4\\u03c4\\u03b1\\u03c1\\u03b9\\u03ba\\u03ad\\u03c2 \\u03c3\\u03b5\\u03b9\\u03c1\\u03ad\\u03c2 \\u039b\\u03b5\\u03c0\\u03b9\\u03b4\\u03bf\\u03c0\\u03c4\\u03ad\\u03c1\\u03c9\\u03bd\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.26265/POLYNOE-255?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.26265/POLYNOE-255, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2122089994\", \"name\": \"\\u0391\\u03bb\\u03b5\\u03be\\u03ac\\u03bd\\u03c4\\u03b5\\u03c1 \\u0393\\u03b9\\u03bf\\u03cd\\u03b6\\u03b5\\u03c6 \\u039c\\u03b1\\u03b6\\u03bf\\u03c5\\u03c1\\u03ad\\u03ba\"}], \"abstract\": null}, {\"paperId\": \"037d04f2bc1763da280506e420705291293088e9\", \"externalIds\": {\"PubMedCentral\": \"9948704\", \"DOI\": \"10.1128/msystems.01045-22\", \"CorpusId\": 247296143, \"PubMed\": \"36541764\"}, \"title\": \"CRISPR-Cas-Guided Mutagenesis of Chromosome and Virulence Plasmid in Shigella flexneri by Cytosine Base Editing\", \"venue\": \"mSystems\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/msystems.01045-22\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9948704, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"9897234\", \"name\": \"Atin Sharma\"}, {\"authorId\": \"2197534386\", \"name\": \"Ruqiya Omer Aden\"}, {\"authorId\": \"4953171\", \"name\": \"A. Puhar\"}, {\"authorId\": \"50721461\", \"name\": \"D. A. Cisneros\"}], \"abstract\": \"Loss-of-function mutagenesis is critical in understanding the physiological role of genes. Therefore, high-throughput techniques to generate such mutants are important for facilitating the assessment of gene function at a pace that matches systems biology approaches. ABSTRACT Shigella is a Gram-negative bacterium that invades the human gut epithelium. The resulting infection, shigellosis, is the deadliest bacterial diarrheal disease. Much of the information about the genes dictating the pathophysiology of Shigella, both on the chromosome and the virulence plasmid, was obtained by classical reverse genetics. However, technical limitations of the prevalent mutagenesis techniques restrict the generation of mutants in a single reaction to a small number, preventing large-scale targeted mutagenesis of Shigella and the subsequent assessment of phenotype. We adopted a CRISPR-Cas-dependent approach, where a nickase Cas9 and cytidine deaminase fusion is guided by single guide RNA (sgRNA) to introduce targeted C\\u2192T transitions, resulting in internal stop codons and premature termination of translation. In proof-of-principle experiments using an mCherry fluorescent reporter, we were able to generate loss-of-function mutants in both Escherichia coli and Shigella flexneri with up to 100% efficacy. Using a modified fluctuation assay, we determined that under optimized conditions, the frequency of untargeted mutations introduced by the Cas9-deaminase fusion was in the same range as spontaneous mutations, making our method a safe choice for bacterial mutagenesis. Furthermore, we programmed the method to mutate well-characterized chromosomal and plasmid-borne Shigella flexneri genes and found the mutant phenotype to be similar to those of the reported gene deletion mutants, with no apparent polar effects at the phenotype level. This method can be used in a 96-well-plate format to increase the throughput and generate an array of targeted loss-of-function mutants in a few days. IMPORTANCE Loss-of-function mutagenesis is critical in understanding the physiological role of genes. Therefore, high-throughput techniques to generate such mutants are important for facilitating the assessment of gene function at a pace that matches systems biology approaches. However, to our knowledge, no such method was available for generating an array of single gene mutants in an important enteropathogen\\u2014Shigella. This pathogen causes high morbidity and mortality in children, and antibiotic-resistant strains are quickly emerging. Therefore, determination of the function of unknown Shigella genes is of the utmost importance to develop effective strategies to control infections. Our present work will bridge this gap by providing a rapid method for generating loss-of-function mutants. The highly effective and specific method has the potential to be programmed to generate multiple mutants in a single, massively parallel reaction. By virtue of plasmid compatibility, this method can be extended to other members of Enterobacteriaceae.\"}, {\"paperId\": \"037d3f9cecb4f9118aa4f973a9665ab533705fd5\", \"externalIds\": {\"MAG\": \"3021498294\", \"CorpusId\": 229104992}, \"title\": \"Developmental insights and biomedical potential of human embryonic stem cells : modelling trophoblast differentiation and establishing novel cell therapies for age-related macular degeneration\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://openarchive.ki.se/xmlui/bitstream/handle/10616/47153/Thesis_Alvaro_Plaza_Reyes.pdf?isAllowed=y&sequence=5, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13986834\", \"name\": \"Alvaro Plaza Reyes\"}], \"abstract\": null}, {\"paperId\": \"037e7a35bd78fc5503100c11eb1e5face2fcb8c3\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-151042\", \"CorpusId\": 244653920}, \"title\": \"Combination Therapy of FLT3 Tyrosine Kinase Inhibitors and BH3 Mimetics Targeting Antiapoptotic MCL-1 Synergistically Eliminates FLT3-ITD Acute Myeloid Leukemia Cells in Vitro and In Vivo\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-151042\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-151042?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-151042, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4900126\", \"name\": \"Anna Skwarska\"}, {\"authorId\": \"4793241\", \"name\": \"Donia M. Moujalled\"}, {\"authorId\": \"2142215758\", \"name\": \"Paul F Panis\"}, {\"authorId\": \"48749975\", \"name\": \"Shraddha Patel\"}, {\"authorId\": \"46324740\", \"name\": \"Qi Zhang\"}, {\"authorId\": \"4702177\", \"name\": \"Shelley M Herbrich\"}, {\"authorId\": \"1396457836\", \"name\": \"Vinitha M. Kurvilla\"}, {\"authorId\": \"49132161\", \"name\": \"Natalia Baran\"}, {\"authorId\": \"7894035\", \"name\": \"Giovanna Pomilio\"}, {\"authorId\": \"48171329\", \"name\": \"Ensar Halilovic\"}, {\"authorId\": \"145735935\", \"name\": \"P. Mistry\"}, {\"authorId\": \"40240587\", \"name\": \"V. Ruvolo\"}, {\"authorId\": \"1807239\", \"name\": \"P. Ruvolo\"}, {\"authorId\": \"150898480\", \"name\": \"Alix Derr\\u00e9al\"}, {\"authorId\": \"151200826\", \"name\": \"S. Banquet\"}, {\"authorId\": \"7213491\", \"name\": \"M. Niemira\"}, {\"authorId\": \"3946176\", \"name\": \"A. Kr\\u0119towski\"}, {\"authorId\": \"145819669\", \"name\": \"N. Daver\"}, {\"authorId\": \"5043564\", \"name\": \"M. Andreeff\"}, {\"authorId\": \"31419362\", \"name\": \"A. Wei\"}, {\"authorId\": \"144022230\", \"name\": \"M. Konopleva\"}], \"abstract\": \"\\n Activating FLT3 internal tandem duplication (FLT3-ITD) mutations, present in ~30% of AML patients, are associated with poor prognosis. Given that efficacy of FLT3 inhibitors used as monotherapy is limited due to development of secondary FLT3 mutations or activation of alternative survival pathways, new combinatorial strategies are needed to improve outcome in FLT3-ITD AML patients. Constitutive activation of mutated FLT3 often leads to elevated expression of MCL-1, an anti-apoptotic member of the BCL-2 family. Upregulation of MCL-1 underlies the resistance of AML to initially successful targeted therapies, including Bcl-2 inhibition with venetoclax, placing MCL-1 as an attractive target for combinatorial therapies. We have recently shown for the first time that a novel MCL-1 inhibitor S63845 elicited synergistic activity with FLT3 inhibitors AC220, sorafenib and with a multi-kinase inhibitor midostaurin at nanomolar doses in pre-clinical in vitro models of FLT3-ITD AML, including cells resistant to venetoclax (Skwarska A, et al. Cancer Res 2019;79 Suppl 13, Abstract#342). Here, we further explored the therapeutic potential and mechanisms-of-action of dual targeting of FLT3-ITD and MCL-1 in vitro and in vivo. S63845 and midostaurin co-treatment significantly increased apoptosis in FLT3-ITD cells with caspase-3 activation and PARP cleavage within 6 hours of treatment. Analysis of drug combinations using Bliss independence model revealed strong synergistic effect of S63845/midostaurin combination in murine isogenic Ba/F3-FLT3-ITD, Ba/F3-FLT3-ITD-D835Y and Ba/F3-FLT3-ITD-F691L dual mutants with minimal effect in Ba/F3-wt FLT3 cells, suggesting that inhibition of FLT3-ITD could mechanistically contribute to the synergy between midostaurin and S63845. Midostaurin monotherapy caused de-phosphorylation of FLT3-ITD and its downstream targets STAT5, AKT and MAPK, known to upregulate MCL-1 expression and stability (Fig 1A). Consequently, midostaurin significantly reduced Mcl-1 T163 phosphorylation and protein levels exclusively in FLT3-ITD cells. Midostaurin also decreased inhibitory phosphorylation of GSK3, suggesting the involvement of ubiquitin/proteasome axis in MCL-1 degradation. Additionally, pre-treatment with pan-caspase inhibitor zVAD-fmk partially reversed MCL-1 downregulation, implying contribution of caspase-mediated degradation to overall decrease of MCL-1 after midostaurin treatment. While midostaurin alone enhanced degradation of MCL-1, it did not fully deplete the pool of MCL-1. Surprisingly, midostaurin also induced the loss of proapoptotic NOXA, an endogenous inhibitor of MCL-1, which can potentially increase a fraction of free MCL-1. These results provide a strong rationale for targeting residual MCL-1 with selective MCL-1 inhibitor S63845 with the goal to facilitate deeper therapeutic responses in FLT3-ITD AML. Mechanistically, midostaurin increased expression of apoptosis activator BIM and blocked BIM phosphorylation required for its inhibitory sequestration by MCL-1. BIM shRNA knockdown cells were less sensitive to midostaurin/S63845 combination. Similarly, CRISPR/Cas9-mediated knock-out of BAK, a BIM-activated executor of apoptosis, resulted in reduced efficacy of tested combination. These results indicate that activation of BIM/BAX axis has a functional role in the response of AML cells to dual FLT3-ITD and MCL-1 inhibition (Fig 1B). To validate the efficacy of combination in vivo, we used xenotransplantation model of MOLM-14 cells expressing luciferase. Mice were treated for 3 weeks with low doses of midostaurin (25 mg/kg/5 days per week) and with MIK665, structurally optimized version of S63845 Mcl-1 inhibitor with improved pharmacokinetics in mice (Halilovic E, et al. Cancer Res 2019;79 Suppl 13, Abstract#4477). Administration of MIK665 at 25 mg/kg or 35 mg/kg IV 2 days per week in combination with oral midostaurin resulted in a marked delay in the progression of MOLM-14 cell line-derived xenograft and significantly reduced leukemia tumor burden (Fig 1C). The long-term effect of combination on mice survival is currently being tested and will be reported.\\n Altogether, our results indicate that efficacy of FLT3-ITD inhibitors can be enhanced through combination with low doses BH3 mimetics targeting MCL-1 and provide a rationale for the clinical evaluation of such combinations in FLT3 mutant AML patients.\\n Figure 1 Figure 1.\\n \\n \\n \\n Skwarska:\\u2008Halilovich E, Wang Y, Morris E, Konopleva M, Skwarska A.: Patents & Royalties: Combination of a MCL-1 inhibitor and midostaurin, uses and pharmaceutical composition thereof.. Halilovic:\\u2008Novartis: Current Employment, Current holder of individual stocks in a privately-held company, Current holder of stock options in a privately-held company. Mistry:\\u2008Novartis: Current Employment, Current holder of individual stocks in a privately-held company. Derr\\u00e9al:\\u2008Servier: Current Employment. Banquet:\\u2008Servier: Current Employment. Daver:\\u2008Genentech: Consultancy, Research Funding; Trillium: Consultancy, Research Funding; Novimmune: Research Funding; Glycomimetics: Research Funding; Trovagene: Consultancy, Research Funding; FATE Therapeutics: Research Funding; Astellas: Consultancy, Research Funding; Abbvie: Consultancy, Research Funding; Amgen: Consultancy, Research Funding; Hanmi: Research Funding; Gilead Sciences, Inc.: Consultancy, Research Funding; Bristol Myers Squibb: Consultancy, Research Funding; Daiichi Sankyo: Consultancy, Research Funding; Pfizer: Consultancy, Research Funding; ImmunoGen: Consultancy, Research Funding; Sevier: Consultancy, Research Funding; Novartis: Consultancy; Jazz Pharmaceuticals: Consultancy, Other: Data Monitoring Committee member; Dava Oncology (Arog): Consultancy; Celgene: Consultancy; Syndax: Consultancy; Shattuck Labs: Consultancy; Agios: Consultancy; Kite Pharmaceuticals: Consultancy; SOBI: Consultancy; STAR Therapeutics: Consultancy; Karyopharm: Research Funding; Newave: Research Funding. Andreeff:\\u2008Medicxi: Consultancy; ONO Pharmaceuticals: Research Funding; AstraZeneca: Research Funding; Reata, Aptose, Eutropics, SentiBio; Chimerix, Oncolyze: Current holder of individual stocks in a privately-held company; Karyopharm: Research Funding; Daiichi-Sankyo: Consultancy, Research Funding; Glycomimetics: Consultancy; Novartis, Cancer UK; Leukemia & Lymphoma Society (LLS), German Research Council; NCI-RDCRN (Rare Disease Clin Network), CLL Foundation; Novartis: Membership on an entity's Board of Directors or advisory committees; Syndax: Consultancy; Aptose: Consultancy; Oxford Biomedica UK: Research Funding; Amgen: Research Funding; Breast Cancer Research Foundation: Research Funding; Senti-Bio: Consultancy. Wei:\\u2008Novartis, Astellas, Pfizer, MacroGenics, AbbVie, Genentech, Servier, Celgene, Amgen, AstraZeneca, Janssen: Honoraria; Novartis, Celgene, AbbVie, Servier, AstraZeneca, and Amgen: Research Funding; Walter and Eliza Hall Institute: Ended employment in the past 24 months. Konopleva:\\u2008Cellectis: Other: grant support; Stemline Therapeutics: Research Funding; Novartis: Other: research funding pending, Patents & Royalties: intellectual property rights; AstraZeneca: Other: grant support, Research Funding; Eli Lilly: Patents & Royalties: intellectual property rights, Research Funding; F. Hoffmann-La Roche: Consultancy, Honoraria, Other: grant support; Ascentage: Other: grant support, Research Funding; Agios: Other: grant support, Research Funding; Sanofi: Other: grant support, Research Funding; Forty Seven: Other: grant support, Research Funding; Ablynx: Other: grant support, Research Funding; KisoJi: Research Funding; Genentech: Consultancy, Honoraria, Other: grant support, Research Funding; Calithera: Other: grant support, Research Funding; Rafael Pharmaceuticals: Other: grant support, Research Funding; Reata Pharmaceuticals: Current holder of stock options in a privately-held company, Patents & Royalties: intellectual property rights; AbbVie: Consultancy, Honoraria, Other: Grant Support, Research Funding.\\n\"}, {\"paperId\": \"0382ccc76e312bf92a0f1f367d0f1590caf5e4fa\", \"externalIds\": {\"MAG\": \"3091785888\", \"DOI\": \"10.1096/fj.202001406R\", \"CorpusId\": 222257452, \"PubMed\": \"33037689\"}, \"title\": \"Functional redundancy and compensation: Deletion of multiple murine Crisp genes reveals their essential role for male fertility\", \"venue\": \"The FASEB Journal\", \"year\": 2020, \"citationCount\": 15, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fj.202001406R?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fj.202001406R, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6622418\", \"name\": \"L. Curci\"}, {\"authorId\": \"5343564\", \"name\": \"N. G. Brukman\"}, {\"authorId\": \"46986067\", \"name\": \"M. Mu\\u00f1oz\"}, {\"authorId\": \"39081940\", \"name\": \"D. Rojo\"}, {\"authorId\": \"2065265517\", \"name\": \"Guillermo Carvajal\"}, {\"authorId\": \"1993260497\", \"name\": \"V. Sulzyk\"}, {\"authorId\": \"144367824\", \"name\": \"S. N. Gonzalez\"}, {\"authorId\": \"2253420150\", \"name\": \"Marcelo Rubinstein\"}, {\"authorId\": \"2253420150\", \"name\": \"Marcelo Rubinstein\"}, {\"authorId\": \"2253395434\", \"name\": \"V. D. Ros\"}, {\"authorId\": \"3930775\", \"name\": \"P. Cuasnic\\u00fa\"}], \"abstract\": \"Mammalian Cysteine\\u2010RIch Secretory Protein (CRISP) family includes four members present in sperm and reported to regulate Ca2+ channels and fertilization. Based on our previous observations using single knockouts models and suggesting the existence of functional compensation among CRISP proteins, we investigated their relevance for male fertility by generating multiple Crisp gene mutants by CRISPR/Cas9 technology. Whereas targeting of Crisp1 and Crisp3 yielded subfertile males with early embryo developmental defects, the same deletion in zygotes from fertile Crisp2\\u2212/\\u2212.Crisp4\\u2212/\\u2212 mice led to the generation of both triple and quadruple knockout mice exhibiting a complete or severe disruption of male fertility due to a combination of sperm transport, fertilization, and embryo developmental defects linked to intracellular Ca2+ dysregulation. These observations reveal that CRISP proteins are essential for male fertility and organize in functional modules that contribute distinctly to fertility success, bringing insights into the mechanisms underlying functional redundancy/compensation in protein families and emphasizing the importance of generating multiple and not just single knockout which might be masking the true functional relevance of family genes.\"}, {\"paperId\": \"03860b7af236764ee5d4c4c01d3acf1eb38f28ea\", \"externalIds\": {\"DOI\": \"10.1002/jmv.29230\", \"CorpusId\": 265462775, \"PubMed\": \"38009614\"}, \"title\": \"Revisiting the role of endogenous STAT3 in HPV\\u2010positive cervical cancer cells\", \"venue\": \"Journal of Medical Virology\", \"year\": 2023, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/jmv.29230\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/jmv.29230?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/jmv.29230, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2102163764\", \"name\": \"Tobias D Strobel\"}, {\"authorId\": \"2328960608\", \"name\": \"M. Weber\"}, {\"authorId\": \"2268469121\", \"name\": \"Nora Heber\"}, {\"authorId\": \"2063967394\", \"name\": \"A. Holzer\"}, {\"authorId\": \"1422076640\", \"name\": \"K. Hoppe\\u2010Seyler\"}, {\"authorId\": \"1422076642\", \"name\": \"F. Hoppe-Seyler\"}], \"abstract\": \"Novel treatment options for human papillomavirus (HPV)\\u2010induced cancers are urgently required. The oncogenic transcription factor signal transducer and activator of transcription 3 (STAT3) is considered to be constitutively active in HPV\\u2010positive cervical cancer cells and essential for their proliferation. Moreover, STAT3 was reported to undergo mutually stimulatory interactions with the HPV E6/E7 oncogenes. Thus, inhibiting STAT3 in HPV\\u2010positive cancer cells is under discussion to provide a powerful novel therapeutic strategy. We here show that the antifungal drug ciclopirox destabilizes the STAT3 protein by acting as an iron chelator. However, by exploring the functional consequences of STAT3 inhibition in HPV\\u2010positive cancer cells, we obtained several unexpected results. Chemical STAT3 inhibitors heterogeneously affect cervical cancer cell proliferation and those which act antiproliferative also block the growth of STAT3 knockout cells, indicating induction of off\\u2010target effects. In contrast to several chemical inhibitors, genetic inhibition of STAT3 expression by either RNA interference or the CRISPR/Cas9 method does not appreciably affect cervical cancer cell proliferation. Transcriptome analyses indicate that blocking STAT3 expression in HPV\\u2010positive cancer cells has very limited effects on putative STAT3 target genes. Although the targeted inhibition of specific growth\\u2010promoting signaling pathways leads to a feedback activation of STAT3 in cervical cancer cells via Janus kinase 1/2, this does not lead to treatment resistance. Moreover, we did not obtain experimental evidence for a STAT3\\u2010linked activation of HPV E6/E7 oncogene expression or, vice versa, an E6/E7\\u2010dependent activation of STAT3, at endogenous conditions in cervical cancer cells. Collectively, these findings question the essential role of STAT3 in cervical cancer cell proliferation and the strategy to inhibit STAT3 in these cells for therapeutic purposes.\"}, {\"paperId\": \"0387458d11fde4916f632ac6aee649e38a8a474b\", \"externalIds\": {\"DOI\": \"10.1182/blood-2024-211536\", \"CorpusId\": 274545962}, \"title\": \"Unraveling CAR Differentiation Dynamics through in Vitro and in silico Perturbations\", \"venue\": \"Blood\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2024-211536?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2024-211536, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269455718\", \"name\": \"Wenjun Zhu\"}, {\"authorId\": \"2269274750\", \"name\": \"Conor Kelly\"}, {\"authorId\": \"6093997\", \"name\": \"K. Keyvanfar\"}, {\"authorId\": \"2273298291\", \"name\": \"Pradeep Dagur\"}, {\"authorId\": \"2334072839\", \"name\": \"Stefan Cordes\"}], \"abstract\": \"\\n \\n Gene and cellular therapies extend the hope of cure to wider range of human diseases. Durability of these therapies is correlated to persistence of the adoptively conferred cells; while mature effector functions are key to effectiveness. Physiologically, cells are rarely simultaneously endowed with indefinite self-renewal and mature effector functions. Cellular therapies must, in response to environmental signals, dynamically transition between self-renewing and mature effector states while avoiding dysfunctional states.\\n Chimeric Antigen Receptor (CAR) T cells have emerged as effective therapies for B cell and plasma cell malignancies. While they induce prolonged remission in most patients, fewer than half achieve durable control of their disease. Factors associated with durable remissions can be broadly categorized into CAR T cell extrinsic, encompassing malignancy type, tumor burden, antigen escape and the tumor microenvironment, and intrinsic factors, pertaining to the dynamics of transition between the persistent and mature effector states. Strategies to design of CAR T therapies to surmount intrinsic mechanisms of failure are essential.\\n We carried out CRISPR activation screening targeting all human transcription factors and epigenetic modifiers in anti-CD20 CAR T cells cultured in vitro under conditions designed to provoke exhaustion. We observed statistically significant depletion in sgRNA targeting the TGFb (including KLF10) and TNFa (including NFATC4) signaling pathways in CAR with immunophenotypes associated with durability and effectiveness. Model-based Analysis of Genome-Wide CRISPR-Cas9 Knockout (MAGeCK) for the central memory population revealed enrichment of MFNG, a regulator of NOTCH signaling; NFIB, a master regulator of cell differentiation; SMYD2, an epigenetic regulator controlling Treg development; and TRIAP1, a TP53 regulated inhibitor of apoptosis. Although biologically plausible, these targets play important roles in regulating proliferation and cytotoxicity and entirely disabling these host-protective mechanisms raises important safety concerns.\\n Transcription factors and epigenetic modifiers have broad effects on cellular states and regulatory mechanisms. By contrast, cis-regulatory elements (CRE) directly affect only the transcription of genes in their vicinity. Perturbating CRE alters T cell regulation with a finer degree of control and is incompletely explored. Systematically screening the large number of candidate CRE is not feasible via current experimental approaches.\\n We developed a model, trained on single cell multi-omics data, to predict the time evolution of transcriptomes and regulomes. The introduction of chromatin state in the description of cellular dynamics, permits prediction of cellular dynamics after enhancing or disrupting specific and computes therapeutically salient metrics such as overall proliferation rate and proportions of CAR in memory and functional effector subsets.\\n Our model predicts that the conditional knock out of the trans-acting factor TCF7 will increase the transition rates from na\\u00efve and memory T cell subsets into effector states; a prediction that agrees with the established biological roles for TCF7. By contrast, targeting the disruption of a candidate cis-regulatory element (cCRE) in the vicinity of KLF10 (chr8:101,790,788-101,791,270) is predicted to strongly increase transition probabilities into the Na\\u00efve and Memory subsets.\\n Our model casts the problem of optimizing cellular therapies into the framework of dynamical systems theory and provides a rigorous approach for prioritizing the experimentally intractable number of perturbations by metrics directly relevant to persistence of efficacious adoptive cells. Future directions include the incorporation of additional single cell multiomic modalities to better characterize regulatory dynamics.\\n\"}, {\"paperId\": \"0387dc4ac5700536107a5ff32014260364ae0cca\", \"externalIds\": {\"PubMedCentral\": \"7859101\", \"DOI\": \"10.3389/fpls.2020.599474\", \"CorpusId\": 231654639, \"PubMed\": \"33552096\"}, \"title\": \"Enhancement of Tobacco (Nicotiana tabacum L.) Seed Lipid Content for Biodiesel Production by CRISPR-Cas9-Mediated Knockout of NtAn1\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2020.599474/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7859101, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11871754\", \"name\": \"Yinshuai Tian\"}, {\"authorId\": \"91163779\", \"name\": \"Xinanbei Liu\"}, {\"authorId\": \"1976611868\", \"name\": \"C. Fan\"}, {\"authorId\": \"14038090\", \"name\": \"Tingting Li\"}, {\"authorId\": \"2112655957\", \"name\": \"Huan Qin\"}, {\"authorId\": \"2108787421\", \"name\": \"Xiao Li\"}, {\"authorId\": \"2118438834\", \"name\": \"Kai Chen\"}, {\"authorId\": \"6032095\", \"name\": \"Yunpu Zheng\"}, {\"authorId\": \"94294292\", \"name\": \"Fang Chen\"}, {\"authorId\": \"2145204611\", \"name\": \"Ying Xu\"}], \"abstract\": \"Tobacco (Nicotiana tabacum L.) seed lipid is a promising non-edible feedstock for biodiesel production. In order to meet the increasing demand, achieving high seed lipid content is one of the major goals in tobacco seed production. The TT8 gene and its homologs negatively regulate seed lipid accumulation in Arabidopsis and Brassica species. We speculated that manipulating the homolog genes of TT8 in tobacco could enhance the accumulation of seed lipid. In this present study, we found that the TT8 homolog genes in tobacco, NtAn1a and NtAn1b, were highly expressed in developing seed. Targeted mutagenesis of NtAn1 genes was created by the CRISPR-Cas9-based gene editing technology. Due to the defect of proanthocyanidin (PA) biosynthesis, mutant seeds showed the phenotype of a yellow seed coat. Seed lipid accumulation was enhanced by about 18 and 15% in two targeted mutant lines. Protein content was also significantly increased in mutant seeds. In addition, the seed yield-related traits were not affected by the targeted mutagenesis of NtAn1 genes. Thus, the overall lipid productivity of the NtAn1 knockout mutants was dramatically enhanced. The results in this present paper indicated that tobacco NtAn1 genes regulate both PAs and lipid accumulation in the process of seed development and that targeted mutagenesis of NtAn1 genes could generate a yellow-seeded tobacco variety with high lipid and protein content. Furthermore, the present results revealed that the CRISPR-Cas9 system could be employed in tobacco seed de novo domestication for biodiesel feedstock production.\"}, {\"paperId\": \"038855bd67bd91d6f195f9d7e8c21e386a519904\", \"externalIds\": {\"DOI\": \"10.1038/s41467-022-28861-0\", \"CorpusId\": 258720143}, \"title\": \"An enhancer variant at 16q22.1 predisposes to hepatocellular carcinoma via regulating PRMT7 expression\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-022-28861-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41467-022-28861-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41467-022-28861-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47287694\", \"name\": \"T. Shen\"}, {\"authorId\": \"2952927\", \"name\": \"Ting Ni\"}, {\"authorId\": \"47740794\", \"name\": \"Jiaxuan Chen\"}, {\"authorId\": \"2856926\", \"name\": \"Haitao Chen\"}, {\"authorId\": \"2115573622\", \"name\": \"X. Ma\"}, {\"authorId\": \"46323001\", \"name\": \"G. Cao\"}, {\"authorId\": \"1387841170\", \"name\": \"Tianzhi Wu\"}, {\"authorId\": \"2148948479\", \"name\": \"Haisheng Xie\"}, {\"authorId\": \"51483278\", \"name\": \"Bin Zhou\"}, {\"authorId\": \"144268497\", \"name\": \"Gang Wei\"}, {\"authorId\": \"4580245\", \"name\": \"H. Saiyin\"}, {\"authorId\": \"39157510\", \"name\": \"Suqin Shen\"}, {\"authorId\": \"145483154\", \"name\": \"YU Peng\"}, {\"authorId\": \"144280818\", \"name\": \"Q. Xiao\"}, {\"authorId\": \"2146671915\", \"name\": \"Hui Liu\"}, {\"authorId\": \"2116188594\", \"name\": \"Yu Gao\"}, {\"authorId\": \"2759372\", \"name\": \"Xi-Dai Long\"}, {\"authorId\": \"2424660070\", \"name\": \"Jianhua Yin\"}, {\"authorId\": \"2155600296\", \"name\": \"Yanfang Guo\"}, {\"authorId\": \"5183070\", \"name\": \"Jiaxue Wu\"}, {\"authorId\": \"143659297\", \"name\": \"Gong-Hong Wei\"}, {\"authorId\": \"2115104654\", \"name\": \"Jin-Xiu Hou\"}, {\"authorId\": \"51040130\", \"name\": \"Deke Jiang\"}], \"abstract\": \"Most cancer causal variants are found in gene regulatory elements, e.g ., enhancers. However, enhancer variants predisposing to hepatocellular carcinoma (HCC) remain unreported. Here we conduct a genome-wide survey of HCC-susceptible enhancer variants through a three-stage association study in 11,958 individuals and identify rs73613962 (T\\u2009>\\u2009G) within the intronic region of PRMT7 at 16q22.1 as a susceptibility locus of HCC (OR\\u2009=\\u20091.41, P \\u2009=\\u20096.02\\u2009\\u00d7\\u200910^\\u221210). An enhancer dual-luciferase assay indicates that the rs73613962-harboring region has allele-specific enhancer activity. CRISPR-Cas9/dCas9 experiments further support the enhancer activity of this region to regulate PRMT7 expression. Mechanistically, transcription factor HNF4A binds to this enhancer region, with preference to the risk allele G, to promote PRMT7 expression. PRMT7 upregulation contributes to in vitro, in vivo, and clinical HCC-associated phenotypes, possibly by affecting the p53 signaling pathway. This concept of HCC pathogenesis may open a promising window for HCC prevention/treatment. The role of enhancer variants in hepatocellular carcinoma (HCC) predisposition remains unknown. Here, the authors perform a genome-wide survey of HCC-susceptible enhancer variants in 11,958 individuals, identify rs73613962 within the intronic region of PRMT7 and find that PRMT7 upregulation predisposes to HCC.\"}, {\"paperId\": \"038cddabc0772726513d4b1b3e97b37b2ceca8f9\", \"externalIds\": {\"MAG\": \"3047692694\", \"DOI\": \"10.1089/thy.2020.0332\", \"CorpusId\": 221075978, \"PubMed\": \"32762296\"}, \"title\": \"Thyroid Hormone Receptor \\u03b1 Mutations Cause Heart Defects in Zebrafish\", \"venue\": \"Thyroid\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7891307\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/thy.2020.0332?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/thy.2020.0332, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8004682\", \"name\": \"C. R. Han\"}, {\"authorId\": \"2113637451\", \"name\": \"Hui Wang\"}, {\"authorId\": \"49444774\", \"name\": \"V. Hoffmann\"}, {\"authorId\": \"5758964\", \"name\": \"P. Zerfas\"}, {\"authorId\": \"4481045\", \"name\": \"M. Kruhlak\"}, {\"authorId\": \"2353685821\", \"name\": \"Sheue-yann Cheng\"}], \"abstract\": \"Background: Mutations of thyroid hormone receptor \\u03b11 (TR\\u03b11) cause resistance to thyroid hormone (RTH\\u03b1). Patients exhibit growth retardation, delayed bone development, anemia, and bradycardia. By using mouse models of RTH\\u03b1, much has been learned about the molecular actions of TR\\u03b11 mutants that underlie these abnormalities in adults. Using zebrafish models of RTH\\u03b1 that we have recently created, we aimed to understand how TR\\u03b11 mutants affect the heart function during this period. Methods: In contrast to human and mice, the thra gene is duplicated, thraa and thrab, in zebrafish. Using CRISPR/Cas9-mediated targeted mutagenesis, we created C-terminal mutations in each of two duplicated thra genes in zebrafish (thraa 8-bp insertion or thrab 1-bp insertion mutations). We recently showed that these mutant fish faithfully recapitulated growth retardation as found in patients and thra mutant mice. In the present study, we used histological analysis, gene expression profiles, confocal fluorescence, and transmission electron microscopy (TEM) to comprehensively analyze the phenotypic characteristics of mutant fish heart during development. Results: We found both a dilated atrium and an abnormally shaped ventricle in adult mutant fish. The retention of red blood cells in the two abnormal heart chambers, and the decreased circulating blood speed and reduced expression of contractile genes indicated weakened contractility in the heart of mutant fish. These abnormalities were detected in mutant fish as early as 35 days postfertilization (juveniles). Furthermore, the expression of genes associated with the sarcomere assembly was suppressed in the heart of mutant fish, resulting in abnormalities of sarcomere organization as revealed by TEM, suggesting that the abnormal sarcomere organization could underlie the bradycardia exhibited in mutant fish. Conclusions: Using a zebrafish model of RTH\\u03b1, the present study demonstrated for the first time that TR\\u03b11 mutants could act to cause abnormal heart structure, weaken contractility, and disrupt sarcomere organization that affect heart functions. These findings provide new insights into the bradycardia found in RTH\\u03b1 patients.\"}, {\"paperId\": \"038e768b8bae710c5001eb1a3b744dfa170da565\", \"externalIds\": {\"DOI\": \"10.1016/j.clim.2023.109343\", \"CorpusId\": 263414261, \"PubMed\": \"37094742\"}, \"title\": \"\\\"Untargeting\\\" autoantibodies using genome editing, a proof-of-concept study.\", \"venue\": \"Clinical Immunology\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/10/30/2022.10.29.514381.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.clim.2023.109343?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.clim.2023.109343, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4769564\", \"name\": \"G. D. Keppeke\"}, {\"authorId\": \"2097236441\", \"name\": \"Larissa Diogenes\"}, {\"authorId\": \"2189388974\", \"name\": \"K. Gomes\"}, {\"authorId\": \"2264503832\", \"name\": \"L. E. C. Andrade\"}], \"abstract\": \"Autoantibodies (AAbs) are useful biomarkers and many have direct pathogenic role. Current standard therapies for elimination of specific B/plasma-cell clones are not fully efficient. We apply CRISPR/Cas9 genome-editing to knockout V(D)J rearrangements that produce pathogenic AAbs in vitro. HEK293T cell-lines were established stably expressing a humanized anti-dsDNA Ab (clone 3H9) and a human-derived anti-nAChR-\\u03b11 Ab (clone B12L). For each clone, five CRISPR/Cas9 heavy-chain's CDR2/3-targeting guided-RNAs (T-gRNAs) were designed. Non-Target-gRNA (NT-gRNA) was control. After editing, levels of secreted Abs were evaluated, as well as 3H9 anti-dsDNA and B12L anti-AChR reactivities. T-gRNAs editing decreased expression of heavy-chain genes to ~50-60%, compared to >90% in NT-gRNA, although secreted Abs levels and reactivity to their respective antigens in T-gRNAs decreased ~90% and\\u202f~\\u202f95% compared with NT-gRNA for 3H9 and B12L, respectively. Sequencing indicated indels at Cas9 cut-site, which could lead to codon jam, and consequently, knockout. Additionally, remaining secreted 3H9-Abs presented variable dsDNA reactivity among the five T-gRNA, suggesting the exact Cas9 cut-site and indels further interfere with antibody-antigen interaction. CRISPR/Cas9 genome-editing was very effective to knockout the Heavy-Chain-IgG genes, considerably affecting AAbs secretion and binding capacity, fostering application of this concept to in vivo models as a potential novel therapeutic approach for AAb-mediated diseases.\"}, {\"paperId\": \"0390735cc238d67731ab9b4b8df4becf82aa0108\", \"externalIds\": {\"PubMedCentral\": \"9569948\", \"DOI\": \"10.3390/ijms231911649\", \"CorpusId\": 252828955, \"PubMed\": \"36232946\"}, \"title\": \"Homozygous CRISPR/Cas9 Knockout Generated a Novel Functionally Active Exon 1 Skipping XPA Variant in Melanoma Cells\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/19/11649/pdf?version=1664617823\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9569948, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2187505045\", \"name\": \"Veronika Banicka\"}, {\"authorId\": \"35520342\", \"name\": \"M. Martens\"}, {\"authorId\": \"34757064\", \"name\": \"R. Panzer\"}, {\"authorId\": \"4852925\", \"name\": \"D. Schrama\"}, {\"authorId\": \"2134689545\", \"name\": \"S. Emmert\"}, {\"authorId\": \"5460567\", \"name\": \"L. Boeckmann\"}, {\"authorId\": \"2187505130\", \"name\": \"Alexander Thiem\"}], \"abstract\": \"Defects in DNA repair pathways have been associated with an improved response to immune checkpoint inhibition (ICI). In particular, patients with the nucleotide excision repair (NER) defect disease Xeroderma pigmentosum (XP) responded impressively well to ICI treatment. Recently, in melanoma patients, pretherapeutic XP gene expression was predictive for anti-programmed cell death-1 (PD-1) ICI response. The underlying mechanisms of this finding are still to be revealed. Therefore, we used CRISPR/Cas9 to disrupt XPA in A375 melanoma cells. The resulting subclonal cell lines were investigated by Sanger sequencing. Based on their genetic sequence, candidates from XPA exon 1 and 2 were selected and further analyzed by immunoblotting, immunofluorescence, HCR and MTT assays. In XPA exon 1, we established a homozygous (c.19delG; p.A7Lfs*8) and a compound heterozygous (c.19delG/c.19_20insG; p.A7Lfs*8/p.A7Gfs*55) cell line. In XPA exon 2, we generated a compound heterozygous mutated cell line (c.206_208delTTG/c.208_209delGA; p.I69_D70delinsN/p.D70Hfs*31). The better performance of the homozygous than the heterozygous mutated exon 1 cells in DNA damage repair (HCR) and post-UV-C cell survival (MTT), was associated with the expression of a novel XPA protein variant. The results of our study serve as the fundamental basis for the investigation of the immunological consequences of XPA disruption in melanoma.\"}, {\"paperId\": \"0390a5805a79dafa22a88e78eee2cca9123bedd0\", \"externalIds\": {\"PubMedCentral\": \"9021883\", \"DOI\": \"10.17912/micropub.biology.000554\", \"CorpusId\": 248321173, \"PubMed\": \"35622509\"}, \"title\": \"The Cbr-DPY-10(Arg92Cys) modification is a reliable co-conversion marker for CRISPR/Cas9 genome editing in Caenorhabditis briggsae\", \"venue\": \"microPublication Biology\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9021883, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7318884\", \"name\": \"I. A. Toker\"}, {\"authorId\": \"2781726\", \"name\": \"O. Hobert\"}], \"abstract\": \"The maturation of genome editing techniques dramatically broadens the range of organisms amenable to mechanistic investigation. Caenorhabditis briggsae is a nematode species related to C. elegans and a favored target for comparative studies. Here, we expand the repertoire of co-conversion markers to facilitate the screening and isolation of CRISPR/Cas9-edited lines in C. briggsae . Similar to its homologous C. elegans mutation, Cbr-dpy-10(Arg92Cys) is phenotypically easy to detect in its heterozygous form and is distinguishable from other combinations of Cbr-dpy- 10 alleles, a valuable feature for the reliable isolation of marker-free CRISPR/Cas9-edited animals.\"}, {\"paperId\": \"03934671e5f5c14c4155884720061dca08c99eae\", \"externalIds\": {\"MAG\": \"3168223213\", \"DOI\": \"10.1200/JCO.2021.39.15_SUPPL.TPS7570\", \"CorpusId\": 236399267}, \"title\": \"A phase 1 dose escalation and cohort expansion study of the safety and efficacy of allogeneic CRISPR-Cas9\\u2013engineered T cells (CTX110) in patients (Pts) with relapsed or refractory (R/R) B-cell malignancies (CARBON).\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 16, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1200/JCO.2021.39.15_SUPPL.TPS7570?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1200/JCO.2021.39.15_SUPPL.TPS7570, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143809772\", \"name\": \"J. Mcguirk\"}, {\"authorId\": \"6432537\", \"name\": \"C. Bachier\"}, {\"authorId\": \"6214721\", \"name\": \"M. Bishop\"}, {\"authorId\": \"51024294\", \"name\": \"P. Ho\"}, {\"authorId\": \"144176529\", \"name\": \"H. Murthy\"}, {\"authorId\": \"46607978\", \"name\": \"M. Dickinson\"}, {\"authorId\": \"4979319\", \"name\": \"J. Maakaron\"}, {\"authorId\": \"87664074\", \"name\": \"C. Andreadis\"}, {\"authorId\": \"9670138\", \"name\": \"A. Ghobadi\"}, {\"authorId\": \"1921644\", \"name\": \"E. Waller\"}, {\"authorId\": \"144167911\", \"name\": \"M. Benton\"}, {\"authorId\": \"14182386\", \"name\": \"S. Suh\"}, {\"authorId\": \"46485747\", \"name\": \"Huansheng Xu\"}, {\"authorId\": \"32567382\", \"name\": \"Ewelina Morawa\"}, {\"authorId\": \"1811272\", \"name\": \"F. Awan\"}, {\"authorId\": \"3592876\", \"name\": \"P. Shaughnessy\"}, {\"authorId\": \"1683023\", \"name\": \"C. Tam\"}, {\"authorId\": \"116443179\", \"name\": \"N. Kroeger\"}, {\"authorId\": \"6978697\", \"name\": \"R. Maziarz\"}], \"abstract\": \"TPS7570 Background: Diffuse large B-cell lymphoma (DLBCL) is the most common form of non-Hodgkin lymphoma (NHL), and although > 50% of pts achieve long-term remission with first-line therapy, pts with R/R disease as well as those with R/R grade 3b follicular lymphoma (FL), double-, or triple-hit high-grade lymphomas have poor long-term outcomes (Crump 2017; Kahl 2016; Jain 2012). Autologous (auto) chimeric antigen receptor (CAR) T cell therapy has provided additional options for pts with R/R disease, but only when leukapheresis and manufacturing prove feasible (Jacobson 2020). Allogeneic (allo) CAR-T cells were designed specifically to address these unmet needs by using healthy donor T cells to produce a readily available product and remove the need for bridging chemotherapy. We are currently investigating the safety and efficacy of CTX110, an allo anti-CD19 CAR-T cell product modified by using CRISPR/Cas9-editing to disrupt the endogenous T-cell receptor (TCR) alpha constant (TRAC) locus in order to remove TCR expression and disrupt \\u03b22-microglobulin, which eliminates major histocompatibility complex (MHC) class I expression. Disruption of the TCR should significantly reduce or eliminate risks of graft-versus-host disease and elimination of MHC class I expression may increase CAR-T cell persistence by mitigating CTX110 rejection. In addition, the anti-CD19 CAR transgene construct is precisely inserted into the TRAC locus. Methods: The Phase 1 CARBON trial (NCT04035434) is an open-label, multicenter, global study evaluating the safety and efficacy of CTX110 in pts \\u226518 y with R/R DLBCL NOS, double- or triple-hit DLBCL, or transformed or grade 3b FL with \\u22652 prior lines of therapy or who are ineligible for/refused prior auto hematopoietic stem cell transplant (HSCT). Pts who received prior auto CAR-T or allo HSCT are excluded. Pts will receive lymphodepleting chemotherapy with fludarabine 30mg/m2 and cyclophosphamide 500mg/m2 for 3 days, followed by CTX110 infusion. In part A, dose escalation will be performed using a 3+3 design. Upon completion of dose finding, the cohort will be expanded to further assess safety signals and efficacy including the primary efficacy endpoint of overall response rate. Key secondary efficacy endpoints include duration of response, progression-free survival, and overall survival. The trial is currently open and enrolling. Clinical trial information: NCT04035434.\"}, {\"paperId\": \"03970f460e512fa811a009c4c9caa56bcc5f3801\", \"externalIds\": {\"DOI\": \"10.1101/2021.10.14.464343\", \"CorpusId\": 239012309}, \"title\": \"A Novel Mice Model of Catecholaminergic Polymorphic Ventricular Tachycardia Generated by CRISPR/Cas9\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.10.14.464343\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.10.14.464343?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.10.14.464343, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13299382\", \"name\": \"Cuilan Hou\"}, {\"authorId\": \"71992023\", \"name\": \"Xunwei Jiang\"}, {\"authorId\": \"2047444517\", \"name\": \"Qingzhu Qiu\"}, {\"authorId\": \"2115843332\", \"name\": \"Junming Zheng\"}, {\"authorId\": \"2004410336\", \"name\": \"Shujia Lin\"}, {\"authorId\": \"2125204268\", \"name\": \"Shun Chen\"}, {\"authorId\": \"2110684062\", \"name\": \"Meng Xu\"}, {\"authorId\": \"49890291\", \"name\": \"Yongwei Zhang\"}, {\"authorId\": \"145210961\", \"name\": \"Lijian Xie\"}, {\"authorId\": \"35520618\", \"name\": \"T. Xiao\"}], \"abstract\": \"Catecholaminergic polymorphic ventricular tachycardia (CPVT) has been considered as one of the most important causes of children\\u2019s sudden cardiac death. Mutations in the genes for RyR2 and CASQ2, two mainly subtypes of CPVT, have been identified. However, the mutation in the gene of TECRL was rarely reported, which could be another genetic cause of CPVT. We evaluated myocardial contractility, electrophysiology, calcium handling in Tecrl knockout (Tecrl KO) mice and human induced pluripotent stem cell-derived cardiomyocytes. Immediately after epinephrine plus caffeine injection, Tecrl KO mice showed much more multiple premature ventricular beats and ventricular tachycardia. The Tecrl KO mice demonstrate CPVT phenotypes. Mechanistically, intracellular calcium amplitude was reduced, while time to baseline of 50 was increased in acute isolated cardiomyocytes. RyR2 protein levels decreased significantly upon cycloheximide treatment in TECRL deficiency cardiomyocytes. Overexpression of TECRL and KN93 can partially reverse cardiomyocytes calcium dysfunction, and this is p-CaMKII/CaMKII dependent. Therefore, a new CPVT mouse model was constructed. We propose a previously unrecognized mechanism of TECRL and provide support for the therapeutic targeting of TECRL in treating CPVT.\"}, {\"paperId\": \"039721cdf7118802e0652860f8ef2e9dd0ff00ab\", \"externalIds\": {\"PubMedCentral\": \"8282794\", \"DOI\": \"10.1038/s42003-021-02397-3\", \"CorpusId\": 235917347, \"PubMed\": \"34267311\"}, \"title\": \"Three-dimensional CRISPR screening reveals epigenetic interaction with anti-angiogenic therapy\", \"venue\": \"Communications Biology\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-021-02397-3.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8282794, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47598298\", \"name\": \"Michael Y. He\"}, {\"authorId\": \"5760919\", \"name\": \"M. Halford\"}, {\"authorId\": \"4512447\", \"name\": \"Ruofei Liu\"}, {\"authorId\": \"2054022135\", \"name\": \"James P. Roy\"}, {\"authorId\": \"47547406\", \"name\": \"Zoe L. Grant\"}, {\"authorId\": \"3858121\", \"name\": \"Leigh Coultas\"}, {\"authorId\": \"2484497\", \"name\": \"N. Thio\"}, {\"authorId\": \"4679530\", \"name\": \"O. Gilan\"}, {\"authorId\": \"39986168\", \"name\": \"Yih-Chih Chan\"}, {\"authorId\": \"1787590\", \"name\": \"M. Dawson\"}, {\"authorId\": \"5657503\", \"name\": \"M. Achen\"}, {\"authorId\": \"4492867\", \"name\": \"S. Stacker\"}], \"abstract\": \"Angiogenesis underlies development, physiology and pathogenesis of cancer, eye and cardiovascular diseases. Inhibiting aberrant angiogenesis using anti-angiogenic therapy (AAT) has been successful in the clinical treatment of cancer and eye diseases. However, resistance to AAT inevitably occurs and its molecular basis remains poorly understood. Here, we uncover molecular modifiers of the blood endothelial cell (EC) response to a widely used AAT bevacizumab by performing a pooled genetic screen using three-dimensional microcarrier-based cell culture and CRISPR\\u2013Cas9. Functional inhibition of the epigenetic reader BET family of proteins BRD2/3/4 shows unexpected mitigating effects on EC survival and/or proliferation upon VEGFA blockade. Moreover, transcriptomic and pathway analyses reveal an interaction between epigenetic regulation and anti-angiogenesis, which may affect chromosomal structure and activity in ECs via the cell cycle regulator CDC25B phosphatase. Collectively, our findings provide insight into epigenetic regulation of the EC response to VEGFA blockade and may facilitate development of quality biomarkers and strategies for overcoming resistance to AAT. Through three-dimensional CRISPR screening, He et al. report that functional inhibition of BET family of proteins BRD2/3/4 shows mitigating effects on blood endothelial cell (EC) survival and/or proliferation upon VEGFA blockade. An interaction between epigenetic regulation and anti-angiogenesis, which may affect chromosomal structure and activity in ECs through CDC25B phosphatase, is potentially involved with EC resistance to anti-angiogenic therapy.\"}, {\"paperId\": \"039730e5e653e1d1483b50f2f25cb71a25c425b3\", \"externalIds\": {\"MAG\": \"3090166145\", \"DOI\": \"10.1152/ajprenal.00383.2020\", \"CorpusId\": 222163209, \"PubMed\": \"33017189\"}, \"title\": \"Protein kinase A catalytic-\\u03b1 and catalytic-\\u03b2 proteins have non-redundant regulatory functions.\", \"venue\": \"AJP - Renal Physiology\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://europepmc.org/articles/pmc7789987\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1152/ajprenal.00383.2020?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1152/ajprenal.00383.2020, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4335781\", \"name\": \"V. Raghuram\"}, {\"authorId\": \"1840084924\", \"name\": \"Karim Salhadar\"}, {\"authorId\": \"15741074\", \"name\": \"Kavee Limbutara\"}, {\"authorId\": \"90658109\", \"name\": \"Eui-Yul Park\"}, {\"authorId\": \"46962006\", \"name\": \"Chin-Rang Yang\"}, {\"authorId\": \"144258387\", \"name\": \"M. Knepper\"}], \"abstract\": \"Vasopressin regulates osmotic water transport in the renal collecting duct by PKA-mediated control of the water channel aquaporin-2 (AQP2). Collecting duct principal cells express two seemingly redundant PKA catalytic subunits, PKA catalytic \\u03b1 (PKA-C\\u03b1) and PKA catalytic \\u03b2 (PKA-C\\u03b2). To identify the roles of these two protein kinases, we carried out deep phosphoproteomic analysis in cultured mpkCCD cells in which either PKA-C\\u03b1 or PKA-C\\u03b2 was deleted using CRISPR-Cas9-based genome editing. Controls were cells carried through the genome editing procedure, but without deletion of PKA. TMT mass tagging was used for protein mass spectrometric quantification. Of the 4635 phosphopeptides that were quantified 67 were significantly altered in abundance with PKA-C\\u03b1 deletion, while 21 were significantly altered in abundance with PKA-C\\u03b2 deletion. However, only four sites were changed in both. The target proteins identified in PKA-C\\u03b1-null cells were largely associated with cell membranes and membrane vesicles, while target proteins in the PKA-C\\u03b2-null cells were largely associated with the actin cytoskeleton and cell junctions. In contrast, in vitro incubation of mpkCCD proteins with recombinant PKA-C\\u03b1 and PKA-C\\u03b2 resulted in virtually identical phosphorylation changes. In addition, analysis of total protein abundances in the in vivo samples showed that PKA-C\\u03b1 deletion resulted in a near disappearance of AQP2 protein, while PKA-C\\u03b2 deletion did not decrease AQP2 abundance. We conclude that PKA-C\\u03b1 and PKA-C\\u03b2 serve substantially different regulatory functions in renal collecting duct cells and that differences in phosphorylation targets may be due to differences in protein interactions, e.g. mediated by AKAP, C-KAP or PDZ binding.\"}, {\"paperId\": \"03982fcc616591c5744b5398fff8c3527850eae1\", \"externalIds\": {\"DOI\": \"10.1515/bmc-2021-0001\", \"CorpusId\": 231819161, \"PubMed\": \"33544462\"}, \"title\": \"In Our Image: The Ethics of CRISPR Genome Editing\", \"venue\": \"Biomolecular Concepts\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.degruyter.com/document/doi/10.1515/bmc-2021-0001/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1515/bmc-2021-0001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1515/bmc-2021-0001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4629117\", \"name\": \"J. C. Eissenberg\"}], \"abstract\": \"Abstract The advent of genome editing technology promises to transform human health, livestock and agriculture, and to eradicate pest species. This transformative power demands urgent scrutiny and resolution of the ethical conflicts attached to the creation and release of engineered genomes. Here, I discuss the ethics surrounding the transformative CRISPR/Cas9-mediated genome editing technology in the contexts of human genome editing to eradicate genetic disease and of gene drive technology to eradicate animal vectors of human disease.\"}, {\"paperId\": \"039b071920be7669895d5ef6803f91ffae4fd763\", \"externalIds\": {\"PubMedCentral\": \"8340365\", \"DOI\": \"10.1186/s12951-021-00970-w\", \"CorpusId\": 236920846, \"PubMed\": \"34353334\"}, \"title\": \"CRISPR/Cas9 nanoeditor of double knockout large fragments of E6 and E7 oncogenes for reversing drugs resistance in cervical cancer\", \"venue\": \"Journal of Nanobiotechnology\", \"year\": 2021, \"citationCount\": 29, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jnanobiotechnology.biomedcentral.com/track/pdf/10.1186/s12951-021-00970-w\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8340365, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1583823781\", \"name\": \"Xianhuang Li\"}, {\"authorId\": \"2000437599\", \"name\": \"Mingming Guo\"}, {\"authorId\": \"2065170087\", \"name\": \"Beibei Hou\"}, {\"authorId\": \"2088587184\", \"name\": \"Bin Zheng\"}, {\"authorId\": \"1390877397\", \"name\": \"Zhiyun Wang\"}, {\"authorId\": \"1754427914\", \"name\": \"Mengqian Huang\"}, {\"authorId\": \"2111372324\", \"name\": \"Yanan Xu\"}, {\"authorId\": \"2153055715\", \"name\": \"Jin Chang\"}, {\"authorId\": \"2156018109\", \"name\": \"Tao Wang\"}], \"abstract\": \"Drug resistance of tumor cells is always a headache problem in clinical treatment. In order to combat chemotherapy-resistance in cervical cancer and improve treatment effect, we design a CRISPR/Cas9 nanoeditor to knock out two key oncogenes E6 and E7 that lead to drug tolerance. Meanwhile, the deletion of these two oncogenes can effectively reactivate p53 and pRB signaling pathways that inhibit the growth of tumor cells. Our results demonstrated the nanoeditor could simultaneously delete two oncogenes, and the size of DNA fragments knocked out reaches an unprecedented 563\\u00a0bp. After the preparation of cationic liposomes combined with chemotherapy drug docetaxel (DOC), this nanosystem can significantly inhibit the drug tolerance of cancer cells and improve the therapeutic effect of cervical cancer. Therefore, this study provides a promising strategy for the treatment of cervical cancer by combining chemotherapy and double-target gene therapy. This strategy can also be applied in other disease models to customize personalized anti-tumor strategies by simply changing chemotherapy drugs and targeted genes.\"}, {\"paperId\": \"039c16b970ab6c135928a5fe46a313446893a010\", \"externalIds\": {\"DOI\": \"10.1016/j.ijrobp.2023.06.1188\", \"CorpusId\": 263282092, \"PubMed\": \"37784970\"}, \"title\": \"The Role and Mechanism of Ferroptosis Mediated by METTL3-m6A Modification in Regulating Radioresistance of Esophageal Cancer.\", \"venue\": \"International Journal of Radiation Oncology, Biology, Physics\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijrobp.2023.06.1188?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijrobp.2023.06.1188, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146354220\", \"name\": \"R. Ma\"}, {\"authorId\": \"2249080389\", \"name\": \"L. Zhao\"}], \"abstract\": \"PURPOSE/OBJECTIVE(S)\\nRadioresistance remains the major cause of recurrence within two years after radical radiotherapy in approximately 50% of patients with esophageal cancer (ESCC). Recently, it has been reported that enhancing ferroptosis can reverse tumor radioresistance. However, the underlying mechanisms remain elusive. The aim of this study was to elucidate the role and mechanism of ferroptosis mediated by METTL3 N6-methyladenosine (m6A) modification in regulating radioresistance of Esophageal Cancer. We hypothesize that inhibition of ferroptosis confers radioresistance in Esophageal Cancer by METTL3-induced m6A modification which increase the expression of m6A in the 3'UTR region of SOCS6 and inhibits its expression.\\n\\n\\nMATERIALS/METHODS\\nTo explore the relationship between radioresistance and ferroptosis. Firstly, ferroptosis was analyzed by 4-HNE staining in ESCC specimens; Furthermore, cell death was detected by propidium iodide (PI) or SYTOX Green staining combined with microscopy or flow cytometry in ESCC radioresistance cells and parental cells, and Iron Assay Kit,C11-BODIPY were used to examine whether ferroptosis were inhibited in radioresistance cells. Subsequently, MeRIP-seq and MeRIP-PCR were performed for discussing the relationship between ferroptosis and m6A. Finally, Mettl3 depleted cells were generated with CRISPR/Cas9-mediated knockout system. Then, m6A methylation level, sensitivity to radiation and ferroptosis of Mettl3 depleted cells by EpiQuik m6A RNA methylation quantification kit, colony formation, C11-BODIPY and Western Blot.\\n\\n\\nRESULTS\\nFirstly, we found that the level of lipid peroxide 4-HNE in ESCC samples that recurred after radical radiotherapy was significantly lower than that in radiotherapy (40Gy), and the ferroptosis of radioresistance cells was inhibited. MeRIP-seq found that the level of m6A in radioresistance cells increased significantly, and then the KEGG pathway analysis of MeRIP-seq results showed that hypermethylation of m6A was closely related to ferroptosis signal pathway. and we also found that the level of m6A was significantly decreased by adding agonist (Erastin), whereas the modification level was significantly increased by adding inhibitor Fer-1. Meanwhile, we found that the level of m6A was significantly decreased in radioresistance cells silencing METTL3, while the ferroptosis was activated, which caused the radiosensitivity of ESCC. Lastly, MeRIP-PCR data showed that METTLT3 induced a significant increase in m6A level in 3' UTR region of SOCS6 mRNA and inhibited its expression, which eventually led to radioresistance of ESCC.\\n\\n\\nCONCLUSION\\nm6A-regulated ferroptosis inhibition confers radioresistance of ESCC. METTL3 up-regulated m6A in SOCS6 3' UTR and inhibited the expression of SOCS6, which caused the inhibition of ferroptosis.\"}, {\"paperId\": \"039c5bf9e71ae74497138e4845b63e6c7b850679\", \"externalIds\": {\"DOI\": \"10.1093/femspd/ftac043\", \"CorpusId\": 253246325, \"PubMed\": \"36316012\"}, \"title\": \"Pyp25\\u03b1 is required for male gametocyte exflagellation.\", \"venue\": \"Pathogens and Disease\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/femspd/ftac043?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/femspd/ftac043, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2177379018\", \"name\": \"Chao Zhang\"}, {\"authorId\": \"2151285046\", \"name\": \"Deyi Li\"}, {\"authorId\": \"2155820289\", \"name\": \"Zhirong Meng\"}, {\"authorId\": \"2396010375\", \"name\": \"Jianwei Zhou\"}, {\"authorId\": \"2189431756\", \"name\": \"Zhenxiao Min\"}, {\"authorId\": \"2189431890\", \"name\": \"Shengqun Deng\"}, {\"authorId\": \"49927449\", \"name\": \"Ji-jia Shen\"}, {\"authorId\": \"2144067253\", \"name\": \"Miao Liu\"}], \"abstract\": \"Malaria, a mosquito-borne infectious disease, is caused by the unicellular apicomplexan protozoa of the genus Plasmodium. For malaria parasite transmission, the essential sexual stage includes production of gametocytes through gametocytogenesis in vertebrate hosts and formation of gametes from gametocytes through gametogenesis in mosquito vectors. Whereas each female gametocyte forms a single immotile macrogamete, a male gametocyte produces eight flagella-like microgametes in a process called exflagellation. We identified a conserved protein named as Py05543 (Pyp25\\u03b1), required for male gametocyte exflagellation in Plasmodium yoelii, which is the ortholog of PFL1770c (PF3D7_1236600). Interestingly, PF3D7_1236600 was previously phenotypically screened to be gametocyte-essential genes during gametocytogenesis of Plasmodium falciparum, using piggyBac transposon-mediated insertional mutagenesis. In this study, using CRISPR/Cas9-mediated genome editing, the Pyp25\\u03b1\\u00af (KO) parasite line was successfully established. We found that the KO parasites proliferated asexually in mouse blood normally. In addition, compared with that of the parental parasites, the KO parasites displayed similar levels of gametocytes formation. Unexpectedly, the KO parasites showed considerable deficiency in exflagellation of male gametes, by observing exflagellation centre formation. Taken together, our data suggested that Pyp25\\u03b1 gene, the ortholog of PF3D7_1236600, was nonessential for the growth of asexual parasites, required for male gametocyte exflagellation in P. yoelii.\"}, {\"paperId\": \"039c63d4b959aca749dc67181b91cf2e3babaae5\", \"externalIds\": {\"MAG\": \"3013205857\", \"DOI\": \"10.1101/2020.03.25.008276\", \"CorpusId\": 214726065}, \"title\": \"Self-cutting and integrating CRISPR plasmids (SCIPs) enable targeted genomic integration of genetic payloads for rapid cell engineering\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.03.25.008276?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.03.25.008276, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3881692\", \"name\": \"Darin Bloemberg\"}, {\"authorId\": \"1601552451\", \"name\": \"Daniela Sosa-Miranda\"}, {\"authorId\": \"144397793\", \"name\": \"T. Nguyen\"}, {\"authorId\": \"4517161\", \"name\": \"R. Weeratna\"}, {\"authorId\": \"39066037\", \"name\": \"S. McComb\"}], \"abstract\": \"Since observations that CRISPR nucleases function in mammalian cells, many strategies have been devised to adapt them for genetic engineering. Here, we investigated self-cutting and integrating CRISPR-Cas9 plasmids (SCIPs) as easy-to-use gene editing tools that insert themselves at CRISPR-guided locations. SCIPs demonstrated similar expression kinetics and gene disruption efficiency in mouse (EL4) and human (Jurkat) cells, with stable integration in 3-6% of transfected cells. Clonal sequencing analysis indicated that integrants showed bi- or mono-allelic integration of entire CRISPR plasmids in predictable orientations and with limited indel formation. Interestingly, including longer homology arms (HAs) (500 bp) in varying orientations only modestly increased knock-in efficiency (\\u223c2-fold). Using a SCIP-payload design (SCIPpay) which liberates a promoter-less sequence flanked by HAs thereby requiring perfect homology-directed repair (HDR) for transgene expression, longer HAs resulted in higher integration efficiency and precision of the payload but did not affect integration of the remaining plasmid sequence. As proofs-of-concept, we used SCIPpay to 1) insert a gene fragment encoding tdTomato into the CD69 locus of Jurkat cells, thereby creating a cell line that reports T cell activation, and 2) insert a chimeric antigen receptor (CAR) gene into the TRAC locus. Here, we demonstrate that SCIPs function as simple, efficient, and programmable tools useful for generating gene knock-out/knock-in cell lines and suggest future utility in knock-in site screening/optimization, unbiased off-target site identification, and multiplexed, iterative, and/or library-scale automated genome engineering.\"}, {\"paperId\": \"03a211ebc1f55794b6da23b186be322edc93f5f7\", \"externalIds\": {\"DOI\": \"10.46480/esj.5.4.179\", \"CorpusId\": 265667448}, \"title\": \"Revisi\\u00f3n bibliogr\\u00e1fica: Etileno en poscosecha, tecnolog\\u00edas para su manejo y control\", \"venue\": \"Ecuadorian Science Journal\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.46480/esj.5.4.179?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.46480/esj.5.4.179, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153022162\", \"name\": \"C\\u00e9sar Gavin\"}, {\"authorId\": \"1752943063\", \"name\": \"Diego Barzallo\"}, {\"authorId\": \"146943883\", \"name\": \"H. Vera\"}, {\"authorId\": \"2153028627\", \"name\": \"Rafael Lazo\"}], \"abstract\": \"Este trabajo abarca informaci\\u00f3n cient\\u00edfica, tecnol\\u00f3gica y simplificada acerca de la influencia del etileno sobre la poscosecha de frutos climat\\u00e9ricos, frutos no climat\\u00e9ricos y hortalizas, esta investigaci\\u00f3n bibliogr\\u00e1fica se ha enfocado en comprender los mecanismos moleculares de la bios\\u00edntesis del etileno, las acciones que provoca el etileno en la planta, en la maduraci\\u00f3n y en la poscosecha. Abordamos informaci\\u00f3n acerca de los distintos m\\u00e9todos para el control del etileno, los cuales van desde m\\u00e9todos f\\u00edsicos simples como la refrigeraci\\u00f3n, el uso de qu\\u00edmicos como el 1 metilciclopropeno (1-MCP), el uso del permanganato de potasio (KMnO4) y m\\u00e9todos novedosos como la obtenci\\u00f3n y desarrollo de plantas transg\\u00e9nicas mediante ingenier\\u00eda gen\\u00e9tica (uso de la herramienta crispr cas9) e incluso el uso de la nanotecnolog\\u00eda para controlar esta hormona. La informaci\\u00f3n obtenida acerca del etileno, adem\\u00e1s de atender las demandas tecnol\\u00f3gicas para el mantenimiento y la conservaci\\u00f3n de la calidad poscosecha de los vegetales, detalla tambi\\u00e9n el uso de microorganismos ben\\u00e9ficos que ayudan a promover la s\\u00edntesis del etileno. Finalmente desde un punto de vista comercial, biotecnol\\u00f3gico e investigativo se han planteado varias perspectivas futuras para mejorar el uso y control del etileno. \\n\\u00a0\"}, {\"paperId\": \"03a7454c52ec00e69a6c415be7c9aaf355847607\", \"externalIds\": {\"CorpusId\": 263514773}, \"title\": \"Standardized gene and genetic nomenclature for the newt Pleurodeles waltl\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20210815030428/https://anatomypubs.onlinelibrary.wiley.com/doi/pdf/10.1002/dvdy.355, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5323911\", \"name\": \"M. Yun\"}, {\"authorId\": \"2251106527\", \"name\": \"Toshinori Hayashi\"}, {\"authorId\": \"2251081825\", \"name\": \"Andr\\u00e1s Simon\"}], \"abstract\": null}, {\"paperId\": \"03ab4e5f650b37e53bad6cd63896d500fd242579\", \"externalIds\": {\"PubMedCentral\": \"9151786\", \"DOI\": \"10.1038/s41467-022-30771-0\", \"CorpusId\": 249200238, \"PubMed\": \"35637208\"}, \"title\": \"Identification of positive and negative regulators of antiviral RNA interference in Arabidopsis thaliana\", \"venue\": \"Nature Communications\", \"year\": 2022, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-022-30771-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9151786, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2167480492\", \"name\": \"Si Liu\"}, {\"authorId\": \"2164010294\", \"name\": \"Meijuan Chen\"}, {\"authorId\": \"47370171\", \"name\": \"Ruidong Li\"}, {\"authorId\": \"122009131\", \"name\": \"Wanxiang Li\"}, {\"authorId\": \"102059211\", \"name\": \"A. Gal\\u2010On\"}, {\"authorId\": \"2039513\", \"name\": \"Z. Jia\"}, {\"authorId\": \"37162667\", \"name\": \"S. Ding\"}], \"abstract\": \"Virus-host coevolution often drives virus immune escape. However, it remains unknown whether natural variations of plant virus resistance are enriched in genes of RNA interference (RNAi) pathway known to confer essential antiviral defense in plants. Here, we report two genome-wide association study screens to interrogate natural variation among wild-collected Arabidopsis thaliana accessions in quantitative resistance to the endemic cucumber mosaic virus (CMV). We demonstrate that the highest-ranked gene significantly associated with resistance from both screens acts to regulate antiviral RNAi in ecotype Columbia-0. One gene, corresponding to Reduced Dormancy 5 (RDO5), enhances resistance by promoting amplification of the virus-derived small interfering RNAs (vsiRNAs). Interestingly, the second gene, designated Antiviral RNAi Regulator 1 (VIR1), dampens antiviral RNAi so its genetic inactivation by CRISPR/Cas9 editing enhances both vsiRNA production and CMV resistance. Our findings identify positive and negative regulators of the antiviral RNAi defense that may play important roles in virus-host coevolution. Whether natural variations of plant virus resistance are enriched in genes of RNA interference pathway is unknown. Here, via genome-wide association studies, the authors identify regulators of the RDR6 and DCL2 antiviral pathways are involved in quantitative resistance to cucumber mosaic virus in Arabidopsis.\"}, {\"paperId\": \"03ab6f755fa15fb599cafbcf2a57152d33cf24bc\", \"externalIds\": {\"PubMedCentral\": \"8528026\", \"MAG\": \"3197864114\", \"DOI\": \"10.1039/d1sc03599a\", \"CorpusId\": 239654437, \"PubMed\": \"34777759\"}, \"title\": \"Element coding based accurate evaluation of CRISPR/Cas9 initial cleavage\", \"venue\": \"Chemical Science\", \"year\": 2021, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://pubs.rsc.org/en/content/articlepdf/2021/sc/d1sc03599a\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8528026, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152179588\", \"name\": \"Jianyu Hu\"}, {\"authorId\": \"144207288\", \"name\": \"R. Liu\"}, {\"authorId\": \"2145787342\", \"name\": \"Jing Zhou\"}, {\"authorId\": \"2075456527\", \"name\": \"Yi Lv\"}], \"abstract\": \"As a powerful gene editing tool, the kinetic mechanism of CRISPR/Cas9 has been the focus for its further application. Initial cleavage events as the first domino followed by nuclease end trimming significantly affect the final on-target rate. Here we propose EC-CRISPR, element coding CRISPR, an accurate evaluation platform for initial cleavage that directly characterizes the cleavage efficiency and breaking sites. We benchmarked the influence of 19 single mismatch and 3 multiple mismatch positions of DNA-sgRNA on initial cleavage, as well as various reaction conditions. Results from EC-CRISPR demonstrate that the PAM-distal single mismatch is relatively acceptable compared to the proximal one. And multiple mismatches will not only affect the cleavage efficiency, but also generate more non-site #3 cleavage. Through in-depth research of kinetic behavior, we uncovered an abnormally higher non-#3 proportion at the initial stage of cleavage by using EC-CRISPR. Together, our results provided insights into cleavage efficiency and breaking sites, demonstrating that EC-CRISPR as a novel quantitative platform for initial cleavage enables accurate comparison of efficiencies and specificities among multiple CRISPR/Cas enzymes.\"}, {\"paperId\": \"03ad97a1a5b3adb98d3e6bbc6eba8d5a4ffe9c2c\", \"externalIds\": {\"DOI\": \"10.2174/0115665232295117240405070809\", \"CorpusId\": 269154184, \"PubMed\": \"38623982\"}, \"title\": \"Evolution of Prime Editing Systems: Move Forward to the Treatment of Hereditary Diseases.\", \"venue\": \"Current Gene Therapy\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2174/0115665232295117240405070809?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2174/0115665232295117240405070809, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2131502654\", \"name\": \"O. Volodina\"}, {\"authorId\": \"2296758168\", \"name\": \"Anastasia R Fabrichnikova\"}, {\"authorId\": \"2235861286\", \"name\": \"Arina A. Anuchina\"}, {\"authorId\": \"2296759055\", \"name\": \"O. Mishina\"}, {\"authorId\": \"2176574679\", \"name\": \"A. Lavrov\"}, {\"authorId\": \"6580229\", \"name\": \"S. Smirnikhina\"}], \"abstract\": \"The development of gene therapy using genome editing tools recently became relevant. With the invention of programmable nucleases, it became possible to treat hereditary diseases due to introducing targeted double strand break in the genome followed by homology directed repair (HDR) or non-homologous end-joining (NHEJ) reparation. CRISPR-Cas9 is more efficient and easier to use in comparison with other programmable nucleases. To improve the efficiency and safety of this gene editing tool, various modifications CRISPR-Cas9 basis were created in recent years, such as prime editing - in this system, Cas9 nickase is fused with reverse transcriptase and guide RNA, which contains a desired correction. Prime editing demonstrates equal or higher correction efficiency as HDR-mediated editing and much less off-target effect due to inducing nick. There are several studies in which prime editing is used to correct mutations in which researchers reported little or no evidence of off-target effects. The system can also be used to functionally characterize disease variants. However, prime editing still has several limitations that could be further improved. The effectiveness of the method is not yet high enough to apply it in clinical trials. Delivery of prime editors is also a big challenge due to their size. In the present article, we observe the development of the platform, and discuss the candidate proteins for efficiency enhancing, main delivery methods and current applications of prime editing.\"}, {\"paperId\": \"03ae2c180528dc8f4a7d875fd8d1c4c8542f13f9\", \"externalIds\": {\"PubMedCentral\": \"8763170\", \"DOI\": \"10.3389/fpls.2021.805032\", \"CorpusId\": 245427182, \"PubMed\": \"35046986\"}, \"title\": \"Expanding the Benefits of Tnt1 for the Identification of Dominant Mutations in Polyploid Crops: A Single Allelic Mutation in the MsNAC39 Gene Produces Multifoliated Alfalfa\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2021.805032/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8763170, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4662818\", \"name\": \"Cintia Jozefkowicz\"}, {\"authorId\": \"2103239204\", \"name\": \"Cristina G\\u00f3mez\"}, {\"authorId\": \"46602614\", \"name\": \"A. Odorizzi\"}, {\"authorId\": \"4974749\", \"name\": \"A. Iantcheva\"}, {\"authorId\": \"4887842\", \"name\": \"P. Ratet\"}, {\"authorId\": \"3716733\", \"name\": \"N. Ayub\"}, {\"authorId\": \"5145609\", \"name\": \"Gabriela Soto\"}], \"abstract\": \"Most major crops are polyploid species and the production of genetically engineered cultivars normally requires the introgression of transgenic or gene-edited traits into elite germplasm. Thus, a main goal of plant research is the search of systems to identify dominant mutations. In this article, we show that the Tnt1 element can be used to identify dominant mutations in allogamous tetraploid cultivated alfalfa. Specifically, we show that a single allelic mutation in the MsNAC39 gene produces multifoliate leaves (mfl) alfalfa plants, a pivot trait of breeding programs of this forage species. Finally, we discuss the potential application of a combination of preliminary screening of beneficial dominant mutants using Tnt1 mutant libraries and genome editing via the CRISPR/Cas9 system to identify target genes and to rapidly improve both autogamous and allogamous polyploid crops.\"}, {\"paperId\": \"03af0f2199baf2f85f12e18297af6f2b65276808\", \"externalIds\": {\"DOI\": \"10.1002/mc.23606\", \"CorpusId\": 259904799, \"PubMed\": \"37449799\"}, \"title\": \"LKB1 loss promotes colorectal cancer cell metastasis through regulating TNIK expression and actin cytoskeleton remodeling\", \"venue\": \"Molecular Carcinogenesis\", \"year\": 2023, \"citationCount\": 14, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/mc.23606?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/mc.23606, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2114117544\", \"name\": \"Guanghui Hu\"}, {\"authorId\": \"2054020172\", \"name\": \"Ning Huang\"}, {\"authorId\": \"2155704935\", \"name\": \"Jing Zhang\"}, {\"authorId\": \"2223382900\", \"name\": \"Die Zhang\"}, {\"authorId\": \"2109449073\", \"name\": \"Shuren Wang\"}, {\"authorId\": \"2145793679\", \"name\": \"Yuanyuan Zhang\"}, {\"authorId\": \"2109120212\", \"name\": \"Liming Wang\"}, {\"authorId\": \"2111894717\", \"name\": \"Yingxin Du\"}, {\"authorId\": \"2111696481\", \"name\": \"S. Kuang\"}, {\"authorId\": \"2075321070\", \"name\": \"Kai Ma\"}, {\"authorId\": \"51444694\", \"name\": \"Hongxia Zhu\"}, {\"authorId\": \"26745654\", \"name\": \"N. Xu\"}, {\"authorId\": \"21447455\", \"name\": \"Mei Liu\"}], \"abstract\": \"Colorectal cancer (CRC) is one of the most common malignant tumors. Approximately 5%\\u20136% of CRC cases are associated with hereditary CRC syndromes, including the Peutz\\u2013Jeghers syndrome (PJS). Liver kinase B1 (LKB1), also known as STK11, is the major gene responsible for PJS. LKB1 heterozygotic deficiency is involved in intestinal polyps in mice, while the mechanism of LKB1 in CRC remains elusive. In this study, we generated LKB1 knockout (KO) CRC cell lines by using CRISPR\\u2010Cas9. LKB1 KO promoted CRC cell motility in vitro and tumor metastases in vivo. LKB1 attenuated expression of TRAF2 and NCK\\u2010interacting protein kinase (TNIK) as accessed by RNA\\u2010seq and western blots, and similar suppression was also detected in the tumor tissues of azoxymethane/dextran sodium sulfate\\u2010induced intestinal\\u2010specific LKB1\\u2010KO mice. LKB1 repressed TNIK expression through its kinase activity. Moreover, attenuating TNIK by shRNA inhibited cell migration and invasion of CRC cells. LKB1 loss\\u2010induced high metastatic potential of CRC cells was depended on TNIK upregulation. Furthermore, TNIK interacted with ARHGAP29 and further affected actin cytoskeleton remodeling. Taken together, LKB1 deficiency promoted CRC cell metastasis via TNIK upregulation and subsequently mediated cytoskeleton remodeling. These results suggest that LKB1\\u2010TNIK axis may play a crucial role in CRC progression.\"}, {\"paperId\": \"03b1d6f6185f05b062fec462d24d79448166d038\", \"externalIds\": {\"PubMedCentral\": \"10741976\", \"DOI\": \"10.3390/cells12242860\", \"CorpusId\": 266418418, \"PubMed\": \"38132179\"}, \"title\": \"Single-Cell Transcriptomics and In Vitro Lineage Tracing Reveals Differential Susceptibility of Human iPSC-Derived Midbrain Dopaminergic Neurons in a Cellular Model of Parkinson\\u2019s Disease\", \"venue\": \"Cells\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/12/24/2860/pdf?version=1702916174\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10741976, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2275510426\", \"name\": \"L. F. Cardo\"}, {\"authorId\": \"1402678269\", \"name\": \"Jimena Monz\\u00f3n-Sandoval\"}, {\"authorId\": \"2275295046\", \"name\": \"Zongze Li\"}, {\"authorId\": \"2242761089\", \"name\": \"Caleb Webber\"}, {\"authorId\": \"2153101259\", \"name\": \"Meng Li\"}], \"abstract\": \"Advances in stem cell technologies open up new avenues for modelling development and diseases. The success of these pursuits, however, relies on the use of cells most relevant to those targeted by the disease of interest, for example, midbrain dopaminergic neurons for Parkinson\\u2019s disease. In the present study, we report the generation of a human induced pluripotent stem cell (iPSC) line capable of purifying and tracing nascent midbrain dopaminergic progenitors and their differentiated progeny via the expression of a Blue Fluorescent Protein (BFP). This was achieved by CRISPR/Cas9-assisted knock-in of BFP and Cre into the safe harbour locus AAVS1 and an early midbrain dopaminergic lineage marker gene LMX1A, respectively. Immunocytochemical analysis and single-cell RNA sequencing of iPSC-derived neural cultures confirm developmental recapitulation of the human fetal midbrain and high-quality midbrain cells. By modelling Parkinson\\u2019s disease-related drug toxicity using 1-Methyl-4-phenylpyridinium (MPP+), we showed a preferential reduction of BFP+ cells, a finding demonstrated independently by cell death assays and single-cell transcriptomic analysis of MPP+ treated neural cultures. Together, these results highlight the importance of disease-relevant cell types in stem cell modelling.\"}, {\"paperId\": \"03b245cd861c2be9b335f55c3297ae5fe98300fc\", \"externalIds\": {\"PubMedCentral\": \"10533647\", \"DOI\": \"10.1007/s12035-023-03447-z\", \"CorpusId\": 259992418, \"PubMed\": \"37474883\"}, \"title\": \"The Roles of Histamine Receptor 1 (hrh1) in Neurotransmitter System Regulation, Behavior, and Neurogenesis in Zebrafish\", \"venue\": \"Molecular Neurobiology\", \"year\": 2023, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12035-023-03447-z.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10533647, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145361822\", \"name\": \"Yuxiao Yao\"}, {\"authorId\": \"47885574\", \"name\": \"D. Baronio\"}, {\"authorId\": \"2109362383\", \"name\": \"Yu-chia Chen\"}, {\"authorId\": \"30972784\", \"name\": \"C. Jin\"}, {\"authorId\": \"39502103\", \"name\": \"P. Panula\"}], \"abstract\": \"Histamine receptors mediate important physiological processes and take part in the pathophysiology of different brain disorders. Histamine receptor 1 (HRH1) is involved in the development of neurotransmitter systems, and its role in neurogenesis has been proposed. Altered HRH1 binding and expression have been detected in the brains of patients with schizophrenia, depression, and autism. Our goal was to assess the role of hrh1 in zebrafish development and neurotransmitter system regulation through the characterization of hrh1\\u2212/\\u2212 fish generated by the CRISPR/Cas9 system. Quantitative PCR, in situ hybridization, and immunocytochemistry were used to study neurotransmitter systems and genes essential for brain development. Additionally, we wanted to reveal the role of this histamine receptor in larval and adult fish behavior using several quantitative behavioral methods including locomotion, thigmotaxis, dark flash and startle response, novel tank diving, and shoaling behavior. Hrh1\\u2212/\\u2212 larvae displayed normal behavior in comparison with hrh1+/+ siblings. Interestingly, a transient abnormal expression of important neurodevelopmental markers was evident in these larvae, as well as a reduction in the number of tyrosine hydroxylase 1 (Th1)\\u2013positive cells, th1 mRNA, and hypocretin (hcrt)-positive cells. These abnormalities were not detected in adulthood. In summary, we verified that zebrafish lacking hrh1 present deficits in the dopaminergic and hypocretin systems during early development, but those are compensated by the time fish reach adulthood. However, impaired sociability and anxious-like behavior, along with downregulation of choline O-acetyltransferase a and LIM homeodomain transcription factor Islet1, were displayed by adult fish.\"}, {\"paperId\": \"03b2caa4718767c421c09b9cefe43cfc49744b42\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-4658\", \"CorpusId\": 268656720}, \"title\": \"Abstract 4658: Genome wide CRISPR/Cas9 library screening identifies aurora kinase A as a regulator of elraglusib sensitivity in pancreatic cancer\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-4658?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-4658, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2376466209\", \"name\": \"Li Ding\"}, {\"authorId\": \"2292248545\", \"name\": \"Easton Maeder\"}, {\"authorId\": \"2293177879\", \"name\": \"Cheng Zhang\"}, {\"authorId\": \"1741941012\", \"name\": \"Taylor M. Weiskittel\"}, {\"authorId\": \"40487761\", \"name\": \"D. Schmitt\"}, {\"authorId\": \"2255793694\", \"name\": \"A. Mazar\"}, {\"authorId\": \"2108532206\", \"name\": \"Hu Li\"}, {\"authorId\": \"2293096259\", \"name\": \"D. Billadeau\"}], \"abstract\": \"\\n Pancreatic ductal adenocarcinoma (PDAC) is a deadly malignancy with a dismal 5-year survival rate, highlighting the urgent need to improve drug response and overcome primary or acquired (secondary) resistance to conventional chemotherapy. Glycogen synthase kinase 3\\u03b2 (GSK-3\\u03b2) is a target in PDAC and the GSK-3 inhibitor, elraglusib, has been shown to improve chemosensitivity of PDAC and survival in preclinical cancer models. In addition, data from phase II clinical trials in patients with previously untreated metastatic pancreatic cancer is demonstrating preliminary evidence of clinical benefit in patients receiving a combination of gemcitabine/nab-paclitaxel. While this early evidence is highly encouraging, the biological determinants of elraglusib response are unknown. Using genome wide CRISPR/Cas9 library screening, we identify aurora kinase A (AURKA), an oncogenic kinase with major roles in mitosis, as a critical regulator for elraglusib sensitivity. Elraglusib treatment activates AURKA by inducing a G2/M cell cycle arrest. We show that knocking out AURKA reduces the phosphorylation of polo like kinase 1 (PLK1), arresting cells in mitosis, and leading to mitotic catastrophe and significant apoptosis after elraglusib treatment. Strikingly, the AURKA inhibitor, alisertib, works synergistically with elraglusib to inhibit PDAC cell line growth and induce apoptosis. In summary, our results demonstrate that targeting AURKA is an effective approach to sensitize PDAC tumors to elraglusib.\\n Citation Format: Li Ding, Easton Maeder, Cheng Zhang, Taylor Weiskittel, Daniel Schmitt, Andrew Mazar, Hu Li, Daniel Billadeau. Genome wide CRISPR/Cas9 library screening identifies aurora kinase A as a regulator of elraglusib sensitivity in pancreatic cancer [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 4658.\"}, {\"paperId\": \"03b4e315ecab2bea925fae1c2c1d8bff23085ed7\", \"externalIds\": {\"DOI\": \"10.1101/2021.01.06.425530\", \"CorpusId\": 231614942}, \"title\": \"Maintenance of Complex I and respiratory super-complexes by NDUF-11 is essential for respiratory function, mitochondrial structure and health in C. elegans\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.01.06.425530\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.01.06.425530?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.01.06.425530, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2046946388\", \"name\": \"Amber Knapp-Wilson\"}, {\"authorId\": \"3182201\", \"name\": \"Gon\\u00e7alo C. Pereira\"}, {\"authorId\": \"51315038\", \"name\": \"Emma Buzzard\"}, {\"authorId\": \"2053869586\", \"name\": \"Andrew P. Richardson\"}, {\"authorId\": \"38986939\", \"name\": \"R. Corey\"}, {\"authorId\": \"102707689\", \"name\": \"Chris R. Neal\"}, {\"authorId\": \"2126287\", \"name\": \"P. Verkade\"}, {\"authorId\": \"4469279\", \"name\": \"A. Halestrap\"}, {\"authorId\": \"40372313\", \"name\": \"Vicki A. M. Gold\"}, {\"authorId\": \"5731801\", \"name\": \"P. Kuwabara\"}, {\"authorId\": \"46714939\", \"name\": \"I. Collinson\"}], \"abstract\": \"Mitochondrial super-complexes form around a conserved core of monomeric complex I and dimeric complex III; wherein subunit NDUFA11, of the former, is conspicuously situated at the interface. We identified B0491.5 (NDUF-11) as the C. elegans homologue, of which animals homozygous for a CRISPR-Cas9 generated knockout allele arrested at the L2 development stage. Reducing expression by RNAi allowed development to the adult stage, enabling characterisation of the consequences: destabilisation of complex I and its super-complexes, and perturbation of respiratory function. The loss of NADH-dehydrogenase activity is compensated by enhanced complex II activity, resulting in excessive detrimental ROS production. Meanwhile, electron cryo-tomography highlight aberrant cristae morphology and widening of the inter-membrane space and cristae junctions. The requirement of NDUF-11 for balanced respiration, mitochondrial morphology and development highlights the importance of complex I/ super-complex maintenance. Their perturbation by this, or other means, is likely to be the cause of metabolic stress and disease.\"}, {\"paperId\": \"03b544d5e15f77ee474917f177098244d3626796\", \"externalIds\": {\"DOI\": \"10.21769/bioprotoc.4545\", \"CorpusId\": 253355627, \"PubMed\": \"36505024\"}, \"title\": \"An Unbiased CRISPR-Cas9 Screening Method for the Identification of Positive and Negative Regulatory Proteins of Cell Adhesion.\", \"venue\": \"Bio-protocol\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9711945\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21769/bioprotoc.4545?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21769/bioprotoc.4545, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1405677795\", \"name\": \"Yvonne J Thus\"}, {\"authorId\": \"10016005\", \"name\": \"M. F. de Rooij\"}, {\"authorId\": \"5249013\", \"name\": \"R. Beijersbergen\"}, {\"authorId\": \"4778012\", \"name\": \"M. Spaargaren\"}], \"abstract\": \"Mature B-cell lymphomas are highly dependent upon the protective lymphoid organ microenvironment for their growth and survival. Targeting integrin-mediated homing and retention of the malignant B cells in the lymphoid organs, using the Bruton's tyrosine kinase (BTK) inhibitor ibrutinib, is a highly efficacious FDA-approved therapy for chronic lymphocytic leukemia (CLL), mantle cell lymphoma (MCL), and Waldenstr\\u00f6m macroglobulinemia (WM). Unfortunately, a significant subset of patients is intrinsically resistant to ibrutinib or will develop resistance upon prolonged treatment. Here, we describe an unbiased functional genomic CRISPR-Cas9 screening method to identify novel proteins involved in B-cell receptor-controlled integrin-mediated adhesion, which provides novel therapeutic targets to overcome ibrutinib resistance. This screening method is highly flexible and can be easily adapted to identify cell adhesion-regulatory proteins and signaling pathways for other stimuli, adhesion molecules, and cell types. Graphical abstract.\"}, {\"paperId\": \"03b638d1a2b873998f9d7f4d2efd7b91870bf8c4\", \"externalIds\": {\"PubMedCentral\": \"8004693\", \"DOI\": \"10.3390/ijms22063225\", \"CorpusId\": 232405072, \"PubMed\": \"33810044\"}, \"title\": \"CRISPR/Cas9 Guided Mutagenesis of Grain Size 3 Confers Increased Rice (Oryza sativa L.) Grain Length by Regulating Cysteine Proteinase Inhibitor and Ubiquitin-Related Proteins\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/6/3225/pdf?version=1616745944\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8004693, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144323426\", \"name\": \"Babar Usman\"}, {\"authorId\": \"31581077\", \"name\": \"Neng Zhao\"}, {\"authorId\": \"146825804\", \"name\": \"G. Nawaz\"}, {\"authorId\": \"3666840\", \"name\": \"Baoxiang Qin\"}, {\"authorId\": \"2158337563\", \"name\": \"Fang Liu\"}, {\"authorId\": \"2108923597\", \"name\": \"Yaoguang Liu\"}, {\"authorId\": \"3768287\", \"name\": \"Rong-bai Li\"}], \"abstract\": \"Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)/CRISPR-associated protein (Cas9)-mediated genome editing has become an important way for molecular breeding in crop plants. To promote rice breeding, we edited the Grain Size 3 (GS3) gene for obtaining valuable and stable long-grain rice mutants. Furthermore, isobaric tags for the relative and absolute quantitation (iTRAQ)-based proteomic method were applied to determine the proteome-wide changes in the GS3 mutants compared with wild type (WT). Two target sites were designed to construct the vector, and the Agrobacterium-mediated method was used for rice transformation. Specific mutations were successfully introduced, and the grain length (GL) and 1000-grain weight (GWT) of the mutants were increased by 31.39% and 27.15%, respectively, compared with WT. The iTRAQ-based proteomic analysis revealed that a total of 31 proteins were differentially expressed in the GS3 mutants, including 20 up-regulated and 11 down-regulated proteins. Results showed that differentially expressed proteins (DEPs) were mainly related to cysteine synthase, cysteine proteinase inhibitor, vacuolar protein sorting-associated, ubiquitin, and DNA ligase. Furthermore, functional analysis revealed that DEPs were mostly enriched in cellular process, metabolic process, binding, transmembrane, structural, and catalytic activities. Pathway enrichment analysis revealed that DEPs were mainly involved in lipid metabolism and oxylipin biosynthesis. The protein-to-protein interaction (PPI) network found that proteins related to DNA damage-binding, ubiquitin-40S ribosomal, and cysteine proteinase inhibitor showed a higher degree of interaction. The homozygous mutant lines featured by stable inheritance and long-grain phenotype were obtained using the CRISPR/Cas9 system. This study provides a convenient and effective way of improving grain yield, which could significantly accelerate the breeding process of long-grain japonica parents and promote the development of high-yielding rice.\"}, {\"paperId\": \"03b7de2953ae3ac0f5690425427ab235fe472492\", \"externalIds\": {\"MAG\": \"3037192276\", \"DOI\": \"10.1007/978-3-030-45493-7_2\", \"CorpusId\": 220047895, \"PubMed\": \"32578143\"}, \"title\": \"Advances in Human Stem Cells and Genome Editing to Understand and Develop Treatment for Fragile X Syndrome.\", \"venue\": \"Advances in neurobiology\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-3-030-45493-7_2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-3-030-45493-7_2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2388976916\", \"name\": \"Xinyu Zhao\"}, {\"authorId\": \"40538135\", \"name\": \"A. Bhattacharyya\"}], \"abstract\": null}, {\"paperId\": \"03ba63591b7a41630e96cd087b516cddef062459\", \"externalIds\": {\"PubMedCentral\": \"11185092\", \"DOI\": \"10.1080/19768354.2024.2364673\", \"CorpusId\": 270580576, \"PubMed\": \"38895161\"}, \"title\": \"Establishment of a stress granule reporter system for evaluating in vitro colon toxicity\", \"venue\": \"Animal Cells and Systems\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.tandfonline.com/doi/pdf/10.1080/19768354.2024.2364673?needAccess=true\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11185092, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35501771\", \"name\": \"Namjoon Cho\"}, {\"authorId\": \"2176890120\", \"name\": \"Da-Min Jung\"}, {\"authorId\": \"1682816423\", \"name\": \"Eun-Mi Kim\"}, {\"authorId\": \"2277993070\", \"name\": \"Kee K. Kim\"}], \"abstract\": \"ABSTRACT Exposure to toxic molecules from food or oral medications induces toxicity in colon cells that cause various human diseases; however, in vitro monitoring systems for colon cell toxicity are not well established. Stress granules are nonmembranous foci that form in cells exposed to cellular stress. When cells sense toxic environments, they acutely and systemically promote stress granule formation, with Ras GTPase-activating protein-binding protein 1 (G3BP1) acting as a core component to protect their mRNA from abnormal degradation. Here, we knocked in green fluorescent protein (GFP)-coding sequences into the C-terminal region of the G3BP1 gene in a human colon cell line through CRISPR-Cas9-mediated homologous recombination and confirmed the formation of stress granules with the G3BP1-GFP protein in these cells under cellular stress exposure. We demonstrated the formation and dissociation of stress granules in G3BP1-GFP expressing colon cells through real-time monitoring using a fluorescence microscope. Furthermore, we validated the toxicity monitoring system in the established colon cell line by observing stress granule formation following exposure to dihydrocapsaicin, bisphenol A, and sorbitol. Taken together, we established a stress granule reporter system in a colon cell line, providing a novel assessment for the real-time monitoring of colon toxicity in response to various chemicals.\"}, {\"paperId\": \"03baf8632d8657d3fec32a31d1f6afe373e753ad\", \"externalIds\": {\"PubMedCentral\": \"8494306\", \"DOI\": \"10.3389/fgene.2021.738746\", \"CorpusId\": 237587436, \"PubMed\": \"34630528\"}, \"title\": \"FnCas12a/crRNA-Mediated Genome Editing in Eimeria tenella\", \"venue\": \"Frontiers in Genetics\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgene.2021.738746/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8494306, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112625318\", \"name\": \"Peipei Cheng\"}, {\"authorId\": \"2144436778\", \"name\": \"Zhihao Zhang\"}, {\"authorId\": \"2151253119\", \"name\": \"Fayu Yang\"}, {\"authorId\": \"49407021\", \"name\": \"Shuo Cai\"}, {\"authorId\": \"2118333322\", \"name\": \"Lina Wang\"}, {\"authorId\": \"2026002120\", \"name\": \"Chunmei Wang\"}, {\"authorId\": \"50468909\", \"name\": \"Mi Wang\"}, {\"authorId\": \"2108017779\", \"name\": \"Yingchun Liu\"}, {\"authorId\": \"3679907\", \"name\": \"Chenzhong Fei\"}, {\"authorId\": \"47059135\", \"name\": \"Li-fang Zhang\"}, {\"authorId\": \"87890441\", \"name\": \"F. Xue\"}, {\"authorId\": \"2056183657\", \"name\": \"Feng Gu\"}], \"abstract\": \"Eimeria species are intracellular parasites residing inside the intestinal epithelial cell, which cause poultry coccidiosis and result in significant financial losses in the poultry industry. Genome editing of Eimeria is of immense importance for the development of vaccines and drugs. CRISPR/Cas9 has been utilized for manipulating the genome of Eimeria tenella (E. tenella). Ectopic expression of Cas9, i.e., via plasmids, would introduce transgene, which substantially limits its application, especially for vaccine development. In this study, we initially optimized the condition of the transfection protocol. We demonstrated that with the optimized condition, the transfection of FnCas12a (also known as \\u201cFnCpf1\\u201d) protein and crRNA targeting EtHistone H4 triggered DNA double-strand breaks in vivo. We then used this strategy to knock-in a coding cassette for an enhanced yellow fluorescent protein (EYFP) and dihydrofolate reductase\\u2013thymidylate synthase gene (DHFR) as a selection marker to tag endogenous EtActin. The engineered E. tenella parasite possesses EYFP expression in its entire life cycle. Our results demonstrated that FnCas12a could trigger genome editing in E. tenella, which augments the applicability of the dissection of gene function and the development of anticoccidial drugs and vaccines for Eimeria species.\"}, {\"paperId\": \"03bbb5f914dd65cdc29e3235f7fee82a54d350c6\", \"externalIds\": {\"DOI\": \"10.19540/j.cnki.cjcmm.20230213.101\", \"CorpusId\": 259284677, \"PubMed\": \"37381953\"}, \"title\": \"[Cloning and expression analysis of U6 promoters in Panax quinquefolius].\", \"venue\": \"Zhongguo Zhong yao za zhi = Zhongguo zhongyao zazhi = China journal of Chinese materia medica\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.19540/j.cnki.cjcmm.20230213.101?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.19540/j.cnki.cjcmm.20230213.101, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2199816141\", \"name\": \"Jing-Xian Chen\"}, {\"authorId\": \"2177269641\", \"name\": \"Chao Lu\"}, {\"authorId\": \"2351111171\", \"name\": \"Guoxia Wang\"}, {\"authorId\": \"2274463649\", \"name\": \"Chunge Li\"}, {\"authorId\": \"2177265905\", \"name\": \"Yu-Hua Li\"}, {\"authorId\": \"2099805315\", \"name\": \"Fang-Yi Su\"}, {\"authorId\": \"2248928214\", \"name\": \"Chen-Ying Wang\"}, {\"authorId\": \"2118391278\", \"name\": \"Yaorun Zhang\"}], \"abstract\": null}, {\"paperId\": \"03bbf2f52aa03a1fc35de0fac01007bf40d84a68\", \"externalIds\": {\"PubMedCentral\": \"7567154\", \"MAG\": \"3084296280\", \"DOI\": \"10.1002/jcsm.12619\", \"CorpusId\": 221523966, \"PubMed\": \"32893996\"}, \"title\": \"Generation of desminopathy in rats using CRISPR\\u2010Cas9\", \"venue\": \"Journal of Cachexia, Sarcopenia and Muscle\", \"year\": 2020, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/jcsm.12619\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7567154, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"38751542\", \"name\": \"H. Langer\"}, {\"authorId\": \"3637035\", \"name\": \"A. Mossakowski\"}, {\"authorId\": \"30475934\", \"name\": \"Brandon J. Willis\"}, {\"authorId\": \"2229906\", \"name\": \"K. Grimsrud\"}, {\"authorId\": \"4448050\", \"name\": \"J. Wood\"}, {\"authorId\": \"144696223\", \"name\": \"K. C. K. Lloyd\"}, {\"authorId\": \"1402922151\", \"name\": \"H. Zbinden-Foncea\"}, {\"authorId\": \"3975732\", \"name\": \"K. Baar\"}], \"abstract\": \"Desminopathy is a clinically heterogeneous muscle disease caused by over 60 different mutations in desmin. The most common mutation with a clinical phenotype in humans is an exchange of arginine to proline at position 350 of desmin leading to p.R350P. We created the first CRISPR\\u2010Cas9 engineered rat model for a muscle disease by mirroring the R350P mutation in humans.\"}, {\"paperId\": \"03bf7a76e19147b365568754d1ff0edc6e5e56e8\", \"externalIds\": {\"DOI\": \"10.1089/thy.2023.0560\", \"CorpusId\": 266130316, \"PubMed\": \"38062777\"}, \"title\": \"PDPR Gene Variants Predisposing to Papillary Thyroid Cancer\", \"venue\": \"Thyroid\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/thy.2023.0560?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/thy.2023.0560, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2272623750\", \"name\": \"Pamela L. Brock\"}, {\"authorId\": \"2273406160\", \"name\": \"Myriam S\\u00e9vigny\"}, {\"authorId\": \"2934528\", \"name\": \"S. Liyanarachchi\"}, {\"authorId\": \"37542482\", \"name\": \"Daniel F. Comiskey\"}, {\"authorId\": \"2157336158\", \"name\": \"Wei Li\"}, {\"authorId\": \"2272082386\", \"name\": \"Saila Saarinen\"}, {\"authorId\": \"2307810777\", \"name\": \"A. S. Yilmaz\"}, {\"authorId\": \"2263274716\", \"name\": \"Anni I. Nieminen\"}, {\"authorId\": \"2272551098\", \"name\": \"M. Ringel\"}, {\"authorId\": \"6418564\", \"name\": \"P. Peltom\\u00e4ki\"}, {\"authorId\": \"34618751\", \"name\": \"Saara Ollila\"}, {\"authorId\": \"49993262\", \"name\": \"T. Nieminen\"}], \"abstract\": \"Background: Papillary thyroid cancer (PTC) is the predominant subtype of thyroid cancer (THCA), and it can cluster in families with an autosomal dominant (AD) inheritance pattern. The aim of this study was to identify novel genes and mechanisms underlying PTC susceptibility. Methods: Our previous investigation of 17 AD PTC families led us to conduct a deeper analysis on one family (Family Q) with whole-genome sequencing data from 3 PTC-affected individuals. In addition, 323 sporadic THCA cases from Avatar data and 12 familial adenomatous polyposis (FAP) individuals with secondary THCA were screened for pyruvate dehydrogenase phosphatase regulatory (PDPR) variants. CRISPR-Cas9 was used to create PDPR-deficient THCA (TPC1) and transformed normal thyroid cell lines (N-Thyori3-1) to study the metabolic consequences of PDPR loss. Results: We found truncating PDPR splice donor variants (NM_017990.4:c.361\\u2009+\\u20091G>C) in all affected PTC Family Q members, and another PDPR splice donor variant (NM_017990.4:c.443\\u2009+\\u20091G>C) in a sporadic PTC case. In addition, an ultra-rare missense variant was found in an FAP-PTC patient. The PDPR-deficient cells presented with elevated phosphorylation of pyruvate dehydrogenase and altered glucose metabolism, implying that PDPR plays an essential part in regulating glucose metabolism in thyroid cells. Conclusions: Our finding of novel truncating germline variants in PDPR in Family Q and additional cohorts suggests a role for PDPR loss in PTC predisposition. Also, somatic and RNA sequencing from the thyroid carcinoma (Firehouse Legacy) data showed that PDPR gene expression is much lower in THCA tumor tissue compared with matching normal tissue. Thus, PDPR appears to have a loss of function effect on THCA tumorigenesis.\"}, {\"paperId\": \"03bff51eadc370c759e0cbe9d821ec3ba54d18f9\", \"externalIds\": {\"PubMedCentral\": \"11185579\", \"DOI\": \"10.1101/2023.12.24.573258\", \"CorpusId\": 266574343, \"PubMed\": \"38895397\"}, \"title\": \"A neurotransmitter atlas of C. elegans males and hermaphrodites\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11185579\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11185579, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2276816248\", \"name\": \"Chen Wang\"}, {\"authorId\": \"46363945\", \"name\": \"Berta Vidal\"}, {\"authorId\": \"4758655\", \"name\": \"Surojit Sural\"}, {\"authorId\": \"2305663855\", \"name\": \"Curtis M. Loer\"}, {\"authorId\": \"2164147331\", \"name\": \"G. Aguilar\"}, {\"authorId\": \"2276614422\", \"name\": \"Daniel M. Merritt\"}, {\"authorId\": \"7318884\", \"name\": \"I. A. Toker\"}, {\"authorId\": \"27386678\", \"name\": \"Merly C. Vogt\"}, {\"authorId\": \"123777439\", \"name\": \"Cyril C Cros\"}, {\"authorId\": \"2781726\", \"name\": \"O. Hobert\"}], \"abstract\": \"Mapping neurotransmitter identities to neurons is key to understanding information flow in a nervous system. It also provides valuable entry points for studying the development and plasticity of neuronal identity features. In the C. elegans nervous system, neurotransmitter identities have been largely assigned by expression pattern analysis of neurotransmitter pathway genes that encode neurotransmitter biosynthetic enzymes or transporters. However, many of these assignments have relied on multicopy reporter transgenes that may lack relevant cis-regulatory information and therefore may not provide an accurate picture of neurotransmitter usage. We analyzed the expression patterns of 16 CRISPR/Cas9-engineered knock-in reporter strains for all main types of neurotransmitters in C. elegans (glutamate, acetylcholine, GABA, serotonin, dopamine, tyramine, and octopamine) in both the hermaphrodite and the male. Our analysis reveals novel sites of expression of these neurotransmitter systems within both neurons and glia, as well as non-neural cells. The resulting expression atlas defines neurons that may be exclusively neuropeptidergic, substantially expands the repertoire of neurons capable of co-transmitting multiple neurotransmitters, and identifies novel neurons that uptake monoaminergic neurotransmitters. Furthermore, we also observed unusual co-expression patterns of monoaminergic synthesis pathway genes, suggesting the existence of novel monoaminergic transmitters. Our analysis results in what constitutes the most extensive whole-animal-wide map of neurotransmitter usage to date, paving the way for a better understanding of neuronal communication and neuronal identity specification in C. elegans.\"}, {\"paperId\": \"03c03d882f32321ee3e14d724ce57ad70aa612e8\", \"externalIds\": {\"DOI\": \"10.1093/jhered/esab029\", \"CorpusId\": 235449947, \"PubMed\": \"34132805\"}, \"title\": \"K Locus Effects in Gray Wolves: Experimental Assessment of TLR3 Signaling and the Gene Expression Response to Canine Distemper Virus.\", \"venue\": \"Journal of Heredity\", \"year\": 2021, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8567826\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/jhered/esab029?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/jhered/esab029, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46651058\", \"name\": \"Rachel A. Johnston\"}, {\"authorId\": \"4006061\", \"name\": \"J. Rheinwald\"}, {\"authorId\": \"4145140\", \"name\": \"B. Vonholdt\"}, {\"authorId\": \"6678456\", \"name\": \"D. Stahler\"}, {\"authorId\": \"104680745\", \"name\": \"Will F. Lowry\"}, {\"authorId\": \"40612912\", \"name\": \"Jenny Tung\"}, {\"authorId\": \"144295924\", \"name\": \"R. Wayne\"}], \"abstract\": \"In North American gray wolves, black coat color is dominantly inherited via a 3 base pair coding deletion in the canine beta defensin 3 (CBD103) gene. This 3 base pair deletion, called the KB allele, was introduced through hybridization with dogs and subsequently underwent a selective sweep that increased its frequency in wild wolves. Despite apparent positive selection, KBB wolves have lower fitness than wolves with the KyB genotype, even though the 2 genotypes show no observable differences in black coat color. Thus, the KB allele is thought to have pleiotropic effects on as-yet unknown phenotypes. Given the role of skin-expressed CBD103 in innate immunity, we hypothesized that the KB allele influences the keratinocyte gene expression response to TLR3 pathway stimulation and/or infection by canine distemper virus (CDV). To test this hypothesis, we developed a panel of primary epidermal keratinocyte cell cultures from 24 wild North American gray wolves of both Kyy and KyB genotypes. In addition, we generated an immortalized Kyy line and used CRISPR/Cas9 editing to produce a KyB line on the same genetic background. We assessed the transcriptome-wide responses of wolf keratinocytes to the TLR3 agonist polyinosinic:polycytidylic acid (polyI:C), and to live CDV. K locus genotype did not predict the transcriptional response to either challenge, suggesting that variation in the gene expression response does not explain pleiotropic effects of the KB allele on fitness. This study supports the feasibility of using cell culture methods to investigate the phenotypic effects of naturally occurring genetic variation in wild mammals.\"}, {\"paperId\": \"03c12aaadfc1ea93c2b672fb4f6dd9b57c75d9a8\", \"externalIds\": {\"DOI\": \"10.1186/s13287-022-03019-3\", \"CorpusId\": 256098779}, \"title\": \"Meiosis resumption in human primordial germ cells from induced pluripotent stem cells by in vitro activation and reconstruction of ovarian nests\", \"venue\": \"Stem cell research & therapeutics\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://stemcellres.biomedcentral.com/counter/pdf/10.1186/s13287-022-03019-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s13287-022-03019-3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s13287-022-03019-3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144996782\", \"name\": \"Sheng Yang\"}, {\"authorId\": \"2179498088\", \"name\": \"Zhen Liu\"}, {\"authorId\": \"2157833809\", \"name\": \"Shengda Wu\"}, {\"authorId\": \"2055450444\", \"name\": \"L. Zou\"}, {\"authorId\": \"51127926\", \"name\": \"Yanpei Cao\"}, {\"authorId\": \"2146235813\", \"name\": \"Hong-Yan Xu\"}, {\"authorId\": \"2145741336\", \"name\": \"Jing-Tao Huang\"}, {\"authorId\": \"2056268275\", \"name\": \"Qing Tian\"}, {\"authorId\": \"2202364008\", \"name\": \"Fanggui Wu\"}, {\"authorId\": \"2116120517\", \"name\": \"Panpan Li\"}, {\"authorId\": \"49009453\", \"name\": \"S. Peng\"}, {\"authorId\": \"4101002\", \"name\": \"C. Shuai\"}], \"abstract\": \"The differentiation of human induced pluripotent stem cells (iPSCs) into oocytes, which involves the transformation from mitosis to meiosis, has been a hotspot of biological research for many years and represents a desirable experimental model and potential strategy for treating infertility. At present, studies have shown that most cells stagnate in the oogonium stage after differentiation into primordial germ cells (PGCs) from human iPSCs. iPSCs carrying a SYCP3-mkate2 knock-in reporter were generated by the CRISPR/Cas9 strategy to monitor meiosis status during induced differentiation from iPSCs into oocytes. These induced PGCs/oogonia were activated by small molecules from the Wnt signaling pathway and then cocultured with reconstructed human ovarian nests in vivo for further development. First, human PGCs and oogonia were efficiently induced from iPSCs. Second, induced dormant PGCs resumed meiosis and then differentiated into primary oocytes through the in vitro activation of the Wnt signaling pathway. Finally, a new coculture system involving the reconstruction of ovarian nests in vitro could facilitate the differentiation of oocytes. Human PGCs/oogonia induced from iPSCs can be activated and used to resume meiosis by molecules of the Wnt signaling pathway. The coculture of activated PGCs and reconstruction of ovarian nests facilitated differentiation into primary oocytes and the generation of haploid human oocytes in vivo. These findings established a new strategy for germline competence in primary oocytes and provided a keystone for human gametogenesis in vitro and in vivo.\"}, {\"paperId\": \"03c2061beebac4f2ee0b16393aaf75f8d63fbb7e\", \"externalIds\": {\"PubMedCentral\": \"7915877\", \"DOI\": \"10.3390/ijms22041669\", \"CorpusId\": 231866879, \"PubMed\": \"33562315\"}, \"title\": \"The pip1s Quintuple Mutants Demonstrate the Essential Roles of PIP1s in the Plant Growth and Development of Arabidopsis\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/4/1669/pdf?version=1612776340\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7915877, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144802495\", \"name\": \"Xing Wang\"}, {\"authorId\": \"2028661534\", \"name\": \"Yu Wu\"}, {\"authorId\": \"151269397\", \"name\": \"Zijin Liu\"}, {\"authorId\": \"38975071\", \"name\": \"Tong\\u2010Xian Liu\"}, {\"authorId\": \"34768067\", \"name\": \"Lamei Zheng\"}, {\"authorId\": \"8273836\", \"name\": \"Genfa Zhang\"}], \"abstract\": \"Plasma membrane intrinsic proteins (PIPs) transport water, CO2 and small neutral solutes across the plasma membranes. In this study, we used the clustered regularly interspaced short palindromic repeats (CRISPR) and CRISPR-associated protein 9 system (CRISPR/Cas9) to mutate PIP1;4 and PIP1;5 in a pip1;1,2,3 triple mutant to generate a pip1;1,2,3,4,5 (pip1s\\u2212) quintuple mutant. Compared to the wild-type (WT) plant, the pip1s\\u2212 mutants had smaller sized rosette leaves and flowers, less rosette leaf number, more undeveloped siliques, shorter silique and less seeds. The pollen germination rate of the pip1s\\u2212 mutant was significantly lower than that of the WT and the outer wall of the pip1s\\u2212 mutant\\u2019s pollen was deformed. The transcriptomic analysis showed significant alterations in the expression of many key genes and transcription factors (TFs) in the pip1s\\u2212 mutant which involved in the development of leaf, flower and pollen, suggesting that the mutant of PIP1s not only directly affects hydraulics and carbon fixation, but also regulates the expression of related genes to affect plant growth and development.\"}, {\"paperId\": \"03c239ae75707e6268f045902628aa69ed6278e5\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-617\", \"CorpusId\": 249733918}, \"title\": \"Abstract 617: MEK inhibitor rescued the efficacy of PD-1 blocker in STK11/LKB1 mutated colorectal cancer model\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-617?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-617, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2170634893\", \"name\": \"Demi Liu\"}, {\"authorId\": \"2170850562\", \"name\": \"Jun Zhou\"}, {\"authorId\": \"1572401534\", \"name\": \"C. Nie\"}, {\"authorId\": \"10772521\", \"name\": \"A. An\"}, {\"authorId\": \"40348210\", \"name\": \"H. Li\"}, {\"authorId\": \"2109839831\", \"name\": \"Jingjing Wang\"}], \"abstract\": \"\\n Introduction: The mechanism of action of primary resistance to PD-1 blockade is largely unknown, however STK11/LKB1 alterations have been reported to have a significant role in primary resistance to PD-1/PD-L1 axis inhibitors in KRAS-mutant lung adenocarcinoma. It is importsnt to identify treatments which can rescue the efficacy of PD-1 blocker in STK11/LKB1-mutant patients. We have developed a STK11 knockout (KO) model using the CT26 colorectal cancer syngeneic line which harbors a KRAS mutation and evaluated the response to checkpoint inhibitor alone and in combination with MEK inhibitors.\\n Method: CT26-STK11KOwas developed by CRISPR/Cas9 technology and STK11/LTB1 deletion was verified by Western Blot. To test the response of the cell line to anti-PD-1 treatment (10mg/kg), we engrafted CT26-WT and CT26-STK11KO tumor lines into BALB/c mice. Tumor growth inhibition (TGI) was assessed as TGI%=(1-Ti/Vi) x100%; Ti as the mean tumor volume of the treatment group on the measurement day; Vi as the mean tumor volume of control group at the measurement day. At termination FACS analysis of different major types of immune cells was performed. Combination with MEK inhibitors, including Trametinib (1mg/kg) was also evaluated.\\n Results: In comparison to CT26-WT tumor growth, PD-1 blocker could not inhibit CT26-STK11KO tumor progression. However, Combinational treatment of Trametinib and anti-PD-1 antibody delayed CT26-STK11KO tumor growth. In CT26-WT tumor bearing mice, anti-PD-1 monotherapy increased total CD45+ immune cells, suggesting an ongoing immune response; significantly increased the ratio between M1 and M2, which might be an indicator for enhanced type I T cell response. CD8+ T cell infiltration in CT26-STK11KO tumors was dramatically decreased associated with increased percentage of G-MDSC which may have contributed to the loss of response to anti-PD-1 treatment. MET inhibitor, Trametinib, decreased G-MDSC and restored CD8+ T cell infiltration and PD-1 blocker efficacy in CT26-STK11KO tumor.\\n Conclusions: We successfully generated a CT26-STK11KO cell line which was valuable for evaluation of PD-1 blocker and MEK inhibitor in STK11/LTB1 deficient tumor, in which Trametinib could rescue the efficacy of PD-1 treatment in CT26-STK11KO tumor via inhibiting G-MDSC. Taken together, our data suggest that altered immune cell infiltration, particularly increased G-MDSCs, in tumor microenvironment might be the reason for poor PD-1 blocker efficacy in CT26-STK11KO tumor.\\n Citation Format: Demi X. Liu, Jun Zhou, Chenpan Nie, Annie X. An, Henry Q.X. Li, Jingjing Wang. MEK inhibitor rescued the efficacy of PD-1 blocker in STK11/LKB1 mutated colorectal cancer model [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 617.\"}, {\"paperId\": \"03c3c920b74d34a6c731496e6671315868f718f9\", \"externalIds\": {\"PubMedCentral\": \"8743540\", \"DOI\": \"10.1099/mgen.0.000729\", \"CorpusId\": 235325743, \"PubMed\": \"34766904\"}, \"title\": \"A Campylobacter integrative and conjugative element with a CRISPR-Cas9 system targeting competing plasmids: a history of plasmid warfare?\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1099/mgen.0.000729\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8743540, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6198302\", \"name\": \"A. H. V. van Vliet\"}, {\"authorId\": \"91396882\", \"name\": \"Oliver Charity\"}, {\"authorId\": \"7769191\", \"name\": \"M. Reuter\"}], \"abstract\": \"Microbial genomes are highly adaptable, with mobile genetic elements (MGEs) such as integrative conjugative elements (ICE) mediating the dissemination of new genetic information throughout bacterial populations. This is countered by defence mechanism such as CRISPR-Cas systems, which limit invading MGEs by sequence-specific targeting. Here we report the distribution of the pVir, pTet and PCC42 plasmids and a new 70-129 kb ICE (CampyICE1) in the foodborne bacterial pathogens Campylobacter jejuni and Campylobacter coli. CampyICE1 contains a degenerated Type II-C CRISPR system consisting of a sole Cas9 protein, which is distinct from the previously described Cas9 proteins from C. jejuni and C. coli. CampyICE1 is conserved in structure and gene order, containing blocks of genes predicted to be involved in recombination, regulation, and conjugation. CampyICE1 was detected in 134/5,829 (2.3%) C. jejuni genomes and 92/1,347 (6.8%) C. coli genomes. Similar ICE were detected in a number of non-jejuni/coli Campylobacter species, although these lacked a CRISPR-Cas system. CampyICE1 carries 3 separate short CRISPR spacer arrays containing a combination of 108 unique spacers and 16 spacer variant families. A total of 69 spacers and 10 spacer variant families (63.7%) were predicted to target Campylobacter plasmids. The presence of a functional CampyICE1 Cas9 protein and matching anti-plasmid spacers was associated with the absence of the pVir, pTet and pCC42 plasmids (188/214 genomes, 87.9%), implicating that the CampyICE1-encoded CRISPR-Cas has contributed to the exclusion of competing plasmids. In conclusion, the characteristics of the CRISPR-Cas9 system on CampyICE1 suggests a history of plasmid warfare in Campylobacter. IMPACT STATEMENT Understanding pathogen evolution is paramount for enhancing food safety and limiting pathogenic disease in humans and animals. Campylobacter species comprise a group of human and animal pathogens with a remarkable success rate, being the most frequent cause of bacterial food-borne disease in high-income countries. A common theme among Campylobacter evolution is genomic plasticity, and a significant proportion of this plasticity is driven by horizontal gene transfer (HGT) that results in acquisition of complex traits in one evolutionary event. Understanding the mechanisms of transfer of MGEs and how MGEs such as integrative conjugative elements (ICE) exclude other MGEs is fundamental to understanding Campylobacter evolution. CRISPR-Cas9 proteins play a role in bacterial immune systems, mediating the defence against bacteriophage, plasmids, and integrative elements. The use of CRISPR-Cas by a mobile element to fight off competing elements, possibly to the advantage or detriment to their host, also increases our understanding of how important selfish genomic islands undergo co-evolution with bacterial pathogens, and generates insight into the complex warfare between MGEs. DATA STATEMENT All genome sequences used in this study are available on the National Center for Biotechnology Information (NCBI) Genome database or in the Campylobacter PubMLST website; the assembly accession numbers (NCBI Genome) or genome ID numbers (Campylobacter PubMLST) are listed in Table S1 (available in the online version of this article). Genome assemblies were quality checked based on N50, L50, genome size and number of contigs. CRISPR Spacer sequences and predicted targets, Cas9 alignments, presence of mobile elements and plasmids are all included in the Supplementary Information.\"}, {\"paperId\": \"03c5322c9a146987e96c9f7a3e7e342e2f68c52f\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.sabcs23-po4-23-08\", \"CorpusId\": 269557698}, \"title\": \"Abstract PO4-23-08: Estrogen therapy induces receptor-dependent DNA damage enhanced by PARP inhibition in ER+ breast cancer\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.sabcs23-po4-23-08?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.sabcs23-po4-23-08, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4933514\", \"name\": \"Nicole A. Traphagen\"}, {\"authorId\": \"2250915351\", \"name\": \"Gary Schwartz\"}, {\"authorId\": \"1444691589\", \"name\": \"Steven Tau\"}, {\"authorId\": \"2218201681\", \"name\": \"Alyssa M Roberts\"}, {\"authorId\": \"2144191058\", \"name\": \"A. Jiang\"}, {\"authorId\": \"5779649\", \"name\": \"Sarah R Hosford\"}, {\"authorId\": \"2299596038\", \"name\": \"Jonathan D Marotti\"}, {\"authorId\": \"50853887\", \"name\": \"Abigail E. Goen\"}, {\"authorId\": \"2076752621\", \"name\": \"Bianca A Romo\"}, {\"authorId\": \"2212061876\", \"name\": \"Anneka L. Johnson\"}, {\"authorId\": \"2212038949\", \"name\": \"Emily-Claire K Duffy\"}, {\"authorId\": \"2251658025\", \"name\": \"Eugene Demidenko\"}, {\"authorId\": \"65967125\", \"name\": \"Paul Heverly\"}, {\"authorId\": \"5309940\", \"name\": \"Yaron Mosesson\"}, {\"authorId\": \"2299715651\", \"name\": \"Shannon M. Soucy\"}, {\"authorId\": \"2248920678\", \"name\": \"F. Kolling\"}, {\"authorId\": \"2299582697\", \"name\": \"Todd W Miller\"}], \"abstract\": \"\\n Although clinical evidence indicates that treatment with estrogens elicits anti-cancer effects in ~30% of patients with advanced endocrine-resistant ER+ breast cancer, the underlying mechanism of action is unclear and this treatment remains under-utilized. ER+ breast cancer cells with acquired resistance to long-term estrogen deprivation (LTED) were used to model resistance to aromatase inhibitors (AIs) seen clinically. Genome-wide CRISPR/Cas9 knockout screening and transcriptomic profiling of LTED cells highlighted DNA Damage Response as a required pathway for therapeutic response to the estrogen 17b-estradiol. Tumor specimens from 2 patients with advanced ER+ breast cancer showed increased DNA damage response upon treatment with 17b-estradiol therapy compared to baseline. LTED cells treated with 17b-estradiol exhibited replication-dependent markers of DNA damage and the DNA damage response prior to apoptosis, while parental cells did not. Such DNA damage was partially driven by the formation of DNA:RNA hybrids (R-loops), and RNase H1-mediated prevention of R-loop formation abrogated 17b-estradiol-induced DNA damage. Pharmacological suppression of the DNA damage response via poly(ADP-ribose) polymerase (PARP) inhibition with olaparib enhanced 17b-estradiol-induced DNA damage. PARP inhibition synergized with 17b-estradiol to suppress growth and prevent tumor recurrence in both BRCA1/2-mutant and BRCA1/2-wild-type cell line and patient-derived xenograft models. We therefore conclude that 17b-estradiol-induced ER activity drives DNA damage and growth inhibition in endocrine-resistant breast cancer cells, and inhibition of the DNA damage response using drugs such as PARP inhibitors can exacerbate transcriptional stress and enhance therapeutic response to 17b-estradiol. This concept is being explored clinically in the PHOEBE trial testing the combination of 17b-estradiol and olaparib (NCT05900895). These findings also warrant further study of other DNA damage response inhibitors in advanced ER+ breast cancer. Moreover, these data indicate that PARP inhibitors may have applications beyond homologous recombination-deficient tumors.\\n Citation Format: Nicole Traphagen, Gary Schwartz, Steven Tau, Alyssa Roberts, Amanda Jiang, Sarah Hosford, Jonathan Marotti, Abigail Goen, Bianca Romo, Anneka Johnson, Emily Duffy, Eugene Demidenko, Paul Heverly, Yaron Mosesson, Shannon Soucy, Fred Kolling, Todd Miller. Estrogen therapy induces receptor-dependent DNA damage enhanced by PARP inhibition in ER+ breast cancer [abstract]. In: Proceedings of the 2023 San Antonio Breast Cancer Symposium; 2023 Dec 5-9; San Antonio, TX. Philadelphia (PA): AACR; Cancer Res 2024;84(9 Suppl):Abstract nr PO4-23-08.\"}, {\"paperId\": \"03c571e2943be63a9894589ad8261f996f8a9730\", \"externalIds\": {\"PubMedCentral\": \"11641557\", \"DOI\": \"10.3390/ijms252312760\", \"CorpusId\": 274347363, \"PubMed\": \"39684470\"}, \"title\": \"Only Infant MLL-Rearranged Leukemia Is Susceptible to an Inhibition of Polo-like Kinase 1 (PLK-1) by Volasertib\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11641557, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2247968999\", \"name\": \"J. Fischer\"}, {\"authorId\": \"2205439031\", \"name\": \"Estelle Erkner\"}, {\"authorId\": \"2205448271\", \"name\": \"Pia Radszuweit\"}, {\"authorId\": \"2297895\", \"name\": \"T. Hentrich\"}, {\"authorId\": \"2230100723\", \"name\": \"Hildegard Keppeler\"}, {\"authorId\": \"2159360362\", \"name\": \"Fulya Korkmaz\"}, {\"authorId\": \"1405583827\", \"name\": \"J. Schulze-Hentrich\"}, {\"authorId\": \"1416067313\", \"name\": \"Rahel Fitzel\"}, {\"authorId\": \"2269071675\", \"name\": \"C. Lengerke\"}, {\"authorId\": \"2315847643\", \"name\": \"Dominik Schneidawind\"}, {\"authorId\": \"12230678\", \"name\": \"C. Schneidawind\"}], \"abstract\": \"MLL-rearranged (MLLr) leukemia is characterized by a poor prognosis. Depending on the cell of origin, it differs in the aggressiveness and therapy response. For instance, in adults, volasertib blocking Polo-like kinase 1 (PLK-1) exhibited limited success. Otherwise, PLK-1 characterizes an infant MLLr signature, indicating potential sensitivity. By using our CRISPR/Cas9 MLLr model in CD34+ cells from human cord blood (huCB) and bone marrow (huBM) mimicking the infant and adult patient diseases, we were able to shed light on this phenomenon. The PLK-1 mRNA level was significantly increased in our huCB compared to the huBM model, which was underpinned by analyzing infant and adult MLLr leukemia patients. Importantly, the expression levels correlated with a functional response. Volasertib induced a significant dose-dependent decrease in proliferation and cell cycle arrest, most pronounced in the infant model. Mechanistically, upon volasertib treatment, we uncovered negative feedback only in the huBM model by compensatory upregulation of PLK-1 and related genes like AURKA involved in mitosis. Importantly, the poor response could be overcome by a combinatorial strategy with alisertib, an Aurora kinase A inhibitor. Our study emphasizes the importance of considering the cell of origin in therapeutic decision-making and provides the rationale for evaluating volasertib and alisertib in MLLr leukemia.\"}, {\"paperId\": \"03c82c7a4c5fb0199294cf0ea15bebdd019da5c3\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.metastasis22-pr013\", \"CorpusId\": 245713463}, \"title\": \"Abstract PR013: Lymph node colonization promotes distant tumor metastasis through the induction of tumor-specific immune tolerance\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.metastasis22-pr013?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.metastasis22-pr013, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1403168905\", \"name\": \"Nathan E. Reticker-Flynn\"}, {\"authorId\": \"47528031\", \"name\": \"Weiruo Zhang\"}, {\"authorId\": \"3381984\", \"name\": \"Julia A. Belk\"}, {\"authorId\": \"1962554\", \"name\": \"A. Gentles\"}, {\"authorId\": \"49385783\", \"name\": \"Ansuman T. Satpathy\"}, {\"authorId\": \"2224052\", \"name\": \"S. Plevritis\"}, {\"authorId\": \"3602224\", \"name\": \"E. Engleman\"}], \"abstract\": \"\\n The majority of cancer-associated deaths result from distant organ metastasis, yet the mechanisms that enable this process remain poorly understood. For most solid tumors, colonization of regional or distant lymph nodes (LNs) typically precedes the formation of distant organ metastases, yet it remains unclear whether LN metastasis plays a functional role in disease progression. LNs are major sites of anti-tumor lymphocyte education, including in the context of immunotherapy, yet LN metastasis frequently correlates with further disease progression. Here, we find that LN metastasis represents a critical step in tumor progression through the capacity of such metastases to induce tumor-specific immune tolerance in a manner that promotes further dissemination of tumors to distant organs. Using an in vivo passaging approach of a non-metastatic syngeneic melanoma, we generated 300 unique cell lines exhibiting varying degrees of LN metastatic capacity. We show that the presence of these LN metastases enables distant organ seeding of metastases in a manner that the parental tumor cannot, and this effect is eliminated in mice lacking an adaptive immune response. Furthermore, this promotion of distant seeding by LN metastases is tumor specific. Using flow cytometry and single-cell sequencing to perform comprehensive immune profiling, we identify multiple cellular mediators of tolerance. In particular, we find that LN metastases have the capacity to both resist NK cell cytotoxicity and induce regulatory T cells (Tregs). Furthermore, depletion of NK cells in vivo enables non-metastatic tumors to disseminate to LNs, and ablation of Tregs using FoxP3-DTR mice eliminates the occurrence of lymphatic metastases. Adoptive transfer of Tregs from the LNs of mice bearing LN metastasis to na\\u00efve mice facilitates metastasis in a manner that Tregs from mice without LN metastases cannot, and we find that these Tregs are induced in an antigen-specific manner. Whole exome sequencing revealed that neither the metastatic proclivity nor immunosuppression evolve through the acquisition of driver mutations, loss of neoantigens, loss of MHC class I presentation, or decreases in melanoma antigen expression. Rather, by RNA-seq and ATAC-seq, we show that a conserved interferon signaling axis is upregulated in LN metastases and is rendered stable through epigenetic reprogramming of chromatin accessibility resulting from chronic exposure to interferons in vivo. Furthermore, using CRISPR/Cas9, we find that these pathways are required for LN metastatic seeding, and validate their conserved significance in additional mouse models of pancreatic ductal adenocarcinoma and head and neck squamous cell carcinoma and humans with LN metastatic disease. Together, these findings demonstrate a critical role for LN metastasis in promoting tumor-specific immunosuppression.\\n Citation Format: Nathan E. Reticker-Flynn, Weiruo Zhang, Julia A. Belk, Pamela A. Basto, Andrew J. Gentles, John B. Sunwoo, Ansuman K. Satpathy, Sylvia K. Plevritis, Edgar G. Engleman. Lymph node colonization promotes distant tumor metastasis through the induction of tumor-specific immune tolerance [abstract]. In: Proceedings of the AACR Special Conference: Cancer Metastasis; 2022 Nov 14-17; Portland, OR. Philadelphia (PA): AACR; Cancer Res 2022;83(2 Suppl_2):Abstract nr PR013.\"}, {\"paperId\": \"03cbe88e7bc07ffda986e89c64a7c94f9462f3a1\", \"externalIds\": {\"DOI\": \"10.1002/path.6082\", \"CorpusId\": 249873320, \"PubMed\": \"37186300\"}, \"title\": \"Receptor for Hyaluronan-Mediated Motility (RHAMM) defines an invasive niche associated with tumor progression and predicts poor outcomes in breast cancer patients\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/path.6082\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/path.6082?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/path.6082, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79522344\", \"name\": \"Sarah E. Tarullo\"}, {\"authorId\": \"2281004952\", \"name\": \"Yuyu He\"}, {\"authorId\": \"1750922818\", \"name\": \"Claire Daughters\"}, {\"authorId\": \"4338926\", \"name\": \"T. Knutson\"}, {\"authorId\": \"4007618\", \"name\": \"C. Henzler\"}, {\"authorId\": \"152472398\", \"name\": \"M. Price\"}, {\"authorId\": \"144743831\", \"name\": \"R. Shanley\"}, {\"authorId\": \"1720875523\", \"name\": \"Patrice M Witschen\"}, {\"authorId\": \"152415236\", \"name\": \"Cornelia Tolg\"}, {\"authorId\": \"122065867\", \"name\": \"Rachael E. Kaspar\"}, {\"authorId\": \"49886157\", \"name\": \"C. Hallstrom\"}, {\"authorId\": \"2171376046\", \"name\": \"Lyubov Gittsovich\"}, {\"authorId\": \"2311592768\", \"name\": \"Megan L. Sulciner\"}, {\"authorId\": \"2107942396\", \"name\": \"Xihong Zhang\"}, {\"authorId\": \"2171369479\", \"name\": \"Colleen Forester\"}, {\"authorId\": \"2387972\", \"name\": \"Oleg Shats\"}, {\"authorId\": \"3667992\", \"name\": \"M. Desler\"}, {\"authorId\": \"3461583\", \"name\": \"K. Cowan\"}, {\"authorId\": \"145433651\", \"name\": \"D. Yee\"}, {\"authorId\": \"5919451\", \"name\": \"K. Schwertfeger\"}, {\"authorId\": \"2261365\", \"name\": \"E. Turley\"}, {\"authorId\": \"10228474\", \"name\": \"J. McCarthy\"}, {\"authorId\": \"40359757\", \"name\": \"A. Nelson\"}], \"abstract\": \"Breast cancer invasion and metastasis result from a complex interplay between tumor cells and the tumor microenvironment (TME). Key oncogenic changes in the TME include aberrant metabolism and subsequent signaling of hyaluronan (HA). Hyaluronan Mediated Motility Receptor (RHAMM, HMMR) is a HA receptor that enables tumor cells to sense and respond to the TME during breast cancer progression. Focused gene expression analysis of an internal breast cancer patient cohort demonstrates increased RHAMM expression correlates with aggressive clinicopathological features. We also develop a 27-gene RHAMM-dependent signature (RDS) by intersecting differentially expressed genes in lymph node positive cases with the transcriptome of a RHAMM-dependent model of cell transformation, which we validate in an independent cohort. We demonstrate RDS predicts for poor survival and associates with invasive pathways. Further analyses using CRISPR/Cas9 generated RHAMM -/- breast cancer cells provide direct evidence that RHAMM promotes invasion in vitro and in vivo. Additional immunohistochemistry studies highlight heterogeneous RHAMM expression, and spatial transcriptomics confirms the RDS emanates from RHAMM-high invasive niches. We conclude RHAMM upregulation leads to the formation of \\u2018invasive niches\\u2019, which are enriched in RDS-related pathways that drive invasion and could be targeted to limit invasive progression and improve patient outcomes.\"}, {\"paperId\": \"03d07aa14366818655d5cfdb016eb2c0ae64ae04\", \"externalIds\": {\"MAG\": \"3086526103\", \"DOI\": \"10.1021/acssynbio.0c00248\", \"CorpusId\": 221637947, \"PubMed\": \"32916055\"}, \"title\": \"Enhanced production of active ecumicin component with higher anti-tuberculosis activity by the rare actinomycete Nonomuraea sp. MJM5123 using a novel promoter-engineering strategy.\", \"venue\": \"ACS Synthetic Biology\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acssynbio.0c00248?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acssynbio.0c00248, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"80011881\", \"name\": \"C. Su\"}, {\"authorId\": \"40616811\", \"name\": \"N. Tuan\"}, {\"authorId\": \"47803829\", \"name\": \"Mi-Jin Lee\"}, {\"authorId\": \"2378250221\", \"name\": \"Xia-Ying Zhang\"}, {\"authorId\": \"46606071\", \"name\": \"Jinhua Cheng\"}, {\"authorId\": \"6496126\", \"name\": \"Yingyu Jin\"}, {\"authorId\": \"87766576\", \"name\": \"Xinqing Zhao\"}, {\"authorId\": \"3005719\", \"name\": \"J. Suh\"}], \"abstract\": \"Ecumicins are potent anti-tuberculosis natural compounds produced by the rare actinomycete Nonomuraea sp. MJM5123. Here, we report an efficient genetic manipulation platform of this rare actinomycete. CRISPR/Cas9-based genome editing was achieved based on successful sporulation. Two genes in the ecumicin gene cluster were further investigated: ecuN and ecuE, which potentially encode a pre-tailoring cytochrome P450 hydroxylase and the core peptide synthase, respectively. Deletion of ecuN led to an enhanced ratio of the ecumicin compound EcuH16 relative to EcuH14, indicating that EcuN is indeed a P450 hydroxylase, and catalyzed hydroxylation at the C-3 position in unit12 phenylalanine to transform EcuH16 to the compound EcuH14. Furthermore, promoter engineering of ecuE by employing the strong promoter kasO*P was performed and optimized. We found that integrating the endogenous ribosome-binding site (RBS) of ecuE together with the RBS from kasO*P led to improved ecumicin production, and resulted in remarkably high EcuH16/EcuH14 ratio. Importantly, production of the more active component EcuH16 was considerably increased in the double RBSs engineered strain EPR1 compared to the wild-type strain, reaching 310 mg/L. At the same time, this production level was 2.3 times higher than that of the control strain EPA1 with only one RBS from kasO*P. To the best of our knowledge, this is the first report of genome editing and promoter engineering of the rare actinomycete Nonomuraea.\"}, {\"paperId\": \"03d0ea09891411ad4304f26b261c7a78970d5fdc\", \"externalIds\": {\"DOI\": \"10.1016/j.cellsig.2023.110684\", \"CorpusId\": 258222702, \"PubMed\": \"37080443\"}, \"title\": \"IL-1\\u03b2 stimulates a novel, IKK\\u03b1 -dependent, NIK -independent activation of non-canonical NF\\u03baB signalling.\", \"venue\": \"Cellular Signalling\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.cellsig.2023.110684\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.cellsig.2023.110684?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.cellsig.2023.110684, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145643643\", \"name\": \"K. McIntosh\"}, {\"authorId\": \"1435983398\", \"name\": \"Yousif H. Khalaf\"}, {\"authorId\": \"145069736\", \"name\": \"Rachel Craig\"}, {\"authorId\": \"2242220991\", \"name\": \"C. West\"}, {\"authorId\": \"2193179749\", \"name\": \"Ashley McCulloch\"}, {\"authorId\": \"1475774366\", \"name\": \"A. Waghmare\"}, {\"authorId\": \"2057220515\", \"name\": \"Christopher Lawson\"}, {\"authorId\": \"2419409224\", \"name\": \"Edmond Y. W. Chan\"}, {\"authorId\": \"40313502\", \"name\": \"S. Mackay\"}, {\"authorId\": \"2150514771\", \"name\": \"A. Paul\"}, {\"authorId\": \"5356549\", \"name\": \"R. Plevin\"}], \"abstract\": \"In this study, we examined the activation of non-canonical nuclear factor Kappa B (NF\\u03baB) signalling in U2OS cells, a cellular metastatic bone cancer model. Whilst Lymphotoxin \\u03b11\\u03b22 (LT\\u03b11\\u03b22) stimulated the expected slow, delayed, sustained activation of serine 866/870 p100 phosphorylation and increased cellular expression of p52 NF\\u03baB, we found that canonical agonists, Interleukin-1\\u03b2 (IL-1\\u03b2) and also Tumour necrosis factor-\\u03b1 (TNF\\u03b1) generated a rapid transient increase in pp100, which was maximal by 15-30\\u202fmin. This rapid phosphorylation was also observed in other cells types, such as DU145 and HCAECs suggesting the phenomenon is universal. IKK\\u03b1 deletion using CRISPR/Cas9 revealed an IKK\\u03b1-dependent mechanism for serine 866/870 and additionally serine 872 p100 phosphorylation for both IL-1\\u03b2 and LT\\u03b11\\u03b22. In contrast, knockdown of IKK\\u03b2 using siRNA or pharmacological inhibition of IKK\\u03b2 activity was without effect on p100 phosphorylation. Pre-incubation of cells with the NF\\u03baB inducing-kinase (NIK) inhibitor, CW15337, had no effect on IL-1\\u03b2 induced phosphorylation of p100 however, the response to LT\\u03b11\\u03b22 was virtually abolished. Surprisingly IL-1\\u03b2 also stimulated p52 nuclear translocation as early as 60\\u202fmin, this response and the concomitant p65 translocation was partially reduced by IKK\\u03b1 deletion. Furthermore, p52 nuclear translocation was unaffected by CW15337. In contrast, the response to LT\\u03b11\\u03b22 was essentially abolished by both IKK\\u03b1 deletion and CW15337. Taken together, these finding reveal novel forms of NF\\u03baB non-canonical signalling stimulated by ligands that activate the canonical NF\\u03baB pathway strongly such as IL-1\\u03b2.\"}, {\"paperId\": \"03d2446e5337fcb40af111c0a4413af422895bf7\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-2164-6_4\", \"CorpusId\": 247295158, \"PubMed\": \"35258824\"}, \"title\": \"Application of Protoplast Regeneration to CRISPR/Cas9 Mutagenesis in Nicotiana tabacum.\", \"venue\": \"Methods in molecular biology\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-2164-6_4?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-2164-6_4, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"82361724\", \"name\": \"Fu-Hui Wu\"}, {\"authorId\": \"1387914275\", \"name\": \"Yu-Hsuan Yuan\"}, {\"authorId\": \"133765068\", \"name\": \"Chen-Tran Hsu\"}, {\"authorId\": \"134613538\", \"name\": \"Qiao-Wei Cheng\"}, {\"authorId\": \"4389450\", \"name\": \"Choun-Sea Lin\"}], \"abstract\": null}, {\"paperId\": \"03d87b4045eee1b11ba010108c5ef42358b95ded\", \"externalIds\": {\"DOI\": \"10.1038/s41569-023-00838-6\", \"CorpusId\": 256230578, \"PubMed\": \"36693913\"}, \"title\": \"Base editing of CaMKII\\u03b4 shows promise as cardiac therapy\", \"venue\": \"Nature Reviews Cardiology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41569-023-00838-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41569-023-00838-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404253108\", \"name\": \"I. Ferna\\u0301ndez-Rui\\u0301z\"}], \"abstract\": null}, {\"paperId\": \"03d97dec094025029569e42eb1e083dafbaa3514\", \"externalIds\": {\"PubMedCentral\": \"8417969\", \"DOI\": \"10.1186/s12915-021-01106-0\", \"CorpusId\": 237405484, \"PubMed\": \"34479564\"}, \"title\": \"Stop codon readthrough alters the activity of a POU/Oct transcription factor during Drosophila development\", \"venue\": \"BMC Biology\", \"year\": 2021, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bmcbiol.biomedcentral.com/counter/pdf/10.1186/s12915-021-01106-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8417969, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4997778\", \"name\": \"Yunpo Zhao\"}, {\"authorId\": \"12065857\", \"name\": \"Bo G. Lindberg\"}, {\"authorId\": \"15278560\", \"name\": \"Shiva Seyedoleslami Esfahani\"}, {\"authorId\": \"15768906\", \"name\": \"Xiongzhuo Tang\"}, {\"authorId\": \"36333017\", \"name\": \"S. Piazza\"}, {\"authorId\": \"2008527\", \"name\": \"Y. Engstr\\u00f6m\"}], \"abstract\": \"Background A number of cellular processes have evolved in metazoans that increase the proteome repertoire in relation to the genome, such as alternative splicing and translation recoding. Another such process, translational stop codon readthrough (SCR), generates C-terminally extended protein isoforms in many eukaryotes, including yeast, plants, insects, and humans. While comparative genome analyses have predicted the existence of programmed SCR in many species including humans, experimental proof of its functional consequences are scarce. Results We show that SCR of the Drosophila POU/Oct transcription factor Ventral veins lacking/Drifter (Vvl/Dfr) mRNA is prevalent in certain tissues in vivo, reaching a rate of 50% in the larval prothoracic gland. Phylogenetically, the C-terminal extension is conserved and harbors intrinsically disordered regions and amino acid stretches implied in transcriptional activation. Elimination of Vvl/Dfr translational readthrough by CRISPR/Cas9 mutagenesis changed the expression of a large number of downstream genes involved in processes such as chromatin regulation, neurogenesis, development, and immune response. As a proof-of-principle, we demonstrate that the C-terminal extension of Vvl/Dfr is necessary for correct timing of pupariation, by increasing the capacity to regulate its target genes. The extended Vvl/Dfr isoform acts in synergy with the transcription factor Molting defective (Mld) to increase the expression and biosynthesis of the steroid hormone ecdysone, thereby advancing pupariation. Consequently, late-stage larval development was prolonged and metamorphosis delayed in vvl/dfr readthrough mutants. Conclusions We demonstrate that translational recoding of a POU/Oct transcription factor takes place in a highly tissue-specific and temporally controlled manner. This dynamic and regulated recoding is necessary for normal expression of a large number of genes involved in many cellular and developmental processes. Loss of Vvl/Dfr translational readthrough negatively affects steroid hormone biosynthesis and delays larval development and progression into metamorphosis. Thus, this study demonstrates how SCR of a transcription factor can act as a developmental switch in a spatiotemporal manner, feeding into the timing of developmental transitions between different life-cycle stages. Graphical abstract\"}, {\"paperId\": \"03da7e315d7dddc01347d5398f12ec301fe09150\", \"externalIds\": {\"PubMedCentral\": \"8131845\", \"DOI\": \"10.3389/fcell.2021.671364\", \"CorpusId\": 233732438, \"PubMed\": \"34026762\"}, \"title\": \"N-Terminus of GRXCR2 Interacts With CLIC5 and Is Essential for Auditory Perception\", \"venue\": \"Frontiers in Cell and Developmental Biology\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fcell.2021.671364/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8131845, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2344946170\", \"name\": \"Jinan Li\"}, {\"authorId\": \"2356209383\", \"name\": \"Chang Liu\"}, {\"authorId\": \"2143736794\", \"name\": \"Bo Zhao\"}], \"abstract\": \"Stereocilia of cochlear hair cells are specialized mechanosensing organelles that convert sound-induced vibration to electrical signals. Glutaredoxin domain-containing cysteine-rich protein 2 (GRXCR2) is localized at the base of stereocilia and is necessary for stereocilia morphogenesis and auditory perception. However, the detailed functions of GRXCR2 in hair cells are still largely unknown. Here, we report that GRXCR2 interacts with chloride intracellular channel protein 5 (CLIC5) which is also localized at the base of stereocilia and required for normal hearing in human and mouse. Immunolocalization analyses suggest that GRXCR2 is not required for the localization of CLIC5 to the stereociliary base during development, or vice versa. Using clustered regularly interspaced short palindromic repeats (CRISPR)/Cas9 system, we deleted 60 amino acids near the N-terminus of GRXCR2 essential for its interaction with CLIC5. Interestingly, mice harboring this in-frame deletion in Grxcr2 exhibit moderate hearing loss at lower frequencies and severe hearing loss at higher frequencies although the morphogenesis of stereocilia is minimally affected. Thus, our findings reveal that the interaction between GRXCR2 and CLIC5 is crucial for normal hearing.\"}, {\"paperId\": \"03dab718f624cc45fe2962d74493088567458a05\", \"externalIds\": {\"PubMedCentral\": \"7160961\", \"MAG\": \"3015330591\", \"DOI\": \"10.1186/s12885-020-06794-5\", \"CorpusId\": 215760386, \"PubMed\": \"32293333\"}, \"title\": \"The circular RNA CDR1as regulate cell proliferation via TMED2 and TMED10\", \"venue\": \"BMC Cancer\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bmccancer.biomedcentral.com/track/pdf/10.1186/s12885-020-06794-5\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7160961, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145180949\", \"name\": \"Xue Yang\"}, {\"authorId\": \"34602528\", \"name\": \"Siting Li\"}, {\"authorId\": \"2145899327\", \"name\": \"Ying Wu\"}, {\"authorId\": \"46453695\", \"name\": \"F. Ge\"}, {\"authorId\": \"2118427400\", \"name\": \"Ying Chen\"}, {\"authorId\": \"49906074\", \"name\": \"Qian Xiong\"}], \"abstract\": \"Background Circular RNAs (CircRNAs) are biologically active RNAs. CDR1as is one such circRNA previously reported to be a microRNA-7 (miR-7) sponge, thereby regulating associated gene expression. The specific underlying molecular mechanisms of CDR1as biology, however, remain largely unknown. Methods We performed CDR1as knockdown in order to explore its function in cell proliferation, migration, the cell cycle, and tumorigenesis. We further employed quantitative proteomic analyses and associated bioinformatics strategies to globally assess CDR1as-regulated proteins (CRPs). Western blotting and immunofluorescence staining were used to validate the proteomic results. We additionally investigated a specific link between TMED2, TMED10, and miR-7 via a dual-luciferase reporter system, and generated CDR1as knockout cell lines via CRISPR/Cas9 editing. Results We identified 353 proteins dysregulated upon CDR1as knockdown in 293\\u2009T cells. These CRPs were found to interact with one another and to play key roles in certain cellular pathways. Two such proteins, TMED2 and TMED10, were found to specifically contribute to the influence of CDR1as on cell proliferation. CDR1as may regulate these two TMED proteins through miR-7 sponging. We were able to further confirm these results using both CRISPRi cell lines and nude mouse models. Conclusion This study suggested that CDR1as may regulate cell proliferation via serving as a miR-7 sponge, thereby regulating TMED2 and TMED10 expression. These results are an invaluable template for future streamlined studies of circRNAs.\"}, {\"paperId\": \"03db9893fc33a747583e66c7f937b41ccc2a1194\", \"externalIds\": {\"DOI\": \"10.1161/res.129.suppl_1.mp256\", \"CorpusId\": 244513099}, \"title\": \"Abstract MP256: CCCTC-binding Factor Site Mutation In\\n Sirt1\\n Promoter Reduces Systolic Cardiac Function In Mice\", \"venue\": \"Circulation Research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/res.129.suppl_1.mp256?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/res.129.suppl_1.mp256, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48937823\", \"name\": \"T. Wagner\"}, {\"authorId\": \"3618318\", \"name\": \"R. Micheletti\"}, {\"authorId\": \"40465044\", \"name\": \"Havilah Taylor\"}, {\"authorId\": \"79951018\", \"name\": \"Y. Suh\"}, {\"authorId\": \"32325665\", \"name\": \"M. Rosenfeld\"}, {\"authorId\": \"102115683\", \"name\": \"Alice E. Zemljic-Harpf\"}], \"abstract\": \"\\n Regulation of the geroprotective histone-deacetylase SIRT1 is an important physiological strategy to protect against cardiovascular disease. SIRT1 activity regulates the oxidative stress response, DNA damage pathways, cell death, and cardioprotective SIRT1 levels decreases with age. Based on this and GWAS studies implicating misregulation linked to myocardial infarction risk, we hypothesized that disrupting proximal promoter regulation of\\n SIRT1\\n causes cardiac stress. Focusing on Single Nucleotide Polymorphisms (SNPs) in the\\n SIRT1\\n promoter, we used reporter gene assays to test if the transcriptional regulation of\\n SIRT1\\n after oxidative stress is altered by the SNPs. Identifying a candidate A/G polymorphism at the -92 position in the promoter of\\n SIRT1\\n , we show that the presence of the minority allele causes a disrupted epigenetic activation of\\n SIRT1\\n . In model cell systems, binding of CCCTC-binding factor (CTCF) in the promoter of\\n SIRT1\\n is reduced after oxidative stress in cells carrying the minority allele, correlating with a lack of activation of stress-protective\\n SIRT1\\n expression in iPSC-derived cardiomyocytes. To investigate the physiological consequences of this mutation, we used Crispr/Cas9 to generate global\\n Sirt1\\n promoter CTCF site mutant (Sirt1-mut) mice. Echocardiography in 7-month-old male mice shows reduced FS% (control 31.1\\u00b11.5%, Sirt1-mut 20.9\\u00b10.8%, mean\\u00b1sem, p<0.0001, n=10-12 each), as well as increased LVIDs and decreased LVPWd wall dimensions in Sirt1-mut mice. RNA-seq on left ventricular cardiac tissue of 8-month-old control and Sirt1-mut mice identified 130 genes that are differentially regulated. Gene Ontology term enrichment analysis finds the differentially expressed genes are in pathways linked to regulation in response to reactive oxygen species and oxidative stress. In conclusion, we show that a mutation in the\\n Sirt1\\n promoter critical for oxidative stress responses leads to systolic cardiac dysfunction. The transcriptional regulation of cardioprotective SIRT1 is an important and hitherto overlooked factor in the pathophysiology of heart failure.\\n\"}, {\"paperId\": \"03dbb6db47e8ac1e7a18094f31a06483baa36dcc\", \"externalIds\": {\"DOI\": \"10.36283/pjmd13-3/022\", \"CorpusId\": 274629181}, \"title\": \"Revolutionizing Endodontics: Potential, Challenges and Ethical Concerns of CRISPR Technology in Endodontics\", \"venue\": \"Pakistan journal of medicine and dentistry\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.36283/pjmd13-3/022?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.36283/pjmd13-3/022, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2335507894\", \"name\": \"Dr. Maham Muneeb Lone\"}, {\"authorId\": \"65968458\", \"name\": \"Isma Sajjad\"}, {\"authorId\": \"112935561\", \"name\": \"M. Sajid\"}, {\"authorId\": \"115022233\", \"name\": \"S. Yawar\"}, {\"authorId\": \"2261228032\", \"name\": \"Ali Abidi\"}, {\"authorId\": \"35485257\", \"name\": \"M. M. Lone\"}], \"abstract\": \"In the evolving landscape of endodontic therapy, our primary objective revolved around maintaining dental pulp vitality or intervening effectively when the pulp is irreparably damaged or infected. At the forefront of these groundbreaking advancements stands CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) gene-editing technology that has captivated the global scientific community. The origins of CRISPR hail from a natural defense mechanism employed by bacteria and archaea. These microorganisms capture snippets of DNA from invading viruses, creating a genomic library that serves as a historical record of past viral encounters. This remarkable natural process has paved the way for potentially transformative methods in treating a spectrum of dental pulp diseases and disorders. However, integrating CRISPR into clinical practice is not without its complexities and moral dilemmas. One of the foremost concerns is the reliability of the gene-editing process. To address this, there is a concerted effort within the scientific fraternity to refine the Cas9 enzyme further, to enhance the design of guide RNAs, and to develop sophisticated techniques for identifying and rectifying any inadvertent genetic modifications. In summary, the horizon of endodontic therapy is becoming increasingly promising, with CRISPR technology leading the charge. Hence, the objective of this review article was to provide a comprehensive overview of the potential, challenges, and ethical concerns of using CRISPR technology in the field of endodontics.\"}, {\"paperId\": \"03dc4772768eca06264bfaadb723333de1cb915a\", \"externalIds\": {\"MAG\": \"3111818783\", \"DOI\": \"10.1016/j.molbiopara.2020.111346\", \"CorpusId\": 228170468, \"PubMed\": \"33307135\"}, \"title\": \"Generation of Plasmodium yoelii malaria parasite for conditional degradation of proteins.\", \"venue\": \"Molecular and biochemical parasitology (Print)\", \"year\": 2020, \"citationCount\": 13, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.molbiopara.2020.111346?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.molbiopara.2020.111346, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1618131698\", \"name\": \"Chuanyuan Liu\"}, {\"authorId\": \"50109223\", \"name\": \"Zhenke Yang\"}, {\"authorId\": \"2052051980\", \"name\": \"Mengya Cai\"}, {\"authorId\": \"2119038616\", \"name\": \"Yang Shi\"}, {\"authorId\": \"4237769\", \"name\": \"Huiting Cui\"}, {\"authorId\": \"2118571659\", \"name\": \"Jing Yuan\"}], \"abstract\": \"The auxin-inducible degron (AID) system is a robust chemical-genetic method for manipulating endogenous protein level by conditional proteasomal degradation via a small molecule. So far, this system has not been adapted in the P. yoelii, an important and widely used Plasmodium rodent parasite model for malaria biology. Here, using the CRISPR/Cas9 genome editing method, we generated two marker-free transgenic P. yoelii parasite lines (eef1a-Tir1 and soap-Tir1) stably expressing the Oryza sativa gene tir1 under the promoters of eef1a and soap respectively. These two lines develop normally during the parasite life cycle. In these backgrounds, we used the CRISPR/Cas9 method to tag two genes (cdc50c and fbxo1) with the AID motif and interrogate the expression of these two proteins with auxin. The eef1a-Tir1 line allows efficient degradation of the AID-tagged endogenous protein in the asexual schizont and sexual gametocyte stages, while the soap-Tir1 line allows protein degradation in the ookinetes. These two lines will be a useful resource for studying the Plasmodium parasite biology based on the P. yoelii.\"}, {\"paperId\": \"03ddf746b7d0fb8b6270b426a46e4fae592d2c8d\", \"externalIds\": {\"DOI\": \"10.1016/j.medj.2022.07.008\", \"CorpusId\": 263514593, \"PubMed\": \"36007524\"}, \"title\": \"Internal checkpoint regulates T\\u00a0cell neoantigen reactivity and susceptibility to PD1 blockade.\", \"venue\": \"i Medicina\", \"year\": 2022, \"citationCount\": 36, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S266663402200318X/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.medj.2022.07.008?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.medj.2022.07.008, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2125089\", \"name\": \"D. Palmer\"}, {\"authorId\": \"9528097\", \"name\": \"Beau R. Webber\"}, {\"authorId\": \"2263984466\", \"name\": \"Yogin Patel\"}, {\"authorId\": \"2251431532\", \"name\": \"Matthew J. Johnson\"}, {\"authorId\": \"51184797\", \"name\": \"C. Kariya\"}, {\"authorId\": \"51177411\", \"name\": \"Walker S. Lahr\"}, {\"authorId\": \"5116385\", \"name\": \"M. Parkhurst\"}, {\"authorId\": \"145772328\", \"name\": \"J. Gartner\"}, {\"authorId\": \"145027880\", \"name\": \"Todd D Prickett\"}, {\"authorId\": \"7317969\", \"name\": \"Frank J. Lowery\"}, {\"authorId\": \"5801912\", \"name\": \"Rigel J. Kishton\"}, {\"authorId\": \"5046417\", \"name\": \"Devikala Gurusamy\"}, {\"authorId\": \"6756205\", \"name\": \"Zulmarie Franco\"}, {\"authorId\": \"4045574\", \"name\": \"S. Vodnala\"}, {\"authorId\": \"8544115\", \"name\": \"Miechaleen D. Diers\"}, {\"authorId\": \"21518009\", \"name\": \"Natalie K. Wolf\"}, {\"authorId\": \"2140540470\", \"name\": \"Nicholas J. Slipek\"}, {\"authorId\": \"2238415038\", \"name\": \"David H. McKenna\"}, {\"authorId\": \"16121120\", \"name\": \"D. Sumstad\"}, {\"authorId\": \"1976608713\", \"name\": \"L. Viney\"}, {\"authorId\": \"119575496\", \"name\": \"T. Henley\"}, {\"authorId\": \"2859624\", \"name\": \"T. B\\u00fcrckst\\u00fcmmer\"}, {\"authorId\": \"34024248\", \"name\": \"O. Baker\"}, {\"authorId\": \"2256189091\", \"name\": \"Ying Hu\"}, {\"authorId\": \"49107598\", \"name\": \"Chunhua Yan\"}, {\"authorId\": \"2149906\", \"name\": \"D. Meerzaman\"}, {\"authorId\": \"48320583\", \"name\": \"K. Padhan\"}, {\"authorId\": \"2250764620\", \"name\": \"Winnie Lo\"}, {\"authorId\": \"7624885\", \"name\": \"Parisa Malekzadeh\"}, {\"authorId\": \"50493049\", \"name\": \"Li Jia\"}, {\"authorId\": \"6618561\", \"name\": \"D. Deniger\"}, {\"authorId\": \"5052367\", \"name\": \"Shashank J. Patel\"}, {\"authorId\": \"2083707\", \"name\": \"P. Robbins\"}, {\"authorId\": \"152506282\", \"name\": \"R. McIvor\"}, {\"authorId\": \"46402008\", \"name\": \"Modassir Choudhry\"}, {\"authorId\": \"2239208269\", \"name\": \"S. A. Rosenberg\"}, {\"authorId\": \"6390232\", \"name\": \"B. Moriarity\"}, {\"authorId\": \"1925918\", \"name\": \"N. Restifo\"}], \"abstract\": \"BACKGROUND\\nAdoptive transfer of tumor-infiltrating lymphocytes (TIL) fails to consistently elicit tumor rejection. Manipulation of intrinsic factors that inhibit T\\u00a0cell effector function and neoantigen recognition may therefore improve TIL therapy outcomes. We previously identified the cytokine-induced SH2 protein (CISH) as a key regulator of T\\u00a0cell functional avidity in mice. Here, we investigate the mechanistic role of CISH in regulating human T\\u00a0cell effector function in solid tumors and demonstrate that CRISPR/Cas9 disruption of CISH enhances TIL neoantigen recognition and response to checkpoint blockade.\\n\\n\\nMETHODS\\nSingle-cell gene expression profiling was used to identify a negative correlation between high CISH expression and TIL activation in patient-derived TIL. A GMP-compliant CRISPR/Cas9 gene editing process was developed to assess the impact of CISH disruption on the molecular and functional phenotype of human peripheral blood T\\u00a0cells and TIL. Tumor-specific T\\u00a0cells with disrupted Cish function were adoptively transferred into tumor-bearing mice and evaluated for efficacy with or without checkpoint blockade.\\n\\n\\nFINDINGS\\nCISH expression was associated with T\\u00a0cell dysfunction. CISH deletion using CRISPR/Cas9 resulted in hyper-activation and improved functional avidity against tumor-derived neoantigens without perturbing T\\u00a0cell maturation. Cish knockout resulted in increased susceptibility to checkpoint blockade in\\u00a0vivo.\\n\\n\\nCONCLUSIONS\\nCISH negatively regulates human T\\u00a0cell effector function, and its genetic disruption offers a novel avenue to improve the therapeutic efficacy of adoptive TIL therapy.\\n\\n\\nFUNDING\\nThis study was funded by Intima Bioscience, U.S. and in part through the Intramural program CCR at the National Cancer Institute.\"}, {\"paperId\": \"03dff2a7f46a987db29027e26097373960647348\", \"externalIds\": {\"MAG\": \"3004664643\", \"DOI\": \"10.1038/s41375-020-0729-9\", \"CorpusId\": 211067210, \"PubMed\": \"32042080\"}, \"title\": \"Biomarkers for RBM39 degradation in acute myeloid leukemia\", \"venue\": \"Leukemia\", \"year\": 2020, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7819273\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41375-020-0729-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41375-020-0729-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2066692\", \"name\": \"D. Hsiehchen\"}, {\"authorId\": \"83408109\", \"name\": \"Margaret A. Goralski\"}, {\"authorId\": \"153188178\", \"name\": \"Jiwoong Kim\"}, {\"authorId\": \"145668114\", \"name\": \"Yang Xie\"}, {\"authorId\": \"4917957\", \"name\": \"D. Nijhawan\"}], \"abstract\": null}, {\"paperId\": \"03e0120b9d00f75deac1284aa56afb8e54d52a85\", \"externalIds\": {\"PubMedCentral\": \"8584755\", \"DOI\": \"10.1371/journal.pgen.1009891\", \"CorpusId\": 244039085, \"PubMed\": \"34762653\"}, \"title\": \"Deficiency of ASGR1 in pigs recapitulates reduced risk factor for cardiovascular disease in humans\", \"venue\": \"PLoS Genetics\", \"year\": 2021, \"citationCount\": 34, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosgenetics/article/file?id=10.1371/journal.pgen.1009891&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8584755, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1491573908\", \"name\": \"B. Xie\"}, {\"authorId\": \"100837620\", \"name\": \"Xiao-Pei Shi\"}, {\"authorId\": \"47001769\", \"name\": \"Yan Li\"}, {\"authorId\": \"2058909684\", \"name\": \"Bo Xia\"}, {\"authorId\": \"2112264377\", \"name\": \"J. Zhou\"}, {\"authorId\": \"50593573\", \"name\": \"Minjie Du\"}, {\"authorId\": \"2055645985\", \"name\": \"Xiangyang Xing\"}, {\"authorId\": \"144769215\", \"name\": \"Liang Bai\"}, {\"authorId\": \"6952726\", \"name\": \"Enqi Liu\"}, {\"authorId\": \"115257215\", \"name\": \"F. Alvarez\"}, {\"authorId\": \"145492050\", \"name\": \"L. Jin\"}, {\"authorId\": \"144707698\", \"name\": \"S. Deng\"}, {\"authorId\": \"2084948361\", \"name\": \"G. Mitchell\"}, {\"authorId\": \"8301027\", \"name\": \"D. Pan\"}, {\"authorId\": \"3165263\", \"name\": \"Mingzhou Li\"}, {\"authorId\": \"2115691129\", \"name\": \"J. Wu\"}], \"abstract\": \"Genetic variants in the asialoglycoprotein receptor 1 (ASGR1) are associated with a reduced risk of cardiovascular disease (CVD) in humans. However, the underlying molecular mechanism remains elusive. Given the cardiovascular similarities between pigs and humans, we generated ASGR1-deficient pigs using the CRISPR/Cas9 system. These pigs show age-dependent low levels of non-HDL-C under standard diet. When received an atherogenic diet for 6 months, ASGR1-deficient pigs show lower levels of non-HDL-C and less atherosclerotic lesions than that of controls. Furthermore, by analysis of hepatic transcriptome and in vivo cholesterol metabolism, we show that ASGR1 deficiency reduces hepatic de novo cholesterol synthesis by downregulating 3-hydroxy-3-methylglutaryl-CoA reductase (HMGCR), and increases cholesterol clearance by upregulating the hepatic low-density lipoprotein receptor (LDLR), which together contribute to the low levels of non-HDL-C. Despite the cardioprotective effect, we unexpectedly observed mild to moderate hepatic injury in ASGR1-deficient pigs, which has not been documented in humans with ASGR1 variants. Thus, targeting ASGR1 might be an effective strategy to reduce hypercholesterolemia and atherosclerosis, whereas further clinical evidence is required to assess its hepatic impact.\"}, {\"paperId\": \"03e0b881113d2cbed20a8ea64402c2b361806773\", \"externalIds\": {\"DOI\": \"10.1101/2023.10.09.561573\", \"CorpusId\": 264145153, \"PubMed\": \"38354755\"}, \"title\": \"Generation of CRISPR-edited birch Plants without DNA integration using Agrobacterium-mediated Transformation Technology\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/10/11/2023.10.09.561573.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.10.09.561573?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.10.09.561573, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2258942454\", \"name\": \"Shilin Sun\"}, {\"authorId\": \"2258949723\", \"name\": \"Xue Han\"}, {\"authorId\": \"2258705975\", \"name\": \"Ruoxuan Jin\"}, {\"authorId\": \"2308340999\", \"name\": \"J. Jiao\"}, {\"authorId\": \"2239061578\", \"name\": \"Jingwen Wang\"}, {\"authorId\": \"2316326738\", \"name\": \"Siyuan Niu\"}, {\"authorId\": \"2244586279\", \"name\": \"Ziyao Yang\"}, {\"authorId\": \"2258935017\", \"name\": \"Di Wu\"}, {\"authorId\": \"2155349081\", \"name\": \"Yucheng Wang\"}], \"abstract\": \"CRISPR/Cas9 system has emerged as a powerful tool in genome editing; however, generation of CRISPR-edited DNA-free plants is still challenging. In this study, Betula platyphylla (birch) was used to build a method to generate CRISPR-edited plant without foreign DNA integration using Agrobacterium-mediated transformation (CPDAT method). This technique utilizes transient genetic transformation to introduce T-DNA coding gRNA and Cas9 into birch cells, and T-DNA will express to synthesize gRNA and Cas9 protein, which will form a complex to cleave the target DNA site. The genome may be mutated due to DNA repair, and these mutations will be preserved and accumulated not dependent on whether T-DNA is integrated into the genome or not. After transient transformation, birch plants were cut into explants to induce adventitious buds without antibiotic selection pressure. Each adventitious bud can be considered as an independent potentially CRISPR-edited line for mutation detection. CRISPR-edited birch plants without foreign DNA integration are further selected by screening CRISPR-edited lines without T-DNA integration. Among 65 randomly chosen independent lines, the mutation rate was 80.00% including 40.00% of lines with both alleles mutated. In addition, 5 lines out of 65 studied lines (7.69%) were CRISPR-edited birch plants without DNA integration. In conclusion, this innovative method presents a novel strategy for generating CRISPR-edited birch plants, thereby significantly enhancing the efficiency of generating common CRISPR-edited plants. These findings offer considerable potential to develop plant genome editing techniques further.\"}, {\"paperId\": \"03e133991a72e35cd1b2e11c3d9e8c4466d54c5d\", \"externalIds\": {\"DOI\": \"10.1007/s10695-022-01049-5\", \"CorpusId\": 254501950, \"PubMed\": \"35039994\"}, \"title\": \"Neuron navigator 3 (NAV3) is required for heart development in zebrafish\", \"venue\": \"Fish Physiology & Biochemistry\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.researchsquare.com/article/rs-1094321/latest.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10695-022-01049-5?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10695-022-01049-5, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2194727290\", \"name\": \"Feng Lv\"}, {\"authorId\": \"2146682804\", \"name\": \"Xiaojuan Ge\"}, {\"authorId\": \"2066135545\", \"name\": \"Peipei Qian\"}, {\"authorId\": \"2030029468\", \"name\": \"Xiaofeng Lu\"}, {\"authorId\": \"145041709\", \"name\": \"Dong Liu\"}, {\"authorId\": \"2118430451\", \"name\": \"Changsheng Chen\"}], \"abstract\": \"As a tightly controlled biological process, cardiogenesis requires the specification and migration of a suite of cell types to form a particular three-dimensional configuration of the heart. Many genetic factors are involved in the formation and maturation of the heart, and any genetic mutations may result in severe cardiac failures. The neuron navigator (NAV) family consists of three vertebrate homologs (NAV1, NAV2, and NAV3) of the neural guidance molecule uncoordinated-53 (UNC-53) in Caenorhabditis elegans. Although they are recognized as neural regulators, their expressions are also detected in many organs, including the heart, kidney, and liver. However, the functions of NAVs, regardless of neural guidance, remain largely unexplored. In our study, we found that nav3 gene was expressed in the cardiac region of zebrafish embryos from 24 to 48 h post-fertilization (hpf) by means of in situ hybridization (ISH) assay. A CRISPR/Cas9-based genome editing method was utilized to delete the nav3 gene in zebrafish and loss of function of Nav3 resulted in a severe deficiency in its cardiac morphology and structure. The similar phenotypic defects of the knockout mutants could recur by nav3 morpholino injection and be rescued by nav3 mRNA injection. Dual-color fluorescence imaging of ventricle and atrium markers further confirmed the disruption of the heart development in nav3-deleted mutants. Although the heart rate was not affected by the deletion of nav3, the heartbeat intensity was decreased in the mutants. All these findings indicate that Nav3 was required for cardiogenesis in developing zebrafish embryos.\"}, {\"paperId\": \"03e37b38ef2e0f06e107a424a02182de03ddec6e\", \"externalIds\": {\"PubMedCentral\": \"7833762\", \"DOI\": \"10.1080/21645698.2020.1859898\", \"CorpusId\": 231651225, \"PubMed\": \"33464960\"}, \"title\": \"Omics: The way forward to enhance abiotic stress tolerance in Brassica napus L\", \"venue\": \"GM crops & food\", \"year\": 2021, \"citationCount\": 60, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.tandfonline.com/doi/pdf/10.1080/21645698.2020.1859898?needAccess=true\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7833762, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48860813\", \"name\": \"A. Raza\"}, {\"authorId\": \"20456575\", \"name\": \"A. Razzaq\"}, {\"authorId\": \"68977276\", \"name\": \"S. Mehmood\"}, {\"authorId\": \"2069562765\", \"name\": \"M. Hussain\"}, {\"authorId\": \"1453936221\", \"name\": \"SU-JUAN Wei\"}, {\"authorId\": \"49372424\", \"name\": \"Huang He\"}, {\"authorId\": \"144709003\", \"name\": \"Q. Zaman\"}, {\"authorId\": \"9090866\", \"name\": \"Zhang Xuekun\"}, {\"authorId\": \"7720813\", \"name\": \"M. Hasanuzzaman\"}], \"abstract\": \"ABSTRACT Plant abiotic stresses negative affects growth and development, causing a massive reduction in global agricultural production. Rapeseed (Brassica napus L.) is a major oilseed crop because of its economic value and oilseed production. However, its productivity has been reduced by many environmental adversities. Therefore, it is a prime need to grow rapeseed cultivars, which can withstand numerous abiotic stresses. To understand the various molecular and cellular mechanisms underlying the abiotic stress tolerance and improvement in rapeseed, omics approaches have been extensively employed in recent years. This review summarized the recent advancement in genomics, transcriptomics, proteomics, metabolomics, and their imploration in abiotic stress regulation in rapeseed. Some persisting bottlenecks have been highlighted, demanding proper attention to fully explore the omics tools. Further, the potential prospects of the CRISPR/Cas9 system for genome editing to assist molecular breeding in developing abiotic stress-tolerant rapeseed genotypes have also been explained. In short, the combination of integrated omics, genome editing, and speed breeding can alter rapeseed production worldwide.\"}, {\"paperId\": \"03e48a0da4b2a0c1c289d0872dffde4c3e286712\", \"externalIds\": {\"MAG\": \"3002138637\", \"DOI\": \"10.1016/j.gene.2020.144371\", \"CorpusId\": 210982991, \"PubMed\": \"32001375\"}, \"title\": \"Temporal and spatial expression of zebrafish mctp genes and evaluation of frameshift alleles of mctp2b.\", \"venue\": \"Gene\", \"year\": 2020, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.gene.2020.144371?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.gene.2020.144371, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1412344212\", \"name\": \"A. E. Espino-Salda\\u00f1a\"}, {\"authorId\": \"1491194849\", \"name\": \"Karina Dur\\u00e1n-R\\u00edos\"}, {\"authorId\": \"1491210567\", \"name\": \"Eduardo Olivares-Hernandez\"}, {\"authorId\": \"1422326126\", \"name\": \"Roberto Rodri\\u0301guez-Ortiz\"}, {\"authorId\": \"1402590572\", \"name\": \"F. Arellano-Carbajal\"}, {\"authorId\": \"79301367\", \"name\": \"A. Mart\\u00ednez-Torres\"}], \"abstract\": \"MCTPs (multiple C2 domain proteins with two transmembrane regions) have been proposed as novel endoplasmic reticulum calcium sensors; however, their function remains largely unknown. Here we report the structure of the four mctp genes from zebrafish (mctp1a, mctp1b, mctp2a and mctp2b), their diversity, expression pattern during embryonic development and in adult tissue and the effect of knocking down the expression of Mctp2b by CRISPR/Cas9. The four mctp genes are expressed from early development and exhibit differential expression patterns but are found mainly in the nervous and muscular systems. Mctp2b tagged with fluorescent proteins and expressed in HEK-293 cells and neurons of the fish spinal cord localized mostly in the endoplasmic reticulum but also in lysosomes and late and recycling endosomes. Knocking down mctp2b expression impaired embryonic development, suggesting that the functional participation of this gene is relevant, at least during the early stages of development.\"}, {\"paperId\": \"03ea0be373120e88bc584bb72d8365649de3e6aa\", \"externalIds\": {\"PubMedCentral\": \"9934431\", \"DOI\": \"10.1371/journal.pone.0281767\", \"CorpusId\": 256900153, \"PubMed\": \"36795787\"}, \"title\": \"Genome editing by introduction of Cas9/sgRNA into plant cells using temperature-controlled atmospheric pressure plasma\", \"venue\": \"PLoS ONE\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0281767&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9934431, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3923539\", \"name\": \"Y. Yanagawa\"}, {\"authorId\": \"91988323\", \"name\": \"Yuma Suenaga\"}, {\"authorId\": \"2067790071\", \"name\": \"Yusuke Iijima\"}, {\"authorId\": \"3211626\", \"name\": \"M. Endo\"}, {\"authorId\": \"2206491586\", \"name\": \"Naoko Sanada\"}, {\"authorId\": \"4042750\", \"name\": \"E. Katoh\"}, {\"authorId\": \"5012320\", \"name\": \"S. Toki\"}, {\"authorId\": \"2183572326\", \"name\": \"Akitoshi Okino\"}, {\"authorId\": \"1391155592\", \"name\": \"I. Mitsuhara\"}], \"abstract\": \"Previously, we developed a technique to introduce a superfolder green fluorescent protein (sGFP) fusion protein directly into plant cells using atmospheric-pressure plasma. In this study, we attempted genome editing using CRISPR/Cas9 (clustered regularly interspaced short palindromic repeats/CRISPR associated protein 9) system using this protein introduction technique. As an experimental system to evaluate genome editing, we utilized transgenic reporter plants carrying the reporter genes L-(I-SceI)-UC and sGFP-waxy-HPT. The L-(I-SceI)-UC system allowed the detection of successful genome editing by measuring the chemiluminescent signal observed upon re-functionalization of the luciferase (LUC) gene following genome editing. Similarly, the sGFP-waxy-HPT system conferred hygromycin resistance caused by hygromycin phosphotransferase (HPT) during genome editing. CRISPR/Cas9 ribonucleoproteins targeting these reporter genes were directly introduced into rice calli or tobacco leaf pieces after treatment with N2 and/or CO2 plasma. Cultivation of the treated rice calli on a suitable medium plate produced the luminescence signal, which was not observed in the negative control. Four types of genome-edited sequences were obtained upon sequencing the reporter genes of genome-edited candidate calli. sGFP-waxy-HPT-carrying tobacco cells exhibited hygromycin resistance during genome editing. After repeated cultivation of the treated tobacco leaf pieces on a regeneration medium plate, the calli were observed with leaf pieces. A green callus that was hygromycin-resistant was harvested, and a genome-edited sequence in the tobacco reporter gene was confirmed. As direct introduction of the Cas9/sgRNA (single guide RNA) complex using plasma enables genome editing in plants without any DNA introduction, this method is expected to be optimized for many plant species and may be widely applied for plant breeding in the future.\"}, {\"paperId\": \"03ed7d632c267cb460c23cf39c1331534e9cd4c6\", \"externalIds\": {\"PubMedCentral\": \"9268588\", \"DOI\": \"10.3390/molecules27134190\", \"CorpusId\": 250201330, \"PubMed\": \"35807435\"}, \"title\": \"Phosphorylation of ERK-Dependent NF-\\u03baB Triggers NLRP3 Inflammasome Mediated by Vimentin in EV71-Infected Glioblastoma Cells\", \"venue\": \"Molecules\", \"year\": 2022, \"citationCount\": 28, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1420-3049/27/13/4190/pdf?version=1656503558\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9268588, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"26564122\", \"name\": \"Z. Gong\"}, {\"authorId\": \"2119577339\", \"name\": \"Xuefeng Gao\"}, {\"authorId\": \"50513749\", \"name\": \"Qingqing Yang\"}, {\"authorId\": \"1932154716\", \"name\": \"J. Lun\"}, {\"authorId\": \"51060685\", \"name\": \"Hansen Xiao\"}, {\"authorId\": \"2114794505\", \"name\": \"Jiayu Zhong\"}, {\"authorId\": \"49221823\", \"name\": \"H. Cao\"}], \"abstract\": \"Enterovirus 71 (EV71) is a dominant pathogenic agent that may cause severe central nervous system (CNS) diseases among infants and young children in the Asia-pacific. The inflammasome is closely implicated in EV71-induced CNS injuries through a series of signaling pathways. However, the activation pathway of NLRP3 inflammasome involved in EV71-mediated CNS injuries remains poorly defined. In the studies, EV71 infection, ERK1/2 phosphorylation, and activation of NLRP3 are abolished in glioblastoma cells with low vimentin expression by CRISPR/Cas9-mediated knockdown. PD098059, an inhibitor of p-ERK, remarkably blocks the vimentin-mediated ERK1/2 phosphorylation in EV71-infected cells. Nuclear translocation of NF-\\u03baB p65 is dependent on p-ERK in a time-dependent manner. Moreover, NLRP3 activation and caspase-1 production are limited in EV71-infected cells upon the caffeic acid phenethyl ester (CAPE) administration, an inhibitor of NF-\\u03baB, which contributes to the inflammasome regulation. In conclusion, these results suggest that EV71-mediated NLRP3 inflammasome could be activated via the VIM-ERK-NF-\\u03baB pathway, and the treatment of the dephosphorylation of ERK and NF-\\u03baB inhibitors is beneficial to host defense in EV71-infected CNS.\"}, {\"paperId\": \"03f162f97b8223fb8a01c3ab0283dd7b1038448b\", \"externalIds\": {\"MAG\": \"3120738130\", \"DOI\": \"10.5539/JAS.V13N2P11\", \"CorpusId\": 231812943}, \"title\": \"Targeted Editing of SlMAPK6 Using CRISPR/Cas9 Technology to Promote the Development of Axillary Buds in Tomato Plants\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.5539/jas.v13n2p11\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.5539/JAS.V13N2P11?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.5539/JAS.V13N2P11, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116154183\", \"name\": \"Yunzhou Li\"}, {\"authorId\": \"2054397312\", \"name\": \"N. Yue\"}, {\"authorId\": \"2082361165\", \"name\": \"A. Basit\"}, {\"authorId\": \"2111354256\", \"name\": \"Yulong Li\"}, {\"authorId\": \"51208114\", \"name\": \"Dalong Zhang\"}, {\"authorId\": \"1472902841\", \"name\": \"L. Qin\"}, {\"authorId\": \"143614122\", \"name\": \"M. Crabbe\"}, {\"authorId\": \"2152922702\", \"name\": \"Wen Xu\"}, {\"authorId\": \"47905054\", \"name\": \"Yong Wang\"}, {\"authorId\": \"32879644\", \"name\": \"Jianmin Yan\"}], \"abstract\": \"The mitogen-activated protein kinase (MAPK) cascade signaling system has been relatively conserved throughout the evolution of eukaryotes and is involved in the regulation of growth and development and metabolism. In this study, dwarf tomato plants were used as the research material. First, the tissue-specific expression of SlMAPK6 was measured in wild-type plants by quantitative RT-PCR. The results showed that SlMAPK6 was highly expressed in the tissues of the stems, leaves and flowers but was expressed at low levels in the tissues of the roots, sepals and fruits. Second, SlMAPK6-knockout lines CRISPR-3 and CRISPR-7 were obtained by CRISPR-Cas9 technology and Agrobacterium-mediated transformation. Compared with wild-type, the mutant lines CRISPR-3 and CRISPR-7 showed significant phenotypic characteristics, such as increased numbers of axillary buds and true leaves, thickened stems, and longer leaflets. In addition, to explore the molecular mechanism by which MAPK regulates axillary bud growth, we also showed that SlMAPK6 positively regulates the strigolactone synthesis genes SlCCD7 and SlCCD8 and the gibberellin (GA) synthesis genes GA20ox3 and GA3ox1 and negatively regulates the axillary bud development-related genes Ls, BL and BRC1b/TCP8 and the GA synthesis inhibitory gene GAI. Therefore, SlMAPK6 appears to regulate the synthesis of strigolactone and GA to induce the growth and development of tomato axillary buds.\"}, {\"paperId\": \"03f52a17cd71f4d88b3ffeba27c996a10bdd8956\", \"externalIds\": {\"DOI\": \"10.1016/s1465-3249(23)00257-8\", \"CorpusId\": 258626613}, \"title\": \"Mesenchymal Stem/Stromal Cells: DEVELOPMENT OF A GMP BANKING PROCESS FOR UMBILICAL CORD MESENCHYMAL STROMAL CELLS (UC-MSCS) AND USE OF UC-MSC IN CHARACTERISATION ASSAYS, FUNCTIONAL ASSAYS AND GENE EDITING STUDIES\", \"venue\": \"Cytotherapy\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/s1465-3249(23)00257-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/s1465-3249(23)00257-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4258500\", \"name\": \"A. McCahill\"}, {\"authorId\": \"5514312\", \"name\": \"K. Hewit\"}, {\"authorId\": \"2069195056\", \"name\": \"K. Samuel\"}, {\"authorId\": \"2065992\", \"name\": \"D. Colligan\"}, {\"authorId\": \"6025057\", \"name\": \"A. Condie\"}, {\"authorId\": \"38893070\", \"name\": \"A. Thomson\"}, {\"authorId\": \"1842098\", \"name\": \"J. Mountford\"}], \"abstract\": \"Background & Aim: The pro-angiogenic, immunoregulatory and anti- inflammatory properties of MSCs are being exploited for the development of cellular therapies, including the treatment of graft versus host disease (GvHD), inflammatory bowel disease and COVID-19. SNBTS have developed a GMP process to bank umbilical cord MSCs (UC-MSCs) whereby we can reliably bank 100 vials of 10 million P2 UC-MSCs per cord. Each of these vials can be extensively expanded and stored for specific applications. The ultimate aim of the bank is for off-the-shelf clinical use, e.g., in GvHD or as an adjuvant therapy in Islet transplantations. Methods, Results & Conclusion(s): During process development, different basal media and supplements were screened for proliferation and MSC marker expression. Cells grown in promising media combinations were then tested for tri-lineage differentiation (identity), their chemokine/cytokine expression and T-cell inhibition (function) assessed. Medium selected for further GMP development and scale up was ultimately determined by all round performance and regulatory compliance. GMP-like UC-MSCs were shown to have immune-modulatory activity in T-cell proliferation assays at 4:1 or 16:1 ratios. Co-culture of UC-MSCs and freshly isolated leukocytes, +/- the immune activating agent LPS, show a dose dependent survival effect on leukocytes. In particular, neutrophils, which are normally very short lived in vitro demonstrated increased viability when co-cultured with UCMSCs. The survival effect was partially reproduced when UC-MSC were replaced with conditioned medium or cell lysate indicating the involvement of soluble factors. This improved neutrophil survival also correlates with results from leukocyte migration studies that demonstrate neutrophils to be the main cell type attracted to MSCs in in vitro and in vivo. Genetic modification of UC-MSC may improve their therapeutic potential. We have tested gene editing by CRISPR/Cas9 technology in primary UC-MSCS. The CXCL8 gene, highly expressed in UC-MSC, was targeted in isolates from several different donors with editing efficiencies of 78-96% observed. This translated to significant knockdown of CXCL8 protein levels in resting cells, however after stimulation levels of CXCL8 were found to be very similar in edited and non-edited UC-MSCs. This observation requires further study, but overall the results show the potential to generate future banks of primary UC-MSCS with genetically enhanced pro-angiogenic, immunoregulatory and/or anti-inflammatory activities.Copyright \\u00a9 2023 International Society for Cell & Gene Therapy\"}, {\"paperId\": \"03f7546fdb30cd0c0acffd6d6f3909071aa31acc\", \"externalIds\": {\"DOI\": \"10.1134/S1021443724604713\", \"CorpusId\": 274223331}, \"title\": \"Effect of Partial Knockout of the Plastid Starch Phosphorylase Gene NtPHO1-L1 on the Metabolism of Carbohydrates and Carotenoids in Nicotiana tabacum L. Leaves\", \"venue\": \"Russian journal of plant physiology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1134/S1021443724604713?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1134/S1021443724604713, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2119596832\", \"name\": \"A. V. Nezhdanova\"}, {\"authorId\": \"2266766915\", \"name\": \"A. V. Kulakova\"}, {\"authorId\": \"6378933\", \"name\": \"M. A. Slugina\"}, {\"authorId\": \"2078894001\", \"name\": \"A. Kamionskaya\"}, {\"authorId\": \"6871148\", \"name\": \"E. Kochieva\"}, {\"authorId\": \"3770935\", \"name\": \"A. Shchennikova\"}], \"abstract\": null}, {\"paperId\": \"03f7741385577059e88c1127b83834a9aa5fa1e2\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2023.103256\", \"CorpusId\": 265361331, \"PubMed\": \"38006677\"}, \"title\": \"Generation of iPSC lines with SLC16A2:G401R or SLC16A2 knock out.\", \"venue\": \"Stem Cell Research\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2023.103256\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2023.103256?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2023.103256, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2268305621\", \"name\": \"Katarzyna A. Ludwik\"}, {\"authorId\": \"2267496240\", \"name\": \"Robert Opitz\"}, {\"authorId\": \"14535920\", \"name\": \"Sabine Jyrch\"}, {\"authorId\": \"2267499321\", \"name\": \"Matthias Megges\"}, {\"authorId\": \"2185263498\", \"name\": \"January Weiner\"}, {\"authorId\": \"2329844466\", \"name\": \"D. Beule\"}, {\"authorId\": \"2267495988\", \"name\": \"Peter K\\u00fchnen\"}, {\"authorId\": \"2267792954\", \"name\": \"Harald Stachelscheid\"}], \"abstract\": \"The X-linked Allan-Herndon-Dudley syndrome (AHDS) is characterized by severely impaired psychomotor development and is caused by mutations in the SLC16A2 gene encoding the thyroid hormone transporter MCT8 (monocarboxylate transporter 8). By targeting exon 3 of SLC16A2 using CRISPR/Cas9 with single-stranded oligodeoxynucleotides as homology-directed repair templates, we introduced the AHDS patient missense variant G401R and a novel knock-out deletion variant (F400Sfs*17) into the male healthy donor hiPSC line BIHi001-B. We successfully generated cerebral organoids from these genome-edited lines, demonstrating the utility of the novel lines for modelling the effects of MCT8-deficency on human neurodevelopment.\"}, {\"paperId\": \"03fab93f6c8d2a243fcffc5ab196eb524e72ba50\", \"externalIds\": {\"DOI\": \"10.2217/nnm-2021-0038\", \"CorpusId\": 236173777, \"PubMed\": \"34291668\"}, \"title\": \"Synthesis and characterization of vitamin D3-functionalized carbon dots for CRISPR/Cas9 delivery.\", \"venue\": \"Nanomedicine\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2217/nnm-2021-0038?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2217/nnm-2021-0038, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2066405563\", \"name\": \"A. Hasanzadeh\"}, {\"authorId\": \"21214771\", \"name\": \"Fatemeh Radmanesh\"}, {\"authorId\": \"145614853\", \"name\": \"Elaheh Sadat Hosseini\"}, {\"authorId\": \"2044705688\", \"name\": \"Iman Hashemzadeh\"}, {\"authorId\": \"46272932\", \"name\": \"J. Kiani\"}, {\"authorId\": \"13398255\", \"name\": \"Marzieh Naseri\"}, {\"authorId\": \"2003314787\", \"name\": \"H. Nourizadeh\"}, {\"authorId\": \"12034619\", \"name\": \"Yousef Fatahi\"}, {\"authorId\": \"2120282682\", \"name\": \"Behjat Kheiri Yeghaneh Azar\"}, {\"authorId\": \"2120278790\", \"name\": \"Behnaz Golnari Marani\"}, {\"authorId\": \"7961651\", \"name\": \"A. Beyzavi\"}, {\"authorId\": \"7243909\", \"name\": \"V. Mahabadi\"}, {\"authorId\": \"49838579\", \"name\": \"M. Karimi\"}], \"abstract\": \"Aim: To develop a novel nanovector for the delivery of genetic fragments\\u00a0and CRISPR/Cas9 systems in particular. Materials & methods: Vitamin D3-functionalized carbon dots (D/CDs) fabricated using one-step microwave-aided methods were characterized by different microscopic and spectroscopic techniques. The 3-(4,5-dimethyl-2-thiazolyl)-2,5-diphenyl tetrazolium bromide assay and flow cytometry were employed to determine the cell viability and transfection efficiency. Results: D/CDs transfected CRISPR plasmid in various cell lines with high efficiency while maintaining their remarkable efficacy at high serum concentration and low plasmid doses. They also showed great potential for the green fluorescent protein disruption by delivering two different types of CRISPR/Cas9 systems. Conclusion: Given their high efficiency and safety, D/CDs provide a versatile gene-delivery vector for clinical applications.\"}, {\"paperId\": \"03fd6b1e8fb345b0832c9493c074b859d20b8d9d\", \"externalIds\": {\"PubMedCentral\": \"8456208\", \"DOI\": \"10.1002/advs.202101281\", \"CorpusId\": 236091285, \"PubMed\": \"34278746\"}, \"title\": \"Reduced Acrolein Detoxification in akr1a1a Zebrafish Mutants Causes Impaired Insulin Receptor Signaling and Microvascular Alterations\", \"venue\": \"Advancement of science\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/advs.202101281\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8456208, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14802941\", \"name\": \"Haozhe Qi\"}, {\"authorId\": \"13618370\", \"name\": \"F. Schm\\u00f6hl\"}, {\"authorId\": \"47057227\", \"name\": \"Xiaogang Li\"}, {\"authorId\": \"1476399344\", \"name\": \"Xin-yu Qian\"}, {\"authorId\": \"146437941\", \"name\": \"Christoph T. Tabler\"}, {\"authorId\": \"6467011\", \"name\": \"Katrin Bennewitz\"}, {\"authorId\": \"1751573\", \"name\": \"C. Sticht\"}, {\"authorId\": \"47521568\", \"name\": \"Jakob Morgenstern\"}, {\"authorId\": \"145324711\", \"name\": \"T. Fleming\"}, {\"authorId\": \"32519001\", \"name\": \"Nadine Volk\"}, {\"authorId\": \"3737299\", \"name\": \"I. Hausser\"}, {\"authorId\": \"48852417\", \"name\": \"Elena Heidenreich\"}, {\"authorId\": \"144889859\", \"name\": \"R. Hell\"}, {\"authorId\": \"6691996\", \"name\": \"P. Nawroth\"}, {\"authorId\": \"49173462\", \"name\": \"J. Kroll\"}], \"abstract\": \"Increased acrolein (ACR), a toxic metabolite derived from energy consumption, is associated with diabetes and its complications. However, the molecular mechanisms are mostly unknown, and a suitable animal model with internal increased ACR does not exist for in vivo studying so far. Several enzyme systems are responsible for acrolein detoxification, such as Aldehyde Dehydrogenase (ALDH), Aldo\\u2010Keto Reductase (AKR), and Glutathione S\\u2010Transferase (GST). To evaluate the function of ACR in glucose homeostasis and diabetes, akr1a1a\\u2212/\\u2212 zebrafish mutants are generated using CRISPR/Cas9 technology. Accumulated endogenous acrolein is confirmed in akr1a1a\\u2212/\\u2212 larvae and livers of adults. Moreover, a series of experiments are performed regarding organic alterations, the glucose homeostasis, transcriptome, and metabolomics in Tg(fli1:EGFP) zebrafish. Akr1a1a\\u2212/\\u2212 larvae display impaired glucose homeostasis and angiogenic retina hyaloid vasculature, which are caused by reduced acrolein detoxification ability and increased internal ACR concentration. The effects of acrolein on hyaloid vasculature can be reversed by acrolein\\u2010scavenger l\\u2010carnosine treatment. In adult akr1a1a\\u2212/\\u2212 mutants, impaired glucose tolerance accompanied by angiogenic retina vessels and glomerular basement membrane thickening, consistent with an early pathological appearance in diabetic retinopathy and nephropathy, are observed. Thus, the data strongly suggest impaired ACR detoxification and elevated ACR concentration as biomarkers and inducers for diabetes and diabetic complications.\"}, {\"paperId\": \"03ff2702f9245ce0e82029a7de5a47485f3ac49d\", \"externalIds\": {\"DOI\": \"10.54254/2753-8818/2024.la18232\", \"CorpusId\": 274737903}, \"title\": \"Protection of Cells through Renalase (RNLS) and CRISPR/Cas9 as a Potential Therapeutic Approach in Diabetes\", \"venue\": \"Theoretical and Natural Science\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.54254/2753-8818/2024.la18232?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.54254/2753-8818/2024.la18232, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48483918\", \"name\": \"Yutong Hu\"}], \"abstract\": \"Type 1 diabetes mellitus (T1DM) is a metabolic disease caused by the destruction of pancreatic cells, with various complications. RNLS (Renalase) is a protein expressed in the kidneys and is strongly associated with complications of cardiovascular disease and other diseases. Multiple studies have proved the association between RNLS and T1DM, showing that RNLS plays an important role in the protection of pancreas islet cells. RNKS can reduce damage caused by immune attacks and oxidative stress and regulate energy metabolism. Current studies used gene-editing techniques, such as CRISPR/Cas9, as a potential therapeutic approach for T1DM through targeting multiple genes. Researchers also used in vivo CRISPR screen and identified the role of RNLS in cells. However, future research is required to provide evidence of whether and how targeting RNLS with gene editing tools can restore cell function, aiming to provide novel therapeutic approaches and personalized clinical applications for heterogeneous T1DM patients.\"}, {\"paperId\": \"04002f7e4c722dce3d8c59133bb3472a6bfc9d28\", \"externalIds\": {\"PubMedCentral\": \"8538122\", \"DOI\": \"10.3390/v13102076\", \"CorpusId\": 239617145, \"PubMed\": \"34696506\"}, \"title\": \"Viral Glycoproteins Induce NLRP3 Inflammasome Activation and Pyroptosis in Macrophages\", \"venue\": \"Viruses\", \"year\": 2021, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1999-4915/13/10/2076/pdf?version=1634541213\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8538122, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112828091\", \"name\": \"Hannah S Eisfeld\"}, {\"authorId\": \"153229959\", \"name\": \"A. Simonis\"}, {\"authorId\": \"46955556\", \"name\": \"S. Winter\"}, {\"authorId\": \"2113217565\", \"name\": \"Jason Chhen\"}, {\"authorId\": \"5167454\", \"name\": \"Luisa J. Str\\u00f6h\"}, {\"authorId\": \"2247602\", \"name\": \"T. Krey\"}, {\"authorId\": \"46849687\", \"name\": \"M. Koch\"}, {\"authorId\": \"40133886\", \"name\": \"Sebastian J. Theobald\"}, {\"authorId\": \"5775372\", \"name\": \"J. Rybniker\"}], \"abstract\": \"Infections with viral pathogens are widespread and can cause a variety of different diseases. In-depth knowledge about viral triggers initiating an immune response is necessary to decipher viral pathogenesis. Inflammasomes, as part of the innate immune system, can be activated by viral pathogens. However, viral structural components responsible for inflammasome activation remain largely unknown. Here we analyzed glycoproteins derived from SARS-CoV-1/2, HCMV and HCV, required for viral entry and fusion, as potential triggers of NLRP3 inflammasome activation and pyroptosis in THP-1 macrophages. All tested glycoproteins were able to potently induce NLRP3 inflammasome activation, indicated by ASC-SPECK formation and secretion of cleaved IL-1\\u03b2. Lytic cell death via gasdermin D (GSDMD), pore formation, and pyroptosis are required for IL-1\\u03b2 release. As a hallmark of pyroptosis, we were able to detect cleavage of GSDMD and, correspondingly, cell death in THP-1 macrophages. CRISPR-Cas9 knockout of NLRP3 and GSDMD in THP-1 macrophages confirmed and strongly support the evidence that viral glycoproteins can act as innate immunity triggers. With our study, we decipher key mechanisms of viral pathogenesis by showing that viral glycoproteins potently induce innate immune responses. These insights could be beneficial in vaccine development and provide new impulses for the investigation of vaccine-induced innate immunity.\"}, {\"paperId\": \"040c3f751bc86f4e4fb3eb84cab2deaea5f051bd\", \"externalIds\": {\"PubMedCentral\": \"11384716\", \"DOI\": \"10.1186/s12951-024-02746-4\", \"CorpusId\": 272551912, \"PubMed\": \"39256765\"}, \"title\": \"Non-viral approaches in CAR-NK cell engineering: connecting natural killer cell biology and gene delivery\", \"venue\": \"Journal of Nanobiotechnology\", \"year\": 2024, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1186/s12951-024-02746-4\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11384716, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13026974\", \"name\": \"E. McErlean\"}, {\"authorId\": \"2320491500\", \"name\": \"Helen O. McCarthy\"}], \"abstract\": \"Natural Killer (NK) cells are exciting candidates for cancer immunotherapy with potent innate cytotoxicity and distinct advantages over T cells for Chimeric Antigen Receptor (CAR) therapy. Concerns regarding the safety, cost, and scalability of viral vectors has ignited research into non-viral alternatives for gene delivery. This review comprehensively analyses recent advancements and challenges with non-viral genetic modification of NK cells for allogeneic CAR-NK therapies. Non-viral alternatives including electroporation and multifunctional nanoparticles are interrogated with respect to CAR expression and translational responses. Crucially, the link between NK cell biology and design of drug delivery technologies are made, which is essential for development of future non-viral approaches. This review provides valuable insights into the current state of non-viral CAR-NK cell engineering, aimed at realising the full potential of NK cell-based immunotherapies. Non-viral production of \\u201coff-the-shelf\\u201d CAR-NK cells. 1. NK cells may be purified from donor blood, differentiated from stem cells or produced from immortalised cell lines in the lab. 2. NK-specific CAR design modified from CAR-T designs to include NK transmembrane domains (NKG2D, NKp44), co-stimulatory receptors (e.g., DAP10, 2B4) and NK cell receptors (NKG2D). 3. Non-viral genetic modification of NK cells can include delivery of CAR construct via DNA or mRNA, and knock-in/out of specific genes using gene editing tools (e.g., CRISPR Cas9, transposons). This requires a gene delivery method which may include electroporation, lipid and multifunctional nanoparticles and cell penetrating peptides. The resultant CAR-NK cells are then expanded in vitro and may be delivered as an \\\"off-the-shelf\\\" product to treat multiple patients.\"}, {\"paperId\": \"040d373c6b741f924ec95a4516f865562680223b\", \"externalIds\": {\"DOI\": \"10.1096/fasebj.2022.36.s1.r5731\", \"CorpusId\": 239647522, \"PubMed\": \"35557411\"}, \"title\": \"Deletion of the Transient Receptor Vanilloid\\u20101 (TRPV1) Channel in Rats Attenuates 2\\u2010Kidney\\u20101\\u2010Clip Hypertension\", \"venue\": \"The FASEB Journal\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fasebj.2022.36.s1.r5731?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fasebj.2022.36.s1.r5731, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7563896\", \"name\": \"Leon J. DeLalio\"}, {\"authorId\": \"38861080\", \"name\": \"S. Stocker\"}], \"abstract\": \"Renal denervation lowers arterial blood pressure (ABP) in both clinical populations and multiple experimental models of hypertension. This therapeutic effect is partly attributed to the removal of overactive renal sensory nerves that increase sympathetic efferent activity and ABP. Renal sensory nerves highly express TRPV1 channels, and administration of the TRPV1 agonist capsaicin increases renal sensory nerve activity. However, the extent by which TRPV1 channels directly contribute to renal nerve dependent models of hypertension has not been tested. To test this hypothesis, we generated a novel Trpv1\\u2010/\\u2010 rat using CRISPR/Cas9 and deletion of exon 3. Male and female Trpv1\\u2010/\\u2010 and wild\\u2010type littermates (8\\u201012 weeks) were instrumented with telemetry. At 2 weeks later, renovascular hypertension via renal stenosis was produced by placement of a PTFE cuff (0.16 x 0.22 inches, 1mm long) around the right renal artery. Male Trpv1\\u2010/\\u2010 and wild\\u2010type rats had no differences in baseline mean ABP (99\\u00b12 vs 98\\u00b13 mmHg, respectively; n=7\\u20109) or heart rate (390\\u00b17 vs 400\\u00b18 bpm, respectively). Renal stenosis significantly increased mean ABP in both groups; however, mean ABP was significantly lower at Day 28 in male Trpv1\\u2010/\\u2010 versus wild\\u2010type rats (125\\u00b18 vs 155\\u00b12 mmHg, respectively: P<0.01). Ganglionic blockade with chlorisondamine (2.5mg/kg, sc) at Day 28 produced a smaller fall in mean ABP of male Trpv1\\u2010/\\u2010 versus wild\\u2010type rats (\\u201053\\u00b14 vs \\u201086\\u00b13 mmHg, respectively; P<0.001). On the other hand, female Trpv1\\u2010/\\u2010 and wild\\u2010type rats had no differences in baseline mean ABP (102\\u00b12 vs 104\\u00b11 mmHg, respectively; n=6\\u20109) or heart rate (419\\u00b18 vs 410\\u00b17 bpm, respectively). Renal stenosis significantly increased mean ABP in both groups; however, there were no differences at Day 28 between female Trpv1\\u2010/\\u2010 versus wild\\u2010type rats (117\\u00b18 vs 122\\u00b16 mmHg, respectively). Moreover, the increase in mean ABP was smaller in females versus males. The ganglionic blocker chlorisondamine produced similar depressor responses in female Trpv1\\u2010/\\u2010 versus wild\\u2010type rats (\\u201064\\u00b17 vs \\u201065\\u00b17 mmHg, respectively). These findings illustrate a sex difference in renovascular hypertension in rats, but importantly indicate that Trpv1\\u2010/\\u2010 channels contribute to the established phase of renovascular hypertension in male rats.\"}, {\"paperId\": \"040e58f2787be6c70aa1383a1bdc01d22d507846\", \"externalIds\": {\"DOI\": \"10.1093/ndt/gfad063b_3769\", \"CorpusId\": 259418715}, \"title\": \"#3769 MECHANOSENSITIVE ION CHANNEL PIEZO1 MEDIATES BLOOD PRESSURE HOMEOSTASIS BY REGULATING RENIN EXPRESSION IN MICE\", \"venue\": \"Nephrology, Dialysis and Transplantation\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/ndt/article-pdf/38/Supplement_1/gfad063b_3769/50673865/gfad063b_3769.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/ndt/gfad063b_3769?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/ndt/gfad063b_3769, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2109470270\", \"name\": \"Xiaoqiang Yang\"}, {\"authorId\": \"2193528478\", \"name\": \"Le Wang\"}, {\"authorId\": \"50338070\", \"name\": \"Honghui Zeng\"}, {\"authorId\": \"2149525172\", \"name\": \"Siweier Luo\"}, {\"authorId\": \"2145942812\", \"name\": \"Yiming Zhou\"}], \"abstract\": \"\\n \\n \\n The renin-angiotensin system (RAS) plays a crucial role in the maintenance of fluid-electrolyte and blood pressure homeostasis. Renin, the step-limiting protease of the RAS, is produced, stored, and secreted by the renal juxtaglomerular (JG) cells, which are closely regulated by the blood pressure. Studies have shown that local blood flow-associated shear stress play an important role in renin expression and secretion. To date, however, the molecular identity through which JG cells respond to the blood pressure remains unclear.\\n \\n \\n \\n In this study, we determined the expression and subcellular localization of Piezo1 in JG cells by qPCR, Western blot, Immunofluorescence (IF), and multiplex immunohistochemistry. Then, a Fluo-4 AM-based calcium-imaging system was used to detect the dynamic changes of intracellular calcium in response to Piezo1 specific agonist Yoda1 and mechanical stress (MS)-induced by perfusion. Next, CRISPR/Cas9 technology was used to generate Piezo1 knockout JG cells to further confirm its contribution. Then, we used RNA-seq experiment to investigate the downstream signaling of Piezo1 in JG cells. Finally, we generated adeno-associated virus (AAV)-mediated kidney-specific Piezo1 knockdown mice to investigate the in vivo effect of Piezo1.\\n \\n \\n \\n We found that the mechanosensitive ion channel Piezo1 was co-expressed with renin in JG cells in mouse kidney slides as well as As4.1 cells, a commonly used JG cell line. Activation of Piezo1 by its agonist Yoda1 induced an intracellular calcium increase and reduced the expression of renin in these cells, while knockout of Piezo1 in JG cells abolished the effect of Yoda1. Meanwhile, fluid induced mechanical stress also led to an intracellular calcium increase and renin downregulation in wildtype but not Piezo1 knockout JG cells. Mechanistically, we demonstrated that activation of Piezo1 upregulated the Ptgs2 expression via the calcineurin-NFAT pathway and increased the production of Ptgs2 downstream molecule COX-2 and PGE2 in JG cells, which inhibited cAMP production and reduced renin expression in JG cells. In mice, we demonstrated that activation of Piezo1 significantly downregulated the blood pressure in wildtype but not kidney-specific Piezo1 knockdown mice.\\n \\n \\n \\n In summary, these results revealed that activation of Piezo1 could lead to downregulation of the renin expression in vitro and in vivo, subsequently reduction of blood pressure, highlighting its therapeutic potential as a drug target of the renin-angiotensin system.\\n\"}, {\"paperId\": \"04109b2f2be0b0b37b71de7a4b399f9f1aeca135\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-2964\", \"CorpusId\": 249736317}, \"title\": \"Abstract 2964: Chromatin silencing complex EZH2/PRC2 modulates aggressive anaplastic thyroid cancer biology\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-2964?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-2964, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"101725219\", \"name\": \"D. C. Mello\"}, {\"authorId\": \"2170632996\", \"name\": \"M. M. Cristov\\u00e3o\"}, {\"authorId\": \"31792836\", \"name\": \"K. C. Saito\"}, {\"authorId\": \"48177115\", \"name\": \"E. Kimura\"}, {\"authorId\": \"5326456\", \"name\": \"C. Fuziwara\"}], \"abstract\": \"\\n Introduction: Anaplastic thyroid cancer (ATC) is a rare and lethal undifferentiated thyroid malignancy, with rapid growth, invasion of adjacent tissues and distant metastasis (>50% of cases), leading to survival of ~ 6 months. Understanding the molecular evolution of ATC is a current challenge in thyroid cancer field that may lead to identification of new targets for treatment. In this extent, deregulation of epigenetic regulators and chromatin modifiers may contribute to ATC aggressiveness by altering chromatin state. High levels of EZH2, a component of Polycomb Repressive Complex 2 (PRC2) lead to deposition of H3K27me3 in histones, heterochromatin formation and repression of target genes expression such as tumor suppressors and differentiation genes.\\n Objective: Investigate the role of PRC2/EZH2 in ATC biology, using strategies to block EZH2 function, either pharmacologically or with CRISPR/Cas9-mediated gene editing.\\n Methods: We analyzed the expression of PRC2/EZH2, thyroid differentiation genes and EMT in human data from ATC microarray repository. In vitro, we analyzed protein levels of EZH2 in a panel of thyroid cancer cell lines using Western Blot. In order to block EZH2 function in ATC cells, we used two strategies: A) temporary blockade of EZH2 in KTC2 cells using GSK126, an allosteric inhibitor of EZH2, at 0.5 uM - 5.0 uM, for 6 days; B) permanent blockage of EZH2 using CRISPR/Cas9-induced gene editing in KTC2 cells with PX459 plasmid that contains sgRNA to target EZH2 start codon region. Gene expression of thyroid differentiation genes was evaluated by qPCR. Cell viability was evaluated by MTT assay.\\n Results: The expression of EZH2/PRC2 components is upregulated in ATC while thyroid differentiation genes, transcription factors and epithelial genes are reduced, and EMT genes are induced. EZH2 function temporary blockage with GSK126 induced thyroid differentiation with dose dependent increase in NIS, TG, TPO (8-fold at 5uM), genes related to iodine metabolism in KTC2 cells. Moreover, thyroid transcription factors NKX2-1 (7-fold at 5uM) and PAX8 (5-fold at 5uM), and the epithelial gene E-cadherin (5-fold at 5uM) are induced by GSK126 treatment. CRISPR/Cas9-mediated EZH2 gene editing efficiently reduced EZH2 protein levels, while induced a more epithelial-like cell morphology and reduced cell viability in KTC2-CRISPR-Cl5. Moreover, disruption of EZH2 gene with CRISPR/Cas9 increased TPO (6-fold), NKX2-1 (1.8-fold) and E-cadherin (4-fold) mRNAs, however did not induce NIS, TG and PAX8 as observed in GSK126 treatment.\\n Conclusion: The over-expression and over-activation of EZH2/PRC2 pathway in ATC may contribute to tumor aggressiveness by reducing thyroid cell differentiation and inducing EMT; These results indicate a potential benefit for EZH2 blockage as a neoadjuvant approach to induce differentiation and radioiodine uptake in aggressive thyroid cancer.\\n Citation Format: Diego C. Mello, Marcella M. Cristovao, Kelly C. Saito, Edna T. Kimura, Cesar Seigi Fuziwara. Chromatin silencing complex EZH2/PRC2 modulates aggressive anaplastic thyroid cancer biology [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 2964.\"}, {\"paperId\": \"0411651c24c16f6146f44d25d778eaa368038534\", \"externalIds\": {\"PubMedCentral\": \"8290325\", \"DOI\": \"10.3389/fonc.2021.651648\", \"CorpusId\": 235736630, \"PubMed\": \"34295808\"}, \"title\": \"Cucurbitacin B Inhibits Cell Proliferation by Regulating X-Inactive Specific Transcript Expression in Tongue Cancer\", \"venue\": \"Frontiers in Oncology\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fonc.2021.651648/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8290325, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1931096115\", \"name\": \"Boqiang Tao\"}, {\"authorId\": \"2111236273\", \"name\": \"Dongxu Wang\"}, {\"authorId\": \"2155665767\", \"name\": \"Shuo Yang\"}, {\"authorId\": \"2108024231\", \"name\": \"Yingkun Liu\"}, {\"authorId\": \"47987355\", \"name\": \"Han Wu\"}, {\"authorId\": \"46948106\", \"name\": \"Zhanjun Li\"}, {\"authorId\": \"2121614981\", \"name\": \"Lu Chang\"}, {\"authorId\": \"2116155103\", \"name\": \"Zhijing Yang\"}, {\"authorId\": \"2155130259\", \"name\": \"Weiwei Liu\"}], \"abstract\": \"Cucurbitacin B (CuB), a natural product, has anti-tumor effects on various cancers. In order to investigate the expression of long non-coding RNAs (lncRNA), we carried out RNA sequencing (RNA-seq) and quantitative PCR (qPCR). The data indicated that CAL27 and SCC9 tongue squamous cell carcinoma (TSCC) cells had reduced expression of X-inactive specific transcript (XIST) after CuB treatment. Moreover, our results showed increased expression of XIST in human tongue cancer. In this study, CuB treatment inhibited proliferation, migration and invasion of SCC9 cells, and induced cellular apoptosis. Interestingly, knockdown of XIST led to inhibition of cell proliferation and induced apoptosis in vitro. In addition, reduced expression of XIST suppressed cell migration and invasion. MicroRNA 29b (miR-29b) was identified as a direct target of XIST. Previous reports indicated that miR-29b regulates p53 protein. Our results suggest that increased expression of miR-29b induces cell apoptosis through p53 protein. The clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated protein 9 (CRISPR/Cas9) system validated the role of XIST knockout in tumor development in vivo. Together, these results suggest that CuB exerts significant anti-cancer activity by regulating expression of XIST via miR-29b.\"}, {\"paperId\": \"041774ced47605e07ddf950142fb192ae08c1560\", \"externalIds\": {\"MAG\": \"3088247233\", \"PubMedCentral\": \"7599677\", \"DOI\": \"10.3390/cells9102193\", \"CorpusId\": 222146628, \"PubMed\": \"33003295\"}, \"title\": \"Stem Cell-Based Disease Modeling and Cell Therapy\", \"venue\": \"Cells\", \"year\": 2020, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/9/10/2193/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7599677, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8536217\", \"name\": \"X. Bai\"}], \"abstract\": \"Stem cell science is among the fastest moving fields in biology, with many highly promising directions for translatability. To centralize and contextualize some of the latest developments, this Special Issue presents state-of-the-art research of adult stem cells, induced pluripotent stem cells (iPSCs), and embryonic stem cells as well as cancer stem cells. The studies we include describe efficient differentiation protocols of generation of chondrocytes, adipocytes, and neurons, maturation of iPSC-derived cardiomyocytes and neurons, dynamic characterization of iPSC-derived 3D cerebral organoids, CRISPR/Cas9 genome editing, and non-viral minicircle vector-based gene modification of stem cells. Different applications of stem cells in disease modeling are described as well. This volume also highlights the most recent developments and applications of stem cells in basic science research and disease treatments.\"}, {\"paperId\": \"04178c933a9df9b4e37ffb21ae7b3c03546123ee\", \"externalIds\": {\"DOI\": \"10.1161/res.131.suppl_1.ec105\", \"CorpusId\": 253538277}, \"title\": \"Abstract EC105: A Mouse Model Carrying The R502W Mutation In Cardiac Myosin Binding Protein C (cMyBP-C) Leads To Hypertrophic Myocardial Remodeling In The Absence Of  Haploinsufficiency\", \"venue\": \"Circulation Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/res.131.suppl_1.ec105?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/res.131.suppl_1.ec105, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2190897083\", \"name\": \"Laura Sen-Mart\\u00edn\"}, {\"authorId\": \"1398374138\", \"name\": \"\\u00c1ngel Fern\\u00e1ndez\\u2010Trasancos\"}, {\"authorId\": \"1402458239\", \"name\": \"Miguel A L\\u00f3pez-Unzu\"}, {\"authorId\": \"1441259128\", \"name\": \"D. S\\u00e1nchez-Ortiz\"}, {\"authorId\": \"7741181\", \"name\": \"M. Pricolo\"}, {\"authorId\": \"1398996346\", \"name\": \"J. Alegre-Cebollada\"}], \"abstract\": \"\\n Background:\\n Familial cardiomyopathies are caused by inherited genetic mutations resulting in anatomical and/or mechanical alterations that compromise cardiac function. The missense variant R502W in cardiac myosin-binding protein C (cMyBP-C) is the most frequent mutation leading to hypertrophy cardiomyopathy (HCM) in humans. Protein and mRNA levels have been proposed not to be altered by this mutation, which points towards pathomechanisms not involving cMyBP-C haploinsufficiency. To test the hypothesis that R502W variant induces HCM remodeling despite preserved cMyBP-C levels, CRISPR/Cas9-based genetic engineering was used to generate a knock-in (KI) mouse model harboring the R502W mutation in murine cMyBP-C.\\n \\n \\n Methods:\\n Histology, echocardiography and magnetic resonance imaging were employed to characterize the cardiac phenotype of KI mice. Protein and cMyBP-C mRNA levels were quantified by Western Blot and qPCR. Immunofuorescence in neonatal cardiomyocytes was used to analyze protein localization. Alteration of myosin conformations was assessed in permeabilized myofibrils using Mant-ATP pulse-chase experiments. Transcriptomic analysis was performed to confirm upregulation of hypertrophic cardiac remodeling programs.\\n \\n \\n Results:\\n We observe higher heart weight to tibia length ratio starting at 18 weeks old homozygous KI mice, which is accompanied by thicker trabeculae, altered ventricle geometry, reduced left ventricular systolic and diastolic function. Fibrosis and hypertrophy at the cardiomyocyte level were detected at 18 weeks of age. Biochemical and immunofluorescence analyses demonstrate that cMyBP-C mRNA, protein levels and localization are not altered by the mutation. Myosin conformations appear largely unaffected in homozygous KI mice.\\n \\n \\n Conclusion:\\n We propose that pathogenicity of the R502W mutation stems from mechanisms that do not involve cMyBP-C haploinsufficiency. We expect that further investigation of R502W mice will shed light on the molecular triggers of HCM caused by cMyBP-C point mutations not triggering protein haploinsufficiency.\\n\"}, {\"paperId\": \"04190af0c2393d28f1de1e5f58e87e167e544ca3\", \"externalIds\": {\"DOI\": \"10.1002/cjoc.202300662\", \"CorpusId\": 268204138}, \"title\": \"Regulating CRISPR/Cas9 Using Streptavidin\\u2010Biotin Interactions\\u2020\", \"venue\": \"Chinese journal of chemistry\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/cjoc.202300662?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/cjoc.202300662, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2289683030\", \"name\": \"Wei Shen\"}, {\"authorId\": \"2055449083\", \"name\": \"Wei Xiong\"}, {\"authorId\": \"2172608671\", \"name\": \"Qianqian Qi\"}, {\"authorId\": \"2030026077\", \"name\": \"Xingyu Liu\"}, {\"authorId\": \"2289944851\", \"name\": \"Zhongpao Xie\"}, {\"authorId\": \"2289985381\", \"name\": \"Yuanyuan Zhang\"}, {\"authorId\": \"2289666258\", \"name\": \"Jinxuan Hou\"}, {\"authorId\": \"2054046346\", \"name\": \"Tian Tian\"}, {\"authorId\": \"2289788084\", \"name\": \"Xiang Zhou\"}], \"abstract\": \"Currently, CRISPR/Cas9 technology has found widespread applications across various domains. However, the utility of CRISPR/Cas9 is encumbered by issues pertaining to its reliability and safety, primarily stemming from the uncontrolled activity of the system. Therefore, the design and development of CRISPR/Cas9 systems with controllable activity is of paramount importance. Biotin, characterized by its small molecular weight, and streptavidin, distinguished by its substantial spatial steric hindrance, can be harnessed as an ideal OFF switch (termed a \\\"bioactivity brake\\\") due to their interaction characteristics. In this work, we present a strategy that employs the streptavidin\\u2010biotin interaction as a \\\"brake system\\\" for CRISPR/Cas9, effectively allowing for the shutdown of the enzymatic activity of CRISPR/Cas9.\\n\"}, {\"paperId\": \"041d3bdfb21efa63e9add843c05844eba2d9b1e3\", \"externalIds\": {\"PubMedCentral\": \"7279260\", \"MAG\": \"3027199365\", \"DOI\": \"10.3390/ijms21103604\", \"CorpusId\": 218856478, \"PubMed\": \"32443745\"}, \"title\": \"On-Target CRISPR/Cas9 Activity Can Cause Undesigned Large Deletion in Mouse Zygotes\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 35, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/10/3604/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7279260, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144934628\", \"name\": \"Alexey Korablev\"}, {\"authorId\": \"1726020564\", \"name\": \"V. Lukyanchikova\"}, {\"authorId\": \"8134660\", \"name\": \"I. Serova\"}, {\"authorId\": \"4803459\", \"name\": \"N. Battulin\"}], \"abstract\": \"Genome engineering has been tremendously affected by the appearance of the clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated protein 9 (CRISPR/Cas9)-based approach. Initially discovered as an adaptive immune system for prokaryotes, the method has rapidly evolved over the last decade, overtaking multiple technical challenges and scientific tasks and becoming one of the most effective, reliable, and easy-to-use technologies for precise genomic manipulations. Despite its undoubtable advantages, CRISPR/Cas9 technology cannot ensure absolute accuracy and predictability of genomic editing results. One of the major concerns, especially for clinical applications, is mutations resulting from error-prone repairs of CRISPR/Cas9-induced double-strand DNA breaks. In some cases, such error-prone repairs can cause unpredicted and unplanned large genomic modifications within the CRISPR/Cas9 on-target site. Here we describe the largest, to the best of our knowledge, undesigned on-target deletion with a size of ~293 kb that occurred after the cytoplasmic injection of CRISPR/Cas9 system components into mouse zygotes and speculate about its origin. We suppose that deletion occurred as a result of the truncation of one of the ends of a double-strand break during the repair.\"}, {\"paperId\": \"041e43b70eb29da868209b92e48351e9352c13ec\", \"externalIds\": {\"PubMedCentral\": \"10670071\", \"DOI\": \"10.3390/cells12222637\", \"CorpusId\": 263776733, \"PubMed\": \"37998371\"}, \"title\": \"Engineering of Salmonella Phages into Novel Antimicrobial Tailocins\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/12/22/2637/pdf?version=1700115473\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10670071, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2244412568\", \"name\": \"C\\u00e9dric Woudstra\"}, {\"authorId\": \"2238443546\", \"name\": \"Anders N\\u00f8rgaard S\\u00f8rensen\"}, {\"authorId\": \"1401409832\", \"name\": \"L. Br\\u00f8ndsted\"}], \"abstract\": \"Due to the extensive use of antibiotics, the increase of infections caused by antibiotic resistant bacteria are now a global health concern. Phages have proven useful for treating bacterial infections and represent a promising alternative or complement to antibiotic treatment. Yet, other alternative exists, such as bacteria-produced non-replicative protein complexes that can kill their targeted bacteria by puncturing their membrane (Tailocins). To expand the repertoire of Tailocins available, we suggest a new approach transforming phages into Tailocins. Here we genetically engineered the virulent Ackermannviridae phage S117, as well as temperate phages Fels-1, -2 and Gifsy-1 and -2 targeting the food pathogen Salmonella, by deleting the portal vertex or major capsid gene using CRISPR-Cas9. We report the production of Tailocin particles from engineered virulent and temperate phages able to kill their native host. Our work represents a steppingstone to tape into the huge diversity of phages and transform them into versatile puncturing new antimicrobials.\"}, {\"paperId\": \"04239237419c08337db4e33c31fa5d1fc6b29727\", \"externalIds\": {\"DOI\": \"10.1093/ajcp/aqae129.255\", \"CorpusId\": 273386415}, \"title\": \"Pathogenesis of Klebsiella Pneumoniae Induced Proteinopathy is Amyloid Strain Dependent\", \"venue\": \"American Journal of Clinical Pathology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/ajcp/aqae129.255?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/ajcp/aqae129.255, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2326182052\", \"name\": \"S. Hanna\"}, {\"authorId\": \"2326183581\", \"name\": \"A. Morrow\"}, {\"authorId\": \"2326181795\", \"name\": \"S. Voth\"}, {\"authorId\": \"2326185623\", \"name\": \"R. Morrow\"}, {\"authorId\": \"2301128169\", \"name\": \"C. Choi\"}, {\"authorId\": \"2299459064\", \"name\": \"M. Lin\"}, {\"authorId\": \"2326183794\", \"name\": \"T. Stevens\"}, {\"authorId\": \"2299588697\", \"name\": \"J. Pittet\"}, {\"authorId\": \"2299591835\", \"name\": \"B. Wagener\"}], \"abstract\": \"\\n \\n \\n The World Health Organization has labeled Klebsiella pneumoniae (KP), a Gram-negative bacterium, as a \\u2018Critical Priority\\u2019 pathogen due to its increasing prevalence in serious conditions like pneumonia and sepsis, along with its growing resistance to multiple drugs. Infections with KP have been linked to the collapse of microtubules and the release of harmful proteins called amyloid-beta (A\\u03b2) and tau from lung endothelial cells. These infection-induced lung endothelial amyloids can spread like prions and are stable under heat.\\n \\n \\n \\n However, the mechanisms behind these effects and whether the infection-generated proteinopathy depends on tau and/or A\\u03b2 were not well understood. This study hypothesized that KP infection triggers tau dysfunction, breakdown of microtubules, increased lung barrier permeability, and the production and release of toxic amyloids. To test this, researchers used CRISPR/Cas9 technology to create lung endothelial cells without tau and/or amyloid precursor protein (APP). They confirmed gene deletion through various methods and exposed these cells, along with regular cells, to a highly virulent KP strain.\\n \\n \\n \\n The results showed that the KP strain (Kp 1-008) caused disruption of cellular structures, increased permeability, and bacterial spread within hours of infection. Supernatants containing proteins from infected cells, when applied to healthy cells, led to barrier disruption, permeability, and cell death. Interestingly, different pathologies were induced by supernatants from cells lacking tau or APP, indicating that either tau or A\\u03b2 alone could propagate damage in a strain- specific manner. The most severe damage required both tau and A\\u03b2 together.\\n \\n \\n \\n In conclusion, KP infection disturbs cellular structures, promoting barrier breakdown and bacterial dissemination. It also generates toxic tau and A\\u03b2 proteins. Either of these proteins can spread harm from cell to cell, but together, they enhance the severity and potency of the resulting lung endothelial protein damage caused by the infection. The study sheds light on the complex mechanisms of KP-related infections and their impact on cellular structures and protein pathways.\\n\"}, {\"paperId\": \"04261dfa83bb1defe87b7ee0eba36b876640192d\", \"externalIds\": {\"DOI\": \"10.1097/01.hjh.0000915692.45423.f8\", \"CorpusId\": 255601398}, \"title\": \"PS-BPB10-4: CREATION AND CHARACTERIZATION OF THE UBIQUITIN LIGASE KLHL3-S433A KNOCK-IN MICE\", \"venue\": \"Journal of Hypertension\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.lww.com/jhypertension/abstract/2023/01001/ps_bpb10_4__creation_and_characterization_of_the.721.aspx\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1097/01.hjh.0000915692.45423.f8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1097/01.hjh.0000915692.45423.f8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2105918336\", \"name\": \"Kenichi Ishizawa\"}, {\"authorId\": \"2199969806\", \"name\": \"Ken Kaseda\"}, {\"authorId\": \"47221470\", \"name\": \"O. Yamazaki\"}, {\"authorId\": \"49514314\", \"name\": \"S. Shibata\"}], \"abstract\": \"Background and aim: Kelch-like 3 (KLHL3) is a component of an E3 ubiquitin ligase complex that regulates blood pressure and electrolyte homeostasis. Mutation and inactivation of KLHL3 are known to cause hypertension and hyperkalemia mainly due to the impaired with-no-lysine (WNK) degradation and increased Na-Cl cotransporter (NCC) activity in the kidney. Previously, we have reported that angiotensin II (Shibata et al. PNAS 2014), potassium deficiency, and impaired glucose tolerance (Ishizawa et al. BBRC 2016 and JASN2019) can inactivate KLHL3 by altering phosphorylation at S433 in the Kelch-domain. We and others have also shown that decreased KLHL3 expression is also involved in the pathology of hypertension and hyperkalemia. The current study was designed to demonstrate the physiological importance of S433 in KLHL3 function in vivo in mice. Method: Using CRISPR/Cas9, S433 of KLHL3 was substituted to alanine in C57BL/6 mice (KLHL3-S433A Knock in mice: KI). Creation of KI was confirmed by DNA sequencing and RFLP analysis. Blood pressure was evaluated by telemetry, and blood gas was analyzed by iSTAT. Levels of KLHL3, WNK1/4, and NCC in the kidney were determined by Western blot analysis. Gene expression of KLHL3, WNK1 and WNK4 was evaluated by real time RT-PCR. Results: On a normal salt diet, blood pressure levels were similar between WT and KI; however, KI mice showed significant increase in response to a high salt diet compared with WT on the same diet. KI mice showed a significant increase in plasma potassium levels and a significant decrease in bicarbonate levels already at baseline, confirming that S433 in KLHL3 is also critical in regulating potassium and acid/base homeostasis. Urinalysis indicated that the increase in plasma potassium levels is mainly attributable to the decreased potassium excretion. Of interest, we found that total KLHL3 abundance was drastically reduced by Western blot analysis, which was accompanied by the increase in KS-WNK1 and WNK4 and an increase in NCC both. Real time RT-PCR showed that gene expression of Klhl3, as well as those of Wnk1 and Wnk4, was unchanged, indicating that S433A substitution promotes degradation of KLHL3, leading to hyperkalemia and increased salt sensitivity. Conclusion: The study confirmed the critical importance of S433 in KLHL3 in controlling the ubiquitin ligase function and electrolyte homeostasis in vivo. It also indicates that the modification of KLHL3-S433 influences the protein abundance without affecting gene transcription.\"}, {\"paperId\": \"0429e740a2b6e76c4f5986b6f4bb2da71ebdb23a\", \"externalIds\": {\"PubMedCentral\": \"9973265\", \"DOI\": \"10.1128/mbio.03386-22\", \"CorpusId\": 254593020, \"PubMed\": \"36625576\"}, \"title\": \"cotH Genes Are Necessary for Normal Spore Formation and Virulence in Mucor lusitanicus\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/mbio.03386-22\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9973265, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"26907258\", \"name\": \"Csilla Szebenyi\"}, {\"authorId\": \"8941700\", \"name\": \"Yiyou Gu\"}, {\"authorId\": \"4069667\", \"name\": \"Teclegiorgis Gebremariam\"}, {\"authorId\": \"3630279\", \"name\": \"S. Kocsub\\u00e9\"}, {\"authorId\": \"2196598268\", \"name\": \"S\\u00e1ndor Kiss-Vetr\\u00e1b\"}, {\"authorId\": \"1610360507\", \"name\": \"Oliv\\u00e9r J\\u00e1ger\"}, {\"authorId\": \"3928956\", \"name\": \"Roland Patai\"}, {\"authorId\": \"1859678555\", \"name\": \"Krisztina Spis\\u00e1k\"}, {\"authorId\": \"4348169\", \"name\": \"Rita Sinka\"}, {\"authorId\": \"37912751\", \"name\": \"U. Binder\"}, {\"authorId\": \"115934487\", \"name\": \"M. Homa\"}, {\"authorId\": \"2476354\", \"name\": \"C. V\\u00e1gv\\u00f6lgyi\"}, {\"authorId\": \"2687843\", \"name\": \"A. Ibrahim\"}, {\"authorId\": \"47640655\", \"name\": \"G. Nagy\"}, {\"authorId\": \"2615058\", \"name\": \"T. Papp\"}], \"abstract\": \"Current treatment options for mucormycosis are inadequate, resulting in high mortality rates, especially among immunosuppressed patients. The development of novel therapies for mucormycosis has been hampered by lack of understanding of the pathogenetic mechanisms. ABSTRACT Mucormycosis is an invasive fungal infection caused by certain members of the fungal order of Mucorales. The species most frequently identified as the etiological agents of mucormycosis belong to the genera Rhizopus, Lichtheimia, and Mucor. The frequency of systemic mucormycosis has been increasing, mainly because of increasing numbers of susceptible patients. Furthermore, Mucorales display intrinsic resistance to the majority of routinely used antifungal agents (e.g., echinocandins and short-tailed azoles), which limits the number of possible therapeutic options. All the above-mentioned issues urge the improvement of molecular identification methods and the discovery of new antifungal targets and strategies. Spore coat proteins (CotH) constitute a kinase family present in many pathogenic bacteria and fungi and participate in the spore formation in these organisms. Moreover, some of them can act as virulence factors being receptors of the human GRP78 protein during Rhizopus delemar-induced mucormycosis. We identified 17 cotH-like genes in the Mucor lusitanicus genome database. Successful disruption of five cotH genes in Mucor was performed using the CRISPR-Cas9 system. The CotH3 and CotH4 proteins play a role in adaptation to different temperatures as well as in developing the cell wall structure. We also show CotH4 protein is involved in spore wall formation by affecting the total chitin content and, thus, the composition of the spore wall. The role of CotH3 and CotH4 proteins in virulence was confirmed in two invertebrate models and a diabetic ketoacidosis (DKA) mouse model. IMPORTANCE Current treatment options for mucormycosis are inadequate, resulting in high mortality rates, especially among immunosuppressed patients. The development of novel therapies for mucormycosis has been hampered by lack of understanding of the pathogenetic mechanisms. The importance of the cell surface CotH proteins in the pathogenesis of Rhizopus-mediated mucormycosis has been recently described. However, the contribution of this family of proteins to the virulence of other mucoralean fungi and their functionality in vital processes remain undefined. Through the use of the CRISPR-Case9 gene disruption system, we demonstrate the importance of several of the CotH proteins to the virulence of Mucor lusitanicus by using three infection models. We also report on the importance of one of these proteins, CotH4, to spore wall formation by affecting chitin content. Therefore, our studies extend the importance of CotH proteins to Mucor and identify the mechanism by which one of the CotH proteins contributes to the development of a normal fungal cell wall, thereby indicating that this family of proteins can be targeted for future development of novel therapeutic strategies of mucormycosis.\"}, {\"paperId\": \"042b64ac7d0e0d7417fb21f4fc70ad90b8e52f7c\", \"externalIds\": {\"DOI\": \"10.1007/s00439-021-02313-z\", \"CorpusId\": 235809615, \"PubMed\": \"34255152\"}, \"title\": \"Bi-allelic truncating variants in CFAP206 cause male infertility in human and mouse\", \"venue\": \"Human Genetics\", \"year\": 2021, \"citationCount\": 28, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00439-021-02313-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00439-021-02313-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"31936400\", \"name\": \"Q. Shen\"}, {\"authorId\": \"3774484\", \"name\": \"G. Martinez\"}, {\"authorId\": \"1944038471\", \"name\": \"Hongbin Liu\"}, {\"authorId\": \"1412907221\", \"name\": \"J. Beurois\"}, {\"authorId\": \"49499072\", \"name\": \"Huan Wu\"}, {\"authorId\": \"1404366961\", \"name\": \"Amir Amiri-Yekta\"}, {\"authorId\": \"2155459654\", \"name\": \"Dan Liang\"}, {\"authorId\": \"90627551\", \"name\": \"Z. Kherraf\"}, {\"authorId\": \"5591481\", \"name\": \"M. Bidart\"}, {\"authorId\": \"150053861\", \"name\": \"Caroline Cazin\"}, {\"authorId\": \"16881178\", \"name\": \"T. Celse\"}, {\"authorId\": \"6024062\", \"name\": \"V. Satre\"}, {\"authorId\": \"1401232505\", \"name\": \"Nicolas Thierry-Mieg\"}, {\"authorId\": \"39116807\", \"name\": \"M. Whitfield\"}, {\"authorId\": \"39092282\", \"name\": \"A. Tour\\u00e9\"}, {\"authorId\": \"145435409\", \"name\": \"Bing Song\"}, {\"authorId\": \"17836516\", \"name\": \"Mingrong Lv\"}, {\"authorId\": \"150174804\", \"name\": \"Kuokuo Li\"}, {\"authorId\": \"2108013068\", \"name\": \"Chunyu Liu\"}, {\"authorId\": \"145377211\", \"name\": \"F. Tao\"}, {\"authorId\": \"4231473\", \"name\": \"Xiaojin He\"}, {\"authorId\": \"2158119025\", \"name\": \"Feng Zhang\"}, {\"authorId\": \"145316543\", \"name\": \"C. Arnoult\"}, {\"authorId\": \"6188084\", \"name\": \"P. Ray\"}, {\"authorId\": \"48696081\", \"name\": \"Yunxia Cao\"}, {\"authorId\": \"4809085\", \"name\": \"C. Coutton\"}], \"abstract\": null}, {\"paperId\": \"042ec790dfd9c02df36d9eac40fd41947c26e131\", \"externalIds\": {\"CorpusId\": 244683537}, \"title\": \"Research Progress and Application of Gene Editing Technology in Crop Breeding\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://pdf.hanspub.org/BR20210500000_11314139.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"120082585\", \"name\": \"Pingan Han\"}, {\"authorId\": \"2146872800\", \"name\": \"Ruifen Sun\"}, {\"authorId\": \"2156814992\", \"name\": \"Yue-yue Chang\"}, {\"authorId\": \"152412196\", \"name\": \"Kuangang Tang\"}, {\"authorId\": \"2155444561\", \"name\": \"Zhuo Wang\"}, {\"authorId\": \"50171904\", \"name\": \"Xinrong Wu\"}, {\"authorId\": \"2118899224\", \"name\": \"Xiaodong Li\"}], \"abstract\": null}, {\"paperId\": \"0430720574ac9b35e52f976445b3cb92e3ac20be\", \"externalIds\": {\"PubMedCentral\": \"8773741\", \"DOI\": \"10.3390/cells11020268\", \"CorpusId\": 245949095, \"PubMed\": \"35053384\"}, \"title\": \"Generation of a NES-mScarlet Red Fluorescent Reporter Human iPSC Line for Live Cell Imaging and Flow Cytometric Analysis and Sorting Using CRISPR-Cas9-Mediated Gene Editing\", \"venue\": \"Cells\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/11/2/268/pdf?version=1642077841\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8773741, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40620254\", \"name\": \"Parivash Nouri\"}, {\"authorId\": \"2065026354\", \"name\": \"Anja Zimmer\"}, {\"authorId\": \"2149980907\", \"name\": \"Stefanie Br\\u00fcggemann\"}, {\"authorId\": \"40425963\", \"name\": \"R. Friedrich\"}, {\"authorId\": \"145060458\", \"name\": \"Ralf K\\u00fchn\"}, {\"authorId\": \"145004901\", \"name\": \"N. Prakash\"}], \"abstract\": \"Advances in the regenerative stem cell field have propelled the generation of tissue-specific cells in the culture dish for subsequent transplantation, drug screening purposes, or the elucidation of disease mechanisms. One major obstacle is the heterogeneity of these cultures, in which the tissue-specific cells of interest usually represent only a fraction of all generated cells. Direct identification of the cells of interest and the ability to specifically isolate these cells in vitro is, thus, highly desirable for these applications. The type VI intermediate filament protein NESTIN is widely used as a marker for neural stem/progenitor cells (NSCs/NPCs) in the developing and adult central and peripheral nervous systems. Applying CRISPR-Cas9 technology, we have introduced a red fluorescent reporter (mScarlet) into the NESTIN (NES) locus of a human induced pluripotent stem cell (hiPSC) line. We describe the generation and characterization of NES-mScarlet reporter hiPSCs and demonstrate that this line is an accurate reporter of NSCs/NPCs during their directed differentiation into human midbrain dopaminergic (mDA) neurons. Furthermore, NES-mScarlet hiPSCs can be used for direct identification during live cell imaging and for flow cytometric analysis and sorting of red fluorescent NSCs/NPCs in this paradigm.\"}, {\"paperId\": \"043085dc07d09f4a9cee13d4c055a2c5275a471b\", \"externalIds\": {\"MAG\": \"3021039989\", \"DOI\": \"10.21873/anticanres.14235\", \"CorpusId\": 218504277, \"PubMed\": \"32366409\"}, \"title\": \"MALAT1 Decreases the Sensitivity of Head and Neck Squamous Cell Carcinoma Cells to Radiation and Cisplatin\", \"venue\": \"Anticancer Research\", \"year\": 2020, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ar.iiarjournals.org/content/anticanres/40/5/2645.full.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21873/anticanres.14235?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21873/anticanres.14235, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51227403\", \"name\": \"Kitsada Kangboonruang\"}, {\"authorId\": \"5256181\", \"name\": \"P. Wongtrakoongate\"}, {\"authorId\": \"7705742\", \"name\": \"Kornkamon Lertsuwan\"}, {\"authorId\": \"50171117\", \"name\": \"S. Khachonkham\"}, {\"authorId\": \"9338180\", \"name\": \"P. Changkaew\"}, {\"authorId\": \"47284674\", \"name\": \"P. Tangboonduangjit\"}, {\"authorId\": \"66952133\", \"name\": \"T. Siripoon\"}, {\"authorId\": \"7493393\", \"name\": \"N. Ngamphaiboon\"}, {\"authorId\": \"6647025\", \"name\": \"A. Chairoungdua\"}], \"abstract\": \"Background/Aim: Two-thirds of head and neck squamous cell carcinoma (HNSCC) patients present with locally advanced (LA) stages and have a poor survival rate. The aim of this study was to investigate the roles of the long non-coding RNAs MALAT1 on radiation and cisplatin sensitivity of HNSCC cells. Materials and Methods: Clonogenic, cell viability, and apoptosis assays were performed in cells following MALAT1 knockdown using CRISPR/Cas9 system. Results: MALAT1 was overexpressed in HNSCC cell lines as compared to a non-tumorigenic cell line. The number of colonies formed after radiation was significantly reduced in MALAT1 knockdown cells. The IC50 value of cisplatin in MALAT1 knockdown cells was lower than that of the control cells. MALAT1 knockdown resulted in cell cycle arrest at G2/M phase, DNA damage and apoptotic cell death. Conclusion: MALAT1 knockdown enhanced the sensitivity of HNSCC cells to radiation and cisplatin partly through the induction of G2/M cell cycle arrest resulting in DNA damage and apoptosis.\"}, {\"paperId\": \"0431ef20a685c016b5188c31fc13346689a8c94d\", \"externalIds\": {\"PubMedCentral\": \"11342673\", \"DOI\": \"10.1186/s12864-024-10703-6\", \"CorpusId\": 271941270, \"PubMed\": \"39179961\"}, \"title\": \"Knockout of the WD40 domain of ATG16L1 enhances foot and mouth disease virus replication\", \"venue\": \"BMC Genomics\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1186/s12864-024-10703-6\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11342673, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1992941100\", \"name\": \"Xiuping Wu\"}, {\"authorId\": \"2276505973\", \"name\": \"Yang Yang\"}, {\"authorId\": \"2276502376\", \"name\": \"Yi Ru\"}, {\"authorId\": \"3997410\", \"name\": \"Rongzeng Hao\"}, {\"authorId\": \"2316831305\", \"name\": \"Dongmei Zhao\"}, {\"authorId\": \"9303030\", \"name\": \"Ruifang Ren\"}, {\"authorId\": \"2190858252\", \"name\": \"Bingzhou Lu\"}, {\"authorId\": \"2110447376\", \"name\": \"Yajun Li\"}, {\"authorId\": \"2375960570\", \"name\": \"Shengzhen Sun\"}, {\"authorId\": \"2237406323\", \"name\": \"Haixue Zheng\"}, {\"authorId\": \"2316830987\", \"name\": \"Wenhui Wang\"}], \"abstract\": \"The WD40 domain is one of the most abundant domains and is among the top interacting domains in eukaryotic genomes. The WD40 domain of ATG16L1 is essential for LC3 recruitment to endolysosomal membranes during non-canonical autophagy, but dispensable for canonical autophagy. Canonical autophagy was utilized by FMDV, while the relationship between FMDV and non-canonical autophagy is still elusive. In the present study, WD40 knockout (KO) PK15 cells were successfully generated via CRISPR/cas9 technology as a tool for studying the effect of non-canonical autophagy on FMDV replication. The results of growth curve analysis, morphological observation and karyotype analysis showed that the WD40 knockout cell line was stable in terms of growth and morphological characteristics. After infection with FMDV, the expression of viral protein, viral titers, and the number of copies of viral RNA in the WD40-KO cells were significantly greater than those in the wild-type PK15 cells. Moreover, RNA\\u2012seq technology was used to sequence WD40-KO cells and wild-type cells infected or uninfected with FMDV. Differentially expressed factors such as Mx1, RSAD2, IFIT1, IRF9, IFITM3, GBP1, CXCL8, CCL5, TNFRSF17 were significantly enriched in the autophagy, NOD-like receptor signaling pathway, RIG-I-like receptor signaling pathway, Toll-like receptor signaling pathway, cytokine-cytokine receptor interaction and TNF signaling pathway, etc. The expression levels of differentially expressed genes were detected via qRT\\u2012PCR, which was consistent with the RNA\\u2012seq data. Here, we experimentally demonstrate for the first time that knockout of the WD40 domain of ATG16L1 enhances FMDV replication by downregulation innate immune factors. In addition, this result also indicates non-canonical autophagy inhibits FMDV replication. In total, our results play an essential role in regulating the replication level of FMDV and providing new insights into virus\\u2013host interactions and potential antiviral strategies. FMDV is a pathogen that causes highly contagious animal disease worldwide. The WD40 domain of ATG16L1 is necessary for non-canonical autophagy, while dispensable for canonical autophagy. Thus, the WD40 knockout PK15 cell line established by present study could use as a tool to research the impact of non-canonical autophagy on FMDV replication. The results showed that knockout of the WD40 domain of ATG16L1 in PK15 cells could enhance FMDV replication. The results also showed that differentially expressed innate immune factors, such as Mx1, IFIT1, RSAD2, and IRF9, were significantly enriched in the interferon signaling pathway. Our research also indicates non-canonical autophagy inhibits FMDV replication by innate immune, which helps to elucidate the role of the non-canonical autophagy in the host antiviral strategies.\"}, {\"paperId\": \"0432a83311ebacf5abdb446bfd21c9c23f4dc35e\", \"externalIds\": {\"MAG\": \"3039676929\", \"DOI\": \"10.1016/j.bbrc.2020.05.172\", \"CorpusId\": 220731726, \"PubMed\": \"32703430\"}, \"title\": \"Transcriptomic and cellular analyses of CRISPR/Cas9-mediated edition of FASN show inhibition of aggressive characteristics in breast cancer cells.\", \"venue\": \"Biochemical and Biophysical Research Communications - BBRC\", \"year\": 2020, \"citationCount\": 22, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bbrc.2020.05.172?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bbrc.2020.05.172, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1830700306\", \"name\": \"Fernando Gonzalez-Salinas\"}, {\"authorId\": \"47480787\", \"name\": \"R. Rojo\"}, {\"authorId\": \"1830722893\", \"name\": \"Claudia Martinez-Amador\"}, {\"authorId\": \"1441216455\", \"name\": \"Jessica Herrera-Gamboa\"}, {\"authorId\": \"2002690\", \"name\": \"V. Trevi\\u00f1o\"}], \"abstract\": \"Several genes are significantly mutated in breast cancer but only a small percentage of mutations are well-known to contribute to cancer development. FASN is involved in de novo lipogenesis and the regulation of ER\\u03b1 signaling. However, the effect of genetic mutations affecting FASN in breast cancer has not thoroughly studied. Therefore, we used the CRISPR/Cas9 system to edit the FASN locus in MCF-7\\u00a0cells and evaluated its biological effect. We obtained four clones carrying mutations and frameshifts in the acyl-transferase domain of FASN. We found that clones had reduced proliferation, migration, viability, and showed alterations in cell cycle profiles. RNA-Seq analysis demonstrates that a lack of fully functional FASN may have a more significant role in proliferation-related genes than in lipid metabolism. We conclude that functional knockouts in FASN contributes to decrease the proliferation and migration of breast cancer cells contrary to point mutations in breast cancer patients.\"}, {\"paperId\": \"04384aefe0ec35ead0e3806478ef0b9a82792df0\", \"externalIds\": {\"PubMedCentral\": \"10509300\", \"DOI\": \"10.1016/j.isci.2023.107828\", \"CorpusId\": 261546794, \"PubMed\": \"37736051\"}, \"title\": \"A heterozygous ZP2 mutation causes zona pellucida defects and female infertility in mouse and human\", \"venue\": \"iScience\", \"year\": 2023, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.isci.2023.107828\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10509300, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1998306143\", \"name\": \"Saiji Liu\"}, {\"authorId\": \"2405107737\", \"name\": \"Haihong Zuo\"}, {\"authorId\": \"47705804\", \"name\": \"B. Zhao\"}, {\"authorId\": \"2143790501\", \"name\": \"Jiaojuan Guo\"}, {\"authorId\": \"2243363985\", \"name\": \"Wenbo Liu\"}, {\"authorId\": \"13282944\", \"name\": \"Wen-Long Lei\"}, {\"authorId\": \"2116380378\", \"name\": \"Yuan-Yuan Li\"}, {\"authorId\": \"6245123\", \"name\": \"Yingchun Ouyang\"}, {\"authorId\": \"2148893430\", \"name\": \"Yi Hou\"}, {\"authorId\": \"2237960280\", \"name\": \"Zhiming Han\"}, {\"authorId\": \"2247827270\", \"name\": \"Weizhou Wang\"}, {\"authorId\": \"2238403907\", \"name\": \"Qing-Yuan Sun\"}, {\"authorId\": \"3358271\", \"name\": \"Zhenbo Wang\"}], \"abstract\": \"Summary The zona pellucida (ZP) is an extracellular glycoprotein matrix surrounding mammalian oocytes. Recently, numerous mutations in genes encoding ZP proteins have been shown to be possibly related to oocyte abnormality and female infertility; few reports have confirmed the functions of these mutations in living animal models. Here, we identified a novel heterozygous missense mutation (NM_001376231.1:c.1616C>T, p.Thr539Met) in ZP2 from a primary infertile female. We showed that the mutation reduced ZP2 expression and impeded ZP2 secretion in cell lines. Furthermore, we constructed the mouse model with the mutation (Zp2T541M) using CRISPR-Cas9. Zp2WT/T541M female mice had normal fertility though generated oocytes with the thin ZP, whereas Zp2T541M female mice were completely infertile due to degeneration of oocytes without ZP. Additionally, ZP deletion impaired folliculogenesis and caused female infertility in Zp2T541M mice. Our study not only expands the spectrum of ZP2 mutation sites but also, more importantly, increases the understanding of pathogenic mechanisms of ZP2 mutations.\"}, {\"paperId\": \"04397381f460f8603a05bd28aa1bb12d6713da9f\", \"externalIds\": {\"PubMedCentral\": \"11011116\", \"DOI\": \"10.3390/cells13070562\", \"CorpusId\": 268658936, \"PubMed\": \"38607001\"}, \"title\": \"Agonist-Induced Ca2+ Signaling in HEK-293-Derived Cells Expressing a Single IP3 Receptor Isoform\", \"venue\": \"Cells\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/13/7/562/pdf?version=1711116308\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11011116, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"91349095\", \"name\": \"E. N. Kochkina\"}, {\"authorId\": \"2221210154\", \"name\": \"E. Kopylova\"}, {\"authorId\": \"6559268\", \"name\": \"O. Rogachevskaja\"}, {\"authorId\": \"2112677088\", \"name\": \"N. Kovalenko\"}, {\"authorId\": \"2293106340\", \"name\": \"N. V. Kabanova\"}, {\"authorId\": \"3677633\", \"name\": \"P. D. Kotova\"}, {\"authorId\": \"6843488\", \"name\": \"M. Bystrova\"}, {\"authorId\": \"2280154816\", \"name\": \"Stanislav S. Kolesnikov\"}], \"abstract\": \"In mammals, three genes encode IP3 receptors (IP3Rs), which are involved in agonist-induced Ca2+ signaling in cells of apparently all types. Using the CRISPR/Cas9 approach for disruption of two out of three IP3R genes in HEK-293 cells, we generated three monoclonal cell lines, IP3R1-HEK, IP3R2-HEK, and IP3R3-HEK, with the single functional isoform, IP3R1, IP3R2, and IP3R3, respectively. All engineered cells responded to ACh with Ca2+ transients in an \\u201call-or-nothing\\u201d manner, suggesting that each IP3R isotype was capable of mediating CICR. The sensitivity of cells to ACh strongly correlated with the affinity of IP3 binding to an IP3R isoform they expressed. Based on a mathematical model of intracellular Ca2+ signals induced by thapsigargin, a SERCA inhibitor, we developed an approach for estimating relative Ca2+ permeability of Ca2+ store and showed that all three IP3R isoforms contributed to Ca2+ leakage from ER. The relative Ca2+ permeabilities of Ca2+ stores in IP3R1-HEK, IP3R2-HEK, and IP3R3-HEK cells were evaluated as 1:1.75:0.45. Using the genetically encoded sensor R-CEPIA1er for monitoring Ca2+ signals in ER, engineered cells were ranged by resting levels of stored Ca2+ as IP3R3-HEK \\u2265 IP3R1-HEK > IP3R2-HEK. The developed cell lines could be helpful for further assaying activity, regulation, and pharmacology of individual IP3R isoforms.\"}, {\"paperId\": \"043f211defbd6cb8fa69c027eea47411c4d2e01e\", \"externalIds\": {\"DOI\": \"10.1182/blood-2023-188635\", \"CorpusId\": 265575876}, \"title\": \"Kdm6a Modulates Hematopoiesis and Leukemogenesis Via Demethylase-Dependent Epigenetic Programming\", \"venue\": \"Blood\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2023-188635\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2023-188635?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2023-188635, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2249499288\", \"name\": \"Huiqiao Chen\"}, {\"authorId\": \"2244140019\", \"name\": \"He Huang\"}, {\"authorId\": \"6004299\", \"name\": \"Haowen Xiao\"}], \"abstract\": \"\\n Hematopoietic stem and progenitor cells (HSPCs) maintain their differentiation by precisely regulating gene expression patterns at the transcriptional and epigenetic levels. KDM6A encodes an epigenetic regulator of the repressive chromatin mark histone 3 lysine 27 tri-methylation (H3K27me3). Growing evidence suggested the involvement of KDM6A in hematological malignancies. KDM6A mutations in leukemia frequently occur in males, reflecting that KDM6A escapes X chromosome inactivation. Therefore, female patients with single-allele loss-of-function KDM6A mutations will partially retain KDM6A expression, which is called haploinsufficiency. Furthermore, KDM6A haploinsufficiency was reported to be associated with refractory and/or relapsed leukemia, while the role of KDM6A haploinsufficiency in hematopoiesis remains unexplored.\\n We established kdm6a-null zebrafish using CRISPR-Cas9 gene editing. We found that kdm6a loss impaired HSPCs formation. kdm6a-null embryos showed reduced expression of the hemogenic endothelial and HSPC markers runx1 at 28 hours post-fertilization (hpf). Using Tg(kdrl:mCherry;cmyb:en-GFP) embryos, we also found that the number of hemogenic endothelium and emerging HSPCs in kdm6a-null was significantly decreased. To study the importance of Kdm6a-mediated demethylase activity, we ectopically expressed kdm6a constructs (wild-type kdm6a, or catalytically-dead kdm6a) in kdm6a-null embryos. The result showed that, unlike restoring effect by wild-type kdm6a, the ectopic expression of catalytically-dead kdm6a constructs ( kdm6a H1134A) showed no rescue effect for decreased HSPC numbers.\\n Then, we aimed to understand the potential role of kdm6a haploinsufficiency in hematopoiesis and leukemogenic mechanisms. We found that zebrafish mutants that are haploinsufficient in kdm6a ( kdm6a +/-) exhibited uncontrolled myeloid di\\ufb00erentiation. The expression of myeloid-specific markers substantially increased in kdm6a +/- mutants, compared with WT siblings at 72 hpf. Confocal analysis showed that the ratio of myeloid-primed HSPCs was markedly increased in kdm6a +/- embryos compared to WT siblings. Consistently, a significant upregulation in transcripts encoding key myeloerythorid TFs including cebps, irf8 and gata1a was observed in kdm6a +/- embryonic HSPCs. Furthermore, kdm6a +/- adults exhibited the phenotype of monocytosis, which mimics chronic myelomonocytic leukemia, or exhibited the phenotype of increased progenitors, which mimics acute myeloid leukemia.\\n We next sorted HSPCs from WT or kdm6a +/- at 72 hpf for RNA-sequencing and ATAC-sequencing. Enrichment analysis showed transcriptional dysregulation of genes involving \\u201cPurine metabolism\\u201d, \\u201cCysteine and methionine metabolism\\u201d, \\u201cTGF-beta signaling pathway\\u201d, and \\u201cCell cycle\\u201d. GSEA further uncovered positive enrichment of gene sets in kdm6a +/- embryonic HSPCs, including \\u201cOxidative phosphorylation\\u201d, \\u201cmTORC1 signaling\\u201d and \\u201cDNA repair\\u201d. These dysregulated pathways in kdm6a +/- HSPCs are highly involved in cellular homeostasis and hallmarks of aged hematopoietic system. ATAC analysis also revealed robust changes in chromatin accessibility, especially including genes related to aged hematopoietic system. Integrated RNA-seq and ATAC-seq analyses showed that the chromatin accessibility at promoters and transcription of 63 genes were decreased in kdm6a +/- HSPCs. And we found that the negative regulator of Jak-Stat signaling- socs3a was on the list. Ectopic expression of socs3a in kdm6a +/- could partially rescue the uncontrolled myeloid di\\ufb00erentiation of HSPCs. Consistently, abnormal myeloid di\\ufb00erentiation from kdm6a +/- mutations was rescued by Jak or Stat3 inhibitors. We also tested the importance of Kdm6a-mediated demethylase activity. Unlike restoring effect by wild-type kdm6a, the ectopic expression of catalytically-dead kdm6a constructs ( kdm6a H1134A) showed no rescue effect for dysregulated expression of socs3a and key myeloerythorid genes including cebps.\\n In conclusion, our data demonstrate the multiple roles of kdm6a in regulating HSPC homeostasis and provide new insight into the mechanism of kdm6a haploinsufficiency in uncontrolled myeloid di\\ufb00erentiation through demethylase-dependent epigenetic programming.\"}, {\"paperId\": \"04405f5e1d658b2da1c7795f907086afd0dba103\", \"externalIds\": {\"DOI\": \"10.1128/jvi.01749-23\", \"CorpusId\": 266842228, \"PubMed\": \"38189249\"}, \"title\": \"N-terminal acetyltransferase 6 facilitates enterovirus 71 replication by regulating PI4KB expression and replication organelle biogenesis\", \"venue\": \"Journal of Virology\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10878262\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1128/jvi.01749-23?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1128/jvi.01749-23, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144228700\", \"name\": \"Hang Yang\"}, {\"authorId\": \"2072650670\", \"name\": \"Tingting Fan\"}, {\"authorId\": \"2278405876\", \"name\": \"Meng Xun\"}, {\"authorId\": \"2278401322\", \"name\": \"Bo Wu\"}, {\"authorId\": \"2155249943\", \"name\": \"Shangrui Guo\"}, {\"authorId\": \"2278472023\", \"name\": \"Xinyu Li\"}, {\"authorId\": \"2108811476\", \"name\": \"Xiaohui Zhao\"}, {\"authorId\": \"2164753400\", \"name\": \"Haoyan Yao\"}, {\"authorId\": \"2108970841\", \"name\": \"Hongliang Wang\"}], \"abstract\": \"ABSTRACT Enterovirus 71 (EV71) is one of the major pathogens causing hand, foot, and mouth disease in children under 5 years old, which can result in severe neurological complications and even death. Due to limited treatments for EV71 infection, the identification of novel host factors and elucidation of mechanisms involved will help to counter this viral infection. N-terminal acetyltransferase 6 (NAT6) was identified as an essential host factor for EV71 infection with genome-wide CRISPR/Cas9 screening. NAT6 facilitates EV71 viral replication depending on its acetyltransferase activity but has little effect on viral release. In addition, NAT6 is also required for Echovirus 7 and coxsackievirus B5 infection, suggesting it might be a pan-enterovirus host factor. We further demonstrated that NAT6 is required for Golgi integrity and viral replication organelle (RO) biogenesis. NAT6 knockout significantly inhibited phosphatidylinositol 4-kinase III\\u03b2 (PI4KB) expression and PI4P production, both of which are key host factors for enterovirus infection and RO biogenesis. Further mechanism studies confirmed that NAT6 formed a complex with its substrate actin and one of the PI4KB recruiters\\u2014acyl-coenzyme A binding domain containing 3 (ACBD3). Through modulating actin dynamics, NAT6 maintained the integrity of the Golgi and the stability of ACBD3, thereby enhancing EV71 infection. Collectively, these results uncovered a novel mechanism of N-acetyltransferase supporting EV71 infection. IMPORTANCE Enterovirus 71 (EV71) is an important pathogen for children under the age of five, and currently, no effective treatment is available. Elucidating the mechanism of novel host factors supporting viral infection will reveal potential antiviral targets and aid antiviral development. Here, we demonstrated that a novel N-acetyltransferase, NAT6, is an essential host factor for EV71 replication. NAT6 could promote viral replication organelle (RO) formation to enhance viral replication. The formation of enterovirus ROs requires numerous host factors, including acyl-coenzyme A binding domain containing 3 (ACBD3) and phosphatidylinositol 4-kinase III\\u03b2 (PI4KB). NAT6 could stabilize the PI4KB recruiter, ACBD3, by inhibiting the autophagy degradation pathway. This study provides a fresh insight into the relationship between N-acetyltransferase and viral infection. Enterovirus 71 (EV71) is an important pathogen for children under the age of five, and currently, no effective treatment is available. Elucidating the mechanism of novel host factors supporting viral infection will reveal potential antiviral targets and aid antiviral development. Here, we demonstrated that a novel N-acetyltransferase, NAT6, is an essential host factor for EV71 replication. NAT6 could promote viral replication organelle (RO) formation to enhance viral replication. The formation of enterovirus ROs requires numerous host factors, including acyl-coenzyme A binding domain containing 3 (ACBD3) and phosphatidylinositol 4-kinase III\\u03b2 (PI4KB). NAT6 could stabilize the PI4KB recruiter, ACBD3, by inhibiting the autophagy degradation pathway. This study provides a fresh insight into the relationship between N-acetyltransferase and viral infection.\"}, {\"paperId\": \"04452705af081c7773c79946a3f5ed0eaa82c6be\", \"externalIds\": {\"MAG\": \"3036520293\", \"DOI\": \"10.1007/s12274-020-2864-z\", \"CorpusId\": 219730994}, \"title\": \"Light-responsive charge-reversal nanovector for high-efficiency in vivo CRISPR/Cas9 gene editing with controllable location and time\", \"venue\": \"Nano Reseach\", \"year\": 2020, \"citationCount\": 36, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12274-020-2864-z?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12274-020-2864-z, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48608080\", \"name\": \"Yun-xia Wu\"}, {\"authorId\": \"51041507\", \"name\": \"Judun Zheng\"}, {\"authorId\": \"2114309330\", \"name\": \"Qin Zeng\"}, {\"authorId\": \"2146341655\", \"name\": \"Tao Zhang\"}, {\"authorId\": \"144795830\", \"name\": \"D. Xing\"}], \"abstract\": null}, {\"paperId\": \"044674896759587fbdce19e14d297a60beefc015\", \"externalIds\": {\"DOI\": \"10.1101/2021.12.08.471839\", \"CorpusId\": 252680385}, \"title\": \"Assessing single-component gene drive systems in the mosquito Aedes aegypti via single generation crosses and modeling\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.12.08.471839\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2021.12.08.471839?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2021.12.08.471839, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2105795391\", \"name\": \"William Reid\"}, {\"authorId\": \"2110032697\", \"name\": \"Adeline E. Williams\"}, {\"authorId\": \"1398713080\", \"name\": \"I. S\\u00e1nchez-Vargas\"}, {\"authorId\": \"49719938\", \"name\": \"Jingyi Lin\"}, {\"authorId\": \"2144478362\", \"name\": \"Rucsanda Juncu\"}, {\"authorId\": \"4426409\", \"name\": \"K. Olson\"}, {\"authorId\": \"32889613\", \"name\": \"A. Franz\"}], \"abstract\": \"The yellow fever mosquito Aedes aegypti is a major vector of arthropod-borne viruses, including dengue, chikungunya, and Zika. A novel approach to mitigate arboviral infections is to generate mosquitoes refractory to infection by overexpressing antiviral effector molecules. Such an approach requires a mechanism to spread these antiviral effectors through a population, for example, by using CRISPR/Cas9-based gene drive (GD) systems. Critical to the design of a single-locus autonomous GD is that the selected genomic locus be amenable to both GD and appropriate expression of the antiviral effector. In our study, we used reverse engineering to target two intergenic genomic loci, which had previously shown to be highly permissive for antiviral effector gene expression, and we further investigated the use of three promoters (nanos, \\u03b22-tubulin, or zpg) for Cas9 expression. We then quantified the accrual of insertions or deletions (indels) after single generation crossings, measured maternal effects, and assessed fitness costs associated with the various transgenic lines to model the rate of GD fixation. Overall, MGDrivE modeling suggested that when an autonomous GD is placed into an intergenic locus, the GD system will eventually be blocked by the accrual of GD blocking resistance alleles and ultimately be lost in the population. Moreover, while genomic locus and promoter selection were critically important for the initial establishment of the autonomous GD, it was the fitness of the GD line that most strongly influenced the persistence of the GD in the simulated population. As such, we propose that when autonomous CRISPR/Cas9 based GD systems are anchored in an intergenic locus, they temporarily result in a strong population replacement effect, but as GD-blocking indels accrue, the GD becomes exhausted due to the fixation of CRISPR resistance alleles. Significance statement For the purpose of population replacement, CRISPR/Cas9 based gene drives (GD) have been developed in Anopheles spp. and split GDs have been developed in Ae. aegypti. In our study, we developed autonomous GD in Ae. aegypti and positioned the drives in intergenic loci ideal for the expression of antiviral effector genes. Our results suggest that when the GD is placed into an intergenic locus, there is rapid introgression of the GD resulting in a transient population replacement followed by loss of the drive as resistance alleles accrue. Fitness of the transgenic lines and maternal deposition of CRISPR/Cas9 components were the major contributing factors affecting the perseverance of the GD in our population models.\"}, {\"paperId\": \"044902e31b0baafbbe56c8f3a2547aae84e1500d\", \"externalIds\": {\"DOI\": \"10.47348/saipl/v10/a2\", \"CorpusId\": 256754071}, \"title\": \"The quest to use CRISPR technology in tackling the South African tuberculosis epidemic: Examining how the crispr patent and licensing regime may impact access to CRISPR-related tuberculosis therapies\", \"venue\": \"South African Intellectual Property Law Journal\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.47348/saipl/v10/a2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.47348/saipl/v10/a2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"134792626\", \"name\": \"T. Kamwendo\"}], \"abstract\": \"Tuberculosis (TB) continues to be the top killer disease in South Africa; there is little hope of a very efficient treatment in the near future. It is therefore becoming increasingly clear that the long-term solution to TB requires more than simply adding to the current arsenal of TB drugs. A treatment that provides quicker and long-lasting results is needed. Public health innovations such as genome editing present a promising therapeutic paradigm shift in terms of TB immunisation or treatment. The diversity of the Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)-Cas9 genome-editing technology holds promise in its ability to alter the genome and to control gene expression. While the promotion of CRISPR research is a crucial public health intervention, the realm of patent laws clashes with promoting public health needs, which may delay the speedy use of this technology for disease treatment. For that reason, in this article, I discuss the South African CRISPR patent landscape and its impact on the proposed applications of genome editing technology in public health. I explore the complexities raised by the CRISPR patent landscape and how that may lead to high prices for these CRISPR therapies \\u2013 thereby limiting patients\\u2019 access. I conclude by proposing recommendations on how we can efficiently bridge the disconnect between the existing CRISPR patents and access to CRISPR therapeutics as a public health benefit.\"}, {\"paperId\": \"04499741ee7d9df4178985f4980475f67e8819f2\", \"externalIds\": {\"PubMedCentral\": \"10321715\", \"DOI\": \"10.3389/fnmol.2023.1140785\", \"CorpusId\": 259205919, \"PubMed\": \"37415832\"}, \"title\": \"Visualizing Arc protein dynamics and localization in the mammalian brain using AAV-mediated in situ gene labeling\", \"venue\": \"Frontiers in Molecular Neuroscience\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fnmol.2023.1140785/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10321715, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5490401\", \"name\": \"Martino Avallone\"}, {\"authorId\": \"47117583\", \"name\": \"Joaqu\\u00edn Pardo\"}, {\"authorId\": \"2150965475\", \"name\": \"T. F. Mergiya\"}, {\"authorId\": \"2242869348\", \"name\": \"Jana R\\u00e1jov\\u00e1\"}, {\"authorId\": \"2220310380\", \"name\": \"Atte R\\u00e4s\\u00e4nen\"}, {\"authorId\": \"2034265371\", \"name\": \"M. Davidsson\"}, {\"authorId\": \"2220307774\", \"name\": \"Malin \\u00c5kerblom\"}, {\"authorId\": \"2092362538\", \"name\": \"Luis Quintino\"}, {\"authorId\": \"2314597988\", \"name\": \"Darshan Kumar\"}, {\"authorId\": \"3521302\", \"name\": \"C. Bramham\"}, {\"authorId\": \"1745729\", \"name\": \"T. Bj\\u00f6rklund\"}], \"abstract\": \"The activity-regulated cytoskeleton-associated (Arc) protein is essential for synaptic plasticity and memory formation. The Arc gene, which contains remnants of a structural GAG retrotransposon sequence, produces a protein that self-assembles into capsid-like structures harboring Arc mRNA. Arc capsids, released from neurons, have been proposed as a novel intercellular mechanism for mRNA transmission. Nevertheless, evidence for intercellular transport of Arc in the mammalian brain is still lacking. To enable the tracking of Arc molecules from individual neurons in vivo, we devised an adeno-associated virus (AAV) mediated approach to tag the N-terminal of the mouse Arc protein with a fluorescent reporter using CRISPR/Cas9 homologous independent targeted integration (HITI). We show that a sequence coding for mCherry can successfully be knocked in at the 5\\u2032 end of the Arc open reading frame. While nine spCas9 gene editing sites surround the Arc start codon, the accuracy of the editing was highly sequence-dependent, with only a single target resulting in an in-frame reporter integration. When inducing long-term potentiation (LTP) in the hippocampus, we observed an increase of Arc protein highly correlated with an increase in fluorescent intensity and the number of mCherry-positive cells. By proximity ligation assay (PLA), we demonstrated that the mCherry-Arc fusion protein retains the Arc function by interacting with the transmembrane protein stargazin in postsynaptic spines. Finally, we recorded mCherry-Arc interaction with presynaptic protein Bassoon in mCherry-negative surrounding neurons at close proximity to mCherry-positive spines of edited neurons. This is the first study to provide support for inter-neuronal in vivo transfer of Arc in the mammalian brain.\"}, {\"paperId\": \"04499825467423fd347ce22da9ede22d6f01af03\", \"externalIds\": {\"MAG\": \"3139361077\", \"DOI\": \"10.1007/s11105-021-01286-7\", \"CorpusId\": 233713026}, \"title\": \"Genome Editing: Revolutionizing the Crop Improvement\", \"venue\": \"Plant Molecular Biology Reporter\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s11105-021-01286-7?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s11105-021-01286-7, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5138995\", \"name\": \"Satyajit Saurabh\"}], \"abstract\": null}, {\"paperId\": \"044c0ed97e5e6b224a5cda5f0931e588d1b6943d\", \"externalIds\": {\"PubMedCentral\": \"9037586\", \"DOI\": \"10.3389/fgeed.2022.825236\", \"CorpusId\": 247454336, \"PubMed\": \"35481279\"}, \"title\": \"Predictable NHEJ Insertion and Assessment of HDR Editing Strategies in Plants\", \"venue\": \"Frontiers in Genome Editing\", \"year\": 2022, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgeed.2022.825236/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9037586, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3798770\", \"name\": \"K. Molla\"}, {\"authorId\": \"2048733615\", \"name\": \"J. Shih\"}, {\"authorId\": \"46529641\", \"name\": \"Matthew S. Wheatley\"}, {\"authorId\": \"2118771366\", \"name\": \"Yinong Yang\"}], \"abstract\": \"Canonical CRISPR-Cas9 genome editing technique has profoundly impacted the fields of plant biology, biotechnology, and crop improvement. Since non-homologous end joining (NHEJ) is usually considered to generate random indels, its high efficiency mutation is generally not pertinent to precise editing. Homology-directed repair (HDR) can mediate precise editing with supplied donor DNA, but it suffers from extreme low efficiency in higher plants. Therefore, precision editing in plants will be facilitated by the ability to predict NHEJ repair outcome and to improve HDR efficiency. Here, we report that NHEJ-mediated single nucleotide insertion at different rice genes is predictable based on DNA sequences at the target loci. Three mutation prediction tools (inDelphi, FORECasT, and SPROUT) have been validated in the rice plant system. We also evaluated the chimeric guide RNA (cgRNA) and Cas9-Retron precISe Parallel Editing via homologY (CRISPEY) strategies to facilitate donor template supply for improving HDR efficiency in Nicotiana benthamiana and rice. However, neither cgRNA nor CRISPEY improved plant HDR editing efficiency in this study. Interestingly, our data indicate that tethering of 200\\u2013250 nucleotides long sequence to either 5\\u2032 or 3\\u2032 ends of guide RNA did not significantly affect Cas9 cleavage activity.\"}, {\"paperId\": \"04520c448bb0755c398785ff005cf5043cb9730d\", \"externalIds\": {\"PubMedCentral\": \"9403905\", \"DOI\": \"10.1016/j.omtn.2022.08.005\", \"CorpusId\": 251357286, \"PubMed\": \"36090759\"}, \"title\": \"CRISPR-Cas9-directed gene tagging using a single integrase-defective lentiviral vector carrying a transposase-based Cas9 off switch\", \"venue\": \"Molecular Therapy: Nucleic Acids\", \"year\": 2022, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2162253122002013/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9403905, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34208196\", \"name\": \"E. A. Thomsen\"}, {\"authorId\": \"4038005\", \"name\": \"K. A. Skipper\"}, {\"authorId\": \"46558415\", \"name\": \"Sofie Andersen\"}, {\"authorId\": \"11245920\", \"name\": \"Didde Haslund\"}, {\"authorId\": \"2180588704\", \"name\": \"Thomas Wisbech Skov\"}, {\"authorId\": \"6362218\", \"name\": \"J. Mikkelsen\"}], \"abstract\": \"Locus-directed DNA cleavage induced by the CRISPR-Cas9 system triggers DNA repair mechanisms allowing gene repair or targeted insertion of foreign DNA. For gene insertion to be successful, availability of a homologous donor template needs to be timed with cleavage of the DNA by the Cas9 endonuclease guided by a target-specific single guide RNA (sgRNA). We present a novel approach for targeted gene insertion based on a single integrase-defective lentiviral vector (IDLV) carrying a Cas9 off switch. Gene insertion using this approach benefits from transposon-based stable Cas9 expression, which is switched off by excision-only transposase protein co-delivered in IDLV particles carrying a combined sgRNA/donor vector. This one-vector approach supports potent (up to >80%) knockin of a full-length EGFP gene sequence. This traceless cell engineering method benefits from high stable levels of Cas9, timed intracellular availability of the molecular tools, and a built-in feature to turn off Cas9 expression after DNA cleavage. The simple technique is based on transduction with a single IDLV, which holds the capacity to transfer larger donor templates, allowing robust gene knockin or tagging of genes in a single step.\"}, {\"paperId\": \"0453337dc77c1e5f42f0289aaeb8dc9100508fd7\", \"externalIds\": {\"DOI\": \"10.2174/0929867328666210526144654\", \"CorpusId\": 235216323, \"PubMed\": \"34042028\"}, \"title\": \"Enzyme Replacement Therapy for Genetic Disorders Associated with Enzyme Deficiency.\", \"venue\": \"Current Medicinal Chemistry\", \"year\": 2021, \"citationCount\": 29, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2174/0929867328666210526144654?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2174/0929867328666210526144654, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"29708898\", \"name\": \"Marialaura Marchetti\"}, {\"authorId\": \"5063072\", \"name\": \"S. Faggiano\"}, {\"authorId\": \"2059469\", \"name\": \"A. Mozzarelli\"}], \"abstract\": \"Mutations in human genes might lead to loss of functional proteins, causing diseases. Among these genetic disorders, a large class is associated with the deficiency in metabolic enzymes, resulting in both an increase in the concentration of substrates and a loss in the metabolites produced by the catalyzed reactions. The identification of therapeutic actions based on small molecules represents a challenge to medicinal chemists because the target is missing. Alternative approaches are biology-based, ranging from gene and stem cell therapy, CRISPR/Cas9 technology, distinct types of RNAs, and enzyme replacement therapy (ERT). This review will focus on the latter approach that since the 1990s has been successfully applied to cure many rare diseases, most of them being lysosomal storage diseases or metabolic diseases. So far, a dozen enzymes have been approved by FDA/EMA for lysosome storage disorders and only a few for metabolic diseases. Enzymes for replacement therapy are mainly produced in mammalian cells and some in plant cells and yeasts and are further processed to obtain active, highly bioavailable, less degradable products. Issues still under investigation for the increase in ERT efficacy are the optimization of enzymes interaction with cell membrane and internalization, the reduction in immunogenicity, and the overcoming of blood-brain barrier limitations when neuronal cells need to be targeted. Overall, ERT has demonstrated its efficacy and safety in the treatment of many genetic rare diseases, both saving newborn lives and improving patients' life quality, and represents a very successful example of targeted biologics.\"}, {\"paperId\": \"04538911c3997f33e87f4952bca605162a850ec7\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-420\", \"CorpusId\": 249735981}, \"title\": \"Abstract 420: Combination of the MCL1 inhibitor PRT1419 and SMARCA2 degrader PRT3789 shows combinatorial benefit in SMARCA4 deleted lung cancer\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-420?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-420, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2336489761\", \"name\": \"Norman Fultang\"}, {\"authorId\": \"6526124\", \"name\": \"Neha Bhagwat\"}, {\"authorId\": \"2070695444\", \"name\": \"D. Heiser\"}, {\"authorId\": \"151499670\", \"name\": \"Alexander Grego\"}, {\"authorId\": \"47140877\", \"name\": \"M. Hulse\"}, {\"authorId\": \"2721379\", \"name\": \"V. Thodima\"}, {\"authorId\": \"2111362071\", \"name\": \"Koichi Ito\"}, {\"authorId\": \"6028651\", \"name\": \"K. Vaddi\"}, {\"authorId\": \"2061303602\", \"name\": \"Bruce R Ruggeri\"}, {\"authorId\": \"4959297\", \"name\": \"P. Scherle\"}], \"abstract\": \"\\n MCL1 is a member of the anti-apoptotic BCL2 family of proteins and plays a critical role in maintaining cellular homeostasis and promoting cell survival. MCL1 amplifications occur frequently in multiple tumor types. It has also been implicated in mediating resistance to chemotherapeutic agents and targeted therapies. We have previously described a novel, potent and orally bioavailable MCL1 inhibitor, PRT1419, that demonstrates anti-tumor efficacy in various preclinical models of cancer and is currently under evaluation in a Phase I clinical trial in patients with relapsed/refractory hematologic malignancies and advanced solid tumors. In an effort to identify novel biomarkers that might predict sensitivity to MCL1 inhibition, we conducted a gene dependency analysis using publicly available human cancer cell line data generated from genome-wide CRISPR/Cas9-mediated cell viability screens. We observed that mutations in the SWI/SNF complex, particularly in lung and ovarian cancer cell lines, conferred a strong functional dependency on MCL1. The mammalian SWI/SNF complex functions as a tumor suppressor in a number of cancers and regulates gene expression via chromatin-remodeling. It is comprised of multiple subunits, including one of two catalytic ATPases (SMARCA2 or SMARAC4), DNA-binding proteins ARID1A, ARID1B and ARID2, and other chromatin-binding subunits. Gene mutations in members of this complex occur in >20% of human cancers, and therapeutic agents targeting its function are under active clinical investigation. We and others have shown potent synthetic lethality with the use of SMARCA2 targeted protein degraders in SMARCA4 deleted lung cancer models. A previously published genome-wide CRISPR screen in SMARCA4-mut lung cancer cell lines demonstrated that loss of MCL1 could sensitize these cells to SMARCA2 degradation. Therefore, we evaluated PRT1419 in combination with a novel and selective SMARCA2 degrader, PRT3789, in SMARCA4 deleted lung cancer models. We observed a potent synergistic interaction in SMARCA4 deleted cell lines in vitro, whereas no additive benefit was seen in SMARCA4 WT lines. Further, combining PRT1419 and PRT3789 in vivo in cell line-derived xenograft models resulted in significant tumor growth inhibition, including tumor regressions. Additionally, we profiled PRT1419 ex vivo in a panel of lung cancer PDX models and observed significant, dose-dependent effects on cell viability in SMARCA4 deleted models with low SMARCA2 expression. In a broader lung cancer cell line viability screen conducted with PRT1419, we observed that the presence of multiple, co-occurring alterations in SWI/SNF family members such as SMARCA4, ARID1A/B mutations and loss of SMARCA2 protein were associated with sensitivity to PRT1419. Based on these findings, preclinical evaluation of PRT1419 in other tumor types with recurrent SWI/SNF mutations is ongoing.\\n Citation Format: Norman Fultang, Neha Bhagwat, Diane Heiser, Alexander Grego, Michael Hulse, Venkat Thodima, Koichi Ito, Kris Vaddi, Bruce Ruggeri, Peggy Scherle. Combination of the MCL1 inhibitor PRT1419 and SMARCA2 degrader PRT3789 shows combinatorial benefit in SMARCA4 deleted lung cancer [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 420.\"}, {\"paperId\": \"04541a8a048bc6d278ec9a88e068258c4eb1ce94\", \"externalIds\": {\"PubMedCentral\": \"7483440\", \"MAG\": \"3083849197\", \"DOI\": \"10.1038/s41598-020-71972-1\", \"CorpusId\": 221614096, \"PubMed\": \"32913300\"}, \"title\": \"Direct identification of a mutation in OsSh1 causing non-shattering in a rice (Oryza sativa L.) mutant cultivar using whole-genome resequencing\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-71972-1.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7483440, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146311280\", \"name\": \"Feng Li\"}, {\"authorId\": \"46918196\", \"name\": \"A. Komatsu\"}, {\"authorId\": \"8080988\", \"name\": \"Miki Ohtake\"}, {\"authorId\": \"28197757\", \"name\": \"H. Eun\"}, {\"authorId\": \"15327536\", \"name\": \"Akemi Shimizu\"}, {\"authorId\": \"50214807\", \"name\": \"H. Kato\"}], \"abstract\": \"Loss of seed shattering has been regarded as a key step during crop domestication. Mutagenesis contributes to the development of novel crop cultivars with a desired seed-shattering habit in a relatively short period of time, but also to uncovering the genetic architecture of seed shattering. \\u2018Minamiyutaka\\u2019, a non-shattering indica rice cultivar, was developed from the easy-shattering cultivar \\u2018Moretsu\\u2019 by mutation breeding via gamma-ray irradiation. In present study, we observed significant differences in shattering habit, breaking tensile strength, and abscission zone structure between \\u2018Moretsu\\u2019 and \\u2018Minamiyutaka\\u2019. Whole-genome mutation analysis of \\u2018Minamiyutaka\\u2019 newly identified a 13-bp deletion causing defective splicing in exon 3 of the OsSh1 gene which has previously been referred to as a candidate for controlling seed shattering. Using CRISPR/Cas9 gene editing, we demonstrated that loss-of-function mutation in OsSh1 causes non-shattering in rice. Furthermore, gene expression analysis suggests that OsSh1 may function downstream of qSH1, a known key gene involved in abscission zone differentiation. Nucleotide diversity analysis of OsSh1 in wild rice accessions and cultivars revealed that OsSh1 has been under strong selection during rice domestication, and a missense mutation might have contributed to the reduction of seed shattering from the wild progenitors to cultivated rice.\"}, {\"paperId\": \"04576e18291fc01418205ee5928a16b7c71e89a9\", \"externalIds\": {\"PubMedCentral\": \"11222110\", \"DOI\": \"10.5187/jast.2023.e50\", \"CorpusId\": 259800977, \"PubMed\": \"38975571\"}, \"title\": \"Complete genome sequence of Latilactobacillus curvatus CACC879 and its functional probiotic properties\", \"venue\": \"Journal of Animal Science and Technology\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ejast.org/download/download_pdf?pid=jast-2023-e50\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11222110, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2118348862\", \"name\": \"Soyeon Park\"}, {\"authorId\": \"116935411\", \"name\": \"Se-Gu Son\"}, {\"authorId\": \"2149271339\", \"name\": \"Minju Park\"}, {\"authorId\": \"90093317\", \"name\": \"Dae-Hyuk Kim\"}, {\"authorId\": \"108728637\", \"name\": \"Yangseon Kim\"}], \"abstract\": \"Abstract Latilactobacillus curvatus CACC879 originated from swine feces in Korea, and its probiotic properties have been analyzed. The complete genome of strain CACC879 contained one chromosome 1,398,247 bp in length and three circular plasmids, namely, pCACC879-1 (591,981 bp), pCACC879-2 (14,542 base pairs [bp]), and pCACC879-3 (45,393 bp). The complete genome encodes a total of 2,077 genes, including 25 rRNA genes and 90 tRNA genes. In addition, probiotic stability- genes acid/bile related to salts tolerance, the biosynthesis of cobalamin (vitamin B12), riboflavin (vitamin B2), and CRISPR/Cas9 were found in the whole genomes. Remarkably, L. curvatus CACC879 contained the antioxidant-related (peroxiredoxin) and bacteriocin-related genes (lysM and blpA). Overall, these results demonstrate that L. curvatus CACC879 is a functional probiotic candidate for animal industry applications.\"}, {\"paperId\": \"0457e3db5c89456270646019bd6413619fc18e6a\", \"externalIds\": {\"PubMedCentral\": \"10192467\", \"DOI\": \"10.1007/s12672-023-00680-9\", \"CorpusId\": 258744909, \"PubMed\": \"37198417\"}, \"title\": \"Virus-like particle-based delivery of Cas9/guide RNA ribonucleoprotein efficiently edits the brachyury gene and inhibits chordoma growth in vivo\", \"venue\": \"Discover Oncology\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12672-023-00680-9.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10192467, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116111501\", \"name\": \"Yunping Hu\"}, {\"authorId\": \"4778718\", \"name\": \"B. Lu\"}, {\"authorId\": \"49152481\", \"name\": \"Zhiyong Deng\"}, {\"authorId\": \"46801196\", \"name\": \"F. Xing\"}, {\"authorId\": \"2072747457\", \"name\": \"Wesley Hsu\"}], \"abstract\": \"Purpose Chordoma is a rare and aggressive bone cancer driven by the developmental transcription factor brachyury. Efforts to target brachyury are hampered by the absence of ligand-accessible small-molecule binding pockets. Genome editing with CRISPR systems provides an unprecedented opportunity to modulate undruggable transcription factor targets. However, delivery of CRISPR remains a bottleneck for in vivo therapy development. The aim was to investigate the in vivo therapeutic efficiency of Cas9/guide RNA (gRNA) ribonucleoprotein (RNP) delivery through a novel virus-like particle (VLP) by fusing an aptamer-binding protein to the lentiviral nucleocapsid protein. Methods The p24 based ELISA and transmission electron microscopy were used to determine the characterization of engineered VLP-packaged Cas9/gRNA RNP. The deletion efficiency of brachyury gene in chordoma cells and tissues was measured by genome cleavage detection assay. RT-PCR, Western blot, immunofluorescence staining, and IHC were employed to test the function of brachyury deletion. Cell growth and tumor volume were measured to evaluate the therapeutic efficiency of brachyury deletion by VLP-packaged Cas9/gRNA RNP. Results Our \\u201call-in-one\\u201d VLP-based Cas9/gRNA RNP system allows for transient expression of Cas9 in chordoma cells, but maintains efficient editing capacity leading to approximately 85% knockdown of brachyury with subsequent inhibition of chordoma cell proliferation and tumor progression. In addition, this VLP-packaged brachyury-targeting Cas9 RNP avoids systemic toxicities in vivo. Conclusion Our preclinical studies demonstrate the potential of VLP-based Cas9/gRNA RNP gene therapy for the treatment of brachyury-dependent chordoma.\"}, {\"paperId\": \"045995376da4154f542d0426c85d77a79bb46375\", \"externalIds\": {\"MAG\": \"3160060181\", \"DOI\": \"10.25972/OPUS-20017\", \"CorpusId\": 236664189}, \"title\": \"Tissue Engineering f\\u00fcr seltene Erkrankungen mit St\\u00f6rungen des mukozili\\u00e4ren Transports\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.25972/OPUS-20017?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.25972/OPUS-20017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2103297279\", \"name\": \"N. Lodes\"}], \"abstract\": null}, {\"paperId\": \"045c35be128d4179a6aa4bf8318757445e524a35\", \"externalIds\": {\"DOI\": \"10.1016/j.biomaterials.2021.120965\", \"CorpusId\": 235493351, \"PubMed\": \"34147719\"}, \"title\": \"CRISPR activation of long non-coding RNA DANCR promotes bone regeneration.\", \"venue\": \"Biomaterials\", \"year\": 2021, \"citationCount\": 38, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.biomaterials.2021.120965?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.biomaterials.2021.120965, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1471738741\", \"name\": \"N. Nguyen\"}, {\"authorId\": \"1795742\", \"name\": \"Yu-Han Chang\"}, {\"authorId\": \"66448920\", \"name\": \"V. Truong\"}, {\"authorId\": \"15407074\", \"name\": \"Mu-Nung Hsu\"}, {\"authorId\": \"2065907194\", \"name\": \"N. N. Pham\"}, {\"authorId\": \"7673514\", \"name\": \"Chin-Wei Chang\"}, {\"authorId\": \"4068354\", \"name\": \"Yi-Hsiu Wu\"}, {\"authorId\": \"2112613137\", \"name\": \"Yi-Hao Chang\"}, {\"authorId\": \"2108637799\", \"name\": \"Hung Li\"}, {\"authorId\": \"1716833\", \"name\": \"Yu-Chen Hu\"}], \"abstract\": \"Healing of large calvarial bone defects in adults adopts intramembranous pathway and is difficult. Implantation of adipose-derived stem cells (ASC) that differentiate towards chondrogenic lineage can switch the bone repair pathway and improve calvarial bone healing. Long non-coding RNA DANCR was recently uncovered to promote chondrogenesis, but its roles in rat ASC (rASC) chondrogenesis and bone healing stimulation have yet to be explored. Here we first verified that DANCR expression promoted rASC chondrogenesis, thus we harnessed CRISPR activation (CRISPRa) technology to upregulate endogenous DANCR, stimulate rASC chondrogenesis and improve calvarial bone healing in rats. We generated 4 different dCas9-VPR orthologues by fusing a tripartite transcription activator domain VPR to catalytically dead Cas9 (dCas9) derived from 4 different bacteria, and compared the degree of activation using the 4 different dCas9-VPR. We unveiled surprisingly that the most commonly used dCas9-VPR derived from Streptococcus pyogenes barely activated DANCR. Nonetheless dCas9-VPR from Staphylococcus aureus (SadCas9-VPR) triggered efficient activation of DANCR in rASC. Delivery of SadCas9-VPR and the associated guide RNA into rASC substantially enhanced chondrogenic differentiation of rASC and augmented cartilage formation in vitro. Implantation of the engineered rASC remarkably potentiated the calvarial bone healing in rats. Furthermore, we identified that DANCR improved the rASC chondrogenesis through inhibition of miR-203a and miR-214. These results collectively proved that DANCR activation by SadCas9-VPR-based CRISPRa provides a novel therapeutic approach to improving calvarial bone healing.\"}, {\"paperId\": \"045cc436d4aa5619f1a657ed10dd41695d0ff7fc\", \"externalIds\": {\"MAG\": \"3026810451\", \"DOI\": \"10.1097/TP.0000000000003303\", \"CorpusId\": 218766079, \"PubMed\": \"32433239\"}, \"title\": \"The Role of SLAs in Xenotransplantation.\", \"venue\": \"Transplantation\", \"year\": 2020, \"citationCount\": 34, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1097/TP.0000000000003303?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1097/TP.0000000000003303, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152966528\", \"name\": \"J. Ladowski\"}, {\"authorId\": \"3771574\", \"name\": \"H. Hara\"}, {\"authorId\": \"1992982\", \"name\": \"D. Cooper\"}], \"abstract\": \"Advances in genetic engineering, particularly CRISPR/Cas9, have resulted in the development of a triple glycan-knockout (TKO) pig. There is minimal human anti-pig antibody binding to TKO pig cells. The TKO background has decreased antibody binding to a sufficiently low level that any additional xenoantigens expressed on the cells can now be more easily detected. One of these xenoantigens is the swine major histocompatibility complex (MHC), termed swine leukocyte antigens (SLA). SLA are the homolog to HLAs, a protein complex expressed on human tissue capable of stimulating the development of new antibodies in allotransplantation. These antibodies can result in graft failure through hyperacute, acute, or chronic rejection. Our knowledge of SLA, particularly in the last 5 years, has grown considerably. The presence, etiology, and methods to detect anti-SLA antibodies will need to be carefully considered for the first clinical trial of xenotransplantation. The focus of this review is to summarize the role of SLA in xenotransplantation, and consider whether it will prove to be a major barrier. Techniques are now available to mutate target SLA amino acids to ensure that cross-reactive anti-HLA antibodies no longer bind to SLA on the cells of the organ-source pigs. While deletion of SLA expression is possible, it would render the pig at risk for infectious complications. The ideal organ-source pig for HLA highly-sensitized recipients may therefore be one with site-specific mutations to eliminate cross-reactive binding.\"}, {\"paperId\": \"045ea509fd9d903106720639592dff26adbaf931\", \"externalIds\": {\"DOI\": \"10.1101/2024.12.10.627839\", \"CorpusId\": 274705385}, \"title\": \"Solution structure of the Z0 domain from transcription repressor BCL11A sheds light on the sequence properties of protein-binding zinc-fingers\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2024.12.10.627839\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.12.10.627839?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.12.10.627839, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2335189298\", \"name\": \"Rilee E. Harris\"}, {\"authorId\": \"112912571\", \"name\": \"R. Whitehead\"}, {\"authorId\": \"1870971\", \"name\": \"A. Alexandrescu\"}], \"abstract\": \"The transcription repressor BCL11A, which governs the switch from fetal to adult hemoglobin during development, is the target of the first FDA-approved CRISPR/Cas9 gene-editing therapy in humans. By targeting BCL11A, fetal hemoglobin expression is de-repressed to substitute for defective adult hemoglobin in inherited diseases including beta-thalassemia and sickle-cell anemia. BCL11A has six CCHH-type zinc-fingers of which domains 4-6 are necessary and sufficient for dsDNA binding. Here, we focus on the CCHC-type ZNF at the N-terminus of BCL11A (residues 46-72), Z0, thought to modulate oligomerization of the transcription repressor. Using NMR and CD spectroscopy, Z0 is shown to be a thermostable CCHC zinc-finger with a pM dissociation constant for zinc. The NMR structure of Z0 has a prototypical beta-beta-alpha fold, with a hydrophobic knob comprising about half the structure. The unusual proportion of hydrophobic residues in Z0 led us to investigate if this is more general in zinc-fingers that do not bind dsDNA. We used the ZF and WebLogo servers to examine sequences of zinc fingers with demonstrated DNA-binding function, non-binders, and the CCHC-type family of protein-binders. DNA-binders are distinguished by contiguous stretches of high-scoring zinc-fingers. Non-DNA-binders show a depletion of polar residues at the positions expected to contact nucleotides and increased divergence from sequence consensus making these domains more likely to be annotated as atypical, degenerate, or to be missed as zinc-fingers. We anticipate these sequence patterns will help distinguish DNA-binders from non-binders, an open problem in the functional understanding of zinc-finger motifs.\"}, {\"paperId\": \"046218006374c0154c51ca8dff016aa64b5c5241\", \"externalIds\": {\"PubMedCentral\": \"8277627\", \"DOI\": \"10.1007/s00122-021-03844-9\", \"CorpusId\": 233741900, \"PubMed\": \"33950284\"}, \"title\": \"OsCOP1 regulates embryo development and flavonoid biosynthesis in rice (Oryza sativa L.)\", \"venue\": \"Theoretical and Applied Genetics\", \"year\": 2021, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s00122-021-03844-9.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8277627, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6620782\", \"name\": \"Backki Kim\"}, {\"authorId\": \"4440574\", \"name\": \"Rihua Piao\"}, {\"authorId\": \"4871673\", \"name\": \"Gileung Lee\"}, {\"authorId\": \"2933437\", \"name\": \"Eunbyeol Koh\"}, {\"authorId\": \"6762424\", \"name\": \"Yunjoo Lee\"}, {\"authorId\": \"26330914\", \"name\": \"S. Woo\"}, {\"authorId\": \"91167360\", \"name\": \"Reflinur\"}, {\"authorId\": \"6114201\", \"name\": \"Wenzhu Jiang\"}, {\"authorId\": \"4472302\", \"name\": \"E. Septiningsih\"}, {\"authorId\": \"34856839\", \"name\": \"M. Thomson\"}, {\"authorId\": \"145700199\", \"name\": \"H. Koh\"}], \"abstract\": \"Novel mutations of OsCOP1 were identified to be responsible for yellowish pericarp and embryo lethal phenotype, which revealed that OsCOP1 plays a crucial role in flavonoid biosynthesis and embryogenesis in rice seed. Successful production of viable seeds is a major component of plant life cycles, and seed development is a complex, highly regulated process that affects characteristics such as seed viability and color. In this study, three yellowish-pericarp embryo lethal (yel) mutants, yel-hc, yel-sk, and yel-cc, were produced from three different japonica cultivars of rice (Oryza sativa L). Mutant seeds had yellowish pericarps and exhibited embryonic lethality, with significantly reduced grain size and weight. Morphological aberrations were apparent by 5 days after pollination, with abnormal embryo development and increased flavonoid accumulation observed in the yel mutants. Genetic analysis and mapping revealed that the phenotype of the three yel mutants was controlled by a single recessive gene, LOC_Os02g53140, an ortholog of Arabidopsis thaliana CONSTITUTIVE PHOTOMORPHOGENIC 1 (COP1). The yel-hc, yel-sk, and yel-cc mutants carried mutations in the RING finger, coiled-coil, and WD40 repeat domains, respectively, of OsCOP1. CRISPR/Cas9-targeted mutagenesis was used to knock out OsCOP1 by targeting its functional domains, and transgenic seed displayed the yel mutant phenotype. Overexpression of OsCOP1 in a homozygous yel-hc mutant background restored pericarp color, and the aberrant flavonoid accumulation observed in yel-hc mutant was significantly reduced in the embryo and endosperm. These results demonstrate that OsCOP1 is associated with embryo development and flavonoid biosynthesis in rice grains. This study will facilitate a better understanding of the functional roles of OsCOP1 involved in early embryogenesis and flavonoid biosynthesis in rice seeds.\"}, {\"paperId\": \"0462d7008cb040c34e0efd7c1a22b56e1ad76b77\", \"externalIds\": {\"DOI\": \"10.1007/s00122-022-04079-y\", \"CorpusId\": 247865242, \"PubMed\": \"35364697\"}, \"title\": \"A single-base insertion in BoDFR1 results in loss of anthocyanins in green-leaved ornamental kale\", \"venue\": \"Theoretical and Applied Genetics\", \"year\": 2022, \"citationCount\": 20, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00122-022-04079-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00122-022-04079-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145042545\", \"name\": \"Yuting Zhang\"}, {\"authorId\": \"1491069812\", \"name\": \"Xin Feng\"}, {\"authorId\": \"2152802642\", \"name\": \"Yang Liu\"}, {\"authorId\": \"151354360\", \"name\": \"Fuhui Zhou\"}, {\"authorId\": \"88837530\", \"name\": \"Pengfang Zhu\"}], \"abstract\": null}, {\"paperId\": \"0464ddf915cde9eef831e1c3330a49fe2b92b52b\", \"externalIds\": {\"DOI\": \"10.3760/cma.j.cn115330-20200522-00434\", \"CorpusId\": 235820950, \"PubMed\": \"34256488\"}, \"title\": \"[The function and mechanism of long non-coding RNA RP11-159K7.2 in sinonasal squamous cell carcinoma].\", \"venue\": \"Zhonghua er bi yan hou tou jing wai ke za zhi = Chinese journal of otorhinolaryngology head and neck surgery\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.3760/cma.j.cn115330-20200522-00434?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3760/cma.j.cn115330-20200522-00434, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2199509269\", \"name\": \"P. Wang\"}, {\"authorId\": \"2135814936\", \"name\": \"B. Yu\"}, {\"authorId\": \"10625577\", \"name\": \"X. Wang\"}, {\"authorId\": \"11532982\", \"name\": \"J. T. Wang\"}, {\"authorId\": \"2140333599\", \"name\": \"Q. Li\"}, {\"authorId\": \"2145284450\", \"name\": \"Y. Sun\"}, {\"authorId\": \"36363466\", \"name\": \"L. Tian\"}, {\"authorId\": \"2107809897\", \"name\": \"M. Liu\"}], \"abstract\": null}, {\"paperId\": \"04674cece56c36026c35de70e63ff4fb0433c599\", \"externalIds\": {\"PubMedCentral\": \"9528982\", \"DOI\": \"10.1101/gr.276769.122\", \"CorpusId\": 251494952, \"PubMed\": \"35948368\"}, \"title\": \"Genomic analyses of wild argali, domestic sheep, and their hybrids provide insights into chromosome evolution, phenotypic variation, and germplasm innovation\", \"venue\": \"Genome Research\", \"year\": 2022, \"citationCount\": 52, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://genome.cshlp.org/content/32/9/1669.full.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9528982, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153899327\", \"name\": \"Xin Li\"}, {\"authorId\": \"88042833\", \"name\": \"Sangang He\"}, {\"authorId\": \"2108746952\", \"name\": \"Wen-Rong Li\"}, {\"authorId\": null, \"name\": \"Ling-Yun Luo\"}, {\"authorId\": \"2033022050\", \"name\": \"Ze Yan\"}, {\"authorId\": \"2181123533\", \"name\": \"Dongxin Mo\"}, {\"authorId\": \"2112614931\", \"name\": \"X. Wan\"}, {\"authorId\": \"6939181\", \"name\": \"Feng-Hua Lv\"}, {\"authorId\": \"2109869414\", \"name\": \"Ji Yang\"}, {\"authorId\": \"1736502290\", \"name\": \"Ya-xi Xu\"}, {\"authorId\": \"2153368728\", \"name\": \"Juan Deng\"}, {\"authorId\": \"2152206420\", \"name\": \"Qiang-Hui Zhu\"}, {\"authorId\": \"6637164\", \"name\": \"Xing-Long Xie\"}, {\"authorId\": \"90461608\", \"name\": \"Songsong Xu\"}, {\"authorId\": \"2308913943\", \"name\": \"Chen-Xi Liu\"}, {\"authorId\": \"48449038\", \"name\": \"Xinrong Peng\"}, {\"authorId\": \"2116920391\", \"name\": \"B. Han\"}, {\"authorId\": \"2173933994\", \"name\": \"Zhongbo Li\"}, {\"authorId\": \"2146072747\", \"name\": \"Lei Chen\"}, {\"authorId\": \"47179930\", \"name\": \"Jian-Lin Han\"}, {\"authorId\": \"2148783263\", \"name\": \"X. Ding\"}, {\"authorId\": \"1581715346\", \"name\": \"Renqing Dingkao\"}, {\"authorId\": \"7239596\", \"name\": \"Yuefeng Chu\"}, {\"authorId\": \"2373767757\", \"name\": \"Jinyang Wu\"}, {\"authorId\": \"2109120755\", \"name\": \"Limin Wang\"}, {\"authorId\": \"2113325989\", \"name\": \"P. Zhou\"}, {\"authorId\": \"2112239524\", \"name\": \"Ming-Jun Liu\"}, {\"authorId\": \"2262090979\", \"name\": \"Menghua Li\"}], \"abstract\": \"Understanding the genetic mechanisms of phenotypic variation in hybrids between domestic animals and their wild relatives may aid germplasm innovation. Here, we report the high-quality genome assemblies of a male Pamir argali (O. ammon polii, 2n = 56), a female Tibetan sheep (O. aries, 2n = 54), and a male hybrid of Pamir argali and domestic sheep, and the high-throughput sequencing of 425 ovine animals, including the hybrids of argali and domestic sheep. We detected genomic synteny between Chromosome 2 of sheep and two acrocentric chromosomes of argali. We revealed consistent satellite repeats around the chromosome breakpoints, which could have resulted in chromosome fusion. We observed many more hybrids with karyotype 2n = 54 than with 2n = 55, which could be explained by the selfish centromeres, the possible decreased rate of normal/balanced sperm, and the increased incidence of early pregnancy loss in the aneuploid ewes or rams. We identified genes and variants associated with important morphological and production traits (e.g., body weight, cannon circumference, hip height, and tail length) that show significant variations. We revealed a strong selective signature at the mutation (c.334C > A, p.G112W) in TBXT and confirmed its association with tail length among sheep populations of wide geographic and genetic origins. We produced an intercross population of 110 F2 offspring with varied number of vertebrae and validated the causal mutation by whole-genome association analysis. We verified its function using CRISPR-Cas9 genome editing. Our results provide insights into chromosomal speciation and phenotypic evolution and a foundation of genetic variants for the breeding of sheep and other animals.\"}, {\"paperId\": \"0469adebda2ecdbd4bbc75af163fa8d34947f248\", \"externalIds\": {\"MAG\": \"3049068392\", \"DOI\": \"10.1111/pce.13867\", \"CorpusId\": 221144651, \"PubMed\": \"32799324\"}, \"title\": \"SlTLFP8 reduces water loss to improve water-use efficiency by modulating cell size and stomatal density via endoreduplication.\", \"venue\": \"Plant, Cell and Environment\", \"year\": 2020, \"citationCount\": 56, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/pce.13867?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/pce.13867, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48830812\", \"name\": \"Shuangtao Li\"}, {\"authorId\": \"2047313963\", \"name\": \"Jiaojiao Zhang\"}, {\"authorId\": \"47968321\", \"name\": \"Lun Liu\"}, {\"authorId\": \"2145042743\", \"name\": \"Zhirong Wang\"}, {\"authorId\": \"2144425061\", \"name\": \"Yafei Li\"}, {\"authorId\": \"152556504\", \"name\": \"Luqin Guo\"}, {\"authorId\": \"47002362\", \"name\": \"Yu Li\"}, {\"authorId\": \"49469917\", \"name\": \"Xichun Zhang\"}, {\"authorId\": \"8511523\", \"name\": \"S. Ren\"}, {\"authorId\": \"2112632360\", \"name\": \"Bing Zhao\"}, {\"authorId\": \"88929268\", \"name\": \"N. Zhang\"}, {\"authorId\": \"144450045\", \"name\": \"Yang-Dong Guo\"}], \"abstract\": \"Improving plant water-use efficiency (WUE) is important to plant survival and crop yield in the context of water limitation. In this study, SlTLFP8 (Tubby-like F-box protein 8) was identified as an osmotic-induced gene in tomato. Transgenic tomato with up-regulated expression of SlTLFP8 showed enhanced water-deficient resistance, while knockout mutants generated by CRISPR/Cas9 were more sensitive to water deficit. SlTLFP8 overexpression significantly enhanced WUE by suppressing transpiration under both water-sufficient and water-deficient conditions. Further study showed that overexpressing SlTLFP8 significantly increased leaf epidermal cell size and thereby decreased stomatal density 10%-20%, conversely SlTLFP8 knockout resulted in decreased cell size and thereby increased stomatal density 20%-50%. SlTLFP8 overexpression and knockout modulated ploidy levels in leaf cells. Changes in expression of cell cycle related genes also indicated that SlTLFP8 affected cell size and stomatal density through endocycle transition. Despite changes in stomata density and transpiration, altering the expression of SlTLFP8 did not change photosynthesis. Additionally, biomass was not altered and there was little difference in fruit yield for transgenic and wild type lines under water-sufficient and water-deficient conditions. Our results demonstrate the effect of SlTLFP8 on endoreduplication and the potential of SlTLFP8 for improvement of WUE.\"}, {\"paperId\": \"046b9f4c7c0d40cef8f88603d9f53c569fd57898\", \"externalIds\": {\"PubMedCentral\": \"9288538\", \"DOI\": \"10.1038/s41598-022-15388-z\", \"CorpusId\": 244144768, \"PubMed\": \"35842430\"}, \"title\": \"CRISPR-Cas12a nucleases function with structurally engineered crRNAs: SynThetic trAcrRNA\", \"venue\": \"Scientific Reports\", \"year\": 2021, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-022-15388-z.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9288538, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4387687\", \"name\": \"D. Jedrzejczyk\"}, {\"authorId\": \"32414128\", \"name\": \"L. D. Poulsen\"}, {\"authorId\": \"2176656512\", \"name\": \"M. Mohr\"}, {\"authorId\": \"8179940\", \"name\": \"N. Damas\"}, {\"authorId\": \"2315129225\", \"name\": \"S. Schoffelen\"}, {\"authorId\": \"32332151\", \"name\": \"A. Barghetti\"}, {\"authorId\": \"2179505072\", \"name\": \"R. Baumgartner\"}, {\"authorId\": \"5181810\", \"name\": \"B. Weinert\"}, {\"authorId\": \"39479056\", \"name\": \"T. Warnecke\"}, {\"authorId\": \"2266630538\", \"name\": \"R. Gill\"}], \"abstract\": \"CRISPR-Cas12a systems are becoming an attractive genome editing tool for cell engineering due to their broader editing capabilities compared to CRISPR-Cas9 counterparts. As opposed to Cas9, the Cas12a endonucleases are characterized by a lack of trans-activating crRNA (tracrRNA), which reduces the complexity of the editing system and simultaneously makes CRISPR RNA (crRNA) engineering a promising approach toward further improving and modulating editing activity of the CRISPR-Cas12a systems. Here, we design and validate sixteen types of structurally engineered Cas12a crRNAs targeting various immunologically relevant loci in-vitro and in-cellulo. We show that all our structural modifications in the loop region, ranging from engineered breaks (STAR-crRNAs) to large gaps (Gap-crRNAs), as well as nucleotide substitutions, enable gene-cutting in the presence of various Cas12a nucleases. Moreover, we observe similar insertion rates of short HDR templates using the engineered crRNAs compared to the wild-type crRNAs, further demonstrating that the introduced modifications in the loop region led to comparable genome editing efficiencies. In conclusion, we show that Cas12a nucleases can broadly utilize structurally engineered crRNAs with breaks or gaps in the otherwise highly-conserved loop region, which could further facilitate a wide range of genome editing applications.\"}, {\"paperId\": \"046c153ab9dc793a34384da365535d9e0ef72c91\", \"externalIds\": {\"CorpusId\": 247862803}, \"title\": \"The Ratio Method: Addressing Complex Tort Liability in the Fourth Industrial Revolution\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://commons.stmarytx.edu/cgi/viewcontent.cgi?article=1115&context=thestmaryslawjournal, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2161006774\", \"name\": \"Harrison\"}, {\"authorId\": \"1409518458\", \"name\": \"C.\"}, {\"authorId\": \"2103779791\", \"name\": \"Margolin\"}, {\"authorId\": \"2068549891\", \"name\": \"Grant\"}, {\"authorId\": \"2113588364\", \"name\": \"H.\"}, {\"authorId\": \"2083804759\", \"name\": \"Frazier\"}], \"abstract\": null}, {\"paperId\": \"046d571b6ef24470d816bd1aa138577804988f00\", \"externalIds\": {\"MAG\": \"3150952464\", \"DOI\": \"10.1016/j.vetmic.2021.109063\", \"CorpusId\": 233477193, \"PubMed\": \"33932721\"}, \"title\": \"Mechanisms of polymyxin resistance induced by Salmonella typhimurium in vitro.\", \"venue\": \"Veterinary Microbiology\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.vetmic.2021.109063?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.vetmic.2021.109063, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2109138006\", \"name\": \"Lin Li\"}, {\"authorId\": \"2150924275\", \"name\": \"Rui Li\"}, {\"authorId\": \"2086976121\", \"name\": \"Caili Qi\"}, {\"authorId\": \"2108469297\", \"name\": \"Haixia Gao\"}, {\"authorId\": \"95873210\", \"name\": \"Qi\\u2010fu Wei\"}, {\"authorId\": \"2298215\", \"name\": \"L. Tan\"}, {\"authorId\": \"2075375396\", \"name\": \"F. Sun\"}], \"abstract\": \"The increase incidence of multi-drug resistant (MDR) Salmonella has become a major global health concern. Polymyxin, an ancient polypeptide antibiotic, has been given renewed attention over recent years, resulting in resistance of Gram-negative bacteria to polymyxin, but its resistance mechanism is not completely clear. Thus, it is important to study its resistance mechanisms. In this study, an in vitro induced polymyxin-resistant strain of Salmonella typhimurium in the laboratory were constructed to investigate the mechanism of resistance of Salmonella to polymyxin. Gradual induction of Salmonella typhimurium ATCC13311 (AT) by concentration increment was used to screen for a highly polymyxin-resistant strain AT-P128. The broth dilution technique was used to compare the sensitivity of the two strains to different antimicrobial drugs. Single nucleotide polymorphisms (SNPs) were then identified by whole genome sequencing, and differences in gene expression between the two strains were compared by transcriptome sequencing and reverse transcription-quantitative PCR (RT-qPCR). Finally, for the first time, the CRISPR/Cas9 gene-editing system was used to construct gene deletion mutants in Salmonella to knock out the phoP gene of AT-P128. The results showed that strain AT-P128 was significantly more resistant to amoxicillin, ceftiofur, ampicillin, fluphenazine, and chloramphenicol and significantly less resistant to sulfamethoxazole than the parental strain AT. The growth curve results showed no significant change in the growth rate between AT-P128 and AT. Motility and biofilm formation assays showed a significant decrease in AT-P128. Additionally, the WGS results showed that AT-P128 had mutations in 9 genes involving 14 SNPs. RNA-seq and RT-qPCR results showed increased expression of phoPQ. The loss of the phoP gene decreased AT-P128\\u0394phoP resistance to polymyxin by 32-fold. These results suggested that polymyxin resistance affected the biology, genome components, and gene expression levels of Salmonella and that the PhoPQ two-component system played a key role in polymyxin resistance in Salmonella, providing insights into the diversity and complexity of polymyxin resistance in Salmonella.\"}, {\"paperId\": \"046df800225fd7511b3164b958ca991885a9ae4c\", \"externalIds\": {\"PubMedCentral\": \"467107\", \"DOI\": \"10.1167/tvst.13.7.11\", \"CorpusId\": 271200089, \"PubMed\": \"39007834\"}, \"title\": \"Construction and Identification of a Novel Mice Model of Microphthalmia\", \"venue\": \"Translational Vision Science & Technology\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1167/tvst.13.7.11\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC467107, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2311454386\", \"name\": \"Dan Li\"}, {\"authorId\": \"2087739822\", \"name\": \"K. Cheng\"}, {\"authorId\": \"8362208\", \"name\": \"Xiangjia Zhu\"}], \"abstract\": \"Purpose Microphthalmia is a rare developmental eye disease that affects 1 in 7000 births. Currently, there is no cure for this condition. This study aimed to construct a stable mouse model of microphthalmia, thus providing a new tool for the study of the etiology of microphthalmia. Methods The Hedgehog signaling pathway plays a crucial role in eye development. One of the key mechanisms of the Sonic Hedgehog signaling is the strong transcriptional activation ability of GLI3, a major mediator of this pathway. This study used CRISPR/Cas9 system to construct a novel TgGli3Ki/Ki lens-specific over-expression mouse line. To identify the ocular characteristics of this line, quantitative PCR, Western blot, hematoxylin and eosin staining, immunofluorescent staining, and RNA-seq were performed on the ocular tissues of this line and normal mice. Results The TgGli3Ki/Ki lens-specific over-expression mouse model exhibits the ocular phenotype of microphthalmia. In the TgGli3Ki/Ki mouse, Gli3 is over-expressed in the lens, and the size of the eyeball and lens is significantly smaller than the normal one. RNA-seq analysis using the lens and the retina samples from TgGli3Ki/Ki and normal mice indicates that the phototransduction pathway is ectopically activated in the lens. Immunofluorescent staining of the lens samples confirmed this activation. Conclusions The TgGli3Ki/Ki mouse model consistently manifests the stereotypical microphthalmia phenotype across generations, making it an excellent tool for studying this severe eye disease. Translational Relevance This study developed a novel animal model to facilitate clinical research on microphthalmia.\"}, {\"paperId\": \"046f049ad2df8e344728e76b71a04d7d6ce83467\", \"externalIds\": {\"MAG\": \"3195645714\", \"DOI\": \"10.1097/JBR.0000000000000102\", \"CorpusId\": 238801081}, \"title\": \"CRISPR/Cas9-mediated pou4f3 knockout induces defects in the development of the zebrafish inner ear\", \"venue\": \"Journal of Bio-X Research\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1097/jbr.0000000000000102\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1097/JBR.0000000000000102?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1097/JBR.0000000000000102, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2375154909\", \"name\": \"Jingwen Liu\"}, {\"authorId\": \"37653129\", \"name\": \"Xuchu Duan\"}, {\"authorId\": \"2150654899\", \"name\": \"Ming Li\"}, {\"authorId\": \"50439186\", \"name\": \"Dong Liu\"}, {\"authorId\": \"2087104050\", \"name\": \"Xiaohui Bai\"}], \"abstract\": \"Abstract Objective: The zebrafish is an excellent model for studying gene function in auditory system development. Pou4f3 plays an important role in mouse hair cell formation. Here, we constructed a pou4f3-knockout Tg(Brn3c:GFP) zebrafish to provide an efficient fluorescence-visualized model for studying the molecular mechanisms of ear development. Methods: Cas9/single guide RNAs targeting exon 2 of pou4f3 were designed and injected into one-cell stage zebrafish embryos (G0 generation). The G0 generation were crossed with Tg(Brn3c:GFP) zebrafish to obtain pou4f3-mutant Tg(Brn3c:GFP) zebrafish. The targeting efficiency was detected by polymerase chain reaction amplification and Sanger sequencing. Zebrafish hair cells were observed by laser scanning confocal microscopy in vivo. The morphology of the otoliths and semicircular canals were analyzed. All animal experiments were approved by the Animal Care and Use Committee of Shandong Provincial Hospital, Cheeloo College of Medicine, Shandong University (approval No. 2016-KY-040) on March 3, 2016. Results: The pou4f3-mutant Tg(Brn3c:GFP) zebrafish line was successfully established. Fluorescence observation suggested that hair cell development was delayed in pou4f3-knockout zebrafish. Knockout of pou4f3 also induced defects in the otoliths and semicircular canals and impaired ear function in zebrafish. Conclusion: A CRISPR/Cas9-mediated pou4f3 mutant Tg(Brn3c:GFP) zebrafish model was established for the first time to demonstrate the essential role of pou4f3 in zebrafish ear development. Our study provides a highly efficient method for the establishment of a visualized model of gene knockout zebrafish and has the potential to allow high-throughput drug screening to explore therapeutics for related diseases.\"}, {\"paperId\": \"046f3f9bef08184403ed38614cc6c785a1fc5fe4\", \"externalIds\": {\"PubMedCentral\": \"10235934\", \"DOI\": \"10.1073/pnas.2221127120\", \"CorpusId\": 258844051, \"PubMed\": \"37216515\"}, \"title\": \"Efficient precise integration of large DNA sequences with 3\\u2032-overhang dsDNA donors using CRISPR/Cas9\", \"venue\": \"Proceedings of the National Academy of Sciences of the United States of America\", \"year\": 2023, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1073/pnas.2221127120\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10235934, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": \"Significance Here, we devised a practical and efficient method, termed LOCK, which utilizes a donor with hybrid \\u201c3\\u2032-overhang dsDNA\\u201d (odsDNA) structure for efficient and accurate knock-in of large DNA fragment. This donor could be readily synthesized with low cost. In addition, the odsDNA donor could be directly or indirectly attached to Cas9 fusion protein and extended sgRNA and achieve efficient knock-in of 2,500 bp genes in situ.\"}, {\"paperId\": \"0472ec533406da4dd2daa015fdf46f7b192797c9\", \"externalIds\": {\"DOI\": \"10.1101/2023.04.17.537256\", \"CorpusId\": 258216526}, \"title\": \"PI3K/mTOR is a therapeutically targetable genetic dependency in diffuse intrinsic pontine glioma\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jci.org/articles/view/170329/files/pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.04.17.537256?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.04.17.537256, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3529500\", \"name\": \"Ryan J. Duchatel\"}, {\"authorId\": \"150985697\", \"name\": \"Evangeline R. Jackson\"}, {\"authorId\": \"66927983\", \"name\": \"Sarah Parackal\"}, {\"authorId\": \"11212957\", \"name\": \"C. Sun\"}, {\"authorId\": \"2066219003\", \"name\": \"P. Daniel\"}, {\"authorId\": \"2147271822\", \"name\": \"Abdul Mannan\"}, {\"authorId\": \"2139761305\", \"name\": \"Izac J. Findlay\"}, {\"authorId\": \"9803738\", \"name\": \"Dilana E. Staudt\"}, {\"authorId\": \"1443733070\", \"name\": \"Zacary P. Germon\"}, {\"authorId\": \"12223163\", \"name\": \"Sandra Laternser\"}, {\"authorId\": \"52193669\", \"name\": \"D. Kiltschewskij\"}, {\"authorId\": \"1995037789\", \"name\": \"Padraic S Kearney\"}, {\"authorId\": \"2092241064\", \"name\": \"M. Fairuz\"}, {\"authorId\": \"150935568\", \"name\": \"B. Jamaluddin\"}, {\"authorId\": \"1661039412\", \"name\": \"Alicia M. Douglas\"}, {\"authorId\": \"2190853081\", \"name\": \"Tyrone S Beitaki\"}, {\"authorId\": \"2163675937\", \"name\": \"Mika L Persson\"}, {\"authorId\": \"39742145\", \"name\": \"Elizabeth E. Manning\"}, {\"authorId\": \"17428886\", \"name\": \"H. Murray\"}, {\"authorId\": \"4986351\", \"name\": \"N. Verrills\"}, {\"authorId\": \"1401185037\", \"name\": \"D. Skerrett\\u2010Byrne\"}, {\"authorId\": \"143979625\", \"name\": \"B. Nixon\"}, {\"authorId\": \"35725544\", \"name\": \"S. Hua\"}, {\"authorId\": \"2214747781\", \"name\": \"Valdes-Mora Fatima\"}, {\"authorId\": \"4431671\", \"name\": \"M. Tsoli\"}, {\"authorId\": \"2795973\", \"name\": \"D. Ziegler\"}, {\"authorId\": \"1951420\", \"name\": \"M. Cairns\"}, {\"authorId\": \"46490709\", \"name\": \"Eric H. Raabe\"}, {\"authorId\": \"7397839\", \"name\": \"N. Vitanza\"}, {\"authorId\": \"4269160\", \"name\": \"Carl J. Koschmann\"}, {\"authorId\": \"4157075\", \"name\": \"F. Alvaro\"}, {\"authorId\": \"6702030\", \"name\": \"C. Dayas\"}, {\"authorId\": \"6582231\", \"name\": \"C. Tinkle\"}, {\"authorId\": \"3112182\", \"name\": \"D. Eisenstat\"}, {\"authorId\": \"6447304\", \"name\": \"R. Firestein\"}, {\"authorId\": \"50544396\", \"name\": \"S. Mueller\"}, {\"authorId\": \"4775380\", \"name\": \"J. Nazarian\"}, {\"authorId\": \"2200386\", \"name\": \"J. Cain\"}, {\"authorId\": \"7503037\", \"name\": \"Matthew D. Dun\"}], \"abstract\": \"Diffuse midline glioma (DMG), including tumors diagnosed in the brainstem (diffuse intrinsic pontine glioma \\u2013 DIPG), are uniformly fatal brain tumors that lack effective pharmacological treatment. Analysis of pooled CRISPR-Cas9 loss-of-function gene deletion screen datasets, identified PIK3CA and MTOR as targetable molecular dependencies across DIPG patient derived models, highlighting the therapeutic potential of the blood-brain barrier penetrant PI3K/Akt/mTOR inhibitor paxalisib. At the human equivalent maximum tolerated dose, mice treated with paxalisib experienced systemic feedback resulting in increased blood glucose and insulin levels, commensurate with DIPG patients in Phase 1b clinical trials who experienced hyperglycemia/hyperinsulinemia. To exploit genetic dependences, but maintain compliance and benefit, we optimized a paxalisib treatment regimen that employed reduced dosing more frequently, in combination with the anti-hyperglycemic drug, metformin. Combining optimized dosing with metformin restored glucose homeostasis and decreased phosphorylation of the insulin receptor in vivo, a common mechanism of PI3K-inhibitor resistance, extending the survival of DIPG xenograft models. RNA sequencing and phosphoproteomic profiling of DIPG models treated with paxalisib identified increased calcium-activated PKC signaling. Using the brain penetrant PKC inhibitor, enzastaurin in combination with paxalisib, we synergistically extended the survival of orthotopic xenograft models, benefits further promoted by metformin; thus, identifying a clinically relevant DIPG combinatorial approach. Brief Summary Diffuse intrinsic pontine glioma is a lethal childhood brain tumor. Here we identify PIK3CA as a genetic dependency targeted by the brain penetrant pan-PI3K-inhibitor paxalisib.\"}, {\"paperId\": \"04758006695a70556247278e564f56039349a21f\", \"externalIds\": {\"PubMedCentral\": \"9252759\", \"DBLP\": \"journals/nar/KonstantakosNKP22\", \"DOI\": \"10.1093/nar/gkac466\", \"CorpusId\": 249432756, \"PubMed\": \"35670672\"}, \"title\": \"CRISPRedict: a CRISPR-Cas9 web tool for interpretable efficiency predictions\", \"venue\": \"Nucleic Acids Res.\", \"year\": 2022, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/nar/article-pdf/50/W1/W191/44378573/gkac466.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9252759, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2316858349\", \"name\": \"Vasilis Konstantakos\"}, {\"authorId\": \"23133070\", \"name\": \"A. Nentidis\"}, {\"authorId\": \"1927081\", \"name\": \"Anastasia Krithara\"}, {\"authorId\": \"4738873\", \"name\": \"G. Paliouras\"}], \"abstract\": \"Abstract The development of the CRISPR-Cas9 technology has provided a simple yet powerful system for genome editing. Current gRNA design tools serve as an important platform for the efficient application of the CRISPR systems. However, most of the existing tools are black-box models that suffer from limitations, such as variable performance and unclear mechanism of decision making. Here, we introduce CRISPRedict, an interpretable gRNA efficiency prediction model for CRISPR-Cas9 gene editing. Its strength lies in the fact that it can accurately predict efficient guide RNAs\\u2014with equivalent performance to state-of-the-art tools\\u2014while being a simple linear model. Implemented as a user-friendly web server, CRISPRedict offers (i) quick and accurate predictions across various experimental conditions (e.g. U6/T7 transcription); (ii) regression and classification models for scoring gRNAs and (iii) multiple visualizations to explain the obtained results. Given its performance, interpretability, and versatility, we expect that it will assist researchers in the gRNA design process and facilitate genome editing research. CRISPRedict is available for use at http://www.crispredict.org/.\"}, {\"paperId\": \"04782884f1c4a581777fbbf009180e44a257014e\", \"externalIds\": {\"PubMedCentral\": \"8165570\", \"DOI\": \"10.1016/j.xpro.2021.100560\", \"CorpusId\": 235353135, \"PubMed\": \"34095868\"}, \"title\": \"One-step CRISPR-Cas9 protocol for the generation of plug & play conditional knockouts in Drosophila melanogaster\", \"venue\": \"STAR Protocols\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.xpro.2021.100560\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8165570, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1716735189\", \"name\": \"Joyce J S Yu\"}, {\"authorId\": \"47555890\", \"name\": \"J. Vincent\"}, {\"authorId\": \"4415954\", \"name\": \"Ian J. McGough\"}], \"abstract\": \"Summary This one-step method generates, for any locus, a conditional knockout allele in Drosophila. The allele carries a bright fluorescent marker for easy screening and an attP landing site for subsequent genetic manipulations. After removing the selectable marker with Cre, the attP site can be used to insert DNA fragments expressing tagged or mutant alleles to determine protein localization and function in a tissue- and stage-specific manner. Only a single round of CRISPR-Cas9-mediated editing is required. For complete details on the use and execution of this protocol, please refer to the DWnt4[cKO] example in Yu et al. (2020).\"}, {\"paperId\": \"047b9e1b3e54807caf6f8fa4289d41c0befc9550\", \"externalIds\": {\"DOI\": \"10.35118/apjmbb.2022.030.3.05\", \"CorpusId\": 251085288}, \"title\": \"CRISPR/Cas9 for soybean improvement: A review\", \"venue\": \"Asia-Pacific Journal of Molecular Biology and Biotechnology\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.35118/apjmbb.2022.030.3.05\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.35118/apjmbb.2022.030.3.05?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.35118/apjmbb.2022.030.3.05, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2179266219\", \"name\": \"Shikta Rani Kar\"}, {\"authorId\": \"2146346928\", \"name\": \"Swapnila Choudhury\"}, {\"authorId\": \"2078507443\", \"name\": \"A. Chakraborty\"}], \"abstract\": \"The soybean is a valuable legume crop cultivated for its oil and protein which is used widely as food for humans and feed for livestock as well as in biofuel production. The genetic improvement of the soybean needs to be accelerated to boost its productivity and enhance its resilience to changing environments. In recent years, CRISPR/Cas9 has become a powerful and robust genome editing system for manipulating traits of various crop plants including soybean. This cutting-edge biotechnological tool has been extensively used as a means for improving crop quality and yields, disease-resistance, tolerance to adverse environmental conditions, and production of plant-based materials. This review presents a brief mechanism of the CRISPR/Cas9 system followed by its application in soybean improvement. It also highlights some prospects of using the CRISPR/Cas9 system in soybean research.\"}, {\"paperId\": \"047c395ace42d75265bec90ab66b30793993a168\", \"externalIds\": {\"DOI\": \"10.1182/blood-2023-182269\", \"CorpusId\": 265582980}, \"title\": \"Familial Thrombocytopenia-Associated Germline ETV6 P214L Mutation Results in XPO1-Mediated Nuclear Export\", \"venue\": \"Blood\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2023-182269?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2023-182269, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269326147\", \"name\": \"Michael McConville\"}, {\"authorId\": \"2205338674\", \"name\": \"Toby Thomas\"}, {\"authorId\": \"2269330005\", \"name\": \"Catherine Valadez\"}, {\"authorId\": \"2269326088\", \"name\": \"Ryan Beckner\"}, {\"authorId\": \"1818885\", \"name\": \"Y. Chook\"}, {\"authorId\": \"2269432239\", \"name\": \"Stephen Chung\"}, {\"authorId\": \"2269330110\", \"name\": \"Glen Liszczak\"}], \"abstract\": \"\\n In recent years, a number of heterozygous germline mutations in ETV6 have been associated with familial thrombocytopenia and predisposition to hematologic malignancies. While most of these missense mutations occur in the DNA-binding-domain of ETV6, the recurrent P214L mutation is unique in that it occurs in the central disordered region of the protein. The ETV6 P214L mutation has previously been shown to disrupt the nuclear localization of ETV6 and the ability of ETV6 to act as a transcriptional repressor. Unexpectedly, we have found that the P214L missense mutation creates a recognition motif for the nuclear export protein XPO1. We have demonstrated in cellular and protein reconstitution assays that XPO1 directly engages the P214L but not the wild-type ETV6 construct. Consistent with this mechanism, we are able to fully rescue the nuclear localization of ETV6 P214L in mammalian cells with small molecule XPO1 inhibitors. We have also found that once localized to the nucleus, the P214L mutant construct exhibits functional consequences indistinguishable from wild-type ETV6 in Ba/F3 transformation assays.\\n When looking at the evolutionary conservation of the ETV6 amino acid sequence involved in the XPO1 recognition motif, we observed that the synonymous P216L mutation in the mouse ETV6 ortholog does not create a nuclear export signal. In order to study XPO1-mediated export of ETV6 P214L and its impact on hematopoiesis, we have generated a mouse model in which two point mutations (P216L and S211I) have been introduced into a single endogenous ETV6 allele, which precisely matches the sequence of this region in human P214L carriers. Using CRISPR-Cas9, we generated 3 transgenic mouse lines: Etv6 P216L, Etv6 S211I, and Etv6 S211IP216L. Immunofluorescence of fixed bone marrow shows that ETV6 is only mislocalized in megakaryocytes from ETV6 S211I P216L mice. Complete blood counts revealed a significant decrease in platelet counts in ETV6 S211I P216L heterozygotes (485 x 10 3/\\u00b5L) compared to ETV6 S211I heterozygotes (1140 x 10 3/\\u00b5L, p<0.0001), ETV6 P216L heterozygotes (1065 x 10 3/\\u00b5L, p<0.0006), and wild-type littermates (1254 x 10 3/\\u00b5L, p<0.0001). Flow cytometry phenotyping of bone marrow from the three transgenic lines and wild-type littermates shows a significant decrease in the absolute numbers of hematopoietic stem cells (HSCs) and megakaryocyte precursors (MkPs) in ETV6 S211I P216L mice.\\n In summary, we have determined that XPO1-mediated nuclear export is the mechanistic basis for ETV6 P214L mislocalization. We developed a mouse model that recapitulates this export signal in the endogenous ETV6 allele and found that this model demonstrates a thrombocytopenic phenotype as seen in human patients. Reductions in HSCs and MkPs suggest both a decreased fitness of HSCs, as well as dysregulated megakaryopoiesis in this model.\"}, {\"paperId\": \"0481ae0ea3a6c927e8b813162d6f278c11845b97\", \"externalIds\": {\"MAG\": \"3087194659\", \"DOI\": \"10.1016/j.scr.2020.102003\", \"CorpusId\": 221939291, \"PubMed\": \"32977294\"}, \"title\": \"Generation of a tdTomato-GAD67 reporter human epilepsia mutation induced pluripotent stem cell line, USTCi001-A-2, using CRISPR/Cas9 editing.\", \"venue\": \"Stem Cell Research\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2020.102003\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2020.102003?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2020.102003, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2229549\", \"name\": \"Huifang Zhao\"}, {\"authorId\": \"2006000162\", \"name\": \"Lang He\"}, {\"authorId\": \"35243063\", \"name\": \"Hua-Lin Huang\"}, {\"authorId\": \"2133435907\", \"name\": \"Shuai Li\"}, {\"authorId\": \"2061480289\", \"name\": \"Na Cheng\"}, {\"authorId\": \"1901728877\", \"name\": \"Feng Tang\"}, {\"authorId\": \"48506269\", \"name\": \"Xiaobo B Han\"}, {\"authorId\": \"9944019\", \"name\": \"Zuoxian Lin\"}, {\"authorId\": \"153767084\", \"name\": \"Rongqi Huang\"}, {\"authorId\": \"2113326637\", \"name\": \"Peng Zhou\"}, {\"authorId\": \"49647324\", \"name\": \"Sihao Deng\"}, {\"authorId\": \"2145753799\", \"name\": \"Jufang Huang\"}, {\"authorId\": \"2109822221\", \"name\": \"Zhiyuan Li\"}], \"abstract\": \"Dravet syndrome is an epileptic encephalopathy largely due to haploinsufficiency of the voltage-gated sodium channel Nav1.1 that is expressed primarily in GABAergic neurons. In order to distinguish the different subtypes, we used gene editing to introduce tdTomato gene into the genome of iPSCs to label the GABAergic neurons in the differentiated neuronal networks. The gene-edited cell line demonstrates normal karyotype, expresses the main pluripotency markers, and shows the presence of differentiation into the three embryonic germ layers in teratomas.\"}, {\"paperId\": \"048582f848760eed95509f22bfca594a776aaf57\", \"externalIds\": {\"DOI\": \"10.9734/ajraf/2024/v10i2280\", \"CorpusId\": 268656478}, \"title\": \"Role of CRISPR in Crop Improvement: A Review\", \"venue\": \"Asian Journal of Research in Agriculture and Forestry\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journalajraf.com/index.php/AJRAF/article/download/280/552\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.9734/ajraf/2024/v10i2280?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.9734/ajraf/2024/v10i2280, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49880227\", \"name\": \"H. Raza\"}, {\"authorId\": \"2267885683\", \"name\": \"M. Abdullah\"}, {\"authorId\": \"2293096245\", \"name\": \"Samar Khaliq\"}, {\"authorId\": \"2274380469\", \"name\": \"M. Sajjad\"}, {\"authorId\": \"2292983606\", \"name\": \"M. Elahi\"}, {\"authorId\": \"2374460030\", \"name\": \"Muhammad Khan\"}, {\"authorId\": \"2270092278\", \"name\": \"A. Siddique\"}], \"abstract\": \"The meals and agriculture sectors have witnessed good sized advancements due to the state-of-the-art improvements in agricultural biotechnology and genetic engineering, that have more advantageous the essential characteristics of plant agronomic tendencies. A extensively used technique for inducing focused deletions, insertions, and precise sequence adjustments throughout numerous species and mobile kinds is collection-particular nucleases (SSNs)-based centered genome editing. Commercial adoption of genome modifying gear, which include zinc-finger nucleases (ZFNs), transcription activator-like effector nucleases (TALENs), and siRNA-mediated RNA interference, has been significant. However, the whole landscape of lifestyles sciences underwent a paradigm shift with the invention of the CRISPR/Cas9 machine as a flexible tool for genome modifying. Initially recognized as a virological defense DNA segment in bacteria and archaea, the clustered Regularly interspaced short palindromic repeats (CRISPR) machine has revolutionized molecular biology. Through modern molecular organic strategies, CRISPR/Cas9 enables unique modifications in any crop species. Its efficacy, reproducibility, and specificity have earned CRISPR/Cas9 the moniker of a \\\"leap forward\\\" in biotechnology.\"}, {\"paperId\": \"0485a1d1c3c8763daa0b9bbadb9099ed5268bf35\", \"externalIds\": {\"PubMedCentral\": \"9128553\", \"DOI\": \"10.1080/15476286.2022.2067713\", \"CorpusId\": 248375881, \"PubMed\": \"35465826\"}, \"title\": \"Chimeric oligonucleotides combining guide RNA and single-stranded DNA repair template effectively induce precision gene editing\", \"venue\": \"RNA Biology\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1080/15476286.2022.2067713\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9128553, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"28329743\", \"name\": \"Avantika Ghosh\"}, {\"authorId\": \"15767875\", \"name\": \"Ksenia Myacheva\"}, {\"authorId\": \"1835066669\", \"name\": \"M. Riester\"}, {\"authorId\": \"2114106957\", \"name\": \"C. Schmidt\"}, {\"authorId\": \"49548469\", \"name\": \"S. Diederichs\"}], \"abstract\": \"ABSTRACT The ability to precisely alter the genome holds immense potential for molecular biology, medicine and biotechnology. The development of the Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR) into a genomic editing tool has vastly simplified genome engineering. Here, we explored the use of chemically synthesized chimeric oligonucleotides encoding a target-specific crRNA (CRISPR RNA) fused to a single-stranded DNA repair template for RNP-mediated precision genome editing. By generating three clinically relevant oncogenic driver mutations, two non-stop extension mutations, an FGFRi resistance mutation and a single nucleotide change, we demonstrate the ability of chimeric oligos to form RNPs and direct Cas9 to effectively induce genome editing. Further, we demonstrate that the polarity of the chimeric oligos is crucial: only chimeric oligos with the single-stranded DNA repair template fused to the 3\\u2019-end of the crRNA are functional for accurate editing, while templates fused to the 5\\u2019-end are ineffective. We also find that chimeras can perform editing with both symmetric and asymmetric single-stranded DNA repair templates. Depending on the target locus, the editing efficiency using chimeric RNPs is similar to or less than the efficiency of editing using the bipartite standard RNPs. Our results indicate that chimeric RNPs comprising RNA-DNA oligos formed from fusing the crRNA and DNA repair templates can successfully induce precise edits. While chimeric RNPs do not display an advantage over standard RNPs, they nonetheless represent a viable approach for one-molecule precision genome editing.\"}, {\"paperId\": \"048682bc92b4d52d7246050b9d0278d7fefaae36\", \"externalIds\": {\"DOI\": \"10.70389/pjpb.100006\", \"CorpusId\": 275424788}, \"title\": \"Understanding Modern Techniques and Tools to Revolutionize Plant Breeding for Sustainable Crop Improvement\", \"venue\": \"Premier Journal of Plant Biology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.70389/pjpb.100006?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.70389/pjpb.100006, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2339307105\", \"name\": \"Muhammad Ahtisham\"}, {\"authorId\": \"2339297987\", \"name\": \"Zainab Obaid\"}], \"abstract\": \"The modern era of plant breeding is experiencing a shift from conventional to modern breeding methods, driven by the integration of these modern tools for rapid and sustainable crop improvement. Marker-assisted selection (MAS) helps breeders in the precise selection of traits at the genomic level, hence accelerating crop improvement and improving the efficiency of selection. For quick generational advancement, speed breeding is a great technique, as it significantly reduces the crop maturity cycle with manipulation of photoperiod, temperature, CO2 concentration, and other factors, hence boosting the process of crop improvement. Big data provided by high-throughput phenotyping enables breeders in precise assessment of large plant populations in breeding programs. CRISPR/Cas9 has also emerged as a great tool for precise editing of a specific region of the genome allowing targeted improvement in plants. Tools such as Artificial intelligence and machine learning have a great potential for analyzing big data produced by these modern tools and in trait prediction as well. The review tends to provide a detailed understanding of these modern tools and their application in plant breeding.\\n\\nThe integrated use of these modern plant breeding tools such as MAS, speed breeding, high-throughput phenotyping, CRISPR/Cas, and artificial intelligence/machine learning with conventional breeding holds the potential to address the problem of future food security, ensuring sustainable crop improvement to feed future generations.\"}, {\"paperId\": \"04876291e2a5ae24bc79b3432002c0e90c0334dd\", \"externalIds\": {\"PubMedCentral\": \"8331188\", \"DOI\": \"10.1101/2021.03.05.434100\", \"CorpusId\": 232200355, \"PubMed\": \"34342264\"}, \"title\": \"Oxaliplatin resistance in colorectal cancer enhances TRAIL sensitivity via death receptor 4 upregulation and lipid raft localization\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 34, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2021.03.05.434100\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8331188, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40836304\", \"name\": \"Joshua D. Greenlee\"}, {\"authorId\": \"1403570525\", \"name\": \"Maria Lopez-Cavestany\"}, {\"authorId\": \"1441419326\", \"name\": \"N. Ortiz-Otero\"}, {\"authorId\": \"1988479840\", \"name\": \"Kevin Liu\"}, {\"authorId\": \"1990748359\", \"name\": \"Tejas Subramanian\"}, {\"authorId\": \"5018670\", \"name\": \"B. Cagir\"}, {\"authorId\": \"143656724\", \"name\": \"M. King\"}], \"abstract\": \"Colorectal cancer (CRC) remains a leading cause of cancer death, and its mortality is associated with metastasis and chemoresistance. We demonstrate that oxaliplatin-resistant CRC cells are sensitized to TRAIL-mediated apoptosis. Oxaliplatin-resistant cells exhibited transcriptional downregulation of caspase-10, but this had minimal effects on TRAIL sensitivity following CRISPR-Cas9 deletion of caspase-10 in parental cells. Sensitization effects in oxaliplatin-resistant cells were found to be a result of increased DR4, as well as significantly enhanced DR4 palmitoylation and translocation into lipid rafts. Raft perturbation via nystatin and resveratrol significantly altered DR4/raft colocalization and TRAIL sensitivity. Blood samples from metastatic CRC patients were treated with TRAIL liposomes, and a 57% reduction of viable CTCs was observed. Increased DR4/lipid raft colocalization in CTCs was found to correspond with increased oxaliplatin resistance and increased efficacy of TRAIL liposomes. To our knowledge, this is the first study to investigate the role of lipid rafts in primary CTCs. Impact Statement Oxaliplatin-resistant colorectal cancer cells exhibit unregulated death receptor 4 expression with increased receptor palmitoylation and translocation into lipid rafts, increasing their sensitivity to apoptosis via TRAIL.\"}, {\"paperId\": \"04878f8240447b2bbd7d63665514969b721c74a9\", \"externalIds\": {\"MAG\": \"3008550746\", \"DOI\": \"10.1016/j.bios.2020.112100\", \"CorpusId\": 211263268, \"PubMed\": \"32090878\"}, \"title\": \"Surpassing the detection limit and accuracy of the electrochemical DNA sensor through the application of CRISPR Cas systems.\", \"venue\": \"Biosensors & bioelectronics\", \"year\": 2020, \"citationCount\": 160, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bios.2020.112100?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bios.2020.112100, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40515617\", \"name\": \"W. Xu\"}, {\"authorId\": \"2052138663\", \"name\": \"Tian Jin\"}, {\"authorId\": \"1645268014\", \"name\": \"Yifan Dai\"}, {\"authorId\": \"2116880470\", \"name\": \"C. Liu\"}], \"abstract\": \"Robust developments of personalized medicine for next-generation healthcare highlight the need for sensitive and accurate point-of-care platforms for quantification of disease biomarkers. Broad presentations of clustered regularly interspaced short palindromic repeats (CRISPR) as an accurate gene editing tool also indicate that the high-specificity and programmability of CRISPR system can be utilized for the development of biosensing systems. Herein, we present a CRISPR Cas system enhanced electrochemical DNA (E-DNA) sensor with unprecedented sensitivity and accuracy. The principle of the E-DNA sensor is the target induced conformational change of the surface signaling probe (containing an electrochemical tag), leading to the variation of the electron transfer rate of the electrochemical tag. With the introduction of CRISPR cleavage activity into the E-DNA sensor, a more apparent signal change between with and without the presence of the target can be achieved. We compared the performance of Cas9 and Cas12a enhanced E-DNA sensor and optimized the chemical environment of CRISPR, achieving a femto-molar detection limit without enzymatic amplification. Moreover, we correlated the CRISPR cleavage signal with the original E-DNA signal as a strategy to indicate potential mismatches in the target sequence. Comparing with classic DNA electrochemistry based mutation detection strategy, CRISPR enhanced E-DNA sensor can determine the presence of a single mutation at an unknown concentration condition. Overall, we believe that the CRISPR enhanced E-DNA sensing strategy will be of especially high utility for point-of-care systems owing to the programmability, modularity, high-sensitivity and high-accuracy.\"}, {\"paperId\": \"048965cdb80e9d360b105ff01f9e2775143490ca\", \"externalIds\": {\"DOI\": \"10.1101/2024.11.04.621858\", \"CorpusId\": 273950723}, \"title\": \"Platelet-specific P2Y1 receptor deficient mice have suppressed leukocyte recruitment in response to lipopolysaccharide\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/11/06/2024.11.04.621858.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.11.04.621858?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.11.04.621858, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2274292957\", \"name\": \"Dingxin Pan\"}, {\"authorId\": \"2330086549\", \"name\": \"Tolga Oralman\"}, {\"authorId\": \"40173473\", \"name\": \"Reah Evans\"}, {\"authorId\": \"34024248\", \"name\": \"O. Baker\"}, {\"authorId\": \"4004101\", \"name\": \"G. Cocks\"}, {\"authorId\": \"2330086822\", \"name\": \"Clive P Page\"}, {\"authorId\": \"3893181\", \"name\": \"S. Pitchford\"}], \"abstract\": null}, {\"paperId\": \"048b504d144744de0f13b28d5833e6d60355bd99\", \"externalIds\": {\"DOI\": \"10.1007/s00299-020-02647-4\", \"CorpusId\": 230489042, \"PubMed\": \"33389047\"}, \"title\": \"Isoflavone levels, nodulation and gene expression profiles of a CRISPR/Cas9 deletion mutant in the isoflavone synthase gene of red clover\", \"venue\": \"Plant Cell Reports\", \"year\": 2021, \"citationCount\": 30, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00299-020-02647-4?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00299-020-02647-4, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3054576\", \"name\": \"R. Dinkins\"}, {\"authorId\": \"2044300288\", \"name\": \"Julie A. Hancock\"}, {\"authorId\": \"8518355\", \"name\": \"B. Coe\"}, {\"authorId\": \"2029895426\", \"name\": \"J. May\"}, {\"authorId\": \"50126826\", \"name\": \"J. Goodman\"}, {\"authorId\": \"145789338\", \"name\": \"W. Bass\"}, {\"authorId\": \"2108308980\", \"name\": \"Jinge Liu\"}, {\"authorId\": \"5296548\", \"name\": \"Yinglun Fan\"}, {\"authorId\": \"6066884\", \"name\": \"Qiaolin Zheng\"}, {\"authorId\": \"50319188\", \"name\": \"Hongyan Zhu\"}], \"abstract\": null}, {\"paperId\": \"048ecba37bfc3682c97385950e9202b1ed4b4340\", \"externalIds\": {\"PubMedCentral\": \"9795334\", \"DOI\": \"10.1016/j.crmeth.2022.100354\", \"CorpusId\": 254311270, \"PubMed\": \"36590688\"}, \"title\": \"A culture platform to study quiescent hematopoietic stem cells following genome editing\", \"venue\": \"Cell Reports Methods\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.crmeth.2022.100354\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9795334, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4294888\", \"name\": \"K. Shiroshita\"}, {\"authorId\": \"2115789353\", \"name\": \"Hiroshi Kobayashi\"}, {\"authorId\": \"39144088\", \"name\": \"Shintaro Watanuki\"}, {\"authorId\": \"3718104\", \"name\": \"Daiki Karigane\"}, {\"authorId\": \"116644350\", \"name\": \"Yuriko Sorimachi\"}, {\"authorId\": \"46297750\", \"name\": \"S. Fujita\"}, {\"authorId\": \"5191356\", \"name\": \"Shinpei Tamaki\"}, {\"authorId\": \"2045396862\", \"name\": \"Miho Haraguchi\"}, {\"authorId\": \"1390055258\", \"name\": \"Naoki Itokawa\"}, {\"authorId\": \"2193921165\", \"name\": \"Kazumasa Aoyoama\"}, {\"authorId\": \"31342842\", \"name\": \"S. Koide\"}, {\"authorId\": \"12476244\", \"name\": \"Y. Masamoto\"}, {\"authorId\": \"87030285\", \"name\": \"Kent D. Kobayashi\"}, {\"authorId\": \"1398911418\", \"name\": \"A. Nakamura-Ishizu\"}, {\"authorId\": \"145798353\", \"name\": \"M. Kurokawa\"}, {\"authorId\": \"6499732\", \"name\": \"A. Iwama\"}, {\"authorId\": \"145351485\", \"name\": \"S. Okamoto\"}, {\"authorId\": \"35438168\", \"name\": \"K. Kataoka\"}, {\"authorId\": \"34960959\", \"name\": \"K. Takubo\"}], \"abstract\": \"Summary Other than genetically engineered mice, few reliable platforms are available for the study of hematopoietic stem cell (HSC) quiescence. Here we present a platform to analyze HSC cell cycle quiescence by combining culture conditions that maintain quiescence with a CRISPR-Cas9 genome editing system optimized for HSCs. We demonstrate that preculture of HSCs enhances editing efficiency by facilitating nuclear transport of ribonucleoprotein complexes. For post-editing culture, mouse and human HSCs edited based on non-homologous end joining and cultured under low-cytokine, low-oxygen, and high-albumin conditions retain their phenotypes and quiescence better than those cultured under the proliferative conditions. Using this approach, HSCs regain quiescence even after editing by homology-directed repair. Our results show that low-cytokine culture conditions for gene-edited HSCs are a useful approach for investigating HSC quiescence ex vivo.\"}, {\"paperId\": \"048ef00d5fab07f59ad8ae573885bf5975e8696f\", \"externalIds\": {\"DOI\": \"10.1016/j.ymeth.2021.03.001\", \"CorpusId\": 232209173, \"PubMed\": \"33705859\"}, \"title\": \"A robust method for protein depletion based on gene editing.\", \"venue\": \"Methods\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymeth.2021.03.001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymeth.2021.03.001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108576381\", \"name\": \"Yanhui Yang\"}, {\"authorId\": \"3457113\", \"name\": \"Wenyi Wu\"}, {\"authorId\": \"2111151175\", \"name\": \"Tong Liu\"}, {\"authorId\": \"2152287856\", \"name\": \"Lijun Dong\"}, {\"authorId\": \"6590189\", \"name\": \"Hetian Lei\"}], \"abstract\": \"The technology of clustered regularly interspaced short palindromic repeats (CRISPR)-associated nuclease Cas9 (CRISPR-Cas9) is a powerful system for protein depletion resulting from insertions and deletions following Cas9 cleavage of genome at specific site in vitro and in vivo. We herein present a relatively standard protocol for protein depletion in a step-by-step procedure, including guide RNA designation and vector construction, lentivirus production, cell selection, and experimentally validate the function of targeted protein. We exemplified this approach by editing PDGFR\\u03b2 in human epithelial cells, and expected that this simplified and detailed protocol will be more broadly applied on specific genes to aid understanding gene functions.\"}, {\"paperId\": \"04901916d5f7e2157ade239401f9c2fd70c77296\", \"externalIds\": {\"PubMedCentral\": \"10970532\", \"DOI\": \"10.3390/ijms25063440\", \"CorpusId\": 268603918, \"PubMed\": \"38542412\"}, \"title\": \"Systematic Identification of Long Noncoding RNAs during Three Key Organogenesis Stages in Zebrafish\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/25/6/3440/pdf?version=1710829766\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10970532, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6960371\", \"name\": \"Chune Zhou\"}, {\"authorId\": \"2384803573\", \"name\": \"Mengting Li\"}, {\"authorId\": \"2018496295\", \"name\": \"Yaoyi Sun\"}, {\"authorId\": \"2244470209\", \"name\": \"Yousef Sultan\"}, {\"authorId\": \"2292590188\", \"name\": \"Xiaoyu Li\"}], \"abstract\": \"Thousands of lncRNAs have been found in zebrafish embryogenesis and adult tissues, but their identification and organogenesis-related functions have not yet been elucidated. In this study, high-throughput sequencing was performed at three different organogenesis stages of zebrafish embryos that are important for zebrafish muscle development. The three stages were 10 hpf (hours post fertilization) (T1), 24 hpf (T2), and 36 hpf (T3). LncRNA gas5, associated with muscle development, was screened out as the next research target by high-throughput sequencing and qPCR validation. The spatiotemporal expression of lncRNA gas5 in zebrafish embryonic muscle development was studied through qPCR and in situ hybridization, and functional analysis was conducted using CRISPR/Cas9 (clustered regularly interspaced short palindromic repeats/Cas9, CRISPR/Cas9). The results were as follows: (1) A total of 1486 differentially expressed lncRNAs were identified between T2 and T1, among which 843 lncRNAs were upregulated and 643 were downregulated. The comparison with T3 and T2 resulted in 844 differentially expressed lncRNAs, among which 482 lncRNAs were upregulated and 362 lncRNAs were downregulated. A total of 2137 differentially expressed lncRNAs were found between T3 and T1, among which 1148 lncRNAs were upregulated and 989 lncRNAs were downregulated, including lncRNA gas5, which was selected as the target gene. (2) The results of spatiotemporal expression analysis showed that lncRNA gas5 was expressed in almost all detected embryos of different developmental stages (0, 2, 6, 10, 16, 24, 36, 48, 72, 96 hpf) and detected tissues of adult zebrafish. (3) After lncRNA gas5 knockout using CRISPR/Cas9 technology, the expression levels of detected genes related to muscle development and adjacent to lncRNA gas5 were more highly affected in the knockout group compared with the control group, suggesting that lncRNA gas5 may play a role in embryonic muscle development in zebrafish. (4) The results of the expression of the skeletal myogenesis marker myod showed that the expression of myod in myotomes was abnormal, suggesting that skeletal myogenesis was affected after lncRNA gas5 knockout. The results of this study provide an experimental basis for further studies on the role of lncRNA gas5 in the embryonic skeletal muscle development of zebrafish.\"}, {\"paperId\": \"04932cf39fa19f67e7984161cbc4882727514a17\", \"externalIds\": {\"CorpusId\": 218858723}, \"title\": \"Genome-wide CRISPR-Cas9 screen reveals common factors in dsRNA and Sindbis virus- induced cell death\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"3169779\", \"name\": \"O. Petitjean\"}, {\"authorId\": \"49845836\", \"name\": \"Erika Girardi\"}, {\"authorId\": \"6095547\", \"name\": \"R. P. Ngondo\"}, {\"authorId\": \"4186218\", \"name\": \"Vladimir V. Lupashin\"}, {\"authorId\": \"2231052\", \"name\": \"S. Pfeffer\"}], \"abstract\": null}, {\"paperId\": \"049363ad011bd20894d43a011fcac6df263b5679\", \"externalIds\": {\"DOI\": \"10.59785/tjhest.v2i1.44\", \"CorpusId\": 268306080}, \"title\": \"The Impact of Early Genes and Gene Editing Technology Associated with Clustered Repeats on the Development of Human Body Organs\", \"venue\": \"Tamjeed Journal of Healthcare Engineering and Science Technology\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://tamjed.com/index.php/TJHEST/article/download/44/30\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.59785/tjhest.v2i1.44?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.59785/tjhest.v2i1.44, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2291242561\", \"name\": \"A. Shaheen\"}], \"abstract\": \"Early growth response 1 (EGR-1) and homeobox (Hox) proteins play crucial roles in regulating genes within the body, promoting cell renewal, and expediting the wound healing process. Conversely, Clustered Regularly Interspaced Palindromic Re-peats/Associated (CRISPR-Cas) technology is primarily involved in gene editing. However, significant gaps persist in understanding the mechanisms of key genes like EGR-1, CRISPR/Cas, and HOX genes in organ development. Unveiling their mechanisms is crucial for advancing organ development and discovering new therapeutic strategies. This study aims to investigate the roles of EGR-1, CRISPR/Cas, and HOX genes in organ development and growth. The study used CRISPR/Cas to investigate the impact of catalase mutations on organ regeneration. Early embryonic mutants were generated by injecting gRNAs and Cas9 protein into zygotes, followed by tail amputation in larvae. Additionally, the study explored the role of specific Hox genes in axon elongation and Wnt signaling regulation. EGR-1, induced by TGF-\\u03b21, enhanced collagen production, underscoring its importance in wound healing. Integration of EGR-1, HOX proteins, and CRISPR-Cas revealed a regulatory complex influencing organ development. The integration of EGR-1, HOX proteins, and CRISPR-Cas revealed a regulatory complex. EGR-1 aids wound healing, HOX proteins influence fetal development and organ formation, and CRISPR-Cas enables precise genome modifications.\"}, {\"paperId\": \"049435f41c002a400ee85d0f153dde65a022d158\", \"externalIds\": {\"PubMedCentral\": \"11754652\", \"DOI\": \"10.1093/nar/gkae1236\", \"CorpusId\": 274893399, \"PubMed\": \"39704119\"}, \"title\": \"A tunable and reversible thermo-inducible bio-switch for streptomycetes\", \"venue\": \"Nucleic Acids Research\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/nar/gkae1236\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11754652, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2327200961\", \"name\": \"Lanxin Lv\"}, {\"authorId\": \"2268173195\", \"name\": \"Shuo Liu\"}, {\"authorId\": \"1892344701\", \"name\": \"Yudie Fu\"}, {\"authorId\": \"2324808441\", \"name\": \"Yuxin Zhang\"}, {\"authorId\": \"2324935165\", \"name\": \"Meiyan Wang\"}, {\"authorId\": \"2124183674\", \"name\": \"Jiahe Sun\"}, {\"authorId\": \"2154459748\", \"name\": \"Yi Wang\"}, {\"authorId\": \"2323003409\", \"name\": \"Yinhua Lu\"}, {\"authorId\": \"2253543460\", \"name\": \"Guoqing Niu\"}], \"abstract\": \"Abstract Programmable control of bacterial gene expression holds great significance for both applied and academic research. This is particularly true for Streptomyces, a genus of Gram-positive bacteria and major producers of prodigious natural products. Despite that a few inducible regulatory systems have been developed for use in Streptomyces, there is an increasing pursuit to augment the toolkit of high-performance induction systems. We herein report a robust and reversible thermo-inducible bio-switch, designated as StrepT-switch. This bio-switch enables tunable and reversible control of gene expression using physiological temperatures as stimulation inputs. It has been proven successful in highly efficient CRISPR/Cas9-mediated genome engineering, as well as programmable control of antibiotic production and morphological differentiation. The versatility of the device is also demonstrated by thermal induction of a site-specific relaxase ZouA for overproduction of actinorhodin, a blue pigmented polyketide antibiotic. This study showcases the exploration a temperature-sensing module and exemplifies its versatility for programmable control of various target genes in Streptomyces species.\"}, {\"paperId\": \"049718d94c571a61d08d974bad853b3591999882\", \"externalIds\": {\"PubMedCentral\": \"10298023\", \"DOI\": \"10.3390/genes14061264\", \"CorpusId\": 259269662, \"PubMed\": \"37372444\"}, \"title\": \"Meg8-DMR as the Secondary Regulatory Region Regulates the Expression of MicroRNAs While It Does Not Affect Embryonic Development in Mice\", \"venue\": \"Genes\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4425/14/6/1264/pdf?version=1686796827\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10298023, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146643095\", \"name\": \"Liang Zhang\"}, {\"authorId\": \"6945158\", \"name\": \"Zhengbin Han\"}, {\"authorId\": \"7146566\", \"name\": \"Hongjuan He\"}, {\"authorId\": \"2181201875\", \"name\": \"Ximeijia Zhang\"}, {\"authorId\": \"2153203362\", \"name\": \"Mengyan Zhang\"}, {\"authorId\": \"2381409859\", \"name\": \"Boran Li\"}, {\"authorId\": \"1696283\", \"name\": \"Qiong Wu\"}], \"abstract\": \"Meg8-DMR is the first maternal methylated DMR to be discovered in the imprinted Dlk1-Dio3 domain. The deletion of Meg8-DMR enhances the migration and invasion of MLTC-1 depending on the CTCF binding sites. However, the biological function of Meg8-DMR during mouse development remains unknown. In this study, a CRISPR/Cas9 system was used to generate 434 bp genomic deletions of Meg8-DMR in mice. High-throughput and bioinformatics profiling revealed that Meg8-DMR is involved in the regulation of microRNA: when the deletion was inherited from the mother (Mat-KO), the expression of microRNA was unchanged. However, when the deletion occurred from the father (Pat-KO) and homozygous (Homo-KO), the expression was upregulated. Then, differentially expressed microRNAs (DEGs) were identified between WT with Pat-KO, Mat-KO, and Homo-KO, respectively. Subsequently, these DEGs were subjected to the Kyoto Encyclopedia of Genes and Genomes (KEGG) pathway and Gene Ontology (GO) term enrichment analysis to explore the functional roles of these genes. In total, 502, 128, and 165 DEGs were determined. GO analysis showed that these DEGs were mainly enriched in axonogenesis in Pat-KO and Home-KO, while forebrain development was enriched in Mat-KO. Finally, the methylation levels of IG-DMR, Gtl2-DMR, and Meg8-DMR, and the imprinting status of Dlk1, Gtl2, and Rian were not affected. These findings suggest that Meg8-DMR, as a secondary regulatory region, could regulate the expression of microRNAs while not affecting the normal embryonic development of mice.\"}, {\"paperId\": \"04973238cc885ca191499e00228d1c79ca3c6249\", \"externalIds\": {\"MAG\": \"3001685890\", \"PubMedCentral\": \"6990120\", \"DOI\": \"10.3389/fphys.2019.01612\", \"CorpusId\": 210840318, \"PubMed\": \"32038292\"}, \"title\": \"Familial Dilated Cardiomyopathy Associated With a Novel Combination of Compound Heterozygous TNNC1 Variants\", \"venue\": \"Frontiers in Physiology\", \"year\": 2020, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fphys.2019.01612/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6990120, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1405364413\", \"name\": \"Maicon Landim-Vieira\"}, {\"authorId\": \"48172452\", \"name\": \"Jamie R Johnston\"}, {\"authorId\": \"67245260\", \"name\": \"W. Ji\"}, {\"authorId\": \"50557918\", \"name\": \"E. Mis\"}, {\"authorId\": \"1620868329\", \"name\": \"Joshua Tijerino\"}, {\"authorId\": \"1402650028\", \"name\": \"Michele Spencer-Manzon\"}, {\"authorId\": \"31270423\", \"name\": \"L. Jeffries\"}, {\"authorId\": \"32072179\", \"name\": \"E. K. Hall\"}, {\"authorId\": \"1401465678\", \"name\": \"David Panisello-Manterola\"}, {\"authorId\": \"2682050\", \"name\": \"M. Khokha\"}, {\"authorId\": \"39385330\", \"name\": \"E. Deniz\"}, {\"authorId\": \"144298582\", \"name\": \"P. Chase\"}, {\"authorId\": \"4197527\", \"name\": \"S. Lakhani\"}, {\"authorId\": \"145961079\", \"name\": \"J. Pinto\"}], \"abstract\": \"Familial dilated cardiomyopathy (DCM), clinically characterized by enlargement and dysfunction of one or both ventricles of the heart, can be caused by variants in sarcomeric genes including TNNC1 (encoding cardiac troponin C, cTnC). Here, we report the case of two siblings with severe, early onset DCM who were found to have compound heterozygous variants in TNNC1: p.Asp145Glu (D145E) and p.Asp132Asn (D132N), which were inherited from the parents. We began our investigation with CRISPR/Cas9 knockout of TNNC1 in Xenopus tropicalis, which resulted in a cardiac phenotype in tadpoles consistent with DCM. Despite multiple maneuvers, we were unable to rescue the tadpole hearts with either human cTnC wild-type or patient variants to investigate the cardiomyopathy phenotype in vivo. We therefore utilized porcine permeabilized cardiac muscle preparations (CMPs) reconstituted with either wild-type or patient variant forms of cTnC to examine effects of the patient variants on contractile function. Incorporation of 50% WT/50% D145E into CMPs increased Ca2+ sensitivity of isometric force, consistent with prior studies. In contrast, incorporation of 50% WT/50% D132N, which had not been previously reported, decreased Ca2+ sensitivity of isometric force. CMPs reconstituted 50\\u201350% with both variants mirrored WT in regard to myofilament Ca2+ responsiveness. Sinusoidal stiffness (SS) (0.2% peak-to-peak) and the kinetics of tension redevelopment (kTR) at saturating Ca2+ were similar to WT for all preparations. Modeling of Ca2+-dependence of kTR support the observation from Ca2+ responsiveness of steady-state isometric force, that the effects on each mutant (50% WT/50% mutant) were greater than the combination of the two mutants (50% D132N/50% D145E). Further studies are needed to ascertain the mechanism(s) of these variants.\"}, {\"paperId\": \"0498293d86f58f7883bf7d957633e90d65518694\", \"externalIds\": {\"DOI\": \"10.1126/scitranslmed.abb3312\", \"CorpusId\": 237402137, \"PubMed\": \"34516825\"}, \"title\": \"JUN promotes hypertrophic skin scarring via CD36 in preclinical in vitro and in vivo models\", \"venue\": \"Science Translational Medicine\", \"year\": 2021, \"citationCount\": 88, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8988368\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/scitranslmed.abb3312?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/scitranslmed.abb3312, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145943111\", \"name\": \"M. Griffin\"}, {\"authorId\": \"33148021\", \"name\": \"M. Borrelli\"}, {\"authorId\": \"39561215\", \"name\": \"Julia T. Garcia\"}, {\"authorId\": \"3460851\", \"name\": \"Michael Januszyk\"}, {\"authorId\": \"115595641\", \"name\": \"M. King\"}, {\"authorId\": \"1585362223\", \"name\": \"Tristan Lerbs\"}, {\"authorId\": \"48897676\", \"name\": \"L. Cui\"}, {\"authorId\": \"10159110\", \"name\": \"A. Moore\"}, {\"authorId\": \"6959940\", \"name\": \"Abra H. Shen\"}, {\"authorId\": \"9965649\", \"name\": \"Shamik Mascharak\"}, {\"authorId\": \"1442138334\", \"name\": \"Nestor M Diaz Deleon\"}, {\"authorId\": \"1442150493\", \"name\": \"Sandeep Adem\"}, {\"authorId\": \"2114766509\", \"name\": \"Walter L. Taylor\"}, {\"authorId\": \"1410470895\", \"name\": \"H. desJardins-Park\"}, {\"authorId\": \"4755526\", \"name\": \"M. Gastou\"}, {\"authorId\": \"153780743\", \"name\": \"Ronak A. Patel\"}, {\"authorId\": \"46256350\", \"name\": \"Bryan A. Duoto\"}, {\"authorId\": \"31416351\", \"name\": \"Jan Sokol\"}, {\"authorId\": \"7506024\", \"name\": \"Yuning Wei\"}, {\"authorId\": \"38625709\", \"name\": \"Deshka S. Foster\"}, {\"authorId\": \"1600306722\", \"name\": \"Kellen Chen\"}, {\"authorId\": \"2334298\", \"name\": \"D. Wan\"}, {\"authorId\": \"1850709\", \"name\": \"G. Gurtner\"}, {\"authorId\": \"3603135\", \"name\": \"H. Lorenz\"}, {\"authorId\": \"1877076\", \"name\": \"Howard Y. Chang\"}, {\"authorId\": \"5908114\", \"name\": \"G. Wernig\"}, {\"authorId\": \"4758079\", \"name\": \"M. Longaker\"}], \"abstract\": \"Description JUN drives scarring by modifying the roles of fibroblast subpopulations, and JUN antagonism via CD36 may represent an antiscarring therapy. Scar wars Scars developing after skin wound can cause important functional, aesthetic, psychological, and social consequences. The mechanisms mediating scar formation after skin wound remain to be completely elucidated. Here, Griffin et al. showed that pathological scarring induced by overexpressing JUN in mice was mediated by CD36-dependent fibroblast modulation that resulted in increased fibrosis at the site of injury. Pharmacological CD36 inhibition with salvianolic acid B reduced the fibrosis process in human fibroblasts and scar formation in Jun-overexpressing mice. The results suggest that targeting CD36 might be effective in reducing hypertrophic scar formation during skin wound healing. Pathologic skin scarring presents a vast economic and medical burden. Unfortunately, the molecular mechanisms underlying scar formation remain to be elucidated. We used a hypertrophic scarring (HTS) mouse model in which Jun is overexpressed globally or specifically in \\u03b1-smooth muscle or collagen type I\\u2013expressing cells to cause excessive extracellular matrix deposition by skin fibroblasts in the skin after wounding. Jun overexpression triggered dermal fibrosis by modulating distinct fibroblast subpopulations within the wound, enhancing reticular fibroblast numbers, and decreasing lipofibroblasts. Analysis of human scars further revealed that JUN is highly expressed across the wide spectrum of scars, including HTS and keloids. CRISPR-Cas9\\u2013mediated JUN deletion in human HTS fibroblasts combined with epigenomic and transcriptomic analysis of both human and mouse HTS fibroblasts revealed that JUN initiates fibrosis by regulating CD36. Blocking CD36 with salvianolic acid B or CD36 knockout model counteracted JUN-mediated fibrosis efficacy in both human fibroblasts and mouse wounds. In summary, JUN is a critical regulator of pathological skin scarring, and targeting its downstream effector CD36 may represent a therapeutic strategy against scarring.\"}, {\"paperId\": \"0498a0bfe6122687d5ee809b979384e8df135226\", \"externalIds\": {\"MAG\": \"3007669135\", \"DOI\": \"10.1016/b978-0-12-818140-9.00009-x\", \"CorpusId\": 213587679}, \"title\": \"CRISPR-Cas9 for therapy: the challenges and ways to overcome them\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/b978-0-12-818140-9.00009-x?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/b978-0-12-818140-9.00009-x, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"91768712\", \"name\": \"S. Acharya\"}, {\"authorId\": \"2385951\", \"name\": \"S. Maiti\"}, {\"authorId\": \"35346312\", \"name\": \"D. Chakraborty\"}], \"abstract\": \"Abstract Clustered regularly interspaced short palindromic repeat/CRISPR-associated (CRISPR Cas) is a component of the prokaryotic adaptive immune system which has been repurposed for genome editing in recent years. The precision, simplicity and flexibility of this system have opened up a broad range of biological applications covering basic research to biotechnology and medicine. Additionally, the multiplexing capabilities of CRISPR offers a promising approach for modeling or correcting common polygenic disorders along with its monogenic and infectious counterparts. Although CRISPR is not completely precise and questions remain regarding its specificity and modes of delivery, the robustness and wide applicability of this genome editing tool has opened up numerous ways to address these issues. In this chapter, we will discuss about initial progress toward CRISPR therapeutics, existing delivery modalities, the challenges before CRISPR editing before it becomes a therapeutic possibility and the ongoing efforts toward developing a perfect CRISPR system for bench to bedside application.\"}, {\"paperId\": \"04992d7174dc01ef8c488f580deb7414b11d54c7\", \"externalIds\": {\"DOI\": \"10.1126/science.add8643\", \"CorpusId\": 255966509, \"PubMed\": \"36656942\"}, \"title\": \"CRISPR technology: A decade of genome editing is only the beginning\", \"venue\": \"Science\", \"year\": 2023, \"citationCount\": 774, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/science.add8643?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/science.add8643, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2110239882\", \"name\": \"Joy Y. Wang\"}, {\"authorId\": \"4448238\", \"name\": \"J. Doudna\"}], \"abstract\": \"The advent of clustered regularly interspaced short palindromic repeat (CRISPR) genome editing, coupled with advances in computing and imaging capabilities, has initiated a new era in which genetic diseases and individual disease susceptibilities are both predictable and actionable. Likewise, genes responsible for plant traits can be identified and altered quickly, transforming the pace of agricultural research and plant breeding. In this Review, we discuss the current state of CRISPR-mediated genetic manipulation in human cells, animals, and plants along with relevant successes and challenges and present a roadmap for the future of this technology. Description A decade of CRISPR In the decade since the publication of CRISPR-Cas9 as a genome-editing technology, the CRISPR toolbox and its applications have profoundly changed basic and applied biological research. Wang and Doudna now review the origins and utility of CRISPR-based genome editing, the successes and current limitations of the technology, and where innovation and engineering are needed. The authors describe important advances in the development of CRISPR genome-editing technology and make predictions about where the field is headed. They also highlight specific examples in medicine and agriculture that show how CRISPR is already affecting society, with exciting opportunities for the future. \\u2014DJ A review discusses the current state of CRISPR-mediated genetic manipulation in human cells, animals, and plants and considers its future potential. BACKGROUND The fields of molecular biology, genetics, and genomics are at a critical juncture\\u2014a moment in history when a convergence of knowledge and methods has made it both technically possible and incredibly useful to edit specific base pairs or segments of DNA in cells and living organisms. The advent of clustered regularly interspaced short palindromic repeat (CRISPR) genome editing, coupled with advances in computing and imaging capabilities, has initiated a new era in which we can not only diagnose human diseases and even predict individual susceptibility based on personal genetics but also act on that information. Likewise, we can both identify and rapidly alter genes responsible for plant traits, transforming the pace of agricultural research and plant breeding. The applications of this technology convergence are profound and far reaching\\u2014and they are happening now. In the decade since the publication of CRISPR-Cas9 as a genome editing technology, the CRISPR toolbox and its applications have profoundly changed biological research, impacting not only patients with genetic diseases but also agricultural practices and products. As a specific example from the field of genomic medicine, it has become feasible to obtain a complete sequence of the human genome in less than 24 hours\\u2014a staggering advance considering the first such sequence took 5 years to generate. Notably, designing and putting to use a potent CRISPR genome editor to obtain clinically actionable information from that genome\\u2014previously a near-intractable challenge\\u2014now takes only a matter of days. For additional background and related topics, we refer readers to in-depth reviews of the microbiology and structural biology of CRISPR systems and to articles about the considerable ethical and societal challenges of this technology. ADVANCES The past decade has witnessed the discovery, engineering, and deployment of RNA-programmed genome editors across many applications. By leveraging CRISPR-Cas9\\u2019s most fundamental activity to create a targeted genetic disruption in a gene or gene regulatory element, scientists have built successful platforms for the rapid creation of knockout mice and other animal models, genetic screening, and multiplexed editing. Beyond traditional CRISPR-Cas9\\u2013induced knockouts, base editing\\u2014a technology utilizing engineered Cas9\\u2019s fused to enzymes that alter the chemical nature of DNA bases\\u2014has also provided a highly useful strategy to generate site-specific and precise point mutations. Over the past decade, scientists have utilized CRISPR technology as a readily adaptable tool to probe biological function, dissect genetic interactions, and inform strategies to combat human diseases and engineer crops. This Review covers the origins and successes of CRISPR-based genome editing and discusses the most pressing challenges, which include improving editing accuracy and precision, implementing strategies for precise programmable genetic sequence insertions, improving targeted delivery of CRISPR editors, and increasing access and affordability. We examine current efforts addressing these challenges, including emerging gene insertion technologies and new delivery modalities, and describe where further innovation and engineering are needed. CRISPR genome editors are already being deployed in medicine and agriculture, and this Review highlights key examples, including a CRISPR-based therapy treating sickle cell disease, a more nutritious CRISPR-edited tomato, and a high-yield, disease-resistant CRISPR-edited wheat, to illustrate CRISPR\\u2019s current and potential future impacts in society. OUTLOOK In the decade ahead, genome editing research and applications will continue to expand and will intersect with advances in technologies, such as machine learning, live cell imaging, and sequencing. A combination of discovery and engineering will diversify and refine the CRISPR toolbox to combat current challenges and enable more wide-ranging applications in both fundamental and applied research. Just as during the advent of CRISPR genome editing, a combination of scientific curiosity and the desire to benefit society will drive the next decade of innovation in CRISPR technology. CRISPR: past, present, and future. The past decade of CRISPR technology has focused on building the platforms for generating gene knockouts, creating knockout mice and other animal models, genetic screening, and multiplexed editing. CRISPR\\u2019s applications in medicine and agriculture are already beginning and will serve as the focus for the next decade as society\\u2019s demands drive further innovation in CRISPR technology.\"}, {\"paperId\": \"049a12500a8cf7409b190cdc83866ebef30d0ab4\", \"externalIds\": {\"DOI\": \"10.1111/imb.12819\", \"CorpusId\": 253498743, \"PubMed\": \"36371609\"}, \"title\": \"CRISPR/Cas9\\u2010mediated methoprene\\u2010tolerant 1 knockout results in precocious metamorphosis of beet armyworm (Spodoptera exigua) only at the late larval stage\", \"venue\": \"Insect molecular biology (Print)\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/imb.12819?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/imb.12819, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2151692657\", \"name\": \"Jing Zhao\"}, {\"authorId\": \"8250746\", \"name\": \"Yongan Tan\"}, {\"authorId\": \"1510735788\", \"name\": \"Yiping Jiang\"}, {\"authorId\": \"1398610859\", \"name\": \"K. Zhu\\u2010Salzman\"}, {\"authorId\": \"2218970\", \"name\": \"Liu-bin Xiao\"}], \"abstract\": \"Juvenile hormone (JH) controls almost every aspect of an insect, especially metamorphosis. Since RNA interference works on transcripts and is often insufficient in Lepidoptera, how JH affects larval development in these insects is not well studied. Using the CRISPR/Cas9 technique, we knocked out Spodoptera exigua methoprene\\u2010tolerant 1 (SeMet1) gene of beet armyworm by modifying two sites in the coding region. However, SeMet1 knockout did not affect egg hatch rate or larval development at L1\\u2013L3 stages. In contrast to the consistent five larval instars of the control group, L4 SeMet1 mutants began to show signs of precocious metamorphosis, that is, small patches of pupal cuticle. Most L4 and all L5 SeMet1 mutants died for failing to shed their mosaic cuticles. RNA\\u2010seq indicated that most genes encoding pupal cuticle proteins and chitinase genes were altered in SeMet1 mutant L4 larvae. SeKr\\u2010h1, a key transcription factor in JH action was significantly down\\u2010regulated in L3\\u2010L5 larvae, while SeBR\\u2010C, a pupal indicator was only upregulated in L4\\u2010L5 larvae. These results suggested that S. exigua larvae may initially develop independently of JH, and involve SeMet1 in transducing JH signalling, leading to controlled larval metamorphosis at the late larval stage. We believe our findings will enhance better understanding of JH regulation of larval development.\"}, {\"paperId\": \"049e49f8b9fa54338f2371d831f4e04d2113c6fc\", \"externalIds\": {\"PubMedCentral\": \"8541823\", \"DOI\": \"10.1523/ENEURO.0193-21.2021\", \"CorpusId\": 238475089, \"PubMed\": \"34620624\"}, \"title\": \"A Novel Neuron-Specific Regulator of the V-ATPase in Drosophila\", \"venue\": \"eNeuro\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.eneuro.org/content/eneuro/8/5/ENEURO.0193-21.2021.full.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8541823, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51057932\", \"name\": \"Amina Dulac\"}, {\"authorId\": \"6326679\", \"name\": \"Abdul-Raouf Issa\"}, {\"authorId\": \"2111629575\", \"name\": \"June Sun\"}, {\"authorId\": \"5419726\", \"name\": \"G. Matassi\"}, {\"authorId\": \"2131389263\", \"name\": \"C\\u00e9lia Jonas\"}, {\"authorId\": \"1435837292\", \"name\": \"B. Ch\\u00e9rif-Zahar\"}, {\"authorId\": \"8258896\", \"name\": \"D. Cattaert\"}, {\"authorId\": \"144090828\", \"name\": \"S. Birman\"}], \"abstract\": \"Abstract The V-ATPase is a highly conserved enzymatic complex that ensures appropriate levels of organelle acidification in virtually all eukaryotic cells. While the general mechanisms of this proton pump have been well studied, little is known about the specific regulations of neuronal V-ATPase. Here, we studied CG31030, a previously uncharacterized Drosophila protein predicted from its sequence homology to be part of the V-ATPase family. In contrast to its ortholog ATP6AP1/VhaAC45 which is ubiquitous, we observed that CG31030 expression is apparently restricted to all neurons, and using CRISPR/Cas9-mediated gene tagging, that it is mainly addressed to synaptic terminals. In addition, we observed that CG31030 is essential for fly survival and that this protein co-immunoprecipitates with identified V-ATPase subunits, and in particular ATP6AP2. Using a genetically-encoded pH probe (VMAT-pHluorin) and electrophysiological recordings at the larval neuromuscular junction, we show that CG31030 knock-down induces a major defect in synaptic vesicle acidification and a decrease in quantal size, which is the amplitude of the postsynaptic response to the release of a single synaptic vesicle. These defects were associated with severe locomotor impairments. Overall, our data indicate that CG31030, which we renamed VhaAC45-related protein (VhaAC45RP), is a specific regulator of neuronal V-ATPase in Drosophila that is required for proper synaptic vesicle acidification and neurotransmitter release.\"}, {\"paperId\": \"049f4c24fd5af17eba3e45a5d38d12a22c25bb1c\", \"externalIds\": {\"PubMedCentral\": \"9374221\", \"DOI\": \"10.1371/journal.pone.0272950\", \"CorpusId\": 251516861, \"PubMed\": \"35960733\"}, \"title\": \"A high-quality severe combined immunodeficiency (SCID) rat bioresource\", \"venue\": \"PLoS ONE\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0272950&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9374221, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"41022134\", \"name\": \"Y. Miyasaka\"}, {\"authorId\": \"2181287580\", \"name\": \"Jinxi Wang\"}, {\"authorId\": \"1785421162\", \"name\": \"Kosuke Hattori\"}, {\"authorId\": \"1990668003\", \"name\": \"Y. Yamauchi\"}, {\"authorId\": \"33359171\", \"name\": \"Miho Hoshi\"}, {\"authorId\": \"13960819\", \"name\": \"K. Yoshimi\"}, {\"authorId\": \"4859852\", \"name\": \"Saeko Ishida\"}, {\"authorId\": \"5533297\", \"name\": \"T. Mashimo\"}], \"abstract\": \"Immunodeficient animals are valuable models for the engraftment of exogenous tissues; they are widely used in many fields, including the creation of humanized animal models, as well as regenerative medicine and oncology. Compared with mice, laboratory rats have a larger body size and can more easily undergo transplantation of various tissues and organs. Considering the absence of high-quality resources of immunodeficient rats, we used the CRISPR/Cas9 genome editing system to knock out the interleukin-2 receptor gamma chain gene (Il2rg) in F344/Jcl rats\\u2014alone or together with recombination activating gene 2 (Rag2)\\u2014to create a high-quality bioresource that researchers can freely use: severe combined immunodeficiency (SCID) rats. We selected one founder rat with frame-shift mutations in both Il2rg (5-bp del) and Rag2 ([1-bp del+2-bp ins]/[7-bp del+2-bp ins]), then conducted mating to establish a line of immunodeficient rats. The immunodeficiency phenotype was preliminarily confirmed by the presence of severe thymic hypoplasia in Il2rg-single knockout (sKO) and Il2rg/Rag2-double knockout (dKO) rats. Assessment of blood cell counts in peripheral blood showed that the white blood cell count was significantly decreased in sKO and dKO rats, while the red blood cell count was unaffected. The decrease in white blood cell count was mainly caused by a decrease in lymphocytes. Furthermore, analyses of lymphocyte populations via flow cytometry showed that the numbers of B cells (CD3- CD45+) and natural killer cells (CD3- CD161+) were markedly reduced in both knockout rats. In contrast, T cells were markedly reduced but showed slightly different results between sKO and dKO rats. Notably, our immunodeficient rats do not exhibit growth retardation or gametogenesis defects. This high-quality SCID rat resource is now managed by the National BioResource Project in Japan. Our SCID rat model has been used in various research fields, demonstrating its importance as a bioresource.\"}, {\"paperId\": \"04a0588c414e8fd94bb8710e22c0b609a49c0db5\", \"externalIds\": {\"PubMedCentral\": \"9379399\", \"DOI\": \"10.7150/ijbs.72367\", \"CorpusId\": 251305009, \"PubMed\": \"35982891\"}, \"title\": \"The interactions between integrin \\u03b15\\u03b21 of liver cancer cells and fibronectin of fibroblasts promote tumor growth and angiogenesis\", \"venue\": \"International Journal on Biological Sciences\", \"year\": 2022, \"citationCount\": 29, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ijbs.com/v18p5019.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9379399, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1994002\", \"name\": \"Zheng-Hong Peng\"}, {\"authorId\": \"2035644432\", \"name\": \"Meng Hao\"}, {\"authorId\": \"50051601\", \"name\": \"Haibo Tong\"}, {\"authorId\": \"2144144936\", \"name\": \"Hongmei Yang\"}, {\"authorId\": \"2110783247\", \"name\": \"Bin Huang\"}, {\"authorId\": \"2144412004\", \"name\": \"Zhigang Zhang\"}, {\"authorId\": \"3841447\", \"name\": \"K. Luo\"}], \"abstract\": \"Hepatocellular carcinoma (HCC) progression is closely related to pathological fibrosis, which involves heterotypic intercellular interactions (HIIs) between liver cancer cells and fibroblasts. Here, we studied them in a direct coculture model, and identified fibronectin from fibroblasts and integrin-\\u03b15\\u03b21 from liver cancer cells as the primary responsible molecules utilizing CRISPR/Cas9 gene-editing technology. Coculture led to the formation of 3D multilayer microstructures, and obvious fibronectin remodeling was caused by upregulated integrin-\\u03b15\\u03b21, which greatly promoted cell growth in 3D microstructures. Integrin-\\u03b15 was more sensitive and specific than integrin-\\u03b21 in this process. Subsequent mechanistic exploration revealed the activation of integrin-Src-FAK, AKT and ERK signaling pathways. Importantly, the growth-promoting effect of HIIs was verified in a xenograft tumor model, in which more blood vessels were observed in bigger tumors derived from the coculture group than that derived from monocultured groups. Hence, we conducted triculture by introducing human umbilical vein endothelial cells, which aligned to and differentiated along multilayer microstructures in an integrin-\\u03b15\\u03b21 dependent manner. Furthermore, fibronectin, integrin-\\u03b15, and integrin-\\u03b21 were upregulated in 52 HCC tumors, and fibronectin was related to microvascular invasion. Our findings identify fibronectin, integrin-\\u03b15, and integrin-\\u03b21 as tumor microenvironment-related targets and provide a basis for combination targeted therapeutic strategies for future HCC treatment.\"}, {\"paperId\": \"04a2bdf7cdd093ff2c898fe093198686ffbf8c34\", \"externalIds\": {\"PubMedCentral\": \"9141053\", \"DOI\": \"10.3389/fpls.2022.885128\", \"CorpusId\": 248724555, \"PubMed\": \"35645997\"}, \"title\": \"RNA Interference for Improving Disease Resistance in Plants and Its Relevance in This Clustered Regularly Interspaced Short Palindromic Repeats-Dominated Era in Terms of dsRNA-Based Biopesticides\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.885128/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9141053, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"77536001\", \"name\": \"Koushik Halder\"}, {\"authorId\": \"38704210\", \"name\": \"Abira Chaudhuri\"}, {\"authorId\": \"2059407680\", \"name\": \"M. Z. Abdin\"}, {\"authorId\": \"6373686\", \"name\": \"Manoj Majee\"}, {\"authorId\": \"3234792\", \"name\": \"A. Datta\"}], \"abstract\": \"RNA interference (RNAi) has been exploited by scientists worldwide to make a significant contribution in the arena of sustainable agriculture and integrated pest management. These strategies are of an imperative need to guarantee food security for the teeming millions globally. The already established deleterious effects of chemical pesticides on human and livestock health have led researchers to exploit RNAi as a potential agri-biotechnology tool to solve the burning issue of agricultural wastage caused by pests and pathogens. On the other hand, CRISPR/Cas9, the latest genome-editing tool, also has a notable potential in this domain of biotic stress resistance, and a constant endeavor by various laboratories is in progress for making pathogen-resistant plants using this technique. Considerable outcry regarding the ill effects of genetically modified (GM) crops on the environment paved the way for the research of RNAi-induced double-stranded RNAs (dsRNA) and their application to biotic stresses. Here, we mainly focus on the application of RNAi technology to improve disease resistance in plants and its relevance in today\\u2019s CRISPR-dominated world in terms of exogenous application of dsRNAs. We also focused on the ongoing research, public awareness, and subsequent commercialization of dsRNA-based biocontrol products.\"}, {\"paperId\": \"04a435fe45d83cec4fab3c8b1426b604bb6aa877\", \"externalIds\": {\"PubMedCentral\": \"8310044\", \"DOI\": \"10.3390/vaccines9070786\", \"CorpusId\": 236319675, \"PubMed\": \"34358202\"}, \"title\": \"Fusion Protein Vaccine Based on Ag85B and STEAP1 Induces a Protective Immune Response against Prostate Cancer\", \"venue\": \"Vaccines\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2076-393X/9/7/786/pdf?version=1626252227\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8310044, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"27340175\", \"name\": \"Linpei Guo\"}, {\"authorId\": \"2117711401\", \"name\": \"Hui Xie\"}, {\"authorId\": \"2148905182\", \"name\": \"Zheng Zhang\"}, {\"authorId\": \"2108369727\", \"name\": \"Zhun Wang\"}, {\"authorId\": \"9391723\", \"name\": \"S. Peng\"}, {\"authorId\": \"6696038\", \"name\": \"Y. Niu\"}, {\"authorId\": \"7317092\", \"name\": \"Z. Shang\"}], \"abstract\": \"(1) Background: There are currently limited treatments for castration-resistant prostate cancer. Immunotherapy involving Sipuleucel-T has increasingly drawn attention for prostate cancer management. BCG plays a vital role in treating bladder cancer, mainly by inducing immune activation, but is rarely used for prostate cancer. (2) Methods: The TCGA database, PCR, and Western blotting were used to analyze the expression of STEAP1 in mouse and human tissues. Then, we constructed a fusion protein vaccine with Mycobacterium tuberculosis Ag85B and three repeated octapeptide epitopes of a six-transmembrane epithelial antigen of the prostate 1 (STEAP1186-193), Ag85B-3\\u00d7STEAP1186-193. The uptake of the fusion protein vaccine by DCs was evaluated by confocal microscopy, and DC markers were detected using flow cytometry after incubation with the fusion protein. The immune response against prostate cancer was evaluated by the LDH assay and xenografts in vitro and in vivo. Then, the tumor microenvironment was determined using IHC and ELISA. In addition, the epitope was mutated using CRISPR-Cas9 to illustrate that the fusion protein elicited immunization against STEAP1. (3) Results: The TCGA database analysis, PCR, and Western blotting showed that STEAP1 was highly expressed in human and murine prostate cancer. After the uptake of the purified fusion protein vaccine by DCs, CD11c, CD80, CD86, and MHC II were upregulated and triggered a cytotoxic T lymphocyte (CTL) response against TRAMP-C1 and RM1 cells in vitro. Furthermore, the fusion protein vaccine inhibited tumor growth and improved the tumor microenvironment in vivo, with more CD3+ cells and fewer FOXP3+ cells in the tumor. Serum IFN-\\u03b3 and IL-2 were significantly higher than in the control group, while IL-4 expression was lower, indicating that the fusion protein vaccine activated Th1 immunity. The immune response against prostate cancer was greatly suppressed when the antigen targets were knocked out using CRISPR-Cas9. (4) Conclusion: In summary, our results provide the first evidence that a vaccine based on a fusion protein consisting of Ag85B and a prostate cancer octapeptide epitope with complete Freund\\u2019s adjuvant (CFA), triggers a robust immune response and inhibits tumor growth in murine prostate cancer.\"}, {\"paperId\": \"04a57ab47b2385b58b14efdbcda5a058b3657fc0\", \"externalIds\": {\"DOI\": \"10.1161/circ.148.suppl_1.15747\", \"CorpusId\": 266380800}, \"title\": \"Abstract 15747: AMPK Cysteine Oxidation by SOD3-Derived H\\n 2\\n O\\n 2\\n Mediates Exercise-Induced Restoration of Skeletal Muscle Angiogenesis in Type2 Diabetes\", \"venue\": \"Circulation\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/circ.148.suppl_1.15747?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/circ.148.suppl_1.15747, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40459380\", \"name\": \"Sudhahar Varadarajan\"}, {\"authorId\": \"66051269\", \"name\": \"Kareem Abdelsaid\"}, {\"authorId\": \"40039931\", \"name\": \"M. Mcmenamin\"}, {\"authorId\": \"3855023\", \"name\": \"T. Fukai\"}, {\"authorId\": \"101943006\", \"name\": \"M. Ushio-Fukai\"}], \"abstract\": \"\\n Background:\\n Exercise restores decreased capillary density in skeletal muscle (SKM) (capillary rarefaction) in type2 diabetes (T2D) that has eNOS uncoupling/excess O\\n 2\\n -\\n , which is required for treatment of diabetic peripheral vascular disease (PAD) via unknown mechanisms. AMP-activated protein kinase (AMPK) is a key angiogenic/metabolic kinase mainly regulated by phosphorylation and is required for baseline, but not exercise-induced capillary density in SKM under healthy conditions. AMPK senses H\\n 2\\n O\\n 2\\n signal to increase its activity via oxidative modification of Cys299/304\\n in vitro.\\n In addition, extracellular SOD (SOD3) that catalyzes the dismutation of O\\n 2\\n -\\n to H\\n 2\\n O\\n 2\\n is increased in response to exercise. However, the role of AMPK and SOD3 in exercise-induced SKM angiogenesis in T2D has not been reported. Oxidation of Cysteine residues to generate cysteine sulfenic acid (Cys-OH) is a key event in H\\n 2\\n O\\n 2\\n -mediated signaling.\\n \\n \\n Results:\\n Here we show that reduced CD31+ capillary density in SKM of high fat diet-induced T2D mice was restored (2.4-fold) by voluntary wheel exercise training (2 weeks) with enhanced SOD3 activity (224%) and extracellular H\\n 2\\n O\\n 2\\n levels (3.2-fold). Of note, exercise in T2D mice increased AMPK activity (by p-ACC) via inducing CysOH formation of AMPK (3.6-fold), but not p-AMPK induction, which was inhibited by SOD3\\n -/-\\n /T2D mice that reduced exercise-induced H\\n 2\\n O\\n 2\\n . To demonstrate functional significance of AMPK Cys oxidation, we generated CRISPR/Cas9-genome editing \\u201credox-dead\\u201d AMPK-Cys299/304Ala (AMPK-C/A) knock-in (KI) mutant mice and found that AMPK-C/A KI mice showed significant inhibition of exercise-induced angiogenesis (44%) via reducing angiogenic PGC1\\u03b1 and VEGF protein expression in SKM of T2D mice. In vitro, C2C12 skeletal muscles overexpressing SOD3 treated with palmitate (mimic T2D with exercise) induced AMPK-CysOH formation and VEGF secretion. Its conditioned media promoted angiogenic responses such as EC migration (1.8-fold) and tube formation (1.7-fold), which was inhibited by C2C12 cells overexpressing AMPK C/A mutant.\\n \\n \\n Conclusion:\\n Novel exercise-induced AMPK CysOH formation at Cys299/304 restores angiogenesis in SKM of T2D via SOD3-mediated H\\n 2\\n O\\n 2\\n , which may contribute to revascularization in diabetic PAD.\\n\"}, {\"paperId\": \"04a706cc044355ce84980645abe3894a70f10a08\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-4209\", \"CorpusId\": 249719168}, \"title\": \"Abstract 4209: CD38KO K-NK cells prevent NK cell fratricide effect and improve isatuximab-mediated cytotoxicity against multiple myeloma cells\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-4209?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-4209, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2020397381\", \"name\": \"Marco Meloni\"}, {\"authorId\": \"2170601635\", \"name\": \"P. Perrin\"}, {\"authorId\": \"5636103\", \"name\": \"E. Slinger\"}, {\"authorId\": \"3544059\", \"name\": \"C. Maracle\"}, {\"authorId\": \"2058915835\", \"name\": \"A. Fournier\"}, {\"authorId\": \"7400949\", \"name\": \"N. Acuff\"}, {\"authorId\": \"2137046794\", \"name\": \"J. Mooney\"}, {\"authorId\": \"40646176\", \"name\": \"R. Igarashi\"}, {\"authorId\": \"1398262544\", \"name\": \"A. Virone-Oddos\"}, {\"authorId\": \"121180200\", \"name\": \"M. Chiron\"}], \"abstract\": \"\\n Multiple myeloma (MM) is a plasma cell malignancy characterized by clonal accumulation of malignant plasma cells in the bone marrow. CD38 is highly expressed on MM cells, and antibodies targeting CD38 (such as Isatuximab and Daratumumab) induce MM cell killing though several mechanisms, particularly by NK cell-mediated antibody dependent cellular cytotoxicity (ADCC). However, NK cells also express CD38 and treatment with anti-CD38 antibodies results in a rapid decrease of NK cells presumably due to fratricide, which may potentially limit NK cell mediated ADCC and reduce the efficacy of anti-CD38 antibody treatment. NK cells lacking CD38 in combination with Daratumumab have been shown to be resistant to NK cell fratricide and have improved ADCC. Here, we investigated the effect of knocking out CD38 in K-NK cells (CD38KO K-NK) in combination with Isatuximab. Peripheral blood NK cells were isolated from healthy donors and expanded using Kiadis PM21 particle technology (Oyer et al, Cytotherapy 2016) to produce highly activated K-NK cells. To produce CD38KO K-NK cells, CRISPR gene editing was applied during NK cell expansion by electroporating with Cas9/RNP complexes targeting CD38, and successful deletion of CD38 was confirmed by flow cytometry analysis. Analysis of key NK cell receptors by flow cytometry evidenced very similar receptor profiles between WT and CD38KO K-NK cells, suggesting that CD38 deletion does not affect the potent activation state of the K-NK cells. Importantly, CD38KO K-NK cells were found to be resistant to Isatuximab-induced fratricide. The cytotoxic activity of CD38KO K-NK cells in combination with Isatuximab against LP-1 and H929 MM cell lines was also measured. Calcein release assay and Incucyte based analysis revealed that cytotoxicity of CD38KO K-NK cells is enhanced in presence of Isatuximab, and that CD38KO K-NK cells are more cytotoxic than WT when combined with Isatuximab. Furthermore, the effect of Isatuximab/CD38KO K-NK cells combination also in association with SAR444245 (also termed THOR-707; Ptacin et al, Nat Commun 2021), an engineered non-\\u03b1 binding IL-2 that promotes NK cell activation and proliferation, was tested. Cytotoxicity of WT or CD38KO NK cells is enhanced in the presence of SAR444245. Indeed, addition of SAR444245 was found to further enhance the cytotoxic activity of CD38KO K-NK cells against LP-1 MM cells when combined with Isatuximab, resulting in an overall superior and sustained cytotoxicity. These data suggest that deletion of CD38 mitigates NK cell fratricide and improves Isatuximab-mediated ADCC against MM cells, and provide evidence for the therapeutic potential of the triple combination CD38KO NK cells, Isatuximab and SAR444245 in the setting of MM.\\n Citation Format: Marco Meloni, Pauline Perrin, Erik Slinger, Chrissta Maracle, Alain Fournier, Nicole Acuff, Jill Mooney, Robert Y. Igarashi, Angela Virone-Oddos, Marielle Chiron. CD38KO K-NK cells prevent NK cell fratricide effect and improve isatuximab-mediated cytotoxicity against multiple myeloma cells [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 4209.\"}, {\"paperId\": \"04a7602dbb84e3f181d0c4074844e8c0fdf14a61\", \"externalIds\": {\"DOI\": \"10.1210/endocr/bqab101\", \"CorpusId\": 235092811, \"PubMed\": \"34019632\"}, \"title\": \"Genetic Manipulation on Zebrafish duox Recapitulate the Clinical Manifestations of Congenital Hypothyroidism.\", \"venue\": \"Endocrinology\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/endo/article-pdf/162/8/bqab101/38836886/bqab101.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1210/endocr/bqab101?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1210/endocr/bqab101, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144455178\", \"name\": \"F. Sun\"}, {\"authorId\": \"2217350058\", \"name\": \"Ya Fang\"}, {\"authorId\": \"2597749\", \"name\": \"Manman Zhang\"}, {\"authorId\": \"2219720397\", \"name\": \"Rui-Jia Zhang\"}, {\"authorId\": \"2297390755\", \"name\": \"Feng-Yao Wu\"}, {\"authorId\": \"49803645\", \"name\": \"Rui-Meng Yang\"}, {\"authorId\": \"2101303328\", \"name\": \"Ping-Hui Tu\"}, {\"authorId\": \"2069777480\", \"name\": \"Mei Dong\"}, {\"authorId\": \"2220644927\", \"name\": \"Shuang-Xia Zhao\"}, {\"authorId\": \"8217351\", \"name\": \"Huai-Dong Song\"}], \"abstract\": \"Congenital hypothyroidism (CH) is a highly prevalent but treatable neonatal endocrine disorder. Thyroid dyshormonogenesis is the main cause of congenital hypothyroidism in Chinese CH patients and DUOX2 is the most frequent mutated gene involved in H2O2 production. In human, the primary sources for H2O2 production are DUOX1 and DUOX2, while in zebrafish, there is only a single orthologue for DUOX1 and DUOX2. In this study, duox mutant zebrafish were generated through knockdown duox by morpholino or knockout duox by CRISPR Cas9. The associated phenotypes were investigated and rescued by thyroxine (T4) treatment. Mutant zebrafish displayed hypothyroid phenotypes including growth retardation and goiter and infertility. Homozygous mutants in adults also displayed extra-thyroidal abnormal phenotypes including lacking barbels, pigmentation defects, erythema in the opercular region, ragged fins and delayed scales. All these abnormal phenotypes can be rescued by 10\\u00a0nM T4 treatment. Strikingly, the fertility of zebrafish was dependent on thyroid hormone, T4 treatment should be continued and cannot be stopped over two weeks in hypothyroid zebrafish in order to achieve fertility. Thyroid hormones played a role in the developing and maturing of reproductive cells. Our work indicated that duox mutant zebrafish may provide a model for human congenital hypothyroidism.\"}, {\"paperId\": \"04a7f8160bc8867fe8ed31cfc2f81864a1234282\", \"externalIds\": {\"MAG\": \"3001916692\", \"DOI\": \"10.13560/J.CNKI.BIOTECH.BULL.1985.2019-0891\", \"CorpusId\": 214045896}, \"title\": \"\\u5229\\u7528\\u7535\\u8f6c\\u7684\\u65b9\\u6cd5\\u5bf9T\\u7ec6\\u80de TET2 \\u57fa\\u56e0\\u6572\\u9664\\u5e76\\u63a2\\u8ba8 TET2 \\u5bf9T\\u7ec6\\u80de\\u589e\\u6b96\\u7684\\u5f71\\u54cd\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.13560/J.CNKI.BIOTECH.BULL.1985.2019-0891?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.13560/J.CNKI.BIOTECH.BULL.1985.2019-0891, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"139934202\", \"name\": \"\\u6768\\u96f7\"}, {\"authorId\": \"2113650185\", \"name\": \"Yang Lei\"}, {\"authorId\": \"1582052025\", \"name\": \"\\u53f6\\u6d32\\u6770\"}, {\"authorId\": \"1582050234\", \"name\": \"YE Zhou-jie\"}, {\"authorId\": \"2045901966\", \"name\": \"\\u674e\\u5146\\u9f99\"}, {\"authorId\": \"30612897\", \"name\": \"Li Zhao-long\"}, {\"authorId\": \"1582050345\", \"name\": \"\\u6c88\\u9633\\u5764\"}, {\"authorId\": \"2098009817\", \"name\": \"Shen Yang-kun\"}, {\"authorId\": \"1582050248\", \"name\": \"\\u5085\\u96c5\\u5a1f\"}, {\"authorId\": \"2083932751\", \"name\": \"FU Ya-juan\"}], \"abstract\": null}, {\"paperId\": \"04a80dbe5f99e0980f0d2a92715bb5de7069464d\", \"externalIds\": {\"DOI\": \"10.1182/blood-2023-179155\", \"CorpusId\": 265568946}, \"title\": \"Nanoporous Substrates to Advance CAR-T Cell Production for Advanced Cell Therapies\", \"venue\": \"Blood\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2023-179155\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2023-179155?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2023-179155, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2130326041\", \"name\": \"Tamara Z\\u00fcnd\"}, {\"authorId\": \"40861651\", \"name\": \"S. Lickert\"}, {\"authorId\": \"2269265095\", \"name\": \"A. Strebel\"}, {\"authorId\": \"2269265628\", \"name\": \"Marcia Murner\"}, {\"authorId\": \"2224502040\", \"name\": \"Tido Willms\"}, {\"authorId\": \"2221933440\", \"name\": \"Hasan \\u015eim\\u015fek\"}, {\"authorId\": \"2269273736\", \"name\": \"Weijie Du\"}, {\"authorId\": \"14338523\", \"name\": \"D. Wagner\"}, {\"authorId\": \"2264794610\", \"name\": \"V. Vogel\"}, {\"authorId\": \"2264805328\", \"name\": \"Enrico Klotzsch\"}], \"abstract\": \"\\n Background: CAR-T cell therapy has transformed blood cancer treatment with promising clinical trial outcomes. However, access to this therapy has been limited due lengthy and complex CAR-T cell production process, resulting in a very costly therapy. To enhance patient welfare, establishment of innovative point-of-care solutions with a simplified and shortened manufacturing processes is crucial to ensure higher cell quality and a shorter vein to vein time. immUni technology, a novel nano-engineered substrate will allow to combine and enhance key steps of the CAR-T production - from T cell activation, gene transfer to expansion. immUni platform integrates a unique combination of biochemical and physical stimulation. The biophysical activation is achieved without the need for a TCR agonist, resulting in a striking balance between robust T cell activation and proliferation as well as T cell effector function and a less differentiated phenotype required for CAR-T cell therapy. immUni technology is an easy-to-use platform that minimizes benchwork.\\n Aims: To provide a novel technology to produce optimal CAR-T cell therapies.\\n Methods:\\n Human na\\u00efve pan T cells isolated from healthy donors were used for the following experiments.\\n After 24h Il-2 secretion was measured using an ELISA assay and CD69 expression via flowcytometry as a readout for activation.\\n The gene transfer of the CD19-specific 2 nd generation CAR construct was conducted 48 hours after activation, employing both lentiviral transduction and non-viral CRISPR/Cas9 gene editing into the TRAC locus.\\n For T cell culture and expansion, the medium was supplemented with IL-7 and IL-15. CAR expression was measured 6 days post activation. The T cell phenotype was identified and quantified after 10 days of expansion with markers against CD95, CD45RA, CCR7 as well as CD4, CD8 and CD3.\\n Results: For a head-to-head comparison between immUni substrates and established activation methods for CAR-T production, we benchmarked our solely aCD28-antibody coated immUni surface, against Dynabeads TM (Thermo Fisher Scientific) and against aCD3/aCD28 antibodies immobilized on flat surfaces\\n When measuring CD69 expression after activation on immUni substrates, T cells showed high percentages of CD69 expressing cells (>80%) while maintaining lower MFI values compared to the two other activation methods. In contrast, Il-2 secretion was significantly enhanced on immUni substrates (120%, Fig. 1A). Furthermore, we conducted T cell expansion and differentiation experiments, which demonstrated a remarkable 3x higher fold expansion after 10 days when activated on immUni substrates compared to activation via Dynabeads TM. On top of their outstanding effector functions, 80% of the T cells maintain a less differentiated CCR7 positive phenotype (Fig. 1B). This outcome holds great promise for long-term tumor control.\\n To further validate this novel activation method for CAR-T cell production, we measured gene transfer efficiency using lentiviral transduction and non-viral CRISPR/Cas9 gene editing via electroporation. Lentiviral transduction resulted in at least 90% more CD19 CAR-positive CAR-T cells after 6 days post activation (n=2) compared to Dynabeads TM and flat substrates. CRISPR/Cas9 knock-in to the TRAC locus resulted in an improvement of 50% when compared to antibody-coated flat substrates (n=2), holding a great promise in further combining activation and gene transfer steps.\\n Conclusion: Our preliminary data strongly supports the potential of our innovative immUni technology to enhance CAR-T cell production. Comparative studies against Dynabeads TM demonstrate that our technology outperforms current methods with abbreviated T cell activation time, enhanced gene transfer, and robust cytokine production. The accelerated expansion of CAR-T cells, coupled with the retention of a memory-related phenotype, holds great promise for effective tumor eradication, currently under preclinical validation. immUni user-friendly, off-the-shelf product is ready for R&D use in this field. A seamless integration into existing production lines, enhancing accessibility and adoption is currently under development.\"}, {\"paperId\": \"04af8c3109fa29fa6b3436c7bb6b98e7ccb95d14\", \"externalIds\": {\"DOI\": \"10.1016/j.seizure.2023.06.018\", \"CorpusId\": 259215337, \"PubMed\": \"37394306\"}, \"title\": \"SCAF4 variants associated with focal epilepsy accompanied by multisystem disorders.\", \"venue\": \"Seizure\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.seizure.2023.06.018?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.seizure.2023.06.018, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2143376655\", \"name\": \"Heng Lin\"}, {\"authorId\": \"2130039679\", \"name\": \"Yan-Hui Chen\"}], \"abstract\": \"PURPOSE\\nThe SCAF4 gene encodes serine/arginine-related carboxyl-terminal domain-associated factor 4, which is highly expressed in the brain and potentially affects neurodevelopment. However, the functional significance of SCAF4 variants in human diseases remains unknown.\\n\\n\\nMETHODS\\nTrio-based whole-exome sequencing was performed in three individuals with focal epilepsy. Bioinformatics tools were used to assess the pathogenicity of SCAF4 variants. Knockout scaf4a/b zebrafish were created using CRISPR-Cas9 used to validate the phenotype.\\n\\n\\nRESULTS\\nSCAF4 variants were identified in three individuals from three unrelated families with focal epilepsy. All patients had focal seizures and focal discharges on EEG recordings, with intellectual disability or motor retardation, skeletal abnormalities, and one had cryptorchidism. However, no recurrence was observed after short-term ASMs treatment. The identified SCAF4 variants included two nonsense variants and one compound heterozygous variant, consisting of a missense and an in-frame variant. A low frequency of SCAF4 variants was observed in gnomAD in this study. Computational modelling has suggested that missense variants lead to functional impairments. In zebrafish, abnormal epileptiform signals, skeletal development, and neurodevelopment have been found in scaf4a/b knockout compared to wild-type zebrafish.\\n\\n\\nCONCLUSION\\nThese results indicate that SCAF4 is associated with focal epilepsy accompanied by multisystem disorders. Otherwise, the management of patients with SCAF4 variants requires more attention to multisystem involvement.\"}, {\"paperId\": \"04b0a02f8a686750955014348f9453bcf56d619e\", \"externalIds\": {\"DOI\": \"10.1101/2023.08.02.551621\", \"CorpusId\": 260499919}, \"title\": \"High-throughput and genome-scale targeted mutagenesis using CRISPR in a non-model multicellular organism, Bombyx mori\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/08/02/2023.08.02.551621.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.08.02.551621?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.08.02.551621, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"33665983\", \"name\": \"Sanyuan Ma\"}, {\"authorId\": \"144037659\", \"name\": \"Tong Zhang\"}, {\"authorId\": \"2117979666\", \"name\": \"Ruo Wang\"}, {\"authorId\": \"2143954875\", \"name\": \"Pan Wang\"}, {\"authorId\": \"2119035096\", \"name\": \"Yue Liu\"}, {\"authorId\": \"4880581\", \"name\": \"Jiasong Chang\"}, {\"authorId\": \"1810702092\", \"name\": \"Aoming Wang\"}, {\"authorId\": \"1810690700\", \"name\": \"Xinhui Lan\"}, {\"authorId\": \"2110833538\", \"name\": \"Le-Na Sun\"}, {\"authorId\": \"2210565892\", \"name\": \"Hao Sun\"}, {\"authorId\": \"2056571018\", \"name\": \"Run Shi\"}, {\"authorId\": \"153022054\", \"name\": \"W. Lu\"}, {\"authorId\": \"2227612612\", \"name\": \"Dan Liu\"}, {\"authorId\": \"2199677071\", \"name\": \"Na Zhang\"}, {\"authorId\": \"2110230987\", \"name\": \"Wenbo Hu\"}, {\"authorId\": \"2108003936\", \"name\": \"Xiaogang Wang\"}, {\"authorId\": \"51163526\", \"name\": \"Weiqing Xing\"}, {\"authorId\": \"2199401783\", \"name\": \"Ling Jia\"}, {\"authorId\": \"47244225\", \"name\": \"Q. Xia\"}], \"abstract\": null}, {\"paperId\": \"04b67c3a6df17abd88917e88d0cecca75879afd8\", \"externalIds\": {\"MAG\": \"2996774168\", \"DOI\": \"10.1101/2020.01.05.893206\", \"CorpusId\": 213398622}, \"title\": \"CRISPR-based bioengineering of the Transferrin Receptor revealed a role for Rab7 in the biosynthetic secretory pathway\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/01/05/2020.01.05.893206.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.01.05.893206?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.01.05.893206, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"10087322\", \"name\": \"Maika S. Deffieu\"}, {\"authorId\": \"1580339194\", \"name\": \"Ieva Cesonyte\"}, {\"authorId\": \"3510770\", \"name\": \"F. Delalande\"}, {\"authorId\": \"4792937\", \"name\": \"Gaelle Boncompain\"}, {\"authorId\": \"6922413\", \"name\": \"C. Dorobantu\"}, {\"authorId\": \"40443843\", \"name\": \"E. Song\"}, {\"authorId\": \"2240370754\", \"name\": \"Vincent Lucansky\"}, {\"authorId\": \"1404904801\", \"name\": \"Aur\\u00e9lie Hirschler\"}, {\"authorId\": \"4131455\", \"name\": \"S. Cianf\\u00e9rani\"}, {\"authorId\": \"143706455\", \"name\": \"Tao Xu\"}, {\"authorId\": \"144234216\", \"name\": \"F. Perez\"}, {\"authorId\": \"5346050\", \"name\": \"C. Carapito\"}, {\"authorId\": \"153565996\", \"name\": \"R. Gaudin\"}], \"abstract\": \"The regulated secretory trafficking of neosynthesized transmembrane receptors is particularly challenging to investigate as it is under-represented at steady state compared to the abundance of the other trafficking routes. Here, we combined the retention using selective hook (RUSH) system to a CRISPR/Cas9 gene editing approach (eRUSH) to identify molecular players involved in the trafficking of neosynthesized Transferrin Receptor (TfR) en route to the plasma membrane (PM). TfR-eRUSH monoclonal cells expressing endogenous, ER-retainable and fluorescent TfR were engineered and characterized. Spatiotemporal quantitative proteomics of TfR-eRUSH cells allowed the identification of molecular partners associated with TfR-containing membranes and provided a comprehensive list of potential regulators, co-trafficking cargos, and enriched pathways. Furthermore, we chose to focus our attention on the Rab GTPase family members for their function as vesicle trafficking regulators and performed a Rab-targeted siRNA screen that we correlated to our proteomics data. Unexpectedly, we identified Rab7-harboring vesicles as an intermediate compartment of the Golgi-to-PM transport of the neosynthetic TfR. These vesicles did not exhibit degradative properties and were not associated to Rab6A-harboring vesicles, also involved in Golgi-to-PM transport. However, Rab6A-TfR vesicles delivered TfR directly to the PM, while in contrast, Rab7A was transiently associated to neosynthetic TfR-containing post-Golgi vesicles but dissociated before PM vesicle fusion. Together, our study proposes the eRUSH as a powerful tool to further study the secretory pathway and reveals an unforeseen role for Rab7 in the neosynthetic transport of the TfR, highlighting the diversity of the secretory vesicles\\u2019 nature for a given cargo.\"}, {\"paperId\": \"04b8240a2d67330b897b77375642b17bc984ab0a\", \"externalIds\": {\"PubMedCentral\": \"11734085\", \"DOI\": \"10.1111/jipb.13767\", \"CorpusId\": 272424626, \"PubMed\": \"39240004\"}, \"title\": \"A highly efficient soybean transformation system using GRF3\\u2010GIF1 chimeric protein\", \"venue\": \"Journal of Integrative Plant Biology\", \"year\": 2024, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1111/jipb.13767\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11734085, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2310850342\", \"name\": \"Ying Zhao\"}, {\"authorId\": \"2165031946\", \"name\": \"Peng Cheng\"}, {\"authorId\": \"2283838026\", \"name\": \"Ying Liu\"}, {\"authorId\": \"153903833\", \"name\": \"Chunyan Liu\"}, {\"authorId\": \"2490077\", \"name\": \"Zhenbang Hu\"}, {\"authorId\": \"37471337\", \"name\": \"Dawei Xin\"}, {\"authorId\": \"2154713391\", \"name\": \"Xiaoxia Wu\"}, {\"authorId\": \"2150427803\", \"name\": \"Mingliang Yang\"}, {\"authorId\": \"2256591877\", \"name\": \"Qingshan Chen\"}], \"abstract\": \"Expression of GRF3\\u2010GIF1 chimera significantly enhanced regeneration and transformation efficiency in soybean, increasing the number of transformable cultivars. Moreover, GmGRF3\\u2010GIF1 can be combined with CRISPR/Cas9 for highly effective gene editing.\"}, {\"paperId\": \"04bd8a874d783d006628b743e1631a9a5a3c1c8a\", \"externalIds\": {\"PubMedCentral\": \"11532705\", \"DOI\": \"10.3324/haematol.2024.285099\", \"CorpusId\": 270121905, \"PubMed\": \"38813706\"}, \"title\": \"LILRB4 represents a promising target for immunotherapy by dual targeting tumor cells and myeloid-derived suppressive cells in multiple myeloma\", \"venue\": \"Haematologica\", \"year\": 2024, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://haematologica.org/article/download/haematol.2024.285099/77107\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11532705, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2056815956\", \"name\": \"L. Gong\"}, {\"authorId\": \"2118106240\", \"name\": \"Hao Sun\"}, {\"authorId\": \"46457965\", \"name\": \"Lanting Liu\"}, {\"authorId\": \"2227450346\", \"name\": \"Xiyue Sun\"}, {\"authorId\": \"1693386644\", \"name\": \"Teng-Ching Fang\"}, {\"authorId\": \"2242529216\", \"name\": \"Zhen Yu\"}, {\"authorId\": \"4751261\", \"name\": \"W. Sui\"}, {\"authorId\": \"2187287306\", \"name\": \"Jingyu Xu\"}, {\"authorId\": \"29138692\", \"name\": \"Tingyu Wang\"}, {\"authorId\": \"2303816232\", \"name\": \"Fangshuo Feng\"}, {\"authorId\": \"2213509480\", \"name\": \"Lei Lei\"}, {\"authorId\": \"2141774951\", \"name\": \"Wei Rui\"}, {\"authorId\": \"2303865343\", \"name\": \"Yuxuan Liu\"}, {\"authorId\": \"2304071360\", \"name\": \"Xueqiang Zhao\"}, {\"authorId\": \"2248139714\", \"name\": \"Gang An\"}, {\"authorId\": \"2303996088\", \"name\": \"Xin Lin\"}, {\"authorId\": \"2248233311\", \"name\": \"Lugui Qiu\"}, {\"authorId\": \"2255117523\", \"name\": \"Mu Hao\"}], \"abstract\": \"Multiple myeloma (MM) remains an incurable hematologic malignancy. Despite tremendous advances in the treatment of this disease, about 10% of patients still have very poor outcomes with a median overall survival of less than 24 months. Our study aimed to underscore the critical mechanisms pertaining to rapid disease progression and provide novel therapeutic choices for these ultrahigh-risk patients. We utilized single-cell transcriptomic sequencing to dissect the characteristic bone marrow niche of patients who survived less than 2 years (EM24). Notably, enrichment of a LILRB4high pre-mature plasma-cell cluster was observed in EM24 patients compared to patients with durable remission. This cluster exhibited aggressive proliferation and a drug-resistance phenotype. High levels of LILRB4 promoted MM clonogenicity and progression. Clinically, high expression of LILRB4 was correlated with poor prognosis in both newly diagnosed MM patients and relapsed/ refractory MM patients. ATAC-sequencing analysis identified that pronounced chromosomal accessibility caused the elevation of LILRB4 on MM cells. CRISPR-Cas9 deletion of LILRB4 alleviated the growth of MM cells, inhibited the immunosuppressive function of myeloid-derived suppressive cells (MDSC), and further rescued T-cell dysfunction in the MM microenvironment. Greater infiltration of MDSC was observed in EM24 patients. We therefore generated an innovative T-cell receptor-based chimeric antigen receptor T cell, LILRB4-STAR-T. Cytotoxicity experiments demonstrated that LILRB4-STAR-T cells efficaciously eliminated tumor cells and impeded MDSC function. In conclusion, our study elucidates that LILRB4 is an ideal biomarker and promising immunotherapy target for high-risk MM. LILRB4-STAR-T-cell immunotherapy is promising against both tumor cells and the immunosuppressive tumor microenvironment in MM.\"}, {\"paperId\": \"04bf5f572e4aa75fa8f3a559544c9757c4111eab\", \"externalIds\": {\"PubMedCentral\": \"9928027\", \"DOI\": \"10.1371/journal.pntd.0011105\", \"CorpusId\": 256547115, \"PubMed\": \"36730424\"}, \"title\": \"Toxoplasma gondii microneme protein MIC3 induces macrophage TNF-\\u03b1 production and Ly6C expression via TLR11/MyD88 pathway\", \"venue\": \"PLoS Neglected Tropical Diseases\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosntds/article/file?id=10.1371/journal.pntd.0011105&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9928027, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7891620\", \"name\": \"J. Qiu\"}, {\"authorId\": \"47779218\", \"name\": \"Yanci Xie\"}, {\"authorId\": \"2203976760\", \"name\": \"Chenlu Shao\"}, {\"authorId\": \"2170826915\", \"name\": \"Tianye Shao\"}, {\"authorId\": \"2204218684\", \"name\": \"Min Qin\"}, {\"authorId\": \"2204169690\", \"name\": \"Rong Zhang\"}, {\"authorId\": \"153201666\", \"name\": \"Xin-jian Liu\"}, {\"authorId\": \"2145163097\", \"name\": \"Zhipeng Xu\"}, {\"authorId\": \"2153952729\", \"name\": \"Yong Wang\"}], \"abstract\": \"Toxoplasma gondii is the most successful parasite worldwide. It is of great interest to understand how T. gondii induce different immune responses in different hosts. In this study, we found that a peptide of T. gondii microneme protein MIC3 induced TNF-\\u03b1 production, NF-\\u03baB phosphorylation, iNOS transcription and Ly6C expression in mouse macrophage RAW264.7 cells. MyD88 inhibition, small interfering RNA against Tlr11 and CRISPR/Cas9-mediated knock-out of Tlr11 all reduced MIC3-induced TNF-\\u03b1 production, NF-\\u03baB phosphorylation, iNOS transcription and Ly6C expression. Additionally, we determined the location of MIC3 peptide in mouse macrophages using immunofluorescence. MIC3 could both adhere to the cell membrane of mouse macrophages and enter the cells. These results suggest that MIC3 triggered the immune responses in mouse macrophages via TLR11/MyD88/NF-\\u03baB pathway. It is known that human macrophages lacking TLR11. We predicted that the immune responses induced by MIC3 in human macrophages were significantly different from those in mouse macrophages. As expected, MIC3 peptide failed to induce TNF-\\u03b1 expression, iNOS expression and NF-\\u03baB phosphorylation in human THP-1 derived macrophages. MIC3 induced macrophage immune responses via TLR11. Intriguingly, the amino acid sequence of MIC3 is completely different from the well-known TLR11 ligand profilin, which generates a potent IL-12p40, TNF-\\u03b1 and IL-6 response. In marked contrast to profilin, MIC3 could not induce IL-12p40 expression in both mouse RAW264.7 cells and human THP-1 derived macrophages. Furthermore, the simulated tertiary structure of MIC3 peptide shows poor similarity with the crystal structure of profilin, suggesting that MIC3 might be a different ligand from profilin. These findings about MIC3 and TLR11 will provide us with important insights into the pathogenesis of toxoplasmosis and coevolution during host-parasite interaction.\"}, {\"paperId\": \"04c05ee57bb384566b50ee227207d1e795f22e9b\", \"externalIds\": {\"MAG\": \"3027149287\", \"PubMedCentral\": \"7242456\", \"DOI\": \"10.1038/s41598-020-65577-x\", \"CorpusId\": 218762333, \"PubMed\": \"32439978\"}, \"title\": \"Generation and characterization of HLA-universal platelets derived from induced pluripotent stem cells\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 43, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-65577-x.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7242456, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14610648\", \"name\": \"Phatchara Norbnop\"}, {\"authorId\": \"3845348\", \"name\": \"P. Ingrungruanglert\"}, {\"authorId\": \"3821357\", \"name\": \"N. Israsena\"}, {\"authorId\": \"6116764\", \"name\": \"K. Suphapeetiporn\"}, {\"authorId\": \"5571401\", \"name\": \"V. Shotelersuk\"}], \"abstract\": \"Platelet demand has increased around the world. However, the inadequacy of donors, the risk of transfusion-transmitted infections and associated reactions, and the refractory nature of platelet transfusions are among the limitations of allogeneic platelet transfusions. To alleviate these problems, we propose generating platelets in a laboratory that do not induce alloimmunity to human leukocyte antigen (HLA) class I, which is a major cause of immune reaction in platelet transfusion refractoriness. Induced pluripotent stem cells (iPSCs) were generated from peripheral blood mononuclear cells (PBMCs) of a healthy Thai woman. We then knocked out the \\u03b22-microglobulin (\\u03b22m) gene in the cells using paired CRISPR/Cas9 nickases and sequentially differentiated the cells into haematopoietic stem cells (HSCs), megakaryocytes (MKs) and platelets. Silencing of HLA class I expression was observed on the cell surface of \\u03b22m-knockout iPSCs, iPSC-derived HSCs, MKs and platelets. The HLA-universal iPSC-derived platelets were shown to be activated, and they aggregated after stimulation. In addition, our in vivo platelet survival experiments demonstrated that human platelets were detectable at 2 and 24\\u2009hours after injecting the \\u03b22m-KO MKs. In summary, we successfully generated functional iPSC-derived platelets in vitro without HLA class I expression by knocking out the \\u03b22m gene using paired CRISPR/Cas9 nickases.\"}, {\"paperId\": \"04c2867e482fc4509e1e41c7fdecd75df1310cf0\", \"externalIds\": {\"PubMedCentral\": \"7070035\", \"MAG\": \"3010709890\", \"DOI\": \"10.1038/s41598-020-61473-6\", \"CorpusId\": 212681919, \"PubMed\": \"32170127\"}, \"title\": \"Western diet induces severe nonalcoholic steatohepatitis, ductular reaction, and hepatic fibrosis in liver CGI-58 knockout mice\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-61473-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7070035, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11675065\", \"name\": \"Pan Yang\"}, {\"authorId\": \"47906051\", \"name\": \"Youlin Wang\"}, {\"authorId\": \"47990407\", \"name\": \"Weiqing Tang\"}, {\"authorId\": \"49935116\", \"name\": \"Weiwei Sun\"}, {\"authorId\": \"7777799\", \"name\": \"Yinyan Ma\"}, {\"authorId\": \"2118260626\", \"name\": \"Shu Lin\"}, {\"authorId\": \"2054673709\", \"name\": \"Jia Jing\"}, {\"authorId\": \"2112532207\", \"name\": \"Long Jiang\"}, {\"authorId\": \"48626744\", \"name\": \"Hang Shi\"}, {\"authorId\": \"143650166\", \"name\": \"Zhiyuan Song\"}, {\"authorId\": \"36081382\", \"name\": \"Liqing Yu\"}], \"abstract\": \"Humans and rodents with Comparative Gene Identification-58 (CGI-58) mutations manifest nonalcoholic fatty liver disease (NAFLD). Here we show that liver CGI-58 knockout (LivKO) mice fed a Western diet rapidly develop advanced NAFLD, including nonalcoholic steatohepatitis (NASH) and hepatic fibrosis. After 14 weeks of diet challenge, starting at 6 weeks of age, LivKO mice showed increased inflammatory cell infiltration and proinflammatory gene expression in the liver, which was associated with elevated plasma levels of aminotransferases. Hepatic ductular reactions, pericellular fibrosis, and bridging fibrosis were observed only in the LivKO mice. Consistently, the KO mice had a significant increase in hepatic mRNAs for fibrogenic genes. In addition, LivKO mice displayed massive accumulation of lipid droplets (LDs) in hepatocytes. LDs were also observed in the cholangiocytes of the LivKO mice, but not the floxed controls. Four of the five LD coat proteins, including perilipins 2, 3, 4, and 5, were increased in the CGI-58 KO liver. CRISPR/Cas9-mediated knockout of CGI-58 in Huh7 human hepatoma cells induced LD deposition and perilipin expression, suggesting a cell autonomous effect. Our findings establish the Western diet-fed LivKO mice as an animal model of NASH and hepatic fibrosis. These animals may facilitate preclinical screening of therapeutic agents that counter against NAFLD progression.\"}, {\"paperId\": \"04c51c4056d7b9674f4ccb31a60f407b62f106e7\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-149108\", \"CorpusId\": 244549407}, \"title\": \"Normal B Cell-Derived iPSCs Capable of Inducing RAS Mutants and Aid to Explore Myeloma-Initiating Cells\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-149108\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-149108?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-149108, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1665433519\", \"name\": \"K. Kudo\"}, {\"authorId\": \"38664566\", \"name\": \"N. Tsuyama\"}, {\"authorId\": \"31408527\", \"name\": \"M. Sugai\"}, {\"authorId\": \"2073725858\", \"name\": \"Yusuke Azami\"}, {\"authorId\": \"21045770\", \"name\": \"M. Fukami\"}, {\"authorId\": \"46705080\", \"name\": \"Y. Abe\"}, {\"authorId\": \"6394252\", \"name\": \"Akinobu Ota\"}, {\"authorId\": \"14500457\", \"name\": \"Karnan Sivasundaram\"}, {\"authorId\": \"84532711\", \"name\": \"Moe Muramatsu\"}, {\"authorId\": \"4860014\", \"name\": \"M. Sasatani\"}, {\"authorId\": \"46657948\", \"name\": \"Y. Hashimoto\"}, {\"authorId\": \"145152084\", \"name\": \"S. Saji\"}, {\"authorId\": \"5444454\", \"name\": \"K. Kamiya\"}, {\"authorId\": \"5898985\", \"name\": \"I. Hanamura\"}, {\"authorId\": \"5572764\", \"name\": \"T. Ikezoe\"}, {\"authorId\": \"50729238\", \"name\": \"M. Onodera\"}, {\"authorId\": \"145768009\", \"name\": \"A. Sakai\"}], \"abstract\": \"\\n Multiple myeloma (MM) cells are derived from mature B cells based on immunoglobulin heavy chain (IgH) gene analysis. The onset of MM is often caused by a reciprocal chromosomal translocation (cTr) between chr 14 with IgH and chr 11 with CCND1. We propose that mature B cells gain the potential to transform by reprograming, and the resulting chromosomal aberrations subsequently cause the development of abnormal B cells as a myeloma-initiating cell during B cell redifferentiation. To study myeloma-initiating cells, we previously established normal B cell-derived induced pluripotent stem cells (BiPSCs: BiPSC13 and MIB2-6); these BiPSCs have the same VDJ rearrangement of IgH as the original B lymphocytes and induce the expression of activation-induced cytidine deaminase (AID) by the Tet-off system (Sci Rep, 2017). Subsequently, we established two BiPSCs with reciprocal cTr t(11;14) using the CRISPR/Cas9 system; the cleavage site were located in the IgH E\\u03bc region of either the VDJ rearranged allele or non-rearranged allele of IgH and the 5\\u2032-upsteam region of the CCND1 (two types of BiPSC13 with t(11;14) and MIB2-6 with t(11;14)). Furthermore, p53 was deleted using the CRISPR/Cas9 system in BiPSC13 with t(11;14) carrying the DJ-rearranged allele of IgH that reciprocally translocated with CCND1 (G28). All these BiPSCs differentiated into hematopoietic progenitor cells (HPCs) (Sci Res, 2021). Next, we created AID fused with the hormone-binding domain of the estrogen receptor T2 mutant (AID-ER) to analyze the function of AID. The ER sequence of pCAG-ERT2CreERT2 (Addgene # 13777) was amplified by PCR and cloned into the downstream part of the TREtight promoter of pRetroX-Tight-Hyg as an open reading frame using an In-Fusion HD cloning kit. The ER sequence was also cloned into the same vector as a negative control for the analysis of AID function. These vectors were packaged into a retrovirus using gp293 and pMD2.G, and the viruses were infected into HEK293 cells expressing Tet-off transcription factor and fluorescence-deficient EGFP, in which the artificially-introduced stop codon was at the 106 thcodon of the EGFP gene. The expression of AID-ER fusion protein was induced by removal of doxycycline three days before analysis. AID activity was induced by the addition of 4-hydroxytamoxifen, an agonist of ER mutants, one day before analysis. Therefore, AID activity was monitored by detecting the frequency of EGFP-positive cells, i.e., the recovery of fluorescence, by flow-cytometry. Mutation of the artificial stop codon (from TAG to TAC; from stop codon to Tyrosine) was confirmed by sequencing the EGFP DNA amplified by PCR from the sorted EGFP-positive cells. Subsequently, we examined the introduction of mutated KRAS and NRAS genes into G28, because the most frequently occurring mutations in patients with MM are in KRAS and NRAS. Mutated KRAS (G12A) and NRAS (G13D) were amplified by RT-PCR from poly (A) mRNA of MM.1S and KMM1 of MM cell lines, respectively. After confirming the sequence of these mutants, the mutant cDNA of KRAS or NRAS was cloned into pRetroX-Tight-Hyg in combination with AID-ER. These two vectors were packaged into retroviruses, following which the viruses were infected into BiPSC13 with t(11;14) expressing Tet-off transcription factors, respectively. These BiPSCs also differentiated into HPCs. However, unlike cord blood, these HPCs did not differentiate into B lymphocytes by co-culture with BM stromal cell (MS-5). Therefore, further ingenuity is required to differentiate the BiPSC-derived HPCs into B lymphocytes.\\n \\n \\n No relevant conflicts of interest to declare.\\n\"}, {\"paperId\": \"04c7065ff5ffd5f0c2042fc14e1f87b4f1fc0653\", \"externalIds\": {\"DOI\": \"10.1101/2024.01.24.577150\", \"CorpusId\": 267301749}, \"title\": \"Zebrafish carbohydrate sulfotransferase 6 (chst6) mutants provide a preclinical model for macular corneal dystrophy\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/01/25/2024.01.24.577150.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.01.24.577150?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.01.24.577150, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2223657106\", \"name\": \"Esra Ersoz-Gulseven\"}, {\"authorId\": \"2281646174\", \"name\": \"Merve Basol\"}, {\"authorId\": \"2281647091\", \"name\": \"Helin \\u00d6zakta\\u015f\"}, {\"authorId\": \"145344343\", \"name\": \"Sibel Kalyoncu\"}, {\"authorId\": \"6807489\", \"name\": \"C. A. Utine\"}, {\"authorId\": \"1412815550\", \"name\": \"G. Cakan-Akdogan\"}], \"abstract\": \"Macular corneal dystrophy (MCD) is a rare congenital disease caused by mutations in the carbohydrate sulfotransferase 6 (chst6) gene. Patients suffer from opaque aggregates in the cornea leading to bilateral progressive vision loss by 4th decade of life. Corneal transplantation is the only available treatment, which is invasive, not available to every patient and recurrence of the symptoms is common. Keratocytes in the cornea express the chst6 gene, which encodes a golgi enzyme that is essential for sulfation of the keratan sulfate proteoglycans (KSPG). The loss of KS sulfation leads to defects in collagen fibril organization and aggregate formation in the corneal extracellular matrix. Lack of preclinical disease models is a major limitation for the development of accessible treatment strategies. Attempts to develop mouse MCD models have failed due to lack of chst6 gene in mice and difference in proteoglycan composition of the mouse cornea. The zebrafish chst6 gene has not been studied previously. Zebrafish cornea structure is highly similar to humans, containing high levels of keratan sulfate proteoglycans in the stroma. Here, loss of function chst6 mutant zebrafish were generated with CRISPR/Cas9 mediated gene editing. Several chst6 alleles were obtained, and loss of KSPG sulfation in the eye stroma was shown. Mutant zebrafish developed age-dependent, alcian blue positive, opaque accumulates in the cornea. Degeneration of corneal structure and changes in epithelial thickness were observed. The zebrafish MCD model developed here is the first in vivo model of the disease and opens up possibilities to develop and screen treatment strategies. Significance Statement First in vivo model of macular corneal dystrophy (MCD) is reported in this study. Zebrafish model developed here paves the way for modeling of other corneal dystrophies in this aquatic vertebrate which is easy to apply therapeutics and image in vivo. The clinical symptoms of MCD are well reproduced in the zebrafish MCD model. Moreover, the authors showed that chst6 gene function is not restricted to cornea, and a fraction of mutant larvae have morphological defects. The mutants developed here provide a genetic model for understanding the highly complex roles of keratan sulfate proteoglycans.\"}, {\"paperId\": \"04c7eec6b299b43b90142f3b6c3a2e1899cc84b0\", \"externalIds\": {\"DOI\": \"10.31219/osf.io/8fg9y\", \"CorpusId\": 243401871}, \"title\": \"Gene therapy has been shown to be valuable for understanding complex disease pathophysiologies\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.31219/osf.io/8fg9y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.31219/osf.io/8fg9y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2051613639\", \"name\": \"Moataz Dowaidar\"}], \"abstract\": \"The CRISPR/Cas9 framework has been shown to be an important tool for thestudy of pathophysiological mechanisms of diverse diseases since its discoveryand development. CRISPR/Cas9 is inhibited by biological and technicalobstacles in regards to their presence in post motor arteries, as well as to thepossible side effects on the heart. These are the specific cell types of fibroblasts,the vascular endothelial cells, and the target cells for this treatment are cardiacfibroblasts, which have an endothelial cell structure, and smooth muscle cells.The general medical community would need to invest in advanced services inorder to regularize this approach in the treatment of cardiovascular disease.\"}, {\"paperId\": \"04cb11973adff9c192e586bb79b97eabd956e732\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-1650\", \"CorpusId\": 268653694}, \"title\": \"Abstract 1650: Characterization of nucleolar biological functions via Auxin inducible degron-mediated acute depletion in triple negative breast cancer cells\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-1650?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-1650, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2293079384\", \"name\": \"Nastaran Samadi Rad\"}, {\"authorId\": \"47181331\", \"name\": \"Joseph Mills\"}, {\"authorId\": \"47442911\", \"name\": \"A. Tessari\"}, {\"authorId\": \"2293141069\", \"name\": \"Damu Sunil Kumar\"}, {\"authorId\": \"13641979\", \"name\": \"V. Anastas\"}, {\"authorId\": \"2293007196\", \"name\": \"Saranya Lamba\"}, {\"authorId\": \"2293080539\", \"name\": \"Ashley Reers\"}, {\"authorId\": \"2295851735\", \"name\": \"Ilaria Cosentini\"}, {\"authorId\": \"2293137094\", \"name\": \"Zirui Zhu\"}, {\"authorId\": \"2547262\", \"name\": \"T. Magliery\"}, {\"authorId\": \"2244087877\", \"name\": \"E. Cocucci\"}, {\"authorId\": \"2293080522\", \"name\": \"Lara Rizzotto\"}, {\"authorId\": \"2303360141\", \"name\": \"Dario Palmieri\"}], \"abstract\": \"\\n Nucleoli are large nuclear sub-compartments where vital cellular processes, such as rRNA production and ribosome assembly, take place. Aggressive tumor types, such as Triple Negative Breast Cancer (TNBC), require increased ribosome biogenesis to support their enhanced proliferation. Therefore, it has been suggested that the nucleolus could be a valid anti-neoplastic target. However, we still have a limited understanding of the cancer-specific functions of the nucleolar components, preventing the effective development of therapeutic agents. The characterization of nucleolar proteins is technically challenging. Several nucleolar proteins are essential, and their complete abrogation cannot be achieved through conventional RNAi or CRISPR-KO approaches. Additionally, many nucleolar proteins display peculiar biophysical properties, and their functions are connected to their abundance. Therefore, artificial overexpression systems might not fully recapitulate their endogenous biological functions. To overcome these challenges, we implemented an Auxin Inducible Degron (AID) system to acutely abrogate endogenous nucleolin, one of the most abundant nucleolar proteins, and asses its impact on the proliferation of TNBC cell lines. We used CRISPR/Cas9 editing in TNBC cell lines to modify the endogenous NCL gene, fusing it with an AID tag. Then, we stably transduced the cells with a modified Oryza Sativa TIR1 (OsTIR1-F74G) E3 ubiquitin ligase. In response to the synthetic phytohormone phenyl-auxin, OsTIR1 leads to the proteasomal degradation of AID-containing endogenous nucleolin in less than 6h, sparing any other human protein. RNA sequencing analysis showed that nucleolin degradation significantly alters the expression of genes involved in cell cycle progression. Accordingly, nucleolin degradation reduces cancer cell proliferation in vitro, associated with increased propidium iodide staining, suggestive of a G2/M cell cycle arrest. However, immunofluorescence analyses revealed that nucleolin abrogation leads to the accumulation of bi-nucleated cells with actin patches. These findings are indicative of potential cytokinesis defects due to altered spindle tension during mitosis. Notably, nucleolin abrogation increased the efficacy of chemical inhibitors of the Anaphase Promoting Complex on suppression of cell proliferation. To the best of our knowledge, this study is the first reporting the acute abrogation of an endogenous, highly abundant nucleolar protein, using the AID system. This approach allowed the characterization of nucleolin biological functions with unprecedented temporal resolution, shedding light on new biological functions in the regulation of cell division. Finally, our results suggest that nucleolin inhibition could enhance the therapeutic activities of drugs affecting cell cycle progression in TNBC.\\n Citation Format: Nastaran Samadi Rad, Joseph Mills, Anna Tessari, Damu Sunil Kumar, Vollter Anastas, Saranya Lamba, Ashley B Reers, Ilaria Cosentini, Zirui Zhu, Thomas J Magliery, Emanuele Cocucci, Lara Rizzotto, Dario Palmieri. Characterization of nucleolar biological functions via Auxin inducible degron-mediated acute depletion in triple negative breast cancer cells [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 1650.\"}, {\"paperId\": \"04cc50a07d4a84d00e0cf55a044190d37093630e\", \"externalIds\": {\"MAG\": \"3095562353\", \"DOI\": \"10.1101/2020.11.01.363986\", \"CorpusId\": 226263634}, \"title\": \"MondoA Drives Malignancy in cALL through Enhanced Adaptation to Metabolic Stress\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2020.11.01.363986\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.11.01.363986?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.11.01.363986, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11206179\", \"name\": \"A. Sipol\"}, {\"authorId\": \"49592746\", \"name\": \"Erik Hameister\"}, {\"authorId\": \"1491956900\", \"name\": \"Busheng Xue\"}, {\"authorId\": \"145813631\", \"name\": \"A. Petry\"}, {\"authorId\": \"41075244\", \"name\": \"Carolin Prexler\"}, {\"authorId\": \"2224146\", \"name\": \"Maxim Barenboim\"}, {\"authorId\": \"35673334\", \"name\": \"R. A. Rub\\u00edo\"}, {\"authorId\": \"48910436\", \"name\": \"M. Baldauf\"}, {\"authorId\": \"8062254\", \"name\": \"Davide G. Franchina\"}, {\"authorId\": \"2095732716\", \"name\": \"Juliane Schmaeh\"}, {\"authorId\": \"82166166\", \"name\": \"G. Richter\"}, {\"authorId\": \"4223287\", \"name\": \"G. Cario\"}, {\"authorId\": \"48296237\", \"name\": \"T. Gr\\u00fcnewald\"}, {\"authorId\": \"5575045\", \"name\": \"A. Go\\u0308rlach\"}, {\"authorId\": \"2123664\", \"name\": \"D. Brenner\"}, {\"authorId\": \"5251665\", \"name\": \"J. Ruland\"}, {\"authorId\": \"144503953\", \"name\": \"P. Sorensen\"}, {\"authorId\": \"49260308\", \"name\": \"S. Burdach\"}], \"abstract\": \"Cancer cells are in most instances characterized by rapid proliferation and uncontrolled cell division. Hence, they must adapt to proliferation-induced metabolic stress through intrinsic or acquired anti-metabolic stress responses to maintain homeostasis and survival. One mechanism to achieve this is to reprogram gene expression in a metabolism-dependent manner. MondoA (also known as MLXIP), a member of the MYC interactome, has been described as an example of such a metabolic sensor. However, the role of MondoA in malignancy is not fully understood and the underlying mechanism in metabolic responses remains elusive. By assessing patient data sets we found that MondoA overexpression is associated with a worse survival in pediatric common acute lymphoblastic leukemia (cALL). Using CRISPR/Cas9 and RNA interference approaches, we observed that MondoA depletion reduces transformational capacity of cALL cells in vitro and dramatically inhibits malignant potential in an in vivo mouse model. Interestingly, reduced expression of MondoA in patient data sets correlated with enrichment in metabolic pathways. The loss of MondoA correlated with increased tricarboxylic acid (TCA) cycle activity. Mechanistically, MondoA senses metabolic stress in cALL cells by restricting oxidative phosphorylation through reduced PDH activity. Glutamine starvation conditions greatly enhance this effect and highlight the inability to mitigate metabolic stress upon loss of MondoA in cALL. Our findings give a novel insight into the function of MondoA in pediatric cALL and support the notion that MondoA inhibition in this entity offers a therapeutic opportunity and should be further explored. Key Points MondoA maintains aggressiveness and leukemic burden in common ALL, modulating metabolic stress response.\"}, {\"paperId\": \"04d0d4e843dd85328e92db077d4ac302cd981591\", \"externalIds\": {\"DOI\": \"10.1038/s41565-024-01769-0\", \"CorpusId\": 272221524, \"PubMed\": \"39209994\"}, \"title\": \"Polymer-locking fusogenic liposomes for glioblastoma-targeted siRNA delivery and CRISPR\\u2013Cas gene editing\", \"venue\": \"Nature Nanotechnology\", \"year\": 2024, \"citationCount\": 86, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41565-024-01769-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41565-024-01769-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2319179203\", \"name\": \"Yu Zhao\"}, {\"authorId\": \"2228535812\", \"name\": \"Jie Qin\"}, {\"authorId\": \"2156553253\", \"name\": \"Daohan Yu\"}, {\"authorId\": \"2108136150\", \"name\": \"Yuxiang Liu\"}, {\"authorId\": \"2112739428\", \"name\": \"Danbi Song\"}, {\"authorId\": \"2134235133\", \"name\": \"Kaifu Tian\"}, {\"authorId\": \"2155885120\", \"name\": \"Hao Chen\"}, {\"authorId\": \"51134516\", \"name\": \"Qile Ye\"}, {\"authorId\": \"2249081611\", \"name\": \"Xinyu Wang\"}, {\"authorId\": \"2206407390\", \"name\": \"Tianye Xu\"}, {\"authorId\": \"2298443766\", \"name\": \"Hanwen Xuan\"}, {\"authorId\": \"2080446199\", \"name\": \"Nan Sun\"}, {\"authorId\": \"2358507893\", \"name\": \"Wenbin Ma\"}, {\"authorId\": \"2156523500\", \"name\": \"Junzhe Zhong\"}, {\"authorId\": \"2153406768\", \"name\": \"Penggang Sun\"}, {\"authorId\": \"2262816676\", \"name\": \"Yu Song\"}, {\"authorId\": \"2319172676\", \"name\": \"Jingze Hu\"}, {\"authorId\": \"2319184179\", \"name\": \"Yunlei Zhao\"}, {\"authorId\": \"2314689851\", \"name\": \"Xintong Hou\"}, {\"authorId\": \"2244629761\", \"name\": \"Xiangqi Meng\"}, {\"authorId\": \"144451213\", \"name\": \"Chuanlu Jiang\"}, {\"authorId\": \"2278222731\", \"name\": \"J. Cai\"}], \"abstract\": null}, {\"paperId\": \"04d232e7f49647279c6379b8d24e0f71b74be2db\", \"externalIds\": {\"MAG\": \"3137317581\", \"DOI\": \"10.1111/tpj.15227\", \"CorpusId\": 232230343, \"PubMed\": \"33719095\"}, \"title\": \"Genome engineering of Nannochloropsis with hundred-kilobase fragment deletions by Cas9 cleavages.\", \"venue\": \"The Plant Journal\", \"year\": 2021, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/tpj.15227\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/tpj.15227?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/tpj.15227, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2109072540\", \"name\": \"Qintao Wang\"}, {\"authorId\": \"5432272\", \"name\": \"Yanhai Gong\"}, {\"authorId\": \"2119287960\", \"name\": \"Yuehui He\"}, {\"authorId\": \"46272404\", \"name\": \"Y. Xin\"}, {\"authorId\": \"14398947\", \"name\": \"Nana Lv\"}, {\"authorId\": \"1995454702\", \"name\": \"Xuefeng Du\"}, {\"authorId\": \"2120405191\", \"name\": \"Yun Li\"}, {\"authorId\": \"4891314\", \"name\": \"Byeong-ryool Jeong\"}, {\"authorId\": \"119858627\", \"name\": \"Jian Xu\"}], \"abstract\": \"Industrial microalgae are promising photosynthetic cell factories, yet tools for large-scale targeted genome engineering are limited. Here for the model industrial oleaginous microalga Nannochloropsis oceanica we established a method to precisely and serially delete large genome fragments of ~100 kb from its 30.01-Mb nuclear genome. We started by identifying the \\\"non-essential\\\" chromosomal regions (i.e., low-expression region or LER) based on minimal gene expression under N-replete and N-depleted conditions. The largest such LER (LER1) is ~98 kb in size, located near the telomere of the 502.09 kb-long Chromosome 30 (Chr 30). We deleted 81 kb and further distal and proximal deletions of up to 110 kb (21.9% of Chr 30) in LER1 by dual targeting the boundaries with the episome-based CRISPR/Cas9 system. The telomere-deletion mutants showed normal telomeres consisting of CCCTAA repeats, revealing telomere regeneration capability after losing distal part of Chr 30. Interestingly, the deletions caused no significant alteration in growth, lipid production or photosynthesis (transcript-abundance change for < 3% genes under N depletion). We also achieved double-deletion of both LER1 and LER2 (from Chr 9) that total ~214 kb at maximum, which can result in slightly higher growth rate and biomass productivity than the wild type. Therefore, loss of the large yet \\\"non-essential\\\" regions does not necessarily sacrifice important traits. Such serial targeted deletions of large genomic regions had not been previously reported in microalgae, and will accelerate crafting minimal genomes as chassis for photosynthetic production.\"}, {\"paperId\": \"04d312bf3c713b37d4d8dc89e41e9ce437bcf373\", \"externalIds\": {\"DOI\": \"10.1101/2022.12.14.520443\", \"CorpusId\": 254824797}, \"title\": \"Genome and Genetic Engineering of the House Cricket (Acheta domesticus): Applications for Sustainable Agriculture\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/12/16/2022.12.14.520443.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.12.14.520443?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.12.14.520443, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4192836\", \"name\": \"A. T. Dossey\"}, {\"authorId\": \"6451854\", \"name\": \"B. Oppert\"}, {\"authorId\": \"89098815\", \"name\": \"F. Chu\"}, {\"authorId\": \"40606558\", \"name\": \"M. Lorenzen\"}, {\"authorId\": \"2080545375\", \"name\": \"Brian Scheffler\"}, {\"authorId\": \"34830140\", \"name\": \"S. Simpson\"}, {\"authorId\": \"1695694\", \"name\": \"S. Koren\"}, {\"authorId\": \"143680393\", \"name\": \"J. Johnston\"}, {\"authorId\": \"2150891251\", \"name\": \"Kosuke Kataoka\"}, {\"authorId\": \"108438692\", \"name\": \"Keigo Ide\"}], \"abstract\": null}, {\"paperId\": \"04d40f17457cc80f303bece07cdc659b850bd8a2\", \"externalIds\": {\"DOI\": \"10.1038/s41467-020-16096-w\", \"CorpusId\": 256636213}, \"title\": \"Ubiquitinated-PCNA protects replication forks from DNA2-mediated degradation by regulating Okazaki fragment maturation and chromatin assembly\", \"venue\": \"Nature Communications\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-020-16096-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41467-020-16096-w?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41467-020-16096-w, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"80133316\", \"name\": \"Tanay Thakar\"}, {\"authorId\": \"46669620\", \"name\": \"W. Leung\"}, {\"authorId\": \"49644634\", \"name\": \"Claudia M. Nicolae\"}, {\"authorId\": \"79658860\", \"name\": \"Kristen E Clements\"}, {\"authorId\": \"35022651\", \"name\": \"B. Shen\"}, {\"authorId\": \"4518553\", \"name\": \"A. Bielinsky\"}, {\"authorId\": \"4114364\", \"name\": \"George\\u2010Lucian Moldovan\"}], \"abstract\": \"Upon genotoxic stress, PCNA ubiquitination allows for replication of damaged DNA by recruiting lesion-bypass DNA polymerases. However, PCNA is also ubiquitinated during normal S-phase progression. By employing 293T and RPE1 cells deficient in PCNA ubiquitination, generated through CRISPR/Cas9 gene editing, here, we show that this modification promotes cellular proliferation and suppression of genomic instability under normal growth conditions. Loss of PCNA-ubiquitination results in DNA2-dependent but MRE11-independent nucleolytic degradation of nascent DNA at stalled replication forks. This degradation is linked to defective gap-filling in the wake of the replication fork and incomplete Okazaki fragment maturation, which interferes with efficient PCNA unloading by ATAD5 and subsequent nucleosome deposition by CAF-1. Moreover, concomitant loss of PCNA-ubiquitination and the BRCA pathway results in increased nascent DNA degradation and PARP inhibitor sensitivity. In conclusion, we show that by ensuring efficient Okazaki fragment maturation, PCNA-ubiquitination protects fork integrity and promotes the resistance of BRCA-deficient cells to PARP-inhibitors. PCNA is essential for DNA replication and cellular proliferation. Here, the authors reveal that PCNA ubiquitination protects stalled replication forks from DNA2-mediated degradation via regulation of Okazaki fragment maturation and chromatin assembly.\"}, {\"paperId\": \"04d4154fe94f10686be5f93b0c7d41ec18a003e7\", \"externalIds\": {\"DOI\": \"10.1182/blood-2024-204704\", \"CorpusId\": 274901332}, \"title\": \"Oncogenic CARD11 Mutations and Autonomous BCR Signaling Act As Functionally Equivalent Alternative Drivers in ABC-DLBCL\", \"venue\": \"Blood\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2024-204704?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2024-204704, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2193433502\", \"name\": \"Janneke A Eken\"}, {\"authorId\": \"2336377607\", \"name\": \"Fleur R.M. Havenaar\"}, {\"authorId\": \"4556219\", \"name\": \"Edwin Quinten\"}, {\"authorId\": \"121573641\", \"name\": \"R. D. de Groen\"}, {\"authorId\": \"1746346104\", \"name\": \"Julieta Sep\\u00falveda-Y\\u00e1\\u00f1ez\"}, {\"authorId\": \"5012933\", \"name\": \"J. Vermaat\"}, {\"authorId\": \"32169878\", \"name\": \"C. V. van Bergen\"}, {\"authorId\": \"2251679078\", \"name\": \"Hendrik Veelken\"}], \"abstract\": \"\\n \\n Diffuse large B-cell lymphoma of activated B-cell type (ABC-DLBCL) is characterized by chronic signaling of the B-cell receptor (BCR) pathway with constitutive NF-kB activation. We have recently identified autonomous, i.e. antigen-independent, signaling originating from individual BCR complexes as the cause of BCR pathway activation in the majority of ABC-DLBCL cases (Eken et al., J Exp Med 2024). As a pure immunological driver, autonomous BCR signaling cannot be recognized by sequence analysis nor be readily added to proposed genetic DLBCL subclassifications. Besides autonomous BCR signaling, recurrent activating mutations of various members of the BCR signaling cascade, in particular CD79 and CARD11, and in the TLR pathway member MYD88 contribute to the ABC phenotype. Intriguingly, lack of autonomous BCR signaling is associated with a homozygous CARD11 L251P mutation in the OCI-Ly3 ABC-DLBCL cell line.\\n We therefore investigated the function of recurrent CARD11 mutations in the CARD11 wild-type ABC-DLBCL cell line TMD8. TMD8 cells express a BCR with intermediate-high autonomous signaling and are highly sensitive to the BTK inhibitor acalabrutinib (IC50 = 0.005 nM) by the MTS viability assay. TMD8 cells were gene edited by CRISPR/cas9 homology-directed repair to express the presumed oncogenic CARD11 coiled-coil region mutations L251P, D230N, K215N, and R337Q, cloned, and analyzed by sanger sequencing.\\n Introduction of a hemizygous CARD11L251P/- allele converted TMD8 cells to full acalabrutinib resistance (IC50 >62 \\u03bcM). Hemizygous and homozygous R337Q mutations had negligible effects (CARD11R337Q/-: IC50 = 0.003 nM; CARD11R337Q/R337Q: 0.007 nM). Homozygous K215N and D230N mutations induced partial resistance to acalabrutinib (CARD11K215N/K251N clones: IC50 = 0.25-0.42 nM; CARD11D230N/D230N: IC50 = 0.127 nM). Monoallelic mutations had variable but less pronounced effects (CARD11K215N/WT clones: IC50 = 0.007-0.184 nM; CARD11D230N/WT: IC50 = 0.009 nM).\\n In accordance with the observed sensitivities of CARD11-edited TMD8 clones to BTK inhibition, only CARD11L251P/- clones were able to survive knock-out of their autonomously signaling BCR by CRISPR/cas9-mediated non-homologous end-joining. After BCR knock-out, an IgM-negative population of app. 20% remained detectable in CARD11L251P/- TMD8 cells by flow cytometry for at least 4 weeks of cell culture. For all other CARD11-mutant clones, IgM-negative cells consistently amounted to <1%, even after successful retroviral transduction with the non-signaling OCI-Ly3 IgG BCR. Furthermore, competitive co-culture of three independent TMD8 CARD11L251P/- clones with mock gene-edited control clones failed to showed any growth advantages.\\n In a reciprocal driver-targeting approach, OCI-Ly3 were transduced with the TMD8 BCR and a CRISPR/cas9-resistant but otherwise wild-type CARD11 allele. CRISPR/cas9-mediated knock-out of the CARD11L251P alleles increased acalabrutinib sensitivity from an IC50 >96 \\u03bcM in CARD11L251P/L251P/tgCARD11WT OCI-Ly3 cells to 0.002-7.2 \\u03bcM in CARD11ko/ko/tgCARD11WT cells. All tested gene-modified TMD8 and OCI-Ly3 clones remained equally sensitive to downstream BCR signaling inhibition with the MALT1 inhibitor MI2.\\n In conclusion, we have developed an in vitro system to quantify the effects of defined mechanisms of BCR pathway activation in ABC-DLBCL. Our reciprocally controlled results demonstrate that the strongly activating CARD11 L251P mutation and a BCR with sufficiently strong autonomous signalling provide functionally equivalent but alternative oncogenic growth and survival signals in experimental systems of ABC-DLBCL. Other recurrent mutations of the coiled-coil CARD11 region, even with a CADD-PHRED score of up to 5, have weaker or virtually undetectable effects. In the presence of these mutations, a BCR without autonomous signaling activity fails to rescue knock-out of the autonomous BCR signaling activity, indicating insufficiency of tonic BCR signaling. The low prevalence of the CARD11 L251P mutation emphasizes the importance of antigen-independent autonomous BCR signaling as a frequent non-genetic immunological driver mechanism and the need for detailed dissection of the relative functional contribution of genetic and immunological drivers, including the zygosity of driver mutations, in order to develop optimal individualized targeted therapy for DLBCL patients.\\n\"}, {\"paperId\": \"04d769127bd10e0632d734e8bbe211d79ee39351\", \"externalIds\": {\"DOI\": \"10.1158/0008-5472.CAN-22-3950\", \"CorpusId\": 265211494, \"PubMed\": \"37963210\"}, \"title\": \"The chromatin remodeler CHD4 sustains Ewing Sarcoma cell survival by controlling global chromatin architecture.\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.zora.uzh.ch/id/eprint/252547/1/marques23.pdf\", \"status\": \"GREEN\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/0008-5472.CAN-22-3950?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/0008-5472.CAN-22-3950, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144225113\", \"name\": \"Joana G Marques\"}, {\"authorId\": \"133718041\", \"name\": \"Blaz Pavlovic\"}, {\"authorId\": \"2408318543\", \"name\": \"Quy A Ngo\"}, {\"authorId\": \"66368059\", \"name\": \"G. Pedot\"}, {\"authorId\": \"2066479733\", \"name\": \"Michaela Roemmele\"}, {\"authorId\": \"2163209424\", \"name\": \"Larissa Volken\"}, {\"authorId\": \"2048071048\", \"name\": \"Samanta Kisele\"}, {\"authorId\": \"50332446\", \"name\": \"Romain Perbet\"}, {\"authorId\": \"10413311\", \"name\": \"Marco Wachtel\"}, {\"authorId\": \"2266735927\", \"name\": \"Beat W Schafer\"}], \"abstract\": \"Ewing sarcoma is an aggressive cancer with a defective response to DNA damage leading to an enhanced sensitivity to genotoxic agents. Mechanistically, Ewing sarcoma is driven by the fusion transcription factor EWS-FLI1 which reprograms the tumor cell epigenome. The NuRD complex is an important regulator of chromatin function, controlling both gene expression and DNA damage repair, and has been associated with EWS-FLI1 activity. Here, a NuRD-focused CRISPR/Cas9 inactivation screen identified the helicase CHD4 as essential for Ewing sarcoma cell proliferation. CHD4 silencing induced tumor cell death by apoptosis and abolished colony formation. Although CHD4 and NuRD co-localized with EWS-FLI1 at enhancers and super-enhancers, CHD4 promoted Ewing sarcoma cell survival not by modulating EWS-FLI1 activity and its oncogenic gene expression program but by regulating chromatin structure. CHD4 depletion led to a global increase in DNA accessibility and induction of spontaneous DNA damage, resulting in an increased susceptibility to DNA damaging agents. CHD4 loss delayed tumor growth in vivo, increased overall survival, and combination with PARP inhibition by olaparib treatment further suppressed tumor growth. Collectively, these findings highlight the NuRD subunit CHD4 as a therapeutic target in Ewing sarcoma that can potentiate the anti-tumor activity of genotoxic agents.\"}, {\"paperId\": \"04d9b0f246ef194aae8e37b2c94815e7daa5034a\", \"externalIds\": {\"PubMedCentral\": \"8349887\", \"DOI\": \"10.1038/s41592-021-01207-2\", \"CorpusId\": 232224492, \"PubMed\": \"34341582\"}, \"title\": \"Transgenic mice for in vivo epigenome editing with CRISPR-based systems\", \"venue\": \"Nature Methods\", \"year\": 2021, \"citationCount\": 92, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8349887\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8349887, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4427207\", \"name\": \"M. Gemberling\"}, {\"authorId\": \"4210746\", \"name\": \"Keith Siklenka\"}, {\"authorId\": \"145847607\", \"name\": \"Erica Rodriguez\"}, {\"authorId\": \"2053536204\", \"name\": \"Katherine R Tonn-Eisinger\"}, {\"authorId\": \"50676803\", \"name\": \"Alejandro Barrera\"}, {\"authorId\": \"2158337633\", \"name\": \"Fang Liu\"}, {\"authorId\": \"1931569314\", \"name\": \"Ariel Kantor\"}, {\"authorId\": \"2107912977\", \"name\": \"Liqing Li\"}, {\"authorId\": \"6463965\", \"name\": \"V. Cigliola\"}, {\"authorId\": \"40642851\", \"name\": \"Mariah F. Hazlett\"}, {\"authorId\": \"2019907287\", \"name\": \"Courtney Williams\"}, {\"authorId\": \"51131355\", \"name\": \"Luke C Bartelt\"}, {\"authorId\": \"5764027\", \"name\": \"Victoria J. Madigan\"}, {\"authorId\": \"5694547\", \"name\": \"J. Bodle\"}, {\"authorId\": \"2053537582\", \"name\": \"Heather Daniels\"}, {\"authorId\": \"144609701\", \"name\": \"D. Rouse\"}, {\"authorId\": \"4018545\", \"name\": \"Isaac B. Hilton\"}, {\"authorId\": \"2092945\", \"name\": \"A. Asokan\"}, {\"authorId\": \"4141174\", \"name\": \"M. Ciofani\"}, {\"authorId\": \"5474304\", \"name\": \"K. Poss\"}, {\"authorId\": \"3299227\", \"name\": \"Timothy E. Reddy\"}, {\"authorId\": \"2162204097\", \"name\": \"A. West\"}, {\"authorId\": \"6549092\", \"name\": \"C. Gersbach\"}], \"abstract\": \"CRISPR-Cas9 technologies have dramatically increased the ease of targeting DNA sequences in the genomes of living systems. The fusion of chromatin-modifying domains to nuclease-deactivated Cas9 (dCas9) has enabled targeted epigenome editing in both cultured cells and animal models. However, delivering large dCas9 fusion proteins to target cells and tissues is an obstacle to the widespread adoption of these tools for in vivo studies. Here, we describe the generation and characterization of two conditional transgenic mouse lines for epigenome editing, Rosa26:LSL-dCas9-p300 for gene activation and Rosa26:LSL-dCas9-KRAB for gene repression. By targeting the guide RNAs to transcriptional start sites or distal enhancer elements, we demonstrate regulation of target genes and corresponding changes to epigenetic states and downstream phenotypes in the brain and liver in vivo, and in T\\u2009cells and fibroblasts ex vivo. These mouse lines are convenient and valuable tools for facile, temporally controlled, and tissue-restricted epigenome editing and manipulation of gene expression in vivo. Two conditional transgenic mouse lines based on CRISPRa and CRISPRi enable epigenome editing in vivo.\"}, {\"paperId\": \"04d9c99db2c1d48470f84f6c226a4a0bd9d32f29\", \"externalIds\": {\"PubMedCentral\": \"10063521\", \"DOI\": \"10.1007/s00018-023-04759-y\", \"CorpusId\": 257807620, \"PubMed\": \"36995466\"}, \"title\": \"A zebrafish model of growth hormone insensitivity syndrome with immune dysregulation 1 (GHISID1)\", \"venue\": \"Cellular and Molecular Life Sciences\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s00018-023-04759-y.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10063521, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5211046\", \"name\": \"Somayyeh Heidary\"}, {\"authorId\": \"2052387160\", \"name\": \"N. Awasthi\"}, {\"authorId\": \"2068456852\", \"name\": \"N. Page\"}, {\"authorId\": \"123408621\", \"name\": \"T. Allnutt\"}, {\"authorId\": \"153698473\", \"name\": \"Rowena S. Lewis\"}, {\"authorId\": \"6088413\", \"name\": \"Clifford Liongue\"}, {\"authorId\": \"3243797\", \"name\": \"A. Ward\"}], \"abstract\": \"Signal transducer and activator of transcription (STAT) proteins act downstream of cytokine receptors to facilitate changes in gene expression that impact a range of developmental and homeostatic processes. Patients harbouring loss-of-function (LOF) STAT5B mutations exhibit postnatal growth failure due to lack of responsiveness to growth hormone as well as immune perturbation, a disorder called growth hormone insensitivity syndrome with immune dysregulation 1 (GHISID1). This study aimed to generate a zebrafish model of this disease by targeting the stat5.1 gene using CRISPR/Cas9 and characterising the effects on growth and immunity. The zebrafish Stat5.1 mutants were smaller, but exhibited increased adiposity, with concomitant dysregulation of growth and lipid metabolism genes. The mutants also displayed impaired lymphopoiesis with reduced T cells throughout the lifespan, along with broader disruption of the lymphoid compartment in adulthood, including evidence of T cell activation. Collectively, these findings confirm that zebrafish Stat5.1 mutants mimic the clinical impacts of human STAT5B LOF mutations, establishing them as a model of GHISID1.\"}, {\"paperId\": \"04dca9fb66185157b7b5f7a91e78cc079117e378\", \"externalIds\": {\"DOI\": \"10.51470/psa.2020.5.4.01\", \"CorpusId\": 272395081}, \"title\": \"Defense Mechanisms and Disease Resistance in Plant-Pathogen Interactions\", \"venue\": \"Plant Science Archives\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.51470/psa.2020.5.4.01?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.51470/psa.2020.5.4.01, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2232772610\", \"name\": \"Lellapalli Rithesh\"}], \"abstract\": \"Plant-pathogen interactions are a critical aspect of plant biology, reflecting the ongoing evolutionary battle between plants and the various pathogens that threaten them, including fungi, bacteria, viruses, nematodes, and oomycetes. To survive, plants have developed a diverse array of defense mechanisms, ranging from pre-formed structural barriers to complex molecular and cellular responses that are activated upon pathogen attack. This review provides a comprehensive overview of these defense strategies, including the role of pre-formed and induced structural defenses, chemical defenses, and the intricate signaling pathways that regulate these responses. Additionally, we examine the mechanisms underlying disease resistance, such as gene-for-gene resistance, quantitative resistance, systemic acquired resistance (SAR), and induced systemic resistance (ISR). The review also highlights recent advances in genetic engineering techniques, such as CRISPR/Cas9, transgenic approaches, and RNA interference, which are being used to enhance disease resistance in crops. Understanding these defense mechanisms and leveraging modern biotechnological tools are essential for developing more resilient crops and ensuring global food security in the face of ever-evolving pathogen threats.\"}, {\"paperId\": \"04df521c721a1a4c5605627e1283aa55b861451b\", \"externalIds\": {\"PubMedCentral\": \"10732037\", \"DOI\": \"10.1128/msphere.00311-23\", \"CorpusId\": 265032108, \"PubMed\": \"37929964\"}, \"title\": \"An expanded toolkit of drug resistance cassettes for Candida glabrata, Candida auris, and Candida albicans leads to new insights into the ergosterol pathway\", \"venue\": \"Msphere\", \"year\": 2023, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/msphere.00311-23\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10732037, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2163478434\", \"name\": \"J. Gregor\"}, {\"authorId\": \"2220305775\", \"name\": \"Victor A. Gutierrez-Schultz\"}, {\"authorId\": \"2141556181\", \"name\": \"Smriti Hoda\"}, {\"authorId\": \"49043837\", \"name\": \"Kortany M. Baker\"}, {\"authorId\": \"2265478943\", \"name\": \"Debasmita Saha\"}, {\"authorId\": \"2220307881\", \"name\": \"Madeline G. Burghaze\"}, {\"authorId\": \"2391719333\", \"name\": \"C. V\\u00e1zquez\"}, {\"authorId\": \"2265478058\", \"name\": \"Kendra E Burgei\"}, {\"authorId\": \"6998477\", \"name\": \"S. Briggs\"}], \"abstract\": \"ABSTRACT The World Health Organization recently published the first list of priority fungal pathogens highlighting multiple Candida species, including Candida glabrata, Candida albicans, and Candida auris. However, prior studies in these pathogens have been mainly limited to the use of two drug resistance cassettes, NatMX and HphMX, limiting genetic manipulation capabilities in prototrophic laboratory strains and clinical isolates. In this study, we expanded the toolkit for C. glabrata, C. auris, and C. albicans to include KanMX and BleMX when coupled with an in vitro assembled CRISPR-Cas9 ribonucleoprotein (RNP)-based system. Repurposing these drug resistance cassettes for Candida, we were able to make single gene deletions, sequential and simultaneous double gene deletions, epitope tags, and rescue constructs. We applied these drug resistance cassettes to interrogate the ergosterol pathway, a critical pathway for both the azole and polyene antifungal drug classes. Using our approach, we determined for the first time that the deletion of ERG3 in C. glabrata, C. auris, and C. albicans prototrophic strains results in azole drug resistance, which further supports the conservation of the Erg3-dependent toxic sterol model. Furthermore, we show that an ERG5 deletion in C. glabrata is azole susceptible at subinhibitory concentrations, suggesting that Erg5 could act as an azole buffer for Erg11. Finally, we identified a synthetic growth defect when both ERG3 and ERG5 are deleted in C. glabrata, which suggests the possibility of another toxic sterol impacting growth. Overall, we have expanded the genetic tools available to interrogate complex pathways in prototrophic strains and clinical isolates. IMPORTANCE The increasing problem of drug resistance and emerging pathogens is an urgent global health problem that necessitates the development and expansion of tools for studying fungal drug resistance and pathogenesis. Prior studies in Candida glabrata, Candida auris, and Candida albicans have been mainly limited to the use of NatMX/SAT1 and HphMX/CaHyg for genetic manipulation in prototrophic strains and clinical isolates. In this study, we demonstrated that NatMX/SAT1, HphMX, KanMX, and/or BleMX drug resistance cassettes when coupled with a CRISPR-ribonucleoprotein (RNP)-based system can be efficiently utilized for deleting or modifying genes in the ergosterol pathway of C. glabrata, C. auris, and C. albicans. Moreover, the utility of these tools has provided new insights into ERG genes and their relationship to azole resistance in Candida. Overall, we have expanded the toolkit for Candida pathogens to increase the versatility of genetically modifying complex pathways involved in drug resistance and pathogenesis. The increasing problem of drug resistance and emerging pathogens is an urgent global health problem that necessitates the development and expansion of tools for studying fungal drug resistance and pathogenesis. Prior studies in Candida glabrata, Candida auris, and Candida albicans have been mainly limited to the use of NatMX/SAT1 and HphMX/CaHyg for genetic manipulation in prototrophic strains and clinical isolates. In this study, we demonstrated that NatMX/SAT1, HphMX, KanMX, and/or BleMX drug resistance cassettes when coupled with a CRISPR-ribonucleoprotein (RNP)-based system can be efficiently utilized for deleting or modifying genes in the ergosterol pathway of C. glabrata, C. auris, and C. albicans. Moreover, the utility of these tools has provided new insights into ERG genes and their relationship to azole resistance in Candida. Overall, we have expanded the toolkit for Candida pathogens to increase the versatility of genetically modifying complex pathways involved in drug resistance and pathogenesis.\"}, {\"paperId\": \"04e12cf52061a540c8e60dd832f26e38a600bb6f\", \"externalIds\": {\"DOI\": \"10.1021/acs.jafc.1c07180\", \"CorpusId\": 247056614, \"PubMed\": \"35192362\"}, \"title\": \"Design of Acetohydroxyacid Synthase Herbicide-Resistant Germplasm through MB-QSAR and CRISPR/Cas9-Mediated Base-Editing Approaches.\", \"venue\": \"Journal of Agricultural and Food Chemistry\", \"year\": 2022, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.jafc.1c07180?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.jafc.1c07180, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146825629\", \"name\": \"Tao Wei\"}, {\"authorId\": \"151257112\", \"name\": \"Xin Wen\"}, {\"authorId\": \"3081436\", \"name\": \"Congwei Niu\"}, {\"authorId\": \"2147399600\", \"name\": \"Sijing An\"}, {\"authorId\": \"2143916114\", \"name\": \"Dawei Wang\"}, {\"authorId\": \"2056796671\", \"name\": \"Zhen Xi\"}, {\"authorId\": \"21332181\", \"name\": \"N. Wang\"}], \"abstract\": \"The development of herbicide-resistant germplasm is significant in solving the increasingly severe weed problem in crop fields. In this study, we, for the first time, rationally designed a predictable and effective approach to create herbicide-resistant germplasm by combining mutation-dependent biomacromolecular quantitative structure-activity relationship (MB-QSAR) and CRISPR/Cas9-mediated base-editing strategies. Our results showed that the homozygous P197F-G654D-G655S or P197F-G654N-G655S Arabidopsis plants exhibited high resistance to multiple acetohydroxyacid synthase-inhibiting herbicides, including chlorsulfuron, bispyribac-sodium, and flucarbazone-sodium. Additionally, the plants with the homozygous P197S mutant displayed increased susceptibility to bispyribac-sodium than the wild-type but more resistance to flumetsulam than other mutants. Besides, we found that the herbicide resistance levels of the gene-edited plants have a good correlation with MB-QSAR prediction.\"}, {\"paperId\": \"04e4b24f226c08d1ff88b226215fee9ba6603bcc\", \"externalIds\": {\"PubMedCentral\": \"8750304\", \"DOI\": \"10.3390/cells11010118\", \"CorpusId\": 245633295, \"PubMed\": \"35011680\"}, \"title\": \"Combined Use of Whole Exome Sequencing and CRISPR/Cas9 to Study the Etiology of Non-Obstructive Azoospermia: Demonstration of the Dispensable Role of the Testis-Specific Genes C1orf185 and CCT6B\", \"venue\": \"Cells\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/11/1/118/pdf?version=1640944326\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8750304, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"150053861\", \"name\": \"Caroline Cazin\"}, {\"authorId\": \"49752572\", \"name\": \"Yasmine Neirijnck\"}, {\"authorId\": \"48187263\", \"name\": \"C. Loeuillet\"}, {\"authorId\": \"2148630269\", \"name\": \"L. Wehrli\"}, {\"authorId\": \"34676403\", \"name\": \"Franc\\u0327oise Ku\\u0308hne\"}, {\"authorId\": \"2148628800\", \"name\": \"Isabelle Lordey\"}, {\"authorId\": \"2004109599\", \"name\": \"Selima Fourati Ben Mustapha\"}, {\"authorId\": \"49947936\", \"name\": \"A. Bouker\"}, {\"authorId\": \"88501959\", \"name\": \"R. Zouari\"}, {\"authorId\": \"1401232505\", \"name\": \"Nicolas Thierry-Mieg\"}, {\"authorId\": \"4706984\", \"name\": \"S. Nef\"}, {\"authorId\": \"145316543\", \"name\": \"C. Arnoult\"}, {\"authorId\": \"6188084\", \"name\": \"P. Ray\"}, {\"authorId\": \"90627551\", \"name\": \"Z. Kherraf\"}], \"abstract\": \"The genetic landscape of male infertility is highly complex. It is estimated that at least 4000 genes are involved in human spermatogenesis, but only few have so far been extensively studied. In this study, we investigated by whole exome sequencing two cases of idiopathic non-obstructive azoospermia (NOA) due to severe hypospermatogenesis. After variant filtering and prioritizing, we retained for each patient a homozygous loss-of-function (LoF) variant in a testis-specific gene, C1orf185 (c.250C>T; p.Gln84Ter) and CCT6B (c.615-2A>G), respectively. Both variants are rare according to the gnomAD database and absent from our local control cohort (n = 445). To verify the implication of these candidate genes in NOA, we used the CRISPR/Cas9 system to invalidate the mouse orthologs 4930522H14Rik and Cct6b and produced two knockout (KO) mouse lines. Sperm and testis parameters of homozygous KO adult male mice were analyzed and compared with those of wild-type animals. We showed that homozygous KO males were fertile and displayed normal sperm parameters and a functional spermatogenesis. Overall, these results demonstrate that not all genes highly and specifically expressed in the testes are essential for spermatogenesis, and in particular, we conclude that bi-allelic variants of C1orf185 and CCT6B are most likely not to be involved in NOA and male fertility.\"}, {\"paperId\": \"04e5010e07bc3b9d67db3b159409f02659073c17\", \"externalIds\": {\"PubMedCentral\": \"10269636\", \"DOI\": \"10.1128/spectrum.00315-23\", \"CorpusId\": 258049924, \"PubMed\": \"37036336\"}, \"title\": \"Characterization of the Sterol 24-C-Methyltransferase Genes Reveals a Network of Alternative Sterol Biosynthetic Pathways in Mucor lusitanicus\", \"venue\": \"Microbiology spectrum\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/spectrum.00315-23\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10269636, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2086833188\", \"name\": \"Kitti Bauer\"}, {\"authorId\": \"2080497338\", \"name\": \"Bence Rafael\"}, {\"authorId\": \"14630477\", \"name\": \"Bernadette Vago\"}, {\"authorId\": \"2196598268\", \"name\": \"S\\u00e1ndor Kiss-Vetr\\u00e1b\"}, {\"authorId\": \"50775268\", \"name\": \"A. Moln\\u00e1r\"}, {\"authorId\": \"26907258\", \"name\": \"Csilla Szebenyi\"}, {\"authorId\": \"2247206\", \"name\": \"M. Varga\"}, {\"authorId\": \"4408530\", \"name\": \"A. Szekeres\"}, {\"authorId\": \"2476354\", \"name\": \"C. V\\u00e1gv\\u00f6lgyi\"}, {\"authorId\": \"2615058\", \"name\": \"T. Papp\"}, {\"authorId\": \"47640655\", \"name\": \"G. Nagy\"}], \"abstract\": \"The fungal membrane contains ergosterol instead of cholesterol, which offers a specific point of attack for the defense against pathogenic fungi. Indeed, most antifungal agents target ergosterol or its biosynthesis. ABSTRACT Certain members of the order Mucorales can cause a life-threatening, often-fatal systemic infection called mucormycosis. Mucormycosis has a high mortality rate, which can reach 96 to 100% depending on the underlying condition of the patient. Mucorales species are intrinsically resistant to most antifungal agents, such as most of the azoles, which makes mucormycosis treatment challenging. The main target of azoles is the lanosterol 14\\u03b1-demethylase (Erg11), which is responsible for an essential step in the biosynthesis of ergosterol, the main sterol component of the fungal membrane. Mutations in the erg11 gene can be associated with azole resistance; however, resistance can also be mediated by loss of function or mutation of other ergosterol biosynthetic enzymes, such as the sterol 24-C-methyltransferase (Erg6). The genome of Mucor lusitanicus encodes three putative erg6 genes (i.e., erg6a, erg6b, and erg6c). In this study, the role of erg6 genes in azole resistance of Mucor was analyzed by generating and analyzing knockout mutants constructed using the CRISPR-Cas9 technique. Susceptibility testing of the mutants suggested that one of the three genes, erg6b, plays a crucial role in the azole resistance of Mucor. The sterol composition of erg6b knockout mutants was significantly altered compared to that of the original strain, and it revealed the presence of at least four alternative sterol biosynthesis pathways leading to formation of ergosterol and other alternative, nontoxic sterol products. Dynamic operation of these pathways and the switching of biosynthesis from one to the other in response to azole treatment could significantly contribute to avoiding the effects of azoles by these fungi. IMPORTANCE The fungal membrane contains ergosterol instead of cholesterol, which offers a specific point of attack for the defense against pathogenic fungi. Indeed, most antifungal agents target ergosterol or its biosynthesis. Mucormycoses-causing fungi are resistant to most antifungal agents, including most of the azoles. For this reason, the drugs of choice to treat such infections are limited. The exploration of ergosterol biosynthesis is therefore of fundamental importance to understand the azole resistance of mucormycosis-causing fungi and to develop possible new control strategies. Characterization of sterol 24-C-methyltransferase demonstrated its role in the azole resistance and virulence of M. lusitanicus. Moreover, our experiments suggest that there are at least four alternative pathways for the biosynthesis of sterols in Mucor. Switching between pathways may contribute to the maintenance of azole resistance.\"}, {\"paperId\": \"04e6a40c8234f6ccc3e95727c8f4c947a795dbc6\", \"externalIds\": {\"CorpusId\": 252189477}, \"title\": \"T CELLS FOR THE TREATMENT OF GLIOBLASTOMA A RETROSPECTIVE STUDY\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://watermark.silverchair.com/noac174.061.pdf?token=AQECAHi208BE49Ooan9kkhW_Ercy7Dm3ZL_9Cf3qfKAc485ysgAAAvowggL2BgkqhkiG9w0BBwagggLnMIIC4wIBADCCAtwGCSqGSIb3DQEHATAeBglghkgBZQMEAS4wEQQMnwTrc7eK4c7G2FNaAgEQgIICrUEL1FMLN3rEP4S8R3vOeQ56ZXzagwwdORCjhd-t2Yqv-UMalbBuk0VSVGmxOjTIQcJPdkz_-vyplj-uWz5ic4ZGgczTCAVgS5mTWXbVIPF7CpqrYAah0MfjZ43X6hsnXFMENeepc2LmlNjMhGEehBNJ9PPboLZNqwQ5qSRyOaZd43L4Hff50uhuRsOBnRY0Mr5YvZe6wHiQfWp0q2TwP9TjWXoXZNhQfntekh6vkn8_ACzXuRQ2ujaeKI1RCirOmo9NTyms6KcBs0cMJIwwfmZCGklcW_QB-CaSYTWC-_L5tGzqmLUjNWEmDzKysrk3M9fK8hEF8cPGZ0uiKp4-GP38F2NeZBCGgcHoqIKoeC5ZYJ7Lo1HP5BzX7qWkB4Qo0QSNF6xReAY4F020SB5Hv8NdFpM2moWqS5ZAn1s1KzY63rz80mHVUIpHRBWf9cm6Nl28Hd_ixESTanJXVqosMwSnL2aasa9h0a1s1gaHjQe3IjN-exaCc_3pL0tzCFoAe5Mqbf-Ve8miM4uNFtb5YkpJaIbII4KnJvgd1Cd1ddaCT17wqIQcPwdnvSHlvualFforzWzTvpHKd5i7kfYYV3cW0UdTV2Ssm7dsY5ZuB_pmHtq7X4Nfs3i03_oNvYuv9JP1p7XpZk5S73UgwpmZIqN_UQYXVNJH25qNz8PuEiYlJXzNnmW71gtVYbn71J4bOp1Cy_PgDI2Hu4-JHxa9ctvDLC8mtdjUOxst3DDQASJsnQ1iZLlitQBEjKJn9SbJ7VZZDPTJ0zSIBXQ5JOrIUHw2a_7wqvVHu6r6eQV6I3TwYr5WJFXfIV-RqydJt_P6oqfE5POwbOV-2LCpU8fSucgcysOqPih2IoGVHUcprofwWJ01KjUbUHSYS5CssaAdxEjlJ_WjUBm0PODlaWw, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2184615829\", \"name\": \"Collemi\"}, {\"authorId\": \"2148488215\", \"name\": \"Orlando\"}, {\"authorId\": \"2184615569\", \"name\": \"Tampieri\"}, {\"authorId\": \"2184617005\", \"name\": \"Senetta\"}, {\"authorId\": \"2184616181\", \"name\": \"Pellerino\"}, {\"authorId\": \"2073480756\", \"name\": \"Bruno\"}, {\"authorId\": \"2184615823\", \"name\": \"Melcarne\"}, {\"authorId\": \"1491029262\", \"name\": \"Garbossa\"}, {\"authorId\": \"82675486\", \"name\": \"Rud\\u00e0\"}, {\"authorId\": \"2177344533\", \"name\": \"Soffietti\"}, {\"authorId\": \"2163184888\", \"name\": \"Ribero\"}, {\"authorId\": \"2102583153\", \"name\": \"Quaglino\"}, {\"authorId\": \"1507204427\", \"name\": \"Cassoni\"}, {\"authorId\": \"96295932\", \"name\": \"Bertero\"}, {\"authorId\": \"51424538\", \"name\": \"Budhiraja\"}, {\"authorId\": \"2184615798\", \"name\": \"Baisiwala\"}, {\"authorId\": \"2270657421\", \"name\": \"Perrault\"}, {\"authorId\": \"2117416053\", \"name\": \"Dara\"}, {\"authorId\": \"2184616557\", \"name\": \"Nandoliya\"}, {\"authorId\": \"2184615796\", \"name\": \"Zolp\"}, {\"authorId\": \"2117445730\", \"name\": \"Chen\"}, {\"authorId\": \"2184617001\", \"name\": \"Dmello\"}, {\"authorId\": \"2060739135\", \"name\": \"Park\"}, {\"authorId\": \"2184615571\", \"name\": \"Sonabend\"}], \"abstract\": null}, {\"paperId\": \"04e919d840f5dbf392046821bc0a0930224773d9\", \"externalIds\": {\"PubMedCentral\": \"11253549\", \"DOI\": \"10.1186/s12864-024-10597-4\", \"CorpusId\": 271244098, \"PubMed\": \"39020310\"}, \"title\": \"CRISPR-Cas9 and Cas12a target site richness reflects genomic diversity in natural populations of Anopheles gambiae and Aedes aegypti mosquitoes\", \"venue\": \"BMC Genomics\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1186/s12864-024-10597-4\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11253549, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2306730692\", \"name\": \"Travis C Collier\"}, {\"authorId\": \"2110391549\", \"name\": \"Y. Lee\"}, {\"authorId\": \"2292853471\", \"name\": \"Derrick K Mathias\"}, {\"authorId\": \"15924531\", \"name\": \"V\\u00edctor L\\u00f3pez Del Amo\"}], \"abstract\": \"Due to limitations in conventional disease vector control strategies including the rise of insecticide resistance in natural populations of mosquitoes, genetic control strategies using CRISPR gene drive systems have been under serious consideration. The identification of CRISPR target sites in mosquito populations is a key aspect for developing efficient genetic vector control strategies. While genome-wide Cas9 target sites have been explored in mosquitoes, a precise evaluation of target sites focused on coding sequence (CDS) is lacking. Additionally, target site polymorphisms have not been characterized for other nucleases such as Cas12a, which require a different DNA recognition site (PAM) and would expand the accessibility of mosquito genomes for genetic engineering. We undertook a comprehensive analysis of potential target sites for both Cas9 and Cas12a nucleases within the genomes of natural populations of Anopheles gambiae and Aedes aegypti from multiple continents. We demonstrate that using two nucleases increases the number of targets per gene. Also, we identified differences in nucleotide diversity between North American and African Aedes populations, impacting the abundance of good target sites with a minimal degree of polymorphisms that can affect the binding of gRNA. Lastly, we screened for gRNAs targeting sex-determination genes that could be widely applicable for developing field genetic control strategies. Overall, this work highlights the utility of employing both Cas9 and Cas12a nucleases and underscores the importance of designing universal genetic strategies adaptable to diverse mosquito populations.\"}, {\"paperId\": \"04ea755564bb9ff49516258a4555e121ee2315c3\", \"externalIds\": {\"MAG\": \"3086010760\", \"DOI\": \"10.1016/j.micpath.2020.104487\", \"CorpusId\": 221672579, \"PubMed\": \"32920150\"}, \"title\": \"Integrated transcriptomic and quantitative proteomic analysis identifies potential RNA sensors that respond to the Ag85A DNA vaccine.\", \"venue\": \"Microbial Pathogenesis\", \"year\": 2020, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.micpath.2020.104487?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.micpath.2020.104487, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48017705\", \"name\": \"Jingbo Zhai\"}, {\"authorId\": \"2153576603\", \"name\": \"Wei Gao\"}, {\"authorId\": \"114024994\", \"name\": \"Leheng Zhao\"}, {\"authorId\": \"2136216564\", \"name\": \"Changlong Lu\"}], \"abstract\": \"OBJECTIVE\\nDNA vaccine has emerged as a promising approach with potential for Tuberculosis (TB) prevention in adults. However, the mechanism behind DNA vaccines is still largely unknown.\\n\\n\\nMATERIALS AND METHODS\\nUtilizing the CRISPR/Cas9 technique, we engineered Ag85A mutated dendritic cells (Ag85A-M-DCs) in which the Ag85A mRNA derived from Mycobacterium tuberculosis was expressed but not the corresponding protein. Control cells (Ag85A-DCs) expressed both Ag85A mRNA and protein. To better understand the mechanism of antigen presentation following DNA vaccination, integrated transcriptomic and proteomic analysis of dendritic cells (DCs), Ag85A-DCs, and Ag85A-M-DCs were performed.\\n\\n\\nRESULTS\\nA total of 723, 278, and 933 differentially expressed genes (DEGs), and 209, 134, and 509 differentially expressed proteins (DEPs) were identified between Ag85A-M-DCs and DCs, Ag85A-DCs and DCs, and Ag85A-M-DCs and Ag85A-DCs, respectively. Integration analysis detected 59, 15, and 64 associated DEGs/DEPs with the same expression trend between Ag85A-M-DCs and DCs, Ag85A-DCs and DCs, and Ag85A-M-DCs and Ag85A-DCs, respectively. KEGG pathway analysis showed that chemokine signaling pathway and MAPK signaling pathway were enriched in all three pairs of comparisons. The protein and protein interaction network revealed that ANXA1 was in the top 10 high-degree hub genes closely related to other genes in all three pairs of comparisons.\\n\\n\\nCONCLUSION\\nThe results indicated that Ag85A DNA vaccine might transmit immunogenicity information and induce immune responses by activating chemokine signaling pathway and MAPK signaling pathway. ANXA1 may serve as a key target molecule of the Ag85A vaccine with additional potential for TB prevention.\"}, {\"paperId\": \"04ee6a3e00c680f5f3148133ab4276ab7eec142b\", \"externalIds\": {\"DOI\": \"10.1158/0008-5472.CAN-23-2994\", \"CorpusId\": 265042202, \"PubMed\": \"37934103\"}, \"title\": \"TEAD Inhibition Overcomes YAP1/TAZ-driven Primary and Acquired Resistance to KRASG12C Inhibitors.\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 51, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10821578\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/0008-5472.CAN-23-2994?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/0008-5472.CAN-23-2994, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2147108919\", \"name\": \"A. C. Edwards\"}, {\"authorId\": \"15534610\", \"name\": \"Clint A. Stalnecker\"}, {\"authorId\": \"2265568585\", \"name\": \"Alexis Jean Morales\"}, {\"authorId\": \"2215956076\", \"name\": \"Khalilah E Taylor\"}, {\"authorId\": \"49504555\", \"name\": \"Jennifer E. Klomp\"}, {\"authorId\": \"2265569733\", \"name\": \"Jeffrey A. Klomp\"}, {\"authorId\": \"50384801\", \"name\": \"Andrew M. Waters\"}, {\"authorId\": \"145942534\", \"name\": \"Niranjan Sudhakar\"}, {\"authorId\": \"46345871\", \"name\": \"Jill Hallin\"}, {\"authorId\": \"2243441750\", \"name\": \"Tracy T Tang\"}, {\"authorId\": \"2170574803\", \"name\": \"Peter Olson\"}, {\"authorId\": \"2098362900\", \"name\": \"L. Post\"}, {\"authorId\": \"2240559779\", \"name\": \"James G Christensen\"}, {\"authorId\": \"2251579919\", \"name\": \"Adrienne D. Cox\"}, {\"authorId\": \"4764611\", \"name\": \"C. Der\"}], \"abstract\": \"Primary/intrinsic and treatment-induced acquired resistance limit the initial response rate to and long-term efficacy of direct inhibitors of the KRASG12C mutant in cancer. To identify potential mechanisms of resistance, we applied a CRISPR/Cas9 loss-of-function screen and observed loss of multiple components of the Hippo tumor suppressor pathway, which acts to suppress YAP1/TAZ-regulated gene transcription. YAP1/TAZ activation impaired the anti-proliferative and pro-apoptotic effects of KRASG12C inhibitor (G12Ci) treatment in KRASG12C-mutant cancer cell lines. Conversely, genetic suppression of YAP1/WWTR1 (TAZ) enhanced G12Ci sensitivity. YAP1/TAZ activity overcame KRAS dependency through two distinct TEAD transcription factor-dependent mechanisms that phenocopy KRAS effector signaling. First, TEAD stimulated ERK-independent transcription of genes normally regulated by ERK (BIRC5, CDC20, ECT2, FOSL1 and MYC) to promote progression through the cell cycle. Second, TEAD caused activation of PI3K-AKT-mTOR signaling to overcome apoptosis. G12Ci treatment-induced acquired resistance was also caused by YAP1/TAZ-TEAD activation. Accordingly, concurrent treatment with pharmacologic inhibitors of TEAD synergistically enhanced KRASG12C inhibitor anti-tumor activity in vitro and prolonged tumor suppression in vivo. In summary, these observations reveal YAP1/TAZ-TEAD signaling as a crucial driver of primary and acquired resistance to KRAS inhibition and support the use of TEAD inhibitors to enhance the anti-tumor efficacy of KRAS-targeted therapies.\"}, {\"paperId\": \"04f5c7a14955e9fa575d705ea975ad8c758ef723\", \"externalIds\": {\"PubMedCentral\": \"8523357\", \"DOI\": \"10.3389/fpls.2021.757152\", \"CorpusId\": 238232556, \"PubMed\": \"34675957\"}, \"title\": \"Concurrent Disruption of Genetic Interference and Increase of Genetic Recombination Frequency in Hybrid Rice Using CRISPR/Cas9\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2021.757152/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8523357, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6609821\", \"name\": \"Chaolei Liu\"}, {\"authorId\": \"2112867456\", \"name\": \"Yiwei Cao\"}, {\"authorId\": \"4392872\", \"name\": \"Yufeng Hua\"}, {\"authorId\": \"11298980\", \"name\": \"Guijie Du\"}, {\"authorId\": \"2154973862\", \"name\": \"Qing Liu\"}, {\"authorId\": \"2165979044\", \"name\": \"Xin Wei\"}, {\"authorId\": \"2087036816\", \"name\": \"Tingting Sun\"}, {\"authorId\": \"48208401\", \"name\": \"Jianrong Lin\"}, {\"authorId\": \"67286352\", \"name\": \"Mingguo Wu\"}, {\"authorId\": \"144079598\", \"name\": \"Zhukuan Cheng\"}, {\"authorId\": \"40419040\", \"name\": \"Kejian Wang\"}], \"abstract\": \"Manipulation of the distribution and frequency of meiotic recombination events to increase genetic diversity and disrupting genetic interference are long-standing goals in crop breeding. However, attenuation of genetic interference is usually accompanied by a reduction in recombination frequency and subsequent loss of plant fertility. In the present study, we generated null mutants of the ZEP1 gene, which encodes the central component of the meiotic synaptonemal complex (SC), in a hybrid rice using CRISPR/Cas9. The null mutants exhibited absolute male sterility but maintained nearly unaffected female fertility. By pollinating the zep1 null mutants with pollen from indica rice variety 93-11, we successfully conducted genetic analysis and found that genetic recombination frequency was greatly increased and genetic interference was completely eliminated in the absence of ZEP1. The findings provided direct evidence to support the controversial hypothesis that SC is involved in mediating interference. Additionally, the remained female fertility of the null mutants makes it possible to break linkage drag. Our study provides a potential approach to increase genetic diversity and fully eliminate genetic interference in rice breeding.\"}, {\"paperId\": \"04f5f4a4f83734a293a11adf0b39ec369e111d9e\", \"externalIds\": {\"MAG\": \"3091080031\", \"PubMedCentral\": \"7650549\", \"DOI\": \"10.3390/biom10101389\", \"CorpusId\": 226290604}, \"title\": \"Confirmation of Connexin45 Underlying Weak Gap Junctional Intercellular Coupling in HeLa Cells\", \"venue\": \"Biomolecules\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2218-273X/10/10/1389/pdf?version=1601996194\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7650549, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48391916\", \"name\": \"E. Choi\"}, {\"authorId\": \"1401223044\", \"name\": \"N. Palacios-Prado\"}, {\"authorId\": \"38190379\", \"name\": \"J. S\\u00e1ez\"}, {\"authorId\": \"4508161\", \"name\": \"Jinu Lee\"}], \"abstract\": \"Gap junctions (GJs) are intercellular channels that connect adjacent cells electrically and metabolically. The iodide-yellow fluorescent protein (I-YFP) gap junctional intercellular communication (GJIC) assay is a recently developed method with high sensitivity. HeLa cells have been widely used as GJ-deficient cells for GJ-related research. Herein, we present evidence showing that HeLa cells have functional GJs comprising connexin (Cx) 45 using the I-YFP GJ assay and CRISPR/Cas9 system. We conducted the I-YFP GJIC assay in HeLa cells, which revealed a weak level of GJIC that could not be detected by the Lucifer yellow scrape-loading assay. The mRNA expression of GJB5 (Cx31.1), GJA1 (Cx43), and GJC1 (Cx45) was detected in HeLa cells by RT-PCR analysis. Knocking out GJC1 (Cx45) abolished GJIC, as analyzed by the I-YFP assay and dual whole-cell patch-clamp assay. These results suggest that HeLa cells express Cx45-based GJs and that the I-YFP GJIC assay can be used for cells with weak GJIC, such as Cx45-expressing HeLa cells. Further, GJC1 (Cx45)-knockout HeLa cells are more suitable as a GJ-null cell model for transfection experiments than wild-type HeLa cells. This experimental design was successfully applied to knock out Cx43 expression and GJIC in A549 lung cancer cells and can thus be used to identify major Cxs in other cell types and to establish GJ assay systems for different Cxs.\"}, {\"paperId\": \"04f8aedb2a18124a365951744f3e3c6d937d270f\", \"externalIds\": {\"PubMedCentral\": \"8455316\", \"DOI\": \"10.1016/j.omtn.2021.08.015\", \"CorpusId\": 238214575, \"PubMed\": \"34589289\"}, \"title\": \"CRISPR-Cas9 correction of OPA1 c.1334G>A: p.R445H restores mitochondrial homeostasis in dominant optic atrophy patient-derived iPSCs\", \"venue\": \"Molecular Therapy: Nucleic Acids\", \"year\": 2021, \"citationCount\": 34, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2162253121002092/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8455316, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2023736575\", \"name\": \"P. Sladen\"}, {\"authorId\": \"4292086\", \"name\": \"P. Perdig\\u00e3o\"}, {\"authorId\": \"3919731\", \"name\": \"G. Salsbury\"}, {\"authorId\": \"2130156549\", \"name\": \"Tatiana Novoselova\"}, {\"authorId\": \"7275296\", \"name\": \"J. van der Spuy\"}, {\"authorId\": \"144145894\", \"name\": \"J. Chapple\"}, {\"authorId\": \"1398328355\", \"name\": \"P. Yu\\u2010Wai\\u2010Man\"}, {\"authorId\": \"3584277\", \"name\": \"M. Cheetham\"}], \"abstract\": \"Autosomal dominant optic atrophy (DOA) is the most common inherited optic neuropathy in the United Kingdom. DOA has an insidious onset in early childhood, typically presenting with bilateral, central visual loss caused by the preferential loss of retinal ganglion cells. 60%\\u201370% of genetically confirmed DOA cases are associated with variants in OPA1, a ubiquitously expressed GTPase that regulates mitochondrial homeostasis through coordination of inner membrane fusion, maintenance of cristae structure, and regulation of bioenergetic output. Whether genetic correction of OPA1 pathogenic variants can alleviate disease-associated phenotypes remains unknown. Here, we demonstrate generation of patient-derived OPA1 c.1334G>A: p.R445H mutant induced pluripotent stem cells (iPSCs), followed by correction of OPA1 through CRISPR-Cas9-guided homology-directed repair (HDR) and evaluate the effect of OPA1 correction on mitochondrial homeostasis. CRISPR-Cas9 gene editing demonstrated an efficient method of OPA1 correction, with successful gene correction in 57% of isolated iPSCs. Correction of OPA1 restored mitochondrial homeostasis, re-establishing the mitochondrial network and basal respiration and ATP production levels. In addition, correction of OPA1 re-established the levels of wild-type (WT) mitochondrial DNA (mtDNA) and reduced susceptibility to apoptotic stimuli. These data demonstrate that nuclear gene correction can restore mitochondrial homeostasis and improve mtDNA integrity in DOA patient-derived cells carrying an OPA1 variant.\"}, {\"paperId\": \"04f9c1fd91fe9644cbf030df6d66b3a587ee6cc1\", \"externalIds\": {\"PubMedCentral\": \"9603287\", \"DOI\": \"10.3390/ijms232012307\", \"CorpusId\": 252976797, \"PubMed\": \"36293157\"}, \"title\": \"Application of the Mutant Libraries for Candida albicans Functional Genomics\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/20/12307/pdf?version=1666690605\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9603287, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2118463608\", \"name\": \"Ruina Wang\"}, {\"authorId\": \"9184162\", \"name\": \"Jiacun Liu\"}, {\"authorId\": \"2146403270\", \"name\": \"Yu Liu\"}, {\"authorId\": \"6827918\", \"name\": \"Quanzhen Lv\"}, {\"authorId\": \"2218566270\", \"name\": \"Lan Yan\"}], \"abstract\": \"Candida albicans is a typical opportunistic pathogen in humans that causes serious health risks in clinical fungal infections. The construction of mutant libraries has made remarkable developments in the study of C. albicans molecular and cellular biology with the ongoing advancements of gene editing, which include the application of CRISPR-Cas9 and novel high-efficient transposon. Large-scale genetic screens and genome-wide functional analysis accelerated the investigation of new genetic regulatory mechanisms associated with the pathogenicity and resistance to environmental stress in C. albicans. More importantly, sensitivity screening based on C. albicans mutant libraries is critical for the target identification of novel antifungal compounds, which leads to the discovery of Sec7p, Tfp1p, Gwt1p, Gln4p, and Erg11p. This review summarizes the main types of C. albicans mutant libraries and interprets their applications in morphogenesis, biofilm formation, fungus\\u2013host interactions, antifungal drug resistance, and target identification.\"}, {\"paperId\": \"05009f456d85f0f2a645a9f3c3cc86e8c83ac0df\", \"externalIds\": {\"DOI\": \"10.1016/j.ibmb.2022.103726\", \"CorpusId\": 246617803, \"PubMed\": \"35131470\"}, \"title\": \"piggyBac-based transgenic RNAi of serine protease 2 results in male sterility in Hyphantria cunea.\", \"venue\": \"Insect Biochemistry and Molecular Biology\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ibmb.2022.103726?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ibmb.2022.103726, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108855290\", \"name\": \"Xiaowei Li\"}, {\"authorId\": \"2115900828\", \"name\": \"Qun Liu\"}, {\"authorId\": \"14666853\", \"name\": \"Honglun Bi\"}, {\"authorId\": \"46179595\", \"name\": \"Yaohui Wang\"}, {\"authorId\": \"2109265979\", \"name\": \"Xia Xu\"}, {\"authorId\": \"2107167185\", \"name\": \"Weifeng Sun\"}, {\"authorId\": \"104168770\", \"name\": \"Ze Zhang\"}, {\"authorId\": \"39183065\", \"name\": \"Yongping Huang\"}], \"abstract\": \"Fall webworm, Hyphantria cunea, is a global invasive forest pest that causes serious damage to the economy and ecosystem of agriculture and forestry. Due to the extent of the problem and the difficulty of conventional chemical control, new technologies must be pursued, such as genetic-based inheritable insect sterile technology (gSIT), which exhibits promise for pest control. In the present study, we established a piggyBac-based transgenic system in fall webworm and generated a dominant male-sterile strain by targeting the seminal fluid protein serine protease 2 (Hcser2), displaying an outstanding trait of gSIT. First, an RNA polymerase type III (Pol III) promoter, the HcU62 small nuclear RNA (snRNA) gene promoter, was identified and characterized through direct injection of RNAi plasmids in vivo. Quantitative real-time PCR revealed that HcU62 had the greatest knockdown efficiency of the Hcyellow gene among five short hairpin RNA (shRNA) plasmids tested, designated HcU61-HcU65. Subsequent application of piggyBac-based transgenic RNAi (HcU62: shHcyellow, Ysh2) significantly reduced the expression level of the Hcyellow gene, resulting in a stable yellow observable phenotype from the larval to pupal stages in Ysh2 transgenic mutants. Finally, an HcU62-driven transgenic RNAi strain targeting the Hcser2 gene was obtained, resulting in a dominant male-sterile phenotype. Significantly, this process did not affect the growth, development, mating behavior or egg laying of the mutants, and the dominant sterile trait could be inherited in the next generation through female Hcser2 mutants. Furthermore, CRISPR/Cas9-mediated disruption of the Hcser2 gene further confirmed the dominant sterile phenotype, supporting it as a generalized target for genetic control of H. cunea. This study reports the first piggyBac-mediated transgenic system in H. cunea, providing a promising genetic method for controlling this pest by targeting Hcser2 gene.\"}, {\"paperId\": \"0505dca8b7712bf11e38b70e37339e2874ed75e0\", \"externalIds\": {\"DOI\": \"10.3791/65264\", \"CorpusId\": 260645482, \"PubMed\": \"37590503\"}, \"title\": \"High-Efficiency Gene Disruption in Primary Bone Marrow-Derived Macrophages Using Electroporated Cas9-sgRNA Complexes.\", \"venue\": \"Journal of Visualized Experiments\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3791/65264?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3791/65264, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2120065196\", \"name\": \"Julia Craft\"}, {\"authorId\": \"115994568\", \"name\": \"T. Truong\"}, {\"authorId\": \"47611041\", \"name\": \"Bennett H Penn\"}], \"abstract\": \"Bone marrow-derived macrophages (BMDMs) from mice are a key tool for studying the complex biology of tissue macrophages. As primary cells, they model the physiology of macrophages in vivo more closely than immortalized macrophage cell lines and can be derived from mice already carrying defined genetic changes. However, disrupting gene function in BMDMs remains technically challenging. Here, we provide a protocol for efficient CRISPR/Cas9 genome editing in BMDMs, which allows for the introduction of small insertions and deletions (indels) that result in frameshift mutations that disrupt gene function. The protocol describes how to synthesize single-guide RNAs (sgRNA-Cas9) and form purified sgRNA-Cas9 ribonucleoprotein complexes (RNPs) that can be delivered by electroporation. It also provides an efficient method for monitoring editing efficiency using routine Sanger sequencing and a freely available online analysis program. The protocol can be performed within 1 week and does not require plasmid construction; it typically results in 85% to 95% editing efficiency.\"}, {\"paperId\": \"0507b7ed528da8a51b3fb4b7b5d256d595810466\", \"externalIds\": {\"PubMedCentral\": \"10662761\", \"DOI\": \"10.1101/2022.05.19.492359\", \"CorpusId\": 248990520, \"PubMed\": \"37943859\"}, \"title\": \"Coordination of Pickpocket ion channel delivery and dendrite growth in Drosophila sensory neurons\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosgenetics/article/file?id=10.1371/journal.pgen.1011025&type=printable\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10662761, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115536963\", \"name\": \"Joseph W. Mitchell\"}, {\"authorId\": \"2166066013\", \"name\": \"Ipek Midillioglu\"}, {\"authorId\": \"104657282\", \"name\": \"E. Schauer\"}, {\"authorId\": \"2109252730\", \"name\": \"Bei Wang\"}, {\"authorId\": \"2118641807\", \"name\": \"Chun Han\"}, {\"authorId\": \"6823913\", \"name\": \"Jill Wildonger\"}], \"abstract\": \"Sensory neurons enable an organism to perceive external stimuli, which is essential for survival. The sensory capacity of a neuron depends on the elaboration of its dendritic arbor and the delivery of sensory ion channels to the dendritic membrane. However, it is not well understood how ion channels are trafficked to sensory dendrites and whether their delivery is coordinated with dendrite growth. We investigated the trafficking of the DEG/ENaC/ASIC ion channel Pickpocket (Ppk) in peripheral sensory neurons in fruit fly larvae. We used CRISPR-Cas9 genome engineering to tag endogenous Ppk1 and visualize it live, including monitoring Ppk1 membrane localization via a novel secreted split-GFP approach. Strikingly, Ppk1 is present throughout the membrane of actively growing dendrites, and Ppk1 density scales in proportion to the dendritic membrane, even when dynein-mediated transport to dendrites is disrupted. Our data suggest that Ppk1 is integral to the membrane of growing dendrites and implicate the recycling endosome GTPase Rab11 in the forward trafficking of Ppk1 to dendrites. Together, our results suggest that Ppk channel transport is coordinated with dendrite morphogenesis, thus ensuring proper ion channel levels and distribution in sensory dendrites. Author Summary Peripheral sensory neurons are essential for an organism to interact with its environment. Neurons are composed of signal-receiving dendrites and a signal-sending axon. Ion channels distributed throughout sensory dendrites transduce external stimuli into chemical signals, however the mechanisms that localize ion channels to sensory dendrites are not well understood. Both the composition of ion channels in the dendrites and the structure of a sensory neuron\\u2019s dendritic arbor are important for how it functions to sense external stimuli. Using live imaging and genomic engineering, we have discovered that the localization of a sensory ion channel, Pickpocket, in fruit fly sensory neurons is coordinated with growth of the dendritic arbor and that Pickpocket levels scale in proportion to dendrite length, even when transport to dendrites is disrupted. We also developed a novel genetically encoded approach to visualize the membrane expression of proteins in a living organism utilizing the split-GFP system. We found that both the secretory and endosomal networks mediate the forward trafficking of Pickpocket during neuronal morphogenesis, thus coordinating membrane growth with ion channel delivery. Our findings reveal that actively growing sensory dendrites are equipped with the ion channels needed for sensing external stimuli.\"}, {\"paperId\": \"0507c2a79abd0b7950f1007b46f5ada451ae5774\", \"externalIds\": {\"PubMedCentral\": \"8525412\", \"DOI\": \"10.3389/fgeed.2021.673566\", \"CorpusId\": 235761582, \"PubMed\": \"34713261\"}, \"title\": \"CRISPR/Cas9-Mediated Multi-Allelic Gene Targeting in Sugarcane Confers Herbicide Tolerance\", \"venue\": \"Frontiers in Genome Editing\", \"year\": 2021, \"citationCount\": 77, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgeed.2021.673566/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8525412, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47656594\", \"name\": \"M. Oz\"}, {\"authorId\": \"2117752819\", \"name\": \"Angelika Altpeter\"}, {\"authorId\": \"144006903\", \"name\": \"R. Karan\"}, {\"authorId\": \"4823866\", \"name\": \"A. Merotto\"}, {\"authorId\": \"2944492\", \"name\": \"F. Altpeter\"}], \"abstract\": \"Sugarcane is the source of 80% of the sugar and 26% of the bioethanol produced globally. However, its complex, highly polyploid genome (2n = 100 \\u2013 120) impedes crop improvement. Here, we report efficient and reproducible gene targeting (GT) in sugarcane, enabling precise co-editing of multiple alleles via template-mediated and homology-directed repair (HDR) of DNA double strand breaks induced by the programmable nuclease CRISPR/Cas9. The evaluation of 146 independently transformed plants from five independent experiments revealed a targeted nucleotide replacement that resulted in both targeted amino acid substitutions W574L and S653I in the acetolactate synthase (ALS) in 11 lines in addition to single, targeted amino acid substitutions W574L or S653I in 25 or 18 lines, respectively. Co-editing of up to three ALS copies/alleles that confer herbicide tolerance was confirmed by Sanger sequencing of cloned long polymerase chain reaction (PCR) amplicons. This work will enable crop improvement by conversion of inferior alleles to superior alleles through targeted nucleotide substitutions.\"}, {\"paperId\": \"0507fff019814e4defb5292ed82dada3d2af2362\", \"externalIds\": {\"MAG\": \"3096267199\", \"DOI\": \"10.1182/blood-2020-141742\", \"CorpusId\": 228814314}, \"title\": \"Preclinical Efficacy of a Novel Omacetaxine-Based Therapy for AML Expressing Somatic or Germline Mutant RUNX1\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2020-141742\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2020-141742?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2020-141742, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40020619\", \"name\": \"Christopher P. Mill\"}, {\"authorId\": \"5821247\", \"name\": \"W. Fiskus\"}, {\"authorId\": \"3677290\", \"name\": \"C. Dinardo\"}, {\"authorId\": \"15045247\", \"name\": \"Christine E. Birdwell\"}, {\"authorId\": \"1454335216\", \"name\": \"Bernardo H. Lara\"}, {\"authorId\": \"5307012\", \"name\": \"J. Khoury\"}, {\"authorId\": \"34611355\", \"name\": \"K. Bhalla\"}], \"abstract\": \"RUNX1 is the DNA-binding subunit of the core-binding factor complex and a master-regulator transcription factor (TF), which is involved in normal and malignant hematopoiesis. Somatic mutations in RUNX1 commonly occur in Myelodysplastic Syndromes (MDS), as well as in secondary (s) or de novo AML (~10%). The germline, intragenic mutations and deletions in RUNX1 cause the highly penetrant (~40%), autosomal dominant, Familial Platelet Disorder (RUNX1-FPD) by the median age of 33 years with a propensity to evolve into myeloid malignancy (FPD-MM), i.e., MDS or AML. Majority of mutant (mt) RUNX1 are missense, large deletions or truncation-mutations, behaving mostly as loss of function (LOF) mutations. Lack of specific targeted therapy, coupled with resistance to standard chemotherapy, may account for poorer outcome observed in AML or FPD-MM expressing somatic or germline mutant (mt) RUNX1, respectively. We previously reported that knockdown (KD) of RUNX1 (wild type and mtRUNX1) is significantly more lethal toward AML blasts progenitor cells (BPCs) expressing mt versus wild type (wt) RUNX1 or normal hematopoietic progenitor cells (HPCs), indicating greater dependency on the residual wtRUNX1. Based on higher occupancy of the BET protein BRD4 at the RUNX1 super-enhancer/enhancer (SE/E) and other SE-driven AML-relevant oncogenes, the BET inhibitor OTX015 evicted BRD4 from the chromatin and repressed RUNX1 and SE-driven oncogenes, mediating efficacy against AML BPCs expressing mtRUNX1. Utilizing the RNA-Seq signature of RUNX1-depleted (by shRNA) AML cells and conducting LINCS (Library of Integrated Network-based Cellular Signatures) 1000-CMap (Connectivity Mapping) analysis, we discovered several expression mimickers (EMs), including the top-ranking protein-translation inhibitor homoharringtonine (HHT), or its semi-synthetic analogue omacetaxine mepesuccinate (OM). We tested the pre-clinical efficacy of HHT or OM against AML cell lines (OCI-AML5 and Mono-Mac-1) and patient-derived primary AML BPCs expressing somatic mtRUNX1 or wtRUNX1. Treatment with HHT or OM (5 to 100 nM) induced significantly more lethality in OCI-AML5 and Mono-Mac-1, as well as primary AML BPCs expressing mutant versus wtRUNX1, or in normal bone marrow progenitor cells (p < 0.05). Notably, first-time ever, CRISPR-Cas9-mediated knock-in of mtRUNX1 (R174*) into wtRUNX1-expressing AML HL-60 and OCI-AML2 cells showed that, in this isogenic setting also, HHT or OM, or OTX015 (50 to 1000 nM) treatment induced significantly more lethality in mt versus wtRUNX1-expressing cells (p < 0.05). The differential lethal activity of HHT in cells was associated with marked HHT-mediated depletion of c-Myc, c-Myb, PU.1, mt/wtRUNX1 and MCL1 in mtRUNX1 expressing HL60-R174* and OCI-AML2-R174* cells. Possibly due to HHT-mediated MCL1 repression, co-treatment with HHT and venetoclax (V) (10 to 100 nM), synergistically induced in vitro apoptosis of OCI-AML5, HL60-R174* and OCI-AML2-R174* cells (CI < 1.0). Compared to vehicle control, whereas daily treatment with OM (1.0 mg/kg, SQ) alone for 3 weeks significantly reduced the leukemia burden, co-treatment with OM and V (20 mg/kg orally) exerted significantly greater reduction in AML burden due to luciferized OCI-AML2-R174* cells engrafted into NSG mice. Combined therapy with OM and V also improved survival of the mice engrafted with OCI-AML2-R174* cells, without inducing weight loss or any other toxicity. Treatment with HHT also exerted differentially greater in vitro lethality against HPCs from FPD-MM expressing germline mtRUNX1 along with other MDS/AML-associated co-mutations, compared to RUNX1-FPD HPCs. We recently also established in culture, first time ever, a germ-line mtRUNX1 (K194N)-expressing FPD/MM cell line (GMR-AML1) from the bone marrow aspirate cells of a patient with FPD-MM that also expressed mutations in BCOR, PHF6, SRFS2 and SF3B1. Exposure to HHT (10 to 100 nM) dose-dependently inhibited cell growth and induced lethality in GMR-AML1 cells. These studies highlight that treatment with OM could potentially revert hematopoiesis in FPD-MM back to the RUNX1-FPD status. Collectively, our preliminary findings strongly support the merit of testing co-treatment with OM and venetoclax in patients with AML expressing somatic mtRUNX1, as well as in FPD-MM prior to or instead of allogeneic SCT from an unrelated donor.\\n \\n \\n DiNardo: Celgene: Consultancy, Honoraria, Research Funding; AbbVie: Consultancy, Honoraria, Research Funding; Syros: Honoraria; Jazz: Honoraria; Agios: Consultancy, Honoraria, Research Funding; ImmuneOnc: Honoraria; MedImmune: Honoraria; Calithera: Research Funding; Notable Labs: Membership on an entity's Board of Directors or advisory committees; Daiichi Sankyo: Consultancy, Honoraria, Research Funding; Takeda: Honoraria; Novartis: Consultancy.\\n\"}, {\"paperId\": \"050859f603b221ea26208ccd46b13b1aa1dba9ae\", \"externalIds\": {\"PubMedCentral\": \"10094894\", \"DOI\": \"10.3390/ijms24076420\", \"CorpusId\": 257873894, \"PubMed\": \"37047395\"}, \"title\": \"PD-1 Independent Role of PD-L1 in Triple-Negative Breast Cancer Progression\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2023, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/24/7/6420/pdf?version=1680083622\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10094894, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2327461666\", \"name\": \"Duaa Alkaabi\"}, {\"authorId\": \"49148689\", \"name\": \"K. Arafat\"}, {\"authorId\": \"51111712\", \"name\": \"Shahrazad Sulaiman\"}, {\"authorId\": \"67149020\", \"name\": \"A. Al-Azawi\"}, {\"authorId\": \"6957170\", \"name\": \"S. Attoub\"}], \"abstract\": \"Triple-negative breast cancer (TNBC) is a type of breast malignancy characterized by a high proliferative rate and metastatic potential leading to treatment failure, relapse, and poor prognosis. Therefore, efforts are continuously being devoted to understanding its biology and identifying new potential targets. Programmed death-ligand 1 (PD-L1) is an immunosuppressive protein that inactivates T cells by binding to the inhibitory receptor programmed death-1 (PD-1). PD-L1 overexpression in cancer cells contributes to immune evasion and, subsequently, poor survival and prognosis in several cancers, including breast cancer. Apart from its inhibitory impact on T cells, this ligand is believed to have an intrinsic role in cancer cells. This study was performed to clarify the PD-1 independent role of PD-L1 in TNBC MDA-MB-231 cells by knocking out the PD-L1 using three designs of CRISPR-Cas9 lentiviral particles. Our study revealed that PD-L1 knockout significantly inhibited MDA-MB-231 cell proliferation and colony formation in vitro and tumor growth in the chick embryo chorioallantoic membrane (CAM) model in vivo. PD-L1 knockout also decreased the migration and invasion of MDA-MB-231 cells in vitro. We have shown that PD-L1 knockout MDA-MB-231 cells have low levels of p-Akt and p-ERK in addition to some of their downstream proteins, c-Fos, c-Myc, p21, survivin, and COX-2. Furthermore, PD-L1 knockout significantly decreased the expression of Snail and RhoA. This study shows the intrinsic role of PD-L1 in TNBC independently of its binding to PD-1 receptors on T cells. It may pave the way for developing novel therapeutic strategies using PD-L1 inhibitors alone and in combination to treat TNBC more effectively.\"}, {\"paperId\": \"05092678cc635c20ce47ba8efdd77c6fc1cd960d\", \"externalIds\": {\"MAG\": \"3091460046\", \"DOI\": \"10.46678/pb.20.1053458\", \"CorpusId\": 226736332}, \"title\": \"Potential of CRISPR/Cas9 to Alter Lipid Metabolism in Alfalfa\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.46678/pb.20.1053458?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.46678/pb.20.1053458, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"83938827\", \"name\": \"H. Poudel\"}], \"abstract\": null}, {\"paperId\": \"050c11e0c76fd86beb6bf34b92db4e56ebd77593\", \"externalIds\": {\"PubMedCentral\": \"8640017\", \"DOI\": \"10.1038/s41392-021-00799-7\", \"CorpusId\": 244803467, \"PubMed\": \"34857736\"}, \"title\": \"Generation of in situ CRISPR-mediated primary and metastatic cancer from monkey liver\", \"venue\": \"Signal Transduction and Targeted Therapy\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41392-021-00799-7.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8640017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"20074973\", \"name\": \"Liping Zhong\"}, {\"authorId\": \"2145587133\", \"name\": \"Yong Huang\"}, {\"authorId\": \"144910739\", \"name\": \"Jian He\"}, {\"authorId\": \"46628689\", \"name\": \"Nuo Yang\"}, {\"authorId\": \"13504511\", \"name\": \"Banghao Xu\"}, {\"authorId\": \"10733927\", \"name\": \"Yun-Ting Ma\"}, {\"authorId\": \"49721907\", \"name\": \"Junjie Liu\"}, {\"authorId\": \"2149518688\", \"name\": \"Chao Tang\"}, {\"authorId\": \"6134499\", \"name\": \"Chengpiao Luo\"}, {\"authorId\": \"2004852516\", \"name\": \"Pan Wu\"}, {\"authorId\": \"6366147\", \"name\": \"Zongqiang Lai\"}, {\"authorId\": \"148393265\", \"name\": \"Yuan-Nan Huo\"}, {\"authorId\": \"2113488824\", \"name\": \"Tao Lu\"}, {\"authorId\": \"2353570343\", \"name\": \"Dongni Huang\"}, {\"authorId\": \"19262367\", \"name\": \"Wenlin Gong\"}, {\"authorId\": \"39926438\", \"name\": \"Lu Gan\"}, {\"authorId\": \"2118264848\", \"name\": \"Yiqun Luo\"}, {\"authorId\": \"47294670\", \"name\": \"Zhikun Zhang\"}, {\"authorId\": \"2140049531\", \"name\": \"Xiyu Liu\"}, {\"authorId\": \"2002885\", \"name\": \"Yongxiang Zhao\"}], \"abstract\": \"Non-human primates (NHPs) represent the most valuable animals for drug discovery. However, the current main challenge remains that the NHP has not yet been used to develop an efficient translational medicine platform simulating human diseases, such as cancer. This study generated an in situ gene-editing approach to induce efficient loss-of-function mutations of Pten and p53 genes for rapid modeling primary and metastatic liver tumors using the CRISPR/Cas9 in the adult cynomolgus monkey. Under ultrasound guidance, the CRISPR/Cas9 was injected into the cynomolgus monkey liver through the intrahepatic portal vein. The results showed that the ultrasound-guided CRISPR/Cas9 resulted in indels of the Pten and p53 genes in seven out of eight monkeys. The best mutation efficiencies for Pten and p53 were up to 74.71% and 74.68%, respectively. Furthermore, the morbidity of primary and extensively metastatic (lung, spleen, lymph nodes) hepatoma in CRISPR-treated monkeys was 87.5%. The ultrasound-guided CRISPR system could have great potential to successfully pursue the desired target genes, thereby reducing possible side effects associated with hitting non-specific off-target genes, and significantly increasing more efficiency as well as higher specificity of in situ gene editing in vivo, which holds promise as a powerful, yet feasible tool, to edit disease genes to build corresponding human disease models in adult NHPs and to greatly accelerate the discovery of new drugs and save economic costs.\"}, {\"paperId\": \"050d014d040856f89e687a3c08a9d03dc32ebfdc\", \"externalIds\": {\"DOI\": \"10.1353/pbm.2020.0005\", \"CorpusId\": 211133875, \"PubMed\": \"32063587\"}, \"title\": \"Billy Idol\", \"venue\": \"Perspectives in biology and medicine\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1353/pbm.2020.0005?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1353/pbm.2020.0005, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2055440710\", \"name\": \"Ethan Weiss\"}], \"abstract\": \"abstract:Ruthie Weiss was born with white hair, but her parents did not consider the possibility of there being more to the story until they noticed that she was not visually tracking when she was just a month old. Thus began a long and continuing story of the discovery of Ruthie's albinism, her significant visual impairment, but also her courage and determination to do anything and everything her peers do, if not more. But this story is really about how her parents grew to embrace the impact Ruthie (and importantly Ruthie's disability) had on their lives and the lives of everyone with whom Ruthie interacted. The experience of raising Ruthie ultimately led her parents to think about a world where she might not exist, or at least might not exist with albinism. But it also led them to ponder a future in which children with genetic differences like albinism are gene edited using technologies like CRISPR-Cas9.\"}, {\"paperId\": \"0512843de9d9bf28748728186eee49deedffaa26\", \"externalIds\": {\"DOI\": \"10.30574/ijsra.2024.13.2.2203\", \"CorpusId\": 274136623}, \"title\": \"A Comprehensive Review of Pfu DNA Polymerase: Extraction, Production and Applications\", \"venue\": \"International Journal of Science and Research Archive\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.30574/ijsra.2024.13.2.2203?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.30574/ijsra.2024.13.2.2203, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2323487187\", \"name\": \"Hafiza Amna Farooq\"}, {\"authorId\": \"2323485316\", \"name\": \"Umer Ahmed\"}, {\"authorId\": \"2331353585\", \"name\": \"Zarfeen Fatima\"}, {\"authorId\": \"2331349254\", \"name\": \"Muhammad Tabish\"}], \"abstract\": \"Pfu DNA Polymerase, a thermostable enzyme derived from the hyperthermophilic archaeon Pyrococcus furiosus, is widely recognized for its high fidelity and strong processivity. Its 3'-5' exonuclease activity makes it indispensable for the correct amplification of both short and complex DNA strands. These biochemical properties of Pfu DNA Polymerase have encouraged considerable advancements in its extraction and production methods. This review covers some of the traditional approaches for purification, including protein purification and affinity chromatography, and updates on recent advances in recombinant gene expression, automated systems of production, and membrane-based technologies. New ways of engineering enzymes have recently been developed, such as CRISPR-Cas9-mediated gene optimization, which raised the bar on extraction efficiency to meet emerging demand. Once challenging, Pfu DNA Polymerase production has been significantly streamlined through recombinant expression in E. coli both at a laboratory and commercial scale. The optimization techniques that are involved with IPTG concentration and Response Surface Methodology have increased the yield by up to 30%. Auto-induction means even higher biomass outputs are allowed. Today, applications of Pfu DNA Polymerase span from standard PCR up to advanced clinical diagnostics in the fields of molecular biology, forensic analysis, clinical microbiology, and biotechnology.\"}, {\"paperId\": \"0512f414b32d73af9b1b09076d6ecf536936d5d9\", \"externalIds\": {\"DOI\": \"10.1093/plcell/koac243\", \"CorpusId\": 252087537, \"PubMed\": \"36066192\"}, \"title\": \"BREEDIT: a multiplex genome editing strategy to improve complex quantitative traits in maize.\", \"venue\": \"The Plant Cell\", \"year\": 2022, \"citationCount\": 64, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/plcell/article-pdf/35/1/218/48820720/koac243.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/plcell/koac243?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/plcell/koac243, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2164341372\", \"name\": \"C. D. Lorenzo\"}, {\"authorId\": \"1404942659\", \"name\": \"K. Debray\"}, {\"authorId\": \"2164341011\", \"name\": \"Denia Herwegh\"}, {\"authorId\": \"1909813876\", \"name\": \"Ward Develtere\"}, {\"authorId\": \"2046823289\", \"name\": \"Lennert Impens\"}, {\"authorId\": \"2046980343\", \"name\": \"Dries Schaumont\"}, {\"authorId\": \"2164340862\", \"name\": \"Wout Vandeputte\"}, {\"authorId\": \"16224057\", \"name\": \"S. Aesaert\"}, {\"authorId\": \"10216548\", \"name\": \"Griet Coussens\"}, {\"authorId\": \"2164340179\", \"name\": \"Yara de Boe\"}, {\"authorId\": \"4321930\", \"name\": \"Kirin Demuynck\"}, {\"authorId\": \"7364295\", \"name\": \"Tom Van Hautegem\"}, {\"authorId\": \"1939808\", \"name\": \"L. Pauwels\"}, {\"authorId\": \"7779028\", \"name\": \"T. Jacobs\"}, {\"authorId\": \"3987184\", \"name\": \"T. Ruttink\"}, {\"authorId\": \"2165987\", \"name\": \"H. Nelissen\"}, {\"authorId\": \"2535948\", \"name\": \"D. Inz\\u00e9\"}], \"abstract\": \"Ensuring food security for an ever-growing global population while adapting to climate change is the main challenge for agriculture in the 21st century. Although new technologies are being applied to tackle this problem, we are approaching a plateau in crop improvement using conventional breeding. Recent advances in CRISPR/Cas9-mediated gene engineering have paved the way to accelerate plant breeding to meet this increasing demand. However, many traits are governed by multiple small-effect genes operating in complex interactive networks. Here, we present the gene discovery pipeline BREEDIT, which combines multiplex genome editing of whole gene families with crossing schemes to improve complex traits such as yield and drought tolerance. We induced gene knockouts in 48 growth-related genes into maize (Zea mays) using CRISPR/Cas9 and generated a collection of over 1,000 gene-edited plants. The edited populations displayed (on average) 5%-10% increases in leaf length and up to 20% increases in leaf width compared with the controls. For each gene family, edits in subsets of genes could be associated with enhanced traits, allowing us to reduce the gene space to be considered for trait improvement. BREEDIT could be rapidly applied to generate a diverse collection of mutants to identify promising gene modifications for later use in breeding programs.\"}, {\"paperId\": \"05146fbdad701e6993a940224941f709f122f62a\", \"externalIds\": {\"DOI\": \"10.29261/pakvetj/2021.053\", \"CorpusId\": 244881469}, \"title\": \"Construction of a Triple Gene-Deleted Live Vaccine Candidate against Pseudorabies Virus Using CRISPR/Cas9 and Cre/LoxP System-Based Strategy\", \"venue\": \"Pakistan Veterinary Journal\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.29261/pakvetj/2021.053\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.29261/pakvetj/2021.053?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.29261/pakvetj/2021.053, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108593769\", \"name\": \"Muping Wang\"}], \"abstract\": \"The immune protective effects of pseudorabies virus (PRV) vaccines in the market have gradually reduced and they have failed to provide complete protection against the new PRV variant. In this study, a triple gene-deleted live PRV strain\\u2013rZD\\u0394TK-gE-gI was successfully constructed by simultaneously knocking out the three major virulence genes (gE/gI and TK) with CRISPR/Cas9 and Cre/LoxP gene editing system and low melting point agarose purification method. After challenge with the virulent PRV variant, all the 3-week-old piglets vaccinated with the rZD\\u0394TK-gE-gI PRV vaccine candidate survived without any clinical symptoms, whereas all the unvaccinated piglets exhibited PRV respiratory and neurological signs with 100% mortality rate within 7 days post infection. High levels of anti-gB antibodies were induced in the vaccinated piglets after vaccination with the rZD\\u0394TK-gE-gI vaccine candidate, which elicited a better immune protective effect than the classical strain Bartha-K61. Therefore, the triple gene-deleted live PRV vaccine candidate is expected to control the current outbreak of pseudorabies caused by the PRV variants.\"}, {\"paperId\": \"0515511a5387e69bc4716e00765884e1d0cdb90e\", \"externalIds\": {\"DOI\": \"10.1111/pce.14127\", \"CorpusId\": 235403080, \"PubMed\": \"34114251\"}, \"title\": \"A poplar B-box protein PtrBBX23 modulates the accumulation of anthocyanins and proanthocyanidins in response to high light.\", \"venue\": \"Plant, Cell and Environment\", \"year\": 2021, \"citationCount\": 66, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/pce.14127?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/pce.14127, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46651237\", \"name\": \"Chaofeng Li\"}, {\"authorId\": \"47624570\", \"name\": \"Jinli Pei\"}, {\"authorId\": \"2143818139\", \"name\": \"Xin Yan\"}, {\"authorId\": \"1471586913\", \"name\": \"Xin Cui\"}, {\"authorId\": \"16901114\", \"name\": \"Momi Tsuruta\"}, {\"authorId\": \"2155355694\", \"name\": \"Ying Liu\"}, {\"authorId\": \"39372447\", \"name\": \"C. Lian\"}], \"abstract\": \"Flavonoids, which modulate plant resistance to various stresses, can be induced by high light. B-box (BBX) transcription factors (TFs) play crucial roles in the transcriptional regulation of flavonoids biosynthesis, but limited information is available on the association of BBX proteins with high light. We present a detailed overview of 45 Populus trichocarpa BBX TFs. Phylogenetic relationships, gene structure, tissue-specific expression patterns, and expression profiles were determined under 10 stress or phytohormone treatments to screen candidate BBX proteins associated with the flavonoid pathway. Sixteen candidate genes were identified, of which five were expressed predominantly in young leaves and roots, and BBX23 showed the most distinct response to high light. Overexpression of BBX23 in poplar activated expression of MYB TFs and structural genes in the flavonoid pathway, thereby promoting accumulation of proanthocyanidins and anthocyanins. CRISPR/Cas9-generated knockout of BBX23 resulted in the opposite trend. Furthermore, the phenotype induced by BBX23 overexpression was enhanced under exposure to high light. BBX23 was capable of binding directly to the promoters of proanthocyanidin- and anthocyanin-specific genes, and its interaction with HY5 enhanced activation activity. We identified novel regulators of flavonoid biosynthesis in poplar, thereby enhancing our general understanding of the transcriptional regulatory mechanisms involved. This article is protected by copyright. All rights reserved.\"}, {\"paperId\": \"051921a70398458bfdc3c64141738d0943830993\", \"externalIds\": {\"DOI\": \"10.54254/2755-2721/64/20241357\", \"CorpusId\": 269823637}, \"title\": \"Precision gene editing using deep learning: A case study of the CRISPR-Cas9 editor\", \"venue\": \"Applied and Computational Engineering\", \"year\": 2024, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ace.ewapublishing.org/media/b38d89b5f4e04831857ef16c0fb1e8a1.marked.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.54254/2755-2721/64/20241357?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.54254/2755-2721/64/20241357, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277168093\", \"name\": \"Zhengrong Cui\"}, {\"authorId\": \"2277160263\", \"name\": \"Luqi Lin\"}, {\"authorId\": \"2277036918\", \"name\": \"Yanqi Zong\"}, {\"authorId\": \"2277029873\", \"name\": \"Yizhi Chen\"}, {\"authorId\": \"2277045462\", \"name\": \"Sihao Wang\"}], \"abstract\": \"This article reviews the application cases of CRISPR/Cas9 gene editing technology, as well as the challenges and limitations. Firstly, the application of CRISPR/Cas9 technology based on deep learning in predicting the targeting efficiency of sgRNA is introduced, and the steps of data acquisition, pre-processing and feature engineering are described in detail. It then discusses the non-specific cutting and cytotoxicity challenges of CRISPR/Cas9 technology, as well as strategies for solving these challenges using deep learning techniques. Finally, the paper emphasizes the importance of deep learning techniques to mitigate the cytotoxicity problems in CRISPR/Cas9 technology, and points out that the establishment of these models can improve the safety and efficiency of gene editing experiments, and provide important reference and guidance for research in related fields.\"}, {\"paperId\": \"05193c0974168452d1ffd6c1e0d34aa3a9b4eae1\", \"externalIds\": {\"PubMedCentral\": \"10269051\", \"DOI\": \"10.1128/aac.00423-23\", \"CorpusId\": 257927645, \"PubMed\": \"37222585\"}, \"title\": \"Novel Non-Hot Spot Modification in Fks1 of Candida auris Confers Echinocandin Resistance\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1128/aac.00423-23\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10269051, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6094905\", \"name\": \"Milena Kordalewska\"}, {\"authorId\": \"2123724950\", \"name\": \"Geselle Cancino-Prado\"}, {\"authorId\": \"9896594\", \"name\": \"Jo\\u00e3o Nobrega de Almeida J\\u00fanior\"}, {\"authorId\": \"2218142081\", \"name\": \"Igor Brasil Brand\\u00e3o\"}, {\"authorId\": \"2218151155\", \"name\": \"Renata Tigulini de Souza Peral\"}, {\"authorId\": \"39503228\", \"name\": \"A. Colombo\"}, {\"authorId\": \"4648650\", \"name\": \"D. Perlin\"}], \"abstract\": \"We determined the echinocandin susceptibility and FKS1 genotypes of 13 clinical isolates of Candida auris that were recovered from 4 patients at a tertiary care center in Salvador, Brazil. Three isolates were categorized as echinocandin-resistant, and they harbored a novel FKS1 mutation that led to an amino acid change W691L located downstream from hot spot 1. ABSTRACT We determined the echinocandin susceptibility and FKS1 genotypes of 13 clinical isolates of Candida auris that were recovered from 4 patients at a tertiary care center in Salvador, Brazil. Three isolates were categorized as echinocandin-resistant, and they harbored a novel FKS1 mutation that led to an amino acid change W691L located downstream from hot spot 1. When introduced to echinocandin-susceptible C. auris strains by CRISPR/Cas9, Fks1 W691L induced elevated MIC values to all echinocandins (anidulafungin, 16 to 32\\u00d7; caspofungin, >64\\u00d7; micafungin, >64\\u00d7).\"}, {\"paperId\": \"051c7baa8c5fb62c63ef5480e602706cd5d9db83\", \"externalIds\": {\"MAG\": \"3114783394\", \"DOI\": \"10.21203/rs.3.rs-28126/v1\", \"CorpusId\": 234696976}, \"title\": \"Positive feedback between slug and Akt promotes hepatocellular carcinoma growth via CDK6 expression\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.researchsquare.com/article/rs-28126/v1.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21203/rs.3.rs-28126/v1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21203/rs.3.rs-28126/v1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5270361\", \"name\": \"Xinlan Lu\"}, {\"authorId\": \"2144110095\", \"name\": \"Xu Zhang\"}, {\"authorId\": \"2105551738\", \"name\": \"G. Yin\"}, {\"authorId\": \"2143420501\", \"name\": \"Yifei Chen\"}, {\"authorId\": \"2153687922\", \"name\": \"Xin Wang\"}, {\"authorId\": \"145875254\", \"name\": \"Yan Cao\"}, {\"authorId\": \"2111159135\", \"name\": \"Yarui Li\"}, {\"authorId\": \"48886366\", \"name\": \"Yan Zhao\"}, {\"authorId\": \"2068107844\", \"name\": \"D. Guo\"}, {\"authorId\": \"11660229\", \"name\": \"Mengxuan Zhu\"}, {\"authorId\": \"144768819\", \"name\": \"Shuixiang He\"}], \"abstract\": \"\\n Background\\n\\nHepatocellular carcinoma (HCC) is a rapidly growing tumor associated with a propensity for vascular invasion and metastasis, but the mechanism of HCC growth is not fully understood. The objective of this study is to investigate the role of the transcriptional repressor slug in HCC growth and its detailed mechanism.\\nMethods\\n\\nLentivirus-mediated slug overexpression as well as CRISPR/Cas9-mediated slug knockout were conducted in hepatic or HCC cells. Then cell growth was evaluated in culture dishes as well as nude mice xenografts. Transcriptome analysis was used to explore the detailed mechanism of slug-induced HCC growth.\\nResults\\n\\nSlug significantly facilitated HCC growth in vitro and in vivo. Mechanism dissection via transcriptome analysis revealed that slug transcriptionally upregulated PIK3CD and PIK3R3 expression and then activated the Akt/CDK6 signaling pathway. Administration of either the PI3K/Akt signaling inhibitor MK2206 or the CDK4/6 inhibitor PD-0332991 abrogated slug-induced HCC growth. In addition, administration of MK2206 also suppressed slug expression in HCC cells. Immunohistochemistry staining indicated that Akt activity and CDK6 expression were significantly associated with slug expression in human HCC tissues.\\nConclusions\\n\\nOur study determined the promoting role of slug in HCC growth and revealed that the positive feedback between slug and Akt conferred HCC growth via CDK6 expression. The CDK4/6 inhibitor PD-0332991 might be a promising drug for slug/Akt-induced HCC growth.\"}, {\"paperId\": \"051fe3f81dce09bb853c49a9b36c503b2c3d57d4\", \"externalIds\": {\"DOI\": \"10.1111/raq.12988\", \"CorpusId\": 274122035}, \"title\": \"Genome Manipulation Advances in Selected Aquaculture Organisms\", \"venue\": \"Reviews in Aquaculture\", \"year\": 2024, \"citationCount\": 17, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/raq.12988?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/raq.12988, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2299259284\", \"name\": \"Jinhai Wang\"}, {\"authorId\": \"50608017\", \"name\": \"Yu Cheng\"}, {\"authorId\": \"34584288\", \"name\": \"Baofeng Su\"}, {\"authorId\": \"2251130668\", \"name\": \"R. Dunham\"}], \"abstract\": \"With the rising global demand for seafood and the challenges posed by overfishing and climate change, the aquaculture sector has become increasingly important in providing high\\u2010quality protein for human consumption. Although traditional selection breeding programs have made great strides in genetic improvement of aquaculture species over the past decades, faster and more precise breeding tools, such as genome manipulation, are needed for performance enhancement of aquaculture stock. This review presents a comprehensive overview of the current status of three major genome manipulation tools, including RNA interference (RNAi), gene transfer, and genome editing in aquaculture species, and discusses the advances made, challenges faced, and potential future directions of this fast\\u2010developing field. Taking catfish as an example, this paper reviews the specific applications of these techniques to improve traits such as growth, disease resistance, reproduction, and nutritional profiles in various commercially important fishes and crustaceans, highlighting successful applications and ongoing research efforts. We also propose CRISPR/Cas9\\u2010mediated multiplex genome editing for the knockout or replacement of multiple genes in parallel to improve multiple traits in fish. Collectively, this review provides insights into the evolving landscape of genome manipulation in aquaculture and sheds light on its implications for sustainable practices and responsible innovation.\"}, {\"paperId\": \"0520e1a0c8b97db6206c03dcd1e6b4b63b1bcccd\", \"externalIds\": {\"MAG\": \"3029257639\", \"PubMedCentral\": \"7249350\", \"DOI\": \"10.1186/s12935-020-01272-1\", \"CorpusId\": 218878747, \"PubMed\": \"32508533\"}, \"title\": \"Nanos3, a cancer-germline gene, promotes cell proliferation, migration, chemoresistance, and invasion of human glioblastoma\", \"venue\": \"Cancer Cell International\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://cancerci.biomedcentral.com/track/pdf/10.1186/s12935-020-01272-1\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7249350, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1586533723\", \"name\": \"Fengyu Zhang\"}, {\"authorId\": \"6584839\", \"name\": \"Rui-lai Liu\"}, {\"authorId\": \"2155880704\", \"name\": \"Cheng Liu\"}, {\"authorId\": \"2108558818\", \"name\": \"Hai-shi Zhang\"}, {\"authorId\": \"48518321\", \"name\": \"Yuan Lu\"}], \"abstract\": \"Background Radiotherapy, chemotherapy, and surgery have made crucial strides in glioblastoma treatment, yet they often fail; thus, new treatment and new detection methods are needed. Aberrant expression of Nanos3 has been functionally associated with various cancers. Here, we sought to identify the clinical significance and potential mechanisms of Nanos3 in human glioblastoma. Methods Nanos3 expression was studied in nude mouse glioblastoma tissues and glioblastoma cell lines by immunohistochemistry, Western blot, and RT-PCR. Clustered regularly interspaced short palindromic repeats (CRISPR)\\u2013Cas9 gene editing assay was performed to generate the Nanos3 knockdown glioblastoma cell lines. The effects of Nanos3 on glioblastoma cells proliferation, migration, invasion, chemoresistance, germ cell characteristics, and tumor formation were analyzed by CCK8, transwell, cell survival experiments and alkaline phosphatase staining in vitro and in nude mouse models in vivo. Correlation between the expression of stemness proteins and the expression of Nanos3 was evaluated by Western blot. Results We found that Nanos3 was strongly expressed in both glioblastoma cell lines and tissues. Western blot and sequencing assays showed that the Nanos3 knockdown glioblastoma cell lines were established successfully, and we discovered that Nanos3 deletion reduced the proliferation, migration, and invasion of glioblastoma cells in vitro ( P\\u2009 <\\u20090.05). Nanos3 knockdown enhanced the sensitivity of glioblastoma cells to doxorubicin (DOX) and temozolomide (TMZ) ( P\\u2009 <\\u20090.05), and Nanos3 +/\\u2212 glioblastoma cell lines did not show the characteristics of the germline cells. In addition, Nanos3 deletion inhibited subcutaneous xenograft tumor growth in vivo ( P\\u2009 <\\u20090.001). Moreover, the oncogenesis germline protein levels of CD133, Oct4, Ki67, and Dazl decreased significantly in glioblastoma cells following Nanos3 knockdown. Conclusions Both in vitro and in vivo assays suggest that Nanos3, which is a cancer-germline gene, initiates the tumorigenesis of glioblastoma via acquiring the oncogenesis germline traits. These data demonstrate that ectopic germline traits are necessary for glioblastoma growth.\"}, {\"paperId\": \"0523061adf0918095895abf4690310e09d92fd2d\", \"externalIds\": {\"DOI\": \"10.1016/j.trsl.2022.05.001\", \"CorpusId\": 248587805, \"PubMed\": \"35545198\"}, \"title\": \"Gasdermin D mediates doxorubicin- induced cardiomyocyte pyroptosis and cardiotoxicity via directly binding to doxorubicin and changes in mitochondrial damage.\", \"venue\": \"Translational research : the journal of laboratory and clinical medicine\", \"year\": 2022, \"citationCount\": 63, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.trsl.2022.05.001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.trsl.2022.05.001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7579000\", \"name\": \"Bozhi Ye\"}, {\"authorId\": \"49714018\", \"name\": \"Xiaowen Shi\"}, {\"authorId\": \"2110487819\", \"name\": \"Jianjiang Xu\"}, {\"authorId\": \"27913102\", \"name\": \"S. Dai\"}, {\"authorId\": \"2110527752\", \"name\": \"Jiajun Xu\"}, {\"authorId\": \"46516059\", \"name\": \"Xiaoxi Fan\"}, {\"authorId\": \"31183489\", \"name\": \"Bingjiang Han\"}, {\"authorId\": \"5927401\", \"name\": \"Jibo Han\"}], \"abstract\": \"Doxorubicin (Dox), as a widely used anthracycline antitumor drug, can cause severe cardiotoxicity. Cardiomyocyte death and inflammation are involved in the pathophysiology of Dox-induced cardiotoxicity (DIC). Gasdermin D (GSDMD) is known as a key executioner of pyroptosis, which is a pro-inflammatory programmed cell death. We aimed to investigate the impact of GSDMD on DIC and systematically reveal its underlying mechanisms. Our findings indicated that Dox induced cardiomyocyte pyroptosis in a GSDMD-dependent manner by utilizing siRNA or overexpression-plasmid technique. We then generated GSDMD global knockout mice via CRISPR/Cas9 system and found that GSDMD deficiency reduced Dox-induced cardiomyopathy. Dox induced the activation of inflammatory caspases, which subsequently mediated GSDMD-N generation indirectly. Using molecular dynamics simulation and cell-free systems, we confirmed that Dox directly bound to GSDMD and facilitated GSDMD-N-mediated pyroptosis. Furthermore, GSDMD also mediated Dox-induced mitochondrial damage via Bnip3 and mitochondrial perforation in cardiomyocytes. These findings provide fresh insights into the mechanism of how Dox-engaged GSDMD orchestrates adverse cardiotoxicity and highlight the prospects of GSDMD as a potential target for DIC.\"}, {\"paperId\": \"05260fe3fa80fa15baab4d6b2f0601cecbdd24ff\", \"externalIds\": {\"DOI\": \"10.1016/j.pestbp.2024.105953\", \"CorpusId\": 269747272, \"PubMed\": \"38879307\"}, \"title\": \"The G932C mutation of chitin synthase 1 gene (CHS1) mediates buprofezin resistance as confirmed by CRISPR/Cas9-mediated knock-in approach in the brown planthopper, Nilaparvata lugens.\", \"venue\": \"Pesticide Biochemistry and Physiology\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.pestbp.2024.105953?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.pestbp.2024.105953, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2274213418\", \"name\": \"Fan Zhang\"}, {\"authorId\": \"2108316069\", \"name\": \"Yan-Chao Zhang\"}, {\"authorId\": \"2118174036\", \"name\": \"Zhijun Yu\"}, {\"authorId\": \"2274091405\", \"name\": \"Bin Zeng\"}, {\"authorId\": \"2118181042\", \"name\": \"Hao Sun\"}, {\"authorId\": \"2301104739\", \"name\": \"Yu-Qiu Xie\"}, {\"authorId\": \"2301138411\", \"name\": \"Kun Yan Zhu\"}, {\"authorId\": \"2267003588\", \"name\": \"Cong-Fen Gao\"}], \"abstract\": \"The brown planthopper (Nilaparvata lugens) is a major destructive rice pest in Asia. High levels of insecticide resistance have been frequently reported, and the G932C mutation in the chitin synthase 1 (CHS1) gene has been found to mediate buprofezin resistance. However, there has been no direct evidence to confirm the functional significance of the single G932C substitution mutation leading to buprofezin resistance in N. lugens. Here, we successfully constructed a knock-in homozygous strain (Nl-G932C) of N. lugens using CRISPR/Cas9 coupled with homology-directed repair (HDR). Compared with the background strain susceptible to buprofezin (Nl-SS), the knock-in strain (Nl-G932C) showed a 94.9-fold resistance to buprofezin. Furthermore, resistant strains (Nl-932C) isolated from the field exhibited a 2078.8-fold resistance to buprofezin, indicating that there are other mechanisms contributing to buprofezin resistance in the field. Inheritance analysis showed that the resistance trait is incomplete dominance. In addition, the Nl-G932C strain had a relative fitness of 0.33 with a substantially decreased survival rate, emergence rate, and fecundity. This study provided in vivo functional evidence for the causality of G932C substitution mutation of CHS1 with buprofezin resistance and valuable information for facilitating the development of resistance management strategies in N. lugens. This is the first example of using CRISPR/Cas9 gene-editing technology in a hemipteran insect to directly confirm the role of a candidate target site mutation in insecticide resistance.\"}, {\"paperId\": \"052c7136020ddee281089abbcfbcaeeca03036bb\", \"externalIds\": {\"DOI\": \"10.13345/j.cjb.220288\", \"CorpusId\": 256577418, \"PubMed\": \"36738210\"}, \"title\": \"[Development of porcine induced pluripotent stem cells with a CD163 reporter system].\", \"venue\": \"Sheng wu gong cheng xue bao = Chinese journal of biotechnology\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.13345/j.cjb.220288?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.13345/j.cjb.220288, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145568020\", \"name\": \"Wei Yue\"}, {\"authorId\": \"10838753\", \"name\": \"Juqing Zhang\"}, {\"authorId\": \"1390853678\", \"name\": \"Xiaolong Wu\"}, {\"authorId\": \"2193099242\", \"name\": \"Xinchun Yang\"}, {\"authorId\": \"6983508\", \"name\": \"Qiaoyan Shen\"}, {\"authorId\": \"88198726\", \"name\": \"Shuai Yu\"}, {\"authorId\": \"120628357\", \"name\": \"Zhenshuo Zhu\"}, {\"authorId\": \"2108682083\", \"name\": \"Chengbao Wang\"}, {\"authorId\": \"48691752\", \"name\": \"Shiqiang Zhang\"}, {\"authorId\": \"145471496\", \"name\": \"J. Hua\"}], \"abstract\": null}, {\"paperId\": \"052ef2cbeacd95b230b3dfa28f008198e1afc521\", \"externalIds\": {\"PubMedCentral\": \"10371337\", \"DOI\": \"10.1172/jci.insight.167163\", \"CorpusId\": 258844037, \"PubMed\": \"37219942\"}, \"title\": \"High-fat diet plus HNF1A variant promotes polyps by activating \\u03b2-catenin in early-onset colorectal cancer\", \"venue\": \"JCI Insight\", \"year\": 2023, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://insight.jci.org/articles/view/167163/files/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10371337, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"9625787\", \"name\": \"Heyu Song\"}, {\"authorId\": \"1490802607\", \"name\": \"Ricky A. Sontz\"}, {\"authorId\": \"2218225849\", \"name\": \"Matthew J. Vance\"}, {\"authorId\": \"151057673\", \"name\": \"Julia M. Morris\"}, {\"authorId\": \"2170910162\", \"name\": \"Sulaiman Sheriff\"}, {\"authorId\": \"2220129720\", \"name\": \"Songli Zhu\"}, {\"authorId\": \"14161714\", \"name\": \"Suzann Duan\"}, {\"authorId\": \"153075217\", \"name\": \"Jiping Zeng\"}, {\"authorId\": \"5463892\", \"name\": \"E. Koeppe\"}, {\"authorId\": \"49996172\", \"name\": \"Ritu Pandey\"}, {\"authorId\": \"39651811\", \"name\": \"C. Thorne\"}, {\"authorId\": \"3461539\", \"name\": \"E. Stoffel\"}, {\"authorId\": \"2151327\", \"name\": \"J. Merchant\"}], \"abstract\": \"The incidence of early-onset colorectal cancer (EO-CRC) is rising and is poorly understood. Lifestyle factors and altered genetic background possibly contribute. Here, we performed targeted exon sequencing of archived leukocyte DNA from 158 EO-CRC participants, which identified a missense mutation at p.A98V within the proximal DNA binding domain of Hepatic Nuclear Factor 1 \\u03b1 (HNF1AA98V, rs1800574). The HNF1AA98V exhibited reduced DNA binding. To test function, the HNF1A variant was introduced into the mouse genome by CRISPR/Cas9, and the mice were placed on either a high-fat diet (HFD) or high-sugar diet (HSD). Only 1% of the HNF1A mutant mice developed polyps on normal chow; however, 19% and 3% developed polyps on the HFD and HSD, respectively. RNA-Seq revealed an increase in metabolic, immune, lipid biogenesis genes, and Wnt/\\u03b2-catenin signaling components in the HNF1A mutant relative to the WT mice. Mouse polyps and colon cancers from participants carrying the HNF1AA98V variant exhibited reduced CDX2 and elevated \\u03b2-catenin proteins. We further demonstrated decreased occupancy of HNF1AA98V at the Cdx2 locus and reduced Cdx2 promoter activity compared with WT HNF1A. Collectively, our study shows that the HNF1AA98V variant plus a HFD promotes the formation of colonic polyps by activating \\u03b2-catenin via decreasing Cdx2 expression.\"}, {\"paperId\": \"05319a95b8b2556f91d70547d6779bb9e0b00405\", \"externalIds\": {\"PubMedCentral\": \"11676443\", \"DOI\": \"10.3390/ph17121589\", \"CorpusId\": 274332522, \"PubMed\": \"39770431\"}, \"title\": \"CRISPR/Cas9 Technology Providing the Therapeutic Landscape of Metastatic Prostate Cancer\", \"venue\": \"Pharmaceuticals\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1424-8247/17/12/1589/pdf?version=1732607186\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11676443, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269420956\", \"name\": \"Jieun Park\"}, {\"authorId\": \"2269421522\", \"name\": \"Jaehong Kim\"}], \"abstract\": \"Prostate cancer (PCa) is the most prevalent malignancy and the second leading cause of cancer-related death in men. Although current therapies can effectively manage the primary tumor, most patients with late-stage disease manifest with metastasis in different organs. From surgery to treatment intensification (TI), several combinations of therapies are administered to improve the prognosis of patients with metastatic PCa. Due to the high frequency of the mutation during the metastatic phase, the clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated nuclease 9 (Cas9) genetic engineering tool can accelerate the effects of TI by enhancing targeted gene therapy or immunotherapy. This review describes the genetic background of metastatic PCa and how CRISPR/Cas9 technology can contribute to the field of PCa treatment development. It also discusses the current limitations of conventional PCa therapy and the potential of CRISPR-based PCa therapy.\"}, {\"paperId\": \"05320254f6a79831434d588decb81a9f9e306e07\", \"externalIds\": {\"PubMedCentral\": \"11411047\", \"DOI\": \"10.1007/s12672-024-01346-w\", \"CorpusId\": 272698925, \"PubMed\": \"39292297\"}, \"title\": \"A reference for selecting an appropriate method for generating glioblastoma organoids from the application perspective\", \"venue\": \"Discover Oncology\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1007/s12672-024-01346-w\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11411047, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277169899\", \"name\": \"Jing Liang\"}, {\"authorId\": \"2269216319\", \"name\": \"Peng He\"}], \"abstract\": \"Glioblastoma organoids (GBOs) serve as a powerful and reliable tool to study glioblastoma stem cells (GSCs) and glioblastoma (GBM). GBOs can be derived from different materials using different methods. To identify the predominant generation methods and the most applications of GBOs, we searched four databases (PubMed, Embase, Web of Science, and Wiley Online Laboratory) from August 2021 to August 2023. After screening, 42 out of 295 articles were included and analyzed. GBOs in these articles were generated using only one material, such as tumor tissues, tumor cells, and gene-edited multifunctional stem cells, or simultaneously using two materials, such as tumor cells and normal organoids. Methodologically, direct cultivation of GBM cells or tissues was the most commonly used method to generate GBOs. Embryonic stem cells (ESCs) and induced pluripotent stem cells (iPSCs) were the frequently used multifunctional stem cells to generate GBOs by simultaneously silencing P53, NF1, and PTEN using CRISPR/Cas9. In terms of applications, GBOs generated by direct cultivation of GBM tissue had the most applications, including molecular mechanisms, therapy, and culture technique. This review provides a theoretical reference for selecting an appropriate method to generate GBOs when studying GSCs and GBM.\"}, {\"paperId\": \"0532aadc413627428f72d739690768c32c352491\", \"externalIds\": {\"DOI\": \"10.1002/cpz1.905\", \"CorpusId\": 263150587, \"PubMed\": \"37755326\"}, \"title\": \"FLASH Genome Editing Pipeline: An Efficient and High\\u2010Throughput Method to Construct Arrayed CRISPR Library for Plant Functional Genomics\", \"venue\": \"Current Protocols\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/cpz1.905?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/cpz1.905, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2151789239\", \"name\": \"Lu Yao\"}, {\"authorId\": \"2248406893\", \"name\": \"Xiaochun Wang\"}, {\"authorId\": \"2131236490\", \"name\": \"Runnan Ke\"}, {\"authorId\": \"2118440586\", \"name\": \"Kaiyuan Chen\"}, {\"authorId\": \"6963919\", \"name\": \"Kabin Xie\"}], \"abstract\": \"CRISPR/Cas9 genome editing is a revolutionary technology for plant functional genomics and crop breeding. In this system, the Cas9 nuclease is directed by a guide RNA (gRNA) to cut the DNA target and introduce mutation through error\\u2010prone DNA break repair. Owing to its simplicity, CRISPR/Cas9\\u2010mediated targeted gene knockout is widely used for high\\u2010throughput genetic screening in animal cell cultures and bacteria. However, high\\u2010throughput genetic screening using CRISPR/Cas9 is still challenging in plants. We recently established a new approach, named the FLASH genome editing pipeline, to construct an arrayed CRISPR library in plants. In this pipeline, a set of 12 PCR fragments with different lengths (referred to as FLASH tags) are used to index the Cas9/gRNA vectors. Subsequently, a mixture of 12 Agrobacterium strains, in which each strain contained a FLASH\\u2010tag indexed vector, was transformed into rice plants. As a result, a unique link between the target gene/gRNA and FLASH tag is generated, which allows reading gRNA information in bacterial strains and gene\\u2010edited plants using regular PCR and gel electrophoresis. This protocol includes step\\u2010by\\u2010step instructions for gRNA design, high throughput assembly of FLASH\\u2010tag indexed Cas9/gRNA plasmids, Agrobacterium\\u2010mediated transformation of 12 indexed plasmids, and fast assignment of target gene information in primary transformants. The arrayed CRISPR library described here is suitable for small\\u2010 to large\\u2010scale genetic screening and allows fast and comprehensive gene function discovery in plants. \\u00a9 2023 Wiley Periodicals LLC.\"}, {\"paperId\": \"0532e16f3bd95d6dc56f034cf9179ffc04d459d5\", \"externalIds\": {\"DOI\": \"10.1021/acs.jafc.3c05704\", \"CorpusId\": 266229385, \"PubMed\": \"38088835\"}, \"title\": \"Ionotropic Receptor IR75q.2 Mediates Avoidance Reaction to Nonanoic Acid in the Fall Armyworm Spodoptera frugiperda (Lepidoptera, Noctuidae).\", \"venue\": \"Journal of Agricultural and Food Chemistry\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.jafc.3c05704?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.jafc.3c05704, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1409710545\", \"name\": \"Jin-Meng Guo\"}, {\"authorId\": \"2274805945\", \"name\": \"Zhi-Qiang Wei\"}, {\"authorId\": \"2209411127\", \"name\": \"Jing-Hao Hou\"}, {\"authorId\": \"2249769862\", \"name\": \"Yu He\"}, {\"authorId\": \"2274248340\", \"name\": \"Xuan-Pu Luan\"}, {\"authorId\": \"49889115\", \"name\": \"Yun-Ying Zhang\"}, {\"authorId\": \"2109322402\", \"name\": \"Xiao-long Liu\"}, {\"authorId\": \"2274296930\", \"name\": \"Xiao-tong Zhang\"}, {\"authorId\": \"2240934633\", \"name\": \"Jin Zhang\"}, {\"authorId\": \"153082253\", \"name\": \"Q. Yan\"}, {\"authorId\": \"7350334\", \"name\": \"S. Dong\"}], \"abstract\": \"Ionotropic receptors (IRs) play an important role in olfaction, but little is known in nondrosophila insects. Here, we report in vitro and in vivo functional characterization of IR75q.2 in the invasive moth pest Spodoptera frugiperda. First, 13 IRs (including four coreceptor IRs) were found specifically or highly expressed in adult antennae. Second, these IRs were tested for responding profiles to 59 odorants using the Xenopus oocyte expression system, showing that only SfruIR75q.2 responded to 8-10C fatty acids and their corresponding aldehydes, with SfruIR8a as the only coreceptor. Third, the three acids (especially nonanoic acid) showed repellent effects on moth's behavior and oviposition, but the repellence significantly reduced to the insects with IR75q.2 knockout by CRISPR/Cas9. Taken together, our study reveals the function of SfruIR75q.2 in perception of acid and aldehyde odorants and provides the first in vivo evidence for olfactory function of an odor-specific IR in Lepidoptera.\"}, {\"paperId\": \"0534129ac1864fe4ce698e71a714c34e131e2630\", \"externalIds\": {\"PubMedCentral\": \"11673691\", \"DOI\": \"10.1186/s42826-024-00231-5\", \"CorpusId\": 275093791, \"PubMed\": \"39731164\"}, \"title\": \"Immune deficiency phenotypes of Il2rg, Rag2 or Il2rg/Rag2 double knockout rats; establishment of human leukemia xenograft models\", \"venue\": \"Laboratory Animal Research\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11673691, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144122240\", \"name\": \"Joo-Il Kim\"}, {\"authorId\": \"38746459\", \"name\": \"Hyun-Jin Lim\"}, {\"authorId\": \"47071849\", \"name\": \"E. Kwon\"}, {\"authorId\": \"2245117543\", \"name\": \"Tomoji Mashimo\"}, {\"authorId\": \"2244323565\", \"name\": \"Byeong-Cheol Kang\"}], \"abstract\": \"Genetically immunodeficient mice lacking Il2rg and Rag2 genes have been widely utilized in the field of biomedical research. However, immunodeficient rats, which offer the advantage of larger size, have not been as extensively used to date. Recently, Severe Combined Immunodeficiency (SCID) rats were generated using CRISPR/Cas9 system, targeting Il2rg and Rag2 in National BioResource Project in Japan. We imported and investigated more detailed phenotypes of wild-type (WT) Il2rg knockout (KO), Rag2 KO and Il2rg/Rag2 KO rats for 20 weeks. During experiments, Il2rg KO, Rag2 KO and Il2rg/Rag2 KO rats showed decreased white blood cells and systemic lymphopenia, with reduced CD4+, CD8+\\u2009T cells and CD161+\\u2009NK cells. Additionally, all KO strains exhibited reduced relative spleen weights, hypoplasia of the germinal center in the white pulp, and atrophy with the disappearance of the boundary between the cortex and medulla in the thymus, compared to WT rats. Furthermore, we established human acute lymphoblastic leukemia xenograft rat model by intravenously injecting 5.0\\u2009\\u00d7\\u2009106 cells/kg of NALM6 cells into Il2rg/Rag2 KO rats. These findings indicate that Il2rg KO, Rag2 KO, and Il2rg/Rag2 KO rats exhibited SCID phenotypes, suggesting their potential application as immunodeficient animal models for tumor xenograft studies.\"}, {\"paperId\": \"0534c87bba392b7220e6ac49dcc80088c4875b3c\", \"externalIds\": {\"DOI\": \"10.2337/db23-0531\", \"CorpusId\": 266871378, \"PubMed\": \"38190589\"}, \"title\": \"Human Genetic Variation at rs10071329 Correlates with Adiposity-related Traits, Modulates PPARGC1B Expression, and Alters Brown Adipocyte Function.\", \"venue\": \"Diabetes\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://diabetesjournals.org/diabetes/article-pdf/73/4/637/749427/db230531.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2337/db23-0531?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2337/db23-0531, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2156269976\", \"name\": \"Mi Huang\"}, {\"authorId\": \"2284056492\", \"name\": \"Rashmi B Prasad\"}, {\"authorId\": \"2158925141\", \"name\": \"Daniel E. Coral\"}, {\"authorId\": \"10095945\", \"name\": \"Line Hjort\"}, {\"authorId\": \"46433758\", \"name\": \"D. Minja\"}, {\"authorId\": \"2241689927\", \"name\": \"H. Mulder\"}, {\"authorId\": \"2278601053\", \"name\": \"Paul W. Franks\"}, {\"authorId\": \"2278597946\", \"name\": \"S. Kalamajski\"}], \"abstract\": \"Human genetic variation in PPARGC1B has been associated with adiposity, but the genetic variants that affect PPARGC1B expression have not been experimentally determined. Here, guided by previous observational data, we used CRISPR/Cas9 to scarlessly edit the alleles of the candidate causal genetic variant rs10071329 in a human brown adipocyte cell line (hBAs). Switching the rs10071329 genotype from A/A to G/G enhanced PPARGC1B expression throughout the adipogenic differentiation, identifying rs10071329 as a cis-eQTL. The higher PPARGC1B expression in G/G cells coincided with greater accumulation of triglycerides, and higher expression of mitochondria-encoded genes, but without significant effects on adipogenic marker expression. Furthermore, G/G cells had improved basal- and norepinephrine-stimulated mitochondrial respiration, possibly relating to enhanced mitochondrial gene expression. The G/G cells also exhibited increased norepinephrine-stimulated glycerol release, indicating improved lipolysis. Altogether, our results showed that rs10071329 is a cis-eQTL, with the G/G genotype conferring enhanced PPARGC1B expression, with consequent improved mitochondrial function and response to norepinephrine in brown adipocytes. This genetic variant, and as yet undetermined eQTLs, at PPARGC1B could prove useful in genotype-based precision medicine for obesity treatment.\"}, {\"paperId\": \"05390dac1bae53df5a17ea1a2b69c9ed29cb6b30\", \"externalIds\": {\"PubMedCentral\": \"9243202\", \"DOI\": \"10.1007/s13238-022-00914-6\", \"CorpusId\": 247978044, \"PubMed\": \"35384602\"}, \"title\": \"FTO stabilizes MIS12 and counteracts senescence\", \"venue\": \"Protein & Cell\", \"year\": 2022, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s13238-022-00914-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9243202, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2162453304\", \"name\": \"Sheng Zhang\"}, {\"authorId\": \"10735012\", \"name\": \"Zeming Wu\"}, {\"authorId\": \"1389690734\", \"name\": \"Yue Shi\"}, {\"authorId\": \"118188830\", \"name\": \"Si Wang\"}, {\"authorId\": \"145232153\", \"name\": \"Jie Ren\"}, {\"authorId\": \"2124836011\", \"name\": \"Zihui Yu\"}, {\"authorId\": \"2110406665\", \"name\": \"Daoyuan Huang\"}, {\"authorId\": \"1380870560\", \"name\": \"K. Yan\"}, {\"authorId\": \"2028911044\", \"name\": \"Yifang He\"}, {\"authorId\": \"107783174\", \"name\": \"Xiaoqian Liu\"}, {\"authorId\": \"90451226\", \"name\": \"Qianzhao Ji\"}, {\"authorId\": \"2108663120\", \"name\": \"Beibei Liu\"}, {\"authorId\": \"49293475\", \"name\": \"Zunpeng Liu\"}, {\"authorId\": \"39253781\", \"name\": \"J. Qu\"}, {\"authorId\": \"2218236421\", \"name\": \"Guang-Hui Liu\"}, {\"authorId\": \"121805396\", \"name\": \"W. Ci\"}, {\"authorId\": \"47120596\", \"name\": \"Xiaoqun Wang\"}, {\"authorId\": \"14341433\", \"name\": \"Weiqi Zhang\"}], \"abstract\": \"N-methyladenosine (mA) is an abundant epitranscriptomic modification that regulates messenger RNA (mRNA) biology. The mA modification regulates mRNA splicing, transport, stability, and translation through coordinated activities by methyltransferases (writers), binding proteins (readers), and demethylases (erasers) (Huang et al., 2020; Wu et al., 2020). Among mA regulators, fat mass of obesity-associated protein (FTO), is the first discovered eraser with RNA mA demethylation activity (Jia et al., 2011). Since then, FTO has been reported to play mA-dependent roles in a variety of physiological processes including adipogenesis, neurogenesis and tumorigenesis (Fischer et al., 2009; Li et al., 2017; Huang et al., 2020). Consequently, FTO deficiency in mice leads to dramatic phenotypes, such as decreased fat mass and impaired brain development (Fischer et al., 2009; Li et al., 2017). Similarly, inhibition of FTO reduces tumorigenesis in multiple types of cancer models, while FTO is highly expressed in many cancers (Huang et al., 2020). Although FTO is primarily linked with biological functions related to demethylation of internal mA, recent work indicates a more complex role in FTO-mediated epitranscriptional regulation. Specifically, FTO was reported to demethylate other substrates, such as N,2\\u2032-O-dimethyladenosine (mAm) and N -methyladenosine (mA), and, based on its varied cellular distribution across cell types, proposed to be afforded differential access to RNA substrates (Wei et al., 2018; Sun et al., 2021). Indeed, in recent work, we discovered that mA RNA methylation is reduced in human stem cell models of senescence, and that mA-dependent mRNA stabilization of MIS12, a kinetochore component, protects against senescence (Wu et al., 2020). However, whether and how FTO regulates human stem cell homeostasis remain largely unexplored. Here, using CRISPR/Cas9-based strategy, we generated FTO-deficient human stem cell models and demonstrated an mA-independent way by which FTO stabilizes MIS12 and antagonizes human stem cell senescence. To investigate the role of FTO in regulating human stem cell homeostasis, we first generated FTO-deficient human embryonic stem cells (hESCs) through CRISPR/Cas9-based gene editing (Fig. 1A and 1B). FTO depletion was verified by western blotting and immunofluorescence staining (Figs. 1C, 1D and S1A). Furthermore, we did not detect any off-target effects resulting from FTO deletion (Fig. S1B). Although a previous study reported potential large structural variations near the target site induced by CRISPR-editing in hESCs (Bi et al., 2020), karyotype and copy number variation analyses revealed that the genomic integrity of FTO-deficient (FTO) hESCs was well maintained (Fig. S1C\\u2013F). Relative to wild type (WT, FTO) hESCs, DNA hypomethylation at the OCT4 promoter region and the expression of typical pluripotency markers, including OCT4, SOX2 and NANOG, were comparable in FTO hESCs (Figs. 1E, S1G and S1H). Immunofluorescence staining and flow cytometry analysis further showed comparable Ki67-positive cell numbers and cell cycle status between FTO and FTO hESCs (Fig. 1F and 1G). Similarly, we did not detect any remarkable differences in the expression of nuclear laminaassociated protein LAP2 and heterochromatin relevant proteins HP1\\u03b1 and H3K9me3, whose downregulation was associated with stem cell senescence (Shan et al., 2021; Li et al., 2022), between FTO and FTO hESCs (Figs. 1H and S1I\\u2013K). Altogether, these data indicate that FTO is dispensable for maintaining hESC self-renewal and the expression of pluripotency genes. Next, we differentiated FTO and FTO hESCs into human mesenchymal progenitor cells (hMPCs) for addressing the effects of FTO deficiency on human adult stem cells (Fig. 1A). Both FTO and FTO hMPCs expressed typical hMPC surface markers including CD73, CD90, and CD105 (Fig. S1L). We confirmed the loss of FTO protein by western blotting and immunofluorescence staining (Figs. 1I, 1J and S1M). Compared with FTO hMPCs, FTO hMPCs were able to differentiate into adipocytes, chondrocytes, and osteoblasts, although with a differentiation bias towards the osteoblast fate at the expense of differentiation towards the adipocyte fate (Fig. S1N\\u2013P). Strikingly, and different from what we observed in hESCs, self-renewal capacity was impaired in FTO hMPCs, as indicated by early-onset growth arrest, restricted clonal expansion, decreased Ki67-positive cells, reduced S phase and prolonged G0/G1 phase (Fig. 1K\\u2013N). In addition, FTO ablation led to accelerated senescence, as manifested by elevated senescence-associated \\u03b2-galactosidase (SA-\\u03b2-gal)\"}, {\"paperId\": \"053b0c9fc4c3c0dcd85ac1918abf262e42c81a56\", \"externalIds\": {\"PubMedCentral\": \"10779060\", \"DOI\": \"10.3390/ijms25010444\", \"CorpusId\": 266642285, \"PubMed\": \"38203615\"}, \"title\": \"Increasing the Activity of the High-Fidelity SpyCas9 Form in Yeast by Directed Mutagenesis of the PAM-Interacting Domain\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/25/1/444/pdf?version=1703776693\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10779060, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2191156334\", \"name\": \"A. I. Davletshin\"}, {\"authorId\": \"2158412299\", \"name\": \"A. A. Matveeva\"}, {\"authorId\": \"2276479253\", \"name\": \"S. S. Bachurin\"}, {\"authorId\": \"2188635982\", \"name\": \"D. Karpov\"}, {\"authorId\": \"32643650\", \"name\": \"D. Garbuz\"}], \"abstract\": \"CRISPR/Cas systems are used for genome editing, both in basic science and in biotechnology. However, CRISPR/Cas editors have several limitations, including insufficient specificity leading to \\u201coff-targets\\u201d and the dependence of activity on chromatin state. A number of highly specific Cas9 variants have now been obtained, but most of them are characterized by reduced activity on eukaryotic chromatin. We identified a spatial cluster of amino acid residues in the PAM-recognizing domain of Streptococcus pyogenes Cas9, whose mutations restore the activity of one of the highly specific forms of SpyCas9 without reducing its activity in Saccharomyces cerevisiae. In addition, one of these new mutations also increases the efficiency of SpyCas9-mediated editing of a site localized on the stable nucleosome. The improved Cas9 variants we obtained, which are capable of editing hard-to-reach regions of the yeast genome, may help in both basic research and yeast biotechnological applications.\"}, {\"paperId\": \"053cf73fb96a38a074d0bcf22f242032dceea0d1\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2022.102990\", \"CorpusId\": 254302248, \"PubMed\": \"36528979\"}, \"title\": \"CRISPR/Cas9 mediated approach to generate YAP-depleted human embryonic stem cell line (MUSIe002-A-1).\", \"venue\": \"Stem Cell Research\", \"year\": 2022, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2022.102990\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2022.102990?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2022.102990, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404347789\", \"name\": \"Sujittra Khampang\"}, {\"authorId\": \"1390125084\", \"name\": \"Nittaya Jiamvoraphong\"}, {\"authorId\": \"5122654\", \"name\": \"C. Laowtammathron\"}, {\"authorId\": \"3792522\", \"name\": \"C. Lorthongpanich\"}, {\"authorId\": \"15123202\", \"name\": \"P. Klaihmon\"}, {\"authorId\": \"15268191\", \"name\": \"Pimonwan Srisook\"}, {\"authorId\": \"2072532297\", \"name\": \"Xing Kang\"}, {\"authorId\": \"5262058\", \"name\": \"Sudjit Luanpitpong\"}, {\"authorId\": \"1390125006\", \"name\": \"Y. U-pratya\"}, {\"authorId\": \"5306084\", \"name\": \"S. Issaragrisil\"}], \"abstract\": \"Yes-associated protein (YAP), an important effector protein of the Hippo signaling pathway, acts as a molecular switch in controlling cell proliferation and apoptosis. In this study, a YAP-targeted isogenic sub-clone of the MUSIe002-A was generated, designated as MUSIe002-A-1. The MUSIe002-1 cell line had normal pluripotent stem cell characteristics and karyotype. Its ability to differentiate into three germ layers was confirmed. As reduction of YAP does not disturb the pluripotency of hESCs, this cell line serves as a valuable model to extrapolate the functional role of YAP in stem cell biology and its applications.\"}, {\"paperId\": \"0540318087d4981f15365692a57def074daee3f6\", \"externalIds\": {\"DOI\": \"10.1007/s11627-021-10236-7\", \"CorpusId\": 255342414}, \"title\": \"Heritable DNA-free genome editing of canola (Brassica napus L.) using PEG-mediated transfection of isolated protoplasts\", \"venue\": \"In Vitro Cellular & Developmental Biology - Plant\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s11627-021-10236-7?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s11627-021-10236-7, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49238805\", \"name\": \"V. Sidorov\"}, {\"authorId\": \"152325614\", \"name\": \"Dafu Wang\"}, {\"authorId\": \"33132279\", \"name\": \"E. Nagy\"}, {\"authorId\": \"1815935\", \"name\": \"C. Armstrong\"}, {\"authorId\": \"34689076\", \"name\": \"S. Beach\"}, {\"authorId\": \"2145783471\", \"name\": \"Yuanji Zhang\"}, {\"authorId\": \"46557535\", \"name\": \"J. Groat\"}, {\"authorId\": \"2139150335\", \"name\": \"Sam Yang\"}, {\"authorId\": \"1918214\", \"name\": \"Peizhen Yang\"}, {\"authorId\": \"34823861\", \"name\": \"L. Gilbertson\"}], \"abstract\": null}, {\"paperId\": \"0542a3f9ec3be5f900caeb8191b62b1a923e5343\", \"externalIds\": {\"PubMedCentral\": \"7520124\", \"MAG\": \"3088307134\", \"DOI\": \"10.17912/micropub.biology.000311\", \"CorpusId\": 222068176, \"PubMed\": \"33005882\"}, \"title\": \"Endogenous expression and localization of CAV-1::GFP in C. elegans\", \"venue\": \"microPublication Biology\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7520124, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"31532437\", \"name\": \"Dillon E. Sloan\"}, {\"authorId\": \"4063958\", \"name\": \"J. Bembenek\"}], \"abstract\": \"Figure 1. Endogenous CAV-1::GFP: (A) Schematic of cav-1 edit (B-G) Single-plane images of CAV-1::GFP localization: at the bend of the gonad arm (B), in the -1 oocyte (C), in a prometaphase I embryo (D), in an anaphase I embryo (E), in a bean stage embryo (F), and in a fold-stage embryo (G). (H) CAV-1::GFP in adult worm. Numbers correspond with number of cells in embryo. Description Caveolins are integral membrane proteins responsible for the formation of caveolae, invaginations of the plasma membrane linked to various disease states (Parton et al. 2020). In C. elegans, there are two caveolin proteins, CAV-1 and CAV-2. The cav-1 gene shares homology with all three mammalian caveolin genes (Tang et al. 1997). C. elegans CAV-1 protein does not appear to form caveolae, but a double-knockout mutant of cav-1 and cav-2 affects egg laying, and knockdown of cav-1 affects locomotion in a dynamin mutant background (Parker et al.. 2007, Kirkham et al. 2008, Sato et al. 2008). Based on exogenous expression, CAV-1::GFP is known to localize to cortical granules and the plasma membrane in oocytes and the early embryo, to the plasma membrane in later embryos, as well as to the neuromuscular system in larvae and adult worms (Sato et al. 2006, Bembenek et al. 2007, Parker et al. 2007). Using CRISPR/Cas9, we generated an endogenous CAV-1::GFP fluorescent fusion strain, primarily to create a cortical granule marker (Figure 1A). Imaging endogenous CAV-1::GFP revealed similar patterns as previously reported in the germ line (Sato et al. 2006). However, unlike the pie-1 driven exogenous line, endogenous CAV-1::GFP was not clearly detected in the distal gonad until the bend region of the gonad arm, where it localized to the plasma membrane, and vesicle-shaped structures (Figure 1B). Oocytes had slightly higher expression showing enrichment at plasma membrane 9/21/2020 Open Access localization but faint cytoplasmic signal, and no obvious enrichment to vesicles (Figure 1C). After ovulation, CAV-1::GFP remained on the plasma membrane during meiosis I and was no longer detected by meiosis II (Figure 1D,E). In 5/5 anaphase I embryos, CAV-1::GFP was not significantly localized to cortical granules at a time when separase could be observed on vesicles. Overall, endogenous CAV-1::GFP signal is less intense in the germline than exogenous pie-1-driven lines. However, endogenous CAV-1::GFP signal became increasingly intense at the plasma membrane sometime after the 16-cell embryo stage (Figure 1H). The membrane signal remains intense through later stages of embryonic development (Figure 1F,G). This potentially indicates a dynamic role for cav-1 in embryonic development. Finally, adult somatic expression appeared to follow previously observed patterns (Figure 1H, Parker et al. 2007). In summary, we have developed an endogenous CAV-1::GFP line by CRISPR, which can be of use to researchers interested in CAV-1. Methods Request a detailed protocol CRISPR/Cas9 Gene editing We followed the CRISPR/Cas9 protocol generated by Seydoux lab for C-terminal GFP tagging of the C. elegans cav-1 gene (Figure 1A, Paix et al. 2015). The repair template was amplified from the pDD282 plasmid. All guide RNAs and oligos were obtained commercially. The primer sequences are listed below: cav-1::GFP Forward (termed DS_027): ACGGAATCAATCAAGAAACTACTGCTCCATGCGTCATGAGTAAAGGAGAAGAATTGTTCACTG cav-1::GFP Reverse (termed DS_026): AGTAAAATGAATTTGAGATAAATTAAATAAATTTACTTGTAGAGCTCGTCCATTCC The crRNA sequence recognizing the spacer upstream of NGG is as follows: (Termed DS_g003): AUUAAAUAAAUUUAGACGCA Microscopy Imaging was done as indicated in Bai et al. 2020. Embryos were staged using the localization of separase fused with a red fluorescent protein as well as embryo position and age in the animal.\"}, {\"paperId\": \"054cdbadaeca421ca1d79ee17b8464f842c1f266\", \"externalIds\": {\"DOI\": \"10.1126/scitranslmed.abd3079\", \"CorpusId\": 242937479, \"PubMed\": \"34731013\"}, \"title\": \"Truncated titin proteins and titin haploinsufficiency are targets for functional recovery in human cardiomyopathy due to TTN mutations\", \"venue\": \"Science Translational Medicine\", \"year\": 2021, \"citationCount\": 97, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/scitranslmed.abd3079?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/scitranslmed.abd3079, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2067446917\", \"name\": \"A. Fomin\"}, {\"authorId\": \"1700897722\", \"name\": \"Anna G\\u00e4rtner\"}, {\"authorId\": \"4836451\", \"name\": \"Lukas Cyganek\"}, {\"authorId\": \"3874027\", \"name\": \"M. Tiburcy\"}, {\"authorId\": \"2085966648\", \"name\": \"I. Tuleta\"}, {\"authorId\": \"2139217039\", \"name\": \"Luisa Wellers\"}, {\"authorId\": \"2139203603\", \"name\": \"Lina Folsche\"}, {\"authorId\": \"1491279261\", \"name\": \"A. J. Hobbach\"}, {\"authorId\": \"1402021605\", \"name\": \"Marion von Frieling-Salewsky\"}, {\"authorId\": \"145655552\", \"name\": \"A. Unger\"}, {\"authorId\": \"15272012\", \"name\": \"A. Hucke\"}, {\"authorId\": \"5478695\", \"name\": \"F. Koser\"}, {\"authorId\": \"34323301\", \"name\": \"A. Kassner\"}, {\"authorId\": \"2237778958\", \"name\": \"K. Sielemann\"}, {\"authorId\": \"1401588719\", \"name\": \"K. Streckfuss-B\\u00f6meke\"}, {\"authorId\": \"4769759\", \"name\": \"G. Hasenfuss\"}, {\"authorId\": \"5685696\", \"name\": \"A. Goedel\"}, {\"authorId\": \"5281948\", \"name\": \"K. Laugwitz\"}, {\"authorId\": \"5222382\", \"name\": \"A. Moretti\"}, {\"authorId\": \"2203115\", \"name\": \"J. Gummert\"}, {\"authorId\": \"144789008\", \"name\": \"C. D. dos Remedios\"}, {\"authorId\": \"83412065\", \"name\": \"H. Reinecke\"}, {\"authorId\": \"2074628499\", \"name\": \"R. Kn\\u00f6ll\"}, {\"authorId\": \"8091637\", \"name\": \"Sebastiaan van Heesch\"}, {\"authorId\": \"5182815\", \"name\": \"N. Hubner\"}, {\"authorId\": \"101999242\", \"name\": \"W. Zimmermann\"}, {\"authorId\": \"5184686\", \"name\": \"H. Milting\"}, {\"authorId\": \"2125678\", \"name\": \"W. Linke\"}], \"abstract\": \"Description Stable expression of truncated titin proteins and titin haploinsufficiency characterize TTN cardiomyopathy and represent targets for therapy. Tracking titin in dilated cardiomyopathy Truncating variants in TTN, the gene encoding the titin protein, underlie 15 to 25% of cases of nonischemic dilated cardiomyopathy (DCM), but whether the disease is caused by haploinsufficiency or the presence of truncated titin proteins is not yet clear. Here, using tissues from the hearts of patients with DCM and TTN truncating variants as well as human induced pluripotent stem cells differentiated into cardiomyocytes, Fomin et al. and McAfee et al. identified both the presence of truncated titin proteins and less-abundant full-length titin proteins. These findings suggest that the presence of truncated titin proteins as \\u201cpoison peptides\\u201d and titin haploinsufficiency both contribute to the pathogenesis of disease and should support the investigation of targeted therapies to treat DCM caused by TTN truncating variants. Heterozygous truncating variants in TTN (TTNtv), the gene coding for titin, cause dilated cardiomyopathy (DCM), but the underlying pathomechanisms are unclear and disease management remains uncertain. Truncated titin proteins have not yet been considered as a contributor to disease development. Here, we studied myocardial tissues from nonfailing donor hearts and 113 patients with end-stage DCM for titin expression and identified a TTNtv in 22 patients with DCM (19.5%). We directly demonstrate titin haploinsufficiency in TTNtv-DCM hearts and the absence of compensatory changes in the alternative titin isoform Cronos. Twenty-one TTNtv-DCM hearts in our cohort showed stable expression of truncated titin proteins. Expression was variable, up to half of the total titin protein pool, and negatively correlated with patient age at heart transplantation. Truncated titin proteins were not detected in sarcomeres but were present in intracellular aggregates, with deregulated ubiquitin-dependent protein quality control. We produced human induced pluripotent stem cell\\u2013derived cardiomyocytes (hiPSC-CMs), comparing wild-type controls to cells with a patient-derived, prototypical A-band-TTNtv or a CRISPR-Cas9\\u2013generated M-band-TTNtv. TTNtv-hiPSC-CMs showed reduced wild-type titin expression and contained truncated titin proteins whose proportion increased upon inhibition of proteasomal activity. In engineered heart muscle generated from hiPSC-CMs, depressed contractility caused by TTNtv could be reversed by correction of the mutation using CRISPR-Cas9, eliminating truncated titin proteins and raising wild-type titin content. Functional improvement also occurred when wild-type titin protein content was increased by proteasome inhibition. Our findings reveal the major pathomechanisms of TTNtv-DCM and can be exploited for new therapies to treat TTNtv-related cardiomyopathies.\"}, {\"paperId\": \"054d5cc03556646d3bd0ee54885a00a86d2d120d\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-150830\", \"CorpusId\": 244547080}, \"title\": \"S. Aureus Cas9 Leads to Higher Sickle Mutation Correction Compared to S. Pyogenes Cas9 in Patient Hematopoietic Stem and Progenitor Cells\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-150830\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-150830?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-150830, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2142606276\", \"name\": \"Byoungyong Yoo\"}, {\"authorId\": \"2148569760\", \"name\": \"S. Park\"}, {\"authorId\": \"46867913\", \"name\": \"Yankai Zhang\"}, {\"authorId\": \"4046667\", \"name\": \"V. Sheehan\"}, {\"authorId\": \"1683479\", \"name\": \"Gang Bao\"}], \"abstract\": \"\\n Introduction: Sickle cell disease (SCD) is a red blood cell disorder caused by a single nucleotide mutation in the \\u03b2-globin gene (HBB). Allogeneic hematopoietic stem cell transplantation (HSCT) is the only available cure, but is available to only a minority of patients and can be associated with high morbidity and mortality. CRISPR/Cas9 mediated genome editing may provide a permanent cure for SCD patients by correcting the sickle mutation in HBB in hematopoietic stem and progenitor cells (HSPCs). Previously, we achieved ~39% sickle mutation correction in SCD HSPCs by delivering S. pyogenes (Spy) Cas9/R-66S gRNA as ribonucleoprotein (RNP) and single-stranded oligodeoxynucleotides (ssODN) corrective donor template. S. aureus (Sau) Cas9 has potentially advantageous properties to improve therapeutic gene editing efficiency and safety, including smaller size allowing for efficient in vivo delivery and longer Protospacer Adjacent Motif (PAM) sequence for higher specificity. However, although in general, the cutting efficiency of SauCas9 is lower than SpyCas9, the differences in gene correction and other gene-editing outcomes between SpyCas9 and SauCas9 have not been well studied.\\n Methods: With our R-66S gRNA sequence targeting the sickle mutation, the PAM sequence of SauCas9 (NGGRRT) is mutually permissive with that of SpyCas9 (NGG), allowing the same sequence to be targeted by both Cas9 nucleases. We delivered R-66S gRNA with SpyCas9 and SauCas9 respectively as RNP, along with corrective ssODN donor template into SCD HSPCs. We analyzed sickle mutation correction rate and small insertions and deletions (INDELs) profile by Next Generation Sequencing (NGS).\\n Results/discussions: We found that although the INDEL rate of SpyCas9 is higher than SauCas9 at the same molar concentration of RNP, SauCas9 gave 43% sickle mutation correction, slightly higher than SpyCas9 (39%), demonstrating efficient homology-directed repair (HDR) mediated gene correction by SauCas9. To further investigate the potential for clinical translation, we will perform in-depth efficiency and safety characterization comparing SauCas9 and SpyCas9 mediated sickle mutation correction therapy in SCD HSPCs.\\n Conclusion: In this work, we showed that, compared with the highly-optimized and widely-used SpyCas9, SauCas9 leads to a higher sickle mutation correction in SCD HSPCs, demonstrating the therapeutic potential of SauCas9 for treating SCD. We will further investigate the efficiency and safety of gene-edited therapy mediated by these two Cas9 orthologs, including in-depth characterization of off-target effects, chromosomal rearrangement and aberrations, and large genomic modifications. We will differentiate gene-corrected SCD HSPCs to study erythropoiesis and red cell phenotype, including normal hemoglobin production and reduced sickling under hypoxic conditions. Lastly, we will evaluate the engraftment efficiency of gene-edited cells in Nonirradiated NOD,B6.SCID Il2r\\u03b3 -/- Kit (W41/W41) (NBSGW) mice that support the engraftment of human hematopoietic stem cells.\\n \\n \\n Sheehan:\\u2008Forma Therapeutics: Research Funding; Beam Therapeutics: Research Funding; Novartis: Research Funding.\\n\"}, {\"paperId\": \"054deea61d9dcb19c0d6d75294555d347b65b64e\", \"externalIds\": {\"PubMedCentral\": \"10557149\", \"DOI\": \"10.3389/fpls.2023.1111875\", \"CorpusId\": 262210783, \"PubMed\": \"37810398\"}, \"title\": \"Metabolic pathways engineering for drought or/and heat tolerance in cereals\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2023, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2023.1111875/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10557149, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50152154\", \"name\": \"Songtao Liu\"}, {\"authorId\": \"40857089\", \"name\": \"Tinashe Zenda\"}, {\"authorId\": \"6056192\", \"name\": \"Zaimin Tian\"}, {\"authorId\": \"2244607812\", \"name\": \"Zhihong Huang\"}], \"abstract\": \"Drought (D) and heat (H) are the two major abiotic stresses hindering cereal crop growth and productivity, either singly or in combination (D/+H), by imposing various negative impacts on plant physiological and biochemical processes. Consequently, this decreases overall cereal crop production and impacts global food availability and human nutrition. To achieve global food and nutrition security vis-a-vis global climate change, deployment of new strategies for enhancing crop D/+H stress tolerance and higher nutritive value in cereals is imperative. This depends on first gaining a mechanistic understanding of the mechanisms underlying D/+H stress response. Meanwhile, functional genomics has revealed several stress-related genes that have been successfully used in target-gene approach to generate stress-tolerant cultivars and sustain crop productivity over the past decades. However, the fast-changing climate, coupled with the complexity and multigenic nature of D/+H tolerance suggest that single-gene/trait targeting may not suffice in improving such traits. Hence, in this review-cum-perspective, we advance that targeted multiple-gene or metabolic pathway manipulation could represent the most effective approach for improving D/+H stress tolerance. First, we highlight the impact of D/+H stress on cereal crops, and the elaborate plant physiological and molecular responses. We then discuss how key primary metabolism- and secondary metabolism-related metabolic pathways, including carbon metabolism, starch metabolism, phenylpropanoid biosynthesis, \\u03b3-aminobutyric acid (GABA) biosynthesis, and phytohormone biosynthesis and signaling can be modified using modern molecular biotechnology approaches such as CRISPR-Cas9 system and synthetic biology (Synbio) to enhance D/+H tolerance in cereal crops. Understandably, several bottlenecks hinder metabolic pathway modification, including those related to feedback regulation, gene functional annotation, complex crosstalk between pathways, and metabolomics data and spatiotemporal gene expressions analyses. Nonetheless, recent advances in molecular biotechnology, genome-editing, single-cell metabolomics, and data annotation and analysis approaches, when integrated, offer unprecedented opportunities for pathway engineering for enhancing crop D/+H stress tolerance and improved yield. Especially, Synbio-based strategies will accelerate the development of climate resilient and nutrient-dense cereals, critical for achieving global food security and combating malnutrition.\"}, {\"paperId\": \"054f5132274c9e41f2b2d656f77777ec613be039\", \"externalIds\": {\"PubMedCentral\": \"8864037\", \"DOI\": \"10.1186/s43556-022-00072-5\", \"CorpusId\": 247058080, \"PubMed\": \"35194690\"}, \"title\": \"Enhancing prime editing via inhibition of mismatch repair pathway\", \"venue\": \"Molecular Biomedicine\", \"year\": 2022, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1186/s43556-022-00072-5.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8864037, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2148634120\", \"name\": \"Lurong Jiang\"}, {\"authorId\": \"37571403\", \"name\": \"Shaohua Yao\"}], \"abstract\": \"\\u00a9 The Author(s) 2022. Open Access This article is licensed under a Creative Commons Attribution 4.0 International License, which permits use, sharing, adaptation, distribution and reproduction in any medium or format, as long as you give appropriate credit to the original author(s) and the source, provide a link to the Creative Commons licence, and indicate if changes were made. The images or other third party material in this article are included in the article\\u2019s Creative Commons licence, unless indicated otherwise in a credit line to the material. If material is not included in the article\\u2019s Creative Commons licence and your intended use is not permitted by statutory regulation or exceeds the permitted use, you will need to obtain permission directly from the copyright holder. To view a copy of this licence, visit http:// creat iveco mmons. org/ licen ses/ by/4. 0/. Background In the recent issue of Cell [1], Chen et al. from David Liu laboratory discovered that inhibition of DNA mismatch repair (MMR) significantly enhanced the efficiency of prime editing while abated the frequency of unintended indels. Prime editing (PE) is currently the most precise and versatile genome editing technique that allow all kinds of base conversions and small fragment deletion or insertion in the genome [2], but its efficiency is generally lower than that of other Cas9 derived editing tools, such as nuclease Cas9 and base editing [3]. Prime editing was also invented in David Liu laboratory by fusing MMLVreverse transcriptase (RT) to Cas9 nickase. Noteworthy, since the Nobel-winning work demonstrated that Cas9 system is reprogrammable for new target [4], it was soon widely used in the biomedical research because of its superiority over former reprogrammable nucleases. Basically, the Cas9 system consists two effectors, the Cas9 protein and its guide RNAs, crRNA (CRISPR RNA) and tracrRNA (trans-activating CRISPR RNA), which can be engineered into one single guide RNA (sgRNA). Under the guidance of sgRNA, wildtype Cas9 protein recognizes its target DNAs and produces double strand breaks. Mutant Cas9 protein with impaired nuclease activity can still bind the targets, which can be used as a platform to recruit other effectors to perform localized DNA manipulations. Cas9 disassociates the non-target strand (NTS) of sgRNA from its target strand (TS) to form a R-loop structure and the disassociated NTS is exposed outside complex and therefore can serve as a substrate for enzymes preferring ssDNAs. This feature was well utilized in designing base editors [3], where a cytosine or adenine deaminase was fused with Cas9 nickase that specifically cleaves the TS. By deaminating the cytosines or adenines in the exposed NTS, these editors converted them into uracil and hypoxanthine respectively, which were then converted into thymine and guanine respectively with the assistance of endogenous repair mechanisms. Although effective, the accuracy and versatility of base editors are limited in that they non-selectively converted their substrate bases within the editing window and they mainly perform base transitions. To resolve these issues, David Liu laboratory developed prime editors, which utilize Cas9 nickase to cleave NTS, prime editing sgRNA (pegRNA) to bind the TS, and RT to reverse transcribe the 3\\u2019 end of NTS according to the information encoded by pegRNA. These concerted actions ultimately produced a 3\\u2019 flap with intended edits, inducing endogenous DNA repair mechanisms to integrate the edits into the genome. Armed with welldesigned pegRNAs, PE enables virtually all types of editing, including point mutations, deletions and insertions. However, the efficiency of PE is generally lower than that of other Cas9 based tools (Fig. 1a). In the recent Cell paper, David Liu laboratory discovered a practical solution to enhance the efficiency of PE The authors conducted a pooled CRISPRi screening with sgRNAs targeting genes involved in DNA repair and identified that interfering MMR genes enhanced both the efficiency and accuracy of prime editing. In their screening system (Fig. 1b), named Repair-seq, Streptococcus pyogenes Cas9 (SpCas9) derived transcriptional repressor (dCas9\\u2013KRAB) was used to couple with pooled suppressor sgRNAs to inhibit gene expression and Staphylococcus Open Access Molecular Biomedicine\"}, {\"paperId\": \"055609f7b0d43ebe63e0e4379f10f019e294a2ee\", \"externalIds\": {\"DOI\": \"10.1016/j.htct.2023.09.1372\", \"CorpusId\": 264335220}, \"title\": \"NOCAUTE DO GENE BETA-2 MICROGLOBULINA EM C\\u00c9LULAS DERIVADAS DO TECIDO ADIPOSO UTILIZANDO O SISTEMA CRISPR/CAS9 PARA A GERA\\u00c7\\u00c3O DE PLAQUETAS HLA CLASSE I UNIVERSAIS\", \"venue\": \"Hematology, Transfusion and Cell Therapy\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.htct.2023.09.1372\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.htct.2023.09.1372?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.htct.2023.09.1372, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2260538468\", \"name\": \"LF Catelli\"}, {\"authorId\": \"2260542979\", \"name\": \"Maf Corat\"}, {\"authorId\": \"2260492548\", \"name\": \"F. Niemann\"}, {\"authorId\": \"89246398\", \"name\": \"A. Santos\"}, {\"authorId\": \"2260431061\", \"name\": \"NG \\u00c2mor\"}, {\"authorId\": \"2260640959\", \"name\": \"I. Santos\"}, {\"authorId\": \"2260542012\", \"name\": \"Fbs Te\\u00f3filo\"}, {\"authorId\": \"2260871315\", \"name\": \"Psd Santos\"}, {\"authorId\": \"2136821931\", \"name\": \"Sto Saad\"}], \"abstract\": null}, {\"paperId\": \"055b31d5ec32a1915c88f56939fa71c60685cbac\", \"externalIds\": {\"MAG\": \"3045606929\", \"DOI\": \"10.1016/j.jmii.2020.07.010\", \"CorpusId\": 221084936, \"PubMed\": \"32768338\"}, \"title\": \"Loss of HPV type 16 E7 restores cGAS-STING responses in human papilloma virus-positive oropharyngeal squamous cell carcinomas cells.\", \"venue\": \"Journal of microbiology, immunology, and infection = Wei mian yu gan ran za zhi\", \"year\": 2020, \"citationCount\": 47, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.jmii.2020.07.010\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jmii.2020.07.010?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jmii.2020.07.010, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"16214612\", \"name\": \"V. Bortnik\"}, {\"authorId\": \"2110541990\", \"name\": \"Michelle Wu\"}, {\"authorId\": \"1865173635\", \"name\": \"Bryan Julcher\"}, {\"authorId\": \"143709756\", \"name\": \"Ana Salinas\"}, {\"authorId\": \"49014686\", \"name\": \"I. Nikoli\\u0107\"}, {\"authorId\": \"6346427\", \"name\": \"K. Simpson\"}, {\"authorId\": \"145439497\", \"name\": \"N. McMillan\"}, {\"authorId\": \"48210706\", \"name\": \"A. Idris\"}], \"abstract\": \"Human papilloma viruses (HPV) are the main culprit in cervical and oropharyngeal cancers. HPV positive (+) cancers are regarded as 'oncogene addicted', displaying an absolute requirement for the continued expression of the oncogenes for their viability owing their survival, and thus making these genes salient targets for developing specific therapeutic agents. There is a strong association between HPV and oropharyngeal squamous cell carcinomas (OPSCC), a subset of head and neck cancers (HNCs). Alarmingly, HPV-associated OPSCC are on the rise globally, and the number of cases of HPV\\u00a0+\\u00a0OPSCCs surpasses that of cervical cancer in the USA. Here, we show that major HPV oncogenes, E6 and E7, are essential for the survival of HPV positive (+) OPSCCs, making these oncogenes salient targets for HPV-driven OPSCCs. HPV E7 is known to interact with STING, a component of the viral DNA-sensing cGAS-STING machinery which activates a pro-typical anti-viral type I interferon (IFN) response. Our recent work showed that E7 from HPV type 16 is responsible for the blockade of cGAS-STING responses in HPV\\u00a0+\\u00a0OPSCC cells. In this study, we show that CRISPR/Cas9-mediated loss of E7 from HPV\\u00a0+\\u00a0OPSCC cells, SCC2 and SCC104, restored cGAS-STING responses. Future work could involve HPV oncogene targeting leading to HPV\\u00a0+\\u00a0OPSCC tumour regression and that the combined use of STING agonists would induce favourable tumour clearance by activating appropriate anti-tumour responses.\"}, {\"paperId\": \"055e62b0d6d1305dc9ff0866571c22e45962ac1d\", \"externalIds\": {\"PubMedCentral\": \"10921914\", \"DOI\": \"10.1158/2767-9764.CRC-23-0331\", \"CorpusId\": 268058825, \"PubMed\": \"38421310\"}, \"title\": \"Gigaxonin Suppresses Epithelial-to-Mesenchymal Transition of Human Cancer Through Downregulation of Snail\", \"venue\": \"Cancer Research Communications\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://aacrjournals.org/cancerrescommun/article-pdf/doi/10.1158/2767-9764.CRC-23-0331/3418301/crc-23-0331.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10921914, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2778746\", \"name\": \"M. Veena\"}, {\"authorId\": \"2288203320\", \"name\": \"Jungmo J Gahng\"}, {\"authorId\": \"32462249\", \"name\": \"Mustafa Alani\"}, {\"authorId\": \"2189197475\", \"name\": \"Albert Y Ko\"}, {\"authorId\": \"5829238\", \"name\": \"S. Basak\"}, {\"authorId\": \"6195555\", \"name\": \"Isabelle Y Liu\"}, {\"authorId\": \"153697120\", \"name\": \"Kimberly J Hwang\"}, {\"authorId\": \"83659953\", \"name\": \"Jenna R Chatoff\"}, {\"authorId\": \"49009631\", \"name\": \"N. Venkatesan\"}, {\"authorId\": \"38902256\", \"name\": \"M. Morselli\"}, {\"authorId\": \"2363518687\", \"name\": \"Weihong Yan\"}, {\"authorId\": \"15686204\", \"name\": \"Ibraheem Ali\"}, {\"authorId\": \"1398081274\", \"name\": \"K. Kaczor\\u2010Urbanowicz\"}, {\"authorId\": \"2186233395\", \"name\": \"Bhavani Shankara Gowda\"}, {\"authorId\": \"2265318444\", \"name\": \"Patrick Frost\"}, {\"authorId\": \"2204715566\", \"name\": \"M. Pellegrini\"}, {\"authorId\": \"5384036\", \"name\": \"N. Moatamed\"}, {\"authorId\": \"2255209706\", \"name\": \"Sharon P Wilczynski\"}, {\"authorId\": \"2275487179\", \"name\": \"Pascale Bomont\"}, {\"authorId\": \"2288261256\", \"name\": \"Marilene B Wang\"}, {\"authorId\": \"2289709834\", \"name\": \"D. S. Shin\"}, {\"authorId\": \"5028243\", \"name\": \"E. Srivatsan\"}], \"abstract\": \"Abstract Gigaxonin is an E3 ubiquitin ligase that plays a role in cytoskeletal stability. Its role in cancer is not yet clearly understood. Our previous studies of head and neck cancer had identified gigaxonin interacting with p16 for NF\\u03baB ubiquitination. To explore its role in cancer cell growth suppression, we analyzed normal and tumor DNA from cervical and head and neck cancers. There was a higher frequency of exon 8 SNP (c.1293 C>T, rs2608555) in the tumor (46% vs. 25% normal, P = 0.011) pointing to a relationship to cancer. Comparison of primary tumor with recurrence and metastasis did not reveal a statistical significance. Two cervical cancer cell lines, ME180 and HT3 harboring exon 8 SNP and showing T allele expression correlated with higher gigaxonin expression, reduced in vitro cell growth and enhanced cisplatin sensitivity in comparison with C allele expressing cancer cell lines. Loss of gigaxonin expression in ME180 cells through CRISPR-Cas9 or siRNA led to aggressive cancer cell growth including increased migration and Matrigel invasion. The in vitro cell growth phenotypes were reversed with re-expression of gigaxonin. Suppression of cell growth correlated with reduced Snail and increased e-cadherin expression. Mouse tail vein injection studies showed increased lung metastasis of cells with low gigaxonin expression and reduced metastasis with reexpression of gigaxonin. We have found an association between C allele expression and RNA instability and absence of multimeric protein formation. From our results, we conclude that gigaxonin expression is associated with suppression of epithelial\\u2013mesenchymal transition through inhibition of Snail. Significance: Our results suggest that GAN gene exon 8 SNP T allele expression correlates with higher gigaxonin expression and suppression of aggressive cancer cell growth. There is downregulation of Snail and upregulation of e-cadherin through NF\\u03baB ubiquitination. We hypothesize that exon 8 T allele and gigaxonin expression could serve as diagnostic markers of suppression of aggressive growth of head and neck cancer.\"}, {\"paperId\": \"056952fe5c1381cba0b4156167a2ea47f0815ba3\", \"externalIds\": {\"MAG\": \"3109100421\", \"DOI\": \"10.1101/2020.12.03.20242875\", \"CorpusId\": 227266250}, \"title\": \"ENDOTHELIAL CELL-DERIVED EXTRACELLULAR VESICLES ELICIT NEUTROPHIL DEPLOYMENT FROM THE SPLEEN FOLLOWING ACUTE MYOCARDIAL INFARCTION\", \"venue\": \"medRxiv\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/cardiovascres/article-pdf/119/1/236/49554585/cvac012.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.12.03.20242875?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.12.03.20242875, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8369295\", \"name\": \"N. Akbar\"}, {\"authorId\": \"46591167\", \"name\": \"A. Braithwaite\"}, {\"authorId\": \"8879893\", \"name\": \"Emma M. Corr\"}, {\"authorId\": \"6617453\", \"name\": \"G. Koelwyn\"}, {\"authorId\": \"116292750\", \"name\": \"Coen van Solingen\"}, {\"authorId\": \"3741444\", \"name\": \"C. Cochain\"}, {\"authorId\": \"48468275\", \"name\": \"A. Saliba\"}, {\"authorId\": \"33015711\", \"name\": \"Alastair L. Corbin\"}, {\"authorId\": \"3974471\", \"name\": \"D. Pezzolla\"}, {\"authorId\": \"49642980\", \"name\": \"L. Edgar\"}, {\"authorId\": \"1404109026\", \"name\": \"M. Gunadasa-Rohling\"}, {\"authorId\": \"1769597884\", \"name\": \"Abhirup Banerjee\"}, {\"authorId\": \"119562222\", \"name\": \"Daniel Paget\"}, {\"authorId\": \"2155568703\", \"name\": \"Charlotte Lee\"}, {\"authorId\": \"1769466602\", \"name\": \"E. Hogg\"}, {\"authorId\": \"2153838065\", \"name\": \"Adam Costin\"}, {\"authorId\": \"2035809712\", \"name\": \"R. Dhaliwal\"}, {\"authorId\": \"2118696259\", \"name\": \"Errin Johnson\"}, {\"authorId\": \"4232625\", \"name\": \"Thomas Krausgruber\"}, {\"authorId\": \"6298957\", \"name\": \"Joey Riepsaame\"}, {\"authorId\": \"39890580\", \"name\": \"G. Melling\"}, {\"authorId\": \"34870110\", \"name\": \"M. Shanmuganathan\"}, {\"authorId\": \"2242796902\", \"name\": \"Oxford Acute Myocardial Infarction Study\"}, {\"authorId\": \"2558577\", \"name\": \"C. Bock\"}, {\"authorId\": \"152604764\", \"name\": \"David Carter\"}, {\"authorId\": \"31438103\", \"name\": \"K. Channon\"}, {\"authorId\": \"1893483\", \"name\": \"P. Riley\"}, {\"authorId\": \"4577956\", \"name\": \"I. Udalova\"}, {\"authorId\": \"2254097501\", \"name\": \"K. Moore\"}, {\"authorId\": \"1742285\", \"name\": \"D. Anthony\"}, {\"authorId\": \"2103929915\", \"name\": \"R. Choudhury\"}], \"abstract\": \"Acute myocardial infarction rapidly increases blood neutrophils (<2 hours). Release of neutrophils from bone marrow, in response to chemokine elevation, has been considered their source, but chemokine levels peak up to 24 hours after injury, and after neutrophil elevation. This suggests that additional non chemokine-dependent processes may be involved. Endothelial cell (EC) activation promotes the rapid (<30 minutes) release of extracellular vesicles (EVs), which are enriched in vascular cell adhesion molecule-1 (VCAM-1) and miRNA-126, and are thus a potential mechanism for communicating with remote tissues. Here, we show that injury to the myocardium rapidly mobilises neutrophils from the spleen to peripheral blood and induces their transcriptional activation prior to their arrival at injured tissue. Ischemic myocardium leads to the generation and release of EC-derived-EVs bearing VCAM-1. EC-EV delivery to the spleen alters inflammatory gene and chemokine protein expression, and mobilises neutrophils to peripheral blood. Using CRISPR/Cas9 genome editing we generated VCAM-1-deficient EV and showed that its deletion removed the ability of EC-EV to provoke the mobilisation of neutrophils. Furthermore, inhibition of miRNA-126 in vivo reduced myocardial infarction size in a mouse model. Our findings show a novel mechanism for the rapid mobilisation of neutrophils to peripheral blood from a splenic reserve, independent of classical chemokine signalling, and establish a proof of concept for functional manipulation of EV-communications through genetic alteration of parent cells.\"}, {\"paperId\": \"056bb94266927887511faf7e696b6e29ec36dd9c\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-2716-7_8\", \"CorpusId\": 253159665, \"PubMed\": \"36301475\"}, \"title\": \"A Brief Review of Plant Cell Transfection, Gene Transcript Expression, and Genotypic Integration for Enhancing Compound Production.\", \"venue\": \"Methods in molecular biology\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-2716-7_8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-2716-7_8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46320142\", \"name\": \"Munish Sharma\"}, {\"authorId\": \"35079750\", \"name\": \"Sakshi Bhushan\"}, {\"authorId\": null, \"name\": \"Deepak Sharma\"}, {\"authorId\": \"35329558\", \"name\": \"S. Kaul\"}, {\"authorId\": \"1790794\", \"name\": \"M. Dhar\"}], \"abstract\": null}, {\"paperId\": \"056e17ce57963d391a7279b3eee846f052dde914\", \"externalIds\": {\"MAG\": \"3028791969\", \"DOI\": \"10.1093/cdn/nzaa058_027\", \"CorpusId\": 219752723}, \"title\": \"The Zebrafish (Danio Rerio) as a Novel Model to Study Folate-mthfr Interactions During Embryonic Development and Effect(s) on Long-Term Health\", \"venue\": \"Current Developments in Nutrition\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/cdn/nzaa058_027\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/cdn/nzaa058_027?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/cdn/nzaa058_027, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5940657\", \"name\": \"E. Pannia\"}, {\"authorId\": \"33977052\", \"name\": \"X. Cui\"}, {\"authorId\": \"11510330\", \"name\": \"R. Simonian\"}, {\"authorId\": \"30368019\", \"name\": \"Rola Hammoud\"}, {\"authorId\": \"39987165\", \"name\": \"P. Ashcraft\"}, {\"authorId\": \"6004311\", \"name\": \"Brandi L. Wasek\"}, {\"authorId\": \"3545313\", \"name\": \"T. Bottiglieri\"}, {\"authorId\": \"7612724\", \"name\": \"R. Kubant\"}, {\"authorId\": \"1765436\", \"name\": \"R. Noche\"}, {\"authorId\": \"145522806\", \"name\": \"G. Anderson\"}], \"abstract\": \"\\n \\n \\n Methylenetetrahydrofolate reductase (MTHFR) catalyzes the synthesis of the bioactive folate form, 5-methyltetrahydrofolate (5MTHF). Common polymorphisms in MTHFR limits the availability of 5MTHF and high intakes of folic acid (FA, synthetic form) may exacerbate these effects. 5MTHF is an alternative supplement to FA, but the interaction of folate form and MTHFR genotype and role in programming metabolic health has not been determined. The zebrafish (Danio rerio) is a proven model system in nutrient and drug discovery studies. The objectives of this study were to: 1) develop a mthfr zebrafish mutant model using CRISPR-Cas9 technology; and 2) identify in zebrafish the relationship between folate form (FA vs 5MTHF) and mthfr genotype on early-life development and metabolic regulation.\\n \\n \\n \\n To assay the function of mthfr in vivo, we used a rapid transient knock-out approach reported to recapitulate germline zebrafish loss-of-function phenotypes. Embryos were co-injected with Cas9 protein and a set of 4 guide RNAs (4gRNA) or Cas9 protein alone (control). Zero to 5 days post-fertilization (dpf), embryos were raised in standard conditions then fed a high cholesterol diet (HCD) up to 15 dpf with a fluorescent cholesteryl BODIPY-C12. The HCD was used to induce obesity as previously reported. Global DNA methylation (5-mC%) was measured at 5 dpf and whole-body and hepatic lipid accumulation and live imaging analyses performed at 15 dpf.\\n \\n \\n \\n Compared to control, 4gRNA mthfr zebrafish on an HCD had enlarged liver, greater accumulation of hepatic and whole body lipids and altered lipid transport. They also had 80% lower mthfr mRNA than control zebrafish. Global methylation was \\u223c15% higher (P\\u00a0=\\u00a00.06) in 4gRNA zebrafish suggesting a compensatory dependency on an alternative methyl donor pathway during embryonic development. We are now screening germline mutant carriers and assessing folate and methylation metabolites and the interaction of folate form and genotype.\\n \\n \\n \\n The zebrafish mthfr mutant will be a valuable model to examine the mechanisms underlining mthfr-related pathologies and provide a high-throughput in vivo system to ascertain the role of different folate forms on embryonic development and long-term health.\\n \\n \\n \\n CIHR-INMD; EP supported by NSERC-CGS D.\\n\"}, {\"paperId\": \"056f05215aa691bf08bcd58dedb0c271ab22efb3\", \"externalIds\": {\"DOI\": \"10.1002/ajmg.a.61470\", \"CorpusId\": 210333809, \"PubMed\": \"31943708\"}, \"title\": \"Computational Approach can Increase the Power of Human Genetic Analysis\", \"venue\": \"American Journal of Medical Genetics. Part A\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/ajmg.a.61470?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/ajmg.a.61470, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"147724274\", \"name\": \"Natalia\"}, {\"authorId\": \"1931364478\", \"name\": \"Gomez-Ospina\"}], \"abstract\": \"rst to show symptomatic correction of a murine model of lysosomal storage diseases with human genome-edited HSPCs. It provides specifi c evidence of safety and effi cacy to support the optimization and development of this strategy into a clinical protocol that will treat patients with MPS I, and provide a platform approach to potentially treat other lysosomal storage disorders. \\u201cTo establish such therapy, we fi rst developed a protocol to genetically modify human hematopoietic stem cells to make high levels of IDUA,\\u201d says study author Natalia Gomez-Ospina, MD, PhD, Taube Pediatric Neurodegenerative Disease Scholar and Assistant Professor in the Department of Pediatrics, Division of Medical Genetics, and Division of Stem Cell and Regenerative Medicine, at Stanford University in Palo Alto, California. \\u201cWe used CRISPR/Cas9, a tool to precisely edit human DNA, but instead of changing the IDUA gene, we inserted the protein in a repurposable place in the genome known as a safe harbor locus,\\u201d Dr. Gomez-Ospina explains. For lysosomal storage diseases like MPS I, the use of the safe harbor appears to have several advantages over genetic correction of the affected locus. One is that it enhances potency, since it allows for supra-endogenous expression. It also circumvents design for specific mutations in a gene. With safe harbor, coding sequences can be engineered with enhanced therapeutic properties such as ability to cross the blood\\u2013brain barrier. \\u201c[Safe harbor] is preferable because it circumvents design for specifi c mutations for each patient and it is more versatile and easier to adapt to other diseases, particularly other lysosomal storage disorders,\\u201d says Dr. Gomez-Ospina. \\u201cWe also were able to show that after modifi cation the cells remained \\u2018stem cells,\\u2019 as they were able to divide for a long time and gave rise to all the types of cells in the blood.\\u201d \\u201cMost importantly, we demonstrated that the modifi ed human cells were capable of correcting biochemical, bone, and neurological symptoms in a mouse with MPS I,\\u201d she adds. These data provide support for further development of this approach, as a potential treatment of the visceral, skeletal, and neurological manifestations in MPS-I.\"}, {\"paperId\": \"05705a5542febc395e5965e4112e099a26681099\", \"externalIds\": {\"MAG\": \"3081803440\", \"DOI\": \"10.20944/preprints202008.0619.v1\", \"CorpusId\": 225199193}, \"title\": \"A Course-Based Undergraduate Research Experience for High-Throughput Reverse Genetic Studies in Arabidopsis Thaliana with CRISPR-Cas9\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.preprints.org/manuscript/202008.0619/v1/download\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.20944/preprints202008.0619.v1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.20944/preprints202008.0619.v1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2004288455\", \"name\": \"Alison M. Mills\"}, {\"authorId\": \"2004871888\", \"name\": \"V. Jagannatha\"}, {\"authorId\": \"50061163\", \"name\": \"A. Cortez\"}, {\"authorId\": \"2061537633\", \"name\": \"Michael A Guzm\\u00e1n\"}, {\"authorId\": \"31855204\", \"name\": \"J. Burnette\"}, {\"authorId\": \"4240079\", \"name\": \"Matthew A. Collin\"}, {\"authorId\": \"1412523193\", \"name\": \"Berenise Lopez-Lopez\"}, {\"authorId\": \"40459577\", \"name\": \"S. Wessler\"}, {\"authorId\": \"7447389\", \"name\": \"J. V. Norman\"}, {\"authorId\": \"145364824\", \"name\": \"David C. Nelson\"}, {\"authorId\": \"4832260\", \"name\": \"Carolyn G. Rasmussen\"}], \"abstract\": \"Gene editing tools such as CRISPR-Cas9 have created unprecedented opportunities for genetic studies in plants and animals. We designed a course-based undergraduate research experience (CURE) to train introductory biology students in the concepts and implementation of gene editing technology as well as develop their soft skills in data management and scientific communication. We present two versions of the course that can be implemented with twice-weekly meetings over a five-week period. In the remote-learning version, students perform homology searches, design guide RNAs and primers, and learn the principles of molecular cloning. This version is appropriate when access to laboratory equipment or in-person instruction is limited, such as closures that have occurred in response to the Covid-19 pandemic. In the in-person version, students design guide RNAs, clone CRISPR-Cas9 constructs, and perform genetic transformation of the model plant Arabidopsis thaliana. The highly parallel nature of the CURE makes it possible to target dozens to hundreds of genes, depending on the number of course sections available. Applying this approach in a sensitized mutant background enables focused reverse genetic screens for genetic suppressors or enhancers. The course can be readily adapted to other organisms or projects that employ gene editing.\"}, {\"paperId\": \"0570bcd3e722908bc82350415e0915f62ab21ee5\", \"externalIds\": {\"PubMedCentral\": \"10290981\", \"DOI\": \"10.1038/s41598-023-37138-5\", \"CorpusId\": 259250784, \"PubMed\": \"37357221\"}, \"title\": \"A novel CRISPR/Cas9-based iduronate-2-sulfatase (IDS) knockout human neuronal cell line reveals earliest pathological changes\", \"venue\": \"Scientific Reports\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-023-37138-5.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10290981, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2048665405\", \"name\": \"Lorenzo Badenetti\"}, {\"authorId\": \"1454018492\", \"name\": \"Rosa Manzoli\"}, {\"authorId\": \"37692639\", \"name\": \"M. Trevisan\"}, {\"authorId\": \"1405470361\", \"name\": \"F. D\\u2019Avanzo\"}, {\"authorId\": \"5265795\", \"name\": \"R. Tomanin\"}, {\"authorId\": \"144301584\", \"name\": \"E. Moro\"}], \"abstract\": \"Multiple complex intracellular cascades contributing to Hunter syndrome (mucopolysaccharidosis type II) pathogenesis have been recognized and documented in the past years. However, the hierarchy of early cellular abnormalities leading to irreversible neuronal damage is far from being completely understood. To tackle this issue, we have generated two novel iduronate-2-sulfatase (IDS) loss of function human neuronal cell lines by means of genome editing. We show that both neuronal cell lines exhibit no enzymatic activity and increased GAG storage despite a completely different genotype. At a cellular level, they display reduced differentiation, significantly decreased LAMP1 and RAB7 protein levels, impaired lysosomal acidification and increased lipid storage. Moreover, one of the two clones is characterized by a marked decrease of the autophagic marker p62, while none of the two mutants exhibit marked oxidative stress and mitochondrial morphological changes. Based on our preliminary findings, we hypothesize that neuronal differentiation might be significantly affected by IDS functional impairment.\"}, {\"paperId\": \"05733f4d19899503ad52f3b057600670b428447c\", \"externalIds\": {\"DOI\": \"10.4049/jimmunol.210.supp.149.03\", \"CorpusId\": 260834885}, \"title\": \"Androgen Receptor regulates Ptpn22.\", \"venue\": \"Journal of Immunology\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.aai.org/jimmunol/article-pdf/210/1_Supplement/149.03/1632562/149_03.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4049/jimmunol.210.supp.149.03?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4049/jimmunol.210.supp.149.03, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2230156314\", \"name\": \"Jean Lee\"}, {\"authorId\": \"2319435270\", \"name\": \"Leonid A. Yurkovetskiy\"}, {\"authorId\": \"2228920843\", \"name\": \"Laura Frommer\"}, {\"authorId\": \"2141643295\", \"name\": \"Zoe Strong\"}, {\"authorId\": \"144552952\", \"name\": \"A. Chang\"}, {\"authorId\": \"144166942\", \"name\": \"Aly A. Khan\"}, {\"authorId\": \"2205809142\", \"name\": \"G. Kahaly\"}, {\"authorId\": \"4181458\", \"name\": \"A. Chervonsky\"}], \"abstract\": \"\\n The need to rear the offspring necessitated the evolution of female\\u2019s immune system to mount stronger responses than males. One consequence of it is that major autoimmune diseases manifest in a sex biased manner with a predominance in females. However, mechanisms underlying the bias have not been clearly defined. We investigated the molecular mechanisms by which male sex hormones (androgens) regulate \\u03b1\\u03b2 T cell function in sex biased autoimmunity. We identified Ptpn22, a gene encoding a lymphoid-specific phosphatase that negatively regulates proximal TCR signaling events, as a direct target of a transcription factor Androgen Receptor (AR) in T cells. In T cells isolated from sham-operated or castrated mice, transcription of Ptpn22 correlated with the presence of androgens. Furthermore, stimulation of Jurkat T cells with AR agonist resulted in induction of Ptpn22 transcription only in the presence of AR. Deletion of Ptpn22 in the B6.NZM mouse model of Systemic Lupus Erythematosus (SLE) led to exacerbation of autoimmunity accompanied by the loss of sexual dimorphism. We identified an androgen response element (ARE) in the 5\\u2032 UTR of Ptpn22 and found that its CRISPR/Cas9-mediated mutation enhanced both in vitro and in vivo the autoreactivity of T cells in NOD/ShiLtJ mouse model of Type I Diabetes (T1D). In humans, PTPN22 R620W mutation associated with several autoimmune disorders inversely correlated with the sexual dimorphism of autoimmunity. Thus, the \\u2018wild-type\\u2019 common allele of PTPN22 is likely to be involved in sex bias in autoimmune conditions.\\n NIH grant R01 AI 127411\"}, {\"paperId\": \"05739aef4e4dd159b107b26a8a48039f92fb10fb\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2022-1535\", \"CorpusId\": 249720973}, \"title\": \"Abstract 1535: Novel lncRNA ENSG00000254887 is a key factor for MYC-driven cell proliferation\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2022-1535?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2022-1535, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1405075972\", \"name\": \"Daniel Garc\\u00eda-Caballero\"}, {\"authorId\": \"33479600\", \"name\": \"J. Hart\"}, {\"authorId\": \"2062714551\", \"name\": \"Peter K. Vogt\"}], \"abstract\": \"\\n Long non-coding RNAs (lncRNAs) are widely expressed, and many of them are involved in gene regulation. In a CRISPRi study, we looked for lncRNAs required for MYC-driven proliferation in human lymphoid cells and found a novel lncRNA, ENSG00000254887, among the top candidates. In the genome, ENSG00000254887 is head-to-head with a coding gene, POU2F2. To our knowledge, ENSG00000254887 has not been described in the literature yet. We aim to characterize the importance of ENSG00000254887 in cancer development and its mechanisms of action. We performed a ChIP analysis to confirm the direct interaction of MYC with ENSG00000254887 in Ramos cells, a Burkitt\\u2019s lymphoma cell line. To knock down the expression, we generated a library of single guide RNAs (sgRNAs) covering the whole length of ENSG00000254887. We transduced Cas9-expressing Ramos cells with this library and cultured them for 14 days. We then measured the differential depletion of guides using next generation sequencing. To validate these results, we performed CRISPR growth competition assays with individual GFP-expressing sgRNA constructs, and the cell growth was measured by flow cytometry. We corroborated the importance of ENSG00000254887-regulated expression by two additional approaches: downregulation by small-hairpin RNA (shRNA) and upregulation by expression of an ectopic copy of the gene. We have been able to retrieve the genomic sequence of ENSG00000254887 using an anti-MYC antibody, thus confirming the presence of binding sites for this transcription factor. Using CRISPR, we have mapped several sites along the ENSG00000254887 sequence where Cas9-introduced changes lead to loss of function and reduce the ability of the cells to proliferate. We selected three of the most efficient sgRNAs used for CRISPR for further analysis and observed that they induced a reduction in the expression of both ENSG00000254887 and the nearby coding gene, POU2F2. This significant result was validated using shRNA targeting the sequence of the lncRNA. On the contrary, the overexpression of ENSG00000254887 from an inducible ectopic copy has no effect on the expression of POU2F2. In conclusion, the expression of ENSG00000254887 is critical for MYC-driven cell proliferation and can be altered through Cas9-introduced changes. A downregulation of this lncRNA is always accompanied by a reduction in the expression of the nearby coding gene, POU2F2. The absence of any effect on POU2F2 when we overexpress ENSG00000254887 from an ectopic copy indicates that this lncRNA might be acting in cis. However, further research is needed to explain this fact and establish the molecular mechanisms. Acknowledgments: This work was supported by the National Cancer Institute of the National Institutes of Health under award R35 CA197582 (PKV).\\n Citation Format: Daniel Garc\\u00eda-Caballero, Jonathan R. Hart, Peter K. Vogt. Novel lncRNA ENSG00000254887 is a key factor for MYC-driven cell proliferation [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2022; 2022 Apr 8-13. Philadelphia (PA): AACR; Cancer Res 2022;82(12_Suppl):Abstract nr 1535.\"}, {\"paperId\": \"0573e371936071b9d5eaba4264349a4d8fc00ace\", \"externalIds\": {\"MAG\": \"3081168426\", \"PubMedCentral\": \"7570347\", \"DOI\": \"10.3390/plants9091090\", \"CorpusId\": 221358288, \"PubMed\": \"32854250\"}, \"title\": \"Nicking Endonuclease-Mediated Vector Construction Strategies for Plant Gene Functional Research\", \"venue\": \"Plants\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2223-7747/9/9/1090/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7570347, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2055361693\", \"name\": \"Qi Gong\"}, {\"authorId\": \"2152594523\", \"name\": \"Bin Wang\"}, {\"authorId\": \"2157684465\", \"name\": \"Xubiao Lu\"}, {\"authorId\": \"40504883\", \"name\": \"Jiantao Tan\"}, {\"authorId\": \"150348516\", \"name\": \"Yuke Hou\"}, {\"authorId\": \"1736700352\", \"name\": \"Taoli Liu\"}, {\"authorId\": \"2108923597\", \"name\": \"Yaoguang Liu\"}, {\"authorId\": \"5078269\", \"name\": \"Qinlong Zhu\"}], \"abstract\": \"Plant genetic engineering vectors, such as RNA interference (RNAi) and CRISPR/Cas9 vectors, are important tools for plant functional genomics. Efficient construction of these functional vectors can facilitate the study of gene function. Although some methods for vector construction have been reported, their operations are still complicated and costly. Here, we describe a simpler and low-cost vector construction method by nicking endonucleases-mediated DNA assembly (NEMDA), which uses nicking endonucleases to generate single-strand overhanging complementary ends for rapid assembly of DNA fragments into plasmids. Using this approach, we rapidly completed the construction of four RNAi vectors and a CRISPR/Cas9 knockout vector with five single-guide RNA (sgRNA)-expression cassettes for multiplex genome editing, and successfully achieved the goal of decreasing the expression of the target genes and knocking out the target genes at the same time in rice. These results indicate the great potential of NEMDA in assembling DNA fragments and constructing plasmids for molecular biology and functional genomics.\"}, {\"paperId\": \"05765882db8c0362e5489e201596b29cbf162a3f\", \"externalIds\": {\"DOI\": \"10.1101/2020.12.22.424012\", \"CorpusId\": 229935402}, \"title\": \"Fam72a controls the balance between error-prone and error-free DNA repair during antibody diversification\", \"venue\": \"bioRxiv\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/12/23/2020.12.22.424012.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.12.22.424012?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.12.22.424012, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144639254\", \"name\": \"M. Rogier\"}, {\"authorId\": \"50692482\", \"name\": \"Jacques Moritz\"}, {\"authorId\": \"2237758\", \"name\": \"I. Robert\"}, {\"authorId\": \"5758370\", \"name\": \"C. Lescale\"}, {\"authorId\": \"4606705\", \"name\": \"Vincent Heyer\"}, {\"authorId\": \"1401685679\", \"name\": \"Anne-Sophie Thomas-Claudepierre\"}, {\"authorId\": \"2043274033\", \"name\": \"Arthur Abello\"}, {\"authorId\": \"46650438\", \"name\": \"L. Deriano\"}, {\"authorId\": \"1398008560\", \"name\": \"B. Reina-San-Martin\"}], \"abstract\": \"Efficient humoral responses rely on DNA damage, mutagenesis and error-prone DNA repair. B cell receptor diversification through somatic hypermutation (SHM) and class switch recombination (CSR) are initiated by cytidine deamination in DNA mediated by activation induced cytidine deaminase (AID)1 and by the subsequent excision of the resulting uracils by Uracil DNA glycosylase (UNG) and by mismatch repair (MMR) proteins2\\u20134. Although uracils arising in DNA are faithfully repaired2\\u20137, it is not known how these pathways are co-opted to generate mutations and double stranded DNA breaks (DSBs) in the context of SHM and CSR2,4,8. Here we have performed a genome-wide CRISPR/Cas9 knockout screen for genes involved in CSR. The screen identified FAM72A, a protein that interacts with the nuclear isoform of UNG (UNG2)9 and that is overexpressed in several cancers9. We show that the FAM72A-UNG2 interaction controls the protein levels of UNG2 and that CSR is defective in Fam72a\\u2212/\\u2212 B cells due to the specific upregulation of UNG2. Moreover, we show that in Fam72a\\u2212/\\u2212 B cells SHM is reduced by 5-fold and that upregulation of UNG2 results in a skewed mutation pattern. Our results are consistent with a model in which FAM72A interacts with UNG2 to control its physiological level by triggering its degradation. Consequently, deficiency in Fam72a leads to supraphysiological levels of UNG2 and enhanced uracil excision, shifting the balance from error-prone to error-free DNA repair. Our findings have potential implications for tumorigenesis, as Fam72a overexpression would lead to reduced UNG2 levels, shifting the balance toward mutagenic DNA repair and rendering cells more prone to acquire mutations.\"}, {\"paperId\": \"057b4fd48adc8033bfe3a9040d05b98436b47422\", \"externalIds\": {\"PubMedCentral\": \"8346083\", \"DOI\": \"10.3390/ijms22157817\", \"CorpusId\": 236944841, \"PubMed\": \"34360584\"}, \"title\": \"TSA Promotes CRISPR/Cas9 Editing Efficiency and Expression of Cell Division-Related Genes from Plant Protoplasts\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2021, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/22/15/7817/pdf?version=1626947078\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8346083, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2118850531\", \"name\": \"Seung Hee Choi\"}, {\"authorId\": \"11206820\", \"name\": \"Myounghui Lee\"}, {\"authorId\": \"2034242629\", \"name\": \"Da Mon Jin\"}, {\"authorId\": \"2124559404\", \"name\": \"Su Ji Ju\"}, {\"authorId\": \"4085968\", \"name\": \"W. Ahn\"}, {\"authorId\": \"3640150\", \"name\": \"E. Jie\"}, {\"authorId\": \"2277980670\", \"name\": \"Ji Min Lee\"}, {\"authorId\": \"2296103114\", \"name\": \"Jiyoung Lee\"}, {\"authorId\": \"30512253\", \"name\": \"Cha Young Kim\"}, {\"authorId\": \"121333867\", \"name\": \"Sukweon Kim\"}], \"abstract\": \"Trichostatin A (TSA) is a representative histone deacetylase (HDAC) inhibitor that modulates epigenetic gene expression by regulation of chromatin remodeling in cells. To investigate whether the regulation of chromatin de-condensation by TSA can affect the increase in the efficiency of Cas9 protein-gRNA ribonucleoprotein (RNP) indel formation from plant cells, genome editing efficiency using lettuce and tobacco protoplasts was examined after several concentrations of TSA treatments (0, 0.1, 1 and 10 \\u03bcM). RNP delivery from protoplasts was conducted by conventional polyethylene glycol (PEG) transfection protocols. Interestingly, the indel frequency of the SOC1 gene from TSA treatments was about 3.3 to 3.8 times higher than DMSO treatment in lettuce protoplasts. The TSA-mediated increase of indel frequency of the SOC1 gene in lettuce protoplasts occurred in a concentration-dependent manner, although there was not much difference. Similar to lettuce, TSA also increased the indel frequency by 1.5 to 1.8 times in a concentration-dependent manner during PDS genome editing using tobacco protoplasts. The MNase test clearly showed that chromatin accessibility with TSA treatments was higher than that of DMSO treatment. Additionally, TSA treatment significantly increased the level of histone H3 and H4 acetylation from lettuce protoplasts. The qRT-PCR analysis showed that expression of cell division-related genes (LsCYCD1-1, LsCYCD3-2, LsCYCD6-1, and LsCYCU4-1) was increased by TSA treatment. These findings could contribute to increasing the efficiency of CRISPR/Cas9-mediated genome editing. Furthermore, this could be applied for the development of useful genome-edited crops using the CRISPR/Cas9 system with plant protoplasts.\"}, {\"paperId\": \"057e24934d660c55ee8b25e49c6790731e7778ac\", \"externalIds\": {\"MAG\": \"3023711462\", \"DOI\": \"10.1002/anie.202005644\", \"CorpusId\": 218562718, \"PubMed\": \"32385892\"}, \"title\": \"Spatiotemporal Delivery of CRISPR/Cas9 Genome Editing Machinery Using Stimuli-Responsive Vehicles.\", \"venue\": \"Angewandte Chemie\", \"year\": 2020, \"citationCount\": 61, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/anie.202005644?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/anie.202005644, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"122905666\", \"name\": \"Weiqi Cai\"}, {\"authorId\": \"1684958618\", \"name\": \"Tianli Luo\"}, {\"authorId\": \"144210828\", \"name\": \"L. Mao\"}, {\"authorId\": \"48380467\", \"name\": \"Ming Wang\"}], \"abstract\": \"Recent innovations in genome editing have enabled the precise manipulation of the genetic information of mammalians, and benefitted the development of next-generation gene therapy. Despite these advances, several barriers to the clinical translation of genome editing remain, including the intracellular delivery of genome editing machinery, and the risk of off-target editing effect. Here, we review the recent advance of spatiotemporal delivery of CRISPR/Cas9 genome editing machinery, which is composed of programmable Cas9 nuclease and a single-guide RNA (sgRNA) using stimuli-responsive nanoparticles. We discuss the specific chemistries that have been used for controlled Cas9/sgRNA delivery and intracellular release in the presence of endogenous or external signals. These methodologies can leverage biological signals found locally within disease cells, or exogenous signals administrated with spatiotemporal control, through which an improved genome editing could be achieved. We also discuss the future in exploiting these approaches for fundamental biomedical applications and therapeutic genome editing.\"}, {\"paperId\": \"057f3faf93d9b4133bbdbe99ecbf689f81d48221\", \"externalIds\": {\"DOI\": \"10.1007/s12038-020-00081-y\", \"CorpusId\": 255491246}, \"title\": \"Genetic engineering of crops for insect resistance: An overview\", \"venue\": \"Journal of Biosciences\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12038-020-00081-y.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12038-020-00081-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12038-020-00081-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"114464237\", \"name\": \"Ashwini Talakayala\"}, {\"authorId\": \"1491148383\", \"name\": \"Sumalatha Katta\"}, {\"authorId\": \"5057678\", \"name\": \"Mallikarjuna Garladinne\"}], \"abstract\": null}, {\"paperId\": \"05827ceb7879333c02f4458a94cbac6ab813cbf9\", \"externalIds\": {\"MAG\": \"3116463264\", \"DOI\": \"10.1161/CIRC.142.SUPPL_3.13381\", \"CorpusId\": 236790351}, \"title\": \"Abstract 13381: hiPSC of CIITA and B2M KO Derived Cardiac Cells Engineered 3D Spheroid Transplantation Induce Tachycardia in Myocardial Infarction in Swine\", \"venue\": \"Circulation\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/CIRC.142.SUPPL_3.13381?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/CIRC.142.SUPPL_3.13381, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4630914\", \"name\": \"S. Mattapally\"}, {\"authorId\": \"2052992573\", \"name\": \"Jianyi(Jay) Zhang\"}], \"abstract\": \"\\n Introduction:\\n Human induced pluripotent stem cells (hiPSCs) are among one the most significant discoveries in life sciences. As a promising \\u2014biological drug for cell therapy, multiple lineages of iPSC-derived cardiac cells have been administered in human clinical trials in multiple important organ systems. The potential immunogenicity of hiPSC-derived cardiac cells continues to be one of the concerns in large animal models.\\n \\n \\n Methods:\\n In the present study, WT hiPSCs were generated by transfecting male human cardiac fibroblasts with Sendai viruses coding for OCT4, SOX2, KLF4, and C-MYC.Then hiPSCs carrying knockout mutations for both HLA Class I and Class II (HLAI/II-KOhiPSC) were generated via CRISPR/Cas9 gene-editing technology (Mattapally et al, 2018). hiPSCs were differentiated into cardiomyocytes (CM) endothelial cells (ECs) and spheroid cultured was performed as previously described (Mattapally et al, 2018). We evaluated spheroid transplantation and its potency for myocardial repair in the Swine. Programmed stimulation was used to determine the arrhythmogenic outcome.\\n \\n \\n Results:\\n To determine the engraftment efficacy of HLAI/II KO compared to WT Spheroid, a swine study was performed. After LAD ligation in swine, 800\\u03bcm spheroid was injected into the border zone of the left ventricle. After transplantation, cell engraftment was monitored by Q-PCR. At week 4, there was a significant difference between the 2 groups. Animal groups included: MI hearts treated with 500 WT Spheroid injection (MI+WT Spheroid, n=5), MI hearts treated with 500 KO Spheroid injection (n=6), MI only hearts (n=6); the fourth group of animals underwent sham surgery (Sham, n=6). Arrhythmia was studied by programmed electrical stimulations (PES) and conduction velocities measured with electrode mapping, and the engraftment rate by calculation of quantitative polymerase chain reaction measurements of expression of the human Y chromosome. Engraftment of iPSC-CMs was found in both treatment groups; however, a significantly higher engraftment rate was found in KO Spheroid. The spheroid treatment is associated with significant changes in arrhythmogenicity.\\n \\n \\n Conclusion:\\n Our study established the improved graft but associated with arrhythmogenicity.\\n\"}, {\"paperId\": \"0587a1f1d6639166632955954a29a34ab8ee3038\", \"externalIds\": {\"DOI\": \"10.15354/si.23.re833\", \"CorpusId\": 266735159}, \"title\": \"A Perspective Review of Cancer Therapy (Part I): Immunotherapy, Gene Therapy, and Nanotechnology\", \"venue\": \"Science Insights\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bonoi.org/index.php/si/article/download/1233/795\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15354/si.23.re833?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15354/si.23.re833, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277542378\", \"name\": \"Alberto Pajuelo\"}], \"abstract\": \"The application of genomic profiling approaches has propelled the advancement of precision medicine, enabling the development of personalized treatment programs that are specifically customized for each particular patient. This method considers the distinct genetic composition of each tumor, allowing for the detection of crucial driver mutations and possible weaknesses that might be targeted for therapeutic purposes. Furthermore, immunotherapy has emerged as a promising approach in cancer treatment, utilizing the potential of the immune system to identify and eradicate cancerous cells. Medical breakthroughs like CAR-T cell therapy have already demonstrated exceptional efficacy in treating hematologic malignancies. Moreover, state-of-the-art technologies such as CRISPR-Cas9 gene editing offer potential for directly altering tumor cells or augmenting the efficacy of current treatments. The future of cancer therapy is focused on developing more precise and targeted techniques to enhance patient outcomes and ultimately overcome this destructive illness. This involves continual research and cooperation among scientists, physicians, and pharmaceutical corporations on a worldwide level.\"}, {\"paperId\": \"058945981351840e28341af8421acaf870494683\", \"externalIds\": {\"PubMedCentral\": \"9914749\", \"DOI\": \"10.3390/foods12030455\", \"CorpusId\": 256186189, \"PubMed\": \"36765984\"}, \"title\": \"Targeted High-Throughput Sequencing Enables the Detection of Single Nucleotide Variations in CRISPR/Cas9 Gene-Edited Organisms\", \"venue\": \"Foods\", \"year\": 2023, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2304-8158/12/3/455/pdf?version=1674196979\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9914749, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"38980723\", \"name\": \"Marie-Alice Fraiture\"}, {\"authorId\": \"1402277556\", \"name\": \"J. D'aes\"}, {\"authorId\": \"2280258\", \"name\": \"E. Guiderdoni\"}, {\"authorId\": \"37485240\", \"name\": \"Anne-C\\u00e9cile Meunier\"}, {\"authorId\": \"2007846031\", \"name\": \"T. Delcourt\"}, {\"authorId\": \"2059374523\", \"name\": \"Stefan Hoffman\"}, {\"authorId\": \"88659067\", \"name\": \"E. Vandermassen\"}, {\"authorId\": \"50008243\", \"name\": \"S. D. De Keersmaecker\"}, {\"authorId\": \"2691763\", \"name\": \"K. Vanneste\"}, {\"authorId\": \"2976853\", \"name\": \"N. Roosens\"}], \"abstract\": \"Similar to genetically modified organisms (GMOs) produced by classical genetic engineering, gene-edited (GE) organisms and their derived food/feed products commercialized on the European Union market fall within the scope of European Union Directive 2001/18/EC. Consequently, their control in the food/feed chain by GMO enforcement laboratories is required by the competent authorities to guarantee food/feed safety and traceability (2003/1829/EC; 2003/1830/EC). However, their detection is potentially challenging at both the analytical and interpretation levels since this requires methodological approaches that can target and detect a specific single nucleotide variation (SNV) introduced into a GE organism. In this study, we propose a targeted high-throughput sequencing approach, including (i) a prior PCR-based enrichment step to amplify regions of interest, (ii) a sequencing step, and (iii) a data analysis methodology to identify SNVs of interest. To investigate if the performance of this targeted high-throughput sequencing approach is compatible with the performance criteria used in the GMO detection field, several samples containing different percentages of a GE rice line carrying a single adenosine insertion in OsMADS26 were prepared and analyzed. The SNV of interest in samples containing the GE rice line could successfully be detected, both at high and low percentages. No impact related to food processing or to the presence of other crop species was observed. The present proof-of-concept study has allowed us to deliver the first experimental-based evidence indicating that the proposed targeted high-throughput sequencing approach may constitute, in the future, a specific and sensitive tool to support the safety and traceability of the food/feed chain regarding GE plants carrying SNVs.\"}, {\"paperId\": \"058b31c16edac475058a4af9ffa56bce810fbb6b\", \"externalIds\": {\"DOI\": \"10.1016/j.ijbiomac.2023.127953\", \"CorpusId\": 265128383, \"PubMed\": \"37951433\"}, \"title\": \"A gln-tRNA-based CRISPR/Cas9 knockout system enables the functional characterization of genes in the genetically recalcitrant brassica anthracnose fungus Colletotrichum higginsianum.\", \"venue\": \"International Journal of Biological Macromolecules\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijbiomac.2023.127953?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijbiomac.2023.127953, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5917811\", \"name\": \"V. Bhadauria\"}, {\"authorId\": \"2157520517\", \"name\": \"Tongling Han\"}, {\"authorId\": \"2266237067\", \"name\": \"Guangjun Li\"}, {\"authorId\": \"2111666101\", \"name\": \"Wendi Ma\"}, {\"authorId\": \"2266337535\", \"name\": \"Manyu Zhang\"}, {\"authorId\": \"2243428063\", \"name\": \"Jun Yang\"}, {\"authorId\": \"2244590131\", \"name\": \"Wensheng Zhao\"}, {\"authorId\": \"2238537469\", \"name\": \"You-Liang Peng\"}], \"abstract\": \"Colletotrichum higginsianum causes anthracnose disease in brassicas. The availability of the C. higginsianum genome has paved the way for the genome-wide exploration of genes associated with virulence/pathogenicity. However, delimiting the biological functions of genes, let alone effectors, remains an arduous task due to the recalcitrance of C. higginsianum to genetic manipulations. Here, we report a CRISPR/Cas9-based system that can knock out genes in C. higginsianum, with a staggering 100\\u202f% homologous recombination frequency (HRF). The system comprises two vectors: pCas9-Ch_tRp-sgRNA, in which a C. higginsianum glutaminyl-tRNA drives the expression of sgRNA, and pCE-Zero-HPT carrying a donor DNA cassette containing HPT flanked by homology arms. Upon co-transformation of the C. higginsianum protoplasts, pCas9-Ch_tRp-sgRNA causes a DNA double-strand break in the targeted gene, followed by homology-directed replacement of the gene with HPT by pCE-Zero-HPT, thereby generating loss-of-function mutants. Using the system, we generated the knockout mutants of two effector candidates (ChBas3 and OBR06881) with a 100\\u202f% HRF. Interestingly, the \\u0394ChBas3 and \\u0394OBR06881 mutants did not seem to have a direct role in the C. higginsianum infection of Arabidopsis thaliana. Altogether, the CRISPR/Cas9 system developed in the study enables the targeted deletion of genes, including effectors, in C. higginsianum, thus determining their biological functions.\"}, {\"paperId\": \"058e0fd0d73b7dffd083ea1938f0d70f0c3fa83f\", \"externalIds\": {\"MAG\": \"3097144788\", \"DOI\": \"10.1183/13993003.congress-2020.4463\", \"CorpusId\": 229016727}, \"title\": \"Protein truncating mutations in ATP13A3 promote pulmonary arterial hypertension\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1183/13993003.congress-2020.4463?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1183/13993003.congress-2020.4463, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6880059\", \"name\": \"E. Legchenko\"}, {\"authorId\": \"2155594748\", \"name\": \"B. Liu\"}, {\"authorId\": \"49098119\", \"name\": \"J. West\"}, {\"authorId\": \"4745554\", \"name\": \"P. Vangheluwe\"}, {\"authorId\": \"1964924\", \"name\": \"P. Upton\"}, {\"authorId\": \"4283560\", \"name\": \"N. Morrell\"}], \"abstract\": \"Introduction: In a cohort of 1038 patients with pulmonary arterial hypertension (PAH) we identified 11 new mutations in ATP13A3. ATP13A3 is a poorly characterized ATPase, but recent studies suggest a role in polyamine (PA) transport. We sought to determine the impact of ATP13A3 deficiency on PA homeostasis in human pulmonary arterial endothelial cells (hPAECs). Further, we assessed if the introduction of a homolog of human disease-causing truncating mutation (P452Lfs) increased the susceptibility to PAH in a mouse model. Methods: ATP13A3 knockdown (KD) in hPAECs was achieved by siRNA transfection. P452Lfs mutant mice were generated via CRISPR-Cas9 (MRC Harwell). Echocardiography, invasive haemodynamic measurements, organ harvest were performed at 6 months of age. Polyamine content of the lungs and hPAECs was assessed by mass spectrometry. Results: ATP13A3 KD in hPAECs reduced intracellular PA content. mRNA expression of ornithine decarboxylase, rate-limiting enzyme of PA biosynthesis, was not altered, while its protein level was increased. ATP13A3 KD predisposed hPAECs to apoptosis, inhibited proliferation. P452Lfs mice developed PAH compared to wild type controls: exhibited shortened pulmonary artery acceleration time (12.1\\u00b10.8 vs 16.6\\u00b10.8ms), elevated right ventricular systolic pressure (30.2\\u00b10.5 vs 25.6\\u00b10.6mmHg) with no change in systemic pressures. Moreover, P452Lfs mice demonstrated right ventricular anterior wall thickening 0.65\\u00b10.05 vs 0.41\\u00b10.06mm and a decreased PA content in their lungs. Conclusions: Our initial findings provide further evidence that loss of function mutations in ATP13A3 are directly involved in causation of PAH and the mechanism involves alterations in cellular polyamine levels.\"}, {\"paperId\": \"058ef27392e53c0e211d143aa93f76fc697fe769\", \"externalIds\": {\"PubMedCentral\": \"11724282\", \"DOI\": \"10.1093/nar/gkae1164\", \"CorpusId\": 274636844, \"PubMed\": \"39657754\"}, \"title\": \"Structural basis of Cas9 DNA interrogation with a 5\\u2032 truncated sgRNA\", \"venue\": \"Nucleic Acids Research\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11724282, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2293505525\", \"name\": \"Kaitlyn A. Kiernan\"}, {\"authorId\": \"2248321350\", \"name\": \"Jieun Kwon\"}, {\"authorId\": \"2321925421\", \"name\": \"Bradley J Merrill\"}, {\"authorId\": \"2247487949\", \"name\": \"Miljan Simonovi\\u0107\"}], \"abstract\": \"Abstract The efficiency and accuracy of CRISPR-Cas9 targeting varies considerably across genomic targets and remains a persistent issue for using this system in cells. Studies have shown that the use of 5\\u2032 truncated single guide RNAs (sgRNAs) can reduce the rate of unwanted off-target recognition while still maintaining on-target specificity. However, it is not well-understood how reducing target complementarity enhances specificity or how truncation past 15 nucleotides (nts) prevents full Cas9 activation without compromising on-target binding. Here, we use biochemistry and cryogenic electron microscopy to investigate Cas9 structure and activity when bound to a 14-nt sgRNA. Our structures reveal that the shortened path of the displaced non-target strand (NTS) sterically occludes docking of the HNH L1 linker and prevents proper positioning of the nuclease domains. We show that cleavage inhibition can be alleviated by either artificially melting the protospacer adjacent motif (PAM)-distal duplex or providing a supercoiled substrate. Even though Cas9 forms a stable complex with its target, we find that plasmid cleavage is \\u223c1000-fold slower with a 14-nt sgRNA than with a full-length 20-nt sgRNA. Our results provide a structural basis for Cas9 target binding with 5\\u2032 truncated sgRNAs and underline the importance of PAM-distal NTS availability in promoting Cas9 activation.\"}, {\"paperId\": \"0591c750dd8047230b7f591b42ec5803b2f7103c\", \"externalIds\": {\"DOI\": \"10.1016/j.ymthe.2022.09.008\", \"CorpusId\": 252317672, \"PubMed\": \"36114670\"}, \"title\": \"Targeted genomic translocations and inversions generated using a paired prime editing strategy.\", \"venue\": \"Molecular Therapy\", \"year\": 2022, \"citationCount\": 53, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymthe.2022.09.008?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymthe.2022.09.008, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49544737\", \"name\": \"Jiyeon Kweon\"}, {\"authorId\": \"5821928\", \"name\": \"H. Hwang\"}, {\"authorId\": \"2185211714\", \"name\": \"Haesun Ryu\"}, {\"authorId\": \"2054617951\", \"name\": \"An-Hee Jang\"}, {\"authorId\": \"2145154349\", \"name\": \"Daesik Kim\"}, {\"authorId\": \"3111827\", \"name\": \"Yongsub Kim\"}], \"abstract\": \"A variety of cancers have been found to have chromosomal rearrangements and the genomic abnormalities often induced expression of fusion oncogenes. To date, a pair of engineered nucleases including ZFNs, TALENs, and CRISPR-Cas9 nucleases have been used to generate chromosomal rearrangement in living cells and organisms for disease modeling. However, these methods induce unwanted indel mutations at the DNA break junctions, resulting in incomplete disease modeling. Here, we developed Prime editor nuclease-mediated translocation and inversion (PETI), a method for programmable chromosomal translocation and inversion using Prime editor 2 nuclease (PE2 nuclease) and paired pegRNA. Using PETI method, we successfully introduced DNA recombination in episomal fluorescence reporters as well as precise chromosomal translocations in human cells. We applied PETI to create cancer-associated translocations and inversions such as NPM1-ALK and EML4-ALK in human cells. Our findings show that PETI generated chromosomal translocation and inversion in a programmable manner with efficiencies comparable of Cas9. PETI methods, we believe, could be used to create disease models or for gene therapy.\"}, {\"paperId\": \"0592b27fc961b6abba9cb89450461e451d796e75\", \"externalIds\": {\"MAG\": \"3011772220\", \"DOI\": \"10.1016/j.scr.2020.101735\", \"CorpusId\": 215605349, \"PubMed\": \"32268246\"}, \"title\": \"Generation of a TLR7 heterozygous knockout line (WAe009-A-18) from human embryonic stem cells using CRISPR/Cas9.\", \"venue\": \"Stem Cell Research\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2020.101735\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2020.101735?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2020.101735, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6113462\", \"name\": \"Hyang\\u2010Hee Seo\"}, {\"authorId\": \"152498519\", \"name\": \"Hyo-Won Han\"}, {\"authorId\": \"2137589544\", \"name\": \"Jung-Hyun Kim\"}], \"abstract\": \"Toll-like receptor 7 (TLR7) is a member of the toll-like receptor (TLR) family that is essential in the innate immune system. In this study, we established a heterozygous TLR7 knockout H9 cell line using CRISPR/Cas9. TLR7 knockout H9 cells maintained their pluripotency and exhibited the ability to differentiate into the three germ layers without any karyotype abnormalities.\"}, {\"paperId\": \"0594eb76d8ecaa5f832a618c4fe1625388935276\", \"externalIds\": {\"DOI\": \"10.1002/cpz1.725\", \"CorpusId\": 257982866, \"PubMed\": \"37021953\"}, \"title\": \"CRISPR\\u2010Cas9 Genome Editing in the Moss Physcomitrium (Formerly Physcomitrella) patens\", \"venue\": \"Current Protocols\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://rss.onlinelibrary.wiley.com/doi/am-pdf/10.1002/cpz1.725\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/cpz1.725?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/cpz1.725, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4388064\", \"name\": \"Shu-Zon Wu\"}, {\"authorId\": \"89207120\", \"name\": \"Samantha E Ryken\"}, {\"authorId\": \"3357219\", \"name\": \"M. Bezanilla\"}], \"abstract\": \"Until recently, precise genome editing has been limited to a few organisms. The ability of Cas9 to generate double stranded DNA breaks at specific genomic sites has greatly expanded molecular toolkits in many organisms and cell types. Before CRISPR\\u2010Cas9 mediated genome editing, P. patens was unique among plants in its ability to integrate DNA via homologous recombination. However, selection for homologous recombination events was required to obtain edited plants, limiting the types of editing that were possible. Now with CRISPR\\u2010Cas9, molecular manipulations in P. patens have greatly expanded. This protocol describes a method to generate a variety of different genome edits. The protocol describes a streamlined method to generate the Cas9/sgRNA expression constructs, design homology templates, transform, and quickly genotype plants. \\u00a9 2023 Wiley Periodicals LLC.\"}, {\"paperId\": \"0595d0779aa070f7163da25ec15136f90a4a804e\", \"externalIds\": {\"DOI\": \"10.1186/s13578-022-00760-3\", \"CorpusId\": 256200892}, \"title\": \"Generation of immunodeficient pig with hereditary tyrosinemia type 1 and their preliminary application for humanized liver\", \"venue\": \"Cell & Bioscience\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://cellandbioscience.biomedcentral.com/track/pdf/10.1186/s13578-022-00760-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s13578-022-00760-3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s13578-022-00760-3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"26555660\", \"name\": \"Jilong Ren\"}, {\"authorId\": \"2111467754\", \"name\": \"Dawei Yu\"}, {\"authorId\": \"2152453417\", \"name\": \"Jing Wang\"}, {\"authorId\": \"47831810\", \"name\": \"Kai Xu\"}, {\"authorId\": \"2345968194\", \"name\": \"Yanan Xu\"}, {\"authorId\": \"2068169467\", \"name\": \"Renren Sun\"}, {\"authorId\": \"6996160\", \"name\": \"P. An\"}, {\"authorId\": \"2109664881\", \"name\": \"Chongyang Li\"}, {\"authorId\": \"37707500\", \"name\": \"Guihai Feng\"}, {\"authorId\": \"143602108\", \"name\": \"Ying Zhang\"}, {\"authorId\": \"6545889\", \"name\": \"Xiangpeng Dai\"}, {\"authorId\": \"5606022\", \"name\": \"Hong-Ye Zhao\"}, {\"authorId\": \"12230000\", \"name\": \"Zhengzhu Wang\"}, {\"authorId\": \"46758158\", \"name\": \"Zhiqiang Han\"}, {\"authorId\": \"2107305818\", \"name\": \"Haibo Zhu\"}, {\"authorId\": \"38923964\", \"name\": \"Yuchun Ding\"}, {\"authorId\": \"48201839\", \"name\": \"Xiaoyan You\"}, {\"authorId\": \"2151061764\", \"name\": \"Xueqing Liu\"}, {\"authorId\": \"2115660947\", \"name\": \"Meng Wu\"}, {\"authorId\": \"103598157\", \"name\": \"Ling-Yun Luo\"}, {\"authorId\": \"2118273575\", \"name\": \"Ziyi Li\"}, {\"authorId\": \"2143013956\", \"name\": \"Yong-Guang Yang\"}, {\"authorId\": \"2111373820\", \"name\": \"Zheng Hu\"}, {\"authorId\": \"48056018\", \"name\": \"Hongjiang Wei\"}, {\"authorId\": \"101687244\", \"name\": \"Liang-fang Ge\"}, {\"authorId\": \"2058831300\", \"name\": \"T. Hai\"}, {\"authorId\": \"47112845\", \"name\": \"Wei Li\"}], \"abstract\": \"Mice with humanized livers are important models to study drug toxicology testing, development of hepatitis virus treatments, and hepatocyte transplantation therapy. However, the huge difference between mouse and human in size and anatomy limited the application of humanized mice in investigating human diseases. Therefore, it is urgent to construct humanized livers in pigs to precisely investigate hepatocyte regeneration and human hepatocyte therapy. CRISPR/Cas9 system and somatic cell cloning technology were used to generate two pig models with FAH deficiency and exhibiting severe immunodeficiency (FAH/RAG1 and FAH/RAG1/IL2RG deficiency). Human primary hepatocytes were then successfully transplanted into the FG pig model and constructed two pigs with human liver. The constructed FAH/RAG1/IL2RG triple-knockout pig models were characterized by chronic liver injury and severe immunodeficiency. Importantly, the FG pigs transplanted with primary human hepatocytes produced human albumin in a time dependent manner as early as 1 week after transplantation. Furthermore, the colonization of human hepatocytes was confirmed by immunochemistry staining. We successfully generated pig models with severe immunodeficiency that could construct human liver tissues.\"}, {\"paperId\": \"059685e9baefcd67a555f4b86f905994738d1865\", \"externalIds\": {\"PubMedCentral\": \"8670479\", \"DOI\": \"10.1073/pnas.2113747118\", \"CorpusId\": 244800099, \"PubMed\": \"34853172\"}, \"title\": \"Mg2+-dependent conformational rearrangements of CRISPR-Cas12a R-loop complex are mandatory for complete double-stranded DNA cleavage\", \"venue\": \"Proceedings of the National Academy of Sciences of the United States of America\", \"year\": 2021, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1073/pnas.2113747118\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8670479, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"10005918\", \"name\": \"Heyjin Son\"}, {\"authorId\": \"2109210189\", \"name\": \"Jaeil Park\"}, {\"authorId\": \"11997622\", \"name\": \"Injoo Hwang\"}, {\"authorId\": \"2046804465\", \"name\": \"Youngri Jung\"}, {\"authorId\": \"3018762\", \"name\": \"Sangsu Bae\"}, {\"authorId\": \"2144571796\", \"name\": \"Sanghwa Lee\"}], \"abstract\": \"Significance CRISPR-Cas12a has emerged as attractive molecular scissors alternative to Cas9 owing to its unique features including fewer off-target effects, an alternative protospacer-adjacent motif sequence, pre-CRISPR RNA processing activity, and indiscriminate single-stranded DNase activity. However, despite these advantages, Cas12a has not been well utilized as recently reported base and prime editors because it does not have complete nickase variants, unlike Cas9. In this study, we provide a thorough understanding of the mechanisms that govern the generation of complete double-stranded DNA breaks by the single catalytic site of Cas12a using single-molecule fluorescence assays to improve our ability to develop a rational design for more potently engineered Cas12a including the nickase form. This would extend the range of genome editing applications of Cas12a. CRISPR-Cas12a, an RNA-guided DNA targeting endonuclease, has been widely used for genome editing and nucleic acid detection. As part of the essential processes for both of these applications, the two strands of double-stranded DNA are sequentially cleaved by a single catalytic site of Cas12a, but the mechanistic details that govern the generation of complete breaks in double-stranded DNA remain to be elucidated. Here, using single-molecule fluorescence resonance energy transfer assay, we identified two conformational intermediates that form consecutively following the initial cleavage of the nontarget strand. Specifically, these two intermediates are the result of further unwinding of the target DNA in the protospacer-adjacent motif (PAM)\\u2013distal region and the subsequent binding of the target strand to the catalytic site. Notably, the PAM-distal DNA unwound conformation was stabilized by Mg2+ ions, thereby significantly promoting the binding and cleavage of the target strand. These findings enabled us to propose a Mg2+-dependent kinetic model for the mechanism whereby Cas12a achieves cleavage of the target DNA, highlighting the presence of conformational rearrangements for the complete cleavage of the double-stranded DNA target.\"}, {\"paperId\": \"0599ae2d7525381adbd2e0cc7f85285412a72a9c\", \"externalIds\": {\"PubMedCentral\": \"9792892\", \"DOI\": \"10.1016/j.redox.2022.102576\", \"CorpusId\": 254709099, \"PubMed\": \"36535130\"}, \"title\": \"Loss of glyoxalase 2 alters the glucose metabolism in zebrafish\", \"venue\": \"Redox Biology\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.redox.2022.102576\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9792892, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"146437941\", \"name\": \"Christoph T. Tabler\"}, {\"authorId\": \"11440904\", \"name\": \"E. Lodd\"}, {\"authorId\": \"6467011\", \"name\": \"Katrin Bennewitz\"}, {\"authorId\": \"2106669728\", \"name\": \"Chiara Simone Middel\"}, {\"authorId\": \"35422710\", \"name\": \"Vanessa Erben\"}, {\"authorId\": \"40337471\", \"name\": \"Hannes Ott\"}, {\"authorId\": \"50756972\", \"name\": \"T. Poth\"}, {\"authorId\": \"145324711\", \"name\": \"T. Fleming\"}, {\"authorId\": \"47521568\", \"name\": \"Jakob Morgenstern\"}, {\"authorId\": \"3737299\", \"name\": \"I. Hausser\"}, {\"authorId\": \"1751573\", \"name\": \"C. Sticht\"}, {\"authorId\": \"3928543\", \"name\": \"Gernot Poschet\"}, {\"authorId\": \"2167370384\", \"name\": \"J. Szendroedi\"}, {\"authorId\": \"6691996\", \"name\": \"P. Nawroth\"}, {\"authorId\": \"49173462\", \"name\": \"J. Kroll\"}], \"abstract\": \"Glyoxalase 2 is the second enzyme of the glyoxalase system, catalyzing the detoxification of methylglyoxal to d-lactate via SD-Lactoylglutathione. Recent in vitro studies have suggested Glo2 as a regulator of glycolysis, but if Glo2 regulates glucose homeostasis and related organ specific functions in vivo has not yet been evaluated. Therefore, a CRISPR-Cas9 knockout of glo2 in zebrafish was created and analyzed. Consistent with its function in methylglyoxal detoxification, SD-Lactoylglutathione, but not methylglyoxal accumulated in glo2\\u2212/\\u2212 larvae, without altering the glutathione metabolism or affecting longevity. Adult glo2\\u2212/\\u2212 livers displayed a reduced hexose concentration and a reduced postprandial P70\\u2013S6 kinase activation, but upstream postprandial AKT phosphorylation remained unchanged. In contrast, glo2\\u2212/\\u2212 skeletal muscle remained metabolically intact, possibly compensating for the dysfunctional liver through increased glucose uptake and glycolytic activity. glo2\\u2212/\\u2212 zebrafish maintained euglycemia and showed no damage of the retinal vasculature, kidney, liver and skeletal muscle. In conclusion, the data identified Glo2 as a regulator of cellular energy metabolism in liver and skeletal muscle, but the redox state and reactive metabolite accumulation were not affected by the loss of Glo2.\"}, {\"paperId\": \"059b4dd15fc8025a1e380160c762c91d6e87012c\", \"externalIds\": {\"MAG\": \"3133128205\", \"DOI\": \"10.3969/J.ISSN.1006-7795.2020.06.026\", \"CorpusId\": 234425311}, \"title\": \"CRISPR/Cas9\\u57fa\\u56e0\\u7f16\\u8f91\\u6280\\u672f:\\u57fa\\u56e0\\u526a\\u5200\\u2014\\u91cd\\u5199\\u751f\\u547d\\u5bc6\\u7801\\u7684\\u5de5\\u5177\\u2014\\u20142020\\u5e74\\u8bfa\\u8d1d\\u5c14\\u5316\\u5b66\\u5956\\u7b80\\u4ecb\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.3969/J.ISSN.1006-7795.2020.06.026?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3969/J.ISSN.1006-7795.2020.06.026, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"149333162\", \"name\": \"\\u8c37\\u601d\\u5b87\"}, {\"authorId\": \"66904754\", \"name\": \"\\u6768\\u6653\\u6885\"}, {\"authorId\": \"1475815443\", \"name\": \"\\u8d3a\\u4fca\\u5d0e\"}], \"abstract\": null}, {\"paperId\": \"059bd08c29a41ff7a651111f1e5844cfad9c6fb6\", \"externalIds\": {\"PubMedCentral\": \"8840913\", \"DOI\": \"10.1007/s12032-022-01659-2\", \"CorpusId\": 245587427, \"PubMed\": \"35150340\"}, \"title\": \"Knockout of high-mobility group box 1 in B16F10 melanoma cells induced host immunity-mediated suppression of in vivo tumor growth\", \"venue\": \"Medical Oncology\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12032-022-01659-2.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8840913, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1692489642\", \"name\": \"Kanako Yokomizo\"}, {\"authorId\": \"48862716\", \"name\": \"Kayoko Waki\"}, {\"authorId\": \"2148254320\", \"name\": \"Miyako Ozawa\"}, {\"authorId\": \"153815925\", \"name\": \"Keiko Yamamoto\"}, {\"authorId\": \"32320953\", \"name\": \"S. Ogasawara\"}, {\"authorId\": \"35227652\", \"name\": \"H. Yano\"}, {\"authorId\": \"2053614532\", \"name\": \"Akira Yamada\"}], \"abstract\": \"High-mobility group box 1 (HMGB1) has been reported as a damage-associated molecular pattern (DAMP) molecule that is released from damaged or dead cells and induces inflammation and subsequent innate immunity. However, the role of HMGB1 in the anti-tumor immunity is unclear since inflammation in the tumor microenvironment also contributes to tumor promotion and progression. In the present study, we established HMGB1-knockout clones from B16F10 and CT26 murine tumors by genome editing using the CRISPR/Cas9 system and investigated the role of HMGB1 in anti-tumor immunity. We found that (1) knockout of HMGB1 in the tumor cells suppressed in vivo, but not in vitro, tumor growth, (2) the suppression of the in vivo tumor growth was mediated by CD8 T cells, and (3) infiltration of CD8 T cells, macrophages and dendritic cells into the tumor tissues was accelerated in HMGB1-knockout tumors. These results demonstrated that knockout of HMGB1 in tumor cells converted tumors from poor infiltration of immune cells called \\u201ccold\\u201d to \\u201cimmune-inflamed\\u201d or \\u201chot\\u201d and inhibited in vivo tumor growth mediated by cytotoxic T lymphocytes. Infiltration of immune cells to the tumor microenvironment is an important step in the series known as the cancer immunity cycle. Thus, manipulation of tumor-derived HMGB1 might be applicable to improve the clinical outcomes of cancer immunotherapies, including immune checkpoint blockades and cancer vaccine therapies.\"}, {\"paperId\": \"059c144f4013215ec8844dfac21a685f9e504a9a\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-146902\", \"CorpusId\": 244542042}, \"title\": \"Fatty Acid Binding Proteins As a Novel Therapeutic Target in Multiple Myeloma\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-146902\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-146902?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-146902, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35517329\", \"name\": \"M. Farrell\"}, {\"authorId\": \"5176813\", \"name\": \"H. Fairfield\"}, {\"authorId\": \"1909844708\", \"name\": \"A. D\\u2019Amico\"}, {\"authorId\": \"2027402200\", \"name\": \"Connor S. Murphy\"}, {\"authorId\": \"6364455\", \"name\": \"C. Falank\"}, {\"authorId\": \"2752814\", \"name\": \"Catherine R. Marinac\"}, {\"authorId\": \"2141808523\", \"name\": \"Sklavenitis-Pistofidis Romanos\"}, {\"authorId\": \"2141811879\", \"name\": \"Amanda Cao\"}, {\"authorId\": \"3400740\", \"name\": \"J. Dragon\"}, {\"authorId\": \"4101238\", \"name\": \"M. Reagan\"}], \"abstract\": \"\\n \\n The fatty acid binding protein (FABP) family is instrumental in fatty acid oxidation, lipid shuttling and signal transduction, but the roles of FABPs in multiple myeloma (MM) have not been explored previously, despite these being safely targetable and holding great translational promise. Using the Broad's Cancer Dependency Map (DepMap) Crispr screening tool, we found that MM, and in fact almost every cancer, shows dependency on FABP5. In patient microarray datasets, we found that increased FABP5 expression in MM cells correlates with poor overall survival (OS) and shorter relapse free survival (Zhan et al., 2006., Mulligan et al., 2006., Carrasco et al., 2006). Interestingly, MM cells from \\\"proliferative\\\" (most aggressive) patient subgroups have the highest expression of FABP5 when comparing the molecular MM subtypes (Zhan et al. 2006). We also found that MM cells from relapsed patients have increased FABP5 expression versus newly-diagnosed patients (Chng et al., 2007). Finally, we analyzed 779 patients in the MMRF CoMMpass dataset and confirmed worse progression-free survival (PFS) and OS in patients with higher than mean FABP5 expression levels in their tumor cells (log-rank-value for high vs. low expression <0.0001 for both PFS and OS) (Fig. 1). Overall, our data strongly suggest that elevated FABP5 is a novel risk factor for poor MM prognosis and that targeting the FABP family holds great promise as a new therapeutic avenue.\\n We next demonstrated that FABP5 is the most highly expressed FABP family member in myeloma cell lines and patient samples, and that inhibition of FABP proteins with two inhibitors, BMS309403 and SBFI-26, negatively impacts MM cell cycle and cell number, and induces apoptosis in human (MM.1S, RPMI-8226, H929, and OPM2) and mouse (5TGM1 and Vk*Myc) MM cells in vitro in a dose- and time-dependent manner. Next, using the MM.1S/SCID-beige xenograft and the syngeneic 5TGM1-TK/C57BL/KaLwRij (KaLwRij) models, we found that pharmacological FABP inhibition improves survival and decreases tumor burden. In both models, mice were tail vein inoculated with MM cells (5x10^6 MM.1S or 1x10^6 5TGM1-TK) and started on intraperitoneal treatments the following day. SCID-beige mice received 5 mg/kg BMS309403, 1 mg/kg SBFI-26, both, or vehicle 3x/week; KaLwRij mice received 5 mg/kg BMS309403 or vehicle 3x/week. Mice were analyzed biweekly with live bioluminescent imaging of whole mice starting 10-12 days post inoculation. In the SCID-beige model, all treatments reduced tumor burden starting at day 21 and led to significantly increased survival, compared to the vehicle. Similar trends were also seen in the KaLwRij group for BMS309403 treatments; SBFI-26 and combinations are now being explored in this model.\\n After demonstrating strong evidence that FABP inhibition reduced tumor growth in vitro and in vivo, we performed RNA-sequencing of human MM.1S cells treated with BMS309403, SBFI-26, both inhibitors, or neither, at 50 \\u03bcM for 24 hours and analyzed gene and pathway alternations using dbString and Ingenuity pathway analyses with cutoffs of FC\\u2264|1.2|. RNA-sequencing pathway analysis revealed that single or combination treatment decreased IRE1-mediated unfolded protein response, endoplasmic reticulum (ER) unfolded protein response, and chromatin silencing. At the individual gene level, major oncogenic genes demonstrated decreased expression including c-myc, KRAS and XBP1. Western blot confirmed that Myc protein was decreased with FABP inhibition in MM cells, illustrating a novel role for FABP proteins in tumor cell survival and proliferation. To confirm that FABP inhibition has negative effects on MM cells, Myc signaling and ER stress, and to rule out inhibitor off-target effects, we also generated FABP5 knockout MM.1S cell pools using Crispr/Cas9, which we are analyzing with RealTime-Glo and RNA-sequencing.\\n In conclusion, FABP inhibition slowed tumor growth and induced tumor cell death in vitro and in two mouse models. RNA-sequencing revealed two potential, novel mediators of FABP action in MM cells: Myc pathway inhibition and enhanced ER stress. Dysfunction in these two pathways via FABP inhibitors potentially triggered cell cycle arrest, decreased proliferation, and increased apoptosis in MM cells. Combined with clinical data from CoMMpass and other datasets, this suggests that FABP inhibition in MM is an untapped therapeutic avenue that should be further explored and developed.\\n Figure 1 Figure 1.\\n \\n \\n \\n Marinac:\\u2008GRAIL Inc: Research Funding; JBF Legal: Consultancy.\\n\"}, {\"paperId\": \"059c9160b0ed7960fb9145b5833c781f7ff6e08b\", \"externalIds\": {\"PubMedCentral\": \"9499999\", \"DOI\": \"10.1016/j.crmeth.2022.100290\", \"CorpusId\": 249133297, \"PubMed\": \"36160051\"}, \"title\": \"Robust genome editing via modRNA-based Cas9 or base editor in human pluripotent stem cells\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.crmeth.2022.100290\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9499999, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2166680894\", \"name\": \"Tahir Haideri\"}, {\"authorId\": \"79828777\", \"name\": \"Alessandro R. Howells\"}, {\"authorId\": \"2145193452\", \"name\": \"Yuqian Jiang\"}, {\"authorId\": \"2118801501\", \"name\": \"Jian Yang\"}, {\"authorId\": \"89920462\", \"name\": \"Xiaoping Bao\"}, {\"authorId\": \"6005334\", \"name\": \"Xiaojun Lian\"}], \"abstract\": \"CRISPR systems have revolutionized biomedical research because they offer an unprecedented opportunity to explore the application of genome editing in human pluripotent stem cells (hPSCs). Due to the inherent simplicity of CRISPR systems, requiring a Cas protein and its corresponding single guide RNA (sgRNA), they are more widely adopted and used for diverse biomedical research than their predecessors (zinc finger nucleases and TALENs). However, a bottleneck of applying CRISPR systems in hPSCs is how to deliver CRISPR effectors easily and efficiently into hPSCs. Herein, we developed modified mRNA (modRNA) based CRIPSR systems that utilized Cas9 or base editor (ABE8e) modRNA for genome editing of hPSCs via simple lipid-based transfection. We have achieved 71.09% \\u00b1 9.13% and 68.53% \\u00b1 3.81% gene knockout (KO) efficiency with Cas9 modRNA and ABE8e modRNA, respectively, which is significantly higher than plasmid-based systems. In summary, we demonstrate that our non-integrating modRNA based CRISPR methods hold great promise as the more efficient and accessible techniques for genome editing of hPSCs.\"}, {\"paperId\": \"05a1c7e928a8fb7a80a92951ee948073369107cc\", \"externalIds\": {\"CorpusId\": 222007882}, \"title\": \"CHARACTERIZING IMMUNE RESPONSES TO AAV9 IN A MOUSE MODEL OF DUCHENNE MUSCULAR DYSTRO- PHY\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://www.mbi.ucla.edu/wp-content/uploads/sites/191/2020/08/Poster-Session-Abstracts-1.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2100141801\", \"name\": \"Michael Emami Mbidp\"}], \"abstract\": null}, {\"paperId\": \"05a5c5f3cac877dbb18b0ee661efd6db15903e3b\", \"externalIds\": {\"PubMedCentral\": \"10251337\", \"DOI\": \"10.1007/s12032-023-02060-3\", \"CorpusId\": 259114928, \"PubMed\": \"37294501\"}, \"title\": \"The future of cancer immunotherapy: DNA vaccines leading the way\", \"venue\": \"Medical Oncology\", \"year\": 2023, \"citationCount\": 62, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s12032-023-02060-3.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10251337, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2193062452\", \"name\": \"Aanshi J Pandya\"}, {\"authorId\": \"40940372\", \"name\": \"Y. Shah\"}, {\"authorId\": \"2193062260\", \"name\": \"Nirjari R Kothari\"}, {\"authorId\": \"2188409866\", \"name\": \"Humzah Postwala\"}, {\"authorId\": \"2192940731\", \"name\": \"A. Shah\"}, {\"authorId\": \"2219729141\", \"name\": \"Priyajeet S. Parekh\"}, {\"authorId\": \"3843068\", \"name\": \"Mehul R. Chorawala\"}], \"abstract\": \"Immuno-oncology has revolutionized cancer treatment and has opened up new opportunities for developing vaccination methods. DNA-based cancer vaccines have emerged as a promising approach to activating the bodily immune system against cancer. Plasmid DNA immunizations have shown a favorable safety profile and there occurs induction of generalized as well as tailored immune responses in preclinical and early-phase clinical experiments. However, these vaccines have notable limitations in immunogenicity and heterogeneity and these require refinements. DNA vaccine technology has been focusing on improving vaccine efficacy and delivery, with parallel developments in nanoparticle-based delivery systems and gene-editing technologies such as CRISPR/Cas9. This approach has showcased great promise in enhancing and tailoring the immune response to vaccination. Strategies to enhance the efficacy of DNA vaccines include the selection of appropriate antigens, optimizing insertion in a plasmid, and studying combinations of vaccines with conventional strategies and targeted therapies. Combination therapies have attenuated immunosuppressive activities in the tumor microenvironment and enhanced the capability of immune cells. This review provides an overview of the current framework of DNA vaccines in oncology and focuses on novel strategies, including established combination therapies and those still under development.The challenges that oncologists, scientists, and researchers need to overcome to establish DNA vaccines as an avant-garde approach to defeating cancer, are also emphasized. The clinical implications of the immunotherapeutic approaches and the need for predictive biomarkers have also been reviewed upon. We have also tried to extend the role of Neutrophil extracellular traps (NETs) to the DNA vaccines. The clinical implications of the immunotherapeutic approaches have also been reviewed upon. Ultimately, refining and optimizing DNA vaccines will enable harnessing the immune system's natural ability to recognize and eliminate cancer cells, leading the world towards a revolution in cancer cure.\"}, {\"paperId\": \"05a84362f504cd37940cc838955bd593fd897c33\", \"externalIds\": {\"PubMedCentral\": \"8965521\", \"DOI\": \"10.3389/fpls.2022.826954\", \"CorpusId\": 247440253, \"PubMed\": \"35371150\"}, \"title\": \"The Tomato Transcription Factor SlNAC063 Is Required for Aluminum Tolerance by Regulating SlAAE3-1 Expression\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.826954/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8965521, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143818326\", \"name\": \"J. Jin\"}, {\"authorId\": \"48808963\", \"name\": \"Huishan Zhu\"}, {\"authorId\": \"145109822\", \"name\": \"Qi He\"}, {\"authorId\": \"2209965555\", \"name\": \"P. Li\"}, {\"authorId\": \"152351029\", \"name\": \"W. Fan\"}, {\"authorId\": \"2144296088\", \"name\": \"J. Xu\"}, {\"authorId\": \"2279867855\", \"name\": \"Jian Li Yang\"}, {\"authorId\": \"31055628\", \"name\": \"Wei Wei Chen\"}], \"abstract\": \"Aluminum (Al) toxicity constitutes one of the major limiting factors of plant growth and development on acid soils, which comprises approximately 50% of potentially arable lands worldwide. When suffering Al toxicity, plants reprogram the transcription of genes, which activates physiological and metabolic pathways to deal with the toxicity. Here, we report the role of a NAM, ATAF1, 2 and CUC2 (NAC) transcription factor (TF) in tomato Al tolerance. Among 53 NAC TFs in tomatoes, SlNAC063 was most abundantly expressed in root apex and significantly induced by Al stress. Furthermore, the expression of SlNAC063 was not induced by other metals. Meanwhile, the SlNAC063 protein was localized at the nucleus and has transcriptional activation potentials in yeast. By constructing CRISPR/Cas9 knockout mutants, we found that slnac063 mutants displayed increased sensitivity to Al compared to wild-type plants. However, the mutants accumulated even less Al than wild-type (WT) plants, suggesting that internal tolerance mechanisms but not external exclusion mechanisms are implicated in SlNAC063-mediated Al tolerance in tomatoes. Further comparative RNA-sequencing analysis revealed that only 45 Al-responsive genes were positively regulated by SlNAC063, although the expression of thousands of genes (1,557 upregulated and 636 downregulated) was found to be affected in slnac063 mutants in the absence of Al stress. The kyoto encyclopedia of genes and genomes (KEGG) pathway analysis revealed that SlNAC063-mediated Al-responsive genes were enriched in \\u201cphenylpropanoid metabolism,\\u201d \\u201cfatty acid metabolism,\\u201d and \\u201cdicarboxylate metabolism,\\u201d indicating that SlNAC063 regulates metabolisms in response to Al stress. Quantitative real-time (RT)-PCR analysis showed that the expression of SlAAE3-1 was repressed by SlNAC063 in the absence of Al. However, the expression of SlAAE3-1 was dependent on SlNAC063 in the presence of Al stress. Taken together, our results demonstrate that a NAC TF SlNAC063 is involved in tomato Al tolerance by regulating the expression of genes involved in metabolism, and SlNAC063 is required for Al-induced expression of SlAAE3-1.\"}, {\"paperId\": \"05a85b474b90354f395afb44e4691ed3ed7efa09\", \"externalIds\": {\"DOI\": \"10.1089/crispr.2021.0105\", \"CorpusId\": 246276762, \"PubMed\": \"35076264\"}, \"title\": \"Enhanced Taq Variant Enables Efficient Genome Editing Testing and Mutation Detection\", \"venue\": \"The CRISPR Journal\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/crispr.2021.0105?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/crispr.2021.0105, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2057358701\", \"name\": \"Ping Du\"}, {\"authorId\": \"71788673\", \"name\": \"Bo Li\"}, {\"authorId\": \"2118465410\", \"name\": \"Xiaodan Liu\"}, {\"authorId\": \"4890423\", \"name\": \"Lele Yang\"}, {\"authorId\": \"1454020343\", \"name\": \"Naixia Ren\"}, {\"authorId\": \"2144428564\", \"name\": \"Yingying Li\"}, {\"authorId\": \"4577735\", \"name\": \"Qilai Huang\"}], \"abstract\": \"Detection of genome editing with quantitative polymerase chain reaction (PCR) primarily relies on and is limited by its ability to discriminate genome modification from the wild-type sequence. An enhanced DNA polymerase variant with superior specificity is needed for this application. Here, we perform semi-rational molecular evolution on full-length Taq polymerase to screen high-specific variants that meet the requirements of gene variation detection. We substituted each of the 40 polar amino acids in direct contact with the primer/template duplex and conducted extensive random mutagenesis to generate a Taq mutation library. Screening on a quantitative PCR system with insertion and deletion\\u2013containing templates identified a series of improved Taq variants. We demonstrate that the Taq388 variant bearing three amino acid substitutions, S577A, W645R, and I707V, has improved sensitivity to insertion and deletion\\u2013derived primer/template mismatch by a \\u0394Ct value of 25\\u201326 and is superior for application in evaluating CRISPR-Cas9 editing efficiency and single-cell clone genotyping. In addition, the Taq variant shows substantial potential for single-nucleotide polymorphism detection by means of allele-specific PCR because of its high sensitivity to mismatches.\"}, {\"paperId\": \"05a8c1aba977d34fc6650f0ab43911caa6b14f27\", \"externalIds\": {\"PubMedCentral\": \"10516051\", \"DOI\": \"10.1101/2023.09.16.558090\", \"CorpusId\": 262067396, \"PubMed\": \"37745551\"}, \"title\": \"Multiplexed CRISPR gene editing in primary human islet cells with Cas9 ribonucleoprotein\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.isci.2023.108693\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10516051, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3041159\", \"name\": \"R. Bevacqua\"}, {\"authorId\": \"2150610414\", \"name\": \"Weichen Zhao\"}, {\"authorId\": \"50877160\", \"name\": \"Emilio Merheb\"}, {\"authorId\": \"2394647670\", \"name\": \"S. Kim\"}, {\"authorId\": \"2242935461\", \"name\": \"Alexander Marson\"}, {\"authorId\": \"3530432\", \"name\": \"A. Gloyn\"}, {\"authorId\": \"2390208563\", \"name\": \"Seung K. Kim\"}], \"abstract\": \"Successful genome editing in primary human islets could reveal features of the genetic regulatory landscape underlying \\u03b2 cell function and diabetes risk. Here, we describe a CRISPR-based strategy to interrogate functions of predicted regulatory DNA elements using electroporation of a complex of Cas9 ribonucleoprotein (Cas9 RNP) and guide RNAs into primary human islet cells. We successfully targeted coding regions including the PDX1 exon 1, and non-coding DNA linked to diabetes susceptibility. CRISPR/Cas9 RNP approaches revealed genetic targets of regulation by DNA elements containing candidate diabetes risk SNPs, including an in vivo enhancer of the MPHOSPH9 gene. CRISPR/Cas9 RNP multiplexed targeting of two cis-regulatory elements linked to diabetes risk in PCSK1, which encodes an endoprotease crucial for insulin processing, also demonstrated efficient simultaneous editing of PCSK1 regulatory elements, resulting in impaired \\u03b2 cell PCSK1 regulation and insulin secretion. Multiplex CRISPR/Cas9 RNP provides powerful approaches to investigate and elucidate human islet cell gene regulation in health and diabetes.\"}, {\"paperId\": \"05a9055f62debaef7f93134e5abd2ddef5b113fa\", \"externalIds\": {\"MAG\": \"3011006662\", \"DOI\": \"10.33594/000000218\", \"CorpusId\": 212738801, \"PubMed\": \"32176842\"}, \"title\": \"Ca2+/Calmodulin Binding to STIM1 Hydrophobic Residues Facilitates Slow Ca2+-Dependent Inactivation of the Orai1 Channel.\", \"venue\": \"Cellular Physiology and Biochemistry\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.33594/000000218\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.33594/000000218?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.33594/000000218, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2121756\", \"name\": \"Rajesh Bhardwaj\"}, {\"authorId\": \"4968826\", \"name\": \"Bart\\u0142omiej Augustynek\"}, {\"authorId\": \"1404541825\", \"name\": \"Ebru Ercan-Herbst\"}, {\"authorId\": \"2094061828\", \"name\": \"Palanivel Kandasamy\"}, {\"authorId\": \"4691058\", \"name\": \"M. Seedorf\"}, {\"authorId\": \"46554782\", \"name\": \"C. Peinelt\"}, {\"authorId\": \"143882146\", \"name\": \"M. Hediger\"}], \"abstract\": \"BACKGROUND/AIMS\\nStore-operated Ca2+ entry (SOCE) through plasma membrane Ca2+ channel Orai1 is essential for many cellular processes. SOCE, activated by ER Ca2+ store-depletion, relies on the gating function of STIM1 Orai1-activating region SOAR of the ER-anchored Ca2+-sensing protein STIM1. Electrophysiologically, SOCE is characterized as Ca2+ release-activated Ca2+ current (ICRAC). A major regulatory mechanism that prevents deleterious Ca2+ overload is the slow Ca2+-dependent inactivation (SCDI) of ICRAC. Several studies have suggested a role of Ca2+/calmodulin (Ca2+/CaM) in triggering SCDI. However, a direct contribution of STIM1 in regulating Ca2+/CaM-mediated SCDI of ICRAC is as yet unclear.\\n\\n\\nMETHODS\\nThe Ca2+/CaM binding to STIM1 was tested by pulling down recombinant GFP-tagged human STIM1 C-terminal fragments on CaM sepharose beads. STIM1 was knocked out by CRISPR/Cas9 technique in HEK293 cells stably overexpressing human Orai1. Store-operated Ca2+ influx was measured using Fluorometric Imaging Plate Reader and whole-cell patch clamp in cells transfected with STIM1 CaM binding mutants. The involvement of Ca2+/CaM in SCDI was investigated by including recombinant human CaM in patch pipette in electrophysiology.\\n\\n\\nRESULTS\\nHere we identified residues Leu374/Val375 (H1) and Leu390/Phe391 (H2) within SOAR that serve as hydrophobic anchor sites for Ca2+/CaM binding. The bifunctional H2 site is critical for both Orai1 activation and Ca2+/CaM binding. Single residue mutations of Phe391 to less hydrophobic residues significantly diminished SOCE and ICRAC, independent of Ca2+/CaM. Hence, the role of H2 residues in Ca2+/CaM-mediated SCDI cannot be precisely evaluated. In contrast, the H1 site controls exclusively Ca2+/CaM binding and subsequently SCDI, but not Orai1 activation. V375A but not V375W substitution eliminated SCDI of ICRAC caused by Ca2+/CaM, proving a direct role of STIM1 in coordinating SCDI.\\n\\n\\nCONCLUSION\\nTaken together, we propose a mechanistic model, wherein binding of Ca2+/CaM to STIM1 hydrophobic anchor residues, H1 and H2, triggers SCDI by disrupting the functional interaction between STIM1 and Orai1. Our findings reveal how STIM1, Orai1, and Ca2+/CaM are functionally coordinated to control ICRAC.\"}, {\"paperId\": \"05aa7c32066f3b591a52f40a0f72e59d3e08aa24\", \"externalIds\": {\"PubMedCentral\": \"10328921\", \"DOI\": \"10.1038/s41420-023-01526-7\", \"CorpusId\": 259369556, \"PubMed\": \"37419907\"}, \"title\": \"Kinome-wide CRISPR-Cas9 knockout screens revealed PLK1 as a therapeutic target for osteosarcoma\", \"venue\": \"Cell Death Discovery\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41420-023-01526-7.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10328921, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5772286\", \"name\": \"Renxian Wang\"}, {\"authorId\": \"46349179\", \"name\": \"Dingding Wang\"}, {\"authorId\": \"2180426151\", \"name\": \"Xueshan Bai\"}, {\"authorId\": \"66597026\", \"name\": \"Jianxun Guo\"}, {\"authorId\": \"2221279932\", \"name\": \"Songxia Xia\"}, {\"authorId\": \"2218537522\", \"name\": \"Yun-Zhong Cheng\"}, {\"authorId\": \"2222887851\", \"name\": \"Yani Gu\"}, {\"authorId\": \"2155616799\", \"name\": \"Qian Wang\"}, {\"authorId\": \"2066549541\", \"name\": \"JingJun Nie\"}, {\"authorId\": \"47514500\", \"name\": \"Dafu Chen\"}, {\"authorId\": \"2145446828\", \"name\": \"Weifeng Liu\"}, {\"authorId\": \"3862082\", \"name\": \"Junbo Liang\"}], \"abstract\": \"Osteosarcoma is the most common malignant bone tumor, tending to be aggressive and recurrent. The therapeutic development for treating osteosarcoma has been largely hampered by the lack of effective and specific targets. Using kinome-wide CRISPR-Cas9 knockout screens, we systematically revealed a cohort of kinases essential for the survival and growth of human osteosarcoma cells, in which Polo-like kinase 1 ( PLK1 ) appeared as a specific prominent hit. PLK1 knockout substantially inhibited proliferation of osteosarcoma cells in vitro and the tumor growth of osteosarcoma xenograft in vivo. Volasertib, a potent experimental PLK1 inhibitor, can effectively inhibit the growth of the osteosarcoma cell lines in vitro. It can also disrupt the development of tumors in the patient-derived xenograft (PDX) models in vivo. Furthermore, we confirmed that the mode of action (MoA) of volasertib is primarily mediated by the cell-cycle arrest and apoptosis triggered by DNA damage. As PLK1 inhibitors are entering phase III clinical trials, our findings provide important insights into the efficacy and MoA of the relevant therapeutic approach for combating osteosarcoma.\"}, {\"paperId\": \"05ac65144db5df3008e2914b0333bd9e0948a1dd\", \"externalIds\": {\"PubMedCentral\": \"10140800\", \"DOI\": \"10.1016/j.jcmgh.2023.02.004\", \"CorpusId\": 256973260, \"PubMed\": \"36806581\"}, \"title\": \"PFKFB4 Drives the Oncogenicity in TP53-Mutated Hepatocellular Carcinoma in a Phosphatase-Dependent Manner\", \"venue\": \"Cellular and Molecular Gastroenterology and Hepatology\", \"year\": 2023, \"citationCount\": 28, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10140800\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10140800, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"83596040\", \"name\": \"Charles Shing Kam\"}, {\"authorId\": \"1941766583\", \"name\": \"Daniel Wai-Hung Ho\"}, {\"authorId\": \"2208015081\", \"name\": \"Vanessa Sheung-In Ming\"}, {\"authorId\": \"2117119137\", \"name\": \"Lu Tian\"}, {\"authorId\": \"2204614168\", \"name\": \"Karen Man-Fong Sze\"}, {\"authorId\": \"7031698\", \"name\": \"Vanilla Xin Zhang\"}, {\"authorId\": \"69865985\", \"name\": \"Y. Tsui\"}, {\"authorId\": \"143699076\", \"name\": \"Abdullah Husain\"}, {\"authorId\": \"1953666635\", \"name\": \"Joyce Man\\u2010Fong Lee\"}, {\"authorId\": \"1627800038\", \"name\": \"Carmen Chak-Lui Wong\"}, {\"authorId\": \"1942623859\", \"name\": \"Albert Chi-Yan Chan\"}, {\"authorId\": \"8696629\", \"name\": \"T. Cheung\"}, {\"authorId\": \"79313817\", \"name\": \"L. Chan\"}, {\"authorId\": \"1400785900\", \"name\": \"Irene Oi-Lin Ng\"}], \"abstract\": \"Background & Aims Metabolic reprogramming is recognized as a cancer hallmark intimately linked to tumor hypoxia, which supports rapid tumor growth and mitigates the consequential oxidative stress. Phosphofructokinase-fructose bisphosphatase (PFKFB) is a family of bidirectional glycolytic enzymes possessing both kinase and phosphatase functions and has emerged as important oncogene in multiple types of cancer. However, its clinical relevance, functional significance, and underlying mechanistic insights in hepatocellular carcinoma (HCC), the primary malignancy that develops in the most important metabolic organ, has never been addressed. Methods PFKFB4 expression was examined by RNA sequencing in The Cancer Genome Atlas and our in-house HCC cohort. The up-regulation of PFKFB4 expression was confirmed further by quantitative polymerase chain reaction in an expanded hepatitis B virus\\u2013associated HCC cohort followed by clinicopathologic correlation analysis. Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)/CRISPR-associated protein 9 (Cas9)-mediated PFKFB4 knockout cells were generated for functional characterization in vivo, targeted metabolomic profiling, as well as RNA sequencing analysis to comprehensively examine the impact of PFKFB4 loss in HCC. Results PFKFB4 expression was up-regulated significantly in HCC and correlated positively with TP53 and TSC2 loss-of-function mutations. In silico transcriptome-based analysis further revealed PFKFB4 functions as a critical hypoxia-inducible gene. Clinically, PFKFB4 up-regulation was associated with more aggressive tumor behavior. Functionally, CRISPR/Cas9-mediated PFKFB4 knockout significantly impaired in vivo HCC development. Targeted metabolomic profiling revealed that PFKFB4 functions as a phosphatase in HCC and its ablation caused an accumulation of metabolites in downstream glycolysis and the pentose phosphate pathway. In addition, PFKFB4 loss induced hypoxia-responsive genes in glycolysis and reactive oxygen species detoxification. Conversely, ectopic PFKFB4 expression conferred sorafenib resistance. Conclusions PFKFB4 up-regulation supports HCC development and shows therapeutic implications.\"}, {\"paperId\": \"05af2e39b581c4c7f0f6b9f5fa79aabf9141b105\", \"externalIds\": {\"MAG\": \"3110311283\", \"DOI\": \"10.1002/smll.202004879\", \"CorpusId\": 227948469, \"PubMed\": \"33289336\"}, \"title\": \"Photo-Enhanced CRISPR/Cas9 System Enables Robust PD-L1 Gene Disruption in Cancer Cells and Cancer Stem-Like Cells for Efficient Cancer Immunotherapy.\", \"venue\": \"Small\", \"year\": 2020, \"citationCount\": 39, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/smll.202004879?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/smll.202004879, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116735650\", \"name\": \"Liang Zhao\"}, {\"authorId\": \"13152488\", \"name\": \"Yingli Luo\"}, {\"authorId\": \"2033770926\", \"name\": \"Qiaoyi Huang\"}, {\"authorId\": \"51008189\", \"name\": \"Ziyang Cao\"}, {\"authorId\": \"87731885\", \"name\": \"Xianzhu Yang\"}], \"abstract\": \"Blocking immune checkpoint pathways with an antibody or small interfering RNA (siRNA) has become a promising method to reactivate antitumor responses for cancer treatment. However, both blockade strategies achieve only temporary inhibition of these immune checkpoints. Herein, a photoswitched CRISPR/Cas9 system for genomic disruption of the PD-L1 gene is developed to achieve permanent blockade of the PD-1/PD-L1 pathway; this system is constructed by using a photoactivated self-degradable polyethyleneimine derivative and the plasmid pX330/sgPD-L1 (expression of the Cas9 protein and single-guide RNA targeting PD-L1). Under light irradiation, this photoswitched CRISPR/Cas9 system efficiently genetically disrupts the PD-L1 gene in not only bulk cancer cells but also cancer stem-like cells. As a result, the photoswitched CRISPR/Cas9 system significantly increases the infiltration of CD8+ T cells into tumor tissue, leading to effective activation of a T cell-mediated antitumor response against cancer cells and cancer stem-like cells. This study provides an alternative strategy to block the PD-1/PD-L1 pathway for efficacious immune checkpoint therapy.\"}, {\"paperId\": \"05b162fb6449d56f3671da52781f80c3a1aa3364\", \"externalIds\": {\"DOI\": \"10.1164/ajrccm-conference.2024.209.1_meetingabstracts.a6422\", \"CorpusId\": 269558883}, \"title\": \"Genotype-Phenotype Assessment of CRISPR-Cas9 Deletion of Multicillin in Induced Basal Cells for Rapid In Vitro Assessment of Primary Ciliary Dyskinesia\", \"venue\": \"C73. PRECLINICAL MODELING OF PULMONARY INFLAMMATION AND EMPHYSEMA\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1164/ajrccm-conference.2024.209.1_meetingabstracts.a6422?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1164/ajrccm-conference.2024.209.1_meetingabstracts.a6422, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2329972638\", \"name\": \"D. Wallman\"}, {\"authorId\": \"2299670044\", \"name\": \"H. Kiyokawa\"}, {\"authorId\": \"2299223550\", \"name\": \"M. Beermann\"}, {\"authorId\": \"2345391554\", \"name\": \"A. Jacob\"}, {\"authorId\": \"2299222929\", \"name\": \"D.N. Kotton\"}, {\"authorId\": \"2255524882\", \"name\": \"A. Berical\"}, {\"authorId\": \"2299637118\", \"name\": \"F.J. Hawkins\"}], \"abstract\": null}, {\"paperId\": \"05b4adc8fd77e952aa65fe3fd3c4ac398c9d6912\", \"externalIds\": {\"MAG\": \"3092979842\", \"PubMedCentral\": \"7578354\", \"DOI\": \"10.1242/dmm.045096\", \"CorpusId\": 225040069, \"PubMed\": \"33097556\"}, \"title\": \"CHIP mutations affect the heat shock response differently in human fibroblasts and iPSC-derived neurons\", \"venue\": \"Disease Models & Mechanisms\", \"year\": 2020, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.biologists.com/dmm/article-pdf/13/10/dmm045096/1974121/dmm045096.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7578354, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48764094\", \"name\": \"S. Schuster\"}, {\"authorId\": \"48764094\", \"name\": \"S. Schuster\"}, {\"authorId\": \"1963711420\", \"name\": \"E. Heuten\"}, {\"authorId\": \"4596194\", \"name\": \"A. Velic\"}, {\"authorId\": \"1413140451\", \"name\": \"Jakob Admard\"}, {\"authorId\": \"2400871449\", \"name\": \"M. Synofzik\"}, {\"authorId\": \"2198347920\", \"name\": \"S. Ossowski\"}, {\"authorId\": \"2264333855\", \"name\": \"B. Ma\\u010dek\"}, {\"authorId\": \"49003852\", \"name\": \"S. Hauser\"}, {\"authorId\": \"49003852\", \"name\": \"S. Hauser\"}, {\"authorId\": \"2244944501\", \"name\": \"Ludger Sch\\u00f6ls\"}, {\"authorId\": \"2244944501\", \"name\": \"Ludger Sch\\u00f6ls\"}], \"abstract\": \"ABSTRACT C-terminus of HSC70-interacting protein (CHIP) encoded by the gene STUB1 is a co-chaperone and E3 ligase that acts as a key regulator of cellular protein homeostasis. Mutations in STUB1 cause autosomal recessive spinocerebellar ataxia type 16 (SCAR16) with widespread neurodegeneration manifesting as spastic-ataxic gait disorder, dementia and epilepsy. CHIP\\u2212/\\u2212 mice display severe cerebellar atrophy, show high perinatal lethality and impaired heat stress tolerance. To decipher the pathomechanism underlying SCAR16, we investigated the heat shock response (HSR) in primary fibroblasts of three SCAR16 patients. We found impaired HSR induction and recovery compared to healthy controls. HSPA1A/B transcript levels (coding for HSP70) were reduced upon heat shock but HSP70 remained higher upon recovery in patient- compared to control-fibroblasts. As SCAR16 primarily affects the central nervous system we next investigated the HSR in cortical neurons (CNs) derived from induced pluripotent stem cells of SCAR16 patients. We found CNs of patients and controls to be surprisingly resistant to heat stress with high basal levels of HSP70 compared to fibroblasts. Although heat stress resulted in strong transcript level increases of many HSPs, this did not translate into higher HSP70 protein levels upon heat shock, independent of STUB1 mutations. Furthermore, STUB1(\\u2212/\\u2212) neurons generated by CRISPR/Cas9-mediated genome editing from an isogenic healthy control line showed a similar HSR to patients. Proteomic analysis of CNs showed dysfunctional protein (re)folding and higher basal oxidative stress levels in patients. Our results question the role of impaired HSR in SCAR16 neuropathology and highlight the need for careful selection of proper cell types for modeling human diseases. Summary: Cell viability, expression and immunocytochemical analyses reveal that mutations in STUB1 that cause SCAR16 impair the heat-shock response in patient-derived fibroblasts, but not in iPSC-derived cortical neurons.\"}, {\"paperId\": \"05b877e60f106dd5e6e64f5754deb0aa4811de04\", \"externalIds\": {\"PubMedCentral\": \"10208053\", \"DOI\": \"10.32604/or.2022.03553\", \"CorpusId\": 251262133, \"PubMed\": \"37304670\"}, \"title\": \"The LncRNA FEZF1-AS1 promotes tumor proliferation in colon cancer by regulating the mitochondrial protein PCK2\", \"venue\": \"Oncology Research\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://file.techscience.com/uploads/attached/file/20220801/20220801135855_38271.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10208053, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2109007940\", \"name\": \"Huamin Wang\"}, {\"authorId\": \"6670033\", \"name\": \"Yan-Ting Wu\"}, {\"authorId\": \"50218601\", \"name\": \"Zhenlei Wang\"}, {\"authorId\": \"2115868238\", \"name\": \"Yuhang Chen\"}, {\"authorId\": \"2142175103\", \"name\": \"J. Mo\"}, {\"authorId\": \"2072532364\", \"name\": \"W. Guan\"}, {\"authorId\": \"2108520562\", \"name\": \"Yali Zhang\"}, {\"authorId\": \"33161268\", \"name\": \"H. Yao\"}], \"abstract\": \"LncRNAs and metabolism represents two factors involved in cancer initiation and progression. However, the interaction between lncRNAs and metabolism remains to be fully explored. In this study, lncRNA FEZF1-AS1 (FEZF1-AS1) was found upregulated in colon cancer after screening all the lncRNAs of colon cancer tissues deposited in TCGA, the result of which was further confirmed by RNAscope staining on a colon tissue chip. The results obtained using FEZF1-AS1 knockout colon cancer cells (SW480 KO and HCT-116 KO) constructed using CRISPR/Cas9 system confirmed the proliferation, invasion, and migration-promoting function of FEZF1-AS1 in vitro. Mechanistically, FEZF1-AS1 associated with the mitochondrial protein phosphoenolpyruvate carboxykinase (PCK2), which plays an essential role in regulating energy metabolism in the mitochondria. Knockdown of FEZF1-AS1 greatly decreased PCK2 protein levels, broke the homeostasis of energy metabolism in the mitochondria, and inhibited proliferation, invasion, and migration of SW480 and HCT-116 cells. PCK2 overexpression in FEZF1-AS1 knockout cells partially rescued the tumor inhibitory effect on colon cancer cells both in vitro and in vivo. Moreover, PCK2 overexpression specifically rescued the abnormal accumulation of Flavin mononucleotide (FMN) and succinate, both of which play an important role in oxidative phosphorylation (OXPHOS). Overall, these results indicate that FEZF1-AS1 is an oncogene through regulating energy metabolism of the cell. This research reveals a new mechanism for lncRNAs to regulate colon cancer and provides a potential target for colon cancer diagnosis and treatment.\"}, {\"paperId\": \"05b8cc4406b3ba718b83c6958206baa535e9764d\", \"externalIds\": {\"PubMedCentral\": \"10141630\", \"DOI\": \"10.1021/acscentsci.2c01467\", \"CorpusId\": 257575838, \"PubMed\": \"37122471\"}, \"title\": \"Glow-in-the-Dark Infectious Disease Diagnostics Using CRISPR-Cas9-Based Split Luciferase Complementation\", \"venue\": \"ACS Central Science\", \"year\": 2023, \"citationCount\": 35, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1021/acscentsci.2c01467\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10141630, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2185365560\", \"name\": \"Harmen J. van der Veer\"}, {\"authorId\": \"1601220768\", \"name\": \"Eva A. van Aalen\"}, {\"authorId\": \"2166235675\", \"name\": \"Claire M. S. Michielsen\"}, {\"authorId\": \"2024837550\", \"name\": \"Eva T. L. Hanckmann\"}, {\"authorId\": \"2124257409\", \"name\": \"Jeroen Deckers\"}, {\"authorId\": \"4677089\", \"name\": \"M. V. van Borren\"}, {\"authorId\": \"4146777\", \"name\": \"Jacky Flipse\"}, {\"authorId\": \"48347946\", \"name\": \"A. Loonen\"}, {\"authorId\": \"34978730\", \"name\": \"Joost P. H. Schoeber\"}, {\"authorId\": \"93853279\", \"name\": \"M. Merkx\"}], \"abstract\": \"Nucleic acid detection methods based on CRISPR and isothermal amplification techniques show great potential for point-of-care diagnostic applications. However, most current methods rely on fluorescent or lateral flow assay readout, requiring external excitation or postamplification reaction transfer. Here, we developed a bioluminescent nucleic acid sensor (LUNAS) platform in which target dsDNA is sequence-specifically detected by a pair of dCas9-based probes mediating split NanoLuc luciferase complementation. LUNAS is easily integrated with recombinase polymerase amplification (RPA), providing attomolar sensitivity in a rapid one-pot assay. A calibrator luciferase is included for a robust ratiometric readout, enabling real-time monitoring of the RPA reaction using a simple digital camera. We designed an RT-RPA-LUNAS assay that allows SARS-CoV-2 RNA detection without the need for cumbersome RNA isolation and demonstrated its diagnostic performance for COVID-19 patient nasopharyngeal swab samples. Detection of SARS-CoV-2 from samples with viral RNA loads of \\u223c200 cp/\\u03bcL was achieved within \\u223c20 min, showing that RPA-LUNAS is attractive for point-of-care infectious disease testing.\"}, {\"paperId\": \"05bd05c794db71f01c0c7c82dceccabe04d7e241\", \"externalIds\": {\"DOI\": \"10.1136/jitc-2021-sitc2021.204\", \"CorpusId\": 243959382}, \"title\": \"204\\u2005KSQ-004: Unbiased pair-wise discovery of SOCS1 and Regnase-1 as the top CRISPR/Cas9 dual-edit combination enhancing in vivo TIL potency against solid tumors\", \"venue\": \"Journal for ImmunoTherapy of Cancer\", \"year\": 2021, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jitc.bmj.com/content/jitc/9/Suppl_2/A215.full.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/jitc-2021-sitc2021.204?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/jitc-2021-sitc2021.204, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"33518141\", \"name\": \"Karrie K Wong\"}, {\"authorId\": \"7317977\", \"name\": \"C. Wrocklage\"}, {\"authorId\": \"2115275110\", \"name\": \"Sharon Lin\"}, {\"authorId\": \"3850764\", \"name\": \"I. Mercier\"}, {\"authorId\": \"50349098\", \"name\": \"Caroline Bullock\"}, {\"authorId\": \"81420672\", \"name\": \"L. Cadzow\"}, {\"authorId\": \"49870623\", \"name\": \"Anja F. Hohmann\"}, {\"authorId\": \"27354323\", \"name\": \"S. Shenker\"}, {\"authorId\": \"2047914070\", \"name\": \"Katri Sofjan\"}, {\"authorId\": \"29948719\", \"name\": \"Leila J. Williams\"}, {\"authorId\": \"5944504\", \"name\": \"G. Kryukov\"}, {\"authorId\": \"47226229\", \"name\": \"C. Calnan\"}, {\"authorId\": \"6429851\", \"name\": \"F. Stegmeier\"}, {\"authorId\": \"47877697\", \"name\": \"M. Benson\"}, {\"authorId\": \"37595258\", \"name\": \"M. Schlabach\"}], \"abstract\": \"The application of CRISPR/Cas9-gene-editing to enhance the anti-tumor activity of T cell Adoptive Cell Therapies (ACT) is a promising approach in the treatment of patients with solid tumors. We developed an in vivo CRISPR^2 screening approach and interrogated the top dual-edit combinations enhancing T cell anti-tumor function. We discovered that across all possible dual-edit combinations of T cell targets, inactivation of Regnase-1 and SOCS1 led to the greatest enhancement in anti-tumor T cell potency in vivo. We applied these findings to discover KSQ-004, a Regnase-1/SOCS1 dual-edited human CRISPR/Cas9-engineered TIL (eTIL) therapy currently under development for therapeutic use.We generated randomly paired CRISPR guide libraries (CRISPR2) targeting top hits from previous single-gene Immune CRISPRomics\\u00ae screens. CRISPR^2 libraries with over 1200 gene pairs were screened in primary mouse OT1 and PMEL-TCR-Tg-T cells in the relevant syngeneic tumor models. Top dual-edit combinations were then evaluated in the immunotherapy-refractory B16F10 metastatic lung tumor model. The efficacy of the top combo was further evaluated in a mouse TIL model wherein TIL from B16-Ova tumors were expanded and engineered ex vivo and adoptively transferred into tumor bearing hosts for efficacy assessment.Of the 1200+ combinations tested in the CRISPR^2 screens, the Regnase-1/SOCS1 combination ranked amongst the top dual-edits, with this combination enhancing T cell infiltration into tumors >3500-fold in comparison to controls. Studies conducted in the checkpoint therapy refractory B16F10 lung metastasis model revealed that Regnase-1/SOCS1 dual-edited PMEL-TCR-Tg-T cells conferred remarkable survival benefit relative to controls, significantly extending median survival of animals from 21 days to 53 days. Furthermore, Regnase-1+SOCS1-edited mouse TIL isolated and expanded from B16-Ova tumors exerted complete control of tumors upon re-infusion into hosts, suggesting rejuvenation of tumor-experienced TILs by this edit combination. To apply these insights for therapeutic use, we discovered KSQ-004, a human Regnase-1/SOCS1 dual-edited CRISPR/Cas9-engineered TIL (eTIL). Methods were developed to manufacture KSQ-004 from melanoma and NSCLC tumor samples, with eTIL demonstrating robust expansion and viability comparable to unedited control TIL with over 90% knockout of both targets. Importantly, KSQ-004 produced elevated IFN\\u03b3 upon autologous tumor stimulation and exerted greater control of tumor spheroids in vitro.We used a novel CRISPR^2 screen approach to identify Regnase-1/SOCS1 as the top dual edit combination enhancing T cell function in the tumor microenvironment. We translated these findings to therapeutic use with the discovery of KSQ-004, a dual-edited eTIL therapy engineered that possesses enhanced anti-tumor potency and persistence against solid tumors.\"}, {\"paperId\": \"05bed8aa662b3e40f835d951b8b6880ccc588b30\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2023.103036\", \"CorpusId\": 256293757, \"PubMed\": \"36724552\"}, \"title\": \"Generation of human induced pluripotent stem cell line UGENTi001-A from a patient with Marfan syndrome carrying a heterozygous c.7754\\u00a0T\\u00a0>\\u00a0C variant in FBN1 and the isogenic control UGENT001-A-1 using CRISPR/Cas9 editing.\", \"venue\": \"Stem Cell Research\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2023.103036\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2023.103036?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2023.103036, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1390126091\", \"name\": \"J. Aalders\"}, {\"authorId\": \"1581507939\", \"name\": \"Laurens L\\u00e9ger\"}, {\"authorId\": \"2276262088\", \"name\": \"A. Demolder\"}, {\"authorId\": \"134319239\", \"name\": \"L. Mui\\u00f1o Mosquera\"}, {\"authorId\": \"2208387\", \"name\": \"P. Coucke\"}, {\"authorId\": \"1400094714\", \"name\": \"B. Menten\"}, {\"authorId\": \"2123953801\", \"name\": \"J. D. De Backer\"}, {\"authorId\": \"5482122\", \"name\": \"J. van Hengel\"}], \"abstract\": \"Marfan syndrome is an autosomal dominant genetic disorder resulting from pathogenic variants in FBN1 gene. FBN1 encodes for fibrillin-1, an important extracellular matrix protein. Impaired fibrillin-1 affects multiple organ systems, including the cardiovascular system. We generated an iPSC line carrying a heterozygous variant c.7754\\u00a0T\\u00a0>\\u00a0C (p.Ile2585Thr, missense) in FBN1 from a patient with Marfan syndrome. Also, an isogenic control is generated, where the pathogenic variant is repaired using CRISPR-Cas9. This isogenic pair provides a valuable resource for in vitro disease modelling.\"}, {\"paperId\": \"05bffc9ca7dcf43835aba75e12b24d07c2ba753a\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2024.103420\", \"CorpusId\": 269119606, \"PubMed\": \"38643711\"}, \"title\": \"Generation of a PPM1A-deficient human induced pluripotent stem cell line using CRISPR-Cas9 technology.\", \"venue\": \"Stem Cell Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2024.103420\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2024.103420?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2024.103420, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2279281170\", \"name\": \"Xinrui Guo\"}, {\"authorId\": \"2267681569\", \"name\": \"Kui Zhao\"}, {\"authorId\": \"2108082754\", \"name\": \"Yanqi Zhang\"}, {\"authorId\": \"2268025561\", \"name\": \"Tiancheng Zhou\"}, {\"authorId\": \"2265647316\", \"name\": \"Guangjin Pan\"}], \"abstract\": \"PPM1A is a member of the serine/threonine protein phosphatase family. It can bind to a variety of proteins to dephosphorylate them, and extensively regulates many life activities such as cell growth, cell stress, immune response, and tumor formation. Here we constructed a human induced pluripotent stem cell (hiPSC) line with knockout of PPM1A using CRISPR/Cas9-mediated gene targeting. This cell line exhibits normal karyotype, pluripotency, and trilineage differentiation potential, which could provide a useful cellular resource for exploring the mechanism of PPM1A in regulating downstream signaling pathways and explore the application of PPM1A in anti-tumor and anti-infection.\"}, {\"paperId\": \"05c09519885ff4a8907184888248cc336b829cf7\", \"externalIds\": {\"DOI\": \"10.1007/s11274-024-03924-0\", \"CorpusId\": 267782037, \"PubMed\": \"38386219\"}, \"title\": \"Insights into the complementation potential of the extreme acidophile\\u2019s orthologue in replacing Escherichia coli hfq gene\\u2014particularly in bacterial resistance to environmental stress\", \"venue\": \"World Journal of Microbiology & Biotechnology\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s11274-024-03924-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s11274-024-03924-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146226996\", \"name\": \"Wenbo Hu\"}, {\"authorId\": \"2272831634\", \"name\": \"Xingyu Huo\"}, {\"authorId\": \"2272738810\", \"name\": \"Haochen Bai\"}, {\"authorId\": \"2273070757\", \"name\": \"Zongling Chen\"}, {\"authorId\": \"2284987921\", \"name\": \"Jianxin Zhang\"}, {\"authorId\": \"2284529410\", \"name\": \"Hailin Yang\"}, {\"authorId\": \"6145935\", \"name\": \"S. Feng\"}], \"abstract\": null}, {\"paperId\": \"05c4aacbe03ec0add09f40c902a5b54f71af5398\", \"externalIds\": {\"PubMedCentral\": \"9226586\", \"DOI\": \"10.3389/fpls.2022.878037\", \"CorpusId\": 246601576, \"PubMed\": \"35755703\"}, \"title\": \"Knock-Out of CmNAC-NOR Affects Melon Climacteric Fruit Ripening\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 35, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.878037/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9226586, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145117688\", \"name\": \"Bin Liu\"}, {\"authorId\": \"2007625094\", \"name\": \"Miguel Santo Domingo\"}, {\"authorId\": \"1399713536\", \"name\": \"Carlos Mayobre\"}, {\"authorId\": \"1398418496\", \"name\": \"A. M. Mart\\u00edn-Hern\\u00e1ndez\"}, {\"authorId\": \"153584761\", \"name\": \"M. Pujol\"}, {\"authorId\": \"1399713483\", \"name\": \"J. Garcia-Mas\"}], \"abstract\": \"Fruit ripening is an important process that affects fruit quality. In melon, ETHQV6.3, a QTL involved in climacteric ripening regulation, was previously found to be encoded by CmNAC-NOR, a homologue of the tomato NOR gene. To further investigate CmNAC-NOR function we have obtained two CRISPR/Cas9 mediated mutants (nor-3 and nor-1) in the climacteric V\\u00e9drantais background. nor-3, containing a 3-bp deletion altering the NAC domain A, resulted in ~8 days delay of ripening without affecting fruit quality. In contrast, nor-1 contained a 1-bp deletion resulting in a fully disrupted NAC domain, which completely blocked climacteric ripening. nor-1 fruits did not produce ethylene, abscission layer was not formed and there was no external color change. Additionally, volatile components were dramatically altered, seeds were not well developed and flesh firmness was also altered. nor-1 allele in heterozygosis showed ~20 days delay of fruit ripening. Our results provide new information regarding the function of CmNAC-NOR in melon fruit ripening, suggesting that it as a potential target to modulate shelf life in climacteric melon commercial varieties.\"}, {\"paperId\": \"05c660429691ea957545e169efa7f57fc8fbf6d0\", \"externalIds\": {\"DOI\": \"10.1182/blood-2024-204496\", \"CorpusId\": 274551998}, \"title\": \"Characterization of a Colony Stimulating Factor Receptor (CSF1R) Upstream Regulatory Element in Haematopoiesis\", \"venue\": \"Blood\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2024-204496?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2024-204496, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2334154866\", \"name\": \"Sebastien Jacquelin\"}, {\"authorId\": \"2334156970\", \"name\": \"Emma Maxwell\"}, {\"authorId\": \"2334155850\", \"name\": \"Cameron Flegg\"}, {\"authorId\": \"2334191736\", \"name\": \"Yajun Liu\"}, {\"authorId\": \"2130600202\", \"name\": \"Isis Taylor\"}, {\"authorId\": \"2334155845\", \"name\": \"Ginell N. Ranpura\"}, {\"authorId\": \"2161334434\", \"name\": \"Fathima Nooru-Mohamed\"}, {\"authorId\": \"2334154845\", \"name\": \"Kamil A. Sokolowski\"}, {\"authorId\": \"2074238307\", \"name\": \"Anthony Adamson\"}, {\"authorId\": \"2246605948\", \"name\": \"Katharine M. Irvine\"}, {\"authorId\": \"2260877891\", \"name\": \"David A. Hume\"}], \"abstract\": \"\\n \\n Colony stimulating factor 1 receptor (CSF1R) signalling regulates the development and differentiation of myelomonocytic cells. In the embryo, Csf1r mRNA is expressed by placental trophoblasts, but otherwise expression is restricted to myeloid lineages. During myeloid differentiation, CSF1R is first expressed in multipotent progenitors (MPP), particularly MPP3. CSF1R expression provides a marker for cells of the mononuclear phagocyte system. We have identified multiple regulatory elements within the mouse Csf1r locus that contribute to lineage-specific expression. We previously demonstrated that the deletion of a conserved intronic enhancer, the fms-intronic regulatory element, led to selective loss of tissue-resident macrophages (TRM), in a transgenic mouse model. Here we focus on a second 150 bp conserved element lying immediately 5' of the first coding exon which we have called CSF1R Upstream Element A (CUREA). Previous studies using multicopy transgenic reporters indicated that CUREA was required for expression in TRM.\\n To investigate the function of CUREA in myelopoiesis, we generated CUREA-/- mice using ribonucleoprotein complex (CRISPR-Cas9 and synthetic SgRNAs) injected into zygotes from the Csf1r-T2A-FusionRed reporter. Homozygous mutant mice were healthy, fertile, and did not exhibit any of the deleterious phenotypes found in Csf1r knockout mice. CUREA-/- mice showed an accumulation of long-term haematopoietic stem cells (HSCs) (13.3% vs. 10.4% in controls, p=0.0046) and short-term HSCs (15.5% vs. 18.2% in controls, p=0.013), associated with a concomitant decrease in the MPP3 population (57.6% vs. 62.9% in controls, p=0.0026). qPCR analysis showed decreased Csf1r transcript levels in bone marrow Lin-SCA+C-KIT+ and MPP3 cells in CUREA mutants (\\u039452.3% vs. control, p=0.0058 and \\u039423.3% vs. control, p=0.011, respectively) and splenocytes (\\u039414.7% vs. control, p<0.0001) from mutant mice. Despite the reduction in mRNA levels, no significant changes in CSF1R expression between CUREA+/+ and CUREA-/- were detected in HSPCs or MNCs by flow cytometry. Accordingly, TRM density in the brain, lung, kidney, heart, spleen, liver, and fat did not differ between CUREA+/+ and CUREA-/- mice. In vitro, responses to CSF1, assessed by proliferation, differentiation, and CSF1R protein expression, were not altered in bone marrow-derived macrophages. We observed no differences in the accumulation and mobilization of monocytes following in vivo injection of CSF1 in the bone marrow, blood, and spleen of CUREA+/+ and CUREA-/- mice. To evaluate the impact of CUREA deletion on stress haematopoiesis, we administered cyclophosphamide to mice, but there was no significant change in monocyte mobilization following chemotherapy administration in the mutant mice. In overview, the CUREA element contributes to the early induction of Csf1r mRNA during myeloid differentiation but is redundant for sustained expression in macrophages.\\n In line with the previously reported role of this element, in vitro osteoclast differentiation from bone marrow precursors was delayed in CUREA-/- mice, associated with decreased Csf1r transcript levels after 7 days of culture (\\u039417.6% vs. control, p=0.0254). 5' RACE confirmed the disappearance of the osteoclast-specific CSF1R transcription start site (TSS) in CUREA-/- mice. To assess if the delayed osteoclast growth impacts bone remodelling in vivo, we performed micro-CT scans on the femurs of 12-week-old mice. We observed changes in trabecular bone complexity, highlighted by increased trabecular bone and thickness, associated with reduced space within trabecular bone in CUREA-/- mice.\\n Collectively, our data shows that CUREA enhances myeloid differentiation of HSCs. CUREA deletion leads to accumulation of long term-HSCs and short term-HSCs and is associated with a decrease in MPP3. 5\\u2018 RACE demonstrated that CUREA functions as an enhancer but not as a promoter in HSCs and myelomonocytic cells. In contrast, CUREA is required to generate additional TSS in osteoclasts and promote osteoclast differentiation in vitro and function in vivo. This work provides new insight into the understanding of the function of CUREA and more generally, provides evidence that HSPCs\\u2019 stemness and differentiation can be modulated by targeting selected regulatory elements.\\n\"}, {\"paperId\": \"05c9821f9cc9c7c6975afd59798c9a0bb861b031\", \"externalIds\": {\"DOI\": \"10.1210/endocr/bqac181\", \"CorpusId\": 253160670, \"PubMed\": \"36288554\"}, \"title\": \"ZBTB20 Regulates Prolactin Expression and Lactotrope Function in Adult Mice.\", \"venue\": \"Endocrinology\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/endo/article-pdf/163/12/bqac181/47030406/bqac181.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1210/endocr/bqac181?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1210/endocr/bqac181, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2189013614\", \"name\": \"Qing Han\"}, {\"authorId\": \"2189074994\", \"name\": \"Xuede Yan\"}, {\"authorId\": \"2291744058\", \"name\": \"Yufei Ye\"}, {\"authorId\": \"2189106692\", \"name\": \"Linhui Han\"}, {\"authorId\": \"5525324\", \"name\": \"Xianhua Ma\"}, {\"authorId\": \"2189134272\", \"name\": \"Ting Wang\"}, {\"authorId\": \"37097124\", \"name\": \"Dongmei Cao\"}, {\"authorId\": \"2155280809\", \"name\": \"Weiping J. Zhang\"}], \"abstract\": \"Lactotropes are prolactin (PRL)-secreting endocrine cells in anterior pituitary. We have established the zinc finger protein ZBTB20 as an essential transcription factor for lactotrope specification, the disruption of which results in complete loss of lactotropes in mice. However, the potential role of ZBTB20 in mature lactotropes remains unclear. Here we demonstrate that ZBTB20 acts as a critical cell-autonomous regulator for PRL expression in mature lactotropes in adult mice. Via a CRISPR/Cas9 approach, we first generated a tamoxifen-inducible Prl-CreER knock-in mouse line, which could efficiently mediate gene recombination specifically in lactotropes. Conditional deletion of the Zbtb20 gene specifically in mature lactotropes at adulthood led to a substantial decrease in PRL levels both in pituitary and in plasma, without significant alterations of lactotrope relative density in the pituitary from male or female mice. Furthermore, conditional disruption of Zbtb20 in adult female mice did not significantly change pregnancy-elicited lactotrope expansion, but caused an impaired mammary gland expansion and lactation due to the PRL defect. Thus, our data point to an important role of ZBTB20 in regulating PRL expression and lactotrope function at adulthood.\"}, {\"paperId\": \"05cdc1697a647d5021f4c277a677feb55741ac59\", \"externalIds\": {\"DOI\": \"10.3390/horticulturae9080934\", \"CorpusId\": 260977291}, \"title\": \"Application and Expansion of Virus-Induced Gene Silencing for Functional Studies in Vegetables\", \"venue\": \"Horticulturae\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2311-7524/9/8/934/pdf?version=1692252733\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3390/horticulturae9080934?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3390/horticulturae9080934, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11032852\", \"name\": \"Z. Wang\"}, {\"authorId\": \"92982600\", \"name\": \"S. Cao\"}, {\"authorId\": \"47158361\", \"name\": \"Xin-gang Xu\"}, {\"authorId\": \"49990611\", \"name\": \"Yanjun He\"}, {\"authorId\": \"70273851\", \"name\": \"Weisong Shou\"}, {\"authorId\": \"1473661827\", \"name\": \"Eduardo D. Munaiz\"}, {\"authorId\": \"2110964785\", \"name\": \"Chao Yu\"}, {\"authorId\": \"49927502\", \"name\": \"Jia Shen\"}], \"abstract\": \"Increased consumption of vegetables has been recommended worldwide as a part of a healthy diet; therefore, determining gene function among breeding materials is crucial for vegetable improvement to meet the sustainable development of new vegetable varieties. However, genetic transformation is time-consuming and laborious, which limits the exploration of gene function for various vegetable crops. Virus-Induced Gene Silencing (VIGS) can perform large-scale and rapid gene silencing in plants due to a reduction in the experimental period and its independence from the stable genetic transformation, providing an excellent opportunity for functional research. VIGS can accelerate model plant research and make it easier to analyze gene function and validation in vegetable crops. Moreover, with the advent of technologies such as virus-mediated heterologous protein expression and the development of CRISPR/Cas9 technology, virus-mediated genetic tools have ushered in a new era in genetics and crop improvement. This study summarizes recent achievements in VIGS and Virus-Induced Gene Editing (VIGE) in vegetables. We also identify several challenges in the current state of VIGS technology in vegetables, serving as a guide for future research.\"}, {\"paperId\": \"05cf18f5f13a7e41ec909c9b3d9974abaa008712\", \"externalIds\": {\"DOI\": \"10.1016/j.freeradbiomed.2023.05.003\", \"CorpusId\": 258646668, \"PubMed\": \"37179033\"}, \"title\": \"An antioxidant response element regulates the HIF1\\u03b1 axis in breast cancer cells.\", \"venue\": \"Free Radical Biology & Medicine\", \"year\": 2023, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.sciencedirect.com/science/article/am/pii/S0891584923004070\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.freeradbiomed.2023.05.003?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.freeradbiomed.2023.05.003, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8979364\", \"name\": \"Sarah E. Lacher\"}, {\"authorId\": \"2346630045\", \"name\": \"Cara Skon-Hegg\"}, {\"authorId\": \"3987264\", \"name\": \"B. Ruis\"}, {\"authorId\": \"88948236\", \"name\": \"Jennifer Krznarich\"}, {\"authorId\": \"12802591\", \"name\": \"Matthew Slattery\"}], \"abstract\": \"The redox sensitive transcription factor NRF2 is a central regulator of the transcriptional response to reactive oxygen species (ROS). NRF2 is widely recognized for its ROS-responsive upregulation of antioxidant genes that are essential for mitigating the damaging effects of oxidative stress. However, multiple genome-wide approaches have suggested that NRF2's regulatory reach extends well beyond the canonical antioxidant genes, with the potential to regulate many noncanonical target genes. Recent work from our lab and others suggests HIF1A, which encodes the hypoxia-responsive transcription factor HIF1\\u03b1, is one such noncanonical NRF2 target. These studies found that NRF2 activity is associated with high HIF1A expression in multiple cellular contexts, HIF1A expression is partially dependent on NRF2, and there is a putative NRF2 binding site (antioxidant response element, or ARE) approximately 30 kilobases upstream of HIF1A. These findings all support a model in which HIF1A is a direct target of NRF2, but did not confirm the functional importance of the upstream ARE in HIF1A expression. Here we use CRISPR/Cas9 genome editing to mutate this ARE in its genomic context and test the impact on HIF1A expression. We find that mutation of this ARE in a breast cancer cell line (MDA-MB-231) eliminates NRF2 binding and decreases HIF1A expression at the transcript and protein levels, and disrupts HIF1\\u03b1 target genes as well as phenotypes driven by these HIF1\\u03b1 targets. Taken together, these results indicate that this NRF2 targeted upstream ARE plays an important role in the expression of HIF1A and activity of the HIF1\\u03b1 axis in MDA-MB-231\\u202fcells.\"}, {\"paperId\": \"05d23f6bd866e109b4cf32a8d4af10d78d0d0aa2\", \"externalIds\": {\"PubMedCentral\": \"8087769\", \"DOI\": \"10.1038/s41467-021-22750-8\", \"CorpusId\": 233470938, \"PubMed\": \"33931647\"}, \"title\": \"Cut-like homeobox 1 (CUX1) tumor suppressor gene haploinsufficiency induces apoptosis evasion to sustain myeloid leukemia\", \"venue\": \"Nature Communications\", \"year\": 2021, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-021-22750-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8087769, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6197236\", \"name\": \"Emmanuelle Supper\"}, {\"authorId\": \"48084088\", \"name\": \"S. Rudat\"}, {\"authorId\": \"1853035\", \"name\": \"V. Iyer\"}, {\"authorId\": \"2455853\", \"name\": \"A. Droop\"}, {\"authorId\": \"3199852\", \"name\": \"K. Wong\"}, {\"authorId\": \"1963031\", \"name\": \"Jean-Fran\\u00e7ois Spinella\"}, {\"authorId\": \"2376228223\", \"name\": \"Patrick Thomas\"}, {\"authorId\": \"2389317\", \"name\": \"G. Sauvageau\"}, {\"authorId\": \"145669576\", \"name\": \"D. Adams\"}, {\"authorId\": \"48945289\", \"name\": \"Chi C. Wong\"}], \"abstract\": \"While oncogenes promote tumorigenesis, they also induce deleterious cellular stresses, such as apoptosis, that cancer cells must combat by coopting adaptive responses. Whether tumor suppressor gene haploinsufficiency leads to such phenomena and their mechanistic basis is unclear. Here, we demonstrate that elevated levels of the anti-apoptotic factor, CASP8 and FADD-like apoptosis regulator (CFLAR), promotes apoptosis evasion in acute myeloid leukemia (AML) cells haploinsufficient for the cut-like homeobox 1 (CUX1) transcription factor, whose loss is associated with dismal clinical prognosis. Genome-wide CRISPR/Cas9 screening identifies CFLAR as a selective, acquired vulnerability in CUX1-deficient AML, which can be mimicked therapeutically using inhibitor of apoptosis (IAP) antagonists in murine and human AML cells. Mechanistically, CUX1 deficiency directly alleviates CUX1 repression of the CFLAR promoter to drive CFLAR expression and leukemia survival. These data establish how haploinsufficiency of a tumor suppressor is sufficient to induce advantageous anti-apoptosis cell survival pathways and concurrently nominate CFLAR as potential therapeutic target in these poor-prognosis leukemias. Cut-like homeobox 1 (CUX1) is a haploinsufficient tumor suppressor commonly inactivated in acute myeloid leukemia and high-risk myelodysplasia. Here, in a genetically modified murine model, the authors show that CUX1 deficiency impairs apoptosis leading to leukemia when combined with mutant Flt3-ITD.\"}, {\"paperId\": \"05d4babf9e6633fcec6336fbc48c50b4087beb09\", \"externalIds\": {\"DOI\": \"10.1111/bjd.20086\", \"CorpusId\": 233349414, \"PubMed\": \"33885149\"}, \"title\": \"Neutrophil trafficking: the missing link in the pathogenesis of hidradenitis suppurativa\", \"venue\": \"British Journal of Dermatology\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/bjd.20086?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/bjd.20086, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1381717153\", \"name\": \"E. Giamarellos\\u2010Bourboulis\"}], \"abstract\": \"TRX2 and protects retinal cells from oxidative stress-induced apoptosis. Biochim Biophys Acta 2014; 1842:1121\\u20139. 7 Meyer JM, Lee E, Celli A et al. CERKL is upregulated in cutaneous squamous cell carcinoma and maintains cellular sphingolipids and resistance to oxidative stress. Br J Dermatol 2021; 185:147\\u201352. 8 Fujiwara K, Yazama H, Donishi R et al. Inhibitory effects of glucosylceramide on tumorigenesis induced by a carcinogen in mice. Laryngoscope 2020; 130:E593\\u20137. 9 Dom enech EB, Andr es R, L opez-Iniesta MJ et al. A new Cerkl mouse model generated by CRISPR-Cas9 shows progressive retinal degeneration and altered morphological and electrophysiological phenotype. Invest Ophthalmol Vis Sci 2020; 61:14.\"}, {\"paperId\": \"05d6894f70f1630c22b282e52a2793dbe6762914\", \"externalIds\": {\"DOI\": \"10.2337/db24-1517-p\", \"CorpusId\": 270536497}, \"title\": \"1517-P: Rev-Erba as an Intermediate between Regulation of Circadian Rhythm and Skeletal Muscle Insulin Sensitivity\", \"venue\": \"Diabetes\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2337/db24-1517-p?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2337/db24-1517-p, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2306659775\", \"name\": \"V. Mu\\u00f1oz\"}, {\"authorId\": \"2307486642\", \"name\": \"Ana Pinto\"}, {\"authorId\": \"2278818963\", \"name\": \"Marsel Lino\"}, {\"authorId\": \"2306862287\", \"name\": \"A. Silva\"}, {\"authorId\": \"5781036\", \"name\": \"C. RONALD KAHN\"}], \"abstract\": \"Rev-Erb\\u03b1 is a nuclear receptor involved in the control of circadian rhythm and regulates the transcription of many metabolic genes. Skeletal muscle is responsible for >75% of postprandial glucose uptake, and this is significantly reduced in insulin-resistant and type 2 diabetic (T2D) individuals. To determine the potential role of Rev-Erb\\u03b1 in muscle in T2D, we have used human induced pluripotent stem cells (iPSCs) from control and T2D patients differentiated into myoblasts (iMyos) to study its role in insulin action and metabolism in the absence of confounding circulating factors. We find that iMyos from T2D donors have a 25% decrease (p=0.005) in the Rev-Erb\\u03b1 mRNA expression, and this is paralleled by a 35% decrease (p=0.03) in Rev-Erb\\u03b1 protein. This is also accompanied by significant 22-45% reductions in insulin-stimulated phosphorylation of pIR\\u03b2Y1146, pIRS1Y895, pAktS473, pGSK3\\u03b2S9, and an ~30% decrease in insulin-stimulated glucose uptake. Treatment of T2D iMyos with a Rev-Erb\\u03b1 agonist rescues the impaired glucose uptake in the T2D cells to control levels. CRISPR/Cas9 knockout of Rev-Erb\\u03b1 in murine C2C12 muscle cells results in reduced insulin-stimulated insulin signaling and glucose uptake, paralleling the defects observed in the human T2D iMyos. RNAseq analysis of these knockout cells revealed changes in expression of genes associated with insulin action, including downregulation of Irs2, Gab1, and Shc2. Combining these data with Rev-Erb\\u03b1 ChipSeq data identified 150 genes in the Rev-Erb\\u03b1-/- cells that are directly targeted and repressed by Rev-Erb\\u03b1 via its binding in the promoter region. These genes are enriched in pathways related to mitochondria physiology and insulin resistance. Taken together, these data demonstrate that Rev-Erb\\u03b1 provides cross-talk between circadian regulation and metabolism by acting as a positive regulator of insulin sensitivity, glucose uptake and mitochondrial function, and this process is attenuated in skeletal muscle in human T2D.\\n \\n \\n V.R. Mu\\u00f1oz: None. A.S.R. Pinto: None. M. Lino: None. A.S.R. Silva: None. C. Kahn: Consultant; Cellarity. Other Relationship; 1825 Therapeutics. Advisory Panel; TIXiMED, Senseion, ERX.\\n\"}, {\"paperId\": \"05d79cd12ab46e33f146d86d11cc162781f2a6cc\", \"externalIds\": {\"PubMedCentral\": \"9122650\", \"DOI\": \"10.1093/hmg/ddab344\", \"CorpusId\": 245538520, \"PubMed\": \"34964473\"}, \"title\": \"Interpreting ciliopathy-associated missense variants of uncertain significance (VUS) in Caenorhabditis elegans\", \"venue\": \"Human Molecular Genetics\", \"year\": 2021, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hmg/article-pdf/31/10/1574/43755170/ddab344.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9122650, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"32379230\", \"name\": \"Karen I. Lange\"}, {\"authorId\": \"144905674\", \"name\": \"Sunayna Best\"}, {\"authorId\": \"4351164\", \"name\": \"S. Tsiropoulou\"}, {\"authorId\": \"46770272\", \"name\": \"Ian R Berry\"}, {\"authorId\": \"21722111\", \"name\": \"Colin A. Johnson\"}, {\"authorId\": \"37729041\", \"name\": \"O. Blacque\"}], \"abstract\": \"Abstract Better methods are required to interpret the pathogenicity of disease-associated variants of uncertain significance (VUS), which cannot be actioned clinically. In this study, we explore the use of an animal model (Caenorhabditis elegans) for in vivo interpretation of missense VUS alleles of TMEM67, a cilia gene associated with ciliopathies. CRISPR/Cas9 gene editing was used to generate homozygous knock-in C. elegans worm strains carrying TMEM67 patient variants engineered into the orthologous gene (mks-3). Quantitative phenotypic assays of sensory cilia structure and function (neuronal dye filling, roaming and chemotaxis assays) measured how the variants impacted mks-3 gene function. Effects of the variants on mks-3 function were further investigated by looking at MKS-3::GFP localization and cilia ultrastructure. The quantitative assays in C. elegans accurately distinguished between known benign (Asp359Glu, Thr360Ala) and known pathogenic (Glu361Ter, Gln376Pro) variants. Analysis of eight missense VUS generated evidence that three are benign (Cys173Arg, Thr176Ile and Gly979Arg) and five are pathogenic (Cys170Tyr, His782Arg, Gly786Glu, His790Arg and Ser961Tyr). Results from worms were validated by a genetic complementation assay in a human TMEM67 knock-out hTERT-RPE1 cell line that tests a TMEM67 signalling function. We conclude that efficient genome editing and quantitative functional assays in C. elegans make it a tractable in vivo animal model for rapid, cost-effective interpretation of ciliopathy-associated missense VUS alleles.\"}, {\"paperId\": \"05d97d5359fd20397fb48ff965965ca38ac9efb7\", \"externalIds\": {\"MAG\": \"3016418327\", \"DOI\": \"10.1007/s10529-020-02887-0\", \"CorpusId\": 215794289, \"PubMed\": \"32300998\"}, \"title\": \"A simple approach to mediate genome editing in the filamentous fungus Trichoderma reesei by CRISPR/Cas9-coupled in vivo gRNA transcription\", \"venue\": \"Biotechnology Letters\", \"year\": 2020, \"citationCount\": 22, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10529-020-02887-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10529-020-02887-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46740704\", \"name\": \"Chuan Wu\"}, {\"authorId\": \"2143357759\", \"name\": \"Yumeng Chen\"}, {\"authorId\": \"2162835253\", \"name\": \"Y. Qiu\"}, {\"authorId\": \"2075393508\", \"name\": \"Xiao Niu\"}, {\"authorId\": \"1634529069\", \"name\": \"Ningjian Zhu\"}, {\"authorId\": \"2155099778\", \"name\": \"Jie Chen\"}, {\"authorId\": \"2112202367\", \"name\": \"Hong Yao\"}, {\"authorId\": \"40451577\", \"name\": \"Wei Wang\"}, {\"authorId\": \"12020015\", \"name\": \"Yushu Ma\"}], \"abstract\": null}, {\"paperId\": \"05da3eb0e333d7a57dad88cb0b7c2dffb24a3493\", \"externalIds\": {\"PubMedCentral\": \"8508519\", \"DOI\": \"10.3390/cancers13194831\", \"CorpusId\": 238741024, \"PubMed\": \"34638315\"}, \"title\": \"Profiling Cisplatin Resistance in Head and Neck Cancer: A Critical Role of the VRAC Ion Channel for Chemoresistance\", \"venue\": \"Cancers\", \"year\": 2021, \"citationCount\": 27, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2072-6694/13/19/4831/pdf?version=1632902211\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8508519, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50844680\", \"name\": \"S. Siemer\"}, {\"authorId\": \"4217249\", \"name\": \"T. Fauth\"}, {\"authorId\": \"138620328\", \"name\": \"Paul Scholz\"}, {\"authorId\": \"2132342712\", \"name\": \"Yara Al-Zamel\"}, {\"authorId\": \"78714001\", \"name\": \"A. Khamis\"}, {\"authorId\": \"2081869908\", \"name\": \"D\\u00e9sir\\u00e9e G\\u00fcl\"}, {\"authorId\": \"21645739\", \"name\": \"L. Freudelsperger\"}, {\"authorId\": \"2292050\", \"name\": \"B. Wollenberg\"}, {\"authorId\": \"116782669\", \"name\": \"S. Becker\"}, {\"authorId\": \"5541358\", \"name\": \"R. Stauber\"}, {\"authorId\": \"50144349\", \"name\": \"J. Hagemann\"}], \"abstract\": \"Simple Summary Treatment success of head and neck cancers (HNSCC) is often hindered by chemoresistance. In this study, next-generation sequencing transcriptomics and CRISPR/Cas9 knockout strategies were used to identify cisplatin resistance mechanisms and potential (personalized) biomarkers. Moreover, employing a tiered experimental pipeline, the cisplatin uptake transporter VRAC was found to be critical for cisplatin sensitivity and specificity in 2D/3D-HNSCC cell culture models as well as for tumor relapses in the clinical setting. Our study suggests exploiting VRAC as a potential drug target as well as a personalized prognostic biomarker to improve the treatment of HNSCC patients in the future. Abstract Treatment success of head and neck cancers (HNSCC) is often hindered by tumor relapses due to therapy resistances. This study aimed at profiling cisplatin resistance mechanisms and identifying biomarkers potentially suitable as drug targets and for patient stratification. Bioinformatic analyses of suggested resistance factors in a cohort of 565 HNSCC patients identified the VRAC ion channel as a clinically relevant indicator for recurrent diseases following radiochemotherapy (p = 0.042). Other drug import/export transporters, such as CTR1, OCT1, or MRP1, were found to be less relevant. To experimentally verify VRAC\\u2019s critical role for cisplatin resistance, we used CRISPR/Cas9 knockout resulting in cisplatin-resistant HNSCC cells, which could be resensitized by VRAC expression. Next-generation sequencing further underlined VRAC\\u2019s importance and identified VRAC-regulated signaling networks, potentially also contributing to cisplatin resistance. CTR1, OCT1, or MRP1 did not contribute to increased cisplatin resistance. In addition to two-dimensional HNSCC models, three-dimensional tumor spheroid cultures confirmed VRAC\\u2019s unique role for cisplatin sensitivity. Here, resistance correlated with DNA damage and downstream apoptosis. The cisplatin specificity of the identified VRAC pathway was verified by testing paclitaxel and doxorubicin. Our results were independently confirmed in naturally occurring, cisplatin-resistant HNSCC cancer cell models. Collectively, we here demonstrate VRAC\\u2019s role for cisplatin resistance in HNSCC and its relevance as a potential drug target and/or prognostic biomarker for chemotherapy resistance.\"}, {\"paperId\": \"05db8d5146707d667516d894067c8635a13e5573\", \"externalIds\": {\"DOI\": \"10.1101/2024.09.27.615478\", \"CorpusId\": 273053065}, \"title\": \"Ligase-mediated programmable genomic integration (L-PGI): an efficient site-specific gene editing system that overcomes the limitations of reverse transcriptase-based editing systems\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.09.27.615478?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.09.27.615478, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2323939281\", \"name\": \"A. X. Nan\"}, {\"authorId\": \"2323939288\", \"name\": \"Michael Chickering\"}, {\"authorId\": \"2323939692\", \"name\": \"Christopher L Bartolome\"}, {\"authorId\": \"2397741416\", \"name\": \"Neeta Shadija\"}, {\"authorId\": \"2323953576\", \"name\": \"Dan Li\"}, {\"authorId\": \"2316994562\", \"name\": \"B. Estes\"}, {\"authorId\": \"2323939285\", \"name\": \"Jessica Von Stetina\"}, {\"authorId\": \"2324058065\", \"name\": \"Wei Li\"}, {\"authorId\": \"2323939363\", \"name\": \"Jason Andresen\"}, {\"authorId\": \"2316994653\", \"name\": \"Jesse C. Cochrane\"}, {\"authorId\": \"2323940929\", \"name\": \"Chen Bai\"}, {\"authorId\": \"2323939279\", \"name\": \"Jason T. Gatlin\"}, {\"authorId\": \"2318842803\", \"name\": \"Jie Wang\"}, {\"authorId\": \"2316994150\", \"name\": \"Davood Norouzi\"}, {\"authorId\": \"2318363014\", \"name\": \"Sandeep Kumar\"}, {\"authorId\": \"2323940201\", \"name\": \"Maike Thamsen Dunyak\"}, {\"authorId\": \"2323940139\", \"name\": \"Leonard Chavez\"}, {\"authorId\": \"2323940163\", \"name\": \"A. Seth\"}, {\"authorId\": \"51144397\", \"name\": \"Shakked O. Halperin\"}, {\"authorId\": \"2263754890\", \"name\": \"Jonathan D. Finn\"}, {\"authorId\": \"2317038015\", \"name\": \"Jenny Xie\"}], \"abstract\": null}, {\"paperId\": \"05deb4129b0210ed1b0b99e7ded7734433c9f78f\", \"externalIds\": {\"MAG\": \"3036466965\", \"DOI\": \"10.1177/2472555220927692\", \"CorpusId\": 219972197, \"PubMed\": \"32567999\"}, \"title\": \"Functional Genomics for Target Identification\", \"venue\": \"SLAS discovery : advancing life sciences R & D\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.sagepub.com/doi/pdf/10.1177/2472555220927692\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1177/2472555220927692?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1177/2472555220927692, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49362062\", \"name\": \"D. Gianni\"}, {\"authorId\": \"3495172\", \"name\": \"S. Farrow\"}], \"abstract\": \"A major objective of biomedical research is to define how genes and their products function together in physiology and disease. Functional genomics is the study of how genes and pathways contribute to disease. Functional genomics screens allow us to systematically perturb large numbers of genes or proteins, revealing cellular phenotypes that enable one to infer gene function. The first functional genomics screens were run in simple organisms, such as yeast, and these efforts have revealed basic principles of eukaryotic biology and cell homeostasis. However, despite the enormous value of functional genomics efforts in model eukaryotes, human pathology cannot be fully modeled in single-cell organisms such as yeast. Therefore, in order to realize the full potential of functional genomics, particularly in the setting of human disease, there has been a continuous drive to employ more advanced and predictive models in functional genomics screens. This trend is exemplified by several reports in this special issue, where more translatable cell and animal models are reviewed and demonstrated in functional genomics screens. From a technological perspective, before the advent of CRISPR, three main technologies enabled functional genomics efforts in mammalian systems: (1) random mutagenesis using chemicals, transposons, or retroviruses; (2) RNA interference (RNAi) technology in its different iterations (siRNA, shRNA, etc.); and (3) cDNA overexpression screens that allowed researchers to associate the effect of the overexpression of any given gene with a cellular phenotype. Together, these three approaches have revealed basic biological principles that are relevant for enhanced understanding of human disease mechanisms, but their impact has been restricted by issues such as off-target effects and incomplete penetrance. Based on the perturbation modality of choice, functional genomics screens can be further classified into (1) genetic (which use approaches such as gRNA, siRNA, or cDNA) or (2) nongenetic (which use external agents such as small molecules or protein). Although the latter really belong to the category of \\u201cfunctional proteomics\\u201d screens, for simplicity they are often grouped under the umbrella of \\u201cfunctional genomics.\\u201d While genetic screens employing RNAi technology are still employed, the majority of genetic functional genomics screens are now run using the CRISPR/Cas9 technology in its various forms, allowing the generation of gene knockout (CRISPRn), gene downregulation (CRISPRi), and gene upregulation (CRISPRa) in mammalian cells at scale. Phenotypic screening using small-molecule libraries requires significant investment in target deconvolution experiments; consequently, functional genomics efforts employing protein libraries are gaining traction due to the relatively small size of the library compared with other screening libraries and the lack of cell manipulation needed to enable screening. Notably, in this special issue we have collected reports on both genetic and nongenetic functional genomics screens, illustrating the great variety of tools available for researchers in this field. Genetic functional genomics screens can be subdivided into pooled and arrayed screens. In pooled screens (almost exclusively performed using lentivirus-based genetic libraries), genetic agents (gRNA or siRNA) are synthesized and cloned in a pool and subsequently infected into cells en masse, that is, all lentiviruses, targeting all genes together in one flask. Deconvoluting screen outputs to correlate gene and phenotype requires next-generation sequencing (NGS), which limits pooled screening to those where the desired phenotype is selectable\\u2014primarily growth-related phenotypes, where the depletion or enrichment of a given genetic agent in the population is used as a method of selection. In contrast, in arrayed screens the agents of choice (gRNA and siRNA) are already distributed into individual wells such that in a single well only a single gene will be targeted. Libraries are available in numerous formats, including chemically synthesized (synthetic), plasmid-\"}, {\"paperId\": \"05df9959daf27d2ed8a6393fb1c2009f35526a73\", \"externalIds\": {\"DOI\": \"10.1021/acs.est.2c06384\", \"CorpusId\": 253837832, \"PubMed\": \"36418022\"}, \"title\": \"OsNRAMP5 Is a Major Transporter for Lead Uptake in Rice.\", \"venue\": \"Environmental Science and Technology\", \"year\": 2022, \"citationCount\": 64, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acs.est.2c06384?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acs.est.2c06384, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12347901\", \"name\": \"Jia-Dong Chang\"}, {\"authorId\": \"2378966837\", \"name\": \"Wei Gao\"}, {\"authorId\": \"2185905791\", \"name\": \"Peng Wang\"}, {\"authorId\": \"144766060\", \"name\": \"F. Zhao\"}], \"abstract\": \"Lead (Pb) is one of the most toxic metals affecting human health globally. Food is an important source of chronic Pb exposure in humans. How Pb is taken up by rice, a staple food for over half of the global population, remains unknown. In the present study, we investigated the role of OsNRAMP5, a member of the NRAMP (Natural Resistance-Associated Macrophage Protein) transporter family, in Pb uptake by rice roots. Heterologous expression of OsNRAMP5 in yeast increased Pb uptake and sensitivity toward Pb. Knockout of OsNRAMP5 in rice by CRISPR/Cas9 gene editing resulted in significant decreases in root uptake of Pb and accumulation in rice shoots. The maximum influx velocity (Vmax) for Pb uptake of the knockout mutants was 70% lower than that of wild-type plants. When grown in Pb-contaminated paddy soil, OsNRAMP5 knockout mutants accumulated approximately 50 and 70% lower Pb concentrations in the grain and straw, respectively, than the wild type. OsNRAMP5 expression in rice roots was not affected by Pb exposure. These results indicate that OsNRAMP5 is a major transporter for Pb uptake in rice, in addition to its role in the uptake of manganese and cadmium. This study provides a mechanistic understanding of Pb uptake in rice plants and a potential strategy to limit Pb accumulation in rice grains.\"}, {\"paperId\": \"05e2fa178110cd84ad0a1939c4785f8ce925b7e8\", \"externalIds\": {\"MAG\": \"3161616563\", \"DOI\": \"10.1016/J.ACVDSP.2021.04.143\", \"CorpusId\": 236558211}, \"title\": \"Generation of iPSC line from MYH7 R403L mutation carrier with HCM and isogenic CRISPR/Cas9 corrected control\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.acvdsp.2021.04.143\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/J.ACVDSP.2021.04.143?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/J.ACVDSP.2021.04.143, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49265403\", \"name\": \"V. Fontaine\"}, {\"authorId\": \"1401866377\", \"name\": \"L. Duboscq-Bidot\"}, {\"authorId\": \"37510247\", \"name\": \"C. Jouve\"}, {\"authorId\": \"1931102841\", \"name\": \"M. Hamlin\"}, {\"authorId\": \"46988076\", \"name\": \"A. Curjol\"}, {\"authorId\": \"82246031\", \"name\": \"V. Briand\"}, {\"authorId\": \"4737342\", \"name\": \"P. Janiak\"}, {\"authorId\": \"50197490\", \"name\": \"J. Hulot\"}, {\"authorId\": \"2051231027\", \"name\": \"M. Pruniaux-Harnist\"}, {\"authorId\": \"2076143695\", \"name\": \"P. Charron\"}, {\"authorId\": \"6951367\", \"name\": \"E. Villard\"}], \"abstract\": null}, {\"paperId\": \"05e5003dd21188803c7e854a2a20a8d37a1afbb9\", \"externalIds\": {\"PubMedCentral\": \"11446356\", \"DOI\": \"10.1016/j.biotno.2024.07.001\", \"CorpusId\": 271496261, \"PubMed\": \"39416688\"}, \"title\": \"Unlocking the potential of biosurfactants: Innovations in metabolic and genetic engineering for sustainable industrial and environmental solutions\", \"venue\": \"Biotechnology Notes\", \"year\": 2024, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.biotno.2024.07.001\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11446356, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"116446845\", \"name\": \"S. Chabhadiya\"}, {\"authorId\": \"2313376133\", \"name\": \"D.K. Acharya\"}, {\"authorId\": \"3879497\", \"name\": \"A. Mangrola\"}, {\"authorId\": \"2297081997\", \"name\": \"Rupal Shah\"}, {\"authorId\": \"2313367772\", \"name\": \"Edwin A. Pithawala\"}], \"abstract\": \"Biosurfactants, synthesized by microorganisms, hold potential for various industrial and environmental applications due to their surface-active properties and biodegradability. Metabolic and genetic engineering strategies enhance biosurfactant production by modifying microbial pathways and genetics. Strategies include optimizing biosurfactant biosynthesis pathways, expanding substrate utilization, and improving stress responses. Genetic engineering allows customization of biosurfactant characteristics to meet industrial needs. Notable examples include engineering Pseudomonas aeruginosa for enhanced rhamnolipid production and creating synthetic biosurfactant pathways in non-native hosts like Escherichia coli. CRISPR-Cas9 technology offers precise tools for genetic manipulation, enabling targeted gene disruption and promoter optimization to enhance biosurfactant production efficiency. Synthetic promoters enable precise control over biosurfactant gene expression, contributing to pathway optimization across diverse microbial hosts. The future of biosurfactant research includes sustainable bio-processing, customized biosurfactant engineering, and integration of artificial intelligence and systems biology. Advances in genetic and metabolic engineering will enable tailor-made biosurfactants for diverse applications, with potential for industrial-scale production and commercialization. Exploration of untapped microbial diversity may lead to novel biosurfactants with unique properties, expanding the versatility and sustainability of biosurfactant-based solutions.\"}, {\"paperId\": \"05e7458ecbf77229eed3f7dfea253644dd117319\", \"externalIds\": {\"CorpusId\": 247022434}, \"title\": \"Oncogenic Proteins Involved in Persistent HPV Infections, Carcinogenic Potential and Therapeutic Control\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://www.tridhascholars.org/pdfs/oncogenic-proteins-involved-in-persistent-hpv-infections-carcinogenic-potential-and-therapeutic-control-CMJ-05-1057.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50987794\", \"name\": \"A. Udristioiu\"}, {\"authorId\": \"2111085702\", \"name\": \"Adina Martin\"}, {\"authorId\": \"2107651614\", \"name\": \"L. Mart\\u00edn\"}, {\"authorId\": \"2135743108\", \"name\": \"Iulia Farmazon\"}, {\"authorId\": \"1403235575\", \"name\": \"Delia Nica-Badea\"}], \"abstract\": null}, {\"paperId\": \"05eac4f370a336f50523c5fb3c42094cb965a9bb\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2021.102602\", \"CorpusId\": 244365691, \"PubMed\": \"34801429\"}, \"title\": \"Corrigendum to \\\"Generation of two gene corrected human isogenic iPSC lines (NCATS-CL6104 and NCATS-CL6105) from a patient line (NCATS-CL6103) carrying a homozygous p.R401X mutation in the NGLY1 gene using CRISPR/Cas9\\\" [Stem Cell Res. 56 (2021) 102554].\", \"venue\": \"Stem Cell Research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2021.102602\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2021.102602?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2021.102602, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5178413\", \"name\": \"I. Pavlinov\"}, {\"authorId\": \"6810539\", \"name\": \"Atena Farkhondeh\"}, {\"authorId\": \"2155664359\", \"name\": \"Shu Yang\"}, {\"authorId\": \"1600589766\", \"name\": \"Miao Xu\"}, {\"authorId\": \"49096729\", \"name\": \"Yu\\u2010Shan Cheng\"}, {\"authorId\": \"143711633\", \"name\": \"J. Beers\"}, {\"authorId\": \"40400287\", \"name\": \"J. Zou\"}, {\"authorId\": \"2314939822\", \"name\": \"Chengyu Liu\"}, {\"authorId\": \"1993034\", \"name\": \"M. Might\"}, {\"authorId\": \"50854882\", \"name\": \"Steven M. Rodems\"}, {\"authorId\": \"2078239\", \"name\": \"Karsten Baumga\\u0308rtel\"}, {\"authorId\": \"2152412811\", \"name\": \"Wei Zheng\"}], \"abstract\": null}, {\"paperId\": \"05ec97831b3c50f44492b55e68b77a954dc64fa7\", \"externalIds\": {\"DOI\": \"10.1093/hmg/ddad117\", \"CorpusId\": 259947420, \"PubMed\": \"37462524\"}, \"title\": \"COL11A2 as a candidate gene for vertebral malformations and congenital scoliosis.\", \"venue\": \"Human Molecular Genetics\", \"year\": 2023, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10508038\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/hmg/ddad117?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/hmg/ddad117, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"114732737\", \"name\": \"D. Rebello\"}, {\"authorId\": \"6151179\", \"name\": \"Elizabeth S Wohler\"}, {\"authorId\": \"2093459882\", \"name\": \"V. Erfani\"}, {\"authorId\": \"1576257377\", \"name\": \"Guozhuang Li\"}, {\"authorId\": \"144294844\", \"name\": \"Alexya N. Aguilera\"}, {\"authorId\": \"1404342791\", \"name\": \"A. Santiago-Cornier\"}, {\"authorId\": \"50623832\", \"name\": \"Sen Zhao\"}, {\"authorId\": \"4564162\", \"name\": \"Steven W. Hwang\"}, {\"authorId\": \"2057731940\", \"name\": \"R. Steiner\"}, {\"authorId\": \"1625398671\", \"name\": \"T. Zhang\"}, {\"authorId\": \"5639385\", \"name\": \"C. Gurnett\"}, {\"authorId\": \"3532213\", \"name\": \"C. Raggio\"}, {\"authorId\": \"2068345203\", \"name\": \"Nan Wu\"}, {\"authorId\": \"4151152\", \"name\": \"N. Sobreira\"}, {\"authorId\": \"4620679\", \"name\": \"P. Giampietro\"}, {\"authorId\": \"2227751\", \"name\": \"B. Ciruna\"}], \"abstract\": \"Human vertebral malformations (VMs) have an estimated incidence of 1/2000 and are associated with significant health problems including congenital scoliosis (CS) and recurrent organ system malformation syndromes such as VACTERL. The genetic cause for the vast majority of VMs are unknown. In a CS/VM patient cohort, three COL11A2 variants (R130W, R1407L, R1413H) were identified in two patients with cervical VM. A third patient with a T9 hemivertebra and the R130W variant was identified from a separate study. These substitutions are predicted to be damaging to protein function, and R130 and R1407 residues are conserved in zebrafish Col11a2. To determine the role for COL11A2 in vertebral development, CRISPR/Cas9 was used to create a nonsense mutation (col11a2L642*) as well as a full gene locus deletion (col11a2del) in zebrafish. Both col11a2L642*/L642* and col11a2del/del mutant zebrafish exhibit vertebral fusions in the caudal spine, which form due to mineralization across intervertebral segments. To determine the functional consequence of VM-associated variants, we assayed their ability to suppress col11a2del VM phenotypes following transgenic expression within the developing spine. While wildtype col11a2 expression suppresses fusions in col11a2del/+ and col11a2del/del backgrounds, patient missense variant-bearing col11a2 failed to rescue the LOF phenotype in these animals. These results highlight an essential role for COL11A2 in vertebral development and support a pathogenic role for two missense variants in CS.\"}, {\"paperId\": \"05eceb252f81b8f9859eea791581434f63ac742b\", \"externalIds\": {\"PubMedCentral\": \"10194891\", \"DOI\": \"10.1093/hr/uhad051\", \"CorpusId\": 257572207, \"PubMed\": \"37213679\"}, \"title\": \"Multifaceted regulatory functions of CsBPC2 in cucumber under salt stress conditions\", \"venue\": \"Horticulture Research\", \"year\": 2023, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hr/advance-article-pdf/doi/10.1093/hr/uhad051/49535382/uhad051.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10194891, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8087689\", \"name\": \"Shuzhen Li\"}, {\"authorId\": \"39057200\", \"name\": \"Mintao Sun\"}, {\"authorId\": \"152181110\", \"name\": \"L. Miao\"}, {\"authorId\": \"10415181\", \"name\": \"Q. Di\"}, {\"authorId\": \"2211766924\", \"name\": \"Lijun Lv\"}, {\"authorId\": \"6116934\", \"name\": \"Xianchang Yu\"}, {\"authorId\": \"2117859041\", \"name\": \"Yanhong Yan\"}, {\"authorId\": \"4009478\", \"name\": \"Chaoxing He\"}, {\"authorId\": \"2152808364\", \"name\": \"Jun Wang\"}, {\"authorId\": \"2165336476\", \"name\": \"Aokun Shi\"}, {\"authorId\": \"2110465888\", \"name\": \"Yansu Li\"}], \"abstract\": \"Abstract BASIC PENTACYSTEINE (BPC) transcription factors are essential regulators of plant growth and development. However, BPC functions and the related molecular mechanisms during cucumber (Cucumis sativus L.) responses to abiotic stresses, especially salt stress, remain unknown. We previously determined that salt stress induces CsBPC expression in cucumber. In this study, Csbpc2 transgene-free cucumber plants were created using a CRISPR/Cas9-mediated editing system to explore CsBPC functions associated with the salt stress response. The Csbpc2 mutants had a hypersensitive phenotype, with increased leaf chlorosis, decreased biomass, and increased malondialdehyde and electrolytic leakage levels under salt stress conditions. Additionally, a mutated CsBPC2 resulted in decreased proline and soluble sugar contents and antioxidant enzyme activities, which led to the accumulation of hydrogen peroxide and superoxide radicals. Furthermore, the mutation to CsBPC2 inhibited salinity-induced PM-H+-ATPase and V-H+-ATPase activities, resulting in decreased Na+ efflux and increased K+ efflux. These findings suggest that CsBPC2 may mediate plant salt stress resistance through its effects on osmoregulation, reactive oxygen species scavenging, and ion homeostasis-related regulatory pathways. However, CsBPC2 also affected ABA signaling. The mutation to CsBPC2 adversely affected salt-induced ABA biosynthesis and the expression of ABA signaling-related genes. Our results indicate that CsBPC2 may enhance the cucumber response to salt stress. It may also function as an important regulator of ABA biosynthesis and signal transduction. These findings will enrich our understanding of the biological functions of BPCs, especially their roles in abiotic stress responses, thereby providing the theoretical basis for improving crop salt tolerance.\"}, {\"paperId\": \"05ef9595c536d6b15d771f4a7a8588e116073700\", \"externalIds\": {\"DOI\": \"10.1101/2024.04.10.588889\", \"CorpusId\": 269137736}, \"title\": \"Efficient Gene Editing and Overexpression of Gametophyte Transformation in a Model Fern\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/04/11/2024.04.10.588889.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.04.10.588889?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.04.10.588889, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2296994242\", \"name\": \"Wei Jiang\"}, {\"authorId\": \"6570723\", \"name\": \"Fenglin Deng\"}, {\"authorId\": \"8432743\", \"name\": \"Mohammad Babla\"}, {\"authorId\": \"2296711854\", \"name\": \"Chen Chen\"}, {\"authorId\": \"2297036681\", \"name\": \"Dongmei Yang\"}, {\"authorId\": \"2159722468\", \"name\": \"Tao Tong\"}, {\"authorId\": \"2193745939\", \"name\": \"Yuan Qin\"}, {\"authorId\": \"2149509250\", \"name\": \"Guang Chen\"}, {\"authorId\": \"145024465\", \"name\": \"D. Marchant\"}, {\"authorId\": \"3144323\", \"name\": \"P. Soltis\"}, {\"authorId\": \"5169770\", \"name\": \"D. Soltis\"}, {\"authorId\": \"2268696863\", \"name\": \"F. Zeng\"}, {\"authorId\": \"2144173938\", \"name\": \"Zhongwen Chen\"}], \"abstract\": \"The clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-related nuclease (Cas) system allows precise and easy editing of genes in many plant species. However, this system has not yet been applied to any fern species due to the complex characteristics of fern genomes, genetics and physiology. Here, we established, for the first time, a protocol for gametophyte-based screening single-guide RNAs (sgRNAs) with high efficiency for CRISPR/Cas-mediated gene editing in a model fern species, Ceratopteris richardii. We utilized the C. richardii Actin promoter to drive sgRNA expression and enhanced CaMV 35S promoter to drive the expression of Streptococcus pyogenes Cas9 in this CRISPR-mediated editing system, which was employed to successfully edit a few genes (e.g., nucleotidase/phosphatase 1, CrSAL1; Cryptochrome 4, CRY4) and CrPDS, encoding a phytoene desaturase protein that resulted in an albino phenotype in C. richardii. Knockout of CrSAL1 resulted in significantly reduced stomatal conductance (gs), leaf transpiration rate (E), stomatal/pore length, and abscisic acid (ABA)-induced reactive oxygen species (ROS) accumulation in guard cells. Moreover, CrSAL1 overexpressing plants showed significantly increased net photosynthetic rate (A), gs, E and intrinsic water use efficiency (iWUE) as well as most of the stomatal traits and ROS production in guard cells compared to those in the wild-type (WT) plants. Taken together, the optimized CRISPR/Cas9 system provides a useful tool for functional genomics in a model fern species, allowing the exploration of fern gene functions for evolutionary biology, herbal medicine discovery and agricultural applications.\"}, {\"paperId\": \"05effd3289150d3b6a16b3b99944710a8e1d00a7\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-1484-6_23\", \"CorpusId\": 236210297, \"PubMed\": \"34302664\"}, \"title\": \"CRISPRi/a Screening with Human iPSCs.\", \"venue\": \"Methods in molecular biology\", \"year\": 2021, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC11047756\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-1484-6_23?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-1484-6_23, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6353605\", \"name\": \"M. Nishiga\"}, {\"authorId\": \"36295747\", \"name\": \"Lei S. Qi\"}, {\"authorId\": \"65834029\", \"name\": \"Joseph C. Wu\"}], \"abstract\": null}, {\"paperId\": \"05f0e17550b277c149a78fbe4e81cd9792bc5f01\", \"externalIds\": {\"DOI\": \"10.1038/s41598-022-07157-9\", \"CorpusId\": 257094993}, \"title\": \"Loss of chaperone-mediated autophagy is associated with low vertebral cancellous bone mass\", \"venue\": \"Scientific Reports\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-022-07157-9.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41598-022-07157-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41598-022-07157-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4264839\", \"name\": \"Nisreen S Akel\"}, {\"authorId\": \"34707788\", \"name\": \"Ryan S. MacLeod\"}, {\"authorId\": \"114683205\", \"name\": \"S. B. Berryhill\"}, {\"authorId\": \"2156274826\", \"name\": \"Dominique J. Laster\"}, {\"authorId\": \"4029834\", \"name\": \"M. Dimori\"}, {\"authorId\": \"2059069528\", \"name\": \"J. Crawford\"}, {\"authorId\": \"2113771834\", \"name\": \"Q. Fu\"}, {\"authorId\": \"7696482\", \"name\": \"M. Onal\"}], \"abstract\": \"Chaperone-mediated autophagy (CMA) is a protein degradation pathway that eliminates soluble cytoplasmic proteins that are damaged, incorrectly folded, or targeted for selective proteome remodeling. However, the role of CMA in skeletal homeostasis under physiological and pathophysiological conditions is unknown. To address the role of CMA for skeletal homeostasis, we deleted an essential component of the CMA process, namely Lamp2a, from the mouse genome. CRISPR-Cas9-based genome editing led to the deletion of both Lamp2a and Lamp2c, another Lamp2 isoform, producing Lamp2AC global knockout (L2ACgKO) mice. At 5 weeks of age female L2ACgKO mice had lower vertebral cancellous bone mass compared to wild-type (WT) controls, whereas there was no difference between genotypes in male mice at this age. The low bone mass of L2ACgKO mice was associated with elevated RANKL expression and the osteoclast marker genes Trap and Cathepsin K. At 18 weeks of age, both male and female L2ACgKO mice had lower vertebral cancellous bone mass compared to WT controls. The low bone mass of L2ACgKO mice was associated with increased osteoclastogenesis and decreased mineral deposition in cultured cells. Consistent with these findings, specific knockdown of Lamp2a in an osteoblastic cell line increased RANKL expression and decreased mineral deposition. Moreover, similar to what has been observed in other cell types, macroautophagy and proteasomal degradation were upregulated in CMA-deficient osteoblasts in culture. Thus, an increase in other protein degradation pathways may partially compensate for the loss of CMA in osteoblasts. Taken together, our results suggest that CMA plays a role in vertebral cancellous bone mass accrual in young adult mice and that this may be due to an inhibitory role of CMA on osteoclastogenesis or a positive role of CMA in osteoblast formation or function.\"}, {\"paperId\": \"05f194c1def53051aba2813499bb52d37bf6e209\", \"externalIds\": {\"PubMedCentral\": \"9569777\", \"DOI\": \"10.3390/ijms231911482\", \"CorpusId\": 252656147, \"PubMed\": \"36232782\"}, \"title\": \"CRISPR/Cas9\\u2014A Promising Therapeutic Tool to Cure Blindness: Current Scenario and Future Prospects\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 24, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/19/11482/pdf?version=1664444177\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9569777, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2074278094\", \"name\": \"Irshad Ahmad\"}], \"abstract\": \"CRISPR-based targeted genome editing is bringing revolutionary changes in the research arena of biological sciences. CRISPR/Cas9 has been explored as an efficient therapeutic tool for the treatment of genetic diseases. It has been widely used in ophthalmology research by using mouse models to correct pathogenic mutations in the eye stem cells. In recent studies, CRISPR/Cas9 has been used to correct a large number of mutations related to inherited retinal disorders. In vivo therapeutic advantages for retinal diseases have been successfully achieved in some rodents. Current advances in the CRISPR-based gene-editing domain, such as modified Cas variants and delivery approaches have optimized its application to treat blindness. In this review, recent progress and challenges of the CRISPR-Cas system have been discussed to cure blindness and its prospects.\"}, {\"paperId\": \"05f6d1fc0972d52777ec4f2d696ac482250182a4\", \"externalIds\": {\"DOI\": \"10.1080/07391102.2023.2225109\", \"CorpusId\": 259194009, \"PubMed\": \"37334706\"}, \"title\": \"Hsa_circRNA_0000284 acts as a ceRNA to participate in coronary heart disease progression by sponging miRNA-338-3p via regulating the expression of ETS1\", \"venue\": \"Journal of Biomolecular Structure and Dynamics\", \"year\": 2023, \"citationCount\": 23, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/07391102.2023.2225109?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/07391102.2023.2225109, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1667135993\", \"name\": \"P. Dinh\"}, {\"authorId\": \"2211716570\", \"name\": \"ChauMyThanh Tran\"}, {\"authorId\": \"2211711955\", \"name\": \"ThiPhuongHoai Dinh\"}, {\"authorId\": \"2220273420\", \"name\": \"Awais Ali\"}, {\"authorId\": \"2111780983\", \"name\": \"Shangling Pan\"}], \"abstract\": \"Abstract Coronary heart disease (CHD) is a prevalent global cause of death. Research suggests that circular RNAs (circRNAs) play a role in the development of CHD. In this study, we investigated the expression of hsa_circRNA_0000284 in peripheral blood leukocytes (PBLs) obtained from a cohort of 94 CHD patients aged over 50\\u2009years, as well as 126 age-matched healthy controls (HC). An in vitro inflammatory and oxidative injury cell model that simulates CHD was used to evaluate changes in hsa_ circRNA _0000284 under stress. CRISPR/Cas9 technology was used to evaluate changes in hsa_circRNA_0000284 expression. An hsa_ circRNA_0000284 overexpression and silencing cell model was used to analyze the biological functions of hsa_circRNA_0000284. Bioinformatics, qRT-PCR, viral transfection technology, and luciferase assays were used to evaluate the potential hsa_circRNA_0000284/miRNA-338-3p/ETS1 axis. Western blotting analysis was performed to detect protein expression. Herein, PBLs from CHD patients exhibited downregulation of hsa_circRNA_0000284 expression. Exposure to oxidative stress and inflammation can induce damage to human umbilical endothelial cells, resulting in the downregulation of hsa_circRNA_0000284 expression. The expression of hsa_circRNA_0000284 in EA-hy926 cells was significantly reduced after the AluSq2 element of hsa_circRNA_0000284 had been knocked out. The expression of hsa_circRNA_0000284 affected proliferation, cycle distribution, aging, and apoptosis in EA-hy926 cells. Consistent with the results of cell transfection experiments and luciferase assays, Western blotting showed that hsa_circRNA_0000284 plays a role in the regulation of hsa-miRNA-338-3p expression. Subsequently, hsa-miRNA-338-3p was found to be involved in the regulation of ETS1 expression. Communicated by Ramaswamy H. Sarma\"}, {\"paperId\": \"05f7416efd01f0b288b4a43ab16b594fc4ef8009\", \"externalIds\": {\"MAG\": \"3087022463\", \"PubMedCentral\": \"7589550\", \"DOI\": \"10.3390/V12101190\", \"CorpusId\": 224948771, \"PubMed\": \"33092168\"}, \"title\": \"Phosphoinositide 3\\u2032-Kinase \\u03b3 Facilitates Polyomavirus Infection\", \"venue\": \"Viruses\", \"year\": 2020, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1999-4915/12/10/1190/pdf?version=1603266105\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7589550, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2069641075\", \"name\": \"Paul Clark\"}, {\"authorId\": \"34810236\", \"name\": \"G. V. Gee\"}, {\"authorId\": \"31176453\", \"name\": \"B. Albright\"}, {\"authorId\": \"5319151\", \"name\": \"Benedetta Assetta\"}, {\"authorId\": \"2112845502\", \"name\": \"Ying Han\"}, {\"authorId\": \"4820356\", \"name\": \"W. Atwood\"}, {\"authorId\": \"3884769\", \"name\": \"D. DiMaio\"}], \"abstract\": \"Polyomaviruses are small, non-enveloped DNA tumor viruses that cause serious disease in immunosuppressed people, including progressive multifocal leukoencephalopathy (PML) in patients infected with JC polyomavirus, but the molecular events mediating polyomavirus entry are poorly understood. Through genetic knockdown approaches, we identified phosphoinositide 3\\u2032-kinase \\u03b3 (PI3K\\u03b3) and its regulatory subunit PIK3R5 as cellular proteins that facilitate infection of human SVG-A glial cells by JCPyV. PI3K\\u03b1 appears less important for polyomavirus infection than PI3K\\u03b3. CRISPR/Cas9-mediated knockout of PIK3R5 or PI3K\\u03b3 inhibited infection by authentic JCPyV and by JC pseudovirus. PI3K\\u03b3 knockout also inhibited infection by BK and Merkel Cell pseudoviruses, other pathogenic human polyomaviruses, and SV40, an important model polyomavirus. Reintroduction of the wild-type PI3K\\u03b3 gene into the PI3K\\u03b3 knock-out SVG-A cells rescued the JCPyV infection defect. Disruption of the PI3K\\u03b3 pathway did not block binding of JCPyV to cells or virus internalization, implying that PI3K\\u03b3 facilitates some intracellular step(s) of infection. These results imply that agents that inhibit PI3K\\u03b3 signaling may have a role in managing polyomavirus infections.\"}, {\"paperId\": \"05f75965780462dd7846d2515102fc347f453501\", \"externalIds\": {\"DOI\": \"10.1055/s-0044-1786557\", \"CorpusId\": 270815946}, \"title\": \"CRISPR/Cas9-mediated KMT2A-rearrangements for the development of leukaemia mouse models\", \"venue\": \"Klinische P\\u00e4diatrie\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1055/s-0044-1786557?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1055/s-0044-1786557, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2194805492\", \"name\": \"T. Benz\"}, {\"authorId\": \"2293021561\", \"name\": \"P. Larghero\"}, {\"authorId\": \"2298749713\", \"name\": \"C. Meyer\"}, {\"authorId\": \"2308780948\", \"name\": \"D. Br\\u00fcggmann\"}, {\"authorId\": \"2283000733\", \"name\": \"A. Hentrich\"}, {\"authorId\": \"2238728118\", \"name\": \"R. Bhayadia\"}, {\"authorId\": \"2308747232\", \"name\": \"H. Issa\"}, {\"authorId\": \"2308780999\", \"name\": \"F. Louwen\"}, {\"authorId\": \"143608382\", \"name\": \"J. Klusmann\"}, {\"authorId\": \"2308731808\", \"name\": \"R. Marschalek\"}], \"abstract\": null}, {\"paperId\": \"05f765c8394ee4c5a0a5d81ecff1bc3018e2ef36\", \"externalIds\": {\"DOI\": \"10.1182/blood.2023021581\", \"CorpusId\": 266224388, \"PubMed\": \"38096363\"}, \"title\": \"A p53 score derived from TP53 CRISPR/Cas9 HMCLs predicts survival and reveals major role of BAX in BH3 mimetics response.\", \"venue\": \"Blood\", \"year\": 2023, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood.2023021581?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood.2023021581, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1637364004\", \"name\": \"Romane Durand\"}, {\"authorId\": \"2293172\", \"name\": \"G. Descamps\"}, {\"authorId\": \"5828857\", \"name\": \"Christelle Dousset\"}, {\"authorId\": \"33415807\", \"name\": \"C. Bellanger\"}, {\"authorId\": \"3958476\", \"name\": \"S. Mai\\u0308ga\"}, {\"authorId\": \"1436110335\", \"name\": \"Jean-Baptiste Alberge\"}, {\"authorId\": \"2125963077\", \"name\": \"J. Derrien\"}, {\"authorId\": \"51224041\", \"name\": \"J. Cruard\"}, {\"authorId\": \"3237966\", \"name\": \"S. Minvielle\"}, {\"authorId\": \"26947465\", \"name\": \"N. Lilli\"}, {\"authorId\": \"29348870\", \"name\": \"C. Godon\"}, {\"authorId\": \"1751482456\", \"name\": \"Y. Le Bris\"}, {\"authorId\": \"7872143\", \"name\": \"B. Tessoulin\"}, {\"authorId\": \"4443342\", \"name\": \"M. Amiot\"}, {\"authorId\": \"1398022591\", \"name\": \"P. Gomez-Bougie\"}, {\"authorId\": \"4457294\", \"name\": \"C. Touzeau\"}, {\"authorId\": \"2237964127\", \"name\": \"P. Moreau\"}, {\"authorId\": \"46863981\", \"name\": \"D. Chiron\"}, {\"authorId\": \"1402580877\", \"name\": \"A. Moreau-Aubry\"}, {\"authorId\": \"1398022580\", \"name\": \"C. Pellat-Deceunynck\"}], \"abstract\": \"To establish a strict p53-dependent gene expression profile, TP53-/- clones were derived from TP53+/+ and TP53-/mut t(4;14) human myeloma cell lines (HMCLs) using CRISPR/Cas9 technology. From the 17 dysregulated genes shared between the TP53-/- clones from TP53+/+ HMCLs, we established a functional p53 score, involving 13 genes specifically downregulated upon p53 silencing. This functional score segregated clones and myeloma cell lines, as well as other cancer cell lines according to their TP53 status. The score was efficient to identify myeloma patient samples with biallelic TP53 inactivation and was predictive of overall survival in MMRF-coMMpass and CASSIOPEA cohorts. At the functional level, we showed that among the 13 genes, p53-regulated BAX expression correlated to, and directly impacted, the MCL1 BH3 mimetic S63845 sensitivity of myeloma cells by decreasing MCL1-BAX complexes. However, resistance to S63845 was overcome by combining MCL1 and BCL2 BH3 mimetics which displayed synergistic efficacy. BH3 mimetics combination was efficient in 97% of patient samples with or without del17p. Nevertheless, scRNAseq analysis showed that myeloma cells surviving to the combination had lower p53 score, showing that myeloma cells with higher p53 score were more sensitive to BH3 mimetics. Taken together, we established a functional p53 score that identifies myeloma cells with biallelic TP53 invalidation, demonstrated that p53-regulated BAX is critical for optimal cell response to BH3 mimetics, and showed that MCL1 and BCL2 BH3 mimetics combination may be of interest for patients with biallelic TP53 invalidation, for whom there is still an unmet medical need.\"}, {\"paperId\": \"05fb69f59c845d0c15865fb58459ff693aa3d2d7\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-1613-0_12\", \"CorpusId\": 235768465, \"PubMed\": \"34236684\"}, \"title\": \"Genome Editing Using CRISPR/Cas9 System in the Rice Blast Fungus.\", \"venue\": \"Methods in molecular biology\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-1613-0_12?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-1613-0_12, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5229064\", \"name\": \"Takayuki Arazoe\"}], \"abstract\": null}, {\"paperId\": \"05fdc9e6c22ff07b8ceac7cad501189dcadb0dce\", \"externalIds\": {\"PubMedCentral\": \"10655816\", \"DOI\": \"10.1242/dmm.049752\", \"CorpusId\": 253509273, \"PubMed\": \"36373506\"}, \"title\": \"17q12 deletion syndrome mouse model shows defects in craniofacial, brain and kidney development, and glucose homeostasis\", \"venue\": \"Disease Models & Mechanisms\", \"year\": 2022, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.biologists.com/dmm/article-pdf/15/12/dmm049752/2375218/dmm049752.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10655816, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144709530\", \"name\": \"Emily B Warren\"}, {\"authorId\": \"4749224\", \"name\": \"J. Briano\"}, {\"authorId\": \"3109361\", \"name\": \"J. Ellegood\"}, {\"authorId\": \"2126498743\", \"name\": \"Taylor DeYoung\"}, {\"authorId\": \"2383447\", \"name\": \"J. Lerch\"}, {\"authorId\": \"3203607\", \"name\": \"E. Morrow\"}], \"abstract\": \"ABSTRACT 17q12 deletion (17q12Del) syndrome is a copy number variant (CNV) disorder associated with neurodevelopmental disorders and renal cysts and diabetes syndrome (RCAD). Using CRISPR/Cas9 genome editing, we generated a mouse model of 17q12Del syndrome on both inbred (C57BL/6N) and outbred (CD-1) genetic backgrounds. On C57BL/6N, the 17q12Del mice had severe head development defects, potentially mediated by haploinsufficiency of Lhx1, a gene within the interval that controls head development. Phenotypes included brain malformations, particularly disruption of the telencephalon and craniofacial defects. On the CD-1 background, the 17q12Del mice survived to adulthood and showed milder craniofacial and brain abnormalities. We report postnatal brain defects using automated magnetic resonance imaging-based morphometry. In addition, we demonstrate renal and blood glucose abnormalities relevant to RCAD. On both genetic backgrounds, we found sex-specific presentations, with male 17q12Del mice exhibiting higher penetrance and more severe phenotypes. Results from these experiments pinpoint specific developmental defects and pathways that guide clinical studies and a mechanistic understanding of the human 17q12Del syndrome. This mouse mutant represents the first and only experimental model to date for the 17q12 CNV disorder. This article has an associated First Person interview with the first author of the paper.\"}, {\"paperId\": \"0603cfb003fa9d556e90caec107ab26bf81aff9d\", \"externalIds\": {\"MAG\": \"3014878369\", \"DOI\": \"10.1016/j.fgb.2020.103378\", \"CorpusId\": 214771828, \"PubMed\": \"32234543\"}, \"title\": \"Acurin A, a novel hybrid compound, biosynthesized by individually translated PKS- and NRPS-encoding genes in Aspergillus aculeatus.\", \"venue\": \"Fungal Genetics and Biology\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.fgb.2020.103378\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.fgb.2020.103378?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.fgb.2020.103378, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1441715528\", \"name\": \"Peter B. Wolff\"}, {\"authorId\": \"32195729\", \"name\": \"M. Nielsen\"}, {\"authorId\": \"6022167\", \"name\": \"J. Slot\"}, {\"authorId\": \"1404218404\", \"name\": \"L. N. Andersen\"}, {\"authorId\": \"6293064\", \"name\": \"L. Petersen\"}, {\"authorId\": \"1380021856\", \"name\": \"T. Isbrandt\"}, {\"authorId\": \"14295568\", \"name\": \"D. Holm\"}, {\"authorId\": \"2191437\", \"name\": \"U. Mortensen\"}, {\"authorId\": \"1398213031\", \"name\": \"C. S. N\\u00f8dvig\"}, {\"authorId\": \"3423168\", \"name\": \"T. O. Larsen\"}, {\"authorId\": \"5265608\", \"name\": \"J. B. Hoof\"}], \"abstract\": \"This work presents the identification and proposed biosynthetic pathway for a compound of mixed polyketide-nonribosomal peptide origin that we named acurin A. The compound was isolated from an extract of the filamentous fungus Aspergillus aculeatus, and its core structure resemble that of the mycotoxin fusarin C produced by several Fusarium species. Based on bioinformatics in combination with RT-qPCR experiments and gene-deletion analysis, we identified a biosynthetic gene cluster (BGC) in A. aculeatus responsible for the biosynthesis of acurin A. Moreover, we were able to show that a polyketide synthase (PKS) and a nonribosomal peptide synthetase (NRPS) enzyme separately encoded by this BGC are responsible for the synthesis of the PK-NRP compound, acurin A, core structure. In comparison, the production of fusarin C is reported to be facilitated by a linked PKS-NRPS hybrid enzyme. Phylogenetic analyses suggest the PKS and NRPS in A. aculeatus resulted from a recent fission of an ancestral hybrid enzyme followed by gene duplication. In addition to the PKS- and NRPS-encoding genes of acurin A, we show that six other genes are influencing the biosynthesis including a regulatory transcription factor. Altogether, we have demonstrated the involvement of eight genes in the biosynthesis of acurin A, including an in-cluster transcription factor. This study highlights the biosynthetic capacity of A. aculeatus and serves as an example of how the CRISPR/Cas9 system can be exploited for the construction of fungal strains that can be readily engineered.\"}, {\"paperId\": \"0603f0e5f907857d707c39b6ac8d2c8b4cb8c8d8\", \"externalIds\": {\"PubMedCentral\": \"7082230\", \"MAG\": \"3012448790\", \"DOI\": \"10.3389/fphys.2020.00209\", \"CorpusId\": 212675805, \"PubMed\": \"32231591\"}, \"title\": \"EDN1-AS, A Novel Long Non-coding RNA Regulating Endothelin-1 in Human Proximal Tubule Cells\", \"venue\": \"Frontiers in Physiology\", \"year\": 2020, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fphys.2020.00209/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7082230, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4096744\", \"name\": \"Lauren G. Douma\"}, {\"authorId\": \"14012774\", \"name\": \"K. Solocinski\"}, {\"authorId\": \"46231474\", \"name\": \"S. Masten\"}, {\"authorId\": \"86972621\", \"name\": \"Dominique Barral\"}, {\"authorId\": \"4472568\", \"name\": \"Sarah J. Barilovits\"}, {\"authorId\": \"33353892\", \"name\": \"L. Jeffers\"}, {\"authorId\": \"151365797\", \"name\": \"Kareme D. Alder\"}, {\"authorId\": \"2330345407\", \"name\": \"R. Patel\"}, {\"authorId\": \"5607705\", \"name\": \"C. Wingo\"}, {\"authorId\": \"145350327\", \"name\": \"K. Brown\"}, {\"authorId\": \"5421944\", \"name\": \"B. Cain\"}, {\"authorId\": \"4508809\", \"name\": \"M. Gumz\"}], \"abstract\": \"Endothelin-1 (ET-1) is a peptide hormone that functions as a vasoconstrictor in the vasculature, whereas in the collecting duct of the kidney it exerts blood pressure-lowering effects via natriuretic actions. Aberrant ET-1 signaling is associated with several pathological states including hypertension and chronic kidney disease. ET-1 expression is regulated largely through transcriptional control of the gene that encodes ET-1, EDN1. Here we report a long, non-coding RNA (lncRNA) that appears to be antisense to the EDN1 gene, called EDN1-AS. Because EDN1-AS represents a potential novel mechanism to regulate ET-1 expression, we examined the regulation of EDN1-AS expression and action. A putative glucocorticoid receptor response (GR) element upstream of the predicted EDN1-AS transcription start site was identified using the ENCODE database and the UCSC genome browser. Two homozygous deletion clones of the element were generated using CRISPR/Cas9. This deletion resulted in a significant increase in the expression of EDN1-AS, which was associated with increased secretion of ET-1 peptide from HK-2 cells (two-fold increase in KO cells vs. CNTL, n = 7, P < 0.05). Phenotypic characterization of these CRISPR clones revealed a difference in cell growth rates. Using a standard growth assay, we determined that the KO1 clone exhibited a three-fold increase in growth over 8 days compared to control cells (n = 4, P < 0.01) and the KO2 clone exhibited a two-fold increase (n = 4, P < 0.01). These results support a role for EDN1-AS as a novel regulatory mechanism of ET-1 expression and cellular proliferation.\"}, {\"paperId\": \"0605e663f84d3973e803818d9ce58c19cd9c67ae\", \"externalIds\": {\"PubMedCentral\": \"8983752\", \"DOI\": \"10.1038/s41598-022-07746-8\", \"CorpusId\": 239122245, \"PubMed\": \"35383205\"}, \"title\": \"Dual-gRNA approach with limited off-target effect corrects C9ORF72 repeat expansion in vivo\", \"venue\": \"Scientific Reports\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-022-07746-8.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8983752, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2067176559\", \"name\": \"Xuejiao Piao\"}, {\"authorId\": \"46334092\", \"name\": \"Dawei Meng\"}, {\"authorId\": \"2117978067\", \"name\": \"Xue Zhang\"}, {\"authorId\": \"46671463\", \"name\": \"Qiang Song\"}, {\"authorId\": \"1491881454\", \"name\": \"Hailong Lv\"}, {\"authorId\": \"7415301\", \"name\": \"Yichang Jia\"}], \"abstract\": \"C9ORF72 GGGGCC repeat expansion is the most common genetic cause for amyotrophic lateral sclerosis and frontotemporal dementia, which generates abnormal DNA and RNA structures and produces toxic proteins. Recently, efficacy of CRISPR/Cas9-mediated editing has been proven in treatment of disease. However, DNA low complexity surrounding C9ORF72 expansion increases the off-target risks. Here we provide a dual-gRNA design outside of the low complexity region which enables us to remove the repeat DNA in a \\u2018cutting-deletion-fusion\\u2019 manner with a high fusion efficiency (50%). Our dual-gRNA design limits off-target effect and does not significantly affect C9ORF72 expression. In neurons carrying patient C9ORF72 expansion, our approach removes the repeat DNA and corrects the RNA foci in vitro and in vivo. Therefore, we conclude that our proof-of-concept design correct C9ORF72 repeat expansion, which may have potential therapeutic value for the patients.\"}, {\"paperId\": \"060c7ac6236f7c3ff40224f61402a399c7432b1d\", \"externalIds\": {\"DOI\": \"10.1631/jzus.B2200119\", \"CorpusId\": 248083304, \"PubMed\": \"35403388\"}, \"title\": \"Efficient genetic transformation and CRISPR/Cas9-mediated genome editing of watermelon assisted by genes encoding developmental regulators\", \"venue\": \"Journal of Zhejiang University SCIENCE B\", \"year\": 2022, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9002250\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1631/jzus.B2200119?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1631/jzus.B2200119, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2143991411\", \"name\": \"Wenbo Pan\"}, {\"authorId\": \"14891618\", \"name\": \"Zhentao Cheng\"}, {\"authorId\": \"2113961150\", \"name\": \"Zhiguo Han\"}, {\"authorId\": \"2118499188\", \"name\": \"Hong-Hua Yang\"}, {\"authorId\": \"6784725\", \"name\": \"Wanggen Zhang\"}, {\"authorId\": \"2108915490\", \"name\": \"Huawei Zhang\"}], \"abstract\": \"\\u514b\\u670d\\u897f\\u74dc\\u9057\\u4f20\\u8f6c\\u5316\\u74f6\\u9888, \\u5efa\\u7acb\\u897f\\u74dc\\u9ad8\\u6548\\u9057\\u4f20\\u8f6c\\u5316\\u4f53\\u7cfb, \\u5e76\\u4ee5\\u6b64\\u4e3a\\u57fa\\u7840\\u6784\\u5efa\\u897f\\u74dc\\u57fa\\u56e0\\u7f16\\u8f91\\u4f53\\u7cfb, \\u4fc3\\u8fdb\\u897f\\u74dc\\u529f\\u80fd\\u57fa\\u56e0\\u7ec4\\u5b66\\u548c\\u57fa\\u56e0\\u7f16\\u8f91\\u80b2\\u79cd\\u7814\\u7a76\\u3002 \\u901a\\u8fc7\\u6bd4\\u8f83\\u591a\\u4e2a\\u751f\\u957f\\u8c03\\u8282\\u57fa\\u56e0\\u548c\\u519c\\u6746\\u83cc\\u83cc\\u682a, \\u9009\\u53d6\\u751f\\u957f\\u8c03\\u8282\\u57fa\\u56e0AtGRF5\\u548c\\u519c\\u6746\\u83cc\\u83cc\\u682aGV3101, \\u5728\\u897f\\u74dc\\u4e2d\\u5efa\\u7acb\\u4e86\\u9ad8\\u6548\\u4e14\\u4e0d\\u4f9d\\u8d56\\u4e8e\\u57fa\\u56e0\\u578b\\u7684\\u8f6c\\u5316\\u4f53\\u7cfb, \\u5b9e\\u73b0\\u4e86\\u897f\\u74dc\\u7a81\\u53d8\\u4f53\\u7684\\u5feb\\u901f\\u521b\\u5236\\u3002 \\u901a\\u8fc7\\u6d4b\\u8bd5\\u751f\\u957f\\u8c03\\u8282\\u56e0\\u5b50\\u57fa\\u56e0\\u5bf9\\u897f\\u74dc\\u8f6c\\u5316\\u7387\\u7684\\u5f71\\u54cd, \\u53d1\\u73b0\\u591a\\u4e2a\\u751f\\u957f\\u8c03\\u8282\\u57fa\\u56e0\\u53ef\\u4ee5\\u63d0\\u9ad8\\u897f\\u74dc\\u7684\\u9057\\u4f20\\u8f6c\\u5316\\u6548\\u7387\\u3002\\u5176\\u4e2dAtGRF5\\u53ef\\u5c06\\u897f\\u74dc\\u7684\\u8f6c\\u5316\\u6548\\u73870.88%\\u5de6\\u53f3\\u63d0\\u9ad8\\u81f324.73%\\u3002\\u6b64\\u5916, \\u7b5b\\u9009\\u4e86\\u4e0d\\u540c\\u7684\\u519c\\u6746\\u83cc\\u83cc\\u682a, \\u53d1\\u73b0\\u4f7f\\u7528GV3101\\u8868\\u8fbeAtGRF5\\u53ef\\u83b7\\u5f97\\u6700\\u9ad8\\u7684\\u8f6c\\u5316\\u6548\\u7387\\u3002\\u8fdb\\u4e00\\u6b65\\u4f7f\\u7528AtGRF5\\u8f85\\u52a9\\u8f6c\\u5316\\u7684\\u65b9\\u5f0f\\u5bf9\\u897f\\u74dc\\u8fdb\\u884c\\u57fa\\u56e0\\u7f16\\u8f91, \\u6210\\u529f\\u5728T0\\u4ee3\\u5bf9PDS\\u57fa\\u56e0\\u8fdb\\u884c\\u6572\\u9664\\u5e76\\u83b7\\u5f97\\u7eaf\\u5408\\u7a81\\u53d8\\u4f53\\u3002 \\u4f7f\\u7528\\u519c\\u6746\\u83ccGV3101\\u8fc7\\u8868\\u8fbeAtGRF5\\u53ef\\u5c06\\u897f\\u74dc\\u7684\\u8f6c\\u5316\\u6548\\u7387\\u4ece0.88%\\u5de6\\u53f3\\u63d0\\u9ad8\\u81f324.73%, \\u4e14\\u5728\\u4e24\\u4e2a\\u57fa\\u56e0\\u578b\\u7684\\u897f\\u74dc\\u4e2d\\u4f5c\\u7528\\u7c7b\\u4f3c\\u3002\\u8be5\\u65b9\\u6cd5\\u4e5f\\u53ef\\u7ed3\\u5408\\u57fa\\u56e0\\u7f16\\u8f91\\u6280\\u672f\\u7528\\u4e8e\\u897f\\u74dc\\u7a81\\u53d8\\u4f53\\u7684\\u5feb\\u901f\\u83b7\\u53d6\\u3002\"}, {\"paperId\": \"060dba02712e6147df63dd30889d3143fe928ee9\", \"externalIds\": {\"DOI\": \"10.1016/j.envint.2024.108962\", \"CorpusId\": 271908087, \"PubMed\": \"39159514\"}, \"title\": \"A novel molecular pathway of lipid accumulation in human hepatocytes caused by PFOA and PFOS.\", \"venue\": \"Environment International\", \"year\": 2024, \"citationCount\": 22, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.envint.2024.108962?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.envint.2024.108962, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"115101303\", \"name\": \"Xiaowen Gou\"}, {\"authorId\": \"14799939\", \"name\": \"Mingming Tian\"}, {\"authorId\": \"2110383067\", \"name\": \"Lu Yan\"}, {\"authorId\": \"40635630\", \"name\": \"Pu Xia\"}, {\"authorId\": \"2316534145\", \"name\": \"Huimin Ji\"}, {\"authorId\": \"2114894966\", \"name\": \"Haoyue Tan\"}, {\"authorId\": \"2263890920\", \"name\": \"Wei Shi\"}, {\"authorId\": \"2181119460\", \"name\": \"Hongxia Yu\"}, {\"authorId\": \"2283797391\", \"name\": \"Xiaowei Zhang\"}], \"abstract\": \"Exposed to ubiquitously perfluorooctanoic acid (PFOA) and perfluorooctane sulfonate (PFOS) has been associated with non-alcoholic fatty liver disease (NAFLD), yet the underlying molecular mechanism remains elusive. The extrapolation of empirical studies correlating per- and polyfluoroalkyl substance (PFAS) exposure with NAFLD occurrence to real-life exposure was hindered by the limited availability of mechanistic data at environmentally relevant concentrations. Herein, a novel pathway mediating hepatocyte lipid accumulation by PFOA and PFOS at human-relevant dose (<10\\u00a0\\u03bcM) was identified by integrating CRISPR-Cas9 genome screening, concentration-dependent transcriptional assay in HepG2 cell and epidemiological data mining. 1) At genetic level, nudt7 showed the highest enriched potency among 569 NAFLD-related genes, and the transcription of nudt7 was significantly downregulated by PFOA and PFOS exposure (<7 \\u03bcM). 2) At molecular pathway, upon exposure to\\u00a0\\u226410-4\\u00a0\\u03bcM PFOA and PFOS, the downregulation of nudt7 transcriptional expression triggered the reduction of Ace-CoA hydrolase activity. 3) At cellular level, increased lipids were measured in HepG2 cells with PFOA and PFOS (<2\\u00a0\\u03bcM). Overall, we identified a novel mechanism mediated by transcriptional downregulation of nudt7 gene in hepatocellular lipid increase treated with PFOA and PFOS, which could potentially explain the NAFLD occurrence associated with exposure to PFASs in humans.\"}, {\"paperId\": \"0612484ebcbcf54dfffe87198e5413e280b80329\", \"externalIds\": {\"MAG\": \"3111619434\", \"PubMedCentral\": \"7764723\", \"DOI\": \"10.3390/ijms21249442\", \"CorpusId\": 229282533, \"PubMed\": \"33322437\"}, \"title\": \"Activation of the miR-371/372/373 miRNA Cluster Enhances Oncogenicity and Drug Resistance in Oral Carcinoma Cells\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/24/9442/pdf?version=1608649310\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7764723, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2424439\", \"name\": \"Shu-Chun Lin\"}, {\"authorId\": \"6553998\", \"name\": \"Hsiao-Li Wu\"}, {\"authorId\": \"9948826\", \"name\": \"L. Yeh\"}, {\"authorId\": \"2395773\", \"name\": \"Cheng-Chieh Yang\"}, {\"authorId\": \"97998696\", \"name\": \"S. Kao\"}, {\"authorId\": \"144544248\", \"name\": \"Kuo-Wei Chang\"}], \"abstract\": \"Oral squamous cell carcinoma (OSCC) is among the leading causes of cancer-associated deaths worldwide. Family members in miR-371/372/373 miRNA cluster, which is localized at human chromosome 19q13.4, are co-expressed in both human stem cells and malignancies. The individual miRNA in this cluster are also involved in modulating the pathogenesis of malignancies as either oncogenes or suppressors. The 19q13 region is frequently gained in head and neck cancers. High expression of miR-372 and miR-373 are survival predictors for OSCC. However, the role of the miR-371/372/373 cluster in oral carcinogenesis remains to be fully investigated. We use the clustered, regularly interspaced, short palindromic repeats (CRISPR)-Cas9 system to establish OSCC cell subclones that had the miR-371/372/373 cluster deleted. In addition, further subclones were established that had the promoter of this cluster deleted. Concordant silencing in SAS cells of miR-371/372/373 decreased oncogenic potential, increased cisplatin sensitivity, activated p53, and upregulated the expression of Bad and DKK1. We also employed the CRISPR/dCas9 synergistic activation mediator system, which allowed robust transcriptional activation of the whole miR-371/372/373 cistron. Upregulation of endogenous miR-371/372/372 expression increased both oncogenicity and drug resistance. These were accompanied by a slight activation of AKT, \\u03b2-catenin, and Src. This study identifies the oncogenic role of the miR-371/372/373 cluster in OSCC. Using CRISPR based strategy can be a powerful paradigm that will provide mechanistic insights into miRNA cluster functionality, which will also likely help the development of targeting options for malignancies.\"}, {\"paperId\": \"061303da78bf718eeae7bc0001a7b17a9b4e5e4a\", \"externalIds\": {\"MAG\": \"3096498613\", \"DOI\": \"10.1016/j.scr.2020.102077\", \"CorpusId\": 226310552, \"PubMed\": \"33176267\"}, \"title\": \"CRISPR/Cas9 mediated establishment of a human CSRP3 compound heterozygous knockout hESC line to model cardiomyopathy and heart failure.\", \"venue\": \"Stem Cell Research\", \"year\": 2020, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2020.102077\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2020.102077?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2020.102077, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2110644953\", \"name\": \"Liqiang Sun\"}, {\"authorId\": \"2152911978\", \"name\": \"Jing Li\"}, {\"authorId\": \"38941434\", \"name\": \"E. Li\"}, {\"authorId\": \"40435407\", \"name\": \"Shaohui Niu\"}, {\"authorId\": \"2256481722\", \"name\": \"Zhiping Qin\"}, {\"authorId\": \"2010218202\", \"name\": \"Qing Zhi\"}, {\"authorId\": \"2333806992\", \"name\": \"Jiajia Zhao\"}, {\"authorId\": \"51016376\", \"name\": \"Haiyan Xiong\"}, {\"authorId\": \"2118204871\", \"name\": \"Yuan Li\"}, {\"authorId\": \"12769167\", \"name\": \"Liguo Jian\"}, {\"authorId\": \"2108066917\", \"name\": \"Lihua Zhang\"}], \"abstract\": \"The role of muscle LIM protein (MLP), encoded by CSRP3, is not well understood in humans. CSRP3 knockout mice developed dilated cardiomyopathy with hypertrophy and heart failure after birth. Using CRISPR/Cas9, we generated an MLP deficient human ESC line WAe009-A-41 carrying a compound heterozygous 13\\u00a0bp deletion/1\\u00a0bp insertion in the CSRP3 gene. The WAe009-A-41 line exhibited a normal female karyotype (46, XX), expressed pluripotency markers and exhibited capability to differentiate into the three germ layers in vitro. MLP expression was not detectable in WAe009-A-41 line. This cell line can be a useful tool for studying the role of CSRP3 in cardiomyopathy and heart failure.\"}, {\"paperId\": \"06188c266b51c53caff59d91f6283d13e1b04676\", \"externalIds\": {\"DOI\": \"10.1089/crispr.2023.0026\", \"CorpusId\": 264932808, \"PubMed\": \"37917075\"}, \"title\": \"Germline Editing of Drosophila Using CRISPR-Cas9-Based Cytosine and Adenine Base Editors\", \"venue\": \"The CRISPR Journal\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/crispr.2023.0026?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/crispr.2023.0026, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2065631811\", \"name\": \"Nirav Thakkar\"}, {\"authorId\": \"2264983978\", \"name\": \"Adela Hejzlarova\"}, {\"authorId\": \"2245950642\", \"name\": \"Vaclav Brabec\"}, {\"authorId\": \"5267765\", \"name\": \"D. Dole\\u017eel\"}], \"abstract\": \"Target-AID, BE3, and ABE7.10 base editors fused to the catalytically modified Cas9 and xCas9(3.7) were tested for germline editing of the fruit fly Drosophila melanogaster. We developed a guide RNA-expressing construct, white-4gRNA, targeting splice sites in the white gene, an X-chromosome located gene. Using white-4gRNA flies and transgenic lines expressing Target-AID, BE3, and ABE7.10 base editors, we tested the efficiency of stable germline gene editing at three different temperatures. Classical Cas9 generating insertions/deletions by non-homologous end joining served as a reference. Our data indicate that gene editing is most efficient at 28\\u00b0C, the highest temperature suitable for fruit flies. Finally, we created a new allele of the core circadian clock gene timeless using Target-AID. This base edited mutant allele timSS308-9FL had a disrupted circadian clock with a period of \\u223c29\\u2009h. The white-4gRNA expressing fly can be used to test new generations of base editors for future applications in Drosophila.\"}, {\"paperId\": \"061a88ad7bb4781111947d8c1171f33bb67d6d67\", \"externalIds\": {\"DOI\": \"10.1016/j.jhazmat.2022.128701\", \"CorpusId\": 247495247, \"PubMed\": \"35313160\"}, \"title\": \"Mutation of NtNRAMP3 improves cadmium tolerance and its accumulation in tobacco leaves by regulating the subcellular distribution of cadmium.\", \"venue\": \"Journal of Hazardous Materials\", \"year\": 2022, \"citationCount\": 45, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.jhazmat.2022.128701?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.jhazmat.2022.128701, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4130465\", \"name\": \"Hongfang Jia\"}, {\"authorId\": \"5452459\", \"name\": \"Zhuoran Yin\"}, {\"authorId\": \"30573154\", \"name\": \"Dongdong Xuan\"}, {\"authorId\": \"2120569546\", \"name\": \"Wenli Lian\"}, {\"authorId\": \"2112333071\", \"name\": \"Dan Han\"}, {\"authorId\": \"2202456317\", \"name\": \"Zitong Zhu\"}, {\"authorId\": \"2196089576\", \"name\": \"Chenyi Li\"}, {\"authorId\": \"2145420910\", \"name\": \"Chang Li\"}, {\"authorId\": \"51207088\", \"name\": \"Zhaopeng Song\"}], \"abstract\": \"Cadmium (Cd) is a harmful element that affects plant growth and development. Genetic improvements could be applied for enhancing Cd tolerance and accumulation in plants. Here, a novel Cd stress-induced gene, NtNRAMP3, was identified in tobacco. We constructed two NtNRAMP3-knockout (KO) tobacco lines using the CRISPR/Cas9 system, which enhanced Cd tolerance and Cd accumulation in tobacco leaves compared with those in the wildtype (WT). Subcellular localization analysis suggested that NtNRAMP3 is a tonoplast protein and GUS (\\u03b2-glucuronidase) histochemical analysis showed that NtNRAMP3 is highly expressed in the conductive tissue of leaves. NtNRAMP3-KO tobacco showed reduced Cd translation from vacuole to cytosol in leaves compared with the WT, and its vacuolar Cd concentration was significantly higher (20.78-22.81%) than that in the WT; in contrast, Cd concentration in the cytosol was reduced by 13.72-20.15%, preventing chlorophyll degradation and reducing reactive oxygen species accumulation in the leaves. Our findings demonstrate that NtNRAMP3 is involved in regulating Cd subcellular distribution (controlling Cd transport from vacuoles to the cytosol) and affects Cd tolerance and its accumulation in tobacco. This provides a key candidate gene to improve the phytoremediation efficiency of plants via genetic engineering.\"}, {\"paperId\": \"061b68da7e37b6a8d88585b0d2672d9500d7788a\", \"externalIds\": {\"PubMedCentral\": \"9171554\", \"DOI\": \"10.17912/micropub.biology.000583\", \"CorpusId\": 249460323, \"PubMed\": \"35685274\"}, \"title\": \"The C. elegans Casein Kinase II is associated with meiotic DNA in fertilized oocytes\", \"venue\": \"microPublication Biology\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9171554, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2168668058\", \"name\": \"Nahyun Yim\"}, {\"authorId\": \"87952548\", \"name\": \"J. C. Medley\"}, {\"authorId\": \"2092165\", \"name\": \"Mi Hye Song\"}], \"abstract\": \"By using CRISPR/Cas9 genome-editing, we have generated epitope-tagged KIN-3 and KIN-10 expressing strains at the endogenous C-terminal loci in Caenorhabditis elegans . We observed that both the catalytic (KIN-3::V5) and regulatory (KIN-10::2xMyc) subunits of the Casein Kinase II (CK2) holoenzyme complex are associated with meiotic DNA, enriched in the midvalent rings during meiotic divisions in fertilized C. elegans oocytes.\"}, {\"paperId\": \"061bced45e30856c3164a0739c184358c3f16602\", \"externalIds\": {\"MAG\": \"3108721180\", \"PubMedCentral\": \"7704249\", \"DOI\": \"10.17912/micropub.biology.000328\", \"CorpusId\": 227160608, \"PubMed\": \"33274319\"}, \"title\": \"Individual point mutations in two ERAD E2 ubiquitin-conjugating enzymes do not affect Caenorhabditis elegans spontaneous reversal frequency\", \"venue\": \"microPublication Biology\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7704249, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1656848615\", \"name\": \"Mackenzi S. Oswald\"}, {\"authorId\": \"2030730723\", \"name\": \"Heino J Hulsey-Vincent\"}, {\"authorId\": \"2070425908\", \"name\": \"Caroline Dahlberg\"}], \"abstract\": \"Figure 1. Mutations in E2 ubiquitin-conjugating enzyme genes and glr-1 affect spontaneous reversal frequencies differently: A. Spontaneous reversal frequency assays were performed using wild type (WT) C. elegans, alongside strains harboring mutations in glr-1 or in genes that encode the E2 ubiquitin-conjugating enzymes, ubc-6 and ubc-7. Box and whisker plots show the average reversals per minute, bounded by quartiles; the line in each box represents the median of the average reversals per minute for each genotype. N=20 individual animals for all genotypes; significance relative to WT was calculated using the Tukey-Kramer test following a one-way ANOVA (*, p=0.0027 for glr-1; non-significant: 11/19/2020 Open Access p=0.58 for ubc-6; p=0.48 for ubc-7). The data is normally distributed (Shapiro-Wilk test, p=0.86) and groups show equal variance (residuals vs. fitted plot). B. Schematics of E2 ubiquitin-conjugating enzyme genes and glr-1 gene, including the locations of point mutations. Schematics were made using http://wormweb.org/exonintron. C. Crystal structures of the human E2 Ube2j2 (top, with rotated view to show the back side of the protein) and Ube2g2 (bottom, left). Models were made using Pymol. Residues that are mutated are shown in red (Ube2j2, D153; UBC-6, T158) and yellow (Ube2g2, P78, UBC-7, P79). Residue F156 of Ube2j2 is shown in cyan. Alignments of C. elegans UBC-6 and UBC-7 regions of homology, compared to putative orthologs in other eukaryotes. The highlighted residues correspond to those shown in the structures. Description Maintaining proteostasis, or protein homeostasis, is an important cellular function because misfolded proteins can aggregate and contribute to neurodegenerative diseases. One way that cells preserve proteostasis is through the Endoplasmic Reticulum Associated Degradation pathway (ERAD). ERAD relies on interactions between E2 ubiquitinconjugating enzymes and E3 ubiquitin ligases to ubiquitylate misfolded proteins in order to signal for their destruction via the proteasome (Vembar and Brodsky 2008). We investigated if missense mutations in genes that encode two E2 ubiquitin-conjugating enzymes in C. elegans, UBC-6 and UBC-7, affect spontaneous reversal frequency (Brockie et al. 2001; Jones et al. 2002; Stewart et al. 2016; Zheng et al. 1999). UBC-6 and UBC-7 are conserved across Eukaryotes (Figure 1C). We obtained strains of animals from the Million Mutation Project with the missense mutations that confer the amino acid changes T158I in UBC-6 and P79L in UBC-7. The analogous residues in human Ube2j1 or Ube2j2 and Ube2g2 are Asp160 or 153 and Proline 78, respectively, which were mapped onto the available structures of the human enzymes (Figure 1C). In Ube2j2 (C. elegans UBC-6) Asp153 makes contact with Phe156, and mutating this residue decreases the efficiency of the enzyme (Tobi Ritterhoff, personal communication). Structural alignments suggest that Pro78 (mutated in UBC-7) is part of the well-conserved HPN (Histadine-Proline-Asparagine) motif, so mutation of the analogous residue was hypothesized to abrogate enzymatic activity (Cook and Shaw 2012; Wu et al. 2003). Our results show that the E2 ubiquitin-conjugating enzyme mutations did not significantly affect C. elegans spontaneous reversal frequency (Figure 1A). glr-1 animals were used as a control and reversed significantly less frequently than wildtype animals, as previously reported (Kowalski et al. 2011). Both ubc-6 and ubc-7 animals had less frequent spontaneous reversals than WT animals and more frequent spontaneous reversals than glr-1 animals, but neither of these results were significant. One clear reason for the insignificant change in reversal frequency in the ubc-6 and ubc-7 mutant animals could be that the missense mutations in these strains we observed do not affect gene function. It is also possible that UBC-6 and UBC-7 are able to compensate for each other in C. elegans. In S. cerevisiae Ubc6p and Ubc7p work cooperatively and sequentially to target substrates in coordination with the E3 ligases Doa10p (orthologous to C. elegans MARC-6), and Hrd1p (orthologous to C. elegans HRD-1 and paralogous to HRDL-1) (Sasagawa et al. 2007; Weber et al. 2016). It could be that this mechanism of tandem ubiquitylation is not conserved in C. elegans despite its conservation for human UBE2J2 (Weber et al. 2016). The human orthologs HRD1 and UBE2J1 (an additional ortholog of Ubc6p) also work together to target substrate proteins for degradation (Bays et al. 2001; Burr et al. 2011). Therefore it is possible that C. elegans E3s could collaborate with either UBC-6 or UBC-7 to target substrate proteins for degradation. In the future, we plan to address these possibilities using double ubc-6; ubc-7 point mutants and CRISPR-Cas9-targeted deletion mutants for UBC-6 and UBC-7, in combination with E3 ligase mutants. Methods Request a detailed protocol Reversal assay protocol: Each C. elegans strain was grown on separate NGM agar plates seeded with OP50, at 21.4\\u00b0C. While setting up for the reversal assays, multiple young adult hermaphroditic nematodes from each strain were picked onto separate seeded NGM agar plates and coded. This allows for blind analysis of the videotaped trials to occur when scoring the reversal assays, in order to reduce potential bias. During the assay, one animal at a time was picked using halocarbon oil (a non-food substance) from its coded seeded plate onto an unseeded NGM agar plate to induce foodseeking behavior. The animal was allowed to move around for two minutes before videotaping began. If the animal did not move away from its initial position after two minutes it was discarded and not counted in the data set. Each animal was recorded for five minutes and then discarded. At least one individual of each strain was observed during each experimental session in order to allow for any potential variations in temperature and humidity to be accounted for equally across all strains. The total N values listed represent measurements from multiple experimental sessions. Scoring reversals: After finishing recording all reversal assay trials for an experiment, the coded trials were viewed and scored blindly by one researcher. Movement was counted as a reversal if the tip of the nose moved backwards for at least 1/6th of the animal\\u2019s body length. The position of the posterior pharyngeal bulb was used as a marker for that distance. 11/19/2020 Open Access Recording setup: An Olympus SZ61 microscope attached to a TLB 4000 Series Substage Illuminator base was used to record the videos. The microscope was connected to The Imaging Source DFK 31AF03 color camera, which was connected to a computer running Windows OS. The software used to record the videos was Debut Professional by NCH Software. Genotyping: The genotypes of all strains were confirmed after completing the trials. The genotypes of KP4, CLD41 and CLD43 were confirmed using PCR and DNA sequencing. Additional point mutations from the MMP were considered for these experiments (http://genome.sfu.ca/gexplore/) but only one other available allele (ubc-6 (gk549681)) was also predicted to have an effect on enzyme function (Tobi Ritterhoff, personal communication). Although that strain was viable, we were unable to backcross it to remove background mutations. Other existing deletion mutants remove sequences outside of the coding locus of each gene. We also note that following our experiments, CRISPR-Cas9-targeted deletion mutants became available for each gene, but these were not available for use at the time of this study.\"}, {\"paperId\": \"062004e9d3dd5e33751a6afe4bf9009337b7842d\", \"externalIds\": {\"PubMedCentral\": \"11550531\", \"DOI\": \"10.1186/s13578-024-01315-4\", \"CorpusId\": 273961234, \"PubMed\": \"39523398\"}, \"title\": \"Knockdown of hepatic mitochondrial calcium uniporter mitigates MASH and fibrosis in mice\", \"venue\": \"Cell & Bioscience\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11550531, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47319225\", \"name\": \"Shuyu Li\"}, {\"authorId\": \"2310517373\", \"name\": \"Fangyuan Chen\"}, {\"authorId\": \"2310387995\", \"name\": \"Min Liu\"}, {\"authorId\": \"2330218785\", \"name\": \"Yajun Zhang\"}, {\"authorId\": \"2330597622\", \"name\": \"Jingjing Xu\"}, {\"authorId\": \"2144432830\", \"name\": \"Xi Li\"}, {\"authorId\": \"2310327038\", \"name\": \"Zhiyin Shang\"}, {\"authorId\": \"47156502\", \"name\": \"Shaoping Huang\"}, {\"authorId\": \"2303335383\", \"name\": \"Shu Song\"}, {\"authorId\": \"2310327071\", \"name\": \"Chuantao Tu\"}], \"abstract\": \"Mitochondrial calcium uniporter (MCU) plays pleiotropic roles in cellular physiology and pathology that contributes to a variety of diseases, but the role and potential mechanism of MCU in the pathogenesis of metabolic dysfunction-associated steatohepatitis (MASH) remain poorly understood. Here, hepatic knockdown of MCU in C57BL/6J mice was achieved by tail vein injection of AAV8-mediated the CRISPR/Cas9. Mice were fed a Choline-deficient, L-amino acid-defined high-fat diet (CDAHFD) for 8 weeks to induce MASH and fibrosis. We find that expression of MCU enhanced in MASH livers of humans and mice. MCU knockdown robustly limits lipid droplet accumulation, steatosis, inflammation, and hepatocyte apoptotic death during MASH development both in vivo in mice and in vitro in cellular models. MCU-deficient mice strikingly mitigate MASH-related fibrosis. Moreover, the protective effects of MCU knockdown against MASH progression are accompanied by a reduced level of mitochondrial calcium, limiting hepatic oxidative stress, and attenuating mitochondrial dysfunction. Mechanically, RNA sequencing analysis and protein immunoblotting indicate that knockdown MCU inhibited the Hippo/YAP pathway activation and restored the AMP-activated protein kinase (AMPK) activity during MASH development both in vitro and in vivo. MCU is up-regulated in MASH livers in humans and mice; and hepatic MCU knockdown protects against diet-induced MASH and fibrosis in mice. Thus, targeting MCU may represent a novel therapeutic strategy for MASH and fibrosis.\"}, {\"paperId\": \"06219b9c583b75cb084ef774ff46b29d53f942ea\", \"externalIds\": {\"PubMedCentral\": \"11997661\", \"DOI\": \"10.1093/hr/uhae344\", \"CorpusId\": 274691184, \"PubMed\": \"40236982\"}, \"title\": \"Advances in the study of senescence mechanisms in the genus Paeonia\", \"venue\": \"Horticulture Research\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/hr/uhae344\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11997661, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2292054765\", \"name\": \"Yuxuan Wang\"}, {\"authorId\": \"2222348150\", \"name\": \"Miao Sun\"}, {\"authorId\": \"2292041528\", \"name\": \"Wei Zhu\"}, {\"authorId\": \"2212092823\", \"name\": \"Le Chen\"}, {\"authorId\": \"2292364499\", \"name\": \"Shaocai Zhu\"}, {\"authorId\": \"2295561527\", \"name\": \"Jiageng Zhao\"}, {\"authorId\": \"2245744626\", \"name\": \"Jaime A. Teixeira da Silva\"}, {\"authorId\": \"2292029166\", \"name\": \"Xiaonan Yu\"}], \"abstract\": \"Abstract Tree and herbaceous peony are considerably important ornamental plants within the genus Paeonia, and hold substantial horticultural value. This review summarizes the progress in research on the senescence mechanisms of tree and herbaceous peony flowers, focusing on the regulation of gene expression, hormonal interactions, and the influence of environmental factors on senescence. Using high-throughput sequencing technologies, key genes displaying differential expression during senescence have been identified, and these play central roles in hormone signaling and cellular senescence. The interactions among plant hormones, including ethylene, abscisic acid, gibberellins, cytokinins, and auxins, also play key roles in the regulation of senescence. Adjustments in antioxidant levels, as well as water and energy metabolism, are critical factors in the delay of senescence. Environmental factors, including light, temperature, drought, and salt stress, also significantly affect senescence. Additionally, this review proposes future research directions, including the expansion of the molecular regulatory network of senescence in Paeonia, the use of gene editing technologies like CRISPR/Cas9, multiomics studies, and exploratory comparative research on spatial biology senescence mechanisms. These studies aim to deepen our understanding of the molecular mechanisms that underlie senescence in Paeonia and provide a scientific basis for cultivar improvement and postharvest management of these ornamental commodities in the horticultural industry.\"}, {\"paperId\": \"062410028f713b10b8ab2c1c2735322c3d63ed97\", \"externalIds\": {\"MAG\": \"3088012635\", \"DOI\": \"10.1016/j.tibtech.2020.09.001\", \"CorpusId\": 222163070, \"PubMed\": \"32988631\"}, \"title\": \"From Sequencing to Genome Editing for Cotton Improvement.\", \"venue\": \"Trends in Biotechnology\", \"year\": 2020, \"citationCount\": 43, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.tibtech.2020.09.001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.tibtech.2020.09.001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6306340\", \"name\": \"Renhai Peng\"}, {\"authorId\": \"32782832\", \"name\": \"Don C. Jones\"}, {\"authorId\": \"2158337889\", \"name\": \"Fang Liu\"}, {\"authorId\": \"34146265\", \"name\": \"Baohong Zhang\"}], \"abstract\": \"Traditional breeding techniques are proven, but additional knowledge learned from genome sequencing provides vast new data that might help identify gene targets for improving cotton sustainability. CRISPR/Cas9 provides a powerful tool for precision cotton breeding. Here, we discuss the opportunities and challenges of genome sequencing and editing for cotton improvement.\"}, {\"paperId\": \"0625afe851e3b2140ee74e7905477331e68060a2\", \"externalIds\": {\"PubMedCentral\": \"11092133\", \"DOI\": \"10.1186/s12936-024-04945-8\", \"CorpusId\": 269756191, \"PubMed\": \"38741101\"}, \"title\": \"Therapeutic efficacy and tolerability of artemether\\u2013lumefantrine for uncomplicated Plasmodium falciparum malaria in Niger, 2020\", \"venue\": \"Malaria Journal\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://malariajournal.biomedcentral.com/counter/pdf/10.1186/s12936-024-04945-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11092133, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4937536\", \"name\": \"I. Laminou\"}, {\"authorId\": \"2301143257\", \"name\": \"Ibrahima Issa\"}, {\"authorId\": \"2301143368\", \"name\": \"Eric Adehossi\"}, {\"authorId\": \"2301143947\", \"name\": \"Kabirou Maman\"}, {\"authorId\": \"19245382\", \"name\": \"H. Jackou\"}, {\"authorId\": \"2082724778\", \"name\": \"Eric Coulibaly\"}, {\"authorId\": \"6345559\", \"name\": \"Z. Tohon\"}, {\"authorId\": \"2301143425\", \"name\": \"Jehan Ahmed\"}, {\"authorId\": \"2301143928\", \"name\": \"Elisha Sanoussi\"}, {\"authorId\": \"2193667246\", \"name\": \"D. Koko\"}], \"abstract\": \"Background Monitoring therapeutic efficacy is important to ensure the efficacy of artemisinin-based combination therapy (ACT) for malaria. The current first-line treatment for uncomplicated malaria recommended by the National Malaria Control Program in Niger is artemether\\u2013lumefantrine (AL). In 2020, an in vivo study was carried out to evaluate clinical and parasitological responses to AL as well as the molecular resistance to the drug in three sentinel sites: Agadez, Tessaoua and Gaya, in Niger. Methods A multi-center, single-arm trial was conducted according to the 28-day World Health Organization (WHO) 2009 therapeutic efficacy study protocol. Children between 6\\u00a0months and 15\\u00a0years with confirmed uncomplicated Plasmodium falciparum infection and 1000\\u2013200,000 asexual parasites/\\u03bcL of blood were enrolled and followed up for 28\\u00a0days. Uncorrected and PCR-corrected efficacy results at day 28 were calculated, and molecular correction was performed by genotyping the msp1, msp2, and glurp genes. The pfk13, pfdhfr, pfdhps, pfcrt and pfmdr genes were analyzed by PCR and Sanger sequencing. The Kaplan\\u2013Meier curve assessed parasite clearance. Results A total of 255 patients were enrolled in the study. The adequate clinical and parasitological response after PCR correction was 98.9% (95% CI 96.4\\u2013101.0%), 92.2% (85.0\\u201398.5%) and 97.1% (93.1\\u2013101.0%) in Gaya, Tessaoua and Agadez, respectively. No adverse events were observed. Ten mutations (SNP) were found, including 7 synonyms (K248K, G690G, E691E, E612E, C469C, G496G, P718P) and 3 non-synonyms (N594K, R255K, V714S). Two mutations emerged: N594K and V714S. The R255K mutation detected in Southeast Asia was also detected. The pfdhpsK540E and pfdhfrI164L mutations associated with high levels of resistance are absent. There is a reversal of chloroquine resistance. Conclusion The study findings indicate that AL is effective and well tolerated for the treatment of uncomplicated malaria in three sites in Niger. The emergence of a pfk13 mutation requires additional testing such as the Ring Stage Assay and CRISPR/Cas9 to confirm the role of these emerging mutations. Trial registration NCT05070520, October 7, 2021.\"}, {\"paperId\": \"0625fbb7f455a601f15ae96d31bc3f23b1601d06\", \"externalIds\": {\"PubMedCentral\": \"10773783\", \"DOI\": \"10.3389/fgeed.2023.1284547\", \"CorpusId\": 266412979, \"PubMed\": \"38192431\"}, \"title\": \"What do people think about genetic engineering? A systematic review of questionnaire surveys before and after the introduction of CRISPR\", \"venue\": \"Frontiers in Genome Editing\", \"year\": 2023, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgeed.2023.1284547/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10773783, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2224431694\", \"name\": \"Pedro Dias Ramos\"}, {\"authorId\": \"66263703\", \"name\": \"M. Almeida\"}, {\"authorId\": \"2275184817\", \"name\": \"I. A. S. Olsson\"}], \"abstract\": \"The advent of CRISPR-Cas9 in 2012 started revolutionizing the field of genetics by broadening the access to a method for precise modification of the human genome. It also brought renewed attention to the ethical issues of genetic modification and the societal acceptance of technology for this purpose. So far, many surveys assessing public attitudes toward genetic modification have been conducted worldwide. Here, we present the results of a systematic review of primary publications of surveys addressing public attitudes toward genetic modification as well as the awareness and knowledge about the technology required for genetic modification. A total of 53 primary publications (1987\\u20132020) focusing on applications in humans and non-human animals were identified, covering countries in four continents. Of the 53 studies, 30 studies from until and including 2012 (pre-CRISPR) address gene therapy in humans and genetic modification of animals for food production and biomedical research. The remaining 23 studies from after 2013 (CRISPR) address gene editing in humans and animals. Across countries, respondents see gene therapy for disease treatment or prevention in humans as desirable and highly acceptable, whereas enhancement is generally met with opposition. When the study distinguishes between somatic and germline applications, somatic gene editing is generally accepted, whereas germline applications are met with ambivalence. The purpose of the application is also important for assessing attitudes toward genetically modified animals: modification in food production is much less accepted than for biomedical application in pre-CRISPR studies. A relationship between knowledge/awareness and attitude toward genetic modification is often present. A critical appraisal of methodology quality in the primary publications with regards to sampling and questionnaire design, development, and administration shows that there is considerable scope for improvement in the reporting of methodological detail. Lack of information is more common in earlier studies, which probably reflects the changing practice in the field.\"}, {\"paperId\": \"0628254f43abc9aae469100962e0e324bdcb10a0\", \"externalIds\": {\"DOI\": \"10.1021/acssynbio.1c00251\", \"CorpusId\": 237584386, \"PubMed\": \"34546037\"}, \"title\": \"Engineering T4 Bacteriophage for In Vivo Display by Type V CRISPR-Cas Genome Editing.\", \"venue\": \"ACS Synthetic Biology\", \"year\": 2021, \"citationCount\": 33, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acssynbio.1c00251?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acssynbio.1c00251, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144063671\", \"name\": \"Junhua Dong\"}, {\"authorId\": \"1947248137\", \"name\": \"Cen Chen\"}, {\"authorId\": \"7894801\", \"name\": \"Yuepeng Liu\"}, {\"authorId\": \"47054694\", \"name\": \"Jingen Zhu\"}, {\"authorId\": \"2145680482\", \"name\": \"Mengling Li\"}, {\"authorId\": \"144089717\", \"name\": \"V. Rao\"}, {\"authorId\": \"3492135\", \"name\": \"Pan Tao\"}], \"abstract\": \"Bacteriophage T4 has enormous potential for biomedical applications due to its large size, capsid architecture, and high payload capability for protein and DNA delivery. However, it is not very easy to genetically engineer its genome heavily modified by cytosine hydroxymethylation and glucosylation. The glucosyl hydroxymethyl cytosine (ghmC) genome of phage is completely resistant to most restriction endonucleases and exhibits various degrees of resistance to CRISPR-Cas systems. Here, we found that the type V CRISPR-Cas12a system, which shows efficient cleavage of ghmC-modified genome when compared to the type II CRISPR-Cas9 system, can be synergistically employed to generate recombinant T4 phages. Focused on surface display, we analyzed the ability of phage T4 outer capsid proteins Hoc (highly antigenic outer capsid protein) and Soc (small outer capsid protein) to tether, in vivo, foreign peptides and proteins to T4 capsid. Our data show that while these could be successfully expressed and displayed during the phage infection, shorter peptides are present at a much higher copy number than full-length proteins. However, the copy number of the latter could be elevated by driving the expression of the transgene using the strong T7 RNA polymerase expression system. This CRISPR-inspired approach has the potential to expand the application of phages to various basic and translational research projects.\"}, {\"paperId\": \"062a0b8c84e5e4392eb14e694557cd693aea4ebf\", \"externalIds\": {\"MAG\": \"3088896990\", \"PubMedCentral\": \"7704946\", \"DOI\": \"10.1016/j.psj.2020.09.029\", \"CorpusId\": 224946281, \"PubMed\": \"33248566\"}, \"title\": \"Avian Toll-like receptor 3 isoforms and evaluation of Toll-like receptor 3\\u2013mediated immune responses using knockout quail fibroblast cells\", \"venue\": \"Poultry Science\", \"year\": 2020, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.psj.2020.09.029\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7704946, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40867557\", \"name\": \"Mahesh Kc\"}, {\"authorId\": \"5619184\", \"name\": \"J. Ngunjiri\"}, {\"authorId\": \"46663685\", \"name\": \"Joonbum Lee\"}, {\"authorId\": \"2144385\", \"name\": \"J. Ahn\"}, {\"authorId\": \"6331998\", \"name\": \"Mohamed Elaish\"}, {\"authorId\": \"143895600\", \"name\": \"A. Ghorbani\"}, {\"authorId\": \"40865058\", \"name\": \"Michael E C Abundo\"}, {\"authorId\": \"6726520\", \"name\": \"Kichoon Lee\"}, {\"authorId\": \"2048835284\", \"name\": \"Chang-won Lee\"}], \"abstract\": \"Toll-like receptor 3 (TLR3) induces host innate immune response on recognition of viral double-stranded RNA (dsRNA). Although several studies of avian TLR3 have been reported, none of these studies used a gene knockout (KO) model to directly assess its role in inducing the immune response and effect on other dsRNA receptors. In this study, we determined the coding sequence of quail TLR3, identified isoforms, and generated TLR3 KO quail fibroblast (QT-35) cells using a CRISPR/Cas9 system optimized for avian species. The TLR3-mediated immune response was studied by stimulating the wild-type (WT) and KO QT-35 cells with synthetic dsRNA or polyinosinic:polycytidylic acid [poly(I:C)] or infecting the cells with different RNA viruses such as influenza A virus, avian reovirus, and vesicular stomatitis virus. The direct poly(I:C) treatment significantly increased IFN-\\u03b2 and IL-8 gene expression along with the cytoplasmic dsRNA receptor, melanoma differentiation\\u2013associated gene 5 (MDA5), in WT cells, whereas no changes in all corresponding genes were observed in KO cells. We further confirmed the antiviral effects of poly(I:C)-induced TLR3-mediated immunity by demonstrating significant reduction of virus titer in poly(I:C)\\u2013treated WT cells, but not in TLR3 KO cells. On virus infection, varying levels of IFN-\\u03b2, IL-8, TLR3, and MDA5 gene upregulation were observed depending on the viruses. No major differences in gene expression level were observed between WT and TLR3 KO cells, which suggests a relatively minor role of TLR3 in sensing and exerting immune response against the viruses tested in vitro. Our data show that quail TLR3 is an important endosomal dsRNA receptor responsible for regulation of type I interferon and proinflammatory cytokine, and affect the expression of MDA5, another dsRNA receptor, most likely through cytokine-mediated communication.\"}, {\"paperId\": \"062b8872ca5063aab150d7e64d85afb6be93cef8\", \"externalIds\": {\"PubMedCentral\": \"10881377\", \"DOI\": \"10.1016/j.heliyon.2024.e26260\", \"CorpusId\": 267620381, \"PubMed\": \"38390040\"}, \"title\": \"Understanding the prion-like behavior of mutant p53 proteins in triple-negative breast cancer pathogenesis: The current therapeutic strategies and future directions\", \"venue\": \"Heliyon\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2405844024022916/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10881377, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2200981983\", \"name\": \"Y. Naeimzadeh\"}, {\"authorId\": \"46303404\", \"name\": \"A. Tajbakhsh\"}, {\"authorId\": \"5100302\", \"name\": \"Jafar Fallahi\"}], \"abstract\": \"Breast cancer (BC) is viewed as a significant public health issue and is the primary cause of cancer-related deaths among women worldwide. Triple-negative breast cancer (TNBC) is a particularly aggressive subtype that predominantly affects young premenopausal women. The tumor suppressor p53 playsa vital role in the cellular response to DNA damage, and its loss or mutations are commonly present in many cancers, including BC. Recent evidence suggests that mutant p53 proteins can aggregate and form prion-like structures, which may contribute to the pathogenesis of different types of malignancies, such as BC. This review provides an overview of BC molecular subtypes, the epidemiology of TNBC, and the role of p53 in BC development. We also discuss the potential implications of prion-like aggregation in BC and highlight future research directions. Moreover, a comprehensive analysis of the current therapeutic approaches targeting p53 aggregates in BC treatment is presented. Strategies including small molecules, chaperone inhibitors, immunotherapy, CRISPR-Cas9, and siRNA are discussed, along with their potential benefits and drawbacks. The use of these approaches to inhibit p53 aggregation and degradation represents a promising target for cancer therapy. Future investigations into the efficacy of these approaches against various p53 mutations or binding to non-p53 proteins should be conducted to develop more effective and personalized therapies for BC treatment.\"}, {\"paperId\": \"0631e129fc66acc029a6f20a8fd4ef56c30a4d9c\", \"externalIds\": {\"PubMedCentral\": \"9837192\", \"DOI\": \"10.1038/s41467-022-35044-4\", \"CorpusId\": 244955193, \"PubMed\": \"36635291\"}, \"title\": \"Genetic conversion of a split-drive into a full-drive element\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-022-35044-4.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9837192, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15275560\", \"name\": \"Gerard Terradas\"}, {\"authorId\": \"152954547\", \"name\": \"Jared B. Bennett\"}, {\"authorId\": \"7718476\", \"name\": \"Zhi-Qian Li\"}, {\"authorId\": \"69983523\", \"name\": \"John M. Marshall\"}, {\"authorId\": \"8231251\", \"name\": \"E. Bier\"}], \"abstract\": \"The core components of CRISPR-based gene drives, Cas9 and guide RNA (gRNA), either can be linked within a self-contained single cassette (full gene-drive, fGD) or be provided in two separate elements (split gene-drive, sGD), the latter offering greater control options. We previously engineered split systems that could be converted genetically into autonomous full drives. Here, we examine such dual systems inserted at the spo 11 locus that are recoded to restore gene function and thus organismic fertility. Despite minimal differences in transmission efficiency of the sGD or fGD drive elements in single generation crosses, the reconstituted spo 11 fGD cassette surprisingly exhibits slower initial drive kinetics than the unlinked sGD element in multigenerational cage studies, but then eventually catches up to achieve a similar level of final introduction. These unexpected kinetic behaviors most likely reflect differing transient fitness costs associated with individuals co-inheriting Cas9 and gRNA transgenes during the drive process. CRISPR-based gene-drives can carry the Cas9 and guide RNA (gRNA) components in a single-linked cassette or in separate elements inserted into different genomic loci. Here the authors genetically transform and compare full versus split drives, with the former performing less efficiently than predicted.\"}, {\"paperId\": \"06371384556f28b05722179c8e80871179878150\", \"externalIds\": {\"MAG\": \"3088748098\", \"DOI\": \"10.1101/2020.09.22.20199786\", \"CorpusId\": 221853758}, \"title\": \"Development and clinical evaluation of non-viral genome specific targeted CAR T cells in relapsed/refractory B-cell non-Hodgkin lymphoma\", \"venue\": \"medRxiv\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1101/2020.09.22.20199786\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2020.09.22.20199786?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2020.09.22.20199786, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8214389\", \"name\": \"Jiqin Zhang\"}, {\"authorId\": \"5716109\", \"name\": \"Yong-xian Hu\"}, {\"authorId\": \"2156960940\", \"name\": \"Jiaxuan Yang\"}, {\"authorId\": \"2157338894\", \"name\": \"Wei Li\"}, {\"authorId\": \"2190024900\", \"name\": \"Yue Tian\"}, {\"authorId\": \"153232108\", \"name\": \"G. Wei\"}, {\"authorId\": \"2398584610\", \"name\": \"Linjie Zhang\"}, {\"authorId\": \"147270691\", \"name\": \"K. Zhao\"}, {\"authorId\": \"15508268\", \"name\": \"Yalei Qi\"}, {\"authorId\": \"38826967\", \"name\": \"Binghe Tan\"}, {\"authorId\": \"47474376\", \"name\": \"Mingming Zhang\"}, {\"authorId\": \"2153685354\", \"name\": \"Yi Li\"}, {\"authorId\": \"14975065\", \"name\": \"Q. Tian\"}, {\"authorId\": \"2147436938\", \"name\": \"Chunqiang Fang\"}, {\"authorId\": \"2301261333\", \"name\": \"Yuxuan Wu\"}, {\"authorId\": \"7379328\", \"name\": \"Dali Li\"}, {\"authorId\": \"37093817\", \"name\": \"Bing Du\"}, {\"authorId\": \"39793900\", \"name\": \"Ming-Yu Liu\"}, {\"authorId\": \"143769423\", \"name\": \"He Huang\"}], \"abstract\": \"In recent years, chimeric antigen receptor (CAR) T cell therapy has shown great promise in treating hematological malignancies. However, using virus in manufacture of CAR T cells brings about several problems. The application of CRISPR/Cas9 genome editing technology emerges in constructing novel CAR T cells by disrupting endogenous genes. Here we successfully develop a two-in-one approach to generate non-viral genome specific targeted CAR T cells through CRISPR/Cas9. By targeting a CAR in AAVS1 safe harbor locus, we demonstrated that these CAR T cells behave comparable to those conventionally produced by lentivirus. Furthermore, PD1-knockin anti-CD19 CAR T cells show a superior ability to eradicate tumor cells with high PD-L1 expression. In the adoptive therapy for relapsed/refractory (r/r) aggressive B-cell non-Hodgkin lymphoma (B-NHL), we observed durable responses without serious adverse events and complete remission (CR) in patients treated with these PD1 knockout CAR T cells. Collectively, our results prove the safety and feasibility of non-viral genome specific integrated CAR T cells, thus providing a new potential strategy for cancer treatment using these novel CAR T cells.\"}, {\"paperId\": \"063ae29774bf8bbfd87b7d4f844203d7e020e3e6\", \"externalIds\": {\"PubMedCentral\": \"10918952\", \"DOI\": \"10.1186/s12934-024-02347-8\", \"CorpusId\": 268252809, \"PubMed\": \"38448924\"}, \"title\": \"Correction: Stable expression of HIV-1 MPER extended epitope on the surface of the recombinant probiotic bacteria Escherichia Coli Nissle 1917 using CRISPR/Cas9\", \"venue\": \"Microbial Cell Factories\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1186/s12934-024-02347-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10918952, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2282476555\", \"name\": \"Nathaniel Ninyio\"}, {\"authorId\": \"2289030521\", \"name\": \"Katharina Schmitt\"}, {\"authorId\": \"2282476547\", \"name\": \"Gladys Sergon\"}, {\"authorId\": \"2293348143\", \"name\": \"Charlotta Nilsson\"}, {\"authorId\": \"2282476491\", \"name\": \"S\\u00f6ren Andersson\"}, {\"authorId\": \"2282476661\", \"name\": \"N. Scherbak\"}], \"abstract\": null}, {\"paperId\": \"063b2ea18682c958af2c63b05fa98a44a339798c\", \"externalIds\": {\"MAG\": \"3002874156\", \"PubMedCentral\": \"6993249\", \"DOI\": \"10.3389/fpls.2019.01739\", \"CorpusId\": 210871622, \"PubMed\": \"32038697\"}, \"title\": \"Minor Effects of 11 Dof Family Genes Contribute to the Missing Heritability of Heading Date in Rice (Oryza sativa L.)\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2020, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2019.01739/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6993249, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145587513\", \"name\": \"Yong Huang\"}, {\"authorId\": \"2395346\", \"name\": \"Zhongmin Han\"}, {\"authorId\": \"1466520491\", \"name\": \"Niannian Cheng\"}, {\"authorId\": \"2114647448\", \"name\": \"Meifang Luo\"}, {\"authorId\": \"1873121\", \"name\": \"X. Bai\"}, {\"authorId\": \"40484056\", \"name\": \"Y. Xing\"}], \"abstract\": \"DNA binding with one finger (Dof) proteins are plant-specific transcription factors with important and diverse functions in seed germination, flowering time, and biotic and abiotic stresses. In this study, haplotype-based association analysis was conducted between heading date and 30 Dof family genes in a worldwide germplasm collection. Of these, 22 Dof genes were associated with heading date. Multiple comparisons among haplotypes revealed their diverse functions in promoting and suppressing heading date under short-day (SD) and long-day (LD) conditions. They cumulatively made a considerable contribution to the missing heritability of heading date. A set of knockout mutants of 30 Dof genes generated by CRISPR/Cas9-mediated genome editing technology showed that 11 and 9 Dof genes regulated heading date under LD and SD, respectively. Phenotype measurement of mutants showed that these 11 and 9 Dof genes slightly regulated heading with effects of 2\\u20135 days under LD and SD, respectively. Both mutant and natural variation assays indicated functional redundancy in regulating heading date among Dof family genes. Nucleotide diversity analysis suggested that most Dof genes have been subjected to selection during domestication and improvement. Beyond heading date, this set of mutants is also a good resource for evaluating the function of Dof genes in regulating stress tolerance and seed germination.\"}, {\"paperId\": \"063cb1aa6327058a47e6f291471902d4a4ab1522\", \"externalIds\": {\"MAG\": \"3088576814\", \"PubMedCentral\": \"7523322\", \"DOI\": \"10.1186/s13073-020-00778-7\", \"CorpusId\": 221997621, \"PubMed\": \"32988399\"}, \"title\": \"Mitochondrial DNA copy number can influence mortality and cardiovascular disease via methylation of nuclear DNA CpGs\", \"venue\": \"Genome Medicine\", \"year\": 2020, \"citationCount\": 93, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://genomemedicine.biomedcentral.com/track/pdf/10.1186/s13073-020-00778-7\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7523322, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2383990\", \"name\": \"C. Castellani\"}, {\"authorId\": \"26957090\", \"name\": \"Ryan J. Longchamps\"}, {\"authorId\": \"51981614\", \"name\": \"Jason A. Sumpter\"}, {\"authorId\": \"39842283\", \"name\": \"Charles E Newcomb\"}, {\"authorId\": \"144726786\", \"name\": \"J. Lane\"}, {\"authorId\": \"1861326\", \"name\": \"Megan L. Grove\"}, {\"authorId\": \"144297488\", \"name\": \"J. Bressler\"}, {\"authorId\": \"32883185\", \"name\": \"J. Brody\"}, {\"authorId\": \"7847077\", \"name\": \"J. Floyd\"}, {\"authorId\": \"6940748\", \"name\": \"Traci M. Bartz\"}, {\"authorId\": \"2269921515\", \"name\": \"K. Taylor\"}, {\"authorId\": \"1976254826\", \"name\": \"Penglong Wang\"}, {\"authorId\": \"6660364\", \"name\": \"A. Tin\"}, {\"authorId\": \"2230576534\", \"name\": \"J. Coresh\"}, {\"authorId\": \"2863075\", \"name\": \"J. Pankow\"}, {\"authorId\": \"2573222\", \"name\": \"M. Fornage\"}, {\"authorId\": \"2801530\", \"name\": \"E. Guallar\"}, {\"authorId\": \"1398325010\", \"name\": \"B. O\\u2019Rourke\"}, {\"authorId\": \"2179619\", \"name\": \"N. Pankratz\"}, {\"authorId\": \"2108012207\", \"name\": \"Chunyu Liu\"}, {\"authorId\": \"2411533736\", \"name\": \"D. Levy\"}, {\"authorId\": \"144653309\", \"name\": \"N. Sotoodehnia\"}, {\"authorId\": \"2918432\", \"name\": \"E. Boerwinkle\"}, {\"authorId\": \"6437605\", \"name\": \"D. Arking\"}], \"abstract\": \"Background Mitochondrial DNA copy number (mtDNA-CN) has been associated with a variety of aging-related diseases, including all-cause mortality. However, the mechanism by which mtDNA-CN influences disease is not currently understood. One such mechanism may be through regulation of nuclear gene expression via the modification of nuclear DNA (nDNA) methylation. Methods To investigate this hypothesis, we assessed the relationship between mtDNA-CN and nDNA methylation in 2507 African American (AA) and European American (EA) participants from the Atherosclerosis Risk in Communities (ARIC) study. To validate our findings, we assayed an additional 2528 participants from the Cardiovascular Health Study (CHS) ( N \\u2009=\\u2009533) and Framingham Heart Study (FHS) ( N \\u2009=\\u20091995). We further assessed the effect of experimental modification of mtDNA-CN through knockout of TFAM , a regulator of mtDNA replication, via CRISPR-Cas9. Results Thirty-four independent CpGs were associated with mtDNA-CN at genome-wide significance ( P \\u2009<\\u20095\\u2009\\u00d7\\u200910 \\u2212\\u20098 ). Meta-analysis across all cohorts identified six mtDNA-CN-associated CpGs at genome-wide significance ( P \\u2009<\\u20095\\u2009\\u00d7\\u200910 \\u2212\\u20098 ). Additionally, over half of these CpGs were associated with phenotypes known to be associated with mtDNA-CN, including coronary heart disease, cardiovascular disease, and mortality. Experimental modification of mtDNA-CN demonstrated that modulation of mtDNA-CN results in changes in nDNA methylation and gene expression of specific CpGs and nearby transcripts. Strikingly, the \\u201cneuroactive ligand receptor interaction\\u201d KEGG pathway was found to be highly overrepresented in the ARIC cohort ( P \\u2009=\\u20095.24\\u2009\\u00d7\\u200910 \\u2212\\u200912 ), as well as the TFAM knockout methylation ( P\\u2009= \\u00a04.41\\u2009\\u00d7\\u200910 \\u2212\\u20094 ) and expression ( P\\u2009= \\u00a04.30\\u2009\\u00d7\\u200910 \\u2212\\u20094 ) studies. Conclusions These results demonstrate that changes in mtDNA-CN influence nDNA methylation at specific loci and result in differential expression of specific genes that may impact human health and disease via altered cell signaling.\"}, {\"paperId\": \"063d244323d90a073b6a7981c25f67c439767579\", \"externalIds\": {\"MAG\": \"3180789036\", \"DOI\": \"10.20944/PREPRINTS202107.0182.V1\", \"CorpusId\": 237258026}, \"title\": \"CRISPR Cas9 Tip of an Iceberg: It\\u2019s Potential in Genome Editing and Many More\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.20944/preprints202107.0182.v1\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.20944/PREPRINTS202107.0182.V1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.20944/PREPRINTS202107.0182.V1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2066050497\", \"name\": \"Jalal Ahmad\"}, {\"authorId\": \"2289302871\", \"name\": \"N. Siddique\"}], \"abstract\": \"Clustered regularly interspaced short palindromic repeats or CRISPR, one of the major technological tools from nature's toolbox, has revolutionized the scientific world with its potential use in humans and plants. CRISPR Cas9 was first known as an adaptive immune system of bacteria. It is a system that cleaves foreign DNA. It has been exploited to be used as a genome editing tool for correcting genetic diseases in humans, for plants to create stress-resistant plants, and for a variety of different purposes. This review provides a basic overview of its applications in different areas of biological research. It has immense potential for a variety of researches, but it's still a mystery for science. It feels like scientists just know a tip of an iceberg.\"}, {\"paperId\": \"063dde4f9cb2b29f0df22891f04f13dd95bdba0a\", \"externalIds\": {\"PubMedCentral\": \"11754126\", \"DOI\": \"10.1093/nar/gkaf005\", \"CorpusId\": 269363152, \"PubMed\": \"39844455\"}, \"title\": \"A scalable CRISPR-Cas9 gene editing system facilitates CRISPR screens in the malaria parasite Plasmodium berghei\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/nar/gkaf005\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11754126, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"9541120\", \"name\": \"Thorey K. Jonsdottir\"}, {\"authorId\": \"2298277241\", \"name\": \"M. Paoletta\"}, {\"authorId\": \"2298281321\", \"name\": \"Takahiro Ishizaki\"}, {\"authorId\": \"2298278202\", \"name\": \"Sophia Hernandez\"}, {\"authorId\": \"2298281047\", \"name\": \"M. Ivanova\"}, {\"authorId\": \"2298280857\", \"name\": \"Alicia Herrera Curbelo\"}, {\"authorId\": \"2298275979\", \"name\": \"Paulina A. Saiki\"}, {\"authorId\": \"2204229605\", \"name\": \"Martin Selinger\"}, {\"authorId\": \"2164335200\", \"name\": \"Debojyoti Das\"}, {\"authorId\": \"50623435\", \"name\": \"J. Henriksson\"}, {\"authorId\": \"2298278052\", \"name\": \"E. Bushell\"}], \"abstract\": \"Many Plasmodium genes remain uncharacterised due to low genetic tractability. Previous large scale knockout screens have only been able to target about half of the genome in the more genetically tractable rodent malaria parasite Plasmodium berghei. To overcome this limitation, we have developed a scalable CRISPR system called PbHiT, which uses a single cloning step to generate targeting vectors with 100 bp homology arms physically linked to a guide RNA (gRNA) that effectively integrate into the target locus. We show that PbHiT coupled with gRNA sequencing robustly recapitulates known knockout mutant phenotypes in pooled transfections. Furthermore, we provide vector designs and sequences to target the entire P. berghei genome and scale-up vector production using a pooled ligation approach. This work presents for the first time a tool for high-throughput CRISPR screens in Plasmodium for studying the parasite\\u2019s biology at scale.\"}, {\"paperId\": \"06425fdca4425c933e564cf8d569db8b6ab1a857\", \"externalIds\": {\"PubMedCentral\": \"11151919\", \"DOI\": \"10.1093/genetics/iyae054\", \"CorpusId\": 268929873, \"PubMed\": \"38577877\"}, \"title\": \"A Recql5 mutant facilitates complex CRISPR/Cas9-mediated chromosomal engineering in mouse zygotes\", \"venue\": \"Genetics\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/genetics/advance-article-pdf/doi/10.1093/genetics/iyae054/57165143/iyae054.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11151919, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48479146\", \"name\": \"Satoru Iwata\"}, {\"authorId\": \"26945428\", \"name\": \"Miki Nagahara\"}, {\"authorId\": \"2295123519\", \"name\": \"Risako Ido\"}, {\"authorId\": \"2295123723\", \"name\": \"Takashi Iwamoto\"}], \"abstract\": \"Abstract Complex chromosomal rearrangements (CCRs) are often observed in clinical samples from patients with cancer and congenital diseases but are difficult to induce experimentally. Here, we report the first success in establishing animal models for CCRs. Mutation in Recql5, a crucial member of the DNA helicase RecQ family involved in DNA replication, transcription, and repair, enabled CRISPR/Cas9-mediated CCRs, establishing a mouse model containing triple fusion genes and megabase-sized inversions. Some of these structural features of individual chromosomal rearrangements use template switching and microhomology-mediated break-induced replication mechanisms and are reminiscent of the newly described phenomenon \\u201cchromoanasynthesis.\\u201d These data show that Recql5 mutant mice could be a powerful tool to analyze the pathogenesis of CCRs (particularly chromoanasynthesis) whose underlying mechanisms are poorly understood. The Recql5 mutants generated in this study are to be deposited at key animal research facilities, thereby making them accessible for future research on CCRs.\"}, {\"paperId\": \"064614528c473f3df6d69c9793101ea4665fcb18\", \"externalIds\": {\"PubMedCentral\": \"11228833\", \"DOI\": \"10.1093/genetics/iyae085\", \"CorpusId\": 270004739, \"PubMed\": \"38788202\"}, \"title\": \"Knockdown of NeuroD2 leads to seizure-like behavior, brain neuronal hyperactivity and a leaky blood-brain barrier in a Xenopus laevis tadpole model of DEE72\", \"venue\": \"Genetics\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/genetics/advance-article-pdf/doi/10.1093/genetics/iyae085/57889904/iyae085.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11228833, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2303436201\", \"name\": \"S. Banerjee\"}, {\"authorId\": \"2303005830\", \"name\": \"P. Szyszka\"}, {\"authorId\": \"2303007093\", \"name\": \"C. W. Beck\"}], \"abstract\": \"Abstract Developmental and Epileptic Encephalopathies (DEE) are a genetically diverse group of severe, early onset seizure disorders. DEE are normally identified clinically in the first six months of life by the presence of frequent, difficult to control seizures and accompanying stalling or regression of development. DEE72 results from de novo mutations of the NEUROD2 gene that result in loss of activity of the encoded transcription factor, and the seizure phenotype was shown to be recapitulated in Xenopus tropicalis tadpoles. We used CRISPR/Cas9 to make a DEE72 model in Xenopus laevis, to further investigate the developmental etiology. NeuroD2.S CRISPR/Cas9 edited tadpoles were more active, swam faster on average, and had more seizures (C-shaped contractions resembling unprovoked C-start escape responses) than their sibling controls. Live imaging of Ca2+ signaling revealed prolongued, strong signals sweeping through the brain, indicative of neuronal hyperactivity. While the resulting tadpole brain appeared grossly normal, the blood-brain barrier (BBB) was found to be leakier than that of controls. Additionally, the TGF\\u03b2 antagonist Losartan was shown to have a short-term protective effect, reducing neuronal hyperactivity and reducing permeability of the BBB. Treatment of NeuroD2 CRISPant tadpoles with 5\\u2005mM Losartan decreased seizure events by more than 4-fold compared to the baseline. Our results support a model of DEE72 resulting from reduced NeuroD2 activity during vertebrate brain development, and indicate that a leaky BBB contributes to epileptogenesis.\"}, {\"paperId\": \"06464db49e950ca74b255748664785b61ad2b087\", \"externalIds\": {\"PubMedCentral\": \"11145818\", \"DOI\": \"10.1186/s40104-024-01040-5\", \"CorpusId\": 270200121, \"PubMed\": \"38825693\"}, \"title\": \"Myostatin gene role in regulating traits of poultry species for potential industrial applications\", \"venue\": \"Journal of Animal Science and Biotechnology\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jasbsci.biomedcentral.com/counter/pdf/10.1186/s40104-024-01040-5\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11145818, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46663685\", \"name\": \"Joonbum Lee\"}, {\"authorId\": \"2157226727\", \"name\": \"Dong-Hwan Kim\"}, {\"authorId\": \"6726520\", \"name\": \"Kichoon Lee\"}], \"abstract\": \"The myostatin ( MSTN ) gene is considered a potential genetic marker to improve economically important traits in livestock, since the discovery of its function using the MSTN knockout mice. The anti-myogenic function of the MSTN gene was further demonstrated in farm animal species with natural or induced mutations. In poultry species, myogenesis in cell culture was regulated by modulation of the MSTN gene. Also, different expression levels of the MSTN gene in poultry models with different muscle mass have been reported, indicating the conserved myogenic function of the MSTN gene between mammalian and avian species. Recent advances of CRISPR/Cas9-mediated genome editing techniques have led to development of genome-edited poultry species targeting the MSTN gene to clearly demonstrate its anti-myogenic function and further investigate other potential functions in poultry species. This review summarizes research conducted to understand the function of the MSTN gene in various poultry models from cells to whole organisms. Furthermore, the genome-edited poultry models targeting the MSTN gene are reviewed to integrate diverse effects of the MSTN gene on different traits of poultry species.\"}, {\"paperId\": \"064726b1498052647c8fe8fd7bac65b1f7e8537b\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2021.102393\", \"CorpusId\": 235348319, \"PubMed\": \"34088018\"}, \"title\": \"Establishment and characterization of a human embryonic stem cell line carrying a heterozygous GATA4T280M mutation.\", \"venue\": \"Stem Cell Research\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2021.102393\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2021.102393?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2021.102393, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11180818\", \"name\": \"Lingqun Ye\"}, {\"authorId\": \"2111508828\", \"name\": \"You Yu\"}, {\"authorId\": \"2153954297\", \"name\": \"Yong Wang\"}, {\"authorId\": \"2145495511\", \"name\": \"Ying Huang\"}, {\"authorId\": \"2152596116\", \"name\": \"Miao Yu\"}, {\"authorId\": \"143726786\", \"name\": \"W. Lei\"}, {\"authorId\": \"82706145\", \"name\": \"Jun-ming Tang\"}, {\"authorId\": \"6555268\", \"name\": \"Shijun Hu\"}], \"abstract\": \"Heterozygous T280M mutation in the GATA4 gene, encoding GATA binding protein 4, was recently identified in patients with congenital heart disease (CHD). Here, a human embryonic stem cell line carrying a heterozygous GATA4T280M mutation was generated by using the CRISPR/Cas9 and piggyBac technologies. This GATA4T280M cell line remains normal morphology, pluripotency and karyotype, and could differentiate into all three germ layers both in vivo and in vitro. Thus, the GATA4T280M cell line will be a useful platform to model GATA4-associated CHD through the induction of cardiomyocyte differentiation in vitro.\"}, {\"paperId\": \"064e6f611b86fedee5b7c642b0b63790d7aea464\", \"externalIds\": {\"PubMedCentral\": \"9713993\", \"DOI\": \"10.1186/s12981-022-00483-y\", \"CorpusId\": 254100291, \"PubMed\": \"36457057\"}, \"title\": \"CRISPR/Cas9: a tool to eradicate HIV-1\", \"venue\": \"AIDS Research and Therapy\", \"year\": 2022, \"citationCount\": 34, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://aidsrestherapy.biomedcentral.com/counter/pdf/10.1186/s12981-022-00483-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9713993, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2375872065\", \"name\": \"Ruchira Bhowmik\"}, {\"authorId\": \"48046968\", \"name\": \"B. Chaubey\"}], \"abstract\": \"The development of antiretroviral therapy (ART) has been effective in suppressing HIV replication. However, severe drug toxicities due to the therapy and its failure in targeting the integrated proviral genome have led to the introduction of a new paradigm of gene-based therapies. With its effective inhibition and high precision, clustered regularly interspaced short palindromic repeats (CRISPR)-associated protein-9 nuclease (Cas9) or CRISPR/Cas9 has emerged as an effective genome editing tool in the last decade. Mediated by guide RNAs (gRNAs), Cas9 endonuclease acts like genetic scissors that can modify specific target sites. With this concept, CRISPR/Cas9 has been used to target the integrated proviral HIV-1 genome both in in vitro as well as in vivo studies including non-human primates. The CRISPR has also been tested for targeting latent HIV-1 by modulating the proviral transcription with the help of a specialized Cas9 mutant. Overcoming the limitations of the current therapy, CRISPR has the potential to become the primary genome editing tool for eradicating HIV-1 infection. In this review, we summarize the recent advancements of CRISPR to target the proviral HIV-1 genome, the challenges and future prospects.\"}, {\"paperId\": \"064eebcffebe91a6f586cab272a49a0e1ea2745c\", \"externalIds\": {\"MAG\": \"3098778862\", \"DOI\": \"10.1002/dta.2980\", \"CorpusId\": 226990608, \"PubMed\": \"33201595\"}, \"title\": \"New application of the CRISPR-Cas9 system for site-specific exogenous gene doping analysis.\", \"venue\": \"Drug Testing and Analysis\", \"year\": 2020, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/dta.2980?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/dta.2980, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1739121815\", \"name\": \"Joon-Yeop Yi\"}, {\"authorId\": \"2110000292\", \"name\": \"Minyoung Kim\"}, {\"authorId\": \"50206730\", \"name\": \"H. Min\"}, {\"authorId\": \"144485748\", \"name\": \"Byung-gee Kim\"}, {\"authorId\": \"1811542\", \"name\": \"J. Son\"}, {\"authorId\": \"145233765\", \"name\": \"O. Kwon\"}, {\"authorId\": \"37382906\", \"name\": \"Changmin Sung\"}], \"abstract\": \"The increased potential for gene doping since the introduction of gene therapy presents the need to develop anti-doping assays. We therefore aimed to develop a quick and simple method for the detection of specifically targeted exogenous doping genes utilizing an in vitro clustered regularly interspaced short palindromic repeats-CRISPR associated protein 9 (CRISPR-Cas9) system. A human erythropoietin (hEPO) is a drug frequently used for doping in athletes, and gene doping using gene transfer techniques may be attempted. Therefore, we selected hEPO gene as a model of exogenous doping gene, and complemental single guide RNA (sgRNA) was designed to specifically bind to the four exon-exon junctions in the hEPO cDNA. For the rapid reaction of CRISPR-Cas9, further optimization was performed using an open-source program (CRISPOR) that avoids TT and GCC motifs before the protospacer adjacent motif (PAM) domain and predicts the efficiency of the sgRNA. We optimized the in vitro Cas9 assay and dual use of sgRNA for double cleavage and identified the limit of detection (LOD) of the 1.25 nM of the double cleavage method. We expect that the improved CRISPR-Cas9 method can be used for anti-doping analyses of gene doping.\"}, {\"paperId\": \"06506a61085dcdd2986de1b03d88dcc6f51a2707\", \"externalIds\": {\"DOI\": \"10.1111/nph.17625\", \"CorpusId\": 235999547, \"PubMed\": \"34270791\"}, \"title\": \"Cross-species analysis between the maize smut fungi Ustilago maydis and Sporisorium reilianum highlights the role of transcriptional change of effector orthologs for virulence and disease.\", \"venue\": \"New Phytologist\", \"year\": 2021, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/nph.17625\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/nph.17625?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/nph.17625, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"151256839\", \"name\": \"Weiliang Zuo\"}, {\"authorId\": \"15811938\", \"name\": \"J. Depotter\"}, {\"authorId\": \"2005436918\", \"name\": \"D. Gupta\"}, {\"authorId\": \"3751641\", \"name\": \"M. Thines\"}, {\"authorId\": \"6120523\", \"name\": \"G. Doehlemann\"}], \"abstract\": \"The constitution and regulation of effector repertoires shape host-microbe interactions. Ustilago maydis and Sporisorium reilianum are two closely related smut fungi, which both infect maize but cause distinct disease symptoms. Understanding how effector orthologs are regulated in these two pathogens can therefore provide insights to the evolution of different infection strategies. We tracked the infection progress of U. maydis and S. reilianum in maize leaves and used two distinct infection stages for cross-species RNA-sequencing analyses. We identified 207 of 335 one-to-one effector orthologs as differentially regulated during host colonization, which might reflect the distinct disease development strategies. Using CRISPR-Cas9 mediated gene conversion, we identified two differentially expressed effector orthologs with conserved function between two pathogens. Thus, differential expression of functionally conserved genes might contribute to species-specific adaptation and symptom development. Interestingly, another differentially expressed orthogroup (UMAG_05318/Sr10075) showed diverged protein function, providing a possible case for neofunctionalization. Collectively, we could demonstrate that the diversification of effector genes in related pathogens can be caused both by alteration on the transcriptional level and through functional diversification of the encoded effector proteins.\"}, {\"paperId\": \"065084a678f67b44c0c274b72e1c49b05eeb402d\", \"externalIds\": {\"PubMedCentral\": \"9841155\", \"DOI\": \"10.1093/noajnl/vdad005\", \"CorpusId\": 255967796, \"PubMed\": \"36660081\"}, \"title\": \"Corrigendum to: Generation of chromosome 1p/19q co-deletion by CRISPR/Cas9-guided genomic editing\", \"venue\": \"Neuro-Oncology Advances\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/noa/article-pdf/5/1/vdad005/48716480/vdad005.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9841155, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1492061397\", \"name\": \"Chao Li\"}, {\"authorId\": \"2145285679\", \"name\": \"Zhong Liu\"}, {\"authorId\": \"2182144390\", \"name\": \"Xiaoxia Zhang\"}, {\"authorId\": \"2197893977\", \"name\": \"Huafeng Wang\"}, {\"authorId\": \"2527110\", \"name\": \"G. Friedman\"}, {\"authorId\": \"2247387350\", \"name\": \"Q. Ding\"}, {\"authorId\": \"4138170\", \"name\": \"Xinyang Zhao\"}], \"abstract\": \"[This corrects the article DOI: 10.1093/noajnl/vdac131.].\"}, {\"paperId\": \"0650a50653b1a3c0fc459e42442ed8f41fd60e7d\", \"externalIds\": {\"CorpusId\": 251717314}, \"title\": \"CRISPR-cas9 [1]\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://embryo.asu.edu/printpdf/pages/crispr-cas9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": null}, {\"paperId\": \"0651118d369df4293bdb10ad40503cd65a575021\", \"externalIds\": {\"DOI\": \"10.1101/2024.04.03.587938\", \"CorpusId\": 268987948}, \"title\": \"Zebrafish Foxl2l suppresses stemness of germline progenitors and directs feminization\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/04/04/2024.04.03.587938.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.04.03.587938?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.04.03.587938, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2125178941\", \"name\": \"Chen-wei Hsu\"}, {\"authorId\": \"49374766\", \"name\": \"H. Ho\"}, {\"authorId\": \"2295711287\", \"name\": \"Ching-Hsin Yang\"}, {\"authorId\": \"2295592638\", \"name\": \"Yan-wei Wang\"}, {\"authorId\": \"2295709152\", \"name\": \"Ker-Chau Li\"}, {\"authorId\": \"2285116946\", \"name\": \"Bon-chu Chung\"}], \"abstract\": \"Zebrafish is an important organism for genetic studies, but its germ cell types and the mechanism of sex differentiation remain elusive. Here, we conducted a single-cell transcriptomic profiling and charted a developmental trajectory going from germline stem cells, through early, committed, and late progenitors, to pre-meiotic and meiotic cells. A transcription factor, Foxl2l, is expressed in the progenitors committed to the ovary fate. CRISPR-Cas9-mediated mutation of foxl2l produced 100% male fish with normal fertility. Another single-cell profiling of foxl2l-/- germ cells reveals the arrest of early progenitors. Concomitantly the expression of nanos2 (stem cell marker) and id1 (transcription repressor in stem cells) was elevated together with an increase of nanos2+ germ cell in foxl2l mutants, indicating the reversion to the stem cell state. Thus, we have identified developmental stages of germ cells in juvenile zebrafish and demonstrated that Foxl2l drives zebrafish germ cell progenitors toward feminization and prevents them from reverting back to the stem cell state.\"}, {\"paperId\": \"06546167d79f544c400d65384137b3fc27bc96bb\", \"externalIds\": {\"MAG\": \"3097943734\", \"DOI\": \"10.1182/BLOOD-2020-137645\", \"CorpusId\": 228914773}, \"title\": \"Overcoming CAR T Resistance with Non-Covalent BTK Inhibitor Loxo-305 in Mantle Cell Lymphoma\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2020-137645\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/BLOOD-2020-137645?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/BLOOD-2020-137645, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"81987380\", \"name\": \"Yang Liu\"}, {\"authorId\": \"2036622693\", \"name\": \"V. Jiang\"}, {\"authorId\": \"2036434066\", \"name\": \"J. McIntosh\"}, {\"authorId\": \"2036094976\", \"name\": \"Alexa A Jordan\"}, {\"authorId\": \"2110511877\", \"name\": \"Yijing Li\"}, {\"authorId\": \"50469059\", \"name\": \"Michael L. Wang\"}], \"abstract\": \"Background: Mantle cell lymphoma (MCL) is a distinctive B-cell non-Hodgkin's lymphoma characterized by poor prognosis. Despite clinical success of the covalent Bruton's tyrosine kinase (BTK) inhibitor ibrutinib, a subset of patients need to discontinue ibrutinib therapy due to treatment related adverse events, which are primarily caused by off-target effects. Furthermore, primary or acquired resistance to ibrutinib continues to emerge and often leads to dismal clinical outcomes. Therefore, exploration of more target-specific BTK inhibitors is crucial to minimize the adverse events and provide clinical benefit. CAR T therapy has achieved unprecedented response in patients with relapsed or refractory MCL. However, the development of resistant phenotypes is a new emerging medical challenge in MCL patients with unknown mechanisms. Here, we characterize the therapeutic efficacy of LOXO-305, a next generation non-covalent small molecule inhibitor with high selectivity for BTK. Preclinical efficacy of LOXO-305 alone or in combination with venetoclax (ABT199), a selective Bcl-2 inhibitor, was evaluated in MCL using in vitro and in vivo CAR T-resistant PDX models.\\n Methods : In vitro cell viability was measured after 72 hour treatment with LOXO-305 alone and in combination with ABT-199 in MCL cell lines using Cell Titer Glo luminescent cell viability assay (Promega). To determine whether LOXO-305 induces cell death through cell apoptosis, we used annexin V/PI staining followed by flow cytometry analysis. To evaulate in vivo drug efficacy we used patient-derived xenograft (PDX) models established from primary patient samples.\\n Results: LOXO-305 treatment, as a single agent, resulted in effective MCL cell growth inhibition in a panel of MCL cell lines including ibrutinib and/or ABT-199-resistant cell lines (IC50=6.6-24.4\\u03bcM), except for JeKo BTK KD cells with BTK knockdown (KD) via CRISPR/Cas9 technology (IC50>30 \\u03bcM). To improve the efficacy, we decided to investigate the potential of LOXO-305 in combination with ABT199, since the combo of ibrutinib and ABT199 is clinically beneficial in MCL patients. Indeed, LOXO-305 significantly improved the inhibitory effect of ABT-199 in the ABT-199 resistant Mino-R and JeKo BTK KD cells, suggesting that this combination could be further explored in overcoming ABT-199 resistance in MCL. The compelling synergistic effect was further confirmed by annexin V/PI apoptosis assay. Next, we assessed the in vivo efficacy of LOXO-305 in an ibrutinib-CAR T dual-resistant PDX model. LOXO-305 effectively reduced tumor size after 40 days of treatment as a single agent. Moreover, LOXO-305 treatment showed significant anti-tumor effects in an ibrutinib-ABT199-CAR T triple-resistant PDX model that recapitulates the most aggressive human MCL variants invivo. In this model, LOXO-305 treatment effectively decreased the tumor load in mice spleen and liver (p<0.05) as well as in bone marrow and peripheral blood, compared to vehicle-treated mice (p<0.001).\\n Conclusions: By using various in vitro and in vivo multiple resistant MCL models we determined that LOXO-305 holds great promise for an effective single agent or combined treatment of the most eggressive forms of MCL, and that a continued investigation of the rationale for a combined therapy with ABT-199 is imperative to understand its role in overcoming ibrutinib-ABT199-CAR T triple resistance.\\n \\n \\n Wang: OMI: Honoraria, Other: Travel, accommodation, expenses; MoreHealth: Consultancy; Celgene: Consultancy, Other: Travel, accommodation, expenses, Research Funding; AstraZeneca: Consultancy, Honoraria, Other: Travel, accommodation, expenses, Research Funding; Pharmacyclics: Consultancy, Honoraria, Other: Travel, accommodation, expenses, Research Funding; Janssen: Consultancy, Honoraria, Other: Travel, accommodation, expenses, Research Funding; Beijing Medical Award Foundation: Honoraria; Lu Daopei Medical Group: Honoraria; Loxo Oncology: Consultancy, Research Funding; Pulse Biosciences: Consultancy; Kite Pharma: Consultancy, Other: Travel, accommodation, expenses, Research Funding; Juno: Consultancy, Research Funding; BioInvent: Research Funding; VelosBio: Research Funding; Acerta Pharma: Research Funding; InnoCare: Consultancy; Oncternal: Consultancy, Research Funding; Nobel Insights: Consultancy; Guidepoint Global: Consultancy; Dava Oncology: Honoraria; Verastem: Research Funding; Molecular Templates: Research Funding; OncLive: Honoraria; Targeted Oncology: Honoraria.\\n\"}, {\"paperId\": \"0657efc9cb375750ba69d87bf61ee5dadb0b55b5\", \"externalIds\": {\"PubMedCentral\": \"11303492\", \"DOI\": \"10.1007/s10456-024-09925-9\", \"CorpusId\": 269928515, \"PubMed\": \"38771392\"}, \"title\": \"Human iPSC and CRISPR targeted gene knock-in strategy for studying the somatic TIE2L914F mutation in endothelial cells\", \"venue\": \"Angiogenesis\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s10456-024-09925-9.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11303492, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"52222692\", \"name\": \"Bojana Lazovic\"}, {\"authorId\": \"2302398895\", \"name\": \"Hoang-Tuan Nguyen\"}, {\"authorId\": \"2302390773\", \"name\": \"Mohammadhassan Ansarizadeh\"}, {\"authorId\": \"2262288542\", \"name\": \"Leif Wigge\"}, {\"authorId\": \"2302391401\", \"name\": \"Franziska Kohl\"}, {\"authorId\": \"2302455180\", \"name\": \"Songyuan Li\"}, {\"authorId\": \"2300152904\", \"name\": \"Miguel Carracedo\"}, {\"authorId\": \"98153760\", \"name\": \"Jere Kettunen\"}, {\"authorId\": \"2302394091\", \"name\": \"Luc Krimpenfort\"}, {\"authorId\": \"4083297\", \"name\": \"Ramy Elgendy\"}, {\"authorId\": \"2302391637\", \"name\": \"Kati Richter\"}, {\"authorId\": \"2302391163\", \"name\": \"Laknee De Silva\"}, {\"authorId\": \"3875241\", \"name\": \"B. Bilican\"}, {\"authorId\": \"2302397930\", \"name\": \"Prateek Singh\"}, {\"authorId\": \"2302390509\", \"name\": \"Pratik Saxena\"}, {\"authorId\": \"2308260567\", \"name\": \"Lars Jakobsson\"}, {\"authorId\": \"2302191682\", \"name\": \"Xuechong Hong\"}, {\"authorId\": \"49350293\", \"name\": \"L. Eklund\"}, {\"authorId\": \"2302391101\", \"name\": \"Ryan Hicks\"}], \"abstract\": \"Induced pluripotent stem cell (iPSC) derived endothelial cells (iECs) have emerged as a promising tool for studying vascular biology and providing a platform for modelling various vascular diseases, including those with genetic origins. Currently, primary ECs are the main source for disease modelling in this field. However, they are difficult to edit and have a limited lifespan. To study the effects of targeted mutations on an endogenous level, we generated and characterized an iPSC derived model for venous malformations (VMs). CRISPR-Cas9 technology was used to generate a novel human iPSC line with an amino acid substitution L914F in the TIE2 receptor, known to cause VMs. This enabled us to study the differential effects of VM causative mutations in iECs in multiple in vitro models and assess their ability to form vessels in vivo. The analysis of TIE2 expression levels in TIE2L914F iECs showed a significantly lower expression of TIE2 on mRNA and protein level, which has not been observed before due to a lack of models with endogenous edited TIE2L914F and sparse patient data. Interestingly, the TIE2 pathway was still significantly upregulated and TIE2 showed high levels of phosphorylation. TIE2L914F iECs exhibited dysregulated angiogenesis markers and upregulated migration capability, while proliferation was not affected. Under shear stress TIE2L914F iECs showed reduced alignment in the flow direction and a larger cell area than TIE2WT iECs. In summary, we developed a novel TIE2L914F iPSC-derived iEC model and characterized it in multiple in vitro models. The model can be used in future work for drug screening for novel treatments for VMs.\"}, {\"paperId\": \"0659bf6d7766ebbf99fcb1a568035aed95ed9158\", \"externalIds\": {\"PubMedCentral\": \"9371658\", \"DOI\": \"10.1073/pnas.2113795119\", \"CorpusId\": 247844246, \"PubMed\": \"35917346\"}, \"title\": \"De novo mutations in KIF1A-associated neuronal disorder (KAND) dominant-negatively inhibit motor activity and axonal transport of synaptic vesicle precursors\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1073/pnas.2113795119\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9371658, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1970606040\", \"name\": \"Yuzu Anazawa\"}, {\"authorId\": \"2121093801\", \"name\": \"Tomoki Kita\"}, {\"authorId\": \"2160922314\", \"name\": \"Rei Iguchi\"}, {\"authorId\": \"2147353729\", \"name\": \"Kumiko Hayashi\"}, {\"authorId\": \"35156315\", \"name\": \"Shinsuke Niwa\"}], \"abstract\": \"KIF1A is a kinesin superfamily molecular motor that transports synaptic vesicle precursors in axons. Mutations in Kif1a lead to a group of neuronal diseases called KIF1A-associated neuronal disorder (KAND). KIF1A forms a homodimer and KAND mutations are mostly de novo and autosomal dominant; however, it is not known whether the function of wild-type KIF1A is inhibited by disease-associated KIF1A when they are dimerized. No reliable in vivo model systems to analyze the molecular and cellular biology of KAND caused by loss of function mutations have been developed; therefore, here, we established Caenorhabditis elegans models for KAND using CRISPR/cas9 technology and analyzed defects in axonal transport. In the C. elegans models, heterozygotes and homozygotes exhibited reduced axonal transport phenotypes. Suppressor screening using the disease model worm identified a mutation that recovers the motor activity of disease-associated human KIF1A. In addition, we developed in vitro assays to analyze the motility of single heterodimers composed of wild-type KIF1A and disease-associated KIF1A. Disease-associated KIF1A significantly inhibited the motility of wild-type KIF1A when heterodimers were formed. These data indicate the molecular mechanism underlying the dominant nature of de novo KAND mutations. Significance Statement KIF1A is a molecular motor that transports synaptic vesicle precursors in axons. Recent studies have identified many KIF1A mutations in congenital neuropathy patients; however, the molecular mechanism of pathogenesis remains largely elusive. This study established loss of function models for KIF1A-associated neuronal disorder (KAND) in Caenorhabditis elegans to analyze the molecular and cell biology of the disease in vivo. Genetic screening using the disease model could find a mutation that recovers the motor activity of disease-associated KIF1A. This study also established in vitro single-molecule assays to quantitatively analyze the effect of KAND mutations when mutant KIF1A forms heterodimers with wild-type KIF1A. Our findings provide a foundation for future genetic screening and for drug screening to search for KAND treatments.\"}, {\"paperId\": \"065aecaf83edc71630b6eb5036885a94a0138f56\", \"externalIds\": {\"PubMedCentral\": \"10739304\", \"DOI\": \"10.3389/fimmu.2023.1287367\", \"CorpusId\": 266130724, \"PubMed\": \"38143742\"}, \"title\": \"Hepatitis D infection induces IFN-\\u03b2-mediated NK cell activation and TRAIL-dependent cytotoxicity\", \"venue\": \"Frontiers in Immunology\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fimmu.2023.1287367/pdf?isPublishedV2=False\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10739304, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2272849912\", \"name\": \"Christopher Groth\"}, {\"authorId\": \"35145742\", \"name\": \"J. Maric\"}, {\"authorId\": \"2273408352\", \"name\": \"Irene Garc\\u00e9s L\\u00e1zaro\"}, {\"authorId\": \"2073103379\", \"name\": \"Tom\\u00e1\\u0161 Hofman\"}, {\"authorId\": \"2252108497\", \"name\": \"Zhenfeng Zhang\"}, {\"authorId\": \"50040600\", \"name\": \"Y. Ni\"}, {\"authorId\": \"2271899234\", \"name\": \"Franziska Keller\"}, {\"authorId\": \"2214875468\", \"name\": \"Isabelle Seufert\"}, {\"authorId\": \"10995024\", \"name\": \"M. Hofmann\"}, {\"authorId\": \"2228463656\", \"name\": \"Christoph Neumann-Haefelin\"}, {\"authorId\": \"2386356847\", \"name\": \"C. Sticht\"}, {\"authorId\": \"2408430\", \"name\": \"K. Rippe\"}, {\"authorId\": \"2179594944\", \"name\": \"Stephan Urban\"}, {\"authorId\": \"3591582\", \"name\": \"A. Cerwenka\"}], \"abstract\": \"Background and aims The co-infection of hepatitis B (HBV) patients with the hepatitis D virus (HDV) causes the most severe form of viral hepatitis and thus drastically worsens the course of the disease. Therapy options for HBV/HDV patients are still limited. Here, we investigated the potential of natural killer (NK) cells that are crucial drivers of the innate immune response against viruses to target HDV-infected hepatocytes. Methods We established in vitro co-culture models using HDV-infected hepatoma cell lines and human peripheral blood NK cells. We determined NK cell activation by flow cytometry, transcriptome analysis, bead-based cytokine immunoassays, and NK cell-mediated effects on T cells by flow cytometry. We validated the mechanisms using CRISPR/Cas9-mediated gene deletions. Moreover, we assessed the frequencies and phenotype of NK cells in peripheral blood of HBV and HDV superinfected patients. Results Upon co-culture with HDV-infected hepatic cell lines, NK cells upregulated activation markers, interferon-stimulated genes (ISGs) including the death receptor ligand tumor necrosis factor-related apoptosis-inducing ligand (TRAIL), produced interferon (IFN)-\\u03b3 and eliminated HDV-infected cells via the TRAIL-TRAIL-R2 axis. We identified IFN-\\u03b2 released by HDV-infected cells as an important enhancer of NK cell activity. In line with our in vitro data, we observed activation of peripheral blood NK cells from HBV/HDV co-infected, but not HBV mono-infected patients. Conclusion Our data demonstrate NK cell activation in HDV infection and their potential to eliminate HDV-infected hepatoma cells via the TRAIL/TRAIL-R2 axis which implies a high relevance of NK cells for the design of novel anti-viral therapies.\"}, {\"paperId\": \"065d751314ff326997fa2782b1d044e1731c141d\", \"externalIds\": {\"DOI\": \"10.1111/febs.16625\", \"CorpusId\": 252161072, \"PubMed\": \"36083715\"}, \"title\": \"Reciprocal abrogation of PKM isoforms: contradictory outcomes and differing impact of splicing signal on CRISPR/Cas9 mediates gene editing in keratinocytes\", \"venue\": \"The FEBS Journal\", \"year\": 2022, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/febs.16625\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/febs.16625?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/febs.16625, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2184472008\", \"name\": \"Simon P Nold\"}, {\"authorId\": \"2184478005\", \"name\": \"Khrystyna Sych\"}, {\"authorId\": \"46356679\", \"name\": \"G. Imre\"}, {\"authorId\": \"47369599\", \"name\": \"D. Fuhrmann\"}, {\"authorId\": \"4675185\", \"name\": \"J. Pfeilschifter\"}, {\"authorId\": \"6725041\", \"name\": \"Rajkumar Vutukuri\"}, {\"authorId\": \"2184475075\", \"name\": \"F. Schnutgen\"}, {\"authorId\": \"2077280459\", \"name\": \"I. Wittig\"}, {\"authorId\": \"1879115851\", \"name\": \"Jana Meisterknecht\"}, {\"authorId\": \"47547274\", \"name\": \"S. Frank\"}, {\"authorId\": \"2561248\", \"name\": \"I. Goren\"}], \"abstract\": \"The healing of wounded skin is a highly organized process involving a massive cell in\\u2010 and outflux, proliferation and tissue remodelling. It is well accepted that metabolic constraints such as diabetes mellitus, overweight or anorexia impairs wound healing. Indeed, wound inflammation involves a boost of overall metabolic changes. As wound healing converges inflammatory processes that are also common to transformation, we investigate the functional role of the pro\\u2010neoplastic factor pyruvate kinase (PK) M2 and its metabolic active splice variant PKM1 in keratinocytes. Particularly, we challenge the impact of reciprocal ablation of PKM1 or two expression. Here, CRISPR/Cas9 genome editing of the PKM gene in HaCaT reveals an unexpected mutational bias at the 3'SS of exon 9, whereas no preference for any particular kind of mutation at exon 10 3' splice, despite the close vicinity (400 nucleotides apart) and sequence similarity between the two sites. Furthermore, as opposed to transient silencing of PKM2, exclusion splicing of PKM2 via genome editing mutually increases PKM1 mRNA and protein expression and compensates for the absence of PKM2, whereas the reciprocal elimination of PKM1 splicing reduces PKM2 expression and impedes cell proliferation, thus unveiling an essential role for PKM1 in growth and metabolic balance of HaCaT keratinocytes.\"}, {\"paperId\": \"065d8c4cd38d3181dfe7050aa026af5ee7113f28\", \"externalIds\": {\"PubMedCentral\": \"10116351\", \"DOI\": \"10.22088/IJMCM.BUMS.11.2.117\", \"CorpusId\": 258256655, \"PubMed\": \"37091035\"}, \"title\": \"A Decrease in CD44 on Cell Surfaces (MKN-45 cell line) After RELA Knockout Using CRISPR/Cas9\", \"venue\": \"International journal of molecular and cellular medicine\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10116351, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2263511871\", \"name\": \"S. Karimi\"}, {\"authorId\": \"2215002923\", \"name\": \"Sima Salmani\"}, {\"authorId\": \"120808168\", \"name\": \"A. Alizadeh\"}, {\"authorId\": \"4985570\", \"name\": \"Leila Rezakhani\"}, {\"authorId\": \"13748489\", \"name\": \"Z. Saltanatpour\"}, {\"authorId\": \"14975005\", \"name\": \"S. Ghasemi\"}], \"abstract\": \"The NF-kB signaling pathway was introduced as a key pathway in carcinogenesis that is induced by inflammation in gastrointestinal malignancies. The RelA transcription factor is an important component of this signaling pathway. Furthermore, CD44 is implicated in the tumorigenesis and metastasis of gastric cancer. The aim of this study was to assay the effect of RELA knockout on CD44 expression in MKN45 cells. CRISPR/Cas9 was used to knock out RELA in MKN-45. The median fluorescence intensity (MFI) of CD44 before and after RELA knockout is analyzed in MKN45. The CRISPR/Cas9 vector pSpCas9 (BB)-2A-Puro (PX459) was used for gRNA cloning (two guides). The MKN-45 cell line was co-transfected. The purified co-transfected cells with puromycin were cultured and used for the RELA gene expression assay by real-time PCR. Flow cytometry was used for the analysis of the MFI of CD44+ in MKN45. The results showed that 180 nucleotide sequences between exon 2 and exon 3 of RELA were deleted in MKN45. RELA expression significantly (P<0.001) decreased after CRISPR/Cas9 knockout. Compared to the control group, the MFI of CD44 in transfected cells significantly decreased (P <0.001). Knockout of RELA significantly decreased CD44 expression in MKN45 cells. It can be concluded that the NF-kB signaling pathway via RELA is related to CD44 expression and consequently the tumorigenesis of gastric cancer. More studies about this relationship are recommended.\"}, {\"paperId\": \"065e794268282512f95686b6d63b8c20eba3fac1\", \"externalIds\": {\"DOI\": \"10.1101/2024.02.22.581652\", \"CorpusId\": 268030535}, \"title\": \"Discovery of novel compounds and target mechanisms using a high throughput, multiparametric phenotypic screen in a human neuronal model of Tuberous Sclerosis\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/02/25/2024.02.22.581652.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.02.22.581652?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.02.22.581652, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2287821865\", \"name\": \"Luis A. Williams\"}, {\"authorId\": \"2196473521\", \"name\": \"Steve Ryan\"}, {\"authorId\": \"2055614907\", \"name\": \"Vaibhav Joshi\"}, {\"authorId\": \"2287807903\", \"name\": \"Caitlin Lewarch\"}, {\"authorId\": \"2197069075\", \"name\": \"Amy E. Elder\"}, {\"authorId\": \"2284758208\", \"name\": \"Owen B. McManus\"}, {\"authorId\": \"2261380983\", \"name\": \"Patrice Godard\"}, {\"authorId\": \"2366767592\", \"name\": \"S. Sridhar\"}, {\"authorId\": \"2141863184\", \"name\": \"Jane Jacques\"}, {\"authorId\": \"2162343019\", \"name\": \"Jennifer Grooms\"}, {\"authorId\": \"2287820679\", \"name\": \"James J. Fink\"}, {\"authorId\": \"2249525564\", \"name\": \"Hongkang Zhang\"}, {\"authorId\": \"2287823045\", \"name\": \"Michel Gillard\"}, {\"authorId\": \"12558032\", \"name\": \"C\\u00e9cile P\\u00e9gurier\"}, {\"authorId\": \"2348807096\", \"name\": \"Yogesh Sabnis\"}, {\"authorId\": \"2284845553\", \"name\": \"V. Andr\\u00e9\"}, {\"authorId\": \"4028728\", \"name\": \"Lucinda Steward\"}, {\"authorId\": \"2261380971\", \"name\": \"Stefanie Dedeurwaerdere\"}, {\"authorId\": \"2255459202\", \"name\": \"Orrin Devinsky\"}, {\"authorId\": \"2238429126\", \"name\": \"Christian Wolff\"}, {\"authorId\": \"2287820607\", \"name\": \"Graham T. Dempsey\"}], \"abstract\": null}, {\"paperId\": \"0660215d105a9492125fc23c9e29f15d2cd7c5e5\", \"externalIds\": {\"MAG\": \"3033926391\", \"DOI\": \"10.1111/pim.12762/v1/review1\", \"CorpusId\": 219922854}, \"title\": \"Review for \\\"CRISPR/Cas9 gene drive technology to control transmission of vector\\u2010borne parasitic infections\\\"\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/pim.12762/v1/review1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/pim.12762/v1/review1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6828096\", \"name\": \"M. N. Rostami\"}], \"abstract\": \"Gene drive is the process of copying of an endonuclease-containing cassette that leads to increased frequency of inheritance of the desired traits in a targeted population. CRISPR/Cas9 technology is advancing genetic manipulation of insects in the field of gene drive experiments. The CRISPR/Cas9 drive could be engineered for genetic manipulation of parasites and/or vectors for disease control. A number of promising CRISPR/Cas9-based gene drive strategies that interfere with parasite development or impairs the reproductive capability of the insect vector have been proposed in the laboratory for blocking transmission of malaria and leishmaniasis. Still several technical and ethical challenges remain to be addressed, and none appear insuperable in this field.\"}, {\"paperId\": \"066164c276deae7d6ec9ed5210c2624f09f757b3\", \"externalIds\": {\"PubMedCentral\": \"8580887\", \"DOI\": \"10.1016/j.stemcr.2021.09.007\", \"CorpusId\": 239004929, \"PubMed\": \"34653402\"}, \"title\": \"Allele-specific gene editing to rescue dominant CRX-associated LCA7 phenotypes in a retinal organoid model\", \"venue\": \"Stem Cell Reports\", \"year\": 2021, \"citationCount\": 41, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S2213671121004835/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8580887, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8061580\", \"name\": \"K. Chirco\"}, {\"authorId\": \"35683344\", \"name\": \"Shereen Chew\"}, {\"authorId\": \"2231143928\", \"name\": \"A. Moore\"}, {\"authorId\": \"3128711\", \"name\": \"J. Duncan\"}, {\"authorId\": \"38950848\", \"name\": \"D. Lamba\"}], \"abstract\": \"Summary Cases of Leber congenital amaurosis caused by mutations in CRX (LCA7) exhibit an early form of the disease and show signs of significant photoreceptor dysfunction and eventual loss. To establish a translational in vitro model system to study gene-editing-based therapies, we generated LCA7 retinal organoids harboring a dominant disease-causing mutation in CRX. Our LCA7 retinal organoids develop signs of immature and dysfunctional photoreceptor cells, providing us with a reliable in vitro model to recapitulate LCA7. Furthermore, we performed a proof-of-concept study in which we utilize allele-specific CRISPR/Cas9-based gene editing to knock out mutant CRX and saw moderate rescue of photoreceptor phenotypes in our organoids. This work provides early evidence for an effective approach to treat LCA7, which can be applied more broadly to other dominant genetic diseases.\"}, {\"paperId\": \"0661846992a3f5ebe6385146469f1c78d55a53ce\", \"externalIds\": {\"MAG\": \"3112915085\", \"PubMedCentral\": \"7715133\", \"DOI\": \"10.1093/neuonc/noaa222.118\", \"CorpusId\": 228066836}, \"title\": \"DIPG-76. HISTONE H3 PHOSPHORYLATION IN H3K27M MIDLINE GLIOMAS\", \"venue\": \"Neuro-Oncology\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/neuonc/noaa222.118\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7715133, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146642497\", \"name\": \"Liang Zhang\"}, {\"authorId\": \"2055947131\", \"name\": \"Charles A. Day\"}, {\"authorId\": \"6276663\", \"name\": \"E. Hinchcliffe\"}, {\"authorId\": \"33581766\", \"name\": \"D.J. Daniels\"}], \"abstract\": \"Abstract Diffuse midline gliomas (DMG) patients have a dire prognosis despite radiation therapy and there is an urgent need to develop more effective treatments. DMG are characterized by heterozygous mutations in select H3 genes resulting in the replacement of lysine 27 by methionine (K27M) that leads to global epigenetic reprogramming and drives tumorigenesis. We previously reported that pharmacological inhibition of aurora kinase (AKI) may represent a targeted approach for treating tumors with this mutation. Our analysis with both published dataset and patient samples showed that patients with higher aurora kinase A (AKA) expression were associated with worse survival. AKA phosphorylates H3S10 and H3S28 during mitosis. Intriguingly, phosphorylation of the H3S28 (H3S28ph) by AKA blocks PRC2 methyltransferase activity and decreases global H3K27me3 in certain stem cells. We propose that a similar mechanism occurs in H3K27M DMG tumors, where there is a reciprocal relationship between H3S28ph and H3K27me3. We found that AKI significantly decreases H3S28ph while increasing H3K27me3 specifically in H3K27M tumors. To further evaluate the link between the H3K27M mutation and H3 serine phosphorylation, we used CRISPR/Cas9-directed gene editing to silence H3S28ph by replacing serine with alanine (H3S28A) in DIPG cell lines. Ectopic expression of histone H3S28A leads to a prominent epigenetic changes in H3K27M tumors and is similar to AKA inhibition. Overall, this study highlights H3S28ph, one of the targets of AK, is a key driver of epigenetic changes in H3K27M tumors through both direct and indirect changes to H3K27me3 and H3K27ac across the genome.\"}, {\"paperId\": \"0662816e80e1f977661766b5ffbd22f639a1f827\", \"externalIds\": {\"DOI\": \"10.1126/science.abf6202\", \"CorpusId\": 227256759, \"PubMed\": \"34244384\"}, \"title\": \"Mapping the cellular origin and early evolution of leukemia in Down syndrome\", \"venue\": \"Science\", \"year\": 2021, \"citationCount\": 62, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2020/11/30/2020.11.29.402800.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/science.abf6202?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/science.abf6202, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5689173\", \"name\": \"Elvin Wagenblast\"}, {\"authorId\": \"31678941\", \"name\": \"Joana Ara\\u00fajo\"}, {\"authorId\": \"4247590\", \"name\": \"O. Gan\"}, {\"authorId\": \"2031055098\", \"name\": \"Sarah K. Cutting\"}, {\"authorId\": \"31444746\", \"name\": \"Alex Murison\"}, {\"authorId\": \"49468876\", \"name\": \"Gabriela Krivdova\"}, {\"authorId\": \"51249185\", \"name\": \"Maria Azkanaz\"}, {\"authorId\": \"35335687\", \"name\": \"Jessica McLeod\"}, {\"authorId\": \"2111238625\", \"name\": \"Sabrina A. Smith\"}, {\"authorId\": \"2173188583\", \"name\": \"Blaise A. Gratton\"}, {\"authorId\": \"2156973\", \"name\": \"Sajid A. Marhon\"}, {\"authorId\": \"12452982\", \"name\": \"M. Gabra\"}, {\"authorId\": \"6768725\", \"name\": \"Jessie J. F. Medeiros\"}, {\"authorId\": \"3457827\", \"name\": \"Sanaz Manteghi\"}, {\"authorId\": \"2155524643\", \"name\": \"Jian Chen\"}, {\"authorId\": \"1405601619\", \"name\": \"M. Chan-Seng-Yue\"}, {\"authorId\": \"1398866190\", \"name\": \"Laura Garcia-Prat\"}, {\"authorId\": \"6316033\", \"name\": \"L. Salmena\"}, {\"authorId\": \"3749601\", \"name\": \"Daniel D. De Carvalho\"}, {\"authorId\": \"2357843\", \"name\": \"Sagi Abelson\"}, {\"authorId\": \"3545932\", \"name\": \"M. Abdelhaleem\"}, {\"authorId\": \"144390705\", \"name\": \"K. Chong\"}, {\"authorId\": \"105041181\", \"name\": \"Maian Roifman\"}, {\"authorId\": \"2757819\", \"name\": \"P. Shannon\"}, {\"authorId\": \"31531202\", \"name\": \"Jean C. Y. Wang\"}, {\"authorId\": \"144012063\", \"name\": \"J. Hitzler\"}, {\"authorId\": \"46281627\", \"name\": \"D. Chitayat\"}, {\"authorId\": \"3053653\", \"name\": \"J. Dick\"}, {\"authorId\": \"3794497\", \"name\": \"E. Lechman\"}], \"abstract\": \"Down with leukemia Down syndrome is a congenital disorder caused by the trisomy of chromosome 21, and it is associated with a greatly increased risk of leukemia with origins in fetal development. Infants with Down syndrome are often born with a preleukemic condition, which later resolves in most cases. By using gene-edited human cells implanted into mouse models, Wagenblast et al. recapitulated the development of preleukemia and leukemia in the context of Down syndrome (see the Perspective by Roberts and Vyas). A specific mutation triggered a preleukemic condition in the context of trisomy 21 as expected, but progression to full-blown leukemia required a different genetic path and was not dependent on trisomy 21. Science, abf6202, this issue p. eabf6202; see also abj3957, p. 155 Initiation and progression of leukemogenesis in Down syndrome involves distinct cellular origins and effects of trisomy 21. INTRODUCTION Leukemia is the most common cancer in children, with the first genetic alterations often occurring during fetal development. These initiating events generate preleukemic cells, which are the evolutionary ancestors of leukemia that arises after birth. Because of our inability to directly access human fetal preleukemia, the identity of the cell of origin and the steps of leukemia evolution remain largely unknown. Down syndrome leukemogenesis represents a disease setting to study human preleukemia and the evolutionary steps that lead to fully transformed leukemia. Up to 30% of children with Down syndrome (trisomy 21) exhibit a preleukemic transient abnormal myelopoiesis (TAM) and, overall, have a 150-fold increased risk of developing myeloid leukemia within the first 5 years of life. However, the mechanism by which an extra copy of chromosome 21 predisposes to preleukemia and leukemia remains unclear. RATIONALE Understanding Down syndrome leukemogenesis requires a humanized model that faithfully recapitulates the full developmental spectrum of premalignant and malignant stages of Down syndrome leukemia. Using CRISPR/Cas9\\u2013mediated gene editing in human disomic and trisomic fetal liver\\u2013derived hematopoietic stem and progenitor cells and xenotransplantation, we developed a model with which to characterize the genetic events and cellular contexts underlying the preleukemic and leukemic phases of Down syndrome leukemogenesis. RESULTS Trisomy 21 hematopoietic stem and progenitor cells (HSPCs) showed reduced proliferation in vitro and generated smaller grafts in xenotransplanted mice, with reduced serial transplant ability, as compared with that of disomic HSPCs. Preleukemia was initiated in trisomy 21, but not disomic, long-term hematopoietic stem cells (LT-HSCs) when mutations in the erythroid-megakaryocyte transcription factor GATA binding protein 1 (GATA1) were introduced, which led to exclusive expression of the short isoform (GATA1s). Subsequent leukemic progression could occur in multiple stem and progenitor populations, was independent of trisomy 21, and induced through deletion of cohesin genes, including STAG2 (STAG2ko). Serial engraftment in mice showed that GATA1s-induced preleukemia underwent spontaneous resolution, which contrasted with the persistent ability of the GATA1s/STAG2ko\\u2013induced leukemia to engraft serially in mice. Leukemic progression was developmentally restricted to fetal and early postnatal stages; adult-derived bone marrow HSPCs were unable to undergo GATA1s/STAG2ko-induced leukemic transformation. We identified a molecular mechanism by which three chromosome 21 microRNAs (miRNAs) contributed to the predisposition toward preleukemia initiation. Simultaneous overexpression of miR-99a, miR-125b-2, and miR-155 in normal disomic LT-HSCs recapitulated a trisomy 21\\u2013like hematopoietic state, as assessed through comparable lineage differentiation, reduced self-renewal capacity, and similar gene expression and open chromatin accessibility profile. Removal of these miRNAs in trisomy 21 LT-HSCs inhibited GATA1s-induced preleukemia development. Using secondary xenotransplantations of defined cell populations, we identified CD117+/KIT proto-oncogene (KIT) as a marker of disease-driving cells. Pharmacological KIT inhibition targeted preleukemic stem cells, both in GATA1s-induced preleukemia and in primary Down syndrome preleukemia patient samples. CONCLUSION Collectively, our results provide insight into how human preleukemia and leukemia evolve in fetal life and early childhood. We were able to identify distinct cellular origins and effects of trisomy 21 for preleukemia initiation and leukemia progression. Predisposition to preleukemia in Down syndrome is affected by overexpression of distinct chromosome 21 miRNAs, specifically in the preleukemic LT-HSC cell of origin. Our study reveals the relevance of the cellular and developmental status of the cell of origin during leukemogenesis, which begins to explain why genetic drivers can be distinct between pediatric and adult acute myeloid leukemia. KIT inhibitors targeted preleukemic stem cells, providing proof of principle for early prevention strategies in childhood leukemia that may be able to inhibit leukemia progression, and these results encourage further preclinical and clinical assessment. Cell of origin in Down syndrome leukemogenesis. Down syndrome preleukemia originated in long-term hematopoietic stem cells (LT-HSCs) through mutations in GATA1, leading to the expression of the short isoform GATA1s. Progression toward leukemia occurred in various stem and progenitor cells through mutations in cohesin factors such as STAG2. Predisposition to preleukemia was affected by chromosome 21 miRNAs, and pharmacological inhibition of KIT targeted preleukemic stem cells. Children with Down syndrome have a 150-fold increased risk of developing myeloid leukemia, but the mechanism of predisposition is unclear. Because Down syndrome leukemogenesis initiates during fetal development, we characterized the cellular and developmental context of preleukemic initiation and leukemic progression using gene editing in human disomic and trisomic fetal hematopoietic cells and xenotransplantation. GATA binding protein 1 (GATA1) mutations caused transient preleukemia when introduced into trisomy 21 long-term hematopoietic stem cells, where a subset of chromosome 21 microRNAs affected predisposition to preleukemia. By contrast, progression to leukemia was independent of trisomy 21 and originated in various stem and progenitor cells through additional mutations in cohesin genes. CD117+/KIT proto-oncogene (KIT) cells mediated the propagation of preleukemia and leukemia, and KIT inhibition targeted preleukemic stem cells.\"}, {\"paperId\": \"06650b49c93c2bc5d3ea1bbe893a874dd64dc32a\", \"externalIds\": {\"PubMedCentral\": \"7949113\", \"DOI\": \"10.1016/j.jbc.2021.100325\", \"CorpusId\": 231711436, \"PubMed\": \"33493514\"}, \"title\": \"G protein \\u03b2\\u03b3 translocation to the Golgi apparatus activates MAPK via p110\\u03b3-p101 heterodimers\", \"venue\": \"Journal of Biological Chemistry\", \"year\": 2021, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jbc.org/article/S002192582100096X/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7949113, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13101738\", \"name\": \"Mostafa Khater\"}, {\"authorId\": \"50412315\", \"name\": \"Zhe Wei\"}, {\"authorId\": \"2152775413\", \"name\": \"Xin Xu\"}, {\"authorId\": \"153383669\", \"name\": \"Wei Huang\"}, {\"authorId\": \"4535806\", \"name\": \"B. Lokeshwar\"}, {\"authorId\": \"1737489\", \"name\": \"N. Lambert\"}, {\"authorId\": \"3215804\", \"name\": \"Guangyu Wu\"}], \"abstract\": \"The Golgi apparatus (GA) is a cellular organelle that plays a critical role in the processing of proteins for secretion. Activation of G protein\\u2013coupled receptors at the plasma membrane (PM) induces the translocation of G protein \\u03b2\\u03b3 dimers to the GA. However, the functional significance of this translocation is largely unknown. Here, we study PM-GA translocation of all 12 G\\u03b3 subunits in response to chemokine receptor CXCR4 activation and demonstrate that G\\u03b39 is a unique Golgi-translocating G\\u03b3 subunit. CRISPR-Cas9\\u2013mediated knockout of G\\u03b39 abolishes activation of extracellular signal-regulated kinase 1 and 2 (ERK1/2), two members of the mitogen-activated protein kinase family, by CXCR4. We show that chemically induced recruitment to the GA of G\\u03b2\\u03b3 dimers containing different G\\u03b3 subunits activates ERK1/2, whereas recruitment to the PM is ineffective. We also demonstrate that pharmacological inhibition of phosphoinositide 3-kinase \\u03b3 (PI3K\\u03b3) and depletion of its subunits p110\\u03b3 and p101 abrogate ERK1/2 activation by CXCR4 and G\\u03b2\\u03b3 recruitment to the GA. Knockout of either G\\u03b39 or PI3K\\u03b3 significantly suppresses prostate cancer PC3 cell migration, invasion, and metastasis. Collectively, our data demonstrate a novel function for G\\u03b2\\u03b3 translocation to the GA, via activating PI3K\\u03b3 heterodimers p110\\u03b3-p101, to spatiotemporally regulate mitogen-activated protein kinase activation by G protein\\u2013coupled receptors and ultimately control tumor progression.\"}, {\"paperId\": \"0669429fb5a6082d2975449699722ca3c1f49024\", \"externalIds\": {\"MAG\": \"3003269839\", \"PubMedCentral\": \"7102956\", \"DOI\": \"10.1093/nar/gkz1240\", \"CorpusId\": 210935095, \"PubMed\": \"31989168\"}, \"title\": \"Good guide, bad guide: spacer sequence-dependent cleavage efficiency of Cas12a\", \"venue\": \"Nucleic Acids Research\", \"year\": 2020, \"citationCount\": 88, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/nar/article-pdf/48/6/3228/32977879/gkz1240.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7102956, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4515922\", \"name\": \"Sjoerd C. A. Creutzburg\"}, {\"authorId\": \"1895360\", \"name\": \"Wen Y. Wu\"}, {\"authorId\": \"7931060\", \"name\": \"Prarthana Mohanraju\"}, {\"authorId\": \"1411491459\", \"name\": \"Thomas Swartjes\"}, {\"authorId\": \"2596666\", \"name\": \"F. Alkan\"}, {\"authorId\": \"1774524\", \"name\": \"J. Gorodkin\"}, {\"authorId\": \"5416262\", \"name\": \"R. Staals\"}, {\"authorId\": \"2127976914\", \"name\": \"John van der\\u00a0Oost\"}], \"abstract\": \"Abstract Genome editing has recently made a revolutionary development with the introduction of the CRISPR\\u2013Cas technology. The programmable CRISPR-associated Cas9 and Cas12a nucleases generate specific dsDNA breaks in the genome, after which host DNA-repair mechanisms can be manipulated to implement the desired editing. Despite this spectacular progress, the efficiency of Cas9/Cas12a-based engineering can still be improved. Here, we address the variation in guide-dependent efficiency of Cas12a, and set out to reveal the molecular basis of this phenomenon. We established a sensitive and robust in vivo targeting assay based on loss of a target plasmid encoding the red fluorescent protein (mRFP). Our results suggest that folding of both the precursor guide (pre-crRNA) and the mature guide (crRNA) have a major influence on Cas12a activity. Especially, base pairing of the direct repeat, other than with itself, was found to be detrimental to the activity of Cas12a. Furthermore, we describe different approaches to minimize base-pairing interactions between the direct repeat and the variable part of the guide. We show that design of the 3\\u2032 end of the guide, which is not involved in target strand base pairing, may result in substantial improvement of the guide's targeting potential and hence of its genome editing efficiency.\"}, {\"paperId\": \"06699b50f9203494dddc4b6ee4280d5ff89192b4\", \"externalIds\": {\"DOI\": \"10.1093/humrep/dead093.308\", \"CorpusId\": 259560141}, \"title\": \"O-254\\u2003ACTRT2 deficiency increases spermatogonia vulnerability to ferroptosis\", \"venue\": \"Human Reproduction\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/humrep/article-pdf/38/Supplement_1/dead093.308/50787996/dead093.308.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/humrep/dead093.308?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/humrep/dead093.308, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"123655471\", \"name\": \"H. Chen\"}, {\"authorId\": \"48513601\", \"name\": \"Y. Li\"}, {\"authorId\": \"2206164298\", \"name\": \"C. Deng\"}, {\"authorId\": \"2042699253\", \"name\": \"X. Liang\"}, {\"authorId\": \"47062103\", \"name\": \"G. Liu\"}], \"abstract\": \"\\n \\n \\n How does the actin-related proteins T2, ACTRT2, which is specifically expressed in spermatogonia, regulate spermatogonia death?\\n \\n \\n \\n ACTRT2 deficiency in spermatogonia leads to intracellular iron overload and damage to mitochondria, ultimately increasing spermatogonia vulnerability to ferroptosis.\\n \\n \\n \\n ACTRT2 is tightly related to spermatogenesis. On the one hand, ACTRT2 is involved in regulating iron uptake in spermatogonia. ACTRT2 deficiency leads to intracellular iron overload and mitochondrial damage, ultimately increasing the vulnerability of spermatogonia to ferroptosis. On the other hand, for ACTRT2-related spermatogenic impairment, the survival of spermatogonia could be maintained by inhibiting ferroptosis, and spermatogenesis of the testis could be improved.\\n \\n \\n \\n The expression of ACTRT2 was knocked down in GC-1 cells (spermatogonial cell line). Busulfan was used to induce GC-1 cells death. And then to explore which type of cell death ACTRT2 was involved in, GC-1 cells were treated with 50\\u2009\\u03bcM Z-VAD-FMK (apoptosis inhibitor), 50\\u2009\\u03bcM necrostin-1 (necroptosis inhibitor), or 0.1\\u2009\\u03bcM ferrostatin-1 (ferroptosis inhibitor).The mechanism by which ACTRT2 regulates ferroptosis in spermatogonocytes was investigated in ACTRT2 knockout mice.\\n \\n \\n \\n ACTRT2 expression was knocked down in vitro in GC-1 cells using siRNA. Then, GC-1 cell death was induced using 150\\u2009\\u03bcM busulfan. ROS levels, morphological changes in mitochondria, and the ferroptosis marker GPX4 were detected. ACTRT2 knockout mice were constructed in vivo using CRISPR/Cas9. The spermatogenesis of the mice was measured with H&E staining. After treatment with busulfan, ferrostatin-1 was used to inhibit ferroptosis in order to protect spermatogenesis.\\n \\n \\n \\n ACTRT2 was specifically expressed in testicular tissue and was associated with spermatogenesis. In vitro, when the cells were treated with busulfan, the proportion of GC-1 cell death in the low-ACTRT2 group increased significantly compared with the si-NC group. Furthermore, ferrostatin-1 significantly improved the survival of busulfan-treated cells. In low-ACTRT2 GC-1 cells, ROS accumulation and typical mitochondrial changes associated with ferroptosis occurred, and GPX4 was downregulated. In vivo, the seminiferous tubules in ACTRT2-/- mice were significantly shrunken. In addition, after being treated with busulfan, spermatogenesis in ACTRT2+/- mice decreased significantly compared to that in wild-type mice. In ACTRT2+/- testes, the expression levels of ACSL4 and ALOX15 were upregulated, while the expression levels of SLC7A11 and GPX4 were downregulated. Then, ferrostatin-1 was administered, which resulted in improved spermatogenesis. Finally, we found that the expression of SLC11A2, IREB2, and TFRC increased significantly in the low-ACTRT2 group, which transports iron into the cell to increase the intracellular unstable iron pool. Meanwhile, the expression of SLC40A1, which transports excess iron out of the cell, significantly decreased.\\n \\n \\n \\n We found that ferrostatin-1 can inhibit ferroptosis in ACTRT2-deficient spermatogonia, which is expected to be a new therapeutic strategy for male infertility. However, its safety and efficacy still need to be further evaluated, and the therapeutic schedule still needs to be further explored and optimized.\\n \\n \\n \\n Ferrostatin-1 can inhibit ferroptosis in ACTRT2-deficient spermatogonia, which is expected to be a new therapeutic strategy for male infertility.\\n \\n \\n \\n not applicable\\n\"}, {\"paperId\": \"066bc37bf679ce32aa739eca203ae985fa73cbeb\", \"externalIds\": {\"DOI\": \"10.1016/j.scr.2023.103038\", \"CorpusId\": 256496277, \"PubMed\": \"36746102\"}, \"title\": \"Generation of a ST3GAL3 null mutant induced pluripotent stem cell (iPSC) line (UKWMPi002-A-3) by CRISPR/Cas9 genome editing.\", \"venue\": \"Stem Cell Research\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.scr.2023.103038\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scr.2023.103038?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scr.2023.103038, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2032735170\", \"name\": \"David Diouf\"}, {\"authorId\": \"2057589296\", \"name\": \"M. R. Vitale\"}, {\"authorId\": \"2047331545\", \"name\": \"J. Z\\u00f6ller\"}, {\"authorId\": \"2336611246\", \"name\": \"A.M. Pineau\"}, {\"authorId\": \"6927368\", \"name\": \"E. Klopocki\"}, {\"authorId\": \"32118949\", \"name\": \"Carina Hamann\"}, {\"authorId\": \"49615202\", \"name\": \"G. C. Ziegler\"}, {\"authorId\": \"5295207\", \"name\": \"T. Vanmierlo\"}, {\"authorId\": \"144539614\", \"name\": \"D. V. D. van den Hove\"}, {\"authorId\": \"2794607\", \"name\": \"K. Lesch\"}], \"abstract\": \"Fibroblasts isolated from a skin biopsy of a healthy individual were infected with Sendai virus containing the Yamanaka factors to produce transgene-free human induced pluripotent stem cells (iPSCs). CRISPR/Cas9 was used to generate an isogenic cell line carrying an inactivation of ST3GAL3, a risk gene associated with neurodevelopmental and psychiatric disorders. This ST3GAL3 null mutant (ST3GAL3-/-) iPSC line, which displays the expression of pluripotency-associated markers, the ability to differentiate into cells of the three germ layers in vitro, and a normal karyotype, is a powerful tool to investigate the impact of deficient sialylation of glycoproteins in neural development and plasticity.\"}, {\"paperId\": \"06705a53b25efa56597184524fb25e0f3eb639a5\", \"externalIds\": {\"DOI\": \"10.12122/j.issn.1673-4254.2021.01.17\", \"CorpusId\": 231762329, \"PubMed\": \"33509763\"}, \"title\": \"[Construction of macrophage RAW 264.7 cells with gsdmd gene knockout by CRISPR/Cas9 system].\", \"venue\": \"Nan fang yi ke da xue xue bao = Journal of Southern Medical University\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.12122/j.issn.1673-4254.2021.01.17?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.12122/j.issn.1673-4254.2021.01.17, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1753521914\", \"name\": \"Liting Zhou\"}, {\"authorId\": \"2114059036\", \"name\": \"Ying Ye\"}, {\"authorId\": \"2114128442\", \"name\": \"Haibo Yuan\"}, {\"authorId\": \"1927826812\", \"name\": \"Chaoyi Wu\"}, {\"authorId\": \"144547478\", \"name\": \"Shuyan Wu\"}], \"abstract\": null}, {\"paperId\": \"06722a0bbe54be90004de6c5694588c1d13d5673\", \"externalIds\": {\"PubMedCentral\": \"7296174\", \"MAG\": \"3034853211\", \"DOI\": \"10.3389/fgene.2020.00528\", \"CorpusId\": 219534908, \"PubMed\": \"32582281\"}, \"title\": \"Prime Editing: Genome Editing for Rare Genetic Diseases Without Double-Strand Breaks or Donor DNA\", \"venue\": \"Frontiers in Genetics\", \"year\": 2020, \"citationCount\": 58, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgene.2020.00528/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7296174, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6422700\", \"name\": \"I. Matsoukas\"}], \"abstract\": \"An article published in Nature (Anzalone et al., 2019) reports the development of a genome editing experimental approach that mediates all possible base-to-base conversions, \\u201cindels,\\u201d and combinations in human genome without the need of double-strand breaks (DSBs) or donor DNA (dDNA) templates. Prime editing, the novel method of genome editing, exploits a longer-than-usual single guide RNA (gRNA), known as prime editing gRNA (pegRNA), and a fusion protein consisting of Cas9 H840A nickase fused to an engineered reverse transcriptase (RT) enzyme. Described as \\u201csearch-and-replace\\u201d base-editing technology, prime editing supplies the desired genetic construct in an extension to the gRNA, which is then converted to DNA using the RT enzyme. The new approach eliminates the need for co-delivery of a corrective DNA template, performs all possible nucleotide substitutions (including those for a sizeable proportion of genetic disorders), resolves frameshifts induced by indels and confers fewer off-target edits when compared with conventional CRISPR-Cas devices. Prime editing is an exciting new complement to existing CRISPR editing systems and may even be an improvement in many cases. However, prime editing introduces new challenges. Overcoming these obstacles and applying prime editing in vivo, will give rise to new genome editing therapies for rare genetic diseases.\"}, {\"paperId\": \"0673b85c2c51127b90f568a79465c1fda0459c2c\", \"externalIds\": {\"DOI\": \"10.1002/adhm.202402259\", \"CorpusId\": 272299729, \"PubMed\": \"39212195\"}, \"title\": \"A Multifunctional Aptamer Decorated Lipid Nanoparticles for the Delivery of EpCAM\\u2010targeted CRISPR/Cas9 Plasmid for Efficacious In Vivo Tumor Regression\", \"venue\": \"Advanced Healthcare Materials\", \"year\": 2024, \"citationCount\": 14, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/adhm.202402259?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/adhm.202402259, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2267855591\", \"name\": \"Sourav Sarkar\"}, {\"authorId\": \"8458012\", \"name\": \"P. Moitra\"}, {\"authorId\": \"2156590270\", \"name\": \"Wei Duan\"}, {\"authorId\": \"2237843010\", \"name\": \"Santanu Bhattacharya\"}], \"abstract\": \"Epithelial cell adhesion molecule (EpCAM) gene encodes a type\\u2010I trans\\u2010membrane glycoprotein that is overexpressed in many cancerous epithelial cells and promotes tumor progression by regulating the expression of several oncogenes like c\\u2010myc and other cyclins. Because of this tumorigenic association, the EpCAM gene has been a potential target for anti\\u2010cancer therapy in recent days. Herein, it is attempted to knockout the proto\\u2010oncogenic EpCAM expression by efficiently delivering an all\\u2010in\\u2010one Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR) plasmid via a lipid nanoparticle system made out of synthetic stimuli\\u2010sensitive lipids. The plasmid possesses the necessary information in the form of a guide RNA targeted to the EpCAM gene. The aptamer decorated system selectively targets EpCAM overexpressed cells and efficiently inhibits the genetic expression. It has explored the pH\\u2010responsive property of the developed lipid nanoparticles and monitored their efficacy in various cancer cell lines of different origins with elevated EpCAM levels. The phenomenon has further been validated in vivo in non\\u2010immunocompromised mouse tumor models. Overall, the newly developed aptamer decorated lipid nanoparticle system has been proven to be efficacious for the delivery of EpCAM\\u2010targeted CRISPR/Cas9 plasmid.\"}, {\"paperId\": \"067464424d69f510f504c59d750c03920fe92987\", \"externalIds\": {\"PubMedCentral\": \"7460652\", \"MAG\": \"3047591476\", \"DOI\": \"10.3390/ijms21165614\", \"CorpusId\": 221074404, \"PubMed\": \"32764465\"}, \"title\": \"Development of CRISPR Interference (CRISPRi) Platform for Metabolic Engineering of Leuconostoc citreum and Its Application for Engineering Riboflavin Biosynthesis\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/16/5614/pdf?version=1596639156\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7460652, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1862634669\", \"name\": \"Jaewoo Son\"}, {\"authorId\": \"13564016\", \"name\": \"S. Jang\"}, {\"authorId\": \"4070657\", \"name\": \"J. Cha\"}, {\"authorId\": \"144760360\", \"name\": \"K. Jeong\"}], \"abstract\": \"Leuconostoccitreum, a hetero-fermentative type of lactic acid bacteria, is a crucial probiotic candidate because of its ability to promote human health. However, inefficient gene manipulation tools limit its utilization in bioindustries. We report, for the first time, the development of a CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) interference (CRISPRi) system for engineering L. citreum. For reliable expression, the expression system of synthetic single guide RNA (sgRNA) and the deactivated Cas9 of Streptococcus pyogenes (SpdCas9) were constructed in a bicistronic design (BCD) platform using a high-copy-number plasmid. The expression of SpdCas9 and sgRNA was optimized by examining the combination of two synthetic promoters and Shine\\u2013Dalgarno sequences; the strong expression of sgRNA and the weak expression of SpdCas9 exhibited the most significant downregulation (20-fold decrease) of the target gene (sfGFP), without cell growth retardation caused by SpdCas9 overexpression. The feasibility of the optimized CRISPRi system was demonstrated by modulating the biosynthesis of riboflavin. Using the CRISPRi system, the expression of ribF and folE genes was downregulated (3.3-fold and 5.6-fold decreases, respectively), thereby improving riboflavin production. In addition, the co-expression of the rib operon was introduced and the production of riboflavin was further increased up to 1.7 mg/L, which was 1.53 times higher than that of the wild-type strain.\"}, {\"paperId\": \"06750f177e0255f99e13658818ced2fe43069878\", \"externalIds\": {\"PubMedCentral\": \"8173035\", \"DOI\": \"10.3389/fpls.2021.627832\", \"CorpusId\": 234786149, \"PubMed\": \"34093603\"}, \"title\": \"Effects of the sliaa9 Mutation on Shoot Elongation Growth of Tomato Cultivars\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2021.627832/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8173035, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2008313398\", \"name\": \"Chihiro Abe-Hara\"}, {\"authorId\": \"2350443\", \"name\": \"Kohji Yamada\"}, {\"authorId\": \"2073644492\", \"name\": \"Naoki Wada\"}, {\"authorId\": \"6776645\", \"name\": \"Risa Ueta\"}, {\"authorId\": \"2071085374\", \"name\": \"Ryosuke Hashimoto\"}, {\"authorId\": \"39105807\", \"name\": \"K. Osakabe\"}, {\"authorId\": \"3829071\", \"name\": \"Yuriko Osakabe\"}], \"abstract\": \"Tomato INDOLE-3-ACETIC ACID9 (SlIAA9) is a transcriptional repressor in auxin signal transduction, and SlIAA9 knockout tomato plants develop parthenocarpic fruits without fertilization. We generated sliaa9 mutants with parthenocarpy in several commercial tomato cultivars (Moneymaker, Rio Grande, and Ailsa Craig) using CRISPR-Cas9, and null-segregant lines in the T1 generation were isolated by self-pollination, which was confirmed by PCR and Southern blot analysis. We then estimated shoot growth phenotypes of the mutant plants under different light (low and normal) conditions. The shoot length of sliaa9 plants in Moneymaker and Rio Grande was smaller than those of wild-type cultivars in low light conditions, whereas there was not clear difference between the mutant of Ailsa Craig and the wild-type under both light conditions. Furthermore, young seedlings in Rio Grande exhibited shade avoidance response in hypocotyl growth, in which the hypocotyl lengths were increased in low light conditions, and sliaa9 mutant seedlings of Ailsa Craig exhibited enhanced responses in this phenotype. Fruit production and growth rates were similar among the sliaa9 mutant tomato cultivars. These results suggest that control mechanisms involved in the interaction of AUX/IAA9 and lights condition in elongation growth differ among commercial tomato cultivars.\"}, {\"paperId\": \"06753df002e00114d01cd8eeb9972ed29c9b85ec\", \"externalIds\": {\"MAG\": \"3028837315\", \"PubMedCentral\": \"7265500\", \"DOI\": \"10.1038/s41467-020-16550-9\", \"CorpusId\": 219176311, \"PubMed\": \"32488111\"}, \"title\": \"Loss of the transcription factor MAFB limits \\u03b2-cell derivation from human PSCs\", \"venue\": \"Nature Communications\", \"year\": 2020, \"citationCount\": 49, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-020-16550-9.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7265500, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145400206\", \"name\": \"Ronan Russell\"}, {\"authorId\": \"1734801295\", \"name\": \"Phichitpol P. Carnese\"}, {\"authorId\": \"2890465\", \"name\": \"Thomas G. Hennings\"}, {\"authorId\": \"18176213\", \"name\": \"E. Walker\"}, {\"authorId\": \"2178019\", \"name\": \"H. Russ\"}, {\"authorId\": \"2108346081\", \"name\": \"Jennifer S. Liu\"}, {\"authorId\": \"34659564\", \"name\": \"Simone Giacometti\"}, {\"authorId\": \"2273053\", \"name\": \"R. Stein\"}, {\"authorId\": \"6766782\", \"name\": \"Matthias Hebrok\"}], \"abstract\": \"Next generation sequencing studies have highlighted discrepancies in \\u03b2-cells which exist between mice and men. Numerous reports have identified MAF BZIP Transcription Factor B (MAFB) to be present in human \\u03b2-cells postnatally, while its expression is restricted to embryonic and neo-natal \\u03b2-cells in mice. Using CRISPR/Cas9-mediated gene editing, coupled with endocrine cell differentiation strategies, we dissect the contribution of MAFB to \\u03b2-cell development and function specifically in humans. Here we report that MAFB knockout hPSCs have normal pancreatic differentiation capacity up to the progenitor stage, but favor somatostatin- and pancreatic polypeptide\\u2013positive cells at the expense of insulin- and glucagon-producing cells during endocrine cell development. Our results describe a requirement for MAFB late in the human pancreatic developmental program and identify it as a distinguishing transcription factor within islet cell subtype specification. We propose that hPSCs represent a powerful tool to model human pancreatic endocrine development and associated disease pathophysiology. The MAF bZIP transcription factor B (MAFB) is present in postnatal human beta cells but its role is unclear. Here, the authors show that MAFB regulates endocrine pancreatic cell fate specification.\"}, {\"paperId\": \"0676841e3f839602fd110990fafe37a01e5798da\", \"externalIds\": {\"DOI\": \"10.1158/0008-5472.CAN-20-3788\", \"CorpusId\": 246443416, \"PubMed\": \"35101866\"}, \"title\": \"Somatic mutations enriched in cis-regulatory elements affect genes involved in embryonic development and immune system response in neuroblastoma.\", \"venue\": \"Cancer Research\", \"year\": 2022, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://aacrjournals.org/cancerres/article-pdf/82/7/1193/3108683/1193.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/0008-5472.CAN-20-3788?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/0008-5472.CAN-20-3788, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5453914\", \"name\": \"V. A. Lasorsa\"}, {\"authorId\": \"153887791\", \"name\": \"A. Montella\"}, {\"authorId\": \"80866963\", \"name\": \"Sueva Cantalupo\"}, {\"authorId\": \"2003807597\", \"name\": \"Matilde Tirelli\"}, {\"authorId\": \"133751309\", \"name\": \"C. de Torres\"}, {\"authorId\": \"4103106\", \"name\": \"Sanja Aveic\"}, {\"authorId\": \"36784547\", \"name\": \"G. Tonini\"}, {\"authorId\": \"47092930\", \"name\": \"A. Iolascon\"}, {\"authorId\": \"5147624\", \"name\": \"M. Capasso\"}], \"abstract\": \"Noncoding cis-regulatory variants have gained interest as cancer drivers, yet progress in understanding their significance is hindered by the numerous challenges and limitations of variant prioritization. To overcome these limitations, we focused on active cis-regulatory elements (aCRE) in order to design a customized panel for the deep sequencing of 56 neuroblastoma tumor and normal DNA sample pairs. In order to search for driver mutations, aCREs were defined by reanalysis of H3K27ac ChiP-seq peaks in 25 neuroblastoma cell lines. These regulatory genomic regions were tested for an excess of somatic mutations and assessed for statistical significance using a global approach that accounted for chromatin accessibility and replication timing. Additional validation was provided by whole genome sequence analysis of 151 neuroblastomas. Analysis of Hi-C data determined the presence of candidate target genes interacting with mutated regions. An excess of somatic mutations in aCREs of diverse genes were identified, including IPO7, HAND2, and ARID3A. CRISPR-Cas9 editing was utilized to assess the functional consequences of mutations in the IPO7 aCRE. Patients with noncoding mutations in aCREs showed inferior overall and event-free survival independent of age at diagnosis, stage, risk stratification, and MYCN status. Expression of aCRE-interacting genes correlated strongly with negative prognostic markers and low survival rates. Moreover, a convergence between the biological functions of aCRE target genes and transcription factors with mutated binding motifs was associated with embryonic development and immune system response. Overall, this strategy enabled the identification of somatic mutations in regulatory elements that collectively promote neuroblastoma tumorigenesis.\"}, {\"paperId\": \"0677309028e57812acce1bc115f2b145a2d719cd\", \"externalIds\": {\"PubMedCentral\": \"10239735\", \"DOI\": \"10.2147/OTT.S405027\", \"CorpusId\": 259088542, \"PubMed\": \"37283647\"}, \"title\": \"JUND Promotes Tumorigenesis via Specifically Binding on Enhancers of Multiple Oncogenes in Cervical Cancer\", \"venue\": \"OncoTargets and Therapy\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10239735, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2384944949\", \"name\": \"Jianlong Zhou\"}, {\"authorId\": \"12923443\", \"name\": \"Juanmei Mo\"}, {\"authorId\": \"1943383754\", \"name\": \"Chaohui Tan\"}, {\"authorId\": \"2329218875\", \"name\": \"Feng Xie\"}, {\"authorId\": \"2118674432\", \"name\": \"Jing Liang\"}, {\"authorId\": \"2158104619\", \"name\": \"Wenhua Huang\"}], \"abstract\": \"Purpose Enhancers are genomic regulatory elements located distally from the target gene, which play a critical role in determining cell identity and function. Dysregulation of enhancers has been frequently observed in various types of cancer, including cervical cancer. However, the identity of enhancers and their associated transcriptional regulators that are involved in cervical cancer remains unclear. Methods With bioinformatics and 3D genomics, we revealed the enhancers in cervical cancer cell line and calculated which transcription factor (TF) is specifically binding on them based on TFs motif database. We knockdowned this TF and studied its function in cervical cancer cell line in vivo and in vitro. Results We found 14,826 activated enhancers and predicted that JUND (JunD Proto-Oncogene) is relatively enriched in the sequences of these enhancers. Well-known oncogene MYC and JUN were regulated by JUND through enhancers. To further explore the roles of JUND in cervical cancer, we analyzed the gene expression data of clinical cervical cancer samples and knock-downed JUND by CRISPR-Cas9 in Hela cell line. We found JUND is over-expressed in cervical cancer and the expression of JUND increased along with the cervical cancer progresses. Knockdown of JUND decreased the proliferation of Hela cells in vitro and in vivo and blocked cell cycle in G1-phase. Transcriptome sequencing analysis revealed the identification of 2,231 differentially expressed genes in response to the JUND knockdown treatment. This perturbation resulted in the modulation of several biological processes and pathways that have been previously linked to cancer. Conclusion These findings provide evidence for the significant involvement of JUND in cervical cancer pathogenesis, thereby positioning JUND as a potential therapeutic target for the treatment of this disease.\"}, {\"paperId\": \"0677aa5f9c81d4218e4e232e025a52d0f0b8d3a5\", \"externalIds\": {\"DOI\": \"10.1038/s41564-022-01278-7\", \"CorpusId\": 255469757, \"PubMed\": \"36593296\"}, \"title\": \"Staphylococcal virulence factor HlgB targets the endoplasmic-reticulum-resident E3 ubiquitin ligase AMFR to promote pneumonia\", \"venue\": \"Nature Microbiology\", \"year\": 2023, \"citationCount\": 22, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41564-022-01278-7?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41564-022-01278-7, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2110832959\", \"name\": \"Lei Sun\"}, {\"authorId\": \"48212466\", \"name\": \"Haibo Zhang\"}, {\"authorId\": \"46701845\", \"name\": \"Huihui Zhang\"}, {\"authorId\": \"1911115842\", \"name\": \"Xinyi Lou\"}, {\"authorId\": \"2199563402\", \"name\": \"Zhiming Wang\"}, {\"authorId\": \"2267863412\", \"name\": \"Yaxian Wu\"}, {\"authorId\": \"2150441059\", \"name\": \"Xinyi Yang\"}, {\"authorId\": \"6885004\", \"name\": \"Daijie Chen\"}, {\"authorId\": \"10161590\", \"name\": \"Beining Guo\"}, {\"authorId\": \"2153658411\", \"name\": \"Ao Zhang\"}, {\"authorId\": \"145757344\", \"name\": \"Feng Qian\"}], \"abstract\": null}, {\"paperId\": \"0677fa7bca3a12bcf8cf7688f77084bd529a250d\", \"externalIds\": {\"PubMedCentral\": \"8875147\", \"DOI\": \"10.3390/insects13020137\", \"CorpusId\": 246402450, \"PubMed\": \"35206711\"}, \"title\": \"Knockout of the ABCB1 Gene Increases Susceptibility to Emamectin Benzoate, Beta-Cypermethrin and Chlorantraniliprole in Spodoptera frugiperda\", \"venue\": \"Insects\", \"year\": 2022, \"citationCount\": 31, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2075-4450/13/2/137/pdf?version=1643295243\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8875147, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146240642\", \"name\": \"Qi Li\"}, {\"authorId\": \"2040975\", \"name\": \"M. Jin\"}, {\"authorId\": \"2150126776\", \"name\": \"Songmiao Yu\"}, {\"authorId\": \"2146291498\", \"name\": \"Ying Cheng\"}, {\"authorId\": \"2007695408\", \"name\": \"Yinxue Shan\"}, {\"authorId\": \"2155304055\", \"name\": \"Peng Wang\"}, {\"authorId\": \"4692785\", \"name\": \"Hai-bin Yuan\"}, {\"authorId\": \"4839583\", \"name\": \"Yutao Xiao\"}], \"abstract\": \"Simple Summary Spodoptera frugiperda is an invasive lepidopteran pest that causes extensive damage to many commercial crops. To control this pest, the use of chemical pesticides has become increasingly important because of their high efficiency, low cost and ease of mechanized operations. However, despite the proven effectiveness of pesticides, the long-term use of chemicals not only pollutes the environment, but also leads to resistance in field populations, making pest control more difficult. In this study, we used the CRISPR/Cas9 system to generate an ABCB1 knockout strain to explore its potential role in determining susceptibility to chemical pesticides or Bt toxins. We compared the mortality of WT strains and knockout strains treated with 10 insecticides and three Bt proteins, and found that the insects were significantly more susceptible to the three insecticides (emamectin benzoate, beta-cypermethrin and chlorantraniliprole) after ABCB1 was knocked out. Our results showed that ABCB1 is closely related to the detoxification metabolism of some pesticides, and suggest that the resistance of Spodoptera frugiperda to emamectin benzoate, beta-cypermethrin and chlorantraniliprole may be related to the overexpression of ABCB1. This lays a foundation for a follow-up study on the resistance mechanism of Spodoptera frugiperda. Abstract ATP-binding cassette transporter B1 (ABCB1, or P-glycoprotein) is known to be an important participant in multidrug resistance in mammals, and it also has been proved as a transporter for some insecticides in several lepidopteran insects, yet the precise function of this transporter in Spodoptera frugiperda is unknown. Here, we generated a SfABCB1 knockout strain of the S. frugiperda using the CRISPR/Cas9 system to explore its potential roles in determining susceptibility to chemical insecticides or Bt toxins. Bioassay results showed that the susceptibility of SfABCB1 knockout strain to beta-cypermethrin, chlorantraniliprole and emamectin benzoate were significantly increased compared with the wild-type strain DH19, whereas there were no changes to Bt toxins for Cry1Ab, Cry1Fa and Vip3Aa. Our results revealed that SfABCB1 plays important roles in the susceptibility of S. frugiperda to beta-cypermethrin, chlorantraniliprole and emamectin benzoate, and imply that overexpression of ABCB1 may contribute to beta-cypermethrin, chlorantraniliprole and emamectin benzoate resistance in S. frugiperda.\"}, {\"paperId\": \"067ff6793f590ce3e097d1a9b7b8209dca548abc\", \"externalIds\": {\"DOI\": \"10.1093/humrep/deac026\", \"CorpusId\": 247107138, \"PubMed\": \"35211729\"}, \"title\": \"Identification of a heterozygous variant of ZP2 as a novel cause of empty follicle syndrome in humans and mice.\", \"venue\": \"Human Reproduction\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1093/humrep/deac026?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/humrep/deac026, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48234902\", \"name\": \"Ying Shen\"}, {\"authorId\": \"2157957599\", \"name\": \"Jing Guo\"}, {\"authorId\": \"2107995324\", \"name\": \"Xueguang Zhang\"}, {\"authorId\": \"2144796349\", \"name\": \"Xiang Wang\"}, {\"authorId\": \"1927057643\", \"name\": \"Shaomi Zhu\"}, {\"authorId\": \"31443298\", \"name\": \"Daijuan Chen\"}, {\"authorId\": \"2055449200\", \"name\": \"Wei Xiong\"}, {\"authorId\": \"2166642396\", \"name\": \"G. Lu\"}, {\"authorId\": \"2110962105\", \"name\": \"Xiaojun Liu\"}, {\"authorId\": \"48562416\", \"name\": \"C. Dai\"}, {\"authorId\": \"144545172\", \"name\": \"F. Gong\"}, {\"authorId\": \"2152551420\", \"name\": \"Yan Wang\"}, {\"authorId\": \"48570798\", \"name\": \"G. Lin\"}, {\"authorId\": \"3358271\", \"name\": \"Zhenbo Wang\"}, {\"authorId\": \"40185607\", \"name\": \"Wenming Xu\"}], \"abstract\": null}, {\"paperId\": \"068270af59bdb995e50ca60857d3c8b1e39acef5\", \"externalIds\": {\"MAG\": \"3021492814\", \"PubMedCentral\": \"7208903\", \"DOI\": \"10.1210/jendso/bvaa046.913\", \"CorpusId\": 249880175}, \"title\": \"SUN-669 The G209R Mutant Mouse as a Model for Human PCSK1 Polyendocrinopathy\", \"venue\": \"Journal of the Endocrine Society\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1210/jendso/bvaa046.913\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7208903, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152642724\", \"name\": \"Anoop Arunagiri\"}, {\"authorId\": \"145658106\", \"name\": \"P. Arvan\"}, {\"authorId\": \"21548960\", \"name\": \"I. Lindberg\"}, {\"authorId\": \"1999342\", \"name\": \"E. Mathews\"}, {\"authorId\": \"4387149\", \"name\": \"W. Drane\"}, {\"authorId\": \"145170667\", \"name\": \"S. Staal\"}, {\"authorId\": \"14807173\", \"name\": \"Amita Kathuria\"}], \"abstract\": \"Abstract A striking number of SNPs and rare mutations have been identified in PCSK1, the gene that codes for the enzyme proprotein convertase 1/3 (PC1/3) which proteolytically activates prohormones within the secretory pathway. All infants bearing two copies of catalytically inactivating mutations, including G209R, exhibit severe neonatal malabsorption requiring parenteral nutrition for months and subsequently develop additional endocrinopathies, often including diabetes and obesity. In order to create a mouse model to explore the underlying mechanism of the malabsorption phenomenon and the endocrinopathies, a G209R point mutation was introduced into exon 6 of mouse Pcsk1 using CRISPR-Cas9 genome editing. Fifty-six live pups were collected at postnatal days one or two; however, most homozygous G209R mutant pups succumbed by day 2, and surviving pups were severely dwarfed. In homozygous, but not heterozygous pups, blood glucose levels were significantly lower with elevated plasma insulin-like immunoreactivity and accumulation of unprocessed proinsulin in G209R pancreas compared to the wild type pups from the same litters. The POMC product \\u03b1-MSH (produced by PC2 from PC1/3-generated ACTH) has been strongly implicated in obesity mechanisms. We found pituitary POMC processing to ACTH was also affected by the G209R mutation in combined anterior and intermediate pituitary lobes. ACTH was markedly reduced in homozygote pituitary, with significant accumulation of POMC. Using Western blotting, we observed a significant reduction in PC1/3 protein in homozygote brains, while PC2 protein levels remained unaffected. Most likely due to the continued presence of PC2, pituitary and brain levels of \\u03b1-MSH were not impaired, suggesting that \\u03b1-MSH itself is not involved in the phenotype. Prior studies have shown that G209R PC1/3 is not efficiently trafficked out of the ER; further studies will examine the contribution of misfolded G209R PC1/3 to possible cellular ER stress, as well as determine peptide hormone levels in brain and peripheral tissues.\"}, {\"paperId\": \"0682d046c190b02c38c798bc56b92086d055f315\", \"externalIds\": {\"DOI\": \"10.1136/ard-2023-224242\", \"CorpusId\": 260116264, \"PubMed\": \"37487609\"}, \"title\": \"SGLT2 inhibitors alleviated podocyte damage in lupus nephritis by decreasing inflammation and enhancing autophagy\", \"venue\": \"Annals of the Rheumatic Diseases\", \"year\": 2023, \"citationCount\": 79, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/ard-2023-224242?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/ard-2023-224242, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2244574882\", \"name\": \"Xin-Yu Zhao\"}, {\"authorId\": \"2269019933\", \"name\": \"Shuang Li\"}, {\"authorId\": \"2118918273\", \"name\": \"Yingxue He\"}, {\"authorId\": \"2266381544\", \"name\": \"Li Yan\"}, {\"authorId\": \"2158485742\", \"name\": \"Fu Lv\"}, {\"authorId\": \"46456492\", \"name\": \"Qihua Liang\"}, {\"authorId\": \"2176931017\", \"name\": \"Yujin Gan\"}, {\"authorId\": \"2182518581\", \"name\": \"Li-pei Han\"}, {\"authorId\": \"2219740708\", \"name\": \"H. Xu\"}, {\"authorId\": \"47002956\", \"name\": \"Yong-chun Li\"}, {\"authorId\": \"7031922\", \"name\": \"Y. Qi\"}], \"abstract\": \"Objectives The protective role of sodium glucose cotransporter 2 (SGLT2) inhibitors in renal outcomes has been revealed by large cardiovascular outcome trials among patients with type 2 diabetes. However, the effect of SGLT2 inhibitors on lupus nephritis (LN) and its underlying mechanisms remain unknown. Methods We applied empagliflozin treatment to lupus-prone MRL/lpr mice to explore the renal protective potential of SGLT2 inhibitors. An SGLT2 knockout monoclonal podocyte cell line was generated using the CRISPR/Cas9 system to examine the cellular and molecular mechanisms. Results In MRL/lpr mice treated with empagliflozin, the levels of mouse anti-dsDNA IgG-specific antibodies, serum creatinine and proteinuria were markedly decreased. For renal pathology assessment, both the glomerular and tubulointerstitial damages were lessened by administration of empagliflozin. The levels of SGLT2 expression were increased and colocalised with decreased synaptopodin in the renal biopsy samples from patients with LN and MRL/lpr mice with nephritis. The SGLT2 inhibitor empagliflozin could alleviated podocyte injury by attenuating inflammation and enhanced autophagy by reducing mTORC1 activity. Nine patients with LN treated with SGLT2 inhibitors with more than 2 months of follow-up showed that the use of SGLT2 inhibitors was associated with a significant decrease in proteinuria from 29.6% to 96.3%. Moreover, the estimated glomerular filtration rate (eGFR) was relatively stable during the treatment with SGLT2 inhibitors. Conclusion This study confirmed the renoprotective effect of SGLT2 inhibitors in lupus mice, providing more evidence for non-immunosuppressive therapies to improve renal function in classic autoimmune kidney diseases such as LN.\"}, {\"paperId\": \"068bd1b9d8dc8aed4351af4d55f25f7958c3ed47\", \"externalIds\": {\"MAG\": \"3089806255\", \"PubMedCentral\": \"7582248\", \"DOI\": \"10.3390/ijms21197270\", \"CorpusId\": 222155872, \"PubMed\": \"33019636\"}, \"title\": \"Nitrite Reductase 1 Is a Target of Nitric Oxide-Mediated Post-Translational Modifications and Controls Nitrogen Flux and Growth in Arabidopsis\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 35, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/19/7270/pdf?version=1601547448\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7582248, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404056376\", \"name\": \"\\u00c1lvaro Costa-Broseta\"}, {\"authorId\": \"37898262\", \"name\": \"M. Castillo\"}, {\"authorId\": \"144754932\", \"name\": \"J. Le\\u00f3n\"}], \"abstract\": \"Plant growth is the result of the coordinated photosynthesis-mediated assimilation of oxidized forms of C, N and S. Nitrate is the predominant N source in soils and its reductive assimilation requires the successive activities of soluble cytosolic NADH-nitrate reductases (NR) and plastid stroma ferredoxin-nitrite reductases (NiR) allowing the conversion of nitrate to nitrite and then to ammonium. However, nitrite, instead of being reduced to ammonium in plastids, can be reduced to nitric oxide (NO) in mitochondria, through a process that is relevant under hypoxic conditions, or in the cytoplasm, through a side-reaction catalyzed by NRs. We use a loss-of-function approach, based on CRISPR/Cas9-mediated genetic edition, and gain-of-function, using transgenic overexpressing HA-tagged Arabidopsis NiR1 to characterize the role of this enzyme in controlling plant growth, and to propose that the NO-related post-translational modifications, by S-nitrosylation of key C residues, might inactivate NiR1 under stress conditions. NiR1 seems to be a key target in regulating nitrogen assimilation and NO homeostasis, being relevant to the control of both plant growth and performance under stress conditions. Because most higher plants including crops have a single NiR, the modulation of its function might represent a relevant target for agrobiotechnological purposes.\"}, {\"paperId\": \"068cec3fdf34842815a6da9c6d87df7e10886f4b\", \"externalIds\": {\"DOI\": \"10.1016/j.esmoop.2023.100964\", \"CorpusId\": 257470034}, \"title\": \"106P Knockout of lncRNA-CCAT1 with the use of CRISPR-Cas9 system and G7 PAMAM dendrimers influences apoptosis and proliferations of NSCLC cells\", \"venue\": \"ESMO Open\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.esmoopen.com/article/S2059702923001849/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.esmoop.2023.100964?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.esmoop.2023.100964, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2065425214\", \"name\": \"M. Iwa\\u0144ski\"}, {\"authorId\": \"2310516291\", \"name\": \"K. Kwa\\u015bniak\"}, {\"authorId\": \"65748840\", \"name\": \"J. Olszewska\"}, {\"authorId\": \"107863860\", \"name\": \"A. G\\u0142owacka\"}, {\"authorId\": \"2063213231\", \"name\": \"K. Wr\\u00f3bel\"}, {\"authorId\": \"30170264\", \"name\": \"S. Wo\\u0142owiec\"}, {\"authorId\": \"6069589\", \"name\": \"J. Tabarkiewicz\"}], \"abstract\": null}, {\"paperId\": \"068d574fe8fee4a917229f3c80d5af4f5e95e09d\", \"externalIds\": {\"PubMedCentral\": \"8428762\", \"DOI\": \"10.1371/journal.pone.0255470\", \"CorpusId\": 237466942, \"PubMed\": \"34499670\"}, \"title\": \"Improved bacterial leaf blight disease resistance in the major elite Vietnamese rice cultivar TBR225 via editing of the OsSWEET14 promoter\", \"venue\": \"PLoS ONE\", \"year\": 2021, \"citationCount\": 37, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0255470&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8428762, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2126147156\", \"name\": \"P. N. Duy\"}, {\"authorId\": \"2126147383\", \"name\": \"Dai Tran Lan\"}, {\"authorId\": \"2126146994\", \"name\": \"Hang Pham Thu\"}, {\"authorId\": \"2126147764\", \"name\": \"Huong Phung Thi Thu\"}, {\"authorId\": \"1406210892\", \"name\": \"Ha Nguyen Thanh\"}, {\"authorId\": \"2127354652\", \"name\": \"N. P. Pham\"}, {\"authorId\": \"6034344\", \"name\": \"F. Auguy\"}, {\"authorId\": \"2126138169\", \"name\": \"Huong Bui Thi Thu\"}, {\"authorId\": \"2126138665\", \"name\": \"Tran Bao Manh\"}, {\"authorId\": \"6291236\", \"name\": \"S. Cunnac\"}, {\"authorId\": \"6962079\", \"name\": \"Xuan Hoi Pham\"}], \"abstract\": \"TBR225 is one of the most popular commercial rice varieties in Northern Vietnam. However, this variety is highly susceptible to bacterial leaf blight (BLB), a disease caused by Xanthomonas oryzae pv. oryzae (Xoo) which can lead to important yield losses. OsSWEET14 belongs to the SWEET gene family that encodes sugar transporters. Together with other Clade III members, it behaves as a susceptibility (S) gene whose induction by Asian Xoo Transcription-Activator-Like Effectors (TALEs) is absolutely necessary for disease. In this study, we sought to introduce BLB resistance in the TBR225 elite variety. First, two Vietnamese Xoo strains were shown to up-regulate OsSWEET14 upon TBR225 infection. To investigate if this induction is connected with disease susceptibility, nine TBR225 mutant lines with mutations in the AvrXa7, PthXo3 or TalF TALEs DNA target sequences of the OsSWEET14 promoter were obtained using the CRISPR/Cas9 editing system. Genotyping analysis of T0 and T1 individuals showed that mutations were stably inherited. None of the examined agronomic traits of three transgene-free T2 edited lines were significantly different from those of wild-type TBR225. Importantly, one of these T2 lines, harboring the largest homozygous 6-bp deletion, displayed decreased OsSWEET14 expression as well as a significantly reduced susceptibility to a Vietnamese Xoo strains and complete resistance to another one. Our findings indicate that CRISPR/Cas9 editing conferred an improved BLB resistance to a Vietnamese commercial elite rice variety.\"}, {\"paperId\": \"068e55d9963e52d4bd2106b26b753fe5075b940b\", \"externalIds\": {\"DOI\": \"10.1093/neuonc/noac209.893\", \"CorpusId\": 253540579}, \"title\": \"EXTH-95. UNCOVERING THERAPEUTIC VULNERABILITIES IN MISMATCH REPAIR-DEFICIENT GLIOMAS\", \"venue\": \"Neuro-Oncology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/24/Supplement_7/vii231/47020822/noac209.893.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/neuonc/noac209.893?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/neuonc/noac209.893, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46516900\", \"name\": \"Sangita Pal\"}, {\"authorId\": \"36326590\", \"name\": \"A. Boynton\"}, {\"authorId\": \"2167926627\", \"name\": \"Ryan Johnston\"}, {\"authorId\": \"1633550170\", \"name\": \"Naomi Currimjee\"}, {\"authorId\": \"134264554\", \"name\": \"Kenin Qian\"}, {\"authorId\": \"4455563\", \"name\": \"M. Touat\"}, {\"authorId\": \"145714045\", \"name\": \"C. Bellamy\"}, {\"authorId\": \"144676891\", \"name\": \"Patricia Ho\"}, {\"authorId\": \"3198018\", \"name\": \"D. Root\"}, {\"authorId\": \"48766937\", \"name\": \"N. Persky\"}, {\"authorId\": \"2515853\", \"name\": \"A. Goodale\"}, {\"authorId\": \"2276502423\", \"name\": \"Jim Berstler\"}, {\"authorId\": \"2142366002\", \"name\": \"Lisa Miller\"}, {\"authorId\": \"2167946682\", \"name\": \"Alex Guletsky\"}, {\"authorId\": \"1397960892\", \"name\": \"Marta Cort\\u00e9s-Cros\"}, {\"authorId\": \"5627829\", \"name\": \"K. Ligon\"}, {\"authorId\": \"2318365\", \"name\": \"R. Beroukhim\"}, {\"authorId\": \"6546719\", \"name\": \"P. Bandopadhayay\"}], \"abstract\": \"\\n Approximately 25% of recurrent gliomas exhibit hypermutation, which is most often acquired in chemotherapy sensitive gliomas post-treatment with standard of care alkylating agent temozolomide, Intriguingly, nearly all of these recurrent hypermutant tumors harbor deficiencies in mismatch repair (MMR) genes. Unlike other MMR-deficient cancers, hypermutant gliomas do not exhibit detectable microsatellite instability (MSI) at the population level, and do not share similar dependencies. Thus, strategies to therapeutically target MMR-deficient and hypermutant gliomas are urgently needed, and likely to impact many patients. To evaluate vulnerabilities associated with MMR-deficient gliomas, we have generated isogenic MMR-deficient models by systematic ablation of core MMR genes MSH2, MSH6, MLH1, and PMS2, in multiple patient-derived glioma cell lines using a robust all-in-one CRISPR-Cas9 system. We characterized these isogenic MMR-deficient glioma lines in comparison to respective MMR-proficient control line by performing differential gene expression analysis and subsequent gene set enrichment analyses. Our analyses reveal in an unbiased fashion an enrichment of several hallmark gene sets including cell cycle control and DNA repair in the MMR-deficient cell lines. We performed a CRISPR-Cas9 knockout screen in these MMR deficient and hypermutant models and identified candidate genes involved in DNA repair, cell cycle, RNA metabolism and other pathways as preferential dependencies in the MMR-deficient glioma cells. We also screened multiple MMR-deficient isogenic models against the high-throughput drug repurposing (REPO) chemical library and our preliminary results reveal a number of compounds from a variety of drug classes that selectively kill the MMR-deficient glioma cells, indicating that the loss of MMR confers differential dependencies to these small molecule inhibitors. The candidate drugs and genes identified from these high-throughput assays are currently being subjected to further validation, and they possibly will help us identify novel therapeutic strategies or improve existing therapeutic strategies to target recurrent MMR-deficient gliomas.\"}, {\"paperId\": \"068fc7b656b67b8f45c3cc3d628f2626b37dd617\", \"externalIds\": {\"MAG\": \"3035890320\", \"DOI\": \"10.1093/oso/9780198836841.003.0017\", \"CorpusId\": 225922536}, \"title\": \"Selection on Humans in Cities\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/oso/9780198836841.003.0017?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/oso/9780198836841.003.0017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"38600164\", \"name\": \"E. Milot\"}, {\"authorId\": \"4354485\", \"name\": \"S. Stearns\"}], \"abstract\": \"As shown throughout this book, urbanization moulds evolutionary processes in many biological systems. But what are its effects on the species that is itself the cause of this radical habitat modification? At least two major cultural transitions in history have involved urbanization: the transition to agriculture, and the continuing transition to modernity. Humans both endure and create the selective pressures associated with urbanization, a process of niche construction with complex evolutionary consequences. Urbanization modifies extrinsic mortality, nutrition, hygiene, demography, the toxicity of air, our microbiota, social interactions, and other factors known to shape selection on morphological, physiological, immunological, life-history, and behavioural traits. Today more than half of humanity lives in cities and is exposed to this new evolutionary context. This chapter presents the elements needed to understand the evolutionary potential of humans living in cities, focusing on traits affecting health. Urbanization can alter the expression of tradeoffs and the selection on traits in ways that change the prevalence of both infectious and non-communicable diseases. The chapter identifies several challenges for research. These include the difficulty of separating the effects of urbanization per se from those of modernization in general, and the need to better integrate eco-evolutionary feedbacks, culture, and learning into microevolutionary models to understand how urban life modifies selection on health. Finally, the chapter discusses why the application to humans of gene editing technologies, such as CRISPR-Cas9, is likely to interact with natural selection, an issue deserving closer attention from evolutionary biologists.\"}, {\"paperId\": \"069536c736bdc9134005c053004f6f98ea866741\", \"externalIds\": {\"PubMedCentral\": \"8019017\", \"MAG\": \"3043522585\", \"DOI\": \"10.1007/s13238-020-00753-3\", \"CorpusId\": 220507426, \"PubMed\": \"32666500\"}, \"title\": \"POST1/C12ORF49 regulates the SREBP pathway by promoting site-1 protease maturation\", \"venue\": \"Protein & Cell\", \"year\": 2020, \"citationCount\": 41, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s13238-020-00753-3.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8019017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2144570463\", \"name\": \"Jian Xiao\"}, {\"authorId\": \"35386967\", \"name\": \"Y. Xiong\"}, {\"authorId\": \"150196594\", \"name\": \"Liuting Yang\"}, {\"authorId\": \"120465693\", \"name\": \"Ju-Qiong Wang\"}, {\"authorId\": \"122347076\", \"name\": \"Zi-Mu Zhou\"}, {\"authorId\": \"1812352601\", \"name\": \"Le-Wei Dong\"}, {\"authorId\": \"19232828\", \"name\": \"Xiong-Jie Shi\"}, {\"authorId\": \"2142463536\", \"name\": \"Xiaolu Zhao\"}, {\"authorId\": \"48299912\", \"name\": \"Jie Luo\"}, {\"authorId\": \"6097265\", \"name\": \"B. Song\"}], \"abstract\": \"Sterol-regulatory element binding proteins (SREBPs) are the key transcriptional regulators of lipid metabolism. The activation of SREBP requires translocation of the SREBP precursor from the endoplasmic reticulum to the Golgi, where it is sequentially cleaved by site-1 protease (S1P) and site-2 protease and releases a nuclear form to modulate gene expression. To search for new genes regulating cholesterol metabolism, we perform a genome-wide CRISPR/Cas9 knockout screen and find that partner of site-1 protease (POST1), encoded by C12ORF49, is critically involved in the SREBP signaling. Ablation of POST1 decreases the generation of nuclear SREBP and reduces the expression of SREBP target genes. POST1 binds S1P, which is synthesized as an inactive protease (form A) and becomes fully mature via a two-step autocatalytic process involving forms B\\u2019/B and C\\u2019/C. POST1 promotes the generation of the functional S1P-C\\u2019/C from S1P-B\\u2019/B (canonical cleavage) and, notably, from S1P-A directly (non-canonical cleavage) as well. This POST1-mediated S1P activation is also essential for the cleavages of other S1P substrates including ATF6, CREB3 family members and the \\u03b1/\\u03b2-subunit precursor of N-acetylglucosamine-1-phosphotransferase. Together, we demonstrate that POST1 is a cofactor controlling S1P maturation and plays important roles in lipid homeostasis, unfolded protein response, lipoprotein metabolism and lysosome biogenesis.\"}, {\"paperId\": \"0698480519e4f4db8100749a8612849a1ee8368b\", \"externalIds\": {\"PubMedCentral\": \"8861155\", \"DOI\": \"10.1038/s41420-022-00836-6\", \"CorpusId\": 247013307, \"PubMed\": \"35190539\"}, \"title\": \"Correction: Genome-scale CRISPR-Cas9 knockout screening in hepatocellular carcinoma with lenvatinib resistance\", \"venue\": \"Cell Death Discovery\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41420-022-00836-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8861155, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146319242\", \"name\": \"Yonggang Lu\"}, {\"authorId\": \"49851539\", \"name\": \"Haoming Shen\"}, {\"authorId\": \"2158103650\", \"name\": \"Wenjie Huang\"}, {\"authorId\": \"2115301205\", \"name\": \"Shan He\"}, {\"authorId\": \"2107992320\", \"name\": \"Jianlin Chen\"}, {\"authorId\": \"2141083303\", \"name\": \"Di-Si Zhang\"}, {\"authorId\": \"89434153\", \"name\": \"Yongqi Shen\"}, {\"authorId\": \"2108935414\", \"name\": \"Yifan Sun\"}], \"abstract\": null}, {\"paperId\": \"06984fe0b70d5cfc71d443b6111cb280caea7482\", \"externalIds\": {\"CorpusId\": 261972566}, \"title\": \"Disruption of Plasmodium falciparum histidine-rich protein II may affect haem metabolism in the blood stage\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20201213235324/https://assets.researchsquare.com/files/rs-35156/v2/dae5e94c-5be3-42e7-a889-60acd5eee5a8.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2242440532\", \"name\": \"Yingchao Yang\"}], \"abstract\": null}, {\"paperId\": \"069c0b414885a39e64dd9a96404421485afc0553\", \"externalIds\": {\"PubMedCentral\": \"7678085\", \"MAG\": \"3098350592\", \"DOI\": \"10.1186/s13578-020-00496-y\", \"CorpusId\": 227072789, \"PubMed\": \"33292594\"}, \"title\": \"Enhancing the antibacterial activities of sow milk via site-specific knock-in of a lactoferrin gene in pigs using CRISPR/Cas9 technology\", \"venue\": \"Cell & Bioscience\", \"year\": 2020, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://cellandbioscience.biomedcentral.com/track/pdf/10.1186/s13578-020-00496-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7678085, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"32676888\", \"name\": \"Xiaosong Han\"}, {\"authorId\": \"2145974174\", \"name\": \"Yang Gao\"}, {\"authorId\": \"47949558\", \"name\": \"Guang-lei Li\"}, {\"authorId\": \"153369557\", \"name\": \"Youcai Xiong\"}, {\"authorId\": \"15454044\", \"name\": \"Changzhi Zhao\"}, {\"authorId\": \"48564133\", \"name\": \"Jinxue Ruan\"}, {\"authorId\": \"2109266650\", \"name\": \"Yunlong Ma\"}, {\"authorId\": \"48568992\", \"name\": \"Xinyun Li\"}, {\"authorId\": \"2816114\", \"name\": \"Changchun Li\"}, {\"authorId\": \"144113320\", \"name\": \"Shuhong Zhao\"}, {\"authorId\": \"33391089\", \"name\": \"Shengsong Xie\"}], \"abstract\": \"Colostrum quality is a vital factor in mortality and growth performance for piglets. Lactoferrin is an immuno-active milk protein that contributes to the formation of a protective layer above intestinal mucosa, possesses the antibacterial and antiviral activities that are favorable for piglet development. However, there is a notable reduction in lactoferrin in sow milk during lactation after the first few days, which causes many piglets to fail to ingest enough colostrum thereby leading to an increase in piglet mortality. In this study, we successfully constructed genome-edited Large-White pigs with marker-free site-specific knock-in of lactoferrin gene in the 3\\u2032-end of Casein alpha - s1 via CRISPR/Cas9 mediated homologous recombination. Thus, the lactoferrin protein can be expressed in the mammary gland in the control of Casein alpha - s1 promoter. As expected, the lactoferrin protein in genetically\\u00a0modified pigs sustained high expression in both colostrum and milk when compared with wild-type pigs. Moreover, the bacterial plate assay indicated that the milk from genetically\\u00a0modified pigs showed bacteriostatic effects when compared with control pigs. Taken together, our study demonstrated that the milk from genetically\\u00a0modified pigs had antibacterial activity which may reduce the costs of veterinary drug and improve the surviving rate of piglets, which is promising for pig breeding.\"}, {\"paperId\": \"069e8fa3c0b378cd5e253ca042e97366b58dee99\", \"externalIds\": {\"DOI\": \"10.2174/0113816128301465240517065848\", \"CorpusId\": 270149769, \"PubMed\": \"38818919\"}, \"title\": \"CRISPR/Cas9 Technology: A Novel Approach to Obesity Research.\", \"venue\": \"Current pharmaceutical design\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2174/0113816128301465240517065848?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2174/0113816128301465240517065848, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2290390848\", \"name\": \"Zahra Khademi\"}, {\"authorId\": \"2304010363\", \"name\": \"Zahra Mahmoudi\"}, {\"authorId\": \"2244363020\", \"name\": \"Vasily N Sukhorukov\"}, {\"authorId\": \"113169659\", \"name\": \"T. Jamialahmadi\"}, {\"authorId\": \"143820354\", \"name\": \"A. Sahebkar\"}], \"abstract\": \"Gene editing technology, particularly Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)/CRISPR-associated protein 9 (Cas9) has transformed medical research. As a newly developed genome editing technique, CRISPR technology has strongly assisted scientists in enriching their comprehension of the roles of individual genes and their influences on a vast spectrum of human malignancies. Despite considerable progress in elucidating obesity's molecular pathways, current anti-obesity medications fall short in effectiveness. A thorough understanding of the genetic foundations underlying various neurobiological pathways related to obesity, as well as the neuro-molecular mechanisms involved, is crucial for developing effective obesity treatments. Utilizing CRISPR-based technologies enables precise determination of the roles of genes that encode transcription factors or enzymes involved in processes, such as lipogenesis, lipolysis, glucose metabolism, and lipid storage within adipose tissue. This innovative approach allows for the targeted suppression or activation of genes regulating obesity, potentially leading to effective weight management strategies. In this review, we have provided a detailed overview of obesity's molecular genetics, the fundamentals of CRISPR/Cas9 technology, and how this technology contributes to the discovery and therapeutic targeting of new genes associated with obesity.\"}, {\"paperId\": \"06a30200cd7a60bd258beaedc02a8e6b1031b110\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.sabcs22-p6-10-12\", \"CorpusId\": 257323393}, \"title\": \"Abstract P6-10-12: Discovery and Development of Next-Generation Estrogen Receptor Mutant Inhibitors using DNA-Encoded Chemical Library Screening\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.sabcs22-p6-10-12?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.sabcs22-p6-10-12, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"33764542\", \"name\": \"M. Palaniappan\"}, {\"authorId\": \"6209843\", \"name\": \"K. Bohren\"}, {\"authorId\": \"2153953665\", \"name\": \"Yong Wang\"}, {\"authorId\": \"145231815\", \"name\": \"D. Young\"}, {\"authorId\": \"144451600\", \"name\": \"S. Fuqua\"}, {\"authorId\": \"4131824\", \"name\": \"M. Matzuk\"}], \"abstract\": \"\\n Background: Activating somatic ESR1 mutations Y537S and D538G occur more frequently in endocrine therapy-resistant metastatic breast cancer, which is associated with an aggressive phenotype and poor survival in breast cancer patients. These gain of function mutant receptors are constitutively active and allow resistance to first-line endocrine therapies. Therefore, the development of next-generation small molecule drugs targeting mutant estrogen receptor (ER) is an important priority. Here, we searched the small molecule inhibitors for Y537S and D538D ER mutants using DNA-encoded chemical library screening. Methods: Wild type (WT) and mutant ER ligand binding domain (LBD) proteins were expressed in E. coli. The soluble proteins were purified by Ni-NTA chromatography followed by anion exchange and size exclusion chromatography. Homogeneous time-resolved fluorescence (HTRF) and fluorescent polarization (FP) assays were performed in these purified proteins. We employed a DNA-encoded chemical library affinity selection using our in-house collection of 6 billion compounds. Hit compounds were resynthesized and validated in biochemical assays. Finally, we have performed functional studies in CRISPR-Cas9 knock-in of Y537S and D538G mutant MCF-7 breast cancer cells. Results: We have successfully purified microgram amounts of ER\\u03b1 LBD of WT, Y537S, and D538G proteins. To test whether the purified WT and mutant proteins are active, HTRF and FP assays were performed in the presence and absence of estradiol and 4OH tamoxifen. Steroid receptor coactivator 3 (SRC3) peptide binding to the WT ER protein occurred only in the presence of estradiol. However, Y537S and D538G proteins are recruited by the SRC3 peptide in the absence of estradiol, indicating that these mutants are constitutively active and bind to SRC3. Furthermore, an in vitro biochemical FP assay was also established for WT and mutants in the presence of estradiol and 4OH tamoxifen. The screen of our multibillion small molecule collection of DNA-encoded chemical libraries identified several hits in WT and mutant ER. To confirm the selection output, we synthesized off-DNA compounds and validated these in biochemical and cell-based studies. We have identified that the compounds, CDD-1272 and CDD-1274, are active in HTRF and FP assays. Furthermore, these compounds inhibit WT and mutant cell growth in the presence of estradiol. More importantly, CDD-1274 degrades ER mutant and cyclin D1 proteins. In addition, CDD-1274 induced p21 protein expression in WT and mutant cells. Conclusions: We have identified potent novel ER mutant binders by using our DNA-encoded chemical library platform. Our compounds are active in biochemical and ER mutant cell lines, suggesting these molecules are potential chemical probes to explore in in vivo models of breast cancer. Support: NIH/NCI R03 CA259664 and CPRIT RP220524 to MP.\\n Citation Format: Murugesan Palaniappan, Kurt M. Bohren, Yong Wang, Damian W. Young, Suzanne A. Fuqua, Martin M. Matzuk. Discovery and Development of Next-Generation Estrogen Receptor Mutant Inhibitors using DNA-Encoded Chemical Library Screening [abstract]. In: Proceedings of the 2022 San Antonio Breast Cancer Symposium; 2022 Dec 6-10; San Antonio, TX. Philadelphia (PA): AACR; Cancer Res 2023;83(5 Suppl):Abstract nr P6-10-12.\"}, {\"paperId\": \"06a33ec13220829cf5444cae4f1b6f197fd2f588\", \"externalIds\": {\"PubMedCentral\": \"9985853\", \"DOI\": \"10.1186/s13007-023-01003-3\", \"CorpusId\": 257335303, \"PubMed\": \"36871001\"}, \"title\": \"Peat-based hairy root transformation using Rhizobium rhizogenes as a rapid and efficient tool for easily exploring potential genes related to root-knot nematode parasitism and host response\", \"venue\": \"Plant Methods\", \"year\": 2023, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://plantmethods.biomedcentral.com/counter/pdf/10.1186/s13007-023-01003-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9985853, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115462559\", \"name\": \"Xu Zhang\"}, {\"authorId\": \"2129738215\", \"name\": \"Shihui Li\"}, {\"authorId\": \"2153897680\", \"name\": \"Xin Li\"}, {\"authorId\": \"49540955\", \"name\": \"Meng-yuan Song\"}, {\"authorId\": \"145552703\", \"name\": \"Si Ma\"}, {\"authorId\": \"2143401424\", \"name\": \"Yongqiang Tian\"}, {\"authorId\": \"40587706\", \"name\": \"Lihong Gao\"}], \"abstract\": \"Background Root-knot nematodes (RKNs) pose a worldwide threat to agriculture of many crops including cucumber. Genetic transformation (GT) has emerged as a powerful tool for exploration of plant-RKN interactions and genetic improvement of RKN resistance. However, it is usually difficult to achieve a highly efficient and stable GT protocol for most crops due to the complexity of this process. Results Here we firstly applied the hairy root transformation system in exploring root-RKN interactions in cucumber plants and developed a rapid and efficient tool transformation using Rhizobium rhizogenes strain K599. A solid-medium-based hypocotyl-cutting infection (SHI) method, a rockwool-based hypocotyl-cutting infection (RHI) method, and a peat-based cotyledon-node injection (PCI) method was evaluated for their ability to induce transgenic roots in cucumber plants. The PCI method generally outperformed the SHI and RHI methods for stimulating more transgenic roots and evaluating the phenotype of roots during nematode parasitism. Using the PCI method, we generated the CRISPR/Cas9-mediated malate synthase ( MS ) gene (involved in biotic stress responses) knockout plant and the LATERAL ORGAN BOUNDARIES-DOMAIN 16 ( LBD16 , a potential host susceptibility gene for RKN) promoter-driven GUS expressing plant. Knockout of MS in hairy roots resulted in effective resistance against RKNs, while nematode infection induced a strong expression of LBD16 -driven GUS in root galls. This is the first report of a direct link between these genes and RKN performance in cucumber. Conclusion Taken together, the present study demonstrates that the PCI method allows fast, easy and efficient in vivo studies of potential genes related to root-knot nematode parasitism and host response.\"}, {\"paperId\": \"06a46c47cbfd5b64e709929a1eba256f72f28a5e\", \"externalIds\": {\"DOI\": \"10.1093/humrep/deae108.887\", \"CorpusId\": 270999447}, \"title\": \"P-548\\u2003An investigation into the mechanisms of active enhancers regulating the initial lineage differentiation in mammals\", \"venue\": \"Human Reproduction\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/humrep/deae108.887?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/humrep/deae108.887, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"150205151\", \"name\": \"M. Chen\"}], \"abstract\": \"\\n \\n \\n What role do active enhancers play in determining the fate of early embryonic cells? Are there differences in active enhancers between mouse and human blastocysts?\\n \\n \\n \\n Tissue-specific active enhancers in inner cell mass (ICM) and trophoblast (TE) are essential for blastocyst formation, regulating gene expression through interactive loops with promoters.\\n \\n \\n \\n At the two-cell stage of nuclear transfer embryos, the absence of interaction between Zscan4d promoter and distal active enhancer leads to reduced Zscan4d expression, resulting in lower developmental rates. Overexpressing the demethylase Kdm4d alleviates reprogramming-resistant H3K9me3 modification, restoring the structural loop between the Zscan4d promoter and active enhancer and enhancing developmental efficiency. These findings strongly suggest a close association between the formation of regulatory chromatin interactions in early embryonic development and histone modifications. Indicating active enhancers marked with H3K27ac may regulate differentiation gene expression through distal interactions in blastocyst.\\n \\n \\n \\n Analyze variations in histone H3K27ac modification, chromatin accessibility, higher-order structures, and transcriptomes during mouse embryo differentiation from 8-cell stage to ICM and TE formation. Identify tissue-specific active enhancers in ICM and TE, validate their gene expression regulation, explore their role in early differentiation-associated genes in mice. Compare and clarify similarities and differences in enhancer regulation mechanisms during early embryo development in humans and mice.\\n \\n \\n \\n The 8-cell, morula and blastocyst stage embryos were collected from the oviducts and uterus of super-ovulated female ICR mice mated with male mice. The clinical human blastocysts were collected and separated the ICM and TE. Low-input multi-omics sequencing, including Cut-Tag, ATAC-seq, Hi-C, and RNA-seq, was performed on the embryonic samples. After analyzing and identifying active enhancers, tissue-specific ones were selected and validated for their impact on gene expression via CRISPR-Cas9 knockout in embryos.\\n \\n \\n \\n Inhibiting ep300 expression in mouse embryos through siRNA interference reduces blastocyst formation from 90% to approximately 40%. Introducing the small molecule inhibitor A485 at the 8-cell stage, blocking the active center of CBP/p300 enzymes, completely arrests embryos at the morula stage, preventing their development into blastocysts. Emphasizing the crucial role of correctly establishing active enhancers marked by H3K27ac modification in embryonic differentiation.\\n Multi-omics data demonstrates high repeatability and quality. PCA clustering analysis reveals a clear differentiation path in the distribution of H3K27ac-modified histones, chromatin accessibility sites, and the transcriptome from the 8-cell stage to the blastocyst. Differences in H3K27ac histone modification distribution between the ICM and TE indicate the presence of tissue-specific active enhancers in blastocyst.\\n The disparities in H3K27ac modification distribution between blastocyst ICM and TE primarily occur in distal gene regions rather than proximal ones. Moreover, these distal enhancers exhibit a positive correlation with the expression of lineage-specific genes, suggesting a probable regulatory role of distal enhancers in gene modulation during embryonic differentiation.\\n Tissue-specific enhancer-promoter (EP) interaction loops emerge during embryonic differentiation, allowing direct interaction between tissue-specific active enhancers and promoters, thereby activating the expression of tissue-specific genes.\\n \\n \\n \\n While DNA sequences with H3K27ac modification are currently considered markers for active enhancers, H3K4me modification is another histone marker for enhancers. However, enhancers associated with H3K4me modification may not necessarily be in an activated state. Future research can simultaneously incorporate appropriate detection methods for H3K4me modification.\\n \\n \\n \\n After elucidating the mechanisms through which active enhancers regulate mouse differentiation, comparing the differences in active enhancers during the first lineage differentiation process between mice and humans can help identify factors that enhance human blastocyst quality. This can potentially improve clinical outcomes in assisted reproduction.\\n \\n \\n \\n not applicable\\n\"}, {\"paperId\": \"06a648c2ee631aa9dca85baf185f9cafe674e82d\", \"externalIds\": {\"PubMedCentral\": \"9522773\", \"DOI\": \"10.1038/s42003-022-04007-2\", \"CorpusId\": 252600694, \"PubMed\": \"36175480\"}, \"title\": \"Interruption of aberrant chromatin looping is required for regenerating RB1 function and suppressing tumorigenesis\", \"venue\": \"Communications Biology\", \"year\": 2022, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-022-04007-2.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9522773, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6757293\", \"name\": \"Xu-yang Wen\"}, {\"authorId\": \"72104583\", \"name\": \"Tianyi Ding\"}, {\"authorId\": \"2146327326\", \"name\": \"Fang Li\"}, {\"authorId\": \"8183252\", \"name\": \"Jiayan Fan\"}, {\"authorId\": \"1701495\", \"name\": \"Xianqun Fan\"}, {\"authorId\": \"1772223\", \"name\": \"Renbing Jia\"}, {\"authorId\": \"48212903\", \"name\": \"He Zhang\"}], \"abstract\": \"RB transcriptional corepressor 1 (RB1) is a critical regulatory gene in physiological and pathological processes. Genetic mutation is considered to be the main cause of RB1 inactivation. However, accumulating evidence has shown that not all RB1 dysfunction is triggered by gene mutations, and the additional mechanism underlying RB1 dysfunction remains unclear. Here, we firstly reveal that a CCCTC binding factor (CTCF) mediated intrachromosomal looping served as a regulatory inducer to inactivate RB1. Once the core genomic fragment was deleted by Clustered Regularly Interspaced Short Palindromic Repeats/Cas9 (CRISPR/Cas9), this intrachromosomal looping was disrupted. After the open of chromatin, Enhancer of Zeste Homolog 2 (EZH2) was released and decreased the level of Tri-Methyl-Histone H3 Lys27 (H3K27me3) at the RB1 promoter, which substantially restored the expression of RB protein (pRB) and inhibited tumorigenesis. In addition, targeted correction of abnormal RB1 looping using the small-molecule compound GSK503 efficiently restored RB1 transcription and suppressed tumorigenesis. Our study reveals an alternative transcriptional mechanism underlying RB1 dysfunction independent of gene mutation, and advancing the discovery of potential therapeutic chemicals based on aberrant chromatin looping. A CTCF mediated intrachromosomal looping of RB1 promoter and its downstream silencer served as a regulatory inducer to inactivate RB1, revealing a novel transcriptional mechanism underlying RB1 dysfunction independent of gene mutation.\"}, {\"paperId\": \"06a80fe2d45b6f8ad4beec94c2174730918dc0ed\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2023-1662\", \"CorpusId\": 259624146}, \"title\": \"Abstract 1662: Understanding the sensitivity of cancer cells to myristoylation inhibitors for oncology applications\", \"venue\": \"Cancer Research\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2023-1662?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2023-1662, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3796744\", \"name\": \"Erwan Beauchamp\"}, {\"authorId\": \"2222287817\", \"name\": \"Chistopher Cromwell\"}, {\"authorId\": \"2212495439\", \"name\": \"Eman W Moussa\"}, {\"authorId\": \"153083591\", \"name\": \"A. Iyer\"}, {\"authorId\": \"119911957\", \"name\": \"Megan C Yap\"}, {\"authorId\": \"2213601885\", \"name\": \"Rony Pain\"}, {\"authorId\": \"2003557616\", \"name\": \"Jay M Gamma\"}, {\"authorId\": \"2060363870\", \"name\": \"Olivier Julien\"}, {\"authorId\": \"8609802\", \"name\": \"Basil P. Hubbard\"}, {\"authorId\": \"47772918\", \"name\": \"L. Berthiaume\"}], \"abstract\": \"\\n PCLX-001 is a first-in-kind drug that targets a protein modification essential for membrane anchorage and signalling, and has been under human clinical trial evaluation for the treatment of lymphoma and solid malignancies for over a year. In human, over 600 proteoforms are modified with the fatty acid myristate by two N-myristoyltransferases: NMT1 and NMT2. These include many proto-oncogenic proteins (e.g. Src-family kinases and c-Abl) and metabolic regulators (e.g. AMPK \\u03b2 subunit). Thus, we validated the potential of NMTs as oncology targets on 300 cancer cell lines and uncovered its potential in hematological cancers. The multiple substrates of NMTs complicated the elucidation of a clear mechanism of action of the pan-NMT inhibitor PCLX-001. To circumvent this, we evaluated the individual roles of NMT1 and NMT2 in tumours as well as their relative contributions, including those of their substrates, to PCLX-001 sensitivity.\\n Analysis of TCGA and CCLE databases revealed that NMT2 expression levels vary drastically (7 log2(TPM+1)) while those of NMT1 vary slightly (3 log2(TPM+1)). Hematological cancers comprised the vast majority of the lowest NMT2 expressing cells but lower NMT2 levels were also observed in solid tumour cell lines (e.g. breast & ovary). NMT2 levels were also lower in cancer versus normal corresponding tissues. We confirmed that NMT2 expression is epigenetically repressed at a CpG island found in the 5\\u00b4end of the NMT2 gene thereby explaining the reduction in NMT2 expression.\\n Since most hematological cancer cells are NMT2-deficient, we think that by targeting the remaining NMT1, PCLX-001 selectively kills these cells in a manner reminiscent of synthetic lethality, thereby sparing normal human cells with two NMTs. Therefore, identifying substrates specific to NMT1 in NMT2-deficient cancer cells became of the utmost importance to understand which NMT1 protein substrates were critical for survival. Using differential proteomics in the CRISPR/Cas9 NMT1 KO HAP1 near-haploid cell line derived from the chronic myelogenous leukemia versus WT HAP1 cells, we surprisingly found that few signaling proteins were downregulated, rather, 36 mitochondrial protein levels were decreased and 18 of these belonged to respiratory complex I. Myristoylated mitochondrial protein NDUFAF4, a major complex I assembly factor, was the most downregulated and PCLX-001 reduced its levels leading to decreased complex I activity. This seemingly ordinary observation could have transformational implications for cancer treatment since oxidative phosphorylation is essential for both cancer stem cell survival and metastasis.\\n In addition, gene set enrichment analyses performed on RNASeq data obtained from 1200 cell lines treated with myristoylation inhibitors allowed us to derive an NMT inhibition sensitivity gene set that could be used to identify patients which would most benefit from NMT inhibition therapy.\\n Citation Format: Erwan Beauchamp, Chistopher Cromwell, Eman Moussa, Aishwarya Iyer, Megan Yap, Rony Pain, Jay Gamma, Olivier Julien, Basil Hubbard, Luc Berthiaume. Understanding the sensitivity of cancer cells to myristoylation inhibitors for oncology applications [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2023; Part 1 (Regular and Invited Abstracts); 2023 Apr 14-19; Orlando, FL. Philadelphia (PA): AACR; Cancer Res 2023;83(7_Suppl):Abstract nr 1662.\"}, {\"paperId\": \"06a9e6fa573dc2c8800791de2a26540a4e533826\", \"externalIds\": {\"DOI\": \"10.26898/0370-8799-2023-9-12\", \"CorpusId\": 264472967}, \"title\": \"Approaches to genome editing in agricultural animals\", \"venue\": \"Siberian Herald of Agricultural Science\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.26898/0370-8799-2023-9-12\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.26898/0370-8799-2023-9-12?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.26898/0370-8799-2023-9-12, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2258489938\", \"name\": \"I. M. Donnik\"}, {\"authorId\": \"2129789899\", \"name\": \"V. Makutina\"}, {\"authorId\": \"2166271756\", \"name\": \"A. Krivonogova\"}, {\"authorId\": \"2238475566\", \"name\": \"A. G. Isaeva\"}, {\"authorId\": \"2261605895\", \"name\": \"A. V. Deikin\"}, {\"authorId\": \"2261607427\", \"name\": \"A. G. Kostschaev\"}], \"abstract\": \"The results of research into genetic methods of breeding agricultural animals with improved characteristics are presented. By now a significant number of animals with an edited genome have been selected. Methods of genome modification in cattle are constantly improving. The approaches of gene editing of bovine embryos, delivery of edited constructs and improvement of embryo survival after introduction of editing systems have been studied. The studies were performed on cattle embryos. BLG and SD209 gene editing systems were developed and validated. Delivery options of the editing system into cattle cells were studied: microinjection into the zygote of plasmid DNA encoded sequence with CRISPR/Cas9 c sgRNA, the method of viral vectors (adeno-associated AAV viruses, serotypes AAV1, AAV2, AAV6, AAV9, AAVDJ), co-injection of plasmid DNA and sperm into the oocyte at the MII stage, and microinjection of Cas9 and guide RNAs. Different techniques for performing microinjections have been investigated and refined, and different preparation of Cas9 RNA and guide RNA mixtures have been tested. Based on these results, the protocol for performing microinjection of the editing system was optimized and a model experiment was performed on 160 oocytes, with 80 cells per each construction. The findings have shown that the efficiency of editing has generally improved. When injected with guide RNA against BLG gene and spCas9 mRNA, 84% of the surviving cells initiated cleavage, blastulation was 20%, and BLG knockout was 69.2%. When injected against the CD209 gene and spCas9 mRNA, 44.4% of the surviving embryos started cleavage, blastulation was 16.7%, with CD209 knockout at 44.4%. The novelty of the work lies in obtaining data on the development of editing systems with specific target genes, in improving the delivery system and cultivation of bovine embryos.\"}, {\"paperId\": \"06ac693814620620f03786a97ef73d59dd409291\", \"externalIds\": {\"DOI\": \"10.1161/circ.146.suppl_1.13646\", \"CorpusId\": 259484043}, \"title\": \"Abstract 13646: APOL1 Nephropathy Risk Variant Alters Macrophage Metabolism\", \"venue\": \"Circulation\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1161/circ.146.suppl_1.13646?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/circ.146.suppl_1.13646, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112876802\", \"name\": \"Matthew Wright\"}, {\"authorId\": \"2035929072\", \"name\": \"Esther Liu\"}, {\"authorId\": \"46471800\", \"name\": \"Valerie Garcia\"}, {\"authorId\": \"20492186\", \"name\": \"Jennie Lin\"}], \"abstract\": \"The common G1 and G2 variants in the APOL1 gene, specific to patients with African ancestry, increase the risk of developing chronic kidney disease and stroke. These variants also confer a survival benefit against African trypanosomiasis, but the effects of G1 and G2 variants on macrophage function remain unclear despite their role in innate immunity. Crucial to both innate immunity and tissue homeostasis, macrophages can promote cardiometabolic disease if dysregulated. Others have shown that metabolic changes can alter macrophage phenotype and function, and the G1 and G2 variants have been linked to mitochondrial dysfunction in epithelial cells. We therefore hypothesize that APOL1 risk variants promote cardiometabolic disease traits by altering macrophage metabolism and, thus, function. To test our hypothesis, we established CRISPR-Cas9 genome-edited induced pluripotent stem cell (iPSC) lines with the G0/G0 (major allele) genotype and the G1/G1 genotype on isogenic backgrounds. We then differentiated these iPSC lines into macrophage-like cells (iPSDMs) and evaluated their phenotype and function at baseline and under stimulation with 5 - 50 ug/mL interferon-\\u03b3, a potent inducer of APOL1 expression. We measured inflammatory markers via QPCR and ELISA, mitochondrial oxygen flux with the Agilent Seahorse XF Analyzer, and intracellular hydrophilic metabolites via LCMS. We found that G1/G1 iPSDMs express higher levels of pro-inflammatory markers and exhibited lower basal respiration as well as lower ATP production compared to G0/G0 controls. Because APOL1 risk variants have been linked to defective autophagy and ER stress, we treated the G1/G1 iPSDMs with rapamycin (autophagy inducer) or TUDCA (ER stress inhibitor) but found that they did not abrogate these genotype-specific differences in metabolic flux. Upon examination of metabolomics profiles of G1/G1 vs G0/G0 iPSDMs, differentially abundant metabolites were enriched for SMPDB pathways including spermidine biosynthesis (needed for anti-inflammatory reprogramming), gluconeogenesis, Warburg effect, homocysteine degradation, and fatty acid oxidation. Taken together, G1/G1 iPSDMs exhibit metabolic differences that may contribute to their proinflammatory phenotype.\"}, {\"paperId\": \"06adfd8262bf2a6b6a7f4805bd355e654c957734\", \"externalIds\": {\"DOI\": \"10.1101/2022.01.05.475064\", \"CorpusId\": 245787883}, \"title\": \"Mutation in shoot-to-root mobile transcription factor, ELONGATED HYPOCOTYL 5, leads to low nicotine levels in tobacco\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2022/01/05/2022.01.05.475064.full.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.01.05.475064?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.01.05.475064, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112765172\", \"name\": \"Deeksha Singh\"}, {\"authorId\": \"2149026282\", \"name\": \"Shambhavi Dwivedi\"}, {\"authorId\": \"2149249522\", \"name\": \"Hiteshwari Sinha\"}, {\"authorId\": \"2110097926\", \"name\": \"Nivedita Singh\"}, {\"authorId\": \"143814788\", \"name\": \"P. Trivedi\"}], \"abstract\": \"Tobacco remains one of the most commercially important crops due to the parasympathomimetic alkaloid nicotine used in cigarettes. Most genes involved in nicotine biosynthesis are expressed in root tissues; however, their light-dependent regulation has not been studied. We identified the ELONGATED HYPOCOTYL 5 homolog, NtHY5, from Nicotiana tabacum and demonstrated its role in nicotine biosynthesis. We report the development of CRISPR/Cas9-based mutant plants, NtHY5CR, and show down-regulation of the nicotine biosynthetic pathway, whereas NtHY5 overexpression (NtHY5OX) plants show the opposite effect. Grafting experiments using wild type, NtHY5CR, and NtHY5OX indicated that NtHY5 moves from shoot-to-root to regulate nicotine biosynthesis in the root tissue. We conclude that shoot HY5, directly or through enhancing expression of the HY5 in the root, promotes nicotine biosynthesis. The CRISPR/Cas9-based mutants developed, in this study; with low nicotine accumulation in leaves could help people to overcome their nicotine addiction and the risk of death from tobacco use.\"}, {\"paperId\": \"06ae2ac9c7059b4aa5d8723aff63f1cb06786daa\", \"externalIds\": {\"PubMedCentral\": \"11515702\", \"DOI\": \"10.1186/s12934-024-02562-3\", \"CorpusId\": 273530211, \"PubMed\": \"39438921\"}, \"title\": \"Plasmid-free production of the plant lignan pinoresinol in growing Escherichia coli cells\", \"venue\": \"Microbial Cell Factories\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11515702, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2005695996\", \"name\": \"U. J. Luelf\"}, {\"authorId\": \"2327193591\", \"name\": \"Alexander Wassing\"}, {\"authorId\": \"2215644685\", \"name\": \"Lisa M. B\\u00f6hmer\"}, {\"authorId\": \"3851887\", \"name\": \"V. Urlacher\"}], \"abstract\": \"The high-value aryl tetralin lignan (+)-pinoresinol is the main precursor of many plant lignans including (-)-podophyllotoxin, which is used for the synthesis of chemotherapeutics. As (-)-podophyllotoxin is traditionally isolated from endangered and therefore limited natural sources, there is a particular need for biotechnological production. Recently, we developed a reconstituted biosynthetic pathway from (+)-pinoresinol to (-)-deoxypodophyllotoxin, the direct precursor of (-)-podophyllotoxin, in the recombinant host Escherichia coli. However, the use of the expensive substrate (+)-pinoresinol limits its application from the economic viewpoint. In addition, the simultaneous expression of multiple heterologous genes from different plasmids for a multi-enzyme cascade can be challenging and limits large-scale use. In this study, recombinant plasmid-free E. coli strains for the multi-step synthesis of pinoresinol from ferulic acid were constructed. To this end, a simple and versatile plasmid toolbox for CRISPR/Cas9-assisted chromosomal integration has been developed, which allows the easy transfer of genes from the pET vector series into the E. coli chromosome. Two versions of the developed toolbox enable the efficient integration of either one or two genes into intergenic high expression loci in both E. coli K-12 and B strains. After evaluation of this toolbox using the fluorescent reporter mCherry, genes from Petroselinum crispum and Zea mays for the synthesis of the monolignol coniferyl alcohol were integrated into different E. coli strains. The product titers achieved with plasmid-free E. coli W3110(T7) were comparable to those of the plasmid-based expression system. For the subsequent oxidative coupling of coniferyl alcohol to pinoresinol, a laccase from Corynebacterium glutamicum was selected. Testing of different culture media as well as optimization of gene copy number and copper availability for laccase activity resulted in the synthesis of 100 mg/L pinoresinol using growing E. coli cells. For efficient and simple transfer of genes from pET vectors into the E. coli chromosome, an easy-to-handle molecular toolbox was developed and successfully tested on several E. coli strains. By combining heterologous and endogenous enzymes of the host, a plasmid-free recombinant E. coli growing cell system has been established that enables the synthesis of the key lignan pinoresinol.\"}, {\"paperId\": \"06aface5ebacc1b6d45bdaa98c60270db6c6aac1\", \"externalIds\": {\"MAG\": \"3089955606\", \"DOI\": \"10.46678/pb.20.1374640\", \"CorpusId\": 226683698}, \"title\": \"Optimization of multiplexed CRISPR/Cas9 system for highly efficient geme editing in Setaria viridis\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.46678/pb.20.1374640?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.46678/pb.20.1374640, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152570549\", \"name\": \"Trevor Weiss\"}], \"abstract\": null}, {\"paperId\": \"06b09478e7ce8a34f1241b28fe71e4a4925d55c6\", \"externalIds\": {\"PubMedCentral\": \"10721255\", \"DOI\": \"10.1172/jci.insight.172051\", \"CorpusId\": 261886656, \"PubMed\": \"37707951\"}, \"title\": \"Mice lacking \\u03b3ENaC palmitoylation sites maintain benzamil-sensitive Na+ transport despite reduced channel activity\", \"venue\": \"JCI Insight\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://insight.jci.org/articles/view/172051/files/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10721255, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2241418870\", \"name\": \"Andrew J. Nickerson\"}, {\"authorId\": \"143887404\", \"name\": \"Stephanie M. Mutchler\"}, {\"authorId\": \"2811369\", \"name\": \"Shaohu Sheng\"}, {\"authorId\": \"2241389699\", \"name\": \"Natalie A. Cox\"}, {\"authorId\": \"145414678\", \"name\": \"Evan C. Ray\"}, {\"authorId\": \"6528665\", \"name\": \"Ossama B. Kashlan\"}, {\"authorId\": \"7030241\", \"name\": \"M. Carattino\"}, {\"authorId\": \"4241112\", \"name\": \"Allison L. Marciszyn\"}, {\"authorId\": \"2047696658\", \"name\": \"Aaliyah Winfrey\"}, {\"authorId\": \"2241431588\", \"name\": \"Sebastien Gingras\"}, {\"authorId\": \"4506155\", \"name\": \"Annet Kirabo\"}, {\"authorId\": \"32215382\", \"name\": \"R. Hughey\"}, {\"authorId\": \"2164464350\", \"name\": \"Thomas R. Kleyman\"}], \"abstract\": \"Epithelial Na+ channels (ENaCs) control extracellular fluid volume by facilitating Na+ absorption across transporting epithelia. In vitro studies showed that Cys-palmitoylation of the \\u03b3 ENaC subunit is a major regulator of channel activity. We tested whether \\u03b3 subunit palmitoylation sites are necessary for channel function in vivo by generating mice lacking the palmitoylated cysteines (\\u03b3C33A,C41A) using CRISPR-Cas9 technology. ENaCs in dissected kidney tubules from \\u03b3C33A,C41A mice had reduced open probability compared to wild type (WT) littermates maintained on either standard or Na+-deficient diets. Male mutant mice also had higher aldosterone levels than WT littermates following Na+ restriction. However, \\u03b3C33A,C41A mice did not have reduced amiloride-sensitive Na+ currents in the distal colon or benzamil-induced natriuresis compared to WT mice. We identified a second, larger conductance cation channel in the distal nephron with biophysical properties distinct from ENaC. The activity of this channel was higher in Na+-restricted \\u03b3C33A,C41A versus WT mice and was blocked by benzamil, providing a possible compensatory mechanism for reduced prototypic ENaC function. We conclude that \\u03b3 subunit palmitoylation sites are required for prototypic ENaC activity in vivo, but are not necessary for amiloride/benzamil-sensitive Na+ transport in the distal nephron or colon.\"}, {\"paperId\": \"06b0e37996dc341f796ce259db6731d381a6c450\", \"externalIds\": {\"PubMedCentral\": \"9894255\", \"DOI\": \"10.1073/pnas.2204259119\", \"CorpusId\": 247549161, \"PubMed\": \"36459645\"}, \"title\": \"Decorating chromatin for enhanced genome editing using CRISPR-Cas9\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1073/pnas.2204259119\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9894255, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"100937732\", \"name\": \"Evelyn Chen\"}, {\"authorId\": \"1422456828\", \"name\": \"E. Lin-Shiao\"}, {\"authorId\": \"81913416\", \"name\": \"M. Trinidad\"}, {\"authorId\": \"2139940202\", \"name\": \"M. S. Doost\"}, {\"authorId\": \"6974710\", \"name\": \"David Colognori\"}, {\"authorId\": \"4448238\", \"name\": \"J. Doudna\"}], \"abstract\": \"CRISPR-associated (Cas) enzymes have revolutionized biology by enabling RNA-guided genome editing. Homology-directed repair (HDR) in the presence of donor templates is currently the most versatile method to introduce precise edits following CRISPR-Cas-induced double-stranded DNA cuts, but HDR efficiency is generally low relative to end-joining pathways that lead to insertions and deletions (indels). We tested the hypothesis that HDR could be increased using a Cas9 construct fused to PRDM9, a chromatin remodeling factor that deposits histone methylations H3K36me3 and H3K4me3 to mediate homologous recombination in human cells. Our results show that the fusion protein contacts chromatin specifically at the Cas9 cut site in the genome to increase the observed HDR efficiency by three-fold and HDR:indel ratio by five-fold compared to that induced by unmodified Cas9. HDR enhancement occurred in multiple cell lines with no increase in off-target genome editing. These findings underscore the importance of chromatin features for the balance between DNA repair mechanisms during CRISPR-Cas genome editing and provide a new strategy to increase HDR efficiency. Significance Statement CRISPR-Cas-mediated homology-directed repair (HDR) enables precision genome editing for diverse research and clinical applications, but HDR efficiency is often low due to competing end-joining pathways. Here, we describe a simple strategy to influence DNA repair pathway choice and improve HDR efficiency by engineering CRISPR-Cas9-methyltransferase fusion proteins. This strategy highlights the impact of histone modifications on DNA repair following CRISPR-Cas-induced double-stranded breaks and adds to the CRISPR genome editing toolbox.\"}, {\"paperId\": \"06b17006321b87dad4fa1947c451fd1308c381f7\", \"externalIds\": {\"MAG\": \"3028395013\", \"PubMedCentral\": \"7233268\", \"DOI\": \"10.1590/0074-02760190457\", \"CorpusId\": 218759216, \"PubMed\": \"32428081\"}, \"title\": \"Characterising ISWI chromatin remodeler in Trypanosoma cruzi\", \"venue\": \"Mem\\u00f3rias do Instituto Oswaldo Cruz\", \"year\": 2020, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1590/0074-02760190457\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7233268, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1402036676\", \"name\": \"Y. D\\u00edaz-Olmos\"}, {\"authorId\": \"153096817\", \"name\": \"Michel Batista\"}, {\"authorId\": \"47387534\", \"name\": \"A. Ludwig\"}, {\"authorId\": \"47984926\", \"name\": \"F. Marchini\"}], \"abstract\": \"BACKGROUND Imitation SWItch (ISWI) ATPase is the catalytic subunit in diverse chromatin remodeling complexes. These complexes modify histone-DNA interactions and therefore play a pivotal role in different DNA-dependent processes. In Trypanosoma cruzi, a protozoan that controls gene expression principally post-transcriptionally, the transcriptional regulation mechanisms mediated by chromatin remodeling are poorly understood. OBJECTIVE To characterise the ISWI remodeler in T. cruzi (TcISWI). METHODS A new version of pTcGW vectors was constructed to express green fluorescent protein (GFP)-tagged TcISWI. CRISPR-Cas9 system was used to obtain parasites with inactivated TcISWI gene and we determined TcISWI partners by cryomilling-affinity purification-mass spectrometry (MS) assay as an approximation to start to unravel the function of this protein. FINDINGS Our approach identified known ISWI partners [nucleoplasmin-like protein (NLP), regulator of chromosome condensation 1-like protein (RCCP) and phenylalanine/tyrosine-rich protein (FYRP)], previously characterised in T. brucei, and new components in TcISWI complex [DRBD2, DHH1 and proteins containing a domain characteristic of structural maintenance of chromosomes (SMC) proteins]. Data are available via ProteomeXchange with identifier PXD017869. MAIN CONCLUSIONS In addition to its participation in transcriptional silencing, as it was reported in T. brucei, the data generated here provide a framework that suggests a role for TcISWI chromatin remodeler in different nuclear processes in T. cruzi, including mRNA nuclear export control and chromatin compaction. Further work is necessary to clarify the TcISWI functional diversity that arises from this protein interaction study.\"}, {\"paperId\": \"06b29a64980b9ff11b8fbdd352ac446e6850a53a\", \"externalIds\": {\"PubMedCentral\": \"8745660\", \"DOI\": \"10.3390/ijms23010560\", \"CorpusId\": 245854194, \"PubMed\": \"35008989\"}, \"title\": \"Loss of SDHB Induces a Metabolic Switch in the hPheo1 Cell Line toward Enhanced OXPHOS\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2022, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/23/1/560/pdf?version=1641816942\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8745660, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14531570\", \"name\": \"Mouna Tabebi\"}, {\"authorId\": \"2149507961\", \"name\": \"Ravi Kumar Dutta\"}, {\"authorId\": \"40611119\", \"name\": \"C. Skoglund\"}, {\"authorId\": \"4006802\", \"name\": \"P. S\\u00f6derkvist\"}, {\"authorId\": \"4086227\", \"name\": \"O. Gimm\"}], \"abstract\": \"Background: Enzymes of tricarboxylic acid (TCA) have recently been recognized as tumor suppressors. Mutations in the SDHB subunit of succinate dehydrogenase (SDH) cause pheochromocytomas and paragangliomas (PCCs/PGLs) and predispose patients to malignant disease with poor prognosis. Methods: Using the human pheochromocytoma cell line (hPheo1), we knocked down SDHB gene expression using CRISPR-cas9 technology. Results: Microarray gene expression analysis showed that >500 differentially expressed gene targets, about 54%, were upregulated in response to SDHB knock down. Notably, genes involved in glycolysis, hypoxia, cell proliferation, and cell differentiation were up regulated, whereas genes involved in oxidative phosphorylation (OXPHOS) were downregulated. In vitro studies show that hPheo1 proliferation is not affected negatively and the cells that survive by shifting their metabolism to the use of glutamine as an alternative energy source and promote OXPHOS activity. Knock down of SDHB expression results in a significant increase in GLUD1 expression in hPheo1 cells cultured as monolayer or as 3D culture. Analysis of TCGA data confirms the enhancement of GLUD1 in SDHB mutated/low expressed PCCs/PGLs. Conclusions: Our data suggest that the downregulation of SDHB in PCCs/PGLs results in increased GLUD1 expression and may represent a potential biomarker and therapeutic target in SDHB mutated tumors and SDHB loss of activity-dependent diseases.\"}, {\"paperId\": \"06b392edb3e6f3cfb164dfb5dbcad4db1695f917\", \"externalIds\": {\"DOI\": \"10.5812/jai-142988\", \"CorpusId\": 270060107}, \"title\": \"Gene Editing for Unraveling the Regulatory Role of a HER2-Associated Enhancer with lncRNA GAS5 and Related Genes in Breast Cancer Cells\", \"venue\": \"Journal of Advanced Immunopharmacology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://brieflands.com/articles/jai-142988.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.5812/jai-142988?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.5812/jai-142988, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2266009088\", \"name\": \"M. Rojhannezhad\"}, {\"authorId\": \"153919921\", \"name\": \"S. J. Mowla\"}, {\"authorId\": \"2303373425\", \"name\": \"Mahboobeh Rojhannezhad\"}, {\"authorId\": \"2303372518\", \"name\": \"Fatemeh Mirzadeh Azad\"}, {\"authorId\": \"2146118740\", \"name\": \"Zahra Abedi kichi\"}, {\"authorId\": \"39272194\", \"name\": \"M. Arab\"}, {\"authorId\": \"2289879686\", \"name\": \"Bahram Mohamad Soltani\"}], \"abstract\": \"Background: The HER2/neu gene belongs to the epidermal growth factor receptor (EGFR) family and encodes a 185 kDa protein with tyrosine kinase activity. HER2 amplification or overexpression has been associated with tumorigenesis and cancer progression, notably in breast cancer (BC). The long non-coding RNA GAS5 has been recognized as a tumor suppressor in BC, promoting apoptosis and inhibiting cell proliferation. Moreover, GAS5 regulates key signaling pathways in breast cancer, including PI3K/AKT/mTOR and PTEN signaling. The PI3K/AKT pathway is critical in various cancer processes, such as proliferation, apoptosis, invasion, and drug resistance. Breast cancer stem cells (BCSCs) and stemness genes also contribute to tumor growth and therapy resistance. Therefore, targeting key regulatory regions in the HER2 gene could offer potential therapeutic strategies. Objectives: In this study, we aimed to investigate the regulatory role of a putative enhancer located in the HER2 gene in the 17q12 region (GH17J039694; we referred to it as Her2-Enhancer1 in our previous study) on HER2 variants and genes that are connected to it through different pathways. Methods: We analyzed the effects of enhancer knockout on HER2 variants, GAS5, PTEN, and stemness genes in HER2-positive and HER2-negative breast cancer cells using the CRISPR/Cas9 system and real-time PCR. Results: Our results showed significantly reduced HER2 variant expression in both cell lines after genetic editing. Furthermore, the expression of some other target genes was affected, including GAS5, P53, and PTEN. Interestingly, we observed altered expression of stemness genes like NANOG, SOX2, and OCT4, indicating possible implications for cancer stem cell properties. Conclusions: Our study highlights the potential regulatory role of the studied region as an enhancer in the HER2 gene and sheds light on its influence on various cancer-related pathways, providing valuable insights into breast cancer pathogenesis and potential therapeutic targets.\"}, {\"paperId\": \"06b3cdd76042bf7a0373095b64e83aac923961c9\", \"externalIds\": {\"CorpusId\": 267828388}, \"title\": \"Parallel Characterization of cis-Regulatory Elements for Multiple Genes Using 1 CRISPRpath 2 3\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2237227798\", \"name\": \"Xingjie Ren\"}, {\"authorId\": \"3417297\", \"name\": \"Mengchi Wang\"}, {\"authorId\": \"2185835612\", \"name\": \"Bingkun Li\"}, {\"authorId\": \"151352591\", \"name\": \"Kirsty Jamieson\"}, {\"authorId\": \"48026518\", \"name\": \"Lina Zheng\"}, {\"authorId\": \"2248418137\", \"name\": \"R. Ian\"}, {\"authorId\": \"2067707388\", \"name\": \"Jones\"}, {\"authorId\": \"2249093269\", \"name\": \"Bin Li\"}, {\"authorId\": \"1579595517\", \"name\": \"M. Takagi\"}, {\"authorId\": \"2285616296\", \"name\": \"Jerry Lee\"}, {\"authorId\": \"12713012\", \"name\": \"Lenka Maliskova\"}, {\"authorId\": \"151458352\", \"name\": \"Tsz Wai Tam\"}, {\"authorId\": \"152314004\", \"name\": \"Miao Yu\"}, {\"authorId\": \"1410949914\", \"name\": \"Rong Hu\"}, {\"authorId\": \"2275749160\", \"name\": \"Li-Na Lee\"}, {\"authorId\": \"2519894\", \"name\": \"Armen Abnousi\"}, {\"authorId\": \"2155120559\", \"name\": \"Gang Li\"}, {\"authorId\": \"2155851605\", \"name\": \"Yun Li\"}, {\"authorId\": \"144769393\", \"name\": \"Ming Hu\"}, {\"authorId\": \"2237136589\", \"name\": \"Bing Ren\"}, {\"authorId\": \"2251287248\", \"name\": \"Wei\"}, {\"authorId\": \"2251608388\", \"name\": \"Wang\"}, {\"authorId\": \"2261891573\", \"name\": \"Yin Shen\"}], \"abstract\": null}, {\"paperId\": \"06b423bf7b4be3c1c5bbf7f3fb5f1a722e9b2d0c\", \"externalIds\": {\"MAG\": \"3092399283\", \"DOI\": \"10.1136/jmedgenet-2020-107111\", \"CorpusId\": 222351541, \"PubMed\": \"33051312\"}, \"title\": \"Association between ARID2 and RAS-MAPK pathway in intellectual disability and short stature\", \"venue\": \"Journal of Medical Genetics\", \"year\": 2020, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1136/jmedgenet-2020-107111?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1136/jmedgenet-2020-107111, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6139684\", \"name\": \"Eungu Kang\"}, {\"authorId\": \"49594633\", \"name\": \"Min-Ji Kang\"}, {\"authorId\": \"1735061409\", \"name\": \"Younghee Ju\"}, {\"authorId\": \"153310629\", \"name\": \"Sang-Joon Lee\"}, {\"authorId\": \"102290270\", \"name\": \"Yong-Seok Lee\"}, {\"authorId\": \"5764906\", \"name\": \"D. Woo\"}, {\"authorId\": \"1838222\", \"name\": \"Y. Sung\"}, {\"authorId\": \"2574433\", \"name\": \"In-Jeoung Baek\"}, {\"authorId\": \"2060000095\", \"name\": \"Woo Hyun Shim\"}, {\"authorId\": \"143890547\", \"name\": \"W. Son\"}, {\"authorId\": \"153004808\", \"name\": \"I. Choi\"}, {\"authorId\": \"145743312\", \"name\": \"E. Seo\"}, {\"authorId\": \"145022417\", \"name\": \"H. Yoo\"}, {\"authorId\": \"115141247\", \"name\": \"Yong-Mahn Han\"}, {\"authorId\": \"143716376\", \"name\": \"B. Lee\"}], \"abstract\": \"Background ARID2 belongs to the Switch/sucrose non-fermenting complex, in which the genetic defects have been found in patients with dysmorphism, short stature and intellectual disability (ID). As the phenotypes of patients with ARID2 mutations partially overlap with those of RASopathy, this study evaluated the biochemical association between ARID2 and RAS-MAPK pathway. Methods The phenotypes of 22 patients with either an ARID2 heterozygous mutation or haploinsufficiency were reviewed. Comprehensive molecular analyses were performed using somatic and induced pluripotent stem cells (iPSCs) of a patient with ARID2 haploinsufficiency as well as using the mouse model of Arid2 haploinsufficiency by CRISPR/Cas9 gene editing. Results The phenotypic characteristics of ARID2 deficiency include RASopathy, Coffin-Lowy syndrome or Coffin-Siris syndrome or undefined syndromic ID. Transient ARID2 knockout HeLa cells using an shRNA increased ERK1 and ERK2 phosphorylation. Impaired neuronal differentiation with enhanced RAS-MAPK activity was observed in patient-iPSCs. In addition, Arid2 haploinsufficient mice exhibited reduced body size and learning/memory deficit. ARID2 haploinsufficiency was associated with reduced IFITM1 expression, which interacts with caveolin-1 (CAV-1) and inhibits ERK activation. Discussion ARID2 haploinsufficiency is associated with enhanced RAS-MAPK activity, leading to reduced IFITM1 and CAV-1 expression, thereby increasing ERK activity. This altered interaction might lead to abnormal neuronal development and a short stature.\"}, {\"paperId\": \"06b7be07618a9c20f3f2b80ccef72dbc8ab01302\", \"externalIds\": {\"PubMedCentral\": \"8643624\", \"DOI\": \"10.1093/nar/gkab1124\", \"CorpusId\": 244921256, \"PubMed\": \"34850126\"}, \"title\": \"Enzymatic deamination of the epigenetic nucleoside N6-methyladenosine regulates gene expression\", \"venue\": \"Nucleic Acids Research\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/nar/article-pdf/49/21/12048/41503883/gkab1124.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8643624, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12760947\", \"name\": \"Zhuoran Jiang\"}, {\"authorId\": \"2144446583\", \"name\": \"Chao Wang\"}, {\"authorId\": \"1452983502\", \"name\": \"Zi-Xuan Wu\"}, {\"authorId\": \"2023809908\", \"name\": \"Kun Chen\"}, {\"authorId\": \"2423982931\", \"name\": \"Wei Yang\"}, {\"authorId\": \"2072971029\", \"name\": \"Hexiang Deng\"}, {\"authorId\": \"2149062724\", \"name\": \"Heng Song\"}, {\"authorId\": \"40181571\", \"name\": \"Xiang Zhou\"}], \"abstract\": \"Abstract N6-methyladenosine (m6A) modification is the most extensively studied epigenetic modification due to its crucial role in regulating an array of biological processes. Herein, Bsu06560, formerly annotated as an adenine deaminase derived from Bacillus subtilis 168, was recognized as the first enzyme capable of metabolizing the epigenetic nucleoside N6-methyladenosine. A model of Bsu06560 was constructed, and several critical residues were putatively identified via mutational screening. Two mutants, F91L and Q150W, provided a superiorly enhanced conversion ratio of adenosine and N6-methyladenosine. The CRISPR-Cas9 system generated Bsu06560-knockout, F91L, and Q150W mutations from the B. subtilis 168 genome. Transcriptional profiling revealed a higher global gene expression level in BS-F91L and BS-Q150W strains with enhanced N6-methyladenosine deaminase activity. The differentially expressed genes were categorized using GO, COG, KEGG and verified through RT-qPCR. This study assessed the crucial roles of Bsu06560 in regulating adenosine and N6-methyladenosine metabolism, which influence a myriad of biological processes. This is the first systematic research to identify and functionally annotate an enzyme capable of metabolizing N6-methyladenosine and highlight its significant roles in regulation of bacterial metabolism. Besides, this study provides a novel method for controlling gene expression through the mutations of critical residues.\"}, {\"paperId\": \"06bdd131f807d63b487dea730943ff3a2f3f64b3\", \"externalIds\": {\"DOI\": \"10.1016/j.canlet.2024.216616\", \"CorpusId\": 266921427, \"PubMed\": \"38211650\"}, \"title\": \"CD30 protects EBV-positive diffuse large B-cell lymphoma cells against mitochondrial dysfunction through BNIP3-mediated mitophagy.\", \"venue\": \"Cancer Letters\", \"year\": 2024, \"citationCount\": 16, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.canlet.2024.216616?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.canlet.2024.216616, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"119692035\", \"name\": \"Weiting Wang\"}, {\"authorId\": \"2191431862\", \"name\": \"T. Xing\"}, {\"authorId\": \"2250315896\", \"name\": \"Kaixin Du\"}, {\"authorId\": \"2278907796\", \"name\": \"W. Hua\"}, {\"authorId\": \"2231055358\", \"name\": \"Jin-Ran Guo\"}, {\"authorId\": \"2214630720\", \"name\": \"Zihui Duan\"}, {\"authorId\": \"2231998199\", \"name\": \"Yi-fan Wu\"}, {\"authorId\": \"4345119\", \"name\": \"Jia-zhu Wu\"}, {\"authorId\": \"2144462054\", \"name\": \"Yue Li\"}, {\"authorId\": \"2087123921\", \"name\": \"H. Yin\"}, {\"authorId\": \"2110771121\", \"name\": \"Hao Shen\"}, {\"authorId\": \"2007567075\", \"name\": \"Li Wang\"}, {\"authorId\": \"2240323605\", \"name\": \"Jian-Yong Li\"}, {\"authorId\": \"49174635\", \"name\": \"Jin-Hua Liang\"}, {\"authorId\": \"2252201615\", \"name\": \"Wei Xu\"}], \"abstract\": \"Epstein-Barr virus (EBV) positive diffuse large B-cell lymphoma (EBV+ DLBCL) predicts poor prognosis and CD30 expression aggravates the worse consequences. Here, we reported that CD30 positivity was an independent prognostic indicator in EBV+ DLBCL patients in a retrospective cohort study. We harnessed CRISPR/Cas9 editing to engineer the first loss-of-function models of CD30 deficiency to identify that CD30 was critical for EBV+ DLBCL growth and survival. We established a pathway that EBV infection mediated CD30 expression through EBV-encoded latent membrane protein 1 (LMP1), which involved NF-\\u03baB signaling. CRISPR CD30 knockout significantly repressed BCL2 interacting protein 3 (BNIP3) expression and co-IP assay indicated a binding between CD30 and BNIP3. Moreover, silencing of CD30 induced mitochondrial dysfunction and suppressed mitophagy, resulting in the accumulation of damaged mitochondria by depressing BNIP3 expression. Additionally, CRISPR BNIP3 knockout caused proliferation defects and increased sensitivity to apoptosis. All the findings reveal a strong relationship between mitophagy and adverse prognosis of EBV+ DLBCL and discover a new regulatory mechanism of BNIP3-mediated mitophagy, which may help develop effective treatment regimens with anti-CD30 antibody brentuximab vedotin to improve the prognosis of CD30+ EBV+ DLBCL patients.\"}, {\"paperId\": \"06bdd7d28c80e0dd04b32a3ded810fec4708953e\", \"externalIds\": {\"CorpusId\": 235827350}, \"title\": \"1 CRISPR/Cas9 modified An. gambiae carrying kdr mutation L1014F functionally validate its contribution 2 in insecticide resistance and interaction with metabolic enzymes. 3 4 Functional validation of knockdown resistance (kdr) in malaria mosquitoes\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://www.biorxiv.org/content/10.1101/2021.04.20.440595v1.full.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47644515\", \"name\": \"Linda Grigoraki\"}, {\"authorId\": \"2086709081\", \"name\": \"R. Cowlishaw\"}, {\"authorId\": \"46711929\", \"name\": \"T. Nolan\"}, {\"authorId\": \"3054369\", \"name\": \"M. Donnelly\"}, {\"authorId\": \"5230389\", \"name\": \"G. Lycett\"}, {\"authorId\": \"3941422\", \"name\": \"H. Ranson\"}], \"abstract\": null}, {\"paperId\": \"06be45669fba0811d84e8bff9bab9a23945937df\", \"externalIds\": {\"DOI\": \"10.1101/2024.02.09.579704\", \"CorpusId\": 267682535}, \"title\": \"DYRKP kinase regulates cell wall degradation in Chlamydomonas by inducing matrix metalloproteinase expression\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/02/14/2024.02.09.579704.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.02.09.579704?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.02.09.579704, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2284261177\", \"name\": \"Minjae Kim\"}, {\"authorId\": \"2205231687\", \"name\": \"Gabriel Lemes Jorge\"}, {\"authorId\": \"2113464408\", \"name\": \"Moritz Aschern\"}, {\"authorId\": \"3632143\", \"name\": \"S. Cuin\\u00e9\"}, {\"authorId\": \"2268323673\", \"name\": \"Marie Bertrand\"}, {\"authorId\": \"2284226999\", \"name\": \"Malika Mekhalfi\"}, {\"authorId\": \"2190084546\", \"name\": \"Jae-Seong Yang\"}, {\"authorId\": \"2237780985\", \"name\": \"Jay J. Thelen\"}, {\"authorId\": \"2262033131\", \"name\": \"Fr\\u00e9d\\u00e9ric Beisson\"}, {\"authorId\": \"2240065491\", \"name\": \"Gilles Peltier\"}, {\"authorId\": \"1398020240\", \"name\": \"Y. Li-Beisson\"}], \"abstract\": null}, {\"paperId\": \"06bf571649c5cf5d39cb2c60c1f49b0cc35039bd\", \"externalIds\": {\"PubMedCentral\": \"8525362\", \"DOI\": \"10.3389/fgeed.2020.606281\", \"CorpusId\": 231149479, \"PubMed\": \"34713231\"}, \"title\": \"CRISPR-Based Genetic Manipulation of Candida Species: Historical Perspectives and Current Approaches\", \"venue\": \"Frontiers in Genome Editing\", \"year\": 2021, \"citationCount\": 38, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgeed.2020.606281/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8525362, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"52143264\", \"name\": \"Deeva Uthayakumar\"}, {\"authorId\": \"80824040\", \"name\": \"Jehoshua Sharma\"}, {\"authorId\": \"87403934\", \"name\": \"L. Wensing\"}, {\"authorId\": \"40225867\", \"name\": \"Rebecca S. Shapiro\"}], \"abstract\": \"The Candida genus encompasses a diverse group of ascomycete fungi that have captured the attention of the scientific community, due to both their role in pathogenesis and emerging applications in biotechnology; the development of gene editing tools such as CRISPR, to analyze fungal genetics and perform functional genomic studies in these organisms, is essential to fully understand and exploit this genus, to further advance antifungal drug discovery and industrial value. However, genetic manipulation of Candida species has been met with several distinctive barriers to progress, such as unconventional codon usage in some species, as well as the absence of a complete sexual cycle in its diploid members. Despite these challenges, the last few decades have witnessed an expansion of the Candida genetic toolbox, allowing for diverse genome editing applications that range from introducing a single point mutation to generating large-scale mutant libraries for functional genomic studies. Clustered regularly interspaced short palindromic repeats (CRISPR)-Cas9 technology is among the most recent of these advancements, bringing unparalleled versatility and precision to genetic manipulation of Candida species. Since its initial applications in Candida albicans, CRISPR-Cas9 platforms are rapidly evolving to permit efficient gene editing in other members of the genus. The technology has proven useful in elucidating the pathogenesis and host-pathogen interactions of medically relevant Candida species, and has led to novel insights on antifungal drug susceptibility and resistance, as well as innovative treatment strategies. CRISPR-Cas9 tools have also been exploited to uncover potential applications of Candida species in industrial contexts. This review is intended to provide a historical overview of genetic approaches used to study the Candida genus and to discuss the state of the art of CRISPR-based genetic manipulation of Candida species, highlighting its contributions to deciphering the biology of this genus, as well as providing perspectives for the future of Candida genetics.\"}, {\"paperId\": \"06c44f683126774c44607073a87467627702bb02\", \"externalIds\": {\"MAG\": \"3043259860\", \"CorpusId\": 226715082}, \"title\": \"A CASE STUDY ON GENE EDITED MONKEYS CLONED IN CHINA\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2118343517\", \"name\": \"Soumya Gupta\"}], \"abstract\": null}, {\"paperId\": \"06c4df002a0add64c3c154d6a6e388ba0fb16d83\", \"externalIds\": {\"DOI\": \"10.1016/j.fertnstert.2024.07.215\", \"CorpusId\": 273545725}, \"title\": \"DEFICIENCY OF DNA REPAIR IN HUMAN PREIMPLANTATION EMBRYOS REVEALED BY CRISPR-Cas9: IMPLICATIONS GENOME STABILITY, IN VITRO EMBRYO CULTURE, AND THE EFFICACY OF CLINICAL GENE EDITING\", \"venue\": \"Fertility and Sterility\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.fertnstert.2024.07.215?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.fertnstert.2024.07.215, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2325959131\", \"name\": \"Dagan Wells\"}, {\"authorId\": \"2324542897\", \"name\": \"Marga Esbert\"}, {\"authorId\": \"2327246852\", \"name\": \"Munuse C. Savash Ishanzadeh\"}, {\"authorId\": \"144820020\", \"name\": \"S. Titus\"}, {\"authorId\": \"2342541302\", \"name\": \"J. Fagan\"}, {\"authorId\": \"2397548247\", \"name\": \"A. Ali\"}, {\"authorId\": \"2386185176\", \"name\": \"Richard T. Scott\"}, {\"authorId\": \"2327283149\", \"name\": \"Nada Kubikova\"}], \"abstract\": null}, {\"paperId\": \"06c59c63d212326ee7e5ce6f779db00e60740926\", \"externalIds\": {\"PubMedCentral\": \"8776998\", \"DOI\": \"10.1016/j.jcmgh.2021.10.011\", \"CorpusId\": 242047741, \"PubMed\": \"34740617\"}, \"title\": \"A Promising Genetic Target for a Deadly Disease: Single Immunoglobulin Interleukin 1 (SIGIRR) Mutations in Necrotizing Enterocolitis\", \"venue\": \"Cellular and Molecular Gastroenterology and Hepatology\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.jcmgh.2021.10.011\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8776998, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2060970140\", \"name\": \"M. Good\"}, {\"authorId\": \"2108792308\", \"name\": \"Cami Martin\"}], \"abstract\": \"ecrotizing enterocolitis (NEC) is a deadly disease Nthat primarily affects premature infants, but the precise etiology is not well understood. Premature infants are predisposed to NEC because of their immature intestinal epithelium and host defenses, as well as bacterial dysbiosis that precedes disease onset. Data from mouse models suggest that NEC arises from activation of the innate immune receptor, Toll-like receptor 4 (TLR4), by its ligand lipopolysaccharide derived from gram-negative bacteria in abundance after dysbiosis occurs. Several recent lines of investigation into the underlying causes of NEC have focused on identifying genetic predispositions to the disease. A promising genetic target includes a negative regulator of TLR4 signaling, called single immunoglobulin interleukin 1 (SIGIRR), mutations of which have been identified previously in infants with NEC. How mutations in SIGIRR affect the development of NEC has remained undefined. In this issue of Cellular and Molecular Gastroenterology and Hepatology, Yu et al explore how SIGIRR mutations contribute to NEC pathogenesis and induce TLR hyperresponsiveness in the postnatal intestine. Toward this end, Yu et al generated a transgenic mouse line with clustered regularly interspaced short palindromic repeats (CRISPR)/ CRISPR-associated protein 9 (Cas9) encoding a novel SIGIRR mutation (p. Y168X) that was discovered in an infant who died from a severe form of NEC. Interestingly, the SIGIRR mice showed exaggerated inflammation within the intestine along with nuclear factor-kB activation, a hallmark of TLR4 signaling. In further mechanistic studies, using RNA interference, SIGIRR was knocked down in human intestinal epithelial cells, which led to the decreased expression of small noncoding RNAs called microRNAs, specifically, microRNA146a and microRNA155, which have been shown previously to be anti-inflammatory. In seeking to determine the signaling pathways mediating this effect, Yu et al further showed that the phosphorylation of signal transducer and activator of transcription 3 (STAT3) was reduced in the SIGIRR-knockdown human intestinal epithelial cells. Yu et al also showed that STAT3 could bind directly to the promoters of the microRNAs and activate expression in a manner dependent on SIGIRR. These results suggest that SIGIRR can regulate the expression of microRNAs in intestinal epithelial cells in association with the phosphorylation of STAT3, uncovering a novel signaling pathway involved in the neonatal intestine. Through immunoprecipitation, SIGIRR overexpression, and the use of an interleukin Receptor Associated Kinase (IRAK) inhibitor, they were able to\"}, {\"paperId\": \"06c70de964a87f16344a31fc88b5d8b2d39d8f7d\", \"externalIds\": {\"PubMedCentral\": \"7906300\", \"DOI\": \"10.1371/journal.pone.0247659\", \"CorpusId\": 232058348, \"PubMed\": \"33630907\"}, \"title\": \"Pulsed-electromagnetic-field induced osteoblast differentiation requires activation of genes downstream of adenosine receptors A2A and A3\", \"venue\": \"PLoS ONE\", \"year\": 2021, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0247659&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7906300, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34955869\", \"name\": \"Niladri S. Kar\"}, {\"authorId\": \"48742128\", \"name\": \"D. Ferguson\"}, {\"authorId\": \"9919574\", \"name\": \"Nianli Zhang\"}, {\"authorId\": \"5824531\", \"name\": \"Erik I. Waldorff\"}, {\"authorId\": \"6411416\", \"name\": \"J. Ryaby\"}, {\"authorId\": \"2245351\", \"name\": \"J. DiDonato\"}], \"abstract\": \"Pulsed-electromagnetic-field (PEMF) treatment was found to enhance cellular differentiation of the mouse preosteoblast, MC3T3-E1, to a more osteoblastic phenotype. Differentiation genes such as Alp, BSPI, cFos, Ibsp, Osteocalcin, Pthr1 and Runx2 showed increased expression in response to PEMF stimulation. Detailed molecular mechanisms linking PEMF to the activation of these genes are limited. Two adenosine receptors known to be modulated in response to PEMF, Adora2A and Adora3, were functionally impaired by CRISPR-Cas9-mediated gene disruption, and the consequences of which were studied in the context of PEMF-mediated osteoblastic differentiation. Disruption of Adora2A resulted in a delay of Alp mRNA expression, but not alkaline phosphatase protein expression, which was similar to that found in wild type cells. However, Adora3 disruption resulted in significantly reduced responses at both the alkaline phosphatase mRNA and protein levels throughout the PEMF stimulation period. Defects observed in response to PEMF were mirrored using a chemically defined growth and differentiation-inducing media (DM). Moreover, in cells with Adora2A disruption, gene expression profiles showed a blunted response in cFos and Pthr1 to PEMF treatment; whereas cells with Adora3 disruption had mostly blunted responses in AlpI, BSPI, Ibsp, Osteocalcin and Sp7 gene activation. To demonstrate specificity for Adora3 function, the Adora3 open reading frame was inserted into the ROSA26 locus in Adora3 disrupted cells culminating in rescued PEMF responsiveness and thereby eliminating the possibility of off-target effects. These results lead us to propose that there are complementary and parallel positive roles for adenosine receptor A2A and A3 in PEMF-mediated osteoblast differentiation.\"}, {\"paperId\": \"06c783e1f56aab9a555a7b04d72352414c311601\", \"externalIds\": {\"PubMedCentral\": \"10140181\", \"DOI\": \"10.1016/j.jbc.2023.104607\", \"CorpusId\": 257561086, \"PubMed\": \"36924944\"}, \"title\": \"Glycolipid transfer protein knockout disrupts vesicle trafficking to the plasma membrane\", \"venue\": \"Journal of Biological Chemistry\", \"year\": 2023, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jbc.org/article/S0021925823002491/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10140181, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12049197\", \"name\": \"Henrik Nurmi\"}, {\"authorId\": \"2071323022\", \"name\": \"Anders P E Backman\"}, {\"authorId\": \"13351550\", \"name\": \"Josefin Halin\"}, {\"authorId\": \"4856751\", \"name\": \"Max L\\u00f6nnfors\"}, {\"authorId\": \"5065135\", \"name\": \"Tomas Blom\"}, {\"authorId\": \"1399171508\", \"name\": \"Pia Roos-Mattjus\"}, {\"authorId\": \"5825353\", \"name\": \"P. Mattjus\"}], \"abstract\": \"The glycolipid transfer protein (GLTP) has been linked to many cellular processes aside from its best-known in vitro function as a lipid transport protein. It has been proposed to act as a sensor and regulator of glycosphingolipid homeostasis in cells. Furthermore, through its previously determined interaction with the endoplasmic reticulum membrane protein VAP-A (vesicle-associated membrane protein-associated protein A), GLTP may also be involved in facilitating vesicular transport in cells. In this study, we characterized the phenotype of CRISPR/Cas9-mediated GLTP KO HeLa cells. We showed that motility, three-dimensional growth, and cellular metabolism were all altered by GLTP knockout. Expression of a GLTP mutant incapable of binding VAP disrupted cell spheroid formation, indicating that the GLTP\\u2013VAP interaction is linked to cellular adhesion, cohesion, and three-dimensional growth. Most notably, we found evidence that GLTP, through its interaction with VAP-A, affects vesicular trafficking, marking the first cellular process discovered to be directly impacted by a change in GLTP expression.\"}, {\"paperId\": \"06c78aabe5c3f5e203b5b5ab87145643011f1a5e\", \"externalIds\": {\"DOI\": \"10.1016/j.plantsci.2022.111417\", \"CorpusId\": 251561440, \"PubMed\": \"35973580\"}, \"title\": \"Tomato SlYTH1 encoding a putative RNA m6A reader affects plant growth and fruit shape.\", \"venue\": \"Plant Science\", \"year\": 2022, \"citationCount\": 35, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.plantsci.2022.111417?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.plantsci.2022.111417, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1481113527\", \"name\": \"Shuangqin Yin\"}, {\"authorId\": \"2106752193\", \"name\": \"Qiujing Ao\"}, {\"authorId\": \"2181470305\", \"name\": \"Tiaoshuang Qiu\"}, {\"authorId\": \"2111712310\", \"name\": \"Caiyun Tan\"}, {\"authorId\": \"144656798\", \"name\": \"Yun Tu\"}, {\"authorId\": \"2181488483\", \"name\": \"Tianyin Kuang\"}, {\"authorId\": \"14646374\", \"name\": \"Yingwu Yang\"}], \"abstract\": \"N6-methyladenosine (m6A), the most abundant and common modification on eukaryotic mRNA, plays crucial roles in multiple biological processes through controlling endogenous gene activity in organisms. The m6A reader specifically recognizes the m6A mark to mediate the regulation of m6A on mRNA, and determines the fate of its target mRNA. In plants, the currently confirmed m6A readers are YTH (YT521B homology) domain-containing proteins. We previously reported that tomato contains 9 YTH genes, of which SlYTH1 has the strongest expression. The present study reports the functional characterization of SlYTH1 in tomato. SlYTH1 mutants generated via CRISPR/Cas9 technology exhibited pleiotropic phenotypes, including low seed germination rate, shortened seedling root, retarded plant growth and development during vegetative development, and elongated and longitudinally flattened fruit with reduced the locule number. SlYTH1 knockout reduced GA3 content and downregulated the expression of related genes in gibberellin biosynthesis pathway. Moreover, exogenous GA3 application could partially restore the phenotypic defects caused by SlYTH1 mutations. SlYTH1 knockout could alleviate the inhibition of seedling root elongation by exogenous GA3 application at relatively low concentration. These facts indicated SlYTH1 is involved in regulating gibberellin biosynthesis and plays important roles in multiple physiological processes in tomato.\"}, {\"paperId\": \"06cd098833a54832a9c257222b9a03f6f2672268\", \"externalIds\": {\"DOI\": \"10.1186/s13046-020-01814-5\", \"CorpusId\": 255986960}, \"title\": \"CDK13 upregulation-induced formation of the positive feedback loop among circCDK13, miR-212-5p/miR-449a and E2F5 contributes to prostate carcinogenesis\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/track/pdf/10.1186/s13046-020-01814-5\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s13046-020-01814-5?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s13046-020-01814-5, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14680348\", \"name\": \"Jinchun Qi\"}, {\"authorId\": \"50109350\", \"name\": \"Zhan-Yu Yang\"}, {\"authorId\": \"2109641259\", \"name\": \"Tao Lin\"}, {\"authorId\": \"2109704014\", \"name\": \"Long Ma\"}, {\"authorId\": \"2107917179\", \"name\": \"Ya-xuan Wang\"}, {\"authorId\": \"2144289194\", \"name\": \"Yong Zhang\"}, {\"authorId\": \"123965176\", \"name\": \"Chun-Cheng Gao\"}, {\"authorId\": \"48087711\", \"name\": \"Kai-Long Liu\"}, {\"authorId\": \"89995204\", \"name\": \"Wei Li\"}, {\"authorId\": \"2054417697\", \"name\": \"A. Zhao\"}, {\"authorId\": \"2075335156\", \"name\": \"Bei Shi\"}, {\"authorId\": \"2146244191\", \"name\": \"Hong Zhang\"}, {\"authorId\": \"2155682114\", \"name\": \"Dan-Dan Wang\"}, {\"authorId\": \"2145746131\", \"name\": \"Xiao-Lu Wang\"}, {\"authorId\": \"7011377\", \"name\": \"J. Wen\"}, {\"authorId\": \"49715616\", \"name\": \"Changbao Qu\"}], \"abstract\": \"Both E2F transcription factor and cyclin-dependent kinases (CDKs), which increase or decrease E2F activity by phosphorylating E2F or its partner, are involved in the control of cell proliferation, and some circRNAs and miRNAs regulate the expression of E2F and CDKs. However, little is known about whether dysregulation among E2Fs, CDKs, circRNAs and miRNAs occurs in human PCa. The expression levels of CDK13 in PCa tissues and different cell lines were determined by quantitative real-time PCR and Western blot analysis. In vitro and in vivo assays were preformed to explore the biological effects of CDK13 in PCa cells. Co-immunoprecipitation anlysis coupled with mass spectrometry was used to identify E2F5 interaction with CDK13. A CRISPR-Cas9 complex was used to activate endogenous CDK13 and circCDK13 expression. Furthermore, the mechanism of circCDK13 was investigated by using loss-of-function and gain-of-function assays in vitro and in vivo. Here we show that CDK13 is significantly upregulated in human PCa tissues. CDK13 depletion and overexpression in PCa cells decrease and increase, respectively, cell proliferation, and the pro-proliferation effect of CDK13 is strengthened by its interaction with E2F5. Mechanistically, transcriptional activation of endogenous CDK13, but not the forced expression of CDK13 by its expression vector, remarkably promotes E2F5 protein expression by facilitating circCDK13 formation. Further, the upregulation of E2F5 enhances CDK13 transcription and promotes circCDK13 biogenesis, which in turn sponges miR-212-5p/449a and thus relieves their repression of the E2F5 expression, subsequently leading to the upregulation of E2F5 expression and PCa cell proliferation. These findings suggest that CDK13 upregulation-induced formation of the positive feedback loop among circCDK13, miR-212-5p/miR-449a and E2F5 is responsible for PCa development. Targeting this newly identified regulatory axis may provide therapeutic benefit against PCa progression and drug resistance.\"}, {\"paperId\": \"06cf0fdaa95c221268987561adda03d478a39f12\", \"externalIds\": {\"DOI\": \"10.1093/jas/skae234.577\", \"CorpusId\": 272668513}, \"title\": \"PSIII-8 CRISPR editing of IGF2 and MSTN to enhance productivity\", \"venue\": \"Journal of Animal Science\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/jas/skae234.577?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/jas/skae234.577, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2321267471\", \"name\": \"Rebecca H Finchum\"}, {\"authorId\": \"2587760\", \"name\": \"A. Dilger\"}, {\"authorId\": \"2289745630\", \"name\": \"Jonathan E Beever\"}], \"abstract\": \"\\n The ability to modify the genomes of livestock species has previously been limited by low efficiency and the high cost associated with reagents and the generation of edited live animals (e.g., via somatic cell nuclear transfer). However, the CRISPR/Cas9 system has shown promise by improving specificity and efficacy, while decreasing costs associated with reagent acquisition and potentially live animal production (e.g., via direct editing of embryos). Given these potential improvements there are still a limited number of well-characterized genes for targeting. Nonetheless, there are two genes where molecular variation in different species has shown highly significant effects on increased lean growth and reduced adiposity, insulin-like growth factor 2 (IGF2) and myostatin (MSTN). In pigs, a G-to-A substitution in intron 3 of IGF2 (g.3072G >A) disrupts a conserved binding site for the transcriptional repressor ZBED6 allowing for increased postnatal IGF2 expression. This increased expression is associated with increased lean muscle yield and intramuscular fat deposition, while decreasing backfat. In livestock species other than the pig, numerous loss-of-function mutations in MSTN have been reported. MSTN is a known early regulator of myoblast differentiation, negatively regulating myoblast fusion into myotubes. This results in muscle hyperplasia causing the commonly referred to \\u201cdouble-muscling\\u201d phenotype. Animals of this phenotype have significantly increased skeletal muscle mass, improved feed conversion, and decreased fat deposition. These mutations have the potential to act synergistically as demonstrated by generation of a mouse line possessing both IGF2 overexpression and MSTN loss-of-function mutations. Within this line, wild-type (WT) mice have an average body weight (BW) of 19.64 \\u00b1 1.89 g at 11 wk of age. In comparison, IGF2 overexpression, MSTN loss-of-function, and the combination of both mutations have average BW of 23.54 \\u00b1 2.31 g, 26.14 \\u00b1 2.35 g, and 31.43 \\u00b1 2.39 g, respectively (P < 0.0001). Based on these results in mice we have initiated editing of both genes in cattle. Two male fetal fibroblast cell lines were generated from d 75 fetuses from high genetic merit Angus matings. Four CRISPR guide RNAs have been designed for both genes and assayed for their in vitro cleavage efficiencies. All guide RNAs exceeded 60% cleavage efficiency. CRISPR/Cas9 ribonuclear protein complexes were electroporated into each cell line. Targeted modifications will be confirmed through sequencing, and successfully modified cell lines will undergo somatic cell nuclear transfer to produce live animals.\"}, {\"paperId\": \"06cff3089714bfc5f9f8d7c946438f69a4626877\", \"externalIds\": {\"MAG\": \"3010885360\", \"PubMedCentral\": \"7251005\", \"DOI\": \"10.1007/s13238-020-00702-0\", \"CorpusId\": 212940483, \"PubMed\": \"32193872\"}, \"title\": \"Rapid construction of a whole-genome mutant library by combining haploid stem cells and inducible self-inactivating PiggyBac transposon\", \"venue\": \"Protein & Cell\", \"year\": 2020, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s13238-020-00702-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7251005, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"153273592\", \"name\": \"Junjie Mao\"}, {\"authorId\": \"47831810\", \"name\": \"Kai Xu\"}, {\"authorId\": \"72655076\", \"name\": \"Jiabao Han\"}, {\"authorId\": \"37707500\", \"name\": \"Guihai Feng\"}, {\"authorId\": \"46868312\", \"name\": \"Ying Zhang\"}, {\"authorId\": \"47112845\", \"name\": \"Wei Li\"}], \"abstract\": \"Genome-scale screening is a powerful method used to explore phenotypes that are of interest, and numerous screening systems have been built for functional sites identification. Classical genetic screening in eukaryotes has been performed using chemical mutagens (Chen et al., 2000), transposon mediated gene trapping (Dupuy et al., 2005), and CRISPR-Cas9 system (Wang et al., 2014). These have helped us to decipher many biological processes. Although numerous screening methods have been developed presently (Schneeberger, 2014), most of them are time consuming and expensive for library designing, preparing, and screening. In addition, classical screening systems reveal target genes with high false positive rates because it is very difficult to ensure that only one target is disrupted in a single cell. These disadvantages, which commonly exist in typical genome-wide screening, hinder the widespread application of forward genetic screening. In previous reports, PiggyBac (PB) transposon was performed for insertional mutagenesis in mammals (Wang et al., 2009). Recently, a report has been developed about \\u201cSlingshot\\u201d screening method, a self-inactivating PB transposon system for tamoxifen inducible insertional mutagenesis (Kong et al., 2010). While Slingshot screening system has been used for gain-of-function, loss-of-function, and genome-wide screens, it is difficult to ensure only one insertional mutagenesis in one cell because of the multi-copy Slingshot vector entry. Here, we have developed a new screening system named \\u201cOne-Shot\\u201d which is based on Slingshot method and haploid embryonic stem cells (haESCs) (Li et al., 2012). In \\u201cOne-Shot\\u201d screening system, we integrated PiggyBac based gene trapping cassette into mRosa26 locus via CRISPR-Cas9 assisted homologous recombination in mouse haESCs, and we ensured no random insertion with thymidine kinase (TK) negative selection (Fig. 1A). By design, correctly integrated clones have only one copy of trapping cassette and characteristic of drugs resistance (Fig. S1A and S1B). Furthermore, without the induction of 4-hydroxytamoxifen (4-OHT), \\u201cOne-Shot\\u201d haESCs can be cryopreserved and expanded homogeneously. Since \\u201cOneShot\\u201d system was generated, screening could be initiated by supplementing 4-OHT into the medium. This enabled PB transposase-oestrogen receptor ligand-binding domain complex (PBase-ERT2) transport into the nucleus and induced transposition (Fig. 1B). In addition, PB transposase (PBase) in \\u201cOne-Shot\\u201d was self-inactivated after 4-OHT treatment to prevent re-transposition of trapping element (Fig. 1C). From the data, \\u201cOne-Shot\\u201d in haESCs was integrated in the proper position and expressed spatiotemporally. Because haESCs can be differentiated with haplotype (He et al., 2017), we differentiated \\u201cOne-Shot\\u201d haESCs into haploid neural stem cell-like cells (haNSCLCs) to obtain \\u201cOne-Shot\\u201d haNSCLCs (Figs. 1D and S1C), which broaden the scope of application of \\u201cOne-Shot\\u201d system. To evaluate the footprints of \\u201cOne-Shot\\u201d in genome, we expanded \\u201cOne-Shot\\u201d haESCs and \\u201cOne-Shot\\u201d haNSCLCs in a population of 4 \\u00d7 10 respectively, and then added 4-OHT to trigger the transposition events. After 3 days of 4-OHT induction, cells were harvested to amplify the inserted sites using splinkerette PCR (Horn et al., 2007). Next, PCR products from \\u201cOne-Shot\\u201d haESCs and \\u201cOne-Shot\\u201d haNSCLCs were sequenced separately by next generation sequencing. As expected, PiggyBac mediated transpositions were distributed both in forward and reverse strands of genome without phenotype screening (Fig. 1E) and footprints of trapping element in \\u201cOne-Shot\\u201d system were distributed in the whole genome (Fig. 1F). From global overview of reads distribution, we found that PB transposon could insert in many genome features. Consistent with previous report, we observed the preference of integration of this system within transcription units (Fig. 1G) (Ding et al., 2005). Furthermore, we picked 15 clones from the transposed \\u201cOne-Shot\\u201d haESCs library using flow cytometry, and inserted sites for each clone were isolated via barcodes encoded\"}, {\"paperId\": \"06d0211b25a6cb6b0f024c14030532dcaaa24087\", \"externalIds\": {\"DOI\": \"10.1096/fj.202002268R\", \"CorpusId\": 232209778, \"PubMed\": \"33710675\"}, \"title\": \"The use of fluorescence correlation spectroscopy to monitor cell surface \\u03b22\\u2010adrenoceptors at low expression levels in human embryonic stem cell\\u2010derived cardiomyocytes and fibroblasts\", \"venue\": \"The FASEB Journal\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://nottingham-repository.worktribe.com/preview/5271765/fj.202002268R.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fj.202002268R?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fj.202002268R, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47348819\", \"name\": \"Jo\\u00eblle Goulding\"}, {\"authorId\": \"145810421\", \"name\": \"A. Kondrashov\"}, {\"authorId\": \"152637580\", \"name\": \"Sarah J. Mistry\"}, {\"authorId\": \"6060975\", \"name\": \"T. Melarangi\"}, {\"authorId\": \"123624276\", \"name\": \"N. T. Vo\"}, {\"authorId\": \"13310510\", \"name\": \"Duc M. Hoang\"}, {\"authorId\": \"48366333\", \"name\": \"C. White\"}, {\"authorId\": \"144718097\", \"name\": \"C. Denning\"}, {\"authorId\": \"3691437\", \"name\": \"S. Briddon\"}, {\"authorId\": \"2289070169\", \"name\": \"S. Hill\"}], \"abstract\": \"The importance of cell phenotype in determining the molecular mechanisms underlying \\u03b22\\u2010adrenoceptor (\\u03b22AR) function has been noted previously when comparing responses in primary cells and recombinant model cell lines. Here, we have generated haplotype\\u2010specific SNAP\\u2010tagged \\u03b22AR human embryonic stem (ES) cell lines and applied fluorescence correlation spectroscopy (FCS) to study cell surface receptors in progenitor cells and in differentiated fibroblasts and cardiomyocytes. FCS was able to quantify SNAP\\u2010tagged \\u03b22AR number and diffusion in both ES\\u2010derived cardiomyocytes and CRISPR/Cas9 genome\\u2010edited HEK293T cells, where the expression level was too low to detect using standard confocal microscopy. These studies demonstrate the power of FCS in investigating cell surface \\u03b22ARs at the very low expression levels often seen in endogenously expressing cells. Furthermore, the use of ES cell technology in combination with FCS allowed us to demonstrate that cell surface \\u03b22ARs internalize in response to formoterol\\u2010stimulation in ES progenitor cells but not following their differentiation into ES\\u2010derived fibroblasts. This indicates that the process of agonist\\u2010induced receptor internalization is strongly influenced by cell phenotype and this may have important implications for drug treatment with long\\u2010acting \\u03b22AR agonists.\"}, {\"paperId\": \"06d21654b2e3a658bf2f8747e509e79dae0853b0\", \"externalIds\": {\"DOI\": \"10.3791/64098\", \"CorpusId\": 250372660, \"PubMed\": \"35876551\"}, \"title\": \"Combining 3D Magnetic Force Actuator and Multi-Functional Fluorescence Imaging to Study Nucleus Mechanobiology.\", \"venue\": \"Journal of Visualized Experiments\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3791/64098?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3791/64098, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108435854\", \"name\": \"Miao Huang\"}, {\"authorId\": \"2155263654\", \"name\": \"Heyang Wang\"}, {\"authorId\": \"2175387462\", \"name\": \"Alfredo A. Delgado\"}, {\"authorId\": \"2175381649\", \"name\": \"Tyler A. Reid\"}, {\"authorId\": \"2117316050\", \"name\": \"Julian Long\"}, {\"authorId\": \"2175974992\", \"name\": \"Shu Wang\"}, {\"authorId\": \"2007974250\", \"name\": \"Hayley Sussman\"}, {\"authorId\": \"47625113\", \"name\": \"Juan Guan\"}, {\"authorId\": \"3651774\", \"name\": \"H. Yamaguchi\"}, {\"authorId\": \"2109889144\", \"name\": \"Xin Tang\"}], \"abstract\": \"A fundamental question in mechanobiology is how living cells sense extracellular mechanical stimuli in the context of cell physiology and pathology. The cellular mechano-sensation of extracellular mechanical stimuli is believed to be through the membrane receptors, the associated protein complex, and the cytoskeleton. Recent advances in mechanobiology demonstrate that the cell nucleus in cytoplasm itself can independently sense mechanical stimuli simultaneously. However, a mechanistic understanding of how the cell nucleus senses, transduces, and responds to mechanical stimuli is lacking, mainly because of the technical challenges in accessing and quantifying the nucleus mechanics by conventional tools. This paper describes the design, fabrication, and implementation of a new magnetic force actuator that applies precise and non-invasive 3D mechanical stimuli to directly deform the cell nucleus. Using CRISPR/Cas9-engineered cells, this study demonstrates that this tool, combined with high-resolution confocal fluorescent imaging, enables the revelation of the real-time dynamics of a mechano-sensitive yes-associated protein (YAP) in single cells as a function of nucleus deformation. This simple method has the potential to bridge the current technology gap in the mechanobiology community and provide answers to the knowledge gap that exists in the relation between nucleus mechanotransduction and cell function.\"}, {\"paperId\": \"06d30a8861b80704479ba503d646b130b9ccbca3\", \"externalIds\": {\"DOI\": \"10.1161/CIRCRESAHA.121.319579\", \"CorpusId\": 236967269, \"PubMed\": \"34372664\"}, \"title\": \"Cardiac Myoediting Attenuates Cardiac Abnormalities in Human and Mouse Models of Duchenne Muscular Dystrophy\", \"venue\": \"Circulation Research\", \"year\": 2021, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ahajournals.org/doi/pdf/10.1161/CIRCRESAHA.121.319579\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1161/CIRCRESAHA.121.319579?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1161/CIRCRESAHA.121.319579, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7158358\", \"name\": \"A. Atmanli\"}, {\"authorId\": \"2086926238\", \"name\": \"A. C. Chai\"}, {\"authorId\": \"50292745\", \"name\": \"Miao Cui\"}, {\"authorId\": \"2144714614\", \"name\": \"Zhaoning Wang\"}, {\"authorId\": \"47812355\", \"name\": \"T. Nishiyama\"}, {\"authorId\": \"1398022798\", \"name\": \"R. Bassel-Duby\"}, {\"authorId\": \"37933650\", \"name\": \"E. Olson\"}], \"abstract\": null}, {\"paperId\": \"06d6a9945b932c1ff668dca0c610a802ee8ac481\", \"externalIds\": {\"MAG\": \"3081914304\", \"DOI\": \"10.1158/1557-3265.ovca19-a63\", \"CorpusId\": 225614149}, \"title\": \"Abstract A63: Whole-genome CRISPR/CAS9 screen using patient samples reveals JunB as a unique genetic liability\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1557-3265.ovca19-a63?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1557-3265.ovca19-a63, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112017441\", \"name\": \"Nobuhiro Takahashi\"}, {\"authorId\": \"6420306\", \"name\": \"Heather R. Keys\"}, {\"authorId\": \"120294818\", \"name\": \"Raghav Mohan\"}, {\"authorId\": \"1490972116\", \"name\": \"Lihua Zhang\"}, {\"authorId\": \"2153682112\", \"name\": \"Yi Li\"}, {\"authorId\": \"5208020\", \"name\": \"H. Saatcioglu\"}, {\"authorId\": \"4118899\", \"name\": \"N. Nagykery\"}, {\"authorId\": \"6950379\", \"name\": \"P. Donahoe\"}, {\"authorId\": \"1843680\", \"name\": \"D. Sabatini\"}, {\"authorId\": \"48275576\", \"name\": \"D. P\\u00e9pin\"}], \"abstract\": null}, {\"paperId\": \"06d8e66f0c29b121494051cd3df7d6faf239449d\", \"externalIds\": {\"PubMedCentral\": \"11219725\", \"DOI\": \"10.1038/s41420-024-02083-3\", \"CorpusId\": 261512387, \"PubMed\": \"38956056\"}, \"title\": \"The anti-tumor effect of trifluridine via induction of aberrant mitosis is unaffected by mutations modulating p53 activity\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41420-024-02083-3.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11219725, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4638574\", \"name\": \"Takeshi Wakasa\"}, {\"authorId\": \"3494106\", \"name\": \"M. Iimori\"}, {\"authorId\": \"2237633167\", \"name\": \"Kentaro Nonaka\"}, {\"authorId\": \"6061744\", \"name\": \"Akihito Harada\"}, {\"authorId\": \"2595272\", \"name\": \"Y. Ohkawa\"}, {\"authorId\": \"8322181\", \"name\": \"Chie Kikutake\"}, {\"authorId\": \"34935883\", \"name\": \"M. Suyama\"}, {\"authorId\": \"8331555\", \"name\": \"T. Kobunai\"}, {\"authorId\": \"3673161\", \"name\": \"K. Matsuoka\"}, {\"authorId\": \"8160075\", \"name\": \"Kenta Tsunekuni\"}, {\"authorId\": \"35032889\", \"name\": \"Yuki Kataoka\"}, {\"authorId\": \"10119499\", \"name\": \"H. Ochiiwa\"}, {\"authorId\": \"2237633174\", \"name\": \"Kazutaka Miyadera\"}, {\"authorId\": \"50273439\", \"name\": \"T. Sagara\"}, {\"authorId\": \"1749242\", \"name\": \"E. Oki\"}, {\"authorId\": \"4399922\", \"name\": \"S. Ohdo\"}, {\"authorId\": \"2207137397\", \"name\": \"Yoshihiko Maehara\"}, {\"authorId\": \"4732280\", \"name\": \"H. Kitao\"}], \"abstract\": \"The fluorinated thymidine analogue trifluridine (FTD) is a chemotherapeutic drug commonly used to treat cancer; however, the mechanism by which FTD induces cytotoxicity is not fully understood. In addition, the effect of gain-of-function (GOF) missense mutations of the TP53 gene (encoding p53), which promote cancer progression and chemotherapeutic drug resistance, on the chemotherapeutic efficacy of FTD is unclear. Here, we revealed the mechanisms by which FTD induced aberrant mitosis and contributed to cytotoxicity in both p53-null and p53-GOF missense mutant cells. In p53-null mutant cells, FTD induced DNA double-stranded breaks, single-stranded DNA accumulation, and the associated DNA damage repair responses during G2 phase. Nevertheless, FTD-induced DNA damage and the related responses were not sufficient to trigger strict G2/M checkpoint arrest. Thus, these features were carried over into mitosis, resulting in chromosome breaks and bridges, and subsequent cytokinesis failure. Improper mitotic exit eventually led to cell apoptosis, caused by the accumulation of extensive DNA damage and the presence of micronuclei encapsulated in the disrupted nuclear envelope. Upon FTD treatment, the behavior of the p53-GOF-missense-mutant, isogenic cell lines, generated by CRISPR/Cas9 genome editing, was similar to that of p53-null mutant cells. Thus, our data suggest that FTD treatment overrode the effect on gene expression induced by p53-GOF mutants and exerted its anti-tumor activity in a manner that was independent of p53 function.\"}, {\"paperId\": \"06dae04dc849630ea4f687cebe57a88982a64573\", \"externalIds\": {\"DOI\": \"10.1016/j.ijrobp.2023.06.1851\", \"CorpusId\": 263281243, \"PubMed\": \"37785688\"}, \"title\": \"The Predictive Value of Circulating Exosomal PD-L1 in Cervical Cancer Immunotherapy.\", \"venue\": \"International Journal of Radiation Oncology, Biology, Physics\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijrobp.2023.06.1851?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijrobp.2023.06.1851, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2249075134\", \"name\": \"W. Tang\"}, {\"authorId\": \"2249556610\", \"name\": \"Q. Guo\"}, {\"authorId\": \"2249136419\", \"name\": \"J. Chen\"}, {\"authorId\": \"2249092899\", \"name\": \"Q. Wu\"}, {\"authorId\": \"2249434878\", \"name\": \"T. Zhang\"}, {\"authorId\": \"2249147660\", \"name\": \"Q. Wang\"}, {\"authorId\": \"2249529301\", \"name\": \"X. Zhang\"}, {\"authorId\": \"2249282949\", \"name\": \"P. Xie\"}], \"abstract\": \"PURPOSE/OBJECTIVE(S)\\nProgrammed death ligand 1 (PD-L1) expression was wildly used as a predictor of immune Check-Point Inhibitors (ICIs) efficiency. However, emerging results showed that PD-L1 was of great heterogeneity in sampling time and site. Recently, some studies found that exosomal PD-L1(ExoPD-L1) was related to ICIs response. In this study, we aimed to explore the predictive value of ExoPD-L1 in ICIs treatment of cervical cancer (CC) for the first time.\\n\\n\\nMATERIALS/METHODS\\nA total of 40 primarily diagnosed CC patients who accepted radical radiotherapy (RT) from March 2021 to October 2022 were included. The consecutive tumor sample were collected before and during RT. Another 37 advanced CC patients who accepted ICIs combination therapy from June 2020 to October 2022 were enrolled in this study. Blood samples were collected from each participant before and during treatment. Exosomes were derived by differential centrifugation, which was further identified by Western blot (WB) (CD9/TSG101/Calnexin), transmission electron microscope analysis and nanoparticle tracking analysis. ExoPD-L1 detection was conducted by enzyme-linked immuno-sorbent assay (ELISA). The knockout of PD-L1 was conducted via CRISPR/Cas9 assay and the overexpress of PD-L1 was conducted by lentiviral transfection. CD8+ T cells were extracted from murine spleen by CD8+ T Cell Isolation Kit. Immune cells and cytokines markers were detected by multicolor flow cytometry.\\n\\n\\nRESULTS\\nThe consecutive detection of PD-L1 showed a dynamic change during RT. Compared with the level before RT, PD-L1 expression elevated in most patients (87.5%, 35/40) after RT. And the responders (n\\u202f=\\u202f18) had elevated ExoPD-L1 level at the first two circles in the ICIs combination therapy (P<0.001). Whereas the level of pre-treatment ExoPD-L1 couldn't stratified clinical responders and non-responders (P\\u202f=\\u202f0.181). The median follow-up time was 14.13 months. The mPFS in increased group vs. decreased group: not reach vs.11.02 months (P\\u202f=\\u202f0.025, HR: 0.218, 0.052-0.913). Continuous blood sampling of mice models also found that effective therapeutic intervention could increase ExoPD-L1 in the early stage. The combination of exosome inhibitor GW4869 and anti-PD-1 further inhibited tumor growth. Mice were injected with external ExoPD-L1OE and ExoPD-L1KO. The results showed that ExoPD-L1OE suppressed body immunity and promoted tumor growth. The results of flow cytometry showed that ExoPD-L1OE inhibited CD8+ T cells from releasing interferon-and granzyme B. And ExoPD-L1OE also suppressed the CD8+ T cells proliferation in murine spleen. The coculture of CD8+ T cells and exosomes in vitro also confirmed the above conclusion.\\n\\n\\nCONCLUSION\\nCompared with unstable and impressionable tumoral PD-L1, ExoPD-L1 seems to be better predictor for the efficacy of immunotherapy in CC, which was with easy accessibility and continuation. Exosome PD-L1 played an immunosuppressive role by inhibiting the proliferation and functional factor release of CD8+ T cell.\"}, {\"paperId\": \"06dd0973734f242ad68345bcac09d5f4b690080a\", \"externalIds\": {\"DOI\": \"10.1001/jama.2022.20032\", \"CorpusId\": 254671452, \"PubMed\": \"36511938\"}, \"title\": \"Investigational RSV Vaccine Given During Pregnancy Protects Newborns.\", \"venue\": \"Journal of the American Medical Association (JAMA)\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1001/jama.2022.20032?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1001/jama.2022.20032, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2156690229\", \"name\": \"Howard D Larkin\"}], \"abstract\": \"Tested in Pediatric B-Cell Leukemia Experimental allogeneic gene-edited T cells may provide an \\u201coff-the-shelf\\u201d alternative to autologous chimeric antigen receptor (CAR) T-cell therapies for children with recurrent or refractory B\\u2013cell acute lymphoblastic leukemia, reducing treatment delays and costs, according to a study in Science Translational Medicine. In a phase 1 clinical trial, 4 of 6 children treated with the allogeneic CAR T cells achieved remission, paving the way for them to receive allogeneic hematopoietic stem cell transplants. T cells from healthy adult donors were edited at multiple gene sites using a nextgeneration CRISPR-Cas9 (clustered regularly interspaced short palindromic repeats and CRISPR-associated protein 9) lentiviral method. One edit enables the T cells to target CD19 receptors expressed by diseased lymphocytes. Another reduces rejection risk by disrupting a receptor chain that promotes graft-vs-host disease. A third edit enhances edited T-cell survival by eliminating a receptor targeted by alemtuzumab, a monoclonal antibody commonly used to kill lymphocytes before stem cell transplants. The edited cells were expanded and purified, producing enough to treat several dozen patients, and cryopreserved before infusion. The 6 children, aged 14 months to 11 years, were treated with chemotherapy and alemtuzumab to reduce lymphocytes before infusion with the edited T cells. Infused cell counts peaked at 7 to 14 days after infusion among 4 patients, but expansion was not detected among the other 2 children. After 28 days, the 4 patients now in remission were reconditioned for allogeneic stem cell transplant. This both depleted any remaining edited T cells and their potential toxicity, and provided a rapid hematologic recovery, the authors wrote. Of the 6 patients who were treated, 2 had refractory disease after the edited T-cell infusion. They did not receive stem cell transplants and eventually died. Two of the 4 who were in remission after infusion experienced relapse after stem cell transplant and eventually died. The remaining 2 children were still in remission at 12 and at 3 months after receiving stem cell transplants. Historically, the 3-year event-free survival in similar high-risk cohorts is about 15%. Overall toxicities were similar to previous CAR T-cell therapies targeting CD19 receptors, meeting the trial\\u2019s primary end point for safety. Although the study was not designed to evaluate efficacy, \\u201csalvage of 2 of 6 patients treated under this approach is encouraging, and further data from larger cohorts and their long-term outcomes will be required,\\u201d the authors wrote. The possibility of eliminating allogeneic stem cell transplant after the edited T-cell treatment may also be investigated, they added.\"}, {\"paperId\": \"06e2eb5aff149a0681ddcbd0c415713fe8ab2d34\", \"externalIds\": {\"DOI\": \"10.3390/horticulturae8080735\", \"CorpusId\": 251660863}, \"title\": \"Efficient Editing of SoCSLD2 by CRISPR/Cas9 Affects Morphogenesis of Root Hair in Spinach\", \"venue\": \"Horticulturae\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2311-7524/8/8/735/pdf?version=1660814888\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3390/horticulturae8080735?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3390/horticulturae8080735, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7185749\", \"name\": \"Yingping Cao\"}, {\"authorId\": \"2110804106\", \"name\": \"Yue Xu\"}, {\"authorId\": \"2145914077\", \"name\": \"Yue Zhang\"}, {\"authorId\": \"2153526613\", \"name\": \"Heng Zhang\"}, {\"authorId\": \"2256481830\", \"name\": \"Zhi Qin\"}, {\"authorId\": \"2143765200\", \"name\": \"Chen Bai\"}, {\"authorId\": \"2143484434\", \"name\": \"Hailing Zhang\"}, {\"authorId\": \"2113508346\", \"name\": \"Dongmei Ma\"}, {\"authorId\": \"6860431\", \"name\": \"Quanhua Wang\"}, {\"authorId\": \"144301275\", \"name\": \"C. Fu\"}, {\"authorId\": \"89259682\", \"name\": \"Mei-hong Sun\"}, {\"authorId\": \"38723715\", \"name\": \"Shaojun Dai\"}], \"abstract\": \"CRISPR/Cas9 is a valuable tool and has been extensively employed to perform gene editing in plants. However, CRISPR/Cas9 has not been successfully used in spinach, an important leafy vegetable crop. Here, we established a CRISPR/Cas9-based gene-editing system for spinach hairy roots and edited two cellulose synthase-like D (CSLD) genes (SoCSLD2 and SoCSLD3) that were involved in root-hair formation of spinach hairy roots. Four mutation types (i.e., replacement, insertion, deletion, and combined mutations) were observed, among which the replacement accounted for the vast majority (about 64.1%). Mutation rate differed largely among different targets. Seven homozygous/bi-allelic and eight heterozygous/chimeric mutants of SoCSLD2 were obtained from 15 independent transgenic hairy root lines. All of the seven homozygous/bi-allelic mutant lines displayed bulking and short root hairs, which resembled the characteristics of Arabidopsis atcsld2 mutants. The transcriptomic analysis further revealed that multiple gene expressions for cell-wall modulation and membrane trafficking were disturbed, which might result in the inhibition of root hair growth in socsld2 mutants. This indicates that SoCSLD2 was successfully knocked out in spinach root hairs using the CRISPR/Cas9-based gene editing system.\"}, {\"paperId\": \"06e516b6d474f18b85950871bf7bf790d5239d88\", \"externalIds\": {\"MAG\": \"2998437589\", \"PubMedCentral\": \"7253353\", \"DOI\": \"10.1038/s41434-019-0119-y\", \"CorpusId\": 209540944, \"PubMed\": \"31900423\"}, \"title\": \"Integrating gene delivery and gene-editing technologies by adenoviral vector transfer of optimized CRISPR-Cas9 components\", \"venue\": \"Gene Therapy\", \"year\": 2020, \"citationCount\": 55, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41434-019-0119-y.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7253353, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4941971\", \"name\": \"I. Maggio\"}, {\"authorId\": \"91406646\", \"name\": \"H. A. Zittersteijn\"}, {\"authorId\": \"2155616901\", \"name\": \"Qian Wang\"}, {\"authorId\": \"2108457002\", \"name\": \"Jin Liu\"}, {\"authorId\": \"145925620\", \"name\": \"J. Janssen\"}, {\"authorId\": \"90926714\", \"name\": \"Iv\\u00e1n Toral Ojeda\"}, {\"authorId\": \"79146074\", \"name\": \"S. M. van der Maarel\"}, {\"authorId\": \"6843607\", \"name\": \"A. Lankester\"}, {\"authorId\": \"5008622\", \"name\": \"R. Hoeben\"}, {\"authorId\": \"48835254\", \"name\": \"M. Gon\\u00e7alves\"}], \"abstract\": \"Enhancing the intracellular delivery and performance of RNA-guided CRISPR-Cas9 nucleases (RGNs) remains in demand. Here, we show that nuclear translocation of commonly used Streptococcus pyogenes Cas9 (SpCas9) proteins is suboptimal. Hence, we generated eCas9.4NLS by endowing the high-specificity eSpCas9(1.1) nuclease (eCas9.2NLS) with additional nuclear localization signals (NLSs). We demonstrate that eCas9.4NLS coupled to prototypic or optimized guide RNAs achieves efficient targeted DNA cleavage and probe the performance of SpCas9 proteins with different NLS compositions at target sequences embedded in heterochromatin versus euchromatin. Moreover, after adenoviral vector (AdV)-mediated transfer of SpCas9 expression units, unbiased quantitative immunofluorescence microscopy revealed 2.3-fold higher eCas9.4NLS nuclear enrichment levels than those observed for high-specificity eCas9.2NLS. This improved nuclear translocation yielded in turn robust gene editing after nonhomologous end joining repair of targeted double-stranded DNA breaks. In particular, AdV delivery of eCas9.4NLS into muscle progenitor cells resulted in significantly higher editing frequencies at defective DMD alleles causing Duchenne muscular dystrophy (DMD) than those achieved by AdVs encoding the parental, eCas9.2NLS, protein. In conclusion, this work provides a strong rationale for integrating viral vector and optimized gene-editing technologies to bring about enhanced RGN delivery and performance.\"}, {\"paperId\": \"06e72c4ad99d6daefd9db2063496859fa5b3fc45\", \"externalIds\": {\"PubMedCentral\": \"9233507\", \"DOI\": \"10.1089/crispr.2021.0141\", \"CorpusId\": 248513952, \"PubMed\": \"35506982\"}, \"title\": \"New Editing Tools for Gene Therapy in Inherited Retinal Dystrophies\", \"venue\": \"The CRISPR Journal\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1089/crispr.2021.0141\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9233507, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50461413\", \"name\": \"J. Pulman\"}, {\"authorId\": \"143632891\", \"name\": \"J. Sahel\"}, {\"authorId\": \"4112043\", \"name\": \"D. Dalkara\"}], \"abstract\": \"Inherited retinal dystrophies (IRDs) are a heterogeneous group of diseases that affect more than 2 million people worldwide. Gene therapy (GT) has emerged as an exciting treatment modality with the potential to provide long-term benefit to patients. Today, gene addition is the most straightforward GT for autosomal recessive IRDs. However, there are three scenarios where this approach falls short. First, in autosomal dominant diseases caused by gain-of-function or dominant-negative mutations, the toxic mutated protein needs to be silenced. Second, a number of IRD genes exceed the limited carrying capacity of adeno-associated virus vectors. Third, there are still about 30% of patients with unknown mutations. In the first two contexts, precise editing tools, such as CRISPR-Cas9, base editors, or prime editors, are emerging as potential GT solutions for the treatment of IRDs. Here, we review gene editing tools based on CRISPR-Cas9 technology that have been used in vivo and the recent first-in-human application of CRISPR-Cas9 in an IRD.\"}, {\"paperId\": \"06e98cbdaf2fb75d876bcfb9b4b91a8841a1d79f\", \"externalIds\": {\"PubMedCentral\": \"7432951\", \"MAG\": \"3046141052\", \"DOI\": \"10.3390/ijms21155451\", \"CorpusId\": 220978176, \"PubMed\": \"32751693\"}, \"title\": \"Osteosarcoma-Derived Extracellular Vesicles Induce Lung Fibroblast Reprogramming\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 62, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/15/5451/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7432951, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1491574517\", \"name\": \"Alekhya Mazumdar\"}, {\"authorId\": \"1491573671\", \"name\": \"Joaqu\\u00edn Urd\\u00ednez\"}, {\"authorId\": \"3720651\", \"name\": \"Aleksandar Boro\"}, {\"authorId\": \"8850421\", \"name\": \"Jessica Migliavacca\"}, {\"authorId\": \"49691051\", \"name\": \"M. Arlt\"}, {\"authorId\": \"5150848\", \"name\": \"R. Muff\"}, {\"authorId\": \"47476859\", \"name\": \"B. Fuchs\"}, {\"authorId\": \"2243829\", \"name\": \"J. Snedeker\"}, {\"authorId\": \"4495530\", \"name\": \"Ana Gvozdenovic\"}], \"abstract\": \"Tumor-secreted extracellular vesicles (EVs) have been identified as mediators of cancer\\u2013host intercellular communication and shown to support pre-metastatic niche formation by modulating stromal cells at future metastatic sites. While osteosarcoma, the most common primary malignant bone tumor in children and adolescents, has a high propensity for pulmonary metastases, the interaction of osteosarcoma cells with resident lung cells remains poorly understood. Here, we deliver foundational in vitro evidence that osteosarcoma cell-derived EVs drive myofibroblast/cancer-associated fibroblast differentiation. Human lung fibroblasts displayed increased invasive competence, in addition to increased \\u03b1-smooth muscle actin expression and fibronectin production upon EV treatment. Furthermore, we demonstrate, through the use of transforming growth factor beta receptor 1 (TGFBR1) inhibitors and CRISPR-Cas9-mediated knockouts, that TGF\\u03b21 present in osteosarcoma cell-derived EVs is responsible for lung fibroblast differentiation. Overall, our study highlights osteosarcoma-derived EVs as novel regulators of lung fibroblast activation and provides mechanistic insight into how osteosarcoma cells can modulate distant cells to potentially support metastatic progression.\"}, {\"paperId\": \"06ea3106157616564ed3bb18e4913521e4ac0819\", \"externalIds\": {\"MAG\": \"3034256723\", \"PubMedCentral\": \"7291719\", \"DOI\": \"10.1186/s12964-020-00559-0\", \"CorpusId\": 219589850, \"PubMed\": \"32527265\"}, \"title\": \"Protease associated domain of RNF43 is not necessary for the suppression of Wnt/\\u03b2-catenin signaling in human cells\", \"venue\": \"Cell Communication and Signaling\", \"year\": 2020, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://biosignaling.biomedcentral.com/track/pdf/10.1186/s12964-020-00559-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7291719, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49579263\", \"name\": \"Tomasz W. Radaszkiewicz\"}, {\"authorId\": \"144546888\", \"name\": \"V. Bryja\"}], \"abstract\": \"Background RNF43 and its homolog ZNRF3 are transmembrane E3 ubiquitin ligases frequently mutated in many human cancer types. Their main role relays on the inhibition of canonical Wnt signaling by the negative regulation of frizzled receptors and LRP5/6 co-receptors levels at the plasma membrane. Intracellular RING domains of RNF43/ZNRF3 mediate the key enzymatic activity of these proteins, but the function of the extracellular Protease Associated (PA) fold in the inhibition of Wnt/\\u03b2-catenin pathway is controversial up-to date, apart from the interaction with secreted antagonists R-spondin family proteins shown by the crystallographic studies. Methods In our research we utilised cell-based approaches to study the role of RNF43 lacking PA domain in the canonical Wnt signalling pathway transduction. We developed controlled overexpression (TetON) and CRISPR/Cas9 mediated knock-out models in human cells. Results RNF43\\u0394PA mutant activity impedes canonical Wnt pathway, as manifested by the reduced phosphorylation of LRP6, DVL2 and DVL3 and by the decreased \\u03b2-catenin-dependent gene expression. Finally, rescue experiments in the CRISPR/Cas9 derived RNF43 / ZNRF3 double knock-out cell lines showed that RNF\\u0394PA overexpression is enough to inhibit activation of LRP6 and \\u03b2-catenin activity as shown by the Western blot and Top flash dual luciferase assays. Moreover, RNF43 variant without PA domain was not sensitive to the R-spondin1 treatment. Conclusion Taken together, our results help to understand better the mode of RNF43 tumor suppressor action and solve some discrepancies present in the field. Video Abstract Graphical Abstract\"}, {\"paperId\": \"06ee4c7845171b917d1c32df6906b246e49d75dd\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.am2024-1085\", \"CorpusId\": 268646189}, \"title\": \"Abstract 1085: Exploiting bioenergetic vulnerabilities in chemotherapy resistant osteosarcoma\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.am2024-1085?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.am2024-1085, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2293144051\", \"name\": \"Valerie U. Nguyen\"}, {\"authorId\": \"2293043300\", \"name\": \"Laurie A. Graves\"}, {\"authorId\": \"2293049095\", \"name\": \"Veronica Colmenares\"}, {\"authorId\": \"2293049161\", \"name\": \"Abol Macabangon\"}, {\"authorId\": \"2293040401\", \"name\": \"Casey Syal\"}, {\"authorId\": \"2269372164\", \"name\": \"Kelsey H. Fisher-Wellman\"}, {\"authorId\": \"2291465875\", \"name\": \"William C. Eward\"}, {\"authorId\": \"2171102293\", \"name\": \"So Young Kim\"}, {\"authorId\": \"5736894\", \"name\": \"Jason A. Somarelli\"}], \"abstract\": \"\\n BACKGROUND: Osteosarcoma (OS) is the most common bone cancer in children and young adults. Standard treatment involves chemotherapy and surgical resection, yet nearly 4 in 10 patients experience disease relapse, and almost all of these patients are resistant to additional chemotherapy. Therefore, there is an urgent need to understand the biology of chemo-resistant OS and identify new therapeutic strategies to treat this therapy-resistant disease state.\\n METHODS: Using a CRISPR-Cas9 based lineage tracing system, RNA sequencing, and Seahorse XF assays in chemo-na\\u00efve, -resistant, and -released human 143b and patient-derived 173x OS cell lines, we modeled the evolution of chemoresistance and release from the selective pressure of chemotherapy in osteosarcoma. The phenotype of each cell state was assessed through in vitro and ex vivo cell proliferation assays, a comparison of cell viability upon re-challenge to standard-of-care chemotherapy, and comparison of cell viability in response to novel therapies targeting alterations in cell respiration.\\n RESULTS: Chemo-resistant OS cells demonstrate a decrease in expression of proliferation-associated gene pathways and shift their resources toward expression and maintenance of multi-drug resistance ABC transporters. Chemo-released cells maintain elevated expression of ABC transporters while re-activating proliferation. Across the spectrum of chemotherapy exposure, OS cells demonstrate changes in respiratory capacity, with unique bioenergetic phenotypes observed in chemo-na\\u00efve, -resistant, and -released cells.\\n CONCLUSIONS: Chemo-resistant and chemo-released OS cells demonstrate unique bioenergetic patterns that correlate with gene expression signatures and growth phenotypes. Evolution imposed by the selective pressure of chemotherapy may render OS cells vulnerable to therapies that disrupt cellular energetics and exploit multi-drug resistant ABC transporters.\\n Citation Format: Valerie U. Nguyen, Laurie Graves, Veronica Colmenares, Abol Macabangon, Casey Syal, Kelsey Fisher-Wellman, William C. Eward, So Young Kim, Jason A. Somarelli. Exploiting bioenergetic vulnerabilities in chemotherapy resistant osteosarcoma [abstract]. In: Proceedings of the American Association for Cancer Research Annual Meeting 2024; Part 1 (Regular Abstracts); 2024 Apr 5-10; San Diego, CA. Philadelphia (PA): AACR; Cancer Res 2024;84(6_Suppl):Abstract nr 1085.\"}, {\"paperId\": \"06ef4600f1157443060e54df409af1b04ce1d002\", \"externalIds\": {\"PubMedCentral\": \"8501707\", \"DOI\": \"10.1186/s13071-021-05023-7\", \"CorpusId\": 238480586, \"PubMed\": \"34625097\"}, \"title\": \"Biotinylation of the Neospora caninum parasitophorous vacuole reveals novel dense granule proteins\", \"venue\": \"Parasites & Vectors\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://parasitesandvectors.biomedcentral.com/track/pdf/10.1186/s13071-021-05023-7\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8501707, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2109439518\", \"name\": \"Congshan Yang\"}, {\"authorId\": \"2302284217\", \"name\": \"Chenrong Wang\"}, {\"authorId\": \"66253841\", \"name\": \"Jing Liu\"}, {\"authorId\": \"40526841\", \"name\": \"Qun Liu\"}], \"abstract\": \"Background Neospora caninum is an obligate intracellular parasite that invades host cells and replicates within the parasitophorous vacuole (PV), which resists fusion with host cell lysosomal compartments. To modify the PV, the parasite secretes an array of proteins, including dense granule proteins (GRAs). The vital role of GRAs in the Neospora life cycle cannot be overestimated. Despite this important role, only a subset of these proteins have been identified, and most of their functions have not been elucidated. Our previous study demonstrated that NcGRA17 is specifically targeted to the delimiting membrane of the parasitophorous vacuole membrane (PVM). In this study, we utilize proximity-dependent biotin identification (BioID) to identify novel components of the dense granules. Methods NcGRA17 was BirA* epitope-tagged in the Nc1 strain utilizing the CRISPR/Cas9 system to create a fusion of NcGRA17 with the biotin ligase BirA*. The biotinylated proteins were affinity-purified for mass spectrometric analysis, and the candidate GRA proteins from BioID data set were identified by gene tagging. To verify the biological role of novel identified GRA proteins, we constructed the NcGRA23 and NcGRA11 (a\\u2013e) knockout strains using the CRISPR/Cas9 system and analyzed the phenotypes of these mutants. Results Using NcGRA17-BirA* fusion protein as bait, we have identified some known GRAs and verified localization of 11 novel GRA proteins by gene endogenous tagging or overexpression in the Nc1 strain. We proceeded to functionally characterize NcGRA23 and NcGRA11 (a\\u2013e) by gene knockout. The lack of NcGRA23 or NcGRA11 (a\\u2013e) did not affect the parasite propagation in vitro and virulence in vivo. Conclusions In summary, our findings reveal that BioID is effective in discovering novel constituents of N. caninum dense granules. The exact biological functions of the novel GRA proteins are yet unknown, but this could be explored in future studies. Graphical abstract\"}, {\"paperId\": \"06f16b1fc29c5442befc3b18328a3990a3f44b5e\", \"externalIds\": {\"MAG\": \"3096182156\", \"DOI\": \"10.1016/j.bios.2020.112749\", \"CorpusId\": 226280018, \"PubMed\": \"33160233\"}, \"title\": \"A CRISPR-driven colorimetric code platform for highly accurate telomerase activity assay.\", \"venue\": \"Biosensors & bioelectronics\", \"year\": 2020, \"citationCount\": 53, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bios.2020.112749?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bios.2020.112749, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40370122\", \"name\": \"Meng Cheng\"}, {\"authorId\": \"6521183\", \"name\": \"Erhu Xiong\"}, {\"authorId\": \"51308145\", \"name\": \"Tian Tian\"}, {\"authorId\": \"34415661\", \"name\": \"Debin Zhu\"}, {\"authorId\": \"46369082\", \"name\": \"Huai-qiang Ju\"}, {\"authorId\": \"2110801243\", \"name\": \"Xiaoming Zhou\"}], \"abstract\": \"Telomeric repeat amplification protocol (TRAP) has been the most widely used method for assessing the telomerase activity from cells and tissues. However, cell lysates, body fluid samples, or tumor tissue samples often contain high concentrations of protein or other complex matrices, which are usually inhibiting the TRAP response, thus leading to false-negative results. Internal control (IC) involved TRAP enables reliable telomerase activity assay but requires time consuming and laborious electrophoretic separation to visualize telomeric repeat DNA and internal control products from TRAP reaction, severely limiting its application in clinical diagnosis. Herein, a colorimetric code system based on programmable CRISPR-Cas12a technology and gold nano-particles (AuNPs) probe has been developed to analyse telomeric repeat DNA and internal control in TRAP products, enabling the rapid detection of telomerase activity and identification of false-negatives with naked-eye. We transform the detection results into three typical colorimetric codes-positive (P), negative (N) and false-negative (FN), making the judgement of detection results more convenient and user-friendly. The platform has also been applied in accurate detection of clinical liver cancer specimens for telomerase activity with a detection sensitivity of 93.75% and a specificity of 93.75% based on Youden index analysis. As a proof of concept, we further demonstrated the feasibility of Cas9-mediated triple-line lateral flow assay (TL-LFA), which enabled the detection of telomeric repeat DNA and internal control on a single triple-line test strip, achieving convenient and accurate telomerase activity assay.\"}, {\"paperId\": \"06f1b6fac757ccefd7a3c24d1259e8e67a25c03a\", \"externalIds\": {\"PubMedCentral\": \"10336564\", \"DOI\": \"10.21769/BioProtoc.4705\", \"CorpusId\": 259623140, \"PubMed\": \"37449035\"}, \"title\": \"Autolysin Production from Chlamydomonas reinhardtii\", \"venue\": \"Bio-protocol\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.21769/bioprotoc.4705\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10336564, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4200554\", \"name\": \"Justin Findinier\"}], \"abstract\": \"Chlamydomonas reinhardtii is a model organism for various processes, from photosynthesis to cilia biogenesis, and a great chassis to learn more about biofuel production. This is due to the width of molecular tools available, which have recently expanded with the development of a modular cloning system but, most importantly, with CRISPR/Cas9 editing now being possible. This technique has proven to be more efficient in the absence of a cell wall by using specific mutants or by digesting Chlamydomonas cell wall using the mating-specific metalloprotease autolysin (also called gametolysin). Multiple protocols have been used and shared for autolysin production from Chlamydomonas cells; however, they provide very inconsistent results, which hinders the capacity to routinely perform CRISPR mutagenesis. Here, we propose a simple protocol for autolysin production requiring transfer of cells from plates into a dense liquid suspension, gametogenesis by overnight incubation before mixing of gametes, and enzyme harvesting after 2 h. This protocol has shown to be highly efficient for autolysin production regardless of precise control over cell density at any step. Requiring a minimal amount of labor, it will provide a simple, ready-to-go approach to produce an enzyme critical for the generation of targeted mutants.\"}, {\"paperId\": \"06f2a9e7cf8ea297ac37c2ad63200809be6f699a\", \"externalIds\": {\"PubMedCentral\": \"11793105\", \"DOI\": \"10.1126/science.adm7966\", \"CorpusId\": 272884637, \"PubMed\": \"39325875\"}, \"title\": \"A kalihinol analog disrupts apicoplast function and vesicular trafficking in P. falciparum malaria\", \"venue\": \"Science\", \"year\": 2024, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11793105, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1666741397\", \"name\": \"Z. Chahine\"}, {\"authorId\": \"2060659608\", \"name\": \"S. Abel\"}, {\"authorId\": \"1491953222\", \"name\": \"T. Hollin\"}, {\"authorId\": \"2268054684\", \"name\": \"G. Barnes\"}, {\"authorId\": \"2268141850\", \"name\": \"J. Chung\"}, {\"authorId\": \"2268054596\", \"name\": \"M. Daub\"}, {\"authorId\": \"2268054593\", \"name\": \"I. Renard\"}, {\"authorId\": \"2264441380\", \"name\": \"J. Choi\"}, {\"authorId\": \"89865490\", \"name\": \"P. Vydyam\"}, {\"authorId\": \"2268054941\", \"name\": \"A. Pal\"}, {\"authorId\": \"2268054589\", \"name\": \"M. Alba-Argomaniz\"}, {\"authorId\": \"2240542881\", \"name\": \"C. Banks\"}, {\"authorId\": \"2268054658\", \"name\": \"J. Kirkwood\"}, {\"authorId\": \"2240523134\", \"name\": \"A. Saraf\"}, {\"authorId\": \"1399146225\", \"name\": \"I. Camino\"}, {\"authorId\": \"2268054636\", \"name\": \"P. Castaneda\"}, {\"authorId\": \"2268054650\", \"name\": \"M. Cuevas\"}, {\"authorId\": \"2268054587\", \"name\": \"J. De Mercado-Arnanz\"}, {\"authorId\": \"2268054731\", \"name\": \"E. Fernandez-Alvaro\"}, {\"authorId\": \"2268054610\", \"name\": \"A. Garcia-Perez\"}, {\"authorId\": \"2007517180\", \"name\": \"N. Ibarz\"}, {\"authorId\": \"1422704690\", \"name\": \"S. Viera-Morilla\"}, {\"authorId\": \"46680516\", \"name\": \"J. Prudhomme\"}, {\"authorId\": \"2268054608\", \"name\": \"C. Joyner\"}, {\"authorId\": \"2268054725\", \"name\": \"A. Bei\"}, {\"authorId\": \"2240542790\", \"name\": \"L. Florens\"}, {\"authorId\": \"5247380\", \"name\": \"C. Ben Mamoun\"}, {\"authorId\": \"2268054620\", \"name\": \"C. Vanderwal\"}, {\"authorId\": \"2240542780\", \"name\": \"K. L. Le Roch\"}], \"abstract\": \"We report the discovery of MED6-189, an analog of the kalihinol family of isocyanoterpene natural products that is effective against drug-sensitive and drug-resistant Plasmodium falciparum strains, blocking both asexual replication and sexual differentiation. In vivo studies using a humanized mouse model of malaria confirm strong efficacy of the compound in animals with no apparent hemolytic activity or toxicity. Complementary chemical, molecular, and genomics analyses revealed that MED6-189 targets the parasite apicoplast and acts by inhibiting lipid biogenesis and cellular trafficking. Genetic analyses revealed that a mutation in PfSec13, which encodes a component of the parasite secretory machinery, reduced susceptibility to the drug. Its high potency, excellent therapeutic profile, and distinctive mode of action make MED6-189 an excellent addition to the antimalarial drug pipeline. Editor\\u2019s summary Despite decades of control efforts, malaria still exacts a severe toll on vulnerable populations. A few years of respite brought on by a vaccine or drug is typically followed by disease resurgence as the parasite escapes repression until the next control measure arrives. Chahine et al. have been working on an isocyanoterpene natural product analog to add to the antimalarial drug pipeline. Transcriptomic, metabolomic, pull-down, and thermal shift experiments yielded results consistent with action against the apicoplast, a parasite organelle required for host cell invasion. Although a specific target has not yet been identified, the drug appears to inhibit lipid synthesis and trafficking. Resistance could be selected for by a mutation in part of the secretory machine. Overall, the candidate drug was safe in a humanized mouse model of malaria. \\u2014Caroline Ash INTRODUCTION Given widespread resistance to commonly used antimalarials, artemisinin-based combination therapies (ACTs) remain one of the most applicable first-line treatments for drug-resistant malaria. However, recent reports have revealed growing global resistance to ACT partner drugs and clinical treatment failures. Given the finite number of antimalarials and the limited protection offered by current vaccines, there is an urgent need for therapeutics to suppress the spread of the disease. Ideally, candidate molecules should block pathways not previously targeted by approved antimalarials or those in clinical development. The isocyanoterpene (ICT) family of sponge-derived natural products has shown potent antibacterial, antifungal, and antimalarial activity. Among the ICTs, the kalihinol subfamily, including kalihinols A and B, has shown activity against both drug-sensitive and drug-resistant Plasmodium falciparum isolates. However, large-scale biological production of the kalihinol derivatives was complex, and access to efficient chemical biology tools to uncover the mechanism of action of these compounds was limited. RATIONALE We chemically synthesized simplified kalihinol analogs in an earlier study. Among these compounds, MED6-189 emerged as a highly potent drug, with median inhibitory concentration values less than 50 nM, against several P. falciparum drug-sensitive and drug-resistant strains. Through a sequence of 10 chemical steps, synthesis of MED6-189 was scaled up to support the in-depth discovery of its mechanism of action as well as toxicology and in vivo efficacy studies against human and nonhuman primate malaria parasites. RESULTS MED6-189 inhibited both drug-sensitive and drug-resistant P. falciparum strains. Phenotypic assays showed that this compound blocked parasite sexual differentiation, had a promising tolerability profile against human cells, and cleared P. falciparum infection in a humanized mouse model. The compound also exhibited potent activity against P. knowlesi and P. cynomolgi. Microscopy imaging and drug combination studies showed that MED6-189 targeted the apicoplast, a nonphotosynthetic plastid found in most Apicomplexa parasites that is crucial for the synthesis of isoprenoids. Using a multi-omics approach and biotinylated MED6-189 probes that retained antimalarial activity, we gained an understanding of the drug\\u2019s mechanism of action and potential resistance pathways. Our findings showed that MED6-189 disrupts apicoplast biology, slows growth, and kills the parasite. Transcriptomic, metabolomic, and proteomic experiments indicated that the compound interferes not only with lipid metabolism but also with vesicular trafficking. Finally, we used prolonged in vitro resistance selection pressure followed by genetic analysis to identify mutations in PfSec13 (PF3D7_1230700), a gene coding for a key component of the protein secretory machinery. Using CRISPR-Cas9 genome editing, we confirmed that mutation of PfSec13 is associated with reduced susceptibility to the drug. CONCLUSION Our studies provide a comprehensive investigation into the activity and mode of action of MED6-189, a compound targeting both the asexual and sexual stages of P. falciparum. The complex mode of action of MED6-189, along with the challenges faced by the parasite to develop drug resistance, highlights its potential as an antimalarial candidate. Our research indicates that MED6-189, and by proxy other kalihinols and ICTs, is a promising antimalarial drug candidate, particularly in combination with fast-acting therapies. Furthermore, the ability of MED6-189 to inhibit the growth of P. falciparum, as well as its efficacy against P. knowlesi and P. cynomolgi, underscores its potential as a pan-antimalarial lead drug. A systems biology approach for antimalarial drug discovery. A synthetic analog of a sponge-derived natural product showing antimalarial activity was optimized in a series of phenotypic assays and tested for synergistic effects with known antimalarial drugs. Transcriptomic, metabolomic, proteomic, and genetic analyses identified the parasite target organelle\\u2014the apicoplast\\u2014a site of parasite isoprenoid synthesis. Pharmacokinetic and toxicity studies across cell types and Plasmodium species show feasibility for further development as a pan-Plasmodium drug. [Figure created with BioRender.com]\"}, {\"paperId\": \"06f4b112d4311db608b6df38af624ab4ef527683\", \"externalIds\": {\"PubMedCentral\": \"9893291\", \"DOI\": \"10.3389/fpls.2023.1050483\", \"CorpusId\": 255968903, \"PubMed\": \"36743495\"}, \"title\": \"Photosynthesis in rice is increased by CRISPR/Cas9-mediated transformation of two truncated light-harvesting antenna\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2023, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2023.1050483/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9893291, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6765751\", \"name\": \"Daniel F. Caddell\"}, {\"authorId\": \"2113377134\", \"name\": \"N. Langenfeld\"}, {\"authorId\": \"2201668180\", \"name\": \"Madigan Eckels\"}, {\"authorId\": \"18113146\", \"name\": \"Shuyang Zhen\"}, {\"authorId\": \"2201685679\", \"name\": \"Rachel Klaras\"}, {\"authorId\": \"40126776\", \"name\": \"Laxmi S. Mishra\"}, {\"authorId\": \"49879842\", \"name\": \"B. Bugbee\"}, {\"authorId\": \"1399189528\", \"name\": \"Devin Coleman-Derr\"}], \"abstract\": \"Plants compete for light partly by over-producing chlorophyll in leaves. The resulting high light absorption is an effective strategy for out competing neighbors in mixed communities, but it prevents light transmission to lower leaves and limits photosynthesis in dense agricultural canopies. We used a CRISPR/Cas9-mediated approach to engineer rice plants with truncated light-harvesting antenna (TLA) via knockout mutations to individual antenna assembly component genes CpSRP43, CpSRP54a, and its paralog, CpSRP54b. We compared the photosynthetic contributions of these components in rice by studying the growth rates of whole plants, quantum yield of photosynthesis, chlorophyll density and distribution, and phenotypic abnormalities. Additionally, we investigated a Poales-specific duplication of CpSRP54. The Poales are an important family that includes staple crops such as rice, wheat, corn, millet, and sorghum. Mutations in any of these three genes involved in antenna assembly decreased chlorophyll content and light absorption and increased photosynthesis per photon absorbed (quantum yield). These results have significant implications for the improvement of high leaf-area-index crop monocultures.\"}, {\"paperId\": \"06f5b9c6c414f7a2a02cd90400e52939fb3eadd4\", \"externalIds\": {\"PubMedCentral\": \"9627959\", \"DOI\": \"10.1210/jendso/bvac150.702\", \"CorpusId\": 253274823}, \"title\": \"ODP254 WFS1 Loss of Function Causes ER Stress-Mediated Inflammation in Pancreatic \\u03b2-Cells\", \"venue\": \"Journal of the Endocrine Society\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/jes/article-pdf/6/Supplement_1/A338/46734000/bvac150.702.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9627959, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1833601\", \"name\": \"S. Morikawa\"}, {\"authorId\": \"2189615335\", \"name\": \"Lindsey Blaher\"}, {\"authorId\": \"6066396\", \"name\": \"F. Urano\"}], \"abstract\": \"Abstract Wolfram syndrome is a rare genetic disorder characterized by juvenile-onset diabetes mellitus, optic nerve atrophy, hearing loss, diabetes insipidus, and progressive neurodegeneration. Pathogenic variants in the WFS1 gene are the main causes of Wolfram syndrome. WFS1 encodes a transmembrane protein localized to the endoplasmic reticulum (ER) and regulates the unfolded protein response (UPR). Loss of function of WFS1 leads to dysregulation of insulin production and secretion, ER calcium depletion, and cytosolic calpains activation, resulting in the activation of apoptotic cascades. Although the terminal UPR is well known to yield an inflammatory response called \\\"sterilized inflammation\\\" that accelerates \\u03b2-cell dysfunction and death in diabetes, the contribution of \\u03b2-cell inflammation to the development of diabetes in Wolfram syndrome has not been fully understood. Here we show that WFS1-deficiency enhances the gene expression of pro-inflammatory cytokines and chemokines, leading to cytokine-induced ER-stress and cell death in pancreatic \\u03b2-cells. Under thechronic[BL1] high-glucose condition, CRISPR/Cas9-mediated Wfs1-knockout (KO) INS-1 832/13 cells, the pancreatic \\u03b2-cell model of Wolfram syndrome, showed enhanced gene expression levels of ER stress markers (Chop, sXbp1, Bip, and Txnip). Moreover, the gene expression levels of pro-inflammatory cytokines (Il-1\\u03b2, Il-6), chemokine (Ccl2), and vascular endothelial growth factor A (VegfA) were higher in Wfs1- KO INS-1 832/13 cells when compared to Wfs1-wild type INS-1 832/13 cells. [BL2] The high glucose-induced pro-inflammatory cytokine genes in Wfs1-KO INS-1 832/13 cells were mediated by the PKR-like ER-resident kinase (PERK) and inositol-requiring enzyme 1\\u03b1 (IRE1\\u03b1)pathways. Furthermore, the IFN-\\u03b3 and IL-1\\u03b2 treatment enhanced ER stress-mediated cell death and upregulated the pro-inflammatory cytokine gene expression in Wfs1-KO INS-1 832/13 cells. To confirm these findings, we investigated whether inflammation occurs in a mouse model of Wolfram syndrome. Compared to wild-type mice, 10-month-old whole body Wfs1-KO mouse islets showed a significantly higher density of Iba1, which is a marker for macrophage expression. The islet-infiltrated macrophages in these Wfs1-KO mice expressed the M1-macrophage marker (CD68). There was also strong fibrosis and a high density of endothelial cell marker (CD31) in the Wfs1-KO mouse islets. These results demonstrate that WFS1 loss-of-function enhances the inflammatory responses in pancreatic \\u03b2-cells. The results in our study identified sterile inflammation as a new pathological mechanism in the development of diabetes in Wolfram syndrome. In Wolfram syndrome model mice, islets are highly infiltrated with macrophages, suggesting that the vicious cycle of ER stress and sterile inflammation accelerates the progression of diabetes in a cell-autonomous and cell-nonautonomous manner. A deeper understanding of the pathophysiology of Wolfram syndrome is essential for developing novel therapeutic targets for the disease. Presentation: No date and time listed\"}, {\"paperId\": \"06f8800bf1cfca1f30b9fce9d8124b1a3ee7f0b0\", \"externalIds\": {\"DOI\": \"10.59675/u226\", \"CorpusId\": 274118484}, \"title\": \"The Role of Genetics in Neurological Disorders: From Rare Diseases to Common Conditions\", \"venue\": \"Academic International Journal of Medical Update\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.59675/u226?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.59675/u226, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2310364243\", \"name\": \"Nuha Majeed Farhan\"}, {\"authorId\": \"2106597504\", \"name\": \"Lubab Mohamed Awad\"}, {\"authorId\": \"2327570033\", \"name\": \"Intisar Masier Abd\"}, {\"authorId\": \"2275215936\", \"name\": \"Mohammed Awad\"}], \"abstract\": \"Neurological disorders result from neurological diseases affecting the brain, spinal cord and peripheral nerves and include rare genetic diseases like Huntington\\u2019s disease and spinal muscular atrophy, as well as common diseases such as Alzheimer\\u2019s, Parkinson\\u2019s disease and epilepsy. These conditions are strongly influenced by genetics, and genetics contribute to the onset, the progression of the disease, the severity of symptoms and treatment responsiveness. Genetics is relevant not only to inheritance, but also to de novo mutations, polygenic risk factors and gene environment interactions that contribute to the clinical phenotype of these disorders.\\nAlthough the many mutations and heredity patterns of neurological conditions have not been worked out completely, genetic research has come a long way to help us learn more about these conditions. Single gene mutations are invaluable particularly for rare disorders for early diagnosis and targeted interventions. For instance, predictive gene testing such as checking for the HTT gene mutation linked to Huntington's disease allows people to learn if they are at risk of the disease early on \\u2014 before their symptoms develop.\\nOn the other hand, most common neurological disorders involve genetic landscapes much more complicated, with small increases in risk due to more than one gene. Since epigenetic factors and certain environmental factors can further influence these risks, prevention is always in order. For example, people with APOE \\u03b54 allele are more likely to develop Alzheimer\\u2019s disease but lifestyle factors such as dietary and exercise may reduce this risk. Such complexity emphasizes the necessity for complete studies, including genome wide association studies (GWAS), epigenetics, and transcriptomics to define molecular mechanisms of these multifactorial disorders.\\nGenetic testing has recently become one of the most important tools in neurology, allowing us to make early diagnosis with great precision and to offer a comprehensive and personalized treatment plan, based on patients' genetic profile. For instance, these genetic mutations can help physicians choose the best medicines for patients with epilepsy. Gene based therapies, including gene replacement, antisense oligonucleotides (ASOs), and gene editing (e.g., CRISPR-Cas9) are newly emerging as potential treatments for human disease and as a therapeutic for spinal muscular atrophy and Duchenne muscular dystrophy. Indeed, as these therapies become more common, these must be addressed as ethical concerns, such as issues of genetic privacy, risk of genetic discrimination, and unintended consequences of genetic manipulation.\\nThe focus of this review is to give a brief but detailed account of the genetic components of neurological disorders, ranging from rare monogenic diseases to common multifactorial disorders. It describes key genetic discoveries and discusses developing genetic diagnostic and therapeutic strategies and the ethical implications related to these developments. The integration of genetic insights directly into clinical practice has the potential to provide a personal roadmap that could lead to individualizing the diagnostic, treatment and prevention approaches for neurological disorders and enhance patient outcomes.\"}, {\"paperId\": \"06f897d77fe671ff896324632945bef5b407a026\", \"externalIds\": {\"DOI\": \"10.1038/s41592-020-0826-8\", \"CorpusId\": 256840992}, \"title\": \"Pooled CRISPR screens with imaging on microraft arrays reveals stress granule-regulatory factors\", \"venue\": \"Nature Methods\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7357298\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41592-020-0826-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41592-020-0826-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"153074072\", \"name\": \"Emily C. Wheeler\"}, {\"authorId\": \"2442268\", \"name\": \"Anthony Q. Vu\"}, {\"authorId\": \"51056102\", \"name\": \"J. Einstein\"}, {\"authorId\": \"3536728\", \"name\": \"Matthew DiSalvo\"}, {\"authorId\": \"3464658\", \"name\": \"Noorsher Ahmed\"}, {\"authorId\": \"5771296\", \"name\": \"Eric L. Van Nostrand\"}, {\"authorId\": \"34347435\", \"name\": \"Alexander A. Shishkin\"}, {\"authorId\": \"3681343\", \"name\": \"Wenhao Jin\"}, {\"authorId\": \"4463314\", \"name\": \"N. Allbritton\"}, {\"authorId\": \"1397336197\", \"name\": \"Gene W. Yeo\"}], \"abstract\": null}, {\"paperId\": \"06f8fc1a54293e84c0f8b88ec53f95210a13cb9b\", \"externalIds\": {\"PubMedCentral\": \"10945338\", \"DOI\": \"10.7150/thno.91084\", \"CorpusId\": 268131839, \"PubMed\": \"38505614\"}, \"title\": \"Depletion of ApoA5 aggravates spontaneous and diet-induced nonalcoholic fatty liver disease by reducing hepatic NR1D1 in hamsters\", \"venue\": \"Theranostics\", \"year\": 2024, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.thno.org/v14p2036.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10945338, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2290128570\", \"name\": \"Jiabao Guo\"}, {\"authorId\": \"9844206\", \"name\": \"Guolin Miao\"}, {\"authorId\": \"2289243491\", \"name\": \"Wenxi Zhang\"}, {\"authorId\": \"38217907\", \"name\": \"Haozhe Shi\"}, {\"authorId\": \"2028942289\", \"name\": \"Pingping Lai\"}, {\"authorId\": \"2289313606\", \"name\": \"Yitong Xu\"}, {\"authorId\": \"2292716911\", \"name\": \"Lianxin Zhang\"}, {\"authorId\": \"2142470040\", \"name\": \"Gonglie Chen\"}, {\"authorId\": \"2289835567\", \"name\": \"Yufei Han\"}, {\"authorId\": \"2289606632\", \"name\": \"Ying Zhao\"}, {\"authorId\": \"2289237511\", \"name\": \"Geroge Liu\"}, {\"authorId\": \"2146302668\", \"name\": \"Ling Zhang\"}, {\"authorId\": \"2115768438\", \"name\": \"Yuhui Wang\"}, {\"authorId\": \"2152490833\", \"name\": \"Wei Huang\"}, {\"authorId\": \"5039659\", \"name\": \"X. Xian\"}], \"abstract\": \"Background: ApoA5 mainly synthesized and secreted by liver is a key modulator of lipoprotein lipase (LPL) activity and triglyceride-rich lipoproteins (TRLs). Although the role of ApoA5 in extrahepatic triglyceride (TG) metabolism in circulation has been well documented, the relationship between ApoA5 and nonalcoholic fatty liver disease (NAFLD) remains incompletely understood and the underlying molecular mechanism still needs to be elucidated. Methods: We used CRISPR/Cas9 gene editing to delete Apoa5 gene from Syrian golden hamster, a small rodent model replicating human metabolic features. Then, the ApoA5-deficient (ApoA5-/-) hamsters were used to investigate NAFLD with or without challenging a high fat diet (HFD). Results: ApoA5-/- hamsters exhibited hypertriglyceridemia (HTG) with markedly elevated TG levels at 2300 mg/dL and hepatic steatosis on a regular chow diet, accompanied with an increase in the expression levels of genes regulating lipolysis and small adipocytes in the adipose tissue. An HFD challenge predisposed ApoA5-/- hamsters to severe HTG (sHTG) and nonalcoholic steatohepatitis (NASH). Mechanistic studies in vitro and in vivo revealed that targeting ApoA5 disrupted NR1D1 mRNA stability in the HepG2 cells and the liver to reduce both mRNA and protein levels of NR1D1, respectively. Overexpression of human NR1D1 by adeno-associated virus 8 (AAV8) in the livers of ApoA5-/- hamsters significantly ameliorated fatty liver without affecting plasma lipid levels. Moreover, restoration of hepatic ApoA5 or activation of UCP1 in brown adipose tissue (BAT) by cold exposure or CL316243 administration could significantly correct sHTG and hepatic steatosis in ApoA5-/- hamsters. Conclusions: Our data demonstrate that HTG caused by ApoA5 deficiency in hamsters is sufficient to elicit hepatic steatosis and HFD aggravates NAFLD by reducing hepatic NR1D1 mRNA and protein levels, which provides a mechanistic link between ApoA5 and NAFLD and suggests the new insights into the potential therapeutic approaches for the treatment of HTG and the related disorders due to ApoA5 deficiency in the clinical trials in future.\"}, {\"paperId\": \"06f92bc8fd3bd3ed70abde4deb332b5f2ec65bf9\", \"externalIds\": {\"DOI\": \"10.1021/acschembio.3c00140\", \"CorpusId\": 260772884, \"PubMed\": \"37556411\"}, \"title\": \"Disrupting Protein Expression with Double-Clicked sgRNA-Cas9 Complexes: A Modular Approach to CRISPR Gene Editing.\", \"venue\": \"ACS Chemical Biology\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1021/acschembio.3c00140?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1021/acschembio.3c00140, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2214205430\", \"name\": \"Santiago Tijaro-Bulla\"}, {\"authorId\": \"15790162\", \"name\": \"E. Osman\"}, {\"authorId\": \"5988693\", \"name\": \"Chris D St Laurent\"}, {\"authorId\": \"2053539467\", \"name\": \"Kelli A. McCord\"}, {\"authorId\": \"1762391\", \"name\": \"Matthew S Macauley\"}, {\"authorId\": \"49933116\", \"name\": \"J. Gibbs\"}], \"abstract\": \"CRISPR-Cas9 is currently the most versatile technique to perform gene editing in living organisms. In this approach, the Cas9 endonuclease is guided toward its DNA target sequence by the guide RNA (gRNA). Chemical synthesis of a functional single gRNA (sgRNA) is nontrivial because of the length of the RNA strand. Recently we demonstrated that a sgRNA can be stitched together from three smaller fragments through a copper-catalyzed azide-alkyne cycloaddition, making the process highly modular. Here we further advance this approach by leveraging this modulator platform by incorporating chemically modified nucleotides at both ends of the modular sgRNA to increase resistance against ribonucleases. Modified nucleotides consisted of a 2'-O-Me group and a phosphorothioate backbone in varying number at both the 5'- and 3'-ends of the sgRNA. It was observed that three modified nucleotides at both ends of the sgRNA significantly increased the success of Cas9 in knocking out a gene of interest. Using these chemically stabilized sgRNAs facilitates multigene editing at the protein level, as demonstrated by successful knockout of both Siglec-3 and Siglec-7 using two fluorophores in conjunction with fluorescence-activated cell sorting. These results demonstrate the versatility of this modular platform for assembling sgRNAs from small, chemically modified strands to simultaneously disrupt the gene expression of two proteins.\"}, {\"paperId\": \"06fac914048bedb6ce60bcb20e2b7cb446888759\", \"externalIds\": {\"MAG\": \"2999955923\", \"DOI\": \"10.1016/j.ibmb.2020.103316\", \"CorpusId\": 210708461, \"PubMed\": \"31953191\"}, \"title\": \"Functions of duplicated glucosinolate sulfatases in the development and host adaptation of Plutella xylostella.\", \"venue\": \"Insect Biochemistry and Molecular Biology\", \"year\": 2020, \"citationCount\": 29, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ibmb.2020.103316?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ibmb.2020.103316, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2157268585\", \"name\": \"Wei Chen\"}, {\"authorId\": \"50776828\", \"name\": \"Yuhong Dong\"}, {\"authorId\": \"22230829\", \"name\": \"H. S. A. Saqib\"}, {\"authorId\": \"5122697\", \"name\": \"L. Vasseur\"}, {\"authorId\": \"152326095\", \"name\": \"Wenwu Zhou\"}, {\"authorId\": \"2149971989\", \"name\": \"Ling Zheng\"}, {\"authorId\": \"2112687348\", \"name\": \"Ying Lai\"}, {\"authorId\": \"15532177\", \"name\": \"Xiaoli Ma\"}, {\"authorId\": \"30119162\", \"name\": \"Lianyun Lin\"}, {\"authorId\": \"50180683\", \"name\": \"Xuejiao Xu\"}, {\"authorId\": \"5637645\", \"name\": \"Jianlin Bai\"}, {\"authorId\": \"153014112\", \"name\": \"Weiyi He\"}, {\"authorId\": \"145760708\", \"name\": \"M. You\"}], \"abstract\": \"Evolutionary adaptations of herbivorous insects are often dictated by the necessity to withstand a corresponding evolutionary innovation in host plant defense. Glucosinolate sulfatase (GSS) enzyme activity is considered a central adaptation strategy in Plutella xylostella against glucosinolates (GS)-myrosinase defense system in the Brassicales. The high functional versatility of sulfatases suggests that they may perform other vital roles in the process of growth and development. Here, we used a CRISPR/Cas9 system to generate stable homozygous single/double mutant lines of gss1 or/and gss2 with no predicted off-target effects, to analyze the functions of the pair of duplicated genes in the development and host adaptation of P. xylostella. The bioassays showed that, when fed on their usual artificial diet, significant reduction in egg hatching rate and final larval survival rate of the single mutant line of gss2 compared with the original strain or mutant lines of gss1, revealing unexpected functions of GSS2 in embryonic and larval development. When larvae of homozygous mutant lines were transferred onto a new food, Arabidopsis thaliana, no induced effect at protein level of GSS1/2 or gene expression level of gss1/gss2 was detected. The absence of GSS1 or GSS2 reduced the survival rate of larvae and prolonged the duration of the larval stage, indicating that both GSS1 and GSS2 played an important role in adaptation to host plants. The versatile functions of duplicated GSSs in this study provide a foundation for further research to understand potential functions of other sulfatase members and support evidence of adaptation in herbivorous insects.\"}, {\"paperId\": \"07020a4aa3d67e7440c7cd734be582dbebfc58ca\", \"externalIds\": {\"PubMedCentral\": \"10013820\", \"DOI\": \"10.1002/btm2.10381\", \"CorpusId\": 251328855, \"PubMed\": \"36925687\"}, \"title\": \"Phage engineering and phage\\u2010assisted CRISPR\\u2010Cas delivery to combat multidrug\\u2010resistant pathogens\", \"venue\": \"Bioengineering & Translational Medicine\", \"year\": 2022, \"citationCount\": 66, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/btm2.10381\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10013820, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"81219007\", \"name\": \"Khushal Khambhati\"}, {\"authorId\": \"49847953\", \"name\": \"G. Bhattacharjee\"}, {\"authorId\": \"2137427526\", \"name\": \"Nisarg Gohil\"}, {\"authorId\": \"2150223475\", \"name\": \"Gurneet Dhanoa\"}, {\"authorId\": \"48771018\", \"name\": \"Antonia P. Sagona\"}, {\"authorId\": \"4252297\", \"name\": \"I. Mani\"}, {\"authorId\": \"2151467852\", \"name\": \"Nhat Le Bui\"}, {\"authorId\": \"8236180\", \"name\": \"Dinh-Toi Chu\"}, {\"authorId\": \"1659249595\", \"name\": \"J. Karapurkar\"}, {\"authorId\": \"6673937\", \"name\": \"S. Jang\"}, {\"authorId\": \"87451482\", \"name\": \"Hee\\u2010Yong Chung\"}, {\"authorId\": \"67332099\", \"name\": \"Rupesh R. Maurya\"}, {\"authorId\": \"3720744\", \"name\": \"Khalid J. Alzahrani\"}, {\"authorId\": \"39146021\", \"name\": \"S. Ramakrishna\"}, {\"authorId\": \"143806735\", \"name\": \"Vijai Singh\"}], \"abstract\": \"Abstract Antibiotic resistance ranks among the top threats to humanity. Due to the frequent use of antibiotics, society is facing a high prevalence of multidrug resistant pathogens, which have managed to evolve mechanisms that help them evade the last line of therapeutics. An alternative to antibiotics could involve the use of bacteriophages (phages), which are the natural predators of bacterial cells. In earlier times, phages were implemented as therapeutic agents for a century but were mainly replaced with antibiotics, and considering the menace of antimicrobial resistance, it might again become of interest due to the increasing threat of antibiotic resistance among pathogens. The current understanding of phage biology and clustered regularly interspaced short palindromic repeats (CRISPR) assisted phage genome engineering techniques have facilitated to generate phage variants with unique therapeutic values. In this review, we briefly explain strategies to engineer bacteriophages. Next, we highlight the literature supporting CRISPR\\u2010Cas9\\u2010assisted phage engineering for effective and more specific targeting of bacterial pathogens. Lastly, we discuss techniques that either help to increase the fitness, specificity, or lytic ability of bacteriophages to control an infection.\"}, {\"paperId\": \"0704166c5840dcd28a46012f4cfbf6af83f789d2\", \"externalIds\": {\"DOI\": \"10.1093/biolre/ioae042\", \"CorpusId\": 268636015, \"PubMed\": \"38519102\"}, \"title\": \"Sestrin2 and Sestrin3 protect spermatogenesis against heat-induced meiotic defects\", \"venue\": \"Biology of Reproduction\", \"year\": 2024, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1093/biolre/ioae042?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/biolre/ioae042, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2190903918\", \"name\": \"Wenhui Chen\"}, {\"authorId\": \"2275794663\", \"name\": \"Mengchen Wang\"}, {\"authorId\": \"2240973388\", \"name\": \"Huan Wang\"}, {\"authorId\": \"2145193440\", \"name\": \"Yuqing Jiang\"}, {\"authorId\": \"2146270911\", \"name\": \"Jing Zhu\"}, {\"authorId\": \"2188533027\", \"name\": \"Xinxin Zeng\"}, {\"authorId\": \"2293277599\", \"name\": \"Huihui Xie\"}, {\"authorId\": \"47492297\", \"name\": \"Qingling Yang\"}, {\"authorId\": \"2145323501\", \"name\": \"Yingpu Sun\"}], \"abstract\": null}, {\"paperId\": \"0708e85569c4f6a48ce19a8abe96d4d4b9af8050\", \"externalIds\": {\"DOI\": \"10.1101/2024.09.14.613043\", \"CorpusId\": 272819973, \"PubMed\": \"39345539\"}, \"title\": \"A STAG2-PAXIP1/PAGR1 axis suppresses lung tumorigenesis\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.09.14.613043?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.09.14.613043, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1965928762\", \"name\": \"Emily L Ashkin\"}, {\"authorId\": \"2281026573\", \"name\": \"Yuning J. Tang\"}, {\"authorId\": \"2290748437\", \"name\": \"Haiqing Xu\"}, {\"authorId\": \"152987693\", \"name\": \"King L. Hung\"}, {\"authorId\": \"3381984\", \"name\": \"Julia A. Belk\"}, {\"authorId\": \"3647786\", \"name\": \"Hongchen Cai\"}, {\"authorId\": \"2280576380\", \"name\": \"Steven S. Lopez\"}, {\"authorId\": \"2316632045\", \"name\": \"D. N. Dolcen\"}, {\"authorId\": \"11188754\", \"name\": \"Jess D. Hebert\"}, {\"authorId\": \"2322529563\", \"name\": \"Rui Li\"}, {\"authorId\": \"2316632737\", \"name\": \"Paloma A. Ruiz\"}, {\"authorId\": \"2322400643\", \"name\": \"Tula Keal\"}, {\"authorId\": \"11040647\", \"name\": \"Laura Andrejka\"}, {\"authorId\": \"2302694173\", \"name\": \"Howard Y. Chang\"}, {\"authorId\": \"2242910144\", \"name\": \"D. Petrov\"}, {\"authorId\": \"31871925\", \"name\": \"Jesse R. Dixon\"}, {\"authorId\": \"2322452610\", \"name\": \"Zhichao Xu\"}, {\"authorId\": \"4162450\", \"name\": \"M. Winslow\"}], \"abstract\": null}, {\"paperId\": \"070b81e1137ecab19af57521e5c2c35814890fdc\", \"externalIds\": {\"PubMedCentral\": \"10554366\", \"DOI\": \"10.1210/jendso/bvad114.1129\", \"CorpusId\": 263701204}, \"title\": \"THU049 Growth Hormone Treatment Reverses Deficits In POU1F1 Gene Mutation\", \"venue\": \"Journal of the Endocrine Society\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1210/jendso/bvad114.1129\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10554366, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2089085409\", \"name\": \"Sarmed Al-Samerria\"}, {\"authorId\": \"2254991192\", \"name\": \"Joseph Phelan\"}, {\"authorId\": \"2255379222\", \"name\": \"Huiting Xu\"}, {\"authorId\": \"2254980809\", \"name\": \"Ariel L. Negr\\u00f3n\"}, {\"authorId\": \"6525833\", \"name\": \"F. Wondisford\"}, {\"authorId\": \"2254975469\", \"name\": \"Sally Radovick\"}], \"abstract\": \"Abstract Disclosure: S. Al-Samerria: None. J. Phelan: None. H. Xu: None. A. Negron: None. F. Wondisford: None. S. Radovick: None. Mutations in the Pit 1 gene, also known as POU1F1, have been linked to the deficient development of somatotrophs and the synthesis of growth hormone (GH) in the anterior pituitary gland. In a previous study, we reported a point mutation in the PIT1 gene caused by a substitution of a lysine (K) with a glutamic acid (E) at position 216 (K216E) on one allele in a patient presenting with combined pituitary hormone deficiency (CPHD). This patient had undetectable levels of GH, TSH, very low PRL, and severe mental retardation associated with short stature (SS). To study the effects of GH treatment on growth and metabolism in CPHD, we created a unique mouse model with the K216E mutation in the PIT1 gene using the CRISPR/Cas9 genome editing system. In this study, 4-week-old male and female homozygous mice were randomly divided into two groups. The treatment group received subcutaneous injections of GH (5 mg/g/day) for 5 consecutive days per week for 4 weeks, while the control group received saline injections on the same schedule. GH treatment significantly improved the growth and body composition of male and female mice bearing the K216E. GH treatment also increased metabolism as measured by oxygen consumption, carbon dioxide production, and energy expenditure. These effects were observed both during treatment and 4 weeks post-treatment, although some reversal of the changes in body composition was observed 4 weeks post-treatment. Our findings demonstrate the utility of this mouse model in studying the effects of GH deficiency and treatment on growth and metabolism. This model holds great promise in advancing our understanding of the underlying mechanisms of hypopituitarism and CPHD, potentially serving as a valuable tool in identifying metabolic biomarkers for these conditions. Presentation: Thursday, June 15, 2023\"}, {\"paperId\": \"070c78890336f8a9b1b38ce51947870aba3b85b4\", \"externalIds\": {\"MAG\": \"3018829855\", \"DOI\": \"10.13345/j.cjb.190333\", \"CorpusId\": 216647530, \"PubMed\": \"32347065\"}, \"title\": \"[Disruption of OsRhoGDI2 by CRISPR/Cas9 technology leads to semi-dwarf in rice].\", \"venue\": \"Sheng wu gong cheng xue bao = Chinese journal of biotechnology\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.13345/j.cjb.190333?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.13345/j.cjb.190333, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1661509795\", \"name\": \"Kaijie Wang\"}, {\"authorId\": \"1662752968\", \"name\": \"W. An\"}, {\"authorId\": \"2108146210\", \"name\": \"Yafei Liu\"}, {\"authorId\": \"2146081732\", \"name\": \"Di Liu\"}, {\"authorId\": \"2152749064\", \"name\": \"Lian-jie Feng\"}, {\"authorId\": \"2109763053\", \"name\": \"Junjie Wang\"}, {\"authorId\": \"47513642\", \"name\": \"Junjun Huang\"}, {\"authorId\": \"2110751919\", \"name\": \"Xiaofei Liu\"}, {\"authorId\": \"8151539\", \"name\": \"Weihong Liang\"}], \"abstract\": null}, {\"paperId\": \"070d748835fd7ba19f666faa13902c18221f9c13\", \"externalIds\": {\"PubMedCentral\": \"6962318\", \"MAG\": \"2999134649\", \"DOI\": \"10.1038/s41598-019-57295-w\", \"CorpusId\": 210196259, \"PubMed\": \"31941961\"}, \"title\": \"Indel locations are determined by template polarity in highly efficient in vivo CRISPR/Cas9-mediated HDR in Atlantic salmon\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-019-57295-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6962318, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5610237\", \"name\": \"A. H. Straume\"}, {\"authorId\": \"1412709761\", \"name\": \"E. Kj\\u00e6rner-Semb\"}, {\"authorId\": \"1483617558\", \"name\": \"Kai Ove Skaftnesmo\"}, {\"authorId\": \"23108819\", \"name\": \"H. G\\u00fcralp\"}, {\"authorId\": \"39743176\", \"name\": \"L. Kleppe\"}, {\"authorId\": \"6418791\", \"name\": \"A. Wargelius\"}, {\"authorId\": \"5656743\", \"name\": \"R. B. Edvardsen\"}], \"abstract\": \"Precise gene editing such as CRISPR/Cas9-mediated homology directed repair (HDR) can increase our understanding of gene function and improve traits of importance for aquaculture. This fine-tuned technology has not been developed for farmed fish including Atlantic salmon. We performed knock-in (KI) of a FLAG element in the slc45a2 gene in salmon using sense (S), anti-sense (AS) and double-stranded (ds) oligodeoxynucleotide (ODN) templates with short (24/48/84\\u2009bp) homology arms. We show in vivo ODN integration in almost all the gene edited animals, and demonstrate perfect HDR rates up to 27% in individual F0 embryos, much higher than reported previously in any fish. HDR efficiency was dependent on template concentration, but not homology arm length. Analysis of imperfect HDR variants suggest that repair occurs by synthesis-dependent strand annealing (SDSA), as we show for the first time in any species that indel location is dependent on template polarity. Correct ODN polarity can be used to avoid 5\\u2032-indels interrupting the reading frame of an inserted sequence and be of importance for HDR template design in general.\"}, {\"paperId\": \"070ee700445616d45d3aa4b66146ed5e38f01e26\", \"externalIds\": {\"MAG\": \"3044762204\", \"DOI\": \"10.1093/neuonc/noaa180\", \"CorpusId\": 220772855, \"PubMed\": \"32710757\"}, \"title\": \"Sirtuin activation targets IDH-mutant tumors.\", \"venue\": \"Neuro-Oncology\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/23/1/53/36153803/noaa180.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/neuonc/noaa180?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/neuonc/noaa180, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152617678\", \"name\": \"Julie J. Miller\"}, {\"authorId\": \"51164536\", \"name\": \"Alexandria L. Fink\"}, {\"authorId\": \"1454423582\", \"name\": \"Jack A Banagis\"}, {\"authorId\": \"50125188\", \"name\": \"H. Nagashima\"}, {\"authorId\": \"50505072\", \"name\": \"Megha Subramanian\"}, {\"authorId\": \"2115445179\", \"name\": \"Christine K. Lee\"}, {\"authorId\": \"1785404148\", \"name\": \"Lisa Melamed\"}, {\"authorId\": \"32374459\", \"name\": \"Shilpa S. Tummala\"}, {\"authorId\": \"36451667\", \"name\": \"K. Tateishi\"}, {\"authorId\": \"34972222\", \"name\": \"H. Wakimoto\"}, {\"authorId\": \"31526375\", \"name\": \"D. Cahill\"}], \"abstract\": \"BACKGROUND\\nIDH-mutant tumors exhibit an altered metabolic state and are critically dependent upon nicotinamide adenine dinucleotide (NAD+) for cellular survival. NAD+ steady-state levels can be influenced by both biosynthetic and consumptive processes. Here, we investigated activation of sirtuin (SIRT) enzymes, which consume NAD+ as a coenzyme, as a potential mechanism to reduce cellular NAD+ levels in these tumors.\\n\\n\\nMETHODS\\nThe effect of inhibition or activation of Sirtuin activity, using small molecules, CRISPR/Cas9 gene editing and inducible overexpression, was investigated in IDH-mutant tumor lines, including patient-derived IDH-mutant glioma lines.\\n\\n\\nRESULTS\\nWe found that SIRT1 activation led to marked augmentation of NAD+ depletion and accentuation of cytotoxicity, when combined with nicotinamide phosphoribosyltransferase inhibition (NAMPTi), consistent with the enzymatic activity of SIRT1 as a primary cellular NAD+ consumer in IDH-mutant cells. Activation of SIRT1 through either genetic overexpression or pharmacologic SIRT1-activating compounds (STACs), an existing class of well-tolerated drugs, led to inhibition of IDH1-mutant tumor cell growth.\\n\\n\\nCONCLUSIONS\\nActivation of SIRT1 can selectively target IDH-mutant tumors. These findings indicate that relatively non-toxic STACs, administered either alone or in combination with NAMPTi, could alter the growth trajectory of IDH-mutant gliomas, while minimizing toxicity associated with cytotoxic chemotherapeutic regimens.\"}, {\"paperId\": \"070f040d4d0b10cdf14eb75ff14c9cc530b3359e\", \"externalIds\": {\"PubMedCentral\": \"11204006\", \"DOI\": \"10.3390/ijms25126579\", \"CorpusId\": 270515719, \"PubMed\": \"38928285\"}, \"title\": \"Compensatory Modulation of Seed Storage Protein Synthesis and Alteration of Starch Accumulation by Selective Editing of 13 kDa Prolamin Genes by CRISPR-Cas9 in Rice\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2024, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/25/12/6579/pdf?version=1718365698\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11204006, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269521816\", \"name\": \"Hue Anh Pham\"}, {\"authorId\": \"6761776\", \"name\": \"Kyoungwon Cho\"}, {\"authorId\": \"49656178\", \"name\": \"A. D. Tran\"}, {\"authorId\": \"2269572399\", \"name\": \"Deepanwita Chandra\"}, {\"authorId\": \"2306658775\", \"name\": \"Jinpyo So\"}, {\"authorId\": \"2306708049\", \"name\": \"Hanh Thi Thuy Nguyen\"}, {\"authorId\": \"80024799\", \"name\": \"H. Sang\"}, {\"authorId\": \"2269684979\", \"name\": \"Jong-Yeol Lee\"}, {\"authorId\": \"2269503864\", \"name\": \"Oksoo Han\"}], \"abstract\": \"Rice prolamins are categorized into three groups by molecular size (10, 13, or 16 kDa), while the 13 kDa prolamins are assigned to four subgroups (Pro13a-I, Pro13a-II, Pro13b-I, and Pro13b-II) based on cysteine residue content. Since lowering prolamin content in rice is essential to minimize indigestion and allergy risks, we generated four knockout lines using CRISPR-Cas9, which selectively reduced the expression of a specific subgroup of the 13 kDa prolamins. These four mutant rice lines also showed the compensatory expression of glutelins and non-targeted prolamins and were accompanied by low grain weight, altered starch content, and atypically-shaped starch granules and protein bodies. Transcriptome analysis identified 746 differentially expressed genes associated with 13 kDa prolamins during development. Correlation analysis revealed negative associations between genes in Pro13a-I and those in Pro13a-II and Pro13b-I/II subgroups. Furthermore, alterations in the transcription levels of 9 ER stress and 17 transcription factor genes were also observed in mutant rice lines with suppressed expression of 13 kDa prolamin. Our results provide profound insight into the functional role of 13 kDa rice prolamins in the regulatory mechanisms underlying rice seed development, suggesting their promising potential application to improve nutritional and immunological value.\"}, {\"paperId\": \"071319b8f00e579690fc50ac9e86443172382810\", \"externalIds\": {\"DOI\": \"10.1016/j.aquaculture.2022.738988\", \"CorpusId\": 253197352}, \"title\": \"Generation of myostatin gene-edited blotched snakehead (Channa maculata) using CRISPR/Cas9 system\", \"venue\": \"Aquaculture\", \"year\": 2022, \"citationCount\": 18, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.aquaculture.2022.738988?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.aquaculture.2022.738988, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"41229397\", \"name\": \"Mi Ou\"}, {\"authorId\": \"1441572575\", \"name\": \"Fangnan Wang\"}, {\"authorId\": \"153141930\", \"name\": \"Kaibin Li\"}, {\"authorId\": \"2209858963\", \"name\": \"Yuxia Wu\"}, {\"authorId\": \"4532132\", \"name\": \"Sujing Huang\"}, {\"authorId\": \"2074294675\", \"name\": \"Q. Luo\"}, {\"authorId\": \"2115376265\", \"name\": \"Haiyang Liu\"}, {\"authorId\": \"2258290019\", \"name\": \"Xincheng Zhang\"}, {\"authorId\": \"41131344\", \"name\": \"Shuzhan Fei\"}, {\"authorId\": \"8336624\", \"name\": \"Kunci Chen\"}, {\"authorId\": \"2143572917\", \"name\": \"Jian Zhao\"}], \"abstract\": null}, {\"paperId\": \"07147464347c2a3dd610c4d233bffb3907069603\", \"externalIds\": {\"PubMedCentral\": \"10395877\", \"DOI\": \"10.1371/journal.pbio.3001888\", \"CorpusId\": 260062347, \"PubMed\": \"37478130\"}, \"title\": \"Highly efficient CRISPR-mediated gene editing in a rotifer\", \"venue\": \"PLoS Biology\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosbiology/article/file?id=10.1371/journal.pbio.3001888&type=printable\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10395877, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152557056\", \"name\": \"Haiyang Feng\"}, {\"authorId\": \"2189023622\", \"name\": \"Gemma Bavister\"}, {\"authorId\": \"5400970\", \"name\": \"K. Gribble\"}, {\"authorId\": \"2352779\", \"name\": \"D. M. Mark Welch\"}], \"abstract\": \"Rotifers have been studied in the laboratory and field for over 100 years in investigations of microevolution, ecological dynamics, and ecotoxicology. In recent years, rotifers have emerged as a model system for modern studies of the molecular mechanisms of genome evolution, development, DNA repair, aging, life history strategy, and desiccation tolerance. However, a lack of gene editing tools and transgenic strains has limited the ability to link genotype to phenotype and dissect molecular mechanisms. To facilitate genetic manipulation and the creation of reporter lines in rotifers, we developed a protocol for highly efficient, transgenerational, CRISPR-mediated gene editing in the monogonont rotifer Brachionus manjavacas by microinjection of Cas9 protein and synthetic single-guide RNA into the vitellaria of young amictic (asexual) females. To demonstrate the efficacy of the method, we created knockout mutants of the developmental gene vasa and the DNA mismatch repair gene mlh3. More than half of mothers survived injection and produced offspring. Genotyping these offspring and successive generations revealed that most carried at least 1 CRISPR-induced mutation, with many apparently mutated at both alleles. In addition, we achieved precise CRISPR-mediated knock-in of a stop codon cassette in the mlh3 locus, with half of injected mothers producing F2 offspring with an insertion of the cassette. Thus, this protocol produces knockout and knock-in CRISPR/Cas9 editing with high efficiency, to further advance rotifers as a model system for biological discovery.\"}, {\"paperId\": \"0714c169a726e0b98a8f24d779e70086a7866f72\", \"externalIds\": {\"PubMedCentral\": \"10420852\", \"DOI\": \"10.3390/plants12152799\", \"CorpusId\": 260307241, \"PubMed\": \"37570953\"}, \"title\": \"Enhancing Maize Transformation and Targeted Mutagenesis through the Assistance of Non-Integrating Wus2 Vector\", \"venue\": \"Plants\", \"year\": 2023, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2223-7747/12/15/2799/pdf?version=1690532826\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10420852, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2111621399\", \"name\": \"Minjeong Kang\"}, {\"authorId\": \"6354174\", \"name\": \"Keunsub Lee\"}, {\"authorId\": \"50426441\", \"name\": \"Q. Ji\"}, {\"authorId\": \"5959968\", \"name\": \"Sehiza Grosic\"}, {\"authorId\": \"40636671\", \"name\": \"Kan Wang\"}], \"abstract\": \"Efficient genetic transformation is a prerequisite for rapid gene functional analyses and crop trait improvements. We recently demonstrated that new T-DNA binary vectors with NptII/G418 selection and a compatible helper plasmid can efficiently transform maize inbred B104 using our rapid Agrobacterium-mediated transformation method. In this work, we implemented the non-integrating Wuschel2 (Wus2) T-DNA vector method for Agrobacterium-mediated B104 transformation and tested its potential for recalcitrant inbred B73 transformation and gene editing. The non-integrating Wus2 (NIW) T-DNA vector-assisted transformation method uses two Agrobacterium strains: one carrying a gene-of-interest (GOI) construct and the other providing an NIW construct. To monitor Wus2 co-integration into the maize genome, we combined the maize Wus2 expression cassette driven by a strong constitutive promoter with a new visible marker RUBY, which produces the purple pigment betalain. As a GOI construct, we used a previously tested CRISPR-Cas9 construct pKL2359 for Glossy2 gene mutagenesis. When both GOI and NIW constructs were delivered by LBA4404Thy- strain, B104 transformation frequency was significantly enhanced by about two-fold (10% vs. 18.8%). Importantly, we were able to transform a recalcitrant inbred B73 using the NIW-assisted transformation method and obtained three transgene-free edited plants by omitting the selection agent G418. These results suggest that NIW-assisted transformation can improve maize B104 transformation frequency and provide a novel option for CRISPR technology for transgene-free genome editing.\"}, {\"paperId\": \"07172b9e2354d9705d60a3567ac0d7288df331a0\", \"externalIds\": {\"MAG\": \"3021143014\", \"DOI\": \"10.1038/s41434-020-0153-9\", \"CorpusId\": 217191720, \"PubMed\": \"32355226\"}, \"title\": \"Advances in genome editing: the technology of choice for precise and efficient \\u03b2-thalassemia treatment\", \"venue\": \"Gene Therapy\", \"year\": 2020, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41434-020-0153-9.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41434-020-0153-9?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41434-020-0153-9, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4241737\", \"name\": \"Gibran Ali\"}, {\"authorId\": \"32806406\", \"name\": \"M. Tariq\"}, {\"authorId\": \"1388156395\", \"name\": \"Kamran Shahid\"}, {\"authorId\": \"7631789\", \"name\": \"F. J. Ahmad\"}, {\"authorId\": \"46857816\", \"name\": \"J. Akram\"}], \"abstract\": null}, {\"paperId\": \"0718d988af6b700734ae51d52366df9e550e785c\", \"externalIds\": {\"PubMedCentral\": \"10178544\", \"DOI\": \"10.3390/ijms24097786\", \"CorpusId\": 258345804, \"PubMed\": \"37175493\"}, \"title\": \"Effect of Lacking ZKSCAN3 on Autophagy, Lysosomal Biogenesis and Senescence\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/24/9/7786/pdf?version=1682345106\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10178544, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2266880818\", \"name\": \"Xiao-Min Li\"}, {\"authorId\": \"2151720989\", \"name\": \"Jun-Hao Wen\"}, {\"authorId\": \"2215429767\", \"name\": \"Ze-Sen Feng\"}, {\"authorId\": \"2144364597\", \"name\": \"Yun-Shan Wu\"}, {\"authorId\": \"29377761\", \"name\": \"Dong-Yi Li\"}, {\"authorId\": \"2153545557\", \"name\": \"Shan Liang\"}, {\"authorId\": \"2216043595\", \"name\": \"Dan Wu\"}, {\"authorId\": \"11411079\", \"name\": \"Hongluan Wu\"}, {\"authorId\": \"3232215\", \"name\": \"Shang-mei Li\"}, {\"authorId\": \"47051210\", \"name\": \"Zhennan Ye\"}, {\"authorId\": \"39516408\", \"name\": \"Chen Yang\"}, {\"authorId\": \"41191188\", \"name\": \"Lin Sun\"}, {\"authorId\": \"2170562128\", \"name\": \"Ji-Xin Tang\"}, {\"authorId\": \"2155337748\", \"name\": \"Hua-Feng Liu\"}], \"abstract\": \"Transcription factors can affect autophagy activity by promoting or inhibiting the expression of autophagic and lysosomal genes. As a member of the zinc finger family DNA-binding proteins, ZKSCAN3 has been reported to function as a transcriptional repressor of autophagy, silencing of which can induce autophagy and promote lysosomal biogenesis in cancer cells. However, studies in Zkscan3 knockout mice showed that the deficiency of ZKSCAN3 did not induce autophagy or increase lysosomal biogenesis. In order to further explore the role of ZKSCAN3 in the transcriptional regulation of autophagic genes in human cancer and non-cancer cells, we generated ZKSCAN3 knockout HK-2 (non-cancer) and Hela (cancer) cells via the CRISPR/Cas9 system and analyzed the differences in gene expression between ZKSCAN3 deleted cells and non-deleted cells through fluorescence quantitative PCR, western blot and transcriptome sequencing, with special attention to the differences in expression of autophagic and lysosomal genes. We found that ZKSCAN3 may be a cancer-related gene involved in cancer progression, but not an essential transcriptional repressor of autophagic or lysosomal genes, as the lacking of ZKSCAN3 cannot significantly promote the expression of autophagic and lysosomal genes.\"}, {\"paperId\": \"071c299e6e349120fee8f432286b5fca01c2745e\", \"externalIds\": {\"PubMedCentral\": \"7109120\", \"MAG\": \"3014348681\", \"DOI\": \"10.1038/s41467-020-15347-0\", \"CorpusId\": 214715212, \"PubMed\": \"32235893\"}, \"title\": \"Publisher Correction: A CRISPR-Cas9-based reporter system for single-cell detection of extracellular vesicle-mediated functional transfer of RNA\", \"venue\": \"Nature Communications\", \"year\": 2020, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1038/s41467-020-15347-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7109120, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4581407\", \"name\": \"O. G. de Jong\"}, {\"authorId\": \"145565430\", \"name\": \"Daniel E. Murphy\"}, {\"authorId\": \"6027904\", \"name\": \"Imre M\\u00e4ger\"}, {\"authorId\": \"10716258\", \"name\": \"Eduard Willms\"}, {\"authorId\": \"1509982317\", \"name\": \"Antonio Garcia-Guerra\"}, {\"authorId\": \"1397976093\", \"name\": \"Jerney J. Gitz-Francois\"}, {\"authorId\": \"1509982894\", \"name\": \"J. Lefferts\"}, {\"authorId\": \"16453163\", \"name\": \"Dhanu Gupta\"}, {\"authorId\": \"50823687\", \"name\": \"S. Steenbeek\"}, {\"authorId\": \"7342301\", \"name\": \"J. van Rheenen\"}, {\"authorId\": \"119634279\", \"name\": \"S. El Andaloussi\"}, {\"authorId\": \"2091968\", \"name\": \"R. Schiffelers\"}, {\"authorId\": \"145720617\", \"name\": \"M. Wood\"}, {\"authorId\": \"3943926\", \"name\": \"P. Vader\"}], \"abstract\": \"An amendment to this paper has been published and can be accessed via a link at the top of the paper.\"}, {\"paperId\": \"071e7b65e6909fcfe0fe4f5a929a90e3dbf96bf1\", \"externalIds\": {\"PubMedCentral\": \"7708045\", \"MAG\": \"3102104161\", \"DOI\": \"10.1093/nar/gkaa1051\", \"CorpusId\": 226988300, \"PubMed\": \"33196849\"}, \"title\": \"Generation of onco-enhancer enhances chromosomal remodeling and accelerates tumorigenesis\", \"venue\": \"Nucleic Acids Research\", \"year\": 2020, \"citationCount\": 22, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/nar/article-pdf/48/21/12135/34658822/gkaa1051.pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7708045, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7743979\", \"name\": \"P. Chai\"}, {\"authorId\": \"2116457497\", \"name\": \"Jie Yu\"}, {\"authorId\": \"49777254\", \"name\": \"R. Jia\"}, {\"authorId\": \"6757293\", \"name\": \"Xu-yang Wen\"}, {\"authorId\": \"72104583\", \"name\": \"Tianyi Ding\"}, {\"authorId\": \"2115797500\", \"name\": \"Xiaoyu Zhang\"}, {\"authorId\": \"2056411017\", \"name\": \"Hongyan Ni\"}, {\"authorId\": \"1772223\", \"name\": \"Renbing Jia\"}, {\"authorId\": \"3019081\", \"name\": \"S. Ge\"}, {\"authorId\": \"48212903\", \"name\": \"He Zhang\"}, {\"authorId\": \"1701495\", \"name\": \"Xianqun Fan\"}], \"abstract\": \"Abstract Chromatin remodeling impacts the structural neighborhoods and regulates gene expression. However, the role of enhancer-guided chromatin remodeling in the gene regulation remains unclear. Here, using RNA-seq and ChIP-seq, we identified for the first time that neurotensin (NTS) serves as a key oncogene in uveal melanoma and that CTCF interacts with the upstream enhancer of NTS and orchestrates an 800 kb chromosomal loop between the promoter and enhancer. Intriguingly, this novel CTCF-guided chromatin loop was ubiquitous in a cohort of tumor patients. In addition, a disruption in this chromosomal interaction prevented the histone acetyltransferase EP300 from embedding in the promoter of NTS and resulted in NTS silencing. Most importantly, in vitro and in vivo experiments showed that the ability of tumor formation was significantly suppressed via deletion of the enhancer by CRISPR-Cas9. These studies delineate a novel onco-enhancer guided epigenetic mechanism and provide a promising therapeutic concept for disease therapy.\"}, {\"paperId\": \"071ec1fcbd18cd734e6979c519316a78585f5762\", \"externalIds\": {\"DOI\": \"10.1002/adhm.202304525\", \"CorpusId\": 267200423, \"PubMed\": \"38563726\"}, \"title\": \"Exploring Mechanisms of Lipid Nanoparticle-Mucus Interactions in Healthy and Cystic Fibrosis Conditions\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/adhm.202304525\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/adhm.202304525?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/adhm.202304525, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2265178213\", \"name\": \"Belal Tafech\"}, {\"authorId\": \"93464451\", \"name\": \"M. Rokhforouz\"}, {\"authorId\": \"2280917812\", \"name\": \"Jerry Leung\"}, {\"authorId\": \"2280916604\", \"name\": \"Molly M H Sung\"}, {\"authorId\": \"2281620374\", \"name\": \"Paulo J C Lin\"}, {\"authorId\": \"2280918790\", \"name\": \"Don D Sin\"}, {\"authorId\": \"2360668153\", \"name\": \"D. Lauster\"}, {\"authorId\": \"2290287728\", \"name\": \"Stephan Block\"}, {\"authorId\": \"2280917176\", \"name\": \"Bradley S. Quon\"}, {\"authorId\": \"2280915907\", \"name\": \"Ying K. Tam\"}, {\"authorId\": \"2265177282\", \"name\": \"P. Cullis\"}, {\"authorId\": \"2280945238\", \"name\": \"James J. Feng\"}, {\"authorId\": \"10744353\", \"name\": \"S. Hedtrich\"}], \"abstract\": \"Mucus forms the first defense line of human lungs, and as such hampers the efficient delivery of therapeutics to the underlying epithelium. This holds particularly true for genetic cargo such as CRISPR-based gene editing tools which cannot readily surmount the mucosal barrier. While lipid nanoparticles (LNPs) emerged as versatile non-viral gene delivery systems that could help overcome the delivery challenge, many knowledge gaps remain, especially for diseased states such as cystic fibrosis (CF). This study provides fundamental insights into Cas9 mRNA or ribonucleoprotein-loaded LNP-mucus interactions in healthy and diseased states by assessing the impact of the genetic cargo, mucin sialylation, mucin concentration, ionic strength, pH, and polyethylene glycol (PEG) concentration and nature on LNP diffusivity leveraging experimental approaches and Brownian dynamics simulations. Taken together, this study identifies key mucus and LNP characteristics that are critical to enabling a rational LNP design for transmucosal delivery. Graphical Abstract\"}, {\"paperId\": \"071ee1331114b50a83f29323bbb670b5d9b0734d\", \"externalIds\": {\"MAG\": \"3013045622\", \"DOI\": \"10.1126/scitranslmed.aay0271\", \"CorpusId\": 214671589, \"PubMed\": \"32213627\"}, \"title\": \"Applying genome-wide CRISPR-Cas9 screens for therapeutic discovery in facioscapulohumeral muscular dystrophy\", \"venue\": \"Science Translational Medicine\", \"year\": 2020, \"citationCount\": 56, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7304480\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/scitranslmed.aay0271?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/scitranslmed.aay0271, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143830510\", \"name\": \"A. Lek\"}, {\"authorId\": \"2598717\", \"name\": \"Yuanfan Zhang\"}, {\"authorId\": \"8562426\", \"name\": \"K. Woodman\"}, {\"authorId\": \"1595929810\", \"name\": \"Shushu Huang\"}, {\"authorId\": \"5526221\", \"name\": \"A. DeSimone\"}, {\"authorId\": \"2111113645\", \"name\": \"Justin Cohen\"}, {\"authorId\": \"2068675599\", \"name\": \"Vincent Ho\"}, {\"authorId\": \"143849358\", \"name\": \"J. Conner\"}, {\"authorId\": \"28227879\", \"name\": \"Lillian Mead\"}, {\"authorId\": \"5663423\", \"name\": \"Andrew Kodani\"}, {\"authorId\": \"133643202\", \"name\": \"A. Paku\\u0142a\"}, {\"authorId\": \"2353462\", \"name\": \"Neville E. Sanjana\"}, {\"authorId\": \"2686956\", \"name\": \"O. King\"}, {\"authorId\": \"144012630\", \"name\": \"Peter L Jones\"}, {\"authorId\": \"2182725\", \"name\": \"K. Wagner\"}, {\"authorId\": \"3015823\", \"name\": \"M. Lek\"}, {\"authorId\": \"1977140420\", \"name\": \"L. Kunkel\"}], \"abstract\": \"Genome-wide CRISPR-Cas9 screens identify druggable pathways associated with facioscapulohumeral muscular dystrophy. Screening for survival Facioscapulohumeral muscular dystrophy (FSHD) is caused by altered expression of DUX4, a gene important during development that is not usually present in adult cells. In FSHD skeletal muscle, activation of DUX4 leads to apoptosis. To identify potential targets that mediate DUX4-induced cell death, Lek et al. performed an unbiased screen using CRISPR-Cas9. Hypoxia signaling emerged as a target, and treating patient cells and zebrafish models of FSHD with inhibitors of hypoxia signaling reduced cell death and expression of DUX4 target genes and improved structural defects and muscle function. Results demonstrate the utility of this CRISPR-Cas9 screen for identifying putative therapeutic targets for FSHD. The emergence of CRISPR-Cas9 gene-editing technologies and genome-wide CRISPR-Cas9 libraries enables efficient unbiased genetic screening that can accelerate the process of therapeutic discovery for genetic disorders. Here, we demonstrate the utility of a genome-wide CRISPR-Cas9 loss-of-function library to identify therapeutic targets for facioscapulohumeral muscular dystrophy (FSHD), a genetically complex type of muscular dystrophy for which there is currently no treatment. In FSHD, both genetic and epigenetic changes lead to misexpression of DUX4, the FSHD causal gene that encodes the highly cytotoxic DUX4 protein. We performed a genome-wide CRISPR-Cas9 screen to identify genes whose loss-of-function conferred survival when DUX4 was expressed in muscle cells. Genes emerging from our screen illuminated a pathogenic link to the cellular hypoxia response, which was revealed to be the main driver of DUX4-induced cell death. Application of hypoxia signaling inhibitors resulted in increased DUX4 protein turnover and subsequent reduction of the cellular hypoxia response and cell death. In addition, these compounds proved successful in reducing FSHD disease biomarkers in patient myogenic lines, as well as improving structural and functional properties in two zebrafish models of FSHD. Our genome-wide perturbation of pathways affecting DUX4 expression has provided insight into key drivers of DUX4-induced pathogenesis and has identified existing compounds with potential therapeutic benefit for FSHD. Our experimental approach presents an accelerated paradigm toward mechanistic understanding and therapeutic discovery of a complex genetic disease, which may be translatable to other diseases with well-established phenotypic selection assays.\"}, {\"paperId\": \"072128acb74aebcbed30b8b88281ae9ee47083a0\", \"externalIds\": {\"DOI\": \"10.1007/s10120-020-01146-5\", \"CorpusId\": 230076533, \"PubMed\": \"33386473\"}, \"title\": \"Alteration in stemness causes exclusivity between Epstein\\u2013Barr virus-positivity and microsatellite instability status in gastric cancer\", \"venue\": \"Gastric Cancer\", \"year\": 2021, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s10120-020-01146-5.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10120-020-01146-5?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10120-020-01146-5, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2108359614\", \"name\": \"Younghoon Kim\"}, {\"authorId\": \"144590571\", \"name\": \"Yunjoo Shin\"}, {\"authorId\": \"7622454\", \"name\": \"Xianyu Wen\"}, {\"authorId\": \"121835140\", \"name\": \"N. Cho\"}, {\"authorId\": \"2109040825\", \"name\": \"Meihui Li\"}, {\"authorId\": \"1391191603\", \"name\": \"Yun-Jee Kim\"}, {\"authorId\": \"5944849\", \"name\": \"Sang-Hyun Song\"}, {\"authorId\": \"5424708\", \"name\": \"G. Kang\"}], \"abstract\": null}, {\"paperId\": \"07215dae92a6df560a2b180c1eab227b6ae45764\", \"externalIds\": {\"PubMedCentral\": \"10634985\", \"DOI\": \"10.1101/2023.10.31.564884\", \"CorpusId\": 264974629, \"PubMed\": \"37961430\"}, \"title\": \"Legionella pneumophila exploits the endo-lysosomal network for phagosome biogenesis by co-opting SUMOylated Rab7\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10634985\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10634985, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2264963996\", \"name\": \"Chuang Li\"}, {\"authorId\": \"2153080913\", \"name\": \"Jiaqi Fu\"}, {\"authorId\": \"2265113644\", \"name\": \"Shuai Shao\"}, {\"authorId\": \"2243950729\", \"name\": \"Zhao-qing Luo\"}], \"abstract\": \"L. pneumophila strains harboring wild-type rpsL such as Lp02rpsLWT cannot replicate in mouse bone marrow-derived macrophages (BMDMs) due to induction of extensive lysosome damage and apoptosis. The mechanism of this unique infection-induced cell death remains unknown. Using a genome-wide CRISPR/Cas9 screening, we identified Hmg20a and Nol9 as host factors important for restricting strain Lp02rpsLWT in BMDMs. Depletion of Hmg20a protects macrophages from infection-induced lysosomal damage and apoptosis, allowing productive bacterial replication. The restriction imposed by Hmg20a was mediated by repressing the expression of several endo-lysosomal proteins, including the small GTPase Rab7. We found that SUMOylated Rab7 is recruited to the bacterial phagosome via SulF, a Dot/Icm effector that harbors a SUMO-interacting motif (SIM). Moreover, overexpression of Rab7 rescues intracellular growth of strain Lp02rpsLWT in BMDMs. Our results establish that L. pneumophila exploits the lysosomal network for the biogenesis of its phagosome in BMDMs.\"}, {\"paperId\": \"072303832e2d19606c6ab93d109b5ca976aa46ea\", \"externalIds\": {\"PubMedCentral\": \"10402658\", \"DOI\": \"10.1093/hr/uhad119\", \"CorpusId\": 259800888, \"PubMed\": \"37547730\"}, \"title\": \"Role of BraRGL1 in regulation of Brassica rapa bolting and flowering\", \"venue\": \"Horticulture Research\", \"year\": 2023, \"citationCount\": 23, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hr/advance-article-pdf/doi/10.1093/hr/uhad119/50514079/uhad119.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10402658, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2154558750\", \"name\": \"Yudan Wang\"}, {\"authorId\": \"48256848\", \"name\": \"Shiwei Song\"}, {\"authorId\": \"7033241\", \"name\": \"Yanwei Hao\"}, {\"authorId\": \"48240217\", \"name\": \"Changming Chen\"}, {\"authorId\": \"9284743\", \"name\": \"X. Ou\"}, {\"authorId\": \"2216806509\", \"name\": \"Bin He\"}, {\"authorId\": \"2357678430\", \"name\": \"Jiewen Zhang\"}, {\"authorId\": \"79099869\", \"name\": \"Zhehao Jiang\"}, {\"authorId\": \"2223021385\", \"name\": \"Chengming Li\"}, {\"authorId\": \"2155803186\", \"name\": \"Shuai Zhang\"}, {\"authorId\": \"2113766874\", \"name\": \"W. Su\"}, {\"authorId\": \"2108279439\", \"name\": \"R. Chen\"}], \"abstract\": \"Abstract Gibberellin (GA) plays a major role in controlling Brassica rapa stalk development. As an essential negative regulator of GA signal transduction, DELLA proteins may exert significant effects on stalk development. However, the regulatory mechanisms underlying this regulation remain unclear. In this study, we report highly efficient and inheritable mutagenesis using the CRISPR/Cas9 gene editing system in BraPDS (phytoene desaturase) and BraRGL1 (key DELLA protein) genes. We observed a loss-of-function mutation in BraRGL1 due to two amino acids in GRAS domain. The flower bud differentiation and bolting time of BraRGL1 mutants were significantly advanced. The expression of GA-regulatory protein (BraGASA6), flowering related genes (BraSOC1, BraLFY), expansion protein (BraEXPA11) and xyloglucan endotransferase (BraXTH3) genes was also significantly upregulated in these mutants. BraRGL1-overexpressing plants displayed the contrasting phenotypes. BraRGL1 mutants were more sensitive to GA signaling. BraRGL1 interacted with BraSOC1, and the interaction intensity decreased after GA3 treatment. In addition, BraRGL1 inhibited the transcription-activation ability of BraSOC1 for BraXTH3 and BraLFY genes, but the presence of GA3 enhanced the activation ability of BraSOC1, suggesting that the BraRGL1-BraSOC1 module regulates bolting and flowering of B. rapa through GA signal transduction. Thus, we hypothesized that BraRGL1 is degraded, and BraSOC1 is released in the presence of GA3, which promotes the expression of BraXTH3 and BraLFY, thereby inducing stalk development in B. rapa. Further, the BraRGL1-M mutant promoted the flower bud differentiation without affecting the stalk quality. Thus, BraRGL1 can serve as a valuable target for the molecular breeding of early maturing varieties.\"}, {\"paperId\": \"0724ad903ca671bc3e5ea45fc72580e9673f7e55\", \"externalIds\": {\"PubMedCentral\": \"10815272\", \"DOI\": \"10.3390/ijms25020823\", \"CorpusId\": 266915312, \"PubMed\": \"38255897\"}, \"title\": \"CRISPR/Cas9 as a Mutagenic Factor\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2024, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/25/2/823/pdf?version=1704797880\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10815272, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2225916005\", \"name\": \"A. R. Shumega\"}, {\"authorId\": \"2926202\", \"name\": \"Y. Pavlov\"}, {\"authorId\": \"52225878\", \"name\": \"A. V. Chirinskaite\"}, {\"authorId\": \"33762061\", \"name\": \"A. Rubel\"}, {\"authorId\": \"2247084547\", \"name\": \"S. G. Inge-Vechtomov\"}, {\"authorId\": \"6055531\", \"name\": \"E. Stepchenkova\"}], \"abstract\": \"The discovery of the CRISPR/Cas9 microbial adaptive immune system has revolutionized the field of genetics, by greatly enhancing the capacity for genome editing. CRISPR/Cas9-based editing starts with DNA breaks (or other lesions) predominantly at target sites and, unfortunately, at off-target genome sites. DNA repair systems differing in accuracy participate in establishing desired genetic changes but also introduce unwanted mutations, that may lead to hereditary, oncological, and other diseases. New approaches to alleviate the risks associated with genome editing include attenuating the off-target activity of editing complex through the use of modified forms of Cas9 nuclease and single guide RNA (sgRNA), improving delivery methods for sgRNA/Cas9 complex, and directing DNA lesions caused by the sgRNA/Cas9 to non-mutagenic repair pathways. Here, we have described CRISPR/Cas9 as a new powerful mutagenic factor, discussed its mutagenic properties, and reviewed factors influencing the mutagenic activity of CRISPR/Cas9.\"}, {\"paperId\": \"07250d2f82956ace69e57769627005592fe143cb\", \"externalIds\": {\"PubMedCentral\": \"7340682\", \"MAG\": \"3040759425\", \"DOI\": \"10.1186/s43141-020-00036-8\", \"CorpusId\": 220412246, \"PubMed\": \"32638190\"}, \"title\": \"The present and potential future methods for delivering CRISPR/Cas9 components in plants\", \"venue\": \"Journal of Genetic Engineering and Biotechnology\", \"year\": 2020, \"citationCount\": 103, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jgeb.springeropen.com/track/pdf/10.1186/s43141-020-00036-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7340682, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"88767042\", \"name\": \"Dulam Sandhya\"}, {\"authorId\": \"90026909\", \"name\": \"Phanikanth Jogam\"}, {\"authorId\": \"35316420\", \"name\": \"V. R. Allini\"}, {\"authorId\": \"5133739\", \"name\": \"S. Abbagani\"}, {\"authorId\": \"3969149\", \"name\": \"Anshu Alok\"}], \"abstract\": \"CRISPR/Cas9 genome editing technology is a DNA manipulation tool for trait improvement. This technology has been demonstrated and successfully applied to edit the genome in various species of plants. The delivery of CRISPR/Cas9 components within rigid plant cells is very crucial for high editing efficiency. Here, we insight the strengths and weaknesses of each method of delivery. The mutation efficiency of genome editing may vary and affected by different factors. Out of various factors, the delivery of CRISPR/Cas9 components into cells and genome is vital. The way of delivery defines whether the edited plant is transgenic or transgene-free. In many countries, the transgenic approach of improvement is a significant limitation in the regulatory approval of genetically modified crops. Gene editing provides an opportunity for generating transgene-free edited genome of the plant. Nevertheless, the mode of delivery of the CRISPR/Cas9 component is of crucial importance for genome modification in plants. Different delivery methods such as Agrobacterium-mediated, bombardment or biolistic method, floral-dip, and PEG-mediated protoplast are frequently applied to crops for efficient genome editing. We have reviewed different delivery methods with prons and cons for genome editing in plants. A novel nanoparticle and pollen magnetofection-mediated delivery systems which would be very useful in the near future. Further, the factors affecting editing efficiency, such as the promoter, transformation method, and selection pressure, are discussed in the present review.\"}, {\"paperId\": \"0729343d30421fc614fa383e8aaff89974035e77\", \"externalIds\": {\"DOI\": \"10.4049/jimmunol.212.supp.0445.5642\", \"CorpusId\": 273930797}, \"title\": \"CRISPR Screens Identify Key Regulators of NK Cell Cytotoxicity in Cancer Therapy\", \"venue\": \"Journal of Immunology\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4049/jimmunol.212.supp.0445.5642?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4049/jimmunol.212.supp.0445.5642, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"89247827\", \"name\": \"L. Rethacker\"}, {\"authorId\": \"143961820\", \"name\": \"H. Rom\\u00e9ro\"}, {\"authorId\": \"2306744335\", \"name\": \"Joshua Dulong\"}, {\"authorId\": \"2257835491\", \"name\": \"Marc Sasseville\"}, {\"authorId\": \"38309821\", \"name\": \"Marie-Eve Lalonde\"}, {\"authorId\": \"2329948696\", \"name\": \"C. Gadoury\"}, {\"authorId\": \"3436011\", \"name\": \"K. B\\u00e9land\"}, {\"authorId\": \"2253349071\", \"name\": \"Christian Beaus\\u00e9jour\"}, {\"authorId\": \"3414340\", \"name\": \"R. Marcotte\"}, {\"authorId\": \"2249549485\", \"name\": \"Elie Haddad\"}], \"abstract\": \"\\n Natural Killer (NK) cells are innate lymphocytes that exhibit cytotoxic activity against cancer cells and are associated with a good prognosis when present in solid tumors. In the past, NK cells have been used in adoptive cell transfer to treat various cancers with modest relative success. More recently, NK cells modified with chimeric antigen receptor (CAR-NK cells) are being explored as a potential off-the-shelf therapy. However, mechanisms preventing the full cytotoxic anti-tumor activity of NK cells remain understudied.\\n To unveil the key genes that govern the activation and inhibition of the cytotoxic activity of NK cells towards cancer cells, we performed whole-genome CRISPR screens in NK cells. Primary activated NK cells from the NK-cell Activation and Expansion System (NKAES) were transduced with the Yusa CRISPR library and then electroporated with Cas9 protein, inducing the knockout (KO) of 18,010 genes. These NK cells were exposed to the colorectal cancer cell line HT-29 for 4 hours. After co-culture, NK cells were sorted based on the expression of the degranulation marker CD107a and the production of IFNg, both associated with NK cell activation. To identify genes involved in the inhibition of NK cell activity, we will compare sgRNA enriched in CD107a+ and IFNg+ cells to unactivated negative cells.\\n In turn, these genes can be therapeutically targeted or genetically modified in future iPSC-derived NK and CAR-NK cells to improve the outcome of cancer patients.\"}, {\"paperId\": \"0729d643ee031d1dc5fcf60443416a753deacd77\", \"externalIds\": {\"DOI\": \"10.51470/psa.2021.6.3.01\", \"CorpusId\": 275084973}, \"title\": \"Genomic Innovations in Sustainable Agriculture: Exploring Plant Breeding and Genetic Advancements\", \"venue\": \"Plant Science Archives\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.51470/psa.2021.6.3.01?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.51470/psa.2021.6.3.01, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2326351714\", \"name\": \"K. Saravanan\"}, {\"authorId\": \"2326354614\", \"name\": \"S. Vennila\"}, {\"authorId\": \"2326351301\", \"name\": \"S. Suganthi\"}, {\"authorId\": \"2326354541\", \"name\": \"R. Bhuvaneswari\"}], \"abstract\": \"The rapid growth of the global population coupled with the challenges posed by climate change and environmental degradation has intensified the need for sustainable agricultural practices. Genomic innovations in plant breeding and genetic advancements offer promising solutions to these challenges by enhancing crop resilience, productivity, and nutritional value while reducing the environmental footprint of farming. This article explores the role of key genomic tools such as genomic selection, CRISPR-Cas9 gene editing, marker-assisted selection, and polyploidy in advancing sustainable agriculture. These technologies enable the development of drought-tolerant, pest-resistant, high-yielding, and nutritionally enhanced crops, contributing to food security and environmental sustainability. However, challenges related to cost, accessibility, and ethical considerations remain. The article concludes that continued research and responsible application of genomic tools are essential for shaping the future of agriculture.\"}, {\"paperId\": \"072aad1be3c861b2a57f25eac3c42ef5d1c38a3c\", \"externalIds\": {\"PubMedCentral\": \"11005703\", \"DOI\": \"10.1002/advs.202305998\", \"CorpusId\": 267364574, \"PubMed\": \"38298098\"}, \"title\": \"Crosstalk Between NK Cell Receptors and Tumor Membrane Hsp70\\u2010Derived Peptide: A Combined Computational and Experimental Study\", \"venue\": \"Advancement of science\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/advs.202305998\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11005703, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2251485432\", \"name\": \"Mina Yazdi\"}, {\"authorId\": \"152482336\", \"name\": \"Morteza Hasanzadeh Kafshgari\"}, {\"authorId\": \"2133624067\", \"name\": \"Fatemeh Khademi moghadam\"}, {\"authorId\": \"5716610\", \"name\": \"Vahid Zarezade\"}, {\"authorId\": \"2181215646\", \"name\": \"Rupert Oellinger\"}, {\"authorId\": \"2279780017\", \"name\": \"Mohammad Khosravi\"}, {\"authorId\": \"2066266729\", \"name\": \"S. Haas\"}, {\"authorId\": \"2058757551\", \"name\": \"Cosima C. Hoch\"}, {\"authorId\": \"2243900588\", \"name\": \"A. G. Pockley\"}, {\"authorId\": \"2282132837\", \"name\": \"Ernst Wagner\"}, {\"authorId\": \"2238854504\", \"name\": \"Barbara Wollenberg\"}, {\"authorId\": \"2238850143\", \"name\": \"Gabriele Multhoff\"}, {\"authorId\": \"46247739\", \"name\": \"Ali Bashiri Dezfouli\"}], \"abstract\": \"Natural killer (NK) cells are central components of the innate immunity system against cancers. Since tumor cells have evolved a series of mechanisms to escape from NK cells, developing methods for increasing the NK cell antitumor activity is of utmost importance. It is previously shown that an ex vivo stimulation of patient\\u2010derived NK cells with interleukin (IL)\\u20102 and Hsp70\\u2010derived peptide TKD (TKDNNLLGRFELSG, aa450\\u2010461) results in a significant upregulation of activating receptors including CD94 and CD69 which triggers exhausted NK cells to target and kill malignant solid tumors expressing membrane Hsp70 (mHsp70). Considering that TKD binding to an activating receptor is the initial step in the cytolytic signaling cascade of NK cells, herein this interaction is studied by molecular docking and molecular dynamics simulation computational modeling. The in silico results showed a crucial role of the heterodimeric receptor CD94/NKG2A and CD94/NKG2C in the TKD interaction with NK cells. Antibody blocking and CRISPR/Cas9\\u2013mediated knockout studies verified the key function of CD94 in the TKD stimulation and activation of NK cells which is characterized by an increased cytotoxic capacity against mHsp70 positive tumor cells via enhanced production and release of lytic granules and pro\\u2010inflammatory cytokines.\"}, {\"paperId\": \"072db82244d9cb8b17485e4b54818bfa86f8e535\", \"externalIds\": {\"PubMedCentral\": \"10024838\", \"DOI\": \"10.1186/s12885-023-10724-6\", \"CorpusId\": 257605100, \"PubMed\": \"36934225\"}, \"title\": \"DNMT3A low-expression is correlated to poor prognosis in childhood B-ALL and confers resistance to daunorubicin on leukemic cells\", \"venue\": \"BMC Cancer\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bmccancer.biomedcentral.com/counter/pdf/10.1186/s12885-023-10724-6\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10024838, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5059956\", \"name\": \"Weijing Li\"}, {\"authorId\": \"2253093\", \"name\": \"Shuguang Liu\"}, {\"authorId\": \"47074453\", \"name\": \"Chan-Juan Wang\"}, {\"authorId\": \"2087101223\", \"name\": \"L. Cui\"}, {\"authorId\": \"6630446\", \"name\": \"Xiaoxi Zhao\"}, {\"authorId\": \"46641573\", \"name\": \"W. Liu\"}, {\"authorId\": \"2220660921\", \"name\": \"Ruidong Zhang\"}, {\"authorId\": \"13676567\", \"name\": \"Zhigang Li\"}], \"abstract\": \"Background Little is known about DNMT3A expression and its prognostic significance in childhood B cell acute lymphoblastic leukemia (B-ALL). Methods We determined DNMT3A mRNA expression in 102 children with B-ALL. Correlations with relapse-free survival (RFS) and common clinical characteristics were analyzed. DNMT3A was stably knocked out by CRISPR/Cas9 gene editing technology in Reh and 697 B-ALL cell lines. Cell proliferation activity after treated with daunorubicin (DNR) was determined by CCK8 assay in DNMT3A KO Reh and 697 cell lines. Results DNMT3A expression in B-ALL patients who were in continuous complete remission (CCR) was higher than in those who got relapse ( P \\u2009=\\u20090.0111). Receiver operating characteristic curve showed prognostic significance of DNMT3A expression ( P \\u2009=\\u20090.003). Low expression of DNMT3A (\\u2264\\u20090.197) was significantly correlated with poor RFS ( P \\u2009<\\u20090.001) in children with B-ALL. Knock-out of DNMT3A in Reh and 697 cell lines significantly increased IC50 of DNR ( P \\u2009=\\u20090.0201 and 0.0022 respectively), indicating elevated resistance to DNR. Conclusion Low expression of DNMT3A associates with poor prognosis in children with B-ALL. Knock-out of DNMT3A confers resistance to DNR on leukemic cells.\"}, {\"paperId\": \"072f4c129908d31ef1fd9994bc0da839b9dac1bb\", \"externalIds\": {\"MAG\": \"2999375757\", \"DOI\": \"10.7916/D8-TW1M-6Q90\", \"CorpusId\": 212861785}, \"title\": \"Engineering microenvironmental cues for guiding stem cell fate\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.7916/D8-TW1M-6Q90?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.7916/D8-TW1M-6Q90, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116022647\", \"name\": \"J. S. Park\"}], \"abstract\": null}, {\"paperId\": \"0735a09f1c59f0c5293d8e841bf229ecb29d79d3\", \"externalIds\": {\"PubMedCentral\": \"10462143\", \"DOI\": \"10.1101/2023.08.18.553923\", \"CorpusId\": 261065795, \"PubMed\": \"37645985\"}, \"title\": \"Knockout studies using CD34+ hematopoietic cells suggest that CD44 is a physiological human neutrophil E-selectin ligand\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10462143\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10462143, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"51271014\", \"name\": \"Yuqi Zhu\"}, {\"authorId\": \"1717593\", \"name\": \"S. Neelamegham\"}], \"abstract\": \"The recruitment of peripheral blood neutrophils at sites of inflammation involves a multistep cascade, starting with E- and P-selectin expressed on the inflamed vascular endothelium binding sialofucosylated glycans on leukocytes. As the glycoconjugate biosynthesis pathways in different cells are distinct, the precise carbohydrate ligands of selectins varies both across species, and between different immune cell populations in a given species. To study this aspect in human neutrophils, we developed a protocol to perform CRISPR/Cas9 gene-editing on CD34+ hHSCs (human hematopoietic stem/progenitor cells) as they are differentiated towards neutrophil lineage. This protocol initially uses a cocktail of SCF (stem-cell factor), IL-3 (interleukin-3) and FLT-3L (FMS-like tyrosine kinase 3 ligand) to expand the stem/progenitor cells followed by directed differentiation to neutrophils using G-CSF (granulocyte colony-stimulating factor). Microfluidics based assays were performed on a confocal microscope platform to characterize the rolling phenotype of each edited cell type in mixed populations. These studies demonstrated that CD44, but not CD43, is a major E-selectin ligand on human neutrophils. The loss of function results were validated by developing sialofucosylated recombinant CD44. This glycosylated protein supported both robust E-selectin binding in a cell-free assay, and it competitively blocked neutrophil adhesion to E-selectin on inflamed endothelial cells. Together, the study establishes important methods to study human neutrophil biology and determines that sialoflucosylated-CD44 is a physiological human E-selectin ligand. KEY POINTS A CRISPR-Cas9 based protocol was optimized to knockout genes in primary human neutrophils derived from CD34+ hHSCs Under physiological fluid shear conditions, a sialofucosylated form of CD44 expressed on human neutrophils is a major E-selectin ligand VISUAL ABSTRACT\"}, {\"paperId\": \"0735ac99651710cfc8cae8ae9c38c1a5d7f555eb\", \"externalIds\": {\"PubMedCentral\": \"10486665\", \"DOI\": \"10.3390/cells12172157\", \"CorpusId\": 261309091, \"PubMed\": \"37681889\"}, \"title\": \"Altered Visual Function in Short-Wave-Sensitive 1 (sws1) Gene Knockout Japanese Medaka (Oryzias latipes) Larvae\", \"venue\": \"Cells\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/12/17/2157/pdf?version=1693207622\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10486665, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153781834\", \"name\": \"Ke Lu\"}, {\"authorId\": \"2128658216\", \"name\": \"Jiaqi Wu\"}, {\"authorId\": \"2118812519\", \"name\": \"Shulin Tang\"}, {\"authorId\": \"2171928872\", \"name\": \"Yuye Wang\"}, {\"authorId\": \"2225281019\", \"name\": \"Lixin Zhang\"}, {\"authorId\": \"2132150846\", \"name\": \"Farui Chai\"}, {\"authorId\": \"2283874077\", \"name\": \"Xu-fang Liang\"}], \"abstract\": \"Visual perception plays a crucial role in foraging, avoiding predators, mate selection, and communication. The regulation of color vision is largely dependent on opsin, which is the first step in the formation of the visual transduction cascade in photoreceptor cells. Short-wave-sensitive 1 (sws1) is a visual pigment that mediates short-wavelength light transduction in vertebrates. The depletion of sws1 resulted in increased M-opsin in mice. However, there is still no report on the visual function of sws1 in teleost fish. Here, we constructed the sws1 knockout medaka using CRISPR/Cas9 technology. The 6 dph (days post-hatching) medaka sws1\\u2212/\\u2212 larvae exhibited significantly decreased food intake and total length at the first feeding stage, and the mRNA levels of orexigenic genes (npy and agrp) were significantly upregulated after feeding. The swimming speed was significantly reduced during the period of dark-light transition stimulation in the sws1-mutant larvae. Histological analysis showed that the thickness of the lens was reduced, whereas the thickness of the ganglion cell layer (GCL) was significantly increased in sws1\\u2212/\\u2212 medaka larvae. Additionally, the deletion of sws1 decreased the mRNA levels of genes involved in phototransduction (gnb3b, grk7a, grk7b, and pde6c). We also observed increased retinal cell apoptosis and oxidative stress in sws1 knockout medaka larvae. Collectively, these results suggest that sws1 deficiency in medaka larvae may impair visual function and cause retinal cell apoptosis, which is associated with the downregulation of photoconduction expression and oxidative stress.\"}, {\"paperId\": \"073766a8fcec0593b3a52a2956e49f68173c3a2e\", \"externalIds\": {\"PubMedCentral\": \"11799033\", \"DOI\": \"10.1007/s10495-024-02042-4\", \"CorpusId\": 274609221, \"PubMed\": \"39656358\"}, \"title\": \"EFNA4-enhanced deubiquitination of SLC7A11 inhibits ferroptosis in hepatocellular carcinoma\", \"venue\": \"Apoptosis\", \"year\": 2024, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1007/s10495-024-02042-4\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11799033, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2327506546\", \"name\": \"Xingyi Zhong\"}, {\"authorId\": \"2299105209\", \"name\": \"Zhiqin Zhu\"}, {\"authorId\": \"2334600795\", \"name\": \"Yangfeng Du\"}, {\"authorId\": \"2334562990\", \"name\": \"Lingzhi Long\"}, {\"authorId\": \"2335414066\", \"name\": \"Ziping Xie\"}, {\"authorId\": \"2326782929\", \"name\": \"Yangfeng Zhang\"}, {\"authorId\": \"2334836104\", \"name\": \"Huijun Yao\"}, {\"authorId\": \"2326803510\", \"name\": \"Junhao Lin\"}, {\"authorId\": \"2330604340\", \"name\": \"Fengsheng Chen\"}], \"abstract\": \"EFNA4, a member of the Ephrin-A ligand family, may influence hepatocellular carcinoma cells through two distinct mechanisms: one reliant on specific Eph receptor binding and the other independent of receptor involvement. However, EFNA4's influence on HCC via non-Eph receptor pathways remains unclear. In this study, we aimed to investigate the role of EFNA4 in a receptor-independent environment. Firstly, we constructed an environment lacking Eph receptors via CRISPR/Cas9 and found that EFNA4 could still partially promote HCC proliferation and metastasis in vivo and in vitro. Further analyses of apoptosis, ROS, and GPX4 expression revealed that overexpression of EFNA4 would inhibit ferroptosis in HCC. Mechanistically, EFNA4 was positively correlated with SLC7A11 and directly interacted with SLC7A11 in HCC via bioinformatics analysis. We demonstrated that the structural domain (a.a. 161\\u2013201) of EFNA4 specifically binds to the domain (a.a. 222\\u2013501) of SLC7A11, which led to the deubiquitination of SLC7A11. Subsequently, we found that EFNA4 would recruit the deubiquitinase USP9X, resulting in inhibition of SLC7A11 degradation, which ultimately inhibits ferroptosis and enhances the proliferation and metastasis of HCC. In conclusion, we demonstrated that EFNA4 promotes the proliferation and metastasis of HCC independent of Eph receptors by inhibiting ferroptosis and advancing the deubiquitination of SLC7A11 by recruiting the deubiquitinase USP9X. This indicates that EFNA4 could act as a potential prognostic marker and a prospective therapeutic target in patients with HCC.\"}, {\"paperId\": \"0738c8d30b60fff22dd1a9aac3345926bd758731\", \"externalIds\": {\"DOI\": \"10.1016/j.ceca.2021.102500\", \"CorpusId\": 243882139, \"PubMed\": \"34813985\"}, \"title\": \"Mutation in RyR2-FKBP Binding site alters Ca2+ signaling modestly but increases \\\"arrhythmogenesis\\\" in human stem cells derived cardiomyocytes.\", \"venue\": \"Cell Calcium\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8752506\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ceca.2021.102500?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ceca.2021.102500, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1398419759\", \"name\": \"J. Fern\\u00e1ndez\\u2010Morales\"}, {\"authorId\": \"2282664\", \"name\": \"Yanli Xia\"}, {\"authorId\": \"2139795503\", \"name\": \"Taylor J. Renzo\"}, {\"authorId\": \"2108582375\", \"name\": \"Xiao-Hua Zhang\"}, {\"authorId\": \"2139787595\", \"name\": \"Professor Martin Morad\"}], \"abstract\": \"AIMS\\nTo gain insights into FKBP regulation of cardiac ryanodine receptor (RyR2) and Ca2+ signaling, we introduced the point mutation (N771D-RyR2) corresponding to skeletal muscle mutation (N760D-RyR1) associated with central core disease (CCD) via CRISPR/Cas9 gene-editing in the RyR2 FKBP binding site expressed in human induced pluripotent stem cell-derived cardiomyocytes (hiPSCCMs). Patients inflicted with CCD and other hereditary skeletal muscle diseases often show higher incidence of atrial or ventricular arrhythmias.\\n\\n\\nMETHODS AND RESULTS\\nCa2+ imaging of voltage-clamped N771D-RyR2 mutant compared to WT hiPSCCMs showed: (1) \\u223c30% suppressed ICa with no significant changes in the gating kinetics of ICa; (2) 29% lower SR Ca2+ content and 33% lower RyR2 Ca2+ leak; (3) higher CICR gain and 30-35% increased efficiency of ICa-triggered Ca2\\u00b1release; (4) higher incidence of aberrant SR Ca2+ releases, DADs, and Ca2+ sparks; (5) no change in fractional Ca2+-release, action potential morphology, sensitivity to isoproterenol, and sarcomeric FKBP-binding pattern.\\n\\n\\nCONCLUSIONS\\nThe more frequent spontaneous Ca2+ releases and longer Ca2+ sparks underlie the increased incidence of DADs and cellular arrhythmogenesis of N771D-RyR2 mutant. The smaller RyR2 Ca2\\u00b1leak and SR content result from suppressed ICathat is compensated by higher CICR gain.\"}, {\"paperId\": \"073a4e9f3ce4919ab1b17d8eaa55522fa5dcee1a\", \"externalIds\": {\"DOI\": \"10.1007/s00299-024-03289-6\", \"CorpusId\": 271692849, \"PubMed\": \"39096362\"}, \"title\": \"Cytokinin oxidase2-deficient mutants improve panicle and grain architecture through cytokinin accumulation and enhance drought tolerance in indica rice\", \"venue\": \"Plant Cell Reports\", \"year\": 2024, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.researchsquare.com/article/rs-4172709/latest.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00299-024-03289-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00299-024-03289-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2297040215\", \"name\": \"Afreen Rashid\"}, {\"authorId\": \"5673611\", \"name\": \"V. M. Achary\"}, {\"authorId\": \"2314683624\", \"name\": \"M. Z. Abdin\"}, {\"authorId\": \"2156293499\", \"name\": \"Sangeetha Karippadakam\"}, {\"authorId\": \"2156296000\", \"name\": \"Hemangini Parmar\"}, {\"authorId\": \"17946980\", \"name\": \"Varakumar Panditi\"}, {\"authorId\": \"2292096914\", \"name\": \"Ganesan Prakash\"}, {\"authorId\": \"2314683622\", \"name\": \"Pooja Bhatnagar-Mathur\"}, {\"authorId\": \"2287009579\", \"name\": \"Malireddy K. Reddy\"}], \"abstract\": \"The Osckx2 mutant accumulates cytokinin thereby enhancing panicle branching, grain yield, and drought tolerance, marked by improved survival rate, membrane integrity, and photosynthetic function. Cytokinins (CKs) are multifaceted hormones that regulate growth, development, and stress responses in plants. Cytokinins have been implicated in improved panicle architecture and grain yield; however, they are inactivated by the enzyme cytokinin oxidase (CKX). In this study, we developed a cytokinin oxidase 2 (Osckx2)-deficient mutant using CRISPR/Cas9 gene editing in indica rice and assessed its function under water-deficit and salinity conditions. Loss of OsCKX2 function increased grain number, secondary panicle branching, and overall grain yield through improved cytokinin content in the panicle tissue. Under drought conditions, the Osckx2 mutant conserved more water and demonstrated improved water-saving traits. Through reduced transpiration, Osckx2 mutants showed an improved survival response than the wild type to unset dehydration stress. Further, Osckx2 maintained chloroplast and membrane integrity and showed significantly improved photosynthetic function under drought conditions through enhanced antioxidant protection systems. The OsCKX2 function negatively affects panicle grain number and drought tolerance, with no discernible impact in response to salinity. The finding suggests the utility of the beneficial Osckx2 allele in breeding to develop climate-resilient, high-yielding cultivars for future food security.\"}, {\"paperId\": \"073ad09735f8173d36bfdde4145d54b0e87a9ad0\", \"externalIds\": {\"DOI\": \"10.1182/blood-2021-152477\", \"CorpusId\": 244642153}, \"title\": \"Defining the Biochemical Role of Sialic Acid-Binding Immunoglobulin-like Lectin-6 in Adhesion and Migration in Chronic Lymphocytic Leukemia\", \"venue\": \"Blood\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2021-152477\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2021-152477?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2021-152477, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2054461397\", \"name\": \"J. Nunes\"}, {\"authorId\": \"2124355556\", \"name\": \"Ann Ventura\"}, {\"authorId\": \"102399545\", \"name\": \"K. Zapolnik\"}, {\"authorId\": \"40574974\", \"name\": \"Eileen Y. Hu\"}, {\"authorId\": \"47058846\", \"name\": \"Liwen Zhang\"}, {\"authorId\": \"143817652\", \"name\": \"X. Mo\"}, {\"authorId\": \"2820011\", \"name\": \"J. Byrd\"}, {\"authorId\": \"1729742\", \"name\": \"C. Rader\"}, {\"authorId\": \"34993386\", \"name\": \"Rajasekar Muthusamy\"}], \"abstract\": \"\\n Introduction: Sialic acid-binding immunoglobulin-like lectins (Siglec) are a group of lectins that regulate innate and adaptive immune function via glycan recognition. We and others have shown overexpression of Siglec-6, a member of Siglec family, on B cells from patients with chronic lymphocytic leukemia (CLL) compared to normal donor derived B cells. While placental expression of Siglec-6 has been shown to regulate invasion of trophoblast cells by binding to glycodelin, the biochemical role of Siglec-6 in CLL patients is not known. We describe here for the first time the functional relevance of Siglec-6 and its ligand sialyl Tn (sTn) in cell adhesion and migration in CLL. Biochemical mechanisms of Siglec-6 mediated cell adhesion and migration through DOCK8 dependent activation of Cdc42 associated with actin polymerization in CLL cells are presented. Further, the physiological relevance of Siglec-6/ DOCK8 axis in CLL cell adhesion and migration is validated using primary CLL patient samples, and genetically engineered loss of function Siglec-6 and DOCK8 mutant MEC1 CLL cell line. These studies thus elucidate the biological role of Siglec-6 in malignant CLL B cells and demonstrate therapeutic opportunities targeting Siglec-6 in CLL.\\n Methods: Flow cytometry was used to analyze surface expression of Siglec-6 and sTn in CLL patients and normal donors. Transwell migration assay was used to assess in-vitro migratory role of Siglec-6. Mass spectrometry analysis was performed to identify Siglec-6 interacting proteins. CRISPR/Cas9 technique was used to generate knock-out (KO) cell lines for mechanistic studies. Phalloidin staining followed by confocal imaging was used to examine actin polymerization. Cdc42 activation was evaluated using a commercial kit which uses specialized PAK1-PBD agarose beads to pull down GTP-bound Cdc42. To study the in-vivo migratory role of Siglec-6, MEC1 CLL cell line or primary CLL cells were blocked with an isotype antibody or Siglec-6 targeted antibody and injected into the tail vein of NSG immunocompromised mice. 24 hrs later, mice were euthanized and spleens and BM were processed followed by flow cytometry analysis to determine the number of human CD45+ cells that have migrated.\\n Results: We confirmed Siglec-6 overexpression on B cells from CLL patients when compared to B cells from normal donors. Interestingly, we also found expression of sTn on bone marrow stromal cells (BMSCs) derived from CLL patients but not healthy donors. Compared to Siglec-6 + CLL cells, Siglec-6 - CLL cells exhibited significant reduction in adhesion to (~50%) and migration towards (~50%) media containing sTn or sTn + CLL-BMSCs in cell adhesion and trans-well migration assays. Importantly, a Siglec-6 targeted antibody inhibited homing of Siglec-6 + MEC1 cells and primary CLL cells to the spleen and bone marrow in NSG mice (~35%). Mass spectrometry and co-immunoprecipitation analysis in MEC1 cells revealed interaction of Siglec-6 with DOCK8, a guanine nucleotide exchange factor. Stimulation of Siglec-6 + MEC1 cells with sTn resulted in Cdc42 activation and WASP protein recruitment, which are both downstream targets of DOCK8 involved in cell migration. Further, sTn also promoted actin polymerization, an effect that was compromised in Siglec-6 or DOCK8 KO MEC1 cells. Additionally, cell fractionation experiments revealed that Siglec-6 + MEC1 cells had higher levels of DOCK8 at the cell membrane when compared to MEC1 Siglec-6 KO cells, indicating that Siglec-6 may be responsible for tethering DOCK8 to the cell membrane.\\n Conclusions: We have for the first time shown Siglec-6 dependent recruitment of DOCK8 leading to migration and adhesion of B-CLL cells. Siglec-6 signals via DOCK8 to mediate sTn ligand dependent actin polymerization. We have also shown that sTn promotes Cdc42 activation and WASP protein recruitment which are both essential for actin polymerization. Moreover, all these effects were prevented by CRISPR/Cas9 mediated knock out of Siglec-6 or DOCK8 in MEC1 CLL cell line. Thus, Siglec-6 represents a CLL-specific target that opens up new therapeutic avenues to target only malignant B-CLL cells. Ongoing studies are focused on determining molecular mechanisms of Siglec-6 mediated regulation of actin polymerization and CLL-BMSC interactions.\\n [This work was supported by NIH-R21 Grant and Pelotonia Idea grants. JN is a recipient of Pelotonia Graduate Fellowship]\\n \\n \\n Byrd:\\u2008Newave: Membership on an entity's Board of Directors or advisory committees; Vincerx Pharmaceuticals: Current equity holder in publicly-traded company, Membership on an entity's Board of Directors or advisory committees; Novartis, Trillium, Astellas, AstraZeneca, Pharmacyclics, Syndax: Consultancy, Honoraria.\\n\"}, {\"paperId\": \"073b065967c196928ef54f6e962e0a795fc0c0b2\", \"externalIds\": {\"DOI\": \"10.1201/9781003088516-7\", \"CorpusId\": 245226873}, \"title\": \"The Advances of the CRISPR/Cas9 Technology for Correcting Genetic Disorders: Using Sarcoma as a Model System\", \"venue\": \"CRISPR-/Cas9 Based Genome Editing for Treating Genetic Disorders and Diseases\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1201/9781003088516-7?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1201/9781003088516-7, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145815980\", \"name\": \"Pichaya Thanindratara\"}, {\"authorId\": \"51435119\", \"name\": \"Dylan C. Dean\"}, {\"authorId\": \"145794459\", \"name\": \"F. Hornicek\"}, {\"authorId\": \"144688593\", \"name\": \"Z. Duan\"}], \"abstract\": null}, {\"paperId\": \"073dbe99377ca114d397530160434f81e7ba0a19\", \"externalIds\": {\"PubMedCentral\": \"9345760\", \"DOI\": \"10.3389/fncel.2022.926096\", \"CorpusId\": 250646276, \"PubMed\": \"35936494\"}, \"title\": \"Stage-Dependent Changes of Visual Function and Electrical Response of the Retina in the rd10 Mouse Model\", \"venue\": \"Frontiers in Cellular Neuroscience\", \"year\": 2022, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fncel.2022.926096/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9345760, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79573457\", \"name\": \"Seongkwang Cha\"}, {\"authorId\": \"8527665\", \"name\": \"Jungryul Ahn\"}, {\"authorId\": \"2105577588\", \"name\": \"Yurim Jeong\"}, {\"authorId\": \"2177026773\", \"name\": \"Yong Hee Lee\"}, {\"authorId\": \"2144360607\", \"name\": \"Hyong Kyu Kim\"}, {\"authorId\": \"48893477\", \"name\": \"Daekee Lee\"}, {\"authorId\": \"34816561\", \"name\": \"Yongseok Yoo\"}, {\"authorId\": \"2085944\", \"name\": \"Y. Goo\"}], \"abstract\": \"One of the critical prerequisites for the successful development of retinal prostheses is understanding the physiological features of retinal ganglion cells (RGCs) in the different stages of retinal degeneration (RD). This study used our custom-made rd10 mice, C57BL/6-Pde6bem1(R560C)Dkl/Korl mutated on the Pde6b gene in C57BL/6J mouse with the CRISPR/Cas9-based gene-editing method. We selected the postnatal day (P) 45, P70, P140, and P238 as representative ages for RD stages. The optomotor response measured the visual acuity across degeneration stages. At P45, the rd10 mice exhibited lower visual acuity than wild-type (WT) mice. At P140 and older, no optomotor response was observed. We classified RGC responses to the flashed light into ON, OFF, and ON/OFF RGCs via in vitro multichannel recording. With degeneration, the number of RGCs responding to the light stimulation decreased in all three types of RGCs. The OFF response disappeared faster than the ON response with older postnatal ages. We elicited RGC spikes with electrical stimulation and analyzed the network-mediated RGC response in the rd10 mice. Across all postnatal ages, the spikes of rd10 RGCs were less elicited by pulse amplitude modulation than in WT RGCs. The ratio of RGCs showing multiple peaks of spike burst increased in older ages. The electrically evoked RGC spikes by the pulse amplitude modulation differ across postnatal ages. Therefore, degeneration stage-dependent stimulation strategies should be considered for developing retinal prosthesis and successful vision restoration.\"}, {\"paperId\": \"073f2cd5f3dcb5567204255e87449bd47780c5d7\", \"externalIds\": {\"PubMedCentral\": \"9544626\", \"DOI\": \"10.1111/imb.12778\", \"CorpusId\": 240315047, \"PubMed\": \"35429082\"}, \"title\": \"Generating and testing the efficacy of transgenic Cas9 in Tribolium castaneum\", \"venue\": \"bioRxiv\", \"year\": 2021, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/imb.12778\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9544626, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7854979\", \"name\": \"Johnathan Rylee\"}, {\"authorId\": \"1422632508\", \"name\": \"Alexandra Nin-Velez\"}, {\"authorId\": \"152206739\", \"name\": \"Simpla Mahato\"}, {\"authorId\": \"2136002383\", \"name\": \"Kennedy Helms\"}, {\"authorId\": \"5399888\", \"name\": \"M. Wade\"}, {\"authorId\": \"4721884\", \"name\": \"G. Zentner\"}, {\"authorId\": \"3504385\", \"name\": \"A. Zelhof\"}], \"abstract\": \"CRISPR/Cas9 genome editing has now expanded to many insect species, including Tribolium castaneum. However, compared to Drosophila melanogaster, the CRISPR toolkit of T. castaneum is limited. A particularly apparent gap is the lack of Cas9 transgenic animals, which generally offer higher editing efficiency. We address this by creating and testing transgenic beetles expressing Cas9. We generated two different constructs bearing basal heat shock promoter-driven Cas9, two distinct 3\\u2019 UTRs, and one containing Cas9 fused to EGFP by a T2A peptide. For each construct, we were able to generate a line that is homozygous viable, though variable reductions in reproductive success with each construct were noted. Analyses of Cas9 activity in each transgenic line demonstrated that both designs are capable of inducing CRISPR-mediated changes in the genome in the absence of heat induction. Overall, these resources enhance the accessibility of CRISPR/Cas9 genome editing for the Tribolium research community and provide a benchmark against which to compare future transgenic Cas9 lines.\"}, {\"paperId\": \"073f68e56e5ee0f8f2a921507bbb23194c7725cc\", \"externalIds\": {\"PubMedCentral\": \"8146339\", \"DOI\": \"10.3390/v13050783\", \"CorpusId\": 233461572, \"PubMed\": \"33924938\"}, \"title\": \"CRISPR Interference Efficiently Silences Latent and Lytic Viral Genes in Kaposi\\u2019s Sarcoma-Associated Herpesvirus-Infected Cells\", \"venue\": \"Viruses\", \"year\": 2021, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1999-4915/13/5/783/pdf?version=1619603045\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8146339, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2086892031\", \"name\": \"Kevin Brackett\"}, {\"authorId\": \"2086916756\", \"name\": \"Ameera Mungale\"}, {\"authorId\": \"2086891428\", \"name\": \"Mary Lopez-Isidro\"}, {\"authorId\": \"38039607\", \"name\": \"D. Proctor\"}, {\"authorId\": \"2086916989\", \"name\": \"Guillermo Najarro\"}, {\"authorId\": \"144668937\", \"name\": \"C. Arias\"}], \"abstract\": \"Uncovering viral gene functions requires the modulation of gene expression through overexpression or loss-of-function. CRISPR interference (CRISPRi), a modification of the CRISPR-Cas9 gene editing technology, allows specific and efficient transcriptional silencing without genetic ablation. CRISPRi has been used to silence eukaryotic and prokaryotic genes at the single-gene and genome-wide levels. Here, we report the use of CRISPRi to silence latent and lytic viral genes, with an efficiency of ~80\\u201390%, in epithelial and B-cells carrying multiple copies of the Kaposi\\u2019s sarcoma-associated herpesvirus (KSHV) genome. Our results validate CRISPRi for the analysis of KSHV viral elements, providing a functional genomics tool for studying virus\\u2013host interactions.\"}, {\"paperId\": \"073f846bbb8274541bdf19e42f9023a8d5aaa04b\", \"externalIds\": {\"PubMedCentral\": \"10991206\", \"DOI\": \"10.1186/s40643-022-00585-5\", \"CorpusId\": 252370121, \"PubMed\": \"38647872\"}, \"title\": \"An accessory enzymatic system of cellulase for simultaneous saccharification and co-fermentation\", \"venue\": \"Bioresources and Bioprocessing\", \"year\": 2022, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bioresourcesbioprocessing.springeropen.com/counter/pdf/10.1186/s40643-022-00585-5\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10991206, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": null, \"name\": \"Han Liu\"}, {\"authorId\": \"2118466386\", \"name\": \"Xuxin Wang\"}, {\"authorId\": \"2108162933\", \"name\": \"Yanping Liu\"}, {\"authorId\": \"35579466\", \"name\": \"Zhuo-Ying Kang\"}, {\"authorId\": \"2218624652\", \"name\": \"J. Lu\"}, {\"authorId\": \"2114059598\", \"name\": \"Yutong Ye\"}, {\"authorId\": \"2108060341\", \"name\": \"Zhi-Peng Wang\"}, {\"authorId\": \"5031075\", \"name\": \"X. Zhuang\"}, {\"authorId\": \"6759328\", \"name\": \"S. Tian\"}], \"abstract\": \"The enhanced hydrolysis of xylan-type hemicellulose is important to maximize ethanol production yield and substrate utilization rate in lignocellulose-based simultaneous saccharification and co-fermentation system. In this study, we conduct \\u03b4-integration CRISPR Cas9 to achieve multicopy chromosomal integration with high efficiency of reductase\\u2013xylitol dehydrogenase pathway in Saccharomyces cerevisiae . Subsequently, we devise a consolidated bioprocessing-enabling S. cerevisiae consortium, in which every engineered yeast strain could secrete or display different assembly components to be adaptively assembled on the surface of scaffoldin-displaying yeast cell for synergistic catalysis and co-fermentation from steam-exploded Pennisetum purpureum . Despite the accumulation of xylitol, the maximum ethanol titer of the genetically engineered yeast strain reached 12.88\\u00a0g/l with the cellulose conversion of 91.21% and hemicellulose conversion of 55.25% under 30\\u00a0\\u00baC after 96\\u00a0h with the addition of commercial cellulase. The elaborated cellulosomal organization toward genetic engineering of an industrially important microorganism presents a designed approach for advanced lignocellulolytic potential and improved capability of biofuel processing. Graphical Abstract 1. A replicative and integrative Di-CRISPR platform was promising in generating an efficient xylose-utilizing Saccharomyces cerevisiae strain. 2. The functional activity of chimeric xylanases was demonstrated in direct hemicellulose-to-ethanol conversion. 3. The feasibility of an accessory enzymatic system of cellulase for simultaneous saccharification and co-fermentation from pretreated C 4 grass was evaluated.\"}, {\"paperId\": \"074065b6d1b6c571ad44d68573644e1a2e75b293\", \"externalIds\": {\"PubMedCentral\": \"8305104\", \"DOI\": \"10.3390/genes12071027\", \"CorpusId\": 236319526, \"PubMed\": \"34356043\"}, \"title\": \"CRISPR/Cas9-Mediated Specific Integration of Fat-1 and IGF-1 at the pRosa26 Locus\", \"venue\": \"Genes\", \"year\": 2021, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4425/12/7/1027/pdf?version=1626839706\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8305104, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152702737\", \"name\": \"Wenni You\"}, {\"authorId\": \"6732265\", \"name\": \"Mengjing Li\"}, {\"authorId\": \"48554658\", \"name\": \"Yilin Qi\"}, {\"authorId\": \"2107963480\", \"name\": \"Yanbing Wang\"}, {\"authorId\": \"2120833929\", \"name\": \"Yiwu Chen\"}, {\"authorId\": \"1679704\", \"name\": \"Y. Liu\"}, {\"authorId\": \"2156056836\", \"name\": \"Li Li\"}, {\"authorId\": \"40357798\", \"name\": \"Hongsheng Ouyang\"}, {\"authorId\": \"4267733\", \"name\": \"D. Pang\"}], \"abstract\": \"Many researchers have focused on knock-in pigs for site-specific integration, but little attention has been given to genetically modified pigs with the targeted integration of multiple recombinant genes. To establish a multigene targeted knock-in editing system, we used the internal ribosome entry site (IRES) and self-cleaving 2A peptide technology to construct a plasmid coexpressing the fatty acid desaturase (Fat-1) and porcine insulin-like growth factor-1 (IGF-1) genes at equal levels. In this study, pigs were genetically modified with multiple genes that were precisely inserted into the pRosa26 locus by using the clustered regularly spaced short palindrome repeat sequence (CRISPR)/CRISPR-related 9 (Cas9) system and somatic cell nuclear transfer technology (SCNT) in combination. Single copies of the Fat-1 and IGF-1 genes were expressed satisfactorily in various tissues of F0-generation pigs. Importantly, gas chromatography analysis revealed a significantly increased n-3 polyunsaturated fatty acid (PUFA) level in these genetically modified pigs, which led to a significant decrease of the n-6 PUFA/n-3 PUFA ratio from 6.982 to 3.122 (*** p < 0.001). In conclusion, the establishment of an editing system for targeted double-gene knock-in in this study provides a reference for the precise integration of multiple foreign genes and lays a foundation for the development of new transgenic pig breeds with multiple excellent phenotypes.\"}, {\"paperId\": \"074306fc8e42bdb6fba8b099fcd98ac98acc082c\", \"externalIds\": {\"DOI\": \"10.1007/s00726-021-03067-8\", \"CorpusId\": 237255783, \"PubMed\": \"34417892\"}, \"title\": \"Semi-rational design of L-amino acid deaminase for production of pyruvate and d-alanine by Escherichia coli whole-cell biocatalyst\", \"venue\": \"Amino Acids\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00726-021-03067-8?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00726-021-03067-8, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2152353170\", \"name\": \"Ke Liu\"}, {\"authorId\": \"46493078\", \"name\": \"Haoran Yu\"}, {\"authorId\": \"2087137918\", \"name\": \"Guoyun Sun\"}, {\"authorId\": \"2143080752\", \"name\": \"Yanfeng Liu\"}, {\"authorId\": \"119581473\", \"name\": \"Jianghua Li\"}, {\"authorId\": \"1711351\", \"name\": \"G. Du\"}, {\"authorId\": \"4481674\", \"name\": \"Xueqin Lv\"}, {\"authorId\": \"47968452\", \"name\": \"Long Liu\"}], \"abstract\": null}, {\"paperId\": \"0743706a182ba79e61f70b85526a7b21c6faae3f\", \"externalIds\": {\"PubMedCentral\": \"11188260\", \"DOI\": \"10.1186/s13059-024-03305-8\", \"CorpusId\": 270636371, \"PubMed\": \"38902825\"}, \"title\": \"Alternative splicing coupled to nonsense-mediated decay coordinates downregulation of non-neuronal genes in developing mouse neurons\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 10, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://genomebiology.biomedcentral.com/counter/pdf/10.1186/s13059-024-03305-8\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11188260, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"36419599\", \"name\": \"A. Zhuravskaya\"}, {\"authorId\": \"145671411\", \"name\": \"Karen Yap\"}, {\"authorId\": \"4517459\", \"name\": \"F. Hamid\"}, {\"authorId\": \"3680947\", \"name\": \"E. Makeyev\"}], \"abstract\": \"The functional coupling between alternative pre-mRNA splicing (AS) and the mRNA quality control mechanism called nonsense-mediated decay (NMD) can modulate transcript abundance. Previous studies have identified several examples of such a regulation in developing neurons. However, the systems-level effects of AS-NMD in this context are poorly understood. We developed an R package, factR2, which offers a comprehensive suite of AS-NMD analysis functions. Using this tool, we conducted a longitudinal analysis of gene expression in pluripotent stem cells undergoing induced neuronal differentiation. Our analysis uncovered hundreds of AS-NMD events with significant potential to regulate gene expression. Notably, this regulation was significantly overrepresented in specific functional groups of developmentally downregulated genes. Particularly strong association with gene downregulation was detected for alternative cassette exons stimulating NMD (NS-CEs) upon their inclusion into mature mRNA. By combining bioinformatics analyses with CRISPR/Cas9 genome editing and other experimental approaches we show that NS-CEs regulated by the RNA-binding protein PTBP1 dampen the expression of their genes in developing neurons. We also provide evidence that the NS-CE activity is temporally coordinated with NMD-independent gene repression mechanisms. Our study provides an accessible workflow for the discovery and prioritization of AS-NMD targets. It further argues that the AS-NMD pathway plays a widespread role in developing neurons by facilitating the downregulation of functionally related non-neuronal genes.\"}, {\"paperId\": \"0745e18f21f6d2b696dd05443a9f2918d7ef6fba\", \"externalIds\": {\"DOI\": \"10.1152/physiol.2024.39.s1.1807\", \"CorpusId\": 269957699}, \"title\": \"NKCC1-dependent K+ influx inhibits NLRP3 inflammasome activation and prevents intestinal epithelial cell injury\", \"venue\": \"Physiology\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1152/physiol.2024.39.s1.1807?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1152/physiol.2024.39.s1.1807, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6788016\", \"name\": \"Rainelli B. Koumangoye\"}, {\"authorId\": \"2238429047\", \"name\": \"Eric J. Delpire\"}], \"abstract\": \"Background: Loss of function mutations in SLC12A2, the gene encoding the Na+-K+-2Cl\\u2212 cotransporter (NKCC1) are associated with autoinflammatory and severe chronic inflammation in multiple organs. NLRP(s) are a family of cytosolic sensors that initiate the innate immune response. Once activated, NLRP(s) form inflammasomes, which are multi-protein complex that sense danger signals, damaged and infected cells. Assembly of the inflammasome mediates caspases-1 activation and the production of the proinflammatory cytokines IL-1\\u03b2 and IL-18 and initiates an inflammatory cell death process called pyroptosis. Aberrant activation of NLRP3 and other inflammasomes leads to a variety of autoimmune and chronic inflammatory diseases. Here we ask whether loss of NKCC1 function affects inflammasome activation in intestinal epithelial cells. Methods: Wild-type intestinal epithelial cells (IEC) and CRISPR/Cas9 NKCC1-deleted clones were tested for inflammasome activation. WT and NKCC1-deficient clones were treated with nigericin, ATP or ouabain to activate the inflammasome. Conditioned media, whole cell lysate and fixed cells were collected at different time points and analyzed by immunoblotting, immunofluorescence, and ELISA (to measure cytokine release). Inflammasome-induced pyroptosis was assessed by measuring LDH release in the supernatant and gasdermine D cleavage by immunoblotting. Results: Loss of NKCC1 function induces inflammasome activation by increasing IL-1\\u03b2 secretion in intestinal epithelial cells. Prolong inflammatory cytokine secretion led to increased pyroptosis-mediated cell death. Loss of NKCC1 mediates NLRP3 inflammasome activation by compromising K+ influx. NLRP3 agonists increase the interaction and localization of WNK1 and SPAK kinases with the NLRP3 inflammasome complex. Conclusions: NKCC1 regulates inflammatory cytokines secretion. Loss of NKCC1 inhibits K+ and Cl\\u2212 inward fluxes, which in turn activate NLRP3 inflammasome. Loss of NKCC1 function is a previously unknown mechanism that causes aberrant inflammasome activation. GM118944 DK093501. This is the full abstract presented at the American Physiology Summit 2024 meeting and is only available in HTML format. There are no additional versions or additional content available for this abstract. Physiology was not involved in the peer review process.\"}, {\"paperId\": \"0747fe531b4ab1108cfcb7fb654f1c63f799bc7b\", \"externalIds\": {\"PubMedCentral\": \"8947233\", \"DOI\": \"10.1093/hmg/ddab296\", \"CorpusId\": 238475161, \"PubMed\": \"34622282\"}, \"title\": \"Caenorhabditis elegans provides an efficient drug screening platform for GNAO1-related disorders and highlights the potential role of caffeine in controlling dyskinesia\", \"venue\": \"Human Molecular Genetics\", \"year\": 2021, \"citationCount\": 36, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/hmg/article-pdf/31/6/929/42993564/ddab296.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8947233, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1413341675\", \"name\": \"Martina Di Rocco\"}, {\"authorId\": \"6736857\", \"name\": \"S. Galosi\"}, {\"authorId\": \"119377954\", \"name\": \"Enrico Lanza\"}, {\"authorId\": \"2188160105\", \"name\": \"Federica Tosato\"}, {\"authorId\": \"83577108\", \"name\": \"Davide Caprini\"}, {\"authorId\": \"3694780\", \"name\": \"V. Folli\"}, {\"authorId\": \"118561481\", \"name\": \"J. Friedman\"}, {\"authorId\": \"5390461\", \"name\": \"G. Bocchinfuso\"}, {\"authorId\": \"117470151\", \"name\": \"A. Martire\"}, {\"authorId\": \"7346898\", \"name\": \"Elia Di Schiavi\"}, {\"authorId\": \"145472374\", \"name\": \"V. Leuzzi\"}, {\"authorId\": \"2830212\", \"name\": \"S. Martinelli\"}], \"abstract\": \"Abstract Dominant GNAO1 mutations cause an emerging group of childhood-onset neurological disorders characterized by developmental delay, intellectual disability, movement disorders, drug-resistant seizures and neurological deterioration. GNAO1 encodes the \\u03b1-subunit of an inhibitory GTP/GDP-binding protein regulating ion channel activity and neurotransmitter release. The pathogenic mechanisms underlying GNAO1-related disorders remain largely elusive and there are no effective therapies. Here, we assessed the functional impact of two disease-causing variants associated with distinct clinical features, c.139A\\u2009>\\u2009G (p.S47G) and c.662C\\u2009>\\u2009A (p.A221D), using Caenorhabditis elegans as a model organism. The c.139A\\u2009>\\u2009G change was introduced into the orthologous position of the C. elegans gene via CRISPR/Cas9, whereas a knock-in strain carrying the p.A221D variant was already available. Like null mutants, homozygous knock-in animals showed increased egg laying and were hypersensitive to aldicarb, an inhibitor of acetylcholinesterase, suggesting excessive neurotransmitter release by different classes of motor neurons. Automated analysis of C. elegans locomotion indicated that goa-1 mutants move faster than control animals, with more frequent body bends and a higher reversal rate and display uncoordinated locomotion. Phenotypic profiling of heterozygous animals revealed a strong hypomorphic effect of both variants, with a partial dominant-negative activity for the p.A221D allele. Finally, caffeine was shown to rescue aberrant motor function in C. elegans harboring the goa-1 variants; this effect is mainly exerted through adenosine receptor antagonism. Overall, our findings establish a suitable platform for drug discovery, which may assist in accelerating the development of new therapies for this devastating condition, and highlight the potential role of caffeine in controlling GNAO1-related dyskinesia.\"}, {\"paperId\": \"0749ee8a19766bb043af35784f27a5acb206f2d6\", \"externalIds\": {\"PubMedCentral\": \"10468349\", \"DOI\": \"10.1016/j.omtn.2023.07.032\", \"CorpusId\": 260396176, \"PubMed\": \"37662969\"}, \"title\": \"Non-viral in vivo cytidine base editing in hepatocytes using focused ultrasound targeted microbubbles\", \"venue\": \"Molecular Therapy: Nucleic Acids\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2162253123002056/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10468349, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4566558\", \"name\": \"C. D. Anderson\"}, {\"authorId\": \"2059615164\", \"name\": \"J. Arthur\"}, {\"authorId\": \"2167605289\", \"name\": \"Yuan Zhang\"}, {\"authorId\": \"39549472\", \"name\": \"Nik\\u00eb Bharucha\"}, {\"authorId\": \"6099843\", \"name\": \"I. Karakikes\"}, {\"authorId\": \"2418829\", \"name\": \"R. Shohet\"}], \"abstract\": \"CRISPR-Cas9-based genome editing technologies, such as base editing, have the potential for clinical translation, but delivering nucleic acids into target cells in vivo is a major obstacle. Viral vectors are widely used but come with safety concerns, while current non-viral methods are limited by low transfection efficiency. Here we describe a new method to deliver CRISPR-Cas9 base editing vectors to the mouse liver using focused ultrasound targeted microbubble destruction (FUTMD). We demonstrate, using the example of cytosine base editing of the Pde3b gene, that FUTMD-mediated delivery of cytosine base editing vectors can introduce stop codons (up to \\u223c2.5% on-target editing) in mouse liver cells in vivo. However, base editing specificity is less than one might hope with these DNA constructs. Our findings suggest that FUTMD-based gene editing tools can be rapidly and transiently deployed to specific organs and sites, providing a powerful platform for the development of non-viral genome editing therapies. Non-viral delivery also reveals greater off-target base exchange in vivo than in vitro.\"}, {\"paperId\": \"074cd8fcc5b1321f32c7da3a76ad120a0d062558\", \"externalIds\": {\"PubMedCentral\": \"7243233\", \"MAG\": \"3029519799\", \"DOI\": \"10.1186/s13068-020-01732-w\", \"CorpusId\": 218773017, \"PubMed\": \"32461765\"}, \"title\": \"Rational engineering of the Trichoderma reesei RUT-C30 strain into an industrially relevant platform for cellulase production\", \"venue\": \"Biotechnology for Biofuels\", \"year\": 2020, \"citationCount\": 96, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://biotechnologyforbiofuels.biomedcentral.com/track/pdf/10.1186/s13068-020-01732-w\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7243233, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35517211\", \"name\": \"L. Fonseca\"}, {\"authorId\": \"4203349\", \"name\": \"L. Parreiras\"}, {\"authorId\": \"38071951\", \"name\": \"M. Murakami\"}], \"abstract\": \"The path for the development of hypersecreting strains of Trichoderma reesei capable of producing industrially relevant enzyme titers remains elusive despite over 70 years of research and industrial utilization. Herein, we describe the rational engineering of the publicly available T. reesei RUT-C30 strain and a customized process for cellulase production based on agroindustrial by-products. A CRISPR/Cas9 system was used to introduce six genetic modifications in RUT-C30. Implemented changes included the constitutive expression of a mutated allele of the cellulase master regulator XYR1, the expression of two heterologous enzymes, the \\u03b2-glucosidase CEL3A from Talaromyces emersonii and the invertase SUC1 from Aspergillus niger, and the deletion of genes encoding the cellulase repressor ACE1 and the extracellular proteases SLP1 and PEP1. These alterations resulted in a remarkable increase of protein secretion rates by RUT-C30 and amended its well described \\u03b2-glucosidase deficiency while enabling the utilization of sucrose and eliminating the requirement of inducing sugars for enzyme production. With a developed sugarcane molasses-based bioprocess, the engineered strain reached an extracellular protein titer of 80.6 g L\\u22121 (0.24 g L\\u22121 h\\u22121), which is the highest experimentally supported titer so far reported for T. reesei. The produced enzyme cocktail displayed increased levels of cellulase and hemicellulase activities, with particularly large increments being observed for the specific activities of \\u03b2-glucosidase (72-fold) and xylanase (42-fold). Notably, it also exhibited a saccharification efficiency similar to that of a commercially available cellulase preparation in the deconstruction of industrially pretreated sugarcane straw. This work demonstrates the rational steps for the development of a cellulase hyperproducing strain from a well-characterized genetic background available in the public domain, the RUT-C30, associated with an industrially relevant bioprocess, paving new perspectives for Trichoderma research on cellulase production.\"}, {\"paperId\": \"074f8a94caed3c1b82813176b3c2c8eca83cbbfb\", \"externalIds\": {\"DOI\": \"10.1016/j.canlet.2024.216877\", \"CorpusId\": 269142132, \"PubMed\": \"38615930\"}, \"title\": \"PRMT5 activates lipid metabolic reprogramming via MYC contributing to the growth and survival of mantle cell lymphoma.\", \"venue\": \"Cancer Letters\", \"year\": 2024, \"citationCount\": 15, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.canlet.2024.216877?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.canlet.2024.216877, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49174635\", \"name\": \"Jin-Hua Liang\"}, {\"authorId\": \"119692035\", \"name\": \"Weiting Wang\"}, {\"authorId\": \"2296990944\", \"name\": \"Rong Wang\"}, {\"authorId\": \"2057937870\", \"name\": \"R. Gao\"}, {\"authorId\": \"2250315896\", \"name\": \"Kaixin Du\"}, {\"authorId\": \"2214630720\", \"name\": \"Zihui Duan\"}, {\"authorId\": \"2269444849\", \"name\": \"Xin-Yu Zhang\"}, {\"authorId\": \"2144462054\", \"name\": \"Yue Li\"}, {\"authorId\": \"4345119\", \"name\": \"Jia-zhu Wu\"}, {\"authorId\": \"2087123921\", \"name\": \"H. Yin\"}, {\"authorId\": \"2110771121\", \"name\": \"Hao Shen\"}, {\"authorId\": \"2007567075\", \"name\": \"Li Wang\"}, {\"authorId\": \"2240323605\", \"name\": \"Jian-Yong Li\"}, {\"authorId\": \"2231055358\", \"name\": \"Jin-Ran Guo\"}, {\"authorId\": \"2252201615\", \"name\": \"Wei Xu\"}], \"abstract\": \"Mantle cell lymphoma (MCL) is an incurable and aggressive subtype of non-Hodgkin B-cell lymphoma. Increased lipid uptake, storage, and lipogenesis occur in a variety of cancers and contribute to rapid tumor growth. However, no data has been explored for the roles of lipid metabolism reprogramming in MCL. Here, we identified aberrant lipid metabolism reprogramming and PRMT5 as a key regulator of cholesterol and fatty acid metabolism reprogramming in MCL patients. High PRMT5 expression predicts adverse outcome prognosis in 105 patients with MCL and GEO database (GSE93291). PRMT5 deficiency resulted in proliferation defects and cell death by CRISPR/Cas9 editing. Moreover, PRMT5 inhibitors including SH3765 and EPZ015666 worked through blocking SREBP1/2 and FASN expression in MCL. Furthermore, PRMT5 was significantly associated with MYC expression in 105 MCL samples and the GEO database (GSE93291). CRISPR MYC knockout indicated PRMT5 can promote MCL outgrowth by inducing SREBP1/2 and FASN expression through the MYC pathway.\"}, {\"paperId\": \"075014ca36555f1207df5a7e2a9ca08acc7c2dd7\", \"externalIds\": {\"DOI\": \"10.1002/adma.202470097\", \"CorpusId\": 268823198}, \"title\": \"Engineered Nanomaterials to Potentiate CRISPR/Cas9 Gene Editing for Cancer Therapy (Adv. Mater. 13/2024)\", \"venue\": \"Advances in Materials\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1002/adma.202470097\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/adma.202470097?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/adma.202470097, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2027668450\", \"name\": \"Ke Yi\"}, {\"authorId\": \"2143672860\", \"name\": \"Huimin Kong\"}, {\"authorId\": \"49353539\", \"name\": \"Yeh-Hsing Lao\"}, {\"authorId\": \"2256286330\", \"name\": \"Di Li\"}, {\"authorId\": \"48439626\", \"name\": \"Rachel L. Mintz\"}, {\"authorId\": \"2281321962\", \"name\": \"Tianxu Fang\"}, {\"authorId\": \"2155230036\", \"name\": \"Guojun Chen\"}, {\"authorId\": \"2048857616\", \"name\": \"Yu Tao\"}, {\"authorId\": \"144163560\", \"name\": \"Mingqiang Li\"}, {\"authorId\": \"2256319162\", \"name\": \"Jianxun Ding\"}], \"abstract\": null}, {\"paperId\": \"075056524df165ce27f359ad5a2b1dad25431062\", \"externalIds\": {\"PubMedCentral\": \"8698744\", \"DOI\": \"10.3892/ijo.2021.5294\", \"CorpusId\": 245158422, \"PubMed\": \"34913069\"}, \"title\": \"Downregulation of METTL6 mitigates cell progression, migration, invasion and adhesion in hepatocellular carcinoma by inhibiting cell adhesion molecules\", \"venue\": \"International Journal of Oncology\", \"year\": 2021, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.spandidos-publications.com/10.3892/ijo.2021.5294/download\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8698744, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1447071344\", \"name\": \"Amina Bolatkan\"}, {\"authorId\": \"2065451253\", \"name\": \"Ken Asada\"}, {\"authorId\": \"6207609\", \"name\": \"S. Kaneko\"}, {\"authorId\": \"35333934\", \"name\": \"K. Suvarna\"}, {\"authorId\": \"36560539\", \"name\": \"Noriko Ikawa\"}, {\"authorId\": \"31971482\", \"name\": \"Hidenori Machino\"}, {\"authorId\": \"2003184297\", \"name\": \"M. Komatsu\"}, {\"authorId\": \"2159068\", \"name\": \"S. Shiina\"}, {\"authorId\": \"5604758\", \"name\": \"Ryuji Hamamoto\"}], \"abstract\": \"RNA modifications have attracted increasing interest in recent years because they have been frequently implicated in various human diseases, including cancer, highlighting the importance of dynamic post-transcriptional modifications. Methyltransferase-like 6 (METTL6) is a member of the RNA methyltransferase family that has been identified in many cancers; however, little is known about its specific role or mechanism of action. In the present study, we aimed to study the expression levels and functional role of METTL6 in hepatocellular carcinoma (HCC), and further investigate the relevant pathways. To this end, we systematically conducted bioinformatics analysis of METTL6 in HCC using gene expression data and clinical information from a publicly available dataset. The mRNA expression levels of METTL6 were significantly upregulated in HCC tumor tissues compared to that in adjacent non-tumor tissues and strongly associated with poorer survival outcomes in patients with HCC. CRISPR/Cas9-mediated knockout of METTL6 in HCC cell lines remarkably inhibited colony formation, cell proliferation, cell migration, cell invasion and cell attachment ability. RNA sequencing analysis demonstrated that knockout of METTL6 significantly suppressed the expression of cell adhesion-related genes. However, chromatin immunoprecipitation sequencing results revealed no significant differences in enhancer activities between cells, which suggests that METTL6 may regulate genes of interest post-transcriptionally. In addition, it was demonstrated for the first time that METTL6 was localized in the cytosol as detected by immunofluorescence analysis, which indicates the plausible location of RNA modification mediated by METTL6. Our findings provide further insight into the function of RNA modifications in cancer and suggest a possible role of METTL6 as a therapeutic target in HCC.\"}, {\"paperId\": \"07508732719f08c75893f9f4d0a0eba55cfa3a8f\", \"externalIds\": {\"DOI\": \"10.1182/blood-2022-166254\", \"CorpusId\": 256796978}, \"title\": \"Treatment of Individuals with Severe Sickle Cell Disease with OTQ923, an Autologous, Ex Vivo, CRISPR/Cas9-Edited, CD34+ Hematopoietic Stem and Progenitor Cell Product, Leads to Durable Engraftment and Fetal Hemoglobin Induction\", \"venue\": \"Blood\", \"year\": 2022, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2022-166254\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2022-166254?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2022-166254, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1492041018\", \"name\": \"Akshay Sharma\"}, {\"authorId\": \"51465558\", \"name\": \"J. Boelens\"}, {\"authorId\": \"49774746\", \"name\": \"M. Cancio\"}, {\"authorId\": \"14378253\", \"name\": \"J. Hankins\"}, {\"authorId\": \"2205482941\", \"name\": \"Prafulla A Bhad\"}, {\"authorId\": \"50691693\", \"name\": \"Andrew Lewandowski\"}, {\"authorId\": \"2154968139\", \"name\": \"Xiaojun Zhao\"}, {\"authorId\": \"15854896\", \"name\": \"Shripad D. Chitnis\"}, {\"authorId\": \"5893397\", \"name\": \"Radhika Peddinti\"}, {\"authorId\": \"46323285\", \"name\": \"Yan Zheng\"}, {\"authorId\": \"143913970\", \"name\": \"N. Kapoor\"}, {\"authorId\": \"2599880\", \"name\": \"F. Ciceri\"}, {\"authorId\": \"2118573499\", \"name\": \"Ji Yuan\"}, {\"authorId\": \"34345448\", \"name\": \"V. Yu\"}, {\"authorId\": \"5818742\", \"name\": \"S. Stevenson\"}, {\"authorId\": \"21786429\", \"name\": \"S. De Vita\"}, {\"authorId\": \"2019232\", \"name\": \"J. LaBelle\"}], \"abstract\": null}, {\"paperId\": \"07532ec34ff3125f2ec453a2965e242007b74f9d\", \"externalIds\": {\"MAG\": \"2977599741\", \"DOI\": \"10.1016/j.ymthe.2019.10.001\", \"CorpusId\": 204834478, \"PubMed\": \"31636040\"}, \"title\": \"Simultaneous Deletion of Endogenous TCR\\u03b1\\u03b2 for TCR Gene Therapy Creates an Improved and Safe Cellular Therapeutic.\", \"venue\": \"Molecular Therapy\", \"year\": 2020, \"citationCount\": 59, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.cell.com/article/S1525001619304551/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymthe.2019.10.001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymthe.2019.10.001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"47124384\", \"name\": \"Laura T Morton\"}, {\"authorId\": \"4085749\", \"name\": \"Rogier M. Reijmers\"}, {\"authorId\": \"40763410\", \"name\": \"A. Wouters\"}, {\"authorId\": \"66814004\", \"name\": \"C. Kweekel\"}, {\"authorId\": \"6103050\", \"name\": \"D. Remst\"}, {\"authorId\": \"1380066766\", \"name\": \"C. R. Pothast\"}, {\"authorId\": \"1399011831\", \"name\": \"J. Falkenburg\"}, {\"authorId\": \"153781593\", \"name\": \"M. Heemskerk\"}], \"abstract\": \"Generation of an optimal T\\u00a0cell therapeutic expressing high frequencies of transgenic T\\u00a0cell receptor (tgTCR) is essential for improving TCR gene therapy. Upon TCR gene transfer, presence of endogenous TCR\\u03b1\\u03b2 reduces expression of tgTCR due to TCR mixed-dimer formation and competition for binding CD3. Knockout (KO) of endogenous TCR\\u03b1\\u03b2 was recently achieved using CRISPR/Cas9 editing of the TRAC or TRBC loci, resulting in increased expression and function of tgTCR. Here, we adopt this approach into current protocols for generating T\\u00a0cell populations expressing tgTCR to validate this strategy in the context of four clinically relevant TCRs. First, simultaneous editing of TRAC and TRBC loci was reproducible and resulted in high double KO efficiencies in bulk CD8 T\\u00a0cells. Next, tgTCR expression was significantly higher in double TRAC/BC KO conditions for all TCRs tested, including those that contained structural modifications to encourage preferential pairing. Finally, increased expression of tgTCR in edited T\\u00a0cell populations allowed for increased recognition of antigen expressing tumor targets and prolonged control of tumor outgrowth in a preclinical model of multiple myeloma. In conclusion, CRISPR/Cas9-mediated KO of both endogenous TCR\\u03b1\\u03b2 chains can be incorporated in current T\\u00a0cell production protocols and is preferential to ensure an improved and safe clinical therapeutic.\"}, {\"paperId\": \"0757455dc60a680e4743f3b6230fbc474513c341\", \"externalIds\": {\"PubMedCentral\": \"9636094\", \"DOI\": \"10.1007/s11262-022-01933-5\", \"CorpusId\": 252405604, \"PubMed\": \"36127475\"}, \"title\": \"Construction and characterisation of glycoprotein E and glycoprotein I deficient mutants of Australian strains of infectious laryngotracheitis virus using traditional and CRISPR/Cas9-assisted homologous recombination techniques\", \"venue\": \"Virus genes\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s11262-022-01933-5.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9636094, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15153367\", \"name\": \"Marzieh Armat\"}, {\"authorId\": \"49843102\", \"name\": \"P. Vaz\"}, {\"authorId\": \"2702092\", \"name\": \"G. Browning\"}, {\"authorId\": \"5042773\", \"name\": \"A. Noormohammadi\"}, {\"authorId\": \"6653116\", \"name\": \"C. Hartley\"}, {\"authorId\": \"2410066\", \"name\": \"J. Devlin\"}], \"abstract\": \"In alphaherpesviruses, glycoproteins E and I (gE and gI, respectively) form a heterodimer that facilitates cell-to-cell spread of virus. Using traditional homologous recombination techniques, as well as CRISPR/Cas9-assisted homologous recombination, we separately deleted gE and gI coding sequences from an Australian field strain (CSW-1) and a vaccine strain (A20) of infectious laryngotracheitis virus (ILTV) and replaced each coding sequence with sequence encoding green fluorescent protein (GFP). Virus mutants in which gE and gI gene sequences had been replaced with GFP were identified by fluorescence microscopy but were unable to be propagated separately from the wildtype virus in either primary chicken cells or the LMH continuous chicken cell line. These findings build on findings from a previous study of CSW-1 ILTV in which a double deletion mutant of gE and gI could not be propagated separately from wildtype virus and produced an in vivo phenotype of single-infected cells with no cell-to-cell spread observed. Taken together these studies suggest that both the gE and gI genes have a significant role in cell-to-cell spread in both CSW-1 and A20 strains of ILTV. The CRISPR/Cas9-assisted deletion of genes from the ILTV genome described in this study adds this virus to a growing list of viruses to which this approach has been used to study viral gene function.\"}, {\"paperId\": \"075cdb525a8d7e8a1245de0aa9acdbb9cd6dd114\", \"externalIds\": {\"MAG\": \"3091429604\", \"DOI\": \"10.1007/s00262-020-02732-3\", \"CorpusId\": 222071263, \"PubMed\": \"33000417\"}, \"title\": \"Downregulated ATP6V1B1 expression acidifies the intracellular environment of cancer cells leading to resistance to antibody-dependent cellular cytotoxicity\", \"venue\": \"Cancer Immunology and Immunotherapy\", \"year\": 2020, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://repository.kulib.kyoto-u.ac.jp/dspace/bitstream/2433/261614/1/yigak04681.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s00262-020-02732-3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s00262-020-02732-3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7400391\", \"name\": \"Mariko Nishie\"}, {\"authorId\": \"40117775\", \"name\": \"E. Suzuki\"}, {\"authorId\": \"50173010\", \"name\": \"M. Hattori\"}, {\"authorId\": \"1976933130\", \"name\": \"Kosuke Kawaguch\"}, {\"authorId\": \"38914024\", \"name\": \"T. Kataoka\"}, {\"authorId\": \"35560389\", \"name\": \"M. Hirata\"}, {\"authorId\": \"49551773\", \"name\": \"F. Pu\"}, {\"authorId\": \"47534292\", \"name\": \"T. Kotake\"}, {\"authorId\": \"32452938\", \"name\": \"M. Tsuda\"}, {\"authorId\": \"8699758\", \"name\": \"A. Yamaguchi\"}, {\"authorId\": \"4405574\", \"name\": \"T. Sugie\"}, {\"authorId\": \"3238312\", \"name\": \"M. Toi\"}], \"abstract\": null}, {\"paperId\": \"075f84d101b28a71426c894d1943bca980b4f12c\", \"externalIds\": {\"PubMedCentral\": \"9539832\", \"DOI\": \"10.3389/fpls.2022.1018029\", \"CorpusId\": 252468410, \"PubMed\": \"36212315\"}, \"title\": \"In-depth analysis of genomes and functional genomics of orchid using cutting-edge high-throughput sequencing\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.1018029/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9539832, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"31086946\", \"name\": \"Cheng Song\"}, {\"authorId\": \"2152539984\", \"name\": \"Yan Wang\"}, {\"authorId\": \"145501900\", \"name\": \"Muhammad Aamir Manzoor\"}, {\"authorId\": \"67143693\", \"name\": \"Dili Mao\"}, {\"authorId\": \"40398847\", \"name\": \"Peipei Wei\"}, {\"authorId\": \"150346758\", \"name\": \"Yunpeng Cao\"}, {\"authorId\": \"39664712\", \"name\": \"Fucheng Zhu\"}], \"abstract\": \"High-throughput sequencing technology has been facilitated the development of new methodologies and approaches for studying the origin and evolution of plant genomes and subgenomes, population domestication, and functional genomics. Orchids have tens of thousands of members in nature. Many of them have promising application potential in the extension and conservation of the ecological chain, the horticultural use of ornamental blossoms, and the utilization of botanical medicines. However, a large-scale gene knockout mutant library and a sophisticated genetic transformation system are still lacking in the improvement of orchid germplasm resources. New gene editing tools, such as the favored CRISPR-Cas9 or some base editors, have not yet been widely applied in orchids. In addition to a large variety of orchid cultivars, the high-precision, high-throughput genome sequencing technology is also required for the mining of trait-related functional genes. Nowadays, the focus of orchid genomics research has been directed to the origin and classification of species, genome evolution and deletion, gene duplication and chromosomal polyploidy, and flower morphogenesis-related regulation. Here, the progressing achieved in orchid molecular biology and genomics over the past few decades have been discussed, including the evolution of genome size and polyploidization. The frequent incorporation of LTR retrotransposons play important role in the expansion and structural variation of the orchid genome. The large-scale gene duplication event of the nuclear genome generated plenty of recently tandem duplicated genes, which drove the evolution and functional divergency of new genes. The evolution and loss of the plastid genome, which mostly affected genes related to photosynthesis and autotrophy, demonstrated that orchids have experienced more separate transitions to heterotrophy than any other terrestrial plant. Moreover, large-scale resequencing provide useful SNP markers for constructing genetic maps, which will facilitate the breeding of novel orchid varieties. The significance of high-throughput sequencing and gene editing technologies in the identification and molecular breeding of the trait-related genes in orchids provides us with a representative trait-improving gene as well as some mechanisms worthy of further investigation. In addition, gene editing has promise for the improvement of orchid genetic transformation and the investigation of gene function. This knowledge may provide a scientific reference and theoretical basis for orchid genome studies.\"}, {\"paperId\": \"0761eac2642f7fd84a02c0090a02060eac03e5db\", \"externalIds\": {\"DOI\": \"10.1016/j.bpj.2022.11.595\", \"CorpusId\": 256778738, \"PubMed\": \"36784977\"}, \"title\": \"DNA mini-circles reveal effects of DNA topology on CRISPR-Cas9 functions.\", \"venue\": \"Biophysical Journal\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.bpj.2022.11.595\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.bpj.2022.11.595?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.bpj.2022.11.595, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115966399\", \"name\": \"Yukang Liu\"}, {\"authorId\": \"2173197\", \"name\": \"P. Qin\"}], \"abstract\": null}, {\"paperId\": \"07640949e2efa5953bca276bb49a9798151c0e89\", \"externalIds\": {\"PubMedCentral\": \"11629742\", \"DOI\": \"10.1111/tpj.17111\", \"CorpusId\": 273776201, \"PubMed\": \"39485941\"}, \"title\": \"A MYB transcription factor underlying plant height in sorghum qHT7.1 and maize Brachytic 1 loci\", \"venue\": \"The Plant Journal\", \"year\": 2024, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1111/tpj.17111\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11629742, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144735405\", \"name\": \"Qi Mu\"}, {\"authorId\": \"2257449771\", \"name\": \"Jialu Wei\"}, {\"authorId\": \"2328816324\", \"name\": \"Hallie K Longest\"}, {\"authorId\": \"2310773297\", \"name\": \"Hua Liu\"}, {\"authorId\": \"35527848\", \"name\": \"S. N. Char\"}, {\"authorId\": \"2328820621\", \"name\": \"Jacob T Hinrichsen\"}, {\"authorId\": \"2151758814\", \"name\": \"Laura E. Tibbs-Cortes\"}, {\"authorId\": \"90038897\", \"name\": \"Gregory R. Schoenbaum\"}, {\"authorId\": \"2252975843\", \"name\": \"Bing Yang\"}, {\"authorId\": \"1502870306\", \"name\": \"Xianran Li\"}, {\"authorId\": \"2297255721\", \"name\": \"Jianming Yu\"}], \"abstract\": \"SUMMARY Manipulating plant height is an essential component of crop improvement. Plant height was generally reduced through breeding in wheat, rice, and sorghum to resist lodging and increase grain yield but kept high for bioenergy crops. Here, we positionally cloned a plant height quantitative trait locus (QTL) qHT7.1 as a MYB transcription factor controlling internode elongation, cell proliferation, and cell morphology in sorghum. A 740\\u2009bp transposable element insertion in the intronic region caused a partial mis\\u2010splicing event, generating a novel transcript that included an additional exon and a premature stop codon, leading to short plant height. The dominant allele had an overall higher expression than the recessive allele across development and internode position, while both alleles' expressions peaked at 46\\u2009days after planting and progressively decreased from the top to lower internodes. The orthologue of qHT7.1 was identified to underlie the brachytic1 (br1) locus in maize. A large insertion in exon 3 and a 160\\u2009bp insertion at the promoter region were identified in the br1 mutant, while an 18\\u2009bp promoter insertion was found to be associated with reduced plant height in a natural recessive allele. CRISPR/Cas9\\u2013induced gene knockout of br1 in two maize inbred lines showed significant plant height reduction. These findings revealed functional connections across natural, mutant, and edited alleles of this MYB transcription factor in sorghum and maize. This enriched our understanding of plant height regulation and enhanced our toolbox for fine\\u2010tuning plant height for crop improvement.\"}, {\"paperId\": \"07685636edb1594ade11bdb24436cef2674903cf\", \"externalIds\": {\"MAG\": \"3132369743\", \"DOI\": \"10.1016/J.EXPHEM.2020.09.017\", \"CorpusId\": 234644330}, \"title\": \"1018 \\u2013 KLF6 MEDIATES AGE-RELATED DYSFUNCTION IN HUMAN HEMATOPOIETIC STEM AND PROGENITOR CELLS.\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.exphem.2020.09.017\", \"status\": \"BRONZE\", \"license\": \"publisher-specific-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/J.EXPHEM.2020.09.017?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/J.EXPHEM.2020.09.017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143969500\", \"name\": \"M. Figueroa\"}], \"abstract\": \"With aging there is a gradual decline in normal HSC function, which is accompanied by an increased risk for the development of hematological malignancies. We recently reported that KLF6, a Krupper-like transcription factor, is one of the top genes downregulated with aging in human Lin\\u2212CD34+CD38\\u2212 cells. In order to test whether loss of KLF6 may be implicated in age-related HSC dysfunction, we performed CRISPR-Cas9-based genome editing and transcriptional activation of the KLF6 locus in human CD34+ cells. KLF6-deficientcells displayed in vitro block in myeloid and erythroid differentiation as well as increased colony-forming capacity on methylcellulose assays. Importantly, CRISPR targeting of the nearest putative enhancer to the KLF6 locus (-20kb), which resulted in >75% downregulation of the KLF6 transcript, recapitulated the differentiation block and colony-forming phenotypes. RNA-seq analysis confirmed that in young CD34+ cells both targeting KLF6 and its putative enhancer, results in gene expression signature enriched not only for our previously reported human aging HSC signature, but also for several leukemia-associated gene signatures. Next, we sought to determine if re-expression of KLF6 in aged CD34+ cells could reverse the aging phenotype. KLF6 induction in these cells using a dCas9-VP64 fusion system led to a normalization of their myeloid differentiation potential in vitro, resulting in aged CD34+ cells behaving similar to their younger counterpart controls. Finally, both inactivation of the KLF6 or the -20kb enhancer resulted an aged-like in vivo hematopoiesis when engrafted into NSGS mice. This was evidenced by an increased myeloid output in peripheral blood compared to control (wks 8-14), which was accompanied by a decrease in lymphoid output. Moreover, analysis of the bone marrow composition at week 14 showed increased frequency of HSC and progenitor components. Our findings demonstrate that KLF6 is essential for normal hematopoietic function and that reactivation of KLF6 in aged HSPCs leads to an attenuation of the aging HSPC phenotype in vitro.\"}, {\"paperId\": \"076884a022e977cd21ef1a0a5e66add5623486e6\", \"externalIds\": {\"DOI\": \"10.1101/2023.11.12.566744\", \"CorpusId\": 265221626}, \"title\": \"Efficient genome editing using modified Cas9 proteins in zebrafish\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.biologists.com/bio/article-pdf/13/4/bio060401/3413816/bio060401.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.11.12.566744?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.11.12.566744, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2266844360\", \"name\": \"Laura Dorner\"}, {\"authorId\": \"2266844861\", \"name\": \"Benedikt Stratmann\"}, {\"authorId\": \"2266844788\", \"name\": \"Laura Bader\"}, {\"authorId\": \"1780793474\", \"name\": \"Marco Podobnik\"}, {\"authorId\": \"5177682\", \"name\": \"U. Irion\"}], \"abstract\": \"The zebrafish (Danio rerio) is an important model organism for basic as well as applied bio-medical research. One main advantage is its genetic tractability, which was greatly enhanced by the introduction of the CRISPR/Cas method a decade ago. The generation of loss-of-function alleles via the production of small insertions or deletions in the coding sequences of genes with CRISPR/Cas systems is now routinely achieved with high efficiency. The method is based on the error prone repair of precisely targeted DNA double strand breaks by non-homologous end joining (NHEJ) in the cell nucleus. However, editing the genome with base pair precision, by homology-directed repair (HDR), is by far less efficient and therefore often requires large-scale screening of potential carriers by labour intensive genotyping. Here we show that the Cas9 protein variant SpRY with relaxed PAM requirement can be used for gene targeting in zebrafish, thus expanding the versatility of the method. In addition, we demonstrate that the incorporation of an artificial nuclear localisation signal (aNLS) into the Cas9 protein variants not only enhances the efficiency of gene knock-out but also the frequency of HDR thereby facilitating the efficient modification of single base pairs in the genome. Our protocols provide a guide for a cost-effective generation of versatile and potent Cas9 protein variants and efficient gene editing in zebrafish.\"}, {\"paperId\": \"076c644b7e0d173361e9d81cd1308d44eae7d667\", \"externalIds\": {\"PubMedCentral\": \"11296251\", \"DOI\": \"10.1016/j.xpro.2024.102932\", \"CorpusId\": 271117926, \"PubMed\": \"38996063\"}, \"title\": \"Protocol for generating in-frame seamless knockins in Drosophila using the SEED/Harvest technology\", \"venue\": \"STAR Protocols\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.xpro.2024.102932\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11296251, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2060872684\", \"name\": \"Gustavo Aguilar\"}, {\"authorId\": \"2171365475\", \"name\": \"Milena Bauer\"}, {\"authorId\": \"145974775\", \"name\": \"M. Vigano\"}, {\"authorId\": \"2288640007\", \"name\": \"Isabel Guerrero\"}, {\"authorId\": \"2310165387\", \"name\": \"Markus Affolter\"}], \"abstract\": \"Summary The generation of knockins is fundamental to dissect biological systems. SEED/Harvest, a technology based on CRISPR-Cas9, offers a powerful approach for seamless genome editing in Drosophila. Here, we present a protocol to tag any gene in the Drosophila genome using SEED/Harvest technology. We describe knockin design, plasmid preparation, injection, and insertion screening. We then detail procedures for germline harvesting. The technique combines straightforward cloning and robust screening of insertions, while still resulting in scarless gene editing. For complete details on the use and execution of this protocol, please refer to Aguilar et al.1\"}, {\"paperId\": \"076e6c26233cde9c067846ac30223d0f2253120e\", \"externalIds\": {\"DOI\": \"10.33263/briac131.098\", \"CorpusId\": 248075268}, \"title\": \"Gene Editing: a Powerful Tool for Cancer Immunotherapy\", \"venue\": \"Biointerface Research in Applied Chemistry\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.33263/briac131.098\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.33263/briac131.098?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.33263/briac131.098, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3945879\", \"name\": \"S. Yahya\"}, {\"authorId\": \"2242380090\", \"name\": \"S. I. A. Mohamed\"}, {\"authorId\": \"52140545\", \"name\": \"Shereen M. M. Yahya\"}], \"abstract\": \"Recently, Gene editing has emerged as one of the recent promising tools for gene therapy. This technique is remarkable in biotechnology and medicine since it enables genomic editing in vivo with high accuracy. The most important gene-editing enzymes are zinc finger nucleases (ZFNs), homing meganucleases, transcription activator-like effector nucleases (TALENs), and the clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated nuclease 9 (Cas9). The immune system plays an important role in the removal of abnormal and cancerous cells and their role in the defense against foreign pathogens. Immune cells routinely remove abnormal cells by screening cell function, gene mutations, and cancerous cell formation. The CRISPER technology was widely applied to introduce a therapeutic regimen in cancer treatment based on tumor genome editing. Additionally, it was used in cancer immunotherapy. For example, CRISPR technology has introduced an alternative to the conventional clinical drug, Herceptin, targeting HER2 in breast carcinoma. Moreover, it was used in CAR-T cell generation and immune cell checkpoint inhibition. Researchers are seeking to fight many hard diseases by using CRISPR technology. However, many challenges still exist. Some of these challenges include the requirement of PAM sequence, the possibility of on target deletion or addition, off-target effects, Cas9-DSB complex formation, the lack of perfect delivery methods, and low HDR output. In this review, we outline the application of CRISPR technology in cancer immunotherapy and the challenges that hinder the implementation of this technology.\"}, {\"paperId\": \"07700815f8c4ace3a2abf3323c395d457b3521a0\", \"externalIds\": {\"MAG\": \"3013673279\", \"DOI\": \"10.1126/scisignal.abb9820\", \"CorpusId\": 214793741, \"PubMed\": \"33203722\"}, \"title\": \"ELP-dependent expression of MCL1 promotes resistance to EGFR inhibition in triple-negative breast cancer cells\", \"venue\": \"Science Signaling\", \"year\": 2020, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7685180\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/scisignal.abb9820?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/scisignal.abb9820, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1398775094\", \"name\": \"Peter Cruz-Gordillo\"}, {\"authorId\": \"51164477\", \"name\": \"Megan E. Honeywell\"}, {\"authorId\": \"4023517\", \"name\": \"Nicholas W. Harper\"}, {\"authorId\": \"47434485\", \"name\": \"T. Leete\"}, {\"authorId\": \"67254604\", \"name\": \"Michael J. Lee\"}], \"abstract\": \"Blocking the antiapoptotic protein Mcl-1 sensitizes TNBC cells to erlotinib. Unmasking drug sensitivity Although the activity of the epidermal growth factor receptor (EGFR) pathway is increased in triple-negative breast cancers (TNBC), patients are generally insensitive to EGFR inhibitors. Cruz-Gordillo et al. found that this is because TNBC cells produced the prosurvival protein Mcl-1. A gene deletion screen revealed that insensitivity to the EGFR inhibitor erlotinib required MCL1 expression promoted by the ELP family of transcription-elongation regulators, particularly ELP4. The findings suggest that an ELP4\\u2013Mcl-1 mechanism masks erlotinib sensitivity in TNBC and that combining erlotinib with an Mcl-1 inhibitor might be effective in patients with TNBC. Targeted therapeutics for cancer generally exploit \\u201concogene addiction,\\u201d a phenomenon in which the growth and survival of tumor cells depend on the activity of a particular protein. However, the efficacy of oncogene-targeted therapies varies substantially. For instance, targeting epidermal growth factor receptor (EGFR) signaling is effective in some non\\u2013small cell lung cancer (NSCLC) but not in triple-negative breast cancer (TNBC), although these cancers show a similar degree of increase in EGFR activity. Using a genome-wide CRISPR-Cas9 genetic knockout screen, we found that the Elongator (ELP) complex mediates insensitivity to the EGFR inhibitor erlotinib in TNBC cells by promoting the synthesis of the antiapoptotic protein Mcl-1. Depleting ELP proteins promoted apoptotic cell death in an EGFR inhibition\\u2013dependent manner. Pharmacological inhibition of Mcl-1 synergized with EGFR inhibition in a panel of genetically diverse TNBC cells. The findings indicate that TNBC \\u201caddiction\\u201d to EGFR signaling is masked by the ELP complex and that resistance to EGFR inhibitors in TNBC might be overcome by cotargeting Mcl-1.\"}, {\"paperId\": \"077052fe6c462d7c872034ef453f37a4c0c871f9\", \"externalIds\": {\"PubMedCentral\": \"9613721\", \"DOI\": \"10.1134/S1607672922040044\", \"CorpusId\": 251911383, \"PubMed\": \"36038685\"}, \"title\": \"The Variable CTCF Site from Drosophila melanogaster Ubx Gene is Redundant and Has no Insulator Activity\", \"venue\": \"Doklady Biochemistry and Biophysics\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1134/S1607672922040044.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9613721, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1598530030\", \"name\": \"A. Ibragimov\"}, {\"authorId\": \"1803522224\", \"name\": \"O. V. Bylino\"}, {\"authorId\": \"5992342\", \"name\": \"O. Kyrchanova\"}, {\"authorId\": \"2347437577\", \"name\": \"Y. V. Shidlovskii\"}, {\"authorId\": \"2149911301\", \"name\": \"R. White\"}, {\"authorId\": \"145004516\", \"name\": \"P. Schedl\"}, {\"authorId\": \"145822796\", \"name\": \"P. G. Georgiev\"}], \"abstract\": \"Abstract CTCF is the most thoroughly studied chromatin architectural protein and it is found in both Drosophila and mammals. CTCF preferentially binds to promoters and insulators and is thought to facilitate formation of chromatin loops. In a subset of sites, CTCF binding depends on the epigenetic status of the surrounding chromatin. One such variable CTCF site ( vCTCF ) was found in the intron of the Ubx gene, in close proximity to the BRE and abx enhancers. CTCF binds to the variable site in tissues where Ubx gene is active, suggesting that the vCTCF site plays a role in facilitating contacts between the Ubx promoter and its enhancers. Using CRISPR/Cas9 and attP/attB site-specific integration methods, we investigated the functional role of vCTCF and showed that it is not required for normal Drosophila development. Furthermore, a 2161-bp fragment containing vCTCF does not function as an effective insulator when substituted for the Fab-7 boundary in the Bithorax complex. Our results suggest that vCTCF function is redundant in the regulation of Ubx .\"}, {\"paperId\": \"07726f8e56a9899313c93b9662d4adbe31dad845\", \"externalIds\": {\"DOI\": \"10.1089/crispr.2021.29120.fur\", \"CorpusId\": 231988861, \"PubMed\": \"33616446\"}, \"title\": \"The Cas9 Hammer\\u2014and Sickle: A Challenge for Genome Editors\", \"venue\": \"The CRISPR Journal\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/crispr.2021.29120.fur?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/crispr.2021.29120.fur, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3571589\", \"name\": \"F. Urnov\"}], \"abstract\": \"Genome editing using CRISPR-Cas9 has produced a functional cure for a small number of patients with sickle cell disease and beta-thalassemia. Rather than repairing the causative mutation, this striking outcome was attained by the knockout of a lineage-specific regulatory element for a gene, BCL11A, that controls fetal hemoglobin levels: a first example of clinical success in targeting a locus initially identified in a genome-wide association study, and formal proof of the \\\"in the age of CRISPR, the entire genome is a druggable target\\\" notion. This remarkable development, along with advancement to the clinic of several additional editing-based approaches to the hemoglobinopathies, highlights a sense of urgency in accelerating scientific, regulatory, and public health innovation that will allow broad and equitable access to editing-based cures.\"}, {\"paperId\": \"07736bb0ed308d823235b97c994aba5e0413661c\", \"externalIds\": {\"PubMedCentral\": \"8821480\", \"DOI\": \"10.1007/s11248-021-00274-7\", \"CorpusId\": 236432753, \"PubMed\": \"34304349\"}, \"title\": \"Sustainable use of CRISPR/Cas in fish aquaculture: the biosafety perspective\", \"venue\": \"Transgenic research\", \"year\": 2021, \"citationCount\": 72, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s11248-021-00274-7.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8821480, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5848399\", \"name\": \"Arinze S. Okoli\"}, {\"authorId\": \"2120789929\", \"name\": \"T. Blix\"}, {\"authorId\": \"4139040\", \"name\": \"A. Myhr\"}, {\"authorId\": \"5377992\", \"name\": \"Wen\\u2010teng Xu\"}, {\"authorId\": \"2142546950\", \"name\": \"Xiaodong Xu\"}], \"abstract\": \"Aquaculture is becoming the primary source of seafood for human diets, and farmed fish aquaculture is one of its fastest growing sectors. The industry currently faces several challenges including infectious and parasitic diseases, reduced viability, fertility reduction, slow growth, escapee fish and environmental pollution. The commercialization of the growth-enhanced AquAdvantage salmon and the CRISPR/Cas9-developed tilapia (Oreochromis niloticus) proffers genetic engineering and genome editing tools, e.g. CRISPR/Cas, as potential solutions to these challenges. Future traits being developed in different fish species include disease resistance, sterility, and enhanced growth. Despite these notable advances, off-target effect and non-clarification of trait-related genes among other technical challenges hinder full realization of CRISPR/Cas potentials in fish breeding. In addition, current regulatory and risk assessment frameworks are not fit-for purpose regarding the challenges of CRISPR/Cas notwithstanding that public and regulatory acceptance are key to commercialization of products of the new technology. In this study, we discuss how CRISPR/Cas can be used to overcome some of these limitations focusing on diseases and environmental release in farmed fish aquaculture. We further present technical limitations, regulatory and risk assessment challenges of the use of CRISPR/Cas, and proffer research strategies that will provide much-needed data for regulatory decisions, risk assessments, increased public awareness and sustainable applications of CRISPR/Cas in fish aquaculture with emphasis on Atlantic salmon (Salmo salar) breeding.\"}, {\"paperId\": \"07767a3ad010f5c1b4920ce25e458549c64b5e8a\", \"externalIds\": {\"CorpusId\": 237434648, \"PubMed\": \"34491232\"}, \"title\": \"Applications and Advancements of CRISPR/Cas9 Technology: An Update.\", \"venue\": \"Journal of the Association of Genetic Technologists\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"119347492\", \"name\": \"A. Okabe\"}, {\"authorId\": \"2125838908\", \"name\": \"Peter Simonse\"}, {\"authorId\": \"143685641\", \"name\": \"A. Reyes\"}, {\"authorId\": \"2113629713\", \"name\": \"Leena Nabipur\"}, {\"authorId\": \"2034074633\", \"name\": \"Melody Zaki\"}, {\"authorId\": \"144818697\", \"name\": \"C. Tirado\"}], \"abstract\": null}, {\"paperId\": \"0779c93feb717fa46f1b5807f108352f5b89e8df\", \"externalIds\": {\"PubMedCentral\": \"9438151\", \"DOI\": \"10.1186/s13287-022-03135-0\", \"CorpusId\": 252018600, \"PubMed\": \"36056433\"}, \"title\": \"Generation of corrected hiPSC clones from a Cornelia de Lange Syndrome (CdLS) patient through CRISPR-Cas-based technology\", \"venue\": \"Stem cell research & therapeutics\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://stemcellres.biomedcentral.com/counter/pdf/10.1186/s13287-022-03135-0\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9438151, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35518312\", \"name\": \"A. Umbach\"}, {\"authorId\": \"35495662\", \"name\": \"Giulia Maule\"}, {\"authorId\": \"8474404\", \"name\": \"E. Kheir\"}, {\"authorId\": \"4284317\", \"name\": \"Alessandro Cutarelli\"}, {\"authorId\": \"48472174\", \"name\": \"M. Foglia\"}, {\"authorId\": \"1685581547\", \"name\": \"L. Guarrera\"}, {\"authorId\": \"37710355\", \"name\": \"L. Fava\"}, {\"authorId\": \"46613470\", \"name\": \"L. Conti\"}, {\"authorId\": \"6439168\", \"name\": \"E. Garattini\"}, {\"authorId\": \"34649562\", \"name\": \"M. Terao\"}, {\"authorId\": \"5814169\", \"name\": \"A. Cereseto\"}], \"abstract\": \"Background Cornelia de Lange syndrome (CdLS) is a rare multisystem genetic disorder which is caused by genetic defects involving the Nipped-B-like protein ( NIPBL ) gene in the majority of clinical cases (60\\u201370%). Currently, there are no specific cures available for CdLS and clinical management is needed for life. Disease models are highly needed to find a cure. Among therapeutic possibilities are genome editing strategies based on CRISPR-Cas technology. Methods A comparative analysis was performed to test the most recent CRISPR-Cas technologies comprising base- and prime-editors which introduce modifications without DNA cleavages and compared with sequence substitution approaches through homology directed repair (HDR) induced by Cas9 nuclease activity. The HDR method that was found more efficient was applied to repair a CdLS-causing mutation in the NIPBL gene. Human-induced pluripotent stem cells (hiPSCs) derived from a CdLS patient carrying the c.5483G\\u2009>\\u2009A mutation in the NIPBL were modified through HDR to generate isogenic corrected clones. Results This study reports an efficient method to repair the NIPBL gene through HDR mediated by CRISPR-Cas and induced with a compound (NU7441) inhibiting non-homologous end joining (NHEJ) repair. This sequence repair method allowed the generation of isogenic wild-type hiPSCs clones with regular karyotype and preserved pluripotency. Conclusions CdLS cellular models were generated which will facilitate the investigation of the disease molecular determinants and the identification of therapeutic targets. In particular, the hiPSC-based cellular models offer the paramount advantage to study the tissue differentiation stages which are altered in the CdLS clinical development. Importantly, the hiPSCs that were generated are isogenic thus providing the most controlled experimental set up between wild-type and mutated conditions.\"}, {\"paperId\": \"0779de451014d7f3283abffd80fc45ffbc903c22\", \"externalIds\": {\"PubMedCentral\": \"9749150\", \"DOI\": \"10.1186/s13071-022-05590-3\", \"CorpusId\": 254678169, \"PubMed\": \"36514125\"}, \"title\": \"Molecular characterization and genetic authentication assay for Anopheles \\u2018hemocyte-like\\u2019 cell lines 4a-3A and 4a-3B\", \"venue\": \"Parasites & Vectors\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://parasitesandvectors.biomedcentral.com/counter/pdf/10.1186/s13071-022-05590-3\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9749150, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2084987439\", \"name\": \"H. Eggleston\"}, {\"authorId\": \"2358813760\", \"name\": \"Kimani Njoya\"}, {\"authorId\": \"2150937092\", \"name\": \"Cameron E. Anderson\"}, {\"authorId\": \"40495676\", \"name\": \"I. Holm\"}, {\"authorId\": \"5401787\", \"name\": \"K. Eiglmeier\"}, {\"authorId\": \"150151396\", \"name\": \"Jiangtao Liang\"}, {\"authorId\": \"2721351\", \"name\": \"I. Sharakhov\"}, {\"authorId\": \"6283008\", \"name\": \"K. Vernick\"}, {\"authorId\": \"40080680\", \"name\": \"M. M. Riehle\"}], \"abstract\": \"Background Anopheles cell lines are used in a variety of ways to better understand the major vectors of malaria in sub-Saharan Africa. Despite this, commonly used cell lines are not well characterized, and no tools are available for cell line identification and authentication. Methods Utilizing whole genome sequencing, genomes of 4a-3A and 4a-3B \\u2018hemocyte-like\\u2019 cell lines were characterized for insertions and deletions (indels) and SNP variation. Genomic locations of distinguishing sequence variation and species origin of the cell lines were also examined. Unique indels were targeted to develop a PCR-based cell line authentication assay. Mitotic chromosomes were examined to survey the cytogenetic landscape for chromosome structure and copy number in the cell lines. Results The 4a-3A and 4a-3B cell lines are female in origin and primarily of Anopheles coluzzii ancestry. Cytogenetic analysis indicates that the two cell lines are essentially diploid, with some relatively minor chromosome structural rearrangements. Whole-genome sequence was generated, and analysis indicated that SNPs and indels which differentiate the cell lines are clustered on the 2R chromosome in the regions of the 2Rb, 2Rc and 2Ru chromosomal inversions. A PCR-based authentication assay was developed to fingerprint three indels unique to each cell line. The assay distinguishes between 4a-3A and 4a-3B cells and also uniquely identifies two additional An. coluzzii cell lines tested, Ag55 and Sua4.0. The assay has the specificity to distinguish four cell lines and also has the sensitivity to detect cellular contamination within a sample of cultured cells. Conclusions Genomic characterization of the 4a-3A and 4a-3B Anopheles cell lines was used to develop a simple diagnostic assay that can distinguish these cell lines within and across research laboratories. A cytogenetic survey indicated that the 4a-3A and Sua4.0 cell lines carry essentially normal diploid chromosomes, which makes them amenable to CRISPR/Cas9 genome editing. The presented simple authentication assay, coupled with screening for mycoplasma, will allow validation of the integrity of experimental resources and will promote greater experimental reproducibility of results. Graphical abstract\"}, {\"paperId\": \"077acf12732089461082d9db8d8a23bdab95d95e\", \"externalIds\": {\"MAG\": \"3112136078\", \"DOI\": \"10.1002/hast.1200\", \"CorpusId\": 229177775, \"PubMed\": \"33315259\"}, \"title\": \"Human Genome Editing and a Global Socio-bioethics Approach.\", \"venue\": \"The Hastings center report\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/hast.1200?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/hast.1200, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"36366082\", \"name\": \"J. Nie\"}], \"abstract\": \"A global socio-bioethics is called upon to address the ethical challenges arising from the revolutionary gene editing technologies such as CRISPR-Cas9, which offers the capability to rewrite the human genome. The ethical inquiry Fran\\u00e7oise Baylis has undertaken in the book Altered Inheritance: CRISPR and the Ethics of Human Genome Editing (Harvard University Press, 2019) operates at individual, societal and global levels. Baylis has not only presented insights on how to practice \\\"slow science\\\" and achieve broad societal consensus through empowering the public, but she also shown what a global socio-bioethics approach can offer for the further development of bioethics.\"}, {\"paperId\": \"077b41beb6aab6c0d1c278f464eba76792e941d7\", \"externalIds\": {\"PubMedCentral\": \"8313132\", \"DOI\": \"10.1111/pbi.13559\", \"CorpusId\": 231788967, \"PubMed\": \"33529430\"}, \"title\": \"A piggyBac\\u2010mediated transgenesis system for the temporary expression of CRISPR/Cas9 in rice\", \"venue\": \"Plant Biotechnology Journal\", \"year\": 2021, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/pbi.13559\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8313132, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1399063210\", \"name\": \"Ayako Nishizawa-Yokoi\"}, {\"authorId\": \"5012320\", \"name\": \"S. Toki\"}], \"abstract\": \"Summary Targeted mutagenesis via CRISPR/Cas9 is now widely used, not only in model plants but also in agriculturally important crops. However, in vegetative crop propagation, CRISPR/Cas9 expression cassettes cannot be segregated out in the resulting progenies, but must nevertheless be eliminated without leaving unnecessary sequences in the genome. To this end, we designed a piggyBac\\u2010mediated transgenesis system for the temporary expression of CRISPR/Cas9 in plants. This system allows integration into the host genome of piggyBac carrying both CRISPR/Cas9 and positive selection marker expression cassettes from an extrachromosomal double\\u2010stranded transfer DNA (dsT\\u2010DNA), with subsequent excision of the transgenes by the re\\u2010transposition of piggyBac from the host genome after successful induction of targeted mutagenesis via CRISPR/Cas9. Here, we demonstrate that the transgenesis system via piggyBac transposition from T\\u2010DNA works to deliver transgenes in rice. Following positive\\u2013negative selection to exclude transgenic cells randomly transformed with T\\u2010DNA, piggyBac\\u2010mediated transgenesis from the extrachromosomal dsT\\u2010DNA was successful in ca. 1% of transgenic callus lines. After temporary expression of CRISPR/Cas9 within piggyBac, we confirmed, in a proof\\u2010of\\u2010concept experiment, that piggyBac could be excised precisely from the genome via the stably transformed transposase PBase. Even after excision of piggyBac, CRISPR/Cas9\\u2010induced targeted mutations could be detected in the endogenous gene in regenerated rice plants. These results suggest that our piggyBac\\u2010mediated transgenesis system will be a valuable tool in establishing efficient CRISPR/Cas9\\u2010mediated targeted mutagenesis in vegetatively propagated crops.\"}, {\"paperId\": \"077c6759f539c01cd8d51262009826e2b2acf651\", \"externalIds\": {\"PubMedCentral\": \"7955673\", \"DOI\": \"10.7717/peerj.11079\", \"CorpusId\": 233220762, \"PubMed\": \"33854845\"}, \"title\": \"Characterization of the first vaginal Lactobacillus crispatus genomes isolated in Brazil\", \"venue\": \"PeerJ\", \"year\": 2021, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.7717/peerj.11079\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7955673, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2074142857\", \"name\": \"Marcelle Oliveira de Almeida\"}, {\"authorId\": \"144312787\", \"name\": \"R. Carvalho\"}, {\"authorId\": \"117202687\", \"name\": \"Fl\\u00e1via Figueira Aburjaile\"}, {\"authorId\": \"2074142470\", \"name\": \"Fabio Malcher Miranda\"}, {\"authorId\": \"2074142468\", \"name\": \"Jana\\u00edna Can\\u00e1rio Cerqueira\"}, {\"authorId\": \"2180807\", \"name\": \"B. Brenig\"}, {\"authorId\": \"2288846664\", \"name\": \"P. Ghosh\"}, {\"authorId\": \"3246989\", \"name\": \"R. Ramos\"}, {\"authorId\": \"14377408\", \"name\": \"R. Kato\"}, {\"authorId\": \"113420749\", \"name\": \"Siomar de Castro Soares\"}, {\"authorId\": \"1399890075\", \"name\": \"Artur Silva\"}, {\"authorId\": \"2071489289\", \"name\": \"V. Azevedo\"}, {\"authorId\": \"51193080\", \"name\": \"M. V. Can\\u00e1rio Viana\"}], \"abstract\": \"Background Lactobacillus crispatus is the dominant species in the vaginal microbiota associated with health and considered a homeostasis biomarker. Interestingly, some strains are even used as probiotics. However, the genetic mechanisms of L. crispatus involved in the control of the vaginal microbiome and protection against bacterial vaginosis (BV) are not entirely known. To further investigate these mechanisms, we sequenced and characterized the first four L. crispatus genomes from vaginal samples from Brazilian women and used genome-wide association study (GWAS) and comparative analyses to identify genetic mechanisms involved in healthy or BV conditions and selective pressures acting in the vaginal microbiome. Methods The four genomes were sequenced, assembled using ten different strategies and automatically annotated. The functional characterization was performed by bioinformatics tools comparing with known probiotic strains. Moreover, it was selected one representative strain (L. crispatus CRI4) for in vitro detection of phages by electron microscopy. Evolutionary analysis, including phylogeny, GWAS and positive selection were performed using 46 public genomes strains representing health and BV conditions. Results Genes involved in probiotic effects such as lactic acid production, hydrogen peroxide, bacteriocins, and adhesin were identified. Three hemolysins and putrescine production were predicted, although these features are also present in other probiotic strains. The four genomes presented no plasmids, but 14 known families insertion sequences and several prophages were detected. However, none of the mobile genetic elements contained antimicrobial resistance genes. The genomes harbor a CRISPR-Cas subtype II-A system that is probably inactivated due to fragmentation of the genes csn2 and cas9. No genomic feature was associated with a health condition, perhaps due to its multifactorial characteristic. Five genes were identified as under positive selection, but the selective pressure remains to be discovered. In conclusion, the Brazilian strains investigated in this study present potential protective properties, although in vitro and in vivo studies are required to confirm their efficacy and safety to be considered for human use.\"}, {\"paperId\": \"077ce057aa47cddf027ddaca5881a3a60c8f25e5\", \"externalIds\": {\"PubMedCentral\": \"10690052\", \"DOI\": \"10.1242/dmm.050193\", \"CorpusId\": 257312217, \"PubMed\": \"36909527\"}, \"title\": \"Episodic live imaging of cone photoreceptor maturation in GNAT2-EGFP retinal organoids\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.biologists.com/dmm/article-pdf/16/11/dmm050193/3255327/dmm050193.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10690052, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"35104766\", \"name\": \"J. Bai\"}, {\"authorId\": \"48872280\", \"name\": \"D. Koos\"}, {\"authorId\": \"2139317178\", \"name\": \"Kayla Stepanian\"}, {\"authorId\": \"2306960101\", \"name\": \"Zachary Fouladian\"}, {\"authorId\": \"2050133509\", \"name\": \"D. Shayler\"}, {\"authorId\": \"40259967\", \"name\": \"J. G. Aparicio\"}, {\"authorId\": \"2068839116\", \"name\": \"S. Fraser\"}, {\"authorId\": \"1948292\", \"name\": \"R. Moats\"}, {\"authorId\": \"4396881\", \"name\": \"D. Cobrinik\"}], \"abstract\": \"Fluorescent reporter pluripotent stem cell (PSC) derived retinal organoids are powerful tools to investigate cell type-specific development and disease phenotypes. When combined with live imaging, they enable direct and repeated observation of cell behaviors within a developing retinal tissue. Here, we generated a human cone photoreceptor reporter line by CRISPR/Cas9 genome editing of WTC11-mTagRFPT-LMNB1 human induced pluripotent stem cells (iPSCs) by inserting enhanced green fluorescent protein (EGFP) coding sequences and a 2A self-cleaving peptide at the N-terminus of Guanine Nucleotide-Binding Protein Subunit Alpha Transducin 2 (GNAT2). In retinal organoids generated from these iPSCs, the GNAT2-EGFP allele robustly and exclusively labeled both immature and mature cones starting at culture day 34. Episodic confocal live imaging of hydrogel immobilized retinal organoids allowed tracking of morphological maturation of individual cones for >18 weeks and revealed inner segment accumulation of mitochondria and growth at 12.2 cubic microns per day from day 126 to day 153. Immobilized GNAT2-EGFP cone reporter organoids provide a valuable tool for investigating human cone development and disease.\"}, {\"paperId\": \"077f008fa92fd5c7b02320444976c3285a16f978\", \"externalIds\": {\"DOI\": \"10.3920/978-90-8686-940-4_490\", \"CorpusId\": 256755785}, \"title\": \"490. Removing the dopaminergic inhibition with CRISPR-Cas9 to study the progression of sexual maturation in zebrafish\", \"venue\": \"Proceeding of 12th World Congress on Genetics Applied to Livestock Production (WCGALP)\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3920/978-90-8686-940-4_490?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3920/978-90-8686-940-4_490, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"20684833\", \"name\": \"P. J\\u00e9hannet\"}, {\"authorId\": \"2205336154\", \"name\": \"A. de Wit\"}, {\"authorId\": \"12858300\", \"name\": \"S. Brugman\"}, {\"authorId\": \"2286264472\", \"name\": \"Y. Zhang\"}, {\"authorId\": \"4761708\", \"name\": \"J. Bogerd\"}, {\"authorId\": \"3779886\", \"name\": \"A. Palstra\"}], \"abstract\": null}, {\"paperId\": \"077f5eae4fae1fff6e98769bd0cf399691064cfc\", \"externalIds\": {\"DOI\": \"10.21203/rs.2.19654/v2\", \"CorpusId\": 241200407}, \"title\": \"Comparative cytological and transcriptome analysis reveals high pollen fertility and upregulation of environmentally sensitive genic male sterility genes in neo-tetraploid rice\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.21203/rs.2.19654/v2\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.21203/rs.2.19654/v2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.21203/rs.2.19654/v2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"7162554\", \"name\": \"Jinwen Wu\"}, {\"authorId\": \"49069065\", \"name\": \"Yuanmou Chen\"}, {\"authorId\": \"6526211\", \"name\": \"Hong Lin\"}, {\"authorId\": \"31943168\", \"name\": \"Yang-Li Chen\"}, {\"authorId\": \"46185307\", \"name\": \"Hang Yu\"}, {\"authorId\": \"8704263\", \"name\": \"Zijun Lu\"}, {\"authorId\": \"2144439456\", \"name\": \"Xiang Li\"}, {\"authorId\": \"2111826518\", \"name\": \"Hai-Lian Zhou\"}, {\"authorId\": \"49864763\", \"name\": \"Zhixiong Chen\"}, {\"authorId\": \"49544440\", \"name\": \"Xiangdong Liu\"}], \"abstract\": \"\\n Background: Autotetraploid rice is a useful germplasm for polyploid rice breeding; however, low seed setting is a major hindrance for the utilization of autotetraploid rice. Our previous study demonstrated that neo-tetraploid rice have great yield potential, which is thought to be one effective way to overcome the low fertility of autotetraploid rice. However, there is little known about the cause of high pollen fertility in neo-tetraploid rice. Here, we employed cytology and RNA-seq to study the molecular genetic mechanism of high pollen fertility in neo-tetraploid rice. Results: Cytological observations indicate that H1 displayed high pollen fertility (95.62%), lower percentage of pollen mother cells\\uff08PMCs\\uff09abnormalities, and stable chromosome configurations during the pollen development process compared with its two parents. RNA-seq analysis detected 440 differentially expressed genes (DEGs) in neo-tetraploid rice compared with its two parents. Of these DEGs, 193 were annotated as pollen fertility-related genes, and 129 (~66.8%) exhibited significant upregulation in neo-tetraploid rice compared with its two parents, including nine cloned genes ( TMS9-1 , TMS5 etc.) that were validated by qRT-PCR and had been demonstrated to be pollen fertility-related genes. We further selected TMS9-1 and TMS5 as the candidate gene and analysed its pollen fertility in neo-tetraploid rice using the CRISPR/Cas9 technique. Significant variations have been detected in pollen fertility value, pollen development process and expression level in H1 and its knock out lines. Conclusion: Our finding provides strong evidence for the regulatory mechanisms of neo-tetraploid rice, and upregulation of pollen fertility-related genes should be associated with high fertility. Moreover, knockout of environmentally sensitive genic male sterility genes in the present study provides the new useful germplasm for polyploidy rice breeding.\"}, {\"paperId\": \"07803ee6e8e0c928e6fd71fb0e81ad23434e0cc2\", \"externalIds\": {\"DOI\": \"10.1007/s12033-023-00844-6\", \"CorpusId\": 261607986, \"PubMed\": \"37682457\"}, \"title\": \"LncRNA RP11-93B14.5 promotes gastric cancer cell growth through PI3K/AKT signaling pathway\", \"venue\": \"Molecular Biotechnology\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12033-023-00844-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12033-023-00844-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2121608353\", \"name\": \"Qianxiu Li\"}, {\"authorId\": \"2238539994\", \"name\": \"Zhongxiu Zhu\"}, {\"authorId\": \"46702179\", \"name\": \"Hanyu Zhang\"}, {\"authorId\": \"145919678\", \"name\": \"Xu Wu\"}, {\"authorId\": \"2238537495\", \"name\": \"Huan Yang\"}, {\"authorId\": \"1668993563\", \"name\": \"Xiaobing Li\"}, {\"authorId\": \"2154690693\", \"name\": \"Wanping Li\"}, {\"authorId\": \"113027158\", \"name\": \"Yueshui Zhao\"}, {\"authorId\": \"1453127293\", \"name\": \"F. Du\"}, {\"authorId\": \"2144838110\", \"name\": \"Yu Chen\"}, {\"authorId\": \"46904786\", \"name\": \"Jing Shen\"}, {\"authorId\": \"152287372\", \"name\": \"Zhangang Xiao\"}, {\"authorId\": \"2108612031\", \"name\": \"Meijuan Chen\"}, {\"authorId\": \"2155602590\", \"name\": \"Fang Wang\"}, {\"authorId\": \"2069591427\", \"name\": \"Li Gu\"}, {\"authorId\": \"2166623703\", \"name\": \"Yuhong Sun\"}, {\"authorId\": \"50706684\", \"name\": \"Lan Lu\"}, {\"authorId\": \"2238536882\", \"name\": \"Yuliang Jia\"}, {\"authorId\": \"47629172\", \"name\": \"Mingxing Li\"}], \"abstract\": null}, {\"paperId\": \"0781cf72778a1e153c17331b1968ca678d267d7e\", \"externalIds\": {\"PubMedCentral\": \"8657081\", \"DOI\": \"10.3390/cancers13236142\", \"CorpusId\": 245011643, \"PubMed\": \"34885250\"}, \"title\": \"Metabolic Rewiring Is Essential for AML Cell Survival to Overcome Autophagy Inhibition by Loss of ATG3\", \"venue\": \"Cancers\", \"year\": 2021, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2072-6694/13/23/6142/pdf?version=1638873395\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8657081, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46758203\", \"name\": \"F. Baker\"}, {\"authorId\": \"49005396\", \"name\": \"I. H. Polat\"}, {\"authorId\": \"1401980153\", \"name\": \"K. Abou-El-Ardat\"}, {\"authorId\": \"1394421766\", \"name\": \"Islam Alshamleh\"}, {\"authorId\": \"2144117802\", \"name\": \"Marlyn Thoelken\"}, {\"authorId\": \"1486464566\", \"name\": \"Daniel Hymon\"}, {\"authorId\": \"48154215\", \"name\": \"A. Gubas\"}, {\"authorId\": \"4130195\", \"name\": \"Sebastian E. Koschade\"}, {\"authorId\": \"6456562\", \"name\": \"Jonas B Vischedyk\"}, {\"authorId\": \"47324889\", \"name\": \"M. Kaulich\"}, {\"authorId\": \"2075560960\", \"name\": \"H. Schwalbe\"}, {\"authorId\": \"14853103\", \"name\": \"S. Shaid\"}, {\"authorId\": \"4082870\", \"name\": \"C. Brandts\"}], \"abstract\": \"Simple Summary The importance of autophagy in leukemia progression and survival has been studied previously. However, little is known about the development of resistance mechanisms to autophagy inhibition in leukemia. Here, we present data on the mechanisms by which leukemia cells maintain their cell survival after inhibition of autophagy by the loss of ATG3. After the loss of ATG3, leukemia cells upregulated their energy metabolism by increasing glycolysis and mitochondrial metabolism, in particular oxidative phosphorylation, which resulted in higher ATP levels. Moreover, inhibition of mitochondrial function strongly impaired cell survival in ATG3 deficiency, thus demonstrating the importance of ATG3 in the regulation of metabolism and survival of leukemic cells. Therefore, our data provide a rationale for combining autophagy inhibitors with inhibitors targeting mitochondrial metabolism for the development of leukemia therapy to overcome the potential obstacle of emerging resistance to autophagy inhibition. Abstract Autophagy is an important survival mechanism that allows recycling of nutrients and removal of damaged organelles and has been shown to contribute to the proliferation of acute myeloid leukemia (AML) cells. However, little is known about the mechanism by which autophagy- dependent AML cells can overcome dysfunctional autophagy. In our study we identified autophagy related protein 3 (ATG3) as a crucial autophagy gene for AML cell proliferation by conducting a CRISPR/Cas9 dropout screen with a library targeting around 200 autophagy-related genes. shRNA-mediated loss of ATG3 impaired autophagy function in AML cells and increased their mitochondrial activity and energy metabolism, as shown by elevated mitochondrial ROS generation and mitochondrial respiration. Using tracer-based NMR metabolomics analysis we further demonstrate that the loss of ATG3 resulted in an upregulation of glycolysis, lactate production, and oxidative phosphorylation. Additionally, loss of ATG3 strongly sensitized AML cells to the inhibition of mitochondrial metabolism. These findings highlight the metabolic vulnerabilities that AML cells acquire from autophagy inhibition and support further exploration of combination therapies targeting autophagy and mitochondrial metabolism in AML.\"}, {\"paperId\": \"0783f95aeb2b7d46c51471ffbd1984b6b2c5f6af\", \"externalIds\": {\"PubMedCentral\": \"11574282\", \"DOI\": \"10.1016/j.crmeth.2024.100882\", \"CorpusId\": 273514818, \"PubMed\": \"39437714\"}, \"title\": \"Computationally guided high-throughput engineering of an anti-CRISPR protein for precise genome editing in human cells\", \"venue\": \"Cell Reports Methods\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.crmeth.2024.100882\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11574282, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2274945343\", \"name\": \"Julia Marsiglia\"}, {\"authorId\": \"2274944659\", \"name\": \"Kia Vaalavirta\"}, {\"authorId\": \"2274942158\", \"name\": \"Estefany Knight\"}, {\"authorId\": \"2275577346\", \"name\": \"Muneaki Nakamura\"}, {\"authorId\": \"2274945270\", \"name\": \"Le Cong\"}, {\"authorId\": \"1392371118\", \"name\": \"Nicholas W. Hughes\"}], \"abstract\": \"Summary The application of CRISPR-Cas systems to genome editing has revolutionized experimental biology and is an emerging gene and cell therapy modality. CRISPR-Cas systems target off-target regions within the human genome, which is a challenge that must be addressed. Phages have evolved anti-CRISPR proteins (Acrs) to evade CRISPR-Cas-based immunity. Here, we engineer an Acr (AcrIIA4) to increase the precision of CRISPR-Cas-based genome targeting. We developed an approach that leveraged (1) computational guidance, (2) deep mutational scanning, and (3) highly parallel DNA repair measurements within human cells. In a single experiment, \\u223c10,000 Acr variants were tested. Variants that improved editing precision were tested in additional validation experiments that revealed robust enhancement of gene editing precision and synergy with a high-fidelity version of Cas9. This scalable high-throughput screening framework is a promising methodology to engineer Acrs to increase gene editing precision, which could be used to improve the safety of gene editing-based therapeutics.\"}, {\"paperId\": \"0784eee9a2ed68002c5a5333e5208f36ff512105\", \"externalIds\": {\"MAG\": \"3129415068\", \"DOI\": \"10.20546/IJCMAS.2020.911.024\", \"CorpusId\": 231967996}, \"title\": \"CRISPR/Cas9: A Revolutionary Tool for Recent Advances in Crop Improvement: A Review\", \"venue\": \"International Journal of Current Microbiology and Applied Sciences\", \"year\": 2020, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ijcmas.com/9-11-2020/Abhishek K. Gowda, et al.pdf\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.20546/IJCMAS.2020.911.024?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.20546/IJCMAS.2020.911.024, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2056967752\", \"name\": \"A. Gowda\"}, {\"authorId\": \"2107529400\", \"name\": \"S. Mishra\"}, {\"authorId\": \"1659008365\", \"name\": \"Mainak Barman\"}, {\"authorId\": \"1753656558\", \"name\": \"M. Saikumar\"}], \"abstract\": \"Crop plants, possess a complex genome organization and gene expression hence it is difficult or impossible to perform site-specific mutagenesis for the development of desirable agronomic trait more indirect methods must be used, such as silencing the gene of interest by RNA interference (RNAi). But sometime gene disruption by siRNA can be variable or incomplete. The advent of genome editing, or genome editing with engineered nucleases (GEEN) or targeted genome editing (TGE) (type of genetic engineering in which DNA is inserted, replaced, or removed from a genome using artificially engineered nucleases, or \\\"molecular scissors\\\") through which targeted genome editing is accomplished in wide variety of agronomically important crop species using sequence specific nucleases (SSNs) (Kamburova et al., 2017). The current applications of genome editing in plants, focuses on its potential for crop improvement in terms of adaptation, resilience, and endInternational Journal of Current Microbiology and Applied Sciences ISSN: 2319-7706 Volume 9 Number 11 (2020) Journal homepage: http://www.ijcmas.com\"}, {\"paperId\": \"0786a0ff893814fb44307d99f285ad5f49b12999\", \"externalIds\": {\"DOI\": \"10.1128/aem.00415-23\", \"CorpusId\": 258831287, \"PubMed\": \"37212708\"}, \"title\": \"Ergot Alkaloids Contribute to the Pathogenic Potential of the Fungus Aspergillus leporis\", \"venue\": \"Applied and Environmental Microbiology\", \"year\": 2023, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10304750\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1128/aem.00415-23?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1128/aem.00415-23, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115783259\", \"name\": \"Abigail M. Jones\"}, {\"authorId\": \"3824877\", \"name\": \"D. Panaccione\"}], \"abstract\": \"Certain environmental fungi infect animals occasionally or conditionally, whereas others do not. Factors that affect the virulence of these opportunistically pathogenic fungi may have originally evolved to fill some other role for the fungus in its primary environmental niche. ABSTRACT Opportunistically pathogenic fungi have varying potential to cause disease in animals. Factors contributing to their virulence include specialized metabolites, which in some cases evolved in contexts unrelated to pathogenesis. Specialized metabolites that increase fungal virulence in the model insect Galleria mellonella include the ergot alkaloids fumigaclavine C in Aspergillus fumigatus (syn. Neosartorya fumigata) and lysergic acid \\u03b1-hydroxyethylamide (LAH) in the entomopathogen Metarhizium brunneum. Three species of Aspergillus recently found to accumulate high concentrations of LAH were investigated for their pathogenic potential in G. mellonella. Aspergillus leporis was most virulent, A. hancockii was intermediate, and A. homomorphus had very little pathogenic potential. Aspergillus leporis and A. hancockii emerged from and sporulated on dead insects, thus completing their asexual life cycles. Inoculation by injection resulted in more lethal infections than did topical inoculation, indicating that A. leporis and A. hancockii were preadapted for insect pathogenesis but lacked an effective means to breach the insect\\u2019s cuticle. All three species accumulated LAH in infected insects, with A. leporis accumulating the most. Concentrations of LAH in A. leporis were similar to those observed in the entomopathogen M. brunneum. LAH was eliminated from A. leporis through a CRISPR/Cas9-based gene knockout, and the resulting strain had reduced virulence to G. mellonella. The data indicate that A. leporis and A. hancockii have considerable pathogenic potential and that LAH increases the virulence of A. leporis. IMPORTANCE Certain environmental fungi infect animals occasionally or conditionally, whereas others do not. Factors that affect the virulence of these opportunistically pathogenic fungi may have originally evolved to fill some other role for the fungus in its primary environmental niche. Among the factors that may improve the virulence of opportunistic fungi are specialized metabolites\\u2013\\u2013chemicals that are not essential for basic life functions but provide producers with an advantage in particular environments or under specific conditions. Ergot alkaloids are a large family of fungal specialized metabolites that contaminate crops in agriculture and serve as the foundations of numerous pharmaceuticals. Our results show that two ergot alkaloid-producing fungi that were not previously known to be opportunistic pathogens can infect a model insect and that, in at least one of the species, an ergot alkaloid increases the virulence of the fungus.\"}, {\"paperId\": \"078af88a6d626edc1e352f6ec119c7df3563623a\", \"externalIds\": {\"PubMedCentral\": \"11891445\", \"DOI\": \"10.1093/synbio/ysaf003\", \"CorpusId\": 269431024, \"PubMed\": \"40065842\"}, \"title\": \"biGMamAct: efficient CRISPR/Cas9-mediated docking of large functional DNA cargoes at the ACTB locus\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1093/synbio/ysaf003\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11891445, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2297853496\", \"name\": \"Martin Pelosse\"}, {\"authorId\": \"2261903146\", \"name\": \"Marco Marcia\"}], \"abstract\": \"Recent advances in molecular and cell biology and imaging have unprecedentedly enabled multi-scale structure-functional studies of entire metabolic pathways from atomic to micrometer resolution, and the visualization of macromolecular complexes in situ, especially if these molecules are expressed with appropriately-engineered and easily-detectable tags. However, genome editing in eukaryotic cells is challenging when generating stable cell lines loaded with large DNA cargoes. To address this limitation, here, we have conceived biGMamAct, a system that allows the straightforward assembly of a multitude of genetic modules and their subsequent integration in the genome at the ACTB locus with high efficacy, through standardized cloning steps. Our technology encompasses a set of modular plasmids for mammalian expression, which can be efficiently docked into the genome in tandem with a validated Cas9/sgRNA pair through homologous-independent targeted insertion (HITI). As a proof of concept, we have generated a stable cell line loaded with an 18.3-kilobase-long DNA cargo to express 6 fluorescently-tagged proteins and simultaneously visualize 5 different subcellular compartments. Our protocol leads from the in-silico design to the genetic and functional characterization of single clones within 6 weeks and can be implemented by any researcher with familiarity with molecular biology and access to mammalian cell culturing infrastructure.\"}, {\"paperId\": \"078b4c445645b7b794a4d8f4689c541dc9699211\", \"externalIds\": {\"PubMedCentral\": \"8361755\", \"DOI\": \"10.3389/fpls.2021.670302\", \"CorpusId\": 236503845, \"PubMed\": \"34394137\"}, \"title\": \"CRISPR/Cas9-Induced Loss-of-Function Mutation in the Barley Mitogen-Activated Protein Kinase 6 Gene Causes Abnormal Embryo Development Leading to Severely Reduced Grain Germination and Seedling Shootless Phenotype\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2021, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2021.670302/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8361755, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5782175\", \"name\": \"P. K\\u0159enek\"}, {\"authorId\": \"2121447952\", \"name\": \"Elizaveta Chubar\"}, {\"authorId\": \"6767696\", \"name\": \"P. Vadovi\\u010d\"}, {\"authorId\": \"5975681\", \"name\": \"L. Ohnoutkov\\u00e1\"}, {\"authorId\": \"23535260\", \"name\": \"T. Vl\\u010dko\"}, {\"authorId\": \"4868087\", \"name\": \"V. Bergougnoux\"}, {\"authorId\": \"4082628\", \"name\": \"P. C\\u00e1pal\"}, {\"authorId\": \"3769214\", \"name\": \"M. Ove\\u010dka\"}, {\"authorId\": \"4895119\", \"name\": \"J. \\u0160amaj\"}], \"abstract\": \"The diverse roles of mitogen-activated protein kinases (MAPKs, MPKs) in plant development could be efficiently revealed by reverse genetic studies. In Arabidopsis, mpk6 knockout mutants complete the life cycle; however, ~40% of their embryos show defects in the development leading to abnormal phenotypes of seeds and seedlings' roots. Contrary to the Arabidopsis MPK6, the rice MPK6 (OsMPK6) is an essential gene as transfer DNA (T-DNA) insertion and CRISPR/Cas9 induced loss-of-function mutations in the OsMPK6 cause early embryo arrest. In this study, we successfully developed a viable transgenic barley line with the CRISPR/Cas9-induced heterozygous single base pair cytosine-guanine (CG) deletion [wild type (WT)/\\u22121C] in the third exon of the HvMPK6 gene, a barley ortholog of the Arabidopsis and rice MPK6. There were no obvious macroscopic phenotype differences between the WT/\\u22121C plants and WT plants. All the grains collected from the WT/\\u22121C plants were of similar size and appearance. However, seedling emergence percentage (SEP) from these grains was substantially decreased in the soil in the T2 and T3 generation. The mutation analysis of the 248 emerged T2 and T3 generation plants showed that none of them was a biallelic mutant in the HvMPK6 gene, suggesting lethality of the \\u22121C/\\u22121C homozygous knockout mutation. In the soil, the majority of the \\u22121C/\\u22121C grains did not germinate and the minority of them developed into abnormal seedlings with a shootless phenotype and a reduced root system. Some of the \\u22121C/\\u22121C seedlings also developed one or more small chlorotic leaf blade-like structure/structures. The \\u22121C/\\u22121C grains contained the late-stage developed abnormal embryos with the morphologically obvious scutellum and root part of the embryonic axis but with the missing or substantially reduced shoot part of the embryonic axis. The observed embryonic abnormalities correlated well with the shootless phenotype of the seedlings and suggested that the later-stage defect is predetermined already during the embryo development. In conclusion, our results indicate that barley MPK6 is essential for the embryologically predetermined shoot formation, but not for the most aspects of the embryo and early seedling development.\"}, {\"paperId\": \"078b63799dc7c94cfd83ba8096397ce2e28d3e32\", \"externalIds\": {\"DOI\": \"10.1152/physiol.2024.39.s1.2104\", \"CorpusId\": 269967888}, \"title\": \"Pituitary Neuroendocrine Tumor Organoids Generated from Induced Pluripotent Stem Cells Reveal the Dysregulation of Cell Lineage Differentiation in Cushing\\u2019s Disease\", \"venue\": \"Physiology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1152/physiol.2024.39.s1.2104?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1152/physiol.2024.39.s1.2104, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40370297\", \"name\": \"Saptarshi Mallick\"}, {\"authorId\": \"2127514560\", \"name\": \"Jayati Chakrabarti\"}, {\"authorId\": \"2240395702\", \"name\": \"Jennifer M Eschbacher\"}, {\"authorId\": \"2107801039\", \"name\": \"M. Chang\"}, {\"authorId\": \"2250589152\", \"name\": \"Jared Churko\"}, {\"authorId\": \"2302668648\", \"name\": \"Elisabeth Ferris\"}, {\"authorId\": \"49595275\", \"name\": \"B. Hermes\"}], \"abstract\": \"Background: Cushing\\u2019s Disease (CD) is an endocrine disease typically caused by an adrenocorticotropic hormone (ACTH)-secreting pituitary neuroendocrine tumor (PitNET). Corticotroph subtype PitNETs subsequently stimulate the adrenal glands to overproduce causing a wide range of detrimental effects on health, including increased stroke rates, diabetes, obesity, depression, anxiety, and a threefold increase in the risk of death from cardiovascular disease. In some instances, CD is a manifestation of genetic mutation syndromes that include MEN1, FIPA, CDH23 and Carney complex. In other cases, somatic mutations underlie the development of CD including mutations in the deubiquitinase gene USP8, identified in 35-62 % of sporadic corticotroph PitNETs and USP48 as a driver mutation in USP8 wild-type tumors. There are currently no in vitro models to study the impact of genetic mutations on the pathways leading to PitNET development in humans. Objective: To define the cellular complexity of corticotroph subtype PitNETs at a spatial single-cell resolution. Methodology: Organoids were generated from a CD patient expressing a CDH23 mutation (hPitNETO iPSCDH23) as reported by our group (Mallick et al., 2023, Translational Research). CRISPR-Cas9 gene editing of iPSCs was also used to model the development of corticotroph PitNETs expressing USP48 and USP8 mutations. Human PitNET organoids (PitNETOs) were generated from tumor tissue harvested during transsphenoidal surgery. Cell lineage trajectory analysis was performed on scRNA-seq data collected during the iPSC differentiation program. ScRNA-seq was used to compare the transcriptomic profile and cell composition of CD patient PitNETOs to the patient\\u2019s own tissue using the NanoString CosMxTM spatial transcriptomic analysis. Results: Organoids generated from a CD patient expressing a CDH23 mutation (hPitNETO iPSCDH23) exhibited tumor behavior consistent with the expected pathology and function of sparsely granulated corticotroph PitNETs. Cell lineage trajectories of hPitNETO iPCCtrl control cultures revealed multiple branching paths from the stem-like (SOX2/PAX7+) base cluster leading to clusters enriched for markers of pituitary cell lineages (lactotroph, somatotroph, thyrotroph, gonadotroph and corticotroph). Trajectory analysis for hPitNETO iPSCDH23 showed dysregulation in the normal pituitary cell lineage differentiation leading to the development of poorly differentiated corticotrophs (PAX7+/TPit+) and PAX7+/stem cells. CosMxTM spatial gene mapping revealed a cell population co-expressing PAX7 and stem cell markers SOX2 and CD44 that was abundant in Crooke cell and sparsely granulated TPit+ PitNET subtypes. An increase in the PAX7/SOX2/CD44 PitNET cell population correlated with a higher Knosp grade, tumor size and invasiveness, when compared to densely granulated PitNETs. Conclusions: Defining the complexity of the PitNET microenvironment will provide insights into the pathogenesis of CD and potentially lead to the stratification of high-risk patients for disease recurrence. 1R01DK133325. This is the full abstract presented at the American Physiology Summit 2024 meeting and is only available in HTML format. There are no additional versions or additional content available for this abstract. Physiology was not involved in the peer review process.\"}, {\"paperId\": \"078d88ca2366fd0eaf3659b7f13b020e69b3b755\", \"externalIds\": {\"PubMedCentral\": \"10623504\", \"DOI\": \"10.7759/cureus.46486\", \"CorpusId\": 263681479, \"PubMed\": \"37927716\"}, \"title\": \"Advancements in Heart Failure Management: A Comprehensive Narrative Review of Emerging Therapies\", \"venue\": \"Cureus\", \"year\": 2023, \"citationCount\": 125, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://assets.cureus.com/uploads/review_article/pdf/195799/20231004-11487-1emzikc.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10623504, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"81254795\", \"name\": \"F. Sapna\"}, {\"authorId\": \"2232526617\", \"name\": \"Fnu Raveena\"}, {\"authorId\": \"2232526904\", \"name\": \"Maria Chandio\"}, {\"authorId\": \"2220069322\", \"name\": \"Karoona Bai\"}, {\"authorId\": \"2254465766\", \"name\": \"Mohammad Sayyar\"}, {\"authorId\": \"5125848\", \"name\": \"G. Varrassi\"}, {\"authorId\": \"2051544725\", \"name\": \"Mahima Khatri\"}, {\"authorId\": \"2240949565\", \"name\": \"Satesh Kumar\"}, {\"authorId\": \"2244387725\", \"name\": \"Tamam Mohamad\"}], \"abstract\": \"Heart failure is a substantial and escalating global health challenge, affecting millions worldwide. This complex syndrome arises from diverse etiologies, encompassing ischemic heart disease, hypertension, valvular abnormalities, and cardiomyopathies. Heart failure is characterized by the heart's inability to pump blood efficiently to meet the body's metabolic demands, leading to debilitating symptoms, frequent hospitalizations, and high mortality rates. Traditionally, the management of Heart failure has focused on alleviating symptoms, reducing fluid retention, and enhancing cardiac contractility. These goals have been achieved through a combination of pharmacological therapies such as angiotensin-converting enzyme inhibitors, beta-blockers, and diuretics, often complemented by device-based interventions like implantable cardioverter-defibrillators and cardiac resynchronization therapy. However, despite these advances, the relentless progression of heart failure remains a significant clinical challenge. Neurohormonal activation, cardiac fibrosis, and cellular remodeling are just a few of the intricate processes contributing to the disease's progression. In recent years, researchers and clinicians have embarked on a quest to identify novel therapeutic approaches that address these underlying mechanisms. One such avenue of exploration involves the revolutionary field of gene therapy, with promising gene-editing techniques, such as CRISPR-Cas9, offering potential routes for correcting genetic mutations that contribute to heart failure. Additionally, regenerative medicine approaches, including stem cell therapy and tissue engineering, hold significant promise for repairing damaged cardiac tissue and restoring function. Furthermore, precision medicine initiatives have gained traction, aiming to tailor heart failure therapies to individual patient profiles, taking into account genetics, biomarkers, and comorbidities. Integrating artificial intelligence and machine learning in heart failure management has also enabled the development of predictive models for early intervention, risk stratification, and personalized treatment recommendations. This narrative review navigates the intricate landscape of emerging therapies for heart failure, emphasizing their potential to revolutionize the field by targeting the disease's fundamental mechanisms. By exploring these innovative approaches, we aspire to provide a comprehensive perspective on the evolving paradigm of heart failure management, fostering a hopeful outlook for patients and clinicians alike.\"}, {\"paperId\": \"0793c8770445da53bcf0ae1b7397195d77adf00e\", \"externalIds\": {\"DOI\": \"10.1101/2022.09.19.508489\", \"CorpusId\": 252408095}, \"title\": \"Insights from CRISPR/Cas9-mediated gene editing of centromeric histone H3 (CENH3) in carrot (Daucus carota subsp. sativus)\", \"venue\": \"bioRxiv\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2022.09.19.508489?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2022.09.19.508489, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"5179324\", \"name\": \"F. Dunemann\"}, {\"authorId\": \"1434773155\", \"name\": \"Antje Kr\\u00fcger\"}, {\"authorId\": \"3264524\", \"name\": \"K. Maier\"}, {\"authorId\": \"2185571257\", \"name\": \"Sabine Struckmeyer\"}], \"abstract\": null}, {\"paperId\": \"079c597f988588ba5424b4be27cb922607cb2dc6\", \"externalIds\": {\"MAG\": \"3097420547\", \"DOI\": \"10.1158/1538-7445.tumhet2020-po-017\", \"CorpusId\": 228991385}, \"title\": \"Abstract PO-017: Single-cell copy number heterogeneity tracing enabling cancer gene discovery\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.tumhet2020-po-017?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.tumhet2020-po-017, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1471647893\", \"name\": \"Fang Wang\"}, {\"authorId\": \"2406514475\", \"name\": \"Qihan Wang\"}, {\"authorId\": \"3201754\", \"name\": \"Vakul Mohanty\"}, {\"authorId\": \"7795111\", \"name\": \"Shaoheng Liang\"}, {\"authorId\": \"6051022\", \"name\": \"Jinzhuang Dou\"}, {\"authorId\": \"1567164715\", \"name\": \"Jincheng Han\"}, {\"authorId\": \"47109137\", \"name\": \"Darlan C Minussi\"}, {\"authorId\": \"2715728\", \"name\": \"Ruli Gao\"}, {\"authorId\": \"49594724\", \"name\": \"L. Ding\"}, {\"authorId\": \"1872732\", \"name\": \"N. Navin\"}, {\"authorId\": \"48543305\", \"name\": \"Ken Chen\"}], \"abstract\": \"Aneuploidy, the phenomenon that genomes acquire or lose chromosomal fragments, has been causally implicated in a wide variety of human cancer. Defining which copy number alterations (CNAs) are pathogenic is an important goal of cancer research. However, data based on bulk samples cannot fully depict tumor heterogeneity and evolution, which occurs in single cells, and thus have limited power to discover CNAs useful for cancer diagnostics and therapeutics. Recent advances in single-cell DNA sequencing have enabled acquisition of single-cell copy number (SCCN) profiles in tens of thousands of cells, which potentiate reconstruction of copy number evolution lineage and discovery of novel cancer genes. However, current analytical approaches that infer clonal lineages are neither accurate, nor scalable to analyzing molecular features, particularly CNA profiles obtained from thousands of cells. Statistical routines have not been established to leverage lineage tracing results towards identifying cancer-related genes. Here, we present a Minimal Event Distance Aneuploidy Lineage Tree (MEDALT) algorithm that infers the evolution history of a cell population based on single-cell copy number (SCCN) profiles. In a MEDALT, each node represents a cell, each edge represents a kinship between two cells, arrows point towards younger cells, and the root represents a normal diploid cell. We also present a statistical routine named lineage speciation analysis, which facilitates discovery of fitness-associated alterations (FAAs) and genes from SCCN lineage trees. To evaluate MEDALT, we simulated copy number evolution under various CNA mechanisms such as genome doubling, breakage-fusion-bridge (BFB), etc. and spiked in FAAs. We found that MEDALT substantially improved accuracy of FAA identification over GISTIC and conventional phylogenetics methods such as maximum likelihood (ML), maximal parsimony (MP) and neighbor joining (NJ) trees. We applied our methods on the single-cell DNA-sequencing data acquired from 20 triple-negative breast cancer patients (TNBCs), 4 of which had longitudinal pre-, mid- and post- treatment samples. Most of the TNBC samples appeared to have developed through branched evolution via multiple parallel lineages with distinct mutation rates and DNA damage repair (DDR) loss based on the constructed MEDALT. Using our approaches, we discovered novel genes that are predictive of patient survival in TCGA breast cancer data and are functionally more essential than other control gene sets, based on the CRISPR-cas9 knockout screen data obtained from 27 breast cancer cell lines in the DepMap database. Significant benefits in lineage tracing and cancer gene discovery were also achieved, when applying our approaches on the SCCN profiles derived using InferCNV from the single-cell RNA sequencing data of a cohort of 20 multiple myeloma, head and neck cancer, oral squamous cell carcinoma and ovarian cancer patients. The source code of our study is available at https://github.com/KChen-lab/MEDALT. Citation Format: Fang Wang, Qihan Wang, Vakul Mohanty, Shaoheng Liang, Jinzhuang Dou, Jincheng Han, Darlan Minussi, Ruli Gao, Li Ding, Nicholas Navin, Ken Chen. Single-cell copy number heterogeneity tracing enabling cancer gene discovery [abstract]. In: Proceedings of the AACR Virtual Special Conference on Tumor Heterogeneity: From Single Cells to Clinical Impact; 2020 Sep 17-18. Philadelphia (PA): AACR; Cancer Res 2020;80(21 Suppl):Abstract nr PO-017.\"}, {\"paperId\": \"079f6616a815c5e36ef5927929e8b656e6993c9e\", \"externalIds\": {\"MAG\": \"3047123218\", \"DOI\": \"10.1016/j.ymben.2020.07.009\", \"CorpusId\": 221092634, \"PubMed\": \"32771627\"}, \"title\": \"Engineering of the 2,3-butanediol pathway of Paenibacillus polymyxa DSM 365.\", \"venue\": \"Metabolic Engineering\", \"year\": 2020, \"citationCount\": 45, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.ymben.2020.07.009\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymben.2020.07.009?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymben.2020.07.009, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50446997\", \"name\": \"C. Schilling\"}, {\"authorId\": \"2097324431\", \"name\": \"R. Ciccone\"}, {\"authorId\": \"2092644\", \"name\": \"V. Sieber\"}, {\"authorId\": \"145491092\", \"name\": \"J. Schmid\"}], \"abstract\": \"Paenibacillus polymyxa is a Gram-positive, non-pathogenic soil bacterium that has been extensively investigated for the production of R-R-2,3-butanediol in exceptionally high enantiomeric purity. Rational metabolic engineering efforts to increase productivity and product titers were restricted due to limited genetic accessibility of the organism up to now. By use of CRISPR-Cas9 mediated genome editing, six metabolic mutant variants were generated and compared in batch fermentations for the first time. Downstream processing was facilitated by completely eliminating exopolysaccharide formation through the combined knockout of the sacB gene and the clu1 region, encoding for the underlying enzymatic machinery of levan and paenan synthesis. Spore formation was inhibited by deletion of spoIIE, thereby disrupting the sporulation cascade of P. polymyxa. Optimization of the carbon flux towards 2,3-butanediol was achieved by deletion of the lactate dehydrogenase ldh1 and decoupling of the butanediol dehydrogenase from its natural regulation via constitutive episomal expression. The improved strain showed 45% increased productivity, reaching a final concentration of 43.8\\u202fg\\u202fL-1 butanediol. A yield of 0.43\\u202fg\\u202fg-1 glucose was achieved, accounting for 86% of the theoretical maximum.\"}, {\"paperId\": \"07a164c63280148a33fa423d41572f78766593de\", \"externalIds\": {\"PubMedCentral\": \"10326052\", \"DOI\": \"10.1038/s41467-023-39717-6\", \"CorpusId\": 259355263, \"PubMed\": \"37414763\"}, \"title\": \"Genome-wide mapping of cancer dependency genes and genetic modifiers of chemotherapy in high-risk hepatoblastoma\", \"venue\": \"Nature Communications\", \"year\": 2023, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41467-023-39717-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10326052, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2115378838\", \"name\": \"Jie Fang\"}, {\"authorId\": \"1952468624\", \"name\": \"Shivendra V. Singh\"}, {\"authorId\": \"4198140\", \"name\": \"Changde Cheng\"}, {\"authorId\": \"2072389345\", \"name\": \"Sivaraman Natarajan\"}, {\"authorId\": \"2185522876\", \"name\": \"H. Sheppard\"}, {\"authorId\": \"3496869\", \"name\": \"A. Abu-Zaid\"}, {\"authorId\": \"8302267\", \"name\": \"A. Durbin\"}, {\"authorId\": \"2218937997\", \"name\": \"Ha Won Lee\"}, {\"authorId\": \"2143535724\", \"name\": \"Qiong Wu\"}, {\"authorId\": \"2165778011\", \"name\": \"J. Steele\"}, {\"authorId\": \"50267266\", \"name\": \"J. Connelly\"}, {\"authorId\": \"3041893\", \"name\": \"Hongjian Jin\"}, {\"authorId\": \"46243785\", \"name\": \"Wenan Chen\"}, {\"authorId\": \"2037972\", \"name\": \"Yiping Fan\"}, {\"authorId\": \"1403966623\", \"name\": \"S. Pruett-Miller\"}, {\"authorId\": \"6097534\", \"name\": \"J. Rehg\"}, {\"authorId\": \"5132039\", \"name\": \"Selene C. Koo\"}, {\"authorId\": \"33100296\", \"name\": \"T. Santiago\"}, {\"authorId\": \"147059566\", \"name\": \"J. Emmons\"}, {\"authorId\": \"144705619\", \"name\": \"S. Cairo\"}, {\"authorId\": \"51046339\", \"name\": \"Ruoning Wang\"}, {\"authorId\": \"5304222\", \"name\": \"E. Glazer\"}, {\"authorId\": \"48774633\", \"name\": \"A. Murphy\"}, {\"authorId\": \"38614651\", \"name\": \"Taosheng Chen\"}, {\"authorId\": \"6089818\", \"name\": \"A. Davidoff\"}, {\"authorId\": \"47109789\", \"name\": \"C. Armengol\"}, {\"authorId\": \"144056823\", \"name\": \"J. Easton\"}, {\"authorId\": \"2143734065\", \"name\": \"Xiang Chen\"}, {\"authorId\": \"1390461708\", \"name\": \"Jun J. Yang\"}], \"abstract\": \"A lack of relevant genetic models and cell lines hampers our understanding of hepatoblastoma pathogenesis and the development of new therapies for this neoplasm. Here, we report an improved MYC-driven hepatoblastoma-like murine model that recapitulates the pathological features of embryonal type of hepatoblastoma, with transcriptomics resembling the high-risk gene signatures of the human disease. Single-cell RNA-sequencing and spatial transcriptomics identify distinct subpopulations of hepatoblastoma cells. After deriving cell lines from the mouse model, we map cancer dependency genes using CRISPR-Cas9 screening and identify druggable targets shared with human hepatoblastoma (e.g., CDK7, CDK9, PRMT1, PRMT5). Our screen also reveals oncogenes and tumor suppressor genes in hepatoblastoma that engage multiple, druggable cancer signaling pathways. Chemotherapy is critical for human hepatoblastoma treatment. A genetic mapping of doxorubicin response by CRISPR-Cas9 screening identifies modifiers whose loss-of-function synergizes with (e.g., PRKDC) or antagonizes (e.g., apoptosis genes) the effect of chemotherapy. The combination of PRKDC inhibition and doxorubicin-based chemotherapy greatly enhances therapeutic efficacy. These studies provide a set of resources including disease models suitable for identifying and validating potential therapeutic targets in human high-risk hepatoblastoma.\"}, {\"paperId\": \"07a25146a9c3df6736e1299de35a1950b4f09b5f\", \"externalIds\": {\"DOI\": \"10.1134/S0003683823090053\", \"CorpusId\": 267113557}, \"title\": \"The Function of the XlnR Transcription Factor in the Filamentous Fungus Penicillium verruculosum\", \"venue\": \"Applied Biochemistry and Microbiology\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1134/S0003683823090053?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1134/S0003683823090053, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277624207\", \"name\": \"V. Y. Kislitsin\"}, {\"authorId\": \"5064311\", \"name\": \"A. Chulkin\"}, {\"authorId\": \"3874831\", \"name\": \"I. Zorov\"}, {\"authorId\": \"2249569490\", \"name\": \"I. Sinelnikov\"}, {\"authorId\": \"2149994763\", \"name\": \"A. P. Sinitsyn\"}, {\"authorId\": \"47092812\", \"name\": \"A. M. Rozhkova\"}], \"abstract\": null}, {\"paperId\": \"07a8292a5981806806f405b72fc454a5f8b9f7a3\", \"externalIds\": {\"PubMedCentral\": \"8241947\", \"MAG\": \"3158745950\", \"DOI\": \"10.1186/s12284-021-00504-w\", \"CorpusId\": 235244976, \"PubMed\": \"34189630\"}, \"title\": \"Fine-tuning Flowering Time via Genome Editing of Upstream Open Reading Frames of Heading Date 2 in Rice\", \"venue\": \"Rice\", \"year\": 2021, \"citationCount\": 33, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://thericejournal.springeropen.com/counter/pdf/10.1186/s12284-021-00504-w\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8241947, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2140043783\", \"name\": \"Xinxin Liu\"}, {\"authorId\": \"2117903\", \"name\": \"Hualong Liu\"}, {\"authorId\": \"2145794066\", \"name\": \"Yuanye Zhang\"}, {\"authorId\": \"8362584\", \"name\": \"Mingliang He\"}, {\"authorId\": \"4456027\", \"name\": \"Rongtian Li\"}, {\"authorId\": \"2105541473\", \"name\": \"W. Meng\"}, {\"authorId\": \"2108305366\", \"name\": \"Zhenyu Wang\"}, {\"authorId\": \"2116523530\", \"name\": \"Xiufeng Li\"}, {\"authorId\": \"2946239\", \"name\": \"Qingyun Bu\"}], \"abstract\": \"Flowering time of rice (Oryza sativa L.) is among the most important agronomic traits for region adaptation and grain yield. In the process of rice breeding, efficient and slightly modulating the flowering time of an elite cultivar would be more popular with breeder. Hence, we are interested in slightly increasing the expression of flowering repressors by CRISPR/Cas9 genome editing system. It was predicated there were three uORFs in 5\\u2019 leader sequence of Hd2. In this study, through editing Hd2 uORFs, we got four homozygous mutant lines. Phenotypic analysis showed that the hd2 urf edited lines flowered later by 4.6\\u201311.2 days relative to wild type SJ2. Supporting the later flowering phenotype, the expression of Ehd1, Hd3a, and RFT1 is significantly decreased in hd2 urf than that in wild type. Moreover, we found that the transcription level of Hd2 is not affected, whereas the Hd2 protein level was increased in hd2 urf compared with wild type, which indicated that Hd2 uORFs indeed affect the translation of a downstream Hd2 pORF. In summary, we developed a efficient approach for delaying rice heading date based on editing uORF region of flowering repressor, which is time and labor saving compared to traditional breeding. In future, uORF of other flowering time related genes, including flowering promoter and flowering repressor genes, can also be used as targets to fine-tune the flowering time of varieties.\"}, {\"paperId\": \"07a955408661052d3bd75a868c9ca7245d737e6b\", \"externalIds\": {\"PubMedCentral\": \"8956659\", \"DOI\": \"10.1038/s42003-022-03150-0\", \"CorpusId\": 236929713, \"PubMed\": \"35338236\"}, \"title\": \"NT-CRISPR, combining natural transformation and CRISPR-Cas9 counterselection for markerless and scarless genome editing in Vibrio natriegens\", \"venue\": \"Communications Biology\", \"year\": 2021, \"citationCount\": 49, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-022-03150-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8956659, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"83075329\", \"name\": \"Daniel Stukenberg\"}, {\"authorId\": \"1751590291\", \"name\": \"J. Hoff\"}, {\"authorId\": \"2122811650\", \"name\": \"Anna Faber\"}, {\"authorId\": \"49078765\", \"name\": \"A. Becker\"}], \"abstract\": \"The fast-growing bacterium Vibrio natriegens has recently gained increasing attention as a novel chassis organism for fundamental research and biotechnology. To fully harness the potential of this bacterium, highly efficient genome editing methods are indispensable to create strains tailored for specific applications. V. natriegens is able to take up free DNA and incorporate it into its genome by homologous recombination. This highly efficient natural transformation is able to mediate uptake of multiple DNA fragments, thereby allowing for multiple simultaneous edits. Here, we describe NT-CRISPR, a combination of natural transformation with CRISPR-Cas9 counterselection. In two temporally distinct steps, we first performed a genome edit by natural transformation and second, induced CRISPR-Cas9 targeting the wild type sequence, and thus leading to death of non-edited cells. Through cell killing with efficiencies of up to 99.999%, integration of antibiotic resistance markers became dispensable, enabling scarless and markerless edits with single-base precision. We used NT-CRISPR for deletions, integrations and single-base modifications with editing efficiencies of up to 100%. Further, we confirmed its applicability for simultaneous deletion of multiple chromosomal regions. Lastly, we showed that the near PAM-less Cas9 variant SpG Cas9 is compatible with NT-CRISPR and thereby broadens the target spectrum. Stukenberg et al. present NT-CRISPR, a method for performing genome editing in the marine bacterium Vibrio natriegens without using antibiotic resistance or other types of markers. This method combines V. natriegens\\u2019 capability for highly efficient natural transformation with an extremely efficient CRISPR-Cas9-based counterselection step for editing efficiencies of up to 100% and highly efficient simultaneous deletion of multiple sequences.\"}, {\"paperId\": \"07a98237db00680db6c466cca1b28cae4a071a4a\", \"externalIds\": {\"DOI\": \"10.1080/10495398.2022.2062602\", \"CorpusId\": 248526796, \"PubMed\": \"35507885\"}, \"title\": \"Activated macrophages of CD 163 gene edited pigs generated by direct cytoplasmic microinjection with CRISPR gRNA/Cas9 mRNA are resistant to PRRS virus assault\", \"venue\": \"Animal Biotechnology\", \"year\": 2022, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/10495398.2022.2062602?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/10495398.2022.2062602, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48777666\", \"name\": \"S. Hung\"}, {\"authorId\": \"34945844\", \"name\": \"C. Chuang\"}, {\"authorId\": \"2109652377\", \"name\": \"C. Wong\"}, {\"authorId\": \"5225693\", \"name\": \"C. yen\"}, {\"authorId\": \"2368537661\", \"name\": \"Shuag Peng\"}, {\"authorId\": \"2146395699\", \"name\": \"Chieh Yang\"}, {\"authorId\": \"2392899930\", \"name\": \"Ming-Cheng Chen\"}, {\"authorId\": \"66360892\", \"name\": \"Tien-Shuh Yang\"}, {\"authorId\": \"89425189\", \"name\": \"C. Tu\"}], \"abstract\": \"Abstract Porcine reproductive and respiratory syndrome virus (PRRSV) infects placental and lung macrophages, causing a global epidemic with economic loss. Attempts to develop an effective vaccine to control the disease have not been effective. Currently, developing PRRSV disease-resistant pigs via a gene editing (GE) strategy to mutate the PRRSV receptor or to delete the binding domain on the macrophage appears promising. In this study, we used the strategy of Edinburg University to construct two guide RNAs (gRNAs) located on the proximal front and post sites of exon 7. Directive microinjection of two gRNAs and Cas9 mRNA into the cytoplasm of pronuclear zygotes efficiently generated four piglets confirmed as CD163 knockout (KO) and/or CD163 exon 7 deleted (CD163\\u0394E7). In four GE piglets, three pigs carried two chromosome CD163 KO or \\u0394E7. Peripheral blood mononuclear cells (PBMCs) from three GE and wild-type (WT) pigs were activated into macrophages for in vitro transfection. The results showed that the activated macrophages from all GE pigs were significantly more viable than those from WT pig. Current results suggest that we have successfully generated PRRSV-resistant pigs, although in vivo challenge is needed to validate that the pigs are PRRSV resistant.\"}, {\"paperId\": \"07af402961ca6cb07103028052a3639a6ef0b950\", \"externalIds\": {\"MAG\": \"3023800672\", \"DOI\": \"10.1016/j.pestbp.2020.104595\", \"CorpusId\": 218918601, \"PubMed\": \"32527434\"}, \"title\": \"Using CRISPR/Cas9 genome modification to understand the genetic basis of insecticide resistance: Drosophila and beyond.\", \"venue\": \"Pesticide Biochemistry and Physiology\", \"year\": 2020, \"citationCount\": 50, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://biblio.ugent.be/publication/8681844/file/8690816.pdf\", \"status\": \"GREEN\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.pestbp.2020.104595?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.pestbp.2020.104595, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6801505\", \"name\": \"V. Douris\"}, {\"authorId\": \"3747608\", \"name\": \"Shane M Denecke\"}, {\"authorId\": \"6796868\", \"name\": \"T. Van Leeuwen\"}, {\"authorId\": \"143915682\", \"name\": \"C. Bass\"}, {\"authorId\": \"48808217\", \"name\": \"R. Nauen\"}, {\"authorId\": \"144522067\", \"name\": \"J. Vontas\"}], \"abstract\": \"Chemical insecticides are a major tool for the control of many of the world's most damaging arthropod pests. However, their intensive application is often associated with the emergence of resistance, sometimes with serious implications for sustainable pest control. To mitigate failure of insecticide-based control tools, the mechanisms by which insects have evolved resistance must be elucidated. This includes both identification and functional characterization of putative resistance genes and/or mutations. Research on this topic has been greatly facilitated by using powerful genetic model insects like Drosophila melanogaster, and more recently by advances in genome modification technology, notably CRISPR/Cas9. Here, we present the advances that have been made through the application of genome modification technology in insecticide resistance research. The majority of the work conducted in the field to date has made use of genetic tools and resources available in D. melanogaster. This has greatly enhanced our understanding of resistance mechanisms, especially those mediated by insensitivity of the pesticide target-site. We discuss this progress for a series of different insecticide targets, but also report a number of unsuccessful or inconclusive attempts that highlight some inherent limitations of using Drosophila to characterize resistance mechanisms identified in arthropod pests. We also discuss an experimental framework that may circumvent current limitations while retaining the genetic versatility and robustness that Drosophila has to offer. Finally, we describe examples of direct CRISPR/Cas9 use in non-model pest species, an approach that will likely find much wider application in the near future.\"}, {\"paperId\": \"07b0bf4d191baad3f6570868ec082c234a9f5d06\", \"externalIds\": {\"PubMedCentral\": \"9332693\", \"DOI\": \"10.3390/insects13080671\", \"CorpusId\": 251102331, \"PubMed\": \"35893026\"}, \"title\": \"Deletion of the Serotonin Receptor 7 Gene Changed the Development and Behavior of the Mosquito, Aedes aegypti\", \"venue\": \"Insects\", \"year\": 2022, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2075-4450/13/8/671/pdf?version=1658741914\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9332693, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12732073\", \"name\": \"Miaozhen Li\"}, {\"authorId\": \"2152828681\", \"name\": \"Lei Zhang\"}, {\"authorId\": \"2179705494\", \"name\": \"Yuchen Wu\"}, {\"authorId\": \"2110444146\", \"name\": \"Yi-Xun Li\"}, {\"authorId\": \"2335758050\", \"name\": \"Xin Chen\"}, {\"authorId\": \"2170064388\", \"name\": \"Jing Chen\"}, {\"authorId\": \"2169998025\", \"name\": \"Qiuhui Wang\"}, {\"authorId\": \"34913969\", \"name\": \"Chenghong Liao\"}, {\"authorId\": \"2067609144\", \"name\": \"Qian Han\"}], \"abstract\": \"Simple Summary Aedes aegypti can transmit various diseases and is a serious public health risk to humans. Due to the abuse of insecticides, pesticide resistance has become a new challenge in mosquito management. The 5-HT receptor is a potential target for novel insecticides. However, in Ae. aegypti, the function of the 5-HT receptor is not fully understood. There are three types of 5-HT receptors in insects, namely 5-HT1, 5-HT2, and 5-HT7. In this study, we used real-time PCR to find that male mosquitoes express higher levels of the 5-HT7A receptor than females and all larvae, and that expression was higher in the appendages but not in the head. We obtained 5-HT7A mutants using CRISPR-Cas9 technology. The mutant larvae showed changes in growth and development such as body contraction, reduced motility, and reduced stress response to external stimuli. Abstract Serotonin (5-HT) plays a vital role in many physiological processes in insects, regulating physiological activities such as growth and movement through multiple 5-HT receptors (5-HTRs), which were potential targets for some new insecticides. However, the specific function of individual 5-HTRs in Ae. aegypti is still unclear. In this study, we investigated the function of the 5-HT7A receptor during Ae. aegypti development. 5-HTR7A transcripts were detected at all stages of development by real-time PCR. The results indicated that the gene expression was highest in the limbs (p < 0.01). We also generated 5-HTR7A mutant mosquitoes using CRISPR-mediated gene editing. The mutants had an abnormal phenotype at the larval stage, including an aberrant head-to-chest ratio and decreased motor activity. The mutant pupae developed abnormally, and most died (56.67%) (p < 0.0001). Using external stimuli to larvae and pupae with abnormal phenotypes, we found the mutant G1 and G2 generations responded to external stimuli in a longer time than the wild-type (WT) mosquitoes, and most of the mutants were 2 to 3 s slower than the WTs to respond to external stimuli (p < 0.01). Due to higher mortality, mutant larvae and pupae had fewer numbers than the WTs. The egg hatching rate of mutant G1 and G2 generations was lower than that of the WTs (p < 0.01). The expression level of 5-HTR7A in the mutants decreased by about 65% compared with the control group using real-time PCR (p < 0.05). In all, the 5-HT7A receptor plays an important role in the metamorphosis, development and motor function of Aedes aegypti.\"}, {\"paperId\": \"07b5ccbfc5162cd84131d6db93d3fbcd7fea9e43\", \"externalIds\": {\"PubMedCentral\": \"10906908\", \"DOI\": \"10.1371/journal.pone.0287733\", \"CorpusId\": 268119536, \"PubMed\": \"38427670\"}, \"title\": \"Generation of murine tumor models refractory to \\u03b1PD-1/-L1 therapies due to defects in antigen processing/presentation or IFN\\u03b3 signaling using CRISPR/Cas9\", \"venue\": \"PLoS ONE\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0287733&type=printable\", \"status\": \"GOLD\", \"license\": \"public-domain\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10906908, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"14623442\", \"name\": \"Paul L. Chariou\"}, {\"authorId\": \"10429482\", \"name\": \"Christine M Minnar\"}, {\"authorId\": \"2288902944\", \"name\": \"Mayank Tandon\"}, {\"authorId\": \"2267299929\", \"name\": \"Mary R. Guest\"}, {\"authorId\": \"2242348542\", \"name\": \"R. Chari\"}, {\"authorId\": \"2238216087\", \"name\": \"Jeffrey Schlom\"}, {\"authorId\": \"47361623\", \"name\": \"Sofia R. Gameiro\"}], \"abstract\": \"Immune checkpoint blockade (ICB) targeting the programmed cell death protein 1 (PD-1) and its ligand 1 (PD-L1) fails to provide clinical benefit for most cancer patients due to primary or acquired resistance. Drivers of ICB resistance include tumor antigen processing/presentation machinery (APM) and IFN\\u03b3 signaling mutations. Thus, there is an unmet clinical need to develop alternative therapies for these patients. To this end, we have developed a CRISPR/Cas9 approach to generate murine tumor models refractory to PD-1/-L1 inhibition due to APM/IFN\\u03b3 signaling mutations. Guide RNAs were employed to delete B2m, Jak1, or Psmb9 genes in ICB-responsive EMT6 murine tumor cells. B2m was deleted in ICB-responsive MC38 murine colon cancer cells. We report a detailed development and validation workflow including whole exome and Sanger sequencing, western blotting, and flow cytometry to assess target gene deletion. Tumor response to ICB and immune effects of gene deletion were assessed in syngeneic mice. This workflow can help accelerate the discovery and development of alternative therapies and a deeper understanding of the immune consequences of tumor mutations, with potential clinical implications.\"}, {\"paperId\": \"07b77adf5338afe7de47df3aba5b74531c188ddf\", \"externalIds\": {\"DOI\": \"10.1186/s13046-021-02093-4\", \"CorpusId\": 255983658}, \"title\": \"Differences between intrinsic and acquired nucleoside analogue resistance in acute myeloid leukaemia cells\", \"venue\": \"Journal of experimental & clinical cancer research : CR\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://jeccr.biomedcentral.com/track/pdf/10.1186/s13046-021-02093-4\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1186/s13046-021-02093-4?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1186/s13046-021-02093-4, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"91390774\", \"name\": \"T. Rothenburger\"}, {\"authorId\": \"2110700234\", \"name\": \"Dominique Thomas\"}, {\"authorId\": \"4195565\", \"name\": \"Y. Schreiber\"}, {\"authorId\": \"9434266\", \"name\": \"P. R. Wratil\"}, {\"authorId\": \"2120316383\", \"name\": \"Tamara Pflantz\"}, {\"authorId\": \"35712280\", \"name\": \"K. Knecht\"}, {\"authorId\": \"2201897635\", \"name\": \"Katie Digianantonio\"}, {\"authorId\": \"40628514\", \"name\": \"Joshua Temple\"}, {\"authorId\": \"144319662\", \"name\": \"C. Schneider\"}, {\"authorId\": \"144181195\", \"name\": \"H. Baldauf\"}, {\"authorId\": \"1509816288\", \"name\": \"Katie-May McLaughlin\"}, {\"authorId\": \"6940016\", \"name\": \"F. Rothweiler\"}, {\"authorId\": \"2120303909\", \"name\": \"Berna Bilen\"}, {\"authorId\": \"2060320272\", \"name\": \"Samira Farmand\"}, {\"authorId\": \"1499284119\", \"name\": \"D. Bojkova\"}, {\"authorId\": \"2069456328\", \"name\": \"R. Costa\"}, {\"authorId\": \"3746284\", \"name\": \"N. Ferreir\\u00f3s\"}, {\"authorId\": \"5111853\", \"name\": \"G. Geisslinger\"}, {\"authorId\": \"47061835\", \"name\": \"T. Oellerich\"}, {\"authorId\": \"2170972862\", \"name\": \"Yong Xiong\"}, {\"authorId\": \"5321348\", \"name\": \"O. Keppler\"}, {\"authorId\": \"3095771\", \"name\": \"Mark N. Wass\"}, {\"authorId\": \"77600641\", \"name\": \"M. Michaelis\"}, {\"authorId\": \"2055707646\", \"name\": \"J. Cinatl\"}], \"abstract\": \"SAMHD1 mediates resistance to anti-cancer nucleoside analogues, including cytarabine, decitabine, and nelarabine that are commonly used for the treatment of leukaemia, through cleavage of their triphosphorylated forms. Hence, SAMHD1 inhibitors are promising candidates for the sensitisation of leukaemia cells to nucleoside analogue-based therapy. Here, we investigated the effects of the cytosine analogue CNDAC, which has been proposed to be a SAMHD1 inhibitor, in the context of SAMHD1. CNDAC was tested in 13 acute myeloid leukaemia (AML) cell lines, in 26 acute lymphoblastic leukaemia (ALL) cell lines, ten AML sublines adapted to various antileukaemic drugs, 24 single cell-derived clonal AML sublines, and primary leukaemic blasts from 24 AML patients. Moreover, 24 CNDAC-resistant sublines of the AML cell lines HL-60 and PL-21 were established. The SAMHD1 gene was disrupted using CRISPR/Cas9 and SAMHD1 depleted using RNAi, and the viral Vpx protein. Forced DCK expression was achieved by lentiviral transduction. SAMHD1 promoter methylation was determined by PCR after treatment of genomic DNA with the methylation-sensitive HpaII endonuclease. Nucleoside (analogue) triphosphate levels were determined by LC-MS/MS. CNDAC interaction with SAMHD1 was analysed by an enzymatic assay and by crystallisation. Although the cytosine analogue CNDAC was anticipated to inhibit SAMHD1, SAMHD1 mediated intrinsic CNDAC resistance in leukaemia cells. Accordingly, SAMHD1 depletion increased CNDAC triphosphate (CNDAC-TP) levels and CNDAC toxicity. Enzymatic assays and crystallisation studies confirmed CNDAC-TP to be a SAMHD1 substrate. In 24 CNDAC-adapted acute myeloid leukaemia (AML) sublines, resistance was driven by DCK (catalyses initial nucleoside phosphorylation) loss. CNDAC-adapted sublines displayed cross-resistance only to other DCK substrates (e.g. cytarabine, decitabine). Cell lines adapted to drugs not affected by DCK or SAMHD1 remained CNDAC sensitive. In cytarabine-adapted AML cells, increased SAMHD1 and reduced DCK levels contributed to cytarabine and CNDAC resistance. Intrinsic and acquired resistance to CNDAC and related nucleoside analogues are driven by different mechanisms. The lack of cross-resistance between SAMHD1/ DCK substrates and non-substrates provides scope for next-line therapies after treatment failure.\"}, {\"paperId\": \"07b8f9ed76cb5d998dded514a19059428c0e1eb5\", \"externalIds\": {\"PubMedCentral\": \"9814246\", \"DOI\": \"10.1186/s12915-022-01504-y\", \"CorpusId\": 255468613, \"PubMed\": \"36600240\"}, \"title\": \"Chromosome-level genome of black cutworm provides novel insights into polyphagy and seasonal migration in insects\", \"venue\": \"BMC Biology\", \"year\": 2023, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://bmcbiol.biomedcentral.com/counter/pdf/10.1186/s12915-022-01504-y\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9814246, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2040975\", \"name\": \"M. Jin\"}, {\"authorId\": \"2156640523\", \"name\": \"Bo Liu\"}, {\"authorId\": \"2152970871\", \"name\": \"Weigang Zheng\"}, {\"authorId\": \"34569706\", \"name\": \"Conghui Liu\"}, {\"authorId\": \"119568818\", \"name\": \"Zhenxing Liu\"}, {\"authorId\": \"2119288803\", \"name\": \"Yuan He\"}, {\"authorId\": \"2145460380\", \"name\": \"Xiaokang Li\"}, {\"authorId\": \"145844784\", \"name\": \"Chao Wu\"}, {\"authorId\": \"89565239\", \"name\": \"Ping Wang\"}, {\"authorId\": \"3249008\", \"name\": \"Kaiyu Liu\"}, {\"authorId\": \"1452981250\", \"name\": \"Shigang Wu\"}, {\"authorId\": \"1485786194\", \"name\": \"Hangwei Liu\"}, {\"authorId\": \"77757502\", \"name\": \"S. Chakrabarty\"}, {\"authorId\": \"4692785\", \"name\": \"Hai-bin Yuan\"}, {\"authorId\": \"145593299\", \"name\": \"K. Wilson\"}, {\"authorId\": \"46312300\", \"name\": \"Kongming Wu\"}, {\"authorId\": \"1470694930\", \"name\": \"Wei Fan\"}, {\"authorId\": \"4839583\", \"name\": \"Yutao Xiao\"}], \"abstract\": \"Background The black cutworm, Agrotis ipsilon , is a serious global underground pest. Its distinct phenotypic traits, especially its polyphagy and ability to migrate long distances, contribute to its widening distribution and increasing difficulty of control. However, knowledge about these traits is still limited. Results We generated a high-quality chromosome-level assembly of A. ipsilon using PacBio and Hi-C technology with a contig N50 length of\\u2009~\\u20096.7\\u00a0Mb. Comparative genomic and transcriptomic analyses showed that detoxification-associated gene families were highly expanded and induced after insects fed on specific host plants. Knockout of genes that encoded two induced ABC transporters using CRISPR/Cas9 significantly reduced larval growth rate, consistent with their contribution to host adaptation. A comparative transcriptomic analysis between tethered-flight moths and migrating moths showed expression changes in the circadian rhythm gene AiCry2 involved in sensing photoperiod variations and may receipt magnetic fields accompanied by MagR and in genes that regulate the juvenile hormone pathway and energy metabolism, all involved in migration processes. Conclusions This study provides valuable genomic resources for elucidating the mechanisms involved in moth migration and developing innovative control strategies.\"}, {\"paperId\": \"07b93c73152be0670ce3bfa57967d49315ab4208\", \"externalIds\": {\"PubMedCentral\": \"8275107\", \"DOI\": \"10.2147/OTT.S313507\", \"CorpusId\": 235820367, \"PubMed\": \"34262291\"}, \"title\": \"A Novel Biological Activity of the STAT3 Inhibitor Stattic in Inhibiting Glutathione Reductase and Suppressing the Tumorigenicity of Human Cervical Cancer Cells via a ROS-Dependent Pathway\", \"venue\": \"OncoTargets and Therapy\", \"year\": 2021, \"citationCount\": 20, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.dovepress.com/getfile.php?fileID=71307\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8275107, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"10086204\", \"name\": \"Yuchen Xia\"}, {\"authorId\": \"83572093\", \"name\": \"Guihua Wang\"}, {\"authorId\": \"6728551\", \"name\": \"Manli Jiang\"}, {\"authorId\": \"8016236\", \"name\": \"Xueting Liu\"}, {\"authorId\": \"2145142733\", \"name\": \"Yan Zhao\"}, {\"authorId\": \"2868726\", \"name\": \"Yinghui Song\"}, {\"authorId\": \"3694995\", \"name\": \"Binyuan Jiang\"}, {\"authorId\": \"47770173\", \"name\": \"Demao Zhu\"}, {\"authorId\": \"2153121434\", \"name\": \"Ling Hu\"}, {\"authorId\": \"2156122134\", \"name\": \"Zhao Zhang\"}, {\"authorId\": \"49284390\", \"name\": \"Ting Cao\"}, {\"authorId\": \"1519273724\", \"name\": \"Ji Ming Wang\"}, {\"authorId\": \"6733938\", \"name\": \"Jinyue Hu\"}], \"abstract\": \"Introduction Glutathione reductase (GSR) provides reduced glutathione (GSH) to maintain redox homeostasis. Inhibition of GSR disrupts this balance, resulting in cell damage, which benefits cancer therapy. However, the effect of GSR inhibition on the tumorigenicity of human cervical cancer is not fully understood. Materials and Methods Tissue microarray analysis was employed to determine GSR expression in cervical cancer tissues by immunohistochemical staining. Cell death was measured with PI/FITC-annexin V staining. mRNA levels were measured via quantitative RT-PCR. Protein expression was measured by Western blotting and flow cytometry. STAT3 deletion was performed with CRISPR/Cas9 technology. GSR knockdown was achieved by RNA interference. Reactive oxygen species (ROS) levels were measured by DCF staining. GSR enzymatic activity was measured with a GSR assay kit. The effect of GSR inhibition on the growth of tumors formed by cervical cancer cells was investigated using a xenograft model. Results The expression of GSR was increased in human cervical cancer tissues, as shown by immunohistochemical staining. GSR knockdown by RNA interference in human cervical cancer cell lines resulted in cell death, suggesting the ability of GSR to maintain cancer cell survival. The STAT3 inhibitor 6-nitrobenzo[b]thiophene 1,1-dioxide (Stattic) also inhibited the enzymatic activity of GSR and induced the death of cervical cancer cells. More importantly, Stattic decreased the growth of xenograft tumors formed by cervical cancer cells in nude mice. Mechanistically, tumor cell death induced by Stattic-mediated GSR inhibition was ROS-dependent, since the ROS scavengers GSH and N-acetyl cysteine (NAC) reversed the effect of Stattic. In contrast, pharmacological and molecular inhibition of STAT3 did not induce the death of cervical cancer cells, suggesting a STAT3-independent activity of Stattic. Conclusion Stattic inhibits the enzymatic activity of GSR and induces STAT3-independent but ROS-dependent death of cervical cancer cells, suggesting its potential application as a therapeutic agent for human cervical cancers.\"}, {\"paperId\": \"07b9c93f04ce873560ec62f3fb2c262e4ea3eb37\", \"externalIds\": {\"PubMedCentral\": \"9037380\", \"DOI\": \"10.3389/fpls.2022.879642\", \"CorpusId\": 248070621, \"PubMed\": \"35481139\"}, \"title\": \"Increasing Fruit Weight by Editing a Cis-Regulatory Element in Tomato KLUH Promoter Using CRISPR/Cas9\", \"venue\": \"Frontiers in Plant Science\", \"year\": 2022, \"citationCount\": 24, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fpls.2022.879642/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9037380, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2146262244\", \"name\": \"Qiang Li\"}, {\"authorId\": \"145176973\", \"name\": \"Q. Feng\"}, {\"authorId\": \"6706402\", \"name\": \"Ashley Snouffer\"}, {\"authorId\": \"2143655869\", \"name\": \"Biyao Zhang\"}, {\"authorId\": \"34448786\", \"name\": \"G. Rodr\\u00edguez\"}, {\"authorId\": \"145132852\", \"name\": \"E. van der Knaap\"}], \"abstract\": \"CRISPR/Cas-mediated genome editing is a powerful approach to accelerate yield enhancement to feed growing populations. Most applications focus on \\u201cnegative regulators\\u201d by targeting coding regions and promoters to create nulls or weak loss-of-function alleles. However, many agriculturally important traits are conferred by gain-of-function alleles. Therefore, creating gain-of-function alleles for \\u201cpositive regulators\\u201d by CRISPR will be of great value for crop improvement. CYP78A family members are the positive regulators of organ weight and size in crops. In this study, we engineered allelic variation by editing tomato KLUH promoter around a single-nucleotide polymorphism (SNP) that is highly associated with fruit weight. The SNP was located in a conserved putative cis-regulatory element (CRE) as detected by the homology-based prediction and the Assay for Transposase-Accessible Chromatin using sequencing (ATAC-seq). Twenty-one mutant alleles with various insertion and deletion sizes were generated in the LA1589 background. Five mutant alleles (m2+4bp, m3+1bp, m5\\u20131bp, m13\\u20138bp, and m14\\u20139bp) showed a consistent increase in fruit weight and a significant decrease in the proportion of small fruits in all experimental evaluations. Notably, m2+4bp and m3+1bp homozygote significantly increase fruit weight by 10.7\\u201315.7 and 8.7\\u201316.3%, respectively. Further analysis of fruit weight based on fruit position on the inflorescence indicated that the five beneficial alleles increase the weight of all fruits along inflorescence. We also found that allele types and transcriptional changes of SlKLUH were poor predictors of the changes in fruit weight. This study not only provides a way of identifying conserved CRE but also highlights enormous potential for CRISPR/Cas-mediated cis-engineering of CYP78A members in yield improvement.\"}, {\"paperId\": \"07bbc859f5be9cbb772204f37c885033262a06c4\", \"externalIds\": {\"DOI\": \"10.15212/bioi-2022-0018\", \"CorpusId\": 255223745}, \"title\": \"Recent advances in genetically modified large-animal models of human diseases\", \"venue\": \"BIO Integration\", \"year\": 2022, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.15212/bioi-2022-0018\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15212/bioi-2022-0018?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15212/bioi-2022-0018, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2257097458\", \"name\": \"Jing Zhang\"}, {\"authorId\": \"48305050\", \"name\": \"Xiaoyue Sun\"}, {\"authorId\": \"4688921\", \"name\": \"Chunwei Cao\"}], \"abstract\": \"\\n Large-animal models show greater advantages than rodents in recapitulating human genetic diseases, primarily because of their higher similarity to humans in terms of anatomy, physiology and genetics. Notably, as genome-editing technologies have rapidly improved, particularly transcription activator-like effector nuclease (TALEN) and clustered regularly interspaced short palindromic repeats (CRISPR)/Cas9 (CRISPR-associated protein 9) systems, their application in biomedical research has accelerated. A variety of genetically modified large-animal models, including non-human primates, pigs, dogs, bovines and sheep, have been produced to recapitulate human inherited disorders, thus providing novel biological and translational insights. Here, we review recent progress in the generation of large-animal models over the past 5 years and summarize their use in studying human genetic diseases, focusing on the nervous system, cardiovascular and metabolic systems, the immune system, xenotransplantation, the reproductive system and embryonic development.\\n\"}, {\"paperId\": \"07bd503f84fe0be0c9b10b55d0c19dab33eb1381\", \"externalIds\": {\"DOI\": \"10.1007/s11626-022-00655-0\", \"CorpusId\": 246826092, \"PubMed\": \"35165826\"}, \"title\": \"Generation of NPHP1 knockout human pluripotent stem cells by a practical biallelic gene deletion strategy using CRISPR/Cas9 and ssODN\", \"venue\": \"In Vitro Cellular & Developmental Biology - Animal\", \"year\": 2022, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s11626-022-00655-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s11626-022-00655-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2061355472\", \"name\": \"Y. Nakano\"}, {\"authorId\": \"3996900\", \"name\": \"K. Susa\"}, {\"authorId\": \"51063840\", \"name\": \"Tomoki Yanagi\"}, {\"authorId\": \"39364044\", \"name\": \"Y. Hiraoka\"}, {\"authorId\": \"2154583684\", \"name\": \"Takefumi Suzuki\"}, {\"authorId\": \"5093760\", \"name\": \"Takayasu Mori\"}, {\"authorId\": \"7278395\", \"name\": \"Fumiaki Ando\"}, {\"authorId\": \"46661717\", \"name\": \"Shintaro Mandai\"}, {\"authorId\": \"2051062846\", \"name\": \"T. Fujiki\"}, {\"authorId\": \"144553421\", \"name\": \"T. Rai\"}, {\"authorId\": \"34695098\", \"name\": \"S. Uchida\"}, {\"authorId\": \"144529549\", \"name\": \"E. Sohara\"}], \"abstract\": null}, {\"paperId\": \"07c05d782ddb07fe2b1a69607b277d077bf1547c\", \"externalIds\": {\"MAG\": \"3184249385\", \"DOI\": \"10.24918/cs.2021.22\", \"CorpusId\": 237960366}, \"title\": \"Converting a Face-to-Face Lab to Online: An Example of Process and Outcomes for a CRISPR-Based Molecular Biology Lab\", \"venue\": \"CourseSource\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.24918/cs.2021.22\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.24918/cs.2021.22?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.24918/cs.2021.22, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46430156\", \"name\": \"L. McDonnell\"}, {\"authorId\": \"2093544962\", \"name\": \"Keefe D. Reuther\"}, {\"authorId\": \"152313817\", \"name\": \"Andrew Cooper\"}, {\"authorId\": \"2160554469\", \"name\": \"Christopher Day\"}, {\"authorId\": \"1400860330\", \"name\": \"Cindy Gustafson-Brown\"}], \"abstract\": \"The COVID-19 pandemic created a need to convert in-person laboratory courses into an online format in a short amount of time. For this reason, we converted our face-to-face molecular biology lab course to an online version in Spring 2020. The lab course focuses on using CRISPR-Cas9 editing to introduce mutations into the ADE2 gene in Saccharomyces cerevisiae . When planning the conversion to online, we identified a number of challenges to addressing the course goals, such as including technology, accessing real data for analysis, and engaging students in collaboration. After brainstorming ways to address these and other challenges, we developed an online lab course for which the \\u201cin lab\\u201d portion was largely focused on working collaboratively on data analysis, troubleshooting, and drawing conclusions, as well as experimental design and examining primary literature. Surveys suggest students perceived significant gains in key scientific thinking and process skills including forming scientific arguments, data analysis, and working collaboratively. Students also reported multiple different ways in which the online courses made them feel like scientists. Here we describe key parts of the course structure and our experience in teaching the course to over 200 students. We also describe the process of converting from face-to-face to online, as the process could be applied to any existing hands-on lab. The process enabled us to quickly adapt important information, course goals, and experimental contexts from existing labs, reducing the workload involved in creating a new lab while still providing the experience of focusing on scientific thinking skills to students.\"}, {\"paperId\": \"07c34ab241734b57d6282447469af485ba659fb6\", \"externalIds\": {\"DOI\": \"10.1002/mc.23743\", \"CorpusId\": 269789703, \"PubMed\": \"38751013\"}, \"title\": \"HER3 V104 mutations regulate cell signaling, growth, and drug sensitivity in cancer\", \"venue\": \"Molecular Carcinogenesis\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/mc.23743?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/mc.23743, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48960406\", \"name\": \"Rosalin Mishra\"}, {\"authorId\": \"2063165817\", \"name\": \"M. Kilroy\"}, {\"authorId\": \"1581323113\", \"name\": \"Wasim Feroz\"}, {\"authorId\": \"46759755\", \"name\": \"Hima Patel\"}, {\"authorId\": \"5331855\", \"name\": \"J. Garrett\"}], \"abstract\": \"HER3 is mutated in ~2%\\u201310% of cancers depending on the cancer type. We found the HER3\\u2010V104L mutation to be activating from patient\\u2010derived mutations introduced via lentiviral transduction in HER3KO HER2\\u2009+\\u2009HCC1569 breast cancer cells in which endogenous HER3 was eliminated by CRISPR/Cas9. Cells expressing HER3\\u2010V104L showed higher p\\u2010HER3 and p\\u2010ERK1/2 expression versus cells expressing wild\\u2010type HER3 or HER3\\u2010V104M. Patients whose tumor expressed the HER3 V104L variant had a reduced probability of overall survival compared to patients lacking a HER3 mutation whereas we did not find a statistically significant difference in overall survival of various cancer patients with the HER3 V104M mutation. Our data showed that HER2 inhibitors suppressed cell growth of HCC1569HER3KO cells stably expressing the HER3\\u2010V104L mutation. Cancer cell lines (SNU407, UC15 and DV90) with endogenous HER3\\u2010V104M mutation showed reduced cell proliferation and p\\u2010HER2/p\\u2010ERK1/2 expression with HER2 inhibitor treatment. Knock down of HER3 abrogated cell proliferation in the above cell lines which were overall more sensitive to the ERK inhibitor SCH779284 versus PI3K inhibitors. HER3\\u2010V104L mutation stabilized HER3 protein expression in COS7 and SNUC5 cells. COS7 cells transiently transfected with the HER3\\u2010V104L mutation in the presence of HER binding partners showed higher expression of p\\u2010HER3, p\\u2010ERK1/2 versus HER3\\u2010WT in a NRG\\u2010independent manner without any change in AKT signaling. Overall, this study shows the clinical relevance of the HER3 V104L and the V104M mutations and its response to HER2, PI3K and ERK inhibitors.\"}, {\"paperId\": \"07c69f7ddd34ca8c80618e16981e2fbdb0de6529\", \"externalIds\": {\"MAG\": \"3175458943\", \"DOI\": \"10.1056/NEJMoa2031054\", \"CorpusId\": 227521558, \"PubMed\": \"33283989\"}, \"title\": \"CRISPR-Cas9 Gene Editing for Sickle Cell Disease and \\u03b2-Thalassemia.\", \"venue\": \"New England Journal of Medicine\", \"year\": 2020, \"citationCount\": 1064, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nejm.org/doi/pdf/10.1056/NEJMoa2031054?articleTools=true\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1056/NEJMoa2031054?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1056/NEJMoa2031054, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3979918\", \"name\": \"H. Frangoul\"}, {\"authorId\": \"1399529321\", \"name\": \"D. Altshuler\"}, {\"authorId\": \"2352430\", \"name\": \"M. Cappellini\"}, {\"authorId\": \"2049702110\", \"name\": \"Yi-Shan Chen\"}, {\"authorId\": \"2190459\", \"name\": \"J. Domm\"}, {\"authorId\": \"4116409\", \"name\": \"Brenda K. Eustace\"}, {\"authorId\": \"50534835\", \"name\": \"J. Foell\"}, {\"authorId\": \"47260365\", \"name\": \"J. de la Fuente\"}, {\"authorId\": \"4960884\", \"name\": \"S. Grupp\"}, {\"authorId\": \"5244967\", \"name\": \"R. Handgretinger\"}, {\"authorId\": \"15729523\", \"name\": \"Tony Ho\"}, {\"authorId\": \"5470090\", \"name\": \"A. Kattamis\"}, {\"authorId\": \"2425814\", \"name\": \"A. Kernytsky\"}, {\"authorId\": \"1401740505\", \"name\": \"J. Lekstrom-Himes\"}, {\"authorId\": \"2269117209\", \"name\": \"Amanda M Li\"}, {\"authorId\": \"30091661\", \"name\": \"F. Locatelli\"}, {\"authorId\": \"4379223\", \"name\": \"M. Mapara\"}, {\"authorId\": \"88430282\", \"name\": \"M. de Montalembert\"}, {\"authorId\": \"6122896\", \"name\": \"D. Rondelli\"}, {\"authorId\": \"1492041018\", \"name\": \"Akshay Sharma\"}, {\"authorId\": \"4766311\", \"name\": \"S. Sheth\"}, {\"authorId\": \"1753689421\", \"name\": \"S. Soni\"}, {\"authorId\": \"3062981\", \"name\": \"M. Steinberg\"}, {\"authorId\": \"3365082\", \"name\": \"D. Wall\"}, {\"authorId\": \"46357398\", \"name\": \"Angela Yen\"}, {\"authorId\": \"4062281\", \"name\": \"S. Corbacioglu\"}], \"abstract\": \"Transfusion-dependent \\u03b2-thalassemia (TDT) and sickle cell disease (SCD) are severe monogenic diseases with severe and potentially life-threatening manifestations. BCL11A is a transcription factor that represses \\u03b3-globin expression and fetal hemoglobin in erythroid cells. We performed electroporation of CD34+ hematopoietic stem and progenitor cells obtained from healthy donors, with CRISPR-Cas9 targeting the BCL11A erythroid-specific enhancer. Approximately 80% of the alleles at this locus were modified, with no evidence of off-target editing. After undergoing myeloablation, two patients - one with TDT and the other with SCD - received autologous CD34+ cells edited with CRISPR-Cas9 targeting the same BCL11A enhancer. More than a year later, both patients had high levels of allelic editing in bone marrow and blood, increases in fetal hemoglobin that were distributed pancellularly, transfusion independence, and (in the patient with SCD) elimination of vaso-occlusive episodes. (Funded by CRISPR Therapeutics and Vertex Pharmaceuticals; ClinicalTrials.gov numbers, NCT03655678 for CLIMB THAL-111 and NCT03745287 for CLIMB SCD-121.).\"}, {\"paperId\": \"07cd6cee4c90842cb86e86a183b048ce26f4c565\", \"externalIds\": {\"DOI\": \"10.1152/physiol.2024.39.s1.2206\", \"CorpusId\": 269969543}, \"title\": \"miRNA-221 and -222 increase in exosomes upon insulin stimulation of human vascular smooth muscle cells lacking the insulin-like growth factor 1 receptor\", \"venue\": \"Physiology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1152/physiol.2024.39.s1.2206?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1152/physiol.2024.39.s1.2206, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2121879558\", \"name\": \"Angelle Bradford\"}, {\"authorId\": \"2302666369\", \"name\": \"T. Woods\"}], \"abstract\": \"As a result of increased vascular inflammation, patients with Type 2 diabetes experience a near 4-fold increase in their risk for heart attack and stroke. miR-221 and -222 are two microRNAs that are upregulated in the vasculature of Type 2 diabetic patients. miR-221/222 act by downregulating the cyclin-dependent kinase inhibitor, p27Kip1, in vascular smooth muscle cells (VSMCs) and exosome-mediated proinflammatory effects on endothelial cells and macrophages. Loss of the insulin-like growth factor receptor (IGFR) in VSMCs can unmask the insulin receptor (IR) and increase insulin signaling. We have demonstrated that the loss of IGFR, coupled with physiological insulin stimulation, promotes an increased expression of miR-221/-222 in murine VSMCs. Respectively, miR-221/222 content in VSMC-derived exosomes increases and p27Kip1 mRNA expression decreases in VSMCs. We asked whether the effect of loss of IGFR in human coronary artery smooth muscle cells (HCASMCs) would also lead to an increase in miR-221/-222 content of VSMC-derived exosomes. Transfection with a CRISPR-cas9 plasmid targeting IGFR resulted in a 50% decrease in IGFR mRNA in HCASMCs, when compared to transfection with negative control CRISPR plasmids. Droplet digital PCR was used to measure expression of miR-221 and miR-222 in the exosomes derived from both sets of HCASMCs. There was no change in the miR-221/222 content of exosomes derived from HCASMCs transfected with the negative control CRISPR following stimulation with 1nM insulin (7.27\\u00b1 4.75 vs. 11.33 \\u00b1 1.09 copies of miR-221 and 6.43 \\u00b1 0.43 vs. 4.68 \\u00b1 0.02 copies of miR-222). In contrast, there was a 2 to 3-fold increase in miR-221/222 content in exosomes that were derived from HCASMCs with IGFR knockdown following stimulation with 1nM insulin (14.96 \\u00b1 0.3 vs. 35.66 \\u00b1 3.08 copies of miR-221 and 9.12 \\u00b1 1.19 vs.15.44 \\u00b1 5.36 copies of miR-222). We conclude that loss of IGFR coupled with physiological insulin stimulation increases the miR-221/222 content of exosomes of HCASMCs, recapitulating the effects of IGFR loss seen in murine VSMCs as well as the effects of diabetes on VSMCs. This model system will allow additional studies connecting the loss of IGFR to the cardiovascular complications of diabetes. Tulane University School of Medicine, Biomedical Sciences Program. This is the full abstract presented at the American Physiology Summit 2024 meeting and is only available in HTML format. There are no additional versions or additional content available for this abstract. Physiology was not involved in the peer review process.\"}, {\"paperId\": \"07ceb5089470fac870c0ee7c66137334f1b55c2b\", \"externalIds\": {\"DOI\": \"10.3917/pls.518.0015b\", \"CorpusId\": 246199694}, \"title\": \"Les \\u00ab\\u00a0ciseaux g\\u00e9n\\u00e9tiques\\u00a0\\u00bb CRISPR-Cas9\", \"venue\": \"Pour la science\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3917/pls.518.0015b?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3917/pls.518.0015b, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"21228976\", \"name\": \"L. Mangin\"}], \"abstract\": null}, {\"paperId\": \"07d0e85129368624e8444a9103010ca9bcf9d723\", \"externalIds\": {\"PubMedCentral\": \"11624490\", \"DOI\": \"10.1016/j.jgg.2024.09.016\", \"CorpusId\": 273135392, \"PubMed\": \"39368701\"}, \"title\": \"RFC2 may contribute to the pathogenicity of Williams syndrome revealed in a zebrafish model\", \"venue\": \"Journal of genetics and genomics = Yi chuan xue bao\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.jgg.2024.09.016\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11624490, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2324336880\", \"name\": \"Ji-Won Park\"}, {\"authorId\": \"114453898\", \"name\": \"Tae-Ik Choi\"}, {\"authorId\": \"2301417034\", \"name\": \"Tae-Yoon Kim\"}, {\"authorId\": \"1830385786\", \"name\": \"Yu-Ri Lee\"}, {\"authorId\": \"2278364591\", \"name\": \"Dilan Wellalage Don\"}, {\"authorId\": \"1401425637\", \"name\": \"Jaya K George-Abraham\"}, {\"authorId\": \"2289657419\", \"name\": \"Laurie Robak\"}, {\"authorId\": \"2362788740\", \"name\": \"Cristina C. Trandafir\"}, {\"authorId\": \"40535230\", \"name\": \"Pengfei Liu\"}, {\"authorId\": \"2207067081\", \"name\": \"JILL A. Rosenfeld\"}, {\"authorId\": \"2111252063\", \"name\": \"T. Kim\"}, {\"authorId\": \"2318292120\", \"name\": \"Florence Petit\"}, {\"authorId\": \"2258440363\", \"name\": \"Yoo-Mi Kim\"}, {\"authorId\": \"120652706\", \"name\": \"C. Cheon\"}, {\"authorId\": \"2269690361\", \"name\": \"Yoonsung Lee\"}, {\"authorId\": \"2152951122\", \"name\": \"Cheol\\u2013Hee Kim\"}], \"abstract\": \"Williams syndrome (WS) is a rare multisystemic disorder caused by recurrent microdeletions on 7q11.23, characterized by intellectual disability, distinctive craniofacial and dental features, and cardiovascular problems. Previous studies have explored the roles of individual genes within these microdeletions in contributing to WS phenotypes. Here, we report five patients with WS with 1.4 Mb\\u20131.5 Mb microdeletions that include RFC2, as well as one patient with a 167-kb microdeletion involving RFC2 and six patients with intragenic variants within RFC2. To investigate the potential involvement of RFC2 in WS pathogenicity, we generate a rfc2 knockout (KO) zebrafish using CRISPR-Cas9 technology. Additionally, we generate a KO zebrafish of its paralog gene, rfc5, to better understand the functions of these RFC genes in development and disease. Both rfc2 and rfc5 KO zebrafish exhibit similar phenotypes reminiscent of WS, including small head and brain, jaw and dental defects, and vascular problems. RNA-seq analysis reveals that genes associated with neural cell survival and differentiation are specifically affected in rfc2 KO zebrafish. In addition, heterozygous rfc2 KO adult zebrafish demonstrate an anxiety-like behavior with increased social cohesion. These results suggest that RFC2 may contribute to the pathogenicity of WS, as evidenced by the zebrafish model.\"}, {\"paperId\": \"07d158ae585270a64dc8b3e76e19134284d4384a\", \"externalIds\": {\"DOI\": \"10.26452/ijrps.v11ispl4.4391\", \"CorpusId\": 240744473}, \"title\": \"Genetic screening of autism, a neurodevelopmental disorder: A review\", \"venue\": \"International Journal of Research in Pharmaceutical Sciences\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.26452/ijrps.v11ispl4.4391?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.26452/ijrps.v11ispl4.4391, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2137950594\", \"name\": \"Ranjana Shaw\"}, {\"authorId\": \"2124795701\", \"name\": \"Tamalika Chakraborty\"}, {\"authorId\": \"2137962362\", \"name\": \"Dipanjan Mandal\"}], \"abstract\": \"Neurodevelopmental disorders are conditions that arise from aberrant encephalon magnification and development, are perennial, crippling illness. Autism spectrum disorder (autism) is a common neurodevelopmental disability characterized by motor, social, cognitive function, stereotypies. This study aimed to investigate the genetic constitution of autism, an animal model named zebrafish serves as an indispensable tool for this purpose. Zebrafish is a highly gregarious species that acts as a suitable animal model system that affects convivial functions such as autism. Since transparent embryos are developed externally in zebrafish, it enables to conduct pharmacological screens for recognition of minute molecules along with genetic manipulation, facilitated through the CRISPR/Cas9 gene-editing technologies, enabling the screening of the developing nervous system directly, large progenies, and substantial tractability. Mutational analysis of the genetic function has been used to suppress or express mutations in zebrafish homologs of human genes for the direct expression of human genes bearing mutations cognate to a neurodevelopmental disorder. Two areas of future research are addressed through the ease and relative speed of conducting experiments in zebrafish, which includes environmental factors contributing to disease onset, and screening for novel therapeutic compounds. This study found that zebrafish have become available for cell-based analysis and have been used for the prosperous modelling of autism. Continued innovations in zebrafish genetic implements will continue to make it a captivating neurological disease model.\"}, {\"paperId\": \"07d19ce179d8e847e4befa8a4379f3bddbca3d08\", \"externalIds\": {\"PubMedCentral\": \"10448110\", \"DOI\": \"10.1016/j.isci.2023.107529\", \"CorpusId\": 260665392, \"PubMed\": \"37636042\"}, \"title\": \"Sex-biased genome-editing effects of CRISPR-Cas9 across cancer cells dependent on p53 status\", \"venue\": \"iScience\", \"year\": 2023, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.cell.com/article/S2589004223016061/pdf\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10448110, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15149307\", \"name\": \"M. Guo\"}, {\"authorId\": \"3366673\", \"name\": \"Y. Xiong\"}], \"abstract\": \"Summary The CRISPR-Cas9 system has emerged as the dominant technology for gene editing and clinical applications. One major concern is its off-target effect after the introduction of exogenous CRISPR-Cas9 into cells. Several previous studies have investigated either Cas9 alone or CRISPR-Cas9 interactions with p53. Here, we reanalyzed previously reported data of p53-associated Cas9 activities and observed large significant sex differences between p53-wildtype and p53-mutant cells. To expand the impact of this finding, we further examined all protein-coding genes for sex-specific dependencies in a large-scale CRISPR-Cas9 screening dataset from the DepMap project. We highlighted the p53-dependent sex bias of gene knockouts (including MYC, PIK3CA, KAT2B, KDM4E, SUV39H1, FANCB, TLR7, and APC2) across cancer types and potential mechanisms (mediated by transcriptional factors, including SOX9, FOXO4, LEF1, and RYBP) underlying this phenomenon. Our results suggest that the p53-dependent sex bias may need to be considered in future clinical applications of CRISPR-Cas9, especially in cancer.\"}, {\"paperId\": \"07d5b58854db40f142cfb1bcefabb616f076217c\", \"externalIds\": {\"PubMedCentral\": \"8525385\", \"DOI\": \"10.3389/fgeed.2020.623717\", \"CorpusId\": 231579899, \"PubMed\": \"34713244\"}, \"title\": \"Non-immunogenic Induced Pluripotent Stem Cells, a Promising Way Forward for Allogenic Transplantations for Neurological Disorders\", \"venue\": \"Frontiers in Genome Editing\", \"year\": 2021, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fgeed.2020.623717/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8525385, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"67063193\", \"name\": \"H. R. Frederiksen\"}, {\"authorId\": \"7382496\", \"name\": \"Ulrik Doehn\"}, {\"authorId\": \"1397822393\", \"name\": \"P. Tveden-Nyborg\"}, {\"authorId\": \"3799536\", \"name\": \"K. Freude\"}], \"abstract\": \"Neurological disorder is a general term used for diseases affecting the function of the brain and nervous system. Those include a broad range of diseases from developmental disorders (e.g., Autism) over injury related disorders (e.g., stroke and brain tumors) to age related neurodegeneration (e.g., Alzheimer's disease), affecting up to 1 billion people worldwide. For most of those disorders, no curative treatment exists leaving symptomatic treatment as the primary mean of alleviation. Human induced pluripotent stem cells (hiPSC) in combination with animal models have been instrumental to foster our understanding of underlying disease mechanisms in the brain. Of specific interest are patient derived hiPSC which allow for targeted gene editing in the cases of known mutations. Such personalized treatment would include (1) acquisition of primary cells from the patient, (2) reprogramming of those into hiPSC via non-integrative methods, (3) corrective intervention via CRISPR-Cas9 gene editing of mutations, (4) quality control to ensure successful correction and absence of off-target effects, and (5) subsequent transplantation of hiPSC or pre-differentiated precursor cells for cell replacement therapies. This would be the ideal scenario but it is time consuming and expensive. Therefore, it would be of great benefit if transplanted hiPSC could be modulated to become invisible to the recipient's immune system, avoiding graft rejection and allowing for allogenic transplantations. This review will focus on the current status of gene editing to generate non-immunogenic hiPSC and how these cells can be used to treat neurological disorders by using cell replacement therapy. By providing an overview of current limitations and challenges in stem cell replacement therapies and the treatment of neurological disorders, this review outlines how gene editing and non-immunogenic hiPSC can contribute and pave the road for new therapeutic advances. Finally, the combination of using non-immunogenic hiPSC and in vivo animal modeling will highlight the importance of models with translational value for safety efficacy testing; before embarking on human trials.\"}, {\"paperId\": \"07d5e12afc92464ea70d8f88dd3c0824dbea41d5\", \"externalIds\": {\"DOI\": \"10.1182/bloodadvances.2020003792\", \"CorpusId\": 232324390, \"PubMed\": \"33755093\"}, \"title\": \"Immunotherapy perspectives in the new era of B-cell editing.\", \"venue\": \"Blood Advances\", \"year\": 2021, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/bloodadvances.2020003792\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/bloodadvances.2020003792?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/bloodadvances.2020003792, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"29121726\", \"name\": \"Natsuko Ueda\"}, {\"authorId\": \"2057658758\", \"name\": \"Marine Cahen\"}, {\"authorId\": \"4803360\", \"name\": \"Y. Danger\"}, {\"authorId\": \"32123556\", \"name\": \"J. Moreaux\"}, {\"authorId\": \"4467871\", \"name\": \"C. Sirac\"}, {\"authorId\": \"5226295\", \"name\": \"M. Cogn\\u00e9\"}], \"abstract\": \"Since the early days of vaccination, targeted immunotherapy has gone through multiple conceptual changes and challenges. It now provides the most efficient and up-to-date strategies for either preventing or treating infections and cancer. Its most recent and successful weapons are autologous T cells carrying chimeric antigen receptors, engineered purposely for binding cancer-specific antigens and therefore used for so-called adoptive immunotherapy. We now face the merger of such achievements in cell therapy: using lymphocytes redirected on purpose to bind specific antigens and the \\u00a0clustered regularly interspaced short palindromic repeats (CRISPR)/CRISPR-associated protein 9 (Cas9) revolution, which conferred genome-editing methodologies with both safety and efficacy. This unique affiliation will soon and considerably expand the scope of diseases susceptible to adoptive immunotherapy and of immune cells available for being reshaped as therapeutic tools, including B cells. Following the monumental success story of passive immunotherapy with monoclonal antibodies (mAbs), we are thus entering into a new era, where a combination of gene therapy/cell therapy will enable reprogramming of the patient's immune system and notably endow his B cells with the ability to produce therapeutic mAbs on their own.\"}, {\"paperId\": \"07d5ff85ed9ca3f9ddf9000b9439118cea037bad\", \"externalIds\": {\"DOI\": \"10.1007/s12298-023-01397-3\", \"CorpusId\": 266102972, \"PubMed\": \"38222286\"}, \"title\": \"3Bs of CRISPR-Cas mediated genome editing in plants: exploring the basics, bioinformatics and biosafety landscape\", \"venue\": \"Physiology and Molecular Biology of Plants\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1007/s12298-023-01397-3\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s12298-023-01397-3?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s12298-023-01397-3, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6646882\", \"name\": \"L. Kharbikar\"}, {\"authorId\": \"47377224\", \"name\": \"Rocktotpal Konwarh\"}, {\"authorId\": \"2058957820\", \"name\": \"Monoswi Chakraborty\"}, {\"authorId\": \"80085979\", \"name\": \"Shweta K. Nandanwar\"}, {\"authorId\": \"2272340108\", \"name\": \"Ashish Marathe\"}, {\"authorId\": \"91573985\", \"name\": \"Yogesh Yele\"}, {\"authorId\": \"2244631122\", \"name\": \"Probir Kumar Ghosh\"}, {\"authorId\": \"1398923640\", \"name\": \"Neeti Sanan-Mishra\"}, {\"authorId\": \"2260601873\", \"name\": \"Anand Pratap Singh\"}], \"abstract\": \"The recent thrust in research has projected the type II clustered regularly interspaced short palindromic repeats and associated protein 9 (CRISPR-Cas9) system as an avant-garde plant genome editing tool. It facilitates the induction of site-specific double-stranded DNA cleavage by the RNA-guided DNA endonuclease (RGEN), Cas9. Elimination, addition, or alteration of sections in DNA sequence besides the creation of a knockout genotype (CRISPRko) is aided by the CRISPR-Cas9 system in its wild form (wtCas9). The inactivation of the nuclease domain generates a dead Cas9 (dCas9), which is capable of targeting genomic DNA without scissoring it. The dCas9 system can be engineered by fusing it with different effectors to facilitate transcriptional activation (CRISPRa) and transcriptional interference (CRISPRi). CRISPR-Cas thus holds tremendous prospects as a genome-manipulating stratagem for a wide gamut of crops. In this article, we present a brief on the fundamentals and the general workflow of the CRISPR-Cas system followed by an overview of the prospects of bioinformatics in propelling CRISPR-Cas research with a special thrust on the available databases and algorithms/web-accessible applications that have aided in increasing the usage and efficiency of editing. The article also provides an update on the current regulatory landscape in different countries on the CRISPR-Cas edited plants to emphasize the far-reaching impact of the genomic editing technology.\"}, {\"paperId\": \"07d6939e0531d1f349d8aff75bd7e09cc5cd57e8\", \"externalIds\": {\"DOI\": \"10.1096/fj.202200212R\", \"CorpusId\": 249622969, \"PubMed\": \"35695805\"}, \"title\": \"Loss of Drosophila NUS1 results in cholesterol accumulation and Parkinson\\u2019s disease\\u2010related neurodegeneration\", \"venue\": \"The FASEB Journal\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1096/fj.202200212R?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1096/fj.202200212R, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1735080\", \"name\": \"Jin Xue\"}, {\"authorId\": \"1481762533\", \"name\": \"Yingbao Zhu\"}, {\"authorId\": \"2202886385\", \"name\": \"Liyi Wei\"}, {\"authorId\": \"2107469404\", \"name\": \"Hongjing Huang\"}, {\"authorId\": \"2151302276\", \"name\": \"Guangxu Li\"}, {\"authorId\": \"47504646\", \"name\": \"Wen Huang\"}, {\"authorId\": \"2293141030\", \"name\": \"Hua Zhu\"}, {\"authorId\": \"1818774\", \"name\": \"R. Duan\"}], \"abstract\": \"NgBR is the Nogo\\u2010B receptor, encoded by NUS1 gene. As NgBR contains a C\\u2010terminal domain that is similar to cis\\u2010isoprenyltransferase (cis\\u2010IPTase), NgBR was speculated to stabilize nascent Niemann\\u2010Pick type C 2 (NPC2) to facilitate cholesterol transport out of lysosomes. Mutations in the NUS1 were known as risk factors for Parkinson's disease (PD). In our previous study, it was shown that knockdown of Drosophila NUS1 orthologous gene tango14 causes decreased climbing ability, loss of dopaminergic neurons, and decreased dopamine contents. In this study, tango14 mutant flies were generated with a mutation in the C\\u2010terminal enzyme activity region using CRISPR/Cas9. Tango14 mutant showed a reduced lifespan with locomotive defects and cholesterol accumulation in Malpighian tubules and brains, especially in dopaminergic neurons. Multilamellar bodies were found in tango14 mutants using electron microscopy. Neurodegenerative\\u2010related brain vacuolization was also detected in tango14 knockdown flies in an age\\u2010dependent manner. In addition, tango14 knockdown increased \\u03b1\\u2010synuclein (\\u03b1\\u2010syn) neurotoxicity in \\u03b1\\u2010syn\\u2010overexpressing flies, with decreased locomotive activities, dopamine contents, and the numbers of dopaminergic neurons in aging flies. Thus, these observations suggest a role of NUS1, the ortholog of tango14, in PD\\u2010related pathogenesis.\"}, {\"paperId\": \"07dae4faa6cd3beecf040b89d0827b039637e472\", \"externalIds\": {\"PubMedCentral\": \"7758215\", \"MAG\": \"3110653200\", \"DOI\": \"10.3389/fmicb.2020.564310\", \"CorpusId\": 228077550, \"PubMed\": \"33362728\"}, \"title\": \"Artificially Edited Alleles of the Eukaryotic Translation Initiation Factor 4E1 Gene Differentially Reduce Susceptibility to Cucumber Mosaic Virus and Potato Virus Y in Tomato\", \"venue\": \"Frontiers in Microbiology\", \"year\": 2020, \"citationCount\": 48, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.frontiersin.org/articles/10.3389/fmicb.2020.564310/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7758215, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49072999\", \"name\": \"H. Atarashi\"}, {\"authorId\": \"2034061455\", \"name\": \"W. H. Jayasinghe\"}, {\"authorId\": \"2000431743\", \"name\": \"Joon-Ho Kwon\"}, {\"authorId\": \"8186326\", \"name\": \"Hangil Kim\"}, {\"authorId\": \"1403575622\", \"name\": \"Yosuke Taninaka\"}, {\"authorId\": \"145601389\", \"name\": \"Manabu Igarashi\"}, {\"authorId\": \"152807344\", \"name\": \"Kotaro Ito\"}, {\"authorId\": \"5650482\", \"name\": \"Tetsuya Yamada\"}, {\"authorId\": \"4994610\", \"name\": \"C. Masuta\"}, {\"authorId\": \"47012105\", \"name\": \"K. Nakahara\"}], \"abstract\": \"Eukaryotic translation initiation factors, including eIF4E, are susceptibility factors for viral infection in host plants. Mutation and double-stranded RNA-mediated silencing of tomato eIF4E genes can confer resistance to viruses, particularly members of the Potyvirus genus. Here, we artificially mutated the eIF4E1 gene on chromosome 3 of a commercial cultivar of tomato (Solanum lycopersicum L.) by using CRISPR/Cas9. We obtained three alleles, comprising two deletions of three and nine nucleotides (3DEL and 9DEL) and a single nucleotide insertion (1INS), near regions that encode amino acid residues important for binding to the mRNA 5' cap structure and to eIF4G. Plants homozygous for these alleles were termed 3DEL, 9DEL, and 1INS plants, respectively. In accordance with previous studies, inoculation tests with potato virus Y (PVY; type member of the genus Potyvirus) yielded a significant reduction in susceptibility to the N strain (PVYN), but not to the ordinary strain (PVYO), in 1INS plants. 9DEL among three artificial alleles had a deleterious effect on infection by cucumber mosaic virus (CMV, type member of the genus Cucumovirus). When CMV was mechanically inoculated into tomato plants and viral coat accumulation was measured in the non-inoculated upper leaves, the level of viral coat protein was significantly lower in the 9DEL plants than in the parental cultivar. Tissue blotting of microperforated inoculated leaves of the 9DEL plants revealed significantly fewer infection foci compared with those of the parental cultivar, suggesting that 9DEL negatively affects the initial steps of infection with CMV in a mechanically inoculated leaf. In laboratory tests, viral aphid transmission from an infected susceptible plant to 9DEL plants was reduced compared with the parental control. Although many pathogen resistance genes have been discovered in tomato and its wild relatives, no CMV resistance genes have been used in practice. RNA silencing of eIF4E expression has previously been reported to not affect susceptibility to CMV in tomato. Our findings suggest that artificial gene editing can introduce additional resistance to that achieved with mutagenesis breeding, and that edited eIF4E alleles confer an alternative way to manage CMV in tomato fields.\"}, {\"paperId\": \"07dee13e1696d5bceab0fc4256d1cf4b64681aa9\", \"externalIds\": {\"MAG\": \"3084289853\", \"DOI\": \"10.1016/j.scitotenv.2020.142188\", \"CorpusId\": 224915680, \"PubMed\": \"33254942\"}, \"title\": \"Cadmium stress in paddy fields: Effects of soil conditions and remediation strategies.\", \"venue\": \"Science of the Total Environment\", \"year\": 2021, \"citationCount\": 327, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.scitotenv.2020.142188?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.scitotenv.2020.142188, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143936964\", \"name\": \"B. Hussain\"}, {\"authorId\": \"143879750\", \"name\": \"M. Ashraf\"}, {\"authorId\": \"1412352154\", \"name\": \"Shafeeq-ur-rahman\"}, {\"authorId\": \"46206374\", \"name\": \"A. Abbas\"}, {\"authorId\": \"47786390\", \"name\": \"Ju-mei Li\"}, {\"authorId\": \"26427711\", \"name\": \"M. Farooq\"}], \"abstract\": \"Cadmium (Cd) toxicity in paddy soil and accumulation in rice plants and grains have got global concern due to its health effects. This review highlights the effects of soil factors including soil organic matter, soil pH, redox potential, and soil microbes which influencing Cd uptake by rice plant. Therefore, a comprehensive review of innovative and environmentally friendly management practices for managing Cd stress in rice is lacking. Thus, this review discusses the effect of Cd toxicity in rice and describes management strategies to offset its effects. Moreover, future research thrusts to reduce its uptake by rice has also been highlighted. Through phytoremediation, Cd may be extracted and stabilized in the soil while through microbes Cd can be sequestrated inside the microbial bodies. Increased Cd uptake in hyperaccumulator plants to remediate and convert the toxic form of Cd into non-toxic forms. While in chemical remediation, Cd can be washed out, immobilized and stabilized in the soil through chemical amendments. The organic amendments may help through an increase in soil pH, adsorption in its functional groups, the formation of complexations, and the conversion of exchangeable to residual forms. Developing rice genotypes with restricted Cd uptake and reduced accumulation in grain through conventional and marker-assisted breeding are fundamental keys for safe rice production. In this regard, the use of molecular techniques including identification of QTLs, CRISPR/Cas9, and functional genomics may be quite helpful.\"}, {\"paperId\": \"07e19ba67e9eb36393d81f855a2793f911c7956e\", \"externalIds\": {\"DOI\": \"10.1101/2023.05.10.540176\", \"CorpusId\": 258688480, \"PubMed\": \"37214957\"}, \"title\": \"KLIPP - a precision CRISPR approach to target structural variant junctions in cancer\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2023/05/12/2023.05.10.540176.1.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2023.05.10.540176?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2023.05.10.540176, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3031071\", \"name\": \"Huibin Yang\"}, {\"authorId\": \"90701710\", \"name\": \"R. Hulbatte\"}, {\"authorId\": \"2133293921\", \"name\": \"Alan Kelleher\"}, {\"authorId\": \"1581903520\", \"name\": \"Natalie Gratsch\"}, {\"authorId\": \"49417985\", \"name\": \"Y. Wang\"}, {\"authorId\": \"2379198197\", \"name\": \"Philip L. Palmbos\"}, {\"authorId\": \"5714950\", \"name\": \"M. Ljungman\"}], \"abstract\": null}, {\"paperId\": \"07e2d57121a44179b1cc705d335b87bcd2371f4c\", \"externalIds\": {\"DOI\": \"10.1099/acmi.ac2021.po0426\", \"CorpusId\": 249146361}, \"title\": \"Development of CRISPR/Cas9-based Novel Vaccines against Poultry Viruses\", \"venue\": \"Access Microbiology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1099/acmi.ac2021.po0426\", \"status\": \"GOLD\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1099/acmi.ac2021.po0426?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1099/acmi.ac2021.po0426, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1931971559\", \"name\": \"Julianne Vilela\"}, {\"authorId\": \"2076290\", \"name\": \"M. Munir\"}], \"abstract\": \"Vaccines remain the primary means of disease prevention throughimmunisationschemes in the poultry sector. Novel approaches in vaccine development, such as reverse genetic systems and genome editing technologies (i.e. CRISPR/Cas9), are currently being utilized to overcome challenges in establishing an immunogenic platform that is safe and capable of inducing long-term immunity. The CRISPR/Cas9 (Clustered regularly interspaced short palindromic repeats associated protein nuclease 9) technology offers an effective, fast and simple novel approach to edit genomes for the development of viral vectors against poultry diseases such as Newcastle disease (ND), avian influenza (AI) and infectious bronchitis (IB). In this study, we demonstrate the application of CRISPR/Cas9-based genome editing to generate recombinant viral vectors that express the F gene of NDV. Validation of gene integration, protein expression, and insert stability was carried out by PCR, immunostaining and Western blot analysis, respectively. This approach offers an efficient platform for the generation of multivalent recombinant vaccines that can provide simultaneous protection against major poultry diseases.\"}, {\"paperId\": \"07e7d8a8139ce3a08ac26c2ae849c575c65b9bc5\", \"externalIds\": {\"DOI\": \"10.1073/pnas.2025265118\", \"CorpusId\": 244490019, \"PubMed\": \"34810254\"}, \"title\": \"Click chemistry\\u2013enabled CRISPR screening reveals GSK3 as a regulator of PLD signaling\", \"venue\": \"Proceedings of the National Academy of Sciences of the United States of America\", \"year\": 2021, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.pnas.org/doi/pdf/10.1073/pnas.2025265118\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1073/pnas.2025265118?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1073/pnas.2025265118, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15205001\", \"name\": \"Timothy W. Bumpus\"}, {\"authorId\": \"116180642\", \"name\": \"Shiying Huang\"}, {\"authorId\": \"151195851\", \"name\": \"Reika Tei\"}, {\"authorId\": \"4863571\", \"name\": \"Jeremy M. Baskin\"}], \"abstract\": \"Significance The application of CRISPR-Cas9 to genome-wide screening has revolutionized our ability to discover new functions for genes and regulators of physiological processes. However, a major constraint placed on such screens is the choice of phenotypic selection step, typically limited to live/dead or conventional fluorescent reporter/labeling. Here, we develop a CRISPR interference\\u2013based screening platform harnessing click chemistry tagging to reveal regulators of a specific signaling pathway. Using this tool, we discovered a regulatory circuit involving glycogen synthase kinase 3 and protein kinase C in the control of phospholipase D signaling. More broadly, this work illustrates how emergent chemical biology approaches can expand the power of genome-wide CRISPR screening to elucidate mechanisms regulating specific enzyme-driven signaling pathways. Enzymes that produce second messengers are highly regulated. Revealing the mechanisms underlying such regulation is critical to understanding both how cells achieve specific signaling outcomes and return to homeostasis following a particular stimulus. Pooled genome-wide CRISPR screens are powerful unbiased approaches to elucidate regulatory networks, their principal limitation being the choice of phenotype selection. Here, we merge advances in bioorthogonal fluorescent labeling and CRISPR screening technologies to discover regulators of phospholipase D (PLD) signaling, which generates the potent lipid second messenger phosphatidic acid. Our results reveal glycogen synthase kinase 3 as a positive regulator of protein kinase C and PLD signaling. More generally, this work demonstrates how bioorthogonal, activity-based fluorescent tagging can expand the power of CRISPR screening to uncover mechanisms regulating specific enzyme-driven signaling pathways in mammalian cells.\"}, {\"paperId\": \"07ecc44cdb8a0e52f32e8ddc4b8b81b5d65ee0a7\", \"externalIds\": {\"MAG\": \"3130288197\", \"DOI\": \"10.15407/UBJ93.01.113\", \"CorpusId\": 233901492}, \"title\": \"Prospects of genome editing using CRISPR/CAS or how to master genetic scissors. Nobel Prize in Chemistry 2020\", \"venue\": \"Ukrainian Biochemical Journal\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://ukrbiochemjournal.org/wp-content/uploads/2021/02/Komisarenko_1_21.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15407/UBJ93.01.113?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15407/UBJ93.01.113, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"30086563\", \"name\": \"S. Komisarenko\"}, {\"authorId\": \"3465754\", \"name\": \"S. Romaniuk\"}], \"abstract\": \"one of the most powerful genetic technology tools - CRISPR/Cas9, or so-called \\u2018genetic scissors\\u2019. has to many important results of basic research. In particular, plant researchers have managed to create crops resistant to mold, pests and drought. As for medicine, clinical trials of new cancer treatment techniques are underway, and a dream of curing hereditary diseases is about to become a reality. Genetic scissors have brought the life sciences to a new stage of development and greatly contributed to the benefit of mankind.\"}, {\"paperId\": \"07eea8a6dcd632db469706ad85a7b88abe02f0f9\", \"externalIds\": {\"PubMedCentral\": \"9406647\", \"DOI\": \"10.3390/cells11162535\", \"CorpusId\": 251660528, \"PubMed\": \"36010612\"}, \"title\": \"Improvement of Bacterial Blight Resistance in Two Conventionally Cultivated Rice Varieties by Editing the Noncoding Region\", \"venue\": \"Cells\", \"year\": 2022, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/11/16/2535/pdf?version=1660645425\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9406647, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46651931\", \"name\": \"Changyan Li\"}, {\"authorId\": \"2144764354\", \"name\": \"Lei Zhou\"}, {\"authorId\": \"2152564055\", \"name\": \"Bian Wu\"}, {\"authorId\": \"2116586106\", \"name\": \"Sanhe Li\"}, {\"authorId\": \"32448382\", \"name\": \"W. Zha\"}, {\"authorId\": \"2157336769\", \"name\": \"Wei Li\"}, {\"authorId\": \"9552601\", \"name\": \"Zaihui Zhou\"}, {\"authorId\": \"2724741\", \"name\": \"Linfeng Yang\"}, {\"authorId\": \"2215087499\", \"name\": \"Lei Shi\"}, {\"authorId\": \"50980150\", \"name\": \"Yongjun Lin\"}, {\"authorId\": \"9920466\", \"name\": \"A. You\"}], \"abstract\": \"xa13 is a recessive pleiotropic gene that positively regulates rice disease resistance and negatively regulates rice fertility; thus, seriously restricting its rice breeding application. In this study, CRISPR/Cas9 gene-editing technology was used to delete the Xa13 gene promoter partial sequence, including the pathogenic bacteria-inducible expression element. Rice with the edited promoter region lost the ability for pathogen-induced gene expression without affecting background gene expression in leaves and anthers, resulting in disease resistance and normal yield. The study also screened a family of disease-resistant and normal fertile plants in which the target sequence was deleted and the exogenous transgene fragment isolated in the T1 generation (transgene-free line). Important agronomic traits of the T2 generation rice were examined. T2 generation rice with/without exogenous DNA showed no statistical differences compared to the wild type in heading stage, plant height, panicles per plant, panicle length, or seed setting rate in the field. Two important conventional rice varieties, namely Kongyu131 (KY131, Geng/japonica) and Huanghuazhan (HHZ, Xian/indica), were successfully transformed, and disease-resistant and fertile materials were obtained. Currently, these are the two important conventional rice varieties in China that can be used directly for production after improvement. Expression of the Xa13 gene in the leaves of transgenic rice (KY-PD and HHZ-PD) was not induced after pathogen infection, indicating that this method can be used universally and effectively to promote the practical application of xa13, a recessive disease-resistant pleiotropic gene, for rice bacterial blight resistance. Our study on the regulation of gene expression by editing noncoding regions of the genes provides a new idea for the development of molecular design breeding in the future.\"}, {\"paperId\": \"07eeb1ff267a4a8f5605db09b89b0275716b6667\", \"externalIds\": {\"DOI\": \"10.31344/ijhhs.v5i4.349\", \"CorpusId\": 238209530}, \"title\": \"An Ethical Reflection on the Heritability Argument in the Germline Genetic Intervention Debate\", \"venue\": \"International Journal of Human and Health Sciences\", \"year\": 2021, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ijhhsfimaweb.info/index.php/IJHHS/article/download/349/336\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.31344/ijhhs.v5i4.349?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.31344/ijhhs.v5i4.349, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2065605849\", \"name\": \"Maide Baris\"}], \"abstract\": \"Germline genetic intervention (GGI) has been one of the most discussed topics within the bioethics literature since 2012, when the programming of CRISPR/Cas9 for a specifically targeted gene region has become possible. While some authors are optimistic about what GGI may offer, others strongly disagree and refute the use of this technology for different reasons. This paper will aim to examine one of the most widespread arguments against GGI, namely \\u201cheritability\\u201d argument, comprehensively. Firstly, it will aim to examine the moral importance of the germline. Secondly, it will try to understand three possible assumptions of the heritability argument. Then it will try to respond to these assumptions and argue that they are neither scientifically supportable nor rationally solid for rejecting GGI altogether.International Journal of Human and Health Sciences Vol. 05 No. 04 October\\u201921 Page: 405-411\"}, {\"paperId\": \"07f067a1909e6d1fc4cc1af05cf270268a870af2\", \"externalIds\": {\"MAG\": \"3007126393\", \"DOI\": \"10.1016/b978-0-12-818140-9.00010-6\", \"CorpusId\": 213068004}, \"title\": \"Engineering of Cas9 for improved functionality\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/b978-0-12-818140-9.00010-6?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/b978-0-12-818140-9.00010-6, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1571791432\", \"name\": \"D. Vora\"}, {\"authorId\": \"2000421\", \"name\": \"J. Dhanjal\"}, {\"authorId\": \"145063855\", \"name\": \"D. Sundar\"}], \"abstract\": \"Abstract Advent of efficient technology to introduce targeted and precise changes in the genome of living cells has been an enduring goal in the field of biotechnology, with special focus on clinical applications. Discovery of CRISPR/Cas9 system as a molecular scissor with potential to bind to specific sequence of nucleotides within the genome emerged as a promising option. Several attempts have been made over the years to improve this targeted genome editing tool for better on-target and minimal off-target activity. The Cas9 endonuclease has been altered in many ways to either modify its existing properties or add new functionalities to expand its applicability. This chapter discusses in detail the variants of Cas9 endonuclease that have been developed so far. This mainly includes the generation of nickases, dead Cas9, switchable endonuclease, inducible Cas9, Cas with altered PAM specificity and other Cas orthologues.\"}, {\"paperId\": \"07f508cfaae910ce1558f36ec3ddd1f2240fae69\", \"externalIds\": {\"DOI\": \"10.1016/j.ijbiomac.2024.136354\", \"CorpusId\": 273183081, \"PubMed\": \"39378920\"}, \"title\": \"The role of SlCHRC in carotenoid biosynthesis and plastid development in tomato fruit.\", \"venue\": \"International Journal of Biological Macromolecules\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ijbiomac.2024.136354?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ijbiomac.2024.136354, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2153609837\", \"name\": \"Yu Wang\"}, {\"authorId\": \"2183538553\", \"name\": \"Cong Tian\"}, {\"authorId\": \"2324763040\", \"name\": \"Qiting Na\"}, {\"authorId\": \"2324766400\", \"name\": \"Changsong Zhu\"}, {\"authorId\": \"2325494387\", \"name\": \"Hui Cao\"}, {\"authorId\": \"2153207046\", \"name\": \"Meng Zhang\"}, {\"authorId\": \"4070078\", \"name\": \"Lan-huan Meng\"}], \"abstract\": \"Chromoplasts are specialized plastids in plants involved in carotenoid synthesis, accumulation, and stress resistance. In tomatoes (Solanum lycopersicum), the Chromoplast-associated carotenoid binding protein (CHRC) regulates chromoplast development and carotenoid accumulation, although its precise mechanisms are not yet fully understood. To investigate the role of SlCHRC in carotenoid biosynthesis, we generated transgenic tomatoes using overexpression (oe-SlCHRC) and CRISPR/Cas9-mediated gene editing (cr-SlCHRC) techniques. The results demonstrated inhibited fruit ripening and delayed onset of color break in both transgenic lines. The oe-SlCHRC lines exhibited increased carotenoid accumulation, particularly (E/Z)-phytoene, lycopene, and \\u03b3-carotene, with abundant plastoglobules and carotenoid crystals observed via TEM. In contrast, cr-SlCHRC mutants showed a greener phenotype, reduced carotenoid content, and fewer plastoglobules at the BK\\u202f+\\u202f10 stage. Transcriptome analysis indicated that SlCHRC influences key genes in carotenoid biosynthesis, such as SlNCED2, as well as genes related to chloroplast development, photosynthesis, and plastoglobule formation. Additionally, SlCHRC enhances heat stress tolerance in tomato fruits by upregulating heat shock proteins (HSPs), antioxidants, and proline accumulation. These findings indicate that SlCHRC plays a crucial role in improving tomato fruit quality under heat stress conditions.\"}, {\"paperId\": \"07f6cd201ebf25ababaa07505ec7c712f49efbf8\", \"externalIds\": {\"DOI\": \"10.23977/blsme.2022058\", \"CorpusId\": 248934908}, \"title\": \"Practical use of CRISPR-Cas9 on SHANK3 and Neuroligin related to Autism Spectrum Disorder\", \"venue\": \"2022 International Conference on Biotechnology, Life Science and Medical Engineering (BLSME 2022)\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.clausiuspress.com/conferences/LNMLS/BLSME 2022/Y0817.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.23977/blsme.2022058?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.23977/blsme.2022058, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46270580\", \"name\": \"Z. Liu\"}, {\"authorId\": \"2255933415\", \"name\": \"Jiang Xiao\"}, {\"authorId\": \"150128988\", \"name\": \"Haoning Xue\"}], \"abstract\": \": Autism spectrum disorder, is a generalized developmental disorder, whose symptoms include abnormal language skills, abnormal communication skills, narrow interests, and stubborn behavior patterns. Even though the causes of ASD remain uncertain, genetic and neuroscientific studies have identified exciting evidences for people\\u2019s understanding. SHANK3 \\u2013 an actin polymerization modulating gene, and neuroligin, which plays key role in the stability of synapse structure attract increasing attention as research focus and clinical treatment target. With the development of gene therapy technologies, CRIPSPER showed excellent advantages over traditional treatment measures. Accordingly, with going deep into the mechanism of ASD, CRISPER might be a most effective tool for it. exclusively localized to inhibitory synapses.\"}, {\"paperId\": \"07ffa1c236ab45596f5e33eb288fc41f0b9f5a29\", \"externalIds\": {\"PubMedCentral\": \"9199458\", \"DOI\": \"10.1007/s11033-022-07519-6\", \"CorpusId\": 249709552, \"PubMed\": \"35705772\"}, \"title\": \"Recent advances of the biological and biomedical applications of CRISPR/Cas systems\", \"venue\": \"Molecular Biology Reports\", \"year\": 2022, \"citationCount\": 26, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://link.springer.com/content/pdf/10.1007/s11033-022-07519-6.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC9199458, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2143430722\", \"name\": \"Yaya Wang\"}, {\"authorId\": \"2170523163\", \"name\": \"Chun Huang\"}, {\"authorId\": \"2150606387\", \"name\": \"Weiqin Zhao\"}], \"abstract\": \"The clustered, regularly interspaced, short palindromic repeats (CRISPR)-associated endonuclease (Cas) system, referred to as CRISPR/Cas system, has attracted significant interest in scientific community due to its great potential in translating into versatile therapeutic tools in biomedical field. For instance, a myriad of studies has demonstrated that the CRISPR/Cas system is capable of detecting various types of viruses, killing antibiotic-resistant bacteria, treating inherited genetic diseases, and providing new strategies for cancer therapy. Furthermore, CRISPR/Cas systems are also exploited as research tools such as genome engineering tool that allows researchers to interrogate the biological roles of unexplored genes or uncover novel functions of known genes. Additionally, the CRISPR/Cas system has been employed to edit the genome of a wide range of eukaryotic, prokaryotic organisms and experimental models, including but not limited to mammalian cells, mice, zebrafish, plants, yeast, and Escherichia coli. The present review mainly focuses on summarizing recent discoveries regarding the type II CRISPR/Cas9 and type VI CRISPR/Cas13a systems to give researchers a glimpse of their potential applications in the biological and biomedical field.\"}, {\"paperId\": \"07ffa43c4401675063edfec5f0d02ebf3a8c4612\", \"externalIds\": {\"DOI\": \"10.1007/978-1-0716-3131-7_14\", \"CorpusId\": 257834743, \"PubMed\": \"36995629\"}, \"title\": \"Genome Editing in Chlamydomonas reinhardtii Using Cas9-gRNA Ribonucleoprotein Complex: A Step-by-Step Guide.\", \"venue\": \"Methods in molecular biology\", \"year\": 2023, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-3131-7_14?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-3131-7_14, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4101380\", \"name\": \"D. Dhokane\"}, {\"authorId\": \"67334889\", \"name\": \"Nagesh Kancharla\"}, {\"authorId\": \"2037073835\", \"name\": \"A. Savarimuthu\"}, {\"authorId\": \"10256191\", \"name\": \"B. Bhadra\"}, {\"authorId\": \"11511381\", \"name\": \"A. Bandyopadhyay\"}, {\"authorId\": \"145431664\", \"name\": \"S. Dasgupta\"}], \"abstract\": null}, {\"paperId\": \"0802d5baefeb36e550d18ab91f6958721401d5b2\", \"externalIds\": {\"PubMedCentral\": \"8456059\", \"DOI\": \"10.1016/j.xpro.2021.100785\", \"CorpusId\": 238199490, \"PubMed\": \"34585153\"}, \"title\": \"Screening of CRISPR-Cas9-generated point mutant mice using MiSeq and locked nucleic acid probe PCR\", \"venue\": \"STAR Protocols\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.xpro.2021.100785\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8456059, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"50486011\", \"name\": \"K. Vasu\"}, {\"authorId\": \"34960036\", \"name\": \"P. Fox\"}], \"abstract\": \"Summary CRISPR-Cas9-mediated, site-directed mutagenesis in mice generates mosaic founder mice with varied efficiency of desired point mutation and other non-homologous end-joined variants. Here, we present a protocol for design, sample preparation, and analysis for identification of mice with the desired mutation. Deep sequencing provides the proportion of reads of a particular allele for each mouse line. Locked nucleic acid probe-based qPCR provides rapid identification of the mutant allele and can be used for genotyping offspring during subsequent breeding for colony establishment. For complete details on the use and execution of this protocol, please refer to Vasu et al. (2021).\"}, {\"paperId\": \"0808f3a71b64339c7bfff6e05da7a693aba5b8ce\", \"externalIds\": {\"MAG\": \"3112958643\", \"PubMedCentral\": \"7715931\", \"DOI\": \"10.1093/neuonc/noaa222.169\", \"CorpusId\": 228066236}, \"title\": \"EPEN-34. THE CRISPR-Cas9 SYSTEM-MEDIATED ENDOGENOUS GENE REARRANGEMENT INDUCED C11orf95-RELA FUSION IN VITRO AND IN VIVO THAT LED TO THE DEVELOPMENT OF EPENDYMOMA-LIKE TUMOR\", \"venue\": \"Neuro-Oncology\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/22/Supplement_3/iii314/34686696/noaa222.169.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7715931, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1454404249\", \"name\": \"Mutsumi Takadera\"}, {\"authorId\": \"2216189\", \"name\": \"T. Ozawa\"}, {\"authorId\": \"48630367\", \"name\": \"K. Satomi\"}, {\"authorId\": \"2111258015\", \"name\": \"Tetsuya Yamamoto\"}, {\"authorId\": \"4040402\", \"name\": \"K. Ichimura\"}], \"abstract\": \"Abstract Recent large-scale genomic studies of ependymal tumors have identified recurrent RELA and YAP1 fusion genes in supratentorial ependymomas. The formation of the C11orf95-RELA fusion gene has been attributed to massive genomic rearrangement involving chromosome 11q termed Chromothripsis in many cases. However, the causal relationship has not been clarified experimentally. In this study, we developed a system to reproduce the oncogenic gene rearrangement using the CRISPR-Cas9 system and examined whether consequent endogenous ependymoma fusion genes are competent to form brain tumors in mice. Initially, to investigate whether C11orf95-RELA fusion can be formed by inducing the relevant gene rearrangement in vitro, we designed multiple guide RNAs on the human and mouse genomic loci and introduced them into cultured cells. RT-PCR and immunoblot analyses detected endogenous C11orf95-RELA fusion transcript and protein in both human and mouse cultured cells. Subsequently, we lentivirally introduced the gRNAs into a mouse brain. Brain tumor formation was observed from around 2 months after the lentivirus injection, thus indicating successful gene rearrangement followed by C11orf95-RELA fusion expression in vivo. Analysis of the tumor tissue confirmed the expression of the endogenous C11orf95-RELA fusion gene. These results suggested that a gene rearrangement is a primary mechanism to form the C11orf95-RELA fusion which is the direct driver of tumorigenesis. Our system to simulate a genomic event will provide significant insights into the understanding of the tumorigenic mechanism in ependymomas.\"}, {\"paperId\": \"080990519991d213ae9a360af95e0d99dd86aa83\", \"externalIds\": {\"PubMedCentral\": \"11377749\", \"DOI\": \"10.1038/s44318-024-00158-6\", \"CorpusId\": 271332739, \"PubMed\": \"39039289\"}, \"title\": \"T4 DNA polymerase prevents deleterious on-target DNA damage and enhances precise CRISPR editing\", \"venue\": \"EMBO Journal\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11377749, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1838442006\", \"name\": \"Qiaoyan Yang\"}, {\"authorId\": \"1879857906\", \"name\": \"Jonathan S. Abebe\"}, {\"authorId\": \"2200527377\", \"name\": \"Michelle Mai\"}, {\"authorId\": \"2200527289\", \"name\": \"Gabriella Rudy\"}, {\"authorId\": \"2264291616\", \"name\": \"S. Y. Kim\"}, {\"authorId\": \"2243182589\", \"name\": \"O. Devinsky\"}, {\"authorId\": \"2280071461\", \"name\": \"Chengzu Long\"}], \"abstract\": \"Unintended on-target chromosomal alterations induced by CRISPR/Cas9 in mammalian cells are common, particularly large deletions and chromosomal translocations, and present a safety challenge for genome editing. Thus, there is still an unmet need to develop safer and more efficient editing tools. We screened diverse DNA polymerases of distinct origins and identified a T4 DNA polymerase derived from phage T4 that strongly prevents undesired on-target damage while increasing the proportion of precise 1- to 2-base-pair insertions generated during CRISPR/Cas9 editing (termed CasPlus). CasPlus induced substantially fewer on-target large deletions while increasing the efficiency of correcting common frameshift mutations in DMD and restored higher level of dystrophin expression than Cas9-alone in human cardiomyocytes. Moreover, CasPlus greatly reduced the frequency of on-target large deletions during mouse germline editing. In multiplexed guide RNAs mediating gene editing, CasPlus repressed chromosomal translocations while maintaining gene disruption efficiency that was higher or comparable to Cas9 in primary human T cells. Therefore, CasPlus offers a safer and more efficient gene editing strategy to treat pathogenic variants or to introduce genetic modifications in human applications. While off-target mutations have been carefully addressed, CRISPR/Cas9 mediated genome editing often causes harmful on-target chromosomal alterations. CasPlus combines Cas9 genome editing with an engineered phage T4 DNA polymerase and reduces the incidence of large deletions and chromosomal translocations. CasPlus can be applied to correct disease-causing mutations such as in Duchenne muscular dystrophy (DMD), but also for generating engineered T cells for cell therapy. CasPlus editing inhibits undesired on-target large deletions while increasing the proportion of precise 1- to 2-base-pair insertions generated during CRISPR/Cas9 editing. CasPlus efficiently corrects the frameshift mutations in DMD (exon 52 deletions) with fewer on-target DNA damage. CasPlus greatly reduces the frequency of on-target large deletions in mouse germline editing. CasPlus represses chromosomal translocation while maintaining gene disruption efficiency that is higher or comparable to Cas9 in multiplex gene-edited human primary T cells. CasPlus editing inhibits undesired on-target large deletions while increasing the proportion of precise 1- to 2-base-pair insertions generated during CRISPR/Cas9 editing. CasPlus efficiently corrects the frameshift mutations in DMD (exon 52 deletions) with fewer on-target DNA damage. CasPlus greatly reduces the frequency of on-target large deletions in mouse germline editing. CasPlus represses chromosomal translocation while maintaining gene disruption efficiency that is higher or comparable to Cas9 in multiplex gene-edited human primary T cells. CasPlus combines Cas9 genome editing with an engineered phage T4 DNA polymerase and reduces the incidence of large deletions and chromosomal translocations.\"}, {\"paperId\": \"080b631bacd10dbcd21bfa76a762eae0663fc774\", \"externalIds\": {\"DOI\": \"10.1093/jxb/erab382\", \"CorpusId\": 237095152, \"PubMed\": \"34397079\"}, \"title\": \"Confirmation of GmPPR576 as a fertility restorer gene of cytoplasmic male sterility in soybean.\", \"venue\": \"Journal of Experimental Botany\", \"year\": 2021, \"citationCount\": 16, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/jxb/erab382?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/jxb/erab382, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"25841974\", \"name\": \"Tanliu Wang\"}, {\"authorId\": \"2055130756\", \"name\": \"Tingting He\"}, {\"authorId\": \"6222955\", \"name\": \"Xianlong Ding\"}, {\"authorId\": \"2112200409\", \"name\": \"Qiqi Zhang\"}, {\"authorId\": \"3582400\", \"name\": \"Longshu Yang\"}, {\"authorId\": \"33668976\", \"name\": \"Zhixing Nie\"}, {\"authorId\": \"3242474\", \"name\": \"T. Zhao\"}, {\"authorId\": \"2113880687\", \"name\": \"J. Gai\"}, {\"authorId\": \"5402808\", \"name\": \"Shouping Yang\"}], \"abstract\": \"In soybean, heterosis achieved through the three-line system has been gradually applied in breeding to increase yield, but the underlying molecular mechanism remains unknown. We conducted a genetic analysis using the pollen fertility of offspring of the cross NJCMS1A\\u00d7NJCMS1C. All F1 plants' pollen was semi-sterile; in F2, the ratio of pollen-fertile plants to pollen semi-sterile plants was 208:189. This result indicates NJCMS1A is gametophyte sterile, and the fertility restoration of NJCMS1C to NJCMS1A is a quality trait controlled by a single gene locus. Using bulked segregant analysis, the fertility restorer gene Rf in NJCMS1C was located on chromosome 16 between the markers BARCSOYSSR_16_1067 and BARCSOYSSR_16_1078. Sequence analysis of genes in that region showed that GmPPR576 was non-functional in rf cultivars. GmPPR576 has one functional allele in Rf cultivars but three non-functional alleles in rf cultivars. Phylogenetic analysis showed that the GmPPR576 locus evolved rapidly with the presence of male-sterile cytoplasm. GmPPR576 belongs to the RFL fertility restorer gene family and is mitochondrial-targeted. GmPPR576 was knocked out in soybean N8855 using CRISPR/Cas9. The T1 plants showed sterile pollen, and T2 plants produced few pods at maturity. The results indicate that GmPPR576 is the fertility restorer gene of NJCMS1A.\"}, {\"paperId\": \"080d2ef8335b6a707826b6ea168859023cc4cf4b\", \"externalIds\": {\"PubMedCentral\": \"10557664\", \"DOI\": \"10.1101/2023.09.26.559528\", \"CorpusId\": 263226612, \"PubMed\": \"37808852\"}, \"title\": \"An enhancer RNA recruits MLL1 to regulate transcription of Myb\", \"venue\": \"bioRxiv\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC10557664\", \"status\": \"GREEN\", \"license\": \"CC0\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10557664, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2248450970\", \"name\": \"Juhyun Kim\"}, {\"authorId\": \"2140269478\", \"name\": \"Luis F. Diaz\"}, {\"authorId\": \"2248683957\", \"name\": \"Matthew J. Miller\"}, {\"authorId\": \"2248775640\", \"name\": \"Benjamin Leadem\"}, {\"authorId\": \"5544719\", \"name\": \"I. Krivega\"}, {\"authorId\": \"14134781\", \"name\": \"A. Dean\"}], \"abstract\": \"The Myb proto-oncogene encodes the transcription factor c-MYB, which is critical for hematopoiesis. Distant enhancers of Myb form a hub of interactions with the Myb promoter. We identified a long non-coding RNA (Myrlin) originating from the \\u221281 kb murine Myb enhancer. Myrlin and Myb are coordinately regulated during erythroid differentiation. Myrlin TSS deletion using CRISPR/Cas9 reduced Myrlin and Myb expression and LDB1 complex occupancy at the Myb enhancers, compromising enhancer contacts and reducing RNA Pol II occupancy in the locus. In contrast, CRISPRi silencing of Myrlin left LDB1 and the Myb enhancer hub unperturbed, although Myrlin and Myb expression were downregulated, decoupling transcription and chromatin looping. Myrlin interacts with the MLL1 complex. Myrlin CRISPRi compromised MLL1 occupancy in the Myb locus, decreasing CDK9 and RNA Pol II binding and resulting in Pol II pausing in the Myb first exon/intron. Thus, Myrlin directly participates in activating Myb transcription by recruiting MLL1.\"}, {\"paperId\": \"080e14b9ef4fa956f7402af25d714d83a6bba616\", \"externalIds\": {\"DOI\": \"10.1002/bdr2.1989\", \"CorpusId\": 247083376, \"PubMed\": \"35199491\"}, \"title\": \"Probing single ventricle heart defects with patient\\u2010derived induced pluripotent stem cells and emerging technologies\", \"venue\": \"Birth Defects Research\", \"year\": 2022, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9586491\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/bdr2.1989?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/bdr2.1989, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"153822924\", \"name\": \"B. Hall\"}, {\"authorId\": \"40362179\", \"name\": \"Matthew Alonzo\"}, {\"authorId\": \"11840235\", \"name\": \"Karen Texter\"}, {\"authorId\": \"144690432\", \"name\": \"V. Garg\"}, {\"authorId\": \"48886303\", \"name\": \"Ming-Tao Zhao\"}], \"abstract\": \"Single ventricle heart defects (SVHDs) are a severe type of congenital heart disease with poorly understood pathogenic mechanisms. New research using patient\\u2010specific induced pluripotent stem cells (iPSCs) as a cellular model is beginning to uncover genetic and cellular etiologies of SVHDs. Hypoplastic left heart syndrome (HLHS) is a type of SVHD that is characterized by an underdeveloped left ventricle and other malformations in the left side of the heart. Hypoplastic right heart syndrome (HRHS), the second type of SVHD, is characterized by an underdeveloped right heart, including malformed tricuspid and pulmonary valves. Despite a noticeable lack of research on SVHD, emerging technologies offer a promising future to further probe the genetic and cellular mechanisms of these diseases. Pediatric cardiovascular research is at the dawn of a new era in terms of what can be discovered with patient\\u2010specific iPSCs in conjunction with other technologies (e.g., organoids, single\\u2010cell genomics, CRISPR/Cas9 genome editing). In this review, we present recent approaches and findings utilizing patient\\u2010specific iPSCs to identify cellular mechanisms responsible for improper cardiac organogenesis in HLHS and HRHS.\"}, {\"paperId\": \"08104a2ec47b69b4809ea9603a62f419bf79036b\", \"externalIds\": {\"MAG\": \"3001937884\", \"DOI\": \"10.1093/cvr/cvaa010\", \"CorpusId\": 210881401, \"PubMed\": \"31977013\"}, \"title\": \"Impact of functional studies on exome sequence variant interpretation in early-onset cardiac conduction system diseases.\", \"venue\": \"Cardiovascular Research\", \"year\": 2020, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/cardiovascres/article-pdf/116/13/2116/34011885/cvaa010.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1093/cvr/cvaa010?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/cvr/cvaa010, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2344259\", \"name\": \"Kenshi Hayashi\"}, {\"authorId\": \"6797666\", \"name\": \"R. Teramoto\"}, {\"authorId\": \"47304752\", \"name\": \"A. Nomura\"}, {\"authorId\": \"47792413\", \"name\": \"Y. Asano\"}, {\"authorId\": \"5651823\", \"name\": \"M. Beerens\"}, {\"authorId\": \"6556874\", \"name\": \"Y. Kurata\"}, {\"authorId\": \"2054656405\", \"name\": \"Isao Kobayashi\"}, {\"authorId\": \"5158608\", \"name\": \"N. Fujino\"}, {\"authorId\": \"2130635\", \"name\": \"H. Furusho\"}, {\"authorId\": \"4514218\", \"name\": \"K. Sakata\"}, {\"authorId\": \"144724789\", \"name\": \"K. Onoue\"}, {\"authorId\": \"40302799\", \"name\": \"David Y. Chiang\"}, {\"authorId\": \"48775305\", \"name\": \"T. Kiviniemi\"}, {\"authorId\": \"48654698\", \"name\": \"E. Buys\"}, {\"authorId\": \"6595759\", \"name\": \"P. Sips\"}, {\"authorId\": \"4119752\", \"name\": \"Micah L Burch\"}, {\"authorId\": \"2317032177\", \"name\": \"Yanbin Zhao\"}, {\"authorId\": \"2080141365\", \"name\": \"Amy E. Kelly\"}, {\"authorId\": \"3544705\", \"name\": \"M. Namura\"}, {\"authorId\": \"67036209\", \"name\": \"Y. Kita\"}, {\"authorId\": \"34752782\", \"name\": \"Taketsugu Tsuchiya\"}, {\"authorId\": \"2944911\", \"name\": \"B. Kaku\"}, {\"authorId\": \"49266342\", \"name\": \"K. Oe\"}, {\"authorId\": \"153663192\", \"name\": \"Yuko Takeda\"}, {\"authorId\": \"6557677\", \"name\": \"T. Konno\"}, {\"authorId\": \"46614146\", \"name\": \"M. Inoue\"}, {\"authorId\": \"2146551462\", \"name\": \"T. Fujita\"}, {\"authorId\": \"145225774\", \"name\": \"Takeshi Kato\"}, {\"authorId\": \"144484415\", \"name\": \"A. Funada\"}, {\"authorId\": \"39272766\", \"name\": \"H. Tada\"}, {\"authorId\": \"4610204\", \"name\": \"A. Hodatsu\"}, {\"authorId\": \"7596391\", \"name\": \"C. Nakanishi\"}, {\"authorId\": \"1836808\", \"name\": \"Y. Sakamoto\"}, {\"authorId\": \"10350650\", \"name\": \"T. Tsuda\"}, {\"authorId\": \"6637998\", \"name\": \"Y. Nagata\"}, {\"authorId\": \"145588478\", \"name\": \"Yoshihiro Tanaka\"}, {\"authorId\": \"8886710\", \"name\": \"H. Okada\"}, {\"authorId\": \"66206176\", \"name\": \"K. Usuda\"}, {\"authorId\": \"1490745561\", \"name\": \"S. Cui\"}, {\"authorId\": \"5166415\", \"name\": \"Yoshihiko Saito\"}, {\"authorId\": \"144745455\", \"name\": \"C. Macrae\"}, {\"authorId\": \"5990625\", \"name\": \"S. Takashima\"}, {\"authorId\": \"144383735\", \"name\": \"M. Yamagishi\"}, {\"authorId\": \"144598986\", \"name\": \"M. Kawashiri\"}, {\"authorId\": \"2056812\", \"name\": \"M. Takamura\"}], \"abstract\": \"AIMS\\nThe genetic cause of cardiac conduction system disease (CCSD) has not been fully elucidated. Whole-exome sequencing (WES) can detect various genetic variants; however, the identification of pathogenic variants remains a challenge. We aimed to identify pathogenic or likely pathogenic variants in CCSD patients by using WES and 2015 American College of Medical Genetics and Genomics (ACMG) standards and guidelines as well as evaluating the usefulness of functional studies for determining them.\\n\\n\\nMETHODS AND RESULTS\\nWe performed WES of 23 probands diagnosed with early-onset (<65 years) CCSD and analyzed 117 genes linked to arrhythmogenic diseases or cardiomyopathies. We focused on rare variants (minor allele frequency < 0.1%) that were absent from population databases. Five probands had protein truncating variants in EMD and LMNA which were classified as \\\"pathogenic\\\" by 2015 ACMG standards and guidelines. To evaluate the functional changes brought about by these variants, we generated a knock-out zebrafish with CRISPR-mediated insertions or deletions of the EMD or LMNA homologs in zebrafish. The mean heart rate and conduction velocities in the CRISPR/Cas9-injected embryos and F2 generation embryos with homozygous deletions were significantly decreased. Twenty-one variants of uncertain significance were identified in 11 probands. Cellular electrophysiological study and in vivo zebrafish cardiac assay showed that 2 variants in KCNH2 and SCN5A, 4 variants in SCN10A, and 1 variant in MYH6 damaged each gene, which resulted in the change of the clinical significance of them from \\\"Uncertain significance\\\" to \\\"Likely pathogenic\\\" in 6 probands.\\n\\n\\nCONCLUSIONS\\nOf 23 CCSD probands, we successfully identified pathogenic or likely pathogenic variants in 11 probands (48%). Functional analyses of a cellular electrophysiological study and in vivo zebrafish cardiac assay might be useful for determining the pathogenicity of rare variants in patients with CCSD. SCN10A may be one of the major genes responsible for CCSD.\\n\\n\\nTRANSLATIONAL PERSPECTIVE\\nWhole-exome sequencing (WES) may be helpful in determining the causes of cardiac conduction system disease (CCSD), however, the identification of pathogenic variants remains a challenge. We performed WES of 23 probands diagnosed with early-onset CCSD, and identified 12 pathogenic or likely pathogenic variants in 11 of these probands (48%) according to the 2015 ACMG standards and guidelines. In this context, functional analyses of a cellular electrophysiological study and in vivo zebrafish cardiac assay might be useful for determining the pathogenicity of rare variants, and SCN10A may be one of the major development factors in CCSD.\"}, {\"paperId\": \"08143866609e1541382a780e867e8cae6a4667a8\", \"externalIds\": {\"DOI\": \"10.54112/basrj.v2023i1.27\", \"CorpusId\": 265616000}, \"title\": \"ADVANCES AND CHALLENGES IN WHEAT GENETICS AND BREEDING FOR GLOBAL FOOD SECURITY\", \"venue\": \"Biological and Agricultural Sciences Research Journal\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://basrj.com/index.php/home/article/download/27/49\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.54112/basrj.v2023i1.27?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.54112/basrj.v2023i1.27, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2203115502\", \"name\": \"Z. Abideen\"}, {\"authorId\": \"2269487562\", \"name\": \"TU Hassan\"}, {\"authorId\": \"2387314328\", \"name\": \"F. Arshad\"}, {\"authorId\": \"2395209278\", \"name\": \"N. Zafar\"}, {\"authorId\": \"2269532045\", \"name\": \"A. Ammar\"}, {\"authorId\": \"2269531685\", \"name\": \"A. Aleem\"}, {\"authorId\": \"2318728961\", \"name\": \"R. Ahmad\"}, {\"authorId\": \"2186038545\", \"name\": \"MN Khalid\"}, {\"authorId\": \"122898446\", \"name\": \"I. Amjad\"}], \"abstract\": \"This exploration delves into the pivotal realm of \\\"Advances and Challenges in Wheat Genetics and Breeding for Global Food Security.\\\" Tracing the historical perspectives of wheat genetics from ancient agricultural practices to modern breeding programs, the narrative unveils a rich tapestry of human intervention in shaping this staple crop. Recent innovations, including Marker-Assisted Selection (MAS), Genomic Selection (GS), and CRISPR-Cas9, propel wheat genetics into a new era of precision breeding, holding profound implications for global food security. Examining the contributions of wheat genetics and breeding to food security reveals a mosaic of enhanced yield, disease resistance, and climate adaptability. As the world grapples with the intricate challenges posed by a changing climate, the role of wheat in adaptation and resilience takes center stage. However, the journey forward is not devoid of complexities. Ethical considerations in genetic manipulation demand thoughtful navigation, and regional nuances underscore the need for customized approaches to breeding. This abstract encapsulates a multidimensional exploration of wheat genetics and breeding, envisioning a future where scientific advancements converge with ethical considerations to address the evolving demands of global agriculture. In this narrative, the title serves as a compass, guiding the reader through the advances that propel us toward food security and the challenges that necessitate collective wisdom and collaboration on a global scale.\"}, {\"paperId\": \"0814d98e4fdedcf4d91bc619644be9c41b2c6a13\", \"externalIds\": {\"PubMedCentral\": \"10177790\", \"DOI\": \"10.3390/ijms24097801\", \"CorpusId\": 258341753, \"PubMed\": \"37175508\"}, \"title\": \"Differential Modulation of Dendritic Cell Biology by Endogenous and Exogenous Aryl Hydrocarbon Receptor Ligands\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2023, \"citationCount\": 11, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/24/9/7801/pdf?version=1682413851\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10177790, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1880840707\", \"name\": \"Atefeh Sadeghi Shermeh\"}, {\"authorId\": \"89011561\", \"name\": \"Dmytro Royzman\"}, {\"authorId\": \"38008069\", \"name\": \"C. Kuhnt\"}, {\"authorId\": \"10675891\", \"name\": \"Christina Drassner\"}, {\"authorId\": \"29405674\", \"name\": \"Lena Stich\"}, {\"authorId\": \"5253358\", \"name\": \"A. Steinkasserer\"}, {\"authorId\": \"4742671\", \"name\": \"Ilka Knippertz\"}, {\"authorId\": \"40087836\", \"name\": \"A. Wild\"}], \"abstract\": \"The aryl hydrocarbon receptor (AhR) is a decisive regulatory ligand-dependent transcription factor. It binds highly diverse ligands, which can be categorized as either endogenous or exogenous. Ligand binding activates AhR, which can adjust inflammatory responses by modulating immune cells such as dendritic cells (DCs). However, how different AhR ligand classes impact the phenotype and function of human monocyte-derived DCs (hMoDCs) has not been extensively studied in a comparative manner. We, therefore, tested the effect of the representative compounds Benzo(a)pyrene (BP), 6-formylindolo[3,2-b]carbazole (FICZ), and Indoxyl 3-sulfate (I3S) on DC biology. Thereby, we reveal that BP significantly induces a tolerogenic response in lipopolysaccharide-matured DCs, which is not apparent to the same extent when using FICZ or I3S. While all three ligand classes activate AhR-dependent pathways, BP especially induces the expression of negative immune regulators, and subsequently strongly subverts the T cell stimulatory capacity of DCs. Using the CRISPR/Cas9 strategy we also prove that the regulatory effect of BP is strictly AhR-dependent. These findings imply that AhR ligands contribute differently to DC responses and incite further studies to uncover the mechanisms and molecules which are involved in the induction of different phenotypes and functions in DCs upon AhR activation.\"}, {\"paperId\": \"0819c08ee19bb492d5f244af90fa2e85afc58ce3\", \"externalIds\": {\"PubMedCentral\": \"10587110\", \"DOI\": \"10.1038/s42003-023-05447-0\", \"CorpusId\": 264348818, \"PubMed\": \"37857697\"}, \"title\": \"Transcriptional regulation and overexpression of GST cluster enhances pesticide resistance in the cotton bollworm, Helicoverpa armigera (Lepidoptera: Noctuidae)\", \"venue\": \"Communications Biology\", \"year\": 2023, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-023-05447-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10587110, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2040975\", \"name\": \"M. Jin\"}, {\"authorId\": \"2260836531\", \"name\": \"Yan Peng\"}, {\"authorId\": \"2260858586\", \"name\": \"Jie Peng\"}, {\"authorId\": \"2260716226\", \"name\": \"Huihui Zhang\"}, {\"authorId\": \"2007695408\", \"name\": \"Yinxue Shan\"}, {\"authorId\": \"3249008\", \"name\": \"Kaiyu Liu\"}, {\"authorId\": \"4839583\", \"name\": \"Yutao Xiao\"}], \"abstract\": \"The rapid evolution of resistance in agricultural pest poses a serious threat to global food security. However, the mechanisms of resistance through metabolic regulation are largely unknown. Here, we found that a GST gene cluster was strongly selected in North China (NTC) population, and it was significantly genetically-linked to lambda -cyhalothrin resistance. Knockout of the GST cluster using CRISPR/Cas9 significantly increased the sensitivity of the knockout strain to lambda -cyhalothrin. Haplotype analysis revealed no non-synonymous mutations or structural variations in the GST cluster, whereas GST_119 and GST_121 were significantly overexpressed in the NTC population. Silencing of GST_119 or co-silencing of GST_119 and GST_121 with RNAi significantly increased larval sensitivity to lambda -cyhalothrin. We also identified additional GATAe transcription factor binding sites in the promoter of NTC_GST_119. Transient expression of GATAe in Hi5 cells activated NTC_GST_119 and Xinjiang (XJ)_GST_119 transcription, but the transcriptional activity of NTC_GST_119 was significantly higher than that of XJ_GST_119. These results demonstrate that variations in the regulatory region result in complex expression changes in the GST cluster, which enhances lambda -cyhalothrin resistance in field-populations. This study deepens our knowledge of the evolutionary mechanism of pest adaptation under environmental stress and provides potential targets for monitoring pest resistance and integrated management. A glutathione S-transferase gene cluster in the cotton bollworm, Helicoverpa armigera , contributes to natural insecticide resistance in this agricultural pest.\"}, {\"paperId\": \"081b97dd533833cbffc3849c7d2dcc06f850bdd0\", \"externalIds\": {\"PubMedCentral\": \"11585812\", \"DOI\": \"10.1016/j.molmet.2024.102051\", \"CorpusId\": 273581530, \"PubMed\": \"39454826\"}, \"title\": \"cAMP driven UCP1 induction in human adipocytes requires ATGL-catalyzed lipolysis\", \"venue\": \"Molecular Metabolism\", \"year\": 2024, \"citationCount\": 10, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11585812, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2053097323\", \"name\": \"Anand Desai\"}, {\"authorId\": \"2148631082\", \"name\": \"Zinger Yang Loureiro\"}, {\"authorId\": \"2237633017\", \"name\": \"Tiffany DeSouza\"}, {\"authorId\": \"2149537688\", \"name\": \"Qin Yang\"}, {\"authorId\": \"1997961684\", \"name\": \"Javier Solivan-Rivera\"}, {\"authorId\": \"2237636537\", \"name\": \"Silvia Corvera\"}], \"abstract\": \"Objective The uncoupling protein 1 (UCP1) is induced in brown or \\u201cbeige\\u201d adipocytes through catecholamine-induced cAMP signaling, which activates diverse transcription factors. UCP1 expression can also be enhanced by PPAR\\u03b3 agonists such as rosiglitazone (Rsg). However, it is unclear whether this upregulation results from de-novo differentiation of beige adipocytes from progenitor cells, or from the induction of UCP1 in pre-existing adipocytes. To explore this, we employed human adipocytes differentiated from progenitor cells and examined their acute response to Rsg, to the adenylate-cyclase activator forskolin (Fsk), or to both simultaneously. Methods Adipocytes generated from primary human progenitor cells were differentiated without exposure to PPAR\\u03b3 agonists, and treated for 3, 6 or 78 h to Fsk, to Rsg, or to both simultaneously. Bulk RNASeq, RNAScope, RT-PCR, CRISPR-Cas9 mediated knockout, oxygen consumption and western blotting were used to assess cellular responses. Results UCP1 mRNA expression was induced within 3 h of exposure to either Rsg or Fsk, indicating that Rsg\\u2019s effect is independent on additional adipocyte differentiation. Although Rsg and Fsk induced distinct overall transcriptional responses, both induced genes associated with calcium metabolism, lipid droplet assembly, and mitochondrial remodeling, denoting core features of human adipocyte beiging. Unexpectedly, we found that Fsk-induced UCP1 expression was reduced by approximately 80% following CRISPR-Cas9-mediated knockout of PNPLA2, the gene encoding the triglyceride lipase ATGL. As anticipated, ATGL knockout suppressed lipolysis; however, the associated suppression of UCP1 induction indicates that maximal cAMP-mediated UCP1 induction requires products of ATGL-catalyzed lipolysis. Supporting this, we observed that the reduction in Fsk-stimulated UCP1 induction caused by ATGL knockout was reversed by Rsg, implying that the role of lipolysis in this process is to generate natural PPAR\\u03b3 agonists. Conclusions UCP1 transcription is known to be stimulated by transcription factors activated downstream of cAMP-dependent protein kinases. Here we demonstrate that UCP1 transcription can also be acutely induced through PPAR\\u03b3-activation. Moreover, both pathways are activated in human adipocytes in response to cAMP, synergistically inducing UCP1 expression. The stimulation of PPAR\\u03b3 in response to cAMP may result from the production of natural PPAR\\u03b3 activating ligands through ATGL-mediated lipolysis.\"}, {\"paperId\": \"081c361f8016ede8a53a4132f04672adc2fa7639\", \"externalIds\": {\"DOI\": \"10.1080/10495398.2023.2187402\", \"CorpusId\": 257664780, \"PubMed\": \"36946758\"}, \"title\": \"Multiplexed genome engineering for porcine fetal fibroblasts with gRNA\\u2013tRNA arrays based on CRISPR/Cas9\", \"venue\": \"Animal Biotechnology\", \"year\": 2023, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1080/10495398.2023.2187402\", \"status\": \"HYBRID\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/10495398.2023.2187402?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/10495398.2023.2187402, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46909773\", \"name\": \"Xiaochen Guo\"}, {\"authorId\": \"2212005630\", \"name\": \"Lishuang Geng\"}, {\"authorId\": \"2331202521\", \"name\": \"Chaoqian Jiang\"}, {\"authorId\": \"2149550562\", \"name\": \"Wang Yao\"}, {\"authorId\": \"153138323\", \"name\": \"Junxue Jin\"}, {\"authorId\": \"2145282531\", \"name\": \"Zhonghua Liu\"}, {\"authorId\": \"145544141\", \"name\": \"Y. Mu\"}], \"abstract\": \"Abstract Multiplex gene modifications are highly required for various fields of porcine research. In many species, the CRISPR/Cas9 system has been widely applied for genomic editing and provides a potential tool for introducing multiplex genome mutations simultaneously. Here, we present a CRISPR\\u2013Cas9 gRNA\\u2013tRNA array (GTR\\u2013CRISPR) for multiplexed engineering of porcine fetal fibroblasts (PFFs). We successfully produced multiple sgRNAs using only one Pol III promoter by taking advantage of the endogenous tRNA processing mechanism in porcine cells. Using an all-in-one construct carrying GTR and Cas9, we disrupted the IGFBP3, MSTN, MC4R, and SOCS2 genes in multiple codon regions in one PFF cell simultaneously. This technique allows the simultaneous disruption of four genes with 5.5% efficiency. As a result, this approach may effectively target multiple genes at the same time, making it a powerful tool for establishing multiple genes mutant cells in pigs.\"}, {\"paperId\": \"081e7a80bb7e74da3033513a3d6a5723321fe444\", \"externalIds\": {\"DOI\": \"10.1016/j.aspen.2023.102105\", \"CorpusId\": 259086377}, \"title\": \"CRISPR/Cas9 Editing of transformer2 Gene of the Oriental Fruit Fly, Bactrocera dorsalis (Hendel) (Diptera: Tephritidae) Leads to Intersex Phenotype\", \"venue\": \"Journal of Asia-Pacific Entomology\", \"year\": 2023, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.aspen.2023.102105?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.aspen.2023.102105, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6556222\", \"name\": \"Rohan Wishard\"}, {\"authorId\": \"2219618522\", \"name\": \"Ashok Karuppannsamy\"}, {\"authorId\": \"2073848803\", \"name\": \"A. Ramasamy\"}, {\"authorId\": \"2197454953\", \"name\": \"Chikmagalur Nagaraja Bhargava\"}, {\"authorId\": \"2219629796\", \"name\": \"Pradeep Chalapathi\"}, {\"authorId\": \"2219618538\", \"name\": \"Yogi Dhawane\"}, {\"authorId\": \"2125023566\", \"name\": \"Sampath Kumar\"}, {\"authorId\": \"66302367\", \"name\": \"Manamohan Maligeppagol\"}, {\"authorId\": \"47651071\", \"name\": \"Anil Rai\"}], \"abstract\": null}, {\"paperId\": \"081fecbb19de62b16094dd35603b89af1548aa5b\", \"externalIds\": {\"DOI\": \"10.1089/hum.2023.129\", \"CorpusId\": 266158276, \"PubMed\": \"38069573\"}, \"title\": \"Leveraging CRISPR-Cas9 for Accurate Detection of AAV-Neutralizing Antibodies: The AAV-HDR Method\", \"venue\": \"Human Gene Therapy\", \"year\": 2023, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1089/hum.2023.129?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1089/hum.2023.129, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2306490879\", \"name\": \"Guohua Li\"}, {\"authorId\": \"2272791471\", \"name\": \"Sai-Ning Tian\"}, {\"authorId\": \"2273512538\", \"name\": \"Xin-Yu Sun\"}, {\"authorId\": \"2116694444\", \"name\": \"Mei Zhao\"}, {\"authorId\": \"31659738\", \"name\": \"Feng Zhang\"}, {\"authorId\": \"2144136701\", \"name\": \"Jian-Ping Zhang\"}, {\"authorId\": \"2272868683\", \"name\": \"Tao Cheng\"}, {\"authorId\": \"2258609173\", \"name\": \"Xiao-Bing Zhang\"}], \"abstract\": \"The effectiveness of adeno-associated virus (AAV)-based gene therapy is frequently constrained by the presence of AAV-neutralizing antibodies (NAbs). Existing detection techniques have shown inconsistencies across laboratories and cellular dependencies, challenging their universal applicability. Here, we redefine the NAb titer concept to represent the capability to neutralize a specific number of AAV virions per milliliter of serum. We present the AAV-homology-directed repair (HDR) assay, which harnesses the CRISPR-Cas9 system, offering a precise and sensitive means of detecting AAV NAbs. This assay employs a promoterless AAV HDR vector for integration into electroporated cells, facilitating the stable expression of a quantifiable fluorescent reporter and subsequent NAb titer assessment. Comparative evaluations indicated that the AAV-HDR method outperforms the traditional AAV overexpression (AAV-OE) assay regarding sensitivity and consistency. Crucially, it produced consistent outcomes across various cell lines, suggesting its potential as a universal standard for NAb titer measurement. We further confirmed the validity of the AAV-HDR titration approach by juxtaposing it with the established NT50 assay. Notably, the AAV-HDR method correlated robustly with both the AAV-OE assay and NT50 NAb titer values, and it exhibited heightened efficacy in identifying low-titer antibodies compared with the NT50 method. Given its ability to address AAV NAb detection challenges, the AAV-HDR assay holds promise for refining therapeutic strategies in gene therapy, particularly in tailoring AAV doses to neutralize preexisting NAbs.\"}, {\"paperId\": \"082413fc119ed45989ed5984529ea68401647645\", \"externalIds\": {\"DOI\": \"10.1182/blood-2023-178250\", \"CorpusId\": 265598927}, \"title\": \"The Cs a and Cs b Red Cell Antigens of the Cost Blood Group Collection Correspond to the HNA-3a and HNA-3b Neutrophil Antigens: Unexpected Twins with Implications for Sickle Cell Anemia\", \"venue\": \"Blood\", \"year\": 2023, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1182/blood-2023-178250\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1182/blood-2023-178250?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1182/blood-2023-178250, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2198143986\", \"name\": \"Jonathan De Oliveira Rios\"}, {\"authorId\": \"2269383520\", \"name\": \"Alisa Soudry\"}, {\"authorId\": \"2194447423\", \"name\": \"Romain Duval\"}, {\"authorId\": \"2079369139\", \"name\": \"Alexandre Raneri\"}, {\"authorId\": \"2269384506\", \"name\": \"Thomas Poyot\"}, {\"authorId\": \"2269385050\", \"name\": \"J\\u00e9r\\u00f4me Babinet\"}, {\"authorId\": \"2246357259\", \"name\": \"Mariane de Montalembert\"}, {\"authorId\": \"2269383839\", \"name\": \"Claudia Regina Bonini Domingos\"}, {\"authorId\": \"4628264\", \"name\": \"C. Le Van Kim\"}, {\"authorId\": \"2269382436\", \"name\": \"Marc Romana\"}, {\"authorId\": \"2269382235\", \"name\": \"T. Peyrard\"}, {\"authorId\": \"3728719\", \"name\": \"S. Azouzi\"}], \"abstract\": \"\\n Recent genome-wide association and murine studies identified the human neutrophil antigen 3a/b polymorphism (HNA-3a/b) in SLC44A2 (rs2288904-G/A) as a risk factor in venous thromboembolism (VTE). We tested whether this polymorphism associates with clinical features in SCA patients in whose VTE and stroke are frequently encountered complications. Incidentally, we discovered that rare subjects with the homozygous HNA-3b/b genotype (genotype frequency < 2%) also carry the uncommon Cs(a-) red cell phenotype. Despite its discovery more than 50 years ago, the molecular basis of this red cell phenotype and the presumptive protein carrier for the antigens of the COST blood group collection (Cs a and Cs b) has remained unknown. Inspired by this fortuitous discovery, we hypothesized that rs2288904 and COST antigens are closely associated. Thus, we genotyped this SNP in a cohort of 35 Cs(a-) subjects and found that all of them showed a HNA-3b/b genotype, indicating that the high-frequency allele of rs2288904 (HNA-3a; 461G) encoding Arg154 might encode the Cs a antigen (COST1). Interestingly, anti-Cs a does not react with SLC44A2 null RBCs (exceptional VER- blood type) and SLC44A2 knockout K562 cell line, confirming that the COST antigens are carried on this protein. In addition, using a panel of K562 cells expressing HNA-3a or 3b antigens developed by CRISPR/Cas9 genome editing, we confirmed that anti-Cs a recognizes the HNA-3a antigen. Overall, our results confirmed that HNA-3 and COST antigens have the same molecular basis. As a result, the Cs a and Cs b red cell antigens can now be included in the CTL2 blood group system, encoded by the SLC44A2 gene. This new finding could be of medical and biological value because anti-HNA-3a may be responsible for severe cases of neonatal neutropenia and transfusion-related acute lung injury (TRALI). Current testing for HNA-3a antibodies includes the granulocyte agglutination test and granulocyteindirect immunofluorescence test, as recommended by the ISBT Working Party on Granulocyte Immunobiology. These classical methods, however, are cumbersome because they require fresh granulocytes that have to be prepared daily and used immediately. Consequently, screening for HNA-3a antibodies is restricted to a few expert laboratories. Therefore, we propose to use the simple indirect antiglobulin red cell agglutination test (IAT) and Cs(a-) RBCs to screen for this antibody in the plasma of donors and patients. Finally, given that the starting point for this project was the study of a potential association of the HNA-3 polymorphism with clinical and biological features in SCA patients, we found that the HNA-3b allele was significantly associated with a higher monocyte and platelet count (p<0.02) and the occurrence of leg ulcer (p=0.01), suggesting an important role of the SLC44A2 protein in the SCD physiopathology.\"}, {\"paperId\": \"08286ecc654593480de3d3c980de9c4d9a54fd00\", \"externalIds\": {\"DOI\": \"10.1158/1538-7445.brain23-pr-003\", \"CorpusId\": 268243106}, \"title\": \"Abstract PR-003: In vivo genome-wide CRISPR/Cas9 screens conducted in an immunocompetent mouse model of glioblastoma identify novel in vivo tumor liabilities and potential mechanisms of resistance to chimeric antigen receptor T-cell (CAR-T) therapy\", \"venue\": \"Cancer Research\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-7445.brain23-pr-003?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-7445.brain23-pr-003, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2118942254\", \"name\": \"Catherine E. Koch\"}, {\"authorId\": \"2271062026\", \"name\": \"Charles A. Whittaker\"}, {\"authorId\": \"8930346\", \"name\": \"M. Hemann\"}], \"abstract\": \"\\n Glioblastoma (GBM) is the most common and deadly adult brain cancer with a post-diagnosis survival of 8-15 months even with treatment, highlighting a desperate need for new therapeutic strategies. One promising strategy involves the use of chimeric antigen receptor T-cell (CAR-T) therapy, created by engineering patient T-cells to express a CAR that recognizes a tumor-specific surface antigen thus allowing for directed tumor cell killing. While CAR-T therapy has experienced unprecedented success in treating hematologic malignancies, its application in solid tumors has proven challenging. However, early clinical studies in GBM have shown promise including a case in which a patient with disseminated GBM experienced a complete response. Unfortunately, the patient relapsed highlighting both potential therapeutic efficacy and our limited knowledge of resistance and relapse mechanisms. Established resistance mechanisms include tumor target antigen loss or intrinsic CAR-T failure, but there are certainly others that have yet to be identified. Furthermore, solid tumors present unique challenges and may possess distinctive resistance mechanisms related to hostile, immunosuppressive tumor microenvironments and vast inter-tumoral heterogeneity. Ultimately, improved understanding could lead to increased therapeutic efficacy through CAR-T combination therapies or direct CAR-T cell modifications. Beyond the promise of CAR-T however, there still remains a scarcity of effective treatment options for GBM, underscoring a critical need to gain a better fundamental understanding in order to create additional novel therapeutic strategies. In order to both understand mechanisms of resistance to CAR-T therapy in GBM and uncover novel tumor dependencies for therapeutic exploitation, I took an unbiased, functional genomics approach. I conducted a series of in vivo genome-wide screens in an orthotopic, immunocompetent mouse model of GBM using a novel, modular, small-pooled CRISPR/Cas9 single guide (sgRNA) library. Cas9-expressing tumor cells with library sgRNAs were intracranially injected into mice that subsequently received no treatment or direct intertumoral injection of non-targeting control or targeting CAR-T cells. Top depletion and enrichment hits were used to generate 2 separate validation libraries one containing CAR-T sensitization or resistance hits and the other containing hits essential for in vivo tumor growth and therefore potentially exploitable as novel therapeutic targets. Validation libraries were screened in the same manner as the original genome-wide screen and top hits are actively being validated with planned in-depth mechanistic follow up. Importantly, to date, these are the first in vivo genome-wide CRISPR/Cas9 screens conducted in an orthotopic, immunocompetent mouse model of GBM. Ultimately, these results could aid not only in the identification of novel therapeutic strategies for GBM and potential improvements in CAR-T clinical efficacy, but also in a broader understanding of the fundamental biology that underlies treatment resistance in GBM.\\n Citation Format: Catherine E. Koch, Charles A. Whittaker, Michael T. Hemann. In vivo genome-wide CRISPR/Cas9 screens conducted in an immunocompetent mouse model of glioblastoma identify novel in vivo tumor liabilities and potential mechanisms of resistance to chimeric antigen receptor T-cell (CAR-T) therapy [abstract]. In: Proceedings of the AACR Special Conference on Brain Cancer; 2023 Oct 19-22; Minneapolis, Minnesota. Philadelphia (PA): AACR; Cancer Res 2024;84(5 Suppl_1):Abstract nr PR-003.\"}, {\"paperId\": \"08287cb113f88e0904dbacc7f70ab8deebee51ae\", \"externalIds\": {\"PubMedCentral\": \"10474013\", \"DOI\": \"10.1038/s12276-023-01052-7\", \"CorpusId\": 260485335, \"PubMed\": \"37537215\"}, \"title\": \"Impact of the circadian nuclear receptor REV-ERB\\u03b1 in dorsal raphe 5-HT neurons on social interaction behavior, especially social preference\", \"venue\": \"Experimental and Molecular Medicine\", \"year\": 2023, \"citationCount\": 19, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s12276-023-01052-7.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10474013, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"22260020\", \"name\": \"Sangwon Jang\"}, {\"authorId\": \"49204520\", \"name\": \"Inah Park\"}, {\"authorId\": \"8486470\", \"name\": \"Mijung Choi\"}, {\"authorId\": \"2117130217\", \"name\": \"Jihoon Kim\"}, {\"authorId\": \"50240350\", \"name\": \"Seungeun Yeo\"}, {\"authorId\": \"35193325\", \"name\": \"S. Huh\"}, {\"authorId\": \"2175795609\", \"name\": \"Ji-Woong Choi\"}, {\"authorId\": \"47974846\", \"name\": \"Cheil Moon\"}, {\"authorId\": \"2732632\", \"name\": \"H. Choe\"}, {\"authorId\": \"81496447\", \"name\": \"Y. Choe\"}, {\"authorId\": \"2120472111\", \"name\": \"Kyungjin Kim\"}], \"abstract\": \"Daily fluctuation of serotonin levels during the day, controlled by a nuclear receptor called REV-ERB\\u03b1, is important in social behavior and may offer insights into conditions such as autism spectrum disorder (ASD). The neurotransmitter serotonin influences behavior and mood, but how its circadian fluctuations affect social behavior is not fully understood. Kyungjin Kim at the Daegu Gyeongbuk Institute of Science & Technology in Daegu, South Korea, and co-workers used mice lacking REV-ERB\\u03b1 to investigate links between brain chemistry and social behaviors. These mice, in contrast to controls, showed no preference for a novel mouse over an empty cage. Real-time measurement linked this behavior to higher nighttime levels of serotonin in the brains of the receptor-deficient mice. These results contribute to understanding the biology underlying social behavior and may help identify interventions for conditions such as ASD. Social interaction among conspecifics is essential for maintaining adaptive, cooperative, and social behaviors, along with survival among mammals. The 5-hydroxytryptamine (5-HT) neuronal system is an important neurotransmitter system for regulating social behaviors; however, the circadian role of 5-HT in social interaction behaviors is unclear. To investigate whether the circadian nuclear receptor REV-ERB\\u03b1, a transcriptional repressor of the rate-limiting enzyme tryptophan hydroxylase 2 (Tph2) gene in 5-HT biosynthesis, may affect social interaction behaviors, we generated a conditional knockout (cKO) mouse by targeting Rev-Erb\\u03b1 in dorsal raphe (DR) 5-HT neurons (5-HT^DR-specific REV-ERB\\u03b1 cKO) using the CRISPR/Cas9 gene editing system and assayed social behaviors, including social preference and social recognition, with a three-chamber social interaction test at two circadian time (CT) points, i.e., at dawn (CT00) and dusk (CT12). The genetic ablation of Rev-Erb\\u03b1 in DR 5-HTergic neurons caused impaired social interaction behaviors, particularly social preference but not social recognition, with no difference between the two CT points. This deficit of social preference induced by Rev-Erb\\u03b1 in 5-HT^DR-specific mice is functionally associated with real-time elevated neuron activity and 5-HT levels at dusk, as determined by fiber-photometry imaging sensors. Moreover, optogenetic inhibition of DR to nucleus accumbens (NAc) 5-HTergic circuit restored the impairment of social preference in 5-HT^DR-specific REV-ERB\\u03b1 cKO mice. These results suggest the significance of the circadian regulation of 5-HT levels by REV-ERB\\u03b1 in regulating social interaction behaviors.\"}, {\"paperId\": \"0828c198bd175ba088760b1e877f6d6218a0d095\", \"externalIds\": {\"MAG\": \"3003956795\", \"DOI\": \"10.1016/j.ymgme.2019.11.378\", \"CorpusId\": 214010453}, \"title\": \"Genomic correction of Pompe disease knock-in mouse myoblasts via CRISPR-Cas9 homology-directed repair\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.ymgme.2019.11.378?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.ymgme.2019.11.378, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1581980046\", \"name\": \"Emilie K. Sandfeld\"}, {\"authorId\": \"2110064559\", \"name\": \"Jeffrey Y. Huang\"}, {\"authorId\": \"37653568\", \"name\": \"Shih-hsin Kan\"}, {\"authorId\": \"28799868\", \"name\": \"Raymond Y. Wang\"}], \"abstract\": null}, {\"paperId\": \"082d0c38182e7e9a8b209ec280fb38e0f622719d\", \"externalIds\": {\"PubMedCentral\": \"7456579\", \"MAG\": \"3082573838\", \"DOI\": \"10.1016/j.fct.2020.111712\", \"CorpusId\": 221371387, \"PubMed\": \"32877744\"}, \"title\": \"Nontoxic-dose deoxynivalenol aggravates lipopolysaccharides-induced inflammation and tight junction disorder in IPEC-J2 cells through activation of NF-\\u03baB and LC3B\", \"venue\": \"Food and Chemical Toxicology\", \"year\": 2020, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7456579\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7456579, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1509809905\", \"name\": \"Lei Ge\"}, {\"authorId\": \"1785391481\", \"name\": \"Ziman Lin\"}, {\"authorId\": \"1678083334\", \"name\": \"Guannan Le\"}, {\"authorId\": \"50067739\", \"name\": \"Lili Hou\"}, {\"authorId\": \"4489542\", \"name\": \"Xinru Mao\"}, {\"authorId\": \"2145266201\", \"name\": \"Shuiping Liu\"}, {\"authorId\": \"144223844\", \"name\": \"Dandan Liu\"}, {\"authorId\": \"145697249\", \"name\": \"F. Gan\"}, {\"authorId\": \"49454243\", \"name\": \"Kehe Huang\"}], \"abstract\": \"Lipopolysaccharide (LPS) is the key factor in various intestinal inflammation which could disrupt the epithelial barrier function. Deoxynivalenol (DON), a well-known mycotoxin, can induce intestinal injury. However, the combined enterotoxicity of LPS and DON has rarely been studied. In this study, IPEC-J2 cell monolayers were exposed to LPS and nontoxic-dose DON for 12 and 24 h to investigate the effects of DON on LPS-induced inflammatory response and tight junction variation, and specific inhibitor and CRISPR-Cas9 were used to explore the underlying mechanisms. Our results showed that nontoxic-dose DON aggravated LPS-induced cellular inflammatory response, reflecting on more significant changes of inflammatory cytokines mRNA expression, higher protein expression of NOD-like receptor protein 3 (NLRP3) and procaspase-1. Moreover, nontoxic-dose DON aggravated LPS-induced mRNA and protein expression decreased, and distribution confused of tight junction proteins. We found that DON further enhanced LPS-induced phosphorylation and nucleus translocation of p65, and expression of LC3B-\\u2161. NF-\\u03baB inhibitor and CRISPR-Cas9-mediated knockout of LC3B attenuated the effects of combination which indicated nontoxic-dose DON aggravated LPS-induced intestinal inflammation and tight junction disorder through activating NF-\\u03baB signaling pathway and autophagy-related protein LC3B. It further warns that ingesting low doses of mycotoxins may exacerbate the effects of intestinal pathogens on the body.\"}, {\"paperId\": \"082dd4da2e3e3c1ba318dadd99a3a8c6c46501cc\", \"externalIds\": {\"DOI\": \"10.52226/revista.v31i113.283\", \"CorpusId\": 265567137}, \"title\": \"Cura del VIH: \\u00bfque\\u0301 tan lejos estamos?\", \"venue\": \"Actualizaciones en SIDA e infectologia\", \"year\": 2023, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://revista.infectologia.info/index.php/revista/article/download/283/262\", \"status\": \"HYBRID\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.52226/revista.v31i113.283?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.52226/revista.v31i113.283, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2053079176\", \"name\": \"G. Turk\"}, {\"authorId\": \"2053178246\", \"name\": \"N. Laufer\"}], \"abstract\": \"\\n \\n \\nDesde el inicio de la pandemia VIH/sida hace ya 40 an\\u0303os, se plantea la posibilidad de encontrar una cura para la in- feccio\\u0301n. Esta posibilidad se hizo palpable en 2009 con la descripcio\\u0301n del \\u201cpaciente de Berli\\u0301n\\u201d, una persona con VIH en la cual se erradico\\u0301 la infeccio\\u0301n mediante un trasplante de me\\u0301dula o\\u0301sea a partir de un donante CCR5\\u220632 como parte de un tratamiento para la leucemia. A partir de alli\\u0301, se han reportado cinco nuevos potenciales casos de cura con intervenciones similares (Tabla 1) (1). Sin embargo, sumado a la ausencia de una vacuna preventiva, au\\u0301n no existe una opcio\\u0301n de cura efectiva y escalable para todas las personas con VIH. \\n \\n \\nAntes de tratar de dar respuesta a la recurrente pregun- ta de que\\u0301 tan lejos estamos de una cura, mencionemos primero por que\\u0301 es tan importante y por que\\u0301 se dedican tantos esfuerzos y recursos para encontrarla. Se han logrado grandes avances en el tratamiento para el VIH que permiten a las personas que viven con este virus mantener la viremia suprimida a niveles indetectables, evitar las consecuencias patoge\\u0301nicas de la replicacio\\u0301n viral y la transmisio\\u0301n a otras personas. Tambie\\u0301n se han desarrollado mu\\u0301ltiples estrategias de prevencio\\u0301n que se combinan a nivel poblacional para lograr alcanzar al mayor nu\\u0301mero de individuos posible. Sin embargo, au\\u0301n hay 39 millones de personas viviendo con VIH en el mundo (140.000 en Argentina) y ocurren 1,3 millones de nuevas infecciones por an\\u0303o (5300 en Argentina) (2, 3). De hecho, segu\\u0301n los u\\u0301ltimos datos de ONUSIDA, el nu\\u0301mero anual de nuevas infecciones ha aumentado un \\n \\n \\n \\n8% en la regio\\u0301n de Latinoame\\u0301rica y el Caribe, en compa- racio\\u0301n con los datos de 2010. Por otro lado, sabemos que el acceso al tratamiento no es o\\u0301ptimo. So\\u0301lo el 70% de las personas a nivel global acceden al mismo (2). A esto se agregan las toxicidades asociadas a la terapia antirretroviral y el costo de las drogas que no todos los gobiernos afrontan de manera completa. Finalmente, el estigma, la criminalizacio\\u0301n y la discriminacio\\u0301n todavi\\u0301a existen. Queda asi\\u0301 claro que tener una cura podri\\u0301a poner fin a varios de estos problemas. \\nSe han identificado mu\\u0301ltiples barreras que impiden curar el VIH con las herramientas disponibles en la actualidad: el llamado reservorio viral (ce\\u0301lulas donde el genoma del virus, provirus, persiste durante toda la vida), la replicacio\\u0301n persistente del virus a pesar de una terapia antirre- troviral adecuada, y la persistencia del virus en determi- nados sitios anato\\u0301micos \\u201csantuarios\\u201d (4). El virus que se encuentra en el reservorio es inaccesible al tratamiento antirretroviral y a los mecanismos efectores de la res- puesta inmune. Adema\\u0301s, las ce\\u0301lulas que conforman el reservorio son difi\\u0301ciles de identificar, cuantificar y ca- racterizar. Esto condujo a que encontrar una cura para la infeccio\\u0301n se haya convertido en un desafi\\u0301o inmenso, que abarca no so\\u0301lo el desarrollo de intervenciones tera- pe\\u0301uticas (y combinaciones de estrategias) sino tambie\\u0301n la necesidad de continuar con los estudios ba\\u0301sicos y cli\\u0301nicos que permitan comprender en profundidad a los reservorios virales, los mecanismos inmunes de control viral, asi\\u0301 como el estudio de diferentes poblaciones, ge\\u0301neros y subtipos virales (5). \\nLas investigaciones realizadas hasta ahora en \\u201ccontroladores elite\\u201d (individuos que controlan la replicacio\\u0301n viral en ausencia de tratamiento) y \\u201ccontroladores postratamiento\\u201d (aquellos que luego de haber recibido un tratamiento por un tiempo controlan la replicacio\\u0301n viral en ausencia del mismo) han proporcionado informacio\\u0301n y orientacio\\u0301n a las investigaciones. Se han identificado diferencias importantes en la composicio\\u0301n, la actividad y la ubicacio\\u0301n del reservorio entre personas con VIH de distinto sexo biolo\\u0301gico o con diferentes coinfecciones. Mu\\u0301ltiples desarrollos tecnolo\\u0301gicos han permitido entender mejor co\\u0301mo se establece la latencia del VIH y co\\u0301mo se reactiva el virus despue\\u0301s de una interrupcio\\u0301n del tratamiento y se han desarrollado nuevos fa\\u0301rmacos e intervenciones que han comenzado a demostrar cierto grado de e\\u0301xito en modelos precli\\u0301nicos y cli\\u0301nicos fase I (6). \\n \\n \\nEn 2021, la Sociedad Internacional de Sida propuso dos nuevos conceptos sobre la cura del VIH: la remisio\\u0301n y la erradicacio\\u0301n. Definen el te\\u0301rmino \\u201cremisio\\u0301n\\u201d como el control duradero del virus en ausencia de cualquier tratamiento antirretroviral y la \\u201cerradicacio\\u0301n\\u201d como el control viral sumado a la eliminacio\\u0301n completa del provirus intacto y competente para la replicacio\\u0301n (5). Sin embargo, es importante remarcar que el concepto de cura tiene muchas acepciones dentro y fuera del campo cienti\\u0301fico. Por ejemplo, diferentes estudios del a\\u0301mbito de las ciencias sociales han reportado que, para algunos grupos de personas con VIH, la cura se asocia a la posibilidad de no transmitir la infeccio\\u0301n o la posibilidad de mantener el control viral a trave\\u0301s del tratamiento. \\nHasta el momento, la u\\u0301nica intervencio\\u0301n que ha demostrado disminuir la magnitud del reservorio viral es el inicio del tratamiento antirretroviral muy temprano durante la infeccio\\u0301n. Sin embargo, fuera del escenario del diagno\\u0301stico perinatal es muy infrecuente identificar individuos durante la infeccio\\u0301n primaria que permitan expandir esta estrategia. Otras intervenciones apuntan a modificar los reservorios ya establecidos, ya sea logrando la reactivacio\\u0301n de las ce\\u0301lulas que contienen provirus, llevando a la transcripcio\\u0301n viral y a la posterior eliminacio\\u0301n por el sistema inmune (shock and kill), o llevando al silenciamiento permanente de los mismos (block and lock). Un enfoque mucho ma\\u0301s radical para eliminar los provirus implica el uso de terapia ge\\u0301nica, que tiene como objetivo eliminar las secuencias virales integradas al genoma a trave\\u0301s de te\\u0301cnicas como CRISPR-Cas9. \\nPor otro lado, mu\\u0301ltiples estrategias centradas en el siste- ma inmunitario se encuentran en desarrollo. La mayori\\u0301a tiene como objetivo mejorar la capacidad de las ce\\u0301lulas T para reconocer el VIH y controlar su replicacio\\u0301n en ausencia de tratamiento. Otras se enfocan en la administracio\\u0301n de combinaciones de anticuerpos ampliamente neutralizantes que permitan controlar el rebote viral en ausencia de antirretrovirales e, idealmente, tambie\\u0301n reducir o eliminar los reservorios al ser combinadas con otras intervenciones que apunten a la reactivacio\\u0301n viral (1). \\nLos puntos que hemos desarrollado muestran que hay numerosos obsta\\u0301culos para lograr el objetivo final. Pese a las distintas intervenciones en desarrollo, mucho trabajo queda au\\u0301n por hacer. Por un lado, fortalecer la investigacio\\u0301n sobre la infeccio\\u0301n por VIH no so\\u0301lo en Argentina sino tambie\\u0301n en toda la regio\\u0301n de Latinoame\\u0301rica y el Caribe. Desconocer las caracteri\\u0301sticas y necesidades de nuestra propia poblacio\\u0301n llevara\\u0301 a retrasos en la implementacio\\u0301n de cualquier desarrollo efectivo. Es claro que debemos preparar el terreno e insertar a nuestros pai\\u0301ses en la agenda de la cura. Y tambie\\u0301n es claro que, para erradicar la infeccio\\u0301n no so\\u0301lo debemos eliminar el virus sino tambie\\u0301n todas las desigualdades e inequidades que alimentan su diseminacio\\u0301n. \\n \\n \\n \\n \\n \\n \\n\"}, {\"paperId\": \"082e180426cf5042e650ceed3ce5d3dc36a1bf0d\", \"externalIds\": {\"PubMedCentral\": \"7265374\", \"MAG\": \"3030889531\", \"DOI\": \"10.1038/s41598-020-66017-6\", \"CorpusId\": 219175530, \"PubMed\": \"32488144\"}, \"title\": \"Epididymal proteins Binder of SPerm Homologs 1 and 2 (BSPH1/2) are dispensable for male fertility and sperm motility in mice\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-66017-6.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7265374, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1441429226\", \"name\": \"Marzieh Eskandari-Shahraki\"}, {\"authorId\": \"1422626567\", \"name\": \"Bruno Prud\\u2019homme\"}, {\"authorId\": \"48892855\", \"name\": \"F. Bergeron\"}, {\"authorId\": \"143758445\", \"name\": \"P. Manjunath\"}], \"abstract\": \"The binder of sperm family of proteins has been reported to be indispensable for sperm maturation and capacitation. However, their physiological functions in fertility have only been studied in vitro . CRISPR/Cas9 genome editing was utilized to generate double knockout (DKO) mice by simultaneously targeting the two murine binder of sperm genes, Bsph1 and Bsph2 . To confirm that the homologous genes and proteins were completely eliminated in the DKO mice, different methods such as reverse transcription polymerase chain reaction, digital droplet-polymerase chain reaction and liquid chromatography tandem mass spectrometry were applied. Bsph1 /2 DKO male mice were bred by intercrossing. Compared to wild type counterparts, male Bsph1/2 null mice, lacking BSPH1/2 proteins, were fertile with no differences in sperm motility and sperm count. However, the weights of male pups were significantly increased in Bsph1/2 double knockout mice in a time dependent manner spanning days 6 and 21, as well as 6 weeks of age. No change was detected in the weights of female pups during the same period. Taken together, these data indicate that BSPH1/2 proteins are dispensable for male fertility in mice but may influence growth.\"}, {\"paperId\": \"08307128abfd008b868b13ee1ce5c0729c936e01\", \"externalIds\": {\"MAG\": \"3023301504\", \"PubMedCentral\": \"7207476\", \"DOI\": \"10.1210/jendso/bvaa046.1670\", \"CorpusId\": 282499582}, \"title\": \"SAT-144 Cooperative Mechanism of SREBP-Dependent Cholesterol Synthesis Pathway and P53 on Malignant Formation in Breast Cancer\", \"venue\": \"Journal of the Endocrine Society\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1210/jendso/bvaa046.1670\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7207476, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"30966473\", \"name\": \"Akitoshi Nakayama\"}, {\"authorId\": \"2154950170\", \"name\": \"Masataka Yokoyama\"}, {\"authorId\": \"8558453\", \"name\": \"Hidekazu Nagano\"}, {\"authorId\": \"16235846\", \"name\": \"I. Sakuma\"}, {\"authorId\": \"2112941\", \"name\": \"N. Hashimoto\"}, {\"authorId\": \"14818973\", \"name\": \"Seiichiro Higuchi\"}, {\"authorId\": \"2358789519\", \"name\": \"Kazuyuki Yamagata\"}, {\"authorId\": \"2295681685\", \"name\": \"Tomoaki Tanaka\"}], \"abstract\": \"Abstract p53 is mutated more than half of human cancers, and mutant p53, a gain of function, can actively have functional consequences with tumorigenesis. However, its action of molecular mechanisms, particularly in vivo conditions, has not been fully are clarified. Here, we generated KO and KI (R280K) breast cancer cell lines for p53 using CRISPR/Cas9 system, and then performed a three-dimensional culture model. We found that the introduction of mutant p53 was solely able to mediate the transformation to poor architectural structure. Interestingly, our findings in statin-effect along with cholesterol synthesis pathway, especially isoprenoid dependency, revealed that this pathway is necessary and sufficient for the regulation of malignant architecture in SREBP2-dependent manner with cooperatively being controlled by mutant p53 on 3D-cultured breast cancer. Furthermore, in accordance with the malignancy progresses, SREBP2 was accumulated in nuclear and nuclear membrane portion with enhancement in malignant formation. In addition, we found that mutant p53 interacts with SREBP2, and consistently mutant p53 was associated with DHCR7 promoter in parallel with binding pattern of SREBP2. Thus, our results provide the novel insight into the mutant p53, a gain of function, and its linkage to poor architectural structure in 3D-cultured breast cancer cells via SREBP2-dependent isoprenoids regulation as potential therapeutic targets.\"}, {\"paperId\": \"0832f9d32d9bbd994c8b673fcf73c13f00670f0a\", \"externalIds\": {\"MAG\": \"3014413177\", \"PubMedCentral\": \"7177282\", \"DOI\": \"10.3390/ijms21072446\", \"CorpusId\": 214787445, \"PubMed\": \"32244800\"}, \"title\": \"Stearoyl-CoA Desaturase Is Essential for Porcine Adipocyte Differentiation\", \"venue\": \"International Journal of Molecular Sciences\", \"year\": 2020, \"citationCount\": 24, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/1422-0067/21/7/2446/pdf?version=1586089071\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7177282, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145287071\", \"name\": \"Lulu Liu\"}, {\"authorId\": \"2153605648\", \"name\": \"Yu Wang\"}, {\"authorId\": \"49595556\", \"name\": \"Xiaojuan Liang\"}, {\"authorId\": \"2108006593\", \"name\": \"Xiao Wu\"}, {\"authorId\": \"2136184148\", \"name\": \"Jiali Liu\"}, {\"authorId\": \"2269749537\", \"name\": \"Shulin Yang\"}, {\"authorId\": \"2136716\", \"name\": \"Cong Tao\"}, {\"authorId\": \"2108931101\", \"name\": \"Jin Zhang\"}, {\"authorId\": \"48580788\", \"name\": \"Jianhui Tian\"}, {\"authorId\": \"39913128\", \"name\": \"Jianguo Zhao\"}, {\"authorId\": \"2269718575\", \"name\": \"Yanfang Wang\"}], \"abstract\": \"Fat deposition, which influences pork production, meat quality and growth efficiency, is an economically important trait in pigs. Numerous studies have demonstrated that stearoyl-CoA desaturase (SCD), a key enzyme that catalyzes the conversion of saturated fatty acids into monounsaturated fatty acids, is associated with fatty acid composition in pigs. As SCD was observed to be significantly induced in 3T3-L1 preadipocytes differentiation, we hypothesized that it plays a role in porcine adipocyte differentiation and fat deposition. In this study, we revealed that SCD is highly expressed in adipose tissues from seven-day-old piglets, compared to its expression in tissues from four-month-old adult pigs. Moreover, we found that SCD and lipogenesis-related genes were induced significantly in differentiated porcine adipocytes. Using CRISPR/Cas9 technology, we generated SCD-/- porcine embryonic fibroblasts (PEFs) and found that the loss of SCD led to dramatically decreased transdifferentiation efficiency, as evidenced by the decreased expression of known lipid synthesis-related genes, lower levels of oil red O staining and significantly lower levels of triglyceride content. Our study demonstrates the critical role of SCD expression in porcine adipocyte differentiation and paves the way for identifying it as the promising candidate gene for less fat deposition in pigs.\"}, {\"paperId\": \"083800456b343299d4ebc863b08735cf47ea5b18\", \"externalIds\": {\"PubMedCentral\": \"8446080\", \"DOI\": \"10.1038/s42003-021-02617-w\", \"CorpusId\": 237547007, \"PubMed\": \"34531512\"}, \"title\": \"Efficient production of vindoline from tabersonine by metabolically engineered Saccharomyces cerevisiae\", \"venue\": \"Communications Biology\", \"year\": 2021, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s42003-021-02617-w.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8446080, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2145028522\", \"name\": \"Tengfei Liu\"}, {\"authorId\": \"2118797996\", \"name\": \"Ying Huang\"}, {\"authorId\": \"50442341\", \"name\": \"Lihong Jiang\"}, {\"authorId\": \"2106842936\", \"name\": \"Chang Dong\"}, {\"authorId\": \"2127180502\", \"name\": \"Yuanwei Gou\"}, {\"authorId\": \"29805345\", \"name\": \"J. Lian\"}], \"abstract\": \"Vindoline is a plant derived monoterpene indole alkaloid (MIA) with potential therapeutic applications and more importantly serves as the precursor to vinblastine and vincristine. To obtain a yeast strain for high yield production of vindoline from tabersonine, multiple metabolic engineering strategies were employed via the CRISPR/Cas9 mediated multiplex genome integration technology in the present study. Through increasing and tuning the copy numbers of the pathway genes, pairing cytochrome P450 enzymes (CYPs) with appropriate cytochrome P450 reductases (CPRs), engineering the microenvironment for functional expression of CYPs, enhancing cofactor supply, and optimizing fermentation conditions, the production of vindoline was increased to a final titer as high as \\u223c16.5\\u2009mg/L, which is more than 3,800,000-fold higher than the parent strain and the highest tabersonine to vindoline conversion yield ever reported. This work represents a key step of the engineering efforts to establish de novo biosynthetic pathways for vindoline, vinblastine, and vincristine. Liu et al. optimize vindoline biosynthesis in yeast from tabersonine by altering the copy numbers of pathway genes, pairing CYPs with CPRs, engineering the microenvironment for functional expression of CYPs, enhancing cofactor supplies, and optimizing fermentation conditions. By doing so, the authors increased the production of vindoline to a final titer as high as \\u223c16.5\\u2009mg/L.\"}, {\"paperId\": \"083af3391399580fbb404618952d1fdc968f779d\", \"externalIds\": {\"MAG\": \"3187666473\", \"DOI\": \"10.1007/978-1-0716-1657-4_21\", \"CorpusId\": 238910000}, \"title\": \"CRISPR-Cas9-Mediated Genome Editing in Escherichia coli Bacteriophages\", \"venue\": \"Springer Protocols Handbooks\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/978-1-0716-1657-4_21?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/978-1-0716-1657-4_21, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2116435987\", \"name\": \"Yibao Chen\"}, {\"authorId\": \"2131633599\", \"name\": \"Xiangmin Li\"}, {\"authorId\": \"2146515295\", \"name\": \"Shuang Wang\"}, {\"authorId\": \"145979539\", \"name\": \"P. Qian\"}, {\"authorId\": \"47002299\", \"name\": \"Yingjun Li\"}], \"abstract\": null}, {\"paperId\": \"083b1e953e15c696f77e833c8bce6ebe84a8ae79\", \"externalIds\": {\"PubMedCentral\": \"11183537\", \"DOI\": \"10.1093/neuonc/noae064.337\", \"CorpusId\": 270587645}, \"title\": \"HGG-53. MULTI-DIMENSIONAL INTEGRATIVE PROFILING IDENTIFIES BCL2L1 METHYLATION AS A PREDICTIVE BIOMARKER FOR MCL-1 ACTIVITY IN PEDIATRIC HIGH-GRADE GLIOMAS\", \"venue\": \"Neuro-Oncology\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/neuro-oncology/article-pdf/26/Supplement_4/0/58253048/noae064.337.pdf\", \"status\": \"HYBRID\", \"license\": \"CCBYNC\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC11183537, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2167989380\", \"name\": \"Shazia Adjumain\"}, {\"authorId\": \"11212957\", \"name\": \"C. Sun\"}, {\"authorId\": \"33133744\", \"name\": \"G. Bradshaw\"}, {\"authorId\": \"1490964266\", \"name\": \"Nicole Chew\"}, {\"authorId\": \"2307226439\", \"name\": \"Vanessa Tsui\"}, {\"authorId\": \"2307224662\", \"name\": \"Hanbyeol Lee\"}, {\"authorId\": \"2167981985\", \"name\": \"Melissa Loi\"}, {\"authorId\": \"2305131159\", \"name\": \"Nataliya Zhukova\"}, {\"authorId\": \"2167981724\", \"name\": \"Dilru Habarakada\"}, {\"authorId\": \"40422465\", \"name\": \"Louise E. A. Ludlow\"}, {\"authorId\": \"2219981650\", \"name\": \"Naama Neeman\"}, {\"authorId\": \"2066219003\", \"name\": \"P. Daniel\"}, {\"authorId\": \"2273110348\", \"name\": \"Ron Firestein\"}], \"abstract\": \"Abstract BACKGROUND Pediatric high-grade gliomas (pHGGs) pose a significant challenge as the most aggressive central nervous system tumors in children. The lack of effective treatment and poor survival rates emphasize the critical need for innovative therapies to improve the prognosis of pediatric patients with pHGG. METHODS We executed CRISPR-cas9 knockout (KO) screenings in 65 pediatric and 10 adult high-grade glioma (HGG) cell lines to explore unique functional dependencies associated with pHGGs. Drug assays were carried out to assess the targetability of a gene dependency of interest in pHGG cell lines. Subsequently, Random Forest machine learning algorithm was employed on \\u2018omics\\u2019 datasets to identify biomarkers indicative of drug response. Finally, biomarkers were confirmed through sequencing-based methods across various pediatric cancers. RESULTS CRISPR-cas9 KO screens revealed 8 crucial genes essential for pHGG growth, namely MCL-1, ATIC, DHFR, EED, HDAC2, PARP1, PDK1, PIK3CA and TYMS. Among these, Myeloid Cell Leukemia (MCL-1) was further characterized as it emerged as the top differential genetic dependency in pHGGs. Consistent with this, MCL1 inhibitors exhibited potent anti-cancer activity on 43% of pHGG cell lines. Multi-feature prediction analysis identified 140 features correlated to response. Strikingly, a previously undescribed methylation site within the BCL2L1 locus, cg00300298, ranked in the top 5% of features. Tissue analysis revealed a wide range of other pediatric brain cancers that harbor the BCL2L1 cg00300298 methylation mark as compared to non-malignant brain tissue. Lastly, we validated the utility of BCL2L1 methylation as a predictive biomarker of MCL1 inhibitor sensitivity across a large panel of pediatric brain cancer cell lines. CONCLUSION Using an integrated genomic approach, we identify MCL1 as a distinct therapeutic target in BCL2L1-methylated pediatric brain cancers. This offers a rational approach for stratifying patients who may benefit from MCL1 inhibitors.\"}, {\"paperId\": \"083c615048ec61f99132382bde5b7a0011a16ab4\", \"externalIds\": {\"DOI\": \"10.1158/1538-8514.synthleth24-a021\", \"CorpusId\": 270427854}, \"title\": \"Abstract A021: Hunting for synthetic lethal partners in DNA damage response-altered endometrial cancer\", \"venue\": \"Molecular Cancer Therapeutics\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1158/1538-8514.synthleth24-a021?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1158/1538-8514.synthleth24-a021, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2300091782\", \"name\": \"Julie Zhou\"}, {\"authorId\": \"2306031619\", \"name\": \"Konstantinos Mitsopoulos\"}, {\"authorId\": \"5459181\", \"name\": \"O. Rossanese\"}], \"abstract\": \"\\n DNA damage response (DDR) genes are frequently altered in cancer, which may lead to protein loss-of-function (LoF) and result in particular DDR defects that can be therapeutically targeted via the concept of synthetic lethality (SL). There is a high prevalence of DDR alterations in endometrial cancer, a gynecologic malignancy with increased incidence and mortality in recent decades, and an unmet clinical need for a wider range of treatment options to reduce adverse effects and combat therapy resistance. In this study, a large-scale, agnostic bioinformatic screening approach was employed to discover novel potential SL targets specific to DDR LoF biomarkers in endometrial cancer for subsequent experimental validation in vitro. SL analysis was performed with the in-house Target / Biomarker / Lineage (TBL) bioinformatic pipeline (Division of Cancer Therapeutics, The Institute of Cancer Research) using datasets obtained from the Cancer Dependency Map (DepMap). The TBL pipeline statistically analyzed cancer cell line target gene dependency probabilities, inferred from Project Achilles and Project Score genome-wide CRISPR-Cas9 dropout screens, and integrated this with mutation and copy number variation genomic datasets. Potential interactions were filtered for target-biomarker mutual exclusivity using patient data from The Cancer Genome Atlas (TCGA). The ability of the TBL pipeline to identify known SL interactions was demonstrated through in silico identification of ARID1B/ARID1A in ovarian cancer and SMARCA2/SMARCA4 in lung cancer as significant hits. In addition, the identification of WRN/ARID1A as a significant hit in uterine cancer, given that ARID1A loss has been significantly associated with microsatellite instability (MSI) in endometrial cancer, is consistent with previous findings of WRN helicase as a SL partner with MSI in endometrial cancer. Analysis and downstream refinement of endometrial cancer significant hits led to the identification of seven final candidate target-biomarker gene pairs. These putative SL partners comprise novel potential endometrial cancer targets, with various functions ranging from nucleotide biosynthesis to epigenetic remodeling, and include novel potential and established LoF biomarkers relevant to endometrial cancer biology, namely DNA mismatch repair. In vitro validation of the final candidates by genetic or pharmacologic approaches to assess target gene dependency in endometrial cancer cell lines with altered or wildtype biomarker status will be discussed. These experiments will provide key experimental data to validate our bioinformatic approach to SL target-biomarker discovery, and may identify novel SL partners involving DDR LoF alterations in endometrial cancer that could lead to the development of new molecular targeted therapies and improved treatment options for this patient subpopulation.\\n Citation Format: Julie Zhou, Konstantinos Mitsopoulos, Olivia Rossanese. Hunting for synthetic lethal partners in DNA damage response-altered endometrial cancer [abstract]. In: Proceedings of the AACR Special Conference in Cancer Research: Expanding and Translating Cancer Synthetic Vulnerabilities; 2024 Jun 10-13; Montreal, Quebec, Canada. Philadelphia (PA): AACR; Mol Cancer Ther 2024;23(6 Suppl):Abstract nr A021.\"}, {\"paperId\": \"083d3f04062365613a94511900e3bc4a65850113\", \"externalIds\": {\"PubMedCentral\": \"8468137\", \"DOI\": \"10.3390/cells10092342\", \"CorpusId\": 237937450, \"PubMed\": \"34571991\"}, \"title\": \"Applications of CRISPR-Cas9 Technology to Genome Editing in Glioblastoma Multiforme\", \"venue\": \"Cells\", \"year\": 2021, \"citationCount\": 28, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.mdpi.com/2073-4409/10/9/2342/pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8468137, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1422264563\", \"name\": \"Nadia Al-Sammarraie\"}, {\"authorId\": \"144500997\", \"name\": \"S. Ray\"}], \"abstract\": \"Glioblastoma multiforme (GBM) is an aggressive malignancy of the brain and spinal cord with a poor life expectancy. The low survivability of GBM patients can be attributed, in part, to its heterogeneity and the presence of multiple genetic alterations causing rapid tumor growth and resistance to conventional therapy. The Clustered Regularly Interspaced Short Palindromic Repeats (CRISPR)-CRISPR associated (Cas) nuclease 9 (CRISPR-Cas9) system is a cost-effective and reliable gene editing technology, which is widely used in cancer research. It leads to novel discoveries of various oncogenes that regulate autophagy, angiogenesis, and invasion and play important role in pathogenesis of various malignancies, including GBM. In this review article, we first describe the principle and methods of delivery of CRISPR-Cas9 genome editing. Second, we summarize the current knowledge and major applications of CRISPR-Cas9 to identifying and modifying the genetic regulators of the hallmark of GBM. Lastly, we elucidate the major limitations of current CRISPR-Cas9 technology in the GBM field and the future perspectives. CRISPR-Cas9 genome editing aids in identifying novel coding and non-coding transcriptional regulators of the hallmarks of GBM particularly in vitro, while work using in vivo systems requires further investigation.\"}, {\"paperId\": \"0841c4f0fa206a273a4e9b271e903f8c6e77300b\", \"externalIds\": {\"DOI\": \"10.1093/brain/awac044\", \"CorpusId\": 246677705, \"PubMed\": \"35136953\"}, \"title\": \"NPRL3 loss alters neuronal morphology, mTOR localization, cortical lamination, and seizure threshold.\", \"venue\": \"Brain : a journal of neurology\", \"year\": 2022, \"citationCount\": 15, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/brain/article-pdf/145/11/3872/50490958/awac044.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1093/brain/awac044?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1093/brain/awac044, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6344522\", \"name\": \"Philip H. Iffland\"}, {\"authorId\": \"2038114302\", \"name\": \"M. Everett\"}, {\"authorId\": \"1403555463\", \"name\": \"K. Cobb-Pitstick\"}, {\"authorId\": \"51254949\", \"name\": \"Lauren E. Bowser\"}, {\"authorId\": \"120169517\", \"name\": \"Allan E. Barnes\"}, {\"authorId\": \"6692189\", \"name\": \"Janice K. Babus\"}, {\"authorId\": \"87321382\", \"name\": \"A. Romanowski\"}, {\"authorId\": \"6054229\", \"name\": \"Marianna Baybis\"}, {\"authorId\": \"2106819749\", \"name\": \"Soad Elziny\"}, {\"authorId\": \"4558327\", \"name\": \"E. Puffenberger\"}, {\"authorId\": \"1398299769\", \"name\": \"C. Gonzaga\\u2010Jauregui\"}, {\"authorId\": \"39893260\", \"name\": \"A. Poulopoulos\"}, {\"authorId\": \"50857712\", \"name\": \"Vincent J. Carson\"}, {\"authorId\": \"4524715\", \"name\": \"P. Crino\"}], \"abstract\": null}, {\"paperId\": \"08426f381432b0c4e44a1550e97989d6ac173290\", \"externalIds\": {\"PubMedCentral\": \"8367961\", \"DOI\": \"10.1038/s41420-021-00603-z\", \"CorpusId\": 237102282, \"PubMed\": \"34400617\"}, \"title\": \"LIF/LIFR oncogenic signaling is a novel therapeutic target in endometrial cancer\", \"venue\": \"Cell Death Discovery\", \"year\": 2021, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41420-021-00603-z.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC8367961, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46480200\", \"name\": \"Weiwei Tang\"}, {\"authorId\": \"50687817\", \"name\": \"K. Ramasamy\"}, {\"authorId\": \"87827851\", \"name\": \"S. Pillai\"}, {\"authorId\": \"3797475\", \"name\": \"B. Santhamma\"}, {\"authorId\": \"12182927\", \"name\": \"Swapna Konda\"}, {\"authorId\": \"66546820\", \"name\": \"Prabhakar Pitta Venkata\"}, {\"authorId\": \"1805957202\", \"name\": \"L. Blankenship\"}, {\"authorId\": \"51176415\", \"name\": \"Junhao Liu\"}, {\"authorId\": \"6211598\", \"name\": \"Zexuan Liu\"}, {\"authorId\": \"121554958\", \"name\": \"Kristin A Altwegg\"}, {\"authorId\": \"2071479083\", \"name\": \"Behnam Ebrahimi\"}, {\"authorId\": \"121271094\", \"name\": \"Uday P. Pratap\"}, {\"authorId\": \"121857114\", \"name\": \"Xiaonan Li\"}, {\"authorId\": \"6442013\", \"name\": \"P. Valente\"}, {\"authorId\": \"4185355\", \"name\": \"Edward R. Kost\"}, {\"authorId\": \"7957571\", \"name\": \"G. Sareddy\"}, {\"authorId\": \"4545662\", \"name\": \"R. Vadlamudi\"}, {\"authorId\": \"4308038\", \"name\": \"H. Nair\"}, {\"authorId\": \"5741776\", \"name\": \"R. Tekmal\"}, {\"authorId\": \"5467153\", \"name\": \"S. Viswanadhapalli\"}], \"abstract\": \"Endometrial cancer (EC) is the fourth most common cancer in women. Advanced-stage EC has limited treatment options with a poor prognosis. There is an unmet need for the identification of actionable drivers for the development of targeted therapies in EC. Leukemia inhibitory factor receptor (LIFR) and its ligand LIF play a major role in cancer progression, metastasis, stemness, and therapy resistance. However, little is known about the functional significance of the LIF/LIFR axis in EC progression. In this study using endometrial tumor tissue arrays, we identified that expression of LIF, LIFR is upregulated in EC. Knockout of LIFR using CRISPR/Cas9 in two different EC cells resulted in a significant reduction of their cell viability and cell survival. In vivo studies demonstrated that LIFR-KO significantly reduced EC xenograft tumor growth. Treatment of established and primary patient-derived EC cells with a novel LIFR inhibitor, EC359 resulted in the reduction of cell viability with an IC 50 in the range of 20\\u2013100\\u2009nM and induction of apoptosis. Further, treatment with EC359 reduced the spheroid formation of EC cancer stem cells and reduced the levels of cancer stem cell markers SOX2, OCT4, NANOG, and Axin2. Mechanistic studies demonstrated that EC359 treatment attenuated the activation of LIF-LIFR driven pathways, including STAT3 and AKT/mTOR signaling in EC cells. Importantly, EC359 treatment resulted in a significant reduction of the growth of EC patient-derived explants ex vivo, EC cell line-derived xenografts, and patient-derived xenografts in vivo. Collectively, our work revealed the oncogenic potential of the LIF/LIFR axis in EC and support the utility of LIFR inhibitor, EC359, as a novel targeted therapy for EC via the inhibition of LIF/LIFR oncogenic signaling.\"}, {\"paperId\": \"084330a5331af38aad09b67707f294d2d565221e\", \"externalIds\": {\"MAG\": \"2970289976\", \"DOI\": \"10.1016/j.tibtech.2019.08.001\", \"CorpusId\": 201805801, \"PubMed\": \"31477243\"}, \"title\": \"CRISPR-Based Directed Evolution for Crop Improvement.\", \"venue\": \"Trends in Biotechnology\", \"year\": 2020, \"citationCount\": 37, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.tibtech.2019.08.001?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.tibtech.2019.08.001, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"46460323\", \"name\": \"Haroon Butt\"}, {\"authorId\": \"4183203\", \"name\": \"Syed Shan-e-Ali Zaidi\"}, {\"authorId\": \"23132410\", \"name\": \"Norhan Hassan\"}, {\"authorId\": \"50148750\", \"name\": \"Magdy M. Mahfouz\"}], \"abstract\": \"Directed evolution involves generating diverse sequence variants of a gene of interest to produce a desirable trait under selective pressure. CRISPR-Cas9 (clustered regularly interspaced short palindromic repeats-CRISPR-associated protein 9) systems can be programmed to target any genomic locus and perform targeted directed evolution. Here, we discuss the opportunities and challenges of this emerging platform for targeted crop improvement.\"}, {\"paperId\": \"08462a7394ce18cc2121c22e1edaaa6186097ad9\", \"externalIds\": {\"DOI\": \"10.51189/conbracib2024/42769\", \"CorpusId\": 273412251}, \"title\": \"A UTILIZA\\u00c7\\u00c3O DO CRISPR-CAS9 PARA A ERRADICA\\u00c7\\u00c3O DO HIV-1\", \"venue\": \"Anais do V Congresso Brasileiro de Ci\\u00eancias Biol\\u00f3gicas\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.51189/conbracib2024/42769?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.51189/conbracib2024/42769, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2326365762\", \"name\": \"Eduardo Luiz Fava\"}, {\"authorId\": \"2326348269\", \"name\": \"Juan Philippe Teixeira\"}], \"abstract\": null}, {\"paperId\": \"08462f978b15342a39cdd30cd2b5cda555af5340\", \"externalIds\": {\"PubMedCentral\": \"10881426\", \"DOI\": \"10.1016/j.omtm.2024.101203\", \"CorpusId\": 267483893, \"PubMed\": \"38390557\"}, \"title\": \"Gesicles packaging dCas9-VPR ribonucleoprotein complexes can combine with vorinostat and promote HIV proviral transcription\", \"venue\": \"Molecular Therapy: Methods & Clinical Development\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.omtm.2024.101203\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC10881426, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"117779632\", \"name\": \"M. Fisher\"}, {\"authorId\": \"2282860314\", \"name\": \"Waj Chaudhry\"}, {\"authorId\": \"30036011\", \"name\": \"L. Campbell\"}], \"abstract\": \"Despite the success of combination antiretroviral therapy (cART) in HIV treatment, a cure for HIV remains elusive. Scientists postulate that HIV latent reservoirs may be a vital target in curative strategies. Vorinostat is a latency-reversing agent that has demonstrated some effectiveness in reactivating latent HIV, but complementary therapies may be essential to enhance its efficacy. One such approach may utilize the CRISPR-Cas9 system, which has evolved to include transcriptional activators such as dCas9-VPR. In this study, we explored the effects of combining vorinostat coupled with gesicle-mediated delivery of dCas9-VPR in promoting the transcription of integrated HIV proviruses in HIV-NanoLuc CHME-5 microglia and J-Lat 10.6 lymphocytes. We confirmed that dCas9-VPR ribonucleoprotein complexes can be packaged into gesicles and application to cells successfully induced HIV transcription through interactions with the HIV LTR. Vorinostat also induced significant increases in proviral transcription but generated inhibition of cellular proliferation (microglia) or cell viability (lymphocytes) starting at 1,000 nM and higher concentrations. Experiments combining dCas9-VPR gesicles and vorinostat confirmed the enhanced transcriptional activation of the HIV provirus in microglia but not lymphocytes. Thus, a combination of dCas9-VPR gesicles with other latency-reversing agents may provide a complementary method to activate latent HIV in future studies utilizing patient-derived cells or small animal models.\"}, {\"paperId\": \"0847366a11c192a7e2589d822c1a85743ca5bc1c\", \"externalIds\": {\"MAG\": \"3024549164\", \"DOI\": \"10.1016/j.addr.2020.05.002\", \"CorpusId\": 218669780, \"PubMed\": \"32416111\"}, \"title\": \"Delivery of genome-editing biomacromolecules for treatment of lung genetic disorders.\", \"venue\": \"Advanced Drug Delivery Reviews\", \"year\": 2020, \"citationCount\": 35, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.addr.2020.05.002?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.addr.2020.05.002, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"71555144\", \"name\": \"Tao Wan\"}, {\"authorId\": \"143947917\", \"name\": \"Y. Ping\"}], \"abstract\": \"Genome-editing systems based on clustered, regularly interspaced, short palindromic repeat (CRISPR)/associated protein (CRISPR/Cas), are emerging as a revolutionary technology for the treatment of various genetic diseases. To date, the delivery of genome-editing biomacromolecules by viral or non-viral have been proposed as new therapeutic options for lung genetic disorders, such as cystic fibrosis (CF) and \\u03b1-1 antitrypsin deficiency (AATD), and it has been accepted that these delivery vectors can introduce CRISPR/Cas9 machineries into target cells or tissues in vitro, ex vivo and in vivo. However, the efficient local or systemic delivery of CRISPR/Cas9 elements to the lung, enabled by either viral or by non-viral carriers, still remains elusive. Herein, we first introduce lung genetic disorders and their current treatment options, and then summarize CRISPR/Cas9-based strategies for the therapeutic genome editing of these disorders. We further summarize the pros and cons of different routes of administration for lung genetic disorders. In particular, the potentials of aerosol delivery for therapeutic CRISPR/Cas9 biomacromolecules for lung genome editing are discussed highlighted. Finally, current challenges and future outlooks in this emerging area are briefly discussed.\"}, {\"paperId\": \"0847594bd47f95cbb04a2094f974284f6c76408e\", \"externalIds\": {\"DOI\": \"10.1126/science.abl6422\", \"CorpusId\": 252161562, \"PubMed\": \"36074851\"}, \"title\": \"Human TKTL1 implies greater neurogenesis in frontal neocortex of modern humans than Neanderthals\", \"venue\": \"Science\", \"year\": 2022, \"citationCount\": 99, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1126/science.abl6422?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1126/science.abl6422, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2090763457\", \"name\": \"Anneline Pinson\"}, {\"authorId\": \"2053892970\", \"name\": \"Lei Xing\"}, {\"authorId\": \"47684508\", \"name\": \"T. Namba\"}, {\"authorId\": \"5035411\", \"name\": \"N. Kalebic\"}, {\"authorId\": \"116176929\", \"name\": \"Jula Peters\"}, {\"authorId\": \"2156125283\", \"name\": \"Christina Eugster Oegema\"}, {\"authorId\": \"4414839\", \"name\": \"Sofia Traikov\"}, {\"authorId\": \"2184481559\", \"name\": \"Katrin Reppe\"}, {\"authorId\": \"46174314\", \"name\": \"S. Riesenberg\"}, {\"authorId\": \"2166324\", \"name\": \"T. Maricic\"}, {\"authorId\": \"2141434474\", \"name\": \"R. Derihaci\"}, {\"authorId\": \"4051535\", \"name\": \"P. Wimberger\"}, {\"authorId\": \"2861780\", \"name\": \"S. P\\u00e4\\u00e4bo\"}, {\"authorId\": \"7538417\", \"name\": \"W. Huttner\"}], \"abstract\": \"Neanderthal brains were similar in size to those of modern humans. We sought to investigate potential differences in neurogenesis during neocortex development. Modern human transketolase-like 1 (TKTL1) differs from Neanderthal TKTL1 by a lysine-to-arginine amino acid substitution. Using overexpression in developing mouse and ferret neocortex, knockout in fetal human neocortical tissue, and genome-edited cerebral organoids, we found that the modern human variant, hTKTL1, but not the Neanderthal variant, increases the abundance of basal radial glia (bRG) but not that of intermediate progenitors (bIPs). bRG generate more neocortical neurons than bIPs. The hTKTL1 effect requires the pentose phosphate pathway and fatty acid synthesis. Inhibition of these metabolic pathways reduces bRG abundance in fetal human neocortical tissue. Our data suggest that neocortical neurogenesis in modern humans differs from that in Neanderthals. Description Neanderthal brain development Neanderthal brains were similar in size to those of modern humans but differed in shape. What we cannot tell from fossils is how Neanderthal brains might have differed in function or organization of brain layers such as the neocortex. Pinson et al. have now analyzed the effect of a single amino acid change in the transketolase-like 1 (TKTL1) protein on production of basal radial glia, the workhorses that generate much of the neocortex (see the Perspective by Malgrange and Nguyen). Modern humans differ from apes and Neanderthals by this single amino acid change. When placed in organoids or overexpressed in nonhuman brains, the human variant of TKTL1 drove more generation of neuroprogenitors than did the archaic variant. The authors suggest that the modern human has more neocortex to work with than the ancient Neanderthal did. \\u2014PJH Neocortical neurogenesis in modern humans differs from that likely to have been observed in Neanderthals, yielding more cortical neurons. INTRODUCTION The evolutionary expansion of the neocortex and the concomitant increase in neuron production are considered to be a basis for the increase in cognitive abilities that occurred during human evolution. Endocast analyses reveal that the endocranial volume of modern humans and Neanderthals was similar, suggesting similar brain and neocortex size. But whether similar neocortex size implies similar neocortical neuron production remains unclear. RATIONALE Transketolase-like 1 (TKTL1) is a gene from the transketolase family that in fetal human neocortex is preferentially expressed in the two classes of neuroprogenitors, the apical progenitors in the ventricular zone and the basal progenitors in the subventricular zone. The latter class of neuroprogenitors comprises two major types, the basal intermediate progenitors (bIPs) and the basal radial glia (bRG, also called outer radial glia). bRG exhibit cellular processes that promote their ability to self-amplify, and are the neuroprogenitor type considered to be a driver of the increase in cortical neuron production, which is a hallmark of the evolution of the human neocortex. Reflecting their cell polarity, bRG undergo repeated asymmetric divisions that self-renew the bRG and generate one neuron each. Thereby, bRG generate more neurons over time than the other type of neuron-generating basal neuroprogenitors, the process-lacking bIPs whose neurogenic divisions are symmetric self-consuming. TKTL1 is one of the few proteins with a single amino acid substitution found in essentially all present-day humans but absent from extinct archaic humans, the Neanderthals and Denisovans, and other primates. This human-specific amino acid substitution in TKTL1 is a lysine in apes and archaic humans but an arginine in modern humans. We therefore investigated (i) whether TKTL1 has a role in neocortex development and affects neuroprogenitor numbers and (ii) whether both archaic TKTL1 (aTKTL1) and modern human TKTL1 (hTKTL1) exert similar effects on neuroprogenitors during neocortex development. RESULTS When expressed in mouse embryo neocortex, which lacks TKTL1 expression, hTKTL1 increased the abundance of bRG without affecting that of bIPs and that of apical progenitors. The effect of TKTL1 on bRG abundance was limited to hTKTL1; aTKTL1, which differs only by one amino acid, was unable to increase bRG abundance. The greater bRG abundance upon hTKTL1 expression resulted in an increase in cortical neuron production over time, specifically of the late-born upper-layer neurons rather than of the early-born deep-layer neurons. In the folded (gyrencephalic) developing ferret neocortex, hTKTL1 expression increased not only bRG abundance but also the proportion of bRG with multiple processes, a hallmark of bRG that can self-amplify. As a consequence of this effect, gyrus size increased. In fetal human neocortex, hTKTL1 was essential to maintain the full number of bRG, as CRISPR-Cas9\\u2013mediated hTKTL1 knockout in fetal human neocortical tissue reduced this number. To further demonstrate the relevance of this effect, we converted hTKTL1 to the Neanderthal variant aTKTL1 in human embryonic stem cells and generated minibrain structures called cerebral organoids. The aTKTL1-expressing organoids contained fewer bRG and neurons, hence the human-specific lysine-to-arginine substitution in hTKTL1 is essential for maintaining the full number of bRG and neurons in this human brain model. In fetal human neocortex, hTKTL1 expression in neuroprogenitors increased during the course of neurogenesis and was particularly high in the developing frontal lobe as compared to the developing occipital lobe. As to its mechanism of action, hTKTL1 increased bRG abundance via two metabolic pathways, the pentose phosphate pathway (PPP) followed by fatty acid synthesis. Inhibition of the PPP or of fatty acid synthesis, using a variety of specific inhibitors, completely suppressed the hTKTL1-induced increase in bRG abundance in embryonic mouse neocortex and reduced bRG numbers in fetal human neocortical tissue. This metabolic action of hTKTL1, but not aTKTL1, in bRG resulted in an increase in the concentration of acetyl\\u2013coenzyme A, the critical metabolite for fatty acid synthesis. Our data suggest that hTKTL1, but not aTKTL1, promotes the synthesis of membrane lipids containing a certain type of fatty acid that are required for the outgrowth of bRG processes and hence for the increase in bRG abundance. CONCLUSION In light of our finding that TKTL1 expression in fetal human neocortex is particularly high in the developing frontal lobe, our study implies that because of the single amino acid\\u2013based activity of hTKTL1, neocortical neurogenesis in modern humans was and is greater than it was in Neanderthals, in particular in the frontal lobe. TKTL1 and hominin cortical neurogenesis. The single lysine-to-arginine substitution in modern human TKTL1 leads to greater bRG numbers than in Neanderthals. These bRG in turn generate more neocortical neurons in modern humans. Because TKTL1 expression in fetal human neocortex is particularly high in the developing frontal lobe, these findings imply that the frontal lobe of modern humans contains more neurons than that of Neanderthals.\"}, {\"paperId\": \"0848a0bc7ee6341a976645c6f5efad4249e96944\", \"externalIds\": {\"DOI\": \"10.1007/s40995-021-01232-y\", \"CorpusId\": 239493562}, \"title\": \"Screening and Analysis of Potential Genes for DNA Damage Repair and Apoptotic Signal in iPSCs Based on CRISPR\\u2013Cas9 System\", \"venue\": \"Iranian Journal of Science and Technology, Transactions A: Science\", \"year\": 2021, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s40995-021-01232-y?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s40995-021-01232-y, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2156146679\", \"name\": \"Lu Zhang\"}, {\"authorId\": \"47866844\", \"name\": \"Haiyan Cui\"}, {\"authorId\": \"2152185075\", \"name\": \"Mingyu Zhu\"}, {\"authorId\": \"48814405\", \"name\": \"Kuo Zhao\"}], \"abstract\": null}, {\"paperId\": \"0848e8f26a39198ee4a11d50928f4eb30a3d0ff9\", \"externalIds\": {\"DOI\": \"10.1038/s41598-020-64443-0\", \"CorpusId\": 257024965}, \"title\": \"Author Correction: CRISPR/Cas9 microinjection in oocytes disables pancreas development in sheep\", \"venue\": \"Scientific Reports\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.nature.com/articles/s41598-020-64443-0.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1038/s41598-020-64443-0?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1038/s41598-020-64443-0, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"121191837\", \"name\": \"M. Vilari\\u00f1o\"}, {\"authorId\": \"34834284\", \"name\": \"S. T. Rashid\"}, {\"authorId\": \"37176838\", \"name\": \"Fabian P. Suchy\"}, {\"authorId\": \"40248677\", \"name\": \"B. McNabb\"}, {\"authorId\": \"134813636\", \"name\": \"T. van der Meulen\"}, {\"authorId\": \"35060523\", \"name\": \"Eli J. Fine\"}, {\"authorId\": \"2075595305\", \"name\": \"Syed Daniyal Ahsan\"}, {\"authorId\": \"31241100\", \"name\": \"Nurlybek Mursaliyev\"}, {\"authorId\": \"3502464\", \"name\": \"V. Sebastiano\"}, {\"authorId\": \"2361194483\", \"name\": \"S. Diab\"}, {\"authorId\": \"6285291\", \"name\": \"M. Huising\"}, {\"authorId\": \"5846791\", \"name\": \"H. Nakauchi\"}, {\"authorId\": \"40535003\", \"name\": \"P. Ross\"}], \"abstract\": \"An amendment to this paper has been published and can be accessed via a link at the top of the paper.\"}, {\"paperId\": \"08497991b368459c56be3b9ba64235a13de73bbe\", \"externalIds\": {\"MAG\": \"3031021727\", \"DOI\": \"10.3760/CMA.J.CN511434-20190123-00028\", \"CorpusId\": 219794660}, \"title\": \"Advances of Usher syndrome and USH2A gene\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.3760/CMA.J.CN511434-20190123-00028?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3760/CMA.J.CN511434-20190123-00028, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2150590156\", \"name\": \"Xiang Meng\"}, {\"authorId\": \"5856158\", \"name\": \"T. Guo\"}], \"abstract\": null}, {\"paperId\": \"084c464793d33a4ff41f55c7d162f43f097baffb\", \"externalIds\": {\"PubMedCentral\": \"7818247\", \"MAG\": \"3047815632\", \"DOI\": \"10.1111/pcmr.12919\", \"CorpusId\": 221079108, \"PubMed\": \"32767816\"}, \"title\": \"Analysis of CRISPR\\u2010Cas9 screens identifies genetic dependencies in melanoma\", \"venue\": \"Pigment Cell & Melanoma Research\", \"year\": 2020, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://onlinelibrary.wiley.com/doi/pdfdirect/10.1111/pcmr.12919\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC7818247, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1404389155\", \"name\": \"Eirini Christodoulou\"}, {\"authorId\": \"144818038\", \"name\": \"Mamunur Rashid\"}, {\"authorId\": \"1471149026\", \"name\": \"C. Pacini\"}, {\"authorId\": \"2455853\", \"name\": \"A. Droop\"}, {\"authorId\": \"1864367985\", \"name\": \"Holly M. Robertson\"}, {\"authorId\": \"10208108\", \"name\": \"Tim van Groningen\"}, {\"authorId\": \"3563076\", \"name\": \"A. Teunisse\"}, {\"authorId\": \"46897762\", \"name\": \"F. Iorio\"}, {\"authorId\": \"5585153\", \"name\": \"A. Jochemsen\"}, {\"authorId\": \"145669576\", \"name\": \"D. Adams\"}, {\"authorId\": \"33750893\", \"name\": \"R. Doorn\"}], \"abstract\": \"Targeting the MAPK signaling pathway has transformed the treatment of metastatic melanoma. CRISPR\\u2010Cas9 genetic screens provide a genome\\u2010wide approach to uncover novel genetic dependencies that might serve as therapeutic targets. Here, we analyzed recently reported CRISPR\\u2010Cas9 screens comparing data from 28 melanoma cell lines and 313 cell lines of other tumor types in order to identify fitness genes related to melanoma. We found an average of 1,494 fitness genes in each melanoma cell line. We identified 33 genes, inactivation of which specifically reduced the fitness of melanoma. This set of tumor type\\u2010specific genes includes established melanoma fitness genes as well as many genes that have not previously been associated with melanoma growth. Several genes encode proteins that can be targeted using available inhibitors. We verified that genetic inactivation of DUSP4 and PPP2R2A reduces the proliferation of melanoma cells. DUSP4 encodes an inhibitor of ERK, suggesting that further activation of MAPK signaling activity through its loss is selectively deleterious to melanoma cells. Collectively, these data present a resource of genetic dependencies in melanoma that may be explored as potential therapeutic targets.\"}, {\"paperId\": \"084cbc92310443b93f25390c2fbc540f6574ee73\", \"externalIds\": {\"DOI\": \"10.1016/bs.mcb.2022.02.015\", \"CorpusId\": 250423220, \"PubMed\": \"35811100\"}, \"title\": \"Generation of sex-reversed female clonal mice via CRISPR/Cas9-mediated Y chromosome deletion in male embryonic stem cells.\", \"venue\": \"Methods in Cell Biology\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9280658\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1016/bs.mcb.2022.02.015?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/bs.mcb.2022.02.015, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4525566\", \"name\": \"Yiren Qin\"}, {\"authorId\": \"48242031\", \"name\": \"F. Geng\"}, {\"authorId\": \"48538954\", \"name\": \"Duancheng Wen\"}], \"abstract\": null}, {\"paperId\": \"084cea4bb7d59ba91f39cff9e7cec6f0ffec0615\", \"externalIds\": {\"DOI\": \"10.1101/2024.09.26.615177\", \"CorpusId\": 273025334, \"PubMed\": \"39386444\"}, \"title\": \"Endocrine persistence in ER+ breast cancer is accompanied by metabolic vulnerability in oxidative phosphorylation\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.09.26.615177?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.09.26.615177, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1444691589\", \"name\": \"Steven Tau\"}, {\"authorId\": \"2299592394\", \"name\": \"Mary D Chamberlin\"}, {\"authorId\": \"2287068979\", \"name\": \"Huijuan Yang\"}, {\"authorId\": \"2299596038\", \"name\": \"Jonathan D Marotti\"}, {\"authorId\": \"2218201681\", \"name\": \"Alyssa M Roberts\"}, {\"authorId\": \"2323778731\", \"name\": \"Melissa M. Carmichael\"}, {\"authorId\": \"46201204\", \"name\": \"Lauren E. Cressey\"}, {\"authorId\": \"2215186766\", \"name\": \"C. Dragnev\"}, {\"authorId\": \"2339047661\", \"name\": \"E. Demidenko\"}, {\"authorId\": \"10687677\", \"name\": \"Riley A. Hampsch\"}, {\"authorId\": \"2299715651\", \"name\": \"Shannon M. Soucy\"}, {\"authorId\": \"2248920678\", \"name\": \"F. Kolling\"}, {\"authorId\": \"2323782650\", \"name\": \"Kimberley S. Samkoe\"}, {\"authorId\": \"2243507125\", \"name\": \"James V. Alvarez\"}, {\"authorId\": \"2058405\", \"name\": \"A. Kettenbach\"}, {\"authorId\": \"2284202809\", \"name\": \"Todd W. Miller\"}], \"abstract\": null}, {\"paperId\": \"084dbd8852a8977b55fe42da46b16054cc161096\", \"externalIds\": {\"DOI\": \"10.1007/s10142-023-01190-1\", \"CorpusId\": 260544331, \"PubMed\": \"37541970\"}, \"title\": \"CRISPR/Cas9 genome editing in wheat: enhancing quality and productivity for global food security\\u2014a review\", \"venue\": \"Functional & Integrative Genomics\", \"year\": 2023, \"citationCount\": 20, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10142-023-01190-1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10142-023-01190-1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2187073732\", \"name\": \"Hany Elsharawy\"}, {\"authorId\": \"2154787458\", \"name\": \"Moath Refat\"}], \"abstract\": null}, {\"paperId\": \"08522485298d7431f79ee2bcf122058f0a88f49a\", \"externalIds\": {\"MAG\": \"2994719636\", \"DOI\": \"10.1080/17524032.2019.1699135\", \"CorpusId\": 212881061}, \"title\": \"The Uproar Over Gene-Edited Babies: A Semantic Network Analysis of CRISPR on Twitter\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 30, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1080/17524032.2019.1699135?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1080/17524032.2019.1699135, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"82572787\", \"name\": \"Christopher Calabrese\"}, {\"authorId\": \"46497144\", \"name\": \"Jieyu Ding\"}, {\"authorId\": \"1572548703\", \"name\": \"Benjamin J. Millam\"}, {\"authorId\": \"145687960\", \"name\": \"G. Barnett\"}], \"abstract\": \"ABSTRACT CRISPR-Cas9, a recent gene editing technology, has potential to greatly impact medicine, agriculture, and the environment; therefore, it is increasingly important to understand the public\\u2019s perceptions surrounding this technology. This study examined the main themes of CRISPR during a nine-month period on Twitter through semantic network analysis. Three additional networks (before, initial, and after-event stages) were created to understand the effects of the \\u201cCRISPR babies\\u201d news event. Four themes emerged in the overall network: (1) research/applications of CRISPR, (2) the \\u201cCRISPR babies\\u201d event, (3) agricultural regulations for biotechnology, and (4) advancements in muscular dystrophy research. The \\u201cCRISPR babies\\u201d news story dominated the initial and after-event stage network clusters, indicating major events may impact how users discuss socio-scientific issues in online media. The sentiment surrounding CRISPR was mixed, demonstrating concerns over this technology. This study reveals the potential of social media as a tool to understand public discussions around new technologies.\"}, {\"paperId\": \"085513a7d126a172fd00097aae889bd6b75e813b\", \"externalIds\": {\"DOI\": \"10.1101/2024.05.14.594135\", \"CorpusId\": 269838304}, \"title\": \"CRISPR gene and transcriptome engineering (CRISPRgate) improves loss-of-function genetic screening approaches\", \"venue\": \"bioRxiv\", \"year\": 2024, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.biorxiv.org/content/biorxiv/early/2024/05/14/2024.05.14.594135.full.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1101/2024.05.14.594135?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1101/2024.05.14.594135, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2051742010\", \"name\": \"Jannis Stadager\"}, {\"authorId\": \"2301791614\", \"name\": \"Chiara Bernardini\"}, {\"authorId\": \"2298972709\", \"name\": \"Laura Hartmann\"}, {\"authorId\": \"2301791642\", \"name\": \"Henrik May\"}, {\"authorId\": \"2301791597\", \"name\": \"Jessica Wiepcke\"}, {\"authorId\": \"2301791669\", \"name\": \"Monika Kuban\"}, {\"authorId\": \"8173565\", \"name\": \"Z. Najafova\"}, {\"authorId\": \"2279783145\", \"name\": \"Steven A. Johnsen\"}, {\"authorId\": \"2298973458\", \"name\": \"Stefan Legewie\"}, {\"authorId\": \"2301791666\", \"name\": \"Franziska R. Traube\"}, {\"authorId\": \"2301791716\", \"name\": \"Julian Jude\"}, {\"authorId\": \"2301791625\", \"name\": \"Philipp Rathert\"}], \"abstract\": null}]}\n"
