\": \"R. Haas\"}, {\"authorId\": \"1720411\", \"name\": \"J. L\\u00f6fgren\"}], \"abstract\": null}, {\"paperId\": \"56ce1bd6ef3a965686b81b469d65984becd39ab9\", \"externalIds\": {\"DBLP\": \"conf/socialcom/HelicTSA10\", \"MAG\": \"2087103167\", \"DOI\": \"10.1109/SocialCom.2010.31\", \"CorpusId\": 4932212}, \"title\": \"On the Navigability of Social Tagging Systems\", \"venue\": \"2010 IEEE Second International Conference on Social Computing\", \"year\": 2010, \"citationCount\": 36, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1109/SocialCom.2010.31?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1109/SocialCom.2010.31, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1747800\", \"name\": \"D. Helic\"}, {\"authorId\": \"1752070\", \"name\": \"C. Trattner\"}, {\"authorId\": \"1743043\", \"name\": \"M. Strohmaier\"}, {\"authorId\": \"144877610\", \"name\": \"Keith Andrews\"}], \"abstract\": null}, {\"paperId\": \"57e9a84960ea0ff06b170d0c5b03eb31c3e3ff86\", \"externalIds\": {\"MAG\": \"2072116481\", \"DOI\": \"10.1642/AUK-13-216.1\", \"CorpusId\": 85400138}, \"title\": \"Online scientific publishing backed by 130 years of excellence\", \"venue\": \"\", \"year\": 2014, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://academic.oup.com/auk/article-pdf/131/1/1/26883010/auk0001.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1642/AUK-13-216.1?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1642/AUK-13-216.1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1959886\", \"name\": \"M. Hauber\"}], \"abstract\": null}, {\"paperId\": \"58c650ec67d27968b9d406e83a74f4af95c973a3\", \"externalIds\": {\"MAG\": \"2738208830\", \"CorpusId\": 80490806}, \"title\": \"Urology Times UAT test article 3 pagination 6-16\", \"venue\": \"\", \"year\": 2012, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"50715294\", \"name\": \"M. Overmyer\"}], \"abstract\": null}, {\"paperId\": \"5a479cff30d19ed3b2cb7da0b003e0bf855d17ba\", \"externalIds\": {\"CorpusId\": 247289918}, \"title\": \"Title: Randomized trial of laparoscopic cholecystectomy procedure specific consent form Running head: A procedure specific consent trial\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://minerva-access.unimelb.edu.au/bitstream/handle/11343/292645/ans.13888.pdf?sequence=1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"12246166\", \"name\": \"J. Crozier\"}, {\"authorId\": \"2157565822\", \"name\": \"MN AnnWilliams\"}, {\"authorId\": \"31830850\", \"name\": \"Steven T F Chan\"}, {\"authorId\": \"7540040\", \"name\": \"Graeme Thompson\"}], \"abstract\": null}, {\"paperId\": \"5ca8f1dd53057be9641bbf2ac2c21c41f152b97b\", \"externalIds\": {\"MAG\": \"2998042878\", \"DOI\": \"10.15835/nbha47411598\", \"CorpusId\": 210900046}, \"title\": \"Evaluation of the Allelopathic Potential of Leaf Extracts from Dischidia imbricata (Blume) Steud. on the Seedling Growth of Six Test Plants\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11598/8830\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/nbha47411598?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/nbha47411598, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"90982621\", \"name\": \"R. Krumsri\"}, {\"authorId\": \"46230410\", \"name\": \"Sutjaritpan Boonmee\"}, {\"authorId\": \"1398978422\", \"name\": \"H. Kato\\u2010Noguchi\"}], \"abstract\": \"Dischidia imbricata (Blume) Steud. is a herbaceous plant belonging to the Apocynaceae family. This plant has been reported to possess various pharmacological properties, however, there has been no report related to its allelopathic properties. Therefore, the aqueous methanol extracts of D. imbricata were examined for possible allelopathic activity against the seedling growth of dicotyledonous plants; lettuce (Lactuca sativa L.), cress (Lepidium sativum L.), and alfalfa (Medicago sativa L.), and monocotyledonous plants; barnyard grass (Echinochloa crus-galli (L.) P. Beauv.), Italian ryegrass (Lolium multiflorum Lam.), and timothy (Phleum pratense L.). D. imbricata extracts exhibited a significant inhibition on the seedling growth of all the test plant species at the concentration \\u2265 0.01 g dry weight equivalent extract mL-1. The seedling growth of lettuce showed the highest inhibition with D. imbricata extracts followed by alfalfa and cress, whereas the least inhibition was found on the seedling growth of timothy. Concentrations required for 50% inhibition (I50 values) of all the test plant species\\u00a0were in the range of 0.003 to 0.067 g D.W. equivalent extract mL-1 for shoot growth, and 0.018 to 0.026 g D.W. equivalent extract mL-1 for root growth.\\u00a0In addition considering the I50 values, the root growth of the test plant species was more sensitive to D. imbricata extracts than their shoot growth, except cress seedling. These results indicated that D. imbricata may possess allelopathic activity and may contain allelopathic substances. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 4, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"5db70a6066796e63ec46b01c961af9b7198d9cac\", \"externalIds\": {\"CorpusId\": 53604794}, \"title\": \"Knowledge Centre \\u0406 Blog \\u0406 ELHT Evidence Hub \\u0406 Library Services\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.ehub.elht.nhs.uk/uploads/2/0/9/6/20960734/dementia_may_2016.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": null}, {\"paperId\": \"5e0cd57a3f7b21b19dc2e61f8cb5d9ee169b8a9c\", \"externalIds\": {\"CorpusId\": 260474372}, \"title\": \"This Reprint May Differ from the Original in Pagination and Typographic Detail. Explaining the Adoption and Habits of Playing Exergames: the Role of Physical Activity Background and Digital Gaming Frequency Full Papers\", \"venue\": \"\", \"year\": null, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"3105224\", \"name\": \"Tuomas Kari\"}], \"abstract\": null}, {\"paperId\": \"5f2812e17fd4e07303aefa4934e14e40b1f39403\", \"externalIds\": {\"CorpusId\": 207763792}, \"title\": \"Determination of Pesticide Dermal Transfer to Operators & Agricultural Workers through Contact with Sprayed Hard Surfaces Short running title : Pesticide Dermal Transfer through Contact with Sprayed Hard Surfaces\", \"venue\": \"\", \"year\": 2018, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"5933765\", \"name\": \"A. Tsakirakis\"}, {\"authorId\": \"5386605\", \"name\": \"K. Kasiotis\"}, {\"authorId\": \"8732634\", \"name\": \"P. Anastasiadou\"}, {\"authorId\": \"4117103\", \"name\": \"A. Charistou\"}, {\"authorId\": \"1416311362\", \"name\": \"Rianda M Gerritsen-Ebben\"}, {\"authorId\": \"92046564\", \"name\": \"C. Glass\"}, {\"authorId\": \"102885203\", \"name\": \"Kyriaki\"}, {\"authorId\": \"2095975585\", \"name\": \"Machera\"}], \"abstract\": null}, {\"paperId\": \"5f7794eef05604eb705827ee9da8bf6fd4a7a75f\", \"externalIds\": {\"MAG\": \"2775582868\", \"DOI\": \"10.51257/a-v1-h1558\", \"CorpusId\": 166050432}, \"title\": \"Syst\\u00e8me OS/2\", \"venue\": \"Technologies logicielles Architectures des syst\\u00e8mes\", \"year\": 1997, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.51257/a-v1-h1558?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.51257/a-v1-h1558, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"122031655\", \"name\": \"Michel Treillet\"}], \"abstract\": \"U n peu d\\u2019historique En presence d\\u2019un systeme d\\u2019exploitation, la tendance est de s\\u2019exclamer \\u00ab\\u00a0encore un\\u00a0\\u00bb, en fait la plupart des systemes correspondent a une evolution des besoins tant des entreprises utilisatrices d\\u2019informatique que des utilisateurs, OS/2 Warp n\\u2019echappe pas a cette regle. Une premiere question de pure curiosite, pourquoi ce nom Warp : c\\u2019etait le nom de code de ce qui devait etre la future version 3 de l\\u2019OS/2, OS/2 etant le nom generique de ce systeme d\\u2019exploitation. L\\u2019origine de Warp est a rechercher dans le film \\u00ab\\u00a0La guerre des etoiles\\u00a0\\u00bb ou le \\u00ab\\u00a0Warp factor\\u00a0\\u00bb etait un facteur d\\u2019acceleration. Avec l\\u2019OS/2 version 3.0, pour la premiere fois, IBM a abandonne la terminologie traditionnelle, le nom de code Warp, jusqu\\u2019alors confidentiel a ete retenu. On peut d\\u2019ailleurs remarquer que cette confidentialite des noms de code tombe en desuetude, \\u00ab\\u00a0Merlin\\u00a0\\u00bb nom de code de la nouvelle version est imprime sur le CD-ROM de la presente version beta test. Dans le cours de cet article j\\u2019utilise indifferemment Warp et OS/2. Pourquoi OS/2 ? Avant tout, il s\\u2019agissait de pallier les insuffisances du DOS, et de faire beneficier ce nouveau systeme de fonctions usuelles dans les systemes d\\u2019exploitation des grandes machines, ainsi que des avancees ergonomiques initiees par divers centres de recherches tel que le Palo-Alto Research Center et popularisees par le Mac-Intosh ou encore des travaux du Centre de recherche d\\u2019IBM sur le projet GLASS. Les faiblesses du DOS : l\\u2019insuffisance premiere etait avant tout la limitation en matiere d\\u2019adressage. Muni d\\u2019un langage de commande rudimentaire, il permettait l\\u2019execution d\\u2019un seul programme d\\u2019un maximum de 640 ko. De nombreuses astuces ont ete utilisees pour contourner la limitation d\\u2019adressage : utilisation de la zone reservee entre 640 ko et 1\\u00a0024 ko gr\\u00e2ce a des utilitaires qui optimisaient l\\u2019utilisation de cette zone reservee, en principe destinee a accueillir du code de support de futurs peripheriques, cette utilisation se faisait donc aux depens de l\\u2019utilisation future des materiels. Les consequences ont ete genantes, certains utilisateurs se trouvant bloques avec des applications ne tournant qu\\u2019en DOS 3.3 et avec des materiels obsoletes fabriques specialement. Sans parler des autres systemes d\\u2019exploitation compatibles avec lui, le DOS proprement dit en est a la version 7 ; utilisation de techniques de pagination non automatique telles que EMS (\\u00ab\\u00a0 Enhanced Memory Specification\\u00a0\\u00bb) , aussi appelees LIM pour ses concepteurs (Lotus, Intel et Microsoft) ou encore EEMS (\\u00ab\\u00a0 Extended Enhanced Memory Specification\\u00a0\\u00bb ) : ces techniques sont en effet non automatiques car contrairement a une veritable memoire virtuelle, les applications devaient etre programmees de facon specifique ; utilisation d\\u2019une ligne d\\u2019adressage oubliee permettant de gagner encore 64 ko moyennant un driver specifique. Les manques : il s\\u2019agit avant tout de ce que l\\u2019on appelle le multit\\u00e2che, et qui recouvre en fait deux notions assez differentes qui, dans le cas des grands systemes, avaient deux noms differents. Multiprogrammation : c\\u2019est la possibilite de lancer plusieurs programmes simultanement, l\\u2019execution parait simultanee lorsque ces programmes utilisent des ressources differentes. Le cas d\\u2019ecole le plus facile a comprendre est le suivant : un programme utilisant de facon importante des entrees-sorties lentes comme l e clavier l aisse les ressources du processeur disponibles, un autre programme pourra donc les utiliser. Lorsque l\\u2019on lance ces deux programmes, ils s\\u2019executent de facon simultanee. Il y a donc possibilite de simultaneite vraie lorsqu\\u2019il s\\u2019agit de l\\u2019utilisation de ressources differentes. Le systeme se charge de la gestion des ressources et de leur affectation a tel ou tel programme. Il faut noter que c\\u2019est automatique et ne necessite aucune programmation particuliere. Multit\\u00e2che : c\\u2019est la meme notion mais appliquee cette fois a un programme, ce programme est compose de t\\u00e2ches elementaires, il va etre possible d\\u2019orga-niser leur simultaneite. Cela n\\u2019est pas automatique et necessite une program-mation particuliere. Cette technique a ete standardisee par les systemes transactionnels tels que CICS, il est interessant de noter que, bien que tres courante, dans le monde des grands systemes, elle a ete tres peu employee par le monde de la micro-informatique, force est de constater que bien peu des programmes ecrits pour OS/2 par les societes de logiciels utilisent reellement cette possibilite alors qu\\u2019elle est d\\u2019une utilisation tres courante pour ce meme OS/2 dans le cas d\\u2019applications ecrites par l\\u2019utilisateur. L\\u2019avenement de la programmation objet qui, naturellement, entraine un decoupage des applications devrait changer cet etat de fait, d\\u2019ailleurs l\\u2019utilisation de Java facilite largement la programmation d\\u2019applications multit\\u00e2ches. Multitraitement : cette possibilite maintenant courante sur les grands sys-temes est apparue avec la version 2.1 de l\\u2019OS/2. Il s\\u2019agit cette fois d\\u2019activer simultanement plusieurs processeurs. Le fait de disposer de plusieurs processeurs va permettre d\\u2019executer simultanement des t\\u00e2ches de meme nature. Comme tout bon systeme supportant le multitraitement cela se fait de facon totalement transparente, les t\\u00e2ches ou les programmes etant repartis par le systeme sans intervention de l\\u2019utilisateur et sans qu\\u2019il soit necessaire d\\u2019utiliser une programmation specifique. Ergonomie : si la micro-informatique a ses debuts souffrait d\\u2019une absence totale d\\u2019ergonomie. Il a fallu dans le monde du PC attendre le PC-DOS 4.0 d\\u2019IBM pour obtenir une approche un peu plus conviviale. Cela explique la proliferation de systemes de gestion de l\\u2019interface utilisateur ajoutee au DOS. Le plus connu est bien sur Microsoft Windows, qui resout en plus en partie le probleme de l\\u2019adressage avec sa version 3.0, mais il y en a eu d\\u2019autres : Quaterdeck, Topview, etc. Les concepteurs de l\\u2019OS /2 (equipe mixte Microsoft/IBM) ont choisi dans un premier temps une voie moyenne. Avec la prise en main d\\u2019OS/2 par IBM et la separation d\\u2019avec Microsoft, OS/2 a fait l\\u2019objet d\\u2019une refonte totale : tous les elements de l\\u2019interface sont des objets, ont leur propre comportement, toutes les actions peuvent se faire par manipulation d\\u2019icones. Avec Merlin, pour satisfaire au besoin d\\u2019Opendoc qui est une technologie destinee a des systemes d\\u2019exploi-tation varies, il y a presence permanente de barre de menu. Nota\\u00a0: cette description est basee sur la nouvelle version de Warp disponible en francais. Au debut de la redaction de cet article, l\\u2019auteur ne disposait que d\\u2019une version americaine, ce qui peut expliquer certaines denominations non conformes dans le courant de l\\u2019article.\"}, {\"paperId\": \"5fed4ee20fcbf33ab2cc23138afb78279ada606f\", \"externalIds\": {\"CorpusId\": 18661784}, \"title\": \"This Reprint May Differ from the Original in Pagination and Typographic Detail. Differing Daphnia Magna Assimilation Efficiencies for Terrestrial, Bacterial, and Algal Carbon and Fatty Acids Differing Daphnia Magna Assimilation Efficiencies for Terrestrial, Bacterial, and Algal Carbon