me\": \"Sarianna Sipil\\u00e4\"}], \"abstract\": null}, {\"paperId\": \"93fcda86e1d7b4501f72d97a074361e2335bda05\", \"externalIds\": {\"MAG\": \"2585294494\", \"CorpusId\": 64288533}, \"title\": \"\\\"WG Strain Series\\\" (pages 51-75)\", \"venue\": \"\", \"year\": 1950, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2103455\", \"name\": \"J. Lederberg\"}], \"abstract\": null}, {\"paperId\": \"950b0d649b5eb3b8307770a1fef523c3a98b05f6\", \"externalIds\": {\"CorpusId\": 4650248}, \"title\": \"A cc ep te d A rti cl e Unilateral Vestibular Schwannoma and Meningiomas in a Patient with PIK 3 CA-Related Segmental Overgrowth : Co-occurrence of Mosaicism for Two Rare Disorders\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.brainlife.org/fulltext/2017/Mills_JR171129_ClinGenet.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145145100\", \"name\": \"J. Mills\"}, {\"authorId\": \"2007407\", \"name\": \"A. Moyer\"}, {\"authorId\": \"5992924\", \"name\": \"B. Kipp\"}, {\"authorId\": \"46885989\", \"name\": \"A. Poplawski\"}, {\"authorId\": \"116479897\", \"name\": \"L. Messiaen\"}, {\"authorId\": \"115321931\", \"name\": \"D. Babovic\\u2010Vuksanovic\"}], \"abstract\": null}, {\"paperId\": \"95f80601214a09e610df75b9c20c4bc3c44c9054\", \"externalIds\": {\"MAG\": \"2945574777\", \"DOI\": \"10.1111/EUFM.12231\", \"CorpusId\": 182927637}, \"title\": \"Individual risk tolerance and herding behaviors in financial forecasts\", \"venue\": \"European Financial Management\", \"year\": 2019, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://research.cbs.dk/files/60027988/jeppe_christoffersen_et_al_individual_risk_tolerance_acceptedversion.pdf\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/EUFM.12231?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/EUFM.12231, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"117434962\", \"name\": \"Jeppe Christoffersen\"}, {\"authorId\": \"134762178\", \"name\": \"Simone St\\u00e6hr\"}], \"abstract\": \"Financial analysts tend to demonstrate herding behaviour, which sometimes compromises accuracy. A number of explanations spanning rational economic logic, cognitive biases, and social forces have been suggested. Relying on an experimental setting where participants forecast future earnings from a rich information set, we posit and obtain 1 We are grateful for discussions and comments from Steffen Andersen, Thomas Plenborg, Melanie Schneider and Thomas Riise Johansen at Copenhagen Business School, from Niclas Hellman at Stockholm School of Economics, from Richard Barker at University of Oxford, from Mitchel Stevens and Brian Knutson at Stanford University, from participants at the Bernheim Idea Workshop and at the SCANCOR Friday Seminar Series at Stanford University, at the PhD Seminar Series at Copenhagen Business School and at the Behavioral Finance Working Group Conference at Queen Mary University of London. Finally we are grateful for comments and suggestions from two anonymous referees and Editor John Doukas. Special thanks go to the graduate students that volunteered to participate in the experiment and to our colleagues who assisted in pre-tests of the experiment design. The views expressed in this paper are not necessarily reflected by the views of others and any possible mistakes are on our own. This article has been accepted for publication and undergone full peer review but has not been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1002/eufm.12231. This article is protected by copyright. All rights reserved. A cc ep te d A rt ic le support for individual risk tolerance (or lack thereof) as an explanatory variable for herding behaviours. Specifically, less risk tolerant individuals forecast with less boldness and instead issue forecasts in agreement with the consensus forecast. The results are argued to be at least partially a product of cognitive biases and an intuitive reaction to uncertainty.\"}, {\"paperId\": \"96292ce62e864632927aa5e6aec81c70c29ba9e8\", \"externalIds\": {\"CorpusId\": 115212230}, \"title\": \"A cc ep te d A rti cl e The relationship between HP infection and vomiting induced by gastrointestinal cancer chemotherapy\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"84487068\", \"name\": \"Yao Yiwei\"}, {\"authorId\": \"52013219\", \"name\": \"Ji Chu-shu\"}, {\"authorId\": \"51984323\", \"name\": \"He Yifu\"}, {\"authorId\": \"2098223970\", \"name\": \"Pan Yueyin\"}], \"abstract\": null}, {\"paperId\": \"969fdf8ef2f707321ceec00bcddd7408a704dc6a\", \"externalIds\": {\"CorpusId\": 263362217}, \"title\": \"Influence of adenomyosis on pregnancy and perinatal outcomes in women with endometriosis: Adenomyosis and pregnancy outcome\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://endometriozisdernegi.org/konu/dosyalar/pdf/makale_ozetleri/Aralik2017/makale3.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34868695\", \"name\": \"C. Scala\"}, {\"authorId\": \"2194837234\", \"name\": \"U. L. R. Maggiore\"}, {\"authorId\": \"46620866\", \"name\": \"A. Racca\"}, {\"authorId\": \"2083363103\", \"name\": \"F\\u00e1bio\"}, {\"authorId\": \"2250281059\", \"name\": \"Barra\"}, {\"authorId\": \"5100796\", \"name\": \"V. Vellone\"}, {\"authorId\": \"7919874\", \"name\": \"P. Venturini\"}, {\"authorId\": \"2239995985\", \"name\": \"S. Ferrero\"}], \"abstract\": null}, {\"paperId\": \"97385c6193ceaa501f48fdc98f7387062ddfc2e7\", \"externalIds\": {\"MAG\": \"2886122383\", \"DOI\": \"10.1002/JCTB.5795\", \"CorpusId\": 105114738}, \"title\": \"Solid phosphoric acid catalysts based on mesoporous silica for levoglucosenone productionviacellulose fast pyrolysis\", \"venue\": \"Journal of Chemical Technology & Biotechnology\", \"year\": 2018, \"citationCount\": 18, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ri.conicet.gov.ar/bitstream/11336/91248/2/CONICET_Digital_Nro.2e68211f-b813-436b-9327-34b1d3fe74a1_A.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/JCTB.5795?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/JCTB.5795, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"92772178\", \"name\": \"Jos\\u00e9 A. Santander\"}, {\"authorId\": \"144724722\", \"name\": \"Mariana Alvarez\"}, {\"authorId\": \"51264878\", \"name\": \"V. Gutierrez\"}, {\"authorId\": \"47252195\", \"name\": \"M. Volpe\"}], \"abstract\": \"BACKGROUND: Biochemicals are interesting alternatives for biomass valorization owing to their much higher added value compared to biofuels and energy products. Several methods for the production of valuable chemicals such as levoglucosenone (LGO) via thermochemical processes over solid acid catalysts are being investigated due to their important advantages compared to conventional biomass acid impregnation techniques. The present work explores the synthesis of catalytic materials for the production of this platform molecule. This article is protected by copyright. All rights reserved. This article has been accepted for publication and undergone full peer review but has not been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1002/jctb.5795 A cc ep te d A rti cl e RESULTS: Aluminum-loaded SBA-15 mesoporous silica and the corresponding solid phosphoric acid catalysts were prepared, characterized by TEM, FT-IR, MAS NMR, NH3-TPD, N2 adsorption, ICP-AES and titration of \\u201cfree H3PO4\\u201d, and tested in cellulose fast pyrolysis. Post synthesis Al deposition on the silica support produced an increase of bio-oil yield and LGO amount in pyrolysis products. The presence of Al in solid phosphoric acid (SPA) catalysts led to the formation of aluminum phosphates, decreasing the concentration of H3PO4 species in the surface and therefore the LGO levels. The SPAs presented relatively high LGO levels in the GC-MS detectable liquid products (up to 85 peak area%) which was found to be correlated with the amount of free H3PO4 in the solid catalysts. CONCLUSION: Aluminum grafting over SBA-15 is an effective way to increase the selectivity to the target anhydrosaccharide. In SPAs, the presence of Al reduced the easily leachable H3PO4 amount, which is desirable from the point of view of catalyst stability since deactivation is mainly caused by H3PO4 leaching, but also led to lower levels of LGO in bio-oil.\"}, {\"paperId\": \"9892f1945c4050ab3dc80b17e097fbd01a6db51a\", \"externalIds\": {\"CorpusId\": 207871238}, \"title\": \"A cc ep te d A rti cl e Raspberry ketone supplements promotes early sexual maturation in male Queensland fruit fly , Bactrocera tryoni ( Diptera : Tephritidae ) Raspberry ketone supplements promotes early sexual maturation in male Qfly\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"13198990\", \"name\": \"Humayra Akter\"}, {\"authorId\": \"145277272\", \"name\": \"V. Mendez\"}, {\"authorId\": \"39502827\", \"name\": \"R. Morelli\"}, {\"authorId\": \"48422200\", \"name\": \"Jeanneth P\\u00e9rez\"}, {\"authorId\": \"145489532\", \"name\": \"Phillip W Taylor\"}], \"abstract\": null}, {\"paperId\": \"9ce66767723f6404ae29812a6464faebfa15fc65\", \"externalIds\": {\"CorpusId\": 207775386}, \"title\": \"Nitrogen and water inputs to tomato plant do not trigger bottom-up effects on a leaf miner parasitoid through host and non-host exposures Running title : Cascading effects on a leaf miner parasitoid\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"50776789\", \"name\": \"Yongcheng Dong\"}, {\"authorId\": \"5847577\", \"name\": \"P. Han\"}, {\"authorId\": \"5666625\", \"name\": \"C. Niu\"}, {\"authorId\": \"5988420\", \"name\": \"L. Zappal\\u00e0\"}, {\"authorId\": \"1402949949\", \"name\": \"Edwige Amiens-Desneux\"}, {\"authorId\": \"5675269\", \"name\": \"P. B\\u00e9arez\"}, {\"authorId\": \"91392290\", \"name\": \"A. Lavoir\"}, {\"authorId\": \"50200398\", \"name\": \"A. Biondi\"}, {\"authorId\": \"3684316\", \"name\": \"N. Desneux\"}], \"abstract\": null}, {\"paperId\": \"9ea33765684eebb4d3d45c745bc3c1eb4db7429f\", \"externalIds\": {\"MAG\": \"2960134070\", \"DOI\": \"10.15835/NBHA47311466\", \"CorpusId\": 201195710}, \"title\": \"The Impact of Ammonium to Nitrate Ratio on the Growth and Nutritional Status of Kale\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11466/8803\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311466?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311466, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"83182082\", \"name\": \"A. Assimakopoulou\"}, {\"authorId\": \"13871301\", \"name\": \"I. Salmas\"}, {\"authorId\": \"1380941971\", \"name\": \"Nikolaos Kounavis\"}, {\"authorId\": \"1380941964\", \"name\": \"Alexandros I. Bastas\"}, {\"authorId\": \"2257513\", \"name\": \"Vasiliki Michopoulou\"}, {\"authorId\": \"80599195\", \"name\": \"E. Michail\"}], \"abstract\": \"The effect of four NH4:NO3 ratios in the nutrient solution (0:100; 25:75; 50:50 and 75:25) on growth and nutrient concentrations of four kale (Brassica oleraceae L. var. acephala) hybrids: \\u2018CN KAL 1029\\u2019, \\u2018Redbor\\u2019, \\u2018Winnetou\\u2019, \\u2018Reflex\\u2019 and\\u00a0 one indigenous cultivar: \\u2018Ntopia Mytilinis\\u2019 was investigated. In the first four weeks of cultivation none of the NH4/NO3 ratios applied induced adverse effects on most growth characteristics determined whereas plants grown with 75% NH4-N accumulated higher leaf N, P, K, Fe, Mn, Zn and Cu concentrations. After an eight week period, plants under 75% NH4-N showed significant reductions in many growth parameters suggesting a probable preference of kale plants grown for a prolonged period towards either a complete exclusion of NH4 from the nutrient solution or a 25:75 or a 50:50 NH4/NO3 ratio. Among the genotypes tested, \\u2018Ntopia Mytilinis\\u2019 produced the greatest yield with the lowest leaf nitrate accumulation.\\u00a0 \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"9fffb76cb6842640d574928b62a9373830d24a55\", \"externalIds\": {\"CorpusId\": 248378734}, \"title\": \"Caliber Relationship with Arterial Stiffness and Nocturnal Dipping Status.\", \"venue\": \"\", \"year\": 2022, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://jag.journalagent.com/erciyesmedj/pdfs/EMJ-18828-ORIGINAL_ARTICLE-GUVEN.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"40554818\", \"name\": \"Soner Guven\"}, {\"authorId\": \"1410541838\", \"name\": \"Abdullah Burak Uygur\"}, {\"authorId\": \"4807150\", \"name\": \"K. Sa\\u011flam\"}, {\"authorId\": \"3546113\", \"name\": \"F. Bulucu\"}, {\"authorId\": \"70275018\", \"name\": \"A. Hakan\"}, {\"authorId\": \"2163458133\", \"name\": \"Durukan\"}], \"abstract\": null}, {\"paperId\": \"a08b8472e00b63a1ca803f3b93b97b93bc043cac\", \"externalIds\": {\"CorpusId\": 19019563}, \"title\": \"Developing and Psychometric Testing of a Questionnaire for Patient Participation in Emergency Departments\", \"venue\": \"\", \"year\": null, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.diva-portal.org/smash/get/diva2:361087/FULLTEXT03, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2255298317\", \"name\": \"Catharina Frank Rnt\"}, {\"authorId\": \"2255282555\", \"name\": \"Margareta Asp Rnt\"}, {\"authorId\": \"2255313696\", \"name\": \"Bengt Fridlund Rnt\"}], \"abstract\": null}, {\"paperId\": \"a0ca4e0f5d56cd9996bb1620cc7aa1a52cd1705c\", \"externalIds\": {\"MAG\": \"2939058498\", \"DOI\": \"10.15835/NBHA47311401\", \"CorpusId\": 145938625}, \"title\": \"Influence of Selected Antibiotics on the Tomato Regeneration in In Vitro Cultures\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 17, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11401/8770\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311401?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311401, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"6702906\", \"name\": \"Aneta Gerszberg\"}, {\"authorId\": \"1401915387\", \"name\": \"Izabela Grzegorczyk-Karolak\"}], \"abstract\": \"Generally, antimicrobial agents are frequently used in micropropagation techniques to obtain free elite clones or after genetic transformation to select putative transformants. Their successful application minimizes bacterial contamination however; they may be phytotoxic and may diversely affect the regeneration ability in plant tissue cultures. The objective of the current study was to estimate the effects of four antibiotics i.e. ampicillin, carbenicillin, cefotaxime and kanamycin on morphogenesis of three Polish tomato cultivars, cultured on MS medium with phytohormones. In this experiment the ability of tomato cotyledon explants to regenerate entire plants via indirect organogenesis was tested. Among four antibiotics tested, kanamycin was most harmful for the explants. This antibiotic, even at low doses (10-20 mg/L), inhibited tomato morphogenesis. On the other hand, the current study revealed significant influence of different concentrations of ampicillin, carbenicillin, cefotaxime on the frequency of bud formation. While the addition of cefotaxime at low concentration (100-200 mg/L) stimulated the bud formation, its increasing concentration adversely affected the organogenesis of tomato. The results clearly pointed out that carbenicillin and ampicillin at low concentrations (100-400 mg/L) were not only non-toxic, but they promoted bud regeneration. The obtained results show the crucial role not only of use of efficient antibiotics, but also of their proper doses in obtaining successful transformation and regeneration of tomato. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI). DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"a1