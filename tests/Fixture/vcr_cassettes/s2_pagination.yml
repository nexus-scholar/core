"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11597/8817\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/nbha47311597?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/nbha47311597, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2612969\", \"name\": \"P. Zandi\"}, {\"authorId\": \"6093383\", \"name\": \"K. Mo\\u017cd\\u017ce\\u0144\"}, {\"authorId\": \"1403702284\", \"name\": \"B. Barabasz-Krasny\"}, {\"authorId\": \"1412938857\", \"name\": \"J. Pu\\u0142a\"}, {\"authorId\": \"1403702275\", \"name\": \"A. Stachurska-Swako\\u0144\"}, {\"authorId\": \"26594828\", \"name\": \"Yaosheng Wang\"}], \"abstract\": \"Plants introduce chemicals into the environment that can be toxic, both for themselves and for other species. Weed infestation of crops is a competition for environmental resources, but at the same time is a source of chemical substances released into the soil, often reducing yield potential. The paper attempts to investigate the allelopathic interaction of aquatic extracts from dry shoots of chickweed Stellaria media L. on germination and development of maize Zea mays L. seedlings of \\u2018San\\u2019, \\u2018Kidemos\\u2019 and \\u2018DKC 3441\\u2019 cultivars. Along with the increase in the concentration of allelopathic substances, a decrease in the germination activity of all tested maize cultivars was observed. Germination percentage as like percentage of control was the highest for seeds germinating on substrates with 1% chickweed extracts and the lowest for seeds watered with 5% extracts. Biometric measurements of seedlings showed that the most sensitive cultivar of maize was \\u2018DKC 3441\\u2019, and the resistant cultivar \\u2018San\\u2019. The relative water content was the highest for seedlings grown on the 5% extracts. Significant differences in the amount of fresh and dry masses of maize seedlings were demonstrated at the highest concentrations of extracts compared to the control. A significant increase in electrolyte leakage compared to the control sample was found in the \\u2018Kidemos\\u2019 cultivar. The lowest differences in the destabilization of the ionic transport through cell membranes for the \\u2018DKC 3441\\u2019 cultivar were demonstrated. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"f0bbee4a1ed5a86f1e59eb9273568dfbf0110c76\", \"externalIds\": {\"MAG\": \"2034240652\", \"CorpusId\": 260555940}, \"title\": \"Research in education\", \"venue\": \"\", \"year\": 1970, \"citationCount\": 238, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"47192948\", \"name\": \"J. Best\"}, {\"authorId\": \"80729683\", \"name\": \"J. Kahn\"}], \"abstract\": null}, {\"paperId\": \"f1a14ba16d5fb64d0ef4a91eeddde0d67e5c7984\", \"externalIds\": {\"MAG\": \"2951100304\", \"DOI\": \"10.15835/NBHA47311388\", \"CorpusId\": 196648389}, \"title\": \"Cross Compatibility Analysis to Identify Suitable Parents of Tagetes erecta and T. patula for Heterotic Hybrid Breeding\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11388/8784\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311388?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311388, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2143622594\", \"name\": \"Hua-li Zhang\"}, {\"authorId\": \"2994290\", \"name\": \"H. Xin\"}, {\"authorId\": \"40155067\", \"name\": \"R. Cong\"}, {\"authorId\": \"2118273385\", \"name\": \"Zijing Li\"}, {\"authorId\": \"50259040\", \"name\": \"Lina Song\"}, {\"authorId\": \"6122608\", \"name\": \"Zunzheng Wei\"}], \"abstract\": \"Seven interspecific crosses of Tagetes erecta \\u00d7 T. patula were conducted in this study. The cross compatibility index, seed setting rate, germination rate, phenotype, ploidy level, heterosis over male parent and field performance were tested. The results showed that different cross compatibility indices of Tagetes vary greatly, from 10.44~114.41, which is far less than that of the intraspecific hybridization S-121 \\u00d7 I-506 index. The seed setting rate of each cross ranged from 15.67% to 49.0%, and the cross S-121 \\u00d7 TP-512 scored the highest seed setting rate, which was higher than that of the intraspecific cross S-121 \\u00d7 I-506 (35.85%). Compared with the male parent, F1 has higher plant height, wider crown width, larger flower diameter and more ray florets and earlier bloom with two exceptions. The S-121 of T. erecta was diploid. All of the male parents of T. patula were tetraploids, and the combinations were triploids. The traits of plant height, plant width, flower size and number of ray florets showed positive heterosis over the male parents, and the days leading to flowering showed both positive and negative ones. Finally, S-121 \\u00d7 TP-379 and S-121 \\u00d7 TP-512 were selected as the two best combinations. This study confirmed that the two species of marigold could be crossed for better F1 varieties with improved performance. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI). DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"f4e041dbd64ad937cfb46f615f8c04bc4a91f7a8\", \"externalIds\": {\"MAG\": \"786557667\", \"DOI\": \"10.31274/RTD-180813-15821\", \"CorpusId\": 60412511}, \"title\": \"Implementation of a XQuery engine for large documents in CanstoreX\", \"venue\": \"\", \"year\": 2007, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://lib.dr.iastate.edu/cgi/viewcontent.cgi?article=15636&context=rtd\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.31274/RTD-180813-15821?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.31274/RTD-180813-15821, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"69342043\", \"name\": \"Srikanth Krithivasan\"}], \"abstract\": null}, {\"paperId\": \"f5fa51f5642ecefef12b96fb49cc2f2170e0b7a9\", \"externalIds\": {\"MAG\": \"2390706868\", \"CorpusId\": 63991604}, \"title\": \"Efficiency Analysis of Three Kinds of Data Pagination Methods\", \"venue\": \"\", \"year\": 2009, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"66768037\", \"name\": \"Lin Yingming\"}], \"abstract\": null}, {\"paperId\": \"f6ce7667978afd108129bef87f9b4d2b6486bda9\", \"externalIds\": {\"CorpusId\": 263878404}, \"title\": \"Access to the Published Version May Require Subscription. Published with Permission From: World Scientific Gene Ontology-based Semantic Alignment of Biological Pathways by Evolutionary Search\", \"venue\": \"\", \"year\": null, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"1710951\", \"name\": \"Jonas Gamalielsson\"}], \"abstract\": null}, {\"paperId\": \"f7108dbf4063349ba1b042ad6ed66776d392e641\", \"externalIds\": {\"CorpusId\": 207774709}, \"title\": \"SGLT 2 and SGLT 1 renal expression in patients with type 2 diabetes\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"3494771\", \"name\": \"A. Solini\"}, {\"authorId\": \"32597318\", \"name\": \"C. Rossi\"}, {\"authorId\": \"40483801\", \"name\": \"C. Mazzanti\"}, {\"authorId\": \"144686386\", \"name\": \"A. Proietti\"}, {\"authorId\": \"6303820\", \"name\": \"H. Koepsell\"}, {\"authorId\": \"5422597\", \"name\": \"E. Ferrannini\"}], \"abstract\": null}, {\"paperId\": \"f96bab4c2b21dcd45907ce4470a2b7d4526e63a5\", \"externalIds\": {\"MAG\": \"3203165446\", \"DOI\": \"10.1016/j.procs.2021.08.108\", \"CorpusId\": 244332281}, \"title\": \"WebT-IDC: A Web Tool for Intelligent Dataset Creation A Use Case for Forums and Blogs\", \"venue\": \"Procedia Computer Science\", \"year\": 2021, \"citationCount\": 7, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1016/j.procs.2021.08.108\", \"status\": \"GOLD\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1016/j.procs.2021.08.108?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/j.procs.2021.08.108, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2141188666\", \"name\": \"Boudabous Maroua\"}, {\"authorId\": \"2141185992\", \"name\": \"Pappa Anna\"}], \"abstract\": \"Abstract This paper presents WebT-IDC, an end-to-end Web Tool for Intelligent Dataset Creation, able to construct noiseless corpora of feedback on different topics in any language, from web forums and blogs. The method is based on a unique extraction model of pagination element pattern, independent of DOM structure. WebT-IDC is a holistic tool covering all stages, from user\\u2019s query, crawling and scraping web pages and extracting relevant data, to building text corpora, free from boilerplate and repetitive data, useful in machine learning tasks. The output is a partially labeled dataset, accurate to reflecting a realistic vision of the market, tested in a Transformer based model in order to show the relevance for immediate use in ML task, offering high accuracy in polarity, language and product recognition. The system is evaluated in terms of noise filtering efficiency and computing time as well as precision and recall.\"}, {\"paperId\": \"faf6ec9f08ab389f30de8473b0fb8466b8249a06\", \"externalIds\": {\"MAG\": \"577090044\", \"CorpusId\": 59960184}, \"title\": \"Beginning Ruby on Rails\", \"venue\": \"\", \"year\": 2006, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"52062934\", \"name\": \"S. Holzner\"}], \"abstract\": null}, {\"paperId\": \"fb7b0b6e99b0fa0e0446bf6ab0c3a246f5938853\", \"externalIds\": {\"MAG\": \"3180189833\", \"DOI\": \"10.2139/ssrn.3603133\", \"CorpusId\": 238115840}, \"title\": \"Indexing \\u2013 From the Past Overview\", \"venue\": \"Social Science Research Network\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.2139/ssrn.3603133?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2139/ssrn.3603133, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2129876585\", \"name\": \"Geethu Eluvathingal\"}], \"abstract\": \"A kind of reference record was first found in the twelfth century in Hebrew. Before books were made, one of the essential kinds of formed material they used was the papyrus scroll. Before the advancement of printing book ordering had limited. Since no two copies were identical with a comparative pagination. The propelled printing time frame started from the year 1440. Concordances is basically an in consecutive request once-over of the words present in a book or messages, generally with references of the passage stressed over the substance appeared. There were three factors that incited the improvement of reference requesting, in 1950's. During the 1960s, Eugene Garfield and Associates made two pilot broadens that would test the reasonableness and capability of reference requesting. Computer has been a supporter in conveying existing kinds of records and made possible the establishment of gigantic databases. Indexing in this new period sense, giving exact zones of names and subjects in a book, were not joined in antiquated occasions, and doubtlessly, very few seem to have been made before the hour of printing.\"}, {\"paperId\": \"fb9a305be25425d3874df7e48bf19c2f054db0bc\", \"externalIds\": {\"MAG\": \"2076857952\", \"DOI\": \"10.1136/emj.7.3.235\", \"CorpusId\": 39398527, \"PubMed\": \"2152469\"}, \"title\": \"Now where did I put that paper?: A simple reference syst