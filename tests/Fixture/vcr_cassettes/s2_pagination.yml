68\", \"name\": \"J. Zhang\"}, {\"authorId\": \"2856400\", \"name\": \"T. Ketola\"}, {\"authorId\": \"2431219644\", \"name\": \"\\u00d6rm\\u00e4l\\u00e4-Odegrip\"}, {\"authorId\": \"2144177434\", \"name\": \"Ji Zhang\"}, {\"authorId\": \"2856400\", \"name\": \"T. Ketola\"}, {\"authorId\": \"2431219289\", \"name\": \"Anni-Maria O \\u00a8 Rm\\u00e4 L\\u00e4-Odegrip\"}, {\"authorId\": \"5088763\", \"name\": \"J. Mappes\"}, {\"authorId\": \"4658046\", \"name\": \"B. Vinatzer\"}, {\"authorId\": \"2230786297\", \"name\": \"Virginia Tech\"}], \"abstract\": null}, {\"paperId\": \"407e932c4bb6201b397e0f3a2d38a12848331511\", \"externalIds\": {\"CorpusId\": 201703335}, \"title\": \"Metals in aqueous solutions and real effluents : Biosorption behavior onto a hemp-based felt ( Short title : Metal removal by a hemp-based felt )\", \"venue\": \"\", \"year\": 2019, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://hal.archives-ouvertes.fr/hal-02130081/document, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"93200105\", \"name\": \"S. Loiacono\"}, {\"authorId\": \"8655168\", \"name\": \"G. Crini\"}, {\"authorId\": \"93295661\", \"name\": \"Gilles Chanet\"}, {\"authorId\": \"93702318\", \"name\": \"Marina Raschetti\"}, {\"authorId\": \"2088110293\", \"name\": \"Vincent\"}, {\"authorId\": \"82773567\", \"name\": \"Placet\"}, {\"authorId\": \"10702049\", \"name\": \"N. Crini\"}], \"abstract\": null}, {\"paperId\": \"41213f5b79b4c648f33a78be7417f9be8459c9d1\", \"externalIds\": {\"MAG\": \"117380686\", \"CorpusId\": 160949540}, \"title\": \"Ibn Sahula's Tale of the Egyptian Sorcerer: A Thirteenth Century Don Yll\\u00e1n\", \"venue\": \"\", \"year\": 2004, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.ehumanista.ucsb.edu/sites/secure.lsit.ucsb.edu.span.d7_eh/files/sitefiles/ehumanista/volume4/Wacks.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"117622241\", \"name\": \"D. Wacks\"}], \"abstract\": null}, {\"paperId\": \"42b9d2a5907531a3d154385852faccb1be592046\", \"externalIds\": {\"MAG\": \"2996930083\", \"DOI\": \"10.15835/nbha47411653\", \"CorpusId\": 210898986}, \"title\": \"Development of an Efficient \\u2018One-Step Freezing\\u2019 Cryopreservation Protocol for a Georgian Provenance of Chestnut (Castanea sativa Mill.) Zygotic Embryos\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 5, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11653/8829\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/nbha47411653?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/nbha47411653, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11502954\", \"name\": \"M. Gaidamashvili\"}, {\"authorId\": \"88891791\", \"name\": \"E. Khurtsidze\"}, {\"authorId\": \"47693120\", \"name\": \"C. Benelli\"}, {\"authorId\": \"5247217\", \"name\": \"M. Lambardi\"}], \"abstract\": \"Experiments were performed to determine the influence of various dehydration and vitrification treatment times on the \\u2018one-step freezing\\u2019 cryopreservation of embryonic axes (EAs), composed of zygotic embryos and cotyledon residuals, from mature seeds of a Georgian provenance of chestnut (Castanea sativa Mill.). Dehydration was carried out in laminar flow hood from 1 to 5 h, and vitrification experiments were carried out by immersion of EAs in PVS2 vitrification solution up to 120 min, both followed by direct immersion in liquid nitrogen. Both systems resulted in inducing specimen tolerance to ultra-rapid freezing, although to a different extent. Full germination of cryo-stored EAs after 5 h of dehydration (reducing moisture content from initial 66% to 21%) has been increased from 0% to 66.7%. A pre-treatment of EAs in PVS2 vitrification solution for 30 min produced fully developed plantlets at a rate of 55.6% in post-cryopreservation. Plantlet regrowth from cryopreservation was faster in EAs that underwent the dehydration/\\u2018one-step freezing\\u2019 procedure. All the plantlet from cryopreserved EAs could be easily acclimatized, producing healthy potted plants. Finally, the TTC test showed to be useful for a fast evaluation of specimen survival after thawing and, as a consequence, to speed up the development of optimized cryo-protocols. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 4, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"45eebf97823c3ba0eec2c74649d104e85ba9eeeb\", \"externalIds\": {\"CorpusId\": 141057832}, \"title\": \"The influence of chorionicity and gestational age at single fetal loss on the risk of preterm birth in twin pregnancies : analysis of the STORK multiple pregnancy cohort\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://openaccess.sgul.ac.uk/108579/9/uog17426.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1396490461\", \"name\": \"F. D\\u2019Antonio\"}, {\"authorId\": \"7843573\", \"name\": \"B. Thilaganathan\"}, {\"authorId\": \"36117657\", \"name\": \"T. Dias\"}, {\"authorId\": \"144875875\", \"name\": \"A. Khalil\"}], \"abstract\": null}, {\"paperId\": \"4655c533c27ca5c4a57cdc3d354cff20e849caa2\", \"externalIds\": {\"MAG\": \"2569430868\", \"CorpusId\": 113771509}, \"title\": \"Work Zone Speed Control\", \"venue\": \"\", \"year\": 2009, \"citationCount\": 12, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://www.codot.gov/programs/research/pdfs/2009/workzonespeed.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"94573223\", \"name\": \"W. Outcalt\"}], \"abstract\": null}, {\"paperId\": \"46e05b80fd2176cb15098feba514a9ff0ccabf13\", \"externalIds\": {\"MAG\": \"2958064962\", \"DOI\": \"10.15835/NBHA47311477\", \"CorpusId\": 199604253}, \"title\": \"High-Density Kinetic Analysis of the Metabolomic and Transcriptomic Response of Ginkgo biloba Flavonoids Biosynthesis to Selenium Treatments\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 14, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.15835/nbha47311477\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311477?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311477, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2111818835\", \"name\": \"Linling Li\"}, {\"authorId\": \"38383849\", \"name\": \"Jie Yu\"}, {\"authorId\": \"6142855\", \"name\": \"Honghui Yuan\"}, {\"authorId\": \"148168975\", \"name\": \"Sanxing Zha\"}, {\"authorId\": \"2068923356\", \"name\": \"Kun Deng\"}, {\"authorId\": \"151498760\", \"name\": \"X. Xiao\"}, {\"authorId\": \"11427565\", \"name\": \"Yanyan Luo\"}, {\"authorId\": \"2353685915\", \"name\": \"Shui-yuan Cheng\"}, {\"authorId\": \"88190738\", \"name\": \"Hua Cheng\"}], \"abstract\": \"As one of the rare and precious wood species since the ancient times, Gingko is also known as \\u201cliving fossil\\u201d, which is a special plant resource of China. Gingko leaves, containing rich flavonoids, are valued with great medicinal significances. This paper treated Ginkgo seedlings by exogenous Sodium selenite (SS) in two ways: Foliage dressing (FD) and Root application (RA). Then transcriptome sequencing and metabolome test are performed. Results show that external SS has significant influence on the related gene expression level of flavonoids synthesis ways of Gingko, the FD can significantly induce gene expressions as CHS, FLS, FOMT, PAL, MYB1 and MYB2, and RA can significantly induce gene expressions as FOMT, MYB1 and MYB2. Compared with the control group, FA selenium application can help to accumulation of flavonoids, flavonols, flavonoids-C and isoflavones, especially quercetin and kaempferol that had a remarkable increase. This proved that a proper concentration of inorganic SS could promote the synthesis and accumulation of flavonoids in Gingko. qRT-PCR analysis also depicts that leaves treatment of sodium selenite can remarkably enhance the gene expression of CHS, FLS, FOMT and PAL, and RA selenium application can induce the gene expression of FLS and FOMT, but restrain the gene expression of CHS and PAL. Through the ways of FD and RA selenium application, this paper basically studied the regulatory effect of SS on ginkgo flavonoids synthesis and has laid a theoretical basis to improve flavonoids content in Ginkgo leaves through cultivation control means. \\n\\u00a0 \\n********* \\n\\u00a0 \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n\\u00a0 \\n*********\"}, {\"paperId\": \"47545ab140b74bfbab42acf28d7f75ff38704212\", \"externalIds\": {\"DOI\": \"10.1017/S0002731600099650\", \"CorpusId\": 245676485}, \"title\": \"Publications Received\", \"venue\": \"American Antiquity\", \"year\": 1975, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1017/S0002731600099650?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1017/S0002731600099650, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"113812184\", \"name\": \"A. G. Kilpatrick\"}], \"abstract\": null}, {\"paperId\": \"48302c20820948d6fa3e233249c8e73cb77f2b1b\", \"externalIds\": {\"CorpusId\": 837772}, \"title\": \"This Reprint May Differ from the Original in Pagination and Typographic Detail. Absence of Sex Differential Plasticity to Light Availability during Seed Maturation in Geranium Sylvaticum Absence of Sex Differential Plasticity to Light Availability during Seed Maturation in Geranium Sylvaticum\", \"venue\": \"\", \"year\": null, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"34578151\", \"name\": \"S. Varga\"}, {\"authorId\": \"2431226170\", \"name\": \"Ester Laaksonen\"}, {\"authorId\": \"4725992\", \"name\": \"P. Siikam\\u00e4ki\"}, {\"authorId\": \"4496932\", \"name\": \"M. Kyt\\u00f6viita\"}, {\"authorId\": \"34578151\", \"name\": \"S. Varga\"}, {\"authorId\": \"4496932\", \"name\": \"M. Kyt\\u00f6viita\"}, {\"authorId\": \"34578151\", \"name\": \"S. Varga\"}, {\"authorId\": \"2431226170\", \"name\": \"Ester Laaksonen\"}, {\"authorId\": \"4725992\", \"name\": \"P. Siikam\\u00e4ki\"}], \"abstract\": null}, {\"paperId\": \"4b4d0caf78f8d99e34f4a8c84e6438ba7ec8e170\", \"externalIds\": {\"MAG\": \"2770831962\", \"CorpusId\": 65009103}, \"title\": \"Extending the internet of things platform OM2M for the purpose ofstoring large amounts of data\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"71278415\", \"name\": \"Matej Andol\\u0161ek\"}], \"abstract\": null}, {\"paperId\": \"4d89ee685772bc5483c163f1f79c7030879230ce\", \"externalIds\": {\"MAG\": \"1988715664\", \"DOI\": \"10.1117/12.963899\", \"CorpusId\": 108895183}, \"title\": \"Grey Component Replacement Research, Modelling Tone And Color Reproduction\", \"venue\": \"Other Conferences\", \"year\": 1990, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1117/12.963899?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1117/12.963899, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"72953692\", \"name\": \"R. S. Fisch\"}], \"abstract\": null}, {\"paperId\": \"4f26f0ef98322e618d3a0e75e882c6906171cb60\", \"externalIds\": {\"MAG\": \"3088704083\", \"DOI\": \"10.4103/NJM.NJM_116_20\", \"CorpusId\": 222181348}, \"title\": \"Common errors in proposals and dissertations and how to avoid them: A resident's guide\", \"venue\": \"Nigerian Journal of Medicine\", \"year\": 2020, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.4103/njm.njm_116_20\", \"status\": \"GOLD\", \"license\": \"CCBYNCSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.4103/NJM.NJM_116_20?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.4103/NJM.NJM_116_20, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"66907695\", \"name\": \"O. Ede\"}, {\"authorId\": \"6141399\", \"name\": \"C. Nwadinigwe\"}, {\"authorId\": \"48723567\", \"name\": \"I. Ogbonnaya\"}, {\"authorId\": \"12093718\", \"name\": \"G. Eyichukwu\"}, {\"authorId\": \"2001372915\", \"name\": \"Chukwuemeka Eze\"}, {\"authorId\": \"80917609\", \"name\": \"A. Katchy\"}, {\"authorId\": \"1396463306\", \"name\": \"Ugochukwu U. Enweani\"}], \"abstract\": \"Background: The dissertation is now a necessary part of the fellowship examinations of both the West African college of surgeons and physicians and the national postgraduate medical college of Nigeria. Many resident doctors are confused about how to get on with their proposals and the dissertations. This confusion often leads to frustrations, and in extreme cases to unnecessary delay in attempting the examinations when due. Aim: This study aims to identify the common errors made by resident doctors in the proposal and dissertations and to recommend the solutions to such problems. Methods: This survey is based on a direct interview with experienced examiners in both colleges. The examiners were asked to list what they observed as the common problems they identified concerning the proposal and dissertation of residents. The answers were collated and categorized according to the frequencies of problems identified. Based on the response of the examiners, a questionnaire was designed and administered to the senior residents who are at various stages of writing their dissertations. Results: Some of the findings include starting the proposal too late, difficulty in choosing a topic, mediocre and tedious literature search, difficulty in finding appropriate supervisors, poor appreciation of basic research design and necessary statistical tests, improper presentation of results and wrong referencing. Others are editorial mistakes, pagination errors, and the lack of knowledge on proper attitude and skill during the defense. Conclusion: Starting too late is the most common error made by the resident doctor in the dissertation. Residents should choose a topic within 6 months of passing the membership examination.\"}, {\"paperId\": \"4f30deff1af6434ed39ef5ac6095c7e07debd5a6\", \"externalIds\": {\"CorpusId\": 139087765}, \"title\": \"1 Probability and the philosophers\", \"venue\": \"\", \"year\": 2014, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"68998013\", \"name\": \"A. Whiting\"}], \"abstract\": null}, {\"paperId\": \"4ffe58d68aaac3927f3b802f61dc4b0183b68575\", \"externalIds\": {\"MAG\": \"1979881842\", \"DOI\": \"10.1007/BF00484753\", \"CorpusId\": 46984852}, \"title\": \"The logico-linguistic evidence underlying Montague's language descriptions\", \"venue\": \"Synthese\", \"year\": 1978, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/BF00484753?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/BF00484753, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2126632\", \"name\": \"W. S. Cooper\"}], \"abstract\": null}, {\"paperId\": \"51095f5cb63587c778f931a82f1817b0e027df75\", \"externalIds\": {\"MAG\": \"2433564052\", \"PubMedCentral\": \"4925933\", \"DOI\": \"10.2196/jmir.5420\", \"CorpusId\": 19254779, \"PubMed\": \"27302017\"}, \"title\": \"Using Facebook to Reach People Who Experience Auditory Hallucinations\", \"venue\": \"Journal of Medical Internet Research\", \"year\": 2016, \"citationCount\": 25, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.jmir.org/2016/6/e160/PDF\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC4925933, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"4563554\", \"name\": \"Benjamin S Crosier\"}, {\"authorId\": \"144564969\", \"name\": \"R. Brian\"}, {\"authorId\": \"101333432\", \"name\": \"Dror Ben-Zeev\"}], \"abstract\": \"Background Auditory hallucinations (eg, hearing voices) are relatively common and underreported false sensory experiences that may produce distress and impairment. A large proportion of those who experience auditory hallucinations go unidentified and untreated. Traditional engagement methods oftentimes fall short in reaching the diverse population of people who experience auditory hallucinations. Objective The objective of this proof-of-concept study was to examine the viability of leveraging Web-based social media as a method of engaging people who experience auditory hallucinations and to evaluate their attitudes toward using social media platforms as a resource for Web-based support and technology-based treatment. Methods We used Facebook advertisements to recruit individuals who experience auditory hallucinations to complete an 18-item Web-based survey focused on issues related to auditory hallucinations and technology use in American adults. We systematically tested multiple elements of the advertisement and survey layout including image selection, survey pagination, question ordering, and advertising targeting strategy. Each element was evaluated sequentially and the most cost-effective strategy was implemented in the subsequent steps, eventually deriving an optimized approach. Three open-ended question responses were analyzed using conventional inductive content analysis. Coded responses were quantified into binary codes, and frequencies were then calculated. Results Recruitment netted N=264 total sample over a 6-week period. Ninety-seven participants fully completed all measures at a total cost of $8.14 per participant across testing phases. Systematic adjustments to advertisement design, survey layout, and targeting strategies improved data quality and cost efficiency. People were willing to provide information on what triggered their auditory hallucinations along with strategies they use to cope, as well as provide suggestions to others who experience auditory hallucinations. Women, people who use mobile phones, and those experiencing more distress, were reportedly more open to using Facebook as a support and/or therapeutic tool in the future. Conclusions Facebook advertisements can be used to recruit research participants who experience auditory hallucinations quickly and in a cost-effective manner. Most (58%) Web-based respondents are open to Facebook-based support and treatment and are willing to describe their subjective experiences with auditory hallucinations.\"}, {\"paperId\": \"5147fb48658bec58f06983e589fd0775a4b8d287\", \"externalIds\": {\"MAG\": \"2800164512\", \"PubMedCentral\": \"6080741\", \"DOI\": \"10.1016/j.jaci.2018.03.011\", \"CorpusId\": 19175366, \"PubMed\": \"29731128\"}, \"title\": \"A novel human mast cell activation test for peanut allergy\", \"venue\": \"Journal of Allergy and Clinical Immunology\", \"year\": 2018, \"citationCount\": 90, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://www.jacionline.org/article/S0091674918305189/pdf\", \"status\": \"HYBRID\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://pmc.ncbi.nlm.nih.gov/articles/PMC6080741, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"79832261\", \"name\": \"Alexandra F Santos\"}, {\"authorId\": \"1402107882\", \"name\": \"Nat\\u00e1lia C. Couto\\u2010Francisco\"}, {\"authorId\": \"5940561\", \"name\": \"N. Becares\"}, {\"authorId\": \"47370246\", \"name\": \"M. Kwok\"}, {\"authorId\": \"4905108\", \"name\": \"H. Bahnson\"}, {\"authorId\": \"6076305\", \"name\": \"G. Lack\"}], \"abstract\": \"Citing this paper Please note that where the full-text provided on King's Research Portal is the Author Accepted Manuscript or Post-Print version this may differ from the final Published version. If citing, it is advised that you check and use the publisher's definitive version for pagination, volume/issue, and date of publication details. And where the final published version is provided on the Research Portal, if citing you are again advised to check the publisher's website for any subsequent corrections.\"}, {\"paperId\": \"520346ee78bd80062b44f8d8dda1d6ba00799426\", \"externalIds\": {\"MAG\": \"3023218073\", \"DOI\": \"10.1016/s0731-2199(2006)17\", \"CorpusId\": 39822460}, \"title\": \"The Economics of Obesity\", \"venue\": \"\", \"year\": 2007, \"citationCount\": 32, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.emerald.com/insight/content/doi/10.1016/S0731-2199(06)17014-4/full/pdf?title=list-of-contributors\", \"status\": \"GREEN\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1016/s0731-2199(2006)17?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1016/s0731-2199(2006)17, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2321903519\", \"name\": \"Kristian Bolin\"}, {\"authorId\": \"2410996733\", \"name\": \"John Cawley\"}], \"abstract\": null}, {\"paperId\": \"53898023ef731f655bafcd909ded1bfd9b6f4a58\", \"externalIds\": {\"CorpusId\": 249543514}, \"title\": \"Evaluation and improvement of a reliable diagnosis of cirrhosis by blood tests\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20171007045614/http://okina.univ-angers.f