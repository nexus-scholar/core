        body: "{\"total\": 207, \"token\": null, \"data\": [{\"paperId\": \"00afd11219032f05647fe691c0385018fb43348e\", \"externalIds\": {\"CorpusId\": 144648509}, \"title\": \"Journal of Neurotherapy: Investigations in Neuromodulation, Neurofeedback and Applied Neuroscience Neurofeedback for Elementary Students with Identified Learning Problems\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 24, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.isnr-jnt.org/article/download/16955/10877, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2327485807\", \"name\": \"Peter C. J. Orlando\"}, {\"authorId\": \"2068464959\", \"name\": \"R. Rivera\"}], \"abstract\": null}, {\"paperId\": \"03d863f5b7e610256170fdcebfd94299364b0cb1\", \"externalIds\": {\"CorpusId\": 207866482}, \"title\": \"A possible FTIR-based plasma fingerprint of ACEI induced reversal of endothelial dysfunction in diabetic mice\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2083243831\", \"name\": \"Emilia Staniszewska-Slezaka\"}, {\"authorId\": \"2083323599\", \"name\": \"Ewelina Wiercigrocha\"}, {\"authorId\": \"2078639666\", \"name\": \"Andrzej Fedorowiczc\"}, {\"authorId\": \"2079925322\", \"name\": \"bieta Buczekb\"}, {\"authorId\": \"2102972543\", \"name\": \"Lukasz Mateuszukb\"}, {\"authorId\": \"94417368\", \"name\": \"M. Baranskaa\"}, {\"authorId\": \"2102034869\", \"name\": \"Stefan Chlopickib\"}, {\"authorId\": \"2101411666\", \"name\": \"Kamilla Maleka\"}], \"abstract\": null}, {\"paperId\": \"046a4441ccdd48b54e591fe601ace6e2696d8dac\", \"externalIds\": {\"MAG\": \"2392987628\", \"CorpusId\": 64069874}, \"title\": \"Research on query pagination technology for web data based on django framework\", \"venue\": \"\", \"year\": 2014, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"1414099495\", \"name\": \"Qi Jin-gan\"}], \"abstract\": null}, {\"paperId\": \"04f94bb7020a1477524bb930469b24e8e87482c2\", \"externalIds\": {\"MAG\": \"2958370814\", \"DOI\": \"10.15835/NBHA47311453\", \"CorpusId\": 199480096}, \"title\": \"Seed Vigour Tests to Estimate Seedling Emergence in Cress (Lepidium sativum L.) Seed Lots\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 16, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11453/8810\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311453?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311453, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"89485963\", \"name\": \"I. Demir\"}, {\"authorId\": \"87433351\", \"name\": \"B. Kenano\\u011flu\"}, {\"authorId\": \"2083080040\", \"name\": \"E. \\u00d6zden\"}], \"abstract\": \"This work was carried out to estimate field and controlled room seedling emergence potential through seed vigour tests in cress (Lepidium sativum L.) seeds. Early radicle emergence percentages after 12 (RE12h), 24 (RE24h) and 36 (RE36h) hours of germination test, mean germination time, accelerated aging (45 \\u00b0C, 100% RH, 24 h), electrical conductivity (EC) of soaking water (40 ml, 50 seeds, 20 \\u00b0C), after 16 hours (EC16h) and 24 hours (EC24h), and EC16h and EC24h after accelerated ageing (AA, 45 \\u00b0C, 100% RH, 24h) were tested as vigour tests in ten commercial seed lots of cress. Standard laboratory germination ranged between 88 and 93%. Seeds were sown on two occasions in field and controlled room conditions, and seedling emergence percentages were determined after 30 days in the soil and 14 days in the controlled room. Seedling emergence ranged between 67 and 85% and 59 and 83% in the first and second sowings in the field. These values were 75 and 92% in controlled room sowing. Vigour tests were correlated to seedling emergence potential at various significance levels but RE24h and EC16h showed the highest correlation coefficient values (p < 0.001) in all three sowing conditions as r = 0.879-0.988 in RE24h, and r = 0.902-0.962 in EC16h. Results indicated that early radicle emergence percentages after 24 hours (RE24h) and electrical conductivity value after 16 hours (EC16h) can be successfully used to estimate the seedling emergence potential of cress seeds in field and controlled room conditions. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"06156577e3e4cd9530dac51fd12a30a9e3fb8b24\", \"externalIds\": {\"MAG\": \"2293849905\", \"CorpusId\": 137979995}, \"title\": \"Microstructure design of mechanically alloyed materials\", \"venue\": \"\", \"year\": 2015, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://dspace.mit.edu/bitstream/handle/1721.1/101560/940568858-MIT.pdf?sequence=1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2407579025\", \"name\": \"Z. Cordero\"}], \"abstract\": null}, {\"paperId\": \"061661d39a0d1053bb1823a1c7d01c0e5168d2d9\", \"externalIds\": {\"CorpusId\": 219683772}, \"title\": \"Major cardiac defects and placental dysfunction at 11-13 weeks\\u2019 gestation: Cardiac defects and placental dysfunction\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://repository.canterbury.ac.uk/download/97732ce26f431d4f7c1cf5a95cd351e2762240b600b56eb06209b4f649d58853/1042082/7.%20Fetal%20major%20cardiac%20defects%20and%20placental%20dysfunction%20at%2011-13%20weeks'%20gestation.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"49246927\", \"name\": \"D. Kasapoglu\"}, {\"authorId\": \"8413251\", \"name\": \"T. Kasapo\\u011flu\"}, {\"authorId\": \"3037847\", \"name\": \"A. Syngelaki\"}, {\"authorId\": \"4015907\", \"name\": \"R. Akolekar\"}, {\"authorId\": \"6745423\", \"name\": \"K. Nicolaides\"}], \"abstract\": null}, {\"paperId\": \"089ce2cc6d6cac58dd9ceb130002f628f459edbf\", \"externalIds\": {\"CorpusId\": 207765436}, \"title\": \"Cerebroplacental ratio thresholds measured within two weeks of birth and the risk of Cesarean section for intrapartum fetal compromise and adverse neonatal outcome.: Cerebroplacental ratio, Caesarean section and neonatal outcomes\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 7, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2103247909\", \"name\": \"Larissa N BLIGHa\"}, {\"authorId\": \"13720958\", \"name\": \"A. Alsolai\"}, {\"authorId\": \"2096197794\", \"name\": \"M. Ristan\"}, {\"authorId\": \"51291610\", \"name\": \"Sailesh Kumar\"}], \"abstract\": null}, {\"paperId\": \"0a90b2123bacc7fe6dd83d815c261a015c055181\", \"externalIds\": {\"MAG\": \"2591385288\", \"CorpusId\": 151965853}, \"title\": \"An investigation of the Machover Personality Projection Test as an approach to locating personality problems at the first grade level\", \"venue\": \"\", \"year\": 1958, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"119524589\", \"name\": \"Alice J. Dwinell\"}], \"abstract\": null}, {\"paperId\": \"0b4783d2c4d5e1b2198706c411905ade4e77f6db\", \"externalIds\": {\"CorpusId\": 246008908}, \"title\": \"Evaluation of a compact multi-contrast and 1 multi-resolution X-ray phase contrast edge illumination 2 system for small animal imaging 3 A compact X-ray edge illumination system\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://discovery.ucl.ac.uk/id/eprint/10115221/11/Endrizzi_mp.14553%20(2).pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3681073\", \"name\": \"L. Massimi\"}, {\"authorId\": \"5190094\", \"name\": \"J. Meganck\"}, {\"authorId\": \"145616830\", \"name\": \"A. Olivo\"}, {\"authorId\": \"4764172\", \"name\": \"M. Endrizzi\"}], \"abstract\": null}, {\"paperId\": \"0dbe3a0d2bd907c5b2d783ec5dd0129094844033\", \"externalIds\": {\"MAG\": \"2997230923\", \"DOI\": \"10.15835/nbha47411714\", \"CorpusId\": 210906471}, \"title\": \"Phytochemical Composition and Antioxidant Activity of Various Grain Amaranth Cultivars\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11714/8863\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/nbha47411714?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/nbha47411714, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"11023944\", \"name\": \"A. St\\u01cenil\\u01ce\"}, {\"authorId\": \"97745317\", \"name\": \"Bogdan Cioanca\"}, {\"authorId\": \"47847028\", \"name\": \"Z. Diaconeasa\"}, {\"authorId\": \"6780954\", \"name\": \"S. St\\u0103nil\\u0103\"}, {\"authorId\": \"88126648\", \"name\": \"N. Sima\"}, {\"authorId\": \"144022912\", \"name\": \"R. Sima\"}], \"abstract\": \"This study quantified differences in methanolic extracts composition among four grain amaranth cultivars (e.g. \\u2018Hopy Red Dye\\u2019, \\u2018Amont\\u2019, \\u2018Plenitude\\u2019, and \\u2018Golden Giant\\u2019) farmed under three planting conditions: no irrigation/no fertilization (NN), no irrigation/fertilization (NF), irrigation/no fertilization (IN). The study main outcomes were total flavonoids, polyphenols, antioxidant activity, and protein content. Antioxidant activity was assessed using two Single Electron Transfer (SET) based assays: the 2,2'-azinobis (3-ethylbenzothiazoline-6-sulfonic acid) radical cation decolorization assay (ABTS) and cupric reducing antioxidant capacity (CUPRAC). The total protein content was assessed by Gornall spectrophotometric method, the total flavonoid content (TFC) was determined using a colorimetric technique, while total polyphenols content (TPC) was assessed using the Folin-Ciocalteu method. Mean differences in outcomes were calculated using ANOVA and Dunnet\\u2019s test for multiple comparisons. The findings revealed that TPC ranged from 5 to 18 mg gallic acid equivalents (GAE)/100 g dry weight (DW), being highest in \\u2018Plenitude\\u2019 under NF conditions. The highest TFC (7.5 mg quercetin equivalent (QE)/100 g DW) and the highest protein content (37.25%) were revealed for the \\u2018Hopi Red Dye\\u2019 cultivar under the NF planting conditions. Amaranth seeds represent a potential rich source of polyphenols and protein gluten-free compounds, with the \\u2018Hopi Red Dye\\u2019 representing the richest cultivar in such compounds. Fertilized and non-irrigated soil provided the optimal planting conditions across all amaranth cultivars. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 4, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"10b92fedf5d9c93aba32f4e5d7ffd24d90233507\", \"externalIds\": {\"CorpusId\": 286788332}, \"title\": \"Liver-FibroSTARD checklist and glossary: tools for standardized design and reporting of diagnostic accuracy studies of liver fibrosis tests\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20171024231118/http://okina.univ-angers.fr/printpdf/publications/ua12692, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2270787232\", \"name\": \"T. Poynard\"}], \"abstract\": null}, {\"paperId\": \"10d6121ef42e04f79a04b73394a84062145ad97b\", \"externalIds\": {\"CorpusId\": 11094498}, \"title\": \"Access to the Published Version May Require Journal Subscription. Published with Permission From: Springerlink Kjellstr\\u00f6m Et Al. Topiramate Effects in Rabbit Retina Retinal Function and Histopathology in Rabbits Treated with Topiramate\", \"venue\": \"\", \"year\": null, \"citationCount\": 27, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"4783859\", \"name\": \"S. Kjellstrom\"}, {\"authorId\": \"2430162436\", \"name\": \"Bruun Anitha\"}, {\"authorId\": \"2085900170\", \"name\": \"Isaksson\"}, {\"authorId\": \"2389024797\", \"name\": \"Bjorn Eriksson\"}, {\"authorId\": \"1393041463\", \"name\": \"Andr\\u00e9 St\\u00e9n\"}, {\"authorId\": \"6015932\", \"name\": \"V. Ponjavic\"}, {\"authorId\": \"32131161\", \"name\": \"S. Kjellstr\\u00f6m\"}, {\"authorId\": \"2297257409\", \"name\": \"A. Bruun\"}, {\"authorId\": \"2417387643\", \"name\": \"P. D\"}, {\"authorId\": \"2067714408\", \"name\": \"B. Isaksson\"}, {\"authorId\": \"2270641379\", \"name\": \"M. Pharm\"}, {\"authorId\": \"49308744\", \"name\": \"T. Eriksson\"}, {\"authorId\": \"2219733222\", \"name\": \"S. Andreasson\"}, {\"authorId\": \"6015932\", \"name\": \"V. Ponjavic\"}], \"abstract\": null}, {\"paperId\": \"13e2cda0f4fa5f4b4573b65d7e70c634d7090f72\", \"externalIds\": {\"DOI\": \"10.1159/000345127\", \"CorpusId\": 202657033}, \"title\": \"Front & Back Matter\", \"venue\": \"Brain, Behavior and Evolution\", \"year\": 2012, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1159/000345127?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1159/000345127, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2247426036\", \"name\": \"Y. N.\"}, {\"authorId\": \"2242699121\", \"name\": \"A. Gonz\\u00e1lez\"}, {\"authorId\": \"87874442\", \"name\": \"Kobe\"}, {\"authorId\": \"2069221364\", \"name\": \"L. Medina\"}, {\"authorId\": \"4429544\", \"name\": \"R. Nieuwenhuys\"}, {\"authorId\": \"48580208\", \"name\": \"Amsterdam\"}, {\"authorId\": \"4254791\", \"name\": \"A. Powers\"}, {\"authorId\": \"2100350254\", \"name\": \"T. Preuss\"}, {\"authorId\": \"2093412576\", \"name\": \"Sevilla\"}, {\"authorId\": \"1900079\", \"name\": \"T. Smulders\"}], \"abstract\": null}, {\"paperId\": \"1514855e60458a4fb3bfb1afe4698a27316e5505\", \"externalIds\": {\"ArXiv\": \"1605.00558\", \"MAG\": \"2347055773\", \"DBLP\": \"journals/corr/GrangeKM16\", \"CorpusId\": 17457136}, \"title\": \"Algorithms for the Pagination Problem, a Bin Packing with Overlapping Items\", \"venue\": \"arXiv.org\", \"year\": 2016, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://arxiv.org/abs/1605.00558, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34051791\", \"name\": \"A. Grange\"}, {\"authorId\": \"1729073\", \"name\": \"I. Kacem\"}, {\"authorId\": null, \"name\": \"S\\u00e9bastien Martin\"}], \"abstract\": \"We introduce the strongly NP-complete pagination problem, an extension of Bin Packing where packing together two items may make them occupy less volume than the sum of their individual sizes. To achieve this property, an item is defined as a finite set of symbols from a given alphabet: while, in Bin Packing, any two such sets would be dis-joint, in Pagination, they can share zero, one or more symbols. After formulating the problem as an integer linear program, we try to approximate its solutions with several families of algorithms: from straightforward adaptations of classical Bin Packing heuristics, to dedicated algorithms (greedy and non-greedy), to standard and grouping genetic algorithms. All of them are studied first theoretically , then experimentally on an extensive random test set. Based upon these data, we propose a pre-dictive measure of the difficulty of a given instance, and finally recommend which algorithm should be used in which case, depending on either time constraints or quality requirements.\"}, {\"paperId\": \"15a6d69f961bb8983721200b38b56564091942ba\", \"externalIds\": {\"MAG\": \"2951852906\", \"DOI\": \"10.15835/NBHA47311440\", \"CorpusId\": 196675472}, \"title\": \"Physiological Responses and Tolerance Evaluation of Five Poplar Varieties to Waterlogging\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 12, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.15835/nbha47311440\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311440?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311440, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2028223495\", \"name\": \"Zhongcheng Zhou\"}, {\"authorId\": \"2155119683\", \"name\": \"Gang Li\"}, {\"authorId\": \"2054523375\", \"name\": \"Wei Chao\"}, {\"authorId\": \"2348026283\", \"name\": \"Feng Xu\"}, {\"authorId\": \"2144830285\", \"name\": \"Xiaomei Sun\"}, {\"authorId\": \"2111434123\", \"name\": \"Zexiong Chen\"}], \"abstract\": \"Waterlogging resistance of five poplar varieties, \\u2018Danhongyang\\u2019 (DHY), \\u2018Juba-261\\u2019 (JB-261), \\u2018Zongqiansanhao\\u2019 (ZQ-3), \\u2018Zhonglin-2025\\u2019 (ZL-2025), and \\u2018Nanlin-895\\u2019 (NL-895), was evaluated under the simulated waterlogging conditions. Data on changes in leaf color and morphology as well as in biochemical indices, such as chlorophyll, malonaldehyde, soluble protein, soluble sugar content, superoxide dismutase (SOD), peroxidases (POD), ascorbate peroxidase (APX), glutathione reductase (GR), and glutathione peroxidase (GSH-PX) activities, relevant to submergence stress, were analyzed. The principal component analysis of the data identified the waterlogging resistance coefficient of the indices, which showed that waterflooding brought about different degrees of damage in the five poplar varieties, with DHY having the lowest waterlogging index. The leaf pigment content of the poplar was remarkably decreased by waterlogging, whereas malondialdehyde (MDA) and proline contents were enhanced, but in different extents among the poplar varieties. Nearly all other poplar varieties showed a tendency of decline in JB-261, ZQ-3, ZL-2025, NL-895, except for SOD activity in DHY, which increased under submergence stress. Poplar varieties had varying degree of changes in POD activity, and APX activity tended to increase upon waterlogging. GR also displayed increasing tendency in JB-261, ZL-2025 and NL-895, except for in ZQ-3, which declined under waterlogging stress. GSH-PX except for ZQ-3 displayed no significant change, which showed a tendency of decline in DHY, JB-261, ZL-2025, and NL895. Principal component analysis allowed us to reduce16 indices to four independent indices. The subordinate function analysis identified that the DHY variety had the highest waterlogging tolerance, whereas the NL-895 variety had the lowest waterlogging tolerance among tested varieties. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI). DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"169b0618c159722405608433017e5ff3830723d0\", \"externalIds\": {\"MAG\": \"588918031\", \"CorpusId\": 190844424}, \"title\": \"Reading Faulkner: The Sound and the Fury\", \"venue\": \"\", \"year\": 1996, \"citationCount\": 15, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"70553431\", \"name\": \"N. Polk\"}, {\"authorId\": \"49858989\", \"name\": \"S. Ross\"}], \"abstract\": null}, {\"paperId\": \"172b70e7fe00c462f500cc1b23909d85bcd80b91\", \"externalIds\": {\"DOI\": \"10.1063/5.0177034\", \"CorpusId\": 268219616}, \"title\": \"Levenberg\\u2013Marquardt backpropagation neural networking (LMB-NN) analysis of hydrodynamic forces in fluid flow over multiple cylinders\", \"venue\": \"AIP Advances\", \"year\": 2024, \"citationCount\": 9, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://pubs.aip.org/aip/adv/article-pdf/doi/10.1063/5.0177034/19700468/025051_1_5.0177034.pdf\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1063/5.0177034?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1063/5.0177034, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2238337472\", \"name\": \"Khalil ur Rehman\"}, {\"authorId\": \"2244831\", \"name\": \"W. Shatanawi\"}, {\"authorId\": \"2240852545\", \"name\": \"Zead Mustafa\"}], \"abstract\": \"The mathematical formulation of the flowing liquid stream around and through confined multiply connected domains brings a complex differential system. Due to this, one cannot provide a complete description of flow field properties. The current pagination provides a numerical remedy by the use of artificial intelligence in this direction. To be more precise, fluid is considered in the rectangular channel. The circular, square, and triangular-shaped cylinders are positioned as an obstacle to the continuous fluid. The channel\\u2019s left wall is viewed as an inlet and two different velocity profiles are introduced at an inlet that are constant and parabolic profile. To discretize the computational domain, hybrid meshing is used. The variance in basic variables, namely, the velocity of the liquid and the distribution of the liquid pressure, is recorded via graphs. The nine different meshed grades are tested for the drag and lift coefficients around the right-angle triangle, square, and circular barrier. The neural networking model is constructed by using 99 datasets of sample values for drag coefficient when characteristic length, the density of fluid, the dynamic viscosity of the fluid, and mean flow velocity are taken as inputs. The training of the neural network takes up 69 slots (about 70%), while the testing and validation of the neural network each take up 15 slots (15%). The Levenberg\\u2013Marquardt backpropagation algorithm is used for training. We have observed that for the parabolic profile, the drag coefficient is higher in intensity for each obstacle compared to the constant profile, while the lift coefficient shows opposite patterns.\"}, {\"paperId\": \"1755c064784f2c154f515535bab62a0e01177571\", \"externalIds\": {\"CorpusId\": 263520299}, \"title\": \"Is basal ultrasensitive measurement of calcitonin capable of substituting for the pentagastrin-stimulation test? measurement of capable of substituting for the pentagastrin-stimulation test?\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20171025002320/http://okina.univ-angers.fr/printpdf/publications/ua10549, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": null}, {\"paperId\": \"1767c981e2a180de666de18d58eb41edcd572de6\", \"externalIds\": {\"MAG\": \"2372263283\", \"CorpusId\": 63462742}, \"title\": \"The Design and Implementation of Reusing Pagination Based on SSH\", \"venue\": \"\", \"year\": 2011, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2113520468\", \"name\": \"L. Jing\"}], \"abstract\": null}, {\"paperId\": \"1845401a2910a5ac73a8a74531aa5ac0ed59aa69\", \"externalIds\": {\"MAG\": \"2225623688\", \"CorpusId\": 62442699}, \"title\": \"Bayesian nonparametric inference for stochastic epidemic models\", \"venue\": \"\", \"year\": 2015, \"citationCount\": 6, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://eprints.nottingham.ac.uk/29170/1/PhD%20Thesis%20Xiaoguang%20Xu%20ID%204121112%20final.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2112267002\", \"name\": \"Xiaoguang Xu\"}], \"abstract\": null}, {\"paperId\": \"1887c9c7c7eb3c3930624a4b8a1cd0c3e90eca8a\", \"externalIds\": {\"MAG\": \"563229875\", \"CorpusId\": 107317833}, \"title\": \"Editorial technology upgrades at Queensland Newspapers Pty. Ltd., 1985-2002\", \"venue\": \"\", \"year\": 2002, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"49787372\", \"name\": \"J. Cokley\"}], \"abstract\": null}, {\"paperId\": \"189e653d0f36d06b5e2f9294c141cea3fd192083\", \"externalIds\": {\"MAG\": \"2958888858\", \"DOI\": \"10.15835/NBHA47311499\", \"CorpusId\": 201195894}, \"title\": \"Validation of Gender Specific CAPS Marker in Turkish Fig (Ficus carica L.) Collection and F1 Progenies\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11499/8811\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311499?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311499, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"10736231\", \"name\": \"H. Ikten\"}, {\"authorId\": \"153720811\", \"name\": \"Y. Y\\u0131lmaz\"}], \"abstract\": \"In most dioecious plants, distinguishing male and female progenies is not possible until flowering or fruiting stage. The fig (Ficus carica L.) is such a plant where distinguishing male and female plants at the seedling stage can accelerate fig-breeding programs. An orthologue of RAN1 loci was reported to be associated with sex determination in fig (Mori et al., 2017). The objective of this study is to validate this locus on Turkish fig germplasm collection and F1 population obtained from a cross between female genotypes \\u2018Bursa Siyahi\\u2019 and male genotype \\u2018Ak Ilek\\u2019. A total of 144 genotypes from germplasm collection and 115 F1 individuals were tested with CAPS (cleaved amplified polymorphic sequences) marker following the Mori et al. (2017). The loci produced a 315bp amplification product from all genotypes. PciI digestion of PCR products resulted in 100% concordance between phenotypes and molecular tests. On the other hand, HpyCH4IV enzyme digestion of 8 female genotypes resulted in false negatives among the tested materials. Therefore, despite overall results show that the locus is suitable for gender selection of plants at the seedling stage in the breeding programs, care should be taken when HpyCH4IV enzyme is to be employed for CAPS assay. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"18da7d02838c75b1987aa3990d2f66668922396f\", \"externalIds\": {\"MAG\": \"2807869594\", \"DOI\": \"10.1145/3180155.3182528\", \"CorpusId\": 32742501}, \"title\": \"[Journal First] Metamorphic Testing of RESTful Web APIs\", \"venue\": \"International Conference on Software Engineering\", \"year\": 2018, \"citationCount\": 28, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://idus.us.es/bitstream/11441/73547/1/TSE2017_REST_prePrint.pdf\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1145/3180155.3182528?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1145/3180155.3182528, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145135083\", \"name\": \"Sergio Segura\"}, {\"authorId\": \"2744054\", \"name\": \"J. A. Parejo\"}, {\"authorId\": \"2090877\", \"name\": \"J. Troya\"}, {\"authorId\": \"38103741\", \"name\": \"Antonio Ruiz-Cort\\u00e9s\"}], \"abstract\": \"Web Application Programming Interfaces (APIs) specify how to access services and data over the network, typically using Web services. Web APIs are rapidly proliferating as a key element to foster reusability, integration, and innovation, enabling new consumption models such as mobile or smart TV apps. Companies such as Facebook, Twitter, Google, eBay or Netflix receive billions of API calls every day from thousands of different third-party applications and devices, which constitutes more than half of their total traffic. As Web APIs are progressively becoming the cornerstone of software integration, their validation is getting more critical. In this context, the fast detection of bugs is of utmost importance to increase the quality of internal products and third-party applications. However, testing Web APIs is challenging mainly due to the difficulty to assess whether the output of an API call is correct, i.e., the oracle problem. For instance, consider the Web API of the popular music streaming service Spotify. Suppose a search for albums with the query \\\"redhouse\\\" returning 21 total matches: Is this output correct? Do all the albums in the result set contain the keyword? Are there any albums containing the keyword not included in the result set? Answering these questions is difficult, even with small result sets, and often infeasible when the results are counted by thousands or millions. Metamorphic testing alleviates the oracle problem by providing an alternative when the expected output of a test execution is complex or unknown. Rather than checking the output of an individual program execution, metamorphic testing checks whether multiple executions of the program under test fulfil certain necessary properties called metamorphic relations. For instance, consider the following metamorphic relation in Spotify: two searches for albums with the same query should return the same number of total results regardless of the size of pagination. Suppose that a new Spotify search is performed using the exact same query as before and increasing the maximum number of results per page from 20 (default value) to 50: This search returns 27 total albums (6 more matches than in the previous search), which reveals a bug. This is an example of a real and reproducible fault detected using the approach presented in this paper and reported to Spotify. According to Spotify developers, it was a regression fault caused by a fix with undesired side effects. In this paper [1], we present a metamorphic testing approach for the automated detection of faults in RESTful Web APIs (henceforth also referred to as simply Web APIs). We introduce the concept of metamorphic relation output patterns. A Metamorphic Relation Output Pattern (MROP) defines an abstract output relation typically identified in Web APIs, regardless of their application domain. Each MROP is defined in terms of set operations among test outputs such as equality, union, subset, or intersection. MROPs provide a helpful guide for the identification of metamorphic relations, broadening the scope of our work beyond a particular Web API. Based on the notion of MROP, a methodology is proposed for the application of the approach to any Web API following the REST architectural pattern. The approach was evaluated in several steps. First, we used the proposed methodology to identify 33 metamorphic relations in four Web APIs developed by undergraduate students. All the relations are instances of the proposed MROPs. Then, we assessed the effectiveness of the identified relations at revealing 317 automatically seeded faults (i.e., mutants) in the APIs under test. As a result, 302 seeded faults were detected, achieving a mutation score of 95.3%. Second, we evaluated the approach using real Web APIs and faults. In particular, we identified 20 metamorphic relations in the Web API of Spotify and 40 metamorphic relations in the Web API of YouTube. Each metamorphic relation was implemented and automatically executed using both random and manual test data. In total, 469K metamorphic tests were generated. As a result, 21 metamorphic relations were violated, and 11 issues revealed and reported (3 issues in Spotify and 8 issues in YouTube). To date, 10 of the reported issues have been either confirmed by the API developers or reproduced by other users supporting the effectiveness of our approach.\"}, {\"paperId\": \"1d21a3a915401809a2bc764d9ca120904dab7ea7\", \"externalIds\": {\"CorpusId\": 15006460}, \"title\": \"This Reprint May Differ from the Original in Pagination and Typographic Detail. Left Prefrontal Cortex Contributes to Motor Imagery: a Pilot Study\", \"venue\": \"\", \"year\": null, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2167194\", \"name\": \"I. Tarkka\"}, {\"authorId\": \"31857850\", \"name\": \"D. Stokic\"}], \"abstract\": null}, {\"paperId\": \"1da3aa9c82008af68c66e711821e61b0f89fe573\", \"externalIds\": {\"MAG\": \"2366895303\", \"CorpusId\": 63662285}, \"title\": \"Research of Webs Pagination Display in Condition of Mass Data\", \"venue\": \"\", \"year\": 2005, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2290434\", \"name\": \"L. Shufen\"}], \"abstract\": null}, {\"paperId\": \"1f13643cc446264f96729524f930a67ffbffb352\", \"externalIds\": {\"CorpusId\": 207765338}, \"title\": \"Effect of pretreatment on rehydration , colour and nanoindentation properties of potato cylinders dried using mixed-mode solar dryer Effect of pretreatment on quality of solar dried potato cylinders\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"11611332\", \"name\": \"Kshanaprava Dhalsamant\"}, {\"authorId\": \"47820365\", \"name\": \"P. P. Tripathy\"}, {\"authorId\": \"41075168\", \"name\": \"S. L. Shrivastava\"}], \"abstract\": null}, {\"paperId\": \"1f39f294cb66e60402ec06da303289d0357c36a1\", \"externalIds\": {\"MAG\": \"2513942236\", \"CorpusId\": 63947524}, \"title\": \"Open Educational Resources (OERs) for TPACK Development\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://scholarworks.wm.edu/cgi/viewcontent.cgi?article=1079&context=educationpubs&httpsredir=1&referer=, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"21689735\", \"name\": \"Mark J. Hofer\"}, {\"authorId\": \"31742112\", \"name\": \"Judith B. Harris\"}], \"abstract\": null}, {\"paperId\": \"1fd880e073efc3a839fa013c296b4e7074149b6e\", \"externalIds\": {\"DOI\": \"10.62951/ijeemcs.v1i4.118\", \"CorpusId\": 274345715}, \"title\": \"Analysis and Testing of the Combox Web Application System Using Black Box Testing with the Equivalence Partitioning Method\", \"venue\": \"International Journal of Electrical Engineering, Mathematics and Computer Science\", \"year\": 2024, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://international.arteii.or.id/index.php/IJEEMCS/article/download/118/102\", \"status\": \"HYBRID\", \"license\": \"CCBYSA\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.62951/ijeemcs.v1i4.118?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.62951/ijeemcs.v1i4.118, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2329742861\", \"name\": \"Dini Nurul Azizah\"}, {\"authorId\": \"2332962869\", \"name\": \"Ibnu Aqil Mahendar\"}, {\"authorId\": \"2319523095\", \"name\": \"Muhammad Fillah Alfatih\"}, {\"authorId\": \"2332959485\", \"name\": \"Setiady Ibrahim Anwar\"}, {\"authorId\": \"2332964698\", \"name\": \"Nabil Malik Al hapid\"}, {\"authorId\": \"1388169719\", \"name\": \"Aditya Wicaksono\"}, {\"authorId\": \"2118127725\", \"name\": \"G. P. Mindara\"}], \"abstract\": \"This research focuses on evaluating the Combox web application, a digital tool designed to help Food and Beverage (F&B) business owners strengthen their online presence. The analysis was carried out through Black Box Testing, specifically using the Equivalence Partitioning method, to assess core functionalities like login, logout, product management, and pagination. The findings reveal that while most features function as intended, there are issues with product addition and editing, as well as pagination when no data is available. These results highlight areas that need refinement to improve the application\\u2019s reliability and user experience. In summary, this research supports the advancement of a digital platform that enables F&B businesses to harness technology effectively in today\\u2019s competitive landscape.\"}, {\"paperId\": \"1fdd8c7b0d276ffcf4306477901b8c62f5c915eb\", \"externalIds\": {\"MAG\": \"2164993209\", \"DOI\": \"10.1002/ppul.22736\", \"CorpusId\": 5098363, \"PubMed\": \"23322533\"}, \"title\": \"Passages: The journal, the editors and the specialty\", \"venue\": \"Pediatric Pulmonology\", \"year\": 2013, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1002/ppul.22736?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/ppul.22736, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"152601398\", \"name\": \"T. Murphy\"}], \"abstract\": null}, {\"paperId\": \"21a43a61fbf18c6905a502060bf4f38f3221b15e\", \"externalIds\": {\"CorpusId\": 263535809}, \"title\": \"T2* weighted placental MRI: basic research tool or an emerging clinical test of placental dysfunction?\", \"venue\": \"\", \"year\": 2019, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20201103220630/https://kclpure.kcl.ac.uk/ws/files/115450550/S_rensen_et_al_2019_Ultrasound_in_Obstetrics_Gynecology.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2375266811\", \"name\": \"A. S\\u00f8rensen\"}, {\"authorId\": 