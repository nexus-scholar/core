uthorId\": \"2248381279\", \"name\": \"K. Berntorp\"}, {\"authorId\": \"2248368983\", \"name\": \"A. Papadopoulou\"}, {\"authorId\": \"2248052581\", \"name\": \"K. Lynch\"}, {\"authorId\": \"5126278\", \"name\": \"N. Shaat\"}, {\"authorId\": \"6358581\", \"name\": \"B. Lernmark\"}, {\"authorId\": \"2248381279\", \"name\": \"K. Berntorp\"}, {\"authorId\": \"3527572\", \"name\": \"S. Ivarsson\"}, {\"authorId\": \"144056134\", \"name\": \"C. Agardh\"}, {\"authorId\": \"145859089\", \"name\": \"\\u00c5. Lernmark\"}, {\"authorId\": \"2149566412\", \"name\": \"A. Carlsson\"}, {\"authorId\": \"122440623\", \"name\": \"E. Cederwall\"}, {\"authorId\": \"31803142\", \"name\": \"B. J\\u00f6nsson\"}, {\"authorId\": \"2372299334\", \"name\": \"C. Cilio\"}, {\"authorId\": \"123642232\", \"name\": \"H. Larsson\"}, {\"authorId\": \"50168398\", \"name\": \"K. Larsson\"}, {\"authorId\": \"2071429416\", \"name\": \"B. Lindberg\"}, {\"authorId\": \"11054785\", \"name\": \"J. Neiderud\"}, {\"authorId\": \"1429214432\", \"name\": \"S. Resic-Lindehammer\"}, {\"authorId\": \"2385792636\", \"name\": \"S. Sj\\u00f6blad\"}], \"abstract\": null}, {\"paperId\": \"3915c55a0fdccad59baf01e386b7cbdbc801edc4\", \"externalIds\": {\"CorpusId\": 205994061}, \"title\": \"Formulation and in vitro & in vivo evaluation of a new osteoprotegerin-chitosan gel for bone tissue regeneration\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 26, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"4785365\", \"name\": \"S. N. Jayash\"}, {\"authorId\": \"2284287\", \"name\": \"N. Hashim\"}, {\"authorId\": \"47960286\", \"name\": \"M. Misran\"}, {\"authorId\": \"35088398\", \"name\": \"N. Baharuddin\"}], \"abstract\": null}, {\"paperId\": \"3a51fd9020ef7d8392aaffc2dd84abf884ffcd44\", \"externalIds\": {\"DOI\": \"10.52362/jisamar.v9i4.2119\", \"CorpusId\": 286292423}, \"title\": \"PEMBUATAN APLIKASI WEB ALOWA UNTUK PENGELOLAAN DAFTAR ANIME MENGGUNAKAN PHP DAN MYSQL\", \"venue\": \"Journal of Information System, Applied, Management, Accounting and Research\", \"year\": 2025, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.52362/jisamar.v9i4.2119?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.52362/jisamar.v9i4.2119, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2216240261\", \"name\": \"M. S. Harlina\"}, {\"authorId\": \"2104909122\", \"name\": \"Rizki Ariyani\"}, {\"authorId\": \"2356267322\", \"name\": \"M. Herawati\"}, {\"authorId\": \"2422135025\", \"name\": \"Sarif Abdullah\"}], \"abstract\": \"Penelitian ini bertujuan untuk merancang dan membangun aplikasi web ALOWA (Anime List Organizer Web Application) sebagai media digital untuk pengelolaan daftar anime menggunakan bahasa pemrograman PHP dan sistem basis data MySQL. Aplikasi ini dikembangkan untuk memberikan kemudahan bagi pengguna dalam menelusuri, mengelola, serta menyimpan daftar anime secara interaktif dan terstruktur. Fitur utama yang diimplementasikan meliputi pencarian anime, pengelolaan data oleh admin (tambah, edit, hapus), bookmark anime, serta navigasi berdasarkan genre dan alfabet yang didukung dengan sistem pagination guna meningkatkan efisiensi tampilan data. Metode penelitian yang digunakan adalah Research and Development (R&D) dengan pendekatan pengujian black box testing untuk memastikan keandalan dan kestabilan fungsionalitas aplikasi. Hasil pengujian menunjukkan bahwa seluruh fitur utama berjalan dengan baik tanpa ditemukan error. Penelitian ini membuktikan bahwa kombinasi PHP dan MySQL masih efektif digunakan dalam pengembangan aplikasi web berbasis data komunitas, khususnya dalam konteks pengelolaan daftar anime yang memerlukan sistem pencarian dan pengelompokan yang efisien\"}, {\"paperId\": \"3a80328ee5fcc54f76be97c408a5240fe2fe7613\", \"externalIds\": {\"CorpusId\": 53118768}, \"title\": \"Title : Relationship between neck circumference , standard anthropometric measures and blood pressure values in Bosnian young adults\", \"venue\": \"\", \"year\": 2018, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www.eajm.org/sayilar/196/buyuk/EAJM-2018-0197%20UNC.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"3737649\", \"name\": \"Asija Za\\u010diragi\\u0107\"}, {\"authorId\": \"2097291699\", \"name\": \"Mehmed Elezovic\"}, {\"authorId\": \"4754675\", \"name\": \"N. Avdagi\\u0107\"}, {\"authorId\": \"4369919\", \"name\": \"N. Babic\"}, {\"authorId\": \"6134883\", \"name\": \"A. Dervi\\u0161evi\\u0107\"}, {\"authorId\": \"6881199\", \"name\": \"O. Lepara\"}, {\"authorId\": \"6384478\", \"name\": \"J. Huskic\"}], \"abstract\": null}, {\"paperId\": \"3bb8ff567310de0b00df4965278591cffcd6269a\", \"externalIds\": {\"MAG\": \"3093449085\", \"DOI\": \"10.1111/joss.12620\", \"CorpusId\": 225175594}, \"title\": \"Sound quality perception of loudspeakers evaluated by different sensory descriptive methods and preference mapping\", \"venue\": \"Journal of sensory studies\", \"year\": 2020, \"citationCount\": 8, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://findresearcher.sdu.dk/ws/files/174123731/joss.12620.pdf\", \"status\": \"GREEN\", \"license\": \"other-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/joss.12620?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/joss.12620, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2469272\", \"name\": \"I. Berget\"}, {\"authorId\": \"103673026\", \"name\": \"S. Bech\"}, {\"authorId\": \"3127632\", \"name\": \"D. Giacalone\"}, {\"authorId\": \"17004616\", \"name\": \"S. Moulin\"}, {\"authorId\": \"2004232823\", \"name\": \"Mads Erling Pedersen\"}, {\"authorId\": \"143710043\", \"name\": \"P. Varela\"}, {\"authorId\": \"145502961\", \"name\": \"T. N\\u00e6s\"}], \"abstract\": \"Quantitative Descriptive Analysis (QDA) was compared with novel sensory methodology on five high-end loudspeakers using five tracks. The focus of the study was on the ability of different sensory methods to predict quality assessments (liking) made by consumers. Preference mapping indicates that Projective Mapping (PM) and Check All That Apply (CATA) when performed with experts can provide results comparable to QDA, although slightly less accurate. PM done by consumers is less comparable to QDA. Combinations of the sensory tests were also attempted without any clear improvement of results. This article is protected by copyright. All rights reserved. This is the author manuscript accepted for publication and has undergone full peer review but has not been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1111/joss.12620 Description and preferences of sound quality 2 Practical Applications The results indicate that it may be possible to replace QDA with more rapid sensory methodology for assessing sensory quality of audio products. This may speed up and simplify product development process. However, further studies will be needed to consolidate the results.\"}, {\"paperId\": \"3c8