\": 2025, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.62951/modem.v3i2.406?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.62951/modem.v3i2.406, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2420865212\", \"name\": \"Ajar Basyar Tsani\"}, {\"authorId\": \"101999025\", \"name\": \"Fathoni Mahardika\"}, {\"authorId\": \"1660997854\", \"name\": \"Deris Santika\"}], \"abstract\": \"This research aims to develop an interactive web dashboard to support data analysis for vending machine sales. The dashboard is designed to facilitate the management of large datasets through intuitive visualizations and interactive features such as filtering, searching, and pagination. The development process involves several stages, including data collection, data cleaning, analysis, visualization, web design, implementation, and deployment using GitHub Pages. Technologies like HTML, CSS, JavaScript, Chart.js, and Grid.js are utilized to ensure efficiency and accessibility. The results of the research show that the dashboard effectively presents key information, such as sales trends, best-selling products, and payment method preferences, thereby supporting more accurate and data-driven strategic decision-making. However, the research has limitations in integrating predictive analytics. Future development is recommended to include predictive algorithms and test system performance on large-scale data. This solution is expected to contribute significantly to optimizing vending machine management and serve as a development model for similar applications in other business sectors.\"}, {\"paperId\": \"e3720c2c8f89c79fea8981b21290459033007cf8\", \"externalIds\": {\"Corpus