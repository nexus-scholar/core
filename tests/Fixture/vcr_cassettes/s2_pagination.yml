Provides Instant Images on TV Screen\", \"venue\": \"\", \"year\": 1989, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1177/107769588904400105?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1177/107769588904400105, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143737536\", \"name\": \"Frank Hoy\"}], \"abstract\": null}, {\"paperId\": \"bd8243350baf9c926c6911619ff67dc4c9c999a9\", \"externalIds\": {\"CorpusId\": 261273644}, \"title\": \"Effects of renal impairment on the pharmacokinetics and pharmacodynamics of a novel DPP-IV inhibitor , evogliptin ( DA-1229 )\", \"venue\": \"\", \"year\": 2016, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"6941120\", \"name\": \"Jaeseong Oh\"}, {\"authorId\": \"49042985\", \"name\": \"A. H. Kim\"}, {\"authorId\": \"2117177546\", \"name\": \"SeungHwan Lee\"}, {\"authorId\": \"2117090356\", \"name\": \"Hyun\\u2010Kee Cho\"}, {\"authorId\": \"2157295908\", \"name\": \"Y. S. Kim\"}, {\"authorId\": \"6891752\", \"name\": \"M. Bahng\"}, {\"authorId\": \"2268180769\", \"name\": \"S. Yoon\"}, {\"authorId\": \"50546115\", \"name\": \"Joo-Youn Cho\"}, {\"authorId\": \"32133119\", \"name\": \"I. Jang\"}, {\"authorId\": \"2150556313\", \"name\": \"K. Yu\"}], \"abstract\": null}, {\"paperId\": \"bdbb021f6f608303cfa55324e0d209ffa8a4cf0a\", \"externalIds\": {\"MAG\": \"2392837131\", \"CorpusId\": 63963245}, \"title\": \"Implementation of Secondary Boot loader for Large-scale Embedded System\", \"venue\": \"\", \"year\": 2010, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"1381573931\", \"name\": \"Zhang Guo-long\"}, {\"authorId\": \"2072016501\", \"name\": \"Xu Xiaosu\"}], \"abstract\": null}, {\"paperId\": \"be63e63ad853b87fb7fe12032fd7b12ec2e8b1c9\", \"externalIds\": {\"DBLP\": \"journals/isj/ZhangLH20\", \"MAG\": \"2972204512\", \"DOI\": \"10.1111/isj.12266\", \"CorpusId\": 202789235}, \"title\": \"How do interruptions affect user contributions on social commerce?\", \"venue\": \"Information Systems Journal\", \"year\": 2019, \"citationCount\": 21, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://minerva-access.unimelb.edu.au/bitstreams/8cad3cb2-c94b-5472-ac7f-ee04949957ab/download\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/isj.12266?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/isj.12266, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2118278226\", \"name\": \"Yixin Zhang\"}, {\"authorId\": \"2116980213\", \"name\": \"Libo Liu\"}, {\"authorId\": \"1891732\", \"name\": \"S. Y. Ho\"}], \"abstract\": \"Social commerce is an extension of e\\u2010commerce, in which social media is leveraged to promote user contributions. Our study asks how interruptions in relation to interface design influence two types of user contributions: creating shared content and appreciating others' content. We use two interface designs, pagination and infinite scrolling, to manipulate the extent of interruptions to social commerce users. On the basis of the capacity theory of attention, we develop five hypotheses. We empirically test our model using a lab experiment and a field study to show that interruptions reduce users' content appreciation but increase their content creation and that user characteristics moderate these effects. The theoretical and practical contributions of our study are discussed.\"}, {\"paperId\": \"bfbc695c69ebf1805e2d0e5f676744e4013f4851\", \"externalIds\": {\"MAG\": \"2735877640\", \"DOI\": \"10.1177/002072098902600322\", \"CorpusId\": 116443553}, \"title\": \"Book Review: Electric Power Systems, 3rd Ed.\", \"venue\": \"\", \"year\": 1989, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1177/002072098902600322?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1177/002072098902600322, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"32469781\", \"name\": \"N. Hatziargyriou\"}], \"abstract\": null}, {\"paperId\": \"c00dd14c07ab45ef71435ce5bc98c05f82a9cbfb\", \"externalIds\": {\"CorpusId\": 14919537}, \"title\": \"Preservation of Eeg Organization in Patients with Impaired Consciousness and Imaging-based Evidence of Command-following\", \"venue\": \"\", \"year\": null, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://www-users.med.cornell.edu/~jdvicto/pdfs/focofm14.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"48261228\", \"name\": \"Peter B Forgacs\"}, {\"authorId\": \"6528839\", \"name\": \"Mary M Conte\"}, {\"authorId\": \"39747906\", \"name\": \"E. Fridman\"}, {\"authorId\": \"40607171\", \"name\": \"H. Voss\"}, {\"authorId\": \"145415601\", \"name\": \"J. Victor\"}, {\"authorId\": \"2536346\", \"name\": \"N. Schiff\"}, {\"authorId\": \"2243134947\", \"name\": \"John Wiley\"}, {\"authorId\": \"2076559920\", \"name\": \"Sons\"}], \"abstract\": null}, {\"paperId\": \"c14073728e70272058e7033b85372b50e60f0225\", \"externalIds\": {\"DOI\": \"10.61132/merkurius.v3i4.997\", \"CorpusId\": 280880577}, \"title\": \"Implementasi REST API Pengelolaan Data Penduduk Multi-Desa Berbasis Laravel dengan Autentikasi Sanctum\", \"venue\": \"Merkurius : Jurnal Riset  Sistem Informasi dan Teknik Informatika\", \"year\": 2025, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.61132/merkurius.v3i4.997?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.61132/merkurius.v3i4.997, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2377393975\", \"name\": \"Aldino Dewa Ndaru\"}, {\"authorId\": \"2377376505\", \"name\": \"Mujahidin Aljawari\"}, {\"authorId\": \"2377386277\", \"name\": \"Muh Yudha Setiawan\"}], \"abstract\": \"Village websites currently generally only provide information in the form of an interface for users, such as village profiles, potential areas, population data, and current news. However, the majority are not yet equipped with Application Programming Interface (API) support that allows for flexible and automated data integration and exchange. This is a challenge when dynamic access is needed by third-party systems, such as public service platforms, mobile applications, or local government information systems, which require real-time and accurate synchronization of population data. The project aims to implement a RESTful API that can be accessed securely, efficiently, and easily understood by developers to retrieve villagers' data. The development of the system is carried out using the Agile method, which supports rapid iteration and periodic evaluation to ensure that each feature functions optimally according to the needs of users and field conditions. This Agile method is applied in several sprints that include the stages of needs planning, designing the API endpoint structure, coding, documentation, and testing of the integration and security of the system as a whole. The results of the implementation show that the API successfully retrieves data directly from the village database, and presents it in a JSON format that is compatible for use by both frontend and third-party systems. This API supports pagination features for efficient access to large amounts of data, and is equipped with Basic Authentication to keep data access secure from being abused. With this API, the village website not only becomes a static information medium, but also transforms into a digital service platform that is open for cross-system integration. This supports the development of a more modern, efficient, sustainable, and collaborative village information system in the future, so that public services can be significantly improved.\"}, {\"paperId\": \"c184a66fc450a8ad3cd591f885bed92d34b2e37d\", \"externalIds\": {\"DOI\": \"10.20961/jeeict.7.2.108430\", \"CorpusId\": 285412421}, \"title\": \"Scalable Microservices Architecture for Face Recognition-Based Employee Attendance Systems\", \"venue\": \"Journal of Electrical, Electronic, Information, and Communication Technology\", \"year\": 2025, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.20961/jeeict.7.2.108430?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.20961/jeeict.7.2.108430, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2269527085\", \"name\": \"Ridwan Setiawan\"}, {\"authorId\": \"2295187052\", \"name\": \"Wawan Hermawan\"}, {\"authorId\": \"2201921986\", \"name\": \"A. Setiawan\"}], \"abstract\": \"We present a face-recognition-based employee attendance system built on a microservices architecture and integrated with the external Worker AI (LSKK) inference API. The design separates camera I/O, verification, persistence, and presentation into independently deployable services, enabling targeted scaling and resilient operation through asynchronous queues. The system was developed using Rapid Application Development (RAD) and evaluated via black-box testing that covered authentication, camera and AI data views, filtering and pagination, reporting, and employee CRUD. The results show conformance to specifications: the interface renders the expected outputs, and the cooldown policy effectively prevents duplicate entries, while the separation of history (raw) and history_ai (verified) supports traceability and clean reporting. These findings indicate that combining microservices with API-based face recognition offers a practical and maintainable alternative to RFID-based workflows with fewer operational frictions. Limitations include the use of an external inference API (model configuration and thresholds are outside our control) and testing within a single organizational setting. Future work will focus on operational measurements of the deployed pipeline, particularly end-to-end latency under load spikes and queue formation, as well as monitoring misread/error rates to inform model improvements.\"}, {\"paperId\": \"c1ea01bf0ab1ae430796ae0edcc98748f6b4f68f\", \"externalIds\": {\"CorpusId\": 16185221}, \"title\": \"The Open Access Ins