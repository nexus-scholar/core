/jmde.v6i12.250?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.56645/jmde.v6i12.250, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145522380\", \"name\": \"P. Black\"}], \"abstract\": \"Citing this paper Please note that where the full-text provided on King's Research Portal is the Author Accepted Manuscript or Post-Print version this may differ from the final Published version. If citing, it is advised that you check and use the publisher's definitive version for pagination, volume/issue, and date of publication details. And where the final published version is provided on the Research Portal, if citing you are again advised to check the publisher's website for any subsequent corrections.\"}, {\"paperId\": \"6b4c3b56df842aff9a1047c1f26704d1519b6e49\", \"externalIds\": {\"CorpusId\": 159035024}, \"title\": \"EFFECTS OF SOURCE SW-INTEREST AND INDUCED SIMILARITY /DISSIMILARITY ON OPINION CHANCE,\", \"venue\": \"\", \"year\": 2011, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://files.eric.ed.gov/fulltext/ED078466.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"66730405\", \"name\": \"S. Marry\"}, {\"authorId\": \"2082116810\", \"name\": \"Donnit\"}], \"abstract\": null}, {\"paperId\": \"6c048a64aad1d3327914e0bb9af5eb7366537274\", \"externalIds\": {\"MAG\": \"2951470732\", \"DOI\": \"10.15835/NBHA47311395\", \"CorpusId\": 196647036}, \"title\": \"Nutritional Value of Garden Dill (Anethum graveolens L.), Depending on Genotype\", \"venue\": \"Notulae Botanicae Horti Agrobotanici Cluj-Napoca\", \"year\": 2019, \"citationCount\": 13, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.notulaebotanicae.ro/index.php/nbha/article/download/11395/8800\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.15835/NBHA47311395?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.15835/NBHA47311395, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"15531085\", \"name\": \"A. Biesiada\"}, {\"authorId\": \"2256916498\", \"name\": \"K. Kedra\"}, {\"authorId\": \"1948002301\", \"name\": \"K. Godlewska\"}, {\"authorId\": \"3736071\", \"name\": \"A. Szumny\"}, {\"authorId\": \"1403676386\", \"name\": \"A. Nawirska-Olsza\\u0144ska\"}], \"abstract\": \"The yield, chemical composition and antioxidant activity of eight genotypes (\\u2018Krezus\\u2019, \\u2018Turkus\\u2019, \\u2018Kozak\\u2019, \\u2018Szmaragd\\u2019, \\u2018Lukullus\\u2019, \\u2018Herkules\\u2019, \\u2018Ambrozja\\u2019, \\u2018Moravan\\u2019) of garden dill (Anethum graveolens L.) biomass was estimated. Field experiments were conducted in 2011-2013 in Poland. The crop lasted 44 days and plants were collected at the 4-5 true leaf stage (a bunch harvest). The highest marketable yield was obtained for \\u2018Krezus\\u2019 and \\u2018Szmaragd\\u2019 cultivars (1.18 kg\\u00b7m-2), while the lowest for \\u2018Herkules\\u2019 (0.53 kg\\u00b7m-2). The dry matter of leaves ranged from 15.17% (\\u2018Ambrozja\\u2019) to 19.27% (\\u2018Krezus\\u2019). The study also proved that the genotype influenced the content of chlorophylls a+b, e.g. 1.10 g\\u00b7kg-1 (\\u2018Moravan\\u2019) and 0.78 g\\u00b7kg-1 (\\u2018Lukullus\\u2019), respectively carotenoids: 21.43 mg\\u00b7100 g-1 (\\u2018Moravan\\u2019) and 11.78 mg\\u00b7100 g-1 (\\u2018Szmaragd\\u2019). The content of nitrates (371.48 mg\\u00b7kg-1 \\u2018Lukullus\\u2019 - 110 mg\\u00b7kg-1 \\u2018Szmaragd\\u2019), K (11.30% \\u2018Moravan\\u2019 - 5.37% \\u2018Kozak\\u2019), Ca (2.06% \\u2018Turkus\\u2019 - 1.77% \\u2018Kozak\\u2019), and oils (99.13% \\u2018Lukullus\\u2019 - 93.82% \\u2018Ambrozja\\u2019) was also varied. In most cases the content of Mg, P, sugars and ascorbic acid was on similar level. The antioxidant activity was significantly different between tested groups (12.22 \\u00b5M\\u00b7g-1 \\u2018Turkus\\u2019 - 6.27 \\u00b5M\\u00b7g-1 \\u2018Krezus\\u2019). The presented research proved that the genotype of garden dill affects yield and chemical composition of plants. \\n\\u00a0 \\n********* \\nIn press - Online First. Article has been peer reviewed, accepted for publication and published online without pagination. It will receive pagination when the issue will be ready for publishing as a complete number (Volume 47, Issue 3, 2019). The article is searchable and citable by Digital Object Identifier (DOI).\\u00a0DOI link will become active after the article will be included in the complete issue. \\n*********\"}, {\"paperId\": \"6c1621074fca07d7c5f88ccf6936175262bc5786\", \"externalIds\": {\"DOI\": \"10.5014/ajot.2017.72S221\", \"CorpusId\": 59225989, \"PubMed\": \"30674416\"}, \"title\": \"Guidelines for Contributors to AJOT.\", \"venue\": \"American Journal of Occupational Therapy\", \"year\": 2018, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://ajot.aota.org/pdfaccess.ashx?url=/aota/content_public/journal/ajot/937488/7212430010p1.pdf\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.5014/ajot.2017.72S221?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.5014/ajot.2017.72S221, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": \"A structured abstract of no more than 250 words is required for all articles. Refer to the \\u201cGuidelines for Structured Abstracts\\u201d available in the Author Area in the manuscript submission system, https://ajot.submit2aota.org/. Abstracts for The Issue Is manuscripts, A Brief Report manuscripts, and guest editorials should contain a synopsis of the main points and be limited to 150 words. Authors of accepted manuscripts will be asked to provide a one-sentence \\u201cblurb\\u201d summarizing the article for the annotated table of contents. The American Journal of Occupational Therapy 7212430010p5 D ow naded rom http://research.aajot/article-pdf/72/Supplem ent_2/72124301940/7212430010p1.pdf by gest on 03 N ovem er 2021 \\u201cImplications for Occupational Therapy Practice\\u201d Section. Feature-length articles, including evidence reviews, must include a separate section summarizing the implications of the research for occupational therapy practice after the discussion and before the conclusion. This section should consist of a short paragraph followed by a bulleted list of the practice implications, and it should be included in the manuscript\\u2019s word count. Although Brief Reports do not require a separate section, they should clearly indicate the implications for clinical practice in their discussion. This section is meant to be a brief section highlighting the study\\u2019s implications for clinical practice. It should be written in lay language and should not include implications for research or restate the results or discussion. Rather, it should look ahead to how the findings might be extended to routine clinical practice. The points discussed in this section should stay within the limits of the study findings: \\u2022 If the study tests the effects of a particular intervention, then mention what those effects might mean for clinical practice. Do not include statements about general occupational therapy practice unless tested in the study. \\u2022 Do not include statements related to a particular assessment approach if the study did not test assessment practices. \\u2022 If the study provides confirmatory evidence, then use wording such as \\u201cthis study confirms previous work that. . . .\\u201d or \\u201cthe results offer further evidence that. . . .\\u201d \\u2022 If the study suggests a promising type or amount of service that is not feasible as a result of current health care or reimbursement policies, it may be more appropriate to suggest that practitioners advocate for changes in policies rather than provide that service. \\u2022 For pilot or feasibility studies, the only statements that can be made are as to whether the intervention may have potential to facilitate benefits if larger studies show similar results. In addition, the following statement may be made: \\u201cIf practitioners choose to implement this approach clinically, they need to carefully document treatment content, client responses to the treatment, and changes in client functioning (or occupational engagement) from start to termination of treatment.\\u201d If the findings have relevance for occupational therapy education, authors may include a section on implications for occupational therapy education (this would be the only \\u201cimplications\\u201d section if the study is educational research). It is not sufficient to argue that new content must be included in entry-level curricula. Occupational therapy education programs typically are overloaded with content; therefore, authors making recommendations to add content should provide an idea of what could be replaced in current curricula. Future research directions can be a separate section or included in the discussion section; either way, the section should be indicated with its own heading. Acknowledgments Page. The acknowledgments are included in the unmasked copy only. This section follows the last page of the text and precedes the reference list. Acknowledgments should be brief and may include names of persons who contributed to the research or article but who are not authors (e.g., a statistician), followed by any funding bodies that supported the research and appropriate grant numbers. The study\\u2019s clinical trial registration number should be provided in this section. Prior presentation of the paper at a meeting should be briefly described last. References. Follow APA6 for reference format. List references in alphabetical order starting on the page after the last page of text (in the masked version) or after the acknowledgments (in the unmasked version). All references cited in the manuscript should appear in the reference list, including studies listed in evidence tables. Studies that are included in systematic reviews or scoping reviews should have an asterisk placed at the start of the reference entry in the reference list. Occasionally, the number of references for a critical review is so large that the manuscript would significantly exceed page limitations if all the reviewed studies were included in the reference list. Please contact the Editor-in-Chief at lorie.richards@hsc.utah.edu for guidance in such situations. In-text citations should use author\\u2013date format. References to journal articles must include the digital object identifier (DOI), and URLs must link to the specific document being cited, not a home page. Personal communications and other nonretrievable citations are described in the text only; consult APA6 for the correct format. Authors are solely responsible for the accuracy and completeness of their references and for correct text citation; manuscripts with significant deficiencies in citation format will be returned to authors for correction. Because articles can be added to an issue until close to the print publication date, the journal\\u2019s pagination uses unique article identifiers instead of standard page numbers. When citing an AJOT article published in or after 2015, the article identifier appears in place of article page numbers. The APA-formatted citation is provided after the abstract in each published AJOT article for the conveniencein each published AJOT article for the convenience of authors wanting to cite the article. The following are examples of commonly used reference citations: 7212430010p6 November/December 2018, Volume 72(Supplement 2) D ow naded rom http://research.aajot/article-pdf/72/Supplem ent_2/72124301940/7212430010p1.pdf by gest on 03 N ovem er 2021 \\u2022 Journal Article (hard copy or not available online): Dunton, W. R., Jr. (1926). An historical note. Occupational Therapy and Rehabilitation, 5, 427\\u2013439. \\u2022 Journal Article (online version, with DOI): Arbesman, M., & Lieberman, D. (2011). Methodology for the systematic reviews on occupational therapy for adults with Alzheimer\\u2019s disease and related dementias. American Journal of Occupational Therapy, 65, 490\\u2013496. https://doi.org/10.5014/ajot.2011.002576 \\u2022 Journal Article (online version, no DOI): Gram, M., & Smed, K. (2011). We can drink our coffee more slowly: Discursive uses of age in relation to holiday consumption\\u2014Examples among Danish and German mature travellers. E-Journal of Applied Psychology, 7(1), 2\\u20137. Retrieved from http://vbn.aau.dk/en/publications/ we-can-drink-our-coffee-more-slowly-discursive-usesof-age-in-relation-to-holiday-consumption--examplesamong-danish-and-german-mature-travellers(7a54a952b230-44b7-8ebd-0c0b1aee13f4).html \\u2022 Book With Corporate Author and Author as Publisher: American Psychiatric Association. (2013).Diagnostic and statistical manual of mental disorders (5th ed.). Arlington, VA: American Psychiatric Publishing. World Health Organization. (2001). International classification of functioning, disability and health. Geneva:\"}, {\"paperId\": \"6c204fd20f45cb234f49c7730f3c8a16796245ed\", \"externalIds\": {\"ArXiv\": \"1208.3292\", \"DOI\": \"10.1214/11-STS356A\", \"CorpusId\": 88519246}, \"title\": \"Discussion of\\\"Multiple Testing for Exploratory Research\\\"by J. J. Goeman and A. Solari\", \"venue\": \"\", \"year\": 2012, \"citationCount\": 2, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1214/11-sts356a\", \"status\": \"HYBRID\", \"license\": \"unspecified-oa\", \"disclaimer\": \"Notice: Paper or abstract available at https://arxiv.org/abs/1208.3292, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144622349\", \"name\": \"R. Heller\"}], \"abstract\": \"Goeman and Solari [Statist. Sci. 26 (2011) 584\\u2013597] have addressed the interesting topic of multiple testing for exploratory research, and provided us with nice suggestions for exploratory analysis. They defined properties that an inferential procedure should have for exploratory analysis: the procedure should be mild, flexible and post hoc. Their inferential procedure gives a lower bound on the number of false hypotheses among the selected hypotheses, and moreover whenever possible identifies elementary hypotheses that are false. The need to estimate a lower bound on the number of false hypotheses arises in various applications, and the partial conjunction approach was developed for this purpose in Biometrics 64 (2008) 1215\\u20131222 (see also Philos. Trans. R. Soc. Lond. Ser. A 367 (2009) 4255\\u20134271 for more details). For example, in a combined analysis of several studies that examine the same problem, it is of interest to give a lower bound on the number of studies in which the finding was reproduced. I will first address the relation between the method of Goeman and Solari and the partial conjunction approach. Then I will discuss possible extensions and address the issue of exploration in more general settings, where the local test may not be defined in advance or where the candidate hypotheses may not be known to begin with. 1. RELATION TO THE TESTING OF PARTIAL CONJUNCTION HYPOTHESES Let H1, . . . ,Hn be the elementary hypotheses. The idea of giving a lower bound on the number of false elementary hypotheses (or equivalently an upper bound on the number of true elementary hypotheses) appears in [1], and is closely related to the tests of partial conjunction hypotheses. The partial conjunction null hypothesis Hu/n in [1] asks Ruth Heller is Senior Lecturer, Department of Statistics and Operations Research, Tel-Aviv University, Tel-Aviv, Israel e-mail: ruheller@post.tau.ac.il. This is an electronic reprint of the original article published by the Institute of Mathematical Statistics in Statistical Science, 2011, Vol. 26, No. 4, 598\\u2013600. This reprint differs from the original in pagination and typographic detail. whether fewer than u of the elementary hypotheses are false, and the alternative hypothesis is that at least u of the elementary hypotheses are false. Testing whether Hu/n is false at a significance level \\u03b1 in order (i.e., for u = 1,2, . . .) results in a 1 \\u2212 \\u03b1 confidence lower bound on the number of false elementary hypotheses: Theorem 1.1. Let pu/n be a partial conjunction p-value for testing Hu/n. Let umax =max{u :p i/n \\u2264 \\u03b1 \\u2200i = 1, . . . , u}. Then with 1 \\u2212 \\u03b1 confidence, the true number of false hypotheses is in [umax, n]. Proof. Let k be the true number of false elementary hypotheses. If k = n, that is, all elementary hypotheses are false, there is nothing to prove. If k < n, Pr(k \\u2265 umax) = 1\\u2212Pr(k < umax) = 1\\u2212Pr(P (k+1)/n \\u2264 \\u03b1)\\u2265 1\\u2212\\u03b1.\"}, {\"paperId\": \"6e9c8b495d99fadee4fa908ed289dd0b9f5469b5\", \"externalIds\": {\"MAG\": \"3130025612\", \"DOI\": \"10.1002/ENTE.202001099\", \"CorpusId\": 233923454}, \"title\": \"A Brief Review of Solar Indoor Lighting System Integrated with Optofluidic Technologies\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/ENTE.202001099?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/ENTE.202001099, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"9330347\", \"name\": \"Qiang Chen\"}, {\"authorId\": \"145698595\", \"name\": \"M. Burhan\"}, {\"authorId\": \"48854097\", \"name\": \"S. Oh\"}], \"abstract\": \"been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1002/ente.202001099. This article is protected by copyright. All rights reserved A Brief Review of Solar Indoor Lighting System Integrated with Optofluidic Technologies Qian Chen1,2, Muhammad Burhan2, and Seung Jin Oh3 1Department of Mechanical Engineering, National University of Singapore, Block EA, #07-08, 9 Engineering Drive 1, Singapore 117576, Siigurengapore. 2 King Abdullah University of Science and Technology (KAUST), Water Desalination and Reuse Centre (WDRC), Biological and Environmental Science & Engineering (BESE), Thuwal 239556900, Saudi Arabia. 3Korea Institute of Industrial Technology, 102 Jejudaehak-ro, Jeju Special Self-governing Province 63243, Republic of Korea. Abstract Indoor lighting system incorporating daylighting effectively provides potential energy savings as well as meaningful spatial and temporal variation in illuminance beneficial to human well-being and performance. Integration of the tunable liquid prisms driven by optofluidic technologies will further improve the solar indoor lighting systems to achieve better illumination performance and higher solar energy utilization efficiency. This paper provides an overview of the state-of-the-art investigations over different aspects of the solar indoor lighting system enhanced by optofluidic liquid prisms, including (1) theoretical background, design, fabrication, and operation of liquid prisms, (2) advances in solar collectors and solar trackers, and (3) major tools for indoor lighting simulation and ray-tracing simulation. These studies form a solid foundation for future solar indoor lighting systems integrated with optofluidic technologies. The prospective study will focus on laboratory and on-site testing of the integrated system.\"}, {\"paperId\": \"6ee981e3e35011686c7fa95f0e1c7299e1626b96\", \"externalIds\": {\"DOI\": \"10.1109/KSE68178.2025.11309526\", \"CorpusId\": 284358681}, \"title\": \"iTestLayout: An Automatic Pagination Algorithm for Print-Ready Examination Papers\", \"venue\": \"International Conference on Knowledge and Systems Engineering\", \"year\": 2025, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1109/KSE68178.2025.11309526?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1109/KSE68178.2025.11309526, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"143691985\", \"name\": \"T. Dinh\"}], \"abstract\": \"In educational institutions, especially during highstakes assessments, preparing well-formatted printed exam papers is a critical yet time-consuming task. Traditional methods of exam layout creation require significant manual effort and are prone to formatting inconsistencies. This paper proposes an efficient algorithm for automatic pagination and layout generation of exam papers, designed to meet practical constraints such as spacing, question grouping, and optimal page utilization. The algorithm is implemented in the iTest system, which is currently deployed across multiple universities and testing centers. Through experimental validation on real-world datasets, the proposed method demonstrates high layout quality, correctness, and runtime efficiency. A public deployment is made available for reproducibility and live demonstration.\"}, {\"paperId\": \"73da2f80f7cff0832d5ef028020e57840038e09d\", \"externalIds\": {\"MAG\": \"2312908301\", \"DOI\": \"10.2307/3115691\", \"CorpusId\": 155345512}, \"title\": \"Sugar and Slavery in Puerto Rico: The Plantation Economy of Ponce, 1800\\u20131850. By Francisco A. Scarano. (Madison: University of Wisconsin Press, 1984. xxv + 242 pp. $21.50.)\", \"venue\": \"Business History Review\", \"year\": 1986, \"citationCount\": 9, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.2307/3115691?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.2307/3115691, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2059661457\", \"name\": \"D. Murray\"}], \"abstract\": null}, {\"paperId\": \"7683049f8fb94fce78443ecfe5e859a58c00c880\", \"externalIds\": {\"CorpusId\": 263259542}, \"title\": \"Chest tcpO 2 changes during constant-load treadmill walking tests in patients with claudication\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 3, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://core.ac.uk/download/pdf/52413442.pdf, which 