3626083}, \"title\": \"Estimation of annual indexes of abundance and trend from the American Woodcock singing-ground survey: Comparison of 4 models\", \"venue\": \"\", \"year\": 2021, \"citationCount\": 1, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://meridian.allenpress.com/jfwm/article-pdf/12/1/83/2883505/i1944-687x-12-1-83.pdf\", \"status\": \"GOLD\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.3996/JFWM-20-079?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.3996/JFWM-20-079, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"34268663\", \"name\": \"J. Sauer\"}, {\"authorId\": \"66848625\", \"name\": \"W. Link\"}, {\"authorId\": \"5541328\", \"name\": \"M. Seamans\"}, {\"authorId\": \"104036720\", \"name\": \"Rebecca D. Rau\"}], \"abstract\": \": Status and trends of American Woodcock Scolopax minor populations in the eastern and central US and Canada are monitored via a Singing-ground Survey , conducted just after sunset along roadsides in spring. Annual analyses of the survey produce estimates of trend and annual indexes of abundance for 25 states and provinces, eastern and central management regions, and survey-wide. In recent years, a loglinear hierarchical model that defines year effects as random effects in the context of a slope parameter (the S Model) has been used to model population change. Recently, alternative models have been proposed for analysis of Singing-ground Survey data. Analysis of a similar roadside survey, the North American Breeding Bird Survey , has indicated that alternative models are preferable for almost all species analyzed in the Breeding Bird Survey. Here, we use leave-one-out cross validation to compare model fit for the present Singing-ground Survey model to fits of three alternative models, including a model that describes population change as the difference in expected counts between successive years (the D model) and two models that include t distributed extra-Poisson overdispersion effects (H models) as opposed to normally-distributed extra-Poisson overdispersion. Leave-one-out cross validation results indicate that the D model was favored by the Bayesian predictive information criterion but a pairwise t -test indicated that model D was not significantly better-fitting to Singing-ground Survey data than the S model. The H models are not preferable to the alternatives with normally-distributed overdispersion. All models provided generally similar estimates of trend and annual indexes suggesting that, within this model set, choice of model will not lead to alternative conclusions regarding population change. However, as in Breeding Bird Abstract Status and trends of American Woodcock Scolopax minor populations in the eastern and central US and 15 Canada are monitored via a Singing-ground Survey, conducted just after sunset along roadsides in 16 spring. Annual analyses of the survey produce estimates of trend and annual indexes of abundance for 17 25 states and provinces, eastern and central management regions, and survey-wide. In recent years, a 18 log-linear hierarchical model that defines year effects as random effects in the context of a slope 19 parameter (the S Model) has been used to model population change. Recently, alternative models have 20 been proposed for analysis of Singing-ground Survey data. Analysis of a similar roadside survey, the 21 North American Breeding Bird Survey, has indicated that alternative models are preferable for almost all 22 species analyzed in the Breeding Bird Survey. Here, we use leave-one-out cross validation to compare 23 model fit for the present Singing-ground Survey model to fits of three alternative models, including a 24 model that describes population change as the difference in expected counts between successive years 25 (the D model) and two models that include t -distributed extra-Poisson overdispersion effects (H models) 26 as opposed to normally-distributed extra-Poisson overdispersion. Leave-one-out cross validation 27 results indicate that the D model was favored by the Bayesian predictive information criterion but a 28 pairwise t -test indicated that model D was not significantly better-fitting to Singing-ground Survey data 29 than the S model. The H models are not preferable to the alternatives with normally-distributed 30 overdispersion. All models provided generally similar estimates of trend and annual indexes suggesting 31 that, within this model set, choice of model will not lead to alternative conclusions regarding population 32 change. However, as in Breeding Bird Survey analyses, we note a tendency for S model results to 33 provide slightly more extreme estimates of trend relative to D models. We recommend use of the D 34 model for future Singing-ground Survey analyses. Estimation of annual indexes of and trend from The Singing-Ground Survey: This Online Early paper will appear in its final typeset version in a future issue of the Journal of Fish and 41 Wildlife Management. This article has been accepted for publication and undergone full peer review but 42 has not been through the copyediting, typesetting, pagination and proofreading process, which may 43 lead to differences between this version and the Version of Record. The findings and conclusions in this 44 article are those of the author(s) and do not necessarily represent the views of the U.S. Fish and Wildlife 45 Service.\"}, {\"paperId\": \"ce11982d77dcf1456b403adb06a0da16d4097301\", \"externalIds\": {\"CorpusId\": 720976}, \"title\": \"Access to the Published Version May Require Subscription. Published with Permission From: Pharmacodynamic Properties of Isoallopregnanolone in Healthy Women\", \"venue\": \"\", \"year\": null, \"citationCount\": 15, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"5237350\", \"name\": \"H. Hedstr\\u00f6m\"}, {\"authorId\": \"5342677\", \"name\": \"M. Bixo\"}, {\"authorId\": \"3383427\", \"name\": \"Sigrid Nyberg\"}, {\"authorId\": \"4206150\", \"name\": \"O. Spigset\"}, {\"authorId\": \"6225707\", \"name\": \"Elisabeth Zingmark\"}, {\"authorId\": \"3476310\", \"name\": \"T. B\\u00e4ckstr\\u00f6m\"}, {\"authorId\": \"1391809760\", \"name\": \"S. Verlag\"}], \"abstract\": null}, {\"paperId\": \"cf4aa9e6103cbdaea74b77579e64e9d4c3c1582e\", \"externalIds\": {\"MAG\": \"2790056725\", \"DOI\": \"10.1177/030751338507101S17\", \"CorpusId\": 194038298}, \"title\": \"Book Review: Egypt before the Pharaohs\", \"venue\": \"\", \"year\": 1988, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://journals.sagepub.com/doi/pdf/10.1177/030751338507101S17\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1177/030751338507101S17?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1177/030751338507101S17, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145496326\", \"name\": \"W. Davis\"}], \"abstract\": null}, {\"paperId\": \"d12b8a4de6ea2015b70da2f47c75756219c6ede1\", \"externalIds\": {\"MAG\": \"2888130188\", \"DOI\": \"10.1111/JOSS.12464\", \"CorpusId\": 150348012}, \"title\": \"Sensory discrimination of the viscosity of thickened liquids for dysphagia management\", \"venue\": \"Journal of sensory studies\", \"year\": 2018, \"citationCount\": 6, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"http://minerva-access.unimelb.edu.au/bitstreams/eb53d207-d81c-501d-8f77-a0c61522c313/download\", \"status\": \"GREEN\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1111/JOSS.12464?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1111/JOSS.12464, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144730700\", \"name\": \"Lei Zhong\"}, {\"authorId\": \"80351459\", \"name\": \"E. Hadde\"}, {\"authorId\": \"2142239381\", \"name\": \"Zeguang Zhou\"}, {\"authorId\": \"119561691\", \"name\": \"Yao-Zheng Xia\"}, {\"authorId\": \"28333931\", \"name\": \"Jianshe Chen\"}], \"abstract\": \"Thickened water and thickened milk are frequently used in dysphagia management. However, there is still lack of information regarding the correlation between their measured viscosity and sensory viscosity. In this work, the relationship was investigated by rheological measurements and a series of tactile sensory tests. Both magnitude estimation and triangle protocols were used for the evaluation. The rheological data indicated that both thickened water and thickened milk were shear thinning, but the shear viscosity of thickened milk was obviously higher than that of thickened water for the same amount of thickeners. For the participants considered, the perception of thickened water and thickened milk both obeyed the Stevens\\u2019 power law according to the results of magnitude estimation. It was found in the triangle assessments that within the proposed nectarand honey-thick viscosity ranges, participants were able to correctly discriminate a 0.83-fold and a 1.05-fold increase in shear viscosity for thickened water and thickened milk, This article is protected by copyright. All rights reserved. This is the author manuscript accepted for publication and has undergone full peer review but has not been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1111/joss.12464 respectively. Results of both magnitude estimation and triangle tests suggested that human abilities in detecting the viscosity changes of thickened water and thickened milk by finger tactile sensory were similar within nectarand honeythick viscosity range in spite of their different compositions and rheological properties. PRACTICAL APPLICATIONS Thickened water and thickened milk are commonly used in the management of individuals with dysphagia to improve their quality of life. However, it is difficult to determine the optimal thickening degree in clinical practice because there is a lack of information of the perception of their rheological properties. To investigate the human sensory ability in detecting viscosity differences of thickened water and thickened milk is essential to improve our understanding of the perception of thickened liquids. Moreover, it provides significant information for manufacturing high quality thickened liquids products and for setting guidelines for effectively preparing and serving thickened liquids to individuals with dysphagia.\"}, {\"paperId\": \"d227a3c9275b7fefa56795f3ef538dad2a500fc5\", \"externalIds\": {\"CorpusId\": 16392047}, \"title\": \"Serum cathepsin S is associated with decreased insulin sensitivity and the development of diabetes type 2 in a community based cohort of elderly men\", \"venue\": \"\", \"year\": 2015, \"citationCount\": 2, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at http://uu.diva-portal.org/smash/get/diva2:755055/FULLTEXT01.pdf, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2105755\", \"name\": \"E. Ingelsson\"}, {\"authorId\": \"144023638\", \"name\": \"J. Sundstr\\u00f6m\"}, {\"authorId\": \"3291163\", \"name\": \"M. Jobs\"}, {\"authorId\": \"6092215\", \"name\": \"D. Iggman\"}, {\"authorId\": \"143662361\", \"name\": \"S. Basu\"}, {\"authorId\": \"145484431\", \"name\": \"A. Larsson\"}, {\"authorId\": \"2813823\", \"name\": \"L. Lind\"}, {\"authorId\": \"4998047\", \"name\": \"J. \\u00c4rnl\\u00f6v\"}], \"abstract\": null}, {\"paperId\": \"d27b8bebd14acd4bf6f8693d60dfc78e2a977761\", \"externalIds\": {\"CorpusId\": 251394854}, \"title\": \"The Significance of Placental Cord Insertion Site in Twin Pregnancy: Cord insertion site and complications in twins\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20201108090649/https://ora.ox.ac.uk/objects/uuid:288af2af-250f-4600-8475-c5f87588d9ef/download_file?safe_filename=Kalafat_et_al-2017-Ultrasound_in_Obstetrics_%2526_Gynecology.pdf&file_format=application%2Fpdf&type_of_work=Journal+article, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"8520484\", \"name\": \"Erkan Kalafat\"}, {\"authorId\": \"7843573\", \"name\": \"B. Thilaganathan\"}, {\"authorId\": \"2635802\", \"name\": \"A. Papageorghiou\"}, {\"authorId\": \"143656645\", \"name\": \"A. Bhide\"}, {\"authorId\": \"144875875\", \"name\": \"A. Khalil\"}], \"abstract\": null}, {\"paperId\": \"d33fa8a99c91fdc0a323e535c58b387620968ec3\", \"externalIds\": {\"MAG\": \"3099177793\", \"DOI\": \"10.22541/au.159200593.35059071/v2\", \"CorpusId\": 228814414}, \"title\": \"Hybrid ferro