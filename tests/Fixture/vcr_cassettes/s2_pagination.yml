tationCount\": 8, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"1792649\", \"name\": \"M. Zolotukhin\"}, {\"authorId\": \"2149631619\", \"name\": \"Timo H\\u00e4m\\u00e4l\\u00e4inen\"}, {\"authorId\": \"1792649\", \"name\": \"M. Zolotukhin\"}, {\"authorId\": \"2358663794\", \"name\": \"H\\u00e4m\\u00e4l\\u00e4inen\"}, {\"authorId\": \"1792649\", \"name\": \"M. Zolotukhin\"}], \"abstract\": null}, {\"paperId\": \"a76ce25e72f34b76a66475576514b860648fcb75\", \"externalIds\": {\"DOI\": \"10.1007/s10973-024-13890-2\", \"CorpusId\": 274967678}, \"title\": \"Comparative analysis of thermally radiative parabolic surface with heat generation to investigate the Williamson hybrid nanofluid flow via artificial neural network\", \"venue\": \"Journal of Thermal Analysis and Calorimetry\", \"year\": 2024, \"citationCount\": 4, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1007/s10973-024-13890-2?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1007/s10973-024-13890-2, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2277369712\", \"name\": \"Asadullah\"}, {\"authorId\": \"2297794257\", \"name\": \"S. Bilal\"}, {\"authorId\": \"2026145\", \"name\": \"N. Akbar\"}], \"abstract\": null}, {\"paperId\": \"a77b0d68324bd20e5fec3ebcb3622c6f86c80104\", \"externalIds\": {\"ArXiv\": \"2604.14878\", \"CorpusId\": 287508840}, \"title\": \"GenRec: A Preference-Oriented Generative Framework for Large-Scale Recommendation\", \"venue\": \"\", \"year\": 2026, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://arxiv.org/abs/2604.14878, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2113959753\", \"name\": \"Y. Zou\"}, {\"authorId\": \"2390895153\", \"name\": \"J. Qi\"}, {\"authorId\": \"2348303613\", \"name\": \"Lunsong Huang\"}, {\"authorId\": \"2367006800\", \"name\": \"Yu Li\"}, {\"authorId\": \"2356544135\", \"name\": \"Kewei Xu\"}, {\"authorId\": \"2390481405\", \"name\": \"Jiabao Gao\"}, {\"authorId\": \"2256961540\", \"name\": \"Bin Zhao\"}, {\"authorId\": \"2165773558\", \"name\": \"Xuanhua Yang\"}, {\"authorId\": \"2271360829\", \"name\": \"Sulong Xu\"}, {\"authorId\": \"2153700417\", \"name\": \"Shengjie Li\"}], \"abstract\": \"Generative Retrieval (GR) offers a promising paradigm for recommendation through next-token prediction (NTP). However, scaling it to large-scale industrial systems introduces three challenges: (i) within a single request, the identical model inputs may produce inconsistent outputs due to the pagination request mechanism; (ii) the prohibitive cost of encoding long user behavior sequences with multi-token item representations based on semantic IDs, and (iii) aligning the generative policy with nuanced user preference signals. We present GenRec, a preference-oriented generative framework deployed on the JD App that addresses above challenges within a single decoder-only architecture. For training objective, we propose Page-wise NTP task, which supervises over an entire interaction page rather than each interacted item individually, providing denser gradient signal and resolving the one-to-many ambiguity of point-wise training. On the prefilling side, an asymmetric linear Token Merger compresses multi-token Semantic IDs in the prompt while preserving full-resolution decoding, reducing input length by ~2X with negligible accuracy loss. To further align outputs with user satisfaction, we introduce GRPO-SR, a reinforcement learning method that pairs Group Relative Policy Optimization with NLL regularization for training stability, and employs Hybrid Rewards combining a dense reward model with a relevance gate to mitigate reward hacking. In month-long online A/B tests serving production traffic, GenRec achieves 9.5% improvement in click count and 8.7% in transaction count over the existing pipeline.\"}, {\"paperId\": \"a81a4753cca8ea2b2aa145c53db8a807abeb8dad\", \"externalIds\": {\"CorpusId\": 286872978}, \"title\": \"Chemical composition, antimicrobial and insecticidal activity against the lesser mealworm Alphitobius diaperinus (Panzer) (Coleoptera: Tenebrionidae) of Origanum vulgare L. ssp. hirtum (Link) and Artemisia dracunculus L. essential oils:\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2265856609\", \"name\": \"Marian Szczepanik\"}, {\"authorId\": \"2368952438\", \"name\": \"Maciej Walczak\"}, {\"authorId\": \"7438187\", \"name\": \"Beata Zawitowska\"}, {\"authorId\": \"1402699704\", \"name\": \"M. Michalska-Sionkowska\"}, {\"authorId\": \"2280314259\", \"name\": \"Antoni Szumny\"}, {\"authorId\": \"4549856\", \"name\": \"M. Brzezinska\"}], \"abstract\": null}, {\"paperId\": \"a893ac10e3066d7fce4c197d6107383f37a6330e\", \"externalIds\": {\"CorpusId\": 263520298}, \"title\": \"Is basal ultrasensitive measurement of calcitonin capable of substituting for the pentagastrin-stimulation test? measurement of capable of substituting for the pentagastrin-stimulation test?\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://web.archive.org/web/20171007094324/http://okina.univ-angers.fr/printpdf/publications/ua10549, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [], \"abstract\": null}, {\"paperId\": \"a9e5439ae2b873fd2fb7f37274d50fb110893d67\", \"externalIds\": {\"DOI\": \"10.1159/000356275\", \"CorpusId\": 202652095}, \"title\": \"Front & Back Matter\", \"venue\": \"Brain, Behavior and Evolution\", \"year\": 2013, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://www.karger.com/Article/Pdf/356275\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1159/000356275?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1159/000356275, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1380990970\", \"name\": \"Rediscover Vesalius\"}], \"abstract\": null}, {\"paperId\": \"a9f2a9e2c5fdd4cb098e7cd3bc61eff5b684aa58\", \"externalIds\": {\"MAG\": \"3026545908\", \"DOI\": \"10.1002/app.49397\", \"CorpusId\": 219491722}, \"title\": \"Investigation of characteristic and performance of polyvinyl chloride ultrafiltration membranes modified with silica\\u2010oriented multi walled carbon nanotubes\", \"venue\": \"Journal of Applied Polymer Science\", \"year\": 2020, \"citationCount\": 12, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/app.49397?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/app.49397, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2312485830\", \"name\": \"Chahrazed Mahmoudi\"}, {\"authorId\": \"2073176986\", \"name\": \"E. Demirel\"}, {\"authorId\": \"2155260454\", \"name\": \"Yongsheng Chen\"}], \"abstract\": \"The complicated and dynamic nature of membrane fouling is one of the most challenging issues that need to be addressed to obtain an efficient membrane. In this work, silicaoriented multi-walled carbon nanotubes (Si-MWCNT) are synthesized by the sol-gel method and characterized using several analytical techniques. Novel polyvinyl chloride (PVC) ultrafiltration membranes are fabricated by incorporation of Si-MWCNT nanoparticles at varying loading levels (0-2 wt.%) using the phase inversion method. Membrane morphology, chemical composition, thermal behavior, crystallinity, roughness, hydrophilicity and mechanical strength are characterized and filtration performance is tested to compare the results with those of pristine PVC membranes. The results reveal that the addition of 0.5% Si-MWCNT nanoparticles into the casting solution exhibits the highest flux (400 L/m2h), sodium alginate rejection rate (96%) and flux recovery ratio (93%) due to having the highest hydrophilicity, an improved structure, and surface properties revealed by surface morphology and bulk property analysis. Furthermore, the results of dynamic mechanical and nanoindentation analyses confirm This article is protected by copyright. All rights reserved. This is the author manuscript accepted for publication and has undergone full peer review but has not been through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this version and the Version of Record. Please cite this article as doi: 10.1002/app.49397\"}, {\"paperId\": \"ac6da5212b57b39462ea4af062fe287d82eeaf0b\", \"externalIds\": {\"CorpusId\": 207846208}, \"title\": \"Beta-cell Function and Glycemic Control on Initiation of Second-Line Glucose-Lowering Treatment in Newly Diagnosed Type 2 Diabetes Glycemic control and second-line glucose-lowering therapy\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"145391526\", \"name\": \"W. Rathmann\"}, {\"authorId\": \"4929451\", \"name\": \"K. Strassburger\"}, {\"authorId\": \"5196561\", \"name\": \"B. Bongaerts\"}, {\"authorId\": \"50514883\", \"name\": \"P. Bobrov\"}, {\"authorId\": \"2530464\", \"name\": \"O. Kuss\"}, {\"authorId\": \"2507188\", \"name\": \"K. M\\u00fcssig\"}, {\"authorId\": \"5976521\", \"name\": \"D. Markgraf\"}, {\"authorId\": \"4199745\", \"name\": \"J. Szendroedi\"}, {\"authorId\": \"6578877\", \"name\": \"C. Herder\"}, {\"authorId\": \"144424493\", \"name\": \"M. Roden\"}], \"abstract\": null}, {\"paperId\": \"acb925b7f789a2d5626ac3ad454482344cf1cda4\", \"externalIds\": {\"MAG\": \"3015479819\", \"DOI\": \"10.1002/AIC.16237\", \"CorpusId\": 216303726}, \"title\": \"Chemicals from heavy oils by\\n ZSM\\n \\u20105 catalysis in supercritical water: Model compound and reaction engineering\", \"venue\": \"AIChE Journal\", \"year\": 2020, \"citationCount\": 12, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1002/AIC.16237?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1002/AIC.16237, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"84377220\", \"name\": \"Azadeh Zaker\"}, {\"authorId\": \"144385428\", \"name\": \"P. Guerra\"}, {\"authorId\": \"5669493\", \"name\": \"G. Tompsett\"}, {\"authorId\": \"5561125\", \"name\": \"Xinlei Huang\"}, {\"authorId\": \"7853404\", \"name\": \"Jesse Q. Bond\"}, {\"authorId\": \"34568843\", \"name\": \"M. Timko\"}], \"abstract\": \"Dodecane cracking and aromatization over ZSM-5 was studied in the presence and absence of supercritical water (SCW). A group-type model was used to determine five best-fit rate constants to describe yields to aliphatics, aromatics, coke, and gases. SCW accelerated gas formation while not through the copyediting, typesetting, pagination and proofreading process, which may lead to differences between this the suppressing coke formation. CO and CO 2 were formed in the presence of SCW, but not in its absence; a new, low-temperature coke gasification pathway was suggested to account for this observation. Similarly, a low-temperature alkane reforming pathway was hypothesized to explain the increased relative rate constant for production of gases in the presence of SCW compared with its absence. Additional tests and analysis indicated that these effects could not be ascribed solely to zeolite degradation in the presence of SCW, implying that water directly influences the reaction mechanism. These results provide new insights into the role(s) of water during oil cracking under supercritical conditions.\"}, {\"paperId\": \"ad27ea707bfeddec47fbacfacb48df65abb7a931\", \"externalIds\": {\"DOI\": \"10.1179/174328808X252028\", \"CorpusId\": 218756997}, \"title\": \"Reviews\", \"venue\": \"\", \"year\": 2008, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": \"CLOSED\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1179/174328808X252028?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1179/174328808X252028, which is subject to the license by the author or copyright owner provided with this content. Plea