horId\": \"2504390\", \"name\": \"T. Kujala\"}, {\"authorId\": \"2866267\", \"name\": \"A. Lasch\"}, {\"authorId\": \"38286291\", \"name\": \"Jakke M\\u00e4kel\\u00e4\"}], \"abstract\": null}, {\"paperId\": \"3338daeb1fff23690e41823f4ad1a48a0885401e\", \"externalIds\": {\"MAG\": \"2581416812\", \"CorpusId\": 64162863}, \"title\": \"\\\"WG Strain Series\\\" (pages 101-126)\", \"venue\": \"\", \"year\": 1950, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2103455\", \"name\": \"J. Lederberg\"}], \"abstract\": null}, {\"paperId\": \"3462ebeb68e403bc04657187094e802410ff4b7b\", \"externalIds\": {\"DOI\": \"10.52436/1.jpti.521\", \"CorpusId\": 275062454}, \"title\": \"Optimisasi Pagination dan Error Handling pada Portal Minat untuk Meningkatkan Performa Aplikasi Menggunakan Whitebox Testing\", \"venue\": \"Jurnal Pendidikan dan Teknologi Indonesia\", \"year\": 2024, \"citationCount\": 1, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.52436/1.jpti.521?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.52436/1.jpti.521, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"13152124\", \"name\": \"A. Farhan\"}, {\"authorId\": \"2202601112\", \"name\": \"Abdul Wahab\"}, {\"authorId\": \"2337335787\", \"name\": \"Faisal Ri'fai\"}, {\"authorId\": \"2337336579\", \"name\": \"Frederick Nehemia M\"}, {\"authorId\": \"2337335730\", \"name\": \"Hapifuddin Alman Faluti\"}, {\"authorId\": \"2337333912\", \"name\": \"Maya Oktarina\"}], \"abstract\": \"Peningkatan jumlah pendaftar melalui Portal Minat memunculkan tantangan dalam pengelolaan data besar yang berdampak pada penurunan kinerja sistem. Penelitian ini bertujuan untuk mengimplementasikan pagination pada aplikasi Portal Minat guna mengoptimalkan kinerja sistem dan meningkatkan efisiensi waktu pemuatan data. Metode Whitebox Testing digunakan untuk mengevaluasi efektivitas pagination dan kemampuan sistem dalam menangani error handling saat memproses data besar. Hasil penelitian menunjukkan bahwa pagination berhasil mengurangi waktu pemuatan data dari 30 detik menjadi kurang dari 10 detik, serta mencegah kegagalan sistem saat menangani data besar. Penelitian ini merekomendasikan penerapan pagination pada seluruh fitur untuk meningkatkan stabilitas aplikasi.\"}, {\"paperId\": \"355e4256e448f12f94caa40025c90f651a0b0b46\", \"externalIds\": {\"CorpusId\": 115324965}, \"title\": \"Type 2 diabetes mellitus associated with the interaction of LRP 5 polymorphism and overweight and obesity in rural Chinese adults T 2 DM relate to interaction of LRP 5 and obesity\", \"venue\": \"\", \"year\": 2017, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"48571235\", \"name\": \"Lu Zhang\"}, {\"authorId\": \"2110176718\", \"name\": \"Jinjin Wang\"}, {\"authorId\": \"39767557\", \"name\": \"M. Zhang\"}, {\"authorId\": \"2108825041\", \"name\": \"Guo'an Wang\"}, {\"authorId\": \"48234888\", \"name\": \"Yanxia Shen\"}, {\"authorId\": \"2093858599\", \"name\": \"Wu Dongting\"}, {\"authorId\": \"2142951\", \"name\": \"Chongjian Wang\"}, {\"authorId\": \"49808638\", \"name\": \"Li Linlin\"}, {\"authorId\": \"7800465\", \"name\": \"Yongcheng Ren\"}, {\"authorId\": \"7425419\", \"name\": \"Bing-yuan Wang\"}, {\"authorId\": \"2157343725\", \"name\": \"Hongyan Zhang\"}, {\"authorId\": \"153297387\", \"name\": \"X. Yang\"}, {\"authorId\": \"47827074\", \"name\": \"Yang Zhao\"}, {\"authorId\": \"5464766\", \"name\": \"Chengyi Han\"}, {\"authorId\": \"36762741\", \"name\": \"Junmei Zhou\"}, {\"authorId\": \"48947246\", \"name\": \"C