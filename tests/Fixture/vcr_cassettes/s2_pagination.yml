10.1017/S0032247400043667?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1017/S0032247400043667, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"144507357\", \"name\": \"R. Hamilton\"}], \"abstract\": null}, {\"paperId\": \"804163af1e1902f9cf3af29e1a5392aa1458d26a\", \"externalIds\": {\"DOI\": \"10.1109/ice3is54102.2021.9649679\", \"CorpusId\": 245529827}, \"title\": \"Implementation of RESTful API Web Services Architecture in Takeaway Application Development\", \"venue\": \"2021 1st International Conference on Electronic and Electrical Engineering and Intelligent System (ICE3IS)\", \"year\": 2021, \"citationCount\": 44, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1109/ice3is54102.2021.9649679?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1109/ice3is54102.2021.9649679, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2074278624\", \"name\": \"Imam Ahmad\"}, {\"authorId\": \"2101056979\", \"name\": \"Emi Suwarni\"}, {\"authorId\": \"2073647539\", \"name\": \"Rohmat Indra Borman\"}, {\"authorId\": \"2148861404\", \"name\": \"Asmawati\"}, {\"authorId\": \"39239998\", \"name\": \"Farli Rossi\"}, {\"authorId\": \"49171416\", \"name\": \"Y. Jusman\"}], \"abstract\": \"The Covid-19 that hit the world had an impact on the economy, especially in the trade sector, one of which was experienced by Small and Medium Enterprises (SMEs). Hanura Takeaway (Haway) is an SME engaged in the delivery of goods and food. To facilitate transactions for goods and food delivery services, it is necessary to develop applications that simplify the transaction process. In developing web services, it is necessary to exchange data that is accessed via standard internet protocols. Therefore, we need a web service in developing this application. Implementing a RESTful API web service will certainly facilitate the development of software applications outside the system or with different programming languages or platforms. This research will develop web service architecture using RESTful API in Takeaway application. To optimize the URI, several parameters are used, including filtering, sorting, selection and pagination. The Takeaway application consists of a website as a backend and an Android-based as a frontend. From the test results based on the function method using the Postman application, it shows that the REST API Sever built on the server has been running well. In testing the response time using the Apache JMeter application, the application shows a good response time. Meanwhile, the comparison of responses and requests to SOAP and REST architectures shows that REST takes faster time.\"}, {\"paperId\": \"80ca9b404dd7e4faa3042f5d13a4a7cef3da0500\", \"externalIds\": {\"MAG\": \"26001836\", \"CorpusId\": 7763180}, \"title\": \"On Method: the problem of objectivity\", \"venue\": \"\", \"year\": 2000, \"citationCount\": 5, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://uhra.herts.ac.uk/bitstream/handle/2299/7459/903900.pdf?isAllowed=y&sequence=1, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"145009784\", \"name\": \"M. Biggs\"}], \"abstract\": null}, {\"paperId\": \"837528418416299ccc0bf23bf6840faf2b82f78a\", \"externalIds\": {\"DBLP\": \"conf/ccgrid/ColosiMPCFV22\", \"DOI\": \"10.1109/ccgrid54584.2022.00068\", \"CorpusId\": 250712632}, \"title\": \"Time Series Data Management Optimized for Smart City Policy Decision\", \"venue\": \"IEEE/ACM International Symposium on Cluster, Cloud and Internet Computing\", \"year\": 2022, \"citationCount\": 3, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://zenodo.org/record/8406693/files/Time%20Series%20Data%20Management%20Optimized%20for%20Smart%20City%20Policy%20Decision.pdf\", \"status\": \"GREEN\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.1109/ccgrid54584.2022.00068?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1109/ccgrid54584.2022.00068, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"2177455964\", \"name\": \"Mario Colosi\"}, {\"authorId\": \"2122688092\", \"name\": \"Francesco Martella\"}, {\"authorId\": \"2122694822\", \"name\": \"Giovanni Parrino\"}, {\"authorId\": \"1790992\", \"name\": \"A. Celesti\"}, {\"authorId\": \"143806018\", \"name\": \"M. Fazio\"}, {\"authorId\": \"1809861\", \"name\": \"M. Villari\"}], \"abstract\": \"The European project URBANITE (Supporting the decision-making in URBAN transformation with the use of disruptive Technologies) aims to put in place a sustainable mobility with the support of disruptive and innovative technologies for the sector of urban mobility. Urban mobility and smart mobility contexts, but not only, now require more than ever the use of large amounts of historical data to carry out the necessary analyses for different use cases. A good management of time series data, able to use pagination concepts in an optimized way and providing the user with specifications functions, therefore become indispensable. This need emerged as a native implementation in MongoDB 5.0. With the release of this version, users have functionality to manage time series collections. This new solution has stimulated us to undertake a study on the methods of managing time series data and compare the solution proposed by MongoDB with our solution based on the advanced use of the bucket approach. The two solutions were tested in a real context and the results obtained are reported in the paper.\"}, {\"paperId\": \"859e3272bb9033d43585d93afce84dd846756563\", \"externalIds\": {\"MAG\": \"2753700909\", \"CorpusId\": 65019818}, \"title\": \"\\\"WG Strain Series\\\" (pages 26-50)\", \"venue\": \"\", \"year\": 1950, \"citationCount\": 0, \"isOpenAccess\": false, \"openAccessPdf\": {\"url\": \"\", \"status\": null, \"license\": null}, \"authors\": [{\"authorId\": \"2103455\", \"name\": \"J. Lederberg\"}], \"abstract\": null}, {\"paperId\": \"866c8f95f733bfe74746a287b5022ff404fdaecd\", \"externalIds\": {\"MAG\": \"3037599585\", \"DOI\": \"10.6092/ISSN.2283-9364/11024\", \"CorpusId\": 225663500}, \"title\": \"Pagination printed by Aldus Manutius\", \"venue\": \"\", \"year\": 2020, \"citationCount\": 0, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://waseda.repo.nii.ac.jp/?action=repository_action_common_download&item_id=57521&item_no=1&attribute_id=22&file_no=1\", \"status\": \"GREEN\", \"license\": \"CCBYNCND\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.6092/ISSN.2283-9364/11024?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.6092/ISSN.2283-9364/11024, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"101551733\", \"name\": \"Koichi Yukishima\"}], \"abstract\": \"Pagination is an important element of the modern book, but the development\\u00a0of pagination and printing techniques have not been adequately studied. The\\u00a0author of this paper discusses pagination by Aldus Manutius (ca. 1450-1515) and\\u00a0his influence on the contemporary printers. Aldus printed 17 paginated books\\u00a0between 1499 and 1514, of which 13 books were printed in Greek (Table 1). His pagination can be divided into three types. Type A comprises books in which the\\u00a0page numbers were printed at the rightmost point of the headline on the recto\\u00a0page and at the leftmost point of the headline on the verso page. Type B comprises\\u00a0books in which the page numbers were printed in the middle of the headline\\u00a0on both the recto and verso pages. Type C comprises books in which the page\\u00a0numbers were printed at the rightmost point of the headline on both the recto\\u00a0and verso pages (Figure 1). Aldus\\u2019 preferred Type A and trialled Type B and C\\u00a0paginations when printing in octavo format. He tested all these types until 1508.\\u00a0Among these 17 paginated books, Aldus provided table of contents to nine books\\u00a0(Nos 2, 4, 6-8, and 12-15) and provided index to two books (Nos 1 and 6). But other seven books (Nos 3, 5, 9-11 and 16-17) were not provided any table of contents and index. It is certain that Aldus\\u2019s pagination was mainly intended to indicate\\u00a0the positions of the text by page numbers in a table of contents. His works\\u00a0influenced directly Lyon, Florence, and Basel. Johann Froben of Basel (ca. 1460-1527) printed many paginated books including Erasmus\\u2019s works, and Greek and\\u00a0Roman classics (Figure 3). Due to Froben\\u2019s efforts, pagination spread throughout\\u00a0the Rhine River Basin, Paris, and Antwerp until 1520, and then appeared at some\\u00a0leading centres of printing in East and South Germany, and England (Table 2).\"}, {\"paperId\": \"871223e67fe303ca4f16b2532c4a063a114f69ed\", \"externalIds\": {\"MAG\": \"2026339218\", \"DBLP\": \"journals/ijsccps/HelicTSA11\", \"DOI\": \"10.1504/IJSCCPS.2011.043603\", \"CorpusId\": 17450810}, \"title\": \"Are tag clouds useful for navigation? A network-theoretic analysis\", \"venue\": \"Int. J. Soc. Comput. Cyber Phys. Syst.\", \"year\": 2011, \"citationCount\": 30, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.1504/ijsccps.2011.043603\", \"status\": \"BRONZE\", \"license\": null, \"disclaimer\": \"Notice: The following paper fields have been elided by the publisher: {'abstract'}. Paper or abstract available at https://api.unpaywall.org/v2/10.1504/IJSCCPS.2011.043603?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.1504/IJSCCPS.2011.043603, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and copyright information for your use.\"}, \"authors\": [{\"authorId\": \"1747800\", \"name\": \"D. Helic\"}, {\"authorId\": \"1752070\", \"name\": \"C. Trattner\"}, {\"authorId\": \"1743043\", \"name\": \"M. Strohmaier\"}, {\"authorId\": \"144877610\", \"name\": \"Keith Andrews\"}], \"abstract\": null}, {\"paperId\": \"8ce87e271f245a9c9b58389c4cbcd24d6b2649e9\", \"externalIds\": {\"MAG\": \"2964047119\", \"DOI\": \"10.31083/j.rcm.2019.01.3183corr\", \"CorpusId\": 198911457, \"PubMed\": \"31345004\"}, \"title\": \"Corrigendum to \\\"Cardiac rehabilitation improved oxygen uptake measured by cardiopulmonary exercise test in patients after aortic valve surgery\\\" (Rev. Cardiovasc. Med. 2019, 20(1):47-52).\", \"venue\": \"Reviews in cardiovascular medicine\", \"year\": 2019, \"citationCount\": 4, \"isOpenAccess\": true, \"openAccessPdf\": {\"url\": \"https://doi.org/10.31083/j.rcm.2019.01.3183corr\", \"status\": \"GOLD\", \"license\": \"CCBY\", \"disclaimer\": \"Notice: Paper or abstract available at https://api.unpaywall.org/v2/10.31083/j.rcm.2019.01.3183corr?email=<INSERT_YOUR_EMAIL> or https://doi.org/10.31083/j.rcm.2019.01.3183corr, which is subject to the license by the author or copyright owner provided with this content. Please go to the source to verify the license and c