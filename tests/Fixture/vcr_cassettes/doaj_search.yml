        body: '{"total": 11361, "page": 1, "pageSize": 10, "timestamp": "2026-04-26T18:28:48.246910Z", "query": "(open access) AND bibjson.year:[2021 TO 2023]", "results": [{"last_updated": "2025-08-19T20:21:17Z", "bibjson": {"identifier": [{"id": "1978-2993", "type": "eissn"}, {"id": "10.9767/bcrec.16.3.10313.588-600", "type": "doi"}], "journal": {"volume": "16", "number": "3", "country": "ID", "issns": ["1978-2993"], "publisher": "Masyarakat Katalis Indonesia - Indonesian Catalyst Society (MKICS)", "language": ["EN", "ID"], "title": "Bulletin of Chemical Reaction Engineering & Catalysis"}, "month": "9", "end_page": "600", "keywords": ["oil palm shell", "bio-oil", "pyrolysis", "catalyst", "zeolite", "bayah natural zeolite"], "year": "2021", "start_page": "588", "subject": [{"code": "TP155-156", "scheme": "LCC", "term": "Chemical engineering"}], "author": [{"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Endang Suhendi"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Teguh Kurniawan"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Adian Yoga Pradana"}, {"affiliation": "Chemical Engineering, Engineering Faculty, Sultan Ageng Tirtayasa University, Jalan Jendral Sudirman KM.3 Cilegon, Banten, Indonesia", "name": "Vicky Zayan Giffari"}], "link": [{"content_type": "html", "type": "fulltext", "url": "https://journal.bcrec.id/index.php/bcrec/article/view/10313"}], "abstract": "Oil palm shell (OPS) constitutes 60% of the waste generated during the processing of palm oil. However, OPS can potentially be converted into energy and chemicals through pyrolysis. The purpose of this study is to determine and analyse the effect of acid treatment time on the characteristics of natural zeolites, which were then applied to oil palm shell pyrolysis. The effect of the acid treatment time on the products of the pyrolysis was also studied. The acid treatment time was varied: 1, 3, and 5 hours. The crystallinity of the natural zeolites was determined by\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0 X-ray diffraction (XRD). Solid, liquid and gaseous pyrolysis products were observed. Proximate, ultimate, and heat analysis were performed on the solid product. The liquid product was characterised using gas chromatography-mass spectrometry (GC-MS). Gas Chromatography (GC) was performed to analyse the composition of the gases produced. The results obtained from this study indicate that longer reflux times reduced the crystallinity of the zeolites. The addition of the zeolite catalysts increased the liquid products of pyrolysis from 24.5 wt% over the parent to 24.6\u201337.1 wt% over the acid-treated natural zeolites. The reduction of oxygenated compounds in bio-oil was observed in the amount of acetic acid and acetone produced. Copyright \u00a9 2021 by Authors, Published by BCREC Group. This is an open access article under the CC BY-SA\u00a0\u00a0 License (https://creativecommons.org/licenses/by-sa/4.0).", "title": "The Effect of Time on the Activation of Bayah Natural Zeolite for Application of Palm Oil Shell Pyrolysis"}, "created_date": "2021-07-23T08:41:12Z", "id": "0000e76ec76943239986f80d4fa437ec"}, {"last_updated": "2025-08-19T16:07:49Z", "bibjson": {"identifier": [{"id": "1932-6203", "type": "eissn"}, {"id": "10.1371/journal.pone.0270285", "type": "doi"}], "journal": {"volume": "17", "number": "6", "country": "US", "issns": ["1932-6203"], "publisher": "Public Library of Science (PLoS)", "language": ["EN"], "title": "PLoS ONE"}, "month": "0", "year": "2022", "start_page": "e0270285", "subject": [{"code": "R", "scheme": "LCC", "term": "Medicine"}, {"code": "Q", "scheme": "LCC", "term": "Science"}], "author": [{"name": "Danelle Agnew"}, {"name": "Kirstie Fryirs"}], "link": [{"type": "fulltext", "url": "https://doi.org/10.1371/journal.pone.0270285"}], "abstract": "By connecting corridors of river recovery, resilience can be built into river systems to mitigate against future floods and droughts driven by anthropogenic disturbance or climate extremes. However, identifying where these corridors can be built is still lacking in river management practice. The Open Access NSW River Styles database contains comprehensive information on geomorphic river condition and recovery potential. The database can be used to systematically analyse where corridors of river recovery could be created via conservation or rehabilitation. Analysis was undertaken in ArcGIS using the recovery potential layer along 84,342 km of freshwater stream length, across 20 catchments of coastal NSW. We identified 4,905 km of reach connections, defined as an upstream to downstream section of river that is connected end-to-end, and 17,429 km of loci connections defined as more isolated sections of river from which recovery can be seeded and extended into adjacent reaches. There was significant spatial variability in the types and lengths of connections made across the catchments. Some catchments have significant potential to build corridors of recovery along large sections of river, whereas other catchments are more fragmented. These results provide practitioners with a user-friendly distillation of where river conservation and rehabilitation activities could be focussed when working with river recovery in practice. Combined with local on-ground knowledge, this information forms an important input to evidence-based prioritisation and decision making in river management.", "title": "Identifying corridors of river recovery in coastal NSW Australia, for use in river management decision support and prioritisation systems."}, "id": "0009e650e6f8431dad44a3bc9728c4b6", "created_date": "2022-06-28T06:31:03Z"}, {"last_updated": "2025-08-19T16:47:49Z", "bibjson": {"identifier": [{"id": "10.1186/s12874-022-01654-1", "type": "doi"}, {"id": "1471-2288", "type": "eissn"}], "journal": {"volume": "22", "number": "1", "country": "GB", "issns": ["1471-2288"], "publisher": "BMC", "language": ["EN"], "title": "BMC Medical Research Methodology"}, "month": "6", "end_page": "15", "keywords": ["Simulation", "Survival", "Data accessibility", "Flexible parametric survival models", "Reproducible research", "Time-to-event"], "year": "2022", "start_page": "1", "subject": [{"code": "R5-920", "scheme": "LCC", "term": "Medicine (General)"}], "author": [{"affiliation": "Department of Health Sciences, Centre for Medicine, University of Leicester", "name": "Aiden Smith"}, {"affiliation": "Department of Health Sciences, Centre for Medicine, University of Leicester", "name": "Paul C. Lambert"}, {"affiliation": "Department of Health Sciences, Centre for Medicine, University of Leicester", "name": "Mark J. Rutherford"}], "link": [{"content_type": "HTML", "type": "fulltext", "url": "https://doi.org/10.1186/s12874-022-01654-1"}], "abstract": "Abstract Background A lack of available data and statistical code being published alongside journal articles provides a significant barrier to open scientific discourse, and reproducibility of research. Information governance restrictions inhibit the active dissemination of individual level data to accompany published manuscripts. Realistic, high-fidelity time-to-event synthetic data can aid in the acceleration of methodological developments in survival analysis and beyond by enabling researchers to access and test published methods using data similar to that which they were developed on. Methods We present methods to accurately emulate the covariate patterns and survival times found in real-world datasets using synthetic data techniques, without compromising patient privacy. We model the joint covariate distribution of the original data using covariate specific sequential conditional regression models, then fit a complex flexible parametric survival model from which to generate survival times conditional on individual covariate patterns. We recreate the administrative censoring mechanism using the last observed follow-up date information from the initial dataset. Metrics for evaluating the accuracy of the synthetic data, and the non-identifiability of individuals from the original dataset, are presented. Results We successfully create a synthetic version of an example colon cancer dataset consisting of 9064 patients which aims to show good similarity to both covariate distributions and survival times from the original data, without containing any exact information from the original data, therefore allowing them to be published openly alongside research. Conclusions We evaluate the effectiveness of the methods for constructing synthetic data, as well as providing evidence that there is minimal risk that a given patient from the original data could be identified from their individual unique patient information. Synthetic datasets using this methodology could be made available alongside published research without breaching data privacy protocols, and allow for data and code to be made available alongside methodological or applied manuscripts to greatly improve the transparency and accessibility of medical research.", "title": "Generating high-fidelity synthetic time-to-event datasets to improve data transparency and accessibility"}, "id": "000f1a1f9cde427d9e34f035f6cbb0d5", "created_date": "2022-06-26T11:26:42Z"}, {"last_updated": "2025-08-19T23:42:56Z", "bibjson": {"identifier": [{"id": "0259-9422", "type": "pissn"}, {"id": "2072-8050", "type": "eissn"}, {"id": "10.4102/hts.v79i3.8085", "type": "doi"}], "journal": {"volume": "79", "number": "3", "country": "ZA", "issns": ["0259-9422", "2072-8050"], "publisher": "AOSIS", "language": ["AF", "EN"], "title": "HTS Teologiese Studies/Theological Studies"}, "month": "5", "end_page": "e7", "keywords": ["covid-19 crisis", "health", "poverty", "relationship", "zimbabwean communities", "religion."], "year": "2023", "start_page": "e1", "subject": [{"code": "BS1-2970", "scheme": "LCC", "term": "The Bible"}, {"code": "BV1-5099", "scheme": "LCC", "term": "Practical Theology"}], "author": [{"affiliation": "Jami Etiquette and Grooming Consultancy, MIAJ Consultancy International, Harare, Zimbabwe; and, Department of Religious Studies and Theology, Faculty of Missions and Theology, Apostolic Faith Mission Theological Seminary, Harare", "name": "Joseph Muyangata"}, {"affiliation": "Department of Languages and Humanities, Faculty of Teacher Education, Joshua Mqabuko Polytechnic College, Gwanda, Zimbabwe; and, Department of Christian Spirituality, Church History and Missiology, College of Human Sciences, University of South Africa, Pretoria", "name": "Sibiziwe Shumba"}], "link": [{"content_type": "html", "type": "fulltext", "url": "https://hts.org.za/index.php/hts/article/view/8085"}], "abstract": "The COVID-19 pandemic which started in China in 2019, was originally described as a public health emergency of intercontinental concern by the World Health Organization (WHO) in January 2020. Due to its speedy rate of spread, the WHO then declared it a pandemic after 6 weeks. The global spread of COVID-19 has been attributed to the high mobility between and within countries. Having noted the wide spread of the COVID-19 pandemic, almost every country affected, developed strict and restrictive public health measures to control the spread of the virus. Such measures included restrictions on country borders and social gatherings. Hence, the main purpose of the paper was to explore the impact of the COVID-19 crisis in relation to religion, health and poverty in Harare urban communities as well as determining solutions to the impact of the COVID-19 pandemic on those sectors. The research methodology was qualitative in nature. Primary data were collected through in-depth telephone interviews and online open-ended questionnaires. Purposive sampling was used to select the study participants. The findings showed that the COVID-19 pandemic triggered and exposed the inequalities in health. The pandemic also had a strong impact on religious activities and it exacerbated poverty levels as well. Those who had all the access to medication, food and vaccinations during the height of COVID-19 may not fully appreciate the impact that poverty coupled with pandemics left on their communities both religiously and socially. Malnutrition, hunger and sickness were the order of the day among the poor.\n\nContribution:\u00a0The conclusion was that COVID-19 negatively impacted on the health, religious and social sectors. Therefore, it is critical to maintain preventive and curative services, especially for the most vulnerable populations such as children, older persons, and people with disabilities.", "title": "COVID-19 crisis in relation to religion, health and poverty in Zimbabwe: A case study of the Harare urban communities"}, "id": "000fb66c30334df79017a7e9bb27b947", "created_date": "2023-06-01T13:54:54Z"}, {"last_updated": "2026-02-27T06:07:43Z", "bibjson": {"identifier": [{"id": "1932-6203", "type": "eissn"}, {"id": "10.1371/journal.pone.0272730", "type": "doi"}], "journal": {"volume": "17", "number": "8", "country": "US", "issns": ["1932-6203"], "publisher": "Public Library of Science (PLoS)", "language": ["EN"], "title": "PLoS ONE"}, "month": "0", "year": "2022", "start_page": "e0272730", "subject": [{"code": "R", "scheme": "LCC", "term": "Medicine"}, {"code": "Q", "scheme": "LCC", "term": "Science"}], "author": [{"name": "Marc-Andr\u00e9 Simard"}, {"name": "Gita Ghiasi"}, {"name": "Philippe Mongeon"}, {"name": "Vincent Larivi\u00e8re"}], "link": [{"type": "fulltext", "url": "https://journals.plos.org/plosone/article/file?id=10.1371/journal.pone.0272730&type=printable"}], "abstract": "Open Access (OA) dissemination has been gaining a lot of momentum over the last decade, thanks to the implementation of several OA policies by funders and institutions, as well as the development of several new platforms that facilitate the publication of OA content at low or no cost. Studies have shown that nearly half of the contemporary scientific literature could be available online for free. However, few studies have compared the use of OA literature across countries. This study aims to provide a global picture of OA adoption by countries, using two indicators: publications in OA and references made to articles in OA. We find that, on average, low-income countries are publishing and citing OA at the highest rate, while upper middle-income countries and higher-income countries publish and cite OA articles at below world-average rates. These results highlight national differences in OA uptake and suggest that more OA initiatives at the institutional, national, and international levels are needed to support wider adoption of open scholarship.", "title": "National differences in dissemination and use of open access literature."}, "id": "0010a8a4c82543ee8966babf28927993", "created_date": "2022-09-04T06:31:04Z"}, {"last_updated": "2025-08-20T01:16:49Z", "bibjson": {"identifier": [{"id": "10.3828/jbs.2023.7", "type": "doi"}, {"id": "2754-7019", "type": "eissn"}], "journal": {"volume": "2023", "number": "Spring/Autumn", "country": "GB", "issns": ["2754-7019"], "publisher": "Liverpool University Press", "language": ["EN"], "title": "Journal of Beatles Studies"}, "month": "9", "end_page": "141", "keywords": ["Beatles", "Greek junta", "tourism", "Alexis Mardas", "Francis Noel-Baker", "propaganda"], "year": "2023", "start_page": "109", "subject": [{"code": "M1-5000", "scheme": "LCC", "term": "Music"}], "author": [{"affiliation": "Freelance journalist", "name": "Jonathan Knott"}], "link": [{"type": "fulltext", "url": "http://www.liverpooluniversitypress.co.uk/doi/10.3828/jbs.2023.7"}], "abstract": "In July 1967 the Beatles were making plans to buy a Greek island, and visited the country with this aim in mind. At the time, negative international opinion regarding the military dictatorship that had recently come to power in Greece was contributing to a decline in the country\u2019s tourism sector. Several credible accounts suggest that the Beatles\u2019 visit was used to generate publicity in the hope of encouraging tourism to Greece. But if so, the details of how such an initiative might have come about have remained unclear. In this article I examine the evidence for the group\u2019s activity in Greece, as well as relevant actions from other individuals and the wider historical context. Doing so highlights a range of political connections and dimensions to the events that offer a new perspective on the Beatles and may help us better understand the interactions between politics, celebrity and culture at the time. This article was published open access under a CC BY licence: https://creativecommons.org/licences/by/4.0.", "title": "\u2018Used as propaganda\u2019: the Beatles\u2019 Greek island plans and international politics"}, "id": "0015fd658a754b4fba92615db4fbfa2b", "created_date": "2025-04-23T10:42:18Z"}, {"last_updated": "2025-08-19T16:56:41Z", "bibjson": {"identifier": [{"id": "2521-327X", "type": "eissn"}, {"id": "10.22331/q-2022-04-13-685", "type": "doi"}], "journal": {"volume": "6", "country": "AT", "issns": ["2521-327X"], "publisher": "Verein zur F\u00f6rderung des Open Access Publizierens in den Quantenwissenschaften", "language": ["EN"], "title": "Quantum"}, "month": "04", "year": "2022", "start_page": "685", "subject": [{"code": "QC1-999", "scheme": "LCC", "term": "Physics"}], "author": [{"name": "Michael J. Kewming"}, {"name": "Sally Shrapnel"}], "link": [{"content_type": "PDF", "type": "fulltext", "url": "https://quantum-journal.org/papers/q-2022-04-13-685/pdf/"}], "abstract": "Fluctuation theorems allow one to make generalised statements about the behaviour of thermodynamic quantities in systems that are driven far from thermal equilibrium. In this article we use Crooks'' fluctuation theorem to understand the entropy production of a continuously measured, zero temperature quantum system; namely an optical cavity measured via homodyne detection. At zero temperature, if one uses the classical definition of inverse temperature $\\beta$, then the entropy production becomes divergent. Our analysis shows that the entropy production can be well defined at zero temperature by considering the entropy produced in the measurement record leading to an effective inverse temperature $\\beta_{\\rm eff}$ which does not diverge. We link this result to the Cram\u00e9r-Rao inequality and show that the product of the Fisher information of the work distribution with the entropy production is bounded below by half of the square of the effective inverse temperature $\\beta_{\\rm eff}$. This inequality indicates that there is a minimal amount of entropy production that is paid to acquire information about the work done to a quantum system driven far from equilibrium.", "title": "Entropy production and fluctuation theorems in a continuously monitored optical cavity at zero temperature"}, "id": "001b98383c3c4a7487daf7edb1f10666", "created_date": "2022-04-13T13:55:05Z"}, {"last_updated": "2025-08-19T23:13:00Z", "bibjson": {"identifier": [{"id": "10.3390/app13021014", "type": "doi"}, {"id": "2076-3417", "type": "eissn"}], "journal": {"volume": "13", "number": "2", "country": "CH", "issns": ["2076-3417"], "publisher": "MDPI AG", "language": ["EN"], "title": "Applied Sciences"}, "month": "01", "keywords": ["CFD", "planetary gearboxes", "high-speed camera", "lubrication", "oil flow"], "year": "2023", "start_page": "1014", "subject": [{"code": "T", "scheme": "LCC", "term": "Technology"}, {"code": "TA1-2040", "scheme": "LCC", "term": "Engineering (General). Civil engineering (General)"}, {"code": "QH301-705.5", "scheme": "LCC", "term": "Biology (General)"}, {"code": "QC1-999", "scheme": "LCC", "term": "Physics"}, {"code": "QD1-999", "scheme": "LCC", "term": "Chemistry"}], "author": [{"affiliation": "Faculty of Science and Technology, Free University of Bolzano, Piazza Universit\u00e0 5, 39100 Bolzano, Italy", "name": "Marco Nicola Mastrone"}, {"affiliation": "Gear Research Center (FZG), Department of Mechanical Engineering, School of Engineering and Design, Technical University of Munich, Boltzmannstra\u00dfe 15, 85748 Garching, Germany", "name": "Lucas Hildebrand"}, {"affiliation": "Gear Research Center (FZG), Department of Mechanical Engineering, School of Engineering and Design, Technical University of Munich, Boltzmannstra\u00dfe 15, 85748 Garching, Germany", "name": "Constantin Paschold"}, {"affiliation": "Gear Research Center (FZG), Department of Mechanical Engineering, School of Engineering and Design, Technical University of Munich, Boltzmannstra\u00dfe 15, 85748 Garching, Germany", "name": "Thomas Lohner"}, {"affiliation": "Gear Research Center (FZG), Department of Mechanical Engineering, School of Engineering and Design, Technical University of Munich, Boltzmannstra\u00dfe 15, 85748 Garching, Germany", "name": "Karsten Stahl"}, {"affiliation": "Faculty of Science and Technology, Free University of Bolzano, Piazza Universit\u00e0 5, 39100 Bolzano, Italy", "name": "Franco Concli"}], "link": [{"content_type": "text/html", "type": "fulltext", "url": "https://www.mdpi.com/2076-3417/13/2/1014"}], "abstract": "The circular layout and the kinematics of planetary gearboxes result in characteristic oil flow phenomena. The goal of this paper is to apply a new remeshing strategy, based on the finite volume method, on the numerical analysis of a planetary gearbox and its evaluation of results as well as its validation. The numerical results are compared with experimental data acquired on the underlying test rig with high-speed camera recordings. By use of a transparent housing cover, the optical access in the front region of the gearbox is enabled. Different speeds of the planet carrier and immersion depths are considered. A proper domain partitioning and a specifically suited mesh-handling strategy provide a highly efficient numerical model. The open-source software OpenFOAM<sup>\u00ae</sup> is used.", "title": "Numerical and Experimental Analysis of the Oil Flow in a Planetary Gearbox"}, "id": "00229f5bd53c4f739e804cc6674cc8bc", "created_date": "2023-01-20T14:30:17Z"}, {"last_updated": "2025-08-19T16:59:40Z", "bibjson": {"identifier": [{"id": "1179-1500", "type": "pissn"}], "journal": {"volume": "Volume 13", "country": "GB", "issns": ["1179-1500"], "publisher": "Dove Medical Press", "language": ["EN"], "title": "Open Access Emergency Medicine"}, "month": "2", "end_page": "56", "keywords": ["knowledge", "practice", "supplemental oxygen therapy", "nurse"], "year": "2021", "start_page": "51", "subject": [{"code": "RC86-88.9", "scheme": "LCC", "term": "Medical emergencies. Critical care. Intensive care. First aid"}], "author": [{"name": "Zeleke S"}, {"name": "Kefale D"}], "link": [{"content_type": "html", "type": "fulltext", "url": "https://www.dovepress.com/nursesrsquo-supplemental-oxygen-therapy-knowledge-and-practice-in-debr-peer-reviewed-article-OAEM"}], "abstract": "Shegaw Zeleke,1 Demewoz Kefale2 1Department of Adult Health Nursing, College of Health Sciences, Debre Tabor University, Debre Tabor, Ethiopia; 2Department of Pediatric and Child Health Nursing, College of Health Sciences, Debre Tabor University, Debre Tabor, EthiopiaCorrespondence: Shegaw Zeleke Email shegawzn@gmail.comBackground: Oxygen therapy is a medical treatment and prescribed to prevent or treat hypoxemia. Based on a WHO report every year at least 1.4 million deaths occur due to the lack of supplemental oxygen therapy and inappropriate administration of oxygen.Objective: To assess the knowledge and practice of nurses on supplemental oxygen therapy in Debre Tabor General Hospital, 2019.Methods: Data was collected using structured questionnaires that measure nurses&rsquo; knowledge and practice regarding supplemental oxygen therapy. Data were entered using Epi Data version 3.1 and analyzed using SPSS version 23. Bivariate and multivariate analyses were conducted to examine the association between independent and outcome variables.Results: Only one-third of nurses had a good practice on supplemental oxygen administration. Nurses who had good knowledge of supplemental oxygen administration were 12-times (AOR=12.25, 95% CI=6.48&ndash; 32.93) more likely to have a good practice of supplemental oxygen administration than those who had poor knowledge of supplemental oxygen administration.Conclusion: There is a clear knowledge and practice gap among nurses working in Debre Tabor General Hospital. The knowledge and practice level of nurses in the study area is low compared with others. The possible factors were identified; such as lack of supplemental oxygen therapy training, absence of supplemental oxygen administration standard guidelines, workload, and inadequate supply of oxygen and delivery devices.Keywords: knowledge, practice, supplemental oxygen therapy, nurse", "title": "Nurses&rsquo; Supplemental Oxygen Therapy Knowledge and Practice in Debre Tabor General Hospital: A Cross-Sectional Study"}, "id": "0024a20382ed4ce89f77b3ef64bab92e", "created_date": "2021-02-14T19:42:04Z"}, {"last_updated": "2025-08-19T19:32:20Z", "bibjson": {"identifier": [{"id": "2050-3121", "type": "eissn"}, {"id": "10.1177/20503121221095966", "type": "doi"}], "journal": {"volume": "10", "country": "GB", "issns": ["2050-3121"], "publisher": "SAGE Publishing", "language": ["EN"], "title": "SAGE Open Medicine"}, "month": "5", "year": "2022", "subject": [{"code": "R5-920", "scheme": "LCC", "term": "Medicine (General)"}], "author": [{"name": "Ahmed Jubayer"}, {"name": "Md. Hafizul Islam"}, {"name": "Md. Moniruzzaman Nayan"}], "link": [{"content_type": "HTML", "type": "fulltext", "url": "https://doi.org/10.1177/20503121221095966"}], "abstract": "Objectives: This study aimed to outline water, sanitation, and hygiene (WASH) practices for children under 5\u2009years of age among the households of St. Martin\u2019s Island as well as examine the role of water, sanitation, and hygiene on child nutritional outcomes. Methods: A total of 256 children under 5\u2009years of age were anthropometrically measured, and multiple linear regression was performed to understand the relationship between combined water, sanitation, and hygiene score and child nutritional outcomes: height-for-age, weight-for-age, weight-for-height z -scores. Results: The majority of the sampled households had improved drinking water facilities. Over one-third of the participants (36.5%) did not have access to better sanitation, and 12.4% reported defecating in open places. Just over one-third of those surveyed reported washing their hands with soap or detergents after defecation, with more than 22% of people not having access to a handwashing station on their premises. Stunting, wasting, and underweight were found to be prevalent in 34.4%, 17.6%, and 18.9% of the sampled children, respectively. Height-for-age (0.08 SDs) and weight-for-age (0.014 SDs) were greater on average in children from households with improved water, sanitation, and hygiene conditions, but weight-for-height did not significantly differ from those from WASH-unimproved households. Conclusion: Certain aspects of WASH, particularly, sanitation facilities and hygiene practices were not up to the mark in St. Martin\u2019s Island, and consistent with findings from other studies, our study findings underlined the potential benefits of improved water, sanitation, and hygiene practices in addressing child undernutrition.", "title": "Child-sensitive water, sanitation, and hygiene composite score and its association with child nutritional outcomes in St. Martin\u2019s Island, Bangladesh"}, "id": "00252d6f059a47939957e64b43b2b459", "created_date": "2022-05-15T22:03:32Z"}], "next": "https://doaj.org/api/v4/search/articles/(open%20access)%20AND%20bibjson.year:%5B2021%20TO%202023%5D?page=2&pageSize=10", "last": "https://doaj.org/api/v4/search/articles/(open%20access)%20AND%20bibjson.year:%5B2021%20TO%202023%5D?page=1137&pageSize=10"}'
