        body: '{"total_records":1,"total_searched":7222780,"articles":[{"doi":"10.1109/Deep-ML.2019.00010","title":"An Application of a Deep Learning Algorithm for Automatic Detection of Unexpected Accidents Under Bad CCTV Monitoring Conditions in Tunnels","publisher":"IEEE","isbn":"978-1-7281-2915-0","rank":1,"authors":{"authors":[{"affiliation":"Department of Extreme Environment Research Center, Korea Institute of Civil Engineering and Building Technology (KICT) University of Science & Technology (UST), Gyeonggi-Do, The Republic of Korea","authorUrl":"https://ieeexplore.ieee.org/author/37087054321","id":37087054321,"full_name":"Kyu Beom Lee","author_order":1,"authorAffiliations":{"authorAffiliation":["Department of Extreme Environment Research Center, Korea Institute of Civil Engineering and Building Technology (KICT) University of Science & Technology (UST), Gyeonggi-Do, The Republic of Korea"]}},{"affiliation":"Department of Extreme Environment Research Center, Korea Institute of Civil Engineering and Building Technology (KICT) University of Science & Technology (UST), Gyeonggi-Do, The Republic of Korea","authorUrl":"https://ieeexplore.ieee.org/author/37087045273","id":37087045273,"full_name":"Hyu Soung Shin","author_order":2,"authorAffiliations":{"authorAffiliation":["Department of Extreme Environment Research Center, Korea Institute of Civil Engineering and Building Technology (KICT) University of Science & Technology (UST), Gyeonggi-Do, The Republic of Korea"]}}]},"access_type":"LOCKED","content_type":"Conferences","abstract":"In this paper, Object Detection and Tracking System (ODTS) in combination with a well-known deep learning network, Faster Regional Convolution Neural Network (Faster R-CNN), for Object Detection and Conventional Object Tracking algorithm will be introduced and applied for automatic detection and monitoring of unexpected events on CCTVs in tunnels, which are likely to (1) Wrong-Way Driving (WWD), (2) Stop, (3) Person out of vehicle in tunnel (4) Fire. ODTS accepts a video frame in time as an input to obtain Bounding Box (BBox) results by Object Detection and compares the BBoxs of the current and previous video frames to assign a unique ID number to each moving and detected object. This system makes it possible to track a moving object in time, which is not usual to be achieved in conventional object detection frameworks. A deep learning model in ODTS was trained with a dataset of event images in tunnels to Average Precision (AP) values of 0.8479, 0.7161 and 0.9085 for target objects: Car, Person, and Fire, respectively. Then, based on a trained deep learning model, the ODTS based Tunnel CCTV Accident Detection System was tested using four accident videos which including each accident. As a result, the system can detect all accidents within 10 seconds. The more important point is that the detection capacity of ODTS could be enhanced automatically without any changes in the program codes as the training dataset becomes rich.","article_number":"8876906","pdf_url":"https://ieeexplore.ieee.org/stamp/stamp.jsp?tp=&arnumber=8876906","html_url":"https://ieeexplore.ieee.org/document/8876906/","abstract_url":"https://ieeexplore.ieee.org/document/8876906/","publication_title":"2019 International Conference on Deep Learning and Machine Learning in Emerging Applications (Deep-ML)","conference_location":"Istanbul, Turkey","conference_dates":"26-28 Aug. 2019","publication_number":8870906,"is_number":8876888,"publication_year":2019,"publication_date":"26-28 Aug. 2019","start_page":"7","end_page":"11","citing_paper_count":70,"citing_patent_count":0,"download_count":13620,"insert_date":"20191021","index_terms":{"ieee_terms":{"terms":["Object detection","Accidents","Object tracking","Automobiles","Monitoring","Deep learning","Target tracking"]},"author_terms":{"terms":["Faster R-CNN for Object Detection","Object Tracking Algorithm","Object Detection and Tracking system","Detection for Unexpected Events","Tunnel CCTV 