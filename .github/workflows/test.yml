name: tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        laravel: ['12.*', '13.*']

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Require specified Laravel and Testbench versions
        run: |
          if [ "${{ matrix.laravel }}" == "12.*" ]; then
            composer require "illuminate/contracts:^12.0" "orchestra/testbench:^10.0" --dev --no-interaction --no-update
          elif [ "${{ matrix.laravel }}" == "13.*" ]; then
            composer require "illuminate/contracts:^13.0" "orchestra/testbench:^11.0" --dev --no-interaction --no-update
          fi

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: php -d memory_limit=-1 vendor/bin/pest
